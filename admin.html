<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ადმინ პანელი - OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050000; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; border: 2px solid #4a0000; padding: 20px; border-radius: 15px; background: #0a0000; }
        h2 { color: gold; }
        input { width: 80%; padding: 10px; margin: 10px 0; background: #1a1a1a; border: 1px solid #4a0000; color: white; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .add-btn { background: #008000; color: white; }
        .del-btn { background: #ff0000; color: white; padding: 5px 10px; font-size: 12px; }
        .room-list { margin-top: 20px; text-align: left; }
        .room-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="container" id="admin-content" style="display:none;">
    <h2>🛠 ოთახების მართვა</h2>
    <input type="text" id="room-name" placeholder="შეიყვანეთ ოთახის სახელი...">
    <br>
    <button class="add-btn" onclick="addRoom()">➕ ოთახის დამატება</button>

    <div class="room-list" id="rooms-list">
        </div>
    
    <br>
    <button onclick="location.href='chat.html'" style="background:#444; color:white;">⬅ ჩატში დაბრუნება</button>
</div>

<div id="access-denied" style="display:none; color:red; margin-top:50px;">
    <h1>წვდომა აკრძალულია! ❌</h1>
    <p>თქვენ არ ხართ დამფუძნებელი.</p>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');

    async function checkAccess() {
        const { data: user } = await _s.from('profiles').select('role').eq('username', myNick).single();
        
        if (user && user.role === 'დამფუძნებელი') {
            document.getElementById('admin-content').style.display = 'block';
            loadRooms();
        } else {
            document.getElementById('access-denied').style.display = 'block';
        }
    }

    async function loadRooms() {
        const { data: rooms } = await _s.from('rooms').select('*').order('created_at');
        const list = document.getElementById('rooms-list');
        list.innerHTML = "<h3>არსებული ოთახები:</h3>";
        rooms.forEach(r => {
            list.innerHTML += `
                <div class="room-item">
                    <span>${r.name}</span>
                    <button class="del-btn" onclick="deleteRoom(${r.id})">წაშლა 🗑️</button>
                </div>
            `;
        });
    }

    async function addRoom() {
        const name = document.getElementById('room-name').value.trim();
        if (!name) return alert("სახელი ცარიელია!");

        const { error } = await _s.from('rooms').insert([{ name: name }]);
        if (error) alert("შეცდომა: " + error.message);
        else {
            document.getElementById('room-name').value = "";
            loadRooms();
        }
    }

    async function deleteRoom(id) {
        if (!confirm("ნამდვილად გსურთ წაშლა?")) return;
        const { error } = await _s.from('rooms').delete().eq('id', id);
        if (error) alert("შეცდომა წაშლისას!");
        else loadRooms();
    }

    checkAccess();
</script>
</body>
</html>
