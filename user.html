<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პროფილი - კაიფმანია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #cc0000; --dark-bg: #0b0b0b; --panel-bg: #161616; }
        body { margin: 0; background: var(--dark-bg); color: #ddd; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .profile-card { background: var(--panel-bg); padding: 30px; border-radius: 25px; border: 1px solid #222; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .avatar-container { position: relative; width: 130px; height: 130px; margin: 0 auto 20px; }
        #userAvatar { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--main-red); object-fit: cover; background: #222; }
        .upload-btn { position: absolute; bottom: 5px; right: 5px; background: var(--main-red); color: white; border: 2px solid var(--panel-bg); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 22px; font-weight: bold; }
        h2 { margin: 10px 0 5px; color: #fff; font-size: 24px; }
        .role-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 11px; background: #222; color: gold; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; border: 1px solid #333; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 11px; color: #555; margin-bottom: 5px; margin-left: 12px; font-weight: bold; }
        input { width: 100%; padding: 14px 18px; background: #0f0f0f; border: 1px solid #252525; color: #fff; border-radius: 12px; outline: none; }
        .save-btn { width: 100%; padding: 15px; background: var(--main-red); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .back-link { color: #555; text-decoration: none; font-size: 13px; display: block; margin-top: 20px; }
        #fileInput { display: none; }
    </style>
</head>
<body>
<div class="profile-card">
    <div class="avatar-container">
        <img id="userAvatar" src="">
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">+</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="uploadPhoto()">
    <h2 id="displayNick">იტვირთება...</h2>
    <div id="displayRole" class="role-badge">USER</div>
    <div class="input-group"><label>ნიკნეიმი</label><input type="text" id="newNick"></div>
    <div class="input-group"><label>სტატუსი</label><input type="text" id="userStatus"></div>
    <button id="saveBtn" class="save-btn" onclick="updateProfile()">შენახვა</button>
    <a href="home.html" class="back-link">← დაბრუნება ჩატში</a>
</div>
<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
    let userId = "";

    async function loadProfile() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return window.location.href = "index.html";
        userId = user.id;

        let { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', userId).maybeSingle();
        
        if (!profile) {
            const isOwner = (user.email === 'to222ji@gmail.com');
            const initialNick = isOwner ? 'abu007' : user.email.split('@')[0];
            const { data: newProf } = await supabaseClient.from('profiles').upsert([{ 
                id: userId, username: initialNick, role: isOwner ? 'owner' : 'user' 
            }]).select().single();
            profile = newProf;
        }

        document.getElementById('displayNick').innerHTML = (profile.role === 'owner' ? '👑 ' : '') + profile.username;
        document.getElementById('newNick').value = profile.username;
        document.getElementById('userAvatar').src = profile.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${profile.username}`;
        document.getElementById('displayRole').innerText = profile.role.toUpperCase();
        document.getElementById('userStatus').value = profile.status || "";
    }

    async function updateProfile() {
        const nick = document.getElementById('newNick').value.trim();
        const { error } = await supabaseClient.from('profiles').update({ username: nick, status: document.getElementById('userStatus').value }).eq('id', userId);
        if (error) alert(error.message); else { alert("განახლდა!"); location.reload(); }
    }

    async function uploadPhoto() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        const filePath = `${userId}-${Date.now()}`;
        const { error: upErr } = await supabaseClient.storage.from('avatars').upload(filePath, file);
        if (upErr) return alert(upErr.message);
        const { data } = supabaseClient.storage.from('avatars').getPublicUrl(filePath);
        await supabaseClient.from('profiles').update({ avatar_url: data.publicUrl }).eq('id', userId);
        location.reload();
    }
    loadProfile();
</script>
</body>
</html>
