<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>პროფილი - კაიფმანია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161616; padding: 30px; border-radius: 20px; border: 1px solid #222; width: 350px; text-align: center; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #cc0000; object-fit: cover; margin-bottom: 15px; }
        .name { font-size: 24px; font-weight: bold; color: #cc0000; }
        .role { font-size: 14px; color: gold; margin-bottom: 10px; }
        .status { font-style: italic; color: #999; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #111; border: 1px solid #333; color: white; border-radius: 8px; }
        .btn { background: #cc0000; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        .admin-panel { margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <img id="uAvatar" class="avatar" src="">
        <div id="uName" class="name">იტვირთება...</div>
        <div id="uRole" class="role"></div>
        <div id="uStatus" class="status"></div>

        <div id="editBox">
            <input type="text" id="newStatus" placeholder="ახალი სტატუსი...">
            <input type="text" id="newAvatar" placeholder="ფოტოს ლინკი (URL)...">
            <button class="btn" onclick="updateProfile()">განახლება</button>
        </div>

        <div id="adminPanel" class="admin-panel">
            <h4 style="color: gold;">🛡️ ადმინ პანელი</h4>
            <input type="text" id="targetUserId" placeholder="მომხმარებლის ID">
            <button class="btn" style="background:orange;" onclick="setRole('admin')">ადმინის მიცემა</button>
            <button class="btn" style="background:gray;" onclick="setRole('user')">როლის ჩახსნა</button>
        </div>

        <button class="btn" style="background:#333;" onclick="window.location.href='home.html'">← უკან ჩატში</button>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let myId = "";
        let myRole = "";

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = "index.html";
            myId = user.id;

            const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).maybeSingle();
            if (p) {
                myRole = p.role;
                document.getElementById('uName').innerText = p.username || "მომხმარებელი";
                document.getElementById('uStatus').innerText = p.status || "სტატუსი არ არის";
                document.getElementById('uRole').innerText = p.role === 'owner' ? '👑 დამფუძნებელი' : (p.role === 'admin' ? '🛡️ ადმინისტრატორი' : '👤 წევრი');
                document.getElementById('uAvatar').src = p.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${p.username}`;
                
                if (p.role === 'owner') {
                    document.getElementById('adminPanel').style.display = 'block';
                }
            }
        }

        async function updateProfile() {
            const status = document.getElementById('newStatus').value;
            const avatar = document.getElementById('newAvatar').value;
            const updates = {};
            if (status) updates.status = status;
            if (avatar) updates.avatar_url = avatar;

            const { error } = await supabase.from('profiles').update(updates).eq('id', myId);
            if (!error) location.reload();
            else alert("შეცდომა!");
        }

        async function setRole(newRole) {
            const targetId = document.getElementById('targetUserId').value;
            if (!targetId) return alert("შეიყვანე იუზერის ID!");
            
            const { error } = await supabase.from('profiles').update({ role: newRole }).eq('id', targetId);
            if (!error) alert("როლი შეიცვალა!");
            else alert("შეცდომა!");
        }

        init();
    </script>
</body>
</html>
