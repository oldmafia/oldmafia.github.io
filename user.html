<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პროფილი - კაიფმანია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161616; padding: 30px; border-radius: 20px; border: 1px solid #222; width: 90%; max-width: 380px; text-align: center; }
        .avatar-container { position: relative; width: 120px; height: 120px; margin: 0 auto 15px; }
        .u-avatar { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #cc0000; object-fit: cover; background: #222; }
        .upload-btn { position: absolute; bottom: 0; right: 0; background: #cc0000; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #161616; }
        .u-name { font-size: 24px; font-weight: bold; color: #cc0000; margin-bottom: 5px; }
        .u-status { color: #999; font-style: italic; margin-bottom: 20px; display: block; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        .btn-save { background: #cc0000; color: white; }
        .btn-back { background: #333; color: #ccc; }
        #fileInput { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar-container">
            <img id="uAvatar" class="u-avatar" src="https://api.dicebear.com/7.x/identicon/svg?seed=abu">
            <label for="fileInput" class="upload-btn">📷</label>
            <input type="file" id="fileInput" accept="image/*" onchange="uploadPhoto()">
        </div>
        <div id="uName" class="u-name">abu007</div>
        <div id="uStatus" class="u-status">სტატუსი არ არის</div>

        <input type="text" id="newStatus" placeholder="შეცვალე სტატუსი...">
        <button class="btn btn-save" onclick="updateStatus()">განახლება</button>
        <button class="btn btn-back" onclick="window.location.href='home.html'">უკან ჩატში</button>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let myId = "";

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = "index.html";
            myId = user.id;

            // შენი ID-ს სპეციალური შემოწმება
            if (user.id === '1b0d3a82-fac3-471a-98d1-2cc5697669d0') {
                document.getElementById('uName').innerText = 'abu007';
            }

            const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).maybeSingle();
            if (p) {
                if (p.username) document.getElementById('uName').innerText = p.username;
                if (p.status) document.getElementById('uStatus').innerText = p.status;
                if (p.avatar_url) document.getElementById('uAvatar').src = p.avatar_url;
            }
        }

        async function uploadPhoto() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            const fileName = `${myId}-${Date.now()}`;
            const { error: upErr } = await supabase.storage.from('avatars').upload(fileName, file);
            
            if (upErr) return alert("შეცდომა: შექმენი Storage-ში Bucket სახელად 'avatars'!");

            const { data } = supabase.storage.from('avatars').getPublicUrl(fileName);
            const url = data.publicUrl;

            await supabase.from('profiles').update({ avatar_url: url }).eq('id', myId);
            document.getElementById('uAvatar').src = url;
            alert("ფოტო განახლდა!");
        }

        async function updateStatus() {
            const st = document.getElementById('newStatus').value.trim();
            if (!st) return;
            await supabase.from('profiles').update({ status: st }).eq('id', myId);
            document.getElementById('uStatus').innerText = st;
            alert("სტატუსი განახლდა!");
        }

        init();
    </script>
</body>
</html>
