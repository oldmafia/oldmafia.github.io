<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>პროფილი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #0b0b0b; padding: 30px; border-radius: 20px; border: 1px solid #222; width: 300px; text-align: center; }
        img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #cc0000; }
        .name { font-size: 20px; margin: 10px 0; color: #cc0000; }
        .btn { display: block; margin-top: 20px; color: #555; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <img id="pAvatar" src="">
        <div id="pName" class="name">იტვირთება...</div>
        <div id="pStatus" style="color: #888; font-size: 14px;"></div>
        <a href="home.html" class="btn">← უკან ჩატში</a>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function init() {
            // 1. გავიგოთ ვინ არის შესული
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = "index.html";

            // 2. ვის პროფილს ვუყურებთ? (ლინკიდან)
            const urlParams = new URLSearchParams(window.location.search);
            let targetId = urlParams.get('id');

            // თუ ID არ არის ლინკში, ან აწერია "null/undefined", გახსნას შენი საკუთარი
            if (!targetId || targetId === "null" || targetId === "undefined") {
                targetId = user.id;
            }

            // 3. წამოვიღოთ მონაცემები
            const { data: profile, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', targetId)
                .maybeSingle();

            if (!profile) {
                document.getElementById('pName').innerText = "არ მოიძებნა";
                return;
            }

            // 4. გამოვაჩინოთ
            document.getElementById('pName').innerText = profile.username;
            document.getElementById('pStatus').innerText = profile.status || "სტატუსი ცარიელია";
            document.getElementById('pAvatar').src = profile.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${profile.username}`;
        }

        init();
    </script>
</body>
</html>
