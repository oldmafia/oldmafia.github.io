<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პროფილი - კაიფმანია 💜</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #cc0000; --dark-bg: #000; --panel-bg: #0b0b0b; }
        body { margin: 0; background: var(--dark-bg); color: #ddd; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .profile-card { 
            background: var(--panel-bg); 
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid #1a1a1a; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        }

        .avatar-main { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 3px solid var(--main-red); 
            margin-bottom: 15px; 
            object-fit: cover;
            background: #111;
        }

        .role-badge { 
            background: #1a1a1a; 
            color: gold; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: bold; 
            display: inline-block; 
            margin-bottom: 20px; 
            border: 1px solid #333; 
            text-transform: uppercase;
        }

        .username { font-size: 24px; font-weight: bold; color: white; margin-bottom: 5px; }
        .status-text { color: #888; font-style: italic; margin-bottom: 25px; min-height: 20px; }

        .edit-section { text-align: left; border-top: 1px solid #1a1a1a; padding-top: 20px; display: none; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: #555; margin-bottom: 5px; margin-left: 5px; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            background: #050505; 
            border: 1px solid #222; 
            color: white; 
            border-radius: 12px; 
            outline: none; 
            box-sizing: border-box;
        }

        .save-btn { 
            width: 100%; 
            padding: 12px; 
            background: var(--main-red); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .save-btn:hover { background: #990000; }

        .back-link { 
            display: inline-block; 
            margin-top: 20px; 
            color: #555; 
            text-decoration: none; 
            font-size: 13px; 
            transition: 0.3s;
        }
        .back-link:hover { color: var(--main-red); }
    </style>
</head>
<body>

<div class="profile-card">
    <img id="pAvatar" class="avatar-main" src="">
    <div id="pName" class="username">იტვირთება...</div>
    <div id="pRole" class="role-badge">USER</div>
    <div id="pStatus" class="status-text"></div>

    <div id="editBox" class="edit-section">
        <div class="input-group">
            <label>შეცვალე ნიკი</label>
            <input type="text" id="inNick">
        </div>
        <div class="input-group">
            <label>შეცვალე სტატუსი</label>
            <input type="text" id="inStatus">
        </div>
        <button class="save-btn" onclick="updateProfile()">განახლება</button>
    </div>

    <a href="home.html" class="back-link">← დაბრუნება ჩატში</a>
</div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function init() {
        // 1. ვამოწმებთ ავტორიზაციას
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return window.location.href = "index.html";

        // 2. ვიგებთ ვის ვუყურებთ
        const urlParams = new URLSearchParams(window.location.search);
        let targetId = urlParams.get('id');

        // თუ ID არ არის, ნიშნავს რომ ჩემს პროფილზე ვარ
        if (!targetId || targetId === "null" || targetId === "undefined") {
            targetId = user.id;
        }

        // 3. წამოვიღოთ მონაცემები
        const { data: profile, error } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', targetId)
            .maybeSingle();

        if (!profile) {
            document.getElementById('pName').innerText = "არ მოიძებნა";
            return;
        }

        // 4. შევავსოთ გვერდი
        document.getElementById('pName').innerText = profile.username;
        document.getElementById('pRole').innerText = profile.role === 'owner' ? '👑 დამფუძნებელი' : '👤 მომხმარებელი';
        document.getElementById('pStatus').innerText = profile.status || "სტატუსი ცარიელია";
        document.getElementById('pAvatar').src = profile.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${profile.username}`;

        // 5. თუ ჩემი პროფილია, ჩავრთოთ რედაქტირება
        if (targetId === user.id) {
            document.getElementById('editBox').style.display = 'block';
            document.getElementById('inNick').value = profile.username;
            document.getElementById('inStatus').value = profile.status || "";
        }
    }

    async function updateProfile() {
        const { data: { user } } = await supabase.auth.getUser();
        const newNick = document.getElementById('inNick').value;
        const newStatus = document.getElementById('inStatus').value;

        if (!newNick) return alert("ნიკი არ შეიძლება იყოს ცარიელი!");

        const { error } = await supabase
            .from('profiles')
            .update({ username: newNick, status: newStatus })
            .eq('id', user.id);

        if (error) {
            alert("შეცდომა: " + error.message);
        } else {
            alert("წარმატებით განახლდა!");
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
