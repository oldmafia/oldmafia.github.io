<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პროფილი - კაიფმანია 💜</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #cc0000; --dark-bg: #000; --panel-bg: #0b0b0b; }
        body { margin: 0; background: var(--dark-bg); color: #ddd; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: var(--panel-bg); padding: 40px; border-radius: 25px; border: 1px solid #1a1a1a; width: 320px; text-align: center; }
        .avatar { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--main-red); margin-bottom: 15px; }
        .username { font-size: 22px; font-weight: bold; color: white; margin-bottom: 5px; }
        .role { color: gold; font-size: 11px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        .status { color: #888; font-style: italic; margin-bottom: 25px; }
        #editBox { display: none; border-top: 1px solid #222; padding-top: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; }
        .btn { width: 100%; padding: 10px; background: var(--main-red); color: white; border: none; border-radius: 8px; cursor: pointer; }
        .back { display: block; margin-top: 20px; color: #555; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <img id="uAvatar" class="avatar" src="">
        <div id="uName" class="username">იტვირთება...</div>
        <div id="uRole" class="role"></div>
        <div id="uStatus" class="status"></div>
        <div id="editBox">
            <input type="text" id="inNick" placeholder="ახალი ნიკი">
            <input type="text" id="inStatus" placeholder="ახალი სტატუსი">
            <button class="btn" onclick="save()">განახლება</button>
        </div>
        <a href="home.html" class="back">← უკან</a>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = "index.html";

            const params = new URLSearchParams(window.location.search);
            let tid = params.get('id') || user.id;

            let { data: p } = await supabase.from('profiles').select('*').eq('id', tid).maybeSingle();
            
            if (!p && tid === user.id) {
                const { data: newP } = await supabase.from('profiles').insert([{ id: user.id, username: user.email.split('@')[0], role: 'user' }]).select().single();
                p = newP;
            }

            if (!p) { document.getElementById('uName').innerText = "არ მოიძებნა"; return; }

            document.getElementById('uName').innerText = p.username;
            document.getElementById('uRole').innerText = p.role === 'owner' ? '👑 დამფუძნებელი' : '👤 მომხმარებელი';
            document.getElementById('uStatus').innerText = p.status || "სტატუსი ცარიელია";
            document.getElementById('uAvatar').src = p.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${p.username}`;

            if (tid === user.id) {
                document.getElementById('editBox').style.display = 'block';
                document.getElementById('inNick').value = p.username;
                document.getElementById('inStatus').value = p.status || "";
            }
        }

        async function save() {
            const { data: { user } } = await supabase.auth.getUser();
            const nick = document.getElementById('inNick').value;
            const stat = document.getElementById('inStatus').value;
            await supabase.from('profiles').update({ username: nick, status: stat }).eq('id', user.id);
            location.reload();
        }
        init();
    </script>
</body>
</html>
