<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ჩემი პროფილი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #161616; padding: 30px; border-radius: 20px; border: 1px solid #222; width: 100%; max-width: 400px; text-align: center; }
        .avatar-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 15px; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #cc0000; object-fit: cover; }
        .upload-label { position: absolute; bottom: 0; right: 0; background: #cc0000; padding: 8px; border-radius: 50%; cursor: pointer; font-size: 12px; }
        .name { font-size: 24px; font-weight: bold; color: #cc0000; margin-bottom: 5px; }
        .status-text { color: #999; margin-bottom: 20px; display: block; }
        input[type="text"] { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        .btn-save { background: #cc0000; color: white; }
        .btn-back { background: #333; color: white; }
        #fileInput { display: none; }
        .loading-overlay { display: none; color: gold; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar-wrapper">
            <img id="uAvatar" class="avatar" src="https://api.dicebear.com/7.x/identicon/svg?seed=user">
            <label for="fileInput" class="upload-label">📷</label>
            <input type="file" id="fileInput" accept="image/*" onchange="uploadImage()">
        </div>
        
        <div id="uploadStatus" class="loading-overlay">იტვირთება ფოტო...</div>
        
        <div id="uName" class="name">იტვირთება...</div>
        <div id="uRole" style="color: gold; font-size: 13px; margin-bottom: 10px;"></div>
        <span id="uStatus" class="status-text"></span>

        <input type="text" id="newStatus" placeholder="შეცვალე სტატუსი...">
        <button class="btn btn-save" onclick="updateStatus()">სტატუსის შენახვა</button>
        <button class="btn btn-back" onclick="window.location.href='home.html'">უკან ჩატში</button>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let myId = "";

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = "index.html";
            myId = user.id;

            const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).maybeSingle();
            if (p) {
                document.getElementById('uName').innerText = p.username || "მომხმარებელი";
                document.getElementById('uStatus').innerText = p.status || "სტატუსი არ არის";
                document.getElementById('uRole').innerText = p.role === 'owner' ? '👑 დამფუძნებელი' : '👤 წევრი';
                if (p.avatar_url) document.getElementById('uAvatar').src = p.avatar_url;
            }
        }

        async function uploadImage() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            document.getElementById('uploadStatus').style.display = 'block';
            
            const fileExt = file.name.split('.').pop();
            const fileName = `${myId}-${Math.random()}.${fileExt}`;
            const filePath = `public/${fileName}`;

            // 1. ფოტოს ატვირთვა Storage-ში
            const { error: uploadError } = await supabase.storage
                .from('avatars')
                .upload(filePath, file);

            if (uploadError) {
                alert("ატვირთვის შეცდომა: " + uploadError.message);
                return;
            }

            // 2. ფოტოს საჯარო ლინკის აღება
            const { data } = supabase.storage.from('avatars').getPublicUrl(filePath);
            const publicUrl = data.publicUrl;

            // 3. პროფილის განახლება ბაზაში
            await supabase.from('profiles').update({ avatar_url: publicUrl }).eq('id', myId);
            
            document.getElementById('uAvatar').src = publicUrl;
            document.getElementById('uploadStatus').style.display = 'none';
            alert("ფოტო განახლდა!");
        }

        async function updateStatus() {
            const status = document.getElementById('newStatus').value;
            if (!status) return;
            const { error } = await supabase.from('profiles').update({ status: status }).eq('id', myId);
            if (!error) {
                document.getElementById('uStatus').innerText = status;
                alert("სტატუსი შეიცვალა!");
            }
        }

        init();
    </script>
</body>
</html>
