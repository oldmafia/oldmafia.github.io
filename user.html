<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პროფილი - კაიფმანია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161616; padding: 30px; border-radius: 20px; border: 1px solid #222; width: 90%; max-width: 380px; text-align: center; }
        
        .avatar-container { position: relative; width: 120px; height: 120px; margin: 0 auto 15px; }
        .u-avatar { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #cc0000; object-fit: cover; background: #222; }
        .upload-btn { position: absolute; bottom: 0; right: 0; background: #cc0000; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #161616; }
        
        .u-name { font-size: 24px; font-weight: bold; color: #cc0000; margin-bottom: 5px; }
        .u-status { color: #999; font-style: italic; margin-bottom: 20px; display: block; min-height: 20px; }
        
        input[type="text"] { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        .btn-save { background: #cc0000; color: white; }
        .btn-back { background: #333; color: #ccc; }
        
        #fileInput { display: none; }
        #loader { display: none; color: gold; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar-container">
            <img id="displayAvatar" class="u-avatar" src="https://api.dicebear.com/7.x/identicon/svg?seed=abu">
            <label for="fileInput" class="upload-btn">📷</label>
            <input type="file" id="fileInput" accept="image/*" onchange="uploadPhoto()">
        </div>

        <div id="loader">ფოტო იტვირთება...</div>

        <div id="displayName" class="u-name">...</div>
        <div id="displayStatus" class="u-status">...</div>

        <input type="text" id="inputStatus" placeholder="შეცვალე სტატუსი...">
        <button class="btn btn-save" onclick="updateStatus()">შენახვა</button>
        <button class="btn btn-back" onclick="window.location.href='home.html'">უკან ჩატში</button>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let myId = "";

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = "index.html";
            myId = user.id;

            const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).maybeSingle();
            if (p) {
                document.getElementById('displayName').innerText = p.username || "მომხმარებელი";
                document.getElementById('displayStatus').innerText = p.status || "სტატუსი არ არის";
                if (p.avatar_url) {
                    document.getElementById('displayAvatar').src = p.avatar_url;
                } else {
                    document.getElementById('displayAvatar').src = `https://api.dicebear.com/7.x/identicon/svg?seed=${p.username || 'user'}`;
                }
            }
        }

        async function uploadPhoto() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            document.getElementById('loader').style.display = 'block';

            const fileName = `${myId}-${Date.now()}.${file.name.split('.').pop()}`;
            
            // 1. ატვირთვა
            const { error: upErr } = await supabase.storage.from('avatars').upload(fileName, file);
            if (upErr) { 
                alert("შეცდომა: " + upErr.message); 
                document.getElementById('loader').style.display = 'none';
                return; 
            }

            // 2. ლინკის აღება
            const { data } = supabase.storage.from('avatars').getPublicUrl(fileName);
            const url = data.publicUrl;

            // 3. პროფილის განახლება
            await supabase.from('profiles').update({ avatar_url: url }).eq('id', myId);
            
            document.getElementById('displayAvatar').src = url;
            document.getElementById('loader').style.display = 'none';
            alert("ფოტო წარმატებით დაყენდა!");
        }

        async function updateStatus() {
            const st = document.getElementById('inputStatus').value.trim();
            if (!st) return;
            const { error } = await supabase.from('profiles').update({ status: st }).eq('id', myId);
            if (!error) {
                document.getElementById('displayStatus').innerText = st;
                alert("სტატუსი შენახულია!");
            }
        }

        init();
    </script>
</body>
</html>
