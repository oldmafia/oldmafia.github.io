<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პროფილი - კაიფმანია 💜</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #0b0b0b; padding: 40px; border-radius: 20px; border: 1px solid #222; width: 300px; text-align: center; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #cc0000; margin-bottom: 15px; }
        .username { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .role { color: gold; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; }
        .status { color: #888; margin-bottom: 20px; }
        .back { color: #555; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <img id="uAvatar" class="avatar" src="https://api.dicebear.com/7.x/identicon/svg?seed=abu007">
        <div id="uName" class="username">იტვირთება...</div>
        <div id="uRole" class="role"></div>
        <div id="uStatus" class="status"></div>
        <a href="home.html" class="back">← უკან</a>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function init() {
            // ვიღებთ ID-ს ლინკიდან
            const params = new URLSearchParams(window.location.search);
            let tid = params.get('id');

            // თუ ID არ არის, ავტომატურად ვნახულობთ შესულ იუზერს
            if (!tid) {
                const { data: { user } } = await supabase.auth.getUser();
                if (user) tid = user.id;
            }

            if (!tid) return window.location.href = "index.html";

            // მონაცემების წამოღება
            const { data: p, error } = await supabase.from('profiles').select('*').eq('id', tid).single();

            if (p) {
                document.getElementById('uName').innerText = p.username;
                document.getElementById('uRole').innerText = p.role === 'owner' ? '👑 დამფუძნებელი' : '👤 მომხმარებელი';
                document.getElementById('uStatus').innerText = p.status || "სტატუსი ცარიელია";
                document.getElementById('uAvatar').src = p.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${p.username}`;
            } else {
                document.getElementById('uName').innerText = "არ მოიძებნა";
            }
        }
        init();
    </script>
</body>
</html>
