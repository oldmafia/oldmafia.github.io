<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პროფილი - კაიფმანია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #cc0000; --dark-bg: #0b0b0b; --panel-bg: #161616; }
        body { margin: 0; background: var(--dark-bg); color: #ddd; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .profile-card { background: var(--panel-bg); padding: 30px; border-radius: 25px; border: 1px solid #222; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .avatar-container { position: relative; width: 130px; height: 130px; margin: 0 auto 20px; }
        #userAvatar { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--main-red); object-fit: cover; background: #222; }
        .upload-btn { position: absolute; bottom: 5px; right: 5px; background: var(--main-red); color: white; border: 2px solid var(--panel-bg); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 22px; display: none; align-items: center; justify-content: center; }
        h2 { margin: 10px 0 5px; color: #fff; font-size: 24px; }
        .role-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 11px; background: #222; color: gold; font-weight: bold; text-transform: uppercase; margin-bottom: 25px; border: 1px solid #333; }
        .status-text { color: #999; font-style: italic; margin-bottom: 20px; display: block; }
        .edit-group { display: none; margin-top: 15px; text-align: left; }
        label { display: block; font-size: 11px; color: #555; margin-bottom: 5px; margin-left: 12px; }
        input { width: 100%; padding: 12px; background: #0f0f0f; border: 1px solid #252525; color: #fff; border-radius: 12px; outline: none; margin-bottom: 10px; }
        .save-btn { width: 100%; padding: 15px; background: var(--main-red); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .back-link { color: #555; text-decoration: none; font-size: 13px; display: block; margin-top: 20px; }
    </style>
</head>
<body>
<div class="profile-card">
    <div class="avatar-container">
        <img id="userAvatar" src="https://api.dicebear.com/7.x/identicon/svg?seed=guest">
        <button id="uploadBtn" class="upload-btn" onclick="document.getElementById('fileInput').click()">+</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="uploadPhoto()" style="display:none">
    
    <h2 id="displayNick">იტვირთება...</h2>
    <div id="displayRole" class="role-badge">იტვირთება...</div>
    <span id="displayStatus" class="status-text"></span>

    <div id="editArea" class="edit-group">
        <label>ნიკნეიმი</label>
        <input type="text" id="newNick">
        <label>სტატუსი</label>
        <input type="text" id="userStatus">
        <button class="save-btn" onclick="updateProfile()">შენახვა</button>
    </div>

    <a href="home.html" class="back-link">← დაბრუნება ჩატში</a>
</div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    let myUserId = "";
    let viewingUserId = "";

    async function init() {
        // 1. ავტორიზაცია
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return window.location.href = "index.html";
        myUserId = user.id;

        // 2. ვის პროფილს ვუყურებთ? (URL-დან ?id=...)
        const params = new URLSearchParams(window.location.search);
        viewingUserId = params.get('id') || myUserId;

        // 3. მონაცემების წამოღება
        const { data: profile, error } = await supabaseClient
            .from('profiles')
            .select('*')
            .eq('id', viewingUserId)
            .maybeSingle();

        if (error || !profile) {
            document.getElementById('displayNick').innerText = "არ მოიძებნა";
            return;
        }

        // 4. როლების ქართულად თარგმნა
        const roles = { owner: "👑 დამფუძნებელი", admin: "🛡️ ადმინისტრატორი", user: "👤 მომხმარებელი" };

        // 5. ეკრანზე გამოტანა
        document.getElementById('displayNick').innerText = profile.username;
        document.getElementById('displayRole').innerText = roles[profile.role] || "მომხმარებელი";
        document.getElementById('displayStatus').innerText = profile.status || "სტატუსი არ არის";
        document.getElementById('userAvatar').src = profile.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${profile.username}`;

        // 6. თუ ჩემი პროფილია, გამოვაჩინოთ რედაქტირება
        if (myUserId === viewingUserId) {
            document.getElementById('editArea').style.display = 'block';
            document.getElementById('uploadBtn').style.display = 'flex';
            document.getElementById('newNick').value = profile.username;
            document.getElementById('userStatus').value = profile.status || "";
        }
    }

    async function updateProfile() {
        const nick = document.getElementById('newNick').value.trim();
        const stat = document.getElementById('userStatus').value.trim();
        
        const { error } = await supabaseClient
            .from('profiles')
            .update({ username: nick, status: stat })
            .eq('id', myUserId);

        if (error) alert("შეცდომა: " + error.message);
        else location.reload();
    }

    async function uploadPhoto() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        const path = `avatars/${myUserId}-${Date.now()}`;
        
        const { error: upErr } = await supabaseClient.storage.from('avatars').upload(path, file);
        if (upErr) return alert(upErr.message);

        const { data } = supabaseClient.storage.from('avatars').getPublicUrl(path);
        await supabaseClient.from('profiles').update({ avatar_url: data.publicUrl }).eq('id', myUserId);
        location.reload();
    }

    init();
</script>
</body>
</html>
