<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პროფილი - კაიფმანია 💜</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #cc0000; --dark-bg: #000; --panel-bg: #0b0b0b; }
        body { margin: 0; background: var(--dark-bg); color: #ddd; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: var(--panel-bg); padding: 40px; border-radius: 25px; border: 1px solid #1a1a1a; width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .avatar { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--main-red); margin-bottom: 15px; object-fit: cover; background: #111; }
        .username { font-size: 22px; font-weight: bold; color: white; margin-bottom: 10px; }
        .role { color: gold; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        .status { color: #777; font-style: italic; margin-bottom: 25px; font-size: 14px; }
        .back-btn { display: inline-block; color: #444; text-decoration: none; font-size: 13px; transition: 0.3s; }
        .back-btn:hover { color: var(--main-red); }
        #editSection { display: none; border-top: 1px solid #1a1a1a; padding-top: 20px; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid #222; color: white; border-radius: 10px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 10px; background: var(--main-red); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <img id="uAvatar" class="avatar" src="">
    <div id="uName" class="username">იტვირთება...</div>
    <div id="uRole" class="role">იტვირთება...</div>
    <div id="uStatus" class="status"></div>

    <div id="editSection">
        <input type="text" id="newNick" placeholder="ახალი ნიკი">
        <input type="text" id="newStatus" placeholder="ახალი სტატუსი">
        <button class="save-btn" onclick="save()">შენახვა</button>
    </div>

    <br>
    <a href="home.html" class="back-btn">← უკან ჩატში</a>
</div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function init() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return window.location.href = "index.html";

        const params = new URLSearchParams(window.location.search);
        let tid = params.get('id');

        // თუ ID არასწორია, ავტომატურად შენი ID გამოიყენოს
        if (!tid || tid === "null" || tid === "undefined" || tid.length < 10) {
            tid = user.id;
        }

        // ვეძებთ პროფილს
        let { data: p } = await supabase.from('profiles').select('*').eq('id', tid).maybeSingle();

        // თუ პროფილი არ არსებობს ბაზაში, ავტომატურად ვქმნით! (ეს არის წამალი)
        if (!p && tid === user.id) {
            const nick = user.email.split('@')[0];
            const { data: newP } = await supabase.from('profiles').insert([
                { id: user.id, username: nick, role: (user.email === 'to222ji@gmail.com' ? 'owner' : 'user') }
            ]).select().single();
            p = newP;
        }

        if (!p) {
            document.getElementById('uName').innerText = "არ მოიძებნა";
            document.getElementById('uRole').innerText = "";
            return;
        }

        // მონაცემების გამოტანა
        document.getElementById('uName').innerText = p.username;
        document.getElementById('uRole').innerText = p.role === 'owner' ? '👑 დამფუძნებელი' : '👤 მომხმარებელი';
        document.getElementById('uStatus').innerText = p.status || "სტატუსი ცარიელია";
        document.getElementById('uAvatar').src = p.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${p.username}`;

        // თუ ჩემი პროფილია, ვაჩვენებთ ჩასასწორებელს
        if (tid === user.id) {
            document.getElementById('editSection').style.display = 'block';
            document.getElementById('newNick').value = p.username;
            document.getElementById('newStatus').value = p.status || "";
        }
    }

    async function save() {
        const { data: { user } } = await supabase.auth.getUser();
        const nick = document.getElementById('newNick').value;
        const stat = document.getElementById('newStatus').value;

        const { error } = await supabase.from('profiles').update({ username: nick, status: stat }).eq('id', user.id);
        if (error) alert("შეცდომა!"); else location.reload();
    }

    init();
</script>
</body>
</html>
