<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - JOKER</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #ffd700; --bg: #030a03; --panel: rgba(0,0,0,0.9); }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); font-family: sans-serif; overflow: hidden; color: white; }

        .game-section { flex: 1; display: flex; flex-direction: column; position: relative; border-right: 2px solid #004400; background: radial-gradient(circle, #002200 0%, #000000 100%); }
        .table-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .poker-table { 
            width: 75%; height: 55%; background: radial-gradient(circle, #005500 0%, #003300 100%);
            border: 12px solid #2a1b0f; border-radius: 200px; box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.5);
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        .player { position: absolute; text-align: center; width: 90px; transition: 0.3s; }
        .p-bottom { bottom: -70px; left: 50%; transform: translateX(-50%); }
        .p-left { left: -80px; top: 50%; transform: translateY(-50%); }
        .p-top { top: -70px; left: 50%; transform: translateX(-50%); }
        .p-right { right: -80px; top: 50%; transform: translateY(-50%); }
        
        .player img { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--gold); background: #111; object-fit: cover; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .player .p-name { font-size: 12px; margin-top: 5px; font-weight: bold; text-shadow: 1px 1px 2px black; }

        .messenger-chat { width: 320px; background: var(--panel); display: flex; flex-direction: column; border-left: 2px solid #1a1a1a; }
        .chat-header { padding: 15px; border-bottom: 1px solid #222; font-weight: bold; color: var(--gold); text-align: center; letter-spacing: 1px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg.mine { align-self: flex-end; background: #0078ff; color: white; border-bottom-right-radius: 2px; }
        .msg.others { align-self: flex-start; background: #26262b; color: #eee; border-bottom-left-radius: 2px; }
        .msg-nick { font-size: 10px; margin-bottom: 3px; font-weight: bold; opacity: 0.8; color: var(--gold); }

        .chat-input { padding: 15px; background: #000; border-top: 1px solid #222; display: flex; gap: 8px; }
        .chat-input input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
        
        .my-hand { height: 130px; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; gap: 8px; border-top: 1px solid #004400; }
        .card { width: 45px; height: 65px; background: white; color: black; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.2s; border: 1px solid #ccc; }
        .card:hover { transform: translateY(-15px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        #start-btn { position: absolute; padding: 15px 30px; background: var(--gold); color: black; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 100; box-shadow: 0 0 20px rgba(255,215,0,0.4); }
    </style>
</head>
<body onload="initJoker()">

<div class="game-section">
    <div style="padding: 12px 20px; background: rgba(0,0,0,0.7); display: flex; justify-content: space-between; align-items: center; z-index: 10;">
        <button onclick="location.href='index.html'" style="background:none; border: 1px solid #555; color: #ccc; padding: 5px 15px; border-radius: 15px; cursor: pointer;">⬅ გასვლა</button>
        <div id="game-status" style="color: var(--gold); font-weight: bold;">მონაცემების ჩატვირთვა...</div>
        <div id="trump-display" style="font-weight: bold;">კოზირი: <span id="trump-val">-</span></div>
    </div>

    <div class="table-area">
        <button id="start-btn" style="display:none;" onclick="startGame()">თამაშის დაწყება</button>
        <div class="poker-table">
            <div id="p-pos-0" class="player p-bottom"></div>
            <div id="p-pos-1" class="player p-left"></div>
            <div id="p-pos-2" class="player p-top"></div>
            <div id="p-pos-3" class="player p-right"></div>
            <div id="table-center" style="font-size: 50px; opacity: 0.2;">🃏</div>
        </div>
    </div>

    <div class="my-hand" id="my-hand"></div>
</div>

<div class="messenger-chat">
    <div class="chat-header">JOKER CHAT</div>
    <div class="chat-messages" id="joker-chat-box"></div>
    <div class="chat-input">
        <input type="text" id="j-msg" placeholder="მოწერე აქ..." onkeypress="if(event.key==='Enter') sendJokerMsg()">
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');
    let currentGame = null;

    async function initJoker() {
        if (!myNick) { location.href = 'index.html'; return; }
        await joinTable();
        
        _s.channel('joker_main').on('postgres_changes', { event: '*', schema: 'public', table: 'joker_games' }, payload => {
            currentGame = payload.new;
            renderGame();
        }).subscribe();

        _s.channel('joker_msgs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_name=eq.🃏 ჯოკერი` }, payload => {
            appendMessage(payload.new);
        }).subscribe();

        loadInitialMessages();
    }

    async function joinTable() {
        const { data: profile } = await _s.from('profiles').select('avatar_url').eq('username', myNick).single();
        const myAv = profile?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';

        const { data: games } = await _s.from('joker_games').select('*').eq('status', 'waiting').limit(1);
        let game = games?.[0];

        if (!game) {
            const { data } = await _s.from('joker_games').insert([{ 
                room_id: 'table_1', players: [{ name: myNick, avatar: myAv }], status: 'waiting' 
            }]).select().single();
            game = data;
        } else {
            let players = game.players || [];
            if (!players.find(p => p.name === myNick) && players.length < 4) {
                players.push({ name: myNick, avatar: myAv });
                const { data } = await _s.from('joker_games').update({ players }).eq('id', game.id).select().single();
                game = data;
            }
        }
        currentGame = game;
        renderGame();
    }

    function renderGame() {
        if (!currentGame) return;
        const players = currentGame.players || [];
        document.getElementById('game-status').innerText = `მოთამაშეები: ${players.length}/4`;

        // დაწყების ღილაკი მხოლოდ პირველი მოთამაშისთვის, როცა 4-ნი არიან
        const startBtn = document.getElementById('start-btn');
        if (players.length === 4 && currentGame.status === 'waiting' && players[0].name === myNick) {
            startBtn.style.display = 'block';
        } else {
            startBtn.style.display = 'none';
        }

        // მოთამაშეების განლაგება (შენ ყოველთვის ბოლოში)
        const myIndex = players.findIndex(p => p.name === myNick);
        for(let i=0; i<4; i++) {
            const pIndex = (myIndex + i) % 4;
            const p = players[pIndex];
            const el = document.getElementById(`p-pos-${i}`);
            if (p) {
                el.innerHTML = `<img src="${p.avatar}"><div class="p-name">${p.name === myNick ? 'მე' : p.name}</div>`;
                el.style.opacity = "1";
            } else {
                el.innerHTML = `<div style="width:65px; height:65px; border-radius:50%; border:2px dashed #444;"></div>`;
                el.style.opacity = "0.5";
            }
        }
    }

    async function startGame() {
        // კარტების გენერაცია და დარიგება
        const deck = [];
        const suits = ['♥', '♦', '♣', '♠'];
        const values = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
        suits.forEach(s => values.forEach(v => deck.push({s, v})));
        deck.push({s:'JK', v:'J'}); deck.push({s:'JK', v:'J'});
        deck.sort(() => Math.random() - 0.5);

        let players = currentGame.players.map(p => {
            return { ...p, cards: deck.splice(0, 9) };
        });

        await _s.from('joker_games').update({
            players: players,
            status: 'playing',
            trump_card: deck[0]
        }).eq('id', currentGame.id);
    }

    async function sendJokerMsg() {
        const input = document.getElementById('j-msg');
        if (!input.value.trim()) return;
        await _s.from('messages').insert([{ user_name: myNick, text: input.value, room_name: '🃏 ჯოკერი' }]);
        input.value = "";
    }

    function appendMessage(m) {
        const box = document.getElementById('joker-chat-box');
        const isMine = m.user_name === myNick;
        box.innerHTML += `
            <div class="msg ${isMine ? 'mine' : 'others'}">
                ${!isMine ? `<div class="msg-nick">${m.user_name}</div>` : ''}
                <div>${m.text}</div>
            </div>`;
        box.scrollTop = box.scrollHeight;
    }

    async function loadInitialMessages() {
        const { data } = await _s.from('messages').select('*').eq('room_name', '🃏 ჯოკერი').order('created_at', { ascending: false }).limit(20);
        data?.reverse().forEach(appendMessage);
    }
</script>
</body>
</html>
