<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - FINAL JOKER SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --dark-red: #4a0000; --deep-red: #800000; --bright-red: #ff0000;
            --blood-red: #660000; --bg-black: #030000;
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--dark-red); height: 60px; flex-shrink: 0; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 25px; color: var(--bright-red); }
        #room-name { font-weight: bold; color: var(--bright-red); flex: 1; text-align: center; font-size: 16px; }
        #pm-btn { position: relative; cursor: pointer; font-size: 22px; margin-right: 15px; color: cyan; display: flex; align-items: center; }
        #pm-count { position: absolute; top: -8px; right: -10px; color: #ff0000; font-size: 16px; display: none; font-weight: bold; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #1a0000 0%, #030000 100%); transition: padding-top 0.3s; }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; max-width: 95%; }
        .avatar-wrapper { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--dark-red); object-fit: cover; cursor: pointer; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #0f0; border: 2px solid black; border-radius: 50%; display: none; }
        .online-dot.active { display: block; box-shadow: 0 0 8px #0f0; }
        
        .bubble { background: rgba(25, 0, 0, 0.9); border: 1px solid var(--blood-red); padding: 8px 12px; border-radius: 4px 18px 18px 18px; position: relative; min-width: 80px; }
        .m-nick { font-weight: bold; color: #ff3333; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .m-text { color: #ddd; font-size: 14px; word-wrap: break-word; line-height: 1.4; }
        .m-text img { width: 48px; height: 48px; vertical-align: middle; }

        .input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: black; padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--dark-red); z-index: 2000; }
        .input-zone input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--blood-red); background: #080000; color: white; outline: none; }
        .send-btn { background: var(--dark-red); border: none; width: 45px; height: 45px; border-radius: 50%; color: cyan; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #joker-ui { 
            display: none; position: fixed; top: 60px; left: 0; width: 100%; 
            background: linear-gradient(180deg, rgba(0, 40, 0, 0.98) 0%, rgba(0, 10, 0, 0.95) 100%); 
            border-bottom: 2px solid gold; padding: 12px; z-index: 1500; text-align: center; 
        }
        .joker-table-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 10px; }
        .player-slot { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 22%; }
        .player-slot img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid gold; object-fit: cover; background: #111; }
        .player-name { font-size: 11px; color: white; overflow: hidden; white-space: nowrap; width: 100%; }

        /* Sidebar/Menus */
        .sidebar, .online-sidebar { position: fixed; top: 0; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; display: flex; flex-direction: column; }
        .sidebar { left: -280px; border-right: 3px solid var(--dark-red); }
        .sidebar.active { left: 0; }
        .online-sidebar { right: -280px; border-left: 3px solid var(--dark-red); }
        .online-sidebar.active { right: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3500; }
        .overlay.active { display: block; }
        .room-item { padding: 14px 20px; cursor: pointer; color: #bbb; border-bottom: 1px solid #150000; }
        .room-item.active { background: var(--dark-red); color: white; font-weight: bold; }
        
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
        .modal-content { background: #080000; border: 2px solid var(--dark-red); padding: 25px; border-radius: 25px; width: 320px; text-align: center; }
        .modal-btn { display: block; width: 100%; padding: 12px; margin: 7px 0; border: 1px solid var(--blood-red); background: #110000; color: white; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div id="joker-ui"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 20px 15px; text-align: center; border-bottom: 1px solid #222;">
        <input type="file" id="avatar-input" style="display:none" onchange="uploadAvatar(this)">
        <img id="my-avatar-img" src="" style="width:65px; height:65px; border-radius:50%; border:2px solid var(--dark-red); object-fit: cover; cursor:pointer;" onclick="document.getElementById('avatar-input').click()">
        <div id="my-nick-label" style="font-weight:bold; color:var(--bright-red); margin-top:5px;">...</div>
        <div id="my-points-info" style="font-size: 11px; color: gold; margin-top: 5px;">
            🏆 <span id="my-points-label">0</span> | 🔐 <span id="my-cipher-points-label">0</span>
        </div>
        <div id="my-joker-stats" style="font-size: 11px; color: #0c0; margin-top: 3px;">
            🃏 W: <span id="my-j-wins">0</span> / L: <span id="my-j-losses">0</span>
        </div>
    </div>
    <div class="rooms-list" style="flex:1; overflow-y:auto;">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('💎 ვიპ საუბრები', this)">💎 ვიპ საუბრები</div>
        <div class="room-item" onclick="changeRoom('🕴 მაფიის ღამე', this)">🕴 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('❓ ვიქტორინა', this)">❓ ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('🎲 ნარდი', this)">🎲 ნარდი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        </div>
    <div style="padding:15px; text-align:center; color:red; cursor:pointer;" onclick="logout()">🚪 გასვლა</div>
</div>

<div class="online-sidebar" id="online-sidebar">
    <div id="online-list-content"></div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
    <div id="pm-btn" onclick="location.href='pm.html'">✉️ <span id="pm-count">0</span></div>
    <div class="menu-btn" onclick="toggleOnline()">👥</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone" id="main-input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="targetAvatar" src="" style="width:85px; height:85px; border-radius:50%;">
        <h3 id="targetName" style="color:var(--bright-red);">...</h3>
        <div id="targetStats" style="color:gold; font-size:12px; margin:10px 0;"></div>
        <button class="modal-btn" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), myRole = "Member", currentRoom = "☕ კაფე-ბარი", myAvatar = "";
    let currentJokerGame = null;

    async function init() {
        if (!myNick) { location.href = 'index.html'; return; }
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = p.role || "Member";
            myAvatar = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-avatar-img').src = myAvatar;
            document.getElementById('my-points-label').innerText = p.points || 0;
            document.getElementById('my-cipher-points-label').innerText = p.cipher_points || 0;
            document.getElementById('my-j-wins').innerText = p.joker_wins || 0;
            document.getElementById('my-j-losses').innerText = p.joker_losses || 0;
            
            await _s.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick);
            setInterval(() => _s.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick), 30000);
            checkPMs(); setInterval(checkPMs, 10000);
        }
        loadMessages();
        _s.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
        
        // Joker Table Realtime
        _s.channel('joker').on('postgres_changes', { event: '*', schema: 'public', table: 'joker_games' }, (payload) => {
            if (currentRoom === '🃏 ჯოკერი') {
                currentJokerGame = payload.new;
                renderJokerUI();
            }
        }).subscribe();
    }

    async function changeRoom(n, el) {
        currentRoom = n; 
        document.getElementById('room-name').innerText = n;
        document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active'); 
        closeAll(); loadMessages();

        const ui = document.getElementById('joker-ui');
        const mainInput = document.getElementById('main-input-zone');
        
        if(n === '🃏 ჯოკერი') {
            ui.style.display = 'block';
            mainInput.style.display = 'none';
            joinJokerTable();
        } else {
            ui.style.display = 'none';
            mainInput.style.display = 'flex';
        }
    }

    async function joinJokerTable() {
        const { data: games } = await _s.from('joker_games').select('*').eq('status', 'waiting').limit(1);
        let game = games?.[0];

        if (!game) {
            const { data: newGame } = await _s.from('joker_games').insert([{
                room_id: 'main', players: [{ name: myNick, avatar: myAvatar }], status: 'waiting'
            }]).select().single();
            game = newGame;
        } else {
            let players = game.players || [];
            if (!players.find(p => p.name === myNick) && players.length < 4) {
                players.push({ name: myNick, avatar: myAvatar });
                const { data: updated } = await _s.from('joker_games').update({ players }).eq('id', game.id).select().single();
                game = updated;
            }
        }
        currentJokerGame = game;
        renderJokerUI();
    }

    function renderJokerUI() {
        const ui = document.getElementById('joker-ui');
        if (!currentJokerGame) return;
        const players = currentJokerGame.players || [];
        let slots = "";
        for(let i=0; i<4; i++) {
            const p = players[i];
            slots += `<div class="player-slot">
                <img src="${p ? p.avatar : 'https://i.ibb.co/v3m6y6R/avatar.png'}" style="${!p ? 'opacity:0.2' : ''}">
                <div class="player-name">${p ? p.name : '...'}</div>
            </div>`;
        }
        ui.innerHTML = `
            <div style="color:gold; font-size:13px; margin-bottom:10px;">🃏 მაგიდა (${players.length}/4)</div>
            <div class="joker-table-container">${slots}</div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="joker-chat" style="flex:1; background:#000; border:1px solid #004400; border-radius:15px; color:white; padding:5px 15px;" placeholder="მაგიდის ჩატი..." onkeypress="if(event.key==='Enter') sendJokerMsg()">
                <button onclick="sendJokerMsg()" style="background:gold; border:none; border-radius:50%; width:30px; height:30px;">></button>
            </div>
        `;
        document.getElementById('chat').style.paddingTop = '180px';
    }

    async function sendJokerMsg() {
        const input = document.getElementById('joker-chat');
        if(!input.value.trim()) return;
        await _s.from('messages').insert([{ user_name: myNick, text: input.value, room_name: '🃏 ჯოკერი' }]);
        input.value = "";
    }

    async function openProfile(name) {
        const { data: p } = await _s.from('profiles').select('*').eq('username', name).maybeSingle();
        if(!p) return;
        document.getElementById('targetAvatar').src = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
        document.getElementById('targetName').innerText = p.username;
        document.getElementById('targetStats').innerHTML = `
            🏆 ქულა: ${p.points || 0} <br>
            🃏 ჯოკერი: ${p.joker_wins || 0} W / ${p.joker_losses || 0} L
        `;
        document.getElementById('userModal').style.display = "flex";
    }

    // დანარჩენი სტანდარტული ფუნქციები (loadMessages, sendMsg, etc.) იგივე დავტოვე...
    async function loadMessages() {
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const box = document.getElementById("chat");
        box.innerHTML = msgs.map(m => `
            <div class="msg-container">
                <div class="avatar-wrapper" onclick="openProfile('${m.user_name}')">
                    <img src="https://i.ibb.co/v3m6y6R/avatar.png" class="msg-avatar">
                </div>
                <div class="bubble">
                    <div class="m-nick">${m.user_name}</div>
                    <div class="m-text">${m.text}</div>
                </div>
            </div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById("msg-input"); if(!i.value.trim()) return;
        await _s.from('messages').insert([{ user_name: myNick, text: i.value, room_name: currentRoom }]);
        i.value = "";
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function toggleOnline() { document.getElementById('online-sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function closeAll() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('online-sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
    function closeModal() { document.getElementById('userModal').style.display = "none"; }
    async function checkPMs() { /* შენი ძველი PM ლოგიკა */ }
    function logout() { localStorage.clear(); location.href = 'index.html'; }
</script>
</body>
</html>
