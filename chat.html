<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Chat 2026 - Final Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --wine: #4a0404; --bg: #0b0000; --txt: #fff; }
        body { margin: 0; background: var(--bg); color: var(--txt); font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* ნავიგაცია */
        .top-nav { height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid var(--wine); }
        .nav-btn { font-size: 24px; cursor: pointer; position: relative; }
        .badge { position: absolute; top: -5px; right: -8px; background: red; font-size: 10px; padding: 2px 5px; border-radius: 50%; }

        /* ჩათის არე */
        #chat-window { height: calc(100vh - 130px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg-container { display: flex; gap: 10px; max-width: 85%; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--wine); object-fit: cover; }
        .msg-bubble { background: rgba(74,4,4,0.2); border: 1px solid var(--wine); padding: 10px; border-radius: 15px; position: relative; }
        .msg-header { font-size: 11px; margin-bottom: 5px; color: #aaa; display: flex; justify-content: space-between; gap: 10px; }
        .admin-del { color: #ff4444; cursor: pointer; font-weight: bold; }

        /* ფანჯრები (მოდალები) */
        .modal { position: fixed; inset: 60px 0 0 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; padding: 20px; overflow-y: auto; }
        .close-btn { color: red; float: right; font-size: 25px; cursor: pointer; }
        
        /* ოთახების მენიუ */
        .room-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .room-item { background: var(--wine); padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; }

        /* ქვედა პანელი */
        .bottom-bar { height: 70px; background: #000; display: flex; align-items: center; padding: 0 15px; border-top: 1px solid var(--wine); }
        #msg-input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid var(--wine); background: #111; color: white; outline: none; }
        .send-btn { background: var(--wine); border: none; color: white; padding: 10px 20px; border-radius: 20px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="nav-btn" onclick="openM('rooms')">🏠</div>
    <div class="nav-btn" onclick="openM('pm')">💬 <span class="badge" id="pm-count">0</span></div>
    <div class="nav-btn" onclick="openM('online')">👥 <span id="on-count" style="font-size:10px; color:#0f0;">0</span></div>
    <div class="nav-btn" onclick="openM('members')">🌐</div>
    <div class="nav-btn" onclick="openM('profile')">👤</div>
</nav>

<div id="chat-window"></div>

<div class="bottom-bar">
    <button onclick="openM('emojis')" style="background:none; border:none; font-size:24px; cursor:pointer;">😊</button>
    <input type="text" id="msg-input" placeholder="დაწერე შეტყობინება...">
    <button class="send-btn" onclick="sendMsg()">➤</button>
</div>

<div id="m-rooms" class="modal">
    <span class="close-btn" onclick="closeAll()">×</span>
    <h3>აირჩიე ოთახი:</h3>
    <div class="room-grid" id="rooms-list"></div>
</div>

<div id="m-online" class="modal">
    <span class="close-btn" onclick="closeAll()">×</span>
    <h3>საიტზე არიან:</h3>
    <div id="online-users"></div>
</div>

<div id="m-profile" class="modal">
    <span class="close-btn" onclick="closeAll()">×</span>
    <div style="text-align:center;">
        <img id="p-avatar" src="https://via.placeholder.com/100" class="avatar" style="width:100px; height:100px;">
        <h3>ჩემი პროფილი</h3>
        <input type="file" id="avatar-up">
        <button onclick="updateAvatar()" style="background:green; color:white; padding:5px; margin-top:5px;">შეცვლა</button>
        <hr color="#4a0404">
        <h4>ჩემი ალბომი</h4>
        <div id="album-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;"></div>
    </div>
</div>

<div id="m-emojis" class="modal">
    <span class="close-btn" onclick="closeAll()">×</span>
    <div id="emoji-load-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px;"></div>
</div>

<script>
    const S_URL = 'https://ftfciebnywbondaiarnc.supabase.co';
    const S_KEY = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let currentRoom = "ოთახი 1";
    let myUser = { name: "დამფუძნებელი", avatar: "" }; // აქ ჩაწერე შენი ნამდვილი ნიკი

    // 1. ოთახების ჩატვირთვა Categories-დან
    async function loadRooms() {
        const { data } = await _supabase.from('categories').select('text');
        const list = document.getElementById('rooms-list');
        list.innerHTML = '';
        if(data) data.forEach(r => {
            list.innerHTML += `<div class="room-item" onclick="changeRoom('${r.text}')">${r.text}</div>`;
        });
    }

    function changeRoom(name) {
        currentRoom = name;
        closeAll();
        loadMessages();
    }

    // 2. ონლაინ Presence სისტემა
    const channel = _supabase.channel('global', { config: { presence: { key: myUser.name } } });
    channel.on('presence', { event: 'sync' }, () => {
        const state = channel.presenceState();
        document.getElementById('on-count').innerText = Object.keys(state).length;
        const list = document.getElementById('online-users');
        list.innerHTML = Object.keys(state).map(u => `<div style="padding:10px; border-bottom:1px solid #222;">🟢 ${u}</div>`).join('');
    }).subscribe(async (s) => { if(s==='SUBSCRIBED') await channel.track({ online_at: new Date() }); });

    // 3. ჩათის მესიჯები (ავატარებით და წაშლით)
    async function loadMessages() {
        const { data: msgs } = await _supabase.from('messages').select('*').eq('room_name', currentRoom).order('created_at', {ascending: true});
        const { data: profs } = await _supabase.from('profiles').select('username, avatar_url');
        
        const win = document.getElementById('chat-window');
        win.innerHTML = '';

        if(msgs) msgs.forEach(m => {
            const uprof = profs.find(p => p.username === m.user_name) || {};
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const isAdmin = myUser.name === "დამფუძნებელი";

            win.innerHTML += `
                <div class="msg-container">
                    <img src="${uprof.avatar_url || 'https://via.placeholder.com/40'}" class="avatar">
                    <div class="msg-bubble">
                        <div class="msg-header">
                            <span>${m.user_name}</span>
                            <span>${time} ${isAdmin ? `<span class="admin-del" onclick="delMsg(${m.id})">🗑️</span>` : ''}</span>
                        </div>
                        <div>${m.text}</div>
                    </div>
                </div>`;
        });
        win.scrollTop = win.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        await _supabase.from('messages').insert([{ text: inp.value, room_name: currentRoom, user_name: myUser.name }]);
        inp.value = '';
    }

    async function delMsg(id) {
        if(confirm("ნამდვილად წავშალო?")) {
            await _supabase.from('messages').delete().eq('id', id);
            loadMessages();
        }
    }

    // 4. სმაილები შენი ბაზიდან
    async function loadEmojis() {
        const { data } = await _supabase.from('emojis').select('emoji_url');
        const grid = document.getElementById('emoji-load-grid');
        grid.innerHTML = '';
        if(data) data.forEach(e => {
            grid.innerHTML += `<img src="${e.emoji_url}" onclick="addEmoji('${e.emoji_url}')" style="width:100%; cursor:pointer;">`;
        });
    }
    function addEmoji(url) {
        document.getElementById('msg-input').value += ` [img]${url}[/img] `;
        closeAll();
    }

    // 5. ალბომის ჩატვირთვა
    async function loadAlbum() {
        const { data } = await _supabase.from('gallery_photos').select('photo_url').eq('user_name', myUser.name);
        const grid = document.getElementById('album-grid');
        grid.innerHTML = data ? data.map(p => `<img src="${p.photo_url}" style="width:100%; border-radius:5px;">`).join('') : 'ალბომი ცარიელია';
    }

    // დამხმარე ფუნქციები
    function openM(id) { 
        closeAll(); 
        document.getElementById(`m-${id}`).style.display = 'block'; 
        if(id==='rooms') loadRooms();
        if(id==='emojis') loadEmojis();
        if(id==='profile') loadAlbum();
    }
    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    // Realtime განახლება
    _supabase.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, () => loadMessages()).subscribe();

    loadMessages();
    loadRooms();
</script>
</body>
</html>
