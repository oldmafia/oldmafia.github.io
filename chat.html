<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - SUPREME CONTROL</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root { --dark-red: #4a0000; --bright-red: #ff0000; --bg-black: #030000; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--dark-red); height: 60px; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 25px; color: var(--bright-red); }
        #room-name { font-weight: bold; color: var(--bright-red); flex: 1; text-align: center; }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: radial-gradient(circle, #1a0000 0%, #030000 100%); padding-bottom: 100px; }
        .msg-container { display: flex; gap: 10px; max-width: 95%; margin-bottom: 5px; }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--dark-red); object-fit: cover; cursor: pointer; }
        .bubble { background: rgba(30, 0, 0, 0.85); border: 1px solid #600; padding: 8px 12px; border-radius: 4px 18px 18px 18px; }
        .m-nick { font-weight: bold; font-size: 13px; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .m-text { font-size: 14px; color: #eee; }
        .m-time { font-size: 9px; color: #666; display: block; text-align: right; margin-top: 4px; }

        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; border-right: 3px solid var(--dark-red); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3500; }
        .overlay.active { display: block; }
        
        .room-item { padding: 14px 20px; cursor: pointer; color: #bbb; border-bottom: 1px solid #150000; font-size: 14px; }
        .room-item.active { background: var(--dark-red); color: white; font-weight: bold; }

        .input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: black; padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--dark-red); z-index: 2000; }
        .input-zone input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #080000; color: white; outline: none; }
        .send-btn { background: var(--dark-red); border: none; width: 45px; height: 45px; border-radius: 50%; color: cyan; cursor: pointer; font-size: 20px; }

        /* პროფილის მართვის მოდალი */
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #0a0000; border: 2px solid var(--dark-red); padding: 25px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 0 30px rgba(255,0,0,0.2); }
        .modal-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #400; background: #150000; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .modal-btn:hover { background: #300; }
        .btn-ban { color: #ff4444; border-color: #f44; }
        .btn-admin { color: #00ffff; border-color: #0ff; }
    </style>
</head>
<body onload="init()">

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 25px 15px; text-align: center; border-bottom: 1px solid #222;">
        <img id="my-avatar-img" src="" style="width:75px; height:75px; border-radius:50%; border:2px solid gold; object-fit: cover;">
        <div id="my-nick-label" style="font-weight:bold; color:gold; font-size:18px; margin-top:10px;">...</div>
        <div id="my-role-label" style="font-size: 11px; color: #888;">...</div>
        <div id="my-pts-display" style="font-size: 12px; color: gold; margin-top:5px;">🏆 ქულა: 0</div>
        <div id="my-status-display" style="font-size: 13px; color: #0f0; margin-top:8px; font-style: italic;"></div>
        <button onclick="changeStatus()" style="margin-top:12px; background:none; border:1px solid #333; color:#666; cursor:pointer; font-size:10px; padding:4px 10px;">სტატუსის შეცვლა</button>
    </div>
    <div class="rooms-list" style="flex:1; overflow-y:auto;">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('💎 ვიპ საუბრები', this)">💎 ვიპ საუბრები</div>
        <div class="room-item" onclick="changeRoom('🕴 მაფიის ღამე', this)">🕴 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('❓ ვიქტორინა', this)">❓ ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
    </div>
    <div style="padding:15px; text-align:center; color:red; cursor:pointer; font-size:14px;" onclick="logout()">🚪 გასვლა</div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
    <div onclick="location.href='pm.html'" style="cursor:pointer; font-size:22px; position:relative;">✉️</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <button style="background:none; border:none; font-size:22px;">😊</button>
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="targetAvatar" src="" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--dark-red); object-fit: cover;">
        <h3 id="targetName" style="color:var(--bright-red); margin:10px 0;"></h3>
        <p id="targetRoleLabel" style="font-size:12px; color:#aaa; margin-bottom:15px;"></p>
        
        <div id="adminControls">
            <button class="modal-btn btn-admin" onclick="setRole('Admin')">🛡️ ადმინად დანიშვნა</button>
            <button class="modal-btn" onclick="setRole('Member')">👤 როლის ჩამორთმევა</button>
            <button class="modal-btn btn-ban" onclick="setRole('Banned')">🚫 დაბლოკვა (BAN)</button>
        </div>
        
        <button class="modal-btn" style="background:#222; margin-top:10px;" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), myRole = "Member", currentRoom = "☕ კაფე-ბარი", targetUser = "";

    async function init() {
        if (!myNick) { location.href = 'index.html'; return; }
        
        // Abu007 ყოველთვის დამფუძნებელია
        if (myNick === 'Abu007') {
            await _s.from('profiles').update({ role: 'Owner' }).eq('username', 'Abu007');
        }

        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = p.role || "Member";
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-role-label').innerText = translateRole(myRole);
            document.getElementById('my-avatar-img').src = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
            document.getElementById('my-status-display').innerText = p.status || "";
            document.getElementById('my-pts-display').innerText = `🏆 ქულა: ${p.points || 0}`;
            if(myRole === 'Owner') document.getElementById('my-nick-label').style.color = "gold";
        }
        
        loadMessages();
        _s.channel('chat_main').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
    }

    function translateRole(r) {
        const roles = {'Owner': '👑 დამფუძნებელი', 'Admin': '🛡️ ადმინისტრატორი', 'Member': '👤 მომხმარებელი', 'Banned': '🚫 დაბლოკილი'};
        return roles[r] || '👤 მომხმარებელი';
    }

    async function loadMessages() {
        const box = document.getElementById("chat");
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true }).limit(50);
        const { data: profs } = await _s.from('profiles').select('username, avatar_url, role');
        
        box.innerHTML = "";
        msgs?.forEach(m => {
            const p = profs?.find(u => u.username === m.user_name);
            const isOwner = p?.role === 'Owner' || m.user_name === 'Abu007';
            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            box.innerHTML += `
                <div class="msg-container">
                    <img src="${p?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar" onclick="openProfile('${m.user_name}')">
                    <div class="bubble">
                        <div class="m-nick" style="color:${isOwner ? 'gold' : '#ff3333'}" onclick="openProfile('${m.user_name}')">
                            ${m.user_name}
                            ${(myRole === 'Owner' || myRole === 'Admin') ? `<span onclick="deleteMsg(${m.id})" style="cursor:pointer;opacity:0.4;"> ✖</span>` : ''}
                        </div>
                        <div class="m-text">${m.text}</div>
                        <span class="m-time">${time}</span>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function openProfile(name) {
        targetUser = name;
        const { data: p } = await _s.from('profiles').select('*').eq('username', name).maybeSingle();
        if(!p) return;

        document.getElementById('targetAvatar').src = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
        document.getElementById('targetName').innerText = p.username;
        document.getElementById('targetRoleLabel').innerText = translateRole(p.role);
        
        // თუ მე ვარ მფლობელი ან ადმინი, გამოჩნდეს მართვის ღილაკები
        const controls = document.getElementById('adminControls');
        if ((myRole === 'Owner' || myRole === 'Admin') && name !== myNick) {
            controls.style.display = "block";
        } else {
            controls.style.display = "none";
        }
        
        document.getElementById('userModal').style.display = "flex";
    }

    async function setRole(newRole) {
        if(confirm(`დარწმუნებული ხართ, რომ გსურთ ${targetUser}-ს მიანიჭოთ ${newRole}?`)) {
            await _s.from('profiles').update({ role: newRole }).eq('username', targetUser);
            alert("სტატუსი განახლდა!");
            closeModal();
            loadMessages();
        }
    }

    async function changeStatus() {
        const s = prompt("შეიყვანეთ ახალი სტატუსი:");
        if (s !== null) {
            await _s.from('profiles').update({ status: s }).eq('username', myNick);
            document.getElementById('my-status-display').innerText = s;
        }
    }

    async function sendMsg() {
        if (myRole === "Banned") { alert("თქვენ დაბლოკილი ხართ!"); return; }
        const i = document.getElementById("msg-input");
        if (!i.value.trim()) return;
        const txt = i.value; i.value = "";
        await _s.from('messages').insert([{ user_name: myNick, text: txt, room_name: currentRoom }]);
    }

    async function deleteMsg(id) {
        if(confirm("წავშალო?")) { await _s.from('messages').delete().eq('id', id); loadMessages(); }
    }

    function changeRoom(n, el) {
        currentRoom = n;
        document.getElementById('room-name').innerText = n;
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        loadMessages();
        closeAll();
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function closeAll() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
    function closeModal() { document.getElementById('userModal').style.display = "none"; }
    function logout() { localStorage.clear(); location.href = 'index.html'; }
</script>
</body>
</html>
