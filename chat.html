<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - FULL SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* შენი ორიგინალი სტილები უცვლელად */
        * { box-sizing: border-box; }
        :root { --dark-red: #4a0000; --deep-red: #800000; --bright-red: #ff0000; --blood-red: #660000; --bg-black: #030000; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--dark-red); height: 60px; flex-shrink: 0; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 25px; color: var(--bright-red); }
        #room-name { font-weight: bold; color: var(--bright-red); flex: 1; text-align: center; font-size: 16px; }
        #pm-btn { position: relative; cursor: pointer; font-size: 22px; margin-right: 15px; color: cyan; display: flex; align-items: center; }
        #pm-count { position: absolute; top: -8px; right: -10px; color: #ff0000; font-size: 16px; display: none; font-weight: bold; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #1a0000 0%, #030000 100%); }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; max-width: 95%; }
        .avatar-wrapper { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--dark-red); object-fit: cover; cursor: pointer; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #0f0; border: 2px solid black; border-radius: 50%; display: none; }
        .online-dot.active { display: block; box-shadow: 0 0 8px #0f0; }
        .bubble { background: rgba(25, 0, 0, 0.9); border: 1px solid var(--blood-red); padding: 8px 12px; border-radius: 4px 18px 18px 18px; min-width: 80px; }
        .m-nick { font-weight: bold; color: #ff3333; font-size: 13px; display: flex; align-items: center; justify-content: space-between; }
        .m-text { color: #ddd; font-size: 14px; word-wrap: break-word; }
        .m-text img { width: 48px; height: 48px; vertical-align: middle; margin: 2px; object-fit: contain; }
        .input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: black; padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--dark-red); z-index: 2000; }
        .input-zone input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--blood-red); background: #080000; color: white; outline: none; }
        
        /* Emoji Picker განახლებული */
        #emoji-picker { display: none; position: fixed; bottom: 80px; left: 10px; background: #080000; border: 2px solid var(--dark-red); padding: 10px; border-radius: 15px; flex-direction: column; z-index: 3000; max-height: 350px; width: 280px; }
        #emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow-y: auto; padding: 5px; }
        .emoji-item { width: 45px; height: 45px; cursor: pointer; object-fit: contain; }
        .emoji-wrapper { position: relative; }
        .del-emoji { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid white; }
        .admin-add-btn { background: #004a00; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; }

        /* დანარჩენი სტილები... */
        .sidebar, .online-sidebar { position: fixed; top: 0; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; }
        .sidebar { left: -280px; border-right: 3px solid var(--dark-red); }
        .sidebar.active { left: 0; }
        .online-sidebar { right: -280px; border-left: 3px solid var(--dark-red); }
        .online-sidebar.active { right: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3500; }
        .overlay.active { display: block; }
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
        .modal-content { background: #080000; border: 2px solid var(--dark-red); padding: 25px; border-radius: 25px; width: 320px; text-align: center; }
        .modal-btn { display: block; width: 100%; padding: 12px; margin: 7px 0; border: 1px solid var(--blood-red); background: #110000; color: white; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div id="emoji-picker">
    <div id="emoji-grid"></div>
    <div id="admin-emoji-tools" style="display:none;">
        <input type="file" id="emoji-file" style="display:none" onchange="uploadEmoji(this)">
        <button class="admin-add-btn" onclick="document.getElementById('emoji-file').click()">+ სმაილის ატვირთვა</button>
    </div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
    <div id="pm-btn" onclick="location.href='pm.html'">✉️ <span id="pm-count">0</span></div>
    <div class="menu-btn" onclick="toggleOnline()">👥</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <button onclick="toggleEmojiPicker()" style="background:none; border:none; font-size:24px; cursor:pointer;">😊</button>
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">✈</button>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), myRole = "Member", currentRoom = "☕ კაფე-ბარი", myAvatar = "";
    let emojiList = [];

    async function init() {
        if (!myNick) { location.href = 'index.html'; return; }
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = p.role || "Member";
            if(myNick === 'Abu007') myRole = "Owner"; // შენი ნიკის გააქტიურება
            myAvatar = p.avatar_url;
            if(myRole === "Owner") document.getElementById('admin-emoji-tools').style.display = "block";
        }
        await loadEmojis();
        loadMessages();
        _s.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
        setInterval(checkPMs, 5000);
    }

    // მესიჯების ჩატვირთვა მოკლე კოდების მხარდაჭერით
    async function loadMessages() {
        const box = document.getElementById("chat");
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        box.innerHTML = "";
        
        msgs?.forEach(m => {
            let text = m.text;
            // კოდების ჩანაცვლება სურათებით
            emojiList.forEach(e => {
                const reg = new RegExp(`:e${e.id}:`, 'g');
                text = text.replace(reg, `<img src="${e.emoji_url}">`);
            });

            box.innerHTML += `
                <div class="msg-container">
                    <div class="avatar-wrapper">
                        <img src="${m.user_avatar || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar">
                    </div>
                    <div class="bubble">
                        <div class="m-nick">${m.user_name} ${myRole === 'Owner' ? `<span onclick="deleteMsg(${m.id})">🗑️</span>` : ''}</div>
                        <div class="m-text">${text}</div>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    // სმაილების მართვა
    async function loadEmojis() {
        const { data } = await _s.from('emojis').select('*').order('id');
        emojiList = data || [];
        const grid = document.getElementById('emoji-grid');
        grid.innerHTML = emojiList.map(e => `
            <div class="emoji-wrapper">
                <img src="${e.emoji_url}" class="emoji-item" onclick="insertEmoji('${e.id}')">
                ${myRole === 'Owner' ? `<div class="del-emoji" onclick="deleteEmoji(${e.id})">×</div>` : ''}
            </div>`).join('');
    }

    function insertEmoji(id) {
        const input = document.getElementById('msg-input');
        input.value += ` :e${id}: `;
        input.focus();
        document.getElementById('emoji-picker').style.display = 'none';
    }

    async function uploadEmoji(el) {
        const file = el.files[0]; if(!file) return;
        const name = `${Date.now()}_${file.name}`;
        const { data, error } = await _s.storage.from('emojis').upload(name, file);
        if(!error) {
            const { data: url } = _s.storage.from('emojis').getPublicUrl(name);
            await _s.from('emojis').insert([{ emoji_url: url.publicUrl }]);
            loadEmojis();
        }
    }

    async function deleteEmoji(id) {
        if(confirm("წავშალოთ სმაილი?")) {
            await _s.from('emojis').delete().eq('id', id);
            loadEmojis();
        }
    }

    function toggleEmojiPicker() {
        const p = document.getElementById('emoji-picker');
        p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
    }

    async function sendMsg() {
        const i = document.getElementById("msg-input");
        if(!i.value.trim()) return;
        await _s.from('messages').insert([{ 
            user_name: myNick, 
            text: i.value, 
            room_name: currentRoom,
            user_avatar: myAvatar 
        }]);
        i.value = "";
    }

    async function checkPMs() {
        const { data } = await _s.from('private_messages').select('id').eq('receiver', myNick).eq('is_read', false);
        const count = data?.length || 0;
        const el = document.getElementById('pm-count');
        if(count > 0) { el.innerText = count; el.style.display = 'flex'; }
        else { el.style.display = 'none'; }
    }

    // დანარჩენი დამხმარე ფუნქციები (toggleSidebar, closeAll და ა.შ.) იგივე რჩება
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function closeAll() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('emoji-picker').style.display='none'; document.getElementById('overlay').classList.remove('active'); }
    async function deleteMsg(id) { if(confirm("წავშალო?")) { await _s.from('messages').delete().eq('id', id); loadMessages(); } }
</script>
</body>
</html>
