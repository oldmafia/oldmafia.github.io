<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - შინდისფერი გულები</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* ღამის რეჟიმი (თემა) */
        body.night-mode {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --accent: #8b0000;
            --accent-glow: #4a0000;
            --shadow: 0 0 20px rgba(139, 0, 0, 0.3);
            --heart-color: rgba(139, 0, 0, 0.6);
        }

        /* დღის რეჟიმი */
        body.day-mode {
            --bg-primary: #fff9f0;
            --bg-secondary: #fff5e6;
            --text-primary: #2c1810;
            --text-secondary: #4a2a1a;
            --accent: #8b3c2c;
            --accent-glow: #c46a5a;
            --shadow: 0 0 20px rgba(139, 60, 44, 0.2);
            --heart-color: rgba(139, 60, 44, 0.4);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ანიმაციური გულები */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 24px;
            color: var(--heart-color);
            animation: floatUp 8s linear infinite;
            opacity: 0;
            filter: drop-shadow(0 0 5px var(--accent));
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* მთავარი კონტეინერი */
        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* მარცხენა პანელი - ოთახები და მეგობრები */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }

        /* პროფილის სექცია */
        .profile-section {
            padding: 20px;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            position: relative;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent);
            margin: 0 auto 10px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status {
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px;
            border-radius: 10px;
        }

        .status:hover {
            background: var(--accent);
            color: white;
        }

        /* ოთახების სია */
        .rooms-list {
            padding: 15px;
            border-bottom: 1px solid var(--accent);
        }

        .room-item {
            padding: 10px;
            margin: 5px 0;
            background: var(--bg-primary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .room-item:hover, .room-item.active {
            background: var(--accent);
            color: white;
            transform: translateX(5px);
        }

        /* მეგობრების სექცია */
        .friends-section {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .friends-search {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            background: var(--bg-primary);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            border-radius: 20px;
        }

        .friends-group {
            margin-bottom: 20px;
        }

        .group-title {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 10px;
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background: var(--bg-primary);
            border-radius: 8px;
            cursor: pointer;
            position: relative;
        }

        .friend-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 10px;
        }

        .online-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff00;
            position: absolute;
            bottom: 8px;
            left: 30px;
            border: 2px solid var(--bg-secondary);
        }

        /* მარჯვენა მხარე - ჩატი */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        .chat-header {
            padding: 20px;
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .theme-toggle {
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* შეტყობინებების არეალი */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
            word-wrap: break-word;
        }

        .message.left {
            align-self: flex-start;
            background: var(--bg-secondary);
            border-bottom-left-radius: 5px;
        }

        .message.right {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .message-actions {
            position: absolute;
            right: 5px;
            top: -15px;
            display: none;
            background: var(--bg-primary);
            border-radius: 10px;
            padding: 2px 5px;
        }

        .message:hover .message-actions {
            display: flex;
        }

        /* შეტყობინების შეყვანის ზოლი */
        .message-input-area {
            padding: 20px;
            background: var(--bg-secondary);
            border-top: 2px solid var(--accent);
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            border-radius: 25px;
            resize: none;
        }

        .emoji-btn, .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }

        /* ემოჯი პიკერი */
        .emoji-picker {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--accent);
            border-radius: 15px;
            padding: 15px;
            display: none;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            z-index: 1000;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
        }

        .emoji-picker.active {
            display: grid;
        }

        /* პროფილის მოდალი */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 2px solid var(--accent);
        }
    </style>
</head>
<body class="night-mode">
    <div class="floating-hearts" id="heartsContainer"></div>

    <div class="app-container">
        <!-- მარცხენა პანელი -->
        <div class="sidebar">
            <div class="profile-section">
                <div class="avatar" id="avatarBtn">
                    <img id="avatarImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="avatar">
                </div>
                <div class="status" id="statusBtn">დააყენე სტატუსი</div>
                <div id="currentUserNick">მომხმარებელი</div>
            </div>

            <div class="rooms-list" id="roomsList">
                <!-- 12 ოთახი გენერირდება JS-ით -->
            </div>

            <div class="friends-section">
                <input type="text" class="friends-search" placeholder="🔍 მოძებნე მეგობარი...">
                <div id="friendsGroups">
                    <div class="friends-group">
                        <div class="group-title">👑 დამფუძნებლები</div>
                        <div id="foundersList"></div>
                    </div>
                    <div class="friends-group">
                        <div class="group-title">⚙️ ადმინები</div>
                        <div id="adminsList"></div>
                    </div>
                    <div class="friends-group">
                        <div class="group-title">👥 წევრები</div>
                        <div id="membersList"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ჩატის არეალი -->
        <div class="chat-area">
            <div class="chat-header">
                <h2 id="currentRoomName">ოთახი 1</h2>
                <button class="theme-toggle" id="themeToggle">🌙 ღამის რეჟიმი</button>
            </div>

            <div class="messages-container" id="messagesContainer">
                <!-- შეტყობინებები აქ ჩაიტვირთება -->
            </div>

            <div class="message-input-area">
                <textarea class="message-input" id="messageInput" placeholder="დაწერე შეტყობინება..." rows="2"></textarea>
                <button class="emoji-btn" id="emojiBtn">😊</button>
                <button class="send-btn" id="sendBtn">გაგზავნა</button>
            </div>
        </div>
    </div>

    <!-- ემოჯი პიკერი -->
    <div class="emoji-picker" id="emojiPicker">
        <!-- ემოჯები აიქმნება დინამიურად -->
    </div>

    <!-- პროფილის მოდალი -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h3>პროფილის რედაქტირება</h3>
            <input type="file" id="photoUpload" accept="image/*">
            <input type="text" id="statusInput" placeholder="ახალი სტატუსი">
            <button id="saveProfile">შენახვა</button>
            <button id="closeModal">დახურვა</button>
        </div>
    </div>

    <script>
        // ==================== გლობალური ცვლადები ====================
        let currentUser = {
            id: 'user_' + Math.random().toString(36).substr(2, 9),
            nick: 'მომხმარებელი_' + Math.floor(Math.random() * 1000),
            avatar: null,
            status: 'online',
            role: 'member' // founder, admin, member
        };
        
        let currentRoom = 1;
        let messages = {};
        let rooms = [];
        let customEmojis = [];
        let friends = [];
        
        // 12 ოთახის შექმნა
        for(let i = 1; i <= 12; i++) {
            rooms.push({
                id: i,
                name: `ოთახი ${i}`,
                messages: []
            });
            messages[i] = [];
        }
        
        // ==================== ფუნქციები ====================
        
        // ანიმაციური გულების გენერაცია
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['❤️', '💖', '💗', '💓', '💕'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 30 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
            heart.style.animationDelay = Math.random() * 5 + 's';
            document.getElementById('heartsContainer').appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 8000);
        }
        
        setInterval(createHeart, 2000);
        
        // თემის შეცვლა
        function toggleTheme() {
            const body = document.body;
            if(body.classList.contains('night-mode')) {
                body.classList.remove('night-mode');
                body.classList.add('day-mode');
                document.getElementById('themeToggle').innerHTML = '☀️ დღის რეჟიმი';
            } else {
                body.classList.remove('day-mode');
                body.classList.add('night-mode');
                document.getElementById('themeToggle').innerHTML = '🌙 ღამის რეჟიმი';
            }
        }
        
        // შეტყობინების გაგზავნა
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if(!text) return;
            
            const message = {
                id: Date.now(),
                text: text,
                user: currentUser,
                time: new Date().toLocaleTimeString(),
                roomId: currentRoom
            };
            
            messages[currentRoom].push(message);
            displayMessages(currentRoom);
            input.value = '';
            
            // scroll to bottom
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }
        
        // შეტყობინებების ჩვენება
        function displayMessages(roomId) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            messages[roomId].forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.user.id === currentUser.id ? 'right' : 'left'}`;
                
                messageDiv.innerHTML = `
                    <strong>${msg.user.nick}</strong>
                    <div>${msg.text}</div>
                    <div class="message-time">${msg.time}</div>
                    ${(currentUser.role === 'admin' || currentUser.role === 'founder') ? 
                        `<div class="message-actions">
                            <button onclick="deleteMessage(${msg.id})">🗑️</button>
                        </div>` : ''}
                `;
                
                container.appendChild(messageDiv);
            });
        }
        
        // შეტყობინების წაშლა (მხოლოდ ადმინ/დამფუძნებელი)
        function deleteMessage(messageId) {
            if(currentUser.role === 'admin' || currentUser.role === 'founder') {
                messages[currentRoom] = messages[currentRoom].filter(m => m.id !== messageId);
                displayMessages(currentRoom);
            }
        }
        
        // ოთახის შეცვლა
        function changeRoom(roomId) {
            currentRoom = roomId;
            document.getElementById('currentRoomName').innerText = rooms[roomId-1].name;
            displayMessages(roomId);
            
            // მონიშნე აქტიური ოთახი
            document.querySelectorAll('.room-item').forEach((item, idx) => {
                if(idx+1 === roomId) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }
        
        // ოთახების სიის გენერაცია
        function renderRooms() {
            const container = document.getElementById('roomsList');
            container.innerHTML = '<h3>📌 ოთახები</h3>';
            rooms.forEach(room => {
                const roomDiv = document.createElement('div');
                roomDiv.className = 'room-item';
                roomDiv.innerText = room.name;
                roomDiv.onclick = () => changeRoom(room.id);
                container.appendChild(roomDiv);
            });
        }
        
        // ემოჯი პიკერის ჩვენება
        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.classList.toggle('active');
        }
        
        // ემოჯის დამატება ინპუტში
        function addEmoji(emoji) {
            const input = document.getElementById('messageInput');
            input.value += emoji;
            input.focus();
        }
        
        // კასტომ ემოჯების დამატება (ადმინ/დამფუძნებელი)
        function addCustomEmoji(emojiCode) {
            if(currentUser.role === 'admin' || currentUser.role === 'founder') {
                customEmojis.push(emojiCode);
                renderEmojiPicker();
            }
        }
        
        // ემოჯი პიკერის რენდერი
        function renderEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.innerHTML = '';
            
            // სტანდარტული ემოჯები
            const standardEmojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😢', '😡', '🥳', '😎'];
            standardEmojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.innerText = emoji;
                btn.onclick = () => addEmoji(emoji);
                btn.style.background = 'var(--accent)';
                btn.style.border = 'none';
                btn.style.padding = '8px';
                btn.style.cursor = 'pointer';
                btn.style.borderRadius = '8px';
                picker.appendChild(btn);
            });
            
            // კასტომ ემოჯები
            customEmojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.innerText = emoji;
                btn.onclick = () => addEmoji(emoji);
                picker.appendChild(btn);
            });
            
            // ადმინებისთვის დამატების ღილაკი
            if(currentUser.role === 'admin' || currentUser.role === 'founder') {
                const addBtn = document.createElement('button');
                addBtn.innerText = '+';
                addBtn.onclick = () => {
                    const newEmoji = prompt('შეიყვანეთ ახალი ემოჯი (სიმბოლო ან ტექსტი):');
                    if(newEmoji) addCustomEmoji(newEmoji);
                };
                picker.appendChild(addBtn);
            }
        }
        
        // პროფილის მოდალის ჩვენება
        function showProfileModal() {
            document.getElementById('profileModal').style.display = 'flex';
        }
        
        function closeProfileModal() {
            document.getElementById('profileModal').style.display = 'none';
        }
        
        // ავატარის შეცვლა
        function updateAvatar(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('avatarImg').src = e.target.result;
                currentUser.avatar = e.target.result;
                localStorage.setItem('userAvatar', e.target.result);
            };
            reader.readAsDataURL(file);
        }
        
        // სტატუსის განახლება
        function updateStatus() {
            const newStatus = document.getElementById('statusInput').value;
            if(newStatus) {
                currentUser.status = newStatus;
                document.getElementById('statusBtn').innerText = newStatus;
                localStorage.setItem('userStatus', newStatus);
            }
            closeProfileModal();
        }
        
        // მეგობრების სიის რენდერი
        function renderFriends() {
            // ეს არის დემო მონაცემები - Supabase-თან დააკავშირებ
            const founders = friends.filter(f => f.role === 'founder');
            const admins = friends.filter(f => f.role === 'admin');
            const members = friends.filter(f => f.role === 'member');
            
            const foundersDiv = document.getElementById('foundersList');
            foundersDiv.innerHTML = founders.map(f => `
                <div class="friend-item" onclick="openPrivateChat('${f.id}')">
                    <div class="friend-avatar" style="background-image: url(${f.avatar || ''})"></div>
                    <div>${f.nick}</div>
                    ${f.online ? '<div class="online-indicator"></div>' : ''}
                </div>
            `).join('');
            
            // იგივე ადმინებისთვის და წევრებისთვის
        }
        
        // ==================== ინიციალიზაცია ====================
        function init() {
            renderRooms();
            changeRoom(1);
            renderEmojiPicker();
            
            // ჩატვირთვა შენახული მონაცემების
            const savedAvatar = localStorage.getItem('userAvatar');
            if(savedAvatar) {
                document.getElementById('avatarImg').src = savedAvatar;
                currentUser.avatar = savedAvatar;
            }
            
            const savedStatus = localStorage.getItem('userStatus');
            if(savedStatus) {
                document.getElementById('statusBtn').innerText = savedStatus;
                currentUser.status = savedStatus;
            }
            
            // ევენთების მიბმა
            document.getElementById('themeToggle').onclick = toggleTheme;
            document.getElementById('sendBtn').onclick = sendMessage;
            document.getElementById('emojiBtn').onclick = toggleEmojiPicker;
            document.getElementById('avatarBtn').onclick = showProfileModal;
            document.getElementById('statusBtn').onclick = showProfileModal;
            document.getElementById('closeModal').onclick = closeProfileModal;
            document.getElementById('saveProfile').onclick = updateStatus;
            document.getElementById('photoUpload').onchange = (e) => {
                if(e.target.files[0]) updateAvatar(e.target.files[0]);
            };
            
            // Enter-ით გაგზავნა
            document.getElementById('messageInput').onkeypress = (e) => {
                if(e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };
        }
        
        // გაუშვი აპლიკაცია
        init();
        
        // როლების მინიჭების ფუნქციები
        window.assignRole = (userId, role) => {
            if(currentUser.role === 'founder') {
                // Supabase-ში განახლება
                console.log(`Role assigned: ${userId} -> ${role}`);
            }
        };
        
        window.blockUser = (userId, reason) => {
            if(currentUser.role === 'admin' || currentUser.role === 'founder') {
                const reasonText = prompt('ჩაწერეთ დაბლოკვის მიზეზი:');
                if(reasonText) {
                    console.log(`User ${userId} blocked. Reason: ${reasonText}`);
                }
            }
        };
        
        window.deleteMessage = deleteMessage;
        window.openPrivateChat = (userId) => {
            alert('პირადი მესინჯერი - მალე დაემატება');
        };
    </script>
</body>
</html>
