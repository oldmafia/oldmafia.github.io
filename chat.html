<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Old Mafia - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
        body {
            --bg: #0a0508; --text: #f0e6e8; --card: #1a0f12; --border: #4a1a2a;
            --nav: #120a0c; --accent: #8b0000; --accent-light: #a52a2a; --accent-dark: #5a0000; --input: #1f1216;
            background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        body.day-mode { --bg: #fff5f0; --text: #2c1a1a; --card: #ffffff; --border: #e6b8a2; --nav: #ffe8e0; --accent: #8b0000; --input: #fffaf5; }
        .nav-bar { display: flex; justify-content: space-around; align-items: center; background: var(--nav); padding: 8px 0; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        .nav-btn { font-size: 22px; background: none; border: none; color: #aa8a8a; cursor: pointer; padding: 6px 12px; border-radius: 30px; }
        .nav-btn.active { color: var(--accent); background: rgba(139, 0, 0, 0.2); }
        .pages { flex: 1; position: relative; overflow: hidden; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; display: none; padding: 12px; }
        .page.active { display: block; }
        .section-title { font-size: 18px; margin-bottom: 12px; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; }
        
        .rooms-list { display: flex; flex-direction: column; gap: 10px; }
        .room-card { background: var(--card); padding: 14px; border-radius: 10px; border: 1px solid var(--border); border-left: 4px solid var(--accent); cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .room-card:active { transform: scale(0.98); background: var(--accent-dark); }
        .room-icon { font-size: 28px; }
        .room-name { font-size: 16px; font-weight: 600; }
        
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-header { background: var(--card); padding: 12px; display: flex; justify-content: space-between; align-items: center; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .chat-room-name { font-size: 18px; font-weight: bold; color: var(--accent); }
        .close-btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .message { background: var(--card); padding: 10px 14px; border-radius: 12px; max-width: 85%; align-self: flex-start; border: 1px solid var(--border); position: relative; }
        .message.owner-message { border-left: 4px solid #ff00ff; }
        .message.admin-message { border-left: 4px solid gold; }
        .message-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
        .message-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; object-fit: cover; }
        .message-name { font-weight: bold; color: var(--accent); font-size: 13px; cursor: pointer; }
        .message-time { font-size: 10px; opacity: 0.5; }
        .message-text { font-size: 14px; word-break: break-word; }
        .message-text img { max-width: 200px; max-height: 150px; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .delete-msg { position: absolute; right: 8px; top: 8px; background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12px; opacity: 0; transition: 0.2s; }
        .message:hover .delete-msg { opacity: 1; }
        .chat-input-area { background: var(--card); padding: 10px; display: flex; gap: 8px; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); }
        .icon-btn { background: var(--accent-dark); border: none; color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 20px; cursor: pointer; }
        .chat-input { flex: 1; padding: 10px 15px; border-radius: 25px; border: 1px solid var(--accent); background: var(--input); color: var(--text); font-size: 14px; outline: none; }
        .send-btn { background: var(--accent); border: none; color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--card); margin-bottom: 8px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; object-fit: cover; }
        .user-name { font-weight: bold; font-size: 16px; }
        .user-status { font-size: 11px; opacity: 0.6; }
        .friend-badge { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #2d6a4f; color: white; padding: 4px 8px; border-radius: 20px; font-size: 11px; }
        .add-badge { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--accent); color: white; padding: 4px 8px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        
        .emoji-panel {
            position: fixed; bottom: 80px; left: 10px; right: 10px; background: var(--card); border: 2px solid var(--accent);
            border-radius: 16px; display: none; padding: 12px; z-index: 2000; max-height: 320px; overflow-y: auto;
        }
        .emoji-panel.active { display: block; }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 200px; overflow-y: auto; padding: 5px; }
        .emoji-item { font-size: 32px; text-align: center; cursor: pointer; padding: 8px; border-radius: 8px; transition: 0.2s; }
        .emoji-item:hover { background: var(--accent); transform: scale(1.05); }
        .emoji-img { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        
        .profile-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
        .profile-modal-content { background: var(--card); border-radius: 20px; max-width: 350px; width: 100%; max-height: 85vh; overflow-y: auto; border: 2px solid var(--accent); }
        .profile-modal-header { background: var(--accent); padding: 15px; text-align: center; position: relative; }
        .profile-modal-close { position: absolute; right: 15px; top: 15px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .profile-modal-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--accent-dark); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto; object-fit: cover; }
        .profile-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 10px; border-top: 1px solid var(--border); }
        .action-btn { background: var(--accent-dark); border: none; color: white; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 13px; }
        .action-btn.danger { background: #8b0000; }
        .action-btn.success { background: #2d6a4f; }
        
        .photo-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 4000; padding: 20px; }
        .photo-modal-content { background: var(--card); border-radius: 20px; max-width: 400px; width: 100%; border: 2px solid var(--accent); overflow: hidden; }
        .photo-modal-img { width: 100%; max-height: 55vh; object-fit: contain; }
        .photo-actions { display: flex; gap: 10px; justify-content: center; padding: 12px; flex-wrap: wrap; }
        .photo-comments { padding: 10px; max-height: 150px; overflow-y: auto; border-top: 1px solid var(--border); }
        .comment-item { padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
        .comment-input-area { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--border); }
        .comment-input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--accent); background: var(--input); color: var(--text); }
        
        .heart { position: fixed; bottom: 0; font-size: 28px; pointer-events: none; animation: floatUp 5s forwards; z-index: 9999; filter: drop-shadow(0 0 8px #8b0000) drop-shadow(0 0 4px #5a0000); }
        @keyframes floatUp { 0% { bottom: 0; opacity: 1; transform: scale(1); } 50% { transform: scale(1.2); } 100% { bottom: 100%; opacity: 0; transform: scale(0.8) translateX(40px); } }
        
        .pm-chat-container { position: fixed; bottom: 20px; right: 20px; width: 320px; max-width: calc(100% - 40px); height: 450px; max-height: 55vh; background: var(--card); border: 2px solid var(--accent); border-radius: 16px; display: flex; flex-direction: column; z-index: 2000; }
        @media (max-width: 768px) { .pm-chat-container { width: 85%; right: 7.5%; left: 7.5%; bottom: 10px; height: 45vh; } .icon-btn, .send-btn { width: 40px; height: 40px; } }
        .pm-header { background: var(--accent); padding: 10px 12px; display: flex; justify-content: space-between; border-radius: 14px 14px 0 0; cursor: pointer; }
        .pm-messages { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .pm-message { background: var(--input); padding: 6px 10px; border-radius: 12px; max-width: 85%; align-self: flex-start; }
        .pm-message.own { align-self: flex-end; background: var(--accent); }
        .pm-input-area { display: flex; padding: 8px; gap: 8px; border-top: 1px solid var(--border); }
        .pm-input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid var(--accent); background: var(--input); color: var(--text); }
        
        .profile-card { text-align: center; padding: 20px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto; cursor: pointer; object-fit: cover; }
        .status-input { width: 80%; margin-top: 15px; padding: 10px; border-radius: 25px; border: 1px solid var(--accent); background: var(--input); color: var(--text); text-align: center; }
        .album-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .album-photo { aspect-ratio: 1; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid var(--accent); }
        .upload-btn { background: var(--accent); border: none; color: white; padding: 10px; border-radius: 25px; margin: 10px 0; cursor: pointer; width: 100%; }
        .empty-state { text-align: center; padding: 40px; opacity: 0.5; }
        .notification { position: fixed; top: 70px; right: 10px; background: var(--accent); color: white; padding: 10px 15px; border-radius: 20px; z-index: 5000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--border); }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="friends">👥</button>
        <button class="nav-btn" data-page="online">🌐</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeToggle">🌙</button>
    </div>
    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 12 სათამაშო ოთახი</div>
            <div id="roomsList" class="rooms-list"></div>
        </div>
        <div id="messagesPage" class="page"><div class="section-title">💬 პირადი მიმოწერა</div><div id="pmList"></div></div>
        <div id="friendsPage" class="page"><div class="section-title">👥 ჩემი მეგობრები</div><div id="friendsList"></div><div class="section-title" style="margin-top:20px;">📨 მეგობრობის მოთხოვნები</div><div id="friendRequestsList"></div></div>
        <div id="onlinePage" class="page"><div class="section-title">🌐 ყველა მომხმარებელი</div><div id="onlineList"></div></div>
        <div id="profilePage" class="page">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()">👤</div>
                <h2 id="profileName"></h2>
                <input type="text" id="statusInput" class="status-input" placeholder="სტატუსი...">
                <button class="upload-btn" onclick="saveStatus()">💾 სტატუსის შენახვა</button>
                <div>ID: #<span id="userId"></span></div>
                <div class="section-title" style="margin-top: 20px;">📸 ჩემი ალბომი</div>
                <button class="upload-btn" onclick="document.getElementById('albumInput').click()">➕ ფოტოს დამატება</button>
                <div id="albumGrid" class="album-grid"></div>
                <input type="file" id="albumInput" hidden accept="image/*" onchange="addToAlbum(this)">
            </div>
            <input type="file" id="avatarInput" hidden accept="image/*" onchange="uploadAvatar(this)">
            <input type="file" id="emojiUploadInput" hidden accept="image/*" onchange="uploadEmojiImage(this)">
        </div>
        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-header"><span class="chat-room-name" id="chatRoomName">ოთახი</span><button class="close-btn" onclick="closeChat()">✕</button></div>
                <div id="chatMessages" class="messages"></div>
                <div class="chat-input-area">
                    <button class="icon-btn" onclick="openEmojiPanel('chat')">😊</button>
                    <button class="icon-btn" onclick="document.getElementById('chatPhotoInput').click()">📷</button>
                    <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
            <input type="file" id="chatPhotoInput" hidden accept="image/*" onchange="addPhotoToMessage(this)">
        </div>
    </div>
    <div id="emojiPanel" class="emoji-panel"></div>
    <div id="hearts"></div>
    <div id="pmContainer"></div>

    <script>
        // ============ Supabase ============
        const supabase = supabase.createClient(
            "https://ftfciebnywbondaiarnc.supabase.co",
            "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
        );
        
        // ============ მომხმარებელი ============
        let currentUser = localStorage.getItem('mafia_user');
        
        if (!currentUser || currentUser === "null" || currentUser === "undefined" || currentUser === "") {
            currentUser = localStorage.getItem('nickname');
            if (currentUser && currentUser !== "null" && currentUser !== "") {
                localStorage.setItem('mafia_user', currentUser);
            } else {
                currentUser = "Abu007";
                localStorage.setItem('mafia_user', currentUser);
            }
        }
        
        console.log("✅ შესული მომხმარებელი:", currentUser);
        
        let currentRoom = null;
        let currentPMUser = null;
        let currentEmojiTarget = 'chat';
        const OWNER = "Abu007";
        const ADMINS = ["Abu007", "Lukinio", "AdminMafia"];
        
        let users = [];
        let messages = [];
        let privateMessages = [];
        let friendRequests = [];
        let customEmojis = [];
        let photoInteractions = {};
        let userAlbums = {};
        
        const ROOMS = [
            { icon: "☕", name: "კაფე-ბარი" }, { icon: "🎲", name: "ნარდი" }, { icon: "🃏", name: "ჯოკერი" },
            { icon: "💎", name: "VIP საუბრები" }, { icon: "📝", name: "ფორუმი" }, { icon: "🛠️", name: "ადმინისტრაცია" },
            { icon: "😂", name: "იუმორი" }, { icon: "🏆", name: "შიფროგრამა" }, { icon: "🎭", name: "გამოძიება" },
            { icon: "🎵", name: "მუსიკალური" }, { icon: "⁉️", name: "ვიქტორინა" }, { icon: "🆘", name: "დახმარება" }
        ];
        
        // ============ მონაცემების ჩატვირთვა ============
        async function loadUsers() {
            const { data } = await supabase.from('profiles').select('*');
            if (data && data.length > 0) {
                users = data.map(u => ({
                    username: u.username,
                    status: u.status || "ონლაინ",
                    avatar: u.avatar_url,
                    role: u.username === OWNER ? "owner" : (ADMINS.includes(u.username) ? "admin" : "user"),
                    online: true,
                    joined: Date.now()
                }));
            } else {
                users = [
                    { username: "Abu007", status: "👑 დამფუძნებელი", avatar: null, role: "owner", online: true, joined: Date.now() },
                    { username: "Lukinio", status: "🔧 ადმინი", avatar: null, role: "admin", online: true, joined: Date.now() },
                    { username: "Giorgi", status: "ონლაინ", avatar: null, role: "user", online: true, joined: Date.now() },
                    { username: "Nika", status: "ონლაინ", avatar: null, role: "user", online: true, joined: Date.now() }
                ];
            }
            
            if (!users.find(u => u.username === currentUser)) {
                await supabase.from('profiles').insert([{ username: currentUser, status: "ახალი მოთამაშე" }]);
                users.push({ username: currentUser, status: "ახალი მოთამაშე", avatar: null, role: "user", online: true, joined: Date.now() });
            }
            
            document.getElementById('profileName').innerHTML = currentUser;
            document.getElementById('userId').innerHTML = Math.floor(Math.random() * 10000) + 1000;
            
            const currentUserData = users.find(u => u.username === currentUser);
            if (currentUserData?.avatar) {
                document.getElementById('profileAvatar').style.backgroundImage = `url(${currentUserData.avatar})`;
                document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                document.getElementById('profileAvatar').innerHTML = '';
            }
        }
        
        async function loadMessages() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
            if (data) messages = data;
            else messages = [];
            if (currentRoom) renderMessages();
        }
        
        async function loadPrivateMessages() {
            const { data } = await supabase.from('private_messages').select('*').order('created_at', { ascending: true });
            if (data) privateMessages = data;
            else privateMessages = [];
            renderPrivateChatsList();
        }
        
        async function loadFriendRequests() {
            const { data } = await supabase.from('friend_requests').select('*');
            if (data) friendRequests = data;
            else friendRequests = [];
            renderFriendRequestsList();
        }
        
        async function loadEmojis() {
            const { data } = await supabase.from('emoji').select('*');
            if (data) customEmojis = data.map(e => e.emoji_url);
            else customEmojis = [];
        }
        
        async function loadPhotoInteractions() {
            const { data } = await supabase.from('photo_interactions').select('*');
            if (data) {
                photoInteractions = {};
                data.forEach(item => {
                    photoInteractions[item.photo_url] = {
                        likes: item.likes || [],
                        comments: item.comments || []
                    };
                });
            }
        }
        
        async function loadUserPhotos() {
            const { data } = await supabase.from('user_photos').select('*');
            if (data) {
                userAlbums = {};
                data.forEach(item => {
                    if (!userAlbums[item.username]) userAlbums[item.username] = [];
                    userAlbums[item.username].push(item.photo_url);
                });
            }
        }
        
        // ============ შენახვა ============
        async function saveMessage(msg) {
            await supabase.from('messages').insert([{
                username: msg.username,
                text: msg.text,
                room_name: msg.room,
                image: msg.image,
                created_at: msg.time
            }]);
        }
        
        async function savePrivateMessage(msg) {
            await supabase.from('private_messages').insert([{
                from_user: msg.from,
                to_user: msg.to,
                text: msg.text,
                created_at: msg.time
            }]);
        }
        
        async function saveFriendRequest(req) {
            await supabase.from('friend_requests').insert([{
                from_user: req.from,
                to_user: req.to,
                status: req.status,
                created_at: req.date
            }]);
        }
        
        async function updateFriendRequest(reqId, status) {
            await supabase.from('friend_requests').update({ status: status }).eq('id', reqId);
        }
        
        async function saveEmoji(url) {
            await supabase.from('emoji').insert([{ emoji_url: url }]);
        }
        
        async function savePhotoInteraction(photoUrl, likes, comments) {
            const { data: existing } = await supabase.from('photo_interactions').select('*').eq('photo_url', photoUrl).maybeSingle();
            if (existing) {
                await supabase.from('photo_interactions').update({ likes: likes, comments: comments }).eq('photo_url', photoUrl);
            } else {
                await supabase.from('photo_interactions').insert([{ photo_url: photoUrl, likes: likes, comments: comments }]);
            }
        }
        
        async function saveUserPhoto(username, photoUrl) {
            await supabase.from('user_photos').insert([{ username: username, photo_url: photoUrl }]);
        }
        
        // ============ ემოჯები ============
        function openEmojiPanel(target) {
            currentEmojiTarget = target;
            const panel = document.getElementById('emojiPanel');
            if (panel.classList.contains('active')) { panel.classList.remove('active'); return; }
            
            const defaultEmojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺', '💀', '👑', '💪', '🤡', '👻', '⭐', '🌈', '🍕', '🍺', '🎸'];
            const allEmojis = [...defaultEmojis, ...customEmojis];
            
            panel.innerHTML = `<div class="emoji-grid" id="emojiGrid"></div>`;
            const grid = document.getElementById('emojiGrid');
            
            allEmojis.forEach(emoji => {
                if (typeof emoji === 'string' && emoji.startsWith('http')) {
                    const img = document.createElement('img'); 
                    img.src = emoji; 
                    img.className = 'emoji-img'; 
                    img.style.cssText = 'width:48px; height:48px; object-fit:cover; border-radius:8px; cursor:pointer;';
                    img.onclick = () => {
                        const input = target === 'chat' ? document.getElementById('messageInput') : document.getElementById('pmInput');
                        if(input) input.value += ` :img:${emoji}: `;
                        panel.classList.remove('active');
                    };
                    grid.appendChild(img);
                } else {
                    const div = document.createElement('div'); 
                    div.className = 'emoji-item'; 
                    div.textContent = emoji;
                    div.onclick = () => {
                        const input = target === 'chat' ? document.getElementById('messageInput') : document.getElementById('pmInput');
                        if(input) input.value += emoji;
                        panel.classList.remove('active');
                    };
                    grid.appendChild(div);
                }
            });
            
            if (ADMINS.includes(currentUser) || currentUser === OWNER) {
                const addBtn = document.createElement('div'); 
                addBtn.className = 'emoji-item'; 
                addBtn.textContent = '➕'; 
                addBtn.style.background = 'var(--accent)'; 
                addBtn.style.borderRadius = '8px';
                addBtn.onclick = () => { 
                    panel.classList.remove('active'); 
                    document.getElementById('emojiUploadInput').click(); 
                };
                grid.appendChild(addBtn);
            }
            
            panel.classList.add('active');
        }
        
        async function uploadEmojiImage(input) {
            const file = input.files[0];
            if (file && (ADMINS.includes(currentUser) || currentUser === OWNER)) {
                const reader = new FileReader();
                reader.onload = async (e) => { 
                    const url = e.target.result;
                    customEmojis.push(url); 
                    await saveEmoji(url);
                    showNotification('✅ ემოჯი დაემატა!'); 
                };
                reader.readAsDataURL(file);
            } else showNotification('❌ ემოჯის დამატება მხოლოდ ადმინებს შეუძლიათ!');
            input.value = '';
        }
        
        // ============ მეგობრები ============
        async function sendFriendRequest(targetUser) {
            if (targetUser === currentUser) { showNotification('❓ საკუთარ თავს ვერ დაუმატებ'); return; }
            if (friendRequests.some(r => r.from_user === currentUser && r.to_user === targetUser && r.status === 'pending')) {
                showNotification('⏳ მოთხოვნა უკვე გაგზავნილია!'); return;
            }
            if (isFriend(targetUser)) { showNotification('👥 უკვე მეგობრები ხართ!'); return; }
            await supabase.from('friend_requests').insert([{ from_user: currentUser, to_user: targetUser, status: 'pending' }]);
            await loadFriendRequests();
            showNotification(`📨 მოთხოვნა გაეგზავნა ${targetUser}-ს!`);
            renderFriendRequestsList();
            renderOnlineUsers();
        }
        
        async function acceptFriendRequest(fromUser) {
            const request = friendRequests.find(r => r.from_user === fromUser && r.to_user === currentUser && r.status === 'pending');
            if (request) {
                await supabase.from('friend_requests').update({ status: 'accepted' }).eq('id', request.id);
                await loadFriendRequests();
                showNotification(`✅ ${fromUser} დაემატა!`);
                renderFriendRequestsList();
                renderFriendsList();
                renderOnlineUsers();
            }
        }
        
        async function rejectFriendRequest(fromUser) {
            const request = friendRequests.find(r => r.from_user === fromUser && r.to_user === currentUser && r.status === 'pending');
            if (request) {
                await supabase.from('friend_requests').update({ status: 'rejected' }).eq('id', request.id);
                await loadFriendRequests();
                showNotification(`❌ უარყავით`);
                renderFriendRequestsList();
                renderOnlineUsers();
            }
        }
        
        function getFriendsList() { 
            return friendRequests.filter(r => r.status === 'accepted' && (r.from_user === currentUser || r.to_user === currentUser))
                .map(r => r.from_user === currentUser ? r.to_user : r.from_user);
        }
        function isFriend(username) { return getFriendsList().includes(username); }
