<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Chat App</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0d0d0d;
  color:white;
}
body.light{
  background:#f5e6e8;
  color:black;
}

/* layout */
.container{display:flex;height:100vh;}

/* rooms */
.rooms{
  width:200px;
  background:#1a1a1a;
  overflow:auto;
}
.room{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

/* chat */
.chat{flex:1;display:flex;flex-direction:column;}
.messages{flex:1;overflow:auto;padding:10px;}

.msg{
  background:#2a2a2a;
  margin:5px 0;
  padding:8px;
  border-radius:10px;
  position:relative;
}
.name{font-weight:bold;cursor:pointer;}
.time{font-size:10px;opacity:0.6;}

.delete{
  position:absolute;
  right:5px;
  top:5px;
  color:red;
  cursor:pointer;
}

/* input */
.input{
  display:flex;
  padding:10px;
  background:#222;
}
.input input{
  flex:1;
  padding:10px;
}

/* profile */
.profile{
  width:250px;
  background:#1a1a1a;
  padding:10px;
}
.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  background:gray;
}

/* friends */
#friendsList div{
  cursor:pointer;
  margin:4px 0;
}

/* PM */
#pmBox{
  position:fixed;
  bottom:0;
  right:10px;
  width:250px;
  height:300px;
  background:#222;
  display:none;
  flex-direction:column;
}

/* hearts */
.heart{
  position:fixed;
  color:#800020;
  font-size:30px;
  animation:float 8s linear infinite;
  opacity:0.4;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<button onclick="toggleTheme()">🌙</button>

<div class="container">

<div class="rooms" id="rooms"></div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input">
    <button onclick="openEmoji()">😊</button>
    <input id="msgInput" placeholder="დაწერე...">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<div class="profile">
  <div class="avatar"></div>
  <h3 id="username"></h3>
  <input id="status" placeholder="status">
  <div id="role"></div>

  <h4>Friends</h4>
  <div id="friendsList"></div>
</div>

</div>

<!-- PRIVATE CHAT -->
<div id="pmBox">
  <div id="pmMessages" style="flex:1;overflow:auto;"></div>
  <input id="pmInput">
  <button onclick="sendPM()">Send</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "YOUR_URL",
  "YOUR_KEY"
);

let user=null;
let role="user";
let currentRoom=1;
let currentPMUser=null;

/* USER */
async function loadUser(){
  const {data}=await supabase.auth.getUser();
  if(!data.user){
    location.href="index.html";
    return;
  }
  user=data.user;

  const {data:u}=await supabase
    .from("users")
    .select("*")
    .eq("id",user.id)
    .single();

  if(u){
    username.innerText=u.username;
    role=u.role||"user";
    document.getElementById("role").innerText=role;
    status.value=u.status||"";
  }
}

/* ROOMS */
for(let i=1;i<=12;i++){
  let d=document.createElement("div");
  d.className="room";
  d.innerText="Room "+i;
  d.onclick=()=>loadMessages(i);
  rooms.appendChild(d);
}

/* LOAD MESSAGES */
async function loadMessages(room){
  currentRoom=room;

  const {data}=await supabase
    .from("messages")
    .select("*")
    .eq("room",room)
    .order("created_at");

  messages.innerHTML="";
  data.forEach(addMessage);
}

/* ADD MESSAGE */
async function addMessage(m){
  let div=document.createElement("div");
  div.className="msg";

  let name=document.createElement("div");
  name.className="name";

  const {data:u}=await supabase
    .from("users")
    .select("username")
    .eq("id",m.user_id)
    .single();

  name.innerText=u?.username||"User";
  name.onclick=()=>openPM(m.user_id);

  let text=document.createElement("div");
  text.textContent=m.text;

  let time=document.createElement("div");
  time.className="time";
  time.innerText=new Date(m.created_at).toLocaleTimeString();

  div.appendChild(name);
  div.appendChild(text);
  div.appendChild(time);

  if(role==="admin"||role==="founder"){
    let del=document.createElement("div");
    del.className="delete";
    del.innerText="✖";
    del.onclick=()=>deleteMsg(m.id);
    div.appendChild(del);
  }

  messages.appendChild(div);
}

/* SEND MESSAGE */
async function sendMsg(){
  let text=msgInput.value;
  if(!text)return;

  await supabase.from("messages").insert([{
    text,
    room:currentRoom,
    user_id:user.id
  }]);

  msgInput.value="";
}

/* DELETE */
async function deleteMsg(id){
  await supabase.from("messages").delete().eq("id",id);
  loadMessages(currentRoom);
}

/* EMOJI */
function openEmoji(){
  let panel=document.createElement("div");

  ["😊","😂","❤️","🔥","😎","🥺"].forEach(e=>{
    let b=document.createElement("button");
    b.innerText=e;
    b.onclick=()=>{msgInput.value+=e;panel.remove();}
    panel.appendChild(b);
  });

  document.body.appendChild(panel);
}

/* FRIENDS */
async function loadFriends(){
  const {data}=await supabase
    .from("friends")
    .select("*")
    .eq("user_id",user.id);

  friendsList.innerHTML="";

  data.forEach(f=>{
    let d=document.createElement("div");
    d.innerText="User "+f.friend_id;
    d.onclick=()=>openPM(f.friend_id);
    friendsList.appendChild(d);
  });
}

/* PRIVATE CHAT */
function openPM(id){
  currentPMUser=id;
  pmBox.style.display="flex";
  loadPM();
}

async function loadPM(){
  const {data}=await supabase
    .from("private_messages")
    .select("*")
    .order("created_at");

  pmMessages.innerHTML="";

  data.filter(m=>
    (m.sender_id===user.id&&m.receiver_id===currentPMUser)||
    (m.receiver_id===user.id&&m.sender_id===currentPMUser)
  ).forEach(m=>{
    let d=document.createElement("div");
    d.textContent=m.text;
    pmMessages.appendChild(d);
  });
}

async function sendPM(){
  let text=pmInput.value;
  if(!text)return;

  await supabase.from("private_messages").insert([{
    sender_id:user.id,
    receiver_id:currentPMUser,
    text
  }]);

  pmInput.value="";
  loadPM();
}

/* REALTIME */
supabase.channel("chat")
.on("postgres_changes",
  {event:"INSERT",schema:"public",table:"messages"},
  payload=>{
    if(payload.new.room===currentRoom){
      addMessage(payload.new);
    }
  }
).subscribe();

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* HEARTS */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerText="❤";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),8000);
},400);

/* INIT */
loadUser().then(()=>{
  loadMessages(1);
  loadFriends();
});
</script>

</body>
</html>
