<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>კაიფმანია - ჩატი</title>
    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* Floating Hearts Animation */
        .heart {
            position: fixed;
            font-size: 28px;
            color: #8b0000;
            opacity: 0.7;
            pointer-events: none;
            z-index: 9999;
            animation: floatHeart 8s linear forwards;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Day Mode (Default) */
        body.day-mode {
            background: #fff8f0;
            color: #4a2c2c;
        }
        body.day-mode .rooms-panel,
        body.day-mode .profile-panel,
        body.day-mode .friends-panel {
            background: rgba(255, 245, 235, 0.95);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.2);
        }
        body.day-mode .message {
            background: #fff0e6;
            border-left: 4px solid #8b0000;
        }
        body.day-mode .room-item {
            background: rgba(139, 0, 0, 0.1);
        }
        body.day-mode input, body.day-mode textarea, body.day-mode select {
            background: white;
            color: #4a2c2c;
            border: 1px solid #8b0000;
        }

        /* Night Mode */
        body.night-mode {
            background: #1a0f0f;
            color: #f0e6d2;
        }
        body.night-mode .rooms-panel,
        body.night-mode .profile-panel,
        body.night-mode .friends-panel {
            background: rgba(30, 15, 15, 0.96);
            box-shadow: 0 0 20px rgba(100, 0, 0, 0.5);
            border-color: #5a2a2a;
        }
        body.night-mode .message {
            background: #2a1818;
            border-left: 4px solid #b22222;
            color: #ffefdb;
        }
        body.night-mode input, body.night-mode textarea, body.night-mode select {
            background: #2a1a1a;
            color: #ffefdb;
            border-color: #8b3a3a;
        }
        body.night-mode .room-item {
            background: rgba(139, 0, 0, 0.3);
        }

        /* Layout */
        .app-layout {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* Left Panel - Rooms */
        .rooms-panel {
            width: 220px;
            padding: 20px 10px;
            overflow-y: auto;
            border-right: 1px solid rgba(139,0,0,0.3);
            z-index: 2;
        }
        .room-item {
            padding: 12px;
            margin: 5px 0;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
        }
        .room-item.active {
            background: #8b0000;
            color: white;
            box-shadow: 0 0 10px #8b0000;
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 15px;
            background: inherit;
            border-bottom: 1px solid #8b0000;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 70%;
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 20px;
            align-self: flex-start;
            position: relative;
            word-wrap: break-word;
        }
        .message .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .avatar-small {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }
        .msg-time {
            font-size: 10px;
            opacity: 0.7;
            margin-left: 10px;
        }
        .message-input-area {
            display: flex;
            padding: 15px;
            gap: 10px;
            border-top: 1px solid #8b0000;
            align-items: center;
        }
        .message-input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid;
            outline: none;
        }
        .emoji-btn, .send-btn {
            background: #8b0000;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
        }
        .emoji-btn:hover, .send-btn:hover {
            background: #6b0000;
            transform: scale(1.05);
        }

        /* Right Panels */
        .profile-panel, .friends-panel {
            width: 280px;
            padding: 20px;
            border-left: 1px solid rgba(139,0,0,0.3);
            overflow-y: auto;
        }
        .profile-panel img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 10px auto;
            display: block;
            border: 3px solid #8b0000;
        }
        .role-badge {
            background: #8b0000;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin: 5px 0;
        }
        .friend-group {
            margin-bottom: 20px;
        }
        .friend-group h4 {
            border-bottom: 1px solid #8b0000;
            margin-bottom: 10px;
            padding-bottom: 5px;
        }
        .friend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
        }
        .friend-item:hover {
            background: rgba(139, 0, 0, 0.2);
        }
        .online-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff00;
            display: inline-block;
            box-shadow: 0 0 5px #00ff00;
        }
        .offline-indicator {
            background: #666;
        }
        .pm-indicator {
            background: red;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            text-align: center;
            color: white;
            margin-left: 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .search-box {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 20px;
            border: 1px solid;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 20px;
            width: 300px;
            color: #333;
        }
        body.night-mode .modal-content {
            background: #2a1a1a;
            color: #ffefdb;
        }
        .hide {
            display: none;
        }
        button {
            background: #8b0000;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            margin: 3px;
        }
        button:hover {
            background: #6b0000;
        }
        .theme-toggle {
            background: #5a2a2a;
            margin-left: 10px;
        }
        i {
            margin: 0 4px;
        }
        .admin-actions {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #8b0000;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .emoji-item {
            text-align: center;
            cursor: pointer;
            padding: 5px;
            border-radius: 8px;
        }
        .emoji-item:hover {
            background: rgba(139,0,0,0.3);
        }
        .delete-msg-btn {
            float: right;
            background: transparent;
            color: red;
            font-size: 12px;
            padding: 2px 5px;
            display: none;
        }
        .message:hover .delete-msg-btn {
            display: inline-block;
        }
        .small-btn {
            padding: 2px 8px;
            font-size: 11px;
        }
        select, input {
            padding: 6px;
            border-radius: 12px;
            margin: 3px 0;
        }
        .friend-actions {
            display: flex;
            gap: 5px;
            margin-left: auto;
        }
    </style>
</head>
<body class="day-mode">
<div class="app-layout">
    <!-- Rooms Panel -->
    <div class="rooms-panel" id="roomsPanel"></div>

    <!-- Main Chat -->
    <div class="main-chat">
        <div class="chat-header">
            <span id="currentRoomName">ოთახი 1</span>
            <div>
                <button id="themeToggleBtn" class="theme-toggle"><i class="fas fa-moon"></i></button>
                <button id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="message-input-area">
            <button id="emojiPickerBtn" class="emoji-btn"><i class="far fa-smile"></i></button>
            <input type="text" id="messageInput" placeholder="დაწერეთ შეტყობინება...">
            <button id="sendMsgBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div id="emojiPickerContainer" style="position: relative; display: none;"></div>
    </div>

    <!-- Profile Panel -->
    <div class="profile-panel" id="profilePanel">
        <h3><i class="fas fa-user-circle"></i> ჩემი პროფილი</h3>
        <img id="profileAvatar" src="https://via.placeholder.com/100" alt="avatar">
        <input type="file" id="avatarUpload" accept="image/*">
        <input type="text" id="statusInput" placeholder="სტატუსი...">
        <button id="updateStatusBtn"><i class="fas fa-save"></i> განახლება</button>
        <div id="userRoleDisplay"></div>
        
        <div class="admin-actions" id="adminActions" style="display:none;">
            <hr>
            <h4><i class="fas fa-crown"></i> ადმინ პანელი</h4>
            <select id="roleUserSelect"></select>
            <button id="makeAdminBtn"><i class="fas fa-user-shield"></i> ადმინად</button>
            <button id="makeFounderBtn"><i class="fas fa-crown"></i> დამფუძნებლად</button>
            <button id="removeRoleBtn"><i class="fas fa-user-minus"></i> როლის მოხსნა</button>
            <button id="blockUserBtn"><i class="fas fa-ban"></i> დაბლოკვა</button>
        </div>
        
        <div id="customEmojisPanel" class="admin-actions">
            <hr>
            <h4><i class="far fa-smile-wink"></i> ჩემი სმაილები</h4>
            <input type="text" id="newEmojiName" placeholder="სმაილის სახელი">
            <input type="file" id="newEmojiFile" accept="image/*">
            <button id="addEmojiBtn"><i class="fas fa-plus"></i> დამატება</button>
            <div id="myEmojisList" class="emoji-grid"></div>
        </div>
    </div>

    <!-- Friends Panel -->
    <div class="friends-panel" id="friendsPanel">
        <h3><i class="fas fa-users"></i> მეგობრები</h3>
        <input type="text" id="friendSearch" class="search-box" placeholder="მოძებნე მომხმარებელი...">
        <div id="searchResults"></div>
        <div id="friendsList"></div>
    </div>
</div>

<script>
// Supabase initialization - YOUR KEYS
const supabase = window.supabase.createClient(
    "https://ftfciebnywbondaiarnc.supabase.co",
    "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
);

let currentUser = null;
let currentRoomId = 1;
let currentRoomName = "ოთახი 1";
let messagesSubscription = null;
let customEmojis = [];
let pmCounts = {};

// Check authentication
supabase.auth.getSession().then(async ({ data: { session } }) => {
    if (!session) {
        window.location.href = "index.html";
        return;
    }
    currentUser = session.user;
    
    // Create user profile if not exists
    const { data: existingUser } = await supabase
        .from('users')
        .select('*')
        .eq('id', currentUser.id)
        .single();
    
    if (!existingUser) {
        await supabase.from('users').insert({
            id: currentUser.id,
            nickname: currentUser.user_metadata.nickname || currentUser.email.split('@')[0],
            avatar_url: null,
            status: 'online',
            role: 'member',
            online: true
        });
    } else {
        // Update online status
        await supabase.from('users').update({ online: true }).eq('id', currentUser.id);
    }
    
    loadUserData();
    loadRooms();
    loadFriends();
    loadCustomEmojis();
    startHeartAnimation();
});

async function loadUserData() {
    const { data: userData } = await supabase
        .from('users')
        .select('*')
        .eq('id', currentUser.id)
        .single();
    
    if (userData) {
        document.getElementById('profileAvatar').src = userData.avatar_url || 'https://via.placeholder.com/100';
        document.getElementById('statusInput').value = userData.status || '';
        const roleDisplay = document.getElementById('userRoleDisplay');
        roleDisplay.innerHTML = `<span class="role-badge"><i class="fas fa-tag"></i> როლი: ${userData.role || 'member'}</span>`;
        
        // Show admin actions if admin or founder
        if (userData.role === 'admin' || userData.role === 'founder') {
            document.getElementById('adminActions').style.display = 'block';
            loadUsersForRoleManagement();
        }
    }
}

async function loadRooms() {
    const { data: rooms } = await supabase.from('rooms').select('*').order('id');
    const roomsPanel = document.getElementById('roomsPanel');
    roomsPanel.innerHTML = '';
    
    if (rooms && rooms.length > 0) {
        rooms.forEach(room => {
            const roomDiv = document.createElement('div');
            roomDiv.className = 'room-item';
            if (room.id === currentRoomId) roomDiv.classList.add('active');
            roomDiv.textContent = room.name;
            roomDiv.onclick = () => switchRoom(room.id, room.name);
            roomsPanel.appendChild(roomDiv);
        });
    } else {
        // Create 12 default rooms if none exist
        for (let i = 1; i <= 12; i++) {
            const roomName = `ოთახი ${i}`;
            const { data: newRoom } = await supabase.from('rooms').insert({ name: roomName }).select().single();
            if (newRoom) {
                const roomDiv = document.createElement('div');
                roomDiv.className = 'room-item';
                if (newRoom.id === currentRoomId) roomDiv.classList.add('active');
                roomDiv.textContent = newRoom.name;
                roomDiv.onclick = () => switchRoom(newRoom.id, newRoom.name);
                roomsPanel.appendChild(roomDiv);
            }
        }
    }
}

function switchRoom(roomId, roomName) {
    currentRoomId = roomId;
    currentRoomName = roomName;
    document.getElementById('currentRoomName').textContent = roomName;
    
    // Update active class
    document.querySelectorAll('.room-item').forEach((item, index) => {
        if (item.textContent === roomName) item.classList.add('active');
        else item.classList.remove('active');
    });
    
    loadMessages();
}

async function loadMessages() {
    const { data: messages } = await supabase
        .from('messages')
        .select('*, users!messages_user_id_fkey(id, nickname, avatar_url, role)')
        .eq('room_id', currentRoomId)
        .order('created_at', { ascending: true });
    
    displayMessages(messages || []);
    
    // Subscribe to new messages
    if (messagesSubscription) messagesSubscription.unsubscribe();
    
    messagesSubscription = supabase
        .channel('messages-channel')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${currentRoomId}` }, 
            (payload) => {
                addMessageToUI(payload.new);
            })
        .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' },
            (payload) => {
                document.getElementById(`msg-${payload.old.id}`)?.remove();
            })
        .subscribe();
}

function displayMessages(messages) {
    const container = document.getElementById('messagesArea');
    container.innerHTML = '';
    messages.forEach(msg => addMessageToUI(msg));
    container.scrollTop = container.scrollHeight;
}

function addMessageToUI(msg) {
    const container = document.getElementById('messagesArea');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message';
    msgDiv.id = `msg-${msg.id}`;
    
    const time = new Date(msg.created_at).toLocaleTimeString();
    const canDelete = currentUser?.role === 'admin' || currentUser?.role === 'founder';
    
    msgDiv.innerHTML = `
        <div class="msg-header">
            <img class="avatar-small" src="${msg.users?.avatar_url || 'https://via.placeholder.com/28'}" onerror="this.src='https://via.placeholder.com/28'">
            <strong>${escapeHtml(msg.users?.nickname || 'Unknown')}</strong>
            <span class="msg-time"><i class="far fa-clock"></i> ${time}</span>
            ${canDelete ? `<button class="delete-msg-btn small-btn" onclick="deleteMessage('${msg.id}')"><i class="fas fa-trash"></i></button>` : ''}
        </div>
        <div>${escapeHtml(msg.text)}</div>
    `;
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
}

window.deleteMessage = async (msgId) => {
    if (currentUser?.role === 'admin' || currentUser?.role === 'founder') {
        await supabase.from('messages').delete().eq('id', msgId);
    }
};

document.getElementById('sendMsgBtn').addEventListener('click', async () => {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;
    
    await supabase.from('messages').insert({
        room_id: currentRoomId,
        user_id: currentUser.id,
        text: text,
        created_at: new Date()
    });
    input.value = '';
});

document.getElementById('messageInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('sendMsgBtn').click();
});

// Simple emoji picker
let emojiPickerVisible = false;
const emojiPickerContainer = document.getElementById('emojiPickerContainer');
const emojiPickerBtn = document.getElementById('emojiPickerBtn');

emojiPickerBtn.addEventListener('click', async () => {
    if (!emojiPickerVisible) {
        // Simple emoji list
        const emojis = ['😀', '😂', '🥰', '😍', '😎', '🔥', '💕', '❤️', '🎉', '✨', '⭐', '🌟', '💯', '👍', '🙏'];
        emojiPickerContainer.innerHTML = `
            <div style="background: white; border-radius: 12px; padding: 10px; width: 250px; position: absolute; bottom: 60px; left: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.3);">
                <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;">
                    ${emojis.map(emoji => `<div style="font-size: 28px; cursor: pointer; text-align: center;" onclick="insertEmoji('${emoji}')">${emoji}</div>`).join('')}
                </div>
            </div>
        `;
        emojiPickerContainer.style.display = 'block';
        emojiPickerVisible = true;
    } else {
        emojiPickerContainer.style.display = 'none';
        emojiPickerVisible = false;
    }
});

window.insertEmoji = (emoji) => {
    const input = document.getElementById('messageInput');
    input.value += emoji;
    emojiPickerContainer.style.display = 'none';
    emojiPickerVisible = false;
};

// Theme toggle
let isNightMode = false;
document.getElementById('themeToggleBtn').addEventListener('click', () => {
    isNightMode = !isNightMode;
    document.body.classList.toggle('night-mode', isNightMode);
    document.body.classList.toggle('day-mode', !isNightMode);
});

// Logout
document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = 'index.html';
});

// Avatar upload
document.getElementById('avatarUpload').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const fileExt = file.name.split('.').pop();
    const fileName = `${currentUser.id}_${Date.now()}.${fileExt}`;
    
    const { data, error } = await supabase.storage
        .from('avatars')
        .upload(fileName, file);
    
    if (error) {
        alert('ატვირთვა ვერ მოხერხდა: ' + error.message);
        return;
    }
    
    const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(fileName);
    
    await supabase.from('users').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
    document.getElementById('profileAvatar').src = publicUrl;
});

// Update status
document.getElementById('updateStatusBtn').addEventListener('click', async () => {
    const status = document.getElementById('statusInput').value;
    await supabase.from('users').update({ status: status }).eq('id', currentUser.id);
    alert('სტატუსი განახლდა');
});

// Load users for role management
async function loadUsersForRoleManagement() {
    const { data: users } = await supabase.from('users').select('id, nickname, role');
    const select = document.getElementById('roleUserSelect');
    select.innerHTML = '<option value="">აირჩიე მომხმარებელი</option>';
    if (users) {
        users.forEach(user => {
            if (user.id !== currentUser.id) {
                select.innerHTML += `<option value="${user.id}">${escapeHtml(user.nickname)} (${user.role})</option>`;
            }
        });
    }
}

document.getElementById('makeAdminBtn')?.addEventListener('click', async () => {
    const userId = document.getElementById('roleUserSelect').value;
    if (!userId) return;
    await supabase.from('users').update({ role: 'admin' }).eq('id', userId);
    alert('ადმინად დანიშნულია');
    loadUsersForRoleManagement();
});

document.getElementById('makeFounderBtn')?.addEventListener('click', async () => {
    const userId = document.getElementById('roleUserSelect').value;
    if (!userId) return;
    await supabase.from('users').update({ role: 'founder' }).eq('id', userId);
    alert('დამფუძნებლად დანიშნულია');
    loadUsersForRoleManagement();
});

document.getElementById('removeRoleBtn')?.addEventListener('click', async () => {
    const userId = document.getElementById('roleUserSelect').value;
    if (!userId) return;
    await supabase.from('users').update({ role: 'member' }).eq('id', userId);
    alert('როლი მოხსნილია');
    loadUsersForRoleManagement();
});

document.getElementById('blockUserBtn')?.addEventListener('click', async () => {
    const userId = document.getElementById('roleUserSelect').value;
    if (!userId) return;
    const reason = prompt('დაბლოკვის მიზეზი:');
    if (reason) {
        alert(`მომხმარებელი დაბლოკილია. მიზეზი: ${reason}`);
    }
});

// Custom emojis
async function loadCustomEmojis() {
    const { data: emojis } = await supabase
        .from('custom_emojis')
        .select('*')
        .eq('user_id', currentUser.id);
    
    customEmojis = emojis || [];
    displayMyEmojis();
}

function displayMyEmojis() {
    const container = document.getElementById('myEmojisList');
    if (!container) return;
    container.innerHTML = '';
    customEmojis.forEach(emoji => {
        const div = document.createElement('div');
        div.className = 'emoji-item';
        div.innerHTML = `
            <img src="${emoji.emoji_url}" style="width:40px; height:40px; cursor:pointer;" onclick="insertCustomEmoji('${emoji.emoji_url}')">
            <div>${escapeHtml(emoji.emoji_name)}</div>
            <button class="small-btn" onclick="deleteEmoji('${emoji.id}')"><i class="fas fa-trash"></i></button>
        `;
        container.appendChild(div);
    });
}

window.insertCustomEmoji = (url) => {
    const input = document.getElementById('messageInput');
    input.value += `[${url}]`;
};

window.deleteEmoji = async (emojiId) => {
    await supabase.from('custom_emojis').delete().eq('id', emojiId);
    loadCustomEmojis();
};

document.getElementById('addEmojiBtn')?.addEventListener('click', async () => {
    const name = document.getElementById('newEmojiName').value;
    const file = document.getElementById('newEmojiFile').files[0];
    if (!name || !file) return;
    
    const fileName = `emoji_${currentUser.id}_${Date.now()}.${file.name.split('.').pop()}`;
    const { data, error } = await supabase.storage.from('emojis').upload(fileName, file);
    
    if (error) {
        alert('ატვირთვა ვერ მოხერხდა: ' + error.message);
        return;
    }
    
    const { data: { publicUrl } } = supabase.storage.from('emojis').getPublicUrl(fileName);
    
    await supabase.from('custom_emojis').insert({
        user_id: currentUser.id,
        emoji_url: publicUrl,
        emoji_name: name
    });
    
    document.getElementById('newEmojiName').value = '';
    document.getElementById('newEmojiFile').value = '';
    loadCustomEmojis();
});

// Friends system
async function loadFriends() {
    const { data: users } = await supabase.from('users').select('*').neq('id', currentUser.id);
    
    if (!users) return;
    
    const founders = users.filter(u => u.role === 'founder');
    const admins = users.filter(u => u.role === 'admin');
    const members = users.filter(u => u.role === 'member');
    
    const friendsPanel = document.getElementById('friendsList');
    friendsPanel.innerHTML = `
        <div class="friend-group">
            <h4><i class="fas fa-crown"></i> დამფუძნებლები</h4>
            ${renderFriendsList(founders)}
        </div>
        <div class="friend-group">
            <h4><i class="fas fa-user-shield"></i> ადმინები</h4>
            ${renderFriendsList(admins)}
        </div>
        <div class="friend-group">
            <h4><i class="fas fa-user"></i> წევრები</h4>
            ${renderFriendsList(members)}
        </div>
    `;
}

function renderFriendsList(users) {
    if (!users || users.length === 0) return '<div>ვერავინ</div>';
    return users.map(user => `
        <div class="friend-item" onclick="openPrivateChat('${user.id}', '${escapeHtml(user.nickname)}')">
            <img class="avatar-small" src="${user.avatar_url || 'https://via.placeholder.com/28'}" onerror="this.src='https://via.placeholder.com/28'">
            <span>${escapeHtml(user.nickname)}</span>
            <span class="${user.online ? 'online-indicator' : 'offline-indicator'}"></span>
            ${pmCounts[user.id] ? `<span class="pm-indicator">${pmCounts[user.id]}</span>` : ''}
        </div>
    `).join('');
}

window.openPrivateChat = (userId, nickname) => {
    alert(`💬 პირადი საუბარი ${nickname} -თან\n(PM სისტემა მალე დაემატება)`);
};

// Search users
document.getElementById('friendSearch').addEventListener('input', async (e) => {
    const search = e.target.value.toLowerCase();
    if (search.length < 2) {
        document.getElementById('searchResults').innerHTML = '';
        return;
    }
    
    const { data: users } = await supabase
        .from('users')
        .select('*')
        .ilike('nickname', `%${search}%`)
        .neq('id', currentUser.id)
        .limit(5);
    
    if (!users) return;
    
    document.getElementById('searchResults').innerHTML = users.map(user => `
        <div class="friend-item">
            <img class="avatar-small" src="${user.avatar_url || 'https://via.placeholder.com/28'}">
            <span>${escapeHtml(user.nickname)}</span>
            <button class="small-btn" onclick="sendFriendRequest('${user.id}')">დამატება</button>
        </div>
    `).join('');
});

window.sendFriendRequest = async (friendId) => {
    const { data: existing } = await supabase
        .from('friends')
        .select('*')
        .eq('user_id', currentUser.id)
        .eq('friend_id', friendId)
        .single();
    
    if (!existing) {
        await supabase.from('friends').insert({
            user_id: currentUser.id,
            friend_id: friendId,
            status: 'pending'
        });
        alert('მოთხოვნა გაგზავნილია');
    } else if (existing.status === 'pending') {
        await supabase.from('friends').update({ status: 'accepted' }).eq('id', existing.id);
        alert('მეგობარი დაემატა');
        loadFriends();
    }
};

// Heart animation
function startHeartAnimation() {
    setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + '%';
        heart.style.fontSize = (20 + Math.random() * 30) + 'px';
        heart.style.animationDuration = (5 + Math.random() * 5) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
    }, 800);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Update online status on page unload
window.addEventListener('beforeunload', async () => {
    if (currentUser) {
        await supabase.from('users').update({ online: false }).eq('id', currentUser.id);
    }
});
</script>
</body>
