<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - FULL SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root { --red: #ff0000; --dark: #050000; --border: #4a0000; }
        body { margin: 0; font-family: sans-serif; background: black; color: white; height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar - მარცხენა მენიუ */
        .sidebar { width: 260px; background: #0a0000; border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        .profile-card { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .p-ava { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--red); object-fit: cover; cursor: pointer; }
        .p-stats { font-size: 12px; color: #aaa; margin-top: 5px; display: flex; justify-content: space-around; }

        /* ჩატის ცენტრალური ზონა */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--dark-bg); }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* ონლაინ მომხმარებლები (მარჯვენა პანელი) */
        .online-list { width: 200px; background: #080000; border-left: 2px solid var(--border); padding: 10px; overflow-y: auto; }
        .online-user { display: flex; align-items: center; gap: 8px; padding: 8px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #111; }
        .online-user:hover { background: #1a0000; }
        .status-dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 5px #00ff00; }

        /* მესიჯის სტილი */
        .msg { display: flex; gap: 10px; margin-bottom: 5px; }
        .m-content { background: rgba(40,0,0,0.5); padding: 8px 12px; border-radius: 5px 15px 15px 15px; border: 1px solid #200; position: relative; max-width: 85%; }
        .m-name { font-weight: bold; font-size: 13px; color: var(--red); margin-bottom: 3px; cursor: pointer; }
        .m-text { font-size: 14px; word-break: break-word; }
        .m-time { font-size: 10px; color: #555; align-self: flex-end; }

        /* PM (პირადი მესიჯი) ფანჯარა */
        .pm-window { position: fixed; bottom: 80px; right: 220px; width: 300px; height: 350px; background: #0a0000; border: 2px solid cyan; border-radius: 10px; display: none; flex-direction: column; z-index: 6000; }
        .pm-header { background: cyan; color: black; padding: 8px; font-weight: bold; display: flex; justify-content: space-between; }

        /* ინპუტი */
        .input-bar { padding: 15px; background: black; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #333; background: #111; color: white; outline: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile-card">
        <img id="my-ava" class="p-ava" src="" onclick="openProfile(myNick)">
        <div id="my-nick" style="color:red; font-weight:bold; margin-top:10px;">...</div>
        <div class="p-stats">
            <span>🏆 ვიქტ: <b id="q-pts">0</b></span>
            <span>🔐 შიფრ: <b id="c-pts">0</b></span>
        </div>
    </div>
    <div style="flex:1; padding:10px;" id="room-list">
        <div class="online-user" onclick="setRoom('☕ კაფე-ბარი')">☕ კაფე-ბარი</div>
        <div class="online-user" onclick="setRoom('🕴 მაფიის ღამე')">🕴 მაფიის ღამე</div>
        <div class="online-user" onclick="setRoom('🎲 კაზინო')">🎲 კაზინო</div>
    </div>
</div>

<div class="main-chat">
    <div id="room-title" style="padding:10px; border-bottom:1px solid #222; text-align:center; color:red; font-weight:bold;">☕ კაფე-ბარი</div>
    <div class="messages" id="msgs"></div>
    <div class="input-bar">
        <input type="text" id="msg-in" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="background:red; border:none; border-radius:50%; width:40px; color:white; cursor:pointer;">➤</button>
    </div>
</div>

<div class="online-list">
    <div style="font-size:12px; color:gray; margin-bottom:10px; text-align:center;">ონლაინშია</div>
    <div id="users-online"></div>
</div>

<div id="pm-box" class="pm-window">
    <div class="pm-header"><span id="pm-with">...</span> <span style="cursor:pointer;" onclick="closePM()">✖</span></div>
    <div id="pm-msgs" style="flex:1; overflow-y:auto; padding:10px; font-size:13px;"></div>
    <div style="padding:5px; display:flex;">
        <input type="text" id="pm-in" placeholder="მისწერე..." onkeypress="if(event.key==='Enter') sendPM()">
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), currentRoom = "☕ კაფე-ბარი", targetPM = "";

    async function init() {
        if(!myNick) return;
        // პროფილის განახლება და ონლაინ სტატუსი
        await _s.from('profiles').update({ last_seen: new Date() }).eq('username', myNick);
        loadOnline();
        loadMsgs();
        
        // რეალურ დროში მესიჯები და ონლაინ სია
        _s.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, loadMsgs).subscribe();
        _s.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'profiles'}, loadOnline).subscribe();
        setInterval(loadOnline, 10000); // 10 წამში ერთხელ ონლაინის განახლება
    }

    async function loadMsgs() {
        const { data: m } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', {ascending:true}).limit(50);
        const { data: p } = await _s.from('profiles').select('username, avatar_url, role');
        const box = document.getElementById('msgs');
        box.innerHTML = m.map(msg => {
            const user = p.find(u => u.username === msg.user_name);
            const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return `<div class="msg">
                <img src="${user?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" style="width:35px; height:35px; border-radius:50%;">
                <div class="m-content">
                    <div class="m-name" onclick="openPM('${msg.user_name}')">${msg.user_name}</div>
                    <div class="m-text">${msg.text}</div>
                    <div class="m-time">${time}</div>
                </div>
            </div>`;
        }).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function loadOnline() {
        const fiveMinAgo = new Date(Date.now() - 5 * 60000).toISOString();
        const { data: users } = await _s.from('profiles').select('*').gt('last_seen', fiveMinAgo);
        document.getElementById('users-online').innerHTML = users.map(u => `
            <div class="online-user" onclick="openPM('${u.username}')">
                <div class="status-dot"></div>
                <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" style="width:25px; height:25px; border-radius:50%;">
                <span>${u.username}</span>
            </div>
        `).join('');
    }

    // PM ფუნქციები
    function openPM(nick) {
        if(nick === myNick) return;
        targetPM = nick;
        document.getElementById('pm-with').innerText = "საუბარი: " + nick;
        document.getElementById('pm-box').style.display = 'flex';
        loadPMs();
    }

    async function loadPMs() {
        const { data: pms } = await _s.from('direct_messages')
            .select('*')
            .or(`and(sender.eq.${myNick},receiver.eq.${targetPM}),and(sender.eq.${targetPM},receiver.eq.${myNick})`)
            .order('created_at');
        document.getElementById('pm-msgs').innerHTML = pms.map(p => `
            <div style="color:${p.sender === myNick ? 'white' : 'cyan'}">
                <b>${p.sender}:</b> ${p.text}
            </div>
        `).join('');
    }

    async function send() {
        const val = document.getElementById('msg-in').value;
        if(!val) return;
        await _s.from('messages').insert([{ user_name: myNick, text: val, room_name: currentRoom }]);
        document.getElementById('msg-in').value = "";
        
        // ვიქტორინის ლოგიკა (მაგალითი)
        if(currentRoom === '🔐 შიფროგრამა' && val.toLowerCase() === 'პასუხი') {
            await _s.rpc('increment_cipher', { user_n: myNick }); // ბაზაში უნდა იყოს ეს ფუნქცია
        }
    }

    function closePM() { document.getElementById('pm-box').style.display = 'none'; }
    function setRoom(r) { currentRoom = r; document.getElementById('room-title').innerText = r; loadMsgs(); }
    init();
</script>
</body>
</html>
