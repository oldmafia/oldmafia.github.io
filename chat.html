<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHINDI SOCIAL - BLACK WINE THEME</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        
        /* ========== შავი შინდისფერი თემა ========== */
        body {
            --bg-primary: #0a0508;
            --bg-secondary: #120a0f;
            --bg-card: #1a0f15;
            --border-color: #8b1a3a;
            --accent: #ff3366;
            --accent-dark: #8b1a3a;
            --text-primary: #f0e6d0;
            --text-secondary: #b8a89a;
            --hover-bg: #2a1a22;
            --online-green: #44ff66;
            
            background: linear-gradient(135deg, #0a0508 0%, #1a0f15 100%);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        /* გულის ანიმაცია */
        @keyframes heartBeat {
            0% { transform: scale(1); text-shadow: 0 0 2px #ff3366; }
            50% { transform: scale(1.2); text-shadow: 0 0 15px #ff3366, 0 0 25px #ff6699; }
            100% { transform: scale(1); text-shadow: 0 0 2px #ff3366; }
        }
        
        .heart-glow {
            animation: heartBeat 0.5s ease-in-out;
            display: inline-block;
        }
        
        /* მთავარი კონტეინერი - Facebook სტილი */
        .app-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }
        
        /* ========== მარცხენა საიდბარი (მენიუ) ========== */
        .left-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f080c 0%, #120a0f 100%);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .profile-card {
            padding: 24px 16px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        
        .profile-card::before {
            content: "❤️";
            position: absolute;
            top: 5px;
            right: 15px;
            font-size: 28px;
            opacity: 0.6;
            animation: heartBeat 1.5s infinite;
        }
        
        .profile-card::after {
            content: "❤️";
            position: absolute;
            bottom: 5px;
            left: 15px;
            font-size: 24px;
            opacity: 0.5;
            animation: heartBeat 1.8s infinite reverse;
        }
        
        .profile-avatar {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            cursor: pointer;
            margin-bottom: 10px;
            box-shadow: 0 0 15px rgba(255,51,102,0.3);
            transition: all 0.3s;
        }
        
        .profile-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255,51,102,0.6);
        }
        
        .profile-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
        }
        
        .profile-role {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 5px 0;
        }
        
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .profile-stats span {
            background: rgba(139,26,58,0.3);
            padding: 4px 8px;
            border-radius: 20px;
        }
        
        /* მენიუს ელემენტები */
        .menu-item {
            padding: 14px 20px;
            margin: 4px 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        
        .menu-item:hover {
            background: var(--hover-bg);
            color: var(--accent);
            transform: translateX(5px);
        }
        
        .menu-item.active {
            background: linear-gradient(90deg, rgba(139,26,58,0.3) 0%, transparent 100%);
            color: var(--accent);
            border-left: 3px solid var(--accent);
        }
        
        .room-item {
            padding: 12px 20px 12px 48px;
            margin: 2px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            position: relative;
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        
        .room-item::before {
            content: "❤️";
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.6;
        }
        
        .room-item:hover {
            background: var(--hover-bg);
            color: var(--accent);
        }
        
        .room-item.active {
            background: linear-gradient(90deg, rgba(139,26,58,0.4) 0%, transparent 100%);
            color: var(--accent);
            font-weight: bold;
        }
        
        .room-item.active::before {
            opacity: 1;
            content: "❤️‍🔥";
            animation: heartBeat 0.8s infinite;
        }
        
        .logout-btn {
            margin: 20px 12px;
            padding: 12px;
            text-align: center;
            background: rgba(139,26,58,0.2);
            border-radius: 12px;
            cursor: pointer;
            color: #ff6666;
            border: 1px solid var(--border-color);
        }
        
        .logout-btn:hover {
            background: rgba(139,26,58,0.5);
        }
        
        /* ========== შუა სვეტი - ჩატი ========== */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
        }
        
        /* მცურავი გულები */
        .chat-container::before {
            content: "❤️";
            position: fixed;
            bottom: 20%;
            right: 30px;
            font-size: 55px;
            opacity: 0.2;
            pointer-events: none;
            animation: heartBeat 3s infinite;
            z-index: 0;
        }
        
        .chat-container::after {
            content: "❤️❤️";
            position: fixed;
            top: 15%;
            right: 60px;
            font-size: 40px;
            opacity: 0.2;
            pointer-events: none;
            animation: heartBeat 4s infinite reverse;
            z-index: 0;
        }
        
        /* ტოპბარი */
        .chat-header {
            background: linear-gradient(90deg, #120a0f 0%, #1a0f15 100%);
            border-bottom: 2px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        
        .room-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .icon-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            position: relative;
        }
        
        .icon-btn:hover {
            color: var(--accent);
            transform: scale(1.1);
        }
        
        #pm-count {
            position: absolute;
            top: -5px;
            right: -8px;
            background: var(--accent);
            color: white;
            font-size: 10px;
            border-radius: 50%;
            padding: 2px 6px;
            display: none;
        }
        
        /* ჩატის არეალი */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: radial-gradient(circle at center, #0f080c 0%, #080408 100%);
        }
        
        /* შეტყობინებების სტილი */
        .message-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .msg-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            object-fit: cover;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .msg-avatar:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }
        
        .message-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px 18px 18px 8px;
            padding: 10px 15px;
            max-width: 70%;
            position: relative;
        }
        
        .message-bubble::after {
            content: "❤️";
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 14px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        
        .message-row:hover .message-bubble::after {
            opacity: 1;
            animation: heartBeat 0.5s;
        }
        
        .message-nick {
            font-weight: bold;
            color: var(--accent);
            font-size: 13px;
            margin-bottom: 5px;
            cursor: pointer;
            display: inline-block;
        }
        
        .message-nick::after {
            content: " ❤️";
            font-size: 10px;
        }
        
        .message-text {
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .message-text img {
            max-width: 100px;
            max-height: 100px;
            border-radius: 8px;
        }
        
        .message-time {
            font-size: 10px;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 4px;
        }
        
        /* ინფუთის ზონა */
        .input-area {
            background: var(--bg-secondary);
            border-top: 2px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
        }
        
        .input-area input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(255,51,102,0.3);
        }
        
        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent);
        }
        
        /* ========== მარჯვენა საიდბარი (ონლაინი) ========== */
        .right-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f080c 0%, #120a0f 100%);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .online-header {
            padding: 18px;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .online-header::before {
            content: "🟢";
            font-size: 14px;
        }
        
        .online-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(139,26,58,0.2);
        }
        
        .online-user:hover {
            background: var(--hover-bg);
        }
        
        .online-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--online-green);
        }
        
        .online-info {
            flex: 1;
        }
        
        .online-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .online-role {
            font-size: 10px;
            color: var(--text-secondary);
        }
        
        .online-status {
            width: 8px;
            height: 8px;
            background: var(--online-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--online-green);
        }
        
        /* ემოჯი პიკერი */
        #emoji-picker {
            display: none;
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 12px;
            width: 280px;
            z-index: 1000;
        }
        
        #emoji-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .emoji-item {
            width: 50px;
            height: 50px;
            cursor: pointer;
            object-fit: contain;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        
        .emoji-item:hover {
            transform: scale(1.1);
        }
        
        /* მოდალი */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 25px;
            padding: 30px;
            width: 350px;
            text-align: center;
            position: relative;
        }
        
        .modal-content::before {
            content: "❤️❤️";
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 30px;
            opacity: 0.5;
        }
        
        .modal-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .modal-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        /* სქროლი */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        
        /* მობილური */
        @media (max-width: 768px) {
            .left-sidebar, .right-sidebar {
                position: fixed;
                top: 0;
                bottom: 0;
                z-index: 1500;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            
            .left-sidebar.open {
                transform: translateX(0);
            }
            
            .right-sidebar.open {
                transform: translateX(0);
                right: 0;
                left: auto;
            }
            
            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.8);
                z-index: 1400;
            }
            
            .overlay.active {
                display: block;
            }
        }
        
        .overlay {
            display: none;
        }
        
        .status-badge {
            font-size: 10px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebars()"></div>
<div id="emoji-picker">
    <div id="emoji-grid"></div>
</div>

<div class="app-container">
    <!-- მარცხენა მენიუ -->
    <div class="left-sidebar" id="leftSidebar">
        <div class="profile-card">
            <img id="my-avatar-img" src="https://i.ibb.co/v3m6y6R/avatar.png" class="profile-avatar" onclick="document.getElementById('avatar-input').click()">
            <input type="file" id="avatar-input" style="display:none" onchange="uploadAvatar(this)">
            <div class="profile-name" id="my-nick-label">...</div>
            <div class="profile-role" id="my-role-label">...</div>
            <div class="profile-stats">
                <span>🏆 <span id="my-points-label">0</span></span>
                <span>🔐 <span id="my-cipher-points-label">0</span></span>
            </div>
            <div class="status-badge" onclick="changeStatus()" style="cursor:pointer; margin-top:8px;">💬 სტატუსის შეცვლა</div>
        </div>
        
        <div class="rooms-list" id="roomsList">
            <!-- ოთახები დინამიურად -->
        </div>
        
        <div class="logout-btn" onclick="logout()">🚪 გასვლა</div>
    </div>
    
    <!-- შუა ჩატი -->
    <div class="chat-container">
        <div class="chat-header">
            <button class="icon-btn" id="menuToggle" style="display:none;">☰</button>
            <div class="room-title">
                <span id="room-name">☕ კაფე-ბარი</span>
                <span>❤️</span>
            </div>
            <div class="header-buttons">
                <button class="icon-btn" onclick="toggleEmojiPicker()">😊</button>
                <button class="icon-btn" id="themeToggle">🌙</button>
                <button class="icon-btn" id="onlineToggle">👥</button>
            </div>
        </div>
        
        <div class="messages-area" id="chat"></div>
        
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="send-btn" onclick="sendMsg()">❤️</button>
        </div>
    </div>
    
    <!-- მარჯვენა ონლაინი -->
    <div class="right-sidebar" id="rightSidebar">
        <div class="online-header">
            <span>🟢 ონლაინში</span>
            <span>❤️</span>
        </div>
        <div id="online-list-content"></div>
    </div>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="targetAvatar" src="" style="width:85px; height:85px; border-radius:50%; border:2px solid var(--border-color);">
        <h3 id="targetName" style="color:var(--accent); margin:10px 0;"></h3>
        <p id="targetRoleLabel"></p>
        <p id="targetStatusDisplay" style="margin:10px 0;"></p>
        <div id="targetPointsLabel"></div>
        <div id="adminOptions"></div>
        <button class="modal-btn" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const supabase = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname');
    let myRole = "Member";
    let currentRoom = "☕ კაფე-ბარი";
    let myAvatar = "";
    let currentQuizQ = null;
    let currentCipher = null;
    
    const QUIZ_ROOM = "❓ ვიქტორინა";
    const CIPHER_ROOM = "🔐 შიფროგრამა";
    
    const rooms = [
        "☕ კაფე-ბარი", "💎 ვიპ საუბრები", "🕴 მაფიის ღამე", "🕵️ გამოძიება",
        "🔐 შიფროგრამა", "❓ ვიქტორინა", "😵 ჩამოხრჩობანა", "🎲 ნარდი",
        "📝 ფორუმი", "🎵 მუსიკა", "😂 იუმორი", "🏛️ ფორუმი",
        "🛡️ ადმინისტრაცია", "🆘 დახმარება"
    ];
    
    function translateRole(r) {
        const roles = {'Owner': '👑 დამფუძნებელი', 'Admin': '🛡️ ადმინისტრატორი', 'Member': '👤 მომხმარებელი', 'Banned': '🚫 დაბლოკილი'};
        return roles[r] || '👤 მომხმარებელი';
    }
    
    function renderRooms() {
        const container = document.getElementById('roomsList');
        container.innerHTML = rooms.map(room => `
            <div class="room-item ${room === currentRoom ? 'active' : ''}" onclick="changeRoom('${room}', this)">
                ${room}
            </div>
        `).join('');
    }
    
    function changeRoom(room, el) {
        currentRoom = room;
        document.getElementById('room-name').innerHTML = `${room} ❤️`;
        document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
        if (el) el.classList.add('active');
        loadMessages();
        closeSidebars();
        
        if (room === QUIZ_ROOM) setTimeout(startQuiz, 1000);
        if (room === CIPHER_ROOM) setTimeout(startCipher, 1000);
    }
    
    function closeSidebars() {
        document.getElementById('leftSidebar').classList.remove('open');
        document.getElementById('rightSidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
    }
    
    async function init() {
        if (!myNick) {
            location.href = 'index.html';
            return;
        }
        
        const { data: p } = await supabase.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = p.role || "Member";
            myAvatar = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-role-label').innerText = translateRole(myRole);
            document.getElementById('my-avatar-img').src = myAvatar;
            document.getElementById('my-points-label').innerText = p.points || 0;
            document.getElementById('my-cipher-points-label').innerText = p.cipher_points || 0;
            
            await supabase.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick);
            setInterval(() => supabase.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick), 30000);
        }
        
        renderRooms();
        loadMessages();
        loadOnline();
        setInterval(loadOnline, 10000);
        
        supabase.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMessages()).subscribe();
    }
    
    async function loadMessages() {
        const box = document.getElementById("chat");
        if (!box) return;
        
        const { data: msgs } = await supabase.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const { data: profs } = await supabase.from('profiles').select('*');
        
        box.innerHTML = "";
        msgs?.forEach(m => {
            const p = profs?.find(u => u.username === m.user_name);
            const isBot = m.user_name && m.user_name.includes('BOT');
            const time = m.created_at ? new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "00:00";
            const avatar = isBot ? "https://cdn-icons-png.flaticon.com/512/4712/4712035.png" : (p?.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png");
            
            box.innerHTML += `
                <div class="message-row">
                    <img src="${avatar}" class="msg-avatar" onclick="openProfile('${m.user_name}')">
                    <div class="message-bubble">
                        <div class="message-nick" onclick="openProfile('${m.user_name}')">${m.user_name}</div>
                        <div class="message-text">${parseEmojis(m.text)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
            
            if (currentRoom === QUIZ_ROOM) handleQuizLogic(m);
            if (currentRoom === CIPHER_ROOM) handleCipherLogic(m);
        });
        box.scrollTop = box.scrollHeight;
    }
    
    function parseEmojis(text) {
        if (!text) return "";
        const baseUrl = "https://ftfciebnywbondaiarnc.supabase.co/storage/v1/object/public/emojis/";
        return text.replace(/(\S+\.(gif|png|jpg|webp))/gi, `<img src="${baseUrl}$1">`);
    }
    
    async function sendMsg() {
        const input = document.getElementById("msg-input");
        if (!input.value.trim() || myRole === "Banned") return;
        
        await supabase.from('messages').insert([{
            user_name: myNick,
            text: input.value,
            room_name: currentRoom
        }]);
        input.value = "";
    }
    
    async function loadOnline() {
        const { data: users } = await supabase.from('profiles').select('*');
        const list = document.getElementById('online-list-content');
        if (!list || !users) return;
        
        const now = new Date();
        const onlineUsers = users.filter(u => u.last_online && (now - new Date(u.last_online) < 300000));
        
        list.innerHTML = onlineUsers.map(u => `
            <div class="online-user" onclick="openProfile('${u.username}')">
                <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="online-avatar">
                <div class="online-info">
                    <div class="online-name">${u.username}</div>
                    <div class="online-role">${translateRole(u.role)}</div>
                </div>
                <div class="online-status"></div>
            </div>
        `).join('');
    }
    
    async function openProfile(name) {
        if (name && name.includes('BOT')) return;
        const { data: p } = await supabase.from('profiles').select('*').eq('username', name).maybeSingle();
        if (!p) return;
        
        document.getElementById('targetAvatar').src = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
        document.getElementById('targetName').innerText = p.username;
        document.getElementById('targetRoleLabel').innerText = translateRole(p.role);
        document.getElementById('targetStatusDisplay').innerText = p.status || "😊 მოგესალმებით!";
        document.getElementById('targetPointsLabel').innerHTML = `🏆 ${p.points || 0} ქულა | 🔐 ${p.cipher_points || 0} შიფრო`;
        
        const adminZone = document.getElementById('adminOptions');
        adminZone.innerHTML = "";
        if (name !== myNick) {
            adminZone.innerHTML += `<button class="modal-btn" onclick="location.href='pm.html?to=${name}'">✉️ მიმოწერა</button>`;
            if (myRole === "Owner") {
                adminZone.innerHTML += `<button class="modal-btn" onclick="setRole('Admin')">🛡️ ადმინად დანიშვნა</button>`;
                adminZone.innerHTML += `<button class="modal-btn" onclick="setRole('Member')">✨ როლის ჩახსნა</button>`;
                adminZone.innerHTML += `<button class="modal-btn" style="background:#440000;" onclick="setRole('Banned')">🚫 დაბლოკვა</button>`;
            }
        }
        document.getElementById('userModal').style.display = "flex";
        window.selectedUser = name;
    }
    
    async function setRole(role) {
        if (confirm("დარწმუნებული ხართ?")) {
            await supabase.from('profiles').update({ role: role }).eq('username', window.selectedUser);
            closeModal();
            loadMessages();
        }
    }
    
    async function uploadAvatar(el) {
        const file = el.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            await supabase.from('profiles').update({ avatar_url: e.target.result }).eq('username', myNick);
            location.reload();
        };
        reader.readAsDataURL(file);
    }
    
    async function changeStatus() {
        const s = prompt("ახალი სტატუსი:");
        if (s !== null) {
            await supabase.from('profiles').update({ status: s }).eq('username', myNick);
        }
    }
    
    async function startQuiz() {
        if (currentRoom !== QUIZ_ROOM) return;
        const { data: questions } = await supabase.from('quiz_questions').select('*');
        if (!questions || questions.length === 0) return;
        currentQuizQ = questions[Math.floor(Math.random() * questions.length)];
        await supabase.from('messages').insert([{
            room_name: QUIZ_ROOM,
            user_name: '🤖 QUIZ_BOT',
            text: `❓ **ვიქტორინა:** ${currentQuizQ.question}`
        }]);
    }
    
    async function handleQuizLogic(msg) {
        if (currentRoom !== QUIZ_ROOM || !currentQuizQ || msg.user_name === '🤖 QUIZ_BOT') return;
        if (msg.text.toLowerCase().trim() === currentQuizQ.answer.toLowerCase().trim()) {
            const winner = msg.user_name;
            currentQuizQ = null;
            const { data: userProfile } = await supabase.from('profiles').select('points').ilike('username', winner).maybeSingle();
            const updatedPoints = (userProfile?.points || 0) + 5;
            await supabase.from('profiles').update({ points: updatedPoints }).ilike('username', winner);
            await supabase.from('messages').insert([{
                room_name: QUIZ_ROOM,
                user_name: '🤖 QUIZ_BOT',
                text: `🎉 სწორია! **${winner}**, +5 ქულა! (სულ: ${updatedPoints}) ❤️`
            }]);
            if (winner === myNick) document.getElementById('my-points-label').innerText = updatedPoints;
            setTimeout(startQuiz, 7000);
        }
    }
    
    async function startCipher() {
        if (currentRoom !== CIPHER_ROOM) return;
        const { data: words } = await supabase.from('cipher_games').select('*');
        if (!words || words.length === 0) return;
        currentCipher = words[Math.floor(Math.random() * words.length)];
        await supabase.from('messages').insert([{
            room_name: CIPHER_ROOM,
            user_name: '🔐 CIPHER_BOT',
            text: `🧩 **ააწყვეთ სიტყვა:** 👉 **${currentCipher.scrambled}** ❤️`
        }]);
    }
    
    async function handleCipherLogic(msg) {
        if (currentRoom !== CIPHER_ROOM || !currentCipher || msg.user_name === '🔐 CIPHER_BOT') return;
        if (msg.text.toLowerCase().trim() === currentCipher.correct.toLowerCase().trim()) {
            const winner = msg.user_name;
            currentCipher = null;
            const { data: prof } = await supabase.from('profiles').select('cipher_points').ilike('username', winner).maybeSingle();
            const updatedPoints = (prof?.cipher_points || 0) + 10;
            await supabase.from('profiles').update({ cipher_points: updatedPoints }).ilike('username', winner);
            await supabase.from('messages').insert([{
                room_name: CIPHER_ROOM,
                user_name: '🔐 CIPHER_BOT',
                text: `✅ სწორია! **${winner}**, +10 შიფრო-ქულა! 🏆 (სულ: ${updatedPoints}) ❤️`
            }]);
            if (winner === myNick) document.getElementById('my-cipher-points-label').innerText = updatedPoints;
            setTimeout(startCipher, 7000);
        }
    }
    
    function toggleEmojiPicker() {
        const p = document.getElementById('emoji-picker');
        p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
        if (p.style.display === 'flex') loadEmojis();
    }
    
    async function loadEmojis() {
        const { data: ems } = await supabase.from('emojis').select('*').order('id');
        const grid = document.getElementById('emoji-grid');
        if (!ems) return;
        grid.innerHTML = ems.filter(e => e.name && e.name.trim() !== "").map(e => `
            <img src="https://ftfciebnywbondaiarnc.supabase.co/storage/v1/object/public/emojis/${e.name}" 
                 class="emoji-item" onclick="insertEmoji('${e.name}')">
        `).join('');
    }
    
    window.insertEmoji = function(name) {
        const input = document.getElementById('msg-input');
        input.value += name + " ";
        input.focus();
    };
    
    function closeModal() {
        document.getElementById('userModal').style.display = "none";
    }
    
    function logout() {
        localStorage.clear();
        location.href = 'index.html';
    }
    
    // მობილური მენიუ
    document.getElementById('menuToggle').addEventListener('click', () => {
        document.getElementById('leftSidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    });
    
    document.getElementById('onlineToggle').addEventListener('click', () => {
        document.getElementById('rightSidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    });
    
    // თემის ტოგლი
    let isDark = true;
    document.getElementById('themeToggle').addEventListener('click', () => {
        const body = document.body;
        if (isDark) {
            body.style.background = "#fff8f0";
            body.style.color = "#2c2418";
            isDark = false;
        } else {
            body.style.background = "linear-gradient(135deg, #0a0508 0%, #1a0f15 100%)";
            body.style.color = "#f0e6d0";
            isDark = true;
        }
    });
    
    // მობილურისთვის ღილაკის ჩვენება
    if (window.innerWidth <= 768) {
        document.getElementById('menuToggle').style.display = 'block';
    }
    
    init();
</script>
</body>
</html>
