<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Old Mafia - ჩატი</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body {
            background: #0a0508;
            color: #f0e6e8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .nav-bar {
            display: flex;
            justify-content: space-around;
            background: #120a0c;
            padding: 10px;
            border-bottom: 2px solid #8b0000;
        }
        .nav-btn {
            font-size: 22px;
            background: none;
            border: none;
            color: #aa8a8a;
            cursor: pointer;
            padding: 5px 12px;
        }
        .nav-btn.active {
            color: #8b0000;
            background: rgba(139,0,0,0.2);
            border-radius: 20px;
        }
        .pages {
            flex: 1;
            position: relative;
        }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
            padding: 15px;
        }
        .page.active {
            display: block;
        }
        .section-title {
            font-size: 18px;
            margin-bottom: 12px;
            color: #8b0000;
            border-left: 3px solid #8b0000;
            padding-left: 10px;
        }
        .room-card {
            background: #1a0f12;
            padding: 14px;
            margin-bottom: 8px;
            border-radius: 10px;
            border-left: 4px solid #8b0000;
            cursor: pointer;
        }
        .chat-header {
            background: #1a0f12;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-radius: 10px;
        }
        .close-btn {
            background: none;
            border: none;
            color: #8b0000;
            font-size: 20px;
            cursor: pointer;
        }
        .messages {
            height: 65vh;
            overflow-y: auto;
            padding: 8px;
        }
        .message {
            background: #1a0f12;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            max-width: 80%;
        }
        .message.own {
            background: #8b0000;
            margin-left: auto;
        }
        .message-name {
            font-size: 11px;
            font-weight: bold;
            color: #8b0000;
        }
        .message.own .message-name {
            color: white;
        }
        .message-time {
            font-size: 9px;
            opacity: 0.6;
            margin-left: 5px;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            background: #1a0f12;
            padding: 10px;
            border-radius: 12px;
        }
        .chat-input {
            flex: 1;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #8b0000;
            background: #1f1216;
            color: white;
        }
        .send-btn {
            background: #8b0000;
            border: none;
            color: white;
            width: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        .user-item {
            background: #1a0f12;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .profile-card {
            text-align: center;
            padding: 20px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto;
            cursor: pointer;
        }
        .status-input {
            width: 80%;
            margin-top: 15px;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #8b0000;
            background: #1f1216;
            color: white;
            text-align: center;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
        }
        .notification {
            position: fixed;
            top: 70px;
            right: 10px;
            background: #8b0000;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            z-index: 9999;
        }
        .heart {
            position: fixed;
            bottom: 0;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 4s forwards;
            z-index: 9999;
        }
        @keyframes floatUp {
            0% { bottom: 0; opacity: 1; }
            100% { bottom: 100%; opacity: 0; transform: translateX(30px); }
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="online">👥</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeBtn">🌙</button>
    </div>

    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 12 ოთახი</div>
            <div id="roomsList"></div>
        </div>

        <div id="messagesPage" class="page">
            <div class="section-title">💬 პირადი მიმოწერა</div>
            <div id="pmList"
