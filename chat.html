<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Fixed Abu007 Final</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        :root { --accent: #ff3b3b; --bg: #0a0c10; --txt: #e6e9f0; --nav: #11151c; --card: #151e2a; --border: #2a3440; --in-bg: #0f141c; }
        body.day-mode { --bg: #fef8ef; --txt: #2c2418; --nav: #fff5e6; --card: #ffffff; --border: #ffe0b5; --in-bg: #fffaf2; }
        
        body { background: var(--bg); color: var(--txt); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.2s; }

        /* ⬆️ NAVIGATION (TOP) */
        .navigation { width: 100%; height: 65px; background: var(--nav); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-around; align-items: center; z-index: 1000; flex-shrink: 0; position: relative; }
        .nav-item { cursor: pointer; font-size: 28px; opacity: 0.55; color: var(--txt); transition: 0.2s; position: relative; }
        .nav-item.active { opacity: 1; color: var(--accent); transform: scale(1.1); }
        .badge { position: absolute; top: -5px; right: -8px; background: red; color: white; font-size: 10px; min-width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; }

        .content-area { flex: 1; overflow-y: auto; position: relative; }
        .page { display: none; height: 100%; width: 100%; }
        .page.active { display: block; }

        /* 🏰 ROOMS LIST (Vertical, like in the image) */
        .rooms-list { display: flex; flex-direction: column; gap: 10px; padding: 15px; }
        .room-card { background: var(--card); padding: 18px 15px; border-radius: 12px; border: 1px solid var(--border); border-bottom: 3px solid var(--accent); text-align: left; cursor: pointer; }
        .room-card:active { transform: scale(0.98); background: var(--accent); }
        .room-card b { font-size: 16px; margin-left: 10px; }

        /* 😊 EMOJI SYSTEM */
        .emoji-board { 
            position: absolute; bottom: 80px; left: 10px; right: 10px; 
            background: var(--nav); border: 2px solid var(--accent); 
            border-radius: 20px; display: none; padding: 10px; 
            grid-template-columns: repeat(5, 1fr); gap: 10px; 
            max-height: 250px; overflow-y: auto; z-index: 2000;
        }
        .emoji-board.active { display: grid; }
        .emoji-img { width: 100%; aspect-ratio: 1/1; object-fit: contain; cursor: pointer; }
        .admin-plus { border: 2px dashed var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--accent); cursor: pointer; height: 50px; }

        /* 👥 LISTS (ONLINE, PM) */
        .row { display: flex; align-items: center; padding: 12px 15px; background: var(--card); margin: 8px 12px; border-radius: 15px; border: 1px solid var(--border); cursor: pointer; }
        .row img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 15px; object-fit: cover; }
        .row-info b { display: block; font-size: 16px; }
        .row-info span { font-size: 13px; opacity: 0.6; }

        /* 💬 CHAT FOOTER */
        .chat-footer { background: var(--nav); padding: 10px; border-top: 1px solid var(--border); position: relative; }
        .chat-in-box { display: flex; gap: 10px; align-items: center; }
        .chat-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid var(--accent); background: var(--in-bg); color: var(--txt); font-size: 16px; outline: none; }
        .send-btn { background: var(--accent); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }

        /* ❤️ HEARTS (abu's favorite style) */
        .heart { position: fixed; color: #ff3366; font-size: 25px; pointer-events: none; animation: floatUp 5s linear forwards; z-index: 9999; filter: drop-shadow(0 0 10px #ff3366); }
        @keyframes floatUp { 0% { bottom: -20px; opacity: 1; transform: translateX(0); } 100% { bottom: 100%; opacity: 0; transform: translateX(30px) rotate(20deg); } }
    </style>
</head>
<body class="night-mode">

    <div class="navigation">
        <div class="nav-item active" onclick="showPage('homePage', this)">🏠</div>
        <div class="nav-item" onclick="showPage('messengerPage', this)">💬 <div id="pmBadge" class="badge">0</div></div>
        <div class="nav-item" onclick="showPage('friendsPage', this)">💞</div>
        <div class="nav-item" onclick="showPage('onlinePage', this)">👥</div>
        <div class="nav-item" onclick="showPage('profilePage', this)">👤</div>
        <div class="nav-item" onclick="toggleMode()">🌗</div>
    </div>

    <div id="heartsContainer"></div>

    <div class="content-area">
        <div id="homePage" class="page active">
            <h3 style="padding: 15px; color: var(--accent); text-align: center;">🏰 12 სათამაშო ოთახი</h3>
            <div id="roomsList" class="rooms-list"></div>
        </div>

        <div id="messengerPage" class="page">
            <h3 style="padding: 15px;">💬 მიმოწერა</h3>
            <div id="pmHistoryList"></div>
        </div>

        <div id="onlinePage" class="page">
            <h3 style="padding: 15px;">👥 ხალხი საიტზე</h3>
            <div id="onlineList"></div>
        </div>

        <div id="profilePage" class="page">
            <div style="text-align:center; padding-top:40px;">
                <img id="myAva" src="https://i.ibb.co/v3m6y6R/avatar.png" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--accent); cursor:pointer;" onclick="document.getElementById('avaUp').click()">
                <h2 id="profileNick" style="margin-top:10px;">Abu007</h2>
                <input type="text" id="dispStatus" onchange="updateStatus()" placeholder="დაწერე სტატუსი..." style="width:80%; margin-top:15px; padding:12px; border-radius:20px; border:1px solid var(--accent); background:none; color:var(--txt); text-align:center;">
                <p style="margin-top:20px; opacity:0.5;">ID: #<span id="userId">007</span></p>
            </div>
            <input type="file" id="avaUp" hidden onchange="doAvaUpload()">
        </div>

        <div id="roomChatPage" class="page" style="flex-direction: column;">
            <div style="padding: 15px; background: var(--nav); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items:center;">
                <b id="roomTitle">ოთახი</b> 
                <span onclick="showPage('homePage')" style="color:var(--accent); cursor:pointer; font-size:24px;">✖</span>
            </div>
            <div id="roomMsgs" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px;"></div>
            <div class="chat-footer">
                <div id="emojiBoard" class="emoji-board"></div>
                <div class="chat-in-box">
                    <span onclick="toggleEmojiBoard()" style="font-size:32px; cursor:pointer;">😊</span>
                    <input type="text" id="msgInp" class="chat-input" placeholder="დაწერე შეტყობინება...">
                    <button class="send-btn" onclick="sendMsg()">✈</button>
                </div>
            </div>
            <input type="file" id="emojiUp" hidden onchange="uploadEmoji()">
        </div>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        const myNick = localStorage.getItem('nickname') || "Abu007";
        const admins = ["Abu007", "Lukinio", "AdminMafia"];
        let currentRoom = "";

        const ROOMS = [
            {i:"☕", n:"კაფე-ბარი"}, {i:"🎲", n:"ნარდი"}, {i:"🃏", n:"ჯოკერი"}, {i:"💎", n:"VIP საუბრები"},
            {i:"📝", n:"ფორუმი"}, {i:"🛠️", n:"ადმინისტრაცია"}, {i:"😂", n:"იუმორი"}, {i:"🏆", n:"შიფროგრამა"},
            {i:"🎭", n:"გამოძიება"}, {i:"🎵", n:"მუსიკალური"}, {i:"⁉️", n:"ვიქტორინა"}, {i:"🆘", n:"დახმარება"}
        ];

        async function init() {
            document.getElementById('profileNick').innerText = myNick;
            renderRooms();
            loadProfile();
            loadOnline();
            loadPMHistory();
            loadEmojis();
            startHearts();
            
            _s.channel('room-sync').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, () => { if(currentRoom) loadRoomMsgs(); }).subscribe();
            _s.channel('pm-sync').on('postgres_changes', {event:'INSERT', schema:'public', table:'direct_messages'}, () => { loadPMHistory(); }).subscribe();
        }

        function toggleMode() { document.body.classList.toggle('night-mode'); document.body.classList.toggle('day-mode'); }
        function toggleEmojiBoard() { document.getElementById('emojiBoard').classList.toggle('active'); }

        function renderRooms() {
            document.getElementById('roomsList').innerHTML = ROOMS.map(r => `
                <div class="room-card" onclick="openRoom('${r.n}')"><span>${r.i}</span><b>${r.n}</b></div>
            `).join('');
        }

        async function loadProfile() {
            const {data} = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
            if(data) {
                if(data.avatar_url) document.getElementById('myAva').src = data.avatar_url;
                document.getElementById('dispStatus').value = data.status || "";
                document.getElementById('userId').innerText = data.id.substring(0,5);
            }
        }

        async function doAvaUpload() {
            const file = document.getElementById('avaUp').files[0];
            const path = `avatars/${myNick}_${Date.now()}.png`;
            await _s.storage.from('avatars').upload(path, file);
            const {data} = _s.storage.from('avatars').getPublicUrl(path);
            await _s.from('profiles').update({avatar_url: data.publicUrl}).eq('username', myNick);
            document.getElementById('myAva').src = data.publicUrl;
        }

        async function updateStatus() {
            const status = document.getElementById('dispStatus').value;
            await _s.from('profiles').update({ status }).eq('username', myNick);
        }

        async function loadOnline() {
            const {data} = await _s.from('profiles').select('*').limit(30);
            document.getElementById('onlineList').innerHTML = data?.map(u => `
                <div class="row" onclick="alert('${u.username}')">
                    <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}">
                    <div class="row-info"><b>${u.username}</b><span>${u.status || 'ონლაინ'}</span></div>
                </div>
            `).join('') || "";
        }

        async function loadPMHistory() {
            const {data} = await _s.from('direct_messages').select('*').or(`sender.eq.${myNick},receiver.eq.${myNick}`).order('created_at', {ascending:false});
            const list = document.getElementById('pmHistoryList');
            const history = new Set();
            list.innerHTML = "";
            data?.forEach(m => {
                const partner = m.sender === myNick ? m.receiver : m.sender;
                if(!history.has(partner)) {
                    history.add(partner);
                    list.innerHTML += `<div class="row" onclick="alert('PM-ზე გადასვლა ${partner}-თან')">
                        <div class="row-info"><b>${partner}</b><span>${m.text.substring(0,25)}...</span></div>
                    </div>`;
                }
            });
        }

        async function loadEmojis() {
            const {data} = await _s.from('custom_emojis').select('*');
            const board = document.getElementById('emojiBoard');
            let html = admins.includes(myNick) ? `<div class="admin-plus" onclick="document.getElementById('emojiUp').click()">+</div>` : "";
            html += data?.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('') || "";
            board.innerHTML = html;
        }

        function addEmoji(url) { document.getElementById('msgInp').value += ` :img:${url}: `; toggleEmojiBoard(); }

        async function uploadEmoji() {
            const file = document.getElementById('emojiUp').files[0];
            const path = `emojis/${Date.now()}.png`;
            await _s.storage.from('avatars').upload(path, file);
            const {data} = _s.storage.from('avatars').getPublicUrl(path);
            await _s.from('custom_emojis').insert({emoji_url: data.publicUrl});
            loadEmojis();
        }

        function openRoom(name) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = "📡 " + name;
            showPage('roomChatPage');
            loadRoomMsgs();
        }

        async function loadRoomMsgs() {
            if(!currentRoom) return;
            const {data} = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', {ascending:false}).limit(40);
            const box = document.getElementById('roomMsgs');
            box.innerHTML = data?.reverse().map(m => `
                <div style="background:var(--card); padding:10px; border-radius:10px; border:1px solid var(--border); align-self: ${m.username === myNick ? 'flex-end' : 'flex-start'}; max-width: 85%;">
                    <b style="color:var(--accent); font-size:12px;">${escapeHtml(m.username)}</b><br>
                    ${m.text.replace(/:img:(.*?):/g, '<img src="$1" style="width:28px; vertical-align:middle;">')}
                </div>
            `).join('') || "";
            box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const val = document.getElementById('msgInp').value.trim();
            if(!val) return;
            await _s.from('messages').insert({username:myNick, text:val, room_name:currentRoom});
            document.getElementById('msgInp').value = "";
        }

        function escapeHtml(text) { return text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => { p.style.display = 'none'; p.classList.remove('active'); });
            const target = document.getElementById(id);
            target.style.display = (id === 'roomChatPage') ? 'flex' : 'block';
            target.classList.add('active');
            if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
        }

        function startHearts() {
            setInterval(() => {
                const h = document.createElement('div'); h.className='heart'; h.innerText='❤️';
                h.style.left = Math.random() * 90 + '%';
                document.getElementById('heartsContainer').appendChild(h);
                setTimeout(() => h.remove(), 5000);
            }, 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
