<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat App - შინდისფერი გულები</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ========== ანიმაციური გულები ფონზე ========== */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 0;
            pointer-events: none;
            animation: floatHeart 8s ease-in-out forwards;
            opacity: 0.6;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(1);
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg) scale(0.8);
                opacity: 0;
            }
        }

        /* ღამის რეჟიმი - მუქი შავი შინდისფერი ელფერით */
        body.night-mode {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0f12 50%, #0f0508 100%);
        }

        body.night-mode .app-container {
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(2px);
        }

        body.night-mode .top-bar {
            background: linear-gradient(135deg, #1a0f12 0%, #2d1a20 100%);
            border-bottom: 3px solid #b81a3a;
            box-shadow: 0 4px 25px rgba(184, 26, 58, 0.4);
        }

        body.night-mode .nav-btn {
            background: rgba(184, 26, 58, 0.25);
            color: #ffccd0;
            border: 1px solid rgba(184, 26, 58, 0.5);
        }

        body.night-mode .nav-btn:hover {
            background: #b81a3a;
            color: white;
            box-shadow: 0 0 15px rgba(184, 26, 58, 0.6);
        }

        body.night-mode .sidebar {
            background: rgba(26, 15, 18, 0.95);
            border-right: 1px solid #b81a3a;
        }

        body.night-mode .chat-area {
            background: rgba(0, 0, 0, 0.65);
        }

        body.night-mode .message {
            background: rgba(45, 26, 32, 0.9);
            color: #ffe0e0;
            border: 1px solid rgba(184, 26, 58, 0.3);
        }

        body.night-mode .message.my-message {
            background: linear-gradient(135deg, #8b1a3a, #5a1025);
            border: 1px solid #c92a4a;
        }

        body.night-mode .input-area {
            background: rgba(26, 15, 18, 0.95);
            border-top: 1px solid #b81a3a;
        }

        body.night-mode .room-item {
            background: rgba(184, 26, 58, 0.2);
        }

        body.night-mode .room-item:hover {
            background: rgba(184, 26, 58, 0.5);
        }

        body.night-mode .room-item.active {
            background: #b81a3a;
            box-shadow: 0 0 10px rgba(184, 26, 58, 0.5);
        }

        /* დღის რეჟიმი - კრემისფერი შინდისფერი ჩრდილებით */
        body.day-mode {
            background: linear-gradient(135deg, #fff5e8 0%, #ffede0 50%, #ffe4d4 100%);
        }

        body.day-mode .app-container {
            background: rgba(255, 245, 235, 0.88);
            backdrop-filter: blur(2px);
        }

        body.day-mode .top-bar {
            background: linear-gradient(135deg, #fff0e4 0%, #ffe4d4 100%);
            border-bottom: 3px solid #b84a2a;
            box-shadow: 0 4px 25px rgba(184, 74, 42, 0.25);
        }

        body.day-mode .nav-btn {
            background: rgba(184, 74, 42, 0.15);
            color: #5a2a1a;
            border: 1px solid rgba(184, 74, 42, 0.3);
        }

        body.day-mode .nav-btn:hover {
            background: #b84a2a;
            color: white;
            box-shadow: 0 0 15px rgba(184, 74, 42, 0.4);
        }

        body.day-mode .sidebar {
            background: rgba(255, 240, 230, 0.95);
            border-right: 1px solid #d4a58a;
        }

        body.day-mode .chat-area {
            background: rgba(255, 245, 235, 0.85);
        }

        body.day-mode .message {
            background: #fff5ea;
            color: #4a2a1a;
            border: 1px solid #e4c4b0;
        }

        body.day-mode .message.my-message {
            background: linear-gradient(135deg, #ffe4d4, #ffd8c4);
            border: 1px solid #c48a6a;
        }

        body.day-mode .input-area {
            background: rgba(255, 240, 230, 0.95);
            border-top: 1px solid #d4a58a;
        }

        body.day-mode .room-item {
            background: rgba(184, 74, 42, 0.1);
        }

        body.day-mode .room-item:hover {
            background: rgba(184, 74, 42, 0.25);
        }

        body.day-mode .room-item.active {
            background: #b84a2a;
            color: white;
            box-shadow: 0 0 10px rgba(184, 74, 42, 0.4);
        }

        /* ========== მთავარი კონტეინერი ========== */
        .app-container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== ზედა ბარი - ყველა ღილაკი თავმოყრილი ========== */
        .top-bar {
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 20;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo .heart-icon {
            animation: pulse 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .theme-btn {
            background: #b81a3a;
            color: white;
            border: none;
        }

        .theme-btn:hover {
            background: #8a102c;
            transform: translateY(-2px);
        }

        /* ========== მთავარი შიგთავსი ========== */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ========== გვერდითი პანელი ========== */
        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: all 0.3s;
        }

        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid;
        }

        body.night-mode .sidebar-section {
            border-bottom-color: rgba(184, 26, 58, 0.3);
        }

        body.day-mode .sidebar-section {
            border-bottom-color: #e4c4b0;
        }

        .section-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ოთახები */
        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .room-item {
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        /* მომხმარებლები */
        .users-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .user-item:hover {
            background: rgba(184, 26, 58, 0.3);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: #b85c1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: bold;
            font-size: 13px;
        }

        .user-status {
            font-size: 10px;
            opacity: 0.7;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .online { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        .offline { background: #7f8c8d; }

        .user-role-badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 12px;
            margin-top: 2px;
            display: inline-block;
        }

        .role-founder { background: #f1c40f; color: #2c3e50; }
        .role-admin { background: #e74c3c; color: white; }
        .role-member { background: #95a5a6; color: white; }

        /* ========== ჩატის არე ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid;
        }

        body.night-mode .chat-header {
            border-bottom-color: rgba(184, 26, 58, 0.3);
        }

        body.day-mode .chat-header {
            border-bottom-color: #e4c4b0;
        }

        .current-room {
            font-size: 18px;
            font-weight: bold;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 40px;
            transition: all 0.3s;
        }

        .profile-header:hover {
            background: rgba(184, 26, 58, 0.2);
        }

        .profile-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-info-text {
            text-align: right;
        }

        .profile-name {
            font-weight: bold;
            font-size: 14px;
        }

        .profile-status {
            font-size: 11px;
            opacity: 0.7;
        }

        /* შეტყობინებები */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.left {
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.right {
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 11px;
        }

        .msg-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }

        .msg-name {
            font-weight: bold;
        }

        .msg-time {
            font-size: 9px;
            opacity: 0.6;
        }

        .msg-text {
            margin-top: 4px;
            word-break: break-word;
            font-size: 14px;
        }

        .delete-msg {
            position: absolute;
            right: 8px;
            top: 8px;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 12px;
            color: white;
        }

        .message:hover .delete-msg {
            opacity: 1;
        }

        /* შეყვანის ველი */
        .input-area {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        body.night-mode .input-area input {
            background: #2a1a20;
            color: #ffdddd;
        }

        body.day-mode .input-area input {
            background: white;
            color: #3a2a1a;
            border: 1px solid #e4c4b0;
        }

        .emoji-btn, .send-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .emoji-btn {
            background: #b84a2a;
            color: white;
        }

        .send-btn {
            background: #b81a3a;
            color: white;
        }

        .emoji-btn:hover, .send-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        /* ემოჯი პანელი */
        .emoji-panel {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 340px;
            border-radius: 20px;
            padding: 15px;
            display: none;
            z-index: 200;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
        }

        body.night-mode .emoji-panel {
            background: #2a1a20;
            border: 1px solid #b81a3a;
        }

        body.day-mode .emoji-panel {
            background: white;
            border: 1px solid #e4c4b0;
        }

        .emoji-panel.show {
            display: block;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .emoji-item {
            font-size: 28px;
            cursor: pointer;
            text-align: center;
            padding: 5px;
            transition: transform 0.2s;
        }

        .emoji-item:hover {
            transform: scale(1.2);
        }

        /* მოდალები */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            width: 400px;
            max-width: 90%;
            padding: 25px;
            border-radius: 24px;
        }

        body.night-mode .modal-content {
            background: #2a1a20;
            border: 1px solid #b81a3a;
        }

        body.day-mode .modal-content {
            background: white;
            border: 1px solid #e4c4b0;
        }

        .modal-content h3 {
            margin-bottom: 15px;
        }

        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .btn-primary {
            background: #b81a3a;
            color: white;
        }

        .btn-danger {
            background: #c0392b;
            color: white;
        }

        /* პატარა მესინჯერი */
        .mini-messenger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 450px;
            border-radius: 20px;
            display: none;
            flex-direction: column;
            z-index: 300;
            box-shadow: 0 5px 30px rgba(0,0,0,0.4);
        }

        body.night-mode .mini-messenger {
            background: #2a1a20;
            border: 1px solid #b81a3a;
        }

        body.day-mode .mini-messenger {
            background: white;
            border: 1px solid #e4c4b0;
        }

        .mini-messenger.show {
            display: flex;
        }

        .mini-header {
            padding: 12px 16px;
            background: #b81a3a;
            color: white;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mini-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .mini-msg {
            margin: 6px 0;
            padding: 8px 12px;
            border-radius: 16px;
            max-width: 85%;
        }

        .mini-msg.left {
            background: #b84a2a;
            color: white;
        }

        .mini-msg.right {
            background: #b81a3a;
            color: white;
            margin-left: auto;
        }

        .mini-input-area {
            display: flex;
            padding: 12px;
            gap: 8px;
            border-top: 1px solid;
        }

        body.night-mode .mini-input-area {
            border-top-color: #b81a3a;
        }

        .mini-input-area input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 25px;
            border: 1px solid;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 25px;
            margin-bottom: 10px;
            border: 1px solid;
        }

        /* სკროლბარი */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(184, 26, 58, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #b81a3a; border-radius: 10px; }
    </style>
</head>
<body class="night-mode">
    <div class="hearts-bg" id="heartsBg"></div>
    
    <div class="app-container">
        <!-- ზედა ბარი - ყველა ღილაკი -->
        <div class="top-bar">
            <div class="logo-area">
                <div class="logo">
                    <span class="heart-icon">💗</span>
                    <span>ChatApp</span>
                    <span class="heart-icon">💗</span>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" id="profileNavBtn">👤 პროფილი</button>
                <button class="nav-btn" id="roomsNavBtn">📌 ოთახები</button>
                <button class="nav-btn" id="friendsNavBtn">👥 მეგობრები</button>
                <button class="nav-btn" id="usersNavBtn">📋 მომხმარებლები</button>
                <button class="nav-btn" id="onlineNavBtn">🟢 ონლაინ</button>
                <button class="nav-btn theme-btn" id="themeBtn">🌙 ღამის რეჟიმი</button>
            </div>
        </div>

        <!-- მთავარი შიგთავსი -->
        <div class="main-layout">
            <!-- გვერდითი პანელი -->
            <div class="sidebar" id="sidebar">
                <!-- ოთახები -->
                <div class="sidebar-section" id="roomsSection">
                    <div class="section-title">📌 ოთახები (12)</div>
                    <div class="rooms-list" id="roomsList"></div>
                </div>

                <!-- ონლაინ მომხმარებლები -->
                <div class="sidebar-section" id="onlineSection">
                    <div class="section-title">🟢 ონლაინ მომხმარებლები</div>
                    <div class="users-list" id="onlineUsersList"></div>
                </div>

                <!-- ყველა მომხმარებელი -->
                <div class="sidebar-section" id="allUsersSection" style="display: none;">
                    <div class="section-title">👥 ყველა მომხმარებელი</div>
                    <input type="text" id="searchUsers" class="search-input" placeholder="🔍 ძებნა...">
                    <div class="users-list" id="allUsersList"></div>
                </div>
            </div>

            <!-- ჩატის არე -->
            <div class="chat-area">
                <div class="chat-header">
                    <div class="current-room" id="currentRoomName">ოთახი 1</div>
                    <div class="profile-header" id="profileHeaderBtn">
                        <div class="profile-info-text">
                            <div class="profile-name" id="headerUserName">მომხმარებელი</div>
                            <div class="profile-status" id="headerUserStatus">😊 აქტიური</div>
                        </div>
                        <img class="profile-avatar" id="headerAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23b84a2a'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='white' font-size='40'%3E👤%3C/text%3E%3C/svg%3E">
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer"></div>

                <div class="input-area">
                    <button class="emoji-btn" id="emojiBtn">😊</button>
                    <input type="text" id="messageInput" placeholder="დაწერე შეტყობინება...">
                    <button class="send-btn" id="sendBtn">📤 გაგზავნა</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ემოჯი პანელი -->
    <div class="emoji-panel" id="emojiPanel">
        <div class="emoji-grid" id="emojiGrid"></div>
        <div class="modal-buttons" id="emojiAdminBtns" style="margin-top: 12px; display: none;">
            <button id="addEmojiBtn" class="btn-primary">➕ დაამატე</button>
            <button id="removeEmojiBtn" class="btn-danger">❌ წაშალე</button>
        </div>
    </div>

    <!-- პროფილის მოდალი -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h3>💗 ჩემი პროფილი</h3>
            <img id="profileModalAvatar" style="width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 15px; display: block; object-fit: cover;">
            <input type="file" id="photoUpload" accept="image/*">
            <input type="text" id="profileNickname" placeholder="ნიკნეიმი">
            <textarea id="profileStatus" rows="2" placeholder="სტატუსი..."></textarea>
            <div class="modal-buttons">
                <button id="saveProfileBtn" class="btn-primary">💾 შენახვა</button>
                <button id="closeProfileBtn">❌ დახურვა</button>
            </div>
        </div>
    </div>

    <!-- მეგობრების მოდალი -->
    <div class="modal" id="friendsModal">
        <div class="modal-content">
            <h3>👥 ჩემი მეგობრები</h3>
            <input type="text" id="friendSearchInput" class="search-input" placeholder="🔍 მოძებნე მეგობარი...">
            <div id="friendsListModal" style="max-height: 350px; overflow-y: auto; margin: 15px 0;"></div>
            <button id="closeFriendsBtn" class="btn-primary">დახურვა</button>
        </div>
    </div>

    <!-- მეგობრის მოთხოვნა -->
    <div class="modal" id="friendRequestModal">
        <div class="modal-content">
            <h3>💌 მეგობრის მოთხოვნა</h3>
            <p id="friendRequestText"></p>
            <div class="modal-buttons">
                <button id="acceptFriendBtn" class="btn-primary">✅ დასტური</button>
                <button id="rejectFriendBtn" class="btn-danger">❌ უარი</button>
            </div>
        </div>
    </div>

    <!-- დაბლოკვის მოდალი -->
    <div class="modal" id="banModal">
        <div class="modal-content">
            <h3>🚫 მომხმარებლის დაბლოკვა</h3>
            <p id="banUserName"></p>
            <textarea id="banReason" rows="3" placeholder="დაბლოკვის მიზეზი..."></textarea>
            <div class="modal-buttons">
                <button id="confirmBanBtn" class="btn-danger">🔒 დაბლოკვა</button>
                <button id="cancelBanBtn">გაუქმება</button>
            </div>
        </div>
    </div>

    <!-- როლის მინიჭება -->
    <div class="modal" id="roleModal">
        <div class="modal-content">
            <h3>👑 როლის მინიჭება</h3>
            <p id="roleUserName"></p>
            <select id="roleSelect">
                <option value="member">👥 წევრი</option>
                <option value="admin">🛡️ ადმინი</option>
                <option value="founder">👑 დამფუძნებელი</option>
            </select>
            <div class="modal-buttons">
                <button id="assignRoleBtn" class="btn-primary">მინიჭება</button>
                <button id="closeRoleBtn">გაუქმება</button>
            </div>
        </div>
    </div>

    <!-- პატარა მესინჯერი -->
    <div class="mini-messenger" id="miniMessenger">
        <div class="mini-header">
            <span id="miniFriendName"></span>
            <button id="closeMiniBtn" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">✕</button>
        </div>
        <div class="mini-messages" id="miniMessages"></div>
        <div class="mini-input-area">
            <input type="text" id="miniInput" placeholder="დაწერე...">
            <button id="miniSendBtn" style="background: #b81a3a; border: none; border-radius: 25px; padding: 8px 16px; color: white;">გაგზავნა</button>
        </div>
    </div>

    <script>
        // ==================== მონაცემები ====================
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let rooms = {};
        let customEmojis = JSON.parse(localStorage.getItem('customEmojis')) || ['😊', '😂', '❤️', '😍', '🎉', '🔥', '👍', '🙏', '🥰', '😢', '😡', '🤔', '💗', '💕', '💖'];
        let privateMessages = JSON.parse(localStorage.getItem('privateMessages')) || {};
        let currentRoom = 1;
        let selectedFriend = null;
        let pendingRequestUser = null;

        // 12 ოთახის შექმნა
        for (let i = 1; i <= 12; i++) {
            rooms[i] = {
                id: i,
                name: `ოთახი ${i}`,
                messages: JSON.parse(localStorage.getItem(`room_${i}_messages`)) || [],
                bannedUsers: JSON.parse(localStorage.getItem(`room_${i}_banned`)) || []
            };
        }

        // მომხმარებლის შექმნა
        if (!currentUser) {
            const newId = 'user_' + Date.now();
            currentUser = {
                id: newId,
                name: 'მომხმარებელი_' + Math.floor(Math.random() * 1000),
                avatar: '',
                status: '💗 აქტიური 💗',
                role: users.length === 0 ? 'founder' : 'member',
                friends: []
            };
            users.push(currentUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
        }

        // ==================== გულების ანიმაცია ====================
        function startHeartAnimation() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 35 + 20) + 'px';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                heart.style.animationDelay = Math.random() * 2 + 's';
                document.getElementById('heartsBg').appendChild(heart);
                setTimeout(() => heart.remove(), 10000);
            }, 1200);
        }

        // ==================== რენდერ ფუნქციები ====================
        function renderRooms() {
            const container = document.getElementById('roomsList');
            container.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                container.innerHTML += `
                    <div class="room-item ${currentRoom === i ? 'active' : ''}" onclick="changeRoom(${i})">
                        📌 ${rooms[i].name}
                    </div>
                `;
            }
        }

        window.changeRoom = function(roomId) {
            currentRoom = roomId;
            document.getElementById('currentRoomName').innerHTML = `💗 ${rooms[roomId].name} 💗`;
            renderRooms();
            renderMessages();
        };

        function renderMessages() {
            const room = rooms[currentRoom];
            const container = document.getElementById('messagesContainer');
            
            container.innerHTML = room.messages.map(msg => `
                <div class="message ${msg.userId === currentUser.id ? 'right' : 'left'}">
                    <div class="message-header">
                        <img class="msg-avatar" src="${msg.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b84a2a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                        <span class="msg-name">${escapeHtml(msg.userName)}</span>
                        <span class="msg-time">${msg.time}</span>
                    </div>
                    <div class="msg-text">${escapeHtml(msg.text)}</div>
                    ${(currentUser.role === 'admin' || currentUser.role === 'founder') ? `<span class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</span>` : ''}
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        window.deleteMessage = function(messageId) {
            if (currentUser.role === 'admin' || currentUser.role === 'founder') {
                const room = rooms[currentRoom];
                room.messages = room.messages.filter(m => m.id !== messageId);
                localStorage.setItem(`room_${currentRoom}_messages`, JSON.stringify(room.messages));
                renderMessages();
            }
        };

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const room = rooms[currentRoom];
            if (room.bannedUsers.includes(currentUser.id)) {
                alert('დაბლოკილი ხარ ამ ოთახში!');
                return;
            }
            
            const newMessage = {
                id: Date.now(),
                userId: currentUser.id,
                userName: currentUser.name,
                avatar: currentUser.avatar || '',
                text: text,
                time: new Date().toLocaleTimeString()
            };
            
            room.messages.push(newMessage);
            localStorage.setItem(`room_${currentRoom}_messages`, JSON.stringify(room.messages));
            input.value = '';
            renderMessages();
        }

        function renderUsers() {
            const onlineUsers = users.filter(u => u.id !== currentUser.id);
            const onlineContainer = document.getElementById('onlineUsersList');
            onlineContainer.innerHTML = onlineUsers.map(user => `
                <div class="user-item" onclick="openUserActions('${user.id}')">
                    <img class="user-avatar" src="${user.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b84a2a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name)}</div>
                        <div class="user-status">${user.status || 'აქტიური'}</div>
                        <span class="user-role-badge role-${user.role}">${user.role === 'founder' ? '👑 დამფუძნებელი' : user.role === 'admin' ? '🛡️ ადმინი' : '👤 წევრი'}</span>
                    </div>
                    <span class="online-dot online"></span>
                </div>
            `).join('');
            
            const searchTerm = document.getElementById('searchUsers')?.value.toLowerCase() || '';
            const allUsers = users.filter(u => u.id !== currentUser.id && u.name.toLowerCase().includes(searchTerm));
            const allContainer = document.getElementById('allUsersList');
            allContainer.innerHTML = allUsers.map(user => `
                <div class="user-item" onclick="openUserActions('${user.id}')">
                    <img class="user-avatar" src="${user.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b84a2a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name)}</div>
                        <div class="user-status">${user.status || 'აქტიური'}</div>
                        <span class="user-role-badge role-${user.role}">${user.role === 'founder' ? '👑 დამფუძნებელი' : user.role === 'admin' ? '🛡️ ადმინი' : '👤 წევრი'}</span>
                    </div>
                    <span class="online-dot online"></span>
                </div>
            `).join('');
        }

        window.openUserActions = function(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;
            
            let actions = ['💬 პირადი მესიჯი'];
            if (currentUser.role === 'founder') {
                actions.push('👑 როლის მინიჭება');
            }
            if (currentUser.role === 'admin' || currentUser.role === 'founder') {
                actions.push('🚫 დაბლოკვა');
            }
            if (!currentUser.friends.includes(user.id)) {
                actions.push('👥 მეგობრად დამატება');
            }
            
            const action = prompt(`💗 ${user.name} - აირჩიე მოქმედება:\n${actions.map((a, i) => `${i+1}. ${a}`).join('\n')}`);
            
            if (action === '1') {
                openMiniMessenger(user);
            } else if (action === '2' && actions[1] === '👑 როლის მინიჭება') {
                openRoleModal(user);
            } else if ((action === '2' && actions[1] === '🚫 დაბლოკვა') || (action === '3' && actions[2] === '🚫 დაბლოკვა')) {
                openBanModal(user);
            } else if (action === (actions.length) && actions[actions.length-1] === '👥 მეგობრად დამატება') {
                sendFriendRequest(user);
            }
        };
        
        function openBanModal(user) {
            document.getElementById('banUserName').innerHTML = `🔒 ${user.name} - ის დაბლოკვა`;
            document.getElementById('banModal').classList.add('show');
            document.getElementById('confirmBanBtn').onclick = () => {
                const reason = document.getElementById('banReason').value;
                const room = rooms[currentRoom];
                if (!room.bannedUsers.includes(user.id)) {
                    room.bannedUsers.push(user.id);
                    localStorage.setItem(`room_${currentRoom}_banned`, JSON.stringify(room.bannedUsers));
                    alert(`✅ ${user.name} დაბლოკილია!\n📝 მიზეზი: ${reason || 'არ არის მითითებული'}`);
                }
                document.getElementById('banModal').classList.remove('show');
                document.getElementById('banReason').value = '';
            };
            document.getElementById('cancelBanBtn').onclick = () => document.getElementById('banModal').classList.remove('show');
        }
        
        function openRoleModal(user) {
            document.getElementById('roleUserName').innerHTML = `👑 ${user.name} - როლის მინიჭება`;
            document.getElementById('roleModal').classList.add('show');
            document.getElementById('assignRoleBtn').onclick = () => {
                user.role = document.getElementById('roleSelect').value;
                localStorage.setItem('users', JSON.stringify(users));
                alert(`✅ ${user.name} ახლა არის ${user.role === 'founder' ? '👑 დამფუძნებელი' : user.role === 'admin' ? '🛡️ ადმინი' : '👤 წევრი'}`);
                document.getElementById('roleModal').classList.remove('show');
                renderUsers();
            };
            document.getElementById('closeRoleBtn').onclick = () => document.getElementById('roleModal').classList.remove('show');
        }
        
        function sendFriendRequest(user) {
            if (currentUser.friends.includes(user.id)) {
                alert('უკვე მეგობარი ხართ! 💗');
                return;
            }
            pendingRequestUser = user;
            document.getElementById('friendRequestText').innerHTML = `💗 გსურს დაამატო ${user.name} მეგობრად? 💗`;
            document.getElementById('friendRequestModal').classList.add('show');
        }
        
        function openMiniMessenger(user) {
            selectedFriend = user;
            document.getElementById('miniFriendName').innerHTML = `💗 ${user.name} 💗`;
            document.getElementById('miniMessenger').classList.add('show');
            renderMiniMessages();
        }
        
        function renderMiniMessages() {
            const chatId = [currentUser.id, selectedFriend.id].sort().join('-');
            const messages = privateMessages[chatId] || [];
            const container = document.getElementById('miniMessages');
            container.innerHTML = messages.map(msg => `
                <div class="mini-msg ${msg.from === currentUser.id ? 'right' : 'left'}">
                    <small>${new Date(msg.time).toLocaleTimeString()}</small>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function sendPrivateMessage() {
            const input = document.getElementById('miniInput');
            const text = input.value.trim();
            if (!text || !selectedFriend) return;
            const chatId = [currentUser.id, selectedFriend.id].sort().join('-');
            if (!privateMessages[chatId]) privateMessages[chatId] = [];
            privateMessages[chatId].push({
                from: currentUser.id,
                to: selectedFriend.id,
                text: text,
                time: Date.now()
            });
            localStorage.setItem('privateMessages', JSON.stringify(privateMessages));
            input.value = '';
            renderMiniMessages();
        }
        
        function renderEmojis() {
            const grid = document.getElementById('emojiGrid');
            grid.innerHTML = customEmojis.map(emoji => `<div class="emoji-item" onclick="addEmoji('${emoji}')">${emoji}</div>`).join('');
            const adminBtns = document.getElementById('emojiAdminBtns');
            if (currentUser.role === 'admin' || currentUser.role === 'founder') {
                adminBtns.style.display = 'flex';
            } else {
                adminBtns.style.display = 'none';
            }
        }
        
        window.addEmoji = function(emoji) {
            document.getElementById('messageInput').value += emoji;
            document.getElementById('emojiPanel').classList.remove('show');
        };
        
        function updateProfileUI() {
            document.getElementById('headerUserName').innerHTML = currentUser.name;
            document.getElementById('headerUserStatus').innerHTML = currentUser.status || '💗 აქტიური 💗';
            if (currentUser.avatar) {
                document.getElementById('headerAvatar').src = currentUser.avatar;
                document.getElementById('profileModalAvatar').src = currentUser.avatar;
            }
            document.getElementById('profileNickname').value = currentUser.name;
            document.getElementById('profileStatus').value = currentUser.status || '';
        }
        
        function saveProfile() {
            const newName = document.getElementById('profileNickname').value.trim();
            if (newName) currentUser.name = newName;
            currentUser.status = document.getElementById('profileStatus').value;
            const fileInput = document.getElementById('photoUpload');
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentUser.avatar = e.target.result;
                    saveUserData();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                saveUserData();
            }
        }
        
        function saveUserData() {
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) users[userIndex] = currentUser;
            localStorage.setItem('users', JSON.stringify(users));
            updateProfileUI();
            renderUsers();
            renderMessages();
            document.getElementById('profileModal').classList.remove('show');
        }
        
        function openFriendsModal() {
            const friends = users.filter(u => currentUser.friends.includes(u.id));
            const container = document.getElementById('friendsListModal');
            container.innerHTML = friends.map(friend => `
                <div class="user-item" onclick="openMiniMessengerById('${friend.id}')">
                    <img class="user-avatar" src="${friend.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b84a2a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(friend.name)}</div>
                        <div class="user-status">${friend.status || 'აქტიური'}</div>
                    </div>
                </div>
            `).join('');
            if (friends.length === 0) container.innerHTML = '<p style="text-align:center; padding:20px;">💗 ჯერ არ გყავს მეგობრები 💗</p>';
            document.getElementById('friendsModal').classList.add('show');
        }
        
        window.openMiniMessengerById = function(userId) {
            const user = users.find(u => u.id === userId);
            if (user) {
                document.getElementById('friendsModal').classList.remove('show');
                openMiniMessenger(user);
            }
        };
        
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.classList.contains('night-mode')) {
                body.classList.remove('night-mode');
                body.classList.add('day-mode');
                btn.innerHTML = '☀️ დღის რეჟიმი';
            } else {
                body.classList.remove('day-mode');
                body.classList.add('night-mode');
                btn.innerHTML = '🌙 ღამის რეჟიმი';
            }
        }
        
        function toggleSidebarSections() {
            const roomsSection = document.getElementById('roomsSection');
            const onlineSection = document.getElementById('onlineSection');
            const allUsersSection = document.getElementById('allUsersSection');
            
            document.getElementById('roomsNavBtn').onclick = () => {
                roomsSection.style.display = 'block';
                onlineSection.style.display = 'block';
                allUsersSection.style.display = 'none';
            };
            document.getElementById('onlineNavBtn').onclick = () => {
                roomsSection.style.display = 'block';
                onlineSection.style.display = 'block';
                allUsersSection.style.display = 'none';
            };
            document.getElementById('usersNavBtn').onclick = () => {
                roomsSection.style.display = 'block';
                onlineSection.style.display = 'block';
                allUsersSection.style.display = 'block';
            };
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ==================== Event Listeners ====================
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        document.getElementById('emojiBtn').onclick = () => document.getElementById('emojiPanel').classList.toggle('show');
        document.getElementById('addEmojiBtn').onclick = () => {
            const emoji = prompt('💗 შეიყვანეთ ახალი ემოჯი:');
            if (emoji && !customEmojis.includes(emoji)) {
                customEmojis.push(emoji);
                localStorage.setItem('customEmojis', JSON.stringify(customEmojis));
                renderEmojis();
            }
        };
        document.getElementById('removeEmojiBtn').onclick = () => {
            const emoji = prompt('💗 ჩაწერეთ ემოჯი რომლის წაშლაც გსურთ:');
            const index = customEmojis.indexOf(emoji);
            if (index !== -1) {
                customEmojis.splice(index, 1);
                localStorage.setItem('customEmojis', JSON.stringify(customEmojis));
                renderEmojis();
            }
        };
        document.getElementById('profileNavBtn').onclick = () => document.getElementById('profileModal').classList.add('show');
        document.getElementById('profileHeaderBtn').onclick = () => document.getElementById('profileModal').classList.add('show');
        document.getElementById('saveProfileBtn').onclick = saveProfile;
        document.getElementById('closeProfileBtn').onclick = () => document.getElementById('profileModal').classList.remove('show');
        document.getElementById('themeBtn').onclick = toggleTheme;
        document.getElementById('friendsNavBtn').onclick = openFriendsModal;
        document.getElementById('closeFriendsBtn').onclick = () => document.getElementById('friendsModal').classList.remove('show');
        document.getElementById('acceptFriendBtn').onclick = () => {
            if (pendingRequestUser && !currentUser.friends.includes(pendingRequestUser.id)) {
                currentUser.friends.push(pendingRequestUser.id);
                saveUserData();
                alert(`💗 ${pendingRequestUser.name} დაემატა მეგობრებში! 💗`);
            }
            document.getElementById('friendRequestModal').classList.remove('show');
            pendingRequestUser = null;
        };
        document.getElementById('rejectFriendBtn').onclick = () => {
            document.getElementById('friendRequestModal').classList.remove('show');
            pendingRequestUser = null;
        };
        document.getElementById('closeMiniBtn').onclick = () => document.getElementById('miniMessenger').classList.remove('show');
        document.getElementById('miniSendBtn').onclick = sendPrivateMessage;
        document.getElementById('miniInput').onkeypress = (e) => { if (e.key === 'Enter') sendPrivateMessage(); };
        document.getElementById('searchUsers').oninput = renderUsers;
        document.getElementById('friendSearchInput').oninput = function() {
            const search = this.value.toLowerCase();
            const friends = users.filter(u => currentUser.friends.includes(u.id) && u.name.toLowerCase().includes(search));
            const container = document.getElementById('friendsListModal');
            container.innerHTML = friends.map(friend => `
                <div class="user-item" onclick="openMiniMessengerById('${friend.id}')">
                    <img class="user-avatar" src="${friend.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b84a2a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(friend.name)}</div>
                    </div>
                </div>
            `).join('');
            if (friends.length === 0) container.innerHTML = '<p style="text-align:center; padding:20px;">💗 მეგობარი ვერ მოიძებნა 💗</p>';
        };
        
        // ==================== ინიციალიზაცია ====================
        startHeartAnimation();
        renderRooms();
        renderUsers();
        renderMessages();
        renderEmojis();
        updateProfileUI();
        toggleSidebarSections();
        document.getElementById('currentRoomName').innerHTML = `💗 ${rooms[currentRoom].name} 💗`;
    </script>
</body>
</html>
