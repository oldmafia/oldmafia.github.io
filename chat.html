<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Old Mafia - ჩატი</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
        body {
            background: #0a0508;
            color: #f0e6e8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* ნავიგაცია */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            background: #120a0c;
            padding: 10px 0;
            border-bottom: 2px solid #8b0000;
        }
        .nav-btn {
            font-size: 24px;
            background: none;
            border: none;
            color: #aa8a8a;
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 30px;
        }
        .nav-btn.active {
            color: #8b0000;
            background: rgba(139,0,0,0.2);
        }
        
        /* გვერდები */
        .pages {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
            padding: 15px;
        }
        .page.active {
            display: block;
        }
        
        /* სათაურები */
        .section-title {
            font-size: 18px;
            margin-bottom: 12px;
            color: #8b0000;
            border-left: 3px solid #8b0000;
            padding-left: 10px;
        }
        
        /* ოთახები */
        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .room-card {
            background: #1a0f12;
            padding: 14px;
            border-radius: 10px;
            border-left: 4px solid #8b0000;
            cursor: pointer;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .room-card:active { background: #8b0000; }
        .room-icon { font-size: 24px; }
        
        /* ჩატი */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-header {
            background: #1a0f12;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .close-btn {
            color: #8b0000;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .message {
            background: #1a0f12;
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 80%;
            align-self: flex-start;
        }
        .message.own {
            align-self: flex-end;
            background: #8b0000;
        }
        .message-name {
            font-size: 11px;
            font-weight: bold;
            color: #8b0000;
        }
        .message.own .message-name { color: white; }
        .message-time {
            font-size: 9px;
            opacity: 0.6;
            margin-left: 5px;
        }
        .message-text {
            font-size: 14px;
            margin-top: 4px;
            word-break: break-word;
        }
        
        .chat-input-area {
            background: #1a0f12;
            padding: 8px;
            display: flex;
            gap: 8px;
            border-radius: 12px;
            margin-top: 8px;
        }
        .chat-input {
            flex: 1;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #8b0000;
            background: #1f1216;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .send-btn {
            background: #8b0000;
            border: none;
            color: white;
            width: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        
        /* მომხმარებლები */
        .user-item {
            background: #1a0f12;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }
        
        /* პროფილი */
        .profile-card {
            text-align: center;
            padding: 20px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto;
            cursor: pointer;
        }
        .status-input {
            width: 80%;
            margin-top: 15px;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #8b0000;
            background: #1f1216;
            color: white;
            text-align: center;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
        }
        .notification {
            position: fixed;
            top: 70px;
            right: 10px;
            background: #8b0000;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            z-index: 5000;
        }
        .heart {
            position: fixed;
            bottom: 0;
            font-size: 28px;
            pointer-events: none;
            animation: floatUp 5s forwards;
            z-index: 9999;
        }
        @keyframes floatUp {
            0% { bottom: 0; opacity: 1; transform: scale(1); }
            100% { bottom: 100%; opacity: 0; transform: translateX(40px); }
        }
        button { touch-action: manipulation; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="online">👥</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeToggle">🌙</button>
    </div>
    
    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 12 სათამაშო ოთახი</div>
            <div id="roomsList" class="rooms-list"></div>
        </div>
        
        <div id="messagesPage" class="page">
            <div class="section-title">💬 პირადი მიმოწერა</div>
            <div id="pmList" class="empty-state">მიმოწერა ცარიელია</div>
        </div>
        
        <div id="onlinePage" class="page">
            <div class="section-title">👥 მომხმარებლები</div>
            <div id="onlineList"></div>
        </div>
        
        <div id="profilePage" class="page">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()">👤</div>
                <h2 id="profileName"></h2>
                <input type="text" id="statusInput" class="status-input" placeholder="სტატუსი...">
                <button onclick="saveStatus()" style="margin-top:10px; background:#8b0000; color:white; padding:10px 20px; border-radius:25px; border:none;">💾 შენახვა</button>
                <input type="file" id="avatarInput" hidden accept="image/*" onchange="uploadAvatar(this)">
            </div>
        </div>
        
        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-header">
                    <span id="chatRoomName">ოთახი</span>
                    <button class="close-btn" onclick="closeChat()">✕</button>
                </div>
                <div id="chatMessages" class="messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>
    <div id="hearts"></div>

    <script>
        // ============ მომხმარებელი ============
        let currentUser = localStorage.getItem('mafia_user');
        if (!currentUser || currentUser === "null") {
            currentUser = localStorage.getItem('nickname');
            if (!currentUser || currentUser === "null") currentUser = "Abu007";
            localStorage.setItem('mafia_user', currentUser);
        }
        console.log("✅ მომხმარებელი:", currentUser);
        
        let currentRoom = null;
        let currentPMUser = null;
        const OWNER = "Abu007";
        
        let users = [];
        let messages = []; // ყველა შეტყობინება ერთ მასივში
        let privateMessages = [];
        
        const ROOMS = [
            { icon: "☕", name: "კაფე-ბარი" }, { icon: "🎲", name: "ნარდი" }, { icon: "🃏", name: "ჯოკერი" },
            { icon: "💎", name: "VIP" }, { icon: "📝", name: "ფორუმი" }, { icon: "🛠️", name: "ადმინები" },
            { icon: "😂", name: "იუმორი" }, { icon: "🏆", name: "შიფროგრამა" }, { icon: "🎭", name: "გამოძიება" },
            { icon: "🎵", name: "მუსიკა" }, { icon: "⁉️", name: "ვიქტორინა" }, { icon: "🆘", name: "დახმარება" }
        ];
        
        function loadData() {
            // მომხმარებლები
            let savedUsers = localStorage.getItem('mafia_users');
            if (savedUsers) users = JSON.parse(savedUsers);
            else users = [
                { username: "Abu007", status: "👑 დამფუძნებელი", avatar: null },
                { username: "Lukinio", status: "🔧 ადმინი", avatar: null },
                { username: "Giorgi", status: "ონლაინ", avatar: null }
            ];
            
            // შეტყობინებები - ყველა ერთად
            let savedMessages = localStorage.getItem('mafia_messages');
            if (savedMessages) messages = JSON.parse(savedMessages);
            else messages = [];
            
            // პირადი შეტყობინებები
            let savedPM = localStorage.getItem('mafia_pm');
            if (savedPM) privateMessages = JSON.parse(savedPM);
            else privateMessages = [];
            
            if (!users.find(u => u.username === currentUser)) {
                users.push({ username: currentUser, status: "ახალი მოთამაშე", avatar: null });
                saveUsers();
            }
            
            document.getElementById('profileName').innerHTML = currentUser;
            let user = users.find(u => u.username === currentUser);
            if (user?.avatar) {
                document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar})`;
                document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                document.getElementById('profileAvatar').innerHTML = '';
            }
            if (user?.status) document.getElementById('statusInput').value = user.status;
        }
        
        function saveUsers() { localStorage.setItem('mafia_users', JSON.stringify(users)); }
        function saveMessages() { localStorage.setItem('mafia_messages', JSON.stringify(messages)); }
        function savePM() { localStorage.setItem('mafia_pm', JSON.stringify(privateMessages)); }
        
        // ============ ოთახები ============
        function renderRooms() {
            let html = '';
            ROOMS.forEach(room => {
                html += `<div class="room-card" onclick="openRoom('${room.name}')">
                    <span class="room-icon">${room.icon}</span>
                    <span>${room.name}</span>
                </div>`;
            });
            document.getElementById('roomsList').innerHTML = html;
        }
        
        function openRoom(roomName) {
            currentRoom = roomName;
            document.getElementById('chatRoomName').innerHTML = `📡 ${roomName}`;
            showPage('chat');
            renderMessages();
        }
        
        function closeChat() { currentRoom = null; showPage('home'); }
        
        // ============ შეტყობინებები ============
        function renderMessages() {
            let container = document.getElementById('chatMessages');
            let roomMessages = messages.filter(m => m.room === currentRoom).sort((a,b) => new Date(a.time) - new Date(b.time));
            
            if (roomMessages.length === 0) {
                container.innerHTML = '<div class="empty-state">💬 შეტყობინებები არ არის</div>';
                return;
            }
            
            let html = '';
            roomMessages.forEach(msg => {
                let isOwn = msg.username === currentUser;
                let time = new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                html += `<div class="message ${isOwn ? 'own' : ''}">
                    <div><span class="message-name">${escapeHtml(msg.username)}</span><span class="message-time">${time}</span></div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                </div>`;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMessage() {
            let input = document.getElementById('messageInput');
            let text = input.value.trim();
            if (!text || !currentRoom) return;
            
            messages.push({
                id: Date.now(),
                username: currentUser,
                text: text,
                time: new Date().toISOString(),
                room: currentRoom
            });
            saveMessages();
            input.value = '';
            renderMessages();
        }
        
        // ============ მომხმარებლები ============
        function renderOnlineUsers() {
            let container = document.getElementById('onlineList');
            let html = '';
            users.filter(u => u.username !== currentUser).forEach(user => {
                html += `<div class="user-item" onclick="startPM('${user.username}')">
                    <div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div><b>${escapeHtml(user.username)}</b></div><div style="font-size:12px;">${escapeHtml(user.status)}</div></div>
                </div>`;
            });
            container.innerHTML = html || '<div class="empty-state">მომხმარებლები არ არიან</div>';
        }
        
        // ============ პირადი მიმოწერა ============
        function startPM(username) {
            if (username === currentUser) { showNotification('საკუთარ თავთან არ შეიძლება'); return; }
            if (currentPMUser === username && document.getElementById('pmContainer').innerHTML) { closePM(); return; }
            currentPMUser = username;
            renderPMChat();
        }
        
        function renderPMChat() {
            if (!currentPMUser) return;
            let pmMsgs = privateMessages.filter(m => 
                (m.from === currentUser && m.to === currentPMUser) || 
                (m.from === currentPMUser && m.to === currentUser)
            ).sort((a,b) => new Date(a.time) - new Date(b.time));
            
            let msgHtml = pmMsgs.map(msg => `
                <div style="background:${msg.from === currentUser ? '#8b0000' : '#1a0f12'}; padding:6px 10px; border-radius:12px; margin-bottom:5px; max-width:85%; align-self:${msg.from === currentUser ? 'flex-end' : 'flex-start'};">
                    <div style="font-size:10px; opacity:0.7;">${new Date(msg.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
            
            let pmWindow = `
                <div id="pmWindow" style="position:fixed; bottom:10px; right:10px; width:300px; background:#1a0f12; border:2px solid #8b0000; border-radius:15px; z-index:2000;">
                    <div style="background:#8b0000; padding:10px; border-radius:12px 12px 0 0; display:flex; justify-content:space-between;">
                        <span>💬 ${escapeHtml(currentPMUser)}</span>
                        <button onclick="closePM()" style="background:none; border:none; color:white; font-size:18px;">✕</button>
                    </div>
                    <div id="pmMessages" style="height:300px; overflow-y:auto; padding:8px; display:flex; flex-direction:column;">${msgHtml || '<div style="text-align:center; padding:20px;">მიმოწერა ცარიელია</div>'}</div>
                    <div style="display:flex; padding:8px; gap:5px; border-top:1px solid #4a1a2a;">
                        <input type="text" id="pmInput" style="flex:1; padding:8px; border-radius:20px; border:1px solid #8b0000; background:#1f1216; color:white;" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()">
                        <button onclick="sendPM()" style="background:#8b0000; border:none; color:white; width:40px; border-radius:50%;">➤</button>
                    </div>
                </div>
            `;
            let old = document.getElementById('pmWindow');
            if (old) old.remove();
            document.body.insertAdjacentHTML('beforeend', pmWindow);
            let pmDiv = document.getElementById('pmMessages');
            if (pmDiv) pmDiv.scrollTop = pmDiv.scrollHeight;
            document.getElementById('pmInput')?.focus();
        }
        
        function closePM() {
            let el = document.getElementById('pmWindow');
            if (el) el.remove();
            currentPMUser = null;
        }
        
        function sendPM() {
            let input = document.getElementById('pmInput');
            let text = input.value.trim();
            if (!text || !currentPMUser) return;
            privateMessages.push({
                id: Date.now(),
                from: currentUser,
                to: currentPMUser,
                text: text,
                time: new Date().toISOString()
            });
            savePM();
            input.value = '';
            renderPMChat();
            renderPrivateChatsList();
        }
        
        function renderPrivateChatsList() {
            let myPMs = privateMessages.filter(m => m.from === currentUser || m.to === currentUser);
            let usersSet = new Set();
            myPMs.forEach(m => {
                let other = m.from === currentUser ? m.to : m.from;
                usersSet.add(other);
            });
            let container = document.getElementById('pmList');
            if (usersSet.size === 0) {
                container.innerHTML = '<div class="empty-state">მიმოწერა ცარიელია</div>';
                return;
            }
            let html = '';
            usersSet.forEach(username => {
                let lastMsg = myPMs.filter(m => (m.from === username || m.to === username)).pop();
                html += `<div class="user-item" onclick="startPM('${username}')">
                    <div class="user-avatar">${username.charAt(0).toUpperCase()}</div>
                    <div><div><b>${escapeHtml(username)}</b></div><div style="font-size:11px;">${lastMsg ? lastMsg.text.substring(0,30) : '...'}</div></div>
                </div>`;
            });
            container.innerHTML = html;
        }
        
        // ============ პროფილი ============
        function saveStatus() {
            let status = document.getElementById('statusInput').value;
            let user = users.find(u => u.username === currentUser);
            if (user) user.status = status;
            saveUsers();
            showNotification('✅ სტატუსი განახლდა!');
            renderOnlineUsers();
        }
        
        function uploadAvatar(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    let user = users.find(u => u.username === currentUser);
                    if (user) user.avatar = e.target.result;
                    saveUsers();
                    document.getElementById('profileAvatar').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                    document.getElementById('profileAvatar').innerHTML = '';
                    renderOnlineUsers();
                    showNotification('✅ ავატარი განახლდა!');
                };
                reader.readAsDataURL(file);
            }
        }
        
        // ============ დამხმარე ============
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-page') === pageName) btn.classList.add('active');
            });
            if (pageName === 'online') renderOnlineUsers();
            if (pageName === 'messages') renderPrivateChatsList();
        }
        
        function showNotification(msg) {
            let notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
        
        function escapeHtml(text) {
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function startHearts() {
            setInterval(() => {
                let heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️', '💖', '💗', '💕'][Math.floor(Math.random()*4)];
                heart.style.left = Math.random() * 90 + '%';
                heart.style.fontSize = (24 + Math.random() * 20) + 'px';
                document.getElementById('hearts').appendChild(heart);
                setTimeout(() => heart.remove(), 4500);
            }, 2200);
        }
        
        function toggleTheme() {
            let isDay = document.body.style.background === '#fff5f0';
            if (isDay) {
                document.body.style.background = '#0a0508';
                document.body.style.color = '#f0e6e8';
                document.querySelectorAll('.room-card, .chat-header, .chat-input-area, .user-item, .message').forEach(el => {
                    if (el.style.background) el.style.background = '#1a0f12';
                });
            } else {
                document.body.style.background = '#fff5f0';
                document.body.style.color = '#2c1a1a';
                document.querySelectorAll('.room-card, .chat-header, .chat-input-area, .user-item, .message').forEach(el => {
                    if (el.style.background) el.style.background = '#ffffff';
                });
            }
        }
        
        function init() {
            loadData();
            renderRooms();
            renderOnlineUsers();
            renderPrivateChatsList();
            startHearts();
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => showPage(btn.getAttribute('data-page')));
            });
            showPage('home');
            console.log("✅ ჩატი გაშვებულია, მომხმარებელი:", currentUser);
        }
        
        init();
    </script>
</body>
</html>
