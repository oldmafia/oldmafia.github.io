<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 12 ოთახი · მცურავი გულები</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }

    /* ===== ანიმაციური მცურავი გულები ===== */
    .heart-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }
    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 24px;
      opacity: 0.6;
      animation: floatHeart 8s linear infinite;
      user-select: none;
    }
    @keyframes floatHeart {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.7;
      }
      100% {
        transform: translateY(-100vh) rotate(20deg);
        opacity: 0;
      }
    }

    /* ===== ღამის რეჟიმი (შავი + შინდისფერი ჩრდილები) ===== */
    body.night {
      background: #0a0a0a;
      color: #f0e6e6;
    }
    body.night .top-bar {
      background: #1a1a1a;
      border-bottom: 2px solid #6b2e2e;
      box-shadow: 0 4px 15px rgba(107, 46, 46, 0.4);
    }
    body.night .chat-container {
      background: #111111;
    }
    body.night .message {
      background: #2a1a1a;
      color: #ffefef;
      box-shadow: 0 2px 8px rgba(107, 46, 46, 0.3);
    }
    body.night .input-area {
      background: #1a1a1a;
      border-top: 2px solid #6b2e2e;
    }
    body.night input {
      background: #2a2a2a;
      color: white;
      border: 1px solid #8b3a3a;
    }

    /* ===== დღის რეჟიმი (კრემისფერი + შინდისფერი) ===== */
    body.day {
      background: #fef7e6;
      color: #2d1b1b;
    }
    body.day .top-bar {
      background: #fff0e0;
      border-bottom: 2px solid #b1472c;
      box-shadow: 0 4px 15px rgba(177, 71, 44, 0.2);
    }
    body.day .chat-container {
      background: #fff6ea;
    }
    body.day .message {
      background: #f0e1d0;
      color: #2d1b1b;
      box-shadow: 0 2px 8px rgba(177, 71, 44, 0.15);
    }
    body.day .input-area {
      background: #fff0e0;
      border-top: 2px solid #b1472c;
    }
    body.day input {
      background: white;
      color: #2d1b1b;
      border: 1px solid #c08060;
    }

    /* ===== ზედა ბარი ===== */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo-btn {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #b91c1c;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
    }
    .menu-buttons {
      display: flex;
      gap: 20px;
    }
    .menu-buttons button {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #b91c1c;
      transition: transform 0.2s;
    }
    .menu-buttons button:hover {
      transform: scale(1.1);
    }
    .theme-toggle {
      font-size: 24px;
      cursor: pointer;
      color: #b91c1c;
    }

    /* ===== ოთახების დროპდაუნი ===== */
    .rooms-dropdown {
      position: absolute;
      top: 70px;
      left: 20px;
      background: #2a1a1a;
      border-radius: 16px;
      padding: 12px;
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      z-index: 200;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    body.day .rooms-dropdown {
      background: #fff0e0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .rooms-dropdown.show {
      display: grid;
    }
    .room-option {
      padding: 10px 16px;
      background: #8b2c2c;
      color: white;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-size: 14px;
    }
    body.day .room-option {
      background: #b1472c;
    }
    .room-option:hover {
      background: #c06060;
    }

    /* ===== ჩატის არეალი ===== */
    .chat-container {
      height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 70%;
      padding: 10px 16px;
      border-radius: 20px;
      align-self: flex-start;
    }
    .message strong {
      color: #b91c1c;
    }
    .message small {
      font-size: 10px;
      opacity: 0.7;
      margin-left: 10px;
    }
    .input-area {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
    }
    .input-area input {
      flex: 1;
      padding: 12px 20px;
      border-radius: 40px;
      border: none;
      outline: none;
      font-size: 16px;
    }
    .input-area button {
      background: #b91c1c;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 18px;
    }
    .input-area button:hover {
      background: #8b2c2c;
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    body.night ::-webkit-scrollbar-track {
      background: #2a1a1a;
    }
    body.night ::-webkit-scrollbar-thumb {
      background: #8b3a3a;
    }
    body.day ::-webkit-scrollbar-track {
      background: #e6d5c0;
    }
    body.day ::-webkit-scrollbar-thumb {
      background: #a55b4a;
    }
  </style>
</head>
<body class="night">
<div class="heart-bg" id="heartBg"></div>

<div class="top-bar">
  <div class="logo-area">
    <button class="logo-btn" id="roomsBtn">
      <i class="fas fa-crown"></i> <span id="currentRoomName">ოთახი 1</span> <i class="fas fa-chevron-down"></i>
    </button>
    <div class="rooms-dropdown" id="roomsDropdown">
      <!-- 12 ოთახი დინამიურად -->
    </div>
  </div>
  <div class="menu-buttons">
    <button id="messengerBtn"><i class="fas fa-comment-dots"></i></button>
    <button id="profileBtn"><i class="fas fa-user-circle"></i></button>
    <button id="friendsBtn"><i class="fas fa-users"></i></button>
    <button id="onlineBtn"><i class="fas fa-globe"></i></button>
    <button id="registeredBtn"><i class="fas fa-address-book"></i></button>
    <div class="theme-toggle" id="themeToggle">
      <i class="fas fa-moon"></i>
    </div>
  </div>
</div>

<div class="chat-container">
  <div class="messages" id="messagesContainer">
    <div style="text-align:center; opacity:0.5;">აირჩიე ოთახი და დაიწყე წერა 💬</div>
  </div>
  <div class="input-area">
    <input type="text" id="messageInput" placeholder="დაწერე მესიჯი...">
    <button id="sendBtn"><i class="fas fa-paper-plane"></i> გაგზავნა</button>
  </div>
</div>

<script>
// ========== SUPABASE კონფიგურაცია ==========
const supabaseUrl = 'https://ftfciebnywbondaiarnc.supabase.co';
const supabaseKey = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentUser = null;       // ავტორიზებული მომხმარებელი
let currentRoomId = 1;
let currentRoomName = "ოთახი 1";

// ========== ანიმაციური გულები ==========
function createHeart() {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.innerHTML = '❤️';
  heart.style.left = Math.random() * 100 + '%';
  heart.style.animationDuration = 4 + Math.random() * 7 + 's';
  heart.style.fontSize = 20 + Math.random() * 50 + 'px';
  heart.style.color = '#b91c1c';
  document.getElementById('heartBg').appendChild(heart);
  setTimeout(() => heart.remove(), 8000);
}
setInterval(createHeart, 600);

// ========== დღე/ღამის რეჟიმი ==========
let theme = localStorage.getItem('theme') || 'night';
document.body.className = theme;
const themeIcon = document.querySelector('#themeToggle i');
themeIcon.className = theme === 'night' ? 'fas fa-sun' : 'fas fa-moon';

document.getElementById('themeToggle').onclick = () => {
  theme = theme === 'night' ? 'day' : 'night';
  document.body.className = theme;
  localStorage.setItem('theme', theme);
  themeIcon.className = theme === 'night' ? 'fas fa-sun' : 'fas fa-moon';
};

// ========== 12 ოთახის გენერაცია ==========
function renderRoomsDropdown() {
  const container = document.getElementById('roomsDropdown');
  container.innerHTML = '';
  for (let i = 1; i <= 12; i++) {
    const btn = document.createElement('button');
    btn.className = 'room-option';
    btn.textContent = `📁 ოთახი ${i}`;
    btn.onclick = () => switchRoom(i, `ოთახი ${i}`);
    container.appendChild(btn);
  }
}

// დროპდაუნის გამოჩენა/დამალვა
document.getElementById('roomsBtn').onclick = (e) => {
  e.stopPropagation();
  document.getElementById('roomsDropdown').classList.toggle('show');
};
// დახურვა გარეთ დაჭერისას
document.addEventListener('click', (e) => {
  if (!e.target.closest('.logo-area')) {
    document.getElementById('roomsDropdown').classList.remove('show');
  }
});

// ოთახის გადართვა
async function switchRoom(roomId, roomName) {
  currentRoomId = roomId;
  currentRoomName = roomName;
  document.getElementById('currentRoomName').innerHTML = `${roomName} <i class="fas fa-chevron-down"></i>`;
  document.getElementById('roomsDropdown').classList.remove('show');
  await loadMessages();
  subscribeToMessages();
}

// ========== მესიჯების ჩატვირთვა ==========
async function loadMessages() {
  const { data, error } = await supabase
    .from('messages')
    .select('*, users!inner(username)')
    .eq('room_id', currentRoomId)
    .order('created_at', { ascending: true });
  
  if (error) {
    console.error('Error loading messages:', error);
    return;
  }
  
  const container = document.getElementById('messagesContainer');
  if (!data || data.length === 0) {
    container.innerHTML = '<div style="text-align:center; opacity:0.5;">💬 ახალი ოთახი! დაწერე პირველი მესიჯი 💬</div>';
    return;
  }
  
  container.innerHTML = data.map(msg => `
    <div class="message">
      <strong>${msg.users?.username || 'ანონიმი'}:</strong> ${escapeHtml(msg.text)}
      <small>${new Date(msg.created_at).toLocaleTimeString()}</small>
    </div>
  `).join('');
  
  container.scrollTop = container.scrollHeight;
}

// XSS-ისგან დაცვა
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// ========== მესიჯის გაგზავნა ==========
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;
  if (!currentUser) {
    alert('გთხოვთ გაიაროთ ავტორიზაცია');
    return;
  }
  
  const { error } = await supabase.from('messages').insert({
    room_id: currentRoomId,
    user_id: currentUser.id,
    text: text,
    created_at: new Date()
  });
  
  if (error) {
    console.error('Send error:', error);
    alert('შეცდომა გაგზავნისას');
  } else {
    input.value = '';
    await loadMessages();
  }
}

// ========== რეალურ დროში განახლება ==========
let currentChannel = null;
function subscribeToMessages() {
  if (currentChannel) {
    supabase.removeChannel(currentChannel);
  }
  currentChannel = supabase.channel(`room:${currentRoomId}`);
  currentChannel.on('postgres_changes', 
    { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${currentRoomId}` },
    () => loadMessages()
  ).subscribe();
}

// ========== ავტორიზაციის შემოწმება ==========
async function initAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  
  if (!session) {
    // ტესტური ავტორიზაცია დემო მომხმარებლით
    const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
      email: `demo_${Date.now()}@test.com`,
      password: '123456'
    });
    
    if (signUpError && signUpError.message.includes('already registered')) {
      const { data: signInData } = await supabase.auth.signInWithPassword({
        email: 'demo@test.com',
        password: '123456'
      });
      if (signInData?.user) {
        await ensureUserProfile(signInData.user);
      }
    } else if (signUpData?.user) {
      await ensureUserProfile(signUpData.user);
    }
    return;
  }
  
  await ensureUserProfile(session.user);
}

async function ensureUserProfile(user) {
  const { data: existing } = await supabase
    .from('users')
    .select('*')
    .eq('id', user.id)
    .single();
  
  if (!existing) {
    const { data: newUser } = await supabase
      .from('users')
      .insert({
        id: user.id,
        username: `მოთამაშე_${Math.floor(Math.random() * 10000)}`,
        role: 'user',
        is_online: true
      })
      .select()
      .single();
    currentUser = newUser;
  } else {
    currentUser = existing;
    await supabase.from('users').update({ is_online: true }).eq('id', user.id);
  }
  
  console.log('✅ შესული მომხმარებელი:', currentUser?.username);
}

// ========== ღილაკები (დროებით მხოლოდ ალერტი) ==========
document.getElementById('messengerBtn').onclick = () => alert('📩 მალე დაემატება პირადი მესიჯები');
document.getElementById('profileBtn').onclick = () => alert('👤 პროფილი მალე');
document.getElementById('friendsBtn').onclick = () => alert('💕 მეგობრები მალე');
document.getElementById('onlineBtn').onclick = () => alert('🟢 ონლაინ მომხმარებლები მალე');
document.getElementById('registeredBtn').onclick = () => alert('📋 რეგისტრირებულები მალე');

// ========== ინიციალიზაცია ==========
async function init() {
  await initAuth();
  renderRoomsDropdown();
  await loadMessages();
  subscribeToMessages();
  
  document.getElementById('sendBtn').onclick = sendMessage;
  document.getElementById('messageInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
}

init();
</script>
</body>
</html>
