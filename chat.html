<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: radial-gradient(circle, #200000 0%, #000 80%); color: white; font-family: Arial; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* ზედა ზოლი ნეონის ნათებით */
        .top-bar {
            background: #000;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid red;
            box-shadow: 0 0 15px red;
            z-index: 1001;
        }

        .menu-btn { font-size: 28px; color: red; cursor: pointer; text-shadow: 0 0 10px red; transition: 0.3s; }
        .menu-btn:hover { transform: scale(1.1); }
        .current-room-name { flex: 1; text-align: center; font-weight: bold; font-size: 20px; text-shadow: 0 0 15px red; letter-spacing: 1px; }

        /* ვიწრო მენიუ მარცხნივ - "ფარდასავით" ჩამოდის */
        .top-menu {
            position: absolute; top: -110%; left: 10px; width: 260px; max-height: 75vh;
            background: rgba(10, 0, 0, 0.95); border: 2px solid red; border-top: none;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; overflow-y: auto;
            padding: 80px 10px 20px 10px; box-sizing: border-box; display: flex; flex-direction: column; gap: 8px;
            border-bottom-right-radius: 30px; box-shadow: 0 10px 40px rgba(255, 0, 0, 0.5);
        }
        .top-menu.open { top: 0; }

        .room-link {
            padding: 12px 20px; background: #000; border: 1px solid #300; border-radius: 12px;
            cursor: pointer; color: #aaa; font-size: 14px; transition: 0.3s; text-align: left;
        }
        .room-link:hover { background: #400; color: white; border-color: red; box-shadow: 0 0 10px red; transform: translateX(5px); }

        /* ჩატი ავატარებით და ლამაზი ბუშტებით */
        #chat-display { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; }
        
        .msg { display: flex; gap: 12px; align-items: flex-start; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid red; box-shadow: 0 0 8px red; object-fit: cover; }
        
        .msg-content { 
            background: linear-gradient(135deg, #1a0000 0%, #050505 100%); 
            border: 1px solid #400; padding: 12px 16px; border-radius: 4px 18px 18px 18px; 
            max-width: 75%; box-shadow: 4px 4px 15px rgba(0,0,0,0.7);
        }
        
        .u-name { color: red; font-weight: bold; font-size: 12px; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .u-text { color: #f0f0f0; font-size: 15px; line-height: 1.5; }

        /* წერის ზონა */
        .input-box { padding: 20px; background: #000; display: flex; gap: 12px; border-top: 2px solid #200; }
        input { 
            flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #400; 
            background: #100; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: red; box-shadow: 0 0 10px rgba(255,0,0,0.3); }
        
        .send-btn { 
            background: red; border: none; width: 50px; height: 50px; border-radius: 50%; 
            color: white; cursor: pointer; box-shadow: 0 0 15px red; transition: 0.3s;
        }
        .send-btn:hover { transform: rotate(-10deg) scale(1.1); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="current-room-name" id="roomTitle">☕ კაფე-ბარი</div>
    </div>

    <div id="topMenu" class="top-menu">
        <div class="room-link" onclick="selectRoom('☕ კაფე-ბარი')">☕ კაფე-ბარი</div>
        <div class="room-link" onclick="selectRoom('💎 ვიპ საუბრები')">💎 ვიპ საუბრები</div>
        <div class="room-link" onclick="selectRoom('🕵️ გამოძიება')">🕵️ გამოძიება</div>
        <div class="room-link" onclick="selectRoom('🔐 შიფროგრამა')">🔐 შიფროგრამა</div>
        <div class="room-link" onclick="selectRoom('❓ ვიქტორინა')">❓ ვიქტორინა</div>
        <div class="room-link" onclick="selectRoom('😵 ჩამოხრჩობანა')">😵 ჩამოხრჩობანა</div>
        <div class="room-link" onclick="selectRoom('🕴 მაფიის ღამე')">🕴 მაფიის ღამე</div>
        <div class="room-link" onclick="selectRoom('🃏 ჯოკერი')">🃏 ჯოკერი</div>
        <div class="room-link" onclick="selectRoom('🎲 ნარდი')">🎲 ნარდი</div>
        <div class="room-link" onclick="selectRoom('🎵 მუსიკა')">🎵 მუსიკა</div>
        <div class="room-link" onclick="selectRoom('😂 იუმორი')">😂 იუმორი</div>
        <div class="room-link" onclick="selectRoom('🛠 ადმინისტრაცია')">🛠 ადმინისტრაცია</div>
        <div class="room-link" onclick="selectRoom('🆘 დახმარება')">🆘 დახმარება</div>
        <div class="room-link" onclick="selectRoom('📢 ფორუმი')">📢 ფორუმი</div>
        <div class="room-link" onclick="logout()" style="color: red; border: 1px solid red; font-weight: bold; text-align: center;">🚪 გასვლა</div>
    </div>

    <div id="chat-display"></div>

    <div class="input-box">
        <input type="text" id="msgInput" placeholder="დაწერე რამე, ჯემო..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nickname') || "სტუმარი";
        let currentRoom = "☕ კაფე-ბარი";
        const defaultAvatar = "https://i.ibb.co/v3m6y6R/avatar.png";

        function toggleMenu() { document.getElementById('topMenu').classList.toggle('open'); }

        async function selectRoom(name) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = name;
            document.getElementById('topMenu').classList.remove('open');
            await loadMsgs();
        }

        async function loadMsgs() {
            const { data } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
            const chat = document.getElementById('chat-display');
            chat.innerHTML = "";
            data?.forEach(m => renderMessage(m));
            chat.scrollTop = chat.scrollHeight;
        }

        function renderMessage(m) {
            const chat = document.getElementById('chat-display');
            chat.innerHTML += `
                <div class="msg">
                    <img src="${defaultAvatar}" class="avatar">
                    <div class="msg-content">
                        <span class="u-name">${m.user_nam}</span>
                        <span class="u-text">${m.text}</span>
                    </div>
                </div>`;
        }

        async function sendMsg() {
            const inp = document.getElementById('msgInput');
            if(!inp.value.trim()) return;
            await _s.from('messages').insert([{ user_nam: myNick, text: inp.value, room_name: currentRoom }]);
            inp.value = "";
        }

        function logout() { localStorage.removeItem('nickname'); window.location.href = 'index.html'; }

        _s.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
            if(payload.new.room_name === currentRoom) {
                renderMessage(payload.new);
                document.getElementById('chat-display').scrollTop = document.getElementById('chat-display').scrollHeight;
            }
        }).subscribe();

        window.onload = loadMsgs;
    </script>
</body>
</html>
