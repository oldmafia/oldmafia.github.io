<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia Social</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body.night-mode { --bg: #000; --txt: #e0c8a8; --card: #0a0a0a; --accent: #ff0000; --nav: #050505; --border: #333; }
        body.day-mode { --bg: #fff8f0; --txt: #2c2418; --card: #fff; --accent: #c55a3a; --nav: #fff4e6; --border: #e8d4b0; }

        body { font-family: sans-serif; background: var(--bg); color: var(--txt); height: 100vh; overflow: hidden; position: relative; transition: 0.3s; }

        /* 📱 Layout */
        .page { display: none; height: calc(100vh - 65px); overflow-y: auto; position: relative; z-index: 5; }
        .page.active { display: block; }

        /* 🧭 Navigation (FB Style) */
        .navigation {
            position: fixed; width: 100%; height: 65px; background: var(--nav);
            border-top: 1px solid rgba(255,0,0,0.2); display: flex; justify-content: space-around;
            align-items: center; z-index: 5000; bottom: 0;
        }
        .nav-item { cursor: pointer; font-size: 24px; opacity: 0.5; color: var(--txt); }
        .nav-item.active { opacity: 1; color: var(--accent); }

        /* ❤️🔥 ღაჟღაჟა წითელი გულების ანიმაცია */
        .fire-heart {
            position: fixed; color: #ff0000; font-size: 40px; pointer-events: none; z-index: 2;
            animation: fireHeartFloat 6s linear infinite;
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.8)) drop-shadow(0 0 20px rgba(255, 0, 0, 0.6)) blur(1px);
        }
        @keyframes fireHeartFloat { 
            0% { bottom: -60px; transform: translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { bottom: 105%; transform: translateX(20px); opacity: 0; }
        }

        /* 👤 Profile UI */
        .fb-header { height: 180px; background: linear-gradient(to bottom, var(--accent), #000); position: relative; }
        .avatar-container { position: absolute; bottom: -55px; left: 50%; transform: translateX(-50%); }
        .fb-avatar { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--card); object-fit: cover; }
        
        /* 📸 Gallery Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; }
        .gallery-item { width: 100%; aspect-ratio: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .add-photo { border: 2px dashed var(--accent); display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }

        /* 🏠 Rooms */
        .room-item { background: var(--card); margin: 10px; padding: 15px; border-radius: 10px; border-left: 5px solid var(--accent); cursor: pointer; }
    </style>
</head>
<body class="night-mode">

    <div id="heartsContainer"></div>

    <div id="homePage" class="page active">
        <h2 style="padding:15px; color:var(--accent);">🏰 ოთახები</h2>
        <div class="room-item">☕ კაფე-ბარი</div>
        <div class="room-item">📝 ფორუმი</div>
        <div class="room-item">🎲 ნარდი</div>
    </div>

    <div id="messengerPage" class="page">
        <h2 style="padding:15px; color:var(--accent);">მესენჯერი</h2>
        <div id="users-list"></div>
    </div>

    <div id="profilePage" class="page">
        <div class="fb-header">
            <div class="avatar-container" onclick="document.getElementById('avatarInp').click()">
                <img id="myPic" class="fb-avatar" src="https://i.ibb.co/v3m6y6R/avatar.png">
            </div>
            <input type="file" id="avatarInp" hidden onchange="uploadToSupabase('avatar')">
        </div>
        <div style="margin-top:65px; text-align:center; padding:15px;">
            <h1 id="myNick">Lukinio</h1>
            <input type="text" id="statusField" placeholder="სტატუსის დაწერა..." style="background:none; border:1px solid var(--accent); color:var(--txt); padding:5px; border-radius:10px; text-align:center; width:80%;" onchange="updateStatus()">
        </div>
        
        <div style="padding:15px;">
            <h3>📸 ფოტოები</h3>
            <div class="gallery-grid" id="myGallery">
                <div class="gallery-item add-photo" onclick="document.getElementById('galleryInp').click()">+</div>
            </div>
            <input type="file" id="galleryInp" hidden onchange="uploadToSupabase('gallery')">
        </div>
    </div>

    <div class="navigation">
        <div class="nav-item active" onclick="showPage('homePage', this)">🏠</div>
        <div class="nav-item" onclick="showPage('messengerPage', this)">💬</div>
        <div class="nav-item" onclick="showPage('profilePage', this)">👤</div>
        <div class="nav-item" onclick="toggleTheme()">🌙</div>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nickname');

        async function init() {
            if (!myNick) return;
            
            // 1. პროფილის ჩატვირთვა
            const { data: user } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
            if (user) {
                document.getElementById('myNick').innerText = user.username;
                document.getElementById('myPic').src = user.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
                document.getElementById('statusField').value = user.status || "";
                loadUserPhotos();
            }
            startFireHearts();
        }

        // ფოტოების ატვირთვა
        async function uploadToSupabase(type) {
            const file = type === 'avatar' ? document.getElementById('avatarInp').files[0] : document.getElementById('galleryInp').files[0];
            if (!file) return;

            const path = `${myNick}/${Date.now()}_${file.name}`;
            const { data, error } = await _s.storage.from('avatars').upload(path, file);

            if (data) {
                const { data: urlData } = _s.storage.from('avatars').getPublicUrl(path);
                const url = urlData.publicUrl;

                if (type === 'avatar') {
                    await _s.from('profiles').update({ avatar_url: url }).eq('username', myNick);
                    document.getElementById('myPic').src = url;
                } else {
                    await _s.from('user_photos').insert({ username: myNick, image_url: url });
                    loadUserPhotos(); // გალერეის განახლება
                }
            }
        }

        async function loadUserPhotos() {
            const { data: photos } = await _s.from('user_photos').select('*').eq('username', myNick).order('created_at', { ascending: false });
            const grid = document.getElementById('myGallery');
            grid.innerHTML = '<div class="gallery-item add-photo" onclick="document.getElementById(\'galleryInp\').click()">+</div>';
            photos?.forEach(p => {
                grid.innerHTML += `<div class="gallery-item"><img src="${p.image_url}"></div>`;
            });
        }

        async function updateStatus() {
            const s = document.getElementById('statusField').value;
            await _s.from('profiles').update({ status: s }).eq('username', myNick);
        }

        function startFireHearts() {
            const container = document.getElementById('heartsContainer');
            setInterval(() => {
                const h = document.createElement('div');
                h.className = 'fire-heart';
                h.innerText = '❤️';
                h.style.left = Math.random() * 90 + '%';
                container.appendChild(h);
                setTimeout(() => h.remove(), 6000);
            }, 1800);
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleTheme() { document.body.classList.toggle('night-mode'); document.body.classList.toggle('day-mode'); }

        window.onload = init;
    </script>
</body>
</html>
