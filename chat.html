<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Founder Edition</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --accent: #ff3b3b;
            --accent-glow: #ff6666;
            --gold: #ffcc44;
            --bg: #0a0c10;
            --txt: #e6e9f0;
            --nav: #11151c;
            --card: #151e2a;
            --border: #2a3440;
            --in-bg: #0f141c;
            --hover: #ff3b3b20;
        }

        body.day-mode {
            --bg: #fef8ef;
            --txt: #2c2418;
            --nav: #fff5e6;
            --card: #ffffff;
            --border: #ffe0b5;
            --in-bg: #fffaf2;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--txt);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.2s ease, color 0.2s;
        }

        .navigation {
            width: 100%;
            height: 68px;
            background: var(--nav);
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 5000;
            flex-shrink: 0;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        .nav-item {
            position: relative;
            cursor: pointer;
            font-size: 28px;
            opacity: 0.55;
            color: var(--txt);
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 40px;
        }

        .nav-item.active {
            opacity: 1;
            color: var(--accent);
            transform: scale(1.05);
            text-shadow: 0 0 6px var(--accent);
        }

        .badge {
            position: absolute;
            top: -4px;
            right: -6px;
            background: #ff2a2a;
            color: white;
            font-size: 10px;
            min-width: 18px;
            height: 18px;
            border-radius: 30px;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 1px solid white;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        .page {
            display: none;
            height: 100%;
            width: 100%;
            overflow-y: auto;
        }

        .page.active {
            display: block;
        }

        /* ROOMS: horizontal scroll (one line) */
        .rooms-scroll-container {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            scrollbar-width: thin;
            padding: 20px 12px 24px 12px;
            gap: 14px;
            display: flex;
            flex-wrap: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .room-card-h {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--card);
            border-radius: 32px;
            padding: 16px 24px;
            margin-right: 14px;
            border: 1px solid var(--border);
            border-bottom: 3px solid var(--accent);
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }

        .room-card-h:active {
            transform: scale(0.96);
            background: var(--accent);
            color: white;
        }

        .room-card-h span {
            font-size: 26px;
            margin-right: 8px;
        }

        /* profile header */
        .profile-header {
            height: 150px;
            background: linear-gradient(145deg, var(--accent), #2a0f0f);
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .profile-ava {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid white;
            background: #222;
            overflow: hidden;
            transform: translateY(30px);
            cursor: pointer;
            box-shadow: 0 6px 18px black;
        }

        .profile-ava img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            margin-top: 55px;
            text-align: center;
            padding: 20px;
        }

        /* EMOJI BOARD */
        .emoji-board {
            position: absolute;
            bottom: 85px;
            left: 12px;
            right: 12px;
            background: var(--nav);
            border: 2px solid var(--accent);
            border-radius: 28px;
            display: none;
            padding: 18px;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            max-height: 290px;
            overflow-y: auto;
            z-index: 7000;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .emoji-board.active {
            display: grid;
        }

        .emoji-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
            cursor: pointer;
            background: var(--card);
            padding: 8px;
            border-radius: 20px;
            transition: 0.1s;
        }

        .admin-plus {
            border: 2px dashed var(--accent);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            color: var(--accent);
            cursor: pointer;
            background: var(--in-bg);
            aspect-ratio: 1/1;
        }

        /* rows (friends, online, PM) */
        .row {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255, 60, 60, 0.2);
            cursor: pointer;
            transition: 0.1s;
            background: var(--card);
            margin-bottom: 6px;
            border-radius: 18px;
        }

        .row:active {
            background: var(--accent);
            opacity: 0.8;
        }

        .row img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            margin-right: 16px;
            object-fit: cover;
        }

        .row-data b {
            display: block;
            font-size: 17px;
            margin-bottom: 4px;
        }

        .row-data span {
            font-size: 12px;
            opacity: 0.7;
        }

        /* chat room layout */
        .room-chat-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-footer {
            background: var(--nav);
            padding: 12px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .chat-in-box {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid var(--accent);
            background: var(--in-bg);
            color: var(--txt);
            font-size: 16px;
        }

        /* floating hearts */
        .f-heart {
            position: fixed;
            color: #ff3366;
            font-size: 28px;
            pointer-events: none;
            z-index: 9999;
            animation: floatHeart 5s ease-out forwards;
            filter: drop-shadow(0 0 5px #ff6666);
        }

        @keyframes floatHeart {
            0% {
                bottom: -20px;
                opacity: 0.9;
                transform: translateX(0) scale(0.8);
            }
            30% {
                opacity: 1;
                transform: translateX(20px) scale(1);
            }
            100% {
                bottom: 100%;
                opacity: 0;
                transform: translateX(-30px) scale(0.6);
            }
        }

        .founder-badge {
            font-size: 12px;
            background: var(--accent);
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-left: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body class="night-mode">

<div class="navigation">
    <div class="nav-item active" onclick="showPage('homePage', this)">🏠</div>
    <div class="nav-item" onclick="showPage('messengerPage', this)">💬 <div id="pmBadge" class="badge">0</div></div>
    <div class="nav-item" onclick="showPage('friendsPage', this)">💞</div>
    <div class="nav-item" onclick="showPage('onlinePage', this)">👥</div>
    <div class="nav-item" onclick="showPage('profilePage', this)">👤</div>
    <div class="nav-item" onclick="toggleMode()">🌗</div>
</div>

<div class="content-area">
    <!-- HOME PAGE : horizontal rooms -->
    <div id="homePage" class="page active">
        <h3 style="padding: 18px; text-align:center; color:var(--accent); letter-spacing:1px;">🏆 მაფიის ოთახები</h3>
        <div class="rooms-scroll-container" id="roomsContainer"></div>
        <div style="padding: 0 18px 20px 18px; text-align:center; opacity:0.6; font-size:13px;">👉 გადააქართე გვერდზე მეტი ოთახისთვის</div>
    </div>

    <!-- MESSENGER (PM) -->
    <div id="messengerPage" class="page">
        <h3 style="padding: 18px;">💌 პირადი საუბრები</h3>
        <div id="pmHistory" style="padding: 0 12px;"></div>
    </div>

    <!-- FRIENDS -->
    <div id="friendsPage" class="page">
        <h3 style="padding: 18px; color:var(--accent);">💞 ჩემი მეგობრები</h3>
        <div id="friendsList"></div>
    </div>

    <!-- ONLINE USERS -->
    <div id="onlinePage" class="page">
        <h3 style="padding: 18px;">👥 მოთამაშეები ონლაინში</h3>
        <div id="onlineList"></div>
    </div>

    <!-- PROFILE -->
    <div id="profilePage" class="page">
        <div class="profile-header">
            <div class="profile-ava" onclick="document.getElementById('avaUp').click()">
                <img id="myAva" src="https://i.ibb.co/v3m6y6R/avatar.png">
            </div>
        </div>
        <div class="profile-info">
            <h2 id="dispNick">---</h2>
            <input type="text" id="dispStatus" onchange="updateStatus()" placeholder="📢 ჩემი სტატუსი..." style="width:90%; padding:14px; background:var(--in-bg); border:1px solid var(--accent); color:var(--txt); border-radius:40px; text-align:center; margin-top:20px;">
            <p style="margin-top:20px; opacity:0.6;">🆔 ID: <span id="userId">007</span></p>
            <p id="founderLabel" style="margin-top: 6px; font-size:13px; color:var(--accent);"></p>
        </div>
        <input type="file" id="avaUp" hidden accept="image/*" onchange="doAvaUpload()">
    </div>

    <!-- ROOM CHAT PAGE -->
    <div id="roomChatPage" class="page room-chat-layout" style="display: none; flex-direction: column;">
        <div style="padding: 14px 18px; background: var(--nav); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center;">
            <b id="roomTitle" style="font-size: 20px; color: var(--accent);">📡 ოთახი</b>
            <span onclick="closeRoom()" style="color: var(--accent); font-size: 28px; cursor: pointer;">✖</span>
        </div>
        <div id="roomMsgs" class="chat-messages-area"></div>
        <div class="chat-footer">
            <div id="emojiBoard" class="emoji-board"></div>
            <div class="chat-in-box">
                <span onclick="toggleEmojiBoard()" style="font-size: 34px; cursor: pointer;">😊</span>
                <input type="text" id="msgInp" class="chat-input" placeholder="დაწერე შეტყობინება, ან სმაილი...">
                <button onclick="sendRoomMsg()" style="background: var(--accent); border: none; color: white; width: 52px; height: 52px; border-radius: 50%; font-size: 22px; cursor: pointer;">✈</button>
            </div>
        </div>
        <input type="file" id="emojiUp" hidden accept="image/*" onchange="doEmojiUpload()">
    </div>
</div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const _s = supabase.createClient(supabaseUrl, supabaseKey);
    
    let myNick = localStorage.getItem('nickname') || "Abu007";
    const FOUNDER = "Abu007";   // მხოლოდ დამფუძნებელს აქვს ადმინის უფლება
    let currentRoom = "";
    
    async function init() {
        await ensureProfile();
        document.getElementById('dispNick').innerText = myNick;
        if (myNick === FOUNDER) {
            document.getElementById('founderLabel').innerHTML = '👑 დამფუძნებელი · სმაილების დამატება შეგიძლია';
        } else {
            document.getElementById('founderLabel').innerHTML = '';
        }
        loadProfile();
        loadOnline();
        loadPMHistory();
        loadFriends();
        loadEmojis();
        startHearts();
        renderRooms();
        
        // realtime for room messages
        _s.channel('room-messages')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
              if(payload.new.room_name === currentRoom && currentRoom !== "") loadRoomMsgs();
          })
          .subscribe();
          
        // realtime for pm badge update
        _s.channel('pm-badge-update')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'direct_messages' }, () => loadPMHistory())
          .subscribe();
    }
    
    async function ensureProfile() {
        const { data: exists } = await _s.from('profiles').select('username').eq('username', myNick).maybeSingle();
        if(!exists) {
            await _s.from('profiles').insert({ username: myNick, status: 'ახალბედა მაფიოზი', avatar_url: 'https://i.ibb.co/v3m6y6R/avatar.png' });
        }
    }
    
    function renderRooms() {
        const rooms = [
            { icon: "☕", name: "კაფე-ბარი" }, { icon: "🎲", name: "ნარდი" }, { icon: "🃏", name: "ჯოკერი" },
            { icon: "💎", name: "VIP საუბრები" }, { icon: "📝", name: "ფორუმი" }, { icon: "🛠️", name: "ადმინისტრაცია" },
            { icon: "😂", name: "იუმორი" }, { icon: "🏆", name: "ტურნირი" }, { icon: "🎭", name: "მაფია ლაუნჯი" }
        ];
        const container = document.getElementById('roomsContainer');
        container.innerHTML = rooms.map(r => `
            <div class="room-card-h" onclick="openRoom('${r.name}')">
                <span>${r.icon}</span> ${r.name}
            </div>
        `).join('');
    }
    
    function toggleMode() {
        document.body.classList.toggle('night-mode');
        document.body.classList.toggle('day-mode');
    }
    
    function toggleEmojiBoard() {
        const board = document.getElementById('emojiBoard');
        board.classList.toggle('active');
    }
    
    async function loadProfile() {
        const { data } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if(data) {
            if(data.avatar_url) document.getElementById('myAva').src = data.avatar_url;
            document.getElementById('dispStatus').value = data.status || "";
            document.getElementById('userId').innerText = data.id ? data.id.substring(0,6) : "007";
        }
    }
    
    async function doAvaUpload() {
        const file = document.getElementById('avaUp').files[0];
        if(!file) return;
        const ext = file.name.split('.').pop();
        const path = `avatars/${myNick}_${Date.now()}.${ext}`;
        const { error } = await _s.storage.from('avatars').upload(path, file);
        if(error) { alert("ატვირთვა ვერ მოხერხდა"); return; }
        const { data } = _s.storage.from('avatars').getPublicUrl(path);
        await _s.from('profiles').update({ avatar_url: data.publicUrl }).eq('username', myNick);
        document.getElementById('myAva').src = data.publicUrl;
    }
    
    async function updateStatus() {
        const status = document.getElementById('dispStatus').value;
        await _s.from('profiles').update({ status }).eq('username', myNick);
    }
    
    async function loadOnline() {
        const { data } = await _s.from('profiles').select('*').limit(40);
        document.getElementById('onlineList').innerHTML = data?.map(u => `
            <div class="row" onclick="startPM('${u.username}')">
                <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}">
                <div class="row-data"><b>${u.username}</b><span>${u.status || 'ონლაინშია'}</span></div>
            </div>
        `).join('') || "<div style='padding:20px'>ვერ მოიძებნა მომხმარებლები</div>";
    }
    
    async function loadPMHistory() {
        const { data } = await _s.from('direct_messages').select('*').or(`sender.eq.${myNick},receiver.eq.${myNick}`).order('created_at', { ascending: false });
        const list = document.getElementById('pmHistory');
        const uniquePartners = new Map();
        data?.forEach(m => {
            const partner = m.sender === myNick ? m.receiver : m.sender;
            if(!uniquePartners.has(partner)) {
                uniquePartners.set(partner, m.text);
            }
        });
        list.innerHTML = "";
        if(uniquePartners.size === 0) {
            list.innerHTML = "<div style='padding:20px; text-align:center; opacity:0.7'>ჯერ არ გყავს პირადი საუბრები</div>";
        }
        for(let [partner, lastMsg] of uniquePartners.entries()) {
            // fetch partner avatar
            const { data: prof } = await _s.from('profiles').select('avatar_url').eq('username', partner).maybeSingle();
            const avatar = prof?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
            list.innerHTML += `
                <div class="row" onclick="startPM('${partner}')">
                    <img src="${avatar}">
                    <div class="row-data"><b>${partner}</b><span>${lastMsg.substring(0, 35)}...</span></div>
                </div>
            `;
        }
        const badge = document.getElementById('pmBadge');
        if(uniquePartners.size > 0) {
            badge.style.display = 'flex';
            badge.innerText = uniquePartners.size;
        } else badge.style.display = 'none';
    }
    
    async function loadFriends() {
        const { data } = await _s.from('friends').select('*').or(`user_me.eq.${myNick},user_friend.eq.${myNick}`).eq('status', 'accepted');
        const list = document.getElementById('friendsList');
        if(!data || data.length === 0) {
            list.innerHTML = "<p style='padding:20px; opacity:0.5; text-align:center'>მეგობრები არ გყავს</p>";
            return;
        }
        let html = "";
        for(let f of data) {
            const friendName = f.user_me === myNick ? f.user_friend : f.user_me;
            const { data: prof } = await _s.from('profiles').select('avatar_url').eq('username', friendName).maybeSingle();
            const avatar = prof?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
            html += `
                <div class="row" onclick="startPM('${friendName}')">
                    <img src="${avatar}">
                    <div class="row-data"><b>${friendName}</b><span>მეგობარი</span></div>
                </div>
            `;
        }
        list.innerHTML = html;
    }
    
    async function loadEmojis() {
        const { data } = await _s.from('custom_emojis').select('*');
        const board = document.getElementById('emojiBoard');
        let html = '';
        // მხოლოდ დამფუძნებელს აქვს + ღილაკი
        if(myNick === FOUNDER) {
            html += `<div class="admin-plus" onclick="document.getElementById('emojiUp').click()">+</div>`;
        }
        html += data?.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('') || '';
        board.innerHTML = html;
    }
    
    function addEmoji(url) {
        document.getElementById('msgInp').value += ` :img:${url}: `;
        toggleEmojiBoard();
    }
    
    async function doEmojiUpload() {
        if(myNick !== FOUNDER) {
            alert("მხოლოდ დამფუძნებელს შეუძლია სმაილების დამატება!");
            return;
        }
        const file = document.getElementById('emojiUp').files[0];
        if(!file) return;
        const path = `emojis/${Date.now()}_${file.name}`;
        const { error } = await _s.storage.from('avatars').upload(path, file);
        if(error) { alert("ატვირთვა ვერ მოხერხდა"); return; }
        const { data } = _s.storage.from('avatars').getPublicUrl(path);
        await _s.from('custom_emojis').insert({ emoji_url: data.publicUrl });
        loadEmojis();
    }
    
    function openRoom(name) {
        currentRoom = name;
        document.getElementById('roomTitle').innerText = name;
        const roomPage = document.getElementById('roomChatPage');
        roomPage.style.display = 'flex';
        roomPage.classList.add('active');
        document.querySelectorAll('.page').forEach(p => {
            if(p.id !== 'roomChatPage') p.style.display = 'none';
        });
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        loadRoomMsgs();
    }
    
    async function loadRoomMsgs() {
        if(!currentRoom) return;
        const { data } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: false }).limit(50);
        const box = document.getElementById('roomMsgs');
        box.innerHTML = data?.reverse().map(m => `
            <div style="background:var(--card); padding:12px; border-radius:18px; border:1px solid var(--border); align-self: ${m.username === myNick ? 'flex-end' : 'flex-start'}; max-width: 85%;">
                <b style="color:var(--accent); font-size:13px;">${m.username}</b><br>
                ${m.text.replace(/:img:(.*?):/g, '<img src="$1" style="width:28px; vertical-align:middle;">')}
            </div>
        `).join('') || "<div style='text-align:center; opacity:0.5'>ცარიელია...</div>";
        box.scrollTop = box.scrollHeight;
    }
    
    async function sendRoomMsg() {
        const val = document.getElementById('msgInp').value.trim();
        if(!val) return;
        await _s.from('messages').insert({ username: myNick, text: val, room_name: currentRoom });
        document.getElementById('msgInp').value = "";
    }
    
    function closeRoom() {
        currentRoom = "";
        document.getElementById('roomChatPage').style.display = 'none';
        showPage('homePage', document.querySelector('.nav-item.active'));
    }
    
    function startPM(username) {
        // პირადი მიმოწერა - გადამისამართება PM გვერდზე (მარტივი ალერტი ან სრულფასოვანი ჩატი)
        // რადგან სრული PM ფანჯარა არ გვაქვს, ვაკეთებთ მოსახერხებელ ალერტს ან ვხსნით prompt-ს
        const msg = prompt(`დაწერეთ შეტყობინება ${username}-სთვის:`);
        if(msg && msg.trim()) {
            _s.from('direct_messages').insert({ sender: myNick, receiver: username, text: msg.trim() });
            alert(`💬 გაგზავნილია ${username}-სთვის`);
            loadPMHistory();
        }
    }
    
    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => { p.style.display = 'none'; p.classList.remove('active'); });
        const target = document.getElementById(id);
        if(id === 'roomChatPage') return; // roomPage handled separately
        target.style.display = 'block';
        target.classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'messengerPage') loadPMHistory();
        if(id === 'friendsPage') loadFriends();
        if(id === 'onlinePage') loadOnline();
    }
    
    function startHearts() {
        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'f-heart';
            h.innerText = '❤️';
            h.style.left = Math.random() * 90 + '%';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 3200);
    }
    
    window.onload = init;
</script>
</body>
</html>
