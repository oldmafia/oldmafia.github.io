<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Chat - 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --dark-wine: #4a0404;
            --wine-glow: #800020;
            --cream: #f5f5dc;
        }

        /* ბაზისური სტილები */
        * { box-sizing: border-box; font-family: 'Helvetica Neue', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; transition: 0.5s; }
        
        body.dark-mode { background: #000; color: #fff; }
        body.light-mode { background: var(--cream); color: #333; }

        /* მცურავი გულები */
        #heart-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .floating-heart {
            position: absolute; font-size: 60px; color: var(--dark-wine);
            filter: drop-shadow(0 0 15px var(--wine-glow));
            animation: floatUp 12s infinite linear; opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        /* მენიუ ზემოთ */
        .top-nav {
            background: rgba(0,0,0,0.9); height: 65px; display: flex; 
            justify-content: space-around; align-items: center; 
            border-bottom: 3px solid var(--dark-wine); position: relative; z-index: 100;
        }
        .nav-btn { font-size: 26px; cursor: pointer; position: relative; }
        .badge {
            position: absolute; top: -5px; right: -10px; background: red;
            color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; display: none;
        }

        /* 12 ოთახის ზოლი */
        .rooms-strip {
            display: flex; overflow-x: auto; background: rgba(74, 4, 4, 0.2);
            padding: 10px; gap: 10px; border-bottom: 1px solid var(--dark-wine);
            position: relative; z-index: 90;
        }
        .room-card {
            padding: 6px 15px; background: var(--dark-wine); color: white;
            border-radius: 15px; cursor: pointer; white-space: nowrap;
        }

        /* ჩეთის არეალი */
        .app-body { display: flex; flex-direction: column; height: calc(100vh - 120px); position: relative; z-index: 10; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* მესიჯების სტილი (მარცხენა/მარჯვენა) */
        .msg { display: flex; align-items: flex-end; gap: 10px; max-width: 80%; }
        .msg.my-msg { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--dark-wine); cursor: pointer; }
        .bubble { 
            padding: 12px; border-radius: 15px; background: rgba(74, 4, 4, 0.4); 
            border: 1px solid var(--dark-wine); backdrop-filter: blur(5px);
        }
        .light-mode .bubble { background: #fff; color: #000; border-color: #ccc; }

        /* ფანჯრები (Modals) */
        .side-modal {
            position: fixed; top: 65px; left: 0; width: 100%; height: calc(100% - 65px);
            background: rgba(0,0,0,0.95); z-index: 200; display: none; padding: 20px;
        }

        /* ინპუტი ქვემოთ */
        .footer-input {
            height: 70px; background: #000; display: flex; align-items: center;
            padding: 0 15px; border-top: 2px solid var(--dark-wine);
        }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #1a1a1a; color: #fff; outline: none; }
    </style>
</head>
<body class="dark-mode">

    <div id="heart-screen"></div>

    <nav class="top-nav">
        <div class="nav-btn" onclick="showPanel('rooms')">🏠</div>
        <div class="nav-btn" onclick="showPanel('messenger')">💬 <span id="msg-badge" class="badge">0</span></div>
        <div class="nav-btn" onclick="showPanel('profile')">👤</div>
        <div class="nav-btn" onclick="showPanel('online')">👥</div>
        <div class="nav-btn" id="theme-btn">🌙</div>
    </nav>

    <div class="rooms-strip" id="rooms-container"></div>

    <div class="app-body">
        <div id="chat-window"></div>
        
        <div class="footer-input">
            <button onclick="toggleEmojiPicker()" style="background:none; border:none; font-size:25px; cursor:pointer;">😊</button>
            <input type="text" id="main-input" placeholder="ჩაწერე მესიჯი...">
            <button id="send-btn" style="background:var(--dark-wine); border:none; width:45px; height:45px; border-radius:50%; margin-left:10px; color:#fff; cursor:pointer;">➤</button>
        </div>
    </div>

    <div id="profile-panel" class="side-modal">
        <button onclick="closePanels()" style="color:red; float:right;">დახურვა</button>
        <h2>პროფილი</h2>
        <div style="text-align:center;">
            <img id="prof-img" src="https://via.placeholder.com/100" class="avatar" style="width:100px; height:100px;">
            <br><input type="file" id="upload-avatar" accept="image/*" style="margin-top:10px;">
            <br><input type="text" id="status-text" placeholder="სტატუსი..." style="width:80%; margin-top:10px; padding:10px;">
            <br><button onclick="saveProfile()" style="margin-top:10px; padding:10px 20px; background:green; color:#fff; border:none;">შენახვა</button>
        </div>
    </div>

    <div id="messenger-panel" class="side-modal">
        <button onclick="closePanels()" style="color:red; float:right;">X</button>
        <h2>პირადი მესინჯერი</h2>
        <div id="private-list"></div>
    </div>

    <script>
        const SB_URL = 'https://ftfciebnywbondaiarnc.supabase.co';
        const SB_KEY = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
        const _client = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = { id: 'test-user', role: 'owner' }; // აქ ჩაანაცვლებ ავტორიზაციით

        // 1. 12 ოთახის გენერაცია
        const roomsBox = document.getElementById('rooms-container');
        for(let i=1; i<=12; i++) {
            roomsBox.innerHTML += `<div class="room-card" onclick="joinRoom(${i})">ოთახი ${i}</div>`;
        }

        // 2. მესიჯების გამოტანა
        function appendMsg(m) {
            const isMe = m.user_id === currentUser.id;
            const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const html = `
                <div class="msg ${isMe ? 'my-msg' : ''}">
                    <img src="${m.profiles?.avatar_url || 'https://via.placeholder.com/45'}" class="avatar" onclick="openMiniProfile('${m.user_id}')">
                    <div class="bubble">
                        <div style="font-weight:bold; font-size:12px; color:var(--dark-wine)">${m.profiles?.username || 'User'}</div>
                        <div>${m.text}</div>
                        <span style="font-size:9px; opacity:0.6;">${time}</span>
                        ${currentUser.role === 'owner' || currentUser.role === 'admin' ? `<button onclick="deleteMsg('${m.id}')" style="font-size:8px; border:none; background:none; color:red; cursor:pointer;">წაშლა</button>` : ''}
                    </div>
                </div>
            `;
            document.getElementById('chat-window').innerHTML += html;
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }

        // 3. გალერეიდან ფოტოს ატვირთვა (Avatar)
        document.getElementById('upload-avatar').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            // აქ უნდა იყოს Supabase Storage ატვირთვა
            const { data, error } = await _client.storage.from('avatars').upload(`${Date.now()}_${file.name}`, file);
            if(data) {
                const imgUrl = _client.storage.from('avatars').getPublicUrl(data.path).data.publicUrl;
                document.getElementById('prof-img').src = imgUrl;
                // ბაზაში განახლება
                await _client.from('profiles').update({ avatar_url: imgUrl }).eq('id', currentUser.id);
            }
        };

        // 4. მცურავი გულები
        function spawnHeart() {
            const h = document.createElement('div');
            h.innerHTML = '❤'; h.className = 'floating-heart';
            h.style.left = Math.random() * 100 + 'vw';
            document.getElementById('heart-screen').appendChild(h);
            setTimeout(() => h.remove(), 12000);
        }
        setInterval(spawnHeart, 1500);

        // 5. ადმინის მიერ წაშლა
        async function deleteMsg(id) {
            if(confirm('დარწმუნებული ხარ?')) {
                await _client.from('messages').delete().eq('id', id);
                location.reload(); // რეალტაიმიც წაშლის
            }
        }

        // 6. რეჟიმის შეცვლა
        document.getElementById('theme-btn').onclick = () => {
            document.body.classList.toggle('light-mode');
            document.body.classList.toggle('dark-mode');
        };

        // პანელების მართვა
        function showPanel(name) {
            closePanels();
            if(name === 'profile') document.getElementById('profile-panel').style.display = 'block';
            if(name === 'messenger') document.getElementById('messenger-panel').style.display = 'block';
        }
        function closePanels() {
            document.querySelectorAll('.side-modal').forEach(m => m.style.display = 'none');
        }

        // Start
        async function init() {
            const { data } = await _client.from('messages').select('*, profiles(*)').order('created_at', {ascending:true});
            if(data) data.forEach(appendMsg);
        }
        init();

        // Realtime
        _client.channel('any').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, p => {
            init(); // თავიდან ტვირთავს ყველაფერს (პროფილებთან ერთად)
        }).subscribe();

    </script>
</body>
</html>
