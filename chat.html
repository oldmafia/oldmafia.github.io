<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: Arial; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .top-bar { background: #050505; padding: 15px; display: flex; align-items: center; border-bottom: 2px solid red; z-index: 1001; }
        .menu-btn { font-size: 25px; color: red; cursor: pointer; margin-right: 20px; z-index: 1002; }
        .current-room-name { flex: 1; font-weight: bold; font-size: 18px; text-shadow: 0 0 10px red; }

        /* მენიუ */
        .top-menu {
            position: absolute; top: -100%; left: 0; width: 250px; max-height: 80vh;
            background: rgba(15, 15, 15, 0.98); border: 1px solid red; border-top: none;
            transition: 0.4s ease-in-out; z-index: 1000; overflow-y: auto;
            padding: 70px 10px 15px 10px; box-sizing: border-box; display: flex; flex-direction: column; gap: 5px;
            border-bottom-right-radius: 15px;
        }
        .top-menu.open { top: 0; }
        .room-link { padding: 12px 15px; background: #111; border-radius: 5px; cursor: pointer; text-align: left; color: #ccc; font-size: 14px; border-left: 3px solid transparent; }
        .room-link:hover { border-left-color: red; color: white; background: #1a0000; }

        /* ჩატი და ავატარები */
        #chat-display { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 85%; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid red; object-fit: cover; flex-shrink: 0; }
        .msg-content { background: #0d0d0d; border: 1px solid #222; padding: 10px 15px; border-radius: 5px 15px 15px 15px; box-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
        .u-name { color: red; font-weight: bold; font-size: 12px; display: block; margin-bottom: 3px; }
        .u-text { color: #eee; font-size: 14px; line-height: 1.4; }

        /* ინპუტი */
        .input-box { padding: 15px; background: #050505; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .send-btn { background: red; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="current-room-name" id="roomTitle">☕ კაფე-ბარი</div>
    </div>

    <div id="topMenu" class="top-menu">
        <div class="room-link" onclick="selectRoom('☕ კაფე-ბარი')">☕ კაფე-ბარი</div>
        <div class="room-link" onclick="selectRoom('💎 ვიპ საუბრები')">💎 ვიპ საუბრები</div>
        <div class="room-link" onclick="selectRoom('🕵️ გამოძიება')">🕵️ გამოძიება</div>
        <div class="room-link" onclick="selectRoom('🔐 შიფროგრამა')">🔐 შიფროგრამა</div>
        <div class="room-link" onclick="selectRoom('❓ ვიქტორინა')">❓ ვიქტორინა</div>
        <div class="room-link" onclick="selectRoom('😵 ჩამოხრჩობანა')">😵 ჩამოხრჩობანა</div>
        <div class="room-link" onclick="selectRoom('🕴 მაფიის ღამე')">🕴 მაფიის ღამე</div>
        <div class="room-link" onclick="selectRoom('🃏 ჯოკერი')">🃏 ჯოკერი</div>
        <div class="room-link" onclick="selectRoom('🎲 ნარდი')">🎲 ნარდი</div>
        <div class="room-link" onclick="selectRoom('🎵 მუსიკა')">🎵 მუსიკა</div>
        <div class="room-link" onclick="selectRoom('😂 იუმორი')">😂 იუმორი</div>
        <div class="room-link" onclick="selectRoom('🛠 ადმინისტრაცია')">🛠 ადმინისტრაცია</div>
        <div class="room-link" onclick="selectRoom('🆘 დახმარება')">🆘 დახმარება</div>
        <div class="room-link" onclick="selectRoom('📢 ფორუმი')">📢 ფორუმი</div>
        <div class="room-link" onclick="logout()" style="color: red; margin-top: 10px; border: 1px dashed red;">🚪 გასვლა</div>
    </div>

    <div id="chat-display"></div>

    <div class="input-box">
        <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nickname') || "სტუმარი";
        let currentRoom = "☕ კაფე-ბარი";
        const defaultAvatar = "https://i.ibb.co/v3m6y6R/avatar.png";

        function toggleMenu() { document.getElementById('topMenu').classList.toggle('open'); }

        async function selectRoom(name) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = name;
            document.getElementById('topMenu').classList.remove('open');
            await loadMsgs();
        }

        async function loadMsgs() {
            const { data } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
            const chat = document.getElementById('chat-display');
            chat.innerHTML = "";
            data?.forEach(m => {
                renderMessage(m);
            });
            chat.scrollTop = chat.scrollHeight;
        }

        function renderMessage(m) {
            const chat = document.getElementById('chat-display');
            chat.innerHTML += `
                <div class="msg">
                    <img src="${defaultAvatar}" class="avatar">
                    <div class="msg-content">
                        <span class="u-name">${m.user_nam}</span>
                        <span class="u-text">${m.text}</span>
                    </div>
                </div>`;
        }

        async function sendMsg() {
            const inp = document.getElementById('msgInput');
            if(!inp.value.trim()) return;
            await _s.from('messages').insert([{ user_nam: myNick, text: inp.value, room_name: currentRoom }]);
            inp.value = "";
        }

        function logout() { localStorage.removeItem('nickname'); window.location.href = 'index.html'; }

        _s.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
            if(payload.new.room_name === currentRoom) {
                renderMessage(payload.new);
                document.getElementById('chat-display').scrollTop = document.getElementById('chat-display').scrollHeight;
            }
        }).subscribe();

        window.onload = loadMsgs;
    </script>
</body>
</html>
