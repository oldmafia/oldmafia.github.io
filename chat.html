<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Old Mafia - ჩატი</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body {
            --bg: #0a0508; --text: #f0e6e8; --card: #1a0f12; --border: #4a1a2a;
            --accent: #8b0000; --input: #1f1216;
            background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
        }
        body.day-mode { --bg: #fff5f0; --text: #2c1a1a; --card: #ffffff; --border: #e6b8a2; --accent: #8b0000; --input: #fffaf5; }
        
        .nav-bar { display: flex; justify-content: space-around; background: #120a0c; padding: 8px 0; border-bottom: 2px solid var(--accent); flex-wrap: wrap; }
        .nav-btn { font-size: 22px; background: none; border: none; color: #aa8a8a; cursor: pointer; padding: 6px 12px; border-radius: 30px; }
        .nav-btn.active { color: var(--accent); background: rgba(139,0,0,0.2); }
        
        .pages { flex: 1; position: relative; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; display: none; padding: 12px; }
        .page.active { display: block; }
        .section-title { font-size: 18px; margin-bottom: 12px; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; }
        
        .rooms-list { display: flex; flex-direction: column; gap: 8px; }
        .room-card { background: var(--card); padding: 14px; border-radius: 10px; border-left: 4px solid var(--accent); cursor: pointer; display: flex; gap: 12px; align-items: center; }
        .room-card:active { background: var(--accent); }
        .room-icon { font-size: 26px; }
        
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-header { background: var(--card); padding: 10px; display: flex; justify-content: space-between; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
        .close-btn { color: var(--accent); font-size: 24px; cursor: pointer; background: none; border: none; }
        .messages { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .message { background: var(--card); padding: 8px 12px; border-radius: 12px; max-width: 85%; align-self: flex-start; border: 1px solid var(--border); position: relative; }
        .message.own { align-self: flex-end; background: var(--accent); border: none; }
        .message-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
        .message-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; object-fit: cover; }
        .message-name { font-weight: bold; font-size: 12px; color: var(--accent); cursor: pointer; }
        .message.own .message-name { color: white; }
        .message-time { font-size: 9px; opacity: 0.6; margin-left: 5px; }
        .message-text { font-size: 14px; word-break: break-word; }
        .message-text img { max-width: 180px; max-height: 120px; border-radius: 8px; margin-top: 4px; cursor: pointer; }
        .delete-msg { position: absolute; right: 5px; top: 5px; background: none; border: none; color: white; cursor: pointer; font-size: 10px; opacity: 0; }
        .message:hover .delete-msg { opacity: 1; }
        
        .chat-input-area { background: var(--card); padding: 8px; display: flex; gap: 8px; border-radius: 12px; margin-top: 8px; border: 1px solid var(--border); }
        .icon-btn { background: var(--accent); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        .chat-input { flex: 1; padding: 10px; border-radius: 25px; border: 1px solid var(--accent); background: var(--input); color: var(--text); font-size: 14px; outline: none; }
        .send-btn { background: var(--accent); border: none; color: white; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        
        .user-item { background: var(--card); padding: 12px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); position: relative; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; object-fit: cover; }
        .user-name { font-weight: bold; font-size: 15px; }
        .user-status { font-size: 11px; opacity: 0.7; }
        .friend-badge { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #2d6a4f; color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; }
        .add-badge { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--accent); color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; cursor: pointer; }
        .request-badge { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #b8860b; color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; cursor: pointer; }
        
        .emoji-panel {
            position: fixed; bottom: 80px; left: 10px; right: 10px; background: var(--card); border: 2px solid var(--accent);
            border-radius: 16px; display: none; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px;
            z-index: 2000; max-height: 250px; overflow-y: auto;
        }
        .emoji-panel.active { display: grid; }
        .emoji-item { font-size: 32px; text-align: center; cursor: pointer; padding: 6px; border-radius: 8px; }
        .emoji-item:hover { background: var(--accent); transform: scale(1.05); }
        
        .photo-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 4000; padding: 20px; }
        .photo-modal-content { background: var(--card); border-radius: 20px; max-width: 380px; width: 100%; border: 2px solid var(--accent); overflow: hidden; }
        .photo-modal-img { width: 100%; max-height: 55vh; object-fit: contain; }
        .photo-actions { display: flex; gap: 15px; justify-content: center; padding: 10px; border-top: 1px solid var(--border); }
        
        .pm-chat-container { position: fixed; bottom: 10px; right: 10px; width: 300px; max-width: calc(100% - 20px); height: 420px; background: var(--card); border: 2px solid var(--accent); border-radius: 16px; display: flex; flex-direction: column; z-index: 2000; }
        @media (max-width: 768px) { .pm-chat-container { width: 90%; right: 5%; left: 5%; bottom: 10px; height: 45vh; } }
        .pm-header { background: var(--accent); padding: 10px; display: flex; justify-content: space-between; border-radius: 14px 14px 0 0; cursor: pointer; }
        .pm-messages { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
        .pm-message { background: var(--input); padding: 6px 10px; border-radius: 12px; max-width: 85%; align-self: flex-start; }
        .pm-message.own { align-self: flex-end; background: var(--accent); }
        .pm-input-area { display: flex; padding: 8px; gap: 8px; border-top: 1px solid var(--border); }
        .pm-input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--accent); background: var(--input); color: var(--text); }
        
        .profile-card { text-align: center; padding: 20px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto; cursor: pointer; object-fit: cover; }
        .status-input { width: 80%; margin-top: 15px; padding: 10px; border-radius: 25px; border: 1px solid var(--accent); background: var(--input); color: var(--text); text-align: center; }
        .album-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .album-photo { aspect-ratio: 1; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid var(--accent); }
        .upload-btn { background: var(--accent); border: none; color: white; padding: 10px; border-radius: 25px; margin: 10px 0; cursor: pointer; width: 100%; }
        
        .empty-state { text-align: center; padding: 40px; opacity: 0.5; }
        .notification { position: fixed; top: 70px; right: 10px; background: var(--accent); color: white; padding: 8px 15px; border-radius: 20px; z-index: 5000; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .heart { position: fixed; bottom: 0; font-size: 32px; pointer-events: none; animation: floatUp 5s forwards; z-index: 9999; filter: drop-shadow(0 0 10px #ff3366) drop-shadow(0 0 5px #8b0000); }
        @keyframes floatUp { 0% { bottom: 0; opacity: 1; transform: scale(1); } 50% { transform: scale(1.3); } 100% { bottom: 100%; opacity: 0; transform: scale(0.8) translateX(40px); } }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="friends">👥</button>
        <button class="nav-btn" data-page="online">🌐</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeToggle">🌙</button>
    </div>
    
    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 12 სათამაშო ოთახი</div>
            <div id="roomsList" class="rooms-list"></div>
        </div>
        
        <div id="messagesPage" class="page">
            <div class="section-title">💬 პირადი მიმოწერა</div>
            <div id="pmList"></div>
        </div>
        
        <div id="friendsPage" class="page">
            <div class="section-title">👥 ჩემი მეგობრები</div>
            <div id="friendsList"></div>
            <div class="section-title" style="margin-top:20px;">📨 მეგობრობის მოთხოვნები</div>
            <div id="friendRequestsList"></div>
        </div>
        
        <div id="onlinePage" class="page">
            <div class="section-title">🌐 ყველა მომხმარებელი</div>
            <div id="onlineList"></div>
        </div>
        
        <div id="profilePage" class="page">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()">👤</div>
                <h2 id="profileName"></h2>
                <input type="text" id="statusInput" class="status-input" placeholder="სტატუსი...">
                <button class="upload-btn" onclick="saveStatus()">💾 სტატუსის შენახვა</button>
                <div class="section-title" style="margin-top:20px;">📸 ჩემი ალბომი</div>
                <button class="upload-btn" onclick="document.getElementById('albumInput').click()">➕ ფოტოს დამატება</button>
                <div id="albumGrid" class="album-grid"></div>
                <input type="file" id="albumInput" hidden accept="image/*" onchange="addToAlbum(this)">
            </div>
            <input type="file" id="avatarInput" hidden accept="image/*" onchange="uploadAvatar(this)">
            <input type="file" id="emojiUploadInput" hidden accept="image/*" onchange="uploadEmojiImage(this)">
        </div>
        
        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-header">
                    <span id="chatRoomName">ოთახი</span>
                    <button class="close-btn" onclick="closeChat()">✕</button>
                </div>
                <div id="chatMessages" class="messages"></div>
                <div class="chat-input-area">
                    <button class="icon-btn" onclick="openEmojiPanel('chat')">😊</button>
                    <button class="icon-btn" onclick="document.getElementById('chatPhotoInput').click()">📷</button>
                    <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
            <input type="file" id="chatPhotoInput" hidden accept="image/*" onchange="addPhotoToMessage(this)">
        </div>
    </div>
    <div id="emojiPanel" class="emoji-panel"></div>
    <div id="hearts"></div>
    <div id="pmContainer"></div>

    <script>
        // ============ მომხმარებელი ============
        let currentUser = localStorage.getItem('mafia_user');
        if (!currentUser || currentUser === "null") {
            currentUser = localStorage.getItem('nickname');
            if (!currentUser || currentUser === "null") currentUser = "Abu007";
            localStorage.setItem('mafia_user', currentUser);
        }
        console.log("✅ მომხმარებელი:", currentUser);
        
        let currentRoom = null;
        let currentPMUser = null;
        let currentEmojiTarget = 'chat';
        const OWNER = "Abu007";
        const ADMINS = ["Abu007", "Lukinio", "AdminMafia"];
        
        let users = [];
        let messages = [];
        let privateMessages = [];
        let friendRequests = [];
        let customEmojis = [];
        let userAlbums = {};
        
        const ROOMS = [
            { icon: "☕", name: "კაფე-ბარი" }, { icon: "🎲", name: "ნარდი" }, { icon: "🃏", name: "ჯოკერი" },
            { icon: "💎", name: "VIP" }, { icon: "📝", name: "ფორუმი" }, { icon: "🛠️", name: "ადმინები" },
            { icon: "😂", name: "იუმორი" }, { icon: "🏆", name: "შიფროგრამა" }, { icon: "🎭", name: "გამოძიება" },
            { icon: "🎵", name: "მუსიკა" }, { icon: "⁉️", name: "ვიქტორინა" }, { icon: "🆘", name: "დახმარება" }
        ];
        
        function loadData() {
            // მომხმარებლები
            let savedUsers = localStorage.getItem('mafia_users_global');
            if (savedUsers) users = JSON.parse(savedUsers);
            else users = [
                { username: "Abu007", status: "👑 დამფუძნებელი", avatar: null, role: "owner" },
                { username: "Lukinio", status: "🔧 ადმინი", avatar: null, role: "admin" },
                { username: "Giorgi", status: "ონლაინ", avatar: null, role: "user" },
                { username: "Nika", status: "ონლაინ", avatar: null, role: "user" }
            ];
            
            // 🔥 შეტყობინებები - გლობალურად
            let savedMessages = localStorage.getItem('mafia_messages_global');
            if (savedMessages) messages = JSON.parse(savedMessages);
            else messages = [];
            
            // პირადი შეტყობინებები - გლობალურად
            let savedPM = localStorage.getItem('mafia_pm_global');
            if (savedPM) privateMessages = JSON.parse(savedPM);
            else privateMessages = [];
            
            // მეგობრობის მოთხოვნები - გლობალურად
            let savedRequests = localStorage.getItem('mafia_friend_requests_global');
            if (savedRequests) friendRequests = JSON.parse(savedRequests);
            else friendRequests = [];
            
            // ემოჯები
            let savedEmojis = localStorage.getItem('mafia_emojis_global');
            if (savedEmojis) customEmojis = JSON.parse(savedEmojis);
            else customEmojis = [];
            
            // ალბომები
            let savedAlbums = localStorage.getItem('mafia_albums_global');
            if (savedAlbums) userAlbums = JSON.parse(savedAlbums);
            else userAlbums = {};
            
            if (!users.find(u => u.username === currentUser)) {
                users.push({ username: currentUser, status: "ახალი მოთამაშე", avatar: null, role: "user" });
                saveUsers();
            }
            
            document.getElementById('profileName').innerHTML = currentUser;
            let user = users.find(u => u.username === currentUser);
            if (user?.avatar) {
                document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar})`;
                document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                document.getElementById('profileAvatar').innerHTML = '';
            }
            if (user?.status) document.getElementById('statusInput').value = user.status;
            renderAlbum();
        }
        
        function saveUsers() { localStorage.setItem('mafia_users_global', JSON.stringify(users)); }
        function saveMessages() { localStorage.setItem('mafia_messages_global', JSON.stringify(messages)); }
        function savePM() { localStorage.setItem('mafia_pm_global', JSON.stringify(privateMessages)); }
        function saveRequests() { localStorage.setItem('mafia_friend_requests_global', JSON.stringify(friendRequests)); }
        function saveEmojis() { localStorage.setItem('mafia_emojis_global', JSON.stringify(customEmojis)); }
        function saveAlbums() { localStorage.setItem('mafia_albums_global', JSON.stringify(userAlbums)); }
        
        // ============ ემოჯები ============
        function openEmojiPanel(target) {
            currentEmojiTarget = target;
            let panel = document.getElementById('emojiPanel');
            if (panel.classList.contains('active')) { panel.classList.remove('active'); return; }
            
            let defaultEmojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺', '💀', '👑', '💪', '🤡', '👻', '⭐'];
            let allEmojis = [...defaultEmojis, ...customEmojis];
            
            panel.innerHTML = '';
            allEmojis.forEach(emoji => {
                let div = document.createElement('div');
                div.className = 'emoji-item';
                if (typeof emoji === 'string' && emoji.startsWith('http')) {
                    div.innerHTML = `<img src="${emoji}" style="width:42px; height:42px; object-fit:cover; border-radius:8px;">`;
                    div.onclick = () => {
                        let input = target === 'chat' ? document.getElementById('messageInput') : document.getElementById('pmInput');
                        if(input) input.value += ` :img:${emoji}: `;
                        panel.classList.remove('active');
                    };
                } else {
                    div.textContent = emoji;
                    div.onclick = () => {
                        let input = target === 'chat' ? document.getElementById('messageInput') : document.getElementById('pmInput');
                        if(input) input.value += emoji;
                        panel.classList.remove('active');
                    };
                }
                panel.appendChild(div);
            });
            
            if (ADMINS.includes(currentUser) || currentUser === OWNER) {
                let addBtn = document.createElement('div');
                addBtn.className = 'emoji-item';
                addBtn.textContent = '➕';
                addBtn.style.background = 'var(--accent)';
                addBtn.style.borderRadius = '8px';
                addBtn.onclick = () => { panel.classList.remove('active'); document.getElementById('emojiUploadInput').click(); };
                panel.appendChild(addBtn);
            }
            panel.classList.add('active');
        }
        
        function uploadEmojiImage(input) {
            let file = input.files[0];
            if (file && (ADMINS.includes(currentUser) || currentUser === OWNER)) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    customEmojis.push(e.target.result);
                    saveEmojis();
                    showNotification('✅ ემოჯი დაემატა!');
                };
                reader.readAsDataURL(file);
            } else showNotification('❌ ემოჯის დამატება მხოლოდ ადმინებს შეუძლიათ!');
            input.value = '';
        }
        
        // ============ ალბომი ============
        function renderAlbum() {
            let container = document.getElementById('albumGrid');
            let userAlbum = userAlbums[currentUser] || [];
            if (userAlbum.length === 0) {
                container.innerHTML = '<div class="empty-state">ალბომი ცარიელია</div>';
                return;
            }
            container.innerHTML = userAlbum.map(photo => `<img src="${photo}" class="album-photo" onclick="openPhotoModal('${photo}')">`).join('');
        }
        
        function addToAlbum(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    if (!userAlbums[currentUser]) userAlbums[currentUser] = [];
                    userAlbums[currentUser].push(e.target.result);
                    saveAlbums();
                    renderAlbum();
                    showNotification('📸 ფოტო დაემატა ალბომში!');
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }
        
        function setAsProfilePhoto(photoUrl) {
            let user = users.find(u => u.username === currentUser);
            if (user) user.avatar = photoUrl;
            saveUsers();
            document.getElementById('profileAvatar').style.backgroundImage = `url(${photoUrl})`;
            document.getElementById('profileAvatar').style.backgroundSize = 'cover';
            document.getElementById('profileAvatar').innerHTML = '';
            renderOnlineUsers();
            showNotification('✅ პროფილის ფოტო განახლდა!');
        }
        
        function openPhotoModal(photoUrl) {
            let modal = document.createElement('div');
            modal.className = 'photo-modal';
            modal.innerHTML = `
                <div class="photo-modal-content">
                    <img src="${photoUrl}" class="photo-modal-img">
                    <div class="photo-actions">
                        <button class="action-btn" onclick="setAsProfilePhoto('${photoUrl}'); this.closest('.photo-modal').remove()" style="background:var(--accent); border:none; color:white; padding:8px 15px; border-radius:20px;">👤 პროფილის ფოტოდ</button>
                    </div>
                </div>
            `;
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            document.body.appendChild(modal);
        }
        
        // ============ მეგობრები ============
        function sendFriendRequest(targetUser) {
            if (targetUser === currentUser) { showNotification('❓ საკუთარ თავს ვერ დაუმატებ'); return; }
            if (friendRequests.some(r => r.from === currentUser && r.to === targetUser && r.status === 'pending')) {
                showNotification('⏳ მოთხოვნა უკვე გაგზავნილია!'); return;
            }
            if (isFriend(targetUser)) { showNotification('👥 უკვე მეგობრები ხართ!'); return; }
            friendRequests.push({ from: currentUser, to: targetUser, status: 'pending', date: Date.now() });
            saveRequests();
            showNotification(`📨 მოთხოვნა გაეგზავნა ${targetUser}-ს!`);
            renderFriendRequestsList();
            renderOnlineUsers();
        }
        
        function acceptFriendRequest(fromUser) {
            let request = friendRequests.find(r => r.from === fromUser && r.to === currentUser && r.status === 'pending');
            if (request) {
                request.status = 'accepted';
                saveRequests();
                showNotification(`✅ ${fromUser} დაემატა მეგობრებში!`);
                renderFriendRequestsList();
                renderFriendsList();
                renderOnlineUsers();
            }
        }
        
        function rejectFriendRequest(fromUser) {
            let request = friendRequests.find(r => r.from === fromUser && r.to === currentUser && r.status === 'pending');
            if (request) {
                request.status = 'rejected';
                saveRequests();
                showNotification(`❌ მოთხოვნა უარყავით`);
                renderFriendRequestsList();
                renderOnlineUsers();
            }
        }
        
        function getFriendsList() {
            return friendRequests.filter(r => r.status === 'accepted' && (r.from === currentUser || r.to === currentUser))
                .map(r => r.from === currentUser ? r.to : r.from);
        }
        
        function isFriend(username) {
            return getFriendsList().includes(username);
        }
        
        function hasPendingFromMe(username) {
            return friendRequests.some(r => r.from === currentUser && r.to === username && r.status === 'pending');
        }
        
        function hasPendingToMe(username) {
            return friendRequests.some(r => r.from === username && r.to === currentUser && r.status === 'pending');
        }
        
        // ============ ოთახები ============
        function renderRooms() {
            let html = '';
            ROOMS.forEach(room => {
                html += `<div class="room-card" onclick="openRoom('${room.name}')">
                    <span class="room-icon">${room.icon}</span>
                    <span>${room.name}</span>
                </div>`;
            });
            document.getElementById('roomsList').innerHTML = html;
        }
        
        function openRoom(roomName) {
            currentRoom = roomName;
            document.getElementById('chatRoomName').innerHTML = `📡 ${roomName}`;
            showPage('chat');
            renderMessages();
        }
        
        function closeChat() { currentRoom = null; showPage('home'); }
        
        // ============ შეტყობინებები ============
        function renderMessages() {
            let container = document.getElementById('chatMessages');
            let roomMessages = messages.filter(m => m.room === currentRoom).sort((a,b) => new Date(a.time) - new Date(b.time));
            
            if (roomMessages.length === 0) {
                container.innerHTML = '<div class="empty-state">💬 შეტყობინებები არ არის</div>';
                return;
            }
            
            let html = '';
            roomMessages.forEach(msg => {
                let user = users.find(u => u.username === msg.username) || {};
                let isOwner = msg.username === OWNER;
                let isAdmin = ADMINS.includes(msg.username);
                let timeStr = new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let avatarHtml = user.avatar ? `<img src="${user.avatar}" style="width:24px; height:24px; border-radius:50%; object-fit:cover;">` : `<div class="message-avatar">${msg.username.charAt(0).toUpperCase()}</div>`;
                let formattedText = escapeHtml(msg.text);
                formattedText = formattedText.replace(/:img:(.*?):/g, '<img src="$1" style="width:28px; height:28px; object-fit:cover; border-radius:6px; vertical-align:middle;">');
                
                html += `<div class="message ${msg.username === currentUser ? 'own' : ''}">
                    <div class="message-header">
                        ${avatarHtml}
                        <span class="message-name" onclick="startPM('${msg.username}')">${escapeHtml(msg.username)}</span>
                        <span class="message-time">${timeStr}</span>
                    </div>
                    <div class="message-text">${formattedText}${msg.image ? `<img src="${msg.image}" onclick="openPhotoModal('${msg.image}')">` : ''}</div>
                    ${(currentUser === OWNER || currentUser === msg.username) ? `<button class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</button>` : ''}
                </div>`;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMessage() {
            let input = document.getElementById('messageInput');
            let text = input.value.trim();
            let pendingImage = window.pendingImage;
            if (!text && !pendingImage) return;
            
            messages.push({
                id: Date.now(),
                username: currentUser,
                text: text || "",
                time: new Date().toISOString(),
                room: currentRoom,
                image: pendingImage || null
            });
            saveMessages();
            input.value = '';
            window.pendingImage = null;
            renderMessages();
        }
        
        function deleteMessage(msgId) {
            let msg = messages.find(m => m.id === msgId);
            if (!msg) return;
            if (currentUser === OWNER || msg.username === currentUser) {
                messages = messages.filter(m => m.id !== msgId);
                saveMessages();
                renderMessages();
            } else showNotification('❌ წაშლა არ შეგიძლია!');
        }
        
        function addPhotoToMessage(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    window.pendingImage = e.target.result;
                    showNotification('📷 ფოტო დაემატა! დააჭირე გაგზავნას');
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }
        
        // ============ მომხმარებლები ============
        function renderOnlineUsers() {
            let container = document.getElementById('onlineList');
            let html = '';
            users.filter(u => u.username !== currentUser).forEach(user => {
                let isFriendUser = isFriend(user.username);
                let pendingFromMe = hasPendingFromMe(user.username);
                let pendingToMe = hasPendingToMe(user.username);
                
                let badge = '';
                if (isFriendUser) badge = '<div class="friend-badge">✅ მეგობარი</div>';
                else if (pendingFromMe) badge = '<div class="request-badge" style="background:orange;">⏳ მოთხოვნა</div>';
                else if (pendingToMe) badge = '<div class="request-badge" style="background:gold; color:black;" onclick="event.stopPropagation(); acceptFriendRequest(\''+user.username+'\')">✅ მიღება</div>';
                else badge = '<div class="add-badge" onclick="event.stopPropagation(); sendFriendRequest(\''+user.username+'\')">➕ დამატება</div>';
                
                html += `<div class="user-item" onclick="startPM('${user.username}')">
                    <div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(user.username)} ${user.role === 'owner' ? '👑' : (user.role === 'admin' ? '🔧' : '')}</div><div class="user-status">${escapeHtml(user.status)}</div></div>
                    ${badge}
                </div>`;
            });
            container.innerHTML = html || '<div class="empty-state">მომხმარებლები არ არიან</div>';
        }
        
        function renderFriendsList() {
            let container = document.getElementById('friendsList');
            let friendsList = getFriendsList();
            let friendUsers = users.filter(u => friendsList.includes(u.username));
            if (friendUsers.length === 0) {
                container.innerHTML = '<div class="empty-state">მეგობრები არ არიან</div>';
                return;
            }
            let html = '';
            friendUsers.forEach(user => {
                html += `<div class="user-item" onclick="startPM('${user.username}')">
                    <div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(user.username)}</div><div class="user-status">${escapeHtml(user.status)}</div></div>
                    <div class="friend-badge">✅ მეგობარი</div>
                </div>`;
            });
            container.innerHTML = html;
        }
        
        function renderFriendRequestsList() {
            let container = document.getElementById('friendRequestsList');
            let pendingRequests = friendRequests.filter(r => r.to === currentUser && r.status === 'pending');
            if (pendingRequests.length === 0) {
                container.innerHTML = '<div class="empty-state">მოთხოვნები არ არის</div>';
                return;
            }
            let html = '';
            pendingRequests.forEach(req => {
                let user = users.find(u => u.username === req.from);
                html += `<div class="user-item" style="justify-content:space-between;">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="user-avatar" style="${user?.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user?.avatar ? '' : req.from.charAt(0).toUpperCase()}</div>
                        <div><div class="user-name">${escapeHtml(req.from)}</div><div class="user-status">მეგობრობის მოთხოვნა</div></div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button onclick="acceptFriendRequest('${req.from}'); this.closest('.user-item').remove()" style="background:#2d6a4f; border:none; color:white; padding:5px 12px; border-radius:20px;">✅ მიღება</button>
                        <button onclick="rejectFriendRequest('${req.from}'); this.closest('.user-item').remove()" style="background:#8b0000; border:none; color:white; padding:5px 12px; border-radius:20px;">❌ უარყოფა</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }
        
        // ============ პირადი მიმოწერა ============
        function startPM(username) {
            if (username === currentUser) { showNotification('საკუთარ თავთან არ შეიძლება'); return; }
            if (currentPMUser === username && document.getElementById('pmContainer').innerHTML) { closePM(); return; }
            currentPMUser = username;
            renderPMChat();
        }
        
        function renderPMChat() {
            if (!currentPMUser) return;
            let pmMsgs = privateMessages.filter(m => 
                (m.from === currentUser && m.to === currentPMUser) || 
                (m.from === currentPMUser && m.to === currentUser)
            ).sort((a,b) => new Date(a.time) - new Date(b.time));
            
            let msgHtml = pmMsgs.map(msg => `
                <div class="pm-message ${msg.from === currentUser ? 'own' : ''}">
                    <div style="font-size:9px; opacity:0.6;">${new Date(msg.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
            
            let pmHtml = `
                <div id="pmContainerInner" class="pm-chat-container">
                    <div class="pm-header" onclick="closePM()"><span>💬 ${escapeHtml(currentPMUser)}</span><span>✕</span></div>
                    <div class="pm-messages" id="pmMessages">${msgHtml || '<div class="empty-state" style="padding:20px;">მიმოწერა ცარიელია</div>'}</div>
                    <div class="pm-input-area">
                        <button class="icon-btn" style="width:36px; height:36px; font-size:18px;" onclick="openEmojiPanel('pm')">😊</button>
                        <input type="text" id="pmInput" class="pm-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()">
                        <button class="icon-btn" style="width:36px; height:36px;" onclick="sendPM()">➤</button>
                    </div>
                </div>
            `;
            document.getElementById('pmContainer').innerHTML = pmHtml;
            let pmDiv = document.getElementById('pmMessages');
            if (pmDiv) pmDiv.scrollTop = pmDiv.scrollHeight;
            document.getElementById('pmInput')?.focus();
        }
        
        function closePM() {
            document.getElementById('pmContainer').innerHTML = '';
            currentPMUser = null;
        }
        
        function sendPM() {
            let input = document.getElementById('pmInput');
            let text = input.value.trim();
            if (!text || !currentPMUser) return;
            privateMessages.push({
                id: Date.now(),
                from: currentUser,
                to: currentPMUser,
                text: text,
                time: new Date().toISOString()
            });
            savePM();
            input.value = '';
            renderPMChat();
            renderPrivateChatsList();
        }
        
        function renderPrivateChatsList() {
            let myPMs = privateMessages.filter(m => m.from === currentUser || m.to === currentUser);
            let usersSet = new Set();
            myPMs.forEach(m => {
                let other = m.from === currentUser ? m.to : m.from;
                usersSet.add(other);
            });
            let container = document.getElementById('pmList');
            if (usersSet.size === 0) {
                container.innerHTML = '<div class="empty-state">ჯერ არ გქონია მიმოწერა</div>';
                return;
            }
            let html = '';
            usersSet.forEach(username => {
                let lastMsg = myPMs.filter(m => (m.from === username || m.to === username)).pop();
                html += `<div class="user-item" onclick="startPM('${username}')">
                    <div class="user-avatar">${username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(username)}</div><div class="user-status">${lastMsg ? lastMsg.text.substring(0,30) : '...'}</div></div>
                </div>`;
            });
            container.innerHTML = html;
        }
        
        // ============ პროფილი ============
        function saveStatus() {
            let status = document.getElementById('statusInput').value;
            let user = users.find(u => u.username === currentUser);
            if (user) user.status = status;
            saveUsers();
            showNotification('✅ სტატუსი განახლდა!');
            renderOnlineUsers();
            renderFriendsList();
        }
        
        function uploadAvatar(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    let user = users.find(u => u.username === currentUser);
                    if (user) user.avatar = e.target.result;
                    saveUsers();
                    document.getElementById('profileAvatar').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                    document.getElementById('profileAvatar').innerHTML = '';
                    renderOnlineUsers();
                    renderFriendsList();
                    showNotification('✅ ავატარი განახლდა!');
                };
                reader.readAsDataURL(file);
            }
        }
        
        // ============ როლების მართვა ============
        function showUserProfile(username) {
            let user = users.find(u => u.username === username);
            if (!user) return;
            let isFriendUser = isFriend(username);
            let hasPendingFromMe = hasPendingFromMe(username);
            let hasPendingToMe = hasPendingToMe(username);
            
            let modal = document.createElement('div');
            modal.className = 'profile-modal';
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.right = '0';
            modal.style.bottom = '0';
            modal.style.background = 'rgba(0,0,0,0.8)';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.zIndex = '3000';
            modal.style.padding = '20px';
            
            modal.innerHTML = `
                <div style="background:var(--card); border-radius:20px; max-width:350px; width:100%; border:2px solid var(--accent); overflow-y:auto; max-height:80vh;">
                    <div style="background:var(--accent); padding:15px; text-align:center; position:relative;">
                        <button onclick="this.closest('.profile-modal').remove()" style="position:absolute; right:15px; top:15px; background:none; border:none; color:white; font-size:24px;">✕</button>
                        <div style="width:80px; height:80px; border-radius:50%; background:var(--accent-dark); display:flex; align-items:center; justify-content:center; font-size:40px; margin:0 auto; object-fit:cover; ${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                        <h3>${escapeHtml(user.username)}</h3>
                        <div>${escapeHtml(user.status)}</div>
                        <div>${user.role === 'owner' ? '👑 დამფუძნებელი' : (user.role === 'admin' ? '🔧 ადმინი' : '👤 მომხმარებელი')}</div>
                    </div>
                    <div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding:12px; border-top:1px solid var(--border);">
                        ${!isFriendUser && username !== currentUser && !hasPendingFromMe && !hasPendingToMe ? `<button onclick="sendFriendRequest('${username}'); this.closest('.profile-modal').remove()" style="background:#2d6a4f; border:none; color:white; padding:8px 12px; border-radius:20px;">➕ მეგობრობის მოთხოვნა</button>` : ''}
                        ${hasPendingFromMe ? `<button disabled style="background:orange; border:none; color:white; padding:8px 12px; border-radius:20px;">⏳ მოთხოვნა გაგზავნილია</button>` : ''}
                        ${hasPendingToMe ? `<button onclick="acceptFriendRequest('${username}'); this.closest('.profile-modal').remove()" style="background:#2d6a4f; border:none; color:white; padding:8px 12px; border-radius:20px;">✅ მიღება</button><button onclick="rejectFriendRequest('${username}'); this.closest('.profile-modal').remove()" style="background:#8b0000; border:none; color:white; padding:8px 12px; border-radius:20px;">❌ უარყოფა</button>` : ''}
                        ${isFriendUser ? `<button disabled style="background:#2d6a4f; border:none; color:white; padding:8px 12px; border-radius:20px;">✅ მეგობარი</button>` : ''}
                        <button onclick="startPM('${username}'); this.closest('.profile-modal').remove()" style="background:var(--accent-dark); border:none; color:white; padding:8px 12px; border-radius:20px;">💬 მიწერა</button>
                    </div>
                    ${currentUser === OWNER && username !== currentUser ? `
                        <div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding:12px; border-top:1px solid var(--border);">
                            ${user.role !== 'owner' ? `<button onclick="makeOwner('${username}'); this.closest('.profile-modal').remove()" style="background:gold; border:none; color:black; padding:8px 12px; border-radius:20px;">👑 დამფუძნებლად</button>` : ''}
                            ${user.role === 'admin' ? `<button onclick="removeAdmin('${username}'); this.closest('.profile-modal').remove()" style="background:#8b0000; border:none; color:white; padding:8px 12px; border-radius:20px;">🔻 ადმინის ჩამორთმევა</button>` : ''}
                            ${user.role === 'user' ? `<button onclick="makeAdmin('${username}'); this.closest('.profile-modal').remove()" style="background:#2d6a4f; border:none; color:white; padding:8px 12px; border-radius:20px;">🔧 ადმინად</button>` : ''}
                        </div>
                    ` : ''}
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function makeOwner(username) {
            let oldOwner = users.find(u => u.role === 'owner');
            if (oldOwner) oldOwner.role = 'user';
            let newOwner = users.find(u => u.username === username);
            if (newOwner) { newOwner.role = 'owner'; newOwner.status = '👑 დამფუძნებელი'; }
            saveUsers();
            showNotification(`✅ ${username} დამფუძნებელი გახდა!`);
            renderOnlineUsers();
            if(currentRoom) renderMessages();
        }
        
        function makeAdmin(username) {
            let user = users.find(u => u.username === username);
            if(user) { user.role = 'admin'; user.status = '🔧 ადმინი'; saveUsers(); showNotification(`✅ ${username} ადმინად დაინიშნა!`); renderOnlineUsers(); if(currentRoom) renderMessages(); }
        }
        
        function removeAdmin(username) {
            let user = users.find(u => u.username === username);
            if(user) { user.role = 'user'; user.status = 'ონლაინ'; saveUsers(); showNotification(`🔻 ${username} ადმინის უფლებები ჩამოერთვა!`); renderOnlineUsers(); if(currentRoom) renderMessages(); }
        }
        
        // ============ დამხმარე ============
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-page') === pageName) btn.classList.add('active');
            });
            if (pageName === 'online') renderOnlineUsers();
            if (pageName === 'friends') { renderFriendsList(); renderFriendRequestsList(); }
            if (pageName === 'messages') renderPrivateChatsList();
            if (pageName === 'profile') renderAlbum();
        }
        
        function showNotification(msg) {
            let notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2500);
        }
        
        function escapeHtml(text) {
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function startHearts() {
            setInterval(() => {
                let heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️', '💖', '💗', '💕', '💘', '❤️‍🔥'][Math.floor(Math.random()*6)];
                heart.style.left = Math.random() * 90 + '%';
                heart.style.fontSize = (28 + Math.random() * 20) + 'px';
                document.getElementById('hearts').appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 2000);
        }
        
        function toggleTheme() {
            document.body.classList.toggle('day-mode');
            let btn = document.getElementById('themeToggle');
            btn.innerHTML = document.body.classList.contains('day-mode') ? '☀️' : '🌙';
        }
        
        function init() {
            loadData();
            renderRooms();
            renderOnlineUsers();
            renderFriendsList();
            renderFriendRequestsList();
            renderPrivateChatsList();
            startHearts();
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => showPage(btn.getAttribute('data-page')));
            });
            showPage('home');
            console.log("✅ ჩატი გაშვებულია, მომხმარებელი:", currentUser);
            console.log("📨 სულ შეტყობინებები:", messages.length);
        }
        
        init();
    </script>
</body>
</html>
