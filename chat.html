<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩემი ჩათი</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --dark-wine: #4a0404;
            --wine-glow: rgba(74, 4, 4, 0.8);
            --cream: #f5f5dc;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* რეჟიმები */
        body.dark-mode { background: #000; color: white; }
        body.light-mode { background: var(--cream); color: #333; }

        /* ანიმაციური დიდი გულები */
        #heart-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
        .big-heart {
            position: absolute; font-size: 60px; /* დიდი ზომა */
            color: var(--dark-wine);
            filter: drop-shadow(0 0 15px var(--wine-glow));
            animation: floatHearts 12s infinite linear;
            opacity: 0;
        }
        @keyframes floatHearts {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.8) rotate(45deg); opacity: 0; }
        }

        /* აპლიკაციის სტრუქტურა */
        .main-container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* მენიუ ზემოთ */
        .top-navbar {
            background: rgba(0, 0, 0, 0.9);
            height: 65px; display: flex; justify-content: space-around;
            align-items: center; border-bottom: 3px solid var(--dark-wine);
        }
        .nav-btn { font-size: 26px; cursor: pointer; position: relative; }
        .msg-badge {
            position: absolute; top: -5px; right: -10px;
            background: #ff0000; color: white; font-size: 11px;
            padding: 2px 6px; border-radius: 50%;
        }

        /* ოთახების ჩამონათვალი (12 ოთახი) */
        .rooms-bar {
            background: rgba(74, 4, 4, 0.2);
            padding: 10px; overflow-x: auto; display: flex; gap: 10px;
            border-bottom: 1px solid var(--dark-wine);
        }
        .room-tag {
            padding: 5px 15px; background: var(--dark-wine); color: white;
            border-radius: 15px; font-size: 12px; white-space: nowrap; cursor: pointer;
        }

        /* ჩეთის ფანჯარა */
        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .msg-box {
            display: flex; align-items: flex-end; gap: 10px;
            max-width: 80%;
        }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--dark-wine); }
        .msg-text {
            padding: 12px; border-radius: 15px 15px 15px 0;
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--dark-wine);
            backdrop-filter: blur(8px);
        }
        .light-mode .msg-text { background: white; color: black; border-color: #ccc; }

        .time-label { font-size: 10px; opacity: 0.5; margin-top: 4px; display: block; }

        /* ქვედა საწერი ზოლი */
        .input-footer {
            padding: 15px; background: #000; display: flex; align-items: center;
            border-top: 2px solid var(--dark-wine);
        }
        #message-input {
            flex: 1; padding: 12px 20px; border-radius: 30px; border: none;
            background: #1a1a1a; color: white; outline: none;
        }
        #send-button {
            background: var(--dark-wine); color: white; border: none;
            width: 45px; height: 45px; border-radius: 50%; margin-left: 10px; cursor: pointer;
        }
    </style>
</head>
<body class="dark-mode">

    <div id="heart-screen"></div>

    <div class="main-container">
        <nav class="top-navbar">
            <div class="nav-btn">🏠</div>
            <div class="nav-btn">💬 <span class="msg-badge">0</span></div>
            <div class="nav-btn">👤</div>
            <div class="nav-btn">👥</div>
            <div class="nav-btn" id="day-night">🌙</div>
        </nav>

        <div class="rooms-bar" id="rooms-list">
            </div>

        <main id="chat-window">
            </main>

        <div class="input-footer">
            <button style="background:none; border:none; font-size:24px; cursor:pointer; margin-right:10px;">😊</button>
            <input type="text" id="message-input" placeholder="ჩაწერე რამე...">
            <button id="send-button">➤</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://ftfciebnywbondaiarnc.supabase.co';
        const SB_KEY = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const chatContainer = document.getElementById('chat-window');
        const msgInp = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-button');

        // 1. 12 ოთახის შექმნა
        const roomsDiv = document.getElementById('rooms-list');
        for(let i=1; i<=12; i++) {
            const r = document.createElement('div');
            r.className = 'room-tag';
            r.innerText = 'ოთახი ' + i;
            roomsDiv.appendChild(r);
        }

        // 2. სმს-ის გამოტანა (ავატარით და საათით)
        function drawMessage(m) {
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const div = document.createElement('div');
            div.className = 'msg-box';
            div.innerHTML = `
                <img src="https://ui-avatars.com/api/?name=User&background=4a0404&color=fff" class="msg-avatar">
                <div class="msg-text">
                    <div style="font-size: 13px;">${m.text || m.content || ''}</div>
                    <span class="time-label">${time}</span>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 3. ძველი სმს-ების წამოღება
        async function fetchAll() {
            const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
            if (data) {
                chatContainer.innerHTML = '';
                data.forEach(drawMessage);
            }
        }

        // 4. გაგზავნა
        sendBtn.onclick = async () => {
            const val = msgInp.value.trim();
            if (!val) return;
            await supabaseClient.from('messages').insert([{ text: val }]); // ვიყენებ 'text' სვეტს
            msgInp.value = '';
        };

        // 5. Realtime (რომ მაშინვე გამოჩნდეს)
        supabaseClient.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
            drawMessage(p.new);
        }).subscribe();

        // 6. დიდი მცურავი გულები
        function makeHeart() {
            const scr = document.getElementById('heart-screen');
            const h = document.createElement('div');
            h.innerHTML = '❤';
            h.className = 'big-heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (Math.random() * 4 + 8) + 's';
            scr.appendChild(h);
            setTimeout(() => h.remove(), 12000);
        }
        setInterval(makeHeart, 1500);

        // 7. ღამის რეჟიმის გადამრთველი
        document.getElementById('day-night').onclick = () => {
            document.body.classList.toggle('light-mode');
            document.body.classList.toggle('dark-mode');
        };

        fetchAll();
    </script>
</body>
</html>
