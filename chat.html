<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Emoji Board</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #ff0000; }
        body.night-mode { --bg: #000; --txt: #e0c8a8; --nav: #050505; --card: #111; --border: #222; }
        body.day-mode { --bg: #fff; --txt: #222; --nav: #eee; --card: #f9f9f9; --border: #ddd; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ⬆️ Navigation */
        .navigation { width: 100%; height: 60px; background: var(--nav); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { cursor: pointer; font-size: 24px; opacity: 0.5; color: var(--txt); }
        .nav-item.active { opacity: 1; color: var(--accent); }

        .page { display: none; flex: 1; overflow-y: auto; }
        .page.active { display: block; }

        /* 🏠 Rooms */
        .rooms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .room-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); border-bottom: 3px solid var(--accent); text-align: center; font-weight: bold; }

        /* 😊 Emoji Board (დაფა) */
        .emoji-board { 
            position: absolute; bottom: 70px; left: 10px; right: 10px; 
            background: var(--nav); border: 1px solid var(--accent); 
            border-radius: 15px; display: none; padding: 10px; 
            grid-template-columns: repeat(5, 1fr); gap: 10px; 
            max-height: 200px; overflow-y: auto; z-index: 2000;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        .emoji-board.show { display: grid; }
        .emoji-item { width: 100%; aspect-ratio: 1/1; object-fit: contain; cursor: pointer; }
        .admin-plus-btn { 
            border: 2px dashed var(--accent); border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; color: var(--accent); cursor: pointer; 
        }

        /* 💬 Chat Footer */
        .chat-footer { background: var(--nav); padding: 10px; border-top: 1px solid var(--border); position: relative; }
        .input-area { display: flex; gap: 8px; align-items: center; }
        .icon-btn { font-size: 24px; cursor: pointer; padding: 5px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid var(--accent); background: none; color: var(--txt); }

        /* 👥 Online */
        .u-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,0,0,0.1); }
        .u-row img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; border: 1px solid var(--accent); }
    </style>
</head>
<body class="night-mode">

    <div class="navigation">
        <div class="nav-item active" onclick="showPage('homePage', this)">🏠</div>
        <div class="nav-item" onclick="showPage('messengerPage', this)">💬</div>
        <div class="nav-item" onclick="showPage('onlinePage', this)">👥</div>
        <div class="nav-item" onclick="showPage('profilePage', this)">👤</div>
        <div class="nav-item" onclick="toggleMode()">🌗</div>
    </div>

    <div id="homePage" class="page active">
        <div class="rooms-grid">
            <div class="room-card" onclick="openRoom('კაფე-ბარი')">☕ კაფე-ბარი</div>
            <div class="room-card" onclick="openRoom('ნარდი')">🎲 ნარდი</div>
            <div class="room-card" onclick="openRoom('ჯოკერი')">🃏 ჯოკერი</div>
            <div class="room-card" onclick="openRoom('ადმინი')">🛠️ ადმინი</div>
        </div>
    </div>

    <div id="roomChatPage" class="page" style="flex-direction: column; display: none;">
        <div style="padding:12px; border-bottom:1px solid red; display:flex; justify-content:space-between;">
            <b id="roomTitle">ოთახი</b> <span onclick="showPage('homePage')" style="color:red;">✖</span>
        </div>
        <div id="roomMsgs" style="flex:1; overflow-y:auto; padding:15px;"></div>
        
        <div class="chat-footer">
            <div id="emojiBoard" class="emoji-board"></div>
            
            <div class="input-area">
                <span class="icon-btn" onclick="toggleEmojiBoard()">😊</span>
                <input type="text" id="msgInp" placeholder="დაწერე...">
                <button onclick="sendMsg()" style="background:red; color:white; border:none; border-radius:50%; width:40px; height:40px;">✈</button>
            </div>
        </div>
        <input type="file" id="upEmoji" hidden onchange="doUploadEmoji()">
    </div>

    <div id="onlinePage" class="page">
        <h3 style="padding:15px;">👥 ონლაინ ხალხი</h3>
        <div id="onlineUsers"></div>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        const myNick = localStorage.getItem('nickname') || "Abu007";
        const admins = ["Abu007", "Lukinio"];
        let currentRoom = "";

        async function init() {
            loadEmojis();
            loadOnline();
            _s.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, loadRoomMsgs).subscribe();
        }

        function toggleMode() { document.body.classList.toggle('night-mode'); document.body.classList.toggle('day-mode'); }

        // 😊 სმაილების დაფის მართვა
        function toggleEmojiBoard() {
            document.getElementById('emojiBoard').classList.toggle('show');
        }

        async function loadEmojis() {
            const { data } = await _s.from('custom_emojis').select('*');
            const board = document.getElementById('emojiBoard');
            let html = admins.includes(myNick) ? `<div class="admin-plus-btn" onclick="document.getElementById('upEmoji').click()">+</div>` : "";
            html += data?.map(e => `<img src="${e.emoji_url}" class="emoji-item" onclick="addEmoji('${e.emoji_url}')">`).join('') || "";
            board.innerHTML = html;
        }

        function addEmoji(url) {
            document.getElementById('msgInp').value += ` :img:${url}: `;
            document.getElementById('emojiBoard').classList.remove('show');
        }

        async function doUploadEmoji() {
            const file = document.getElementById('upEmoji').files[0];
            const path = `emojis/${Date.now()}`;
            await _s.storage.from('avatars').upload(path, file);
            const { data } = _s.storage.from('avatars').getPublicUrl(path);
            await _s.from('custom_emojis').insert({ emoji_url: data.publicUrl });
            loadEmojis();
        }

        // ჩატი
        function openRoom(name) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = name;
            showPage('roomChatPage');
            loadRoomMsgs();
        }

        async function loadRoomMsgs() {
            if(!currentRoom) return;
            const { data } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: false }).limit(30);
            const box = document.getElementById('roomMsgs');
            box.innerHTML = data?.reverse().map(m => `<div><b>${m.username}:</b> ${m.text.replace(/:img:(.*?):/g, '<img src="$1" style="width:25px; vertical-align:middle;">')}</div>`).join('') || "";
            box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const val = document.getElementById('msgInp').value;
            if(!val) return;
            await _s.from('messages').insert({ username: myNick, text: val, room_name: currentRoom });
            document.getElementById('msgInp').value = "";
        }

        async function loadOnline() {
            const { data } = await _s.from('profiles').select('*');
            document.getElementById('onlineUsers').innerHTML = data?.map(u => `
                <div class="u-row" onclick="location.href='pm.html?to=${u.username}'">
                    <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}">
                    <span>${u.username}</span>
                </div>
            `).join('') || "";
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => { p.style.display = 'none'; p.classList.remove('active'); });
            const t = document.getElementById(id);
            t.style.display = (id === 'roomChatPage') ? 'flex' : 'block';
            t.classList.add('active');
            if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
        }

        window.onload = init;
    </script>
</body>
</html>
