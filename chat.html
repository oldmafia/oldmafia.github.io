<!DOCTYPE html>

<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Old Mafia - ჩატი</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{--bg:#0a0508;--text:#f0e6e8;--card:#1a0f12;--border:#8b3a3a;--nav:#120a0c;--accent:#8b0000;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body.day-mode{--bg:#fdf5e6;--text:#3a2a2a;--card:#fff;--border:#d9b0a0;--nav:#fae6d8;--accent:#9b2e2e;}
.nav-bar{display:flex;justify-content:space-around;align-items:center;background:var(--nav);padding:6px 4px;border-bottom:2px solid var(--accent);}
.nav-btn{font-size:18px;background:none;border:none;color:#aa8a8a;cursor:pointer;padding:6px 10px;border-radius:30px;position:relative;}
.nav-btn.active{color:var(--accent);background:rgba(139,0,0,0.2);}
.badge{position:absolute;top:2px;right:2px;background:red;color:white;border-radius:50%;font-size:9px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;}
.logout-btn{background:#8b0000;color:white;border:none;padding:6px 10px;border-radius:20px;cursor:pointer;font-size:13px;}
#themeBtn{background:none;border:none;font-size:18px;cursor:pointer;padding:6px 10px;}
.pages{flex:1;position:relative;overflow:hidden;}
.page{position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;display:none;padding:10px;}
.page.active{display:block;}
.section-title{font-size:15px;margin:8px 0 10px;color:var(--accent);border-left:3px solid var(--accent);padding-left:8px;}
.room-card{background:var(--card);padding:13px;border-radius:10px;border-left:4px solid var(--accent);cursor:pointer;margin-bottom:7px;font-weight:bold;font-size:14px;}
.chat-container{display:flex;flex-direction:column;height:100%;}
.chat-header{background:var(--card);padding:9px 12px;border-radius:12px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.chat-header button{background:#5a0000;padding:5px 11px;margin:0;border-radius:20px;font-size:12px;color:white;border:none;cursor:pointer;}
.messages{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px;}
.msg-row{display:flex;align-items:flex-end;gap:6px;align-self:flex-start;}
.msg-row.own{flex-direction:row-reverse;align-self:flex-end;}
.msg-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background-size:cover;background-position:center;cursor:pointer;}
.message{background:var(--card);padding:7px 10px;border-radius:12px;position:relative;word-break:break-word;max-width:220px;}
.msg-row.own .message{background:var(--accent);}
.message-name{font-weight:bold;color:#ff8888;cursor:pointer;font-size:11px;}
.msg-row.own .message-name{color:#ffcccc;}
.message-time{font-size:10px;opacity:0.6;margin-left:5px;}
.message-text{font-size:13px;margin-top:3px;line-height:1.4;}
.message-img{max-width:150px;border-radius:8px;margin-top:5px;cursor:pointer;display:block;}
.delete-msg{position:absolute;right:4px;top:3px;background:rgba(0,0,0,0.5);border:none;color:white;cursor:pointer;font-size:9px;opacity:0;border-radius:4px;padding:2px 4px;}
.message:hover .delete-msg{opacity:1;}
.chat-input-area{display:flex;gap:5px;padding:7px;background:var(--card);border-radius:12px;margin-top:5px;align-items:center;}
.chat-input{flex:1;padding:9px 12px;border-radius:25px;border:1px solid var(--accent);background:var(--bg);color:var(--text);font-size:14px;outline:none;min-width:0;}
.send-btn{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;color:white;cursor:pointer;font-size:16px;flex-shrink:0;margin:0;}
.icon-btn{width:34px;height:34px;border-radius:50%;background:#5a0000;border:none;color:white;cursor:pointer;font-size:14px;flex-shrink:0;margin:0;}
#pendingImgWrap{display:none;padding:3px 8px;flex-direction:row;align-items:center;gap:5px;}
#pendingImgWrap img{max-height:40px;border-radius:6px;border:2px solid var(--accent);}
#pendingImgWrap button{margin:0;padding:2px 7px;font-size:11px;border-radius:12px;background:#5a0000;color:white;border:none;cursor:pointer;}
.user-item{background:var(--card);padding:10px;border-radius:12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer;position:relative;}
.user-avatar{width:42px;height:42px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background-size:cover;background-position:center;position:relative;}
.online-dot{position:absolute;bottom:0;right:0;width:11px;height:11px;background:#2ecc71;border-radius:50%;border:2px solid var(--card);}
.profile-avatar{width:88px;height:88px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:42px;margin:8px auto;cursor:pointer;background-size:cover;background-position:center;}
.status-input{width:82%;padding:9px;margin:7px auto;border-radius:25px;border:1px solid var(--accent);background:var(--bg);color:var(--text);text-align:center;display:block;outline:none;font-size:13px;}
.album-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:7px;}
.album-photo{aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;border:2px solid var(--accent);width:100%;}
button{background:var(--accent);color:white;border:none;padding:8px 16px;border-radius:25px;cursor:pointer;margin-top:7px;font-size:13px;}
.upload-btn{background:var(--accent);border:none;color:white;padding:9px;border-radius:25px;margin:5px 0;cursor:pointer;width:100%;font-size:13px;}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:3000;}
.modal-content{background:var(--card);border-radius:20px;padding:16px;max-width:330px;width:92%;text-align:center;max-height:84vh;overflow-y:auto;}
.action-btn{background:var(--accent);border:none;color:white;padding:7px 11px;border-radius:20px;cursor:pointer;margin:4px;font-size:12px;}
.action-btn.danger{background:#8b0000;}
.action-btn.success{background:#2d6a4f;}
.pm-window{position:fixed;bottom:16px;right:10px;width:285px;height:400px;background:var(--card);border:2px solid var(--accent);border-radius:16px;display:flex;flex-direction:column;z-index:2000;}
.pm-header{background:var(--accent);padding:9px 13px;border-radius:14px 14px 0 0;color:white;display:flex;justify-content:space-between;align-items:center;font-size:13px;}
.pm-messages{flex:1;overflow-y:auto;padding:9px;}
.pm-input{display:flex;padding:7px;gap:5px;border-top:1px solid var(--accent);}
.pm-input input{flex:1;padding:7px 11px;border-radius:20px;border:1px solid var(--accent);background:var(--bg);color:var(--text);outline:none;font-size:13px;}
.pm-input button{margin:0;padding:7px 11px;border-radius:20px;font-size:13px;}
.notification{position:fixed;top:65px;right:10px;background:var(--accent);padding:9px 14px;border-radius:20px;z-index:10000;animation:slideIn 0.3s;max-width:240px;font-size:13px;}
@keyframes slideIn{from{transform:translateX(110%);}to{transform:translateX(0);}}
.heart{position:fixed;bottom:0;pointer-events:none;animation:floatUp 5s forwards;z-index:9999;}
@keyframes floatUp{0%{bottom:0;opacity:1;}100%{bottom:100%;opacity:0;transform:scale(1.5);}}
.empty-state{text-align:center;padding:30px;opacity:0.5;font-size:13px;}
.friend-badge{position:absolute;right:8px;background:#2d6a4f;padding:3px 7px;border-radius:20px;font-size:11px;}
.add-badge{position:absolute;right:8px;background:var(--accent);padding:3px 7px;border-radius:20px;font-size:11px;cursor:pointer;}
.photo-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;z-index:4000;}
.photo-modal-content{background:var(--card);border-radius:18px;max-width:380px;width:92%;border:2px solid var(--accent);overflow:hidden;}
.photo-modal-img{width:100%;max-height:52vh;object-fit:contain;}
.photo-comments{padding:9px;max-height:130px;overflow-y:auto;border-top:1px solid var(--border);}
.comment-item{padding:4px 0;font-size:12px;border-bottom:1px solid var(--border);}
.comment-input-area{display:flex;gap:7px;padding:9px;border-top:1px solid var(--border);}
.comment-input{flex:1;padding:7px;border-radius:20px;border:1px solid var(--accent);background:var(--bg);color:var(--text);outline:none;font-size:13px;}
.emoji-panel{position:fixed;bottom:75px;left:8px;right:8px;background:var(--card);border-radius:14px;display:none;padding:9px;z-index:2000;max-height:260px;overflow-y:auto;border:1px solid var(--accent);}
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.emoji-item{font-size:24px;text-align:center;cursor:pointer;padding:5px;border-radius:8px;}
.emoji-item:hover{background:rgba(139,0,0,0.3);}
.score-bar{display:flex;gap:16px;justify-content:center;margin:8px 0;padding:10px;background:var(--card);border-radius:12px;}
.score-item{text-align:center;}
.score-item div:first-child{font-size:20px;}
.score-item div:nth-child(2){font-size:11px;opacity:0.7;}
.score-item div:last-child{font-weight:bold;color:var(--accent);}
</style>
</head>
<body>
<div class="nav-bar">
  <button class="nav-btn active" data-page="home">🏠</button>
  <button class="nav-btn" data-page="messages">💬</button>
  <button class="nav-btn" data-page="friends">👥</button>
  <button class="nav-btn" data-page="online">🌐</button>
  <button class="nav-btn" data-page="profile">👤</button>
  <button id="themeBtn">🌙</button>
  <button class="logout-btn" onclick="logout()">🚪</button>
</div>
<div class="pages">
  <div id="homePage" class="page active">
    <div class="section-title">🏰 სათამაშო ოთახები</div>
    <div id="roomsList"></div>
  </div>
  <div id="messagesPage" class="page">
    <div class="section-title">💬 პირადი მიმოწერა</div>
    <div id="pmList"></div>
  </div>
  <div id="friendsPage" class="page">
    <div class="section-title">👥 მეგობრები</div>
    <div id="friendsList"></div>
    <div class="section-title">📨 მოთხოვნები</div>
    <div id="requestsList"></div>
  </div>
  <div id="onlinePage" class="page">
    <div class="section-title">🌐 ყველა მომხმარებელი</div>
    <div id="usersList"></div>
  </div>
  <div id="profilePage" class="page">
    <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarFile').click()">👤</div>
    <button class="upload-btn" style="background:#5a0000;width:60%;margin:0 auto;display:block;" onclick="removeAvatar()">🗑️ ავატარის წაშლა</button>
    <h2 id="profileName" style="text-align:center;margin:6px 0;"></h2>
    <div id="scoreBar" class="score-bar"></div>
    <input type="text" id="statusInput" class="status-input" placeholder="სტატუსი...">
    <button class="upload-btn" onclick="saveStatus()">💾 სტატუსის შენახვა</button>
    <div class="section-title">📸 ალბომი</div>
    <button class="upload-btn" onclick="document.getElementById('albumFile').click()">➕ ფოტოს დამატება</button>
    <div id="albumGrid" class="album-grid"></div>
    <input type="file" id="avatarFile" hidden accept="image/*" onchange="uploadAvatar(this)">
    <input type="file" id="albumFile" hidden accept="image/*" onchange="addToAlbum(this)">
    <input type="file" id="emojiFile" hidden accept="image/*" onchange="uploadEmoji(this)">
  </div>
  <div id="chatPage" class="page">
    <div class="chat-container">
      <div class="chat-header">
        <span id="chatRoomName"></span>
        <button onclick="closeChat()">✕ გასვლა</button>
      </div>
      <div id="chatMessages" class="messages"></div>
      <div id="pendingImgWrap" style="display:none;padding:3px 8px;align-items:center;gap:5px;flex-direction:row;">
        <img id="pendingImgPreview" src="">
        <button onclick="clearPendingImg()">✕</button>
      </div>
      <div class="chat-input-area">
        <button class="icon-btn" onclick="toggleEmoji()">😊</button>
        <button class="icon-btn" onclick="document.getElementById('chatPhoto').click()">📷</button>
        <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე...">
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
      <input type="file" id="chatPhoto" hidden accept="image/*" onchange="addChatPhoto(this)">
    </div>
  </div>
</div>
<div id="emojiPanel" class="emoji-panel"></div>
<div id="hearts"></div>
<div id="pmContainer"></div>

<script>
const SUPABASE_URL='https://ftfciebnywbondaiarnc.supabase.co';
const SUPABASE_KEY='sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const currentUser=localStorage.getItem('mafia_user');
if(!currentUser||currentUser==='null'||currentUser===''){window.location.href='index.html';}
const OWNER='Abu007';
let currentRoom=null,currentPMUser=null,messagesChannel=null,pmChannel=null,pendingImage=null,pendingPMImage=null;
let users=JSON.parse(localStorage.getItem('mafia_users')||'[]');
let blockedUsers=JSON.parse(localStorage.getItem('mafia_blocked')||'[]');
const ROOMS=['☕ კაფე-ბარი','🎲 ნარდი','🃏 ჯოკერი','💎 VIP','📝 ფორუმი','🛠️ ადმინები','😂 იუმორი','🏆 შიფროგრამა','🎭 გამოძიება','🎵 მუსიკა','⁉️ ვიქტორინა','🆘 დახმარება'];
const EMOJIS=['😊','😂','❤️','🔥','👍','🎉','😍','🥳','😎','🥺','💀','👑','💪','🤡','👻','😘','🙏','😆','😅','🤔','😒','😢','😭','😤','🫡','😋','🤩','😏','🙄','😬','🤣','😇','🥰','😡','🤯','💯','✨','🎊','🍀'];

function saveLocal(){localStorage.setItem('mafia_users',JSON.stringify(users));localStorage.setItem('mafia_blocked',JSON.stringify(blockedUsers));}
function esc(t){if(!t)return'';let d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function notify(msg){let n=document.createElement('div');n.className='notification';n.textContent=msg;document.body.appendChild(n);setTimeout(()=>n.remove(),3000);}
function getAvatar(u){return users.find(x=>x.username===u)?.avatar||null;}
function isAdmin(u){if(u===OWNER)return true;let x=users.find(y=>y.username===u);return x?.role==='admin'||x?.role==='owner';}

// ინიციალიზაცია
async function initData(){
  const{data:p}=await db.from('profiles').select('*');
  if(p){p.forEach(x=>{let e=users.find(u=>u.username===x.username);if(!e){users.push({username:x.username,status:x.status||'ონლაინ',avatar:x.avatar||null,role:x.username===OWNER?'owner':(x.role==='Admin'?'admin':'user'),online:x.online||false});}else{if(x.status)e.status=x.status;if(x.avatar)e.avatar=x.avatar;e.online=x.online||false;}});saveLocal();}
  let me=users.find(u=>u.username===currentUser);
  if(!me)users.push({username:currentUser,status:'ახალი მოთამაშე',avatar:null,role:'user',online:true});
  else me.online=true;
  saveLocal();
  await db.from('profiles').update({online:true}).eq('username',currentUser);
  document.getElementById('profileName').textContent=currentUser;
  let mu=users.find(u=>u.username===currentUser);
  if(mu?.status)document.getElementById('statusInput').value=mu.status;
  updateAvatarUI();
  listenFriends();
  setInterval(checkBadges,10000);
  checkBadges();
  loadScores();
}

function updateAvatarUI(){
  let me=users.find(u=>u.username===currentUser);
  let av=document.getElementById('profileAvatar');
  if(me?.avatar){av.style.backgroundImage=`url(${me.avatar})`;av.style.backgroundSize='cover';av.innerHTML='';}
  else{av.style.backgroundImage='';av.innerHTML='👤';}
}

async function loadScores(){
  const{data}=await db.from('profiles').select('quiz_score,cipher_score').eq('username',currentUser).maybeSingle();
  let qs=data?.quiz_score||0,cs=data?.cipher_score||0;
  let bar=document.getElementById('scoreBar');
  if(bar)bar.innerHTML=`<div class="score-item"><div>⁉️</div><div>ვიქტორინა</div><div>${qs}</div></div><div class="score-item"><div>🏆</div><div>შიფროგრამა</div><div>${cs}</div></div>`;
}

// ბეჯები
async function checkBadges(){
  // მეგობრობის მოთხოვნები
  const{data:fr}=await db.from('friend_requests').select('id').eq('to_user',currentUser).eq('status','pending');
  let fb=document.querySelector('.nav-btn[data-page="friends"]');
  if(fb){let c=fr?.length||0;let b=fb.querySelector('.badge');if(c>0){if(!b){b=document.createElement('span');b.className='badge';fb.appendChild(b);}b.textContent=c;}else if(b)b.remove();}
  // PM
  const{data:pm}=await db.from('direct_messages').select('id').eq('to_user',currentUser).eq('is_read',false);
  let mb=document.querySelector('.nav-btn[data-page="messages"]');
  if(mb){let c=pm?.length||0;let b=mb.querySelector('.badge');if(c>0){if(!b){b=document.createElement('span');b.className='badge';mb.appendChild(b);}b.textContent=c;}else if(b)b.remove();}
}

// ოთახები
function renderRooms(){
  document.getElementById('roomsList').innerHTML=ROOMS.map(r=>`<div class="room-card" onclick="openRoom(this.dataset.room)" data-room="${esc(r)}">${r}</div>`).join('');
}

function openRoom(room){
  currentRoom=room;
  document.getElementById('chatRoomName').textContent=room;
  showPage('chat');
  listenToRoom(room);
  if(room==='⁉️ ვიქტორინა')startQuiz();
  else if(room==='🏆 შიფროგრამა')startCipher();
  else{hideQuiz();hideCipher();}
}

function closeChat(){
  if(messagesChannel){db.removeChannel(messagesChannel);messagesChannel=null;}
  currentRoom=null;hideQuiz();hideCipher();showPage('home');
}

// შეტყობინებები
async function listenToRoom(room){
  if(messagesChannel){await db.removeChannel(messagesChannel);messagesChannel=null;}
  await renderMessages(room);
  messagesChannel=db.channel('r_'+Date.now())
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`room=eq.${room}`},p=>{if(currentRoom===room)appendMsg(p.new);})
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'messages'},()=>{if(currentRoom===room)renderMessages(room);})
    .subscribe();
}

async function renderMessages(room){
  let c=document.getElementById('chatMessages');
  if(!c||currentRoom!==room)return;
  const{data:msgs,error}=await db.from('messages').select('*').eq('room',room).order('time',{ascending:true}).limit(100);
  if(error){console.error(error);return;}
  c.innerHTML=(!msgs||msgs.length===0)?'<div class="empty-state">💬 შეტყობინებები არ არის</div>':msgs.map(buildMsgHtml).join('');
  c.scrollTop=c.scrollHeight;
}

function buildMsgHtml(msg){
  let own=msg.sender===currentUser;
  let time=new Date(parseInt(msg.time)).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  let canDel=isAdmin(currentUser);
  let av=getAvatar(msg.sender);
  return `<div class="msg-row ${own?'own':''}" id="mr-${msg.id}">
    <div class="msg-avatar" style="${av?`background-image:url(${av});background-size:cover;`:''}" onclick="showProfile('${esc(msg.sender)}')">${av?'':esc((msg.sender||'?').charAt(0).toUpperCase())}</div>
    <div class="message" id="m-${msg.id}">
      <span class="message-name" onclick="showProfile('${esc(msg.sender)}')">${esc(msg.sender)}</span>
      <span class="message-time">${time}</span>
      <div class="message-text">${esc(msg.text)}</div>
      ${msg.image?`<img src="${msg.image}" class="message-img" onclick="openPhotoModal('${msg.id}','${esc(msg.sender)}','${encodeURIComponent(msg.image)}')">` :''}
      ${canDel?`<button class="delete-msg" onclick="delMsg(${msg.id})">🗑️</button>`:''}
    </div>
  </div>`;
}

function appendMsg(msg){
  let c=document.getElementById('chatMessages');if(!c)return;
  let e=c.querySelector('.empty-state');if(e)e.remove();
  c.insertAdjacentHTML('beforeend',buildMsgHtml(msg));
  c.scrollTop=c.scrollHeight;
}

async function sendMessage(){
  let input=document.getElementById('messageInput');
  let text=input.value.trim();
  if(!text&&!pendingImage)return;
  if(!currentRoom)return;
  const{error}=await db.from('messages').insert([{sender:currentUser,text:text||'',room:currentRoom,image:pendingImage||null,time:Date.now().toString()}]);
  if(error){notify('შეცდომა: '+error.message);return;}
  input.value='';clearPendingImg();
}

async function delMsg(id){
  await db.from('messages').delete().eq('id',id);
  let el=document.getElementById('mr-'+id);if(el)el.remove();
}

function addChatPhoto(input){
  let file=input.files[0];if(!file)return;
  let r=new FileReader();

// PM - ცხრილი: direct_messages (id,chat_id,from_user,to_user,text,image,time,is_read)
async function listenPM(other){
  if(pmChannel){await db.removeChannel(pmChannel);pmChannel=null;}
  let chatId=[currentUser,other].sort().join('_');
  await renderPMMessages(chatId);
  // mark as read
  await db.from('direct_messages').update({is_read:true}).eq('to_user',currentUser).eq('chat_id',chatId);
  pmChannel=db.channel('pm_'+chatId+'_'+Date.now())
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'direct_messages',filter:`chat_id=eq.${chatId}`},p=>{appendPMMsg(p.new);db.from('direct_messages').update({is_read:true}).eq('id',p.new.id).eq('to_user',currentUser);})
    .subscribe();
}

async function renderPMMessages(chatId){
  let c=document.getElementById('pmMessages');if(!c)return;
  const{data:msgs,error}=await db.from('direct_messages').select('*').eq('chat_id',chatId).order('time',{ascending:true});
  if(error){notify('PM შეცდომა: '+error.message);return;}
  c.innerHTML=(!msgs||msgs.length===0)?'<div style="text-align:center;padding:15px;opacity:0.5;font-size:12px;">მიმოწერა ცარიელია</div>':msgs.map(buildPMHtml).join('');
  c.scrollTop=c.scrollHeight;
}

function buildPMHtml(msg){
  let own=msg.from_user===currentUser;
  let time=new Date(parseInt(msg.time)).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  return `<div style="text-align:${own?'right':'left'};margin:5px 0;">
    <div style="background:${own?'#8b0000':'#2a1a1a'};display:inline-block;padding:6px 10px;border-radius:12px;max-width:88%;word-break:break-word;font-size:13px;">
      ${msg.image?`<img src="${msg.image}" style="max-width:120px;border-radius:8px;display:block;margin-bottom:4px;">`:''}
      ${esc(msg.text)}
    </div>
    <div style="font-size:9px;opacity:0.6;margin-top:2px;">${time}</div>
  </div>`;
}

function appendPMMsg(msg){
  let c=document.getElementById('pmMessages');if(!c)return;
  c.insertAdjacentHTML('beforeend',buildPMHtml(msg));
  c.scrollTop=c.scrollHeight;
}

// ვიქტორინა
let quizQ=[],quizI=0,quizS=0;
async function startQuiz(){
  const{data,error}=await db.from('quiz_questions').select('*');
  if(error||!data||data.length===0){notify('კითხვები ვერ მოიძებნა!');return;}
  quizQ=data.sort(()=>Math.random()-0.5);quizI=0;quizS=0;showQuizQ();
}
function showQuizQ(){
  let ex=document.getElementById('quizBox');if(ex)ex.remove();
  if(quizI>=quizQ.length){showQuizResult();return;}
  let q=quizQ[quizI];
  let opts=q.options;
  if(typeof opts==='string'){try{opts=JSON.parse(opts);}catch(e){opts=[];}}
  let box=document.createElement('div');box.id='quizBox';
  box.style.cssText='position:fixed;bottom:80px;left:10px;right:10px;background:var(--card);border:2px solid var(--accent);border-radius:16px;padding:14px;z-index:3000;';
  box.innerHTML=`<div style="font-size:12px;opacity:0.6;margin-bottom:6px;">კითხვა ${quizI+1}/${quizQ.length} • ქულა: ${quizS}</div>
    <div style="font-weight:bold;font-size:14px;margin-bottom:10px;">${esc(q.question)}</div>
    <div id="quizOpts" style="display:flex;flex-direction:column;gap:7px;">
      ${(opts||[]).map((o,i)=>`<button onclick="answerQuiz(${i})" style="background:#2a1a1a;border:1px solid var(--accent);color:var(--text);padding:8px 12px;border-radius:10px;cursor:pointer;text-align:left;font-size:13px;">${esc(String(o))}</button>`).join('')}
    </div>
    <button onclick="hideQuiz()" style="margin-top:8px;background:#333;font-size:12px;padding:5px 10px;">✕ დახურვა</button>`;
  document.body.appendChild(box);
}
async function answerQuiz(sel){
  let q=quizQ[quizI];let opts=q.options;
  if(typeof opts==='string'){try{opts=JSON.parse(opts);}catch(e){opts=[];}}
  let btns=document.querySelectorAll('#quizOpts button');
  let correct=typeof q.answer==='number'?q.answer:(opts||[]).findIndex(o=>o===q.answer);
  btns.forEach((b,i)=>{b.disabled=true;if(i===correct)b.style.background='#2d6a4f';else if(i===sel&&i!==correct)b.style.background='#8b0000';});
  if(sel===correct){quizS++;notify('✅ სწორია! +1 ქულა');}else notify('❌ არასწორი!');
  quizI++;
  if(quizI>=quizQ.length){
    const{data:pr}=await db.from('profiles').select('quiz_score').eq('username',currentUser).maybeSingle();
    let cur=pr?.quiz_score||0;
    if(quizS>cur){await db.from('profiles').update({quiz_score:quizS}).eq('username',currentUser);notify('🏆 ახალი რეკორდი: '+quizS);}
  }
  setTimeout(()=>{let b=document.getElementById('quizBox');if(b)b.remove();showQuizQ();},1500);
}
function showQuizResult(){
  let box=document.createElement('div');box.id='quizBox';
  box.style.cssText='position:fixed;bottom:80px;left:10px;right:10px;background:var(--card);border:2px solid var(--accent);border-radius:16px;padding:16px;z-index:3000;text-align:center;';
  box.innerHTML=`<div style="font-size:32px;">🏆</div><div style="font-size:16px;font-weight:bold;margin:8px 0;">ვიქტორინა დასრულდა!</div>
    <div style="font-size:14px;">ქულა: <b>${quizS}</b> / ${quizQ.length}</div>
    <button onclick="startQuiz()" style="margin:5px;">🔄 თავიდან</button>
    <button onclick="hideQuiz()" style="margin:5px;background:#333;">✕ დახურვა</button>`;
  document.body.appendChild(box);
}
function hideQuiz(){let b=document.getElementById('quizBox');if(b)b.remove();}

// შიფროგრამა
let cWord='',cGuessed=[],cWrong=0;
async function startCipher(){
  const{data,error}=await db.from('cipher_games').select('*');
  if(error||!data||data.length===0){notify('სიტყვები ვერ მოიძებნა!');return;}
  let q=data[Math.floor(Math.random()*data.length)];
  cWord=q.word.toUpperCase();cGuessed=[];cWrong=0;showCipher(q.hint||'');
}
function showCipher(hint){
  let ex=document.getElementById('cipherBox');if(ex)ex.remove();
  let display=cWord.split('').map(l=>cGuessed.includes(l)?l:'_').join(' ');
  let allLetters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  let box=document.createElement('div');box.id='cipherBox';
  box.style.cssText='position:fixed;bottom:80px;left:10px;right:10px;background:var(--card);border:2px solid var(--accent);border-radius:16px;padding:14px;z-index:3000;';
  box.innerHTML=`<div style="font-size:12px;opacity:0.6;margin-bottom:4px;">🏆 შიფროგრამა • ❌ ${cWrong}/6</div>
    ${hint?`<div style="font-size:12px;opacity:0.7;margin-bottom:6px;">💡 ${esc(hint)}</div>`:''}
    <div style="font-size:22px;letter-spacing:6px;text-align:center;margin:10px 0;font-weight:bold;">${display}</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:8px 0;">
      ${allLetters.map(l=>`<button onclick="guessCipher('${l}','${esc(hint)}')" ${cGuessed.includes(l)?'disabled':''} style="padding:5px 8px;border-radius:6px;border:1px solid var(--accent);background:${cGuessed.includes(l)?(cWord.includes(l)?'#2d6a4f':'#8b0000'):'#2a1a1a'};color:white;cursor:pointer;font-size:12px;">${l}</button>`).join('')}
    </div>
    <button onclick="hideCipher()" style="margin-top:6px;background:#333;font-size:12px;padding:5px 10px;">✕ დახურვა</button>`;
  document.body.appendChild(box);
}
async function guessCipher(letter,hint){
  if(cGuessed.includes(letter))return;
  cGuessed.push(letter);
  if(!cWord.includes(letter))cWrong++;
  let display=cWord.split('').map(l=>cGuessed.includes(l)?l:'_').join(' ');
  let won=!display.includes('_'),lost=cWrong>=6;
  if(won){
    let score=Math.max(10-cWrong*2,1);
    const{data:pr}=await db.from('profiles').select('cipher_score').eq('username',currentUser).maybeSingle();
    let cur=pr?.cipher_score||0;
    await db.from('profiles').update({cipher_score:cur+score}).eq('username',currentUser);
    notify('🎉 სწორია! +'+score+' ქულა');loadScores();hideCipher();setTimeout(startCipher,2000);
  }else if(lost){
    notify('💀 წაიგე! სიტყვა: '+cWord);hideCipher();setTimeout(startCipher,2000);
  }else{hideCipher();showCipher(hint);}
}
function hideCipher(){let b=document.getElementById('cipherBox');if(b)b.remove();}

    const{error}=await db.from('emojis').insert([{name:'custom_'+Date.now(),emoji_url:e.target.result}]);
    if(!error)notify('✅ ემოჯი დაემატა!');else notify('შეცდომა: '+error.message);
  };
  r.readAsDataURL(f);input.value='';
}

// გულები
setInterval(()=>{let h=document.createElement('div');h.className='heart';h.innerHTML=['❤️','💖','💗','💘'][Math.floor(Math.random()*4)];h.style.left=Math.random()*100+'%';h.style.fontSize=(26+Math.random()*20)+'px';document.getElementById('hearts').appendChild(h);setTimeout(()=>h.remove(),5000);},3500);

// პროფილი
async function saveStatus(){
  let s=document.getElementById('statusInput').value.trim();
  let me=users.find(u=>u.username===currentUser);
  if(me){me.status=s;saveLocal();}
  await db.from('profiles').update({status:s}).eq('username',currentUser);
  notify('✅ სტატუსი განახლდა!');
}
function uploadAvatar(input){
  let f=input.files[0];if(!f)return;
  let r=new FileReader();
  r.onload=e=>{let me=users.find(u=>u.username===currentUser);if(me)me.avatar=e.target.result;saveLocal();updateAvatarUI();notify('✅ ავატარი განახლდა!');};
  r.readAsDataURL(f);input.value='';
}
function removeAvatar(){
  let me=users.find(u=>u.username===currentUser);if(me){me.avatar=null;saveLocal();}
  updateAvatarUI();notify('🗑️ ავატარი წაიშალა!');
}

// ალბომი - ცხრილი: user_photos (id, username, image_url, created_at)
async function renderAlbum(){
  let c=document.getElementById('albumGrid');if(!c)return;
  const{data}=await db.from('user_photos').select('*').eq('username',currentUser).order('created_at',{ascending:true});
  c.innerHTML=(!data||data.length===0)?'<div class="empty-state" style="grid-column:span 3;">ალბომი ცარიელია</div>':data.map(p=>`<div style="position:relative;">
    <img src="${p.image_url}" class="album-photo" onclick="openPhotoModal('${p.id}','${esc(currentUser)}','${encodeURIComponent(p.image_url)}')">
    <button onclick="deletePhoto(${p.id})" style="position:absolute;top:2px;right:2px;width:20px;height:20px;padding:0;margin:0;background:rgba(0,0,0,0.7);border-radius:50%;font-size:10px;border:none;cursor:pointer;color:white;">✕</button>
  </div>`).join('');
}
async function addToAlbum(input){
  let f=input.files[0];if(!f)return;
  let r=new FileReader();
  r.onload=async e=>{
    const{error}=await db.from('user_photos').insert([{username:currentUser,image_url:e.target.result}]);
    if(!error){notify('📸 ფოტო დაემატა!');renderAlbum();}else notify('შეცდომა: '+error.message);
  };
  r.readAsDataURL(f);input.value='';
}
async function deletePhoto(id){await db.from('user_photos').delete().eq('id',id);renderAlbum();notify('🗑️ ფოტო წაიშალა!');}
function setProfilePhoto(url){let me=users.find(u=>u.username===currentUser);if(me)me.avatar=url;saveLocal();updateAvatarUI();notify('✅ პროფილის ფოტო განახლდა!');}

// ფოტო მოდალი
async function openPhotoModal(photoId,username,encoded){
  let photoUrl=decodeURIComponent(encoded||'');
  const{data:comments}=await db.from('photo_comments').select('*').eq('photo_id',String(photoId)).order('created_at',{ascending:true});
  let modal=document.createElement('div');modal.className='photo-modal';
  modal.innerHTML=`<div class="photo-modal-content">
    <img src="${photoUrl}" class="photo-modal-img">
    <div style="padding:9px;display:flex;gap:7px;flex-wrap:wrap;">
      ${currentUser===username?`<button class="action-btn success" id="setProf">👤 პროფილის ფოტოდ</button>`:''}
      <button class="action-btn danger" onclick="this.closest('.photo-modal').remove()">✕ დახურვა</button>
    </div>
    <div class="photo-comments" id="photoC">
      ${(comments&&comments.length)?comments.map(c=>`<div class="comment-item"><b>${esc(c.from_user)}</b>: ${esc(c.text)}</div>`).join(''):'<div style="opacity:0.5;padding:6px;font-size:12px;">კომენტარები არ არის</div>'}
    </div>
    <div class="comment-input-area">
      <input type="text" id="photoCI" class="comment-input" placeholder="კომენტარი...">
      <button class="action-btn" id="addC">📝</button>
    </div>
  </div>`;
  if(modal.querySelector('#setProf'))modal.querySelector('#setProf').onclick=()=>{setProfilePhoto(photoUrl);modal.remove();};
  modal.querySelector('#addC').onclick=async()=>{
    let i=modal.querySelector('#photoCI');let t=i.value.trim();if(!t)return;
    const{error}=await db.from('photo_comments').insert([{photo_id:String(photoId),from_user:currentUser,text:t}]);
    if(!error){const{data:nc}=await db.from('photo_comments').select('*').eq('photo_id',String(photoId)).order('created_at',{ascending:true});modal.querySelector('#photoC').innerHTML=(nc||[]).map(c=>`<div class="comment-item"><b>${esc(c.from_user)}</b>: ${esc(c.text)}</div>`).join('');i.value='';}
    else notify('შეცდომა: '+error.message);
  };
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  document.body.appendChild(modal);
}

// მომხმარებლის პროფილი
async function showProfile(username){
  let user=users.find(u=>u.username===username);
  if(!user){notify('მომხმარებელი ვერ მოიძებნა');return;}
  const{data:reqData}=await db.from('friend_requests').select('*').or(`and(from_user.eq.${currentUser},to_user.eq.${username}),and(from_user.eq.${username},to_user.eq.${currentUser})`);
  let req=reqData&&reqData[0];
  let isFr=req?.status==='accepted',pendMe=req?.status==='pending'&&req?.from_user===currentUser,pendTo=req?.status==='pending'&&req?.to_user===currentUser;
  let isBlocked=blockedUsers.includes(username),amAdmin=isAdmin(currentUser);
  const{data:photos}=await db.from('user_photos').select('*').eq('username',username).limit(6);
  const{data:scores}=await db.from('profiles').select('quiz_score,cipher_score').eq('username',username).maybeSingle();

  let modal=document.createElement('div');modal.className='modal';
  modal.innerHTML=`<div class="modal-content">
    <div style="width:78px;height:78px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 10px;${user.avatar?`background-image:url(${user.avatar});background-size:cover;`:''}">${user.avatar?'':user.username.charAt(0).toUpperCase()}</div>
    <h3>${esc(user.username)}</h3>
    <p style="opacity:0.8;font-size:12px;margin:4px 0;">${esc(user.status||'')}</p>
    <p style="font-size:12px;">${user.role==='owner'?'👑 დამფუძნებელი':user.role==='admin'?'🔧 ადმინი':'👤 მომხმარებელი'}</p>
    ${scores?`<div style="display:flex;gap:12px;justify-content:center;margin:8px 0;font-size:12px;">
      <span>⁉️ ${scores.quiz_score||0}</span><span>🏆 ${scores.cipher_score||0}</span>
    </div>`:''}
    ${photos&&photos.length?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:10px 0;">
      ${photos.map(p=>`<img src="${p.image_url}" style="aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid var(--accent);" onclick="openPhotoModal('${p.id}','${esc(username)}','${encodeURIComponent(p.image_url)}')">`).join('')}
    </div>`:''}
    <div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:10px;">
      ${username!==currentUser&&!isFr&&!pendMe&&!pendTo?`<button class="action-btn success" id="aF">➕ მეგობრობა</button>`:''}
      ${pendMe?`<button class="action-btn" disabled>⏳ მოთხოვნა</button>`:''}
      ${pendTo?`<button class="action-btn success" id="acF">✅ მიღება</button><button class="action-btn danger" id="rjF">❌ უარყოფა</button>`:''}
      ${isFr?`<button class="action-btn success" disabled>✅ მეგობარი</button>`:''}
      ${username!==currentUser?`<button class="action-btn" id="pmB">💬 მიწერა</button>`:''}
      ${username!==currentUser&&!isBlocked?`<button class="action-btn danger" id="blB">🔒 დაბლოკვა</button>`:''}
      ${isBlocked?`<button class="action-btn success" id="unB">🔓 განბლოკვა</button>`:''}
    </div>
    ${amAdmin&&username!==currentUser?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid #8b3a3a;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;">
      ${user.role==='user'?`<button class="action-btn success" id="mkA">🔧 ადმინად</button>`:''}
      ${user.role==='admin'?`<button class="action-btn" id="rmA">🔻 ადმინი ჩამოართვი</button>`:''}
      ${currentUser===OWNER&&user.role!=='owner'?`<button class="action-btn success" id="mkO">👑 დამფუძნებლად</button>`:''}
    </div>`:''}
    <button onclick="this.closest('.modal').remove()" style="background:#333;margin-top:10px;">დახურვა</button>
  </div>`;

  if(modal.querySelector('#aF'))modal.querySelector('#aF').onclick=()=>{sendFriendReq(username);modal.remove();};
  if(modal.querySelector('#acF'))modal.querySelector('#acF').onclick=()=>{acceptFriend(username);modal.remove();};
  if(modal.querySelector('#rjF'))modal.querySelector('#rjF').onclick=()=>{rejectFriend(username);modal.remove();};
  if(modal.querySelector('#pmB'))modal.querySelector('#pmB').onclick=()=>{openPM(username);modal.remove();};
  if(modal.querySelector('#blB'))modal.querySelector('#blB').onclick=()=>{if(!blockedUsers.includes(username)){blockedUsers.push(username);saveLocal();notify('🔒 '+username+' დაბლოკილია');}modal.remove();};
  if(modal.querySelector('#unB'))modal.querySelector('#unB').onclick=()=>{blockedUsers=blockedUsers.filter(u=>u!==username);saveLocal();notify('🔓 '+username+' განბლოკილია');modal.remove();};
  if(modal.querySelector('#mkA'))modal.querySelector('#mkA').onclick=()=>{let u=users.find(x=>x.username===username);if(u){u.role='admin';u.status='🔧 ადმინი';saveLocal();notify('✅ '+username+' ადმინია!');}modal.remove();};
  if(modal.querySelector('#rmA'))modal.querySelector('#rmA').onclick=()=>{let u=users.find(x=>x.username===username);if(u){u.role='user';u.status='ონლაინ';saveLocal();notify('🔻 ადმინი ჩამოერთვა');}modal.remove();};
  if(modal.querySelector('#mkO'))modal.querySelector('#mkO').onclick=()=>{let old=users.find(u=>u.role==='owner');if(old)old.role='user';let u=users.find(x=>x.username===username);if(u){u.role='owner';u.status='👑 დამფუძნებელი';saveLocal();notify('👑 '+username+' დამფუძნებელია!');}modal.remove();};
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  document.body.appendChild(modal);
}

// ნავიგაცია
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page+'Page').classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');if(b.getAttribute('data-page')===page)b.classList.add('active');});
  document.getElementById('emojiPanel').style.display='none';
  if(page==='online')renderUsers();
  if(page==='friends'){renderFriends();renderRequests();}
  if(page==='messages')renderPMList();
  if(page==='profile'){let me=users.find(u=>u.username===currentUser);document.getElementById('statusInput').value=me?.status||'';updateAvatarUI();renderAlbum();loadScores();}
  if(page!=='chat'){hideQuiz();hideCipher();}
}
function toggleTheme(){document.body.classList.toggle('day-mode');document.getElementById('themeBtn').textContent=document.body.classList.contains('day-mode')?'☀️':'🌙';}
function logout(){let me=users.find(u=>u.username===currentUser);if(me){me.online=false;saveLocal();}db.from('profiles').update({online:false}).eq('username',currentUser);localStorage.removeItem('mafia_user');window.location.href='index.html';}

async function init(){
  await initData();
  renderRooms();
  await renderAll();
  renderPMList();
  renderAlbum();
  document.getElementById('themeBtn').addEventListener('click',toggleTheme);
  document.querySelectorAll('.nav-btn[data-page]').forEach(b=>b.addEventListener('click',()=>showPage(b.getAttribute('data-page'))));
  document.getElementById('messageInput').addEventListener('keypress',e=>{if(e.key==='Enter')sendMessage();});
  document.addEventListener('click',e=>{let p=document.getElementById('emojiPanel');if(p&&!p.contains(e.target)&&!e.target.classList.contains('icon-btn'))p.style.display='none';});
  window.addEventListener('beforeunload',()=>{db.from('profiles').update({online:false}).eq('username',currentUser);});
}
init();
</script>
