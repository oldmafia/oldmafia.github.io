<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Old Mafia - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* შენი სტილები უცვლელია */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #0a0508; color: #f0e6e8; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .nav-bar { display: flex; justify-content: space-around; background: #120a0c; padding: 10px; border-bottom: 2px solid #8b0000; }
        .nav-btn { font-size: 22px; background: none; border: none; color: #aa8a8a; cursor: pointer; padding: 5px 12px; transition: 0.3s; }
        .nav-btn.active { color: #8b0000; background: rgba(139,0,0,0.2); border-radius: 20px; }
        .pages { flex: 1; position: relative; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; display: none; padding: 15px; }
        .page.active { display: block; }
        .section-title { font-size: 18px; margin-bottom: 12px; color: #8b0000; border-left: 3px solid #8b0000; padding-left: 10px; }
        .room-card { background: #1a0f12; padding: 14px; margin-bottom: 8px; border-radius: 10px; border-left: 4px solid #8b0000; cursor: pointer; transition: 0.2s; }
        .room-card:active { transform: scale(0.98); }
        .chat-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0508; z-index: 100; display: none; flex-direction: column; padding: 15px; }
        .chat-header { background: #1a0f12; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-radius: 10px; border-bottom: 1px solid #8b0000; }
        .messages { flex: 1; overflow-y: auto; padding: 10px 5px; display: flex; flex-direction: column; }
        .message { background: #1a0f12; padding: 10px 14px; margin-bottom: 10px; border-radius: 15px; max-width: 85%; align-self: flex-start; border: 1px solid #2a1a1e; }
        .message.own { background: #8b0000; align-self: flex-end; color: white; border: none; }
        .message-name { font-size: 11px; font-weight: bold; color: #8b0000; margin-bottom: 4px; }
        .message.own .message-name { color: #ffcccc; }
        .chat-input-area { display: flex; gap: 8px; padding: 10px; background: #1a0f12; border-radius: 25px; margin-top: 5px; }
        .chat-input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #8b0000; background: #1f1216; color: white; outline: none; }
        .send-btn { background: #8b0000; border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; flex-shrink: 0; }
        .heart { position: fixed; bottom: 0; font-size: 24px; pointer-events: none; animation: floatUp 3s forwards; z-index: 9999; }
        @keyframes floatUp { 0% { bottom: 0; opacity: 1; transform: translateX(0); } 100% { bottom: 100vh; opacity: 0; transform: translateX(50px) rotate(20deg); } }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="online">👥</button>
        <button class="nav-btn" data-page="profile">👤</button>
    </div>

    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 აირჩიე ოთახი</div>
            <div id="roomsList"></div>
        </div>
        <div id="onlinePage" class="page">
            <div class="section-title">👥 ხალხი</div>
            <div id="userList">მალე...</div>
        </div>
        <div id="profilePage" class="page">
            <div class="section-title">👤 პროფილი</div>
            <p>შენი ნიკი: <span id="displayNick"></span></p>
        </div>
    </div>

    <div id="chatView" class="chat-view">
        <div class="chat-header">
            <span id="currentRoomTitle">ოთახი</span>
            <button class="close-btn" onclick="closeChat()">✖</button>
        </div>
        <div id="messageContainer" class="messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="დაწერე რამე...">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // Supabase-ის მონაცემები
        const SB_URL = "https://ftfciebnywbondaiarnc.supabase.co";
        const SB_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const _s = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = null;
        let myNick = localStorage.getItem('myNick') || "მოთამაშე_" + Math.floor(Math.random() * 1000);
        localStorage.setItem('myNick', myNick);
        document.getElementById('displayNick').innerText = myNick;

        const rooms = ["საერთო ჩატი", "VIP კლუბი", "მაფია", "ნარდი"];
        const roomsList = document.getElementById('roomsList');

        rooms.forEach(room => {
            const div = document.createElement('div');
            div.className = 'room-card';
            div.innerText = room;
            div.onclick = () => openChat(room);
            roomsList.appendChild(div);
        });

        // 1. მესიჯების ჩატვირთვა
        async function loadMessages(roomName) {
            const { data, error } = await _s
                .from('messages')
                .select('*')
                .eq('room_name', roomName)
                .order('created_at', { ascending: true })
                .limit(50);
            
            const container = document.getElementById('messageContainer');
            container.innerHTML = "";
            if (data) data.forEach(msg => renderMessage(msg));
            scrollToBottom();
        }

        // 2. მესიჯის ეკრანზე გამოტანა
        function renderMessage(msg) {
            const container = document.getElementById('messageContainer');
            const div = document.createElement('div');
            div.className = `message ${msg.user_name === myNick ? 'own' : ''}`;
            div.innerHTML = `
                <div class="message-name">${msg.user_name}</div>
                <div class="message-text">${msg.text}</div>
            `;
            container.appendChild(div);
            scrollToBottom();
        }

        // 3. მთავარი: რეალურ დროში მოსმენა (Realtime)
        function subscribeToRoom(roomName) {
            _s.channel('any') // არხის სახელი
            .on('postgres_changes', { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'messages',
                filter: `room_name=eq.${roomName}` 
            }, payload => {
                // როცა ბაზაში ახალი მესიჯი ჩნდება, ეს ფუნქცია ყველასთან გაეშვება
                if (payload.new.user_name !== myNick) {
                    renderMessage(payload.new);
                    spawnHeart(); // ეფექტი სხვის მესიჯზე
                }
            })
            .subscribe();
        }

        // 4. მესიჯის გაგზავნა
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !currentRoom) return;

            const newMsg = {
                user_name: myNick,
                text: text,
                room_name: currentRoom
            };

            // ჯერ ჩვენთან გამოვაჩინოთ სისწრაფისთვის
            renderMessage(newMsg);
            input.value = "";

            // ბაზაში შენახვა
            const { error } = await _s.from('messages').insert([newMsg]);
            if (error) console.error("Error sending:", error);
        }

        function openChat(room) {
            currentRoom = room;
            document.getElementById('currentRoomTitle').innerText = room;
            document.getElementById('chatView').style.display = 'flex';
            loadMessages(room);
            subscribeToRoom(room);
        }

        function closeChat() {
            document.getElementById('chatView').style.display = 'none';
            _s.removeAllChannels(); // არხის დახურვა
        }

        function scrollToBottom() {
            const container = document.getElementById('messageContainer');
            container.scrollTop = container.scrollHeight;
        }

        function spawnHeart() {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 80 + 10 + 'vw';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 3000);
        }

        // გვერდების გადართვა
        document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(btn.dataset.page + 'Page').classList.add('active');
                btn.classList.add('active');
            };
        });

        // ენტერზე გაგზავნა
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
