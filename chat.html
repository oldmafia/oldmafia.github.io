<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  transition: 0.3s;
}

/* THEMES */
body.light {
  background: #f5e6e8;
  color: #5a1a2c;
}
body.dark {
  background: #0b0b0b;
  color: #7a1f3a;
}

/* HEARTS */
.heart {
  position: fixed;
  width: 40px;
  height: 40px;
  background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/Love_Heart_SVG.svg/1024px-Love_Heart_SVG.svg.png');
  background-size: cover;
  animation: float 10s linear infinite;
  opacity: 0.3;
}
@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* LAYOUT */
#container {
  display: flex;
  height: 100vh;
}

/* ROOMS */
#rooms {
  width: 200px;
  border-right: 1px solid #aaa;
  overflow-y: auto;
}
.room {
  padding: 10px;
  cursor: pointer;
}
.room:hover {
  background: rgba(255,255,255,0.1);
}

/* CHAT */
#chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  display: flex;
  margin-bottom: 10px;
}
.msg img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}
.msg-content {
  margin-left: 10px;
}
.time {
  font-size: 10px;
  opacity: 0.6;
}

/* INPUT */
#input {
  display: flex;
  padding: 10px;
}
#input input {
  flex: 1;
}
#emojiBtn {
  margin-left: 5px;
}

/* PRIVATE CHAT */
#pm {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 250px;
  height: 300px;
  background: #222;
  display: none;
  flex-direction: column;
}

</style>
</head>

<body class="light">

<div id="container">

<!-- ROOMS -->
<div id="rooms"></div>

<!-- CHAT -->
<div id="chat">
  <div id="messages"></div>

  <div id="input">
    <input id="msgInput" placeholder="დაწერე...">
    <button id="emojiBtn">😊</button>
    <button onclick="sendMessage()">გაგზავნა</button>
  </div>
</div>

</div>

<!-- PRIVATE CHAT -->
<div id="pm">
  <div id="pmMessages"></div>
</div>

<script>

// SUPABASE (შენი ჩასასმელია)
const supabase = supabase.createClient("YOUR_URL", "YOUR_KEY")

let currentRoom = 1

// CREATE 12 ROOMS
const roomsDiv = document.getElementById("rooms")
for (let i = 1; i <= 12; i++) {
  let div = document.createElement("div")
  div.className = "room"
  div.innerText = "ოთახი " + i
  div.onclick = () => {
    currentRoom = i
    loadMessages()
  }
  roomsDiv.appendChild(div)
}

// SEND MESSAGE
async function sendMessage() {
  let text = document.getElementById("msgInput").value

  await supabase.from("messages").insert({
    text: text,
    room: currentRoom,
    time: new Date()
  })

  document.getElementById("msgInput").value = ""
}

// LOAD MESSAGES
async function loadMessages() {
  let { data } = await supabase
    .from("messages")
    .select("*")
    .eq("room", currentRoom)
    .order("time", { ascending: true })

  let messagesDiv = document.getElementById("messages")
  messagesDiv.innerHTML = ""

  data.forEach(m => {
    let div = document.createElement("div")
    div.className = "msg"

    div.innerHTML = `
      <img src="${m.avatar || 'https://via.placeholder.com/40'}">
      <div class="msg-content">
        <b>${m.username || 'User'}</b><br>
        ${m.text}<br>
        <span class="time">${new Date(m.time).toLocaleTimeString()}</span>
      </div>
    `
    messagesDiv.appendChild(div)
  })
}

// REALTIME
supabase
  .channel('chat')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' },
    payload => {
      if (payload.new.room === currentRoom) {
        loadMessages()
      }
    }
  )
  .subscribe()

// THEME SWITCH
document.body.onclick = () => {
  document.body.classList.toggle("dark")
  document.body.classList.toggle("light")
}

// HEARTS
for (let i = 0; i < 15; i++) {
  let h = document.createElement("div")
  h.className = "heart"
  h.style.left = Math.random() * 100 + "vw"
  h.style.animationDuration = (5 + Math.random()*5) + "s"
  document.body.appendChild(h)
}

// EMOJI
document.getElementById("emojiBtn").onclick = () => {
  document.getElementById("msgInput").value += "❤️"
}

loadMessages()

</script>

</body>
</html>
