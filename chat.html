<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Old Mafia - ჩატი</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body {
            --bg: #0a0508;
            --text: #f0e6e8;
            --card: #1a0f12;
            --border: #8b3a3a;
            --nav: #120a0c;
            --accent: #8b0000;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        body.day-mode {
            --bg: #fdf5e6;
            --text: #3a2a2a;
            --card: #ffffff;
            --border: #d9b0a0;
            --nav: #fae6d8;
            --accent: #9b2e2e;
        }
        .nav-bar { display: flex; justify-content: space-around; background: var(--nav); padding: 8px 0; border-bottom: 2px solid var(--accent); flex-wrap: wrap; }
        .nav-btn { font-size: 20px; background: none; border: none; color: #aa8a8a; cursor: pointer; padding: 8px 12px; border-radius: 30px; }
        .nav-btn.active { color: var(--accent); background: rgba(139,0,0,0.2); }
        .pages { flex: 1; position: relative; overflow: hidden; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; display: none; padding: 12px; }
        .page.active { display: block; }
        .section-title { font-size: 18px; margin-bottom: 12px; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; }
        .rooms-list { display: flex; flex-direction: column; gap: 10px; }
        .room-card { background: var(--card); padding: 14px; border-radius: 10px; border-left: 4px solid var(--accent); cursor: pointer; margin-bottom: 8px; font-weight: bold; }
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-header { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .message { background: var(--card); padding: 10px; border-radius: 12px; max-width: 80%; align-self: flex-start; position: relative; }
        .message.own { align-self: flex-end; background: var(--accent); }
        .message-name { font-weight: bold; color: var(--accent); cursor: pointer; }
        .message-time { font-size: 10px; opacity: 0.7; }
        .delete-msg { position: absolute; right: 5px; top: 5px; background: none; border: none; color: white; cursor: pointer; font-size: 10px; opacity: 0; }
        .message:hover .delete-msg { opacity: 1; }
        .chat-input-area { display: flex; gap: 8px; padding: 10px; background: var(--card); border-radius: 12px; margin-top: 10px; }
        .chat-input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid var(--accent); background: var(--bg); color: var(--text); }
        .send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); border: none; color: white; cursor: pointer; }
        .icon-btn { width: 44px; height: 44px; border-radius: 50%; background: #5a0000; border: none; color: white; cursor: pointer; }
        .user-item { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; position: relative; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; background-size: cover; background-position: center; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #2ecc71; border-radius: 50%; border: 2px solid var(--card); }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto; cursor: pointer; background-size: cover; background-position: center; }
        .status-input { width: 80%; padding: 10px; margin: 10px auto; border-radius: 25px; border: 1px solid var(--accent); background: var(--bg); color: var(--text); text-align: center; display: block; }
        .album-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .album-photo { aspect-ratio: 1; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid var(--accent); }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; margin-top: 10px; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--card); border-radius: 20px; padding: 20px; max-width: 350px; width: 90%; text-align: center; max-height: 80vh; overflow-y: auto; }
        .pm-window { position: fixed; bottom: 20px; right: 20px; width: 300px; height: 400px; background: var(--card); border: 2px solid var(--accent); border-radius: 16px; display: flex; flex-direction: column; z-index: 1000; }
        .pm-header { background: var(--accent); padding: 10px; border-radius: 14px 14px 0 0; cursor: pointer; color: white; }
        .pm-messages { flex: 1; overflow-y: auto; padding: 10px; }
        .pm-input { display: flex; padding: 10px; gap: 8px; border-top: 1px solid var(--accent); }
        .pm-input input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--accent); background: var(--bg); color: var(--text); }
        .notification { position: fixed; top: 70px; right: 10px; background: var(--accent); padding: 10px 15px; border-radius: 20px; z-index: 10000; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .heart { position: fixed; bottom: 0; font-size: 40px; pointer-events: none; animation: floatUp 5s forwards; z-index: 9999; }
        @keyframes floatUp { 0% { bottom: 0; opacity: 1; } 100% { bottom: 100%; opacity: 0; transform: scale(1.5); } }
        .action-btn { background: var(--accent); border: none; color: white; padding: 8px 12px; border-radius: 20px; cursor: pointer; margin: 5px; }
        .action-btn.danger { background: #8b0000; }
        .action-btn.success { background: #2d6a4f; }
        .upload-btn { background: var(--accent); border: none; color: white; padding: 10px; border-radius: 25px; margin: 10px 0; cursor: pointer; width: 100%; }
        .logout-btn { background: #8b0000; color: white; border: none; padding: 8px 12px; border-radius: 20px; cursor: pointer; }
        .empty-state { text-align: center; padding: 40px; opacity: 0.5; }
        .friend-badge { position: absolute; right: 10px; background: #2d6a4f; padding: 4px 8px; border-radius: 20px; font-size: 11px; }
        .add-badge { position: absolute; right: 10px; background: var(--accent); padding: 4px 8px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        .photo-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 4000; }
        .photo-modal-content { background: var(--card); border-radius: 20px; max-width: 400px; width: 90%; border: 2px solid var(--accent); overflow: hidden; }
        .photo-modal-img { width: 100%; max-height: 55vh; object-fit: contain; }
        .photo-comments { padding: 10px; max-height: 150px; overflow-y: auto; border-top: 1px solid var(--border); }
        .comment-item { padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
        .comment-input-area { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--border); }
        .comment-input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--accent); background: var(--bg); color: var(--text); }
        .emoji-panel { position: fixed; bottom: 80px; left: 10px; right: 10px; background: var(--card); border-radius: 16px; display: none; padding: 10px; z-index: 2000; max-height: 300px; overflow-y: auto; }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .emoji-item { font-size: 32px; text-align: center; cursor: pointer; padding: 8px; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="friends">👥</button>
        <button class="nav-btn" data-page="online">🌐</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button id="themeBtn">🌙</button>
        <button class="logout-btn" onclick="logout()">🚪</button>
    </div>
    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 12 სათამაშო ოთახი</div>
            <div id="roomsList"></div>
        </div>
        <div id="messagesPage" class="page"><div class="section-title">💬 პირადი მიმოწერა</div><div id="pmList"></div></div>
        <div id="friendsPage" class="page"><div class="section-title">👥 მეგობრები</div><div id="friendsList"></div><div class="section-title">📨 მოთხოვნები</div><div id="requestsList"></div></div>
        <div id="onlinePage" class="page"><div class="section-title">🌐 ყველა მომხმარებელი</div><div id="usersList"></div></div>
        <div id="profilePage" class="page">
            <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarFile').click()">👤</div>
            <h2 id="profileName"></h2>
            <input type="text" id="statusInput" class="status-input" placeholder="სტატუსი">
            <button class="upload-btn" onclick="saveStatus()">💾 შენახვა</button>
            <div class="section-title">📸 ალბომი</div>
            <button class="upload-btn" onclick="document.getElementById('albumFile').click()">➕ ფოტოს დამატება</button>
            <div id="albumGrid" class="album-grid"></div>
            <input type="file" id="avatarFile" hidden accept="image/*" onchange="uploadAvatar(this)">
            <input type="file" id="albumFile" hidden accept="image/*" onchange="addToAlbum(this)">
            <input type="file" id="emojiFile" hidden accept="image/*" onchange="uploadEmoji(this)">
        </div>
        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-header"><span id="chatRoomName"></span><button onclick="closeChat()">✕</button></div>
                <div id="chatMessages" class="messages"></div>
                <div class="chat-input-area">
                    <button class="icon-btn" onclick="openEmojiPanel()">😊</button>
                    <button class="icon-btn" onclick="document.getElementById('chatPhoto').click()">📷</button>
                    <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
                <input type="file" id="chatPhoto" hidden accept="image/*" onchange="addChatPhoto(this)">
            </div>
        </div>
    </div>
    <div id="emojiPanel" class="emoji-panel"></div>
    <div id="hearts"></div>
    <div id="pmContainer"></div>

    <script>
        // ============ 🔥 შენი Supabase გასაღებები (ჩასმულია) ============
        const SUPABASE_URL = 'https://ftfciebnywbondaiarnc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
        // ==================================================================
        
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentUser = localStorage.getItem('mafia_user');
        if (!currentUser || currentUser === "null" || currentUser === "") {
            window.location.href = "index.html";
        }
        
        let currentRoom = null;
        let currentPMUser = null;
        const OWNER = "Abu007";
        
        let users = JSON.parse(localStorage.getItem('mafia_users') || '[]');
        let customEmojis = JSON.parse(localStorage.getItem('mafia_emojis') || '[]');
        let photoInteractions = JSON.parse(localStorage.getItem('mafia_photo_comments') || '{}');
        let userAlbums = JSON.parse(localStorage.getItem('mafia_albums') || '{}');
        let blockedUsers = JSON.parse(localStorage.getItem('mafia_blocked') || '[]');
        let friendReqs = JSON.parse(localStorage.getItem('mafia_friend_reqs') || '[]');
        
        const ROOMS = [
            "☕ კაფე-ბარი", "🎲 ნარდი", "🃏 ჯოკერი", "💎 VIP", "📝 ფორუმი",
            "🛠️ ადმინები", "😂 იუმორი", "🏆 შიფროგრამა", "🎭 გამოძიება",
            "🎵 მუსიკა", "⁉️ ვიქტორინა", "🆘 დახმარება"
        ];
        
        function saveAll() {
            localStorage.setItem('mafia_users', JSON.stringify(users));
            localStorage.setItem('mafia_emojis', JSON.stringify(customEmojis));
            localStorage.setItem('mafia_photo_comments', JSON.stringify(photoInteractions));
            localStorage.setItem('mafia_albums', JSON.stringify(userAlbums));
            localStorage.setItem('mafia_blocked', JSON.stringify(blockedUsers));
            localStorage.setItem('mafia_friend_reqs', JSON.stringify(friendReqs));
        }
        
        function initData() {
            if (users.length === 0) {
                users = [
                    { username: "Abu007", status: "👑 დამფუძნებელი", avatar: null, role: "owner", online: true },
                    { username: "Lukinio", status: "🔧 ადმინი", avatar: null, role: "admin", online: true },
                    { username: "Giorgi", status: "ონლაინ", avatar: null, role: "user", online: true },
                    { username: "Nika", status: "ონლაინ", avatar: null, role: "user", online: true }
                ];
                saveAll();
            }
            let user = users.find(u => u.username === currentUser);
            if (!user) {
                users.push({ username: currentUser, status: "ახალი მოთამაშე", avatar: null, role: "user", online: true });
                saveAll();
            } else {
                user.online = true;
                saveAll();
            }
            document.getElementById('profileName').innerHTML = currentUser;
            if (user?.avatar) {
                document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar})`;
                document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                document.getElementById('profileAvatar').innerHTML = '';
            }
        }
        
        // ============ SUPABASE - რეალურ დროში შეტყობინებები ============
        let messagesSubscription = null;
        
        async function listenToRoom(roomName) {
            if (messagesSubscription) {
                await supabase.removeChannel(messagesSubscription);
            }
            messagesSubscription = supabase
                .channel(`room_${roomName}`)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => {
                    if (currentRoom === roomName) renderMessagesFromSupabase(roomName);
                })
                .subscribe();
            renderMessagesFromSupabase(roomName);
        }
        
        async function renderMessagesFromSupabase(roomName) {
            let container = document.getElementById('chatMessages');
            if (!container || currentRoom !== roomName) return;
            const { data: msgs } = await supabase.from('messages').select('*').eq('room', roomName).order('time', { ascending: true });
            if (!msgs || msgs.length === 0) {
                container.innerHTML = '<div class="empty-state">💬 შეტყობინებები არ არის</div>';
                return;
            }
            container.innerHTML = msgs.map(msg => {
                let isOwn = msg.sender === currentUser;
                let time = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                return `<div class="message ${isOwn ? 'own' : ''}">
                    <div><span class="message-name" onclick="showUserProfile('${msg.sender}')">${escapeHtml(msg.sender)}</span> <span class="message-time">${time}</span></div>
                    <div>${escapeHtml(msg.text)}${msg.image ? `<img src="${msg.image}" style="max-width:150px; border-radius:8px; margin-top:5px; cursor:pointer;" onclick="openPhotoModal('${msg.image}', '${msg.sender}')">` : ''}</div>
                    ${(currentUser === OWNER || msg.sender === currentUser) ? `<button class="delete-msg" onclick="deleteMessageSupabase(${msg.id})">🗑️</button>` : ''}
                </div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendMessageSupabase() {
            let input = document.getElementById('messageInput');
            let text = input.value.trim();
            let pendingImage = window.pendingImage;
            if (!text && !pendingImage) return;
            if (!currentRoom) return;
            await supabase.from('messages').insert([{ sender: currentUser, text: text || "", room: currentRoom, image: pendingImage || null, time: Date.now() }]);
            input.value = '';
            window.pendingImage = null;
        }
        
        async function deleteMessageSupabase(id) {
            await supabase.from('messages').delete().eq('id', id);
        }
        
        // ============ SUPABASE - პირადი მიმოწერა ============
        let pmSubscription = null;
        
        async function listenToPM() {
            if (pmSubscription) await supabase.removeChannel(pmSubscription);
            if (!currentPMUser) return;
            let chatId = [currentUser, currentPMUser].sort().join('_');
            pmSubscription = supabase.channel(`pm_${chatId}`).on('postgres_changes', { event: '*', schema: 'public', table: 'direct_messages' }, () => renderPMFromSupabase()).subscribe();
            renderPMFromSupabase();
        }
        
        async function renderPMFromSupabase() {
            if (!currentPMUser) return;
            let chatId = [currentUser, currentPMUser].sort().join('_');
            const { data: msgs } = await supabase.from('direct_messages').select('*').eq('chat_id', chatId).order('time', { ascending: true });
            let container = document.getElementById('pmMessages');
            if (!container) return;
            if (!msgs || msgs.length === 0) {
                container.innerHTML = '<div class="empty-state">მიმოწერა ცარიელია</div>';
                return;
            }
            container.innerHTML = msgs.map(msg => `
                <div style="text-align:${msg.from_user === currentUser ? 'right' : 'left'}; margin:5px 0;">
                    <div style="background:${msg.from_user === currentUser ? '#8b0000' : '#333'}; display:inline-block; padding:6px 10px; border-radius:12px;">${escapeHtml(msg.text)}</div>
                    <div style="font-size:9px;">${new Date(msg.time).toLocaleTimeString()}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendPMSupabase() {
            let input = document.getElementById('pmInput');
            let text = input.value.trim();
            if (!text || !currentPMUser) return;
            let chatId = [currentUser, currentPMUser].sort().join('_');
            await supabase.from('direct_messages').insert([{ chat_id: chatId, from_user: currentUser, to_user: currentPMUser, text: text, time: Date.now() }]);
            input.value = '';
            renderPMFromSupabase();
            renderPMListSupabase();
        }
        
        async function renderPMListSupabase() {
            let container = document.getElementById('pmList');
            if (!container) return;
            const { data: chats } = await supabase.from('direct_messages').select('chat_id').or(`from_user.eq.${currentUser},to_user.eq.${currentUser}`);
            let uniqueUsers = new Set();
            chats?.forEach(chat => {
                let usersInChat = chat.chat_id.split('_');
                if (usersInChat.includes(currentUser)) {
                    uniqueUsers.add(usersInChat[0] === currentUser ? usersInChat[1] : usersInChat[0]);
                }
            });
            if (uniqueUsers.size === 0) {
                container.innerHTML = '<div class="empty-state">ჯერ არ გქონია მიმოწერა</div>';
                return;
            }
            container.innerHTML = Array.from(uniqueUsers).map(username => {
                let user = users.find(u => u.username === username);
                return `<div class="user-item" onclick="openPrivateChat('${username}')">
                    <div class="user-avatar" style="${user?.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user?.avatar ? '' : username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(username)}</div></div>
                </div>`;
            }).join('');
        }
        
        // ============ ოთახები ==========
        function renderRooms() {
            let html = '';
            ROOMS.forEach(room => {
                html += `<div class="room-card" onclick="openRoom('${room}')">${room}</div>`;
            });
            document.getElementById('roomsList').innerHTML = html;
        }
        
        function openRoom(room) {
            currentRoom = room;
            document.getElementById('chatRoomName').innerHTML = room;
            listenToRoom(room);
            showPage('chat');
        }
        
        function closeChat() {
            if (messagesSubscription) supabase.removeChannel(messagesSubscription);
            currentRoom = null;
            showPage('home');
        }
        
        function sendMessage() { sendMessageSupabase(); }
        function addChatPhoto(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => { window.pendingImage = e.target.result; showNotification('📷 ფოტო დაემატა!'); };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }
        
        // ============ გულები ==========
        setInterval(() => {
            let heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['❤️','💖','💗','💘'][Math.floor(Math.random()*4)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (30 + Math.random() * 30) + 'px';
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }, 2500);
        
        // ============ ემოჯები ==========
        function openEmojiPanel() {
            let panel = document.getElementById('emojiPanel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
                return;
            }
            let defaultEmojis = ['😊','😂','❤️','🔥','👍','🎉','😍','🥳','😎','🥺','💀','👑','💪','🤡','👻'];
            let allEmojis = [...defaultEmojis, ...customEmojis];
            let html = '<div class="emoji-grid">';
            allEmojis.forEach(emoji => {
                if (typeof emoji === 'string' && emoji.startsWith('data:')) {
                    html += `<img src="${emoji}" style="width:48px; height:48px; object-fit:cover; border-radius:8px; cursor:pointer;" onclick="addEmojiToInput('${emoji}')">`;
                } else {
                    html += `<div class="emoji-item" onclick="addEmojiToInput('${emoji}')">${emoji}</div>`;
                }
            });
            let user = users.find(u => u.username === currentUser);
            if (user && (user.role === 'admin' || currentUser === OWNER)) {
                html += `<div class="emoji-item" style="background:#8b0000; border-radius:8px;" onclick="document.getElementById('emojiFile').click()">➕</div>`;
            }
            html += '</div>';
            panel.innerHTML = html;
            panel.style.display = 'block';
        }
        
        function addEmojiToInput(emoji) {
            let input = document.getElementById('messageInput');
            if (input) input.value += emoji;
            document.getElementById('emojiPanel').style.display = 'none';
        }
        
        function uploadEmoji(input) {
            let file = input.files[0];
            let user = users.find(u => u.username === currentUser);
            if (file && user && (user.role === 'admin' || currentUser === OWNER)) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    customEmojis.push(e.target.result);
                    saveAll();
                    showNotification('✅ ემოჯი დაემატა!');
                };
                reader.readAsDataURL(file);
            } else {
                showNotification('❌ მხოლოდ ადმინებს შეუძლიათ!');
            }
            input.value = '';
        }
        
        // ============ მეგობრები ==========
        function isFriend(username) {
            return friendReqs.some(r => r.status === 'accepted' && ((r.from === currentUser && r.to === username) || (r.from === username && r.to === currentUser)));
        }
        
        function sendFriendRequest(target) {
            if (target === currentUser) return showNotification('საკუთარ თავს ვერ დაუმატებ');
            if (isFriend(target)) return showNotification('უკვე მეგობარია');
            if (friendReqs.some(r => r.from === currentUser && r.to === target && r.status === 'pending')) return showNotification('მოთხოვნა უკვე გაგზავნილია');
            friendReqs.push({ from: currentUser, to: target, status: 'pending' });
            saveAll();
            showNotification(`📨 მოთხოვნა გაეგზავნა ${target}-ს`);
            renderUsersList();
        }
        
        function acceptFriendRequest(from) {
            let req = friendReqs.find(r => r.from === from && r.to === currentUser && r.status === 'pending');
            if (req) {
                req.status = 'accepted';
                saveAll();
                showNotification(`✅ ${from} დაემატა!`);
                renderUsersList();
                renderFriendsList();
                renderRequestsList();
            }
        }
        
        function rejectFriendRequest(from) {
            friendReqs = friendReqs.filter(r => !(r.from === from && r.to === currentUser && r.status === 'pending'));
            saveAll();
            showNotification(`❌ უარყავით`);
            renderUsersList();
            renderRequestsList();
        }
        
        // ============ სტატუსი და ავატარი ==========
        function saveStatus() {
            let user = users.find(u => u.username === currentUser);
            if (user) {
                user.status = document.getElementById('statusInput').value;
                saveAll();
                showNotification('✅ სტატუსი განახლდა!');
                renderUsersList();
            }
        }
        
        function uploadAvatar(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    let user = users.find(u => u.username === currentUser);
                    if (user) user.avatar = e.target.result;
                    saveAll();
                    document.getElementById('profileAvatar').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                    document.getElementById('profileAvatar').innerHTML = '';
                    renderUsersList();
                    showNotification('✅ ავატარი განახლდა!');
                };
                reader.readAsDataURL(file);
            }
        }
        
        // ============ ალბომი ==========
        function renderAlbum() {
            let container = document.getElementById('albumGrid');
            let album = userAlbums[currentUser] || [];
            if (album.length === 0) {
                container.innerHTML = '<div class="empty-state">ალბომი ცარიელია</div>';
                return;
            }
            container.innerHTML = album.map(photo => `<img src="${photo}" class="album-photo" onclick="openPhotoModal('${photo}', '${currentUser}')">`).join('');
        }
        
        function addToAlbum(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    if (!userAlbums[currentUser]) userAlbums[currentUser] = [];
                    userAlbums[currentUser].push(e.target.result);
                    saveAll();
                    renderAlbum();
                    showNotification('📸 ფოტო დაემატა!');
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }
        
        function setAsProfilePhoto(photoUrl) {
            let user = users.find(u => u.username === currentUser);
            if (user) user.avatar = photoUrl;
            saveAll();
            document.getElementById('profileAvatar').style.backgroundImage = `url(${photoUrl})`;
            document.getElementById('profileAvatar').style.backgroundSize = 'cover';
            document.getElementById('profileAvatar').innerHTML = '';
            renderUsersList();
            showNotification('✅ პროფილის ფოტო განახლდა!');
        }
        
        // ============ ფოტო მოდალი ==========
        function openPhotoModal(photoUrl, username) {
            if (!photoInteractions[photoUrl]) photoInteractions[photoUrl] = { likes: [], comments: [] };
            let data = photoInteractions[photoUrl];
            let modal = document.createElement('div');
            modal.className = 'photo-modal';
            modal.innerHTML = `
                <div class="photo-modal-content">
                    <img src="${photoUrl}" class="photo-modal-img">
                    <div class="photo-actions">
                        <button class="action-btn" id="likeBtn">❤️ ${data.likes.length}</button>
                        <button class="action-btn" id="commentCountBtn">💬 ${data.comments.length}</button>
                        ${currentUser === username ? '<button class="action-btn" id="setProfileBtn">👤 პროფილის ფოტოდ</button>' : ''}
                    </div>
                    <div class="photo-comments" id="photoComments">${data.comments.map(c => `<div class="comment-item"><b>${escapeHtml(c.user)}</b>: ${escapeHtml(c.text)}</div>`).join('') || '<div class="empty-state">კომენტარები არ არის</div>'}</div>
                    <div class="comment-input-area">
                        <input type="text" id="photoCommentInput" class="comment-input" placeholder="დაწერე კომენტარი...">
                        <button class="action-btn" id="addCommentBtn">📝</button>
                    </div>
                </div>
            `;
            modal.querySelector('#likeBtn').onclick = () => {
                let idx = data.likes.indexOf(currentUser);
                if (idx === -1) data.likes.push(currentUser);
                else data.likes.splice(idx, 1);
                saveAll();
                modal.querySelector('#likeBtn').innerHTML = `❤️ ${data.likes.length}`;
            };
            if (modal.querySelector('#setProfileBtn')) {
                modal.querySelector('#setProfileBtn').onclick = () => {
                    setAsProfilePhoto(photoUrl);
                    modal.remove();
                };
            }
            modal.querySelector('#addCommentBtn').onclick = () => {
                let input = modal.querySelector('#photoCommentInput');
                let text = input.value.trim();
                if (text) {
                    data.comments.push({ user: currentUser, text: text, time: Date.now() });
                    saveAll();
                    modal.querySelector('#photoComments').innerHTML = data.comments.map(c => `<div class="comment-item"><b>${escapeHtml(c.user)}</b>: ${escapeHtml(c.text)}</div>`).join('');
                    modal.querySelector('#commentCountBtn').innerHTML = `💬 ${data.comments.length}`;
                    input.value = '';
                }
            };
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            document.body.appendChild(modal);
        }
        
        // ============ მომხმარებლის პროფილი ==========
        function showUserProfile(username) {
            let user = users.find(u => u.username === username);
            if (!user) return;
            let isFriendUser = isFriend(username);
            let hasPendingFromMe = friendReqs.some(r => r.from === currentUser && r.to === username && r.status === 'pending');
            let hasPendingToMe = friendReqs.some(r => r.from === username && r.to === currentUser && r.status === 'pending');
            let isBlockedUser = blockedUsers.includes(username);
            let modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="profile-avatar" style="width:80px; height:80px; font-size:40px; margin:0 auto; ${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <h3>${escapeHtml(user.username)}</h3>
                    <p>${escapeHtml(user.status)}</p>
                    <p>${user.role === 'owner' ? '👑 დამფუძნებელი' : (user.role === 'admin' ? '🔧 ადმინი' : '👤 მომხმარებელი')}</p>
                    <div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center;">
                        ${!isFriendUser && username !== currentUser && !hasPendingFromMe && !hasPendingToMe ? `<button class="action-btn success" id="sendFriendBtn">➕ მეგობრობა</button>` : ''}
                        ${hasPendingFromMe ? `<button class="action-btn warning" disabled>⏳ მოთხოვნა</button>` : ''}
                        ${hasPendingToMe ? `<button class="action-btn success" id="acceptBtn">✅ მიღება</button><button class="action-btn danger" id="rejectBtn">❌ უარყოფა</button>` : ''}
                        ${isFriendUser ? `<button class="action-btn success" disabled>✅ მეგობარი</button>` : ''}
                        <button class="action-btn" id="pmBtn">💬 მიწერა</button>
                        ${!isBlockedUser && username !== currentUser ? `<button class="action-btn danger" id="blockBtn">🔒 დაბლოკვა</button>` : ''}
                        ${isBlockedUser && username !== currentUser ? `<button class="action-btn success" id="unblockBtn">🔓 განბლოკვა</button>` : ''}
                    </div>
                    ${(currentUser === OWNER || users.find(u => u.username === currentUser)?.role === 'admin') && username !== currentUser ? `
                        <div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:15px; padding-top:15px; border-top:1px solid #8b3a3a;">
                            ${user.role !== 'owner' ? `<button class="action-btn success" id="makeOwnerBtn">👑 დამფუძნებლად</button>` : ''}
                            ${user.role === 'admin' ? `<button class="action-btn" id="removeAdminBtn">🔻 ადმინის ჩამორთმევა</button>` : ''}
                            ${user.role === 'user' ? `<button class="action-btn success" id="makeAdminBtn">🔧 ადმინად</button>` : ''}
                        </div>
                    ` : ''}
                    <button onclick="modal.remove()" style="background:#333; margin-top:15px;">დახურვა</button>
                </div>
            `;
            if (modal.querySelector('#sendFriendBtn')) modal.querySelector('#sendFriendBtn').onclick = () => { sendFriendRequest(username); modal.remove(); };
            if (modal.querySelector('#acceptBtn')) modal.querySelector('#acceptBtn').onclick = () => { acceptFriendRequest(username); modal.remove(); };
            if (modal.querySelector('#rejectBtn')) modal.querySelector('#rejectBtn').onclick = () => { rejectFriendRequest(username); modal.remove(); };
            if (modal.querySelector('#pmBtn')) modal.querySelector('#pmBtn').onclick = () => { openPrivateChat(username); modal.remove(); };
            if (modal.querySelector('#blockBtn')) modal.querySelector('#blockBtn').onclick = () => { blockUser(username); modal.remove(); };
            if (modal.querySelector('#unblockBtn')) modal.querySelector('#unblockBtn').onclick = () => { unblockUser(username); modal.remove(); };
            if (modal.querySelector('#makeOwnerBtn')) modal.querySelector('#makeOwnerBtn').onclick = () => { makeOwner(username); modal.remove(); };
            if (modal.querySelector('#makeAdminBtn')) modal.querySelector('#makeAdminBtn').onclick = () => { makeAdmin(username); modal.remove(); };
            if (modal.querySelector('#removeAdminBtn')) modal.querySelector('#removeAdminBtn').onclick = () => { removeAdmin(username); modal.remove(); };
            document.body.appendChild(modal);
        }
        
        function makeOwner(username) {
            let old = users.find(u => u.role === 'owner');
            if (old) old.role = 'user';
            let newOwner = users.find(u => u.username === username);
            if (newOwner) { newOwner.role = 'owner'; newOwner.status = '👑 დამფუძნებელი'; }
            saveAll();
            showNotification(`✅ ${username} დამფუძნებელი გახდა!`);
            renderUsersList();
        }
        
        function makeAdmin(username) {
            let user = users.find(u => u.username === username);
            if (user) { user.role = 'admin'; user.status = '🔧 ადმინი'; saveAll(); showNotification(`✅ ${username} ადმინად!`); renderUsersList(); }
        }
        
        function removeAdmin(username) {
            let user = users.find(u => u.username === username);
            if (user) { user.role = 'user'; user.status = 'ონლაინ'; saveAll(); showNotification(`🔻 ${username} ადმინი ჩამოერთვა!`); renderUsersList(); }
        }
        
        function blockUser(username) {
            if (!blockedUsers.includes(username)) {
                blockedUsers.push(username);
                saveAll();
                showNotification(`🔒 ${username} დაბლოკილია`);
                renderUsersList();
            }
        }
        
        function unblockUser(username) {
            blockedUsers = blockedUsers.filter(u => u !== username);
            saveAll();
            showNotification(`🔓 ${username} განბლოკილია`);
            renderUsersList();
        }
        
        // ============ სიები ==========
        function renderUsersList() {
            let container = document.getElementById('usersList');
            if (!container) return;
            let otherUsers = users.filter(u => u.username !== currentUser);
            if (otherUsers.length === 0) {
                container.innerHTML = '<div class="empty-state">სხვა მომხმარებლები არ არიან</div>';
                return;
            }
            container.innerHTML = otherUsers.map(user => {
                let isFriendUser = isFriend(user.username);
                let hasPendingFromMe = friendReqs.some(r => r.from === currentUser && r.to === user.username && r.status === 'pending');
                let hasPendingToMe = friendReqs.some(r => r.from === user.username && r.to === currentUser && r.status === 'pending');
                return `<div class="user-item" onclick="showUserProfile('${user.username}')">
                    <div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}${user.online ? '<span class="online-dot"></span>' : ''}</div>
                    <div><div class="user-name">${escapeHtml(user.username)} ${user.role === 'owner' ? '👑' : (user.role === 'admin' ? '🔧' : '')}</div><div class="user-status">${escapeHtml(user.status)}</div></div>
                    ${!isFriendUser && !hasPendingFromMe && !hasPendingToMe ? `<div class="add-badge" onclick="event.stopPropagation(); sendFriendRequest('${user.username}')">➕</div>` : ''}
                    ${hasPendingFromMe ? `<div class="add-badge" style="background:orange;">⏳</div>` : ''}
                    ${hasPendingToMe ? `<div class="add-badge" style="background:gold; color:black;" onclick="event.stopPropagation(); acceptFriendRequest('${user.username}')">✅</div>` : ''}
                    ${isFriendUser ? `<div class="friend-badge">✅</div>` : ''}
                </div>`;
            }).join('');
        }
        
        function renderFriendsList() {
            let container = document.getElementById('friendsList');
            if (!container) return;
            let friendsList = friendReqs.filter(r => r.status === 'accepted' && (r.from === currentUser || r.to === currentUser)).map(r => r.from === currentUser ? r.to : r.from);
            let friendUsers = users.filter(u => friendsList.includes(u.username));
            if (friendUsers.length === 0) {
                container.innerHTML = '<div class="empty-state">მეგობრები არ არიან</div>';
                return;
            }
            container.innerHTML = friendUsers.map(user => `<div class="user-item" onclick="showUserProfile('${user.username}')"><div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(user.username)}</div><div class="user-status">${escapeHtml(user.status)}</div></div></div>`).join('');
        }
        
        function renderRequestsList() {
            let container = document.getElementById('requestsList');
            if (!container) return;
            let pending = friendReqs.filter(r => r.to === currentUser && r.status === 'pending');
            if (pending.length === 0) {
                container.innerHTML = '<div class="empty-state">მოთხოვნები არ არის</div>';
                return;
            }
            container.innerHTML = pending.map(req => `<div class="user-item"><div class="user-avatar">${req.from.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(req.from)}</div><div class="user-status">მეგობრობის მოთხოვნა</div></div><div style="display:flex; gap:5px;"><button class="action-btn success" onclick="acceptFriendRequest('${req.from}')">✅</button><button class="action-btn danger" onclick="rejectFriendRequest('${req.from}')">❌</button></div></div>`).join('');
        }
        
        // ============ პირადი მიმოწერა ==========
        function openPrivateChat(username) {
            if (username === currentUser) { showNotification('საკუთარ თავთან არ შეიძლება'); return; }
            if (blockedUsers.includes(username)) { showNotification(`🔒 ${username} დაბლოკილია`); return; }
            if (currentPMUser === username && document.getElementById('pmContainer').innerHTML) { closePM(); return; }
            currentPMUser = username;
            renderPrivateChat();
            listenToPM();
        }
        
        function renderPrivateChat() {
            if (!currentPMUser) return;
            let html = `
                <div class="pm-window">
                    <div class="pm-header" onclick="closePM()"><span>💬 ${escapeHtml(currentPMUser)}</span><span>✕</span></div>
                    <div class="pm-messages" id="pmMessages"></div>
                    <div class="pm-input">
                        <input type="text" id="pmInput" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPMSupabase()">
                        <button onclick="sendPMSupabase()">➤</button>
                    </div>
                </div>
            `;
            document.getElementById('pmContainer').innerHTML = html;
            renderPMFromSupabase();
        }
        
        function closePM() {
            if (pmSubscription) supabase.removeChannel(pmSubscription);
            document.getElementById('pmContainer').innerHTML = '';
            currentPMUser = null;
        }
        
        // ============ დამხმარე ==========
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-page') === page) btn.classList.add('active');
            });
            if (page === 'online') renderUsersList();
            if (page === 'friends') { renderFriendsList(); renderRequestsList(); }
            if (page === 'messages') renderPMListSupabase();
            if (page === 'profile') {
                let user = users.find(u => u.username === currentUser);
                document.getElementById('statusInput').value = user?.status || '';
                if (user?.avatar) {
                    document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar})`;
                    document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                    document.getElementById('profileAvatar').innerHTML = '';
                } else {
                    document.getElementById('profileAvatar').style.backgroundImage = '';
                    document.getElementById('profileAvatar').innerHTML = '👤';
                }
                renderAlbum();
            }
        }
        
        function showNotification(msg) {
            let notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toggleTheme() {
            document.body.classList.toggle('day-mode');
            document.getElementById('themeBtn').innerHTML = document.body.classList.contains('day-mode') ? '☀️' : '🌙';
        }
        
        function logout() {
            let user = users.find(u => u.username === currentUser);
            if (user) user.online = false;
            saveAll();
            localStorage.removeItem('mafia_user');
            window.location.href = "index.html";
        }
        
        function init() {
            initData();
            renderRooms();
            renderUsersList();
            renderFriendsList();
            renderRequestsList();
            renderPMListSupabase();
            renderAlbum();
            document.getElementById('themeBtn').addEventListener('click', toggleTheme);
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => showPage(btn.getAttribute('data-page')));
            });
            showPage('home');
            window.addEventListener('beforeunload', () => {
                let user = users.find(u => u.username === currentUser);
                if (user) user.online = false;
                saveAll();
            });
        }
        
        init();
    </script>
</body>
</html>
