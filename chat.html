<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ChatApp - შინდისფერი გულები</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ========== ანიმაციური გულები ========== */
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .heart {
            position: absolute;
            color: #b81a3a;
            pointer-events: none;
            animation: floatHeart 8s linear forwards;
            opacity: 0.7;
        }
        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* ========== ღამის რეჟიმი ========== */
        body.night { background: #0a0508; }
        body.night .app { background: rgba(0,0,0,0.88); }
        body.night .top-bar { background: #1a0f15; border-bottom: 2px solid #b81a3a; }
        body.night .nav-btn { background: #2a1a22; color: #ffdddd; border: 1px solid #b81a3a; }
        body.night .sidebar { background: #0f0a0d; border-right: 1px solid #b81a3a; }
        body.night .room-item { background: #1f121a; color: #ffdddd; }
        body.night .room-item.active { background: #b81a3a; }
        body.night .chat-area { background: rgba(0,0,0,0.7); }
        body.night .message { background: #2a1a22; color: #ffdddd; }
        body.night .message.my { background: #b81a3a; }
        body.night .input-bar { background: #1a0f15; border-top: 1px solid #b81a3a; }
        body.night .input-bar input { background: #2a1a22; color: #fff; border: 1px solid #b81a3a; }
        body.night .user-item { background: #1f121a; }
        body.night .modal-content { background: #2a1a22; border: 1px solid #b81a3a; }

        /* ========== დღის რეჟიმი ========== */
        body.day { background: #fff5ec; }
        body.day .app { background: rgba(255,245,235,0.94); }
        body.day .top-bar { background: #fff0e4; border-bottom: 2px solid #b84a2a; }
        body.day .nav-btn { background: #fff0e4; color: #5a2a1a; border: 1px solid #d4a58a; }
        body.day .sidebar { background: #fff5ed; border-right: 1px solid #e4c4b0; }
        body.day .room-item { background: #fff0e4; color: #5a2a1a; border: 1px solid #e4c4b0; }
        body.day .room-item.active { background: #b84a2a; color: #fff; }
        body.day .chat-area { background: rgba(255,245,235,0.85); }
        body.day .message { background: #fff; color: #4a2a1a; border: 1px solid #e4c4b0; }
        body.day .message.my { background: #ffe8dc; }
        body.day .input-bar { background: #fff5ed; border-top: 1px solid #e4c4b0; }
        body.day .input-bar input { background: #fff; color: #4a2a1a; border: 1px solid #e4c4b0; }
        body.day .user-item { background: #fff0e4; border: 1px solid #e4c4b0; }
        body.day .modal-content { background: #fff; border: 1px solid #e4c4b0; }

        /* ========== მთავარი ========== */
        .app {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .logo { font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .nav-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .nav-btn {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .theme-btn { background: #b81a3a; color: #fff; }
        .main { display: flex; flex: 1; overflow: hidden; }

        /* ========== მარცხენა პანელი ========== */
        .sidebar {
            width: 260px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.3s;
        }
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
            }
            .sidebar.open { transform: translateX(0); }
            .menu-btn { display: block; }
        }
        .menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }
        .sidebar-section {
            padding: 12px;
            border-bottom: 1px solid;
        }
        body.night .sidebar-section { border-bottom-color: #b81a3a; }
        body.day .sidebar-section { border-bottom-color: #e4c4b0; }
        .section-title { font-size: 13px; font-weight: bold; margin-bottom: 10px; }
        .rooms-list { display: flex; flex-direction: column; gap: 6px; }
        .room-item {
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .users-list { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; }
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #b84a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .user-name { font-weight: bold; font-size: 13px; }
        .user-status { font-size: 10px; opacity: 0.7; }
        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
            margin-left: auto;
        }
        .search-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 25px;
            margin-bottom: 10px;
            border: 1px solid;
            font-size: 13px;
        }

        /* ========== ჩატი ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid;
        }
        body.night .chat-header { border-bottom-color: #b81a3a; }
        body.day .chat-header { border-bottom-color: #e4c4b0; }
        .room-name { font-size: 16px; font-weight: bold; }
        .profile-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 30px;
        }
        .profile-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #b84a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .profile-name { font-weight: bold; font-size: 13px; }
        .profile-status { font-size: 10px; opacity: 0.7; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
        }
        .message.left { align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.right { align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            font-size: 10px;
        }
        .msg-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #b84a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .msg-name { font-weight: bold; }
        .msg-time { font-size: 9px; opacity: 0.6; }
        .msg-text { font-size: 13px; word-break: break-word; }
        .delete-msg {
            position: absolute;
            right: 4px;
            top: 4px;
            cursor: pointer;
            font-size: 10px;
            opacity: 0;
            background: rgba(0,0,0,0.5);
            padding: 2px 5px;
            border-radius: 8px;
        }
        .message:hover .delete-msg { opacity: 1; }

        .input-bar {
            padding: 10px 12px;
            display: flex;
            gap: 8px;
        }
        .input-bar input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 30px;
            outline: none;
            font-size: 14px;
        }
        .emoji-btn, .send-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
        }
        .emoji-btn { background: #b84a2a; color: #fff; }
        .send-btn { background: #b81a3a; color: #fff; }

        /* ========== მოდალები ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            width: 90%;
            max-width: 360px;
            padding: 20px;
            border-radius: 24px;
        }
        .modal-content h3 { margin-bottom: 12px; text-align: center; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 12px;
            border: 1px solid;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn-primary { background: #b81a3a; color: #fff; }
        .btn-danger { background: #c0392b; color: #fff; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #b81a3a; border-radius: 4px; }
    </style>
</head>
<body class="night">
    <div class="hearts" id="hearts"></div>

    <div class="app">
        <div class="top-bar">
            <div style="display: flex; align-items: center; gap: 8px;">
                <button class="menu-btn" id="menuBtn">☰</button>
                <div class="logo">💗 ChatApp</div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" id="profileNavBtn">👤 პროფილი</button>
                <button class="nav-btn" id="friendsNavBtn">👥 მეგობრები</button>
                <button class="nav-btn" id="onlineNavBtn">🟢 ონლაინ</button>
                <button class="nav-btn" id="usersNavBtn">📋 მომხმარებლები</button>
                <button class="nav-btn theme-btn" id="themeBtn">🌙</button>
            </div>
        </div>

        <div class="main">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-section">
                    <div class="section-title">📌 ოთახები (12)</div>
                    <div class="rooms-list" id="roomsList"></div>
                </div>
                <div class="sidebar-section">
                    <div class="section-title">👥 მეგობრები</div>
                    <div class="users-list" id="friendsList"></div>
                </div>
                <div class="sidebar-section">
                    <div class="section-title">🟢 ონლაინ</div>
                    <div class="users-list" id="onlineList"></div>
                </div>
                <div class="sidebar-section">
                    <div class="section-title">👥 ყველა მომხმარებელი</div>
                    <input type="text" id="searchUsers" class="search-input" placeholder="🔍 ძებნა...">
                    <div class="users-list" id="allUsersList"></div>
                </div>
            </div>

            <div class="chat-area">
                <div class="chat-header">
                    <div class="room-name" id="roomName">ოთახი 1</div>
                    <div class="profile-btn" id="profileBtn">
                        <div style="text-align: right;">
                            <div class="profile-name" id="headerName">მომხმარებელი</div>
                            <div class="profile-status" id="headerStatus">💗 აქტიური</div>
                        </div>
                        <div class="profile-avatar" id="headerAvatar">👤</div>
                    </div>
                </div>

                <div class="messages" id="messagesArea"></div>

                <div class="input-bar">
                    <button class="emoji-btn" id="emojiBtn">😊</button>
                    <input type="text" id="messageInput" placeholder="დაწერე შეტყობინება...">
                    <button class="send-btn" id="sendBtn">📤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ემოჯი პანელი -->
    <div class="modal" id="emojiPanel" style="display: none; background: rgba(0,0,0,0.9); justify-content: center; align-items: center;">
        <div class="modal-content" style="width: 300px;">
            <h3>😊 ემოჯები</h3>
            <div id="emojiGrid" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; max-height: 250px; overflow-y: auto; padding: 10px;"></div>
            <button id="closeEmoji" class="btn-primary" style="margin-top: 10px;">დახურვა</button>
        </div>
    </div>

    <!-- პროფილი -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h3>💗 ჩემი პროფილი</h3>
            <div style="display: flex; justify-content: center; margin-bottom: 10px;">
                <div class="profile-avatar" id="modalAvatar" style="width: 70px; height: 70px; font-size: 30px;">👤</div>
            </div>
            <input type="file" id="profilePhoto" accept="image/*">
            <input type="text" id="editName" placeholder="ნიკნეიმი">
            <input type="text" id="editStatus" placeholder="სტატუსი">
            <div class="modal-buttons">
                <button id="saveProfileBtn" class="btn-primary">💾 შენახვა</button>
                <button id="closeProfileBtn">❌</button>
            </div>
        </div>
    </div>

    <!-- მეგობრების მოდალი -->
    <div class="modal" id="friendsModal">
        <div class="modal-content">
            <h3>👥 ჩემი მეგობრები</h3>
            <div id="friendsModalList" style="max-height: 300px; overflow-y: auto;"></div>
            <button id="closeFriendsModal" class="btn-primary">დახურვა</button>
        </div>
    </div>

    <script>
        // ==================== მომხმარებელი (მხოლოდ რეგისტრირებული) ====================
        let allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];
        
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            let name = prompt("💗 შეიყვანეთ თქვენი სახელი:", "მომხმარებელი_" + (allUsers.length + 1));
            if (!name) name = "მომხმარებელი_" + (allUsers.length + 1);
            
            currentUser = {
                id: 'u_' + Date.now(),
                name: name,
                avatar: '👤',
                status: '💗 აქტიური',
                role: allUsers.length === 0 ? 'founder' : 'member',
                friends: []
            };
            allUsers.push(currentUser);
            localStorage.setItem('allUsers', JSON.stringify(allUsers));
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
        } else {
            let exists = allUsers.find(u => u.id === currentUser.id);
            if (!exists) {
                allUsers.push(currentUser);
                localStorage.setItem('allUsers', JSON.stringify(allUsers));
            }
        }

        // ==================== 12 ოთახი ====================
        let rooms = [];
        for (let i = 1; i <= 12; i++) {
            rooms.push({
                id: i,
                name: `ოთახი ${i}`,
                messages: JSON.parse(localStorage.getItem(`room_${i}`)) || []
            });
        }
        let currentRoom = 0;

        // ==================== ემოჯები ====================
        let emojis = ['😊', '😂', '❤️', '😍', '🎉', '🔥', '👍', '🙏', '🥰', '😢', '😡', '🤔', '💗', '💕'];

        // ==================== გულები ====================
        function startHearts() {
            setInterval(() => {
                let heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 40 + 25) + 'px';
                heart.style.animationDuration = (Math.random() * 6 + 5) + 's';
                document.getElementById('hearts').appendChild(heart);
                setTimeout(() => heart.remove(), 8000);
            }, 1200);
        }

        // ==================== ოთახები ====================
        function renderRooms() {
            let html = '';
            rooms.forEach((room, i) => {
                html += `<div class="room-item ${currentRoom === i ? 'active' : ''}" onclick="changeRoom(${i})">📌 ${room.name}</div>`;
            });
            document.getElementById('roomsList').innerHTML = html;
        }

        window.changeRoom = function(i) {
            currentRoom = i;
            document.getElementById('roomName').innerHTML = rooms[i].name;
            renderRooms();
            renderMessages();
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        };

        // ==================== შეტყობინებები ====================
        function renderMessages() {
            let msgs = rooms[currentRoom].messages;
            let html = '';
            msgs.forEach(msg => {
                let isMy = msg.userId === currentUser.id;
                let user = allUsers.find(u => u.id === msg.userId) || { name: msg.userName, avatar: msg.avatar };
                html += `
                    <div class="message ${isMy ? 'right' : 'left'}">
                        <div class="msg-header">
                            <div class="msg-avatar">${user.avatar || '👤'}</div>
                            <span class="msg-name">${escapeHtml(user.name)}</span>
                            <span class="msg-time">${msg.time}</span>
                        </div>
                        <div class="msg-text">${escapeHtml(msg.text)}</div>
                    </div>
                `;
            });
            document.getElementById('messagesArea').innerHTML = html || '<div style="text-align:center; padding:40px;">💬 არ არის შეტყობინებები</div>';
            document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
        }

        function sendMessage() {
            let input = document.getElementById('messageInput');
            let text = input.value.trim();
            if (!text) return;
            
            let msg = {
                id: Date.now(),
                userId: currentUser.id,
                userName: currentUser.name,
                avatar: currentUser.avatar,
                text: text,
                time: new Date().toLocaleTimeString()
            };
            rooms[currentRoom].messages.push(msg);
            localStorage.setItem(`room_${rooms[currentRoom].id}`, JSON.stringify(rooms[currentRoom].messages));
            input.value = '';
            renderMessages();
        }

        // ==================== მომხმარებლები ====================
        function renderUsers() {
            // მეგობრები
            let friends = allUsers.filter(u => currentUser.friends.includes(u.id) && u.id !== currentUser.id);
            document.getElementById('friendsList').innerHTML = friends.map(u => `
                <div class="user-item" onclick="alert('💬 პირადი მესიჯი მალე დაემატება')">
                    <div class="user-avatar">${u.avatar}</div>
                    <div><div class="user-name">${escapeHtml(u.name)}</div><div class="user-status">${u.status}</div></div>
                    <div class="online-dot"></div>
                </div>
            `).join('') || '<div style="padding:10px; text-align:center;">💗 არ გყავს მეგობრები</div>';
            
            // ონლაინ (ყველა სხვა)
            let online = allUsers.filter(u => u.id !== currentUser.id);
            document.getElementById('onlineList').innerHTML = online.map(u => `
                <div class="user-item" onclick="addFriend('${u.id}')">
                    <div class="user-avatar">${u.avatar}</div>
                    <div><div class="user-name">${escapeHtml(u.name)}</div><div class="user-status">${u.status}</div></div>
                    <div class="online-dot"></div>
                </div>
            `).join('');
            
            // ყველა მომხმარებელი
            let search = document.getElementById('searchUsers')?.value.toLowerCase() || '';
            let all = allUsers.filter(u => u.id !== currentUser.id && u.name.toLowerCase().includes(search));
            document.getElementById('allUsersList').innerHTML = all.map(u => `
                <div class="user-item" onclick="addFriend('${u.id}')">
                    <div class="user-avatar">${u.avatar}</div>
                    <div><div class="user-name">${escapeHtml(u.name)}</div><div class="user-status">${u.status}</div></div>
                </div>
            `).join('');
        }

        window.addFriend = function(userId) {
            let user = allUsers.find(u => u.id === userId);
            if (!user) return;
            if (currentUser.friends.includes(userId)) {
                alert('უკვე მეგობარი ხართ');
                return;
            }
            if (confirm(`💗 ${user.name} - მეგობრად დამატება?`)) {
                currentUser.friends.push(userId);
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                let idx = allUsers.findIndex(u => u.id === currentUser.id);
                if (idx !== -1) allUsers[idx] = currentUser;
                localStorage.setItem('allUsers', JSON.stringify(allUsers));
                renderUsers();
                alert('✅ მეგობარი დაემატა!');
            }
        };

        // ==================== პროფილი ====================
        function updateProfileUI() {
            document.getElementById('headerName').innerHTML = currentUser.name;
            document.getElementById('headerStatus').innerHTML = currentUser.status;
            document.getElementById('headerAvatar').innerHTML = currentUser.avatar;
            document.getElementById('modalAvatar').innerHTML = currentUser.avatar;
            document.getElementById('editName').value = currentUser.name;
            document.getElementById('editStatus').value = currentUser.status;
        }

        function saveProfile() {
            let newName = document.getElementById('editName').value.trim();
            if (newName) currentUser.name = newName;
            currentUser.status = document.getElementById('editStatus').value;
            
            let photo = document.getElementById('profilePhoto').files[0];
            if (photo) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    currentUser.avatar = `<img src="${e.target.result}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                    saveUserData();
                };
                reader.readAsDataURL(photo);
            } else {
                saveUserData();
            }
        }
        
        function saveUserData() {
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            let idx = allUsers.findIndex(u => u.id === currentUser.id);
            if (idx !== -1) allUsers[idx] = currentUser;
            localStorage.setItem('allUsers', JSON.stringify(allUsers));
            updateProfileUI();
            renderUsers();
            renderMessages();
            document.getElementById('profileModal').classList.remove('show');
            alert('✅ პროფილი განახლდა!');
        }

        // ==================== ემოჯები ====================
        function openEmojiPanel() {
            let grid = document.getElementById('emojiGrid');
            grid.innerHTML = emojis.map(e => `<div style="font-size:32px; cursor:pointer; text-align:center; padding:5px;" onclick="addEmoji('${e}')">${e}</div>`).join('');
            document.getElementById('emojiPanel').style.display = 'flex';
        }
        
        window.addEmoji = function(e) {
            document.getElementById('messageInput').value += e;
            document.getElementById('emojiPanel').style.display = 'none';
        };

        // ==================== მეგობრების მოდალი ====================
        function openFriendsModal() {
            let friends = allUsers.filter(u => currentUser.friends.includes(u.id));
            document.getElementById('friendsModalList').innerHTML = friends.map(f => `
                <div class="user-item" style="margin:5px 0;">
                    <div class="user-avatar">${f.avatar}</div>
                    <div><div class="user-name">${escapeHtml(f.name)}</div><div class="user-status">${f.status}</div></div>
                </div>
            `).join('') || '<div style="text-align:center; padding:20px;">💗 არ გყავს მეგობრები</div>';
            document.getElementById('friendsModal').classList.add('show');
        }

        // ==================== თემა ====================
        function toggleTheme() {
            let body = document.body;
            let btn = document.getElementById('themeBtn');
            if (body.classList.contains('night')) {
                body.classList.remove('night');
                body.classList.add('day');
                btn.innerHTML = '☀️';
            } else {
                body.classList.remove('day');
                body.classList.add('night');
                btn.innerHTML = '🌙';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ==================== Event Listeners ====================
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        document.getElementById('emojiBtn').onclick = openEmojiPanel;
        document.getElementById('closeEmoji').onclick = () => document.getElementById('emojiPanel').style.display = 'none';
        document.getElementById('profileNavBtn').onclick = () => document.getElementById('profileModal').classList.add('show');
        document.getElementById('profileBtn').onclick = () => document.getElementById('profileModal').classList.add('show');
        document.getElementById('saveProfileBtn').onclick = saveProfile;
        document.getElementById('closeProfileBtn').onclick = () => document.getElementById('profileModal').classList.remove('show');
        document.getElementById('themeBtn').onclick = toggleTheme;
        document.getElementById('friendsNavBtn').onclick = openFriendsModal;
        document.getElementById('closeFriendsModal').onclick = () => document.getElementById('friendsModal').classList.remove('show');
        document.getElementById('onlineNavBtn').onclick = () => document.getElementById('onlineList').scrollIntoView({ behavior: 'smooth' });
        document.getElementById('usersNavBtn').onclick = () => document.getElementById('allUsersList').scrollIntoView({ behavior: 'smooth' });
        document.getElementById('searchUsers').oninput = renderUsers;
        document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar').onclick = (e) => { if (e.target === document.getElementById('sidebar')) document.getElementById('sidebar').classList.remove('open'); };

        // ==================== ინიციალიზაცია ====================
        startHearts();
        renderRooms();
        renderUsers();
        renderMessages();
        updateProfileUI();
        changeRoom(0);
    </script>
</body>
</html>
