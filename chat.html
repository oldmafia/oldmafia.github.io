<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - FULL SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --dark-red: #4a0000; --deep-red: #800000; --bright-red: #ff0000;
            --blood-red: #660000; --bg-black: #030000;
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--dark-red); height: 60px; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 25px; color: var(--bright-red); padding: 0 10px; }
        #room-name { font-weight: bold; color: var(--bright-red); flex: 1; text-align: center; font-size: 16px; }
        #pm-btn { position: relative; cursor: pointer; font-size: 22px; margin-right: 15px; color: cyan; display: flex; align-items: center; }
        #pm-count { position: absolute; top: -8px; right: -10px; color: #ff0000; font-size: 16px; font-weight: bold; display: none; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #1a0000 0%, #030000 100%); }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; max-width: 95%; }
        .avatar-wrapper { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--dark-red); object-fit: cover; cursor: pointer; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #0f0; border: 2px solid black; border-radius: 50%; display: none; }
        .online-dot.active { display: block; box-shadow: 0 0 8px #0f0; }

        .bubble { background: rgba(25, 0, 0, 0.9); border: 1px solid var(--blood-red); padding: 8px 12px; border-radius: 4px 18px 18px 18px; position: relative; }
        .m-nick { font-weight: bold; color: #ff3333; font-size: 13px; cursor: pointer; margin-bottom: 3px; }
        .m-text { color: #ddd; font-size: 14px; word-wrap: break-word; }
        .m-text img { width: 45px; height: 45px; vertical-align: middle; margin: 2px; }

        .sidebar, .online-sidebar { position: fixed; top: 0; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; display: flex; flex-direction: column; }
        .sidebar { left: -280px; border-right: 3px solid var(--dark-red); }
        .sidebar.active { left: 0; }
        .online-sidebar { right: -280px; border-left: 3px solid var(--dark-red); }
        .online-sidebar.active { right: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3500; }
        .overlay.active { display: block; }

        .room-item { padding: 14px 20px; cursor: pointer; color: #bbb; border-bottom: 1px solid #150000; }
        .room-item.active { background: var(--dark-red); color: white; font-weight: bold; }

        .input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: black; padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--dark-red); z-index: 2000; }
        .input-zone input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--blood-red); background: #080000; color: white; outline: none; }
        .send-btn { background: var(--dark-red); border: none; width: 45px; height: 45px; border-radius: 50%; color: cyan; cursor: pointer; font-size: 22px; }

        #emoji-picker { display: none; position: fixed; bottom: 80px; left: 10px; background: #080000; border: 2px solid var(--dark-red); padding: 10px; border-radius: 15px; width: 300px; max-height: 350px; overflow-y: auto; z-index: 3000; }
        #emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .emoji-item { width: 45px; height: 45px; cursor: pointer; object-fit: contain; }
    </style>
</head>
<body onload="init()">

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 20px 15px; text-align: center;">
        <input type="file" id="avatar-input" style="display:none" onchange="uploadAvatar(this)">
        <img id="my-avatar-img" src="https://i.ibb.co/v3m6y6R/avatar.png" style="width:70px; height:70px; border-radius:50%; border:2px solid var(--dark-red); cursor:pointer; object-fit: cover;" onclick="document.getElementById('avatar-input').click()">
        <div id="my-nick-label" style="font-weight:bold; color:var(--bright-red); margin-top:10px;">...</div>
        <div id="my-role-label" style="font-size: 11px; color: #888;">...</div>
        <div style="font-size: 12px; color: gold; margin-top:5px;">🏆 ქულა: <span id="my-points-label">0</span></div>
        <div onclick="changeStatus()" style="font-size: 11px; color: #0c0; cursor:pointer; margin-top:10px; text-decoration: underline;">💬 სტატუსი</div>
    </div>
    <div style="flex:1; overflow-y:auto;">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('💎 ვიპ საუბრები', this)">💎 ვიპ საუბრები</div>
        <div class="room-item" onclick="changeRoom('❓ ვიქტორინა', this)">❓ ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
    </div>
    <div style="padding:15px; text-align:center; color:red; cursor:pointer;" onclick="localStorage.clear(); location.reload();">🚪 გასვლა</div>
</div>

<div class="online-sidebar" id="online-sidebar">
    <div style="padding:20px; color:#0f0; font-weight:bold; text-align:center; border-bottom:2px solid var(--dark-red);">🟢 ონლაინში</div>
    <div id="online-list-content"></div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
    <div id="pm-btn" onclick="location.href='pm.html'">✉️ <span id="pm-count">0</span></div>
    <div class="menu-btn" onclick="toggleOnline()">👥</div>
</div>

<div class="chat-area" id="chat"></div>

<div id="emoji-picker">
    <div id="emoji-grid"></div>
</div>

<div class="input-zone">
    <button onclick="toggleEmojiPicker()" style="background:none; border:none; font-size:24px; cursor:pointer;">😊</button>
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">✈</button>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), myRole = "Member", currentRoom = "☕ კაფე-ბარი", myAvatar = "";

    async function init() {
        if (!myNick) { location.href = 'index.html'; return; }
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = p.role || "Member";
            myAvatar = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-role-label').innerText = myRole;
            document.getElementById('my-avatar-img').src = myAvatar;
            document.getElementById('my-points-label').innerText = p.points || 0;
            
            updateOnline();
            setInterval(updateOnline, 30000);
            loadEmojis();
            checkPMs();
            setInterval(checkPMs, 10000);
        }
        loadMessages();
        _s.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
    }

    async function updateOnline() { await _s.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick); }

    async function loadMessages() {
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const { data: profs } = await _s.from('profiles').select('*');
        const box = document.getElementById("chat");
        box.innerHTML = "";
        msgs?.forEach(m => {
            const p = profs?.find(u => u.username === m.user_name);
            const active = (p?.last_online && (new Date() - new Date(p.last_online) < 300000)) ? "active" : "";
            box.innerHTML += `
                <div class="msg-container">
                    <div class="avatar-wrapper">
                        <img src="${p?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar">
                        <div class="online-dot ${active}"></div>
                    </div>
                    <div class="bubble">
                        <div class="m-nick">${m.user_name}</div>
                        <div class="m-text">${parseEmojis(m.text)}</div>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    function parseEmojis(text) {
        if (!text) return "";
        return text.replace(/(\S+\.(gif|png|jpg|webp))/gi, `<img src="https://ftfciebnywbondaiarnc.supabase.co/storage/v1/object/public/emojis/$1">`);
    }

    async function loadEmojis() {
        const { data: ems } = await _s.from('emojis').select('*');
        const grid = document.getElementById('emoji-grid');
        grid.innerHTML = (ems || []).map(e => `<img src="https://ftfciebnywbondaiarnc.supabase.co/storage/v1/object/public/emojis/${e.name}" class="emoji-item" onclick="insertEmoji('${e.name}')">`).join('');
    }

    function insertEmoji(name) {
        const input = document.getElementById('msg-input');
        input.value += name + " ";
        input.focus();
    }

    async function sendMsg() {
        const i = document.getElementById("msg-input");
        if(!i.value.trim()) return;
        await _s.from('messages').insert([{ user_name: myNick, text: i.value, room_name: currentRoom }]);
        i.value = "";
    }

    async function uploadAvatar(el) {
        const file = el.files[0]; if(!file) return;
        const fileName = `${myNick}_${Date.now()}.png`;
        const { data } = await _s.storage.from('avatars').upload(fileName, file);
        if(data) {
            const url = `https://ftfciebnywbondaiarnc.supabase.co/storage/v1/object/public/avatars/${fileName}`;
            await _s.from('profiles').update({ avatar_url: url }).eq('username', myNick);
            location.reload();
        }
    }

    async function changeStatus() {
        const s = prompt("შეიყვანეთ ახალი სტატუსი:");
        if(s) await _s.from('profiles').update({ status: s }).eq('username', myNick);
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function toggleOnline() { document.getElementById('online-sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); if(document.getElementById('online-sidebar').classList.contains('active')) loadOnlineList(); }
    function toggleEmojiPicker() { const p = document.getElementById('emoji-picker'); p.style.display = (p.style.display==='block')?'none':'block'; }
    function closeAll() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('online-sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); document.getElementById('emoji-picker').style.display='none'; }

    async function loadOnlineList() {
        const { data: users } = await _s.from('profiles').select('*');
        const list = document.getElementById('online-list-content');
        list.innerHTML = (users || []).filter(u => u.last_online && (new Date() - new Date(u.last_online) < 300000))
            .map(u => `<div style="padding:12px; border-bottom:1px solid #111;">🟢 ${u.username}</div>`).join('');
    }

    function changeRoom(n, el) { currentRoom = n; document.getElementById('room-name').innerText = n; document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active')); el.classList.add('active'); closeAll(); loadMessages(); }
    async function checkPMs() { const { count } = await _s.from('private_messages').select('*', { count: 'exact', head: true }).eq('receiver_name', myNick).eq('is_read', false); const el = document.getElementById('pm-count'); if(count > 0) { el.innerText = count; el.style.display = 'block'; } else { el.style.display = 'none'; } }
</script>
</body>
</html>
