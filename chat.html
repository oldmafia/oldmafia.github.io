<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - SOCIAL CHAT</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; transition: 0.2s ease; }
        
        /* 🔴 ღამის რეჟიმი — შენი ღაჟღაჟა წითელი შავში 🔴 */
        body.night-mode {
            --bg-color: #000000;
            --text-color: #e0c8a8;
            --chat-bg: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
            --bubble-bg: #0a0000;
            --bubble-border: #ff0000;
            --nick-color: #ff4d4d;
            --sidebar-bg: #000000;
            --input-bg: #0a0000;
            --input-border: #ff0000;
            --topbar-bg: #050000;
            --modal-bg: #0a0000;
            --modal-border: #ff0000;
            --modal-text: #e0c8a8;
            --cover-gradient: linear-gradient(to bottom, #ff0000, #000000);
        }
        
        /* ❤️ დღის რეჟიმი — შენი ლამაზი გულები ❤️ */
        body.day-mode {
            --bg-color: #fff8f0;
            --text-color: #2c2418;
            --chat-bg: #fffef7;
            --bubble-bg: #ffffff;
            --bubble-border: #e8d4b0;
            --nick-color: #c55a3a;
            --sidebar-bg: #fff8ed;
            --input-bg: #ffffff;
            --input-border: #e8d4b0;
            --topbar-bg: #fff4e6;
            --modal-bg: #ffffff;
            --modal-border: #e8d4b0;
            --modal-text: #2c2418;
            --cover-gradient: linear-gradient(to bottom, #ffcccc, #fff8f0);
            background-image: radial-gradient(circle at 15% 25%, rgba(255, 77, 77, 0.2) 3px, transparent 3px),
                              radial-gradient(circle at 75% 60%, rgba(255, 77, 77, 0.15) 2.5px, transparent 2.5px);
            background-size: 55px 55px, 40px 40px;
        }

        /* გულების ანიმაცია დღის რეჟიმისთვის */
        body.day-mode .chat-area::after, body.day-mode .modal-content::after {
            content: "❤️"; position: fixed; bottom: 15%; right: 20px; font-size: 56px; opacity: 0.6; animation: floatHeartGlow 5s infinite ease-in-out; filter: drop-shadow(0 0 8px #ff6699); z-index: 100;
        }
        @keyframes floatHeartGlow { 0% { transform: translateY(0); } 50% { transform: translateY(-30px); } 100% { transform: translateY(0); } }

        /* ძირითადი სტრუქტურა */
        body { margin: 0; font-family: sans-serif; background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: var(--topbar-bg); padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--bubble-border); height: 60px; z-index: 1000; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: var(--chat-bg); position: relative; }
        .input-zone { padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--bubble-border); background: var(--topbar-bg); }
        .input-zone input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); outline: none; }
        
        /* Facebook Style პროფილის მოდალი */
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { 
            background: var(--modal-bg) !important; border: 2px solid var(--modal-border) !important; 
            width: 100%; max-width: 500px; height: 100%; overflow-y: auto; position: relative;
        }

        .fb-header { position: relative; height: 200px; background: var(--cover-gradient); }
        .fb-profile-pic { 
            width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--modal-bg);
            position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%); object-fit: cover;
        }

        .fb-body { padding: 70px 20px 20px; text-align: center; }
        .fb-name { font-size: 24px; margin: 0; color: var(--nick-color); }
        .fb-stats { display: flex; justify-content: center; gap: 20px; margin: 15px 0; font-weight: bold; }
        
        .fb-wall { text-align: left; margin-top: 20px; border-top: 1px solid var(--bubble-border); padding-top: 15px; }
        .post-card { background: var(--bubble-bg); border: 1px solid var(--bubble-border); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        
        .fb-btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-main { background: var(--nick-color); color: white; }
        .btn-back { position: fixed; top: 15px; right: 15px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; width: 35px; height: 35px; z-index: 6000; }
    </style>
</head>
<body class="night-mode">

<div class="topbar">
    <div style="flex:1; text-align:center; font-weight:bold; color:var(--nick-color);">☕ კაფე-ბარი</div>
    <button onclick="toggleTheme()" id="themeToggle" style="background:none; border:none; font-size:20px;">🌙</button>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე...">
    <button onclick="sendMsg()" style="background:var(--nick-color); color:white; border:none; border-radius:50%; width:40px; height:40px;">✈</button>
</div>

<div id="userModal" class="modal">
    <button class="btn-back" onclick="closeModal()">✕</button>
    <div class="modal-content">
        <div class="fb-header">
            <img id="targetAvatar" class="fb-profile-pic" src="">
        </div>
        <div class="fb-body">
            <h1 id="targetName" class="fb-name">...</h1>
            <p style="opacity:0.7;">🕵️ მაფიის წევრი</p>
            
            <div class="fb-stats">
                <span>🏆 <span id="quizPoints">0</span></span>
                <span>👥 50 მეგობარი</span>
            </div>

            <div>
                <button class="fb-btn btn-main">➕ მეგობრობა</button>
                <button class="fb-btn" style="background:var(--bubble-bg); color:var(--text-color); border:1px solid var(--bubble-border);">✉️ მიწერა</button>
            </div>

            <div class="fb-wall">
                <h3 style="color:var(--nick-color);">📝 ბოლო პოსტები</h3>
                <div id="userWall">
                    <div class="post-card">პოსტები იტვირთება... 📸</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname');

    function toggleTheme() {
        const b = document.body;
        const btn = document.getElementById('themeToggle');
        if (b.classList.contains('night-mode')) {
            b.classList.replace('night-mode', 'day-mode');
            btn.innerText = '☀️';
            localStorage.setItem('theme', 'day');
        } else {
            b.classList.replace('day-mode', 'night-mode');
            btn.innerText = '🌙';
            localStorage.setItem('theme', 'night');
        }
    }

    function closeModal() { document.getElementById('userModal').style.display = "none"; }

    async function openProfile(username) {
        const { data: user } = await _s.from('profiles').select('*').eq('username', username).maybeSingle();
        if(user) {
            document.getElementById('targetName').innerText = user.username;
            document.getElementById('targetAvatar').src = user.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
            document.getElementById('quizPoints').innerText = user.points || 0;
            document.getElementById('userModal').style.display = "flex";
        }
    }

    async function init() {
        const savedTheme = localStorage.getItem('theme') || 'night';
        if(savedTheme === 'day') toggleTheme();
        if (!myNick) { location.href = 'index.html'; return; }
        loadMessages();
    }

    // აქ ჩაამატე შენი არსებული loadMessages() და sendMsg() ფუნქციები...

    window.onload = init;
</script>
</body>
</html>
