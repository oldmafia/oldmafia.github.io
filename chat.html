<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Chat - FIXED</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --wine: #4a0404; --bg: #0b0000; --txt: #fff; }
        body.light { --bg: #f5f5dc; --txt: #000; --wine: #800000; }
        body { margin: 0; background: var(--bg); color: var(--txt); font-family: sans-serif; overflow: hidden; height: 100vh; transition: 0.3s; }

        /* ნავიგაცია */
        .top-nav { height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid var(--wine); }
        .nav-btn { font-size: 24px; cursor: pointer; z-index: 1001; }

        /* ჩათი */
        #chat-window { height: calc(100vh - 130px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; z-index: 10; position: relative; }
        .msg-container { display: flex; gap: 10px; max-width: 90%; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--wine); object-fit: cover; }
        .bubble { background: rgba(74,4,4,0.2); border: 1px solid var(--wine); padding: 10px; border-radius: 12px; }

        /* გულები */
        .heart { position: fixed; color: red; font-size: 20px; pointer-events: none; animation: fly 6s linear infinite; z-index: 1; opacity: 0; }
        @keyframes fly { 0% { bottom: -5%; left: var(--l); opacity: 1; } 100% { bottom: 105%; left: var(--l); opacity: 0; transform: rotate(45deg); } }

        /* ქვედა პანელი */
        .bottom-bar { height: 70px; background: #000; display: flex; align-items: center; padding: 0 15px; border-top: 2px solid var(--wine); }
        #msg-input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid var(--wine); background: #111; color: white; }
        
        /* მოდალები */
        .modal { position: fixed; inset: 60px 0 0 0; background: var(--bg); z-index: 2000; display: none; padding: 20px; overflow-y: auto; }
        .close-x { float: right; color: red; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div id="heart-box"></div>

<nav class="top-nav">
    <div class="nav-btn" onclick="openM('rooms')">🏠</div>
    <div class="nav-btn" onclick="openM('online')">👥 <span id="on-count" style="font-size:12px;">0</span></div>
    <div class="nav-btn" onclick="openM('profile')">👤</div>
    <div class="nav-btn" onclick="toggleTheme()">🌙</div>
</nav>

<div id="chat-window"></div>

<div class="bottom-bar">
    <button onclick="openM('emojis')" style="background:none; border:none; font-size:24px; cursor:pointer;">😊</button>
    <input type="text" id="msg-input" placeholder="დაწერე რამე...">
    <button onclick="send()" style="background:var(--wine); border:none; color:white; width:45px; height:45px; border-radius:50%; margin-left:10px;">➤</button>
</div>

<div id="m-rooms" class="modal"><span class="close-x" onclick="closeAll()">×</span><div id="room-list"></div></div>
<div id="m-online" class="modal"><span class="close-x" onclick="closeAll()">×</span><h3>ონლაინ:</h3><div id="on-list"></div></div>
<div id="m-emojis" class="modal"><span class="close-x" onclick="closeAll()">×</span><div id="emo-grid" style="display:grid; grid-template-columns:repeat(5,1fr); gap:10px;"></div></div>

<script>
    const S_URL = 'https://ftfciebnywbondaiarnc.supabase.co';
    const S_KEY = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let myNick = "დამფუძნებელი"; 
    let currentRoom = "მთავარი";

    function toggleTheme() { document.body.classList.toggle('light'); }

    // გულები
    setInterval(() => {
        const h = document.createElement('div');
        h.className = 'heart'; h.innerText = '❤';
        h.style.setProperty('--l', Math.random() * 100 + 'vw');
        document.getElementById('heart-box').appendChild(h);
        setTimeout(() => h.remove(), 6000);
    }, 2000);

    // ონლაინ სისტემა
    const channel = _supabase.channel('online_live', { config: { presence: { key: myNick } } });
    channel.on('presence', { event: 'sync' }, () => {
        const state = channel.presenceState();
        document.getElementById('on-count').innerText = Object.keys(state).length;
        document.getElementById('on-list').innerHTML = Object.keys(state).map(u => `<div style="padding:10px;">🟢 ${u}</div>`).join('');
    }).subscribe(async (s) => { if(s==='SUBSCRIBED') await channel.track({ online_at: new Date() }); });

    // ჩათი
    async function load() {
        const { data: msgs } = await _supabase.from('messages').select('*').eq('room_name', currentRoom).order('created_at', {ascending: true});
        const { data: profs } = await _supabase.from('profiles').select('*');
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        msgs?.forEach(m => {
            const p = profs?.find(x => x.username === m.user_name) || {};
            win.innerHTML += `
                <div class="msg-container">
                    <img src="${p.avatar_url || 'https://via.placeholder.com/45'}" class="avatar">
                    <div class="bubble">
                        <b style="color:var(--wine); font-size:11px;">${m.user_name}</b>
                        <div style="margin-top:5px;">${m.text}</div>
                    </div>
                </div>`;
        });
        win.scrollTop = win.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('msg-input');
        if(!i.value) return;
        await _supabase.from('messages').insert([{ text: i.value, room_name: currentRoom, user_name: myNick }]);
        i.value = '';
    }

    // REALTIME - ეს ხაზი აჩენს მესიჯს ყველასთან!
    _supabase.channel('msgs').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, () => load()).subscribe();

    function openM(id) { 
        closeAll(); 
        document.getElementById(`m-${id}`).style.display = 'block'; 
        if(id==='rooms') loadRooms();
        if(id==='emojis') loadEmojis();
    }
    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    
    async function loadRooms() {
        const { data } = await _supabase.from('categories').select('text');
        document.getElementById('room-list').innerHTML = data.map(r => `<div style="background:var(--wine); color:white; padding:15px; margin:5px; border-radius:10px; text-align:center; cursor:pointer;" onclick="setR('${r.text}')">${r.text}</div>`).join('');
    }
    function setR(n) { currentRoom = n; closeAll(); load(); }

    async function loadEmojis() {
        const { data } = await _supabase.from('emojis').select('emoji_url');
        document.getElementById('emo-grid').innerHTML = data.map(e => `<img src="${e.emoji_url}" style="width:100%; cursor:pointer;" onclick="addE('${e.emoji_url}')">`).join('');
    }
    function addE(u) { document.getElementById('msg-input').value += ` [img]${u}[/img] `; closeAll(); }

    load();
</script>
</body>
</html>
