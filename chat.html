<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Chat 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dark-wine: #4a0404; --wine-glow: #800020; --cream: #f5f5dc; }
        * { box-sizing: border-box; font-family: 'Helvetica Neue', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; transition: 0.5s; }
        
        /* რეჟიმები */
        body.dark-mode { background: #0b0000; color: #fff; }
        body.light-mode { background: var(--cream); color: #333; }

        /* ანიმაციური გულები */
        #heart-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .floating-heart { position: absolute; font-size: 60px; color: var(--dark-wine); animation: floatUp 10s infinite linear; opacity: 0; filter: drop-shadow(0 0 10px var(--wine-glow)); }
        @keyframes floatUp { 0% { transform: translateY(110vh) scale(0.5); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }

        /* მენიუ ზემოთ */
        .top-bar { background: #000; height: 60px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid var(--dark-wine); position: relative; z-index: 100; }
        .nav-btn { font-size: 22px; cursor: pointer; color: white; position: relative; }
        .msg-count { position: absolute; top: -5px; right: -10px; background: red; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; display: block; }

        /* 12 ოთახის ზოლი */
        .rooms-nav { display: flex; overflow-x: auto; background: rgba(0,0,0,0.5); padding: 10px; gap: 8px; border-bottom: 1px solid var(--dark-wine); }
        .room-btn { padding: 5px 12px; background: var(--dark-wine); border-radius: 15px; cursor: pointer; white-space: nowrap; font-size: 13px; color: white; }
        .room-btn.active { background: white; color: var(--dark-wine); font-weight: bold; }

        /* ჩეთის არეალი */
        #main-chat { height: calc(100vh - 185px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 10; }
        .msg-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; margin-bottom: 5px; }
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .u-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--dark-wine); cursor: pointer; }
        .u-bubble { padding: 10px; border-radius: 15px; background: rgba(74,4,4,0.4); border: 1px solid var(--dark-wine); backdrop-filter: blur(5px); }
        .light-mode .u-bubble { background: #fff; color: #000; }

        /* ფანჯრები */
        .modal { position: fixed; top: 60px; left: 0; width: 100%; height: calc(100% - 60px); background: rgba(0,0,0,0.95); z-index: 500; display: none; padding: 20px; }
        .user-card { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #333; }

        /* ქვედა ზოლი */
        .chat-input { height: 70px; background: #000; border-top: 2px solid var(--dark-wine); display: flex; align-items: center; padding: 0 15px; }
        #text-box { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #222; color: #fff; outline: none; }
        #send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--dark-wine); border: none; color: #fff; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body class="dark-mode">

<div id="heart-layer"></div>

<nav class="top-bar">
    <div class="nav-btn" onclick="toggleM('rooms-m')">🏠</div>
    <div class="nav-btn" onclick="toggleM('messenger-m')">💬 <span class="msg-count" id="count">3</span></div>
    <div class="nav-btn" onclick="toggleM('profile-m')">👤</div>
    <div class="nav-btn" onclick="toggleM('online-m')">👥</div>
    <div class="nav-btn" id="theme-btn">🌙</div>
</nav>

<div class="rooms-nav" id="rooms-list"></div>

<div id="main-chat"></div>

<div id="profile-m" class="modal">
    <button onclick="closeAll()" style="color:red; float:right;">დახურვა X</button>
    <h2>პროფილი</h2>
    <div style="text-align:center">
        <img id="p-avatar" src="https://via.placeholder.com/80" style="width:80px; height:80px; border-radius:50%">
        <br><input type="file" id="file-up" style="margin:10px">
        <br><input type="text" id="p-status" placeholder="სტატუსი..." style="width:80%; padding:10px; margin:5px">
        <br><button onclick="saveP()" style="background:green; color:white; padding:10px 20px; border:none">შენახვა</button>
    </div>
</div>

<div id="online-m" class="modal">
    <button onclick="closeAll()" style="color:red; float:right;">X</button>
    <h3>ონლაინ მომხმარებლები</h3>
    <div id="online-users-list"></div>
</div>

<div class="chat-input">
    <button onclick="alert('Emoji Gallery opening...')" style="background:none; border:none; font-size:25px; cursor:pointer;">😊</button>
    <input type="text" id="text-box" placeholder="დაწერე მესიჯი...">
    <button id="send-btn">➤</button>
</div>

<script>
    const S_URL = 'https://ftfciebnywbondaiarnc.supabase.co';
    const S_KEY = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let activeRoom = 1;
    let myID = 'guest-123'; // ეს ავტორიზაციის მერე შეიცვლება რეალური ID-ით

    // 1. 12 ოთახის შექმნა
    const rList = document.getElementById('rooms-list');
    for(let i=1; i<=12; i++) {
        rList.innerHTML += `<div class="room-btn ${i==1?'active':''}" onclick="changeRoom(${i}, this)">ოთახი ${i}</div>`;
    }

    function changeRoom(num, el) {
        activeRoom = num;
        document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        loadMessages();
    }

    // 2. მესიჯების ჩატვირთვა და გამოჩენა
    async function loadMessages() {
        const { data } = await _supabase.from('messages').select('*, profiles(*)').order('created_at', {ascending: true});
        const chat = document.getElementById('main-chat');
        chat.innerHTML = '';
        if(data) {
            data.forEach(m => {
                const isMe = m.user_id === myID;
                const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                chat.innerHTML += `
                    <div class="msg-row ${isMe ? 'me' : ''}">
                        <img src="${m.profiles?.avatar_url || 'https://ui-avatars.com/api/?name=U'}" class="u-avatar">
                        <div class="u-bubble">
                            <div style="font-size:11px; font-weight:bold; color:var(--dark-wine)">${m.profiles?.username || 'მომხმარებელი'}</div>
                            <div>${m.text || m.content || ''}</div>
                            <span style="font-size:9px; opacity:0.6">${time}</span>
                            ${isMe ? '' : `<button onclick="deleteM('${m.id}')" style="font-size:9px; color:red; border:none; background:none">წაშლა</button>`}
                        </div>
                    </div>
                `;
            });
            chat.scrollTop = chat.scrollHeight;
        }
    }

    // 3. გაგზავნა
    document.getElementById('send-btn').onclick = async () => {
        const txt = document.getElementById('text-box').value;
        if(!txt) return;
        const { error } = await _supabase.from('messages').insert([{ text: txt, user_id: myID }]);
        if(!error) document.getElementById('text-box').value = '';
        else alert('შეცდომა! შეამოწმე RLS Policies Supabase-ში.');
    };

    // 4. გულების ანიმაცია
    function createHeart() {
        const h = document.createElement('div');
        h.innerHTML = '❤'; h.className = 'floating-heart';
        h.style.left = Math.random() * 100 + 'vw';
        document.getElementById('heart-layer').appendChild(h);
        setTimeout(() => h.remove(), 10000);
    }
    setInterval(createHeart, 1500);

    // 5. პანელების მართვა
    function toggleM(id) {
        const m = document.getElementById(id);
        const isVisible = m.style.display === 'block';
        closeAll();
        if(!isVisible) m.style.display = 'block';
    }
    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    // რეჟიმის შეცვლა
    document.getElementById('theme-btn').onclick = () => {
        document.body.classList.toggle('light-mode');
        document.body.classList.toggle('dark-mode');
    };

    // Realtime - ავტომატური განახლება
    _supabase.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
        loadMessages();
    }).subscribe();

    loadMessages();
</script>
</body>
</html>
