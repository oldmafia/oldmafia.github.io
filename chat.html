<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: Arial; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        /* ზედა ზოლი */
        .top-bar {
            background: #050505;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid red;
            z-index: 1001;
        }

        .menu-btn { font-size: 25px; color: red; cursor: pointer; margin-right: 20px; z-index: 1002; }
        .current-room-name { flex: 1; text-align: center; font-weight: bold; font-size: 18px; text-shadow: 0 0 10px red; }

        /* ჩამოსაშლელი მენიუ - ერთი გრძელი სვეტი */
        .top-menu {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 85vh; /* ეკრანის დიდ ნაწილს დაიკავებს */
            background: rgba(10, 10, 10, 0.98);
            border-bottom: 2px solid red;
            transition: 0.4s ease-in-out;
            z-index: 1000;
            overflow-y: auto; /* ჩამოსქროლვისთვის */
            padding: 80px 20px 20px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column; /* აქ არის ერთი სვეტის საიდუმლო */
            gap: 8px;
        }

        .top-menu.open { top: 0; }

        .room-link {
            padding: 15px;
            background: #111;
            border: 1px solid #222;
            border-radius: 10px;
            cursor: pointer;
            text-align: left; /* ტექსტი მარცხნივ */
            padding-left: 25px;
            color: #ccc;
            font-size: 15px;
            transition: 0.2s;
        }

        .room-link:hover { border-color: red; color: white; background: #1a0000; }

        /* ჩატის ზონა */
        #chat-display { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: #0d0d0d; border: 1px solid #222; padding: 10px 15px; border-radius: 5px 15px 15px 15px; max-width: 85%; align-self: flex-start; }
        .u-name { color: red; font-weight: bold; font-size: 11px; display: block; margin-bottom: 3px; }
        .u-text { color: #eee; font-size: 15px; }

        /* ინპუტი */
        .input-box { padding: 15px; background: #050505; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .send-btn { background: red; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="current-room-name" id="roomTitle">☕ კაფე-ბარი</div>
    </div>

    <div id="topMenu" class="top-menu">
        <div class="room-link" onclick="selectRoom('☕ კაფე-ბარი')">☕ კაფე-ბარი</div>
        <div class="room-link" onclick="selectRoom('💎 ვიპ საუბრები')">💎 ვიპ საუბრები</div>
        <div class="room-link" onclick="selectRoom('🕵️ გამოძიება')">🕵️ გამოძიება</div>
        <div class="room-link" onclick="selectRoom('🔐 შიფროგრამა')">🔐 შიფროგრამა</div>
        <div class="room-link" onclick="selectRoom('❓ ვიქტორინა')">❓ ვიქტორინა</div>
        <div class="room-link" onclick="selectRoom('😵 ჩამოხრჩობანა')">😵 ჩამოხრჩობანა</div>
        <div class="room-link" onclick="selectRoom('🕴 მაფიის ღამე')">🕴 მაფიის ღამე</div>
        <div class="room-link" onclick="selectRoom('🃏 ჯოკერი')">🃏 ჯოკერი</div>
        <div class="room-link" onclick="selectRoom('🎲 ნარდი')">🎲 ნარდი</div>
        <div class="room-link" onclick="selectRoom('🎵 მუსიკა')">🎵 მუსიკა</div>
        <div class="room-link" onclick="selectRoom('😂 იუმორი')">😂 იუმორი</div>
        <div class="room-link" onclick="selectRoom('🛠 ადმინისტრაცია')">🛠 ადმინისტრაცია</div>
        <div class="room-link" onclick="selectRoom('🆘 დახმარება')">🆘 დახმარება</div>
        <div class="room-link" onclick="selectRoom('📢 ფორუმი')">📢 ფორუმი</div>
        <div class="room-link" onclick="logout()" style="color: red; border-color: red;">🚪 გასვლა</div>
    </div>

    <div id="chat-display"></div>

    <div class="input-box">
        <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nickname') || "სტუმარი";
        let currentRoom = "☕ კაფე-ბარი";

        function toggleMenu() { document.getElementById('topMenu').classList.toggle('open'); }

        async function selectRoom(name) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = name;
            document.getElementById('topMenu').classList.remove('open');
            await loadMsgs();
        }

        async function loadMsgs() {
            const { data } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
            const chat = document.getElementById('chat-display');
            chat.innerHTML = "";
            data?.forEach(m => {
                chat.innerHTML += `<div class="msg"><span class="u-name">${m.user_nam}</span><span class="u-text">${m.text}</span></div>`;
            });
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMsg() {
            const inp = document.getElementById('msgInput');
            const txt = inp.value.trim();
            if(!txt) return;
            await _s.from('messages').insert([{ user_nam: myNick, text: txt, room_name: currentRoom }]);
            inp.value = "";
        }

        function logout() { localStorage.removeItem('nickname'); window.location.href = 'index.html'; }

        _s.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
            if(payload.new.room_name === currentRoom) {
                const chat = document.getElementById('chat-display');
                chat.innerHTML += `<div class="msg"><span class="u-name">${payload.new.user_nam}</span><span class="u-text">${payload.new.text}</span></div>`;
                chat.scrollTop = chat.scrollHeight;
            }
        }).subscribe();

        window.onload = loadMsgs;
    </script>
</body>
</html>
