<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* სტილები უცვლელია, რომ ვიზუალი არ აირიოს */
        * { box-sizing: border-box; }
        :root { --dark-red: #4a0000; --bright-red: #ff0000; --blood-red: #660000; --bg-black: #030000; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--dark-red); height: 60px; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 25px; color: var(--bright-red); }
        #room-name { font-weight: bold; color: var(--bright-red); flex: 1; text-align: center; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #1a0000 0%, #030000 100%); }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; max-width: 95%; }
        .avatar-wrapper { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--dark-red); object-fit: cover; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #0f0; border: 2px solid black; border-radius: 50%; display: none; }
        .online-dot.active { display: block; box-shadow: 0 0 8px #0f0; }
        .bubble { background: rgba(25, 0, 0, 0.9); border: 1px solid var(--blood-red); padding: 8px 12px; border-radius: 4px 18px 18px 18px; min-width: 80px; }
        .m-nick { font-weight: bold; color: #ff3333; font-size: 13px; cursor: pointer; }
        .m-text { color: #ddd; font-size: 14px; word-wrap: break-word; }
        .m-text img { width: 45px; height: 45px; vertical-align: middle; margin: 2px; }
        .input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: black; padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--dark-red); z-index: 2000; }
        .input-zone input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--blood-red); background: #080000; color: white; outline: none; }
        .send-btn { background: var(--dark-red); border: none; width: 45px; height: 45px; border-radius: 50%; color: cyan; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .sidebar, .online-sidebar { position: fixed; top: 0; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; display: flex; flex-direction: column; }
        .sidebar { left: -280px; border-right: 3px solid var(--dark-red); }
        .sidebar.active { left: 0; }
        .online-sidebar { right: -280px; border-left: 3px solid var(--dark-red); }
        .online-sidebar.active { right: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3500; }
        .overlay.active { display: block; }
        .room-item { padding: 14px 20px; cursor: pointer; color: #bbb; border-bottom: 1px solid #150000; }
        .room-item.active { background: var(--dark-red); color: white; }
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #080000; border: 2px solid var(--dark-red); padding: 25px; border-radius: 25px; width: 300px; text-align: center; }
        .modal-btn { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid var(--blood-red); background: #110000; color: white; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 20px; text-align: center;">
        <input type="file" id="avatar-input" style="display:none" onchange="uploadAvatar(this)">
        <img id="my-avatar-img" src="https://i.ibb.co/v3m6y6R/avatar.png" style="width:70px; height:70px; border-radius:50%; border:2px solid var(--dark-red); cursor:pointer;" onclick="document.getElementById('avatar-input').click()">
        <div id="my-nick-label" style="font-weight:bold; color:var(--bright-red); margin-top:5px;">...</div>
        <div id="my-role-label" style="font-size: 11px; color: #888;">...</div>
        <div onclick="changeStatus()" style="font-size: 11px; color: #0c0; cursor:pointer; margin-top:5px;">💬 სტატუსის შეცვლა</div>
    </div>
    <div style="flex:1; overflow-y:auto;">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('❓ ვიქტორინა', this)">❓ ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
    </div>
    <div style="padding:15px; text-align:center; color:red; cursor:pointer;" onclick="logout()">🚪 გასვლა</div>
</div>

<div class="online-sidebar" id="online-sidebar">
    <div style="padding:20px; color:#0f0; font-weight:bold; text-align:center;">🟢 ონლაინში</div>
    <div id="online-list-content"></div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
    <div class="menu-btn" onclick="toggleOnline()">👥</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="targetAvatar" src="" style="width:85px; height:85px; border-radius:50%; border:2px solid var(--dark-red); object-fit: cover;">
        <h3 id="targetName" style="color:var(--bright-red); margin:10px 0;">ნიკი</h3>
        <p id="targetRoleLabel" style="font-size:12px; color:#aaa;"></p>
        <div id="targetStatusDisplay" style="color:#0c0; font-size:13px; font-style:italic; margin:10px 0;"></div>
        <div id="adminOptions"></div>
        <button class="modal-btn" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), myRole = "Member", currentRoom = "☕ კაფე-ბარი";

    async function init() {
        if (!myNick) { location.href = 'index.html'; return; }
        
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = p.role || "Member";
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-role-label').innerText = translateRole(myRole);
            document.getElementById('my-avatar-img').src = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
            updateOnlineStatus();
            setInterval(updateOnlineStatus, 30000);
        }
        loadMessages();
        
        // რეალური დროის რეჟიმი
        _s.channel('room-main').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
    }

    function translateRole(r) {
        const roles = {'Owner': '👑 დამფუძნებელი', 'Admin': '🛡️ ადმინისტრატორი', 'Member': '👤 მომხმარებელი'};
        return roles[r] || '👤 მომხმარებელი';
    }

    async function updateOnlineStatus() {
        await _s.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick);
    }

    async function loadMessages() {
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true }).limit(50);
        const { data: profs } = await _s.from('profiles').select('*');
        const box = document.getElementById("chat");
        box.innerHTML = "";
        
        msgs?.forEach(m => {
            const p = profs?.find(u => u.username === m.user_name);
            const isOnline = (p?.last_online && (new Date() - new Date(p.last_online) < 300000));
            
            // წაშლის ლოგიკა შენი მოთხოვნით
            const canDelete = (myRole === 'Owner') || (myRole === 'Admin' && p?.role !== 'Owner');
            const delBtn = canDelete ? `<span onclick="deleteMsg(${m.id})" style="cursor:pointer; margin-left:10px; opacity:0.5;">🗑️</span>` : "";

            box.innerHTML += `
                <div class="msg-container">
                    <div class="avatar-wrapper" onclick="openProfile('${m.user_name}')">
                        <img src="${p?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar">
                        <div class="online-dot ${isOnline ? 'active' : ''}"></div>
                    </div>
                    <div class="bubble">
                        <div class="m-nick" onclick="openProfile('${m.user_name}')">${m.user_name} ${delBtn}</div>
                        <div class="m-text">${parseEmojis(m.text)}</div>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    // სმაილების ავტომატური გარდაქმნა (GIF-ებისთვის, რაც ბაზაში გაქვს)
    function parseEmojis(text) {
        if(!text) return "";
        // თუ ტექსტი მთავრდება .gif-ით ან .png-ით, გადააქციოს სურათად
        return text.replace(/(\S+\.(gif|png|jpg|webp))/g, (match) => {
            return `<img src="https://ftfciebnywbondaiarnc.supabase.co/storage/v1/object/public/emojis/${match}">`;
        });
    }

    async function sendMsg() {
        const input = document.getElementById("msg-input");
        const val = input.value.trim();
        if(!val) return;

        // შიფროგრამის/ვიქტორინის შემოწმება (მარტივი ვერსია)
        if(currentRoom === '🔐 შიფროგრამა') {
            const { data: game } = await _s.from('cipher_games').select('*').eq('active', true).maybeSingle();
            if(game && val.toLowerCase() === game.answer.toLowerCase()) {
                await _s.from('messages').insert([{ user_name: 'BOT', text: `🎉 ${myNick}-მა გამოიცნო შიფრი!`, room_name: currentRoom }]);
            }
        }

        await _s.from('messages').insert([{ user_name: myNick, text: val, room_name: currentRoom }]);
        input.value = "";
    }

    async function deleteMsg(id) {
        if(confirm("წავშალოთ მესიჯი?")) {
            await _s.from('messages').delete().eq('id', id);
            loadMessages();
        }
    }

    async function openProfile(name) {
        const { data: p } = await _s.from('profiles').select('*').eq('username', name).single();
        if(!p) return;

        document.getElementById('targetAvatar').src = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
        document.getElementById('targetName').innerText = p.username;
        document.getElementById('targetRoleLabel').innerText = translateRole(p.role);
        document.getElementById('targetStatusDisplay').innerText = p.status || "სტატუსი არ არის";
        
        let btns = "";
        if(myRole === 'Owner' && p.username !== myNick) {
            btns += `<button class="modal-btn" onclick="setRole('${p.username}', 'Admin')">ადმინის მიცემა</button>`;
            btns += `<button class="modal-btn" onclick="setRole('${p.username}', 'Member')">როლის ჩამორთმევა</button>`;
        }
        
        document.getElementById('adminOptions').innerHTML = btns;
        document.getElementById('userModal').style.display = "flex";
    }

    async function setRole(user, newRole) {
        await _s.from('profiles').update({ role: newRole }).eq('username', user);
        alert("როლი შეიცვალა!");
        closeModal();
    }

    async function uploadAvatar(el) {
        const file = el.files[0];
        if(!file) return;
        const fileName = `avatars/${myNick}_${Date.now()}`;
        const { data } = await _s.storage.from('avatars').upload(fileName, file);
        if(data) {
            const { data: url } = _s.storage.from('avatars').getPublicUrl(fileName);
            await _s.from('profiles').update({ avatar_url: url.publicUrl }).eq('username', myNick);
            location.reload();
        }
    }

    async function changeStatus() {
        const s = prompt("შეიყვანეთ სტატუსი:");
        if(s) await _s.from('profiles').update({ status: s }).eq('username', myNick);
    }

    async function loadOnline() {
        const { data: users } = await _s.from('profiles').select('*');
        const cont = document.getElementById('online-list-content');
        cont.innerHTML = "";
        users?.forEach(u => {
            const isOnline = (new Date() - new Date(u.last_online) < 300000);
            if(isOnline) {
                cont.innerHTML += `<div class="room-item" onclick="openProfile('${u.username}')">🟢 ${u.username}</div>`;
            }
        });
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function toggleOnline() { document.getElementById('online-sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); if(document.getElementById('online-sidebar').classList.contains('active')) loadOnline(); }
    function closeAll() { document.querySelectorAll('.sidebar, .online-sidebar, .overlay').forEach(el => el.classList.remove('active')); }
    function closeModal() { document.getElementById('userModal').style.display = "none"; }
    function changeRoom(n, el) { currentRoom = n; document.getElementById('room-name').innerText = n; document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); closeAll(); loadMessages(); }
    function logout() { localStorage.clear(); location.href='index.html'; }
</script>
</body>
</html>
