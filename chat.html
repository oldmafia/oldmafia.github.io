<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #0a0c10;
            color: #e6e9f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* თემები */
        body.light {
            background: #fef8ef;
            color: #2c2418;
        }

        body.light .nav-bar {
            background: #fff5e6;
        }

        body.light .room-card,
        body.light .user-item,
        body.light .message {
            background: #ffffff;
            border-color: #ffe0b5;
        }

        /* ნავიგაცია */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #11151c;
            padding: 12px 0;
            border-bottom: 2px solid #ff3b3b;
            flex-shrink: 0;
        }

        .nav-btn {
            font-size: 28px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 8px 16px;
            transition: 0.2s;
        }

        .nav-btn.active {
            color: #ff3b3b;
            transform: scale(1.1);
        }

        /* გვერდები */
        .pages {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
            padding: 20px;
        }

        .page.active {
            display: block;
        }

        /* ოთახები */
        .room-card {
            background: #151e2a;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 12px;
            border-left: 4px solid #ff3b3b;
            cursor: pointer;
        }

        .room-card:active {
            transform: scale(0.98);
            background: #ff3b3b;
        }

        .room-card span {
            font-size: 28px;
            margin-right: 12px;
        }

        .room-card b {
            font-size: 18px;
        }

        /* ჩატი */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            background: #151e2a;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .close-btn {
            background: none;
            border: none;
            color: #ff3b3b;
            font-size: 24px;
            cursor: pointer;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            background: #151e2a;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            word-break: break-word;
        }

        .message.own {
            align-self: flex-end;
            background: #ff3b3b;
        }

        .message-name {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .chat-input-area {
            background: #151e2a;
            padding: 12px;
            display: flex;
            gap: 10px;
            border-radius: 12px;
            margin-top: 12px;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: 1px solid #2a3440;
            background: #0a0c10;
            color: #e6e9f0;
            font-size: 14px;
        }

        .send-btn {
            background: #ff3b3b;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        /* მომხმარებლები */
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #151e2a;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #ff3b3b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        /* პროფილი */
        .profile-card {
            text-align: center;
            padding: 30px 20px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ff3b3b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto;
            cursor: pointer;
        }

        .status-input {
            width: 80%;
            margin-top: 20px;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #ff3b3b;
            background: #151e2a;
            color: #e6e9f0;
            text-align: center;
        }

        body.light .status-input {
            background: #ffffff;
            color: #2c2418;
        }

        body.light .chat-input {
            background: #ffffff;
            color: #2c2418;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
        }

        h3 {
            margin-bottom: 16px;
            color: #ff3b3b;
        }

        /* ემოჯიები */
        .emoji-board {
            position: fixed;
            bottom: 100px;
            left: 10px;
            right: 10px;
            background: #151e2a;
            border: 2px solid #ff3b3b;
            border-radius: 16px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 12px;
            z-index: 1000;
        }

        .emoji-board.active {
            display: grid;
        }

        .emoji {
            font-size: 32px;
            text-align: center;
            cursor: pointer;
            padding: 8px;
        }

        /* ანიმაცია */
        .heart {
            position: fixed;
            bottom: 0;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 4s forwards;
            z-index: 9999;
        }

        @keyframes floatUp {
            0% { bottom: 0; opacity: 1; transform: translateX(0); }
            100% { bottom: 100%; opacity: 0; transform: translateX(30px); }
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="online">👥</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeToggle">🌙</button>
    </div>

    <div class="pages">
        <!-- მთავარი გვერდი -->
        <div id="homePage" class="page active">
            <h3>🏰 12 სათამაშო ოთახი</h3>
            <div id="roomsList"></div>
        </div>

        <!-- მიმოწერა -->
        <div id="messagesPage" class="page">
            <h3>💬 მიმოწერა</h3>
            <div id="pmList" class="empty-state">მიმოწერა ცარიელია</div>
        </div>

        <!-- ონლაინი -->
        <div id="onlinePage" class="page">
            <h3>👥 ონლაინ მომხმარებლები</h3>
            <div id="onlineList"></div>
        </div>

        <!-- პროფილი -->
        <div id="profilePage" class="page">
            <div class="profile-card">
                <div class="avatar" onclick="alert('ავატარის შეცვლა მალე')">👤</div>
                <h2 id="userName" style="margin-top: 16px;">Abu007</h2>
                <input type="text" id="userStatus" class="status-input" placeholder="შენი სტატუსი...">
                <p style="margin-top: 16px; opacity: 0.5;">ID: #<span id="userId">007</span></p>
            </div>
        </div>

        <!-- ჩატი -->
        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-header">
                    <b id="chatRoomName">ოთახი</b>
                    <button class="close-btn" onclick="closeChat()">✕</button>
                </div>
                <div id="chatMessages" class="messages">
                    <div class="empty-state">შეტყობინებები არ არის</div>
                </div>
                <div class="chat-input-area">
                    <button onclick="toggleEmoji()" style="font-size: 28px; background: none; border: none; color: #e6e9f0; cursor: pointer;">😊</button>
                    <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე შეტყობინება...">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
            <div id="emojiBoard" class="emoji-board"></div>
        </div>
    </div>

    <div id="hearts"></div>

    <script>
        // მომხმარებელი
        let currentUser = localStorage.getItem('mafia_user') || "Abu007";
        let currentRoom = null;
        
        // ოთახები
        const ROOMS = [
            { icon: "☕", name: "კაფე-ბარი" },
            { icon: "🎲", name: "ნარდი" },
            { icon: "🃏", name: "ჯოკერი" },
            { icon: "💎", name: "VIP საუბრები" },
            { icon: "📝", name: "ფორუმი" },
            { icon: "🛠️", name: "ადმინისტრაცია" },
            { icon: "😂", name: "იუმორი" },
            { icon: "🏆", name: "შიფროგრამა" },
            { icon: "🎭", name: "გამოძიება" },
            { icon: "🎵", name: "მუსიკალური" },
            { icon: "⁉️", name: "ვიქტორინა" },
            { icon: "🆘", name: "დახმარება" }
        ];

        // დემო შეტყობინებები
        let demoMessages = [
            { username: "Admin", text: "მოგესალმებით!", time: new Date() },
            { username: "Abu007", text: "გამარჯობა ყველას!", time: new Date() }
        ];

        // დემო მომხმარებლები
        let demoUsers = [
            { username: "Abu007", status: "ადმინი" },
            { username: "Lukinio", status: "ონლაინ" },
            { username: "MafiaKing", status: "ონლაინ" },
            { username: "Giorgi", status: "წავიდა" }
        ];

        // გვერდის ჩვენება
        function showPage(pageName) {
            console.log("📱 გადასვლა გვერდზე:", pageName);
            
            // ყველა გვერდის დამალვა
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            
            // არჩეული გვერდის ჩვენება
            const targetPage = document.getElementById(pageName + 'Page');
            if (targetPage) {
                targetPage.classList.add('active');
            } else if (pageName === 'chat') {
                document.getElementById('chatPage').classList.add('active');
            }
            
            // ნავიგაციის განახლება
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-page') === pageName) {
                    btn.classList.add('active');
                }
            });
        }

        // ოთახის გახსნა
        function openRoom(roomName) {
            console.log("🚪 გაიხსნა ოთახი:", roomName);
            currentRoom = roomName;
            document.getElementById('chatRoomName').innerHTML = `📡 ${roomName}`;
            showPage('chat');
            loadChatMessages();
        }

        // ჩატის დახურვა
        function closeChat() {
            currentRoom = null;
            showPage('home');
        }

        // შეტყობინებების ჩატვირთვა
        function loadChatMessages() {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            
            // დემო შეტყობინებები
            const messages = demoMessages;
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state">შეტყობინებები არ არის</div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.username === currentUser ? 'own' : ''}">
                    <div class="message-name">${escapeHtml(msg.username)}</div>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        // შეტყობინების გაგზავნა
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            // ახალი შეტყობინების დამატება
            demoMessages.push({
                username: currentUser,
                text: text,
                time: new Date()
            });
            
            input.value = '';
            loadChatMessages();
        }

        // ოთახების ჩვენება
        function renderRooms() {
            const container = document.getElementById('roomsList');
            if (!container) return;
            
            container.innerHTML = ROOMS.map(room => `
                <div class="room-card" onclick="openRoom('${room.name}')">
                    <span>${room.icon}</span>
                    <b>${room.name}</b>
                </div>
            `).join('');
        }

        // ონლაინ მომხმარებლების ჩვენება
        function renderOnlineUsers() {
            const container = document.getElementById('onlineList');
            if (!container) return;
            
            container.innerHTML = demoUsers.map(user => `
                <div class="user-item" onclick="alert('💬 ${user.username}')">
                    <div class="user-avatar">👤</div>
                    <div>
                        <b>${escapeHtml(user.username)}</b><br>
                        <span style="font-size: 12px; opacity: 0.6;">${escapeHtml(user.status)}</span>
                    </div>
                </div>
            `).join('');
        }

        // ემოჯიების ჩატვირთვა
        function renderEmojis() {
            const board = document.getElementById('emojiBoard');
            if (!board) return;
            
            const emojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺', '😭', '💀', '👑', '💪', '🤡'];
            board.innerHTML = emojis.map(emoji => `
                <div class="emoji" onclick="addEmoji('${emoji}')">${emoji}</div>
            `).join('');
        }

        function addEmoji(emoji) {
            const input = document.getElementById('messageInput');
            if (input) {
                input.value += emoji;
                input.focus();
            }
            toggleEmoji();
        }

        function toggleEmoji() {
            const board = document.getElementById('emojiBoard');
            board.classList.toggle('active');
        }

        // გულების ანიმაცია
        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️', '💖', '💗', '💕', '💘'][Math.floor(Math.random() * 5)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (16 + Math.random() * 24) + 'px';
                document.getElementById('hearts').appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 2500);
        }

        // თემის შეცვლა
        function toggleTheme() {
            document.body.classList.toggle('light');
            const btn = document.getElementById('themeToggle');
            if (document.body.classList.contains('light')) {
                btn.innerHTML = '☀️';
            } else {
                btn.innerHTML = '🌙';
            }
        }

        // სტატუსის შენახვა
        function saveStatus() {
            const status = document.getElementById('userStatus').value;
            localStorage.setItem('mafia_status', status);
        }

        // HTML ესკეიპი
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Enter ღილაკი
        document.addEventListener('DOMContentLoaded', () => {
            const msgInput = document.getElementById('messageInput');
            if (msgInput) {
                msgInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') sendMessage();
                });
            }
        });

        // ინიციალიზაცია
        function init() {
            console.log("🚀 აპლიკაცია ჩაიტვირთა!");
            
            // მომხმარებლის სახელი
            document.getElementById('userName').innerHTML = currentUser;
            
            // შენახული სტატუსი
            const savedStatus = localStorage.getItem('mafia_status');
            if (savedStatus) {
                document.getElementById('userStatus').value = savedStatus;
            }
            
            // კომპონენტების რენდერი
            renderRooms();
            renderOnlineUsers();
            renderEmojis();
            startHearts();
            
            // ნავიგაციის ღილაკები
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = btn.getAttribute('data-page');
                    showPage(page);
                });
            });
            
            // თემის ღილაკი
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            
            // სტატუსის შენახვა
            document.getElementById('userStatus').addEventListener('change', saveStatus);
            
            console.log("✅ მზადაა!");
        }
        
        // გაშვება
        init();
    </script>
</body>
</html>
