<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat App - შინდისფერი ჩატი</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ანიმაციური გულები */
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            color: #8b0000;
            font-size: 30px;
            animation: floatHeart 15s linear infinite;
            opacity: 0.4;
            pointer-events: none;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.4;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* დღის რეჟიმი */
        body.day-mode {
            background: linear-gradient(135deg, #f5e6d3 0%, #fff5e8 100%);
        }

        body.day-mode .chat-container,
        body.day-mode .rooms-sidebar,
        body.day-mode .users-sidebar,
        body.day-mode .profile-modal,
        body.day-mode .private-chat-modal {
            background: rgba(255, 245, 235, 0.95);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.2);
        }

        body.day-mode .message {
            background: #fff;
            border-left: 3px solid #8b0000;
        }

        /* ღამის რეჟიმი */
        body.night-mode {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1f1f 100%);
        }

        body.night-mode .chat-container,
        body.night-mode .rooms-sidebar,
        body.night-mode .users-sidebar,
        body.night-mode .profile-modal,
        body.night-mode .private-chat-modal {
            background: rgba(30, 20, 20, 0.95);
            color: #e0e0e0;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.4);
        }

        body.night-mode .message {
            background: #2a1f1f;
            border-left: 3px solid #8b0000;
            color: #e0e0e0;
        }

        body.night-mode .room-btn,
        body.night-mode .user-item {
            background: #3a2a2a;
            color: #e0e0e0;
        }

        /* ძირითადი ლეიოუთი */
        .app-wrapper {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .rooms-sidebar {
            width: 200px;
            padding: 20px 10px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            border-right: 1px solid #8b0000;
        }

        .rooms-sidebar h3 {
            text-align: center;
            color: #8b0000;
            margin-bottom: 15px;
        }

        .room-btn {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            background: rgba(139, 0, 0, 0.2);
        }

        .room-btn.active {
            background: #8b0000;
            color: white;
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .chat-header {
            padding: 15px;
            background: rgba(139, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #8b0000;
        }

        .chat-header h2 {
            color: #8b0000;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .theme-toggle, .profile-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .theme-toggle:hover, .profile-btn:hover {
            background: rgba(139, 0, 0, 0.3);
            transform: scale(1.1);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 10px;
            border-radius: 10px;
            position: relative;
            animation: fadeIn 0.3s;
        }

        .message.left {
            align-self: flex-start;
        }

        .message.right {
            align-self: flex-end;
            background: #8b0000;
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
        }

        .message-actions {
            position: absolute;
            top: 5px;
            right: 5px;
            display: none;
            gap: 5px;
        }

        .message:hover .message-actions {
            display: flex;
        }

        .delete-msg {
            background: none;
            border: none;
            cursor: pointer;
            color: red;
            font-size: 12px;
        }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #8b0000;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #8b0000;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }

        .emoji-btn, .send-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: #8b0000;
            color: white;
            font-size: 20px;
        }

        .users-sidebar {
            width: 250px;
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #8b0000;
        }

        .users-sidebar h3 {
            color: #8b0000;
            margin-bottom: 15px;
        }

        .search-users {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #8b0000;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
        }

        .user-group {
            margin-bottom: 20px;
        }

        .user-group h4 {
            color: #8b0000;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-item:hover {
            background: rgba(139, 0, 0, 0.3);
            transform: translateX(5px);
        }

        .online-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
            margin-left: 5px;
        }

        .offline-indicator {
            background: #9e9e9e;
        }

        .pm-indicator {
            background: #ff9800;
            font-size: 10px;
            margin-left: 5px;
        }

        /* მოდალები */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .profile-modal, .private-chat-modal {
            width: 400px;
            max-width: 90%;
            padding: 20px;
            border-radius: 20px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #8b0000;
        }

        .profile-pic {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-pic img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #8b0000;
        }

        .status-input, .emoji-select {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #8b0000;
            border-radius: 10px;
        }

        .role-buttons button {
            padding: 5px 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #8b0000;
            color: white;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .emoji-item {
            font-size: 24px;
            cursor: pointer;
            text-align: center;
            padding: 5px;
        }

        .add-emoji {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .private-messages {
            height: 300px;
            overflow-y: auto;
            margin: 15px 0;
            padding: 10px;
            border: 1px solid #8b0000;
            border-radius: 10px;
        }

        .friend-request {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 5px;
            background: rgba(139, 0, 0, 0.2);
            border-radius: 5px;
        }

        @media (max-width: 768px) {
            .rooms-sidebar, .users-sidebar {
                width: 80px;
            }
            .rooms-sidebar span, .users-sidebar h3 {
                display: none;
            }
        }
    </style>
</head>
<body class="day-mode">
    <div class="heart-bg" id="heartBg"></div>
    
    <div class="app-wrapper">
        <div class="rooms-sidebar">
            <h3>ოთახები</h3>
            <div id="roomsList"></div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <h2 id="currentRoom">ოთახი 1</h2>
                <div class="header-actions">
                    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                    <button class="profile-btn" onclick="openProfile()">👤</button>
                </div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <button class="emoji-btn" onclick="toggleEmojiPicker()">😊</button>
                <input type="text" id="messageInput" placeholder="დაწერეთ მესიჯი..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
            <div id="emojiPicker" style="display: none; padding: 10px; border-top: 1px solid #8b0000;">
                <div class="emoji-grid" id="emojiGrid"></div>
                <div class="add-emoji" id="adminEmojiControls" style="display: none;">
                    <input type="text" id="newEmoji" placeholder="ახალი ემოჯი">
                    <button onclick="addEmoji()">➕</button>
                </div>
            </div>
        </div>

        <div class="users-sidebar">
            <h3>მომხმარებლები</h3>
            <input type="text" class="search-users" placeholder="ძებნა..." id="searchUsers" oninput="filterUsers()">
            <div id="usersList"></div>
        </div>
    </div>

    <!-- პროფილის მოდალი -->
    <div id="profileModal" class="modal">
        <div class="profile-modal">
            <span class="close-modal" onclick="closeProfile()">&times;</span>
            <div class="profile-pic">
                <img id="profileAvatar" src="https://via.placeholder.com/100" alt="avatar">
                <input type="file" id="avatarUpload" accept="image/*" style="display: none;" onchange="uploadAvatar(this)">
                <button onclick="document.getElementById('avatarUpload').click()">ფოტოს ატვირთვა</button>
            </div>
            <input type="text" id="profileStatus" class="status-input" placeholder="სტატუსი">
            <select id="profileEmotion" class="emoji-select">
                <option value="😊">😊 ბედნიერი</option>
                <option value="😢">😢 მოწყენილი</option>
                <option value="❤️">❤️ შეყვარებული</option>
                <option value="🎉">🎉 მხიარული</option>
            </select>
            <textarea id="profileComment" placeholder="კომენტარი პროფილზე"></textarea>
            <button onclick="saveProfile()">შენახვა</button>
            <div id="profileComments"></div>
        </div>
    </div>

    <!-- პირადი ჩატის მოდალი -->
    <div id="privateChatModal" class="modal">
        <div class="private-chat-modal">
            <span class="close-modal" onclick="closePrivateChat()">&times;</span>
            <h3 id="privateChatUser">პირადი საუბარი</h3>
            <div class="private-messages" id="privateMessages"></div>
            <div class="input-area" style="padding: 10px;">
                <input type="text" id="privateMessageInput" placeholder="დაწერეთ პირადი მესიჯი...">
                <button onclick="sendPrivateMessage()">გაგზავნა</button>
            </div>
        </div>
    </div>

    <script>
        // მონაცემები
        let currentUser = {
            id: 'user1',
            name: 'მე',
            role: 'founder',
            avatar: 'https://via.placeholder.com/30',
            status: 'აქტიური',
            emotion: '😊',
            online: true
        };
        
        let users = [
            { id: 'user1', name: 'მე', role: 'founder', avatar: 'https://via.placeholder.com/30', status: 'აქტიური', emotion: '😊', online: true },
            { id: 'user2', name: 'ანა', role: 'admin', avatar: 'https://via.placeholder.com/30', status: 'მშვიდად', emotion: '❤️', online: true },
            { id: 'user3', name: 'ნიკა', role: 'member', avatar: 'https://via.placeholder.com/30', status: 'დაკავებული', emotion: '🎉', online: false },
            { id: 'user4', name: 'თამარ', role: 'member', avatar: 'https://via.placeholder.com/30', status: 'აქ', emotion: '😊', online: true },
            { id: 'user5', name: 'გიორგი', role: 'member', avatar: 'https://via.placeholder.com/30', status: 'გასულია', emotion: '😢', online: false }
        ];
        
        let rooms = [];
        for (let i = 1; i <= 12; i++) {
            rooms.push({ id: i, name: `ოთახი ${i}`, messages: [] });
        }
        
        let currentRoom = rooms[0];
        let customEmojis = ['😊', '❤️', '🎉', '😢', '🔥', '👍', '👎', '😂', '😍', '😎'];
        let friends = [];
        let friendRequests = [];
        let privateChats = {};
        let blockedUsers = [];
        let currentPrivateChatUser = null;
        
        // გულების ანიმაცია
        function createHearts() {
            const heartBg = document.getElementById('heartBg');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 40 + 20) + 'px';
                heart.style.animationDuration = (Math.random() * 10 + 8) + 's';
                heart.style.animationDelay = Math.random() * 5 + 's';
                heartBg.appendChild(heart);
                setTimeout(() => heart.remove(), 15000);
            }, 2000);
        }
        
        // ოთახების ჩვენება
        function renderRooms() {
            const container = document.getElementById('roomsList');
            container.innerHTML = rooms.map(room => `
                <button class="room-btn ${currentRoom.id === room.id ? 'active' : ''}" onclick="switchRoom(${room.id})">
                    ${room.name}
                </button>
            `).join('');
        }
        
        function switchRoom(roomId) {
            currentRoom = rooms.find(r => r.id === roomId);
            document.getElementById('currentRoom').innerText = currentRoom.name;
            renderRooms();
            renderMessages();
        }
        
        // მესიჯების ჩვენება
        function renderMessages() {
            const area = document.getElementById('messagesArea');
            area.innerHTML = currentRoom.messages.map(msg => `
                <div class="message left">
                    <div class="message-header">
                        <img src="${getUserAvatar(msg.userId)}" class="avatar">
                        <strong>${getUserName(msg.userId)} ${getUserEmotion(msg.userId)}</strong>
                        <span class="message-time">${msg.time}</span>
                    </div>
                    <div class="message-text">${msg.text}</div>
                    ${(currentUser.role === 'admin' || currentUser.role === 'founder') ? `
                        <div class="message-actions">
                            <button class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</button>
                        </div>
                    ` : ''}
                </div>
            `).reverse().join('');
            area.scrollTop = area.scrollHeight;
        }
        
        function getUserName(userId) {
            const user = users.find(u => u.id === userId);
            return user ? user.name : 'უცნობი';
        }
        
        function getUserAvatar(userId) {
            const user = users.find(u => u.id === userId);
            return user ? user.avatar : 'https://via.placeholder.com/30';
        }
        
        function getUserEmotion(userId) {
            const user = users.find(u => u.id === userId);
            return user ? user.emotion : '';
        }
        
        let messageId = 1;
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const msg = {
                id: messageId++,
                userId: currentUser.id,
                text: text,
                time: new Date().toLocaleTimeString()
            };
            currentRoom.messages.unshift(msg);
            renderMessages();
            input.value = '';
        }
        
        function deleteMessage(msgId) {
            if (currentUser.role !== 'admin' && currentUser.role !== 'founder') return;
            currentRoom.messages = currentRoom.messages.filter(m => m.id !== msgId);
            renderMessages();
        }
        
        // ემოჯიები
        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
            if (picker.style.display === 'block') {
                renderEmojis();
                if (currentUser.role === 'admin' || currentUser.role === 'founder') {
                    document.getElementById('adminEmojiControls').style.display = 'flex';
                }
            }
        }
        
        function renderEmojis() {
            const grid = document.getElementById('emojiGrid');
            grid.innerHTML = customEmojis.map(emoji => `
                <div class="emoji-item" onclick="addEmojiToMessage('${emoji}')">${emoji}</div>
            `).join('');
        }
        
        function addEmojiToMessage(emoji) {
            const input = document.getElementById('messageInput');
            input.value += emoji;
            toggleEmojiPicker();
        }
        
        function addEmoji() {
            if (currentUser.role !== 'admin' && currentUser.role !== 'founder') return;
            const newEmoji = document.getElementById('newEmoji').value;
            if (newEmoji && !customEmojis.includes(newEmoji)) {
                customEmojis.push(newEmoji);
                renderEmojis();
                document.getElementById('newEmoji').value = '';
            }
        }
        
        // მომხმარებლების სია
        function renderUsers() {
            const searchTerm = document.getElementById('searchUsers').value.toLowerCase();
            const founders = users.filter(u => u.role === 'founder' && u.name.toLowerCase().includes(searchTerm));
            const admins = users.filter(u => u.role === 'admin' && u.name.toLowerCase().includes(searchTerm));
            const members = users.filter(u => u.role === 'member' && u.name.toLowerCase().includes(searchTerm));
            
            const container = document.getElementById('usersList');
            container.innerHTML = `
                <div class="user-group">
                    <h4>👑 დამფუძნებლები</h4>
                    ${founders.map(user => renderUserItem(user)).join('')}
                </div>
                <div class="user-group">
                    <h4>⚙️ ადმინები</h4>
                    ${admins.map(user => renderUserItem(user)).join('')}
                </div>
                <div class="user-group">
                    <h4>👥 წევრები</h4>
                    ${members.map(user => renderUserItem(user)).join('')}
                </div>
            `;
        }
        
        function renderUserItem(user) {
            return `
                <div class="user-item" onclick="openPrivateChat('${user.id}')">
                    <img src="${user.avatar}" class="avatar">
                    <div>
                        <strong>${user.name}</strong> ${user.emotion}
                        <div style="font-size: 12px;">${user.status}</div>
                    </div>
                    <span class="online-indicator ${user.online ? '' : 'offline-indicator'}"></span>
                    ${currentUser.role === 'founder' ? `
                        <div style="margin-left: auto;">
                            <button onclick="event.stopPropagation(); assignRole('${user.id}', 'admin')">👑</button>
                            <button onclick="event.stopPropagation(); blockUser('${user.id}')">🚫</button>
                        </div>
                    ` : currentUser.role === 'admin' ? `
                        <button onclick="event.stopPropagation(); blockUser('${user.id}')" style="margin-left: auto;">🚫</button>
                    ` : ''}
                </div>
            `;
        }
        
        function filterUsers() {
            renderUsers();
        }
        
        function assignRole(userId, role) {
            if (currentUser.role !== 'founder') return;
            const user = users.find(u => u.id === userId);
            if (user) user.role = role;
            renderUsers();
        }
        
        function blockUser(userId) {
            const reason = prompt('დაბლოკვის მიზეზი:');
            if (reason) {
                blockedUsers.push({ userId, reason, blockedBy: currentUser.id });
                alert(`მომხმარებელი დაბლოკილია. მიზეზი: ${reason}`);
            }
        }
        
        // პროფილი
        function openProfile() {
            document.getElementById('profileModal').style.display = 'flex';
            document.getElementById('profileAvatar').src = currentUser.avatar;
            document.getElementById('profileStatus').value = currentUser.status;
            document.getElementById('profileEmotion').value = currentUser.emotion;
        }
        
        function closeProfile() {
            document.getElementById('profileModal').style.display = 'none';
        }
        
        function uploadAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentUser.avatar = e.target.result;
                    document.getElementById('profileAvatar').src = currentUser.avatar;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        function saveProfile() {
            currentUser.status = document.getElementById('profileStatus').value;
            currentUser.emotion = document.getElementById('profileEmotion').value;
            const comment = document.getElementById('profileComment').value;
            if (comment) {
                // შენახვა კომენტარების სიაში
            }
            closeProfile();
            renderUsers();
        }
        
        // პირადი ჩატი
        function openPrivateChat(userId) {
            currentPrivateChatUser = userId;
            const user = users.find(u => u.id === userId);
            document.getElementById('privateChatUser').innerText = `პირადი საუბარი - ${user.name}`;
            if (!privateChats[userId]) {
                privateChats[userId] = [];
            }
            renderPrivateMessages();
            document.getElementById('privateChatModal').style.display = 'flex';
        }
        
        function closePrivateChat() {
            document.getElementById('privateChatModal').style.display = 'none';
            currentPrivateChatUser = null;
        }
        
        function renderPrivateMessages() {
            const container = document.getElementById('privateMessages');
            const messages = privateChats[currentPrivateChatUser] || [];
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.from === currentUser.id ? 'right' : 'left'}" style="max-width: 100%;">
                    <div class="message-header">
                        <strong>${msg.from === currentUser.id ? 'მე' : getUserName(msg.from)}</strong>
                        <span class="message-time">${msg.time}</span>
                    </div>
                    <div>${msg.text}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function sendPrivateMessage() {
            const input = document.getElementById('privateMessageInput');
            const text = input.value.trim();
            if (!text || !currentPrivateChatUser) return;
            
            const msg = {
                from: currentUser.id,
                to: currentPrivateChatUser,
                text: text,
                time: new Date().toLocaleTimeString()
            };
            privateChats[currentPrivateChatUser].push(msg);
            renderPrivateMessages();
            input.value = '';
            
            // ინდიკატორი
            if (!document.getElementById('privateChatModal').style.display === 'flex') {
                // აქ შეიძლება დაემატოს შეტყობინება
            }
        }
        
        // მეგობრები
        function addFriend(userId) {
            friendRequests.push({ from: currentUser.id, to: userId });
            alert('მოთხოვნა გაგზავნილია');
        }
        
        function acceptFriend(requestId) {
            const request = friendRequests.find(r => r.from === requestId);
            if (request) {
                friends.push(request.from);
                friendRequests = friendRequests.filter(r => r.from !== requestId);
                alert('მეგობარი დაემატა');
            }
        }
        
        // თემა
        function toggleTheme() {
            const body = document.body;
            if (body.classList.contains('day-mode')) {
                body.classList.remove('day-mode');
                body.classList.add('night-mode');
                document.querySelector('.theme-toggle').innerHTML = '☀️';
            } else {
                body.classList.remove('night-mode');
                body.classList.add('day-mode');
                document.querySelector('.theme-toggle').innerHTML = '🌙';
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
        
        // ინიციალიზაცია
        function init() {
            createHearts();
            renderRooms();
            renderMessages();
            renderUsers();
        }
        
        init();
    </script>
</body>
</html>
