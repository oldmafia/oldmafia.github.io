<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat App - შინდისფერი სიყვარული</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ფონური გულების ანიმაცია */
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: floatHeart 8s ease-in-out forwards;
            opacity: 0.5;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.5;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ღამის რეჟიმი */
        body.night-mode {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0f15 100%);
        }

        body.night-mode .app-wrapper {
            background: rgba(0, 0, 0, 0.85);
        }

        body.night-mode .top-bar {
            background: linear-gradient(135deg, #1a1a2e 0%, #2d1a2a 100%);
            border-bottom: 2px solid #800020;
            box-shadow: 0 4px 20px rgba(128, 0, 32, 0.3);
        }

        body.night-mode .sidebar {
            background: rgba(30, 20, 25, 0.95);
            border-right: 1px solid #800020;
        }

        body.night-mode .chat-main {
            background: rgba(0, 0, 0, 0.7);
        }

        body.night-mode .message {
            background: rgba(50, 30, 40, 0.9);
            color: #f0f0f0;
        }

        body.night-mode .message.my-message {
            background: linear-gradient(135deg, #800020, #5a0018);
        }

        body.night-mode .input-area {
            background: rgba(30, 20, 25, 0.95);
            border-top: 1px solid #800020;
        }

        /* დღის რეჟიმი */
        body.day-mode {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe6d5 100%);
        }

        body.day-mode .app-wrapper {
            background: rgba(255, 245, 235, 0.95);
        }

        body.day-mode .top-bar {
            background: linear-gradient(135deg, #fff0e0 0%, #ffe0d0 100%);
            border-bottom: 2px solid #b85c1a;
            box-shadow: 0 4px 20px rgba(184, 92, 26, 0.2);
            color: #4a2a2a;
        }

        body.day-mode .sidebar {
            background: rgba(255, 240, 230, 0.95);
            border-right: 1px solid #d4a5a5;
        }

        body.day-mode .chat-main {
            background: rgba(255, 245, 235, 0.9);
        }

        body.day-mode .message {
            background: #fff5e6;
            color: #4a2a2a;
            border: 1px solid #d4a5a5;
        }

        body.day-mode .message.my-message {
            background: linear-gradient(135deg, #ffe0d0, #ffd0c0);
        }

        body.day-mode .input-area {
            background: rgba(255, 245, 235, 0.95);
            border-top: 1px solid #d4a5a5;
        }

        /* მთავარი კონტეინერი */
        .app-wrapper {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ზედა ბარი */
        .top-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 10;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: #b85c1a;
        }

        .top-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .top-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        body.night-mode .top-btn {
            background: rgba(128, 0, 32, 0.5);
            color: white;
        }

        body.day-mode .top-btn {
            background: rgba(184, 92, 26, 0.2);
            color: #4a2a2a;
        }

        .top-btn:hover {
            transform: translateY(-2px);
        }

        body.night-mode .top-btn:hover {
            background: #800020;
        }

        body.day-mode .top-btn:hover {
            background: #b85c1a;
            color: white;
        }

        .theme-btn {
            background: #800020;
            color: white;
        }

        /* მთავარი შიგთავსი */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* გვერდითი პანელი */
        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: all 0.3s;
        }

        .sidebar-section {
            padding: 15px;
            border-bottom: 1px solid;
        }

        body.night-mode .sidebar-section {
            border-bottom-color: #800020;
        }

        body.day-mode .sidebar-section {
            border-bottom-color: #d4a5a5;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ოთახები */
        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .room-item {
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        body.night-mode .room-item {
            background: rgba(128, 0, 32, 0.3);
        }

        body.day-mode .room-item {
            background: rgba(184, 92, 26, 0.1);
        }

        .room-item:hover {
            transform: translateX(5px);
        }

        body.night-mode .room-item:hover {
            background: rgba(128, 0, 32, 0.6);
        }

        body.day-mode .room-item:hover {
            background: rgba(184, 92, 26, 0.3);
        }

        .room-item.active {
            border-left: 4px solid #b85c1a;
            font-weight: bold;
        }

        /* მომხმარებლები */
        .users-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .user-item:hover {
            background: rgba(128, 0, 32, 0.3);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            background: #b85c1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: bold;
            font-size: 14px;
        }

        .user-status {
            font-size: 10px;
            opacity: 0.7;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .online {
            background: #00ff00;
            box-shadow: 0 0 5px #00ff00;
        }

        .offline {
            background: #666;
        }

        .user-role {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-top: 2px;
            display: inline-block;
        }

        .role-founder { background: gold; color: #000; }
        .role-admin { background: #ff3366; color: white; }
        .role-member { background: #666; color: white; }

        /* ჩატის არე */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid;
        }

        body.night-mode .chat-header {
            border-bottom-color: #800020;
        }

        body.day-mode .chat-header {
            border-bottom-color: #d4a5a5;
        }

        .current-room-name {
            font-size: 18px;
            font-weight: bold;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #b85c1a;
        }

        /* შეტყობინებების არე */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
            word-wrap: break-word;
        }

        .message.left {
            align-self: flex-start;
        }

        .message.right {
            align-self: flex-end;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .message-avatar {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            object-fit: cover;
        }

        .message-name {
            font-weight: bold;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
        }

        .message-text {
            margin-top: 5px;
            word-break: break-word;
        }

        .message-actions {
            position: absolute;
            right: 5px;
            top: 5px;
            display: none;
            gap: 5px;
        }

        .message:hover .message-actions {
            display: flex;
        }

        .delete-msg {
            cursor: pointer;
            font-size: 12px;
            padding: 2px 5px;
            background: red;
            color: white;
            border-radius: 3px;
        }

        /* შეტყობინების ველი */
        .input-area {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 25px;
            border: none;
            outline: none;
        }

        body.night-mode .input-area input {
            background: #2a2a2a;
            color: white;
        }

        body.day-mode .input-area input {
            background: white;
            color: #4a2a2a;
            border: 1px solid #d4a5a5;
        }

        .emoji-btn, .send-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        .emoji-btn {
            background: #b85c1a;
            color: white;
        }

        .send-btn {
            background: #800020;
            color: white;
        }

        /* ემოჯი პანელი */
        .emoji-panel {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 320px;
            border-radius: 15px;
            padding: 15px;
            display: none;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        body.night-mode .emoji-panel {
            background: #2a2a2a;
            border: 1px solid #800020;
        }

        body.day-mode .emoji-panel {
            background: white;
            border: 1px solid #d4a5a5;
        }

        .emoji-panel.show {
            display: block;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .emoji-item {
            font-size: 28px;
            cursor: pointer;
            text-align: center;
            padding: 5px;
            transition: transform 0.2s;
        }

        .emoji-item:hover {
            transform: scale(1.2);
        }

        .emoji-admin-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .emoji-admin-btns button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* მოდალები */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            width: 400px;
            max-width: 90%;
            padding: 25px;
            border-radius: 20px;
        }

        body.night-mode .modal-content {
            background: #2a2a2a;
            border: 1px solid #800020;
        }

        body.day-mode .modal-content {
            background: white;
            border: 1px solid #d4a5a5;
        }

        .modal-content h3 {
            margin-bottom: 15px;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid;
        }

        body.night-mode .modal-content input,
        body.night-mode .modal-content textarea {
            background: #1a1a1a;
            color: white;
            border-color: #800020;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-primary {
            background: #800020;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        /* პატარა მესინჯერი */
        .mini-messenger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 450px;
            border-radius: 15px;
            display: none;
            flex-direction: column;
            z-index: 200;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
        }

        body.night-mode .mini-messenger {
            background: #2a2a2a;
            border: 1px solid #800020;
        }

        body.day-mode .mini-messenger {
            background: white;
            border: 1px solid #d4a5a5;
        }

        .mini-messenger.show {
            display: flex;
        }

        .mini-header {
            padding: 12px;
            background: #800020;
            color: white;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mini-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .mini-msg {
            margin: 5px 0;
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 85%;
        }

        .mini-msg.left {
            background: #b85c1a;
            color: white;
            align-self: flex-start;
        }

        .mini-msg.right {
            background: #800020;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }

        .mini-input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
            border-top: 1px solid;
        }

        body.night-mode .mini-input-area {
            border-top-color: #800020;
        }

        .mini-input-area input {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid;
        }

        .notification-badge {
            background: red;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            position: absolute;
            right: 5px;
            top: -5px;
        }

        /* სკროლბარი */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(128, 0, 32, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: #800020;
            border-radius: 3px;
        }
    </style>
</head>
<body class="night-mode">
    <div class="heart-bg" id="heartBg"></div>
    
    <div class="app-wrapper">
        <!-- ზედა ბარი -->
        <div class="top-bar">
            <div class="logo">
                💕 <span>ChatApp</span> 💕
            </div>
            <div class="top-buttons">
                <button class="top-btn" id="profileTopBtn">👤 პროფილი</button>
                <button class="top-btn" id="friendsTopBtn">👥 მეგობრები</button>
                <button class="top-btn" id="usersTopBtn">📋 მომხმარებლები</button>
                <button class="top-btn theme-btn" id="themeBtn">🌙 ღამის რეჟიმი</button>
            </div>
        </div>

        <!-- მთავარი შიგთავსი -->
        <div class="main-content">
            <!-- გვერდითი პანელი -->
            <div class="sidebar" id="sidebar">
                <!-- ოთახები -->
                <div class="sidebar-section">
                    <div class="section-title">📌 ოთახები</div>
                    <div class="rooms-list" id="roomsList"></div>
                </div>

                <!-- მომხმარებლები ონლაინ -->
                <div class="sidebar-section">
                    <div class="section-title">🟢 ონლაინ მომხმარებლები</div>
                    <div class="users-list" id="onlineUsersList"></div>
                </div>

                <!-- ყველა მომხმარებელი -->
                <div class="sidebar-section" id="allUsersSection">
                    <div class="section-title">👥 ყველა მომხმარებელი</div>
                    <input type="text" id="searchUsers" placeholder="🔍 ძებნა..." style="width:100%; padding:8px; margin-bottom:10px; border-radius:20px;">
                    <div class="users-list" id="allUsersList"></div>
                </div>
            </div>

            <!-- ჩატის არე -->
            <div class="chat-main">
                <div class="chat-header">
                    <div class="current-room-name" id="currentRoomName">ოთახი 1</div>
                    <div class="profile-info" id="profileInfoBtn">
                        <img class="profile-avatar" id="headerAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23b85c1a'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='white' font-size='40'%3E👤%3C/text%3E%3C/svg%3E">
                        <div>
                            <div id="headerUserName">მომხმარებელი</div>
                            <div id="headerUserStatus" style="font-size: 11px; opacity: 0.7;">😊 აქტიური</div>
                        </div>
                    </div>
                </div>

                <div class="messages-area" id="messagesArea"></div>

                <div class="input-area">
                    <button class="emoji-btn" id="emojiBtn">😊</button>
                    <input type="text" id="messageInput" placeholder="დაწერე შეტყობინება...">
                    <button class="send-btn" id="sendBtn">📤 გაგზავნა</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ემოჯი პანელი -->
    <div class="emoji-panel" id="emojiPanel">
        <div class="emoji-grid" id="emojiGrid"></div>
        <div class="emoji-admin-btns" id="emojiAdminBtns" style="display: none;">
            <button id="addEmojiBtn">➕ დაამატე</button>
            <button id="removeEmojiBtn" class="btn-danger">❌ წაშალე</button>
        </div>
    </div>

    <!-- პროფილის მოდალი -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h3>👤 ჩემი პროფილი</h3>
            <img id="profileModalAvatar" style="width:100px; height:100px; border-radius:50%; margin:0 auto 15px; display:block; object-fit:cover;">
            <input type="file" id="photoUpload" accept="image/*">
            <input type="text" id="profileNickname" placeholder="ნიკნეიმი">
            <textarea id="profileStatus" rows="2" placeholder="სტატუსი..."></textarea>
            <div class="modal-buttons">
                <button id="saveProfileBtn" class="btn-primary">💾 შენახვა</button>
                <button id="closeProfileBtn">❌ დახურვა</button>
            </div>
        </div>
    </div>

    <!-- მეგობრების მოდალი -->
    <div class="modal" id="friendsModal">
        <div class="modal-content">
            <h3>👥 ჩემი მეგობრები</h3>
            <input type="text" id="friendSearchInput" placeholder="🔍 მოძებნე მეგობარი...">
            <div id="friendsListModal" style="max-height: 300px; overflow-y: auto; margin: 15px 0;"></div>
            <button id="closeFriendsBtn" class="btn-primary">დახურვა</button>
        </div>
    </div>

    <!-- მეგობრის მოთხოვნის მოდალი -->
    <div class="modal" id="friendRequestModal">
        <div class="modal-content">
            <h3>💌 მეგობრის მოთხოვნა</h3>
            <p id="friendRequestText"></p>
            <div class="modal-buttons">
                <button id="acceptFriendBtn" class="btn-primary">✅ დასტური</button>
                <button id="rejectFriendBtn" class="btn-danger">❌ უარი</button>
            </div>
        </div>
    </div>

    <!-- დაბლოკვის მოდალი -->
    <div class="modal" id="banModal">
        <div class="modal-content">
            <h3>🚫 მომხმარებლის დაბლოკვა</h3>
            <p id="banUserName"></p>
            <textarea id="banReason" rows="3" placeholder="დაბლოკვის მიზეზი..."></textarea>
            <div class="modal-buttons">
                <button id="confirmBanBtn" class="btn-danger">🔒 დაბლოკვა</button>
                <button id="cancelBanBtn">გაუქმება</button>
            </div>
        </div>
    </div>

    <!-- როლის მინიჭების მოდალი -->
    <div class="modal" id="roleModal">
        <div class="modal-content">
            <h3>👑 როლის მინიჭება</h3>
            <p id="roleUserName"></p>
            <select id="roleSelect" style="width:100%; padding:10px; margin:15px 0; border-radius:10px;">
                <option value="member">👥 წევრი</option>
                <option value="admin">🛡️ ადმინი</option>
                <option value="founder">👑 დამფუძნებელი</option>
            </select>
            <div class="modal-buttons">
                <button id="assignRoleBtn" class="btn-primary">მინიჭება</button>
                <button id="closeRoleBtn">გაუქმება</button>
            </div>
        </div>
    </div>

    <!-- პატარა მესინჯერი -->
    <div class="mini-messenger" id="miniMessenger">
        <div class="mini-header">
            <span id="miniFriendName"></span>
            <button id="closeMiniBtn" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">✕</button>
        </div>
        <div class="mini-messages" id="miniMessages"></div>
        <div class="mini-input-area">
            <input type="text" id="miniInput" placeholder="დაწერე...">
            <button id="miniSendBtn" style="padding:8px 15px; background:#b85c1a; border:none; border-radius:20px; color:white;">გაგზავნა</button>
        </div>
    </div>

    <script>
        // ==================== მონაცემთა ბაზა ====================
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let rooms = [];
        let customEmojis = JSON.parse(localStorage.getItem('customEmojis')) || ['😊', '😂', '❤️', '😍', '🎉', '🔥', '👍', '🙏', '🥰', '😢', '😡', '🤔'];
        let privateMessages = JSON.parse(localStorage.getItem('privateMessages')) || {};
        let currentRoom = 1;
        let selectedFriend = null;
        let pendingRequestUser = null;

        // 12 ოთახის შექმნა
        for (let i = 1; i <= 12; i++) {
            if (!rooms[i]) {
                rooms[i] = {
                    id: i,
                    name: `ოთახი ${i}`,
                    messages: JSON.parse(localStorage.getItem(`room_${i}_messages`)) || [],
                    bannedUsers: JSON.parse(localStorage.getItem(`room_${i}_banned`)) || []
                };
            }
        }

        // თუ მომხმარებელი არ არის, შევქმნათ ახალი
        if (!currentUser) {
            const newId = 'user_' + Date.now();
            currentUser = {
                id: newId,
                name: 'მომხმარებელი_' + Math.floor(Math.random() * 1000),
                avatar: '',
                status: '😊 აქტიური',
                role: users.length === 0 ? 'founder' : 'member',
                friends: []
            };
            users.push(currentUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
        }

        // ==================== ფუნქციები ====================
        function startHeartAnimation() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
                heart.style.animationDuration = (Math.random() * 4 + 6) + 's';
                document.getElementById('heartBg').appendChild(heart);
                setTimeout(() => heart.remove(), 8000);
            }, 1500);
        }

        function renderRooms() {
            const container = document.getElementById('roomsList');
            container.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const room = rooms[i];
                container.innerHTML += `
                    <div class="room-item ${currentRoom === i ? 'active' : ''}" onclick="changeRoom(${i})">
                        ${room.name}
                    </div>
                `;
            }
        }

        window.changeRoom = function(roomId) {
            currentRoom = roomId;
            document.getElementById('currentRoomName').innerText = rooms[roomId].name;
            renderRooms();
            renderMessages();
        };

        function renderMessages() {
            const room = rooms[currentRoom];
            const container = document.getElementById('messagesArea');
            
            if (!room.messages) room.messages = [];
            
            container.innerHTML = room.messages.map(msg => `
                <div class="message ${msg.userId === currentUser.id ? 'right' : 'left'}">
                    <div class="message-header">
                        <img class="message-avatar" src="${msg.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b85c1a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                        <span class="message-name">${escapeHtml(msg.userName)}</span>
                        <span class="message-time">${msg.time}</span>
                        ${(currentUser.role === 'admin' || currentUser.role === 'founder') ? `
                            <div class="message-actions">
                                <span class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</span>
                            </div>
                        ` : ''}
                    </div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        window.deleteMessage = function(messageId) {
            if (currentUser.role === 'admin' || currentUser.role === 'founder') {
                const room = rooms[currentRoom];
                room.messages = room.messages.filter(m => m.id !== messageId);
                localStorage.setItem(`room_${currentRoom}_messages`, JSON.stringify(room.messages));
                renderMessages();
            }
        };

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const room = rooms[currentRoom];
            if (room.bannedUsers.includes(currentUser.id)) {
                alert('დაბლოკილი ხარ ამ ოთახში!');
                return;
            }
            
            const newMessage = {
                id: Date.now(),
                userId: currentUser.id,
                userName: currentUser.name,
                avatar: currentUser.avatar || '',
                text: text,
                time: new Date().toLocaleTimeString()
            };
            
            room.messages.push(newMessage);
            localStorage.setItem(`room_${currentRoom}_messages`, JSON.stringify(room.messages));
            
            input.value = '';
            renderMessages();
        }

        function renderUsers() {
            // ონლაინ მომხმარებლები (აქ ყველა მიიჩნევა ონლაინად)
            const onlineUsers = users.filter(u => u.id !== currentUser.id);
            const onlineContainer = document.getElementById('onlineUsersList');
            onlineContainer.innerHTML = onlineUsers.map(user => `
                <div class="user-item" onclick="openUserActions('${user.id}')">
                    <img class="user-avatar" src="${user.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b85c1a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name)}</div>
                        <div class="user-status">${user.status || 'აქტიური'}</div>
                        <span class="user-role role-${user.role}">${user.role === 'founder' ? 'დამფუძნებელი' : user.role === 'admin' ? 'ადმინი' : 'წევრი'}</span>
                    </div>
                    <span class="online-dot online"></span>
                </div>
            `).join('');
            
            // ყველა მომხმარებელი
            const searchTerm = document.getElementById('searchUsers')?.value.toLowerCase() || '';
            const allUsers = users.filter(u => u.id !== currentUser.id && u.name.toLowerCase().includes(searchTerm));
            const allContainer = document.getElementById('allUsersList');
            allContainer.innerHTML = allUsers.map(user => `
                <div class="user-item" onclick="openUserActions('${user.id}')">
                    <img class="user-avatar" src="${user.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b85c1a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name)}</div>
                        <div class="user-status">${user.status || 'აქტიური'}</div>
                        <span class="user-role role-${user.role}">${user.role === 'founder' ? '👑 დამფუძნებელი' : user.role === 'admin' ? '🛡️ ადმინი' : '👤 წევრი'}</span>
                    </div>
                    <span class="online-dot online"></span>
                </div>
            `).join('');
        }

        window.openUserActions = function(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;
            
            const actions = [];
            
            if (currentUser.role === 'founder') {
                actions.push('როლის მინიჭება');
                actions.push('დაბლოკვა');
            }
            if (currentUser.role === 'admin') {
                actions.push('დაბლოკვა');
            }
            
            actions.push('მეგობრად დამატება');
            actions.push('პირადი მესიჯი');
            
            const action = prompt(`აირჩიე მოქმედება ${user.name}:\n${actions.map((a, i) => `${i+1}. ${a}`).join('\n')}`);
            
            if (action === '1' && actions[0] === 'როლის მინიჭება') {
                openRoleModal(user);
            } else if ((action === '1' && actions[0] === 'დაბლოკვა') || (action === '2' && actions[1] === 'დაბლოკვა')) {
                openBanModal(user);
            } else if (action === (actions.includes('მეგობრად დამატება') ? actions.indexOf('მეგობრად დამატება') + 1 : 0) && actions.includes('მეგობრად დამატება')) {
                sendFriendRequest(user);
            } else if (action === (actions.includes('პირადი მესიჯი') ? actions.indexOf('პირადი მესიჯი') + 1 : 0) && actions.includes('პირადი მესიჯი')) {
                openMiniMessenger(user);
            }
        };
        
        function openBanModal(user) {
            document.getElementById('banUserName').innerText = `${user.name} - ის დაბლოკვა`;
            document.getElementById('banModal').classList.add('show');
            
            document.getElementById('confirmBanBtn').onclick = () => {
                const reason = document.getElementById('banReason').value;
                const room = rooms[currentRoom];
                if (!room.bannedUsers.includes(user.id)) {
                    room.bannedUsers.push(user.id);
                    localStorage.setItem(`room_${currentRoom}_banned`, JSON.stringify(room.bannedUsers));
                    alert(`${user.name} დაბლოკილია მიზეზი: ${reason || 'არ არის მითითებული'}`);
                }
                document.getElementById('banModal').classList.remove('show');
                document.getElementById('banReason').value = '';
            };
            
            document.getElementById('cancelBanBtn').onclick = () => {
                document.getElementById('banModal').classList.remove('show');
            };
        }
        
        function openRoleModal(user) {
            document.getElementById('roleUserName').innerText = `${user.name} - როლის მინიჭება`;
            document.getElementById('roleModal').classList.add('show');
            
            document.getElementById('assignRoleBtn').onclick = () => {
                const newRole = document.getElementById('roleSelect').value;
                user.role = newRole;
                localStorage.setItem('users', JSON.stringify(users));
                alert(`${user.name} ახლა არის ${newRole === 'founder' ? 'დამფუძნებელი' : newRole === 'admin' ? 'ადმინი' : 'წევრი'}`);
                document.getElementById('roleModal').classList.remove('show');
                renderUsers();
            };
            
            document.getElementById('closeRoleBtn').onclick = () => {
                document.getElementById('roleModal').classList.remove('show');
            };
        }
        
        function sendFriendRequest(user) {
            if (currentUser.friends.includes(user.id)) {
                alert('უკვე მეგობარი ხართ!');
                return;
            }
            pendingRequestUser = user;
            document.getElementById('friendRequestText').innerHTML = `გსურს დაამატო ${user.name} მეგობრად?`;
            document.getElementById('friendRequestModal').classList.add('show');
        }
        
        function openMiniMessenger(user) {
            selectedFriend = user;
            document.getElementById('miniFriendName').innerText = user.name;
            document.getElementById('miniMessenger').classList.add('show');
            renderMiniMessages();
        }
        
        function renderMiniMessages() {
            const chatId = [currentUser.id, selectedFriend.id].sort().join('-');
            const messages = privateMessages[chatId] || [];
            const container = document.getElementById('miniMessages');
            
            container.innerHTML = messages.map(msg => `
                <div class="mini-msg ${msg.from === currentUser.id ? 'right' : 'left'}" style="${msg.from === currentUser.id ? 'margin-left:auto;' : ''}">
                    <small>${new Date(msg.time).toLocaleTimeString()}</small>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }
        
        function sendPrivateMessage() {
            const input = document.getElementById('miniInput');
            const text = input.value.trim();
            if (!text || !selectedFriend) return;
            
            const chatId = [currentUser.id, selectedFriend.id].sort().join('-');
            if (!privateMessages[chatId]) privateMessages[chatId] = [];
            
            privateMessages[chatId].push({
                from: currentUser.id,
                to: selectedFriend.id,
                text: text,
                time: Date.now()
            });
            
            localStorage.setItem('privateMessages', JSON.stringify(privateMessages));
            input.value = '';
            renderMiniMessages();
        }
        
        function renderEmojis() {
            const grid = document.getElementById('emojiGrid');
            grid.innerHTML = customEmojis.map(emoji => `
                <div class="emoji-item" onclick="addEmojiToMessage('${emoji}')">${emoji}</div>
            `).join('');
            
            const adminBtns = document.getElementById('emojiAdminBtns');
            if (currentUser.role === 'admin' || currentUser.role === 'founder') {
                adminBtns.style.display = 'flex';
            } else {
                adminBtns.style.display = 'none';
            }
        }
        
        window.addEmojiToMessage = function(emoji) {
            const input = document.getElementById('messageInput');
            input.value += emoji;
            document.getElementById('emojiPanel').classList.remove('show');
        };
        
        function addCustomEmoji() {
            const emoji = prompt('შეიყვანეთ ახალი ემოჯი:');
            if (emoji && !customEmojis.includes(emoji)) {
                customEmojis.push(emoji);
                localStorage.setItem('customEmojis', JSON.stringify(customEmojis));
                renderEmojis();
            }
        }
        
        function removeCustomEmoji() {
            const emoji = prompt('ჩაწერეთ ემოჯი რომლის წაშლაც გსურთ:');
            const index = customEmojis.indexOf(emoji);
            if (index !== -1) {
                customEmojis.splice(index, 1);
                localStorage.setItem('customEmojis', JSON.stringify(customEmojis));
                renderEmojis();
            }
        }
        
        function updateProfileUI() {
            document.getElementById('headerUserName').innerText = currentUser.name;
            document.getElementById('headerUserStatus').innerHTML = currentUser.status || '😊 აქტიური';
            if (currentUser.avatar) {
                document.getElementById('headerAvatar').src = currentUser.avatar;
                document.getElementById('profileModalAvatar').src = currentUser.avatar;
            }
            document.getElementById('profileNickname').value = currentUser.name;
            document.getElementById('profileStatus').value = currentUser.status || '';
        }
        
        function openProfileModal() {
            updateProfileUI();
            document.getElementById('profileModal').classList.add('show');
        }
        
        function saveProfile() {
            const newName = document.getElementById('profileNickname').value.trim();
            if (newName) currentUser.name = newName;
            
            currentUser.status = document.getElementById('profileStatus').value;
            
            const fileInput = document.getElementById('photoUpload');
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentUser.avatar = e.target.result;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    const userIndex = users.findIndex(u => u.id === currentUser.id);
                    if (userIndex !== -1) users[userIndex] = currentUser;
                    localStorage.setItem('users', JSON.stringify(users));
                    updateProfileUI();
                    renderUsers();
                    renderMessages();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                const userIndex = users.findIndex(u => u.id === currentUser.id);
                if (userIndex !== -1) users[userIndex] = currentUser;
                localStorage.setItem('users', JSON.stringify(users));
                updateProfileUI();
                renderUsers();
                renderMessages();
            }
            
            document.getElementById('profileModal').classList.remove('show');
        }
        
        function openFriendsModal() {
            const container = document.getElementById('friendsListModal');
            const friends = users.filter(u => currentUser.friends.includes(u.id));
            container.innerHTML = friends.map(friend => `
                <div class="user-item" onclick="openMiniMessengerById('${friend.id}')">
                    <img class="user-avatar" src="${friend.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b85c1a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(friend.name)}</div>
                        <div class="user-status">${friend.status || 'აქტიური'}</div>
                    </div>
                </div>
            `).join('');
            
            if (friends.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:20px;">ჯერ არ გყავს მეგობრები</p>';
            }
            
            document.getElementById('friendsModal').classList.add('show');
        }
        
        window.openMiniMessengerById = function(userId) {
            const user = users.find(u => u.id === userId);
            if (user) {
                document.getElementById('friendsModal').classList.remove('show');
                openMiniMessenger(user);
            }
        };
        
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.classList.contains('night-mode')) {
                body.classList.remove('night-mode');
                body.classList.add('day-mode');
                btn.innerHTML = '☀️ დღის რეჟიმი';
            } else {
                body.classList.remove('day-mode');
                body.classList.add('night-mode');
                btn.innerHTML = '🌙 ღამის რეჟიმი';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toggleSidebarSection(section) {
            const element = document.getElementById(section);
            if (element) {
                element.style.display = element.style.display === 'none' ? 'block' : 'none';
            }
        }
        
        // ==================== Event Listeners ====================
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        document.getElementById('emojiBtn').onclick = () => {
            document.getElementById('emojiPanel').classList.toggle('show');
        };
        document.getElementById('addEmojiBtn').onclick = addCustomEmoji;
        document.getElementById('removeEmojiBtn').onclick = removeCustomEmoji;
        document.getElementById('profileTopBtn').onclick = openProfileModal;
        document.getElementById('profileInfoBtn').onclick = openProfileModal;
        document.getElementById('saveProfileBtn').onclick = saveProfile;
        document.getElementById('closeProfileBtn').onclick = () => document.getElementById('profileModal').classList.remove('show');
        document.getElementById('themeBtn').onclick = toggleTheme;
        document.getElementById('friendsTopBtn').onclick = openFriendsModal;
        document.getElementById('closeFriendsBtn').onclick = () => document.getElementById('friendsModal').classList.remove('show');
        document.getElementById('usersTopBtn').onclick = () => {
            const section = document.getElementById('allUsersSection');
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
        };
        document.getElementById('acceptFriendBtn').onclick = () => {
            if (pendingRequestUser && !currentUser.friends.includes(pendingRequestUser.id)) {
                currentUser.friends.push(pendingRequestUser.id);
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                const userIndex = users.findIndex(u => u.id === currentUser.id);
                if (userIndex !== -1) users[userIndex] = currentUser;
                localStorage.setItem('users', JSON.stringify(users));
                alert('მეგობარი დაემატა!');
            }
            document.getElementById('friendRequestModal').classList.remove('show');
            pendingRequestUser = null;
        };
        document.getElementById('rejectFriendBtn').onclick = () => {
            document.getElementById('friendRequestModal').classList.remove('show');
            pendingRequestUser = null;
        };
        document.getElementById('closeMiniBtn').onclick = () => {
            document.getElementById('miniMessenger').classList.remove('show');
        };
        document.getElementById('miniSendBtn').onclick = sendPrivateMessage;
        document.getElementById('miniInput').onkeypress = (e) => { if (e.key === 'Enter') sendPrivateMessage(); };
        document.getElementById('searchUsers').oninput = renderUsers;
        
        // ==================== ინიციალიზაცია ====================
        function init() {
            startHeartAnimation();
            renderRooms();
            renderUsers();
            renderMessages();
            renderEmojis();
            updateProfileUI();
            document.getElementById('currentRoomName').innerText = rooms[currentRoom].name;
        }
        
        init();
    </script>
</body>
</html>
