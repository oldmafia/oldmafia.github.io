<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - ქართული ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        :root {
            --accent: #ff3b3b;
            --bg: #0a0c10;
            --text: #e6e9f0;
            --card: #151e2a;
            --border: #2a3440;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ნავიგაცია */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #11151c;
            padding: 12px 0;
            border-bottom: 2px solid var(--accent);
            flex-shrink: 0;
        }

        .nav-btn {
            font-size: 28px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 8px;
            transition: 0.2s;
        }

        .nav-btn.active {
            color: var(--accent);
            transform: scale(1.1);
        }

        /* გვერდების კონტეინერი */
        .pages-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
            padding: 16px;
        }

        .page.active {
            display: block;
        }

        /* ოთახების სტილი */
        .room-card {
            background: var(--card);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            cursor: pointer;
            transition: 0.2s;
        }

        .room-card:active {
            transform: scale(0.98);
            background: var(--accent);
        }

        .room-card span {
            font-size: 28px;
            margin-right: 12px;
        }

        .room-card b {
            font-size: 18px;
        }

        /* ჩატის გვერდი */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            background: var(--card);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            background: var(--card);
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            word-break: break-word;
        }

        .message.own {
            align-self: flex-end;
            background: var(--accent);
        }

        .message .name {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .chat-input-area {
            background: var(--card);
            padding: 12px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        /* მომხმარებლების სია */
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--card);
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .user-info b {
            display: block;
            font-size: 16px;
        }

        .user-info span {
            font-size: 12px;
            opacity: 0.6;
        }

        /* პროფილი */
        .profile-section {
            text-align: center;
            padding: 20px;
        }

        .avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto;
            cursor: pointer;
        }

        .status-input {
            width: 80%;
            margin-top: 20px;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            background: var(--card);
            color: var(--text);
            text-align: center;
        }

        .close-btn {
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .emoji-board {
            position: fixed;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: 16px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 12px;
            z-index: 1000;
        }

        .emoji-board.active {
            display: grid;
        }

        .emoji-item {
            font-size: 32px;
            text-align: center;
            cursor: pointer;
            padding: 8px;
        }

        .heart {
            position: fixed;
            bottom: 0;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
            z-index: 9999;
        }

        @keyframes floatUp {
            0% {
                bottom: 0;
                opacity: 1;
            }
            100% {
                bottom: 100%;
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="nav-btn" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="online">👥</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeBtn">🌙</button>
    </div>

    <div class="pages-container">
        <!-- მთავარი გვერდი - ოთახები -->
        <div id="homePage" class="page active">
            <h3 style="margin-bottom: 16px; color: var(--accent);">🏰 12 ოთახი</h3>
            <div id="roomsList"></div>
        </div>

        <!-- მიმოწერა -->
        <div id="messagesPage" class="page">
            <h3 style="margin-bottom: 16px;">💬 მიმოწერა</h3>
            <div id="pmList">მიმოწერა ცარიელია</div>
        </div>

        <!-- ონლაინ მომხმარებლები -->
        <div id="onlinePage" class="page">
            <h3 style="margin-bottom: 16px;">👥 ონლაინში</h3>
            <div id="onlineList"></div>
        </div>

        <!-- პროფილი -->
        <div id="profilePage" class="page">
            <div class="profile-section">
                <div class="avatar-large" onclick="document.getElementById('avatarInput').click()">
                    👤
                </div>
                <h2 id="profileName" style="margin-top: 16px;">Abu007</h2>
                <input type="text" id="statusText" class="status-input" placeholder="სტატუსი...">
                <p style="margin-top: 16px; opacity: 0.5;">ID: #<span id="userId">007</span></p>
            </div>
            <input type="file" id="avatarInput" hidden accept="image/*">
        </div>

        <!-- ჩატის გვერდი -->
        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-header">
                    <b id="chatRoomName">ოთახი</b>
                    <button class="close-btn" onclick="backToHome()">✕</button>
                </div>
                <div id="chatMessages" class="messages-area"></div>
                <div class="chat-input-area">
                    <button onclick="toggleEmoji()" style="font-size: 28px; background: none; border: none; color: var(--text); cursor: pointer;">😊</button>
                    <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე...">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
            <div id="emojiBoard" class="emoji-board"></div>
        </div>
    </div>

    <div id="hearts"></div>

    <script>
        // Supabase კონფიგი
        const supabase = supabase.createClient(
            "https://ftfciebnywbondaiarnc.supabase.co",
            "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
        );

        // მონაცემები
        let currentUser = localStorage.getItem('nickname') || "Abu007";
        let currentRoom = null;
        let currentPage = 'home';

        // ოთახები
        const rooms = [
            { icon: "☕", name: "კაფე-ბარი" },
            { icon: "🎲", name: "ნარდი" },
            { icon: "🃏", name: "ჯოკერი" },
            { icon: "💎", name: "VIP" },
            { icon: "📝", name: "ფორუმი" },
            { icon: "🛠️", name: "ადმინები" },
            { icon: "😂", name: "იუმორი" },
            { icon: "🏆", name: "შიფროგრამა" },
            { icon: "🎭", name: "გამოძიება" },
            { icon: "🎵", name: "მუსიკა" },
            { icon: "⁉️", name: "ვიქტორინა" },
            { icon: "🆘", name: "დახმარება" }
        ];

        // გვერდების ჩვენება
        function showPage(pageName) {
            console.log("Show page:", pageName);
            currentPage = pageName;
            
            // ყველა გვერდის დამალვა
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            
            // არჩეული გვერდის ჩვენება
            let targetPage = null;
            switch(pageName) {
                case 'home':
                    targetPage = document.getElementById('homePage');
                    break;
                case 'messages':
                    targetPage = document.getElementById('messagesPage');
                    break;
                case 'online':
                    targetPage = document.getElementById('onlinePage');
                    break;
                case 'profile':
                    targetPage = document.getElementById('profilePage');
                    break;
                case 'chat':
                    targetPage = document.getElementById('chatPage');
                    break;
            }
            
            if (targetPage) {
                targetPage.classList.add('active');
            }
            
            // ნავიგაციის ღილაკების განახლება
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-page') === pageName) {
                    btn.classList.add('active');
                }
            });
        }

        // მთავარ გვერდზე დაბრუნება
        function backToHome() {
            currentRoom = null;
            showPage('home');
        }

        // ოთახის გახსნა
        function openRoom(roomName) {
            currentRoom = roomName;
            document.getElementById('chatRoomName').innerHTML = `📡 ${roomName}`;
            showPage('chat');
            loadMessages();
        }

        // შეტყობინებების ჩატვირთვა
        async function loadMessages() {
            if (!currentRoom) return;
            
            const { data } = await supabase
                .from('messages')
                .select('*')
                .eq('room_name', currentRoom)
                .order('created_at', { ascending: true })
                .limit(50);
                
            const container = document.getElementById('chatMessages');
            if (!container) return;
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div style="text-align:center; opacity:0.5;">შეტყობინებები ჯერ არ არის</div>';
                return;
            }
            
            container.innerHTML = data.map(msg => `
                <div class="message ${msg.username === currentUser ? 'own' : ''}">
                    <div class="name">${escapeHtml(msg.username)}</div>
                    <div>${formatMessage(msg.text)}</div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        // შეტყობინების გაგზავნა
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentRoom) return;
            
            await supabase.from('messages').insert({
                username: currentUser,
                text: text,
                room_name: currentRoom
            });
            
            input.value = '';
            loadMessages();
        }

        // ოთახების რენდერი
        function renderRooms() {
            const container = document.getElementById('roomsList');
            if (!container) return;
            
            container.innerHTML = rooms.map(room => `
                <div class="room-card" onclick="openRoom('${room.name}')">
                    <span>${room.icon}</span>
                    <b>${room.name}</b>
                </div>
            `).join('');
        }

        // ონლაინ მომხმარებლები
        async function loadOnlineUsers() {
            const { data } = await supabase
                .from('profiles')
                .select('*')
                .limit(30);
                
            const container = document.getElementById('onlineList');
            if (!container) return;
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div style="text-align:center; opacity:0.5;">მომხმარებლები არ არიან</div>';
                return;
            }
            
            container.innerHTML = data.map(user => `
                <div class="user-item" onclick="alert('${user.username}')">
                    <div class="user-avatar">👤</div>
                    <div class="user-info">
                        <b>${escapeHtml(user.username)}</b>
                        <span>${escapeHtml(user.status || 'ონლაინ')}</span>
                    </div>
                </div>
            `).join('');
        }

        // პროფილის ჩატვირთვა
        async function loadProfile() {
            document.getElementById('profileName').innerHTML = currentUser;
            
            const { data } = await supabase
                .from('profiles')
                .select('*')
                .eq('username', currentUser)
                .maybeSingle();
                
            if (data) {
                if (data.status) {
                    document.getElementById('statusText').value = data.status;
                }
                if (data.id) {
                    document.getElementById('userId').innerHTML = data.id.substring(0, 8);
                }
            }
        }

        // სტატუსის განახლება
        async function updateStatus() {
            const status = document.getElementById('statusText').value;
            await supabase
                .from('profiles')
                .update({ status: status })
                .eq('username', currentUser);
        }

        // ემოჯიების ჩატვირთვა
        async function loadEmojis() {
            const board = document.getElementById('emojiBoard');
            if (!board) return;
            
            const defaultEmojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺'];
            board.innerHTML = defaultEmojis.map(emoji => `
                <div class="emoji-item" onclick="addEmoji('${emoji}')">${emoji}</div>
            `).join('');
        }

        function addEmoji(emoji) {
            const input = document.getElementById('messageInput');
            if (input) {
                input.value += emoji;
            }
            toggleEmoji();
        }

        function toggleEmoji() {
            const board = document.getElementById('emojiBoard');
            board.classList.toggle('active');
        }

        function formatMessage(text) {
            return escapeHtml(text);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // გულების ანიმაცია
        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️', '💖', '💗', '💕'][Math.floor(Math.random() * 4)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (18 + Math.random() * 20) + 'px';
                document.getElementById('hearts').appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 2000);
        }

        // თემის შეცვლა
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            const root = document.documentElement;
            if (isDark) {
                root.style.setProperty('--bg', '#0a0c10');
                root.style.setProperty('--text', '#e6e9f0');
                root.style.setProperty('--card', '#151e2a');
                root.style.setProperty('--border', '#2a3440');
                document.getElementById('themeBtn').innerHTML = '🌙';
            } else {
                root.style.setProperty('--bg', '#fef8ef');
                root.style.setProperty('--text', '#2c2418');
                root.style.setProperty('--card', '#ffffff');
                root.style.setProperty('--border', '#ffe0b5');
                document.getElementById('themeBtn').innerHTML = '☀️';
            }
        }

        // ავატარის ატვირთვა
        document.getElementById('avatarInput')?.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            alert('ავატარის ატვირთვა დემო ვერსიაში');
        });

        // სტატუსის ავტომატური შენახვა
        let statusTimeout;
        document.getElementById('statusText')?.addEventListener('input', () => {
            clearTimeout(statusTimeout);
            statusTimeout = setTimeout(() => updateStatus(), 1000);
        });

        // Enter ღილაკით გაგზავნა
        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // რეალთაიმ აპდეითი
        supabase.channel('messages-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
                if (currentRoom) loadMessages();
            })
            .subscribe();

        // ინიციალიზაცია
        async function init() {
            console.log("🚀 აპლიკაცია იწყება...");
            
            renderRooms();
            await loadProfile();
            await loadOnlineUsers();
            await loadEmojis();
            startHearts();
            
            // ნავიგაციის ღილაკები
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = btn.getAttribute('data-page');
                    showPage(page);
                });
            });
            
            // თემის ღილაკი
            document.getElementById('themeBtn')?.addEventListener('click', toggleTheme);
            
            console.log("✅ აპლიკაცია გაშვებულია");
        }
        
        init();
    </script>
</body>
</html>
