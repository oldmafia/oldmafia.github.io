<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Old Mafia - სრული ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body {
            --bg: #0a0508;
            --text: #f0e6e8;
            --card: #1a0f12;
            --border: #4a1a2a;
            --accent: #8b0000;
            --input: #1f1216;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: 0.3s;
        }
        body.day-mode {
            --bg: #fff5f0;
            --text: #2c1a1a;
            --card: #ffffff;
            --border: #e6b8a2;
            --accent: #8b0000;
            --input: #fffaf5;
        }
        
        .nav-bar {
            display: flex;
            justify-content: space-around;
            background: #120a0c;
            padding: 8px 0;
            border-bottom: 2px solid var(--accent);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .nav-btn {
            font-size: 22px;
            background: none;
            border: none;
            color: #aa8a8a;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .nav-btn.active {
            color: var(--accent);
            background: rgba(139,0,0,0.2);
        }
        
        .pages { flex: 1; position: relative; overflow: hidden; }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
            padding: 12px;
        }
        .page.active { display: block; }
        .section-title {
            font-size: 18px;
            margin-bottom: 12px;
            color: var(--accent);
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }
        
        .rooms-list { display: flex; flex-direction: column; gap: 8px; }
        .room-card {
            background: var(--card);
            padding: 14px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            cursor: pointer;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .room-icon { font-size: 26px; }
        
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-header {
            background: var(--card);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }
        .close-btn {
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            background: var(--card);
            padding: 10px 12px;
            border-radius: 12px;
            max-width: 85%;
            align-self: flex-start;
            border: 1px solid var(--border);
            position: relative;
        }
        .message.own {
            background: var(--accent);
            border: none;
        }
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }
        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            object-fit: cover;
        }
        .message-name {
            font-weight: bold;
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
        }
        .message.own .message-name { color: white; }
        .message-time {
            font-size: 9px;
            opacity: 0.6;
            margin-left: 5px;
        }
        .message-text {
            font-size: 14px;
            word-break: break-word;
            margin-top: 4px;
        }
        .message-text img {
            max-width: 180px;
            max-height: 120px;
            border-radius: 8px;
            margin-top: 4px;
            cursor: pointer;
        }
        .delete-msg {
            position: absolute;
            right: 5px;
            top: 5px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 10px;
            opacity: 0;
        }
        .message:hover .delete-msg { opacity: 1; }
        
        .chat-input-area {
            background: var(--card);
            padding: 8px;
            display: flex;
            gap: 8px;
            border-radius: 12px;
            margin-top: 8px;
            border: 1px solid var(--border);
        }
        .icon-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
        .chat-input {
            flex: 1;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid var(--accent);
            background: var(--input);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        
        .user-item {
            background: var(--card);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
            position: relative;
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            object-fit: cover;
        }
        .user-name { font-weight: bold; font-size: 15px; }
        .user-status { font-size: 11px; opacity: 0.7; }
        .friend-badge {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #2d6a4f;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
        }
        .add-badge {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
        }
        .request-badge {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #b8860b;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
        }
        
        .emoji-panel {
            position: fixed;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: 16px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            padding: 10px;
            z-index: 2000;
            max-height: 250px;
            overflow-y: auto;
        }
        .emoji-panel.active { display: grid; }
        .emoji-item {
            font-size: 32px;
            text-align: center;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
        }
        .emoji-item:hover { background: var(--accent); transform: scale(1.05); }
        
        .photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4000;
            padding: 20px;
        }
        .photo-modal-content {
            background: var(--card);
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            border: 2px solid var(--accent);
            overflow: hidden;
        }
        .photo-modal-img { width: 100%; max-height: 55vh; object-fit: contain; }
        .photo-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            padding: 12px;
            border-top: 1px solid var(--border);
        }
        .photo-comments {
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px solid var(--border);
        }
        .comment-item {
            padding: 5px 0;
            font-size: 12px;
            border-bottom: 1px solid var(--border);
        }
        .comment-input-area {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid var(--border);
        }
        .comment-input {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            background: var(--input);
            color: var(--text);
        }
        .like-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 20px;
        }
        .like-btn.active { color: #ff3366; transform: scale(1.1); }
        
        .pm-chat-container {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 300px;
            max-width: calc(100% - 20px);
            height: 420px;
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            z-index: 2000;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
        }
        @media (max-width: 768px) {
            .pm-chat-container {
                width: 90%;
                right: 5%;
                left: 5%;
                bottom: 10px;
                height: 45vh;
            }
        }
        .pm-header {
            background: var(--accent);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            border-radius: 14px 14px 0 0;
            cursor: pointer;
        }
        .pm-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .pm-message {
            background: var(--input);
            padding: 6px 10px;
            border-radius: 12px;
            max-width: 85%;
            align-self: flex-start;
        }
        .pm-message.own {
            align-self: flex-end;
            background: var(--accent);
        }
        .pm-input-area {
            display: flex;
            padding: 8px;
            gap: 8px;
            border-top: 1px solid var(--border);
        }
        .pm-input {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            background: var(--input);
            color: var(--text);
        }
        
        .profile-card {
            text-align: center;
            padding: 20px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto;
            cursor: pointer;
            object-fit: cover;
        }
        .status-input {
            width: 80%;
            margin-top: 15px;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid var(--accent);
            background: var(--input);
            color: var(--text);
            text-align: center;
        }
        .album-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 10px;
        }
        .album-photo {
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid var(--accent);
        }
        .upload-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 25px;
            margin: 10px 0;
            cursor: pointer;
            width: 100%;
        }
        
        .empty-state { text-align: center; padding: 40px; opacity: 0.5; }
        .notification {
            position: fixed;
            top: 70px;
            right: 10px;
            background: var(--accent);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            z-index: 5000;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .heart {
            position: fixed;
            bottom: 0;
            font-size: 36px;
            pointer-events: none;
            animation: floatUpHeart 6s ease-out forwards;
            z-index: 9999;
            filter: drop-shadow(0 0 8px #ff3366) drop-shadow(0 0 15px #ff6699);
        }
        @keyframes floatUpHeart {
            0% {
                bottom: 0;
                opacity: 1;
                transform: scale(0.5) rotate(0deg);
            }
            30% {
                transform: scale(1.3) rotate(15deg);
            }
            60% {
                transform: scale(1) rotate(-10deg);
            }
            100% {
                bottom: 100%;
                opacity: 0;
                transform: scale(0.8) translateX(60px) rotate(360deg);
            }
        }
        
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
        }
        .profile-modal-content {
            background: var(--card);
            border-radius: 20px;
            max-width: 350px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid var(--accent);
        }
        .profile-modal-header {
            background: var(--accent);
            padding: 15px;
            text-align: center;
            position: relative;
        }
        .profile-modal-close {
            position: absolute;
            right: 15px;
            top: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .profile-modal-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #5a0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto;
            object-fit: cover;
        }
        .profile-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 12px;
            border-top: 1px solid var(--border);
        }
        .action-btn {
            background: #5a0000;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .action-btn.success { background: #2d6a4f; }
        .action-btn.danger { background: #8b0000; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="friends">👥</button>
        <button class="nav-btn" data-page="online">🌐</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeToggle">🌙</button>
    </div>
    
    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 12 სათამაშო ოთახი</div>
            <div id="roomsList" class="rooms-list"></div>
        </div>
        
        <div id="messagesPage" class="page">
            <div class="section-title">💬 პირადი მიმოწერა</div>
            <div id="pmList"></div>
        </div>
        
        <div id="friendsPage" class="page">
            <div class="section-title">👥 ჩემი მეგობრები</div>
            <div id="friendsList"></div>
            <div class="section-title" style="margin-top:20px;">📨 მეგობრობის მოთხოვნები</div>
            <div id="friendRequestsList"></div>
        </div>
        
        <div id="onlinePage" class="page">
            <div class="section-title">🌐 ყველა მომხმარებელი</div>
            <div id="onlineList"></div>
        </div>
        
        <div id="profilePage" class="page">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()">👤</div>
                <h2 id="profileName"></h2>
                <input type="text" id="statusInput" class="status-input" placeholder="სტატუსი...">
                <button class="upload-btn" onclick="saveStatus()">💾 სტატუსის შენახვა</button>
                <div class="section-title" style="margin-top:20px;">📸 ჩემი ალბომი</div>
                <button class="upload-btn" onclick="document.getElementById('albumInput').click()">➕ ფოტოს დამატება</button>
                <div id="albumGrid" class="album-grid"></div>
                <input type="file" id="albumInput" hidden accept="image/*" onchange="addToAlbum(this)">
            </div>
            <input type="file" id="avatarInput" hidden accept="image/*" onchange="uploadAvatar(this)">
            <input type="file" id="emojiUploadInput" hidden accept="image/*" onchange="uploadEmojiImage(this)">
        </div>
        
        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-header">
                    <span id="chatRoomName">ოთახი</span>
                    <button class="close-btn" onclick="closeChat()">✕</button>
                </div>
                <div id="chatMessages" class="messages"></div>
                <div class="chat-input-area">
                    <button class="icon-btn" onclick="openEmojiPanel('chat')">😊</button>
                    <button class="icon-btn" onclick="document.getElementById('chatPhotoInput').click()">📷</button>
                    <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
            <input type="file" id="chatPhotoInput" hidden accept="image/*" onchange="addPhotoToMessage(this)">
        </div>
    </div>
    <div id="emojiPanel" class="emoji-panel"></div>
    <div id="hearts"></div>
    <div id="pmContainer"></div>

    <script>
        const supabase = supabase.createClient(
            "https://ftfciebnywbondaiarnc.supabase.co",
            "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
        );
        
        let currentUser = localStorage.getItem('mafia_user');
        if (!currentUser || currentUser === "null") {
            currentUser = localStorage.getItem('nickname');
            if (!currentUser) currentUser = "Abu007";
            localStorage.setItem('mafia_user', currentUser);
        }
        console.log("✅ მომხმარებელი:", currentUser);
        
        let currentRoom = null;
        let currentPMUser = null;
        let currentEmojiTarget = 'chat';
        const OWNER = "Abu007";
        const ADMINS = ["Abu007", "Lukinio", "AdminMafia"];
        
        let users = [];
        let messages = [];
        let privateMessages = [];
        let friendRequests = [];
        let blockedUsers = [];
        let customEmojis = [];
        let userAlbums = {};
        let photoInteractions = {};
        let currentChannel = null;
        
        const ROOMS = [
            { icon: "☕", name: "კაფე-ბარი" }, { icon: "🎲", name: "ნარდი" }, { icon: "🃏", name: "ჯოკერი" },
            { icon: "💎", name: "VIP" }, { icon: "📝", name: "ფორუმი" }, { icon: "🛠️", name: "ადმინები" },
            { icon: "😂", name: "იუმორი" }, { icon: "🏆", name: "შიფროგრამა" }, { icon: "🎭", name: "გამოძიება" },
            { icon: "🎵", name: "მუსიკა" }, { icon: "⁉️", name: "ვიქტორინა" }, { icon: "🆘", name: "დახმარება" }
        ];
        
        async function loadUsers() {
            const { data } = await supabase.from('profiles').select('*');
            if (data) users = data;
            if (!users.find(u => u.username === currentUser)) {
                await supabase.from('profiles').insert([{ username: currentUser, status: "ახალი მოთამაშე" }]);
                users.push({ username: currentUser, status: "ახალი მოთამაშე", avatar_url: null });
            }
            document.getElementById('profileName').innerHTML = currentUser;
            let user = users.find(u => u.username === currentUser);
            if (user?.avatar_url) {
                document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar_url})`;
                document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                document.getElementById('profileAvatar').innerHTML = '';
            }
            if (user?.status) document.getElementById('statusInput').value = user.status;
        }
        
        async function loadMessages() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
            if (data) messages = data;
            if (currentRoom) renderMessages();
        }
        
        async function loadPrivateMessages() {
            const { data } = await supabase.from('private_messages').select('*').order('created_at', { ascending: true });
            if (data) privateMessages = data;
            renderPrivateChatsList();
        }
        
        async function loadFriendRequests() {
            const { data } = await supabase.from('friend_requests').select('*');
            if (data) friendRequests = data;
            renderFriendRequestsList();
        }
        
        async function loadEmojis() {
            const { data } = await supabase.from('emojis').select('*');
            if (data) customEmojis = data.map(e => e.emoji_url);
        }
        
        async function loadUserAlbums() {
            const { data } = await supabase.from('user_albums').select('*');
            if (data) {
                userAlbums = {};
                data.forEach(item => {
                    if (!userAlbums[item.username]) userAlbums[item.username] = [];
                    userAlbums[item.username].push(item.photo_url);
                });
            }
            renderAlbum();
        }
        
        async function loadPhotoInteractions() {
            const { data } = await supabase.from('photo_interactions').select('*');
            if (data) {
                photoInteractions = {};
                data.forEach(item => {
                    photoInteractions[item.photo_url] = {
                        likes: item.likes || [],
                        comments: item.comments || []
                    };
                });
            }
        }
        
        async function saveMessage(msg) {
            await supabase.from('messages').insert([{
                user_name: msg.username,
                text: msg.text,
                room_name: msg.room,
                image: msg.image,
                created_at: msg.time
            }]);
        }
        
        async function savePrivateMessage(msg) {

                text: msg.text,
                created_at: msg.time

                from_user: req.from,
                to_user: req.to,
                status: req.status
            }]);
        }
        
        async function saveEmoji(url) {
            await supabase.from('emojis').insert([{ emoji_url: url }]);

            await supabase.from('user_albums').insert([{ username: username, photo_url: photoUrl }]);

        async function savePhotoInteraction(photoUrl, likes, comments) {
            const { data: existing } = await supabase.from('photo_interactions').select('*').eq('photo_url', photoUrl).maybeSingle();
            if (existing) {
                await supabase.from('photo_interactions').update({ likes: likes, comments: comments }).eq('photo_url', photoUrl);

                await supabase.from('photo_interactions').insert([{ photo_url: photoUrl, likes: likes, comments: comments }]);

        function subscribeToMessages() {
            if (currentChannel) supabase.removeChannel(currentChannel);
            currentChannel = supabase
                .channel('messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                    if (payload.new.room_name === currentRoom && payload.new.user_name !== currentUser) {
                        messages.push(payload.new);
                        renderMessages();
                        spawnHeart();
                    }
                })
                .subscribe();
        }
        
        function openEmojiPanel(target) {
            currentEmojiTarget = target;
            let panel = document.getElementById('emojiPanel');
            if (panel.classList.contains('active')) { panel.classList.remove('active'); return; }
            let defaultEmojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺', '💀', '👑', '💪', '🤡', '👻', '⭐'];
            let allEmojis = [...defaultEmojis, ...customEmojis];
            panel.innerHTML = '';
            allEmojis.forEach(emoji => {
                let div = document.createElement('div');
                div.className = 'emoji-item';
                if (typeof emoji === 'string' && emoji.startsWith('http')) {
                    div.innerHTML = `<img src="${emoji}" style="width:42px; height:42px; object-fit:cover; border-radius:8px;">`;
                    div.onclick = () => {
                        let input = target === 'chat' ? document.getElementById('messageInput') : document.getElementById('pmInput');
                        if(input) input.value += ` :img:${emoji}: `;
                        panel.classList.remove('active');
                    };
                } else {
                    div.textContent = emoji;
                    div.onclick = () => {
                        let input = target === 'chat' ? document.getElementById('messageInput') : document.getElementById('pmInput');
                        if(input) input.value += emoji;
                        panel.classList.remove('active');
                    };
                }
                panel.appendChild(div);
            });
            if (ADMINS.includes(currentUser) || currentUser === OWNER) {
                let addBtn = document.createElement('div');
                addBtn.className = 'emoji-item';
                addBtn.textContent = '➕';
                addBtn.style.background = '#8b0000';
                addBtn.onclick = () => { panel.classList.remove('active'); document.getElementById('emojiUploadInput').click(); };
                panel.appendChild(addBtn);
            }
            panel.classList.add('active');
        }
        
        function uploadEmojiImage(input) {
            let file = input.files[0];
            if (file && (ADMINS.includes(currentUser) || currentUser === OWNER)) {
                let reader = new FileReader();
                reader.onload = async (e) => {
                    customEmojis.push(e.target.result);
                    await saveEmoji(e.target.result);
                    showNotification('✅ ემოჯი დაემატა!');
                };
                reader.readAsDataURL(file);
            } else showNotification('❌ ემოჯის დამატება მხოლოდ ადმინებს შეუძლიათ!');
            input.value = '';
        }
        
        async function renderAlbum() {

            let container = document.getElementById('albumGrid');
            let userAlbum = userAlbums[currentUser] || [];
            if (userAlbum.length === 0) {
                container.innerHTML = '<div class="empty-state">ალბომი ცარიელია</div>';

        async function addToAlbum(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = async (e) => {
                    await saveUserPhoto(currentUser, e.target.result);

                    showNotification('📸 ფოტო დაემატა ალბომში!');

        async function setAsProfilePhoto(photoUrl) {
            await supabase.from('profiles').update({ avatar_url: photoUrl }).eq('username', currentUser);
            document.getElementById('profileAvatar').style.backgroundImage = `url(${photoUrl})`;
            document.getElementById('profileAvatar').style.backgroundSize = 'cover';
            document.getElementById('profileAvatar').innerHTML = '';
            showNotification('✅ პროფილის ფოტო განახლდა!');
        }
        
        function openPhotoModal(photoUrl) {
            let interactions = photoInteractions[photoUrl] || { likes: [], comments: [] };
            let hasLiked = interactions.likes.includes(currentUser);
            let modal = document.createElement('div');

                <div class="photo-modal-content">
                    <img src="${photoUrl}" class="photo-modal-img">
                    <div class="photo-actions">
                        <button class="like-btn ${hasLiked ? 'active' : ''}" onclick="likePhoto('${photoUrl}', this)">❤️ ${interactions.likes.length}</button>

        async function likePhoto(photoUrl, btn) {
            if (!photoInteractions[photoUrl]) photoInteractions[photoUrl] = { likes: [], comments: [] };
            let idx = photoInteractions[photoUrl].likes.indexOf(currentUser);
            if (idx === -1) photoInteractions[photoUrl].likes.push(currentUser);
            else photoInteractions[photoUrl].likes.splice(idx, 1);
            await savePhotoInteraction(photoUrl, photoInteractions[photoUrl].likes, photoInteractions[photoUrl].comments);
            btn.innerHTML = `❤️ ${photoInteractions[photoUrl].likes.length}`;
            btn.classList.toggle('active');
        }
        
        async function addPhotoComment(photoUrl) {
            let input = document.getElementById('photoCommentInput');
            let text = input.value.trim();
            if (!text) return;
            if (!photoInteractions[photoUrl]) photoInteractions[photoUrl] = { likes: [], comments: [] };
            photoInteractions[photoUrl].comments.push({ user: currentUser, text: text, time: Date.now() });
            await savePhotoInteraction(photoUrl, photoInteractions[photoUrl].likes, photoInteractions[photoUrl].comments);
            let commentsDiv = document.getElementById('photoComments');
            commentsDiv.innerHTML = photoInteractions[photoUrl].comments.map(c => `<div class="comment-item"><b>${escapeHtml(c.user)}</b>: ${escapeHtml(c.text)}</div>`).join('');
            input.value = '';
        }
        
        async function sendFriendRequest(targetUser) {
            if (targetUser === currentUser) { showNotification('❓ საკუთარ თავს ვერ დაუმატებ'); return; }
            if (friendRequests.some(r => r.from_user === currentUser && r.to_user === targetUser && r.status === 'pending')) {
                showNotification('⏳ მოთხოვნა უკვე გაგზავნილია!'); return;
            }
            if (isFriend(targetUser)) { showNotification('👥 უკვე მეგობრები ხართ!'); return; }
            await supabase.from('friend_requests').insert([{ from_user: currentUser, to_user: targetUser, status: 'pending' }]);
            await loadFriendRequests();
            showNotification(`📨 მოთხოვნა გაეგზავნა ${targetUser}-ს!`);
            renderFriendRequestsList();
            renderOnlineUsers();
        }
        
        async function acceptFriendRequest(fromUser) {
            let request = friendRequests.find(r => r.from_user === fromUser && r.to_user === currentUser && r.status === 'pending');
            if (request) {
                await supabase.from('friend_requests').update({ status: 'accepted' }).eq('id', request.id);
                await loadFriendRequests();
                showNotification(`✅ ${fromUser} დაემატა მეგობრებში!`);
                renderFriendRequestsList();
                renderFriendsList();
                renderOnlineUsers();
            }
        }
        
        async function rejectFriendRequest(fromUser) {
            let request = friendRequests.find(r => r.from_user === fromUser && r.to_user === currentUser && r.status === 'pending');
            if (request) {
                await supabase.from('friend_requests').update({ status: 'rejected' }).eq('id', request.id);
                await loadFriendRequests();
                showNotification(`❌ მოთხოვნა უარყავით`);
                renderFriendRequestsList();
                renderOnlineUsers();
            }
        }
        
        function getFriendsList() {
            return friendRequests.filter(r => r.status === 'accepted' && (r.from_user === currentUser || r.to_user === currentUser))
                .map(r => r.from_user === currentUser ? r.to_user : r.from_user);
        }
        function isFriend(username) { return getFriendsList().includes(username); }
        function hasPendingFromMe(username) { return friendRequests.some(r => r.from_user === currentUser && r.to_user === username && r.status === 'pending'); }
        function hasPendingToMe(username) { return friendRequests.some(r => r.from_user === username && r.to_user === currentUser && r.status === 'pending'); }
        
        async function saveStatus() {
            let status = document.getElementById('statusInput').value;
            await supabase.from('profiles').update({ status: status }).eq('username', currentUser);
            showNotification('✅ სტატუსი განახლდა!');
            renderOnlineUsers();
        }
        
        async function uploadAvatar(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = async (e) => {
                    await supabase.from('profiles').update({ avatar_url: e.target.result }).eq('username', currentUser);
                    document.getElementById('profileAvatar').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                    document.getElementById('profileAvatar').innerHTML = '';
                    renderOnlineUsers();
                    showNotification('✅ ავატარი განახლდა!');
                };
                reader.readAsDataURL(file);
            }
        }
        
        function renderRooms() {
            let html = '';
            ROOMS.forEach(room => {
                html += `<div class="room-card" onclick="openRoom('${room.name}')">
                    <span class="room-icon">${room.icon}</span>
                    <span>${room.name}</span>
                </div>`;

            document.getElementById('roomsList').innerHTML = html;

        function openRoom(roomName) {
            currentRoom = roomName;
            document.getElementById('chatRoomName').innerHTML = `📡 ${roomName}`;
            showPage('chat');
            renderMessages();
            subscribeToMessages();
        }
        
        function closeChat() { currentRoom = null; if (currentChannel) supabase.removeChannel(currentChannel); showPage('home'); }
        
        function renderMessages() {
            let container = document.getElementById('chatMessages');
            if (!currentRoom) return;
            let roomMessages = messages.filter(m => m.room_name === currentRoom).sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
            if (roomMessages.length === 0) {
                container.innerHTML = '<div class="empty-state">💬 შეტყობინებები არ არის</div>';
                return;
            }
            let html = '';
            roomMessages.forEach(msg => {
                let user = users.find(u => u.username === msg.user_name) || {};
                let timeStr = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let avatarHtml = user.avatar_url ? `<img src="${user.avatar_url}" style="width:28px; height:28px; border-radius:50%; object-fit:cover;">` : `<div class="message-avatar">${msg.user_name.charAt(0).toUpperCase()}</div>`;
                let formattedText = escapeHtml(msg.text);
                formattedText = formattedText.replace(/:img:(.*?):/g, '<img src="$1" style="width:28px; height:28px; object-fit:cover; border-radius:6px; vertical-align:middle;">');
                let canDelete = (currentUser === OWNER) || ADMINS.includes(currentUser);
                html += `<div class="message ${msg.user_name === currentUser ? 'own' : ''}">
                    <div class="message-header">
                        ${avatarHtml}
                        <span class="message-name" onclick="showUserProfile('${msg.user_name}')">${escapeHtml(msg.user_name)}</span>
                        <span class="message-time">${timeStr}</span>
                    </div>
                    <div class="message-text">${formattedText}${msg.image ? `<img src="${msg.image}" onclick="openPhotoModal('${msg.image}')">` : ''}</div>
                    ${canDelete ? `<button class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</button>` : ''}
                </div>`;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendMessage() {
            let input = document.getElementById('messageInput');
            let text = input.value.trim();
            let pendingImage = window.pendingImage;
            if (!text && !pendingImage) return;
            if (!currentRoom) return;
            let newMsg = { username: currentUser, text: text || "", time: new Date().toISOString(), room: currentRoom, image: pendingImage || null };
            await saveMessage(newMsg);
            await loadMessages();
            input.value = '';
            window.pendingImage = null;
            renderMessages();
            spawnHeart();
        }
        
        async function deleteMessage(msgId) {
            if (currentUser === OWNER || ADMINS.includes(currentUser)) {
                await supabase.from('messages').delete().eq('id', msgId);
                await loadMessages();
                renderMessages();
                showNotification('✅ შეტყობინება წაიშალა!');
            } else {
                showNotification('❌ წაშლა მხოლოდ ადმინებს შეუძლიათ!');
            }
        }
        
        function addPhotoToMessage(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    window.pendingImage = e.target.result;
                    showNotification('📷 ფოტო დაემატა! დააჭირე გაგზავნას');
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }
        
        function showUserProfile(username) {
            let user = users.find(u => u.username === username);
            if (!user) return;
            let isFriendUser = isFriend(username);
            let pendingFromMe = hasPendingFromMe(username);
            let pendingToMe = hasPendingToMe(username);
            let modal = document.createElement('div');
            modal.className = 'profile-modal';
            modal.innerHTML = `
                <div class="profile-modal-content">
                    <div class="profile-modal-header">
                        <button class="profile-modal-close" onclick="this.closest('.profile-modal').remove()">✕</button>
                        <div class="profile-modal-avatar" style="${user.avatar_url ? `background-image:url(${user.avatar_url}); background-size:cover;` : ''}">${user.avatar_url ? '' : user.username.charAt(0).toUpperCase()}</div>
                        <h3>${escapeHtml(user.username)}</h3>
                        <div>${escapeHtml(user.status || 'ონლაინ')}</div>
                    </div>
                    <div class="profile-actions">
                        ${!isFriendUser && username !== currentUser && !pendingFromMe && !pendingToMe ? `<button class="action-btn success" onclick="sendFriendRequest('${username}'); this.closest('.profile-modal').remove()">➕ მეგობრობის მოთხოვნა</button>` : ''}
                        ${pendingFromMe ? `<button class="action-btn" disabled style="background:orange;">⏳ მოთხოვნა გაგზავნილია</button>` : ''}
                        ${pendingToMe ? `<button class="action-btn success" onclick="acceptFriendRequest('${username}'); this.closest('.profile-modal').remove()">✅ მიღება</button><button class="action-btn danger" onclick="rejectFriendRequest('${username}'); this.closest('.profile-modal').remove()">❌ უარყოფა</button>` : ''}
                        ${isFriendUser ? `<button class="action-btn success" disabled>✅ მეგობარი</button>` : ''}
                        <button class="action-btn" onclick="startPM('${username}'); this.closest('.profile-modal').remove()">💬 მიწერა</button>
                    </div>
                    ${currentUser === OWNER && username !== currentUser ? `
                        <div class="profile-actions">
                            <button class="action-btn success" onclick="makeOwner('${username}'); this.closest('.profile-modal').remove()">👑 დამფუძნებლად</button>
                            <button class="action-btn" onclick="makeAdmin('${username}'); this.closest('.profile-modal').remove()">🔧 ადმინად</button>
                            <button class="action-btn danger" onclick="removeAdmin('${username}'); this.closest('.profile-modal').remove()">🔻 ადმინის ჩამორთმევა</button>
                        </div>
                    ` : ''}
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        async function makeOwner(username) {
            await supabase.from('profiles').update({ role: 'owner', status: '👑 დამფუძნებელი' }).eq('username', username);
            await loadUsers();
            showNotification(`✅ ${username} დამფუძნებელი გახდა!`);
            renderOnlineUsers();
        }
        
        async function makeAdmin(username) {
            await supabase.from('profiles').update({ role: 'admin', status: '🔧 ადმინი' }).eq('username', username);
            await loadUsers();
            showNotification(`✅ ${username} ადმინად დაინიშნა!`);
            renderOnlineUsers();
        }
        
        async function removeAdmin(username) {
            await supabase.from('profiles').update({ role: 'user', status: 'ონლაინ' }).eq('username', username);
            await loadUsers();
            showNotification(`🔻 ${username} ადმინის უფლებები ჩამოერთვა!`);
            renderOnlineUsers();
        }
        
        function renderOnlineUsers() {
            let container = document.getElementById('onlineList');
            let html = '';
            users.filter(u => u.username !== currentUser).forEach(user => {
                let isFriendUser = isFriend(user.username);
                let pendingFromMe = hasPendingFromMe(user.username);
                let pendingToMe = hasPendingToMe(user.username);
                let badge = '';
                if (isFriendUser) badge = '<div class="friend-badge">✅ მეგობარი</div>';
                else if (pendingFromMe) badge = '<div class="request-badge" style="background:orange;">⏳ მოთხოვნა</div>';
                else if (pendingToMe) badge = '<div class="request-badge" style="background:gold; color:black;" onclick="event.stopPropagation(); acceptFriendRequest(\''+user.username+'\')">✅ მიღება</div>';
                else badge = '<div class="add-badge" onclick="event.stopPropagation(); sendFriendRequest(\''+user.username+'\')">➕ დამატება</div>';
                html += `<div class="user-item" onclick="showUserProfile('${user.username}')">
                    <div class="user-avatar" style="${user.avatar_url ? `background-image:url(${user.avatar_url}); background-size:cover;` : ''}">${user.avatar_url ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(user.username)}</div><div class="user-status">${escapeHtml(user.status || 'ონლაინ')}</div></div>
                    ${badge}
                </div>`;
            });
            container.innerHTML = html || '<div class="empty-state">მომხმარებლები არ არიან</div>';
        }
        
        function renderFriendsList() {
            let container = document.getElementById('friendsList');
            let friendsList = getFriendsList();
            let friendUsers = users.filter(u => friendsList.includes(u.username));
            if (friendUsers.length === 0) {
                container.innerHTML = '<div class="empty-state">მეგობრები არ არიან</div>';
                return;
            }
            let html = '';
            friendUsers.forEach(user => {
                html += `<div class="user-item" onclick="showUserProfile('${user.username}')">
                    <div class="user-avatar" style="${user.avatar_url ? `background-image:url(${user.avatar_url}); background-size:cover;` : ''}">${user.avatar_url ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(user.username)}</div><div class="user-status">${escapeHtml(user.status || 'ონლაინ')}</div></div>
                    <div class="friend-badge">✅ მეგობარი</div>
                </div>`;
            });
            container.innerHTML = html;
        }
        
        function renderFriendRequestsList() {
            let container = document.getElementById('friendRequestsList');
            let pendingRequests = friendRequests.filter(r => r.to_user === currentUser && r.status === 'pending');
            if (pendingRequests.length === 0) {
                container.innerHTML = '<div class="empty-state">მოთხოვნები არ არის</div>';
                return;
            }
            let html = '';
            pendingRequests.forEach(req => {
                let user = users.find(u => u.username === req.from_user);
                html += `<div class="user-item" style="justify-content:space-between;">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="user-avatar" style="${user?.avatar_url ? `background-image:url(${user.avatar_url}); background-size:cover;` : ''}">${user?.avatar_url ? '' : req.from_user.charAt(0).toUpperCase()}</div>
                        <div><div class="user-name">${escapeHtml(req.from_user)}</div><div class="user-status">მეგობრობის მოთხოვნა</div></div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button onclick="acceptFriendRequest('${req.from_user}'); this.closest('.user-item').remove()" style="background:#2d6a4f; border:none; color:white; padding:5px 12px; border-radius:20px;">✅ მიღება</button>
                        <button onclick="rejectFriendRequest('${req.from_user}'); this.closest('.user-item').remove()" style="background:#8b0000; border:none; color:white; padding:5px 12px; border-radius:20px;">❌ უარყოფა</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }
        
        function startPM(username) {
            if (username === currentUser) { showNotification('საკუთარ თავთან არ შეიძლება'); return; }
            if (currentPMUser === username && document.getElementById('pmContainer').innerHTML) { closePM(); return; }
            currentPMUser = username;
            renderPMChat();
        }
        
        function renderPMChat() {
            if (!currentPMUser) return;
            let pmMsgs = privateMessages.filter(m => (m.from_user === currentUser && m.to_user === currentPMUser) || (m.from_user === currentPMUser && m.to_user === currentUser)).sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
            let msgHtml = pmMsgs.map(msg => `<div class="pm-message ${msg.from_user === currentUser ? 'own' : ''}"><div style="font-size:9px; opacity:0.6;">${new Date(msg.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div><div>${escapeHtml(msg.text)}</div></div>`).join('');
            let pmHtml = `<div id="pmContainerInner" class="pm-chat-container"><div class="pm-header" onclick="closePM()"><span>💬 ${escapeHtml(currentPMUser)}</span><span>✕</span></div><div class="pm-messages" id="pmMessages">${msgHtml || '<div class="empty-state" style="padding:20px;">მიმოწერა ცარიელია</div>'}</div><div class="pm-input-area"><button class="icon-btn" style="width:36px; height:36px; font-size:18px;" onclick="openEmojiPanel('pm')">😊</button><input type="text" id="pmInput" class="pm-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()"><button class="icon-btn" style="width:36px; height:36px;" onclick="sendPM()">➤</button></div></div>`;
            document.getElementById('pmContainer').innerHTML = pmHtml;
            let pmDiv = document.getElementById('pmMessages');
            if (pmDiv) pmDiv.scrollTop = pmDiv.scrollHeight;
            document.getElementById('pmInput')?.focus();
        }
        
        function closePM() { document.getElementById('pmContainer').innerHTML = ''; currentPMUser = null; }
        
        async function sendPM() {
            let input = document.getElementById('pmInput');
            let text = input.value.trim();
            if (!text || !currentPMUser) return;
            await savePrivateMessage({ from: currentUser, to: currentPMUser, text: text, time: new Date().toISOString() });
            await loadPrivateMessages();
            input.value = '';
            renderPMChat();
            renderPrivateChatsList();
        }
        
        function renderPrivateChatsList() {
            let myPMs = privateMessages.filter(m => m.from_user === currentUser || m.to_user === currentUser);
            let usersSet = new Set();
            myPMs.forEach(m => { let other = m.from_user === currentUser ? m.to_user : m.from_user; usersSet.add(other); });
            let container = document.getElementById('pmList');
            if (usersSet.size === 0) { container.innerHTML = '<div class="empty-state">ჯერ არ გქონია მიმოწერა</div>'; return; }
            let html = '';
            usersSet.forEach(username => {
                let lastMsg = myPMs.filter(m => (m.from_user === username || m.to_user === username)).pop();
                html += `<div class="user-item" onclick="startPM('${username}')"><div class="user-avatar">${username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(username)}</div><div class="user-status">${lastMsg ? lastMsg.text.substring(0,30) : '...'}</div></div></div>`;
            });
            container.innerHTML = html;
        }
        
        function spawnHeart() {
            let heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['❤️', '💖', '💗', '💕', '💘', '❤️‍🔥'][Math.floor(Math.random()*6)];
            heart.style.left = Math.random() * 90 + '%';
            heart.style.fontSize = (32 + Math.random() * 24) + 'px';
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-page') === pageName) btn.classList.add('active');
            });
            if (pageName === 'online') renderOnlineUsers();
            if (pageName === 'friends') { renderFriendsList(); renderFriendRequestsList(); }
            if (pageName === 'messages') renderPrivateChatsList();
            if (pageName === 'profile') renderAlbum();
        }
        
        function showNotification(msg) {
            let notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2500);
        }
        
        function escapeHtml(text) {
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toggleTheme() {
            document.body.classList.toggle('day-mode');
            let btn = document.getElementById('themeToggle');
            btn.innerHTML = document.body.classList.contains('day-mode') ? '☀️' : '🌙';
        }
        
        async function init() {
            await loadUsers();
            await loadMessages();
            await loadPrivateMessages();
            await loadFriendRequests();
            await loadEmojis();
            await loadPhotoInteractions();
            await loadUserAlbums();
            renderRooms();
            renderOnlineUsers();
            renderFriendsList();
            renderFriendRequestsList();
            renderPrivateChatsList();
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => showPage(btn.getAttribute('data-page')));
            });
            showPage('home');
            setInterval(() => { if (!currentRoom) spawnHeart(); }, 8000);
            console.log("✅ ჩატი სრულად გაშვებულია!");
        }
        
        init();
    </script>
</body>
</html>
