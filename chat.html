<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - FULL SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* შენი ორიგინალი დიზაინი */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #030000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid #4a0000; height: 60px; z-index: 1000; }
        #room-name { flex: 1; text-align: center; color: #ff0000; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle, #1a0000, #030000); padding-bottom: 80px; }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid #4a0000; object-fit: cover; cursor: pointer; }
        .bubble { background: rgba(25, 0, 0, 0.9); border: 1px solid #660000; padding: 8px 12px; border-radius: 4px 18px 18px 18px; max-width: 85%; }
        .m-nick { font-weight: bold; color: #ff3333; font-size: 12px; margin-bottom: 4px; cursor: pointer; }
        .input-zone { position: fixed; bottom: 0; width: 100%; background: black; padding: 12px; display: flex; gap: 10px; border-top: 2px solid #4a0000; z-index: 2000; }
        .input-zone input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #660000; background: #080000; color: white; outline: none; }
        .sidebar, .online-sidebar { position: fixed; top: 0; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; border: 1px solid #400; overflow-y: auto; }
        .sidebar { left: -280px; } .sidebar.active { left: 0; }
        .online-sidebar { right: -280px; } .online-sidebar.active { right: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3500; }
        .overlay.active { display: block; }
        .room-item { padding: 14px; border-bottom: 1px solid #1a0000; cursor: pointer; color: #ccc; font-size: 13px; }
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #080000; border: 2px solid #ff0000; padding: 25px; border-radius: 30px; width: 340px; text-align: center; }
        .modal-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #4a0000; background: #1a0000; color: white; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onload="init()">

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 20px; text-align: center; border-bottom: 1px solid #222;">
        <img id="my-ava" src="" style="width:75px; height:75px; border-radius:50%; border:2px solid red;">
        <div id="my-nick" style="color:red; font-weight:bold; margin-top:10px;"></div>
        <div id="my-status" style="font-size:11px; color:#0c0; cursor:pointer;" onclick="changeStatus()">💬 სტატუსის შეცვლა</div>
    </div>
    <div onclick="changeRoom('☕ კაფე-ბარი')" class="room-item">☕ კაფე-ბარი</div>
    <div onclick="changeRoom('💎 ვიპ საუბრები')" class="room-item">💎 ვიპ საუბრები</div>
    <div onclick="changeRoom('🕴 მაფიის ღამე')" class="room-item">🕴 მაფიის ღამე</div>
    <div onclick="changeRoom('🔐 შიფროგრამა')" class="room-item">🔐 შიფროგრამა</div>
    <div onclick="changeRoom('❓ ვიქტორინა')" class="room-item">❓ ვიქტორინა</div>
    <div onclick="changeRoom('🛡️ ჩამოხრჩობანა')" class="room-item">🛡️ ჩამოხრჩობანა</div>
    <div onclick="changeRoom('🃏 ჯოკერი')" class="room-item">🃏 ჯოკერი</div>
    <div onclick="changeRoom('🔱 ნარდი')" class="room-item">🔱 ნარდი</div>
    <div onclick="changeRoom('🔞 ანონიმური')" class="room-item">🔞 ანონიმური</div>
    <div onclick="changeRoom('🎵 მუსიკა')" class="room-item">🎵 მუსიკა</div>
    <div onclick="changeRoom('📸 ფოტოები')" class="room-item">📸 ფოტოები</div>
    <div onclick="changeRoom('🛡️ ადმინისტრაცია')" class="room-item">🛡️ ადმინისტრაცია</div>
</div>

<div class="online-sidebar" id="online-sidebar">
    <div style="padding:15px; color:#0f0; text-align:center;">🟢 ონლაინში</div>
    <div id="online-list"></div>
</div>

<div class="topbar">
    <div onclick="toggleMenu('sidebar')" style="cursor:pointer; font-size:24px;">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
    <div onclick="toggleMenu('online-sidebar'); loadOnline();" style="cursor:pointer; font-size:24px;">👥</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()" style="color:cyan; background:none; border:none; font-size:24px;">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="t-ava" style="width:100px; height:100px; border-radius:50%; border:2px solid red;">
        <h2 id="t-nick" style="color:red; margin:10px 0;"></h2>
        <div id="t-stats" style="color:#aaa; font-size:13px; margin-bottom:15px;"></div>
        <button class="modal-btn" style="background:#004d4d" onclick="location.href='pm.html?to='+targetUser">✉️ მიმოწერა</button>
        <div id="admin-tools"></div>
        <button class="modal-btn" style="background:#222" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), myRole = "Member", currentRoom = "☕ კაფე-ბარი", targetUser = "";

    async function init() {
        if (!myNick) { location.href = 'index.html'; return; }
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).single();
        if (p) {
            myRole = p.role;
            document.getElementById('my-nick').innerText = p.username;
            document.getElementById('my-ava').src = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
            if(p.status) document.getElementById('my-status').innerText = "💬 " + p.status;
            
            // თამაშების და ონლაინის განახლება
            setInterval(runGames, 9000);
            setInterval(() => _s.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick), 20000);
        }
        loadMsgs();
        _s.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMsgs).subscribe();
    }

    async function runGames() {
        if (currentRoom === '❓ ვიქტორინა') {
            const { data: q } = await _s.from('quiz_questions').select('*');
            if (q?.length) {
                const r = q[Math.floor(Math.random() * q.length)];
                await _s.from('messages').insert([{ user_name: '🤖 BOT', text: "❓ " + r.question, room_name: '❓ ვიქტორინა' }]);
            }
        }
    }

    async function loadMsgs() {
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true }).limit(50);
        const { data: profs } = await _s.from('profiles').select('username, avatar_url');
        const box = document.getElementById("chat");
        box.innerHTML = (msgs || []).map(m => {
            const u = profs?.find(x => x.username === m.user_name);
            return `
            <div class="msg-container">
                <img src="${u?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar" onclick="openProfile('${m.user_name}')">
                <div class="bubble">
                    <div class="m-nick" onclick="openProfile('${m.user_name}')">${m.user_name}</div>
                    <div class="m-text">${m.text}</div>
                </div>
            </div>`;
        }).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function openProfile(name) {
        if (name === '🤖 BOT') return;
        targetUser = name;
        const { data: p } = await _s.from('profiles').select('*').eq('username', name).single();
        if (!p) return;
        document.getElementById('t-ava').src = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
        document.getElementById('t-nick').innerText = p.username;
        document.getElementById('t-stats').innerHTML = `👤 როლი: ${p.role}<br>🏆 ვიქტორინა: ${p.quiz_pts || 0}<br>🔐 შიფროგრამა: ${p.cipher_pts || 0}<br>💬 ${p.status || ''}`;
        
        const tools = document.getElementById('admin-tools');
        tools.innerHTML = "";
        if (myRole === "Owner" && name !== myNick) {
            tools.innerHTML = `
                <button class="modal-btn" onclick="updateRole('Admin')">🛡️ ადმინად დანიშვნა</button>
                <button class="modal-btn" onclick="updateRole('Owner')">👑 დამფუძნებლად დანიშვნა</button>
                <button class="modal-btn" onclick="updateRole('Member')">✨ როლის ჩახსნა</button>
                <button class="modal-btn" style="color:red" onclick="updateRole('Banned')">🚫 დაბლოკვა (BAN)</button>`;
        }
        document.getElementById('userModal').style.display = "flex";
    }

    async function loadOnline() {
        const { data: u } = await _s.from('profiles').select('*');
        const online = u.filter(x => new Date() - new Date(x.last_online) < 60000);
        document.getElementById('online-list').innerHTML = online.map(x => `
            <div style="padding:10px; display:flex; align-items:center; gap:10px; cursor:pointer; border-bottom:1px solid #111;" onclick="openProfile('${x.username}')">
                <img src="${x.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" style="width:35px; height:35px; border-radius:50%; border:1px solid #333;">
                <span>${x.username}</span>
            </div>`).join('');
    }

    async function send() {
        const i = document.getElementById("msg-input");
        if (!i.value.trim() || myRole === "Banned") return;
        await _s.from('messages').insert([{ user_name: myNick, text: i.value, room_name: currentRoom }]);
        i.value = "";
    }

    async function updateRole(r) { await _s.from('profiles').update({ role: r }).eq('username', targetUser); closeModal(); }
    function changeStatus() { const s = prompt("ახალი სტატუსი:"); if(s) _s.from('profiles').update({ status: s }).eq('username', myNick).then(() => location.reload()); }
    function toggleMenu(id) { document.getElementById(id).classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function closeAll() { document.querySelectorAll('.sidebar, .online-sidebar, .overlay').forEach(e => e.classList.remove('active')); }
    function closeModal() { document.getElementById('userModal').style.display = "none"; }
    function changeRoom(n) { currentRoom = n; document.getElementById('room-name').innerText = n; closeAll(); loadMsgs(); }
</script>
</body>
</html>
