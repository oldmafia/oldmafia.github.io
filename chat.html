<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
:root {
  --bg: #0d0d0d;
  --card: #1a1a1a;
  --accent: #800020;
  --text: white;
}

.light {
  --bg: #f5e6d3;
  --card: #fff;
  --accent: #800020;
  --text: black;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ❤️ floating hearts */
.heart {
  position: fixed;
  color: var(--accent);
  font-size: 30px;
  animation: float 6s linear infinite;
  opacity: 0.3;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

/* TOP BAR */
.topbar {
  background: var(--card);
  padding: 15px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
  border-bottom: 2px solid var(--accent);
}

/* ROOMS */
.rooms {
  display: none;
  background: var(--card);
  max-height: 200px;
  overflow-y: auto;
}

.room {
  padding: 10px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.room:hover {
  background: var(--accent);
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: 0;
  top: 60px;
  width: 200px;
  bottom: 0;
  background: var(--card);
  padding: 10px;
}

.sidebar div {
  margin: 10px 0;
  cursor: pointer;
}

/* CHAT */
.chat {
  margin-left: 210px;
  height: calc(100vh - 120px);
  overflow-y: auto;
  padding: 10px;
}

.msg {
  background: var(--card);
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
}

/* INPUT */
.inputArea {
  position: fixed;
  bottom: 0;
  left: 210px;
  right: 0;
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px;
}

</style>
</head>

<body>

<div class="topbar" onclick="toggleRooms()">❤️ MY CHAT</div>

<div class="rooms" id="rooms">
  <div class="room" onclick="changeRoom('Room 1')">Room 1</div>
  <div class="room" onclick="changeRoom('Room 2')">Room 2</div>
  <div class="room" onclick="changeRoom('Room 3')">Room 3</div>
  <div class="room" onclick="changeRoom('Room 4')">Room 4</div>
  <div class="room" onclick="changeRoom('Room 5')">Room 5</div>
  <div class="room" onclick="changeRoom('Room 6')">Room 6</div>
  <div class="room" onclick="changeRoom('Room 7')">Room 7</div>
  <div class="room" onclick="changeRoom('Room 8')">Room 8</div>
  <div class="room" onclick="changeRoom('Room 9')">Room 9</div>
  <div class="room" onclick="changeRoom('Room 10')">Room 10</div>
  <div class="room" onclick="changeRoom('Room 11')">Room 11</div>
  <div class="room" onclick="changeRoom('Room 12')">Room 12</div>
</div>

<div class="sidebar">
  <div>💬 მესინჯერი</div>
  <div>👤 პროფილი</div>
  <div>👥 მეგობრები</div>
  <div>🟢 ონლაინი</div>
  <div>📋 რეგისტრირებულები</div>
  <div onclick="toggleTheme()">🌗 Day/Night</div>
</div>

<div class="chat" id="chat"></div>

<div class="inputArea">
  <input id="msgInput" placeholder="დაწერე...">
  <button onclick="sendMsg()">გაგზავნა</button>
</div>

<script>

// USER (index.html-დან უნდა შეინახო)
const user = JSON.parse(localStorage.getItem("user")) || {
  name: "Guest",
  avatar: "🙂"
};

let currentRoom = "Room 1";

function toggleRooms() {
  const r = document.getElementById("rooms");
  r.style.display = r.style.display === "block" ? "none" : "block";
}

function changeRoom(room) {
  currentRoom = room;
  document.getElementById("chat").innerHTML = "";
}

function sendMsg() {
  const input = document.getElementById("msgInput");
  if (!input.value) return;

  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `${user.avatar} <b>${user.name}</b>: ${input.value}`;

  document.getElementById("chat").appendChild(div);
  input.value = "";
}

// 🌗 theme
function toggleTheme() {
  document.body.classList.toggle("light");
}

// ❤️ hearts
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (20 + Math.random() * 40) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 500);

</script>

</body>
</html>
