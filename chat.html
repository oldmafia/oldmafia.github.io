<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Old Mafia - ჩატი</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
        body {
            --bg: #0a0508; --text: #f0e6e8; --card: #1a0f12; --border: #4a1a2a;
            --nav: #120a0c; --accent: #8b0000; --accent-light: #a52a2a; --accent-dark: #5a0000; --input: #1f1216;
            background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        body.day-mode { --bg: #fff5f0; --text: #2c1a1a; --card: #ffffff; --border: #e6b8a2; --nav: #ffe8e0; --accent: #8b0000; --input: #fffaf5; }
        .nav-bar { display: flex; justify-content: space-around; align-items: center; background: var(--nav); padding: 8px 0; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        .nav-btn { font-size: 22px; background: none; border: none; color: #aa8a8a; cursor: pointer; padding: 6px 12px; border-radius: 30px; }
        .nav-btn.active { color: var(--accent); background: rgba(139, 0, 0, 0.2); }
        .pages { flex: 1; position: relative; overflow: hidden; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; display: none; padding: 12px; }
        .page.active { display: block; }
        .section-title { font-size: 18px; margin-bottom: 12px; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; }
        
        .rooms-list { display: flex; flex-direction: column; gap: 10px; }
        .room-card { background: var(--card); padding: 14px; border-radius: 10px; border: 1px solid var(--border); border-left: 4px solid var(--accent); cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .room-card:active { transform: scale(0.98); background: var(--accent-dark); }
        .room-icon { font-size: 28px; }
        .room-name { font-size: 16px; font-weight: 600; }
        
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-header { background: var(--card); padding: 12px; display: flex; justify-content: space-between; align-items: center; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .chat-room-name { font-size: 18px; font-weight: bold; color: var(--accent); }
        .close-btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .message { background: var(--card); padding: 10px 14px; border-radius: 12px; max-width: 85%; align-self: flex-start; border: 1px solid var(--border); position: relative; }
        .message.owner-message { border-left: 4px solid #ff00ff; }
        .message.admin-message { border-left: 4px solid gold; }
        .message-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
        .message-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; object-fit: cover; }
        .message-name { font-weight: bold; color: var(--accent); font-size: 13px; cursor: pointer; }
        .message-time { font-size: 10px; opacity: 0.5; }
        .message-text { font-size: 14px; word-break: break-word; }
        .delete-msg { position: absolute; right: 8px; top: 8px; background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12px; opacity: 0; transition: 0.2s; }
        .message:hover .delete-msg { opacity: 1; }
        .chat-input-area { background: var(--card); padding: 10px; display: flex; gap: 8px; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); }
        .icon-btn { background: var(--accent-dark); border: none; color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 20px; cursor: pointer; }
        .chat-input { flex: 1; padding: 10px 15px; border-radius: 25px; border: 1px solid var(--accent); background: var(--input); color: var(--text); font-size: 14px; outline: none; }
        .send-btn { background: var(--accent); border: none; color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--card); margin-bottom: 8px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; object-fit: cover; }
        .user-name { font-weight: bold; font-size: 16px; }
        .user-status { font-size: 11px; opacity: 0.6; }
        .friend-badge { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #2d6a4f; color: white; padding: 4px 8px; border-radius: 20px; font-size: 11px; }
        .add-badge { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--accent); color: white; padding: 4px 8px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        
        .emoji-panel {
            position: fixed; bottom: 80px; left: 10px; right: 10px; background: var(--card); border: 2px solid var(--accent);
            border-radius: 16px; display: none; padding: 12px; z-index: 2000; max-height: 320px; overflow-y: auto;
        }
        .emoji-panel.active { display: block; }
        .emoji-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 200px; overflow-y: auto; padding: 5px;
        }
        .emoji-item {
            font-size: 32px; text-align: center; cursor: pointer; padding: 8px; border-radius: 8px; transition: 0.2s;
        }
        .emoji-item:hover { background: var(--accent); transform: scale(1.05); }
        
        .profile-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
        .profile-modal-content { background: var(--card); border-radius: 20px; max-width: 350px; width: 100%; max-height: 85vh; overflow-y: auto; border: 2px solid var(--accent); }
        .profile-modal-header { background: var(--accent); padding: 15px; text-align: center; position: relative; }
        .profile-modal-close { position: absolute; right: 15px; top: 15px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .profile-modal-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--accent-dark); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto; object-fit: cover; }
        .profile-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 10px; border-top: 1px solid var(--border); }
        .action-btn { background: var(--accent-dark); border: none; color: white; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 13px; }
        
        .pm-chat-container { position: fixed; bottom: 20px; right: 20px; width: 320px; max-width: calc(100% - 40px); height: 450px; max-height: 55vh; background: var(--card); border: 2px solid var(--accent); border-radius: 16px; display: flex; flex-direction: column; z-index: 2000; }
        @media (max-width: 768px) { .pm-chat-container { width: 85%; right: 7.5%; left: 7.5%; bottom: 10px; height: 45vh; } }
        .pm-header { background: var(--accent); padding: 10px 12px; display: flex; justify-content: space-between; border-radius: 14px 14px 0 0; cursor: pointer; }
        .pm-messages { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .pm-message { background: var(--input); padding: 6px 10px; border-radius: 12px; max-width: 85%; align-self: flex-start; }
        .pm-message.own { align-self: flex-end; background: var(--accent); }
        .pm-input-area { display: flex; padding: 8px; gap: 8px; border-top: 1px solid var(--border); }
        .pm-input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid var(--accent); background: var(--input); color: var(--text); }
        
        .profile-card { text-align: center; padding: 20px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto; cursor: pointer; object-fit: cover; }
        .status-input { width: 80%; margin-top: 15px; padding: 10px; border-radius: 25px; border: 1px solid var(--accent); background: var(--input); color: var(--text); text-align: center; }
        .empty-state { text-align: center; padding: 40px; opacity: 0.5; }
        .notification { position: fixed; top: 70px; right: 10px; background: var(--accent); color: white; padding: 10px 15px; border-radius: 20px; z-index: 5000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .current-user-info {
            background: var(--accent); color: white; padding: 5px 15px; font-size: 14px; text-align: center;
        }
    </style>
</head>
<body>
    <div class="current-user-info" id="userInfo"></div>
    
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="friends">👥</button>
        <button class="nav-btn" data-page="online">🌐</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeToggle">🌙</button>
    </div>

    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 12 სათამაშო ოთახი</div>
            <div id="roomsList" class="rooms-list"></div>
        </div>
        <div id="messagesPage" class="page"><div class="section-title">💬 პირადი მიმოწერა</div><div id="pmList"></div></div>
        <div id="friendsPage" class="page"><div class="section-title">👥 ჩემი მეგობრები</div><div id="friendsList"></div><div class="section-title" style="margin-top:20px;">📨 მეგობრობის მოთხოვნები</div><div id="friendRequestsList"></div></div>
        <div id="onlinePage" class="page"><div class="section-title">🌐 ყველა მომხმარებელი</div><div id="onlineList"></div></div>
        <div id="profilePage" class="page">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()">👤</div>
                <h2 id="profileName"></h2>
                <input type="text" id="statusInput" class="status-input" placeholder="სტატუსი...">
                <button class="upload-btn" onclick="saveStatus()" style="background: var(--accent); border: none; color: white; padding: 10px; border-radius: 25px; margin: 10px 0; cursor: pointer; width: 100%;">💾 სტატუსის შენახვა</button>
                <input type="file" id="avatarInput" hidden accept="image/*" onchange="uploadAvatar(this)">
            </div>
        </div>
        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-header"><span class="chat-room-name" id="chatRoomName">ოთახი</span><button class="close-btn" onclick="closeChat()">✕</button></div>
                <div id="chatMessages" class="messages"></div>
                <div class="chat-input-area">
                    <button class="icon-btn" onclick="toggleEmojiPanel()">😊</button>
                    <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>
    <div id="emojiPanel" class="emoji-panel"></div>
    <div id="hearts"></div>
    <div id="pmContainer"></div>

    <script>
        // ============ მომხმარებლები (წინასწარ რეგისტრირებული) ============
        let currentUser = null;
        let currentRoom = null;
        let currentPMUser = null;
        const OWNER = "Abu007";
        
        let users = [];
        let messages = [];
        let privateMessages = [];
        let friendRequests = [];
        
        const ROOMS = [
            { icon: "☕", name: "კაფე-ბარი" }, { icon: "🎲", name: "ნარდი" }, { icon: "🃏", name: "ჯოკერი" },
            { icon: "💎", name: "VIP" }, { icon: "📝", name: "ფორუმი" }, { icon: "🛠️", name: "ადმინები" },
            { icon: "😂", name: "იუმორი" }, { icon: "🏆", name: "შიფროგრამა" }, { icon: "🎭", name: "გამოძიება" },
            { icon: "🎵", name: "მუსიკა" }, { icon: "⁉️", name: "ვიქტორინა" }, { icon: "🆘", name: "დახმარება" }
        ];
        
        // ============ მონაცემების ჩატვირთვა ============
        function loadData() {
            // მომხმარებლების ჩატვირთვა
            const savedUsers = localStorage.getItem('mafia_users_global');
            if (savedUsers) {
                users = JSON.parse(savedUsers);
            } else {
                users = [
                    { username: "Abu007", status: "👑 დამფუძნებელი", avatar: null, role: "owner" },
                    { username: "Lukinio", status: "🔧 ადმინი", avatar: null, role: "admin" },
                    { username: "Giorgi", status: "ონლაინ", avatar: null, role: "user" },
                    { username: "Nika", status: "ონლაინ", avatar: null, role: "user" }
                ];
                saveUsers();
            }
            
            // შეტყობინებების ჩატვირთვა
            const savedMessages = localStorage.getItem('mafia_messages_global');
            if (savedMessages) {
                messages = JSON.parse(savedMessages);
            } else {
                messages = [];
            }
            
            // პირადი შეტყობინებები
            const savedPM = localStorage.getItem('mafia_pm_global');
            if (savedPM) {
                privateMessages = JSON.parse(savedPM);
            } else {
                privateMessages = [];
            }
            
            // მეგობრობის მოთხოვნები
            const savedRequests = localStorage.getItem('mafia_friend_requests');
            if (savedRequests) {
                friendRequests = JSON.parse(savedRequests);
            } else {
                friendRequests = [];
            }
            
            console.log("📥 მონაცემები ჩაიტვირთა. შეტყობინებების რაოდენობა:", messages.length);
        }
        
        function saveUsers() { localStorage.setItem('mafia_users_global', JSON.stringify(users)); }
        function saveMessages() { localStorage.setItem('mafia_messages_global', JSON.stringify(messages)); }
        function savePM() { localStorage.setItem('mafia_pm_global', JSON.stringify(privateMessages)); }
        function saveRequests() { localStorage.setItem('mafia_friend_requests', JSON.stringify(friendRequests)); }
        
        // ============ მომხმარებლის შერჩევა (პირდაპირ ბაზიდან) ============
        function selectUser() {
            // მომხმარებლის არჩევა - შეგიძლიათ შეცვალოთ რომელი მომხმარებელი იყოს აქტიური
            // მაგალითად, URL-დან ან localStorage-დან
            let savedUser = localStorage.getItem('mafia_current_user');
            if (savedUser && users.find(u => u.username === savedUser)) {
                currentUser = savedUser;
            } else {
                // თუ არ არის შენახული, აიღე პირველი მომხმარებელი
                currentUser = users[0]?.username || "Abu007";
            }
            
            document.getElementById('userInfo').innerHTML = `👤 მიმდინარე მომხმარებელი: ${currentUser} ${currentUser === OWNER ? '👑' : ''}`;
            document.getElementById('profileName').innerHTML = currentUser;
            
            const user = users.find(u => u.username === currentUser);
            if (user?.avatar) {
                document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar})`;
                document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                document.getElementById('profileAvatar').innerHTML = '';
            } else {
                document.getElementById('profileAvatar').style.backgroundImage = '';
                document.getElementById('profileAvatar').innerHTML = currentUser.charAt(0).toUpperCase();
            }
            if (user?.status) document.getElementById('statusInput').value = user.status;
        }
        
        // ============ მეგობრები ============
        function sendFriendRequest(targetUser) {
            if (targetUser === currentUser) { showNotification('❓ საკუთარ თავს ვერ დაუმატებ'); return; }
            if (friendRequests.some(r => r.from === currentUser && r.to === targetUser && r.status === 'pending')) {
                showNotification('⏳ მოთხოვნა უკვე გაგზავნილია!'); return;
            }
            if (isFriend(targetUser)) { showNotification('👥 უკვე მეგობრები ხართ!'); return; }
            friendRequests.push({ from: currentUser, to: targetUser, status: 'pending', date: Date.now() });
            saveRequests();
            showNotification(`📨 მოთხოვნა გაეგზავნა ${targetUser}-ს!`);
            renderFriendRequestsList();
            renderOnlineUsers();
        }
        
        function acceptFriendRequest(fromUser) {
            const request = friendRequests.find(r => r.from === fromUser && r.to === currentUser && r.status === 'pending');
            if (request) { request.status = 'accepted'; saveRequests(); showNotification(`✅ ${fromUser} დაემატა!`); renderFriendRequestsList(); renderFriendsList(); renderOnlineUsers(); }
        }
        
        function rejectFriendRequest(fromUser) {
            const request = friendRequests.find(r => r.from === fromUser && r.to === currentUser && r.status === 'pending');
            if (request) { request.status = 'rejected'; saveRequests(); showNotification(`❌ უარყავით`); renderFriendRequestsList(); renderOnlineUsers(); }
        }
        
        function getFriendsList() { return friendRequests.filter(r => r.status === 'accepted' && (r.from === currentUser || r.to === currentUser)).map(r => r.from === currentUser ? r.to : r.from); }
        function isFriend(username) { return getFriendsList().includes(username); }
        
        function saveStatus() {
            const newStatus = document.getElementById('statusInput').value;
            const user = users.find(u => u.username === currentUser);
            if (user) { user.status = newStatus; saveUsers(); showNotification('✅ სტატუსი განახლდა!'); renderOnlineUsers(); if(currentRoom) renderMessages(); }
        }
        
        function uploadAvatar(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const user = users.find(u => u.username === currentUser);
                    if (user) user.avatar = e.target.result;
                    saveUsers();
                    selectUser();
                    renderOnlineUsers(); if (currentRoom) renderMessages();
                    showNotification('✅ ავატარი განახლდა!');
                };
                reader.readAsDataURL(file);
            }
        }
        
        // ============ ოთახები ============
        function renderRooms() {
            const container = document.getElementById('roomsList');
            container.innerHTML = ROOMS.map(room => `
                <div class="room-card" onclick="openRoom('${room.name}')">
                    <span class="room-icon">${room.icon}</span>
                    <span class="room-name">${room.name}</span>
                </div>
            `).join('');
        }
        
        function openRoom(roomName) {
            currentRoom = roomName;
            document.getElementById('chatRoomName').innerHTML = `📡 ${roomName}`;
            showPage('chat');
            renderMessages();
        }
        
        function closeChat() { currentRoom = null; showPage('home'); }
        
        function renderMessages() {
            const container = document.getElementById('chatMessages');
            if (!container || !currentRoom) return;
            
            // ვიღებთ მიმდინარე ოთახის შეტყობინებებს
            const roomMessages = messages.filter(m => m.room === currentRoom).sort((a,b) => new Date(a.time) - new Date(b.time));
            
            if (roomMessages.length === 0) { 
                container.innerHTML = '<div class="empty-state">💬 შეტყობინებები არ არის</div>'; 
                return; 
            }
            
            container.innerHTML = roomMessages.map(msg => {
                const user = users.find(u => u.username === msg.username) || { avatar: null };
                const isOwner = msg.username === OWNER;
                const isAdmin = users.find(u => u.username === msg.username)?.role === 'admin';
                const timeStr = new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const avatarHtml = user?.avatar ? `<img src="${user.avatar}" style="width:28px; height:28px; border-radius:50%; object-fit:cover;">` : `<div class="message-avatar">${msg.username.charAt(0).toUpperCase()}</div>`;
                let extraClass = isOwner ? 'owner-message' : (isAdmin ? 'admin-message' : '');
                const canDelete = currentUser === OWNER || users.find(u => u.username === currentUser)?.role === 'admin';
                return `<div class="message ${extraClass}">
                    <div class="message-header">
                        ${avatarHtml}
                        <span class="message-name" onclick="showUserProfile('${msg.username}')">${escapeHtml(msg.username)}</span>
                        <span class="message-time">${timeStr}</span>
                    </div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    ${canDelete ? `<button class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</button>` : ''}
                </div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMessage() {
            if (!currentRoom) { showNotification('ჯერ ოთახი არ არის არჩეული!'); return; }
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const newMsg = { 
                id: Date.now(), 
                username: currentUser, 
                text: text, 
                time: new Date().toISOString(), 
                room: currentRoom 
            };
            
            messages.push(newMsg);
            saveMessages();
            input.value = '';
            renderMessages();
            
            console.log(`📨 შეტყობინება გაიგზავნა ოთახში "${currentRoom}": ${text}`);
            showNotification('✅ შეტყობინება გაიგზავნა!');
        }
        
        function deleteMessage(msgId) { 
            const msg = messages.find(m => m.id === msgId); 
            if (!msg) return; 
            const isAdmin = users.find(u => u.username === currentUser)?.role === 'admin';
            if (currentUser === OWNER || isAdmin) { 
                messages = messages.filter(m => m.id !== msgId); 
                saveMessages(); 
                renderMessages(); 
                showNotification('✅ შეტყობინება წაიშალა!');
            } else { 
                showNotification('❌ შეტყობინების წაშლა მხოლოდ ადმინს შეუძლია!'); 
            } 
        }
        
        // ============ ავტომატური განახლება ============
        let autoRefreshInterval = null;
        
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => {
                if (currentRoom) {
                    // ვკითხულობთ უახლეს მონაცემებს localStorage-დან
                    const savedMessages = localStorage.getItem('mafia_messages_global');
                    if (savedMessages) {
                        const newMessages = JSON.parse(savedMessages);
                        // თუ შეტყობინებები შეიცვალა, განვაახლოთ
                        if (JSON.stringify(messages) !== JSON.stringify(newMessages)) {
                            messages = newMessages;
                            renderMessages();
                            console.log("🔄 ავტომატური განახლება: ახალი შეტყობინებები");
                        }
                    }
                }
            }, 3000); // ყოველ 3 წამში
        }
        
        // ============ მომხმარებლები ============
        function showUserProfile(username) {
            const user = users.find(u => u.username === username);
            if (!user) return;
            showNotification(`👤 ${user.username}: ${user.status}`);
        }
        
        function renderOnlineUsers() {
            const container = document.getElementById('onlineList');
            container.innerHTML = users.filter(u => u.username !== currentUser).map(user => {
                const isFriendUser = isFriend(user.username);
                return `<div class="user-item" onclick="showUserProfile('${user.username}')">
                    <div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(user.username)} ${user.role === 'owner' ? '👑' : (user.role === 'admin' ? '🔧' : '')}</div><div class="user-status">${escapeHtml(user.status)}</div></div>
                    ${!isFriendUser ? `<div class="add-badge" onclick="event.stopPropagation(); sendFriendRequest('${user.username}')">➕ დამატება</div>` : `<div class="friend-badge">✅ მეგობარი</div>`}
                </div>`;
            }).join('');
            if(users.filter(u => u.username !== currentUser).length === 0) container.innerHTML = '<div class="empty-state">მომხმარებლები არ არიან</div>';
        }
        
        function renderFriendsList() {
            const container = document.getElementById('friendsList');
            const friendsList = getFriendsList();
            const friendUsers = users.filter(u => friendsList.includes(u.username));
            if (friendUsers.length === 0) { container.innerHTML = '<div class="empty-state">მეგობრები არ არიან</div>'; return; }
            container.innerHTML = friendUsers.map(user => `<div class="user-item" onclick="showUserProfile('${user.username}')"><div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(user.username)}</div><div class="user-status">${escapeHtml(user.status)}</div></div><div class="friend-badge">✅ მეგობარი</div></div>`).join('');
        }
        
        function renderFriendRequestsList() {
            const container = document.getElementById('friendRequestsList');
            const pendingRequests = friendRequests.filter(r => r.to === currentUser && r.status === 'pending');
            if (pendingRequests.length === 0) { container.innerHTML = '<div class="empty-state">მოთხოვნები არ არის</div>'; return; }
            container.innerHTML = pendingRequests.map(req => `<div class="user-item"><div class="user-avatar">${req.from.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(req.from)}</div><div class="user-status">მეგობრობის მოთხოვნა</div></div><div style="display:flex; gap:5px;"><button class="action-btn" style="background:#2d6a4f;" onclick="acceptFriendRequest('${req.from}'); this.closest('.user-item').remove()">✅ მიღება</button><button class="action-btn" style="background:#8b0000;" onclick="rejectFriendRequest('${req.from}'); this.closest('.user-item').remove()">❌ უარყოფა</button></div></div>`).join('');
        }
        
        // ============ პირადი მიმოწერა ============
        function openPrivateChat(username) { if (username === currentUser) { showNotification('საკუთარ თავთან არ შეიძლება'); return; } currentPMUser = username; renderPrivateChat(); }
        
        function renderPrivateChat() {
            if (!currentPMUser) return;
            const pmMsgs = privateMessages.filter(m => (m.from === currentUser && m.to === currentPMUser) || (m.from === currentPMUser && m.to === currentUser)).sort((a,b) => new Date(a.time) - new Date(b.time));
            const pmHtml = `<div class="pm-chat-container" id="pmChatWindow"><div class="pm-header" onclick="closePM()"><span>💬 ${escapeHtml(currentPMUser)}</span><span>✕</span></div><div class="pm-messages" id="pmMessages">${pmMsgs.map(msg => `<div class="pm-message ${msg.from === currentUser ? 'own' : ''}"><div style="font-size:9px;">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div><div>${escapeHtml(msg.text)}</div></div>`).join('') || '<div class="empty-state" style="padding:20px;">მიმოწერა ცარიელია</div>'}</div><div class="pm-input-area"><input type="text" id="pmInput" class="pm-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()"><button class="icon-btn" style="width:36px; height:36px;" onclick="sendPM()">➤</button></div></div>`;
            document.getElementById('pmContainer').innerHTML = pmHtml;
            const pmDiv = document.getElementById('pmMessages'); if (pmDiv) pmDiv.scrollTop = pmDiv.scrollHeight;
            document.getElementById('pmInput')?.focus();
        }
        
        function closePM() { document.getElementById('pmContainer').innerHTML = ''; currentPMUser = null; }
        function sendPM() { const input = document.getElementById('pmInput'); const text = input.value.trim(); if (!text || !currentPMUser) return; privateMessages.push({ id: Date.now(), from: currentUser, to: currentPMUser, text: text, time: new Date().toISOString() }); savePM(); input.value = ''; renderPrivateChat(); renderPrivateChatsList(); }
        
        function renderPrivateChatsList() {
            const myPMs = privateMessages.filter(m => m.from === currentUser || m.to === currentUser);
            const uniqueUsers = new Set();
            myPMs.forEach(m => { const other = m.from === currentUser ? m.to : m.from; uniqueUsers.add(other); });
            const container = document.getElementById('pmList');
            if (uniqueUsers.size === 0) { container.innerHTML = '<div class="empty-state">ჯერ არ გქონია მიმოწერა</div>'; return; }
            container.innerHTML = Array.from(uniqueUsers).map(username => `<div class="user-item" onclick="openPrivateChat('${username}')"><div class="user-avatar">${username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(username)}</div></div></div>`).join('');
        }
        
        // ============ ემოჯები ============
        function toggleEmojiPanel() {
            const panel = document.getElementById('emojiPanel');
            if (panel.classList.contains('active')) { panel.classList.remove('active'); return; }
            const defaultEmojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺', '💀', '👑', '💪'];
            panel.innerHTML = `<div class="emoji-grid">${defaultEmojis.map(e => `<div class="emoji-item" onclick="insertEmoji('${e}')">${e}</div>`).join('')}</div>`;
            panel.classList.add('active');
        }
        
        function insertEmoji(emoji) {
            const input = document.getElementById('messageInput');
            if(input) input.value += emoji;
            document.getElementById('emojiPanel').classList.remove('active');
        }
        
        // ============ დამხმარე ============
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => { btn.classList.remove('active'); if (btn.getAttribute('data-page') === pageName) btn.classList.add('active'); });
            if (pageName === 'online') renderOnlineUsers();
            if (pageName === 'friends') { renderFriendsList(); renderFriendRequestsList(); }
            if (pageName === 'messages') renderPrivateChatsList();
        }
        
        function showNotification(msg) { const notif = document.createElement('div'); notif.className = 'notification'; notif.textContent = msg; document.body.appendChild(notif); setTimeout(() => notif.remove(), 2500); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function startHearts() { setInterval(() => { const heart = document.createElement('div'); heart.className = 'heart'; heart.innerHTML = ['❤️', '💖', '💗'][Math.floor(Math.random()*3)]; heart.style.left = Math.random()*100+'%'; document.getElementById('hearts').appendChild(heart); setTimeout(() => heart.remove(), 5000); }, 3000); }
        function toggleTheme() { document.body.classList.toggle('day-mode'); document.getElementById('themeToggle').innerHTML = document.body.classList.contains('day-mode') ? '☀️' : '🌙'; }
        
        function initApp() {
            loadData();
            selectUser();
            renderRooms();
            renderOnlineUsers();
            renderFriendsList();
            renderFriendRequestsList();
            renderPrivateChatsList();
            startHearts();
            startAutoRefresh();
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => { btn.addEventListener('click', () => showPage(btn.getAttribute('data-page'))); });
            showPage('home');
            console.log("✅ აპლიკაცია გაშვებულია, მომხმარებელი:", currentUser);
        }
        
        initApp();
    </script>
</body>
</html>
