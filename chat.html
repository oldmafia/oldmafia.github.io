<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChatApp - შინდისფერი გულები</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ========== ანიმაციური გულები ========== */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            pointer-events: none;
            animation: floatHeart 8s ease-in-out forwards;
            opacity: 0.5;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(1);
                opacity: 0.6;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg) scale(0.8);
                opacity: 0;
            }
        }

        /* ========== ღამის რეჟიმი ========== */
        body.night-mode {
            background: #0a0a0a;
        }

        body.night-mode .app-wrapper {
            background: rgba(0, 0, 0, 0.88);
        }

        body.night-mode .top-bar {
            background: #1a1a1a;
            border-bottom: 2px solid #800020;
        }

        body.night-mode .top-btn {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #800020;
        }

        body.night-mode .top-btn:active {
            background: #800020;
            transform: scale(0.96);
        }

        body.night-mode .sidebar {
            background: #111111;
            border-right: 1px solid #800020;
        }

        body.night-mode .chat-main {
            background: rgba(0, 0, 0, 0.7);
        }

        body.night-mode .message {
            background: #2a2a2a;
            color: #fff;
        }

        body.night-mode .message.my-message {
            background: #800020;
        }

        body.night-mode .input-area {
            background: #1a1a1a;
            border-top: 1px solid #800020;
        }

        body.night-mode .input-area input {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #800020;
        }

        body.night-mode .room-item {
            background: #222;
        }

        body.night-mode .room-item:active {
            background: #800020;
            transform: scale(0.98);
        }

        body.night-mode .room-item.active {
            background: #800020;
        }

        /* ========== დღის რეჟიმი ========== */
        body.day-mode {
            background: #fff5e8;
        }

        body.day-mode .app-wrapper {
            background: rgba(255, 245, 235, 0.92);
        }

        body.day-mode .top-bar {
            background: #fff0e4;
            border-bottom: 2px solid #b85c1a;
        }

        body.day-mode .top-btn {
            background: #fff;
            color: #5a2a1a;
            border: 1px solid #d4a58a;
        }

        body.day-mode .top-btn:active {
            background: #b85c1a;
            color: #fff;
            transform: scale(0.96);
        }

        body.day-mode .sidebar {
            background: #fff5ed;
            border-right: 1px solid #e4c4b0;
        }

        body.day-mode .chat-main {
            background: rgba(255, 245, 235, 0.85);
        }

        body.day-mode .message {
            background: #fff;
            color: #4a2a1a;
            border: 1px solid #e4c4b0;
        }

        body.day-mode .message.my-message {
            background: #ffe4d4;
        }

        body.day-mode .input-area {
            background: #fff5ed;
            border-top: 1px solid #e4c4b0;
        }

        body.day-mode .input-area input {
            background: #fff;
            color: #4a2a1a;
            border: 1px solid #e4c4b0;
        }

        body.day-mode .room-item {
            background: #fff0e4;
            border: 1px solid #e4c4b0;
        }

        body.day-mode .room-item:active {
            background: #b85c1a;
            color: #fff;
        }

        body.day-mode .room-item.active {
            background: #b85c1a;
            color: #fff;
        }

        /* ========== მთავარი კონტეინერი ========== */
        .app-wrapper {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ========== ზედა ბარი - მობილურისთვის ოპტიმიზირებული ========== */
        .top-bar {
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            z-index: 20;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .top-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .top-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            -webkit-tap-highlight-color: transparent;
        }

        .theme-btn {
            background: #800020;
            color: #fff;
            border: none;
        }

        /* ========== მთავარი შიგთავსი ========== */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ========== გვერდითი პანელი (მობილურზე ჩამალული) ========== */
        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.3s ease;
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 30;
            transform: translateX(-100%);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        /* დესკტოპზე ნაგულისხმევად ღია */
        @media (min-width: 768px) {
            .sidebar {
                position: relative;
                transform: translateX(0);
            }
            .menu-toggle {
                display: none;
            }
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 25;
            display: none;
        }

        .sidebar-overlay.open {
            display: block;
        }

        .sidebar-section {
            padding: 14px;
            border-bottom: 1px solid;
        }

        body.night-mode .sidebar-section {
            border-bottom-color: #800020;
        }

        body.day-mode .sidebar-section {
            border-bottom-color: #e4c4b0;
        }

        .section-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ოთახები - მობილურისთვის ადაპტირებული */
        .rooms-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .room-item {
            padding: 8px 6px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
            text-align: center;
            font-weight: 500;
            -webkit-tap-highlight-color: transparent;
        }

        /* მომხმარებლები */
        .users-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .user-item:active {
            background: rgba(128, 0, 32, 0.3);
            transform: scale(0.98);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #b85c1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: bold;
            font-size: 13px;
        }

        .user-status {
            font-size: 10px;
            opacity: 0.7;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            position: absolute;
            right: 12px;
        }

        .online {
            background: #2ecc71;
            box-shadow: 0 0 5px #2ecc71;
        }

        .user-role {
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 3px;
        }

        .role-founder { background: #f1c40f; color: #2c3e50; }
        .role-admin { background: #e74c3c; color: #fff; }
        .role-member { background: #7f8c8d; color: #fff; }

        /* ========== ჩატის არე ========== */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid;
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        body.night-mode .menu-toggle {
            color: #fff;
        }

        .current-room {
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 30px;
            -webkit-tap-highlight-color: transparent;
        }

        .profile-header:active {
            background: rgba(128, 0, 32, 0.2);
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-info-text {
            text-align: right;
        }

        .profile-name {
            font-weight: bold;
            font-size: 13px;
        }

        .profile-status {
            font-size: 10px;
            opacity: 0.7;
        }

        /* ========== შეტყობინებები ========== */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.left {
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.right {
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            font-size: 10px;
        }

        .msg-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: cover;
        }

        .msg-name {
            font-weight: bold;
        }

        .msg-time {
            font-size: 8px;
            opacity: 0.6;
        }

        .msg-text {
            font-size: 13px;
            word-break: break-word;
        }

        .delete-msg {
            position: absolute;
            right: 6px;
            top: 6px;
            cursor: pointer;
            font-size: 10px;
            opacity: 0;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 12px;
            color: #fff;
        }

        .message:hover .delete-msg {
            opacity: 1;
        }

        /* ========== შეყვანის ველი ========== */
        .input-area {
            padding: 10px 12px;
            display: flex;
            gap: 8px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            -webkit-appearance: none;
        }

        .emoji-btn, .send-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .emoji-btn:active, .send-btn:active {
            transform: scale(0.96);
        }

        .emoji-btn {
            background: #b85c1a;
            color: #fff;
        }

        .send-btn {
            background: #800020;
            color: #fff;
        }

        /* ========== ემოჯი პანელი ========== */
        .emoji-panel {
            position: fixed;
            bottom: 70px;
            right: 10px;
            left: 10px;
            width: auto;
            border-radius: 20px;
            padding: 12px;
            display: none;
            z-index: 200;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
        }

        @media (min-width: 500px) {
            .emoji-panel {
                width: 340px;
                left: auto;
                right: 20px;
            }
        }

        body.night-mode .emoji-panel {
            background: #2a2a2a;
            border: 1px solid #800020;
        }

        body.day-mode .emoji-panel {
            background: #fff;
            border: 1px solid #e4c4b0;
        }

        .emoji-panel.show {
            display: block;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            max-height: 180px;
            overflow-y: auto;
        }

        .emoji-item {
            font-size: 26px;
            cursor: pointer;
            text-align: center;
            padding: 5px;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .emoji-item:active {
            transform: scale(1.1);
        }

        .emoji-admin-btns {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .emoji-admin-btns button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        /* ========== მოდალები ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            width: 90%;
            max-width: 380px;
            padding: 20px;
            border-radius: 24px;
        }

        .modal-content h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid;
            font-size: 14px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background: #800020;
            color: #fff;
        }

        .btn-danger {
            background: #c0392b;
            color: #fff;
        }

        /* ========== პატარა მესინჯერი ========== */
        .mini-messenger {
            position: fixed;
            bottom: 10px;
            right: 10px;
            left: 10px;
            height: 450px;
            border-radius: 20px;
            display: none;
            flex-direction: column;
            z-index: 300;
            box-shadow: 0 5px 30px rgba(0,0,0,0.4);
        }

        @media (min-width: 500px) {
            .mini-messenger {
                width: 320px;
                left: auto;
                right: 20px;
                bottom: 20px;
            }
        }

        .mini-messenger.show {
            display: flex;
        }

        .mini-header {
            padding: 12px 16px;
            background: #800020;
            color: #fff;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mini-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .mini-msg {
            margin: 5px 0;
            padding: 8px 12px;
            border-radius: 16px;
            max-width: 85%;
            font-size: 13px;
        }

        .mini-msg.left {
            background: #b85c1a;
            color: #fff;
        }

        .mini-msg.right {
            background: #800020;
            color: #fff;
            margin-left: auto;
        }

        .mini-input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
            border-top: 1px solid;
        }

        .mini-input-area input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 25px;
            border: 1px solid;
            font-size: 14px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 25px;
            margin-bottom: 10px;
            border: 1px solid;
            font-size: 14px;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(128, 0, 32, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: #800020;
            border-radius: 4px;
        }
    </style>
</head>
<body class="night-mode">
    <div class="hearts-bg" id="heartsBg"></div>

    <div class="app-wrapper">
        <!-- ზედა ბარი -->
        <div class="top-bar">
            <div class="logo">
                💗 <span>ChatApp</span>
            </div>
            <div class="top-buttons">
                <button class="top-btn" id="profileBtn">👤</button>
                <button class="top-btn" id="friendsBtn">👥</button>
                <button class="top-btn" id="usersBtn">📋</button>
                <button class="top-btn theme-btn" id="themeBtn">🌙</button>
            </div>
        </div>

        <!-- მთავარი შიგთავსი -->
        <div class="main-content">
            <div class="sidebar-overlay" id="sidebarOverlay"></div>
            <div class="sidebar" id="sidebar">
                <div class="sidebar-section">
                    <div class="section-title">📌 ოთახები (12)</div>
                    <div class="rooms-list" id="roomsList"></div>
                </div>
                <div class="sidebar-section">
                    <div class="section-title">👥 მეგობრები</div>
                    <div class="users-list" id="friendsListSidebar"></div>
                </div>
                <div class="sidebar-section">
                    <div class="section-title">🟢 ონლაინ</div>
                    <div class="users-list" id="onlineUsersList"></div>
                </div>
                <div class="sidebar-section" id="allUsersSection">
                    <div class="section-title">👥 ყველა მომხმარებელი</div>
                    <input type="text" id="searchUsers" class="search-input" placeholder="🔍 ძებნა...">
                    <div class="users-list" id="allUsersList"></div>
                </div>
            </div>

            <!-- ჩატის არე -->
            <div class="chat-main">
                <div class="chat-header">
                    <button class="menu-toggle" id="menuToggle">☰</button>
                    <div class="current-room">
                        <span id="currentRoomName">ოთახი 1</span>
                    </div>
                    <div class="profile-header" id="profileHeaderBtn">
                        <div class="profile-info-text">
                            <div class="profile-name" id="headerUserName">მომხმარებელი</div>
                            <div class="profile-status" id="headerUserStatus">💗</div>
                        </div>
                        <img class="profile-avatar" id="headerAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23b85c1a'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='white' font-size='40'%3E👤%3C/text%3E%3C/svg%3E">
                    </div>
                </div>

                <div class="messages-area" id="messagesArea"></div>

                <div class="input-area">
                    <button class="emoji-btn" id="emojiBtn">😊</button>
                    <input type="text" id="messageInput" placeholder="დაწერე...">
                    <button class="send-btn" id="sendBtn">📤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ემოჯი პანელი -->
    <div class="emoji-panel" id="emojiPanel">
        <div class="emoji-grid" id="emojiGrid"></div>
        <div class="emoji-admin-btns" id="emojiAdminBtns" style="display: none;">
            <button id="addEmojiBtn" class="btn-primary">➕ დაამატე</button>
            <button id="removeEmojiBtn" class="btn-danger">❌ წაშალე</button>
        </div>
    </div>

    <!-- პროფილის მოდალი -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h3>💗 პროფილი</h3>
            <img id="profileModalAvatar" style="width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 12px; display: block; object-fit: cover;">
            <input type="file" id="photoUpload" accept="image/*">
            <input type="text" id="profileNickname" placeholder="ნიკნეიმი">
            <textarea id="profileStatus" rows="2" placeholder="სტატუსი..."></textarea>
            <div class="modal-buttons">
                <button id="saveProfileBtn" class="btn-primary">💾 შენახვა</button>
                <button id="closeProfileBtn">❌</button>
            </div>
        </div>
    </div>

    <!-- მეგობრების მოდალი -->
    <div class="modal" id="friendsModal">
        <div class="modal-content">
            <h3>👥 მეგობრები</h3>
            <input type="text" id="friendSearchInput" class="search-input" placeholder="🔍 ძებნა...">
            <div id="friendsListModal" style="max-height: 350px; overflow-y: auto;"></div>
            <button id="closeFriendsModalBtn" class="btn-primary">დახურვა</button>
        </div>
    </div>

    <!-- მეგობრის მოთხოვნა -->
    <div class="modal" id="friendRequestModal">
        <div class="modal-content">
            <h3>💌 მეგობრის მოთხოვნა</h3>
            <p id="friendRequestText"></p>
            <div class="modal-buttons">
                <button id="acceptFriendBtn" class="btn-primary">✅</button>
                <button id="rejectFriendBtn" class="btn-danger">❌</button>
            </div>
        </div>
    </div>

    <!-- დაბლოკვის მოდალი -->
    <div class="modal" id="banModal">
        <div class="modal-content">
            <h3>🚫 დაბლოკვა</h3>
            <p id="banUserName"></p>
            <textarea id="banReason" rows="2" placeholder="მიზეზი..."></textarea>
            <div class="modal-buttons">
                <button id="confirmBanBtn" class="btn-danger">🔒</button>
                <button id="cancelBanBtn">გაუქმება</button>
            </div>
        </div>
    </div>

    <!-- როლის მინიჭება -->
    <div class="modal" id="roleModal">
        <div class="modal-content">
            <h3>👑 როლის მინიჭება</h3>
            <p id="roleUserName"></p>
            <select id="roleSelect">
                <option value="member">👥 წევრი</option>
                <option value="admin">🛡️ ადმინი</option>
                <option value="founder">👑 დამფუძნებელი</option>
            </select>
            <div class="modal-buttons">
                <button id="assignRoleBtn" class="btn-primary">მინიჭება</button>
                <button id="closeRoleBtn">გაუქმება</button>
            </div>
        </div>
    </div>

    <!-- პატარა მესინჯერი -->
    <div class="mini-messenger" id="miniMessenger">
        <div class="mini-header">
            <span id="miniFriendName"></span>
            <button id="closeMiniBtn" style="background: none; border: none; color: white; font-size: 20px;">✕</button>
        </div>
        <div class="mini-messages" id="miniMessages"></div>
        <div class="mini-input-area">
            <input type="text" id="miniInput" placeholder="დაწერე...">
            <button id="miniSendBtn" style="background: #800020; border: none; border-radius: 25px; padding: 8px 16px; color: white;">📤</button>
        </div>
    </div>

    <script>
        // ==================== მონაცემები ====================
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let rooms = {};
        let customEmojis = JSON.parse(localStorage.getItem('customEmojis')) || ['😊', '😂', '❤️', '😍', '🎉', '🔥', '👍', '🙏', '🥰', '😢'];
        let privateMessages = JSON.parse(localStorage.getItem('privateMessages')) || {};
        let currentRoom = 1;
        let selectedFriend = null;
        let pendingRequestUser = null;

        // 12 ოთახის შექმნა
        for (let i = 1; i <= 12; i++) {
            rooms[i] = {
                id: i,
                name: `ოთახი ${i}`,
                messages: JSON.parse(localStorage.getItem(`room_${i}_messages`)) || [],
                bannedUsers: JSON.parse(localStorage.getItem(`room_${i}_banned`)) || []
            };
        }

        // მომხმარებლის შექმნა
        if (!currentUser) {
            const newId = 'user_' + Date.now();
            currentUser = {
                id: newId,
                name: 'მომხმარებელი_' + Math.floor(Math.random() * 1000),
                avatar: '',
                status: '💗',
                role: users.length === 0 ? 'founder' : 'member',
                friends: []
            };
            users.push(currentUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
        }

        // ==================== გულების ანიმაცია ====================
        function startHeartAnimation() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                document.getElementById('heartsBg').appendChild(heart);
                setTimeout(() => heart.remove(), 9000);
            }, 1500);
        }

        function renderRooms() {
            const container = document.getElementById('roomsList');
            container.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                container.innerHTML += `
                    <div class="room-item ${currentRoom === i ? 'active' : ''}" onclick="changeRoom(${i})">
                        📌 ${rooms[i].name}
                    </div>
                `;
            }
        }

        window.changeRoom = function(roomId) {
            currentRoom = roomId;
            document.getElementById('currentRoomName').innerHTML = rooms[roomId].name;
            renderRooms();
            renderMessages();
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('open');
            }
        };

        function renderMessages() {
            const room = rooms[currentRoom];
            const container = document.getElementById('messagesArea');
            if (!room.messages) room.messages = [];
            container.innerHTML = room.messages.map(msg => `
                <div class="message ${msg.userId === currentUser.id ? 'right' : 'left'}">
                    <div class="message-header">
                        <img class="msg-avatar" src="${msg.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b85c1a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                        <span class="msg-name">${escapeHtml(msg.userName)}</span>
                        <span class="msg-time">${msg.time}</span>
                    </div>
                    <div class="msg-text">${escapeHtml(msg.text)}</div>
                    ${(currentUser.role === 'admin' || currentUser.role === 'founder') ? `<span class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</span>` : ''}
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        window.deleteMessage = function(messageId) {
            if (currentUser.role === 'admin' || currentUser.role === 'founder') {
                const room = rooms[currentRoom];
                room.messages = room.messages.filter(m => m.id !== messageId);
                localStorage.setItem(`room_${currentRoom}_messages`, JSON.stringify(room.messages));
                renderMessages();
            }
        };

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            const room = rooms[currentRoom];
            if (room.bannedUsers.includes(currentUser.id)) {
                alert('⚠️ დაბლოკილი ხარ!');
                return;
            }
            const newMessage = {
                id: Date.now(),
                userId: currentUser.id,
                userName: currentUser.name,
                avatar: currentUser.avatar || '',
                text: text,
                time: new Date().toLocaleTimeString()
            };
            room.messages.push(newMessage);
            localStorage.setItem(`room_${currentRoom}_messages`, JSON.stringify(room.messages));
            input.value = '';
            renderMessages();
        }

        function renderAllUsers() {
            const userFriends = users.filter(u => currentUser.friends.includes(u.id));
            document.getElementById('friendsListSidebar').innerHTML = userFriends.map(user => `
                <div class="user-item" onclick="openMiniMessenger('${user.id}')">
                    <img class="user-avatar" src="${user.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b85c1a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                    <div class="user-info"><div class="user-name">${escapeHtml(user.name)}</div></div>
                    <span class="online-dot online"></span>
                </div>
            `).join('') || '<div style="padding:10px;text-align:center;">💗 არ გყავს მეგობრები</div>';

            const onlineUsers = users.filter(u => u.id !== currentUser.id);
            document.getElementById('onlineUsersList').innerHTML = onlineUsers.map(user => `
                <div class="user-item" onclick="openUserActions('${user.id}')">
                    <img class="user-avatar" src="${user.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b85c1a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name)}</div>
                        <span class="user-role role-${user.role}">${user.role === 'founder' ? '👑' : user.role === 'admin' ? '🛡️' : '👤'}</span>
                    </div>
                    <span class="online-dot online"></span>
                </div>
            `).join('');

            const searchTerm = document.getElementById('searchUsers')?.value.toLowerCase() || '';
            const allUsers = users.filter(u => u.id !== currentUser.id && u.name.toLowerCase().includes(searchTerm));
            document.getElementById('allUsersList').innerHTML = allUsers.map(user => `
                <div class="user-item" onclick="openUserActions('${user.id}')">
                    <img class="user-avatar" src="${user.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b85c1a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name)}</div>
                        <span class="user-role role-${user.role}">${user.role === 'founder' ? '👑' : user.role === 'admin' ? '🛡️' : '👤'}</span>
                    </div>
                    <span class="online-dot online"></span>
                </div>
            `).join('');
        }

        window.openUserActions = function(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;
            let actions = ['💬 პირადი მესიჯი'];
            if (currentUser.role === 'founder') actions.push('👑 როლი');
            if (currentUser.role === 'admin' || currentUser.role === 'founder') actions.push('🚫 დაბლოკვა');
            if (!currentUser.friends.includes(user.id)) actions.push('👥 მეგობრად დამატება');
            const action = prompt(`${user.name}\n\n${actions.map((a,i)=>`${i+1}. ${a}`).join('\n')}`);
            if (action === '1') openMiniMessenger(user);
            else if (action === '2' && actions[1] === '👑 როლი') openRoleModal(user);
            else if ((action === '2' && actions[1] === '🚫 დაბლოკვა') || (action === '3' && actions[2] === '🚫 დაბლოკვა')) openBanModal(user);
            else if (action === (actions.length) && actions[actions.length-1] === '👥 მეგობრად დამატება') sendFriendRequest(user);
        };

        function openBanModal(user) {
            document.getElementById('banUserName').innerHTML = `${user.name}`;
            document.getElementById('banModal').classList.add('show');
            document.getElementById('confirmBanBtn').onclick = () => {
                const room = rooms[currentRoom];
                if (!room.bannedUsers.includes(user.id)) {
                    room.bannedUsers.push(user.id);
                    localStorage.setItem(`room_${currentRoom}_banned`, JSON.stringify(room.bannedUsers));
                    alert(`✅ ${user.name} დაბლოკილია`);
                }
                document.getElementById('banModal').classList.remove('show');
            };
            document.getElementById('cancelBanBtn').onclick = () => document.getElementById('banModal').classList.remove('show');
        }

        function openRoleModal(user) {
            document.getElementById('roleUserName').innerHTML = user.name;
            document.getElementById('roleModal').classList.add('show');
            document.getElementById('assignRoleBtn').onclick = () => {
                user.role = document.getElementById('roleSelect').value;
                localStorage.setItem('users', JSON.stringify(users));
                alert(`✅ ${user.name} როლი შეიცვალა`);
                document.getElementById('roleModal').classList.remove('show');
                renderAllUsers();
            };
            document.getElementById('closeRoleBtn').onclick = () => document.getElementById('roleModal').classList.remove('show');
        }

        function sendFriendRequest(user) {
            if (currentUser.friends.includes(user.id)) { alert('უკვე მეგობარი ხართ'); return; }
            pendingRequestUser = user;
            document.getElementById('friendRequestText').innerHTML = `💗 ${user.name} დამატება?`;
            document.getElementById('friendRequestModal').classList.add('show');
        }

        function openMiniMessenger(user) {
            selectedFriend = user;
            document.getElementById('miniFriendName').innerHTML = user.name;
            document.getElementById('miniMessenger').classList.add('show');
            renderMiniMessages();
        }

        window.openMiniMessengerById = function(userId) {
            const user = users.find(u => u.id === userId);
            if (user) { document.getElementById('friendsModal').classList.remove('show'); openMiniMessenger(user); }
        };

        function renderMiniMessages() {
            const chatId = [currentUser.id, selectedFriend.id].sort().join('-');
            const messages = privateMessages[chatId] || [];
            document.getElementById('miniMessages').innerHTML = messages.map(msg => `
                <div class="mini-msg ${msg.from === currentUser.id ? 'right' : 'left'}">
                    <small>${new Date(msg.time).toLocaleTimeString()}</small>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
        }

        function sendPrivateMessage() {
            const input = document.getElementById('miniInput');
            const text = input.value.trim();
            if (!text || !selectedFriend) return;
            const chatId = [currentUser.id, selectedFriend.id].sort().join('-');
            if (!privateMessages[chatId]) privateMessages[chatId] = [];
            privateMessages[chatId].push({ from: currentUser.id, to: selectedFriend.id, text: text, time: Date.now() });
            localStorage.setItem('privateMessages', JSON.stringify(privateMessages));
            input.value = '';
            renderMiniMessages();
        }

        function renderEmojis() {
            document.getElementById('emojiGrid').innerHTML = customEmojis.map(emoji => `<div class="emoji-item" onclick="addEmoji('${emoji}')">${emoji}</div>`).join('');
            document.getElementById('emojiAdminBtns').style.display = (currentUser.role === 'admin' || currentUser.role === 'founder') ? 'flex' : 'none';
        }

        window.addEmoji = function(emoji) {
            document.getElementById('messageInput').value += emoji;
            document.getElementById('emojiPanel').classList.remove('show');
        };

        function updateProfileUI() {
            document.getElementById('headerUserName').innerHTML = currentUser.name;
            document.getElementById('headerUserStatus').innerHTML = currentUser.status || '💗';
            if (currentUser.avatar) {
                document.getElementById('headerAvatar').src = currentUser.avatar;
                document.getElementById('profileModalAvatar').src = currentUser.avatar;
            }
            document.getElementById('profileNickname').value = currentUser.name;
            document.getElementById('profileStatus').value = currentUser.status || '';
        }

        function saveProfile() {
            const newName = document.getElementById('profileNickname').value.trim();
            if (newName) currentUser.name = newName;
            currentUser.status = document.getElementById('profileStatus').value;
            const fileInput = document.getElementById('photoUpload');
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentUser.avatar = e.target.result;
                    saveUserData();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else { saveUserData(); }
        }

        function saveUserData() {
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            const idx = users.findIndex(u => u.id === currentUser.id);
            if (idx !== -1) users[idx] = currentUser;
            localStorage.setItem('users', JSON.stringify(users));
            updateProfileUI();
            renderAllUsers();
            renderMessages();
            document.getElementById('profileModal').classList.remove('show');
        }

        function openFriendsModal() {
            const friends = users.filter(u => currentUser.friends.includes(u.id));
            document.getElementById('friendsListModal').innerHTML = friends.map(friend => `
                <div class="user-item" onclick="openMiniMessengerById('${friend.id}')">
                    <img class="user-avatar" src="${friend.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b85c1a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                    <div class="user-info"><div class="user-name">${escapeHtml(friend.name)}</div></div>
                </div>
            `).join('') || '<p style="text-align:center;padding:20px;">💗 არ გყავს მეგობრები</p>';
            document.getElementById('friendsModal').classList.add('show');
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.classList.contains('night-mode')) {
                body.classList.remove('night-mode');
                body.classList.add('day-mode');
                btn.innerHTML = '☀️';
            } else {
                body.classList.remove('day-mode');
                body.classList.add('night-mode');
                btn.innerHTML = '🌙';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // მობილურისთვის მენიუ
        document.getElementById('menuToggle').onclick = () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        };
        document.getElementById('sidebarOverlay').onclick = () => {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        };

        // Event Listeners
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        document.getElementById('emojiBtn').onclick = () => document.getElementById('emojiPanel').classList.toggle('show');
        document.getElementById('addEmojiBtn').onclick = () => {
            const emoji = prompt('ახალი ემოჯი:');
            if (emoji && !customEmojis.includes(emoji)) {
                customEmojis.push(emoji);
                localStorage.setItem('customEmojis', JSON.stringify(customEmojis));
                renderEmojis();
            }
        };
        document.getElementById('removeEmojiBtn').onclick = () => {
            const emoji = prompt('წასაშლელი ემოჯი:');
            const idx = customEmojis.indexOf(emoji);
            if (idx !== -1) {
                customEmojis.splice(idx, 1);
                localStorage.setItem('customEmojis', JSON.stringify(customEmojis));
                renderEmojis();
            }
        };
        document.getElementById('profileBtn').onclick = () => document.getElementById('profileModal').classList.add('show');
        document.getElementById('profileHeaderBtn').onclick = () => document.getElementById('profileModal').classList.add('show');
        document.getElementById('saveProfileBtn').onclick = saveProfile;
        document.getElementById('closeProfileBtn').onclick = () => document.getElementById('profileModal').classList.remove('show');
        document.getElementById('themeBtn').onclick = toggleTheme;
        document.getElementById('friendsBtn').onclick = openFriendsModal;
        document.getElementById('closeFriendsModalBtn').onclick = () => document.getElementById('friendsModal').classList.remove('show');
        document.getElementById('usersBtn').onclick = () => document.getElementById('allUsersSection').scrollIntoView({ behavior: 'smooth' });
        document.getElementById('acceptFriendBtn').onclick = () => {
            if (pendingRequestUser && !currentUser.friends.includes(pendingRequestUser.id)) {
                currentUser.friends.push(pendingRequestUser.id);
                saveUserData();
                alert(`💗 ${pendingRequestUser.name} დაემატა!`);
            }
            document.getElementById('friendRequestModal').classList.remove('show');
            pendingRequestUser = null;
        };
        document.getElementById('rejectFriendBtn').onclick = () => {
            document.getElementById('friendRequestModal').classList.remove('show');
            pendingRequestUser = null;
        };
        document.getElementById('closeMiniBtn').onclick = () => document.getElementById('miniMessenger').classList.remove('show');
        document.getElementById('miniSendBtn').onclick = sendPrivateMessage;
        document.getElementById('miniInput').onkeypress = (e) => { if (e.key === 'Enter') sendPrivateMessage(); };
        document.getElementById('searchUsers').oninput = renderAllUsers;
        document.getElementById('friendSearchInput').oninput = function() {
            const search = this.value.toLowerCase();
            const friends = users.filter(u => currentUser.friends.includes(u.id) && u.name.toLowerCase().includes(search));
            document.getElementById('friendsListModal').innerHTML = friends.map(friend => `
                <div class="user-item" onclick="openMiniMessengerById('${friend.id}')">
                    <img class="user-avatar" src="${friend.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23b85c1a\'/%3E%3Ctext x=\'50\' y=\'67\' text-anchor=\'middle\' fill=\'white\' font-size=\'40\'%3E👤%3C/text%3E%3C/svg%3E'}">
                    <div class="user-info"><div class="user-name">${escapeHtml(friend.name)}</div></div>
                </div>
            `).join('') || '<p style="text-align:center;padding:20px;">💗 ვერ მოიძებნა</p>';
        };

        // ინიციალიზაცია
        startHeartAnimation();
        renderRooms();
        renderAllUsers();
        renderMessages();
        renderEmojis();
        updateProfileUI();
        document.getElementById('currentRoomName').innerHTML = rooms[currentRoom].name;
    </script>
</body>
</html>
