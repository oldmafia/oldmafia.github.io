<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia Social</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s ease; }
        
        /* 🎨 ცვლადები რეჟიმებისთვის */
        body.night-mode {
            --bg-color: #000;
            --text-color: #e0c8a8;
            --card-bg: #0a0a0a;
            --border: #ff0000;
            --accent: #ff0000;
            --nav-bg: #050505;
        }
        body.day-mode {
            --bg-color: #fff8f0;
            --text-color: #2c2418;
            --card-bg: #ffffff;
            --border: #e8d4b0;
            --accent: #c55a3a;
            --nav-bg: #fff4e6;
        }

        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-color); height: 100vh; overflow: hidden; }

        /* 📱 გვერდების კონტეინერი */
        .page { display: none; height: calc(100vh - 65px); overflow-y: auto; padding-bottom: 20px; }
        .page.active { display: block; }

        /* 🧭 ნავიგაცია (მობილურზე ქვემოთ, კომპიუტერზე ზემოთ) */
        .navigation {
            position: fixed; width: 100%; height: 65px;
            background: var(--nav-bg); border-top: 2px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 5000;
            bottom: 0; /* სტანდარტულად ქვემოთ (მობილურისთვის) */
        }

        /* 💻 კომპიუტერისთვის (Desktop) */
        @media (min-width: 768px) {
            .navigation { bottom: auto; top: 0; border-top: none; border-bottom: 2px solid var(--border); }
            .page { height: calc(100vh - 65px); margin-top: 65px; }
            .content-wrapper { max-width: 800px; margin: 0 auto; } /* ცენტრში მოქცევა */
        }

        .nav-item { cursor: pointer; font-size: 24px; opacity: 0.5; padding: 10px; list-style: none; }
        .nav-item.active { opacity: 1; color: var(--accent); border-bottom: 3px solid var(--accent); }

        /* 👤 PROFILE PAGE (FB Layout) */
        .fb-header { position: relative; width: 100%; height: 220px; background: linear-gradient(to bottom, var(--accent), #000); }
        .fb-avatar-wrapper {
            width: 140px; height: 140px; border-radius: 50%; border: 5px solid var(--card-bg);
            position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%);
            overflow: hidden; background: #222;
        }
        .fb-avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .fb-user-info { margin-top: 80px; text-align: center; padding: 0 20px; }
        
        /* 📝 POSTS STYLE */
        .post-card { 
            background: var(--card-bg); margin: 15px; padding: 15px; 
            border-radius: 12px; border: 1px solid var(--border); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 💬 CHAT AREA */
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; }
        .chat-input-zone { padding: 15px; display: flex; gap: 10px; background: var(--nav-bg); border-top: 1px solid var(--border); }
        .chat-input-zone input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-color); }

        /* ❤️ გულები დღის რეჟიმისთვის */
        body.day-mode .page::after {
            content: "❤️"; position: fixed; bottom: 80px; right: 20px; font-size: 50px; opacity: 0.4; animation: pulse 3s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body class="night-mode">

    <div class="navigation">
        <div class="nav-item active" onclick="switchPage('chatPage', this)">💬</div>
        <div class="nav-item" onclick="switchPage('profilePage', this)">👤</div>
        <div class="nav-item" onclick="switchPage('friendsPage', this)">👥</div>
        <div class="nav-item" onclick="toggleTheme()">🌙</div>
    </div>

    <div id="chatPage" class="page active">
        <div class="chat-container">
            <div class="chat-messages" id="chat">
                <p style="text-align:center; opacity:0.5; margin-top:20px;">ჩატის ისტორია...</p>
            </div>
            <div class="chat-input-zone">
                <input type="text" placeholder="დაწერე მესიჯი...">
                <button style="background:var(--accent); color:white; border:none; border-radius:50%; width:40px; height:40px;">✈</button>
            </div>
        </div>
    </div>

    <div id="profilePage" class="page">
        <div class="content-wrapper">
            <div class="fb-header">
                <div class="fb-avatar-wrapper">
                    <img id="userPic" src="https://i.ibb.co/v3m6y6R/avatar.png">
                </div>
            </div>
            <div class="fb-user-info">
                <h1 id="userName">Lukinio</h1>
                <p>🕵️ მაფიის წევრი • 📍 თბილისი</p>
                <div style="margin: 15px 0;">
                    <button style="background:var(--accent); color:white; border:none; padding:10px 25px; border-radius:8px; font-weight:bold;">პროფილის ჩასწორება</button>
                </div>
            </div>

            <div class="post-card">
                <h3 style="color:var(--accent); margin-bottom:10px;">📸 ფოტოები</h3>
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:5px;">
                    <div style="background:#333; height:100px; border-radius:5px;"></div>
                    <div style="background:#333; height:100px; border-radius:5px;"></div>
                    <div style="background:#333; height:100px; border-radius:5px;"></div>
                </div>
            </div>

            <div class="post-card">
                <h3 style="color:var(--accent); margin-bottom:10px;">📝 ჩემი კედელი</h3>
                <div style="border-top:1px solid var(--border); padding-top:10px;">
                    <p>"ეს არის ჩემი პირველი პოსტი Facebook-ის დიზაინში! 🚀"</p>
                    <small style="opacity:0.5;">2 წუთის წინ</small>
                </div>
            </div>
        </div>
    </div>

    <div id="friendsPage" class="page">
        <div class="content-wrapper">
            <h2 style="padding:20px; color:var(--accent);">მეგობრების სია</h2>
            <div class="post-card">მეგობარი #1 - 🟢 Online</div>
            <div class="post-card">მეგობარი #2 - ⚪ Offline</div>
        </div>
    </div>

    <script>
        // გვერდების გადართვა
        function switchPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // თემების გადართვა
        function toggleTheme() {
            const b = document.body;
            b.classList.toggle('night-mode');
            b.classList.toggle('day-mode');
            const isDay = b.classList.contains('day-mode');
            localStorage.setItem('theme', isDay ? 'day' : 'night');
        }

        // ინიციალიზაცია
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if(savedTheme === 'day') toggleTheme();
        }
    </script>
</body>
</html>
