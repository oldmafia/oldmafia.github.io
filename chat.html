<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: Arial; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* ზედა ზოლი */
        .top-bar {
            background: #050505;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid red;
            box-shadow: 0 0 15px red;
            z-index: 1001;
        }

        .menu-btn { font-size: 28px; color: red; cursor: pointer; text-shadow: 0 0 10px red; }
        .current-room-name { flex: 1; text-align: center; font-weight: bold; font-size: 20px; text-shadow: 0 0 15px red; }

        /* მენიუ, რომელიც ბოლომდე ჩამოდის */
        .top-menu {
            position: absolute; 
            top: -100%; /* დამალულია */
            left: 0; 
            width: 280px; /* ვიწრო სვეტი */
            height: 100vh; /* ბოლომდე ჩამოდის */
            background: rgba(5, 5, 5, 0.98); 
            border-right: 2px solid red;
            transition: 0.5s ease-in-out; 
            z-index: 1000; 
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(255, 0, 0, 0.3);
        }

        .top-menu.open { top: 0; }

        /* ავატარის ადგილი მენიუს თავში */
        .menu-header {
            padding: 80px 20px 20px 20px;
            text-align: center;
            border-bottom: 1px solid #300;
            background: linear-gradient(to bottom, #1a0000, #050505);
        }

        .user-avatar-main {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid red;
            box-shadow: 0 0 15px red;
            margin-bottom: 10px;
        }

        .user-name-main {
            display: block;
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
        }

        /* ოთახების სია */
        .rooms-list { padding: 15px; display: flex; flex-direction: column; gap: 5px; }

        .room-link {
            padding: 12px 15px;
            background: #111;
            border-radius: 8px;
            cursor: pointer;
            color: #ccc;
            font-size: 14px;
            transition: 0.3s;
            border-left: 3px solid transparent;
        }

        .room-link:hover { 
            background: #200; 
            color: white; 
            border-left-color: red;
            padding-left: 20px;
        }

        /* ჩატი */
        #chat-display { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { display: flex; gap: 10px; align-items: flex-start; }
        .avatar-small { width: 40px; height: 40px; border-radius: 50%; border: 1px solid red; }
        .msg-bubble { background: #0d0d0d; border: 1px solid #222; padding: 10px 15px; border-radius: 4px 15px 15px 15px; max-width: 80%; }
        .u-name { color: red; font-weight: bold; font-size: 11px; display: block; }

        /* წერის ზონა */
        .input-box { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 2px solid #200; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .send-btn { background: red; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; box-shadow: 0 0 10px red; }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="current-room-name" id="roomTitle">☕ კაფე-ბარი</div>
    </div>

    <div id="topMenu" class="top-menu">
        <div class="menu-header">
            <img src="https://i.ibb.co/v3m6y6R/avatar.png" class="user-avatar-main" id="myAvatar">
            <span class="user-name-main" id="myNickDisplay">ნიკი</span>
        </div>
        
        <div class="rooms-list">
            <div class="room-link" onclick="selectRoom('☕ კაფე-ბარი')">☕ კაფე-ბარი</div>
            <div class="room-link" onclick="selectRoom('💎 ვიპ საუბრები')">💎 ვიპ საუბრები</div>
            <div class="room-link" onclick="selectRoom('🕵️ გამოძიება')">🕵️ გამოძიება</div>
            <div class="room-link" onclick="selectRoom('🔐 შიფროგრამა')">🔐 შიფროგრამა</div>
            <div class="room-link" onclick="selectRoom('❓ ვიქტორინა')">❓ ვიქტორინა</div>
            <div class="room-link" onclick="selectRoom('😵 ჩამოხრჩობანა')">😵 ჩამოხრჩობანა</div>
            <div class="room-link" onclick="selectRoom('🕴 მაფიის ღამე')">🕴 მაფიის ღამე</div>
            <div class="room-link" onclick="selectRoom('🃏 ჯოკერი')">🃏 ჯოკერი</div>
            <div class="room-link" onclick="selectRoom('🎲 ნარდი')">🎲 ნარდი</div>
            <div class="room-link" onclick="selectRoom('🎵 მუსიკა')">🎵 მუსიკა</div>
            <div class="room-link" onclick="selectRoom('😂 იუმორი')">😂 იუმორი</div>
            <div class="room-link" onclick="selectRoom('🛠 ადმინისტრაცია')">🛠 ადმინისტრაცია</div>
            <div class="room-link" onclick="selectRoom('🆘 დახმარება')">🆘 დახმარება</div>
            <div class="room-link" onclick="selectRoom('📢 ფორუმი')">📢 ფორუმი</div>
            <div class="room-link" onclick="logout()" style="color: red; border: 1px solid red; margin-top: 10px; text-align: center;">🚪 გასვლა</div>
        </div>
    </div>

    <div id="chat-display"></div>

    <div class="input-box">
        <input type="text" id="msgInput" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nickname') || "სტუმარი";
        let currentRoom = "☕ კაფე-ბარი";

        document.getElementById('myNickDisplay').innerText = myNick;

        function toggleMenu() { document.getElementById('topMenu').classList.toggle('open'); }

        async function selectRoom(name) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = name;
            document.getElementById('topMenu').classList.remove('open');
            await loadMsgs();
        }

        async function loadMsgs() {
            const { data } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
            const chat = document.getElementById('chat-display');
            chat.innerHTML = "";
            data?.forEach(m => {
                chat.innerHTML += `
                    <div class="msg">
                        <img src="https://i.ibb.co/v3m6y6R/avatar.png" class="avatar-small">
                        <div class="msg-bubble">
                            <span class="u-name">${m.user_nam}</span>
                            <span class="u-text">${m.text}</span>
                        </div>
                    </div>`;
            });
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMsg() {
            const inp = document.getElementById('msgInput');
            if(!inp.value.trim()) return;
            await _s.from('messages').insert([{ user_nam: myNick, text: inp.value, room_name: currentRoom }]);
            inp.value = "";
        }

        function logout() { localStorage.removeItem('nickname'); window.location.href = 'index.html'; }

        _s.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
            if(payload.new.room_name === currentRoom) {
                loadMsgs();
            }
        }).subscribe();

        window.onload = loadMsgs;
    </script>
</body>
</html>
