        // ============ პროფილის მართვა ============

        // ============ ფოტოებზე ლაიქი და კომენტარი ============
        function openPhotoModal(photoUrl, username, time) {
            const interactions = photoInteractions[photoUrl] || { likes: [], comments: [] };

            const modal = document.createElement('div'); modal.className = 'photo-modal';
            modal.innerHTML = `
                <div class="photo-modal-content">

        function likePhoto(photoUrl, btn) {
            if (!photoInteractions[photoUrl]) photoInteractions[photoUrl] = { likes: [], comments: [] };
            const idx = photoInteractions[photoUrl].likes.indexOf(currentUser);
            if (idx === -1) photoInteractions[photoUrl].likes.push(currentUser);
            else photoInteractions[photoUrl].likes.splice(idx, 1);
            saveInteractions();
            btn.innerHTML = `❤️ ${photoInteractions[photoUrl].likes.length}`;
            btn.classList.toggle('success');
        }
        
        function addPhotoComment(photoUrl) {
            const input = document.getElementById('photoCommentInput');
            const text = input.value.trim();
            if (!text) return;
            if (!photoInteractions[photoUrl]) photoInteractions[photoUrl] = { likes: [], comments: [] };
            photoInteractions[photoUrl].comments.push({ user: currentUser, text: text, time: Date.now() });

        // ============ როლების მართვა ============
        function showUserProfile(username) {
            const user = users.find(u => u.username === username);

                        ${!isBlocked && username !== currentUser ? `<button class="action-btn danger" onclick="blockUser('${username}'); document.querySelector('.profile-modal').remove()">🚫 დაბლოკვა</button>` : ''}

                        ${username !== currentUser ? `<button class="action-btn" onclick="openPrivateChat('${username}'); document.querySelector('.profile-modal').remove()">💬 მიწერა</button>` : ''}
                        ${!isFriend && username !== currentUser ? `<button class="action-btn success" onclick="addFriend('${username}'); this.closest('.profile-modal').remove()">➕ მეგობრებში დამატება</button>` : ''}
                        ${isFriend && username !== currentUser ? `<button class="action-btn" onclick="removeFriend('${username}'); this.closest('.profile-modal').remove()">➖ მეგობრებიდან წაშლა</button>` : ''}
                        ${!isBlocked && username !== currentUser ? `<button class="action-btn danger" onclick="blockUser('${username}'); this.closest('.profile-modal').remove()">🚫 დაბლოკვა</button>` : ''}

                        <button class="action-btn" onclick="openPrivateChat('${username}'); this.closest('.profile-modal').remove()">💬 მიწერა</button>

        function addFriend(username) { if (!friends.includes(username)) { friends.push(username); saveFriends(); alert(`✅ ${username} დაემატა მეგობრებში!`); renderFriendsList(); } }

            const oldOwner = users.find(u => u.role === 'owner');

            const newOwner = users.find(u => u.username === username);

        // ============ პროფილის შენახვა ============
        function saveProfile() {
            const newNick = document.getElementById('nicknameInput').value.trim();
            const newStatus = document.getElementById('statusInput').value;
            if (newNick && newNick !== currentUser) {
                const oldUser = currentUser;
                currentUser = newNick;
                localStorage.setItem('mafia_user', currentUser);
                const userIndex = users.findIndex(u => u.username === oldUser);
                if (userIndex !== -1) { users[userIndex].username = newNick; users[userIndex].status = newStatus || users[userIndex].status; }
                messages.forEach(m => { if (m.username === oldUser) m.username = newNick; });
                privateMessages.forEach(m => { if (m.from === oldUser) m.from = newNick; if (m.to === oldUser) m.to = newNick; });
                saveUsers(); saveMessages(); savePM();
            } else {
                const user = users.find(u => u.username === currentUser);
                if (user) user.status = newStatus;
                saveUsers();
            }
            alert('✅ პროფილი განახლდა!');

            if (currentRoom) renderMessages();

            container.innerHTML = userAlbum.map(photo => `<img src="${photo}" class="album-photo" onclick="viewImage('${photo}')">`).join('');

        function addToAlbum(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (!userAlbums[currentUser]) userAlbums[currentUser] = [];

            document.getElementById('roomsList').innerHTML = ROOMS.map(room => `
                <div class="room-card" onclick="openRoom('${room.name}')">
                    <span class="room-icon">${room.icon}</span>
                    <span class="room-name">${room.name}</span>
                </div>
            `).join('');
        }
        // ============ ოთახები და ჩატი ============
        function renderRooms() { document.getElementById('roomsList').innerHTML = ROOMS.map(room => `<div class="room-card" onclick="openRoom('${room.name}')"><span class="room-icon">${room.icon}</span><span class="room-name">${room.name}</span></div>`).join(''); }
        function openRoom(roomName) { currentRoom = roomName; document.getElementById('chatRoomName').innerHTML = `📡 ${roomName}`; showPage('chat'); renderMessages(); }
        function closeChat() { currentRoom = null; showPage('home'); }

        // ============ შეტყობინებები ============
        function renderMessages() {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            const roomMessages = messages.filter(m => m.room === currentRoom).sort((a,b) => new Date(a.time) - new Date(b.time));
            if (roomMessages.length === 0) { container.innerHTML = '<div class="empty-state">💬 შეტყობინებები არ არის</div>'; return; }
            container.innerHTML = roomMessages.map(msg => {
                const user = users.find(u => u.username === msg.username) || { avatar: null };
                const isOwner = msg.username === OWNER;
                const isAdmin = users.find(u => u.username === msg.username)?.role === 'admin';
                const timeStr = new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const avatarHtml = user?.avatar ? `<img src="${user.avatar}" style="width:28px; height:28px; border-radius:50%; object-fit:cover;">` : `<div class="message-avatar">${msg.username.charAt(0).toUpperCase()}</div>`;
                let extraClass = '';
                if (isOwner) extraClass = 'owner-message';
                else if (isAdmin) extraClass = 'admin-message';
                return `
                    <div class="message ${extraClass}">
                        <div class="message-header">
                            ${avatarHtml}
                            <span class="message-name" onclick="showUserProfile('${msg.username}')">${escapeHtml(msg.username)}</span>
                            <span class="message-time">${timeStr}</span>
                        </div>
                        <div class="message-text">${formatMessage(msg.text)}${msg.image ? `<img src="${msg.image}" onclick="viewImage('${msg.image}')">` : ''}</div>
                        ${(currentUser === OWNER || msg.username === currentUser) ? `<button class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</button>` : ''}
                    </div>
                `;
                let extraClass = isOwner ? 'owner-message' : (isAdmin ? 'admin-message' : '');
                let formattedText = escapeHtml(msg.text);
                formattedText = formattedText.replace(/:img:(.*?):/g, '<img src="$1" style="width:32px; height:32px; object-fit:cover; border-radius:8px; vertical-align:middle;">');
                return `<div class="message ${extraClass}"><div class="message-header">${avatarHtml}<span class="message-name" onclick="showUserProfile('${msg.username}')">${escapeHtml(msg.username)}</span><span class="message-time">${timeStr}</span></div><div class="message-text">${formattedText}${msg.image ? `<img src="${msg.image}" onclick="openPhotoModal('${msg.image}', '${msg.username}', '${timeStr}')">` : ''}</div>${(currentUser === OWNER || msg.username === currentUser) ? `<button class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</button>` : ''}</div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        function formatMessage(text) {
            let formatted = escapeHtml(text);
            formatted = formatted.replace(/:img:(.*?):/g, '<img src="$1" style="width:32px; height:32px; object-fit:cover; border-radius:8px; vertical-align:middle;">');
            return formatted;
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            const pendingImage = window.pendingImage;
            if (!text && !pendingImage) return;
            messages.push({ id: Date.now(), username: currentUser, text: text || "", time: new Date().toISOString(), room: currentRoom, image: pendingImage || null });
            saveMessages();
            input.value = ''; window.pendingImage = null;
            renderMessages();
        }
        function deleteMessage(msgId) {
            const msg = messages.find(m => m.id === msgId);
            if (!msg) return;
            if (currentUser === OWNER || msg.username === currentUser) {
                messages = messages.filter(m => m.id !== msgId);
                saveMessages(); renderMessages();
            } else alert('❌ წაშლა არ შეგიძლია!');
        }
        function addPhotoToMessage(input) {
            const file = input.files[0];
            if (file) { const reader = new FileReader(); reader.onload = (e) => { window.pendingImage = e.target.result; alert('📷 ფოტო დაემატა!'); }; reader.readAsDataURL(file); }
            input.value = '';
            saveMessages(); input.value = ''; window.pendingImage = null; renderMessages();
        }
        function deleteMessage(msgId) { const msg = messages.find(m => m.id === msgId); if (!msg) return; if (currentUser === OWNER || msg.username === currentUser) { messages = messages.filter(m => m.id !== msgId); saveMessages(); renderMessages(); } else alert('❌ წაშლა არ შეგიძლია!'); }
        function addPhotoToMessage(input) { const file = input.files[0]; if (file) { const reader = new FileReader(); reader.onload = (e) => { window.pendingImage = e.target.result; alert('📷 ფოტო დაემატა!'); }; reader.readAsDataURL(file); } input.value = ''; }

        // ============ მომხმარებლები ============
        function renderOnlineUsers() {
            const container = document.getElementById('onlineList');
            const visibleUsers = users.filter(u => !blockedUsers.includes(u.username) || u.username === currentUser);
            container.innerHTML = visibleUsers.map(user => `
                <div class="user-item" onclick="showUserProfile('${user.username}')">
                    <div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(user.username)} ${user.role === 'owner' ? '👑' : (user.role === 'admin' ? '🔧' : '')}</div><div class="user-status">${escapeHtml(user.status)}</div></div>
                </div>
            `).join('');
            container.innerHTML = visibleUsers.map(user => `<div class="user-item" onclick="showUserProfile('${user.username}')"><div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(user.username)} ${user.role === 'owner' ? '👑' : (user.role === 'admin' ? '🔧' : '')}</div><div class="user-status">${escapeHtml(user.status)}</div></div></div>`).join('');
        }
        
        function renderFriendsList() {
            const container = document.getElementById('friendsList');
            const friendUsers = users.filter(u => friends.includes(u.username));
            if (friendUsers.length === 0) { container.innerHTML = '<div class="empty-state">მეგობრები არ არიან</div>'; return; }
            container.innerHTML = friendUsers.map(user => `
                <div class="user-item" onclick="showUserProfile('${user.username}')">
                    <div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(user.username)}</div><div class="user-status">${escapeHtml(user.status)}</div></div>
                </div>
            `).join('');
            container.innerHTML = friendUsers.map(user => `<div class="user-item" onclick="showUserProfile('${user.username}')"><div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(user.username)}</div><div class="user-status">${escapeHtml(user.status)}</div></div></div>`).join('');
        }

        // ============ პირადი მიმოწერა ============
        function openPrivateChat(username) {
            if (username === currentUser) { alert('საკუთარ თავთან მიმოწერა არ შეიძლება'); return; }
            if (blockedUsers.includes(username)) { alert('🚫 ეს მომხმარებელი დაბლოკილია'); return; }
            if (currentPMUser === username && document.getElementById('pmContainer').innerHTML) { closePM(); return; }
            currentPMUser = username; renderPrivateChat();
        }
        function renderPrivateChat() {
            if (!currentPMUser) return;
            const pmMsgs = privateMessages.filter(m => (m.from === currentUser && m.to === currentPMUser) || (m.from === currentPMUser && m.to === currentUser)).sort((a,b) => new Date(a.time) - new Date(b.time));
            const pmHtml = `
                <div class="pm-chat-container" id="pmChatWindow">
                    <div class="pm-header" onclick="closePM()"><span>💬 ${escapeHtml(currentPMUser)}</span><span>✕</span></div>
                    <div class="pm-messages" id="pmMessages">${pmMsgs.map(msg => `<div class="pm-message ${msg.from === currentUser ? 'own' : ''}"><div style="font-size:9px;">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div><div>${escapeHtml(msg.text)}</div></div>`).join('') || '<div class="empty-state" style="padding:20px;">მიმოწერა ცარიელია</div>'}</div>
                    <div class="pm-input-area"><input type="text" id="pmInput" class="pm-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()"><button class="icon-btn" style="width:36px; height:36px;" onclick="sendPM()">➤</button></div>
                </div>
            `;
            document.getElementById('pmContainer').innerHTML = pmHtml;
            const pmDiv = document.getElementById('pmMessages'); if (pmDiv) pmDiv.scrollTop = pmDiv.scrollHeight;
            document.getElementById('pmInput')?.focus();
        }
        function openPrivateChat(username) { if (username === currentUser) { alert('საკუთარ თავთან არ შეიძლება'); return; } if (blockedUsers.includes(username)) { alert('🚫 ეს მომხმარებელი დაბლოკილია'); return; } if (currentPMUser === username && document.getElementById('pmContainer').innerHTML) { closePM(); return; } currentPMUser = username; renderPrivateChat(); }
        function renderPrivateChat() { if (!currentPMUser) return; const pmMsgs = privateMessages.filter(m => (m.from === currentUser && m.to === currentPMUser) || (m.from === currentPMUser && m.to === currentUser)).sort((a,b) => new Date(a.time) - new Date(b.time)); const pmHtml = `<div class="pm-chat-container" id="pmChatWindow"><div class="pm-header" onclick="closePM()"><span>💬 ${escapeHtml(currentPMUser)}</span><span>✕</span></div><div class="pm-messages" id="pmMessages">${pmMsgs.map(msg => `<div class="pm-message ${msg.from === currentUser ? 'own' : ''}"><div style="font-size:9px;">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div><div>${escapeHtml(msg.text)}</div></div>`).join('') || '<div class="empty-state" style="padding:20px;">მიმოწერა ცარიელია</div>'}</div><div class="pm-input-area"><input type="text" id="pmInput" class="pm-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()"><button class="icon-btn" style="width:36px; height:36px;" onclick="sendPM()">➤</button></div></div>`; document.getElementById('pmContainer').innerHTML = pmHtml; const pmDiv = document.getElementById('pmMessages'); if (pmDiv) pmDiv.scrollTop = pmDiv.scrollHeight; document.getElementById('pmInput')?.focus(); }
        function closePM() { document.getElementById('pmContainer').innerHTML = ''; currentPMUser = null; }
        function sendPM() {
            const input = document.getElementById('pmInput');
            const text = input.value.trim();
            if (!text || !currentPMUser) return;
            privateMessages.push({ id: Date.now(), from: currentUser, to: currentPMUser, text: text, time: new Date().toISOString() });
            savePM(); input.value = ''; renderPrivateChat(); renderPrivateChatsList();
        }
        function renderPrivateChatsList() {
            const myPMs = privateMessages.filter(m => m.from === currentUser || m.to === currentUser);
            const uniqueUsers = new Set();
            myPMs.forEach(m => { const other = m.from === currentUser ? m.to : m.from; uniqueUsers.add(other); });
            const container = document.getElementById('pmList');
            if (uniqueUsers.size === 0) { container.innerHTML = '<div class="empty-state">ჯერ არ გქონია მიმოწერა</div>'; return; }
            container.innerHTML = Array.from(uniqueUsers).map(username => {
                const lastMsg = myPMs.filter(m => (m.from === username || m.to === username)).pop();
                const user = users.find(u => u.username === username);
                return `<div class="user-item" onclick="openPrivateChat('${username}')"><div class="user-avatar" style="${user?.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user?.avatar ? '' : username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(username)}</div><div class="user-status">${lastMsg ? lastMsg.text.substring(0,30) : '...'}</div></div></div>`;
            }).join('');
        }
        function sendPM() { const input = document.getElementById('pmInput'); const text = input.value.trim(); if (!text || !currentPMUser) return; privateMessages.push({ id: Date.now(), from: currentUser, to: currentPMUser, text: text, time: new Date().toISOString() }); savePM(); input.value = ''; renderPrivateChat(); renderPrivateChatsList(); }
        function renderPrivateChatsList() { const myPMs = privateMessages.filter(m => m.from === currentUser || m.to === currentUser); const uniqueUsers = new Set(); myPMs.forEach(m => { const other = m.from === currentUser ? m.to : m.from; uniqueUsers.add(other); }); const container = document.getElementById('pmList'); if (uniqueUsers.size === 0) { container.innerHTML = '<div class="empty-state">ჯერ არ გქონია მიმოწერა</div>'; return; } container.innerHTML = Array.from(uniqueUsers).map(username => { const lastMsg = myPMs.filter(m => (m.from === username || m.to === username)).pop(); const user = users.find(u => u.username === username); return `<div class="user-item" onclick="openPrivateChat('${username}')"><div class="user-avatar" style="${user?.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user?.avatar ? '' : username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(username)}</div><div class="user-status">${lastMsg ? lastMsg.text.substring(0,30) : '...'}</div></div></div>`; }).join(''); }

        // ============ დამხმარე ============
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => { btn.classList.remove('active'); if (btn.getAttribute('data-page') === pageName) btn.classList.add('active'); });
            if (pageName === 'online') renderOnlineUsers();
            if (pageName === 'friends') renderFriendsList();
            if (pageName === 'messages') renderPrivateChatsList();
            if (pageName === 'profile') { const user = users.find(u => u.username === currentUser); document.getElementById('nicknameInput').value = currentUser; document.getElementById('statusInput').value = user?.status || ''; if (user?.avatar) { document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar})`; document.getElementById('profileAvatar').style.backgroundSize = 'cover'; document.getElementById('profileAvatar').innerHTML = ''; } renderAlbum(); }
            if (pageName === 'profile') { const user = users.find(u => u.username === currentUser); document.getElementById('statusInput').value = user?.status || ''; if (user?.avatar) { document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar})`; document.getElementById('profileAvatar').style.backgroundSize = 'cover'; document.getElementById('profileAvatar').innerHTML = ''; } renderAlbum(); }
        }
        function viewImage(src) { const win = window.open(); win.document.write(`<img src="${src}" style="max-width:100%;">`); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function startHearts() { setInterval(() => { const heart = document.createElement('div'); heart.className = 'heart'; heart.innerHTML = ['❤️', '💖', '💗', '💕', '💘'][Math.floor(Math.random()*5)]; heart.style.left = Math.random()*100+'%'; heart.style.fontSize = (18+Math.random()*22)+'px'; document.getElementById('hearts').appendChild(heart); setTimeout(() => heart.remove(), 4000); }, 2000); }
        function toggleTheme() { document.body.classList.toggle('day-mode'); document.getElementById('themeToggle').innerHTML = document.body.classList.contains('day-mode') ? '☀️' : '🌙'; }

        function init() {
            loadData(); loadAlbums(); renderRooms(); renderOnlineUsers(); renderFriendsList(); renderPrivateChatsList(); startHearts();
            document.getElementById('userId').innerHTML = Math.floor(Math.random() * 10000) + 1000;
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => { btn.addEventListener('click', () => showPage(btn.getAttribute('data-page'))); });
            showPage('home');
        }
        function init() { loadData(); loadAlbums(); renderRooms(); renderOnlineUsers(); renderFriendsList(); renderPrivateChatsList(); startHearts(); document.getElementById('userId').innerHTML = Math.floor(Math.random() * 10000) + 1000; document.getElementById('themeToggle').addEventListener('click', toggleTheme); document.querySelectorAll('.nav-btn[data-page]').forEach(btn => { btn.addEventListener('click', () => showPage(btn.getAttribute('data-page'))); }); showPage('home'); }
        init();
    </script>
