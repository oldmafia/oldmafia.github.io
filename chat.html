<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ჩატი</title>

<style>
body{
    margin:0;
    background:black;
    font-family:sans-serif;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    padding:15px;
    background:#111;
    text-align:center;
    font-weight:bold;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.message{
    background:#1a1a1a;
    padding:10px;
    border-radius:12px;
    margin-bottom:10px;
}

.message-header{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:5px;
}

.avatar{
    width:35px;
    height:35px;
    border-radius:50%;
}

.nickname{
    font-weight:bold;
    color:red;
}

.input-area{
    display:flex;
    padding:10px;
    background:#111;
    gap:5px;
}

.input-area input{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

.input-area button{
    padding:12px 15px;
    background:red;
    border:none;
    border-radius:10px;
    color:white;
    font-size:16px;
}
</style>
</head>
<body>

<div class="header" id="room-title"></div>

<div class="chat-box" id="chat-box"></div>

<div class="input-area">
    <input type="text" id="message-input" placeholder="დაწერე მესიჯი...">
    <button onclick="sendMessage()">➤</button>
</div>

<script>
document.getElementById("room-title").innerText =
localStorage.getItem("room");

function sendMessage(){
    let input = document.getElementById("message-input");
    let message = input.value.trim();

    if(message === "") return;

    let chatBox = document.getElementById("chat-box");

    let msgDiv = document.createElement("div");
    msgDiv.className = "message";

    msgDiv.innerHTML = `
        <div class="message-header">
            <img src="https://i.pravatar.cc/100?img=${Math.floor(Math.random()*70)}" class="avatar">
            <span class="nickname">User</span>
        </div>
        <div>${message}</div>
    `;

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    input.value = "";
}
</script>

</body>
</html>
