<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ChatApp - შინდისფერი გულები</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* ========== ანიმაციური გულები ფონზე ========== */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            pointer-events: none;
            animation: floatHeart 8s ease-in-out forwards;
            opacity: 0.6;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(1);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg) scale(0.8);
                opacity: 0;
            }
        }

        /* ========== ღამის რეჟიმი ========== */
        body.night {
            background: #0a0508;
        }

        body.night .app {
            background: rgba(0, 0, 0, 0.85);
        }

        body.night .top-bar {
            background: linear-gradient(135deg, #1a0f15, #2d1a25);
            border-bottom: 2px solid #b81a3a;
            box-shadow: 0 2px 15px rgba(184, 26, 58, 0.3);
        }

        body.night .top-btn {
            background: rgba(184, 26, 58, 0.25);
            color: #ffdddd;
            border: 1px solid #b81a3a;
        }

        body.night .top-btn:hover {
            background: #b81a3a;
            color: #fff;
        }

        body.night .sidebar {
            background: rgba(26, 15, 20, 0.95);
            border-right: 1px solid #b81a3a;
        }

        body.night .room-item {
            background: rgba(184, 26, 58, 0.2);
            color: #ffdddd;
        }

        body.night .room-item:hover {
            background: #b81a3a;
        }

        body.night .room-item.active {
            background: #b81a3a;
            box-shadow: 0 0 10px rgba(184, 26, 58, 0.5);
        }

        body.night .chat-main {
            background: rgba(0, 0, 0, 0.7);
        }

        body.night .chat-header {
            background: rgba(26, 15, 20, 0.9);
            border-bottom: 1px solid #b81a3a;
        }

        body.night .message {
            background: rgba(45, 30, 38, 0.9);
            color: #ffe0e0;
        }

        body.night .message.my {
            background: linear-gradient(135deg, #b81a3a, #8a1030);
        }

        body.night .input-area {
            background: rgba(26, 15, 20, 0.95);
            border-top: 1px solid #b81a3a;
        }

        body.night .input-area input {
            background: #2a1a22;
            color: #fff;
            border: 1px solid #b81a3a;
        }

        /* ========== დღის რეჟიმი ========== */
        body.day {
            background: #fff5ec;
        }

        body.day .app {
            background: rgba(255, 245, 235, 0.92);
        }

        body.day .top-bar {
            background: linear-gradient(135deg, #fff0e4, #ffe8dc);
            border-bottom: 2px solid #b84a2a;
            box-shadow: 0 2px 15px rgba(184, 74, 42, 0.2);
        }

        body.day .top-btn {
            background: rgba(184, 74, 42, 0.15);
            color: #5a2a1a;
            border: 1px solid #d4a58a;
        }

        body.day .top-btn:hover {
            background: #b84a2a;
            color: #fff;
        }

        body.day .sidebar {
            background: rgba(255, 240, 230, 0.95);
            border-right: 1px solid #e4c4b0;
        }

        body.day .room-item {
            background: #fff0e4;
            color: #5a2a1a;
            border: 1px solid #e4c4b0;
        }

        body.day .room-item:hover {
            background: #b84a2a;
            color: #fff;
        }

        body.day .room-item.active {
            background: #b84a2a;
            color: #fff;
        }

        body.day .chat-main {
            background: rgba(255, 245, 235, 0.85);
        }

        body.day .chat-header {
            background: rgba(255, 240, 230, 0.9);
            border-bottom: 1px solid #e4c4b0;
        }

        body.day .message {
            background: #fff;
            color: #4a2a1a;
            border: 1px solid #e4c4b0;
        }

        body.day .message.my {
            background: #ffe8dc;
        }

        body.day .input-area {
            background: rgba(255, 240, 230, 0.95);
            border-top: 1px solid #e4c4b0;
        }

        body.day .input-area input {
            background: #fff;
            color: #4a2a1a;
            border: 1px solid #e4c4b0;
        }

        /* ========== მთავარი კონტეინერი ========== */
        .app {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== ზედა ბარი ========== */
        .top-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: #b84a2a;
        }

        .top-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .top-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .theme-btn {
            background: #b81a3a;
            color: #fff;
            border: none;
        }

        /* ========== მთავარი შიგთავსი ========== */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ========== მარცხენა პანელი (ოთახები) ========== */
        .sidebar {
            width: 260px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .room-item {
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 500;
        }

        /* ========== ჩატის არე ========== */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-name {
            font-size: 18px;
            font-weight: bold;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 40px;
            transition: all 0.2s;
        }

        .profile-header:hover {
            background: rgba(184, 26, 58, 0.2);
        }

        .profile-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #b84a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .profile-info {
            text-align: right;
        }

        .profile-name {
            font-weight: bold;
            font-size: 14px;
        }

        .profile-status {
            font-size: 11px;
            opacity: 0.7;
        }

        /* ========== შეტყობინებები ========== */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            position: relative;
        }

        .message.left {
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message.right {
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 11px;
        }

        .msg-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #b84a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .msg-name {
            font-weight: bold;
        }

        .msg-time {
            font-size: 9px;
            opacity: 0.6;
        }

        .msg-text {
            font-size: 14px;
            word-break: break-word;
            line-height: 1.4;
        }

        /* ========== შეყვანის ველი ========== */
        .input-area {
            padding: 12px 16px;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 30px;
            outline: none;
            font-size: 14px;
        }

        .send-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            background: #b81a3a;
            color: #fff;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.02);
        }

        /* ========== პროფილის მოდალი ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            width: 90%;
            max-width: 360px;
            padding: 24px;
            border-radius: 24px;
        }

        body.night .modal-content {
            background: #2a1a22;
            border: 1px solid #b81a3a;
        }

        body.day .modal-content {
            background: #fff;
            border: 1px solid #e4c4b0;
        }

        .modal-content h3 {
            margin-bottom: 16px;
            text-align: center;
        }

        .modal-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #b84a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 16px;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background: #b81a3a;
            color: #fff;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(184, 26, 58, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: #b81a3a;
            border-radius: 4px;
        }
    </style>
</head>
<body class="night">
    <div class="hearts-bg" id="heartsBg"></div>

    <div class="app">
        <!-- ზედა ბარი -->
        <div class="top-bar">
            <div class="logo">
                💗 <span>ChatApp</span> 💗
            </div>
            <div class="top-buttons">
                <button class="top-btn" id="profileBtn">👤 პროფილი</button>
                <button class="top-btn" id="friendsBtn">👥 მეგობრები</button>
                <button class="top-btn" id="onlineBtn">🟢 ონლაინ</button>
                <button class="top-btn" id="usersBtn">📋 მომხმარებლები</button>
                <button class="top-btn theme-btn" id="themeBtn">🌙</button>
            </div>
        </div>

        <div class="main">
            <!-- მარცხენა პანელი - ოთახები -->
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="section-title">📌 ოთახები (12)</div>
                    <div class="rooms-list" id="roomsList"></div>
                </div>
            </div>

            <!-- ჩატის არე -->
            <div class="chat-main">
                <div class="chat-header">
                    <div class="room-name" id="roomName">ოთახი 1</div>
                    <div class="profile-header" id="profileHeader">
                        <div class="profile-info">
                            <div class="profile-name" id="headerName">მომხმარებელი</div>
                            <div class="profile-status" id="headerStatus">💗 აქტიური</div>
                        </div>
                        <div class="profile-avatar" id="headerAvatar">👤</div>
                    </div>
                </div>

                <div class="messages-area" id="messagesArea"></div>

                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="დაწერე შეტყობინება...">
                    <button class="send-btn" id="sendBtn">📤 გაგზავნა</button>
                </div>
            </div>
        </div>
    </div>

    <!-- პროფილის მოდალი -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h3>💗 ჩემი პროფილი</h3>
            <div class="modal-avatar" id="modalAvatar">👤</div>
            <input type="file" id="photoUpload" accept="image/*">
            <input type="text" id="editName" placeholder="ნიკნეიმი">
            <input type="text" id="editStatus" placeholder="სტატუსი">
            <div class="modal-buttons">
                <button id="saveProfile" class="btn-primary">💾 შენახვა</button>
                <button id="closeProfile">❌ დახურვა</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== მომხმარებელი ====================
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || {
            id: 'user_' + Date.now(),
            name: 'მომხმარებელი_' + Math.floor(Math.random() * 1000),
            avatar: '👤',
            status: '💗 აქტიური'
        };

        // ==================== 12 ოთახი ====================
        let rooms = [];
        for (let i = 1; i <= 12; i++) {
            let saved = localStorage.getItem(`room_${i}`);
            rooms.push({
                id: i,
                name: `ოთახი ${i}`,
                messages: saved ? JSON.parse(saved) : []
            });
        }

        let currentRoom = 0; // 0-დან 11-მდე

        // ==================== გულების ანიმაცია ====================
        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 35 + 20) + 'px';
                heart.style.animationDuration = (Math.random() * 6 + 5) + 's';
                document.getElementById('heartsBg').appendChild(heart);
                setTimeout(() => heart.remove(), 10000);
            }, 1500);
        }

        // ==================== ოთახების ჩვენება ====================
        function renderRooms() {
            const container = document.getElementById('roomsList');
            container.innerHTML = '';
            rooms.forEach((room, index) => {
                const div = document.createElement('div');
                div.className = `room-item ${currentRoom === index ? 'active' : ''}`;
                div.innerHTML = `📌 ${room.name}`;
                div.onclick = () => changeRoom(index);
                container.appendChild(div);
            });
        }

        function changeRoom(index) {
            currentRoom = index;
            document.getElementById('roomName').innerHTML = rooms[currentRoom].name;
            renderRooms();
            renderMessages();
        }

        // ==================== შეტყობინებების ჩვენება ====================
        function renderMessages() {
            const container = document.getElementById('messagesArea');
            const messages = rooms[currentRoom].messages;
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.5;">💬 არ არის შეტყობინებები</div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => {
                const isMy = msg.userId === currentUser.id;
                return `
                    <div class="message ${isMy ? 'right' : 'left'}">
                        <div class="message-header">
                            <div class="msg-avatar">${msg.avatar || '👤'}</div>
                            <span class="msg-name">${escapeHtml(msg.userName)}</span>
                            <span class="msg-time">${msg.time}</span>
                        </div>
                        <div class="msg-text">${escapeHtml(msg.text)}</div>
                    </div>
                `;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        // ==================== შეტყობინების გაგზავნა ====================
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const newMsg = {
                id: Date.now(),
                userId: currentUser.id,
                userName: currentUser.name,
                avatar: currentUser.avatar,
                text: text,
                time: new Date().toLocaleTimeString()
            };
            
            rooms[currentRoom].messages.push(newMsg);
            localStorage.setItem(`room_${rooms[currentRoom].id}`, JSON.stringify(rooms[currentRoom].messages));
            
            input.value = '';
            renderMessages();
        }

        // ==================== პროფილი ====================
        function updateProfileUI() {
            document.getElementById('headerName').innerHTML = currentUser.name;
            document.getElementById('headerStatus').innerHTML = currentUser.status;
            document.getElementById('headerAvatar').innerHTML = currentUser.avatar;
            document.getElementById('modalAvatar').innerHTML = currentUser.avatar;
            document.getElementById('editName').value = currentUser.name;
            document.getElementById('editStatus').value = currentUser.status;
        }

        function saveProfile() {
            const newName = document.getElementById('editName').value.trim();
            if (newName) currentUser.name = newName;
            currentUser.status = document.getElementById('editStatus').value;
            
            const photoFile = document.getElementById('photoUpload').files[0];
            if (photoFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentUser.avatar = `<img src="${e.target.result}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                    saveUser();
                };
                reader.readAsDataURL(photoFile);
            } else {
                saveUser();
            }
        }
        
        function saveUser() {
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            updateProfileUI();
            renderMessages();
            document.getElementById('profileModal').classList.remove('show');
            alert('✅ პროფილი განახლდა!');
        }

        // ==================== თემის შეცვლა ====================
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.classList.contains('night')) {
                body.classList.remove('night');
                body.classList.add('day');
                btn.innerHTML = '☀️';
            } else {
                body.classList.remove('day');
                body.classList.add('night');
                btn.innerHTML = '🌙';
            }
        }

        // ==================== დროებითი ფუნქციები (მერე დაემატება) ====================
        function openFriends() {
            alert('👥 მეგობრები - მალე დაემატება');
        }
        
        function openOnline() {
            alert('🟢 ონლაინ მომხმარებლები - მალე დაემატება');
        }
        
        function openUsers() {
            alert('📋 ყველა მომხმარებელი - მალე დაემატება');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ==================== Event Listeners ====================
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        document.getElementById('profileBtn').onclick = () => document.getElementById('profileModal').classList.add('show');
        document.getElementById('profileHeader').onclick = () => document.getElementById('profileModal').classList.add('show');
        document.getElementById('saveProfile').onclick = saveProfile;
        document.getElementById('closeProfile').onclick = () => document.getElementById('profileModal').classList.remove('show');
        document.getElementById('themeBtn').onclick = toggleTheme;
        document.getElementById('friendsBtn').onclick = openFriends;
        document.getElementById('onlineBtn').onclick = openOnline;
        document.getElementById('usersBtn').onclick = openUsers;

        // ==================== ინიციალიზაცია ====================
        startHearts();
        renderRooms();
        renderMessages();
        updateProfileUI();
        changeRoom(0);
    </script>
</body>
</html>
