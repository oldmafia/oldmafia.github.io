            console.log("📱 გადასვლა გვერდზე:", pageName);
            
            // ყველა გვერდის დამალვა
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            
            // არჩეული გვერდის ჩვენება
            const targetPage = document.getElementById(pageName + 'Page');
            if (targetPage) {
                targetPage.classList.add('active');
            } else if (pageName === 'chat') {
                document.getElementById('chatPage').classList.add('active');
            }
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');

            // ნავიგაციის განახლება
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-page') === pageName) {
                    btn.classList.add('active');
                }
                if (btn.getAttribute('data-page') === pageName) btn.classList.add('active');
            });
            
            if (pageName === 'online') renderOnlineUsers();
            if (pageName === 'messages') renderPrivateChats();
        }

        
        // ოთახების რენდერი
        function renderRooms() {
            const container = document.getElementById('roomsList');
            container.innerHTML = ROOMS.map(room => `
                <div class="room-card" onclick="openRoom('${room.name}')">
                    <span class="room-icon">${room.icon}</span>
                    <span class="room-name">${room.name}</span>
                </div>
            `).join('');
        }
        
        // ოთახის გახსნა
        function openRoom(roomName) {
            console.log("🚪 გაიხსნა ოთახი:", roomName);
            currentRoom = roomName;
            document.getElementById('chatRoomName').innerHTML = `📡 ${roomName}`;
            showPage('chat');
            loadChatMessages();
            renderMessages();
        }

        // ჩატის დახურვა
        
        function closeChat() {
            currentRoom = null;
            showPage('home');
        }

        // შეტყობინებების ჩატვირთვა
        function loadChatMessages() {
        
        // შეტყობინებების ჩვენება
        function renderMessages() {
            const container = document.getElementById('chatMessages');
            if (!container) return;

            // დემო შეტყობინებები
            const messages = demoMessages;
            const roomMessages = messages.filter(m => m.room === currentRoom);

            if (messages.length === 0) {
            if (roomMessages.length === 0) {
                container.innerHTML = '<div class="empty-state">შეტყობინებები არ არის</div>';
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.username === currentUser ? 'own' : ''}">
                    <div class="message-name">${escapeHtml(msg.username)}</div>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
            container.innerHTML = roomMessages.map(msg => {
                const isAdmin = ADMINS.includes(msg.username);
                const isOwner = msg.username === OWNER;
                let extraClass = '';
                if (isOwner) extraClass = 'owner-message';
                else if (isAdmin) extraClass = 'admin-message';
                
                const userData = users.find(u => u.username === msg.username) || { avatar: "👤" };
                const timeStr = new Date(msg.time).toLocaleTimeString('ka-GE', { hour: '2-digit', minute: '2-digit' });
                
                const imagesHtml = msg.images ? msg.images.map(img => `<img src="${img}" onclick="viewImage('${img}')">`).join('') : '';
                
                return `
                    <div class="message ${extraClass}" data-id="${msg.id}">
                        <div class="message-header">
                            <div class="message-avatar">${userData.avatar}</div>
                            <span class="message-name">${escapeHtml(msg.username)}</span>
                            <span class="message-time">${timeStr}</span>
                        </div>
                        <div class="message-text">
                            ${formatMessage(msg.text)}
                            ${imagesHtml}
                        </div>
                        ${(ADMINS.includes(currentUser) || currentUser === OWNER) ? `
                            <button class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</button>
                        ` : ''}
                    </div>
                `;
            }).join('');

            container.scrollTop = container.scrollHeight;
        }

        
        // შეტყობინების ფორმატირება
        function formatMessage(text) {
            let formatted = escapeHtml(text);
            formatted = formatted.replace(/:([a-z_]+):/g, '<span style="font-size: 24px;">$1</span>');
            return formatted;
        }
        
        // შეტყობინების გაგზავნა
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text) return;
            if (!text && selectedImages.length === 0) return;

            // ახალი შეტყობინების დამატება
            demoMessages.push({
            const newMsg = {
                id: nextMsgId++,
                username: currentUser,
                text: text,
                time: new Date()
            });
                text: text || "",
                time: new Date(),
                room: currentRoom,
                images: [...selectedImages]
            };

            messages.push(newMsg);
            input.value = '';
            loadChatMessages();
            selectedImages = [];
            document.getElementById('imagePreview').innerHTML = '';
            renderMessages();
        }

        // ოთახების ჩვენება
        function renderRooms() {
            const container = document.getElementById('roomsList');
            if (!container) return;
        
        // შეტყობინების წაშლა (მხოლოდ ადმინებისთვის)
        function deleteMessage(msgId) {
            if (!ADMINS.includes(currentUser) && currentUser !== OWNER) {
                alert('შეტყობინების წაშლა მხოლოდ ადმინებს შეუძლიათ!');
                return;
            }
            messages = messages.filter(m => m.id !== msgId);
            renderMessages();
        }
        
        // სურათების მომზადება
        function prepareImages() {
            const files = document.getElementById('imageInput').files;
            const preview = document.getElementById('imagePreview');
            selectedImages = [];
            preview.innerHTML = '';

            container.innerHTML = ROOMS.map(room => `
                <div class="room-card" onclick="openRoom('${room.name}')">
                    <span>${room.icon}</span>
                    <b>${room.name}</b>
                </div>
            `).join('');
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedImages.push(e.target.result);
                    preview.innerHTML += `<img src="${e.target.result}" class="preview-img">`;
                };
                reader.readAsDataURL(file);
            }
        }

        // ონლაინ მომხმარებლების ჩვენება
        
        // სურათის ნახვა სრულ ეკრანზე
        function viewImage(src) {
            const win = window.open();
            win.document.write(`<img src="${src}" style="max-width:100%; margin:0 auto; display:block;">`);
        }
        
        // ონლაინ მომხმარებლები ავატარებით
        function renderOnlineUsers() {
            const container = document.getElementById('onlineList');
            if (!container) return;
            const onlineUsers = users.filter(u => u.online);

            container.innerHTML = demoUsers.map(user => `
                <div class="user-item" onclick="alert('💬 ${user.username}')">
                    <div class="user-avatar">👤</div>
                    <div>
                        <b>${escapeHtml(user.username)}</b><br>
                        <span style="font-size: 12px; opacity: 0.6;">${escapeHtml(user.status)}</span>
            if (onlineUsers.length === 0) {
                container.innerHTML = '<div class="empty-state">ონლაინ მომხმარებლები არ არიან</div>';
                return;
            }
            
            container.innerHTML = onlineUsers.map(user => `
                <div class="user-item" onclick="startPrivateChat('${user.username}')">
                    <div class="user-avatar">${user.avatar}</div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.username)}</div>
                        <div class="user-status">${escapeHtml(user.status)}</div>
                    </div>
                </div>
            `).join('');
        }

        // ემოჯიების ჩატვირთვა
        
        // პირადი მიმოწერა
        function startPrivateChat(username) {
            alert(`💬 პირადი მიმოწერა ${username}-თან\n(დემო ვერსია)`);
        }
        
        function renderPrivateChats() {
            const container = document.getElementById('pmList');
            container.innerHTML = '<div class="empty-state">პირადი მიმოწერა ჯერ არ არის</div>';
        }
        
        // ემოჯიები
        function renderEmojis() {
            const board = document.getElementById('emojiBoard');
            if (!board) return;
            const emojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺', '💀', '👑', '💪', '🤡', '👻', '🐱', '🍕', '⚡'];

            const emojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺', '😭', '💀', '👑', '💪', '🤡'];
            board.innerHTML = emojis.map(emoji => `
                <div class="emoji" onclick="addEmoji('${emoji}')">${emoji}</div>
            `).join('');
            let html = emojis.map(e => `<div class="emoji" onclick="addEmoji('${e}')">${e}</div>`).join('');
            
            // ადმინებს ემოჯის დამატების უფლება
            if (ADMINS.includes(currentUser) || currentUser === OWNER) {
                html += `<div class="admin-emoji-btn" onclick="addCustomEmoji()">➕</div>`;
            }
            
            board.innerHTML = html;
        }

        
        function addEmoji(emoji) {
            const input = document.getElementById('messageInput');
            if (input) {
                input.value += emoji;
                input.focus();
            }
            input.value += emoji;
            input.focus();
            toggleEmoji();
        }

        
        function addCustomEmoji() {
            const emoji = prompt('ჩაწერეთ ახალი ემოჯი (emoji ან ტექსტი):');
            if (emoji) {
                alert('ემოჯი დაემატა! (დემო ვერსიაში არ ინახება)');
                renderEmojis();
            }
        }
        
        function toggleEmoji() {
            const board = document.getElementById('emojiBoard');
            board.classList.toggle('active');
            document.getElementById('emojiBoard').classList.toggle('active');
        }

        
        // ავატარის ატვირთვა
        function uploadAvatar() {
            const file = document.getElementById('avatarInput').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.querySelector('.profile-avatar').style.backgroundImage = `url(${e.target.result})`;
                    document.querySelector('.profile-avatar').style.backgroundSize = 'cover';
                    document.querySelector('.profile-avatar').innerHTML = '';
                    alert('ავატარი განახლდა!');
                };
                reader.readAsDataURL(file);
            }
        }
        
        // სტატუსის შენახვა
        function saveStatus() {
            const status = document.getElementById('profileStatus').value;
            const user = users.find(u => u.username === currentUser);
            if (user) user.status = status;
            localStorage.setItem('mafia_status', status);
        }
        
        // გულების ანიმაცია
        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️', '💖', '💗', '💕', '💘'][Math.floor(Math.random() * 5)];
                const hearts = ['❤️', '💖', '💗', '💕', '💘', '❤️‍🔥'];
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (16 + Math.random() * 24) + 'px';
                heart.style.fontSize = (18 + Math.random() * 22) + 'px';
                document.getElementById('hearts').appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 2500);
            }, 2000);
        }

        
        // თემის შეცვლა
        function toggleTheme() {
            document.body.classList.toggle('light');
            document.body.classList.toggle('day-mode');
            const btn = document.getElementById('themeToggle');
            if (document.body.classList.contains('light')) {
            if (document.body.classList.contains('day-mode')) {
                btn.innerHTML = '☀️';
            } else {
                btn.innerHTML = '🌙';
            }
        }

        // სტატუსის შენახვა
        function saveStatus() {
            const status = document.getElementById('userStatus').value;
            localStorage.setItem('mafia_status', status);
        }

        // HTML ესკეიპი
        
        // დამხმარე ფუნქციები
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        
        // Enter ღილაკი
        document.addEventListener('DOMContentLoaded', () => {
            const msgInput = document.getElementById('messageInput');
            if (msgInput) {
                msgInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') sendMessage();
                });
        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // კლიკი ემოჯი ბორდის გარეთ დახურვისთვის
        document.addEventListener('click', (e) => {
            const board = document.getElementById('emojiBoard');
            const emojiBtn = e.target.closest('.icon-btn');
            if (!emojiBtn || emojiBtn.innerHTML !== '😊') {
                if (board) board.classList.remove('active');
            }
        });

        
        // ინიციალიზაცია
        function init() {
            console.log("🚀 აპლიკაცია ჩაიტვირთა!");
            
            // მომხმარებლის სახელი
            document.getElementById('userName').innerHTML = currentUser;
            document.getElementById('profileName').innerHTML = currentUser;
            document.getElementById('userId').innerHTML = Math.floor(Math.random() * 10000);

            // შენახული სტატუსი
            const savedStatus = localStorage.getItem('mafia_status');
            if (savedStatus) {
                document.getElementById('userStatus').value = savedStatus;
            }
            if (savedStatus) document.getElementById('profileStatus').value = savedStatus;

            // კომპონენტების რენდერი
            renderRooms();
            renderOnlineUsers();
            renderEmojis();
            startHearts();

            // ნავიგაციის ღილაკები
            // ნავიგაცია
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = btn.getAttribute('data-page');
                    showPage(page);
                });
                btn.addEventListener('click', () => showPage(btn.getAttribute('data-page')));
            });

            // თემის ღილაკი
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('profileStatus').addEventListener('change', saveStatus);

            // სტატუსის შენახვა
            document.getElementById('userStatus').addEventListener('change', saveStatus);
            
            console.log("✅ მზადაა!");
            // შეტყობინებებისთვის ოთახის დამატება
            messages.forEach(m => m.room = m.room || "კაფე-ბარი");
        }

        // გაშვება
        init();
    </script>
</body>
</html>
