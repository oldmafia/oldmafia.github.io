<!DOCTYPE html>
<html lang="ka" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩემი ჩატის აპლიკაცია</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="heart-container"></div>

    <header class="navbar">
        <div class="nav-left">
            <div class="dropdown">
                <button class="nav-icon">🏠 ოთახები</button>
                <div class="dropdown-content" id="roomList"></div>
            </div>
            <button class="nav-icon">💬 PM</button>
            <button class="nav-icon">👥 მეგობრები</button>
        </div>

        <div class="nav-right">
            <span class="online-tag">🟢 ონლაინ</span>
            <button class="nav-icon" id="profileBtn">👤 პროფილი</button>
            <button class="nav-icon" id="themeToggle">🌙 რეჟიმი</button>
        </div>
    </header>

    <main class="chat-main">
        <div class="chat-header">
            <h3 id="currentRoomTitle">ოთახი #1</h3>
        </div>
        <div id="messagesArea" class="messages-container"></div>
        
        <div class="input-container">
            <div id="adminEmojiPanel" class="emoji-panel">
                <span>🔥</span><span>⭐</span><span>👑</span><span>😎</span><span>💎</span>
            </div>
            <div class="input-wrapper">
                <input type="text" id="msgInput" placeholder="დაწერე რამე...">
                <button id="sendBtn">გაგზავნა</button>
            </div>
        </div>
    </main>

    <script src="chat.js"></script>
</body>
</html>
