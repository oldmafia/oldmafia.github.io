<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - SOCIAL CHAT</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease; }
        
        /* 🔴 ღამის რეჟიმი — ღაჟღაჟა წითელი შავში 🔴 */
        body.night-mode {
            --bg-color: #000000;
            --text-color: #e0c8a8;
            --chat-bg: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
            --bubble-bg: #0a0000;
            --bubble-border: #ff0000; /* ღაჟღაჟა წითელი */
            --nick-color: #ff4d4d;
            --sidebar-bg: #000000;
            --input-bg: #0a0000;
            --input-border: #ff0000;
            --topbar-bg: #050000;
            --modal-bg: #0a0000;
            --modal-border: #ff0000;
            --modal-text: #e0c8a8;
            --cover-gradient: linear-gradient(to bottom, #ff0000 0%, #000000 100%);
        }
        
        /* ❤️ დღის რეჟიმი — შენი ლამაზი გულები ❤️ */
        body.day-mode {
            --bg-color: #fff8f0;
            --text-color: #2c2418;
            --chat-bg: #fffef7;
            --bubble-bg: #ffffff;
            --bubble-border: #e8d4b0;
            --nick-color: #c55a3a;
            --sidebar-bg: #fff8ed;
            --input-bg: #ffffff;
            --input-border: #e8d4b0;
            --topbar-bg: #fff4e6;
            --modal-bg: #ffffff;
            --modal-border: #e8d4b0;
            --modal-text: #2c2418;
            --cover-gradient: linear-gradient(to bottom, #ffcccc 0%, #fff8f0 100%);
            background-image: radial-gradient(circle at 15% 25%, rgba(255, 77, 77, 0.2) 3px, transparent 3px),
                              radial-gradient(circle at 75% 60%, rgba(255, 77, 77, 0.15) 2.5px, transparent 2.5px);
            background-size: 55px 55px, 40px 40px;
        }

        /* გულების ანიმაცია დღის რეჟიმისთვის */
        body.day-mode .chat-area::after, 
        body.day-mode #userWall::after {
            content: "❤️"; position: fixed; bottom: 15%; right: 20px; font-size: 56px; opacity: 0.6; animation: floatHeartGlow 5s infinite ease-in-out; filter: drop-shadow(0 0 8px #ff6699); z-index: 100;
        }
        @keyframes floatHeartGlow { 0% { transform: translateY(0); } 50% { transform: translateY(-30px); } 100% { transform: translateY(0); } }

        /* ძირითადი სტილები */
        body { margin: 0; font-family: sans-serif; background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: var(--topbar-bg); padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--bubble-border); height: 60px; z-index: 1000; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: var(--chat-bg); }
        .input-zone { padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--bubble-border); background: var(--topbar-bg); }
        .input-zone input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); }
        
        .sidebar { position: fixed; left: -280px; width: 280px; height: 100%; background: var(--sidebar-bg); transition: 0.3s; z-index: 4000; border-right: 3px solid var(--bubble-border); }
        .sidebar.active { left: 0; }
        .room-item { padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,0,0,0.1); }
        .room-item.active { background: rgba(255,0,0,0.1); font-weight: bold; color: var(--nick-color); }
        
        /* =========================================
           სოციალური პროფილის (მოდალის) სტილი 
        ========================================= */
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { 
            background: var(--modal-bg) !important; 
            border: 2px solid var(--modal-border) !important; 
            color: var(--modal-text) !important;
            width: 95% !important; 
            max-width: 550px !important; 
            height: 85vh !important; 
            overflow-y: auto !important; 
            padding: 0 !important; 
            border-radius: 20px !important;
            position: relative;
        }

        /* Cover ფოტო */
        .profile-header {
            width: 100%; height: 150px;
            background: var(--cover-gradient);
            position: relative;
            border-bottom: 1px solid var(--modal-border);
        }

        /* დიდი ავატარი */
        .profile-avatar-big {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 5px solid var(--modal-bg);
            position: absolute;
            bottom: -55px; left: 20px;
            object-fit: cover;
            cursor: pointer;
        }

        /* ინფორმაციის სექცია */
        .profile-info { padding: 65px 20px 20px 20px; text-align: left; }
        .profile-stats { display: flex; gap: 20px; margin: 15px 0; font-size: 14px; color: var(--nick-color); }
        .profile-bio { font-size: 14px; opacity: 0.8; margin: 5px 0; }

        /* პოსტების "ბარათები" Wall-ზე */
        #userWall { position: relative; padding: 10px; }
        .post-card {
            background: var(--bubble-bg);
            border: 1px solid var(--bubble-border);
            margin: 15px 0; padding: 15px;
            border-radius: 15px;
            text-align: left;
        }
        
        .modal-btn { display: block; width: 100%; padding: 12px; margin: 7px 0; border: 1px solid var(--bubble-border); background: var(--bubble-bg); color: var(--text-color); border-radius: 10px; cursor: pointer; font-weight: bold; }
        .modal-btn.secondary { background: #1a0000; color: white; border-color: red; }
    </style>
</head>
<body class="night-mode" id="mainBody">

<div class="sidebar" id="sidebar">
    <div style="padding: 20px; text-align: center;">
        <img id="my-avatar-img" src="" style="width:65px; height:65px; border-radius:50%; border:2px solid var(--bubble-border); object-fit: cover;">
        <div id="my-nick-label" style="font-weight:bold; margin-top:5px; color: var(--nick-color);">...</div>
    </div>
    <div class="rooms-list">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('📝 ფორუმი', this)">📝 ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('🎲 ნარდი', this)">🎲 ნარდი</div>
    </div>
</div>

<div class="topbar">
    <div onclick="toggleSidebar()" style="cursor:pointer; font-size:25px; color: var(--nick-color);">☰</div>
    <div id="room-name" style="flex:1; text-align:center; color: var(--nick-color); font-weight:bold;">☕ კაფე-ბარი</div>
    <button onclick="toggleTheme()" id="themeToggle" style="background:none; border:none; font-size:20px; cursor:pointer;">🌙</button>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი...">
    <button onclick="sendMsg()" style="border-radius:50%; width:45px; height:45px; background:var(--nick-color); border:none; color:white;">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <div class="profile-header">
            <img id="targetAvatar" class="profile-avatar-big" src="">
        </div>
        
        <div class="profile-info">
            <h2 id="targetName" style="margin:0; color:var(--nick-color);">ნიკი</h2>
            <p class="profile-bio" id="userBio">...</p>
            
            <div class="profile-stats">
                <span><b>🏆 <span id="quizPoints">0</span></b> ვიქტორინა</span>
                <span><b>🔐 <span id="cipherPoints">0</span></b> შიფროগ্রামა</span>
            </div>

            <div style="display:flex; gap:10px; margin: 15px 0;">
                <button class="modal-btn secondary" style="flex:1;">✉️ მიწერა</button>
                <button class="modal-btn secondary" style="flex:1;">➕ მეგობრობა</button>
            </div>

            <hr style="border:0; border-top:1px solid var(--bubble-border); margin: 20px 0;">
            
            <h3 style="margin: 10px 0; color: var(--nick-color);">📝 კედელი</h3>
            <div id="userWall">
                <div class="post-card">მომხმარებლის პოსტები იტვირთება...</div>
            </div>
            
            <div id="adminOptions"></div>
            <button class="modal-btn" onclick="closeModal()">დახურვა</button>
        </div>
    </div>
</div>

<script>
    // შენი Supabase მონაცემები
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), currentRoom = "☕ კაფე-ბარი";

    // თემების გადართვა
    function toggleTheme() {
        const b = document.body;
        const btn = document.getElementById('themeToggle');
        if (b.classList.contains('night-mode')) {
            b.classList.replace('night-mode', 'day-mode');
            btn.innerText = '☀️';
            localStorage.setItem('theme', 'day');
        } else {
            b.classList.replace('day-mode', 'night-mode');
            btn.innerText = '🌙';
            localStorage.setItem('theme', 'night');
        }
    }

    // ოთახების გადართვა
    function changeRoom(n, el) {
        if (n === "📝 ფორუმი" || n === "🏛️ ფორუმი") {
            window.location.href = 'forum.html';
            return;
        }
        currentRoom = n;
        document.getElementById('room-name').innerText = n;
        document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        toggleSidebar();
        loadMessages();
    }

    // მოდალების კონტროლი
    function closeModal() { document.getElementById('userModal').style.display = "none"; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    // ინიციალიზაცია
    async function init() {
        const savedTheme = localStorage.getItem('theme') || 'night';
        if(savedTheme === 'day') toggleTheme();
        if (!myNick) { location.href = 'index.html'; return; }
        
        // პირადი პროფილის წამოღება Sidebar-ისთვის
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-avatar-img').src = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
        }
        loadMessages();
    }

    // პროფილის გახსნის ფუნქცია
    async function openProfile(username) {
        // 1. მომხმარებლის ინფოს წამოღება
        const { data: user } = await _s.from('profiles').select('*').eq('username', username).maybeSingle();
        
        if(user) {
            document.getElementById('targetName').innerText = user.username;
            document.getElementById('targetAvatar').src = user.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
            document.getElementById('userBio').innerText = user.status || "...";
            document.getElementById('quizPoints').innerText = user.points || 0;
            document.getElementById('cipherPoints').innerText = user.cipher_points || 0;
            
            document.getElementById('userModal').style.display = "flex";
            
            // 2. ამ მომხმარებლის პოსტების წამოღება (ახლა SQL-ში შევქმენით ცხრილი)
            // loadUserPosts(username); // ამ ფუნქციას მერე დავწერთ
        }
    }

    // ... (აქ loadMessages, sendMsg და სხვა ჩატის ფუნქციები იგივე რჩება)

    window.onload = init;
</script>
</body>
</html>
