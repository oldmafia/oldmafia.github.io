<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Old Mafia - ჩატი</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
        body {
            --bg: #0a0508; --text: #f0e6e8; --card: #1a0f12; --border: #4a1a2a;
            --nav: #120a0c; --accent: #8b0000; --accent-light: #a52a2a; --accent-dark: #5a0000; --input: #1f1216;
            background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        /* DAY MODE (კრემისფერი შინდისფერი ჩრდილებით) */
        body.day-mode {
            --bg: #fff5f0; --text: #2c1a1a; --card: #ffffff; --border: #e6b8a2;
            --nav: #ffe8e0; --accent: #8b0000; --input: #fffaf5;
        }
        /* მცურავი გულების ანიმაცია (ორივე რეჟიმში) */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%238b0000" opacity="0.08"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') repeat;
            background-size: 40px;
            animation: floatHearts 60s linear infinite;
        }
        @keyframes floatHearts {
            0% { background-position: 0 0; }
            100% { background-position: 100% 100%; }
        }
        /* დიდი ანიმაციური მცურავი გულები (ცალკე ფენა) */
        .floating-heart {
            position: fixed;
            bottom: 0;
            font-size: 28px;
            pointer-events: none;
            animation: floatHeartUp 5s forwards;
            z-index: 10000;
            filter: drop-shadow(0 0 8px #8b0000) drop-shadow(0 0 4px #5a0000);
        }
        @keyframes floatHeartUp {
            0% { bottom: 0; opacity: 1; transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { bottom: 100%; opacity: 0; transform: scale(0.8) translateX(40px); }
        }
        .nav-bar { display: flex; justify-content: space-around; align-items: center; background: var(--nav); padding: 8px 0; border-bottom: 2px solid var(--accent); flex-shrink: 0; position: relative; z-index: 10; }
        .nav-btn { font-size: 22px; background: none; border: none; color: #aa8a8a; cursor: pointer; padding: 6px 12px; border-radius: 30px; transition: 0.2s; }
        .nav-btn.active { color: var(--accent); background: rgba(139, 0, 0, 0.2); }
        .pages { flex: 1; position: relative; overflow: hidden; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; display: none; padding: 12px; }
        .page.active { display: block; }
        .section-title { font-size: 18px; margin-bottom: 12px; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; font-weight: bold; }
        .rooms-list { display: flex; flex-direction: column; gap: 10px; }
        .room-card { background: var(--card); padding: 14px; border-radius: 10px; border: 1px solid var(--border); border-left: 4px solid var(--accent); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.1s; }
        .room-card:active { transform: scale(0.98); background: var(--accent-dark); }
        .room-icon { font-size: 28px; }
        .room-name { font-size: 16px; font-weight: 600; }
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-header { background: var(--card); padding: 12px; display: flex; justify-content: space-between; align-items: center; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .chat-room-name { font-size: 18px; font-weight: bold; color: var(--accent); }
        .close-btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .message { background: var(--card); padding: 10px 14px; border-radius: 12px; max-width: 85%; align-self: flex-start; border: 1px solid var(--border); position: relative; word-break: break-word; }
        .message.owner-message { border-left: 4px solid #ff00ff; }
        .message.admin-message { border-left: 4px solid gold; }
        .message-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
        .message-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; object-fit: cover; }
        .message-name { font-weight: bold; color: var(--accent); font-size: 13px; cursor: pointer; }
        .message-time { font-size: 10px; opacity: 0.5; }
        .message-text { font-size: 14px; }
        .message-text img { max-width: 200px; max-height: 150px; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .delete-msg { position: absolute; right: 8px; top: 8px; background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12px; opacity: 0; transition: 0.2s; }
        .message:hover .delete-msg { opacity: 1; }
        .chat-input-area { background: var(--card); padding: 10px; display: flex; gap: 8px; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); }
        .icon-btn { background: var(--accent-dark); border: none; color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 20px; cursor: pointer; }
        .chat-input { flex: 1; padding: 10px 15px; border-radius: 25px; border: 1px solid var(--accent); background: var(--input); color: var(--text); font-size: 14px; outline: none; }
        .send-btn { background: var(--accent); border: none; color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--card); margin-bottom: 8px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; object-fit: cover; background-size: cover; background-position: center; }
        .user-name { font-weight: bold; font-size: 16px; }
        .user-status { font-size: 11px; opacity: 0.6; }
        .friend-badge { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #2d6a4f; color: white; padding: 4px 8px; border-radius: 20px; font-size: 11px; }
        .add-badge { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--accent); color: white; padding: 4px 8px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        .emoji-panel { position: fixed; bottom: 80px; left: 10px; right: 10px; background: var(--card); border: 2px solid var(--accent); border-radius: 16px; display: none; padding: 12px; z-index: 2000; max-height: 320px; overflow-y: auto; }
        .emoji-panel.active { display: block; }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 200px; overflow-y: auto; padding: 5px; }
        .emoji-item { font-size: 32px; text-align: center; cursor: pointer; padding: 8px; border-radius: 8px; transition: 0.2s; }
        .emoji-item:hover { background: var(--accent); transform: scale(1.05); }
        .emoji-img { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .profile-modal, .photo-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
        .profile-modal-content, .photo-modal-content { background: var(--card); border-radius: 20px; max-width: 350px; width: 100%; max-height: 85vh; overflow-y: auto; border: 2px solid var(--accent); }
        .profile-modal-header { background: var(--accent); padding: 15px; text-align: center; position: relative; }
        .profile-modal-close { position: absolute; right: 15px; top: 15px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .profile-modal-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--accent-dark); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto; object-fit: cover; background-size: cover; }
        .profile-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 10px; border-top: 1px solid var(--border); }
        .action-btn { background: var(--accent-dark); border: none; color: white; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 13px; }
        .action-btn.danger { background: #8b0000; }
        .action-btn.success { background: #2d6a4f; }
        .photo-modal-img { width: 100%; max-height: 55vh; object-fit: contain; }
        .photo-actions { display: flex; gap: 10px; justify-content: center; padding: 12px; flex-wrap: wrap; }
        .photo-comments { padding: 10px; max-height: 150px; overflow-y: auto; border-top: 1px solid var(--border); }
        .comment-item { padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
        .comment-input-area { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--border); }
        .comment-input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--accent); background: var(--input); color: var(--text); }
        .pm-chat-container { position: fixed; bottom: 20px; right: 20px; width: 320px; max-width: calc(100% - 40px); height: 450px; max-height: 55vh; background: var(--card); border: 2px solid var(--accent); border-radius: 16px; display: flex; flex-direction: column; z-index: 2000; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        @media (max-width: 768px) { .pm-chat-container { width: 85%; right: 7.5%; left: 7.5%; bottom: 10px; height: 45vh; } .icon-btn, .send-btn { width: 40px; height: 40px; } }
        .pm-header { background: var(--accent); padding: 10px 12px; display: flex; justify-content: space-between; border-radius: 14px 14px 0 0; cursor: pointer; font-weight: bold; }
        .pm-messages { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .pm-message { background: var(--input); padding: 6px 10px; border-radius: 12px; max-width: 85%; align-self: flex-start; }
        .pm-message.own { align-self: flex-end; background: var(--accent); }
        .pm-input-area { display: flex; padding: 8px; gap: 8px; border-top: 1px solid var(--border); }
        .pm-input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid var(--accent); background: var(--input); color: var(--text); }
        .profile-card { text-align: center; padding: 20px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto; cursor: pointer; object-fit: cover; background-size: cover; }
        .status-input { width: 80%; margin-top: 15px; padding: 10px; border-radius: 25px; border: 1px solid var(--accent); background: var(--input); color: var(--text); text-align: center; }
        .album-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .album-photo { aspect-ratio: 1; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid var(--accent); }
        .upload-btn { background: var(--accent); border: none; color: white; padding: 10px; border-radius: 25px; margin: 10px 0; cursor: pointer; width: 100%; }
        .empty-state { text-align: center; padding: 40px; opacity: 0.5; }
        .notification { position: fixed; top: 70px; right: 10px; background: var(--accent); color: white; padding: 10px 15px; border-radius: 20px; z-index: 5000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--border); }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
        .role-badge { font-size: 12px; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="friends">👥</button>
        <button class="nav-btn" data-page="online">🌐</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeToggle">🌙</button>
    </div>
    <div class="pages">
        <div id="homePage" class="page active"><div class="section-title">🏰 12 სათამაშო ოთახი</div><div id="roomsList" class="rooms-list"></div></div>
        <div id="messagesPage" class="page"><div class="section-title">💬 პირადი მიმოწერა</div><div id="pmList"></div></div>
        <div id="friendsPage" class="page"><div class="section-title">👥 ჩემი მეგობრები</div><div id="friendsList"></div><div class="section-title" style="margin-top:20px;">📨 მეგობრობის მოთხოვნები</div><div id="friendRequestsList"></div></div>
        <div id="onlinePage" class="page"><div class="section-title">🌐 ყველა მომხმარებელი</div><div id="onlineList"></div></div>
        <div id="profilePage" class="page"><div class="profile-card"><div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()">👤</div><h2 id="profileName"></h2><input type="text" id="statusInput" class="status-input" placeholder="სტატუსი..."><button class="upload-btn" onclick="saveStatus()">💾 სტატუსის შენახვა</button><div>ID: #<span id="userId"></span></div><div class="section-title" style="margin-top: 20px;">📸 ჩემი ალბომი</div><button class="upload-btn" onclick="document.getElementById('albumInput').click()">➕ ფოტოს დამატება</button><div id="albumGrid" class="album-grid"></div><input type="file" id="albumInput" hidden accept="image/*" onchange="addToAlbum(this)"></div><input type="file" id="avatarInput" hidden accept="image/*" onchange="uploadAvatar(this)"><input type="file" id="emojiUploadInput" hidden accept="image/*" onchange="uploadEmojiImage(this)"></div>
        <div id="chatPage" class="page"><div class="chat-container"><div class="chat-header"><span class="chat-room-name" id="chatRoomName">ოთახი</span><button class="close-btn" onclick="closeChat()">✕</button></div><div id="chatMessages" class="messages"></div><div class="chat-input-area"><button class="icon-btn" onclick="toggleEmojiPanel('chat')">😊</button><button class="icon-btn" onclick="document.getElementById('chatPhotoInput').click()">📷</button><input type="text" id="messageInput" class="chat-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMessage()"><button class="send-btn" onclick="sendMessage()">➤</button></div></div><input type="file" id="chatPhotoInput" hidden accept="image/*" onchange="addPhotoToMessage(this)"></div>
    </div>
    <div id="emojiPanel" class="emoji-panel"></div>
    <div id="hearts"></div>
    <div id="pmContainer"></div>
    <script>
        let currentUser = localStorage.getItem('mafia_user');
        if (!currentUser || currentUser === "null") { alert("გთხოვთ გაიაროთ რეგისტრაცია!"); window.location.href = "index.html"; }
        let currentRoom = null, currentPMUser = null;
        const OWNER = "Abu007";
        let users = [], messages = [], privateMessages = [], friendRequests = [], customEmojis = [], photoInteractions = {}, userAlbums = {};
        const ROOMS = Array.from({length:12}, (_,i)=> ({ icon: ["☕","🎲","🃏","💎","📝","🛠️","😂","🏆","🎭","🎵","⁉️","🆘"][i], name: `ოთახი ${i+1}` }));
        
        function loadData() {
            users = JSON.parse(localStorage.getItem('mafia_users_global') || '[{"username":"Abu007","status":"👑 დამფუძნებელი","avatar":null,"role":"owner","online":true,"joined":Date.now()},{"username":"Lukinio","status":"🔧 ადმინი","avatar":null,"role":"admin","online":true},{"username":"Giorgi","status":"ონლაინ","avatar":null,"role":"user","online":true},{"username":"Nika","status":"ონლაინ","avatar":null,"role":"user","online":true}]');
            messages = JSON.parse(localStorage.getItem('mafia_messages_global') || '[]');
            privateMessages = JSON.parse(localStorage.getItem('mafia_pm_global') || '[]');
            friendRequests = JSON.parse(localStorage.getItem('mafia_friend_requests') || '[]');
            customEmojis = JSON.parse(localStorage.getItem('mafia_emojis_global') || '[]');
            photoInteractions = JSON.parse(localStorage.getItem('mafia_photo_interactions') || '{}');
            userAlbums = JSON.parse(localStorage.getItem('mafia_albums_global') || '{}');
            if (!users.find(u=>u.username===currentUser)) users.push({username:currentUser, status:"ახალი მოთამაშე", avatar:null, role:"user", online:true, joined:Date.now()});
            saveUsers();
            document.getElementById('profileName').innerHTML = currentUser;
            document.getElementById('userId').innerHTML = Math.floor(Math.random()*10000)+1000;
            const user = users.find(u=>u.username===currentUser);
            if(user?.avatar) { document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar})`; document.getElementById('profileAvatar').style.backgroundSize='cover'; document.getElementById('profileAvatar').innerHTML=''; }
            document.getElementById('statusInput').value = user?.status||'';
        }
        function saveUsers() { localStorage.setItem('mafia_users_global', JSON.stringify(users)); }
        function saveMessages() { localStorage.setItem('mafia_messages_global', JSON.stringify(messages)); }
        function savePM() { localStorage.setItem('mafia_pm_global', JSON.stringify(privateMessages)); }
        function saveRequests() { localStorage.setItem('mafia_friend_requests', JSON.stringify(friendRequests)); }
        function saveEmojis() { localStorage.setItem('mafia_emojis_global', JSON.stringify(customEmojis)); }
        function saveInteractions() { localStorage.setItem('mafia_photo_interactions', JSON.stringify(photoInteractions)); }
        function saveAlbums() { localStorage.setItem('mafia_albums_global', JSON.stringify(userAlbums)); }
        function isFriend(username) { return friendRequests.some(r=>r.status==='accepted' && ((r.from===currentUser && r.to===username) || (r.from===username && r.to===currentUser))); }
        function sendFriendRequest(target) { if(target===currentUser) return showNotification('❓ საკუთარ თავს ვერ დაუმატებ'); if(friendRequests.some(r=>r.from===currentUser&&r.to===target&&r.status==='pending')) return showNotification('⏳ მოთხოვნა უკვე გაგზავნილია'); if(isFriend(target)) return showNotification('👥 უკვე მეგობრები ხართ'); friendRequests.push({from:currentUser, to:target, status:'pending', date:Date.now()}); saveRequests(); showNotification(`📨 მოთხოვნა გაეგზავნა ${target}-ს!`); renderOnlineUsers(); renderFriendRequestsList(); }
        function acceptFriendRequest(from) { let req = friendRequests.find(r=>r.from===from && r.to===currentUser && r.status==='pending'); if(req){ req.status='accepted'; saveRequests(); showNotification(`✅ ${from} დაემატა!`); renderFriendsList(); renderFriendRequestsList(); renderOnlineUsers(); } }
        function rejectFriendRequest(from) { friendRequests = friendRequests.filter(r=>!(r.from===from && r.to===currentUser && r.status==='pending')); saveRequests(); showNotification(`❌ უარყავით`); renderFriendRequestsList(); renderOnlineUsers(); }
        function saveStatus() { let user = users.find(u=>u.username===currentUser); if(user){ user.status=document.getElementById('statusInput').value; saveUsers(); showNotification('✅ სტატუსი განახლდა!'); renderOnlineUsers(); if(currentRoom) renderMessages(); } }
        function uploadAvatar(input) { let file=input.files[0]; if(file){ let reader=new FileReader(); reader.onload=e=>{ let user=users.find(u=>u.username===currentUser); if(user) user.avatar=e.target.result; saveUsers(); let avaDiv=document.getElementById('profileAvatar'); avaDiv.style.backgroundImage=`url(${e.target.result})`; avaDiv.style.backgroundSize='cover'; avaDiv.innerHTML=''; renderOnlineUsers(); if(currentRoom) renderMessages(); showNotification('✅ ავატარი განახლდა!'); }; reader.readAsDataURL(file); } }
        function renderAlbum() { let container=document.getElementById('albumGrid'); let album=userAlbums[currentUser]||[]; if(!album.length){ container.innerHTML='<div class="empty-state">ალბომი ცარიელია</div>'; return; } container.innerHTML=album.map(photo=>`<img src="${photo}" class="album-photo" onclick="openPhotoModal('${photo}','${currentUser}','')">`).join(''); }
        function addToAlbum(input) { let file=input.files[0]; if(file){ let reader=new FileReader(); reader.onload=e=>{ if(!userAlbums[currentUser]) userAlbums[currentUser]=[]; userAlbums[currentUser].push(e.target.result); saveAlbums(); renderAlbum(); showNotification('📸 ფოტო დაემატა!'); }; reader.readAsDataURL(file); } input.value=''; }
        function setAsProfilePhoto(url) { let user=users.find(u=>u.username===currentUser); if(user) user.avatar=url; saveUsers(); document.getElementById('profileAvatar').style.backgroundImage=`url(${url})`; document.getElementById('profileAvatar').style.backgroundSize='cover'; document.getElementById('profileAvatar').innerHTML=''; renderOnlineUsers(); if(currentRoom) renderMessages(); showNotification('✅ პროფილის ფოტო განახლდა!'); }
        function openPhotoModal(photoUrl, username, time) { let inter=photoInteractions[photoUrl]||{likes:[],comments:[]}; let hasLiked=inter.likes.includes(currentUser); let modal=document.createElement('div'); modal.className='photo-modal'; modal.innerHTML=`<div class="photo-modal-content"><img src="${photoUrl}" class="photo-modal-img"><div class="photo-actions"><button class="action-btn ${hasLiked?'success':''}" onclick="likePhoto('${photoUrl}', this)">❤️ ${inter.likes.length}</button><button class="action-btn" onclick="document.getElementById('photoCommentInput').focus()">💬 ${inter.comments.length}</button>${currentUser===username?`<button class="action-btn" onclick="setAsProfilePhoto('${photoUrl}'); this.closest('.photo-modal').remove()">👤 პროფილის ფოტოდ</button>`:''}</div><div class="photo-comments" id="photoComments">${inter.comments.map(c=>`<div class="comment-item"><b>${escapeHtml(c.user)}</b>: ${escapeHtml(c.text)}</div>`).join('')||'<div>კომენტარები არ არის</div>'}</div><div class="comment-input-area"><input type="text" id="photoCommentInput" class="comment-input" placeholder="დაწერე კომენტარი..."><button class="action-btn" onclick="addPhotoComment('${photoUrl}')">📝</button></div></div>`; modal.onclick=e=>{if(e.target===modal) modal.remove();}; document.body.appendChild(modal); }
        function likePhoto(photoUrl, btn) { if(!photoInteractions[photoUrl]) photoInteractions[photoUrl]={likes:[],comments:[]}; let idx=photoInteractions[photoUrl].likes.indexOf(currentUser); idx===-1?photoInteractions[photoUrl].likes.push(currentUser):photoInteractions[photoUrl].likes.splice(idx,1); saveInteractions(); btn.innerHTML=`❤️ ${photoInteractions[photoUrl].likes.length}`; btn.classList.toggle('success'); }
        function addPhotoComment(photoUrl) { let input=document.getElementById('photoCommentInput'); let text=input.value.trim(); if(!text) return; if(!photoInteractions[photoUrl]) photoInteractions[photoUrl]={likes:[],comments:[]}; photoInteractions[photoUrl].comments.push({user:currentUser, text:text, time:Date.now()}); saveInteractions(); let commentsDiv=document.getElementById('photoComments'); commentsDiv.innerHTML=photoInteractions[photoUrl].comments.map(c=>`<div class="comment-item"><b>${escapeHtml(c.user)}</b>: ${escapeHtml(c.text)}</div>`).join(''); input.value=''; }
        function renderRooms() { document.getElementById('roomsList').innerHTML=ROOMS.map(room=>`<div class="room-card" onclick="openRoom('${room.name}')"><span class="room-icon">${room.icon}</span><span class="room-name">${room.name}</span></div>`).join(''); }
        function openRoom(roomName) { currentRoom=roomName; document.getElementById('chatRoomName').innerHTML=`📡 ${roomName}`; showPage('chat'); renderMessages(); }
        function closeChat() { currentRoom=null; showPage('home'); }
        function renderMessages() { let container=document.getElementById('chatMessages'); if(!container) return; let roomMsgs=messages.filter(m=>m.room===currentRoom).sort((a,b)=>new Date(a.time)-new Date(b.time)); if(!roomMsgs.length){ container.innerHTML='<div class="empty-state">💬 შეტყობინებები არ არის</div>'; return; } container.innerHTML=roomMsgs.map(msg=>{ let user=users.find(u=>u.username===msg.username)||{avatar:null}; let isOwner=msg.username===OWNER; let isAdmin=users.find(u=>u.username===msg.username)?.role==='admin'; let timeStr=new Date(msg.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); let avatarHtml=user?.avatar?`<img src="${user.avatar}" style="width:28px; height:28px; border-radius:50%; object-fit:cover;">`:`<div class="message-avatar">${msg.username.charAt(0).toUpperCase()}</div>`; let extraClass=isOwner?'owner-message':(isAdmin?'admin-message':''); let formattedText=escapeHtml(msg.text); formattedText=formattedText.replace(/:img:(.*?):/g,'<img src="$1" style="width:32px; height:32px; object-fit:cover; border-radius:8px; vertical-align:middle;">'); return `<div class="message ${extraClass}"><div class="message-header">${avatarHtml}<span class="message-name" onclick="showUserProfile('${msg.username}')">${escapeHtml(msg.username)}</span><span class="message-time">${timeStr}</span></div><div class="message-text">${formattedText}${msg.image?`<img src="${msg.image}" onclick="openPhotoModal('${msg.image}', '${msg.username}', '${timeStr}')">`:''}</div>${(currentUser===OWNER || currentUser===msg.username || users.find(u=>u.username===currentUser)?.role==='admin')?`<button class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</button>`:''}</div>`; }).join(''); container.scrollTop=container.scrollHeight; }
        function sendMessage() { let input=document.getElementById('messageInput'); let text=input.value.trim(); let pendingImage=window.pendingImage; if(!text&&!pendingImage) return; messages.push({id:Date.now(), username:currentUser, text:text||"", time:new Date().toISOString(), room:currentRoom, image:pendingImage||null}); saveMessages(); input.value=''; window.pendingImage=null; renderMessages(); }
        function deleteMessage(msgId) { let msg=messages.find(m=>m.id===msgId); if(!msg) return; let canDelete=(currentUser===OWNER || msg.username===currentUser || users.find(u=>u.username===currentUser)?.role==='admin'); if(canDelete){ messages=messages.filter(m=>m.id!==msgId); saveMessages(); renderMessages(); } else showNotification('❌ წაშლა არ შეგიძლია!'); }
        function addPhotoToMessage(input) { let file=input.files[0]; if(file){ let reader=new FileReader(); reader.onload=e=>{ window.pendingImage=e.target.result; showNotification('📷 ფოტო დაემატა!'); }; reader.readAsDataURL(file); } input.value=''; }
        function toggleEmojiPanel(target) { let panel=document.getElementById('emojiPanel'); if(panel.classList.contains('active')){ panel.classList.remove('active'); return; } let defaultEmojis=['😊','😂','❤️','🔥','👍','🎉','😍','🥳','😎','🥺','💀','👑','💪','🤡','👻','⭐']; let allEmojis=[...defaultEmojis,...customEmojis]; panel.innerHTML=`<div class="emoji-grid" id="emojiGrid"></div>`; let grid=document.getElementById('emojiGrid'); allEmojis.forEach(emoji=>{ if(typeof emoji==='string' && emoji.startsWith('http')){ let img=document.createElement('img'); img.src=emoji; img.className='emoji-img'; img.style.cssText='width:48px; height:48px; object-fit:cover; border-radius:8px; cursor:pointer;'; img.onclick=()=>{ let input=target==='chat'?document.getElementById('messageInput'):document.getElementById('pmInput'); if(input) input.value+=` :img:${emoji}: `; panel.classList.remove('active'); }; grid.appendChild(img); } else { let div=document.createElement('div'); div.className='emoji-item'; div.textContent=emoji; div.onclick=()=>{ let input=target==='chat'?document.getElementById('messageInput'):document.getElementById('pmInput'); if(input) input.value+=emoji; panel.classList.remove('active'); }; grid.appendChild(div); } }); let canManage=users.find(u=>u.username===currentUser)?.role==='admin'||currentUser===OWNER; if(canManage){ let addBtn=document.createElement('div'); addBtn.className='emoji-item'; addBtn.textContent='➕'; addBtn.style.background='var(--accent)'; addBtn.style.borderRadius='8px'; addBtn.onclick=()=>{ panel.classList.remove('active'); document.getElementById('emojiUploadInput').click(); }; grid.appendChild(addBtn); } panel.classList.add('active'); }
        function uploadEmojiImage(input) { let file=input.files[0]; if(file&&(users.find(u=>u.username===currentUser)?.role==='admin'||currentUser===OWNER)){ let reader=new FileReader(); reader.onload=e=>{ customEmojis.push(e.target.result); saveEmojis(); showNotification('✅ ემოჯი დაემატა!'); }; reader.readAsDataURL(file); } else showNotification('❌ ემოჯის დამატება მხოლოდ ადმინებს შეუძლიათ!'); input.value=''; }
        function showUserProfile(username) { let user=users.find(u=>u.username===username); if(!user) return; let isFriendUser=isFriend(username); let hasPendingFromMe=friendRequests.some(r=>r.from===currentUser&&r.to===username&&r.status==='pending'); let hasPendingToMe=friendRequests.some(r=>r.from===username&&r.to===currentUser&&r.status==='pending'); let modal=document.createElement('div'); modal.className='profile-modal'; modal.innerHTML=`<div class="profile-modal-content"><div class="profile-modal-header"><button class="profile-modal-close" onclick="this.closest('.profile-modal').remove()">✕</button><div class="profile-modal-avatar" style="${user.avatar?`background-image:url(${user.avatar}); background-size:cover;`:''}">${user.avatar?'':user.username.charAt(0).toUpperCase()}</div><h3>${escapeHtml(user.username)}</h3><div>${escapeHtml(user.status)}</div><div>${user.role==='owner'?'👑 დამფუძნებე�лі':(user.role==='admin'?'🔧 ადმინი':'👤 მომხმარებელი')}</div></div><div class="profile-actions">${!isFriendUser && username!==currentUser && !hasPendingFromMe && !hasPendingToMe?`<button class="action-btn success" onclick="sendFriendRequest('${username}'); this.closest('.profile-modal').remove()">➕ მეგობრობის მოთხოვნა</button>`:''}${hasPendingFromMe?`<button class="action-btn warning" disabled>⏳ მოთხოვნა გაგზავნილია</button>`:''}${hasPendingToMe?`<button class="action-btn success" onclick="acceptFriendRequest('${username}'); this.closest('.profile-modal').remove()">✅ მიღება</button><button class="action-btn danger" onclick="rejectFriendRequest('${username}'); this.closest('.profile-modal').remove()">❌ უარყოფა</button>`:''}${isFriendUser?`<button class="action-btn success" disabled>✅ მეგობარი</button>`:''}<button class="action-btn" onclick="openPrivateChat('${username}'); this.closest('.profile-modal').remove()">💬 მიწერა</button></div>${currentUser===OWNER && username!==currentUser?`<div class="profile-actions">${user.role!=='owner'?`<button class="action-btn success" onclick="makeOwner('${username}'); this.closest('.profile-modal').remove()">👑 დამფუძნებლად</button>`:''}${user.role==='admin'?`<button class="action-btn" onclick="removeAdmin('${username}'); this.closest('.profile-modal').remove()">🔻 ადმინის ჩამორთმევა</button>`:''}${user.role==='user'?`<button class="action-btn success" onclick="makeAdmin('${username}'); this.closest('.profile-modal').remove()">🔧 ადმინად</button>`:''}</div>`:''}</div>`; document.body.appendChild(modal); }
        function makeOwner(username) { let oldOwner=users.find(u=>u.role==='owner'); if(oldOwner) oldOwner.role='user'; let newOwner=users.find(u=>u.username===username); if(newOwner){ newOwner.role='owner'; newOwner.status='👑 დამფუძნებელი'; } saveUsers(); showNotification(`✅ ${username} დამფუძნებელი გახდა!`); renderOnlineUsers(); if(currentRoom) renderMessages(); }
        function makeAdmin(username) { let user=users.find(u=>u.username===username); if(user){ user.role='admin'; user.status='🔧 ადმინი'; saveUsers(); showNotification(`✅ ${username} ადმინად დაინიშნა!`); renderOnlineUsers(); if(currentRoom) renderMessages(); } }
        function removeAdmin(username) { let user=users.find(u=>u.username===username); if(user){ user.role='user'; user.status='ონლაინ'; saveUsers(); showNotification(`🔻 ${username} ადმინის უფლებები ჩამოერთვა!`); renderOnlineUsers(); if(currentRoom) renderMessages(); } }
        function renderOnlineUsers() { let container=document.getElementById('onlineList'); let sorted=[...users.filter(u=>u.username!==currentUser)].sort((a,b)=> { if(a.role==='owner') return -1; if(b.role==='owner') return 1; if(a.role==='admin') return -1; if(b.role==='admin') return 1; return 0; }); container.innerHTML=sorted.map(user=>{ let isFriendUser=isFriend(user.username); let hasPendingFromMe=friendRequests.some(r=>r.from===currentUser&&r.to===user.username&&r.status==='pending'); let hasPendingToMe=friendRequests.some(r=>r.from===user.username&&r.to===currentUser&&r.status==='pending'); return `<div class="user-item" onclick="showUserProfile('${user.username}')"><div class="user-avatar" style="${user.avatar?`background-image:url(${user.avatar}); background-size:cover;`:''}">${user.avatar?'':user.username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(user.username)} ${user.role==='owner'?'👑':(user.role==='admin'?'🔧':'')}</div><div class="user-status">${escapeHtml(user.status)}</div></div>${!isFriendUser && !hasPendingFromMe && !hasPendingToMe && user.username!==currentUser?`<div class="add-badge" onclick="event.stopPropagation(); sendFriendRequest('${user.username}')">➕ დამატება</div>`:''}${hasPendingFromMe?`<div class="add-badge" style="background:orange;">⏳ მოთხოვნა</div>`:''}${hasPendingToMe?`<div class="add-badge" style="background:gold; color:black;" onclick="event.stopPropagation(); acceptFriendRequest('${user.username}')">✅ მიღება</div>`:''}${isFriendUser?`<div class="friend-badge">✅ მეგობარი</div>`:''}</div>`; }).join(''); }
        function renderFriendsList() { let container=document.getElementById('friendsList'); let friendsList=friendRequests.filter(r=>r.status==='accepted'&&(r.from===currentUser||r.to===currentUser)).map(r=>r.from===currentUser?r.to:r.from); let friendUsers=users.filter(u=>friendsList.includes(u.username)); if(!friendUsers.length){ container.innerHTML='<div class="empty-state">მეგობრები არ არიან</div>'; return; } container.innerHTML=friendUsers.map(user=>`<div class="user-item" onclick="showUserProfile('${user.username}')"><div class="user-avatar" style="${user.avatar?`background-image:url(${user.avatar}); background-size:cover;`:''}">${user.avatar?'':user.username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(user.username)}</div><div class="user-status">${escapeHtml(user.status)}</div></div></div>`).join(''); }
        function renderFriendRequestsList() { let container=document.getElementById('friendRequestsList'); let pending=friendRequests.filter(r=>r.to===currentUser&&r.status==='pending'); if(!pending.length){ container.innerHTML='<div class="empty-state">მოთხოვნები არ არის</div>'; return; } container.innerHTML=pending.map(req=>`<div class="user-item"><div class="user-avatar">${req.from.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(req.from)}</div><div class="user-status">მეგობრობის მოთხოვნა</div></div><div style="display:flex; gap:5px;"><button class="action-btn success" onclick="acceptFriendRequest('${req.from}'); this.closest('.user-item').remove()">✅ მიღება</button><button class="action-btn danger" onclick="rejectFriendRequest('${req.from}'); this.closest('.user-item').remove()">❌ უარყოფა</button></div></div>`).join(''); }
        function openPrivateChat(username) { if(username===currentUser){ showNotification('საკუთარ თავთან არ შეიძლება'); return; } if(currentPMUser===username && document.getElementById('pmContainer').innerHTML){ closePM(); return; } currentPMUser=username; renderPrivateChat(); }
        function renderPrivateChat() { if(!currentPMUser) return; let pmMsgs=privateMessages.filter(m=>(m.from===currentUser&&m.to===currentPMUser)||(m.from===currentPMUser&&m.to===currentUser)).sort((a,b)=>new Date(a.time)-new Date(b.time)); let pmHtml=`<div class="pm-chat-container" id="pmChatWindow"><div class="pm-header" onclick="closePM()"><span>💬 ${escapeHtml(currentPMUser)}</span><span>✕</span></div><div class="pm-messages" id="pmMessages">${pmMsgs.map(msg=>`<div class="pm-message ${msg.from===currentUser?'own':''}"><div style="font-size:9px;">${new Date(msg.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div><div>${escapeHtml(msg.text)}</div></div>`).join('')||'<div class="empty-state" style="padding:20px;">მიმოწერა ცარიელია</div>'}</div><div class="pm-input-area"><button class="icon-btn" style="width:36px; height:36px; font-size:18px;" onclick="toggleEmojiPanel('pm')">😊</button><input type="text" id="pmInput" class="pm-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()"><button class="icon-btn" style="width:36px; height:36px;" onclick="sendPM()">➤</button></div></div>`; document.getElementById('pmContainer').innerHTML=pmHtml; let pmDiv=document.getElementById('pmMessages'); if(pmDiv) pmDiv.scrollTop=pmDiv.scrollHeight; document.getElementById('pmInput')?.focus(); }
        function closePM() { document.getElementById('pmContainer').innerHTML=''; currentPMUser=null; }
        function sendPM() { let input=document.getElementById('pmInput'); let text=input.value.trim(); if(!text||!currentPMUser) return; privateMessages.push({id:Date.now(), from:currentUser, to:currentPMUser, text:text, time:new Date().toISOString()}); savePM(); input.value=''; renderPrivateChat(); renderPrivateChatsList(); }
        function renderPrivateChatsList() { let myPMs=privateMessages.filter(m=>m.from===currentUser||m.to===currentUser); let uniqueUsers=new Set(); myPMs.forEach(m=>{ let other=m.from===currentUser?m.to:m.from; uniqueUsers.add(other); }); let container=document.getElementById('pmList'); if(!uniqueUsers.size){ container.innerHTML='<div class="empty-state">ჯერ არ გქონია მიმოწერა</div>'; return; } container.innerHTML=Array.from(uniqueUsers).map(username=>{ let lastMsg=myPMs.filter(m=>(m.from===username||m.to===username)).pop(); let user=users.find(u=>u.username===username); return `<div class="user-item" onclick="openPrivateChat('${username}')"><div class="user-avatar" style="${user?.avatar?`background-image:url(${user.avatar}); background-size:cover;`:''}">${user?.avatar?'':username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(username)}</div><div class="user-status">${lastMsg?lastMsg.text.substring(0,30):'...'}</div></div></div>`; }).join(''); }
        function showPage(pageName) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(pageName+'Page').classList.add('active'); document.querySelectorAll('.nav-btn').forEach(btn=>{ btn.classList.remove('active'); if(btn.getAttribute('data-page')===pageName) btn.classList.add('active'); }); if(pageName==='online') renderOnlineUsers(); if(pageName==='friends'){ renderFriendsList(); renderFriendRequestsList(); } if(pageName==='messages') renderPrivateChatsList(); if(pageName==='profile'){ let user=users.find(u=>u.username===currentUser); document.getElementById('profileName').innerHTML=currentUser; document.getElementById('statusInput').value=user?.status||''; if(user?.avatar){ document.getElementById('profileAvatar').style.backgroundImage=`url(${user.avatar})`; document.getElementById('profileAvatar').style.backgroundSize='cover'; document.getElementById('profileAvatar').innerHTML=''; } renderAlbum(); } }
        function showNotification(msg){ let notif=document.createElement('div'); notif.className='notification'; notif.textContent=msg; document.body.appendChild(notif); setTimeout(()=>notif.remove(),3000); }
        function escapeHtml(text){ let div=document.createElement('div'); div.textContent=text; return div.innerHTML; }
        function startHearts(){ setInterval(()=>{ let heart=document.createElement('div'); heart.className='floating-heart'; heart.innerHTML=['❤️','💖','💗','💕','💘'][Math.floor(Math.random()*5)]; heart.style.left=Math.random()*100+'%'; heart.style.fontSize=(24+Math.random()*20)+'px'; document.getElementById('hearts').appendChild(heart); setTimeout(()=>heart.remove(),5000); }, 2500); }
        function toggleTheme(){ document.body.classList.toggle('day-mode'); document.getElementById('themeToggle').innerHTML=document.body.classList.contains('day-mode')?'☀️':'🌙'; }
        function init(){ loadData(); renderRooms(); renderOnlineUsers(); renderFriendsList(); renderFriendRequestsList(); renderPrivateChatsList(); startHearts(); document.getElementById('themeToggle').addEventListener('click',toggleTheme); document.querySelectorAll('.nav-btn[data-page]').forEach(btn=>btn.addEventListener('click',()=>showPage(btn.getAttribute('data-page')))); showPage('home'); }
        init();
    </script>
</body>
</html>
