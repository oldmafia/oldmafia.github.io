<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - FULL SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --dark-red: #4a0000; --deep-red: #800000; --bright-red: #ff0000;
            --blood-red: #660000; --bg-black: #030000;
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--dark-red); height: 60px; flex-shrink: 0; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 25px; color: var(--bright-red); }
        #room-name { font-weight: bold; color: var(--bright-red); flex: 1; text-align: center; font-size: 16px; }
        
        #pm-btn { position: relative; cursor: pointer; font-size: 22px; margin-right: 15px; color: cyan; display: flex; align-items: center; }
        
        #pm-count { 
            position: absolute; 
            top: -8px; 
            right: -10px; 
            background: transparent; 
            color: #ff0000;             
            font-size: 16px;          
            display: none; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            text-shadow: 0 0 5px black; 
            animation: blinker 1.5s linear infinite;
        }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #1a0000 0%, #030000 100%); transition: padding-top 0.3s; }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; max-width: 95%; }
        .avatar-wrapper { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--dark-red); object-fit: cover; cursor: pointer; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #0f0; border: 2px solid black; border-radius: 50%; display: none; }
        .online-dot.active { display: block; box-shadow: 0 0 8px #0f0; }
        
        .bubble { background: rgba(25, 0, 0, 0.9); border: 1px solid var(--blood-red); padding: 8px 12px; border-radius: 4px 18px 18px 18px; position: relative; min-width: 80px; }
        .m-nick { font-weight: bold; color: #ff3333; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
        .m-text { color: #ddd; font-size: 14px; word-wrap: break-word; line-height: 1.4; }
        .m-text img { width: 48px; height: 48px; vertical-align: middle; margin: 2px; object-fit: contain; }
        
        .m-footer { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 4px; }
        .m-time { font-size: 10px; color: #666; font-family: monospace; }

        .input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: black; padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--dark-red); z-index: 2000; }
        .input-zone input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--blood-red); background: #080000; color: white; outline: none; }
        .send-btn { background: var(--dark-red); border: none; width: 45px; height: 45px; border-radius: 50%; color: cyan; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }

        #emoji-picker { 
            display: none; position: fixed; bottom: 80px; left: 10px; 
            background: #080000; border: 2px solid var(--dark-red); 
            padding: 10px; border-radius: 15px; flex-direction: column;
            z-index: 3000; max-height: 400px; width: 300px;
            box-shadow: 0 0 20px rgba(255,0,0,0.2);
        }
        #emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow-y: auto; flex: 1; padding: 5px; }
        .emoji-item { width: 45px; height: 45px; cursor: pointer; object-fit: contain; transition: 0.2s; }
        .emoji-item:hover { transform: scale(1.2); }
        .emoji-wrapper { position: relative; }
        .del-emoji { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid white; font-weight: bold; z-index: 5; }

        .admin-tools { display: none; gap: 5px; margin-top: 10px; border-top: 1px solid #222; padding-top: 5px; }
        .admin-add-btn { flex: 1; font-size: 10px; padding: 8px; background: #004a00; color: white; border: none; border-radius: 5px; cursor: pointer; }

        .sidebar, .online-sidebar { position: fixed; top: 0; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; display: flex; flex-direction: column; }
        .sidebar { left: -280px; border-right: 3px solid var(--dark-red); }
        .sidebar.active { left: 0; }
        .online-sidebar { right: -280px; border-left: 3px solid var(--dark-red); }
        .online-sidebar.active { right: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3500; }
        .overlay.active { display: block; }
        
        .room-item { padding: 14px 20px; cursor: pointer; color: #bbb; border-bottom: 1px solid #150000; font-size: 14px; }
        .room-item.active { background: var(--dark-red); color: white; font-weight: bold; }
        
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
        .modal-content { background: #080000; border: 2px solid var(--dark-red); padding: 25px; border-radius: 25px; width: 320px; text-align: center; }
        .modal-btn { display: block; width: 100%; padding: 12px; margin: 7px 0; border: 1px solid var(--blood-red); background: #110000; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 14px; }
        
        #joker-ui { 
            display: none; position: fixed; top: 60px; left: 0; width: 100%; 
            background: #051a05; border-bottom: 2px solid gold; padding: 15px; z-index: 1500; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .joker-room-view {
            position: relative; width: 100%; height: 260px;
            background: radial-gradient(circle, #004400 0%, #002200 100%);
            border-radius: 100px; border: 8px solid #3d2b1f;
            display: flex; align-items: center; justify-content: center;
        }
        .table-center {
            width: 100px; height: 60px; background: rgba(255,215,0,0.1);
            border: 2px dashed gold; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: gold; font-size: 12px;
        }
        .chair { position: absolute; width: 70px; text-align: center; }
        .chair-bottom { bottom: -10px; left: 50%; transform: translateX(-50%); }
        .chair-top    { top: -10px; left: 50%; transform: translateX(-50%); }
        .chair-left   { left: -10px; top: 50%; transform: translateY(-50%); }
        .chair-right  { right: -10px; top: 50%; transform: translateY(-50%); }

        .chair img {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid #444;
            background: #111; object-fit: cover;
        }
        .chair.occupied img { border-color: gold; box-shadow: 0 0 10px gold; }
        .chair .name-tag { 
            font-size: 10px; color: white; background: rgba(0,0,0,0.8);
            padding: 2px 5px; border-radius: 4px; margin-top: 2px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .joker-mini-chat-box {
            display: flex; gap: 5px; margin-top: 15px; justify-content: center;
        }
    </style>
</head>
<body onload="init()">

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div id="emoji-picker">
    <div id="emoji-grid"></div>
    <div class="admin-tools" id="admin-tools">
        <input type="file" id="emoji-file" style="display:none" onchange="uploadEmoji(this)">
        <button class="admin-add-btn" onclick="document.getElementById('emoji-file').click()" style="background:#00004a;">+ მოძრავი სმაილი</button>
    </div>
</div>

<div id="joker-ui"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 20px 15px; text-align: center;">
        <input type="file" id="avatar-input" style="display:none" onchange="uploadAvatar(this)">
        <img id="my-avatar-img" src="https://i.ibb.co/v3m6y6R/avatar.png" style="width:65px; height:65px; border-radius:50%; border:2px solid var(--dark-red); object-fit: cover; cursor:pointer;" onclick="document.getElementById('avatar-input').click()">
        <div id="my-nick-label" style="font-weight:bold; color:var(--bright-red); margin-top:5px;">...</div>
        <div id="my-role-label" style="font-size: 11px; color: #888;">...</div>
        <div style="font-size: 12px; color: gold; margin-top: 5px;">🏆 ვიქტორინა: <span id="my-points-label">0</span></div>
        <div style="font-size: 12px; color: #00ffff; margin-top: 5px;">🔐 შიფრო-ქულა: <span id="my-cipher-points-label">0</span></div>
        <div onclick="changeStatus()" style="font-size: 11px; color: #0c0; cursor:pointer; margin-top:5px; text-decoration: underline;">💬 სტატუსი</div>
    </div>
    <div class="rooms-list" style="flex:1; overflow-y:auto;">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('💎 ვიპ საუბრები', this)">💎 ვიპ საუბრები</div>
        <div class="room-item" onclick="changeRoom('🕴 მაფიის ღამე', this)">🕴 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🕵️ გამოძიება', this)">🕵️ გამოძიება</div>
        <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('❓ ვიქტორინა', this)">❓ ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('😵 ჩამოხრჩობანა', this)">😵 ჩამოხრჩობანა</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('🎲 ნარდი', this)">🎲 ნარდი</div>
        <div class="room-item" onclick="changeRoom('🎵 მუსიკა', this)">🎵 მუსიკა</div>
        <div class="room-item" onclick="changeRoom('😂 იუმორი', this)">😂 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🏛️ ფორუმი', this)">🏛️ ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('🆘 დახმარება', this)">🆘 დახმარება</div>
    </div>
    <div style="padding:15px; text-align:center; color:red; cursor:pointer;" onclick="logout()">🚪 გასვლა</div>
</div>

<div class="online-sidebar" id="online-sidebar">
    <div style="padding:20px; color:#0f0; font-weight:bold; text-align:center; border-bottom:2px solid var(--dark-red);">🟢 ონლაინში</div>
    <div id="online-list-content"></div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
    <div id="pm-btn" onclick="location.href='pm.html'">✉️ <span id="pm-count">0</span></div>
    <div class="menu-btn" onclick="toggleOnline()">👥</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone" id="main-input-zone">
    <button onclick="toggleEmojiPicker()" style="background:none; border:none; font-size:24px; cursor:pointer;">😊</button>
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="targetAvatar" src="" style="width:85px; height:85px; border-radius:50%; border:2px solid var(--dark-red); object-fit: cover;">
        <h3 id="targetName" style="color:var(--bright-red); margin:10px 0;">ნიკი</h3>
        <p id="targetRoleLabel" style="font-size:12px; color:#aaa;"></p>
        <div id="targetPointsLabel" style="color:gold; font-size:13px; font-weight:bold; margin-bottom:5px;"></div>
        <div id="targetStatusDisplay" style="color:#0c0; font-size:13px; font-style:italic; margin:10px 0;"></div>
        <div id="adminOptions"></div>
        <button class="modal-btn" style="background:#111; margin-top:10px;" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), myRole = "Member", currentRoom = "☕ კაფე-ბარი", myAvatar = "";

    let currentQuizQ = null;
    let currentCipher = null;
    let currentJokerGame = null;
    const QUIZ_ROOM_NAME = "❓ ვიქტორინა";
    const CIPHER_ROOM_NAME = "🔐 შიფროგრამა";
    const JOKER_ROOM_NAME = "🃏 ჯოკერი";

    function translateRole(r) { 
        const roles = {'Owner': '👑 დამფუძნებელი', 'Admin': '🛡️ ადმინისტრატორი', 'Member': '👤 მომხმარებელი', 'Banned': '🚫 დაბლოკილი'}; 
        return roles[r] || '👤 მომხმარებელი'; 
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function toggleOnline() { document.getElementById('online-sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); if(document.getElementById('online-sidebar').classList.contains('active')) loadOnline(); }
    function closeAll() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('online-sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); document.getElementById('emoji-picker').style.display='none'; }
    function closeModal() { document.getElementById('userModal').style.display = "none"; }

    async function init() {
        if (!myNick) { location.href = 'index.html'; return; }
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = p.role || "Member";
            myAvatar = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-role-label').innerText = translateRole(myRole);
            document.getElementById('my-avatar-img').src = myAvatar;
            document.getElementById('my-points-label').innerText = p.points || 0;
            document.getElementById('my-cipher-points-label').innerText = p.cipher_points || 0;
            
            if(myRole === "Owner" || myRole === "Admin") {
                document.getElementById('admin-tools').style.display = "flex";
            }
            
            await _s.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick);
            setInterval(() => _s.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick), 30000);
            checkPMs(); setInterval(checkPMs, 10000);
        }
        loadMessages();
        _s.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();

        _s.channel('joker').on('postgres_changes', { event: '*', schema: 'public', table: 'joker_games' }, async (payload) => {
            if (currentRoom === JOKER_ROOM_NAME) {
                currentJokerGame = payload.new;
                renderJokerUI();
            }
        }).subscribe();
    }

    async function joinJoker() {
        if (currentRoom !== JOKER_ROOM_NAME) return;
        const { data: games } = await _s.from('joker_games').select('*').eq('status', 'waiting').limit(1);
        let game = games && games.length > 0 ? games[0] : null;
        if (!game) {
            const { data: newGame } = await _s.from('joker_games').insert([{
                room_id: 'main_table',
                players: [{ name: myNick, avatar: myAvatar, points: 0 }],
                status: 'waiting'
            }]).select().single();
            game = newGame;
        } else {
            let players = game.players || [];
            if (!players.find(p => p.name === myNick) && players.length < 4) {
                players.push({ name: myNick, avatar: myAvatar, points: 0 });
                const { data: updatedGame } = await _s.from('joker_games').update({ players: players }).eq('id', game.id).select().single();
                game = updatedGame;
            }
        }
        currentJokerGame = game;
        renderJokerUI();
    }

    function renderJokerUI() {
        const ui = document.getElementById('joker-ui');
        const chat = document.getElementById('chat');
        if (currentRoom !== JOKER_ROOM_NAME || !currentJokerGame) {
            ui.style.display = 'none';
            chat.style.paddingTop = '15px';
            return;
        }
        ui.style.display = 'block';
        chat.style.paddingTop = '340px';
        const players = currentJokerGame.players || [];
        const positions = ['bottom', 'left', 'top', 'right'];
        let chairsHTML = "";
        for(let i=0; i<4; i++) {
            const p = players[i];
            const pos = positions[i];
            chairsHTML += `
                <div class="chair chair-${pos} ${p ? 'occupied' : ''}">
                    <img src="${p ? p.avatar : 'https://i.ibb.co/v3m6y6R/avatar.png'}">
                    <div class="name-tag">${p ? p.name : 'ცარიელი'}</div>
                </div>
            `;
        }
        ui.innerHTML = `
            <div class="joker-room-view">
                <div class="table-center">JOKER TABLE</div>
                ${chairsHTML}
            </div>
            <div class="joker-mini-chat-box">
                <input type="text" id="joker-mini-msg" class="joker-mini-input" placeholder="რაო, შეგეტენა?.." onkeypress="if(event.key==='Enter') sendJokerMsg()">
                <button class="joker-mini-send" onclick="sendJokerMsg()">></button>
            </div>
        `;
    }

    function sendJokerMsg() {
        const input = document.getElementById('joker-mini-msg');
        if(!input.value.trim()) return;
        const text = input.value;
        input.value = "";
        _s.from('messages').insert([{ user_name: myNick, text: text, room_name: currentRoom }]);
    }

    async function startQuiz() {
        if (currentRoom !== QUIZ_ROOM_NAME) return;
        const { data: questions } = await _s.from('quiz_questions').select('*');
        if (!questions || questions.length === 0) return;
        currentQuizQ = questions[Math.floor(Math.random() * questions.length)];
        await _s.from('messages').insert([{
            room_name: QUIZ_ROOM_NAME,
            user_name: '🤖 QUIZ_BOT',
            text: `❓ **ვიქტორინა:** ${currentQuizQ.question}`
        }]);
    }

    async function handleQuizLogic(msg) {
        if (currentRoom !== QUIZ_ROOM_NAME || !currentQuizQ || msg.user_name === '🤖 QUIZ_BOT') return;
        if (msg.text.toLowerCase().trim() === currentQuizQ.answer.toLowerCase().trim()) {
            const winner = msg.user_name;
            currentQuizQ = null;
            const { data: userProfile } = await _s.from('profiles').select('points').ilike('username', winner).maybeSingle();
            const updatedPoints = (userProfile?.points || 0) + 5;
            await _s.from('profiles').update({ points: updatedPoints }).ilike('username', winner);
            await _s.from('messages').insert([{
                room_name: QUIZ_ROOM_NAME,
                user_name: '🤖 QUIZ_BOT',
                text: `🎉 სწორია! **${winner}**, შენ დაგერიცხა 5 ქულა! (სულ გაქვს: ${updatedPoints})`
            }]);
            if(winner.toLowerCase() === myNick.toLowerCase()) document.getElementById('my-points-label').innerText = updatedPoints;
            setTimeout(startQuiz, 7000); 
        }
    }

    async function startCipher() {
        if (currentRoom !== CIPHER_ROOM_NAME) return;
        const { data: words } = await _s.from('cipher_games').select('*');
        if (!words || words.length === 0) return;
        currentCipher = words[Math.floor(Math.random() * words.length)];
        await _s.from('messages').insert([{
            room_name: CIPHER_ROOM_NAME,
            user_name: '🔐 CIPHER_BOT',
            text: `🧩 **ააწყვეთ სიტყვა:** 👉  **${currentCipher.scrambled}**`
        }]);
    }

    async function handleCipherLogic(msg) {
        if (currentRoom !== CIPHER_ROOM_NAME || !currentCipher || msg.user_name === '🔐 CIPHER_BOT') return;
        if (msg.text.toLowerCase().trim() === currentCipher.correct.toLowerCase().trim()) {
            const winner = msg.user_name;
            currentCipher = null;
            const { data: prof } = await _s.from('profiles').select('cipher_points').ilike('username', winner).maybeSingle();
            const updatedCipherPoints = (prof?.cipher_points || 0) + 10;
            await _s.from('profiles').update({ cipher_points: updatedCipherPoints }).ilike('username', winner);
            await _s.from('messages').insert([{
                room_name: CIPHER_ROOM_NAME,
                user_name: '🔐 CIPHER_BOT',
                text: `✅ სწორია! **${winner}**, შენ გამოიცანი სიტყვა! \n🏆 შიფრო-ქულები: **${updatedCipherPoints}**`
            }]);
            if(winner.toLowerCase() === myNick.toLowerCase()) document.getElementById('my-cipher-points-label').innerText = updatedCipherPoints;
            setTimeout(startCipher, 7000);
        }
    }

    function toggleEmojiPicker() {
        const p = document.getElementById('emoji-picker');
        p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        if(p.style.display === 'flex') loadEmojis();
    }

    async function loadEmojis() {
        const { data: ems } = await _s.from('emojis').select('*').order('id');
        const grid = document.getElementById('emoji-grid');

                     onclick="insertEmoji('${e.name}')"
                     onerror="this.parentElement.style.display='none'">

            </div>`).join('');
    }

    async function uploadEmoji(el) {
        const file = el.files[0]; if(!file) return;
        const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
        try {
            await _s.storage.from('emojis').upload(fileName, file);
            await _s.from('emojis').insert([{ name: fileName }]);
            loadEmojis();
        } catch (err) { alert("შეცდომა ატვირთვისას."); }
    }
