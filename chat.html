            display: flex;

            align-items: center;
            background: var(--nav);
            padding: 8px 0;
            border-bottom: 2px solid var(--accent);
            flex-shrink: 0;
            overflow-x: auto;
            gap: 5px;
        }

        .nav-btn {
            font-size: 22px;
            background: none;
            border: none;
            color: #aa8a8a;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            white-space: nowrap;
        }

        .nav-btn.active {
            color: var(--accent);
            background: rgba(139, 0, 0, 0.2);
        }

        .pages {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
            padding: 12px;

        .page.active {

        .messages {

            gap: 8px;

                <div class="pm-chat-container" id="pmChatWindow">
                    <div class="pm-header" onclick="closePM()"><span>💬 ${escapeHtml(currentPMUser)}</span><span>✕</span></div>
                    <div class="pm-messages" id="pmMessages">${pmMsgs.map(msg => `<div class="pm-message ${msg.from === currentUser ? 'own' : ''}"><div style="font-size:9px; opacity:0.6;">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div><div>${escapeHtml(msg.text)}</div></div>`).join('') || '<div class="empty-state" style="padding:20px;">მიმოწერა ცარიელია</div>'}</div>
                    <div class="pm-input-area">
                        <button class="icon-btn" style="width:36px; height:36px; font-size:18px;" onclick="openPMEmojiPicker()">😊</button>
                        <input type="text" id="pmInput" class="pm-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()">
                        <button class="icon-btn" style="width:36px; height:36px; font-size:16px;" onclick="sendPM()">➤</button>
                    </div>
                    <div class="pm-messages" id="pmMessages">${pmMsgs.map(msg => `<div class="pm-message ${msg.from === currentUser ? 'own' : ''}"><div style="font-size:9px;">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div><div>${escapeHtml(msg.text)}</div></div>`).join('') || '<div class="empty-state" style="padding:20px;">მიმოწერა ცარიელია</div>'}</div>
                    <div class="pm-input-area"><input type="text" id="pmInput" class="pm-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()"><button class="icon-btn" style="width:36px; height:36px;" onclick="sendPM()">➤</button></div>
                </div>
            `;
            document.getElementById('pmContainer').innerHTML = pmHtml;
            const pmMessagesDiv = document.getElementById('pmMessages');
            if (pmMessagesDiv) pmMessagesDiv.scrollTop = pmMessagesDiv.scrollHeight;
            const pmDiv = document.getElementById('pmMessages'); if (pmDiv) pmDiv.scrollTop = pmDiv.scrollHeight;
            document.getElementById('pmInput')?.focus();
        }
        
        function openPMEmojiPicker() {
            const picker = document.createElement('div');
            picker.style.cssText = 'position:fixed; bottom:80px; left:10px; right:10px; background:var(--card); border:2px solid var(--accent); border-radius:16px; display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:12px; z-index:2001; max-height:250px; overflow-y:auto;';
            globalEmojis.forEach(emoji => {
                const btn = document.createElement('div');
                btn.textContent = emoji;
                btn.style.cssText = 'font-size:32px; text-align:center; cursor:pointer; padding:8px; border-radius:8px;';
                btn.onclick = () => { const pmInput = document.getElementById('pmInput'); if(pmInput) pmInput.value += emoji; picker.remove(); };
                picker.appendChild(btn);
            });
            if (ADMINS.includes(currentUser) || currentUser === OWNER) {
                const addBtn = document.createElement('div');
                addBtn.textContent = '➕';
                addBtn.style.cssText = 'font-size:32px; text-align:center; cursor:pointer; padding:8px; border-radius:8px; background:var(--accent); color:white;';
                addBtn.onclick = () => { picker.remove(); addCustomEmoji(); };
                picker.appendChild(addBtn);
            }
            document.body.appendChild(picker);
            setTimeout(() => { const close = (e) => { if (!picker.contains(e.target)) picker.remove(); document.removeEventListener('click', close); }; setTimeout(() => document.addEventListener('click', close), 100); }, 100);
        }
        
        function closePM() { document.getElementById('pmContainer').innerHTML = ''; currentPMUser = null; }
        
        function sendPM() {
            const input = document.getElementById('pmInput');
            const text = input.value.trim();
            if (!text || !currentPMUser) return;
            privateMessages.push({ id: Date.now(), from: currentUser, to: currentPMUser, text: text, time: new Date().toISOString(), image: null });
            savePM();
            input.value = '';
            renderPrivateChat();
            renderPrivateChatsList();
            privateMessages.push({ id: Date.now(), from: currentUser, to: currentPMUser, text: text, time: new Date().toISOString() });
            savePM(); input.value = ''; renderPrivateChat(); renderPrivateChatsList();
        }
        
        function renderPrivateChatsList() {
            const myPMs = privateMessages.filter(m => m.from === currentUser || m.to === currentUser);
            const uniqueUsers = new Set();
            myPMs.forEach(m => { const other = m.from === currentUser ? m.to : m.from; uniqueUsers.add(other); });
            const container = document.getElementById('pmList');
            if (uniqueUsers.size === 0) { container.innerHTML = '<div class="empty-state">ჯერ არ გქონია პირადი მიმოწერა</div>'; return; }
            if (uniqueUsers.size === 0) { container.innerHTML = '<div class="empty-state">ჯერ არ გქონია მიმოწერა</div>'; return; }
            container.innerHTML = Array.from(uniqueUsers).map(username => {
                const lastMsg = myPMs.filter(m => (m.from === username || m.to === username)).pop();
                const user = users.find(u => u.username === username);
                return `<div class="user-item" onclick="openPrivateChat('${username}')"><div class="user-avatar" style="${user?.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user?.avatar ? '' : username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(username)}</div><div class="user-status">${lastMsg ? lastMsg.text.substring(0,30) : '...'}</div></div></div>`;
            }).join('');
        }

        // ============ დამხმარე ============
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => { btn.classList.remove('active'); if (btn.getAttribute('data-page') === pageName) btn.classList.add('active'); });
            if (pageName === 'online') renderOnlineUsers();
            if (pageName === 'friends') renderFriendsList();
            if (pageName === 'messages') renderPrivateChatsList();
            if (pageName === 'profile') {
                const user = users.find(u => u.username === currentUser);
                document.getElementById('nicknameInput').value = currentUser;
                document.getElementById('statusInput').value = user?.status || '';
                if (user?.avatar) { document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar})`; document.getElementById('profileAvatar').style.backgroundSize = 'cover'; document.getElementById('profileAvatar').innerHTML = ''; }
                renderAlbum();
            }
            if (pageName === 'profile') { const user = users.find(u => u.username === currentUser); document.getElementById('nicknameInput').value = currentUser; document.getElementById('statusInput').value = user?.status || ''; if (user?.avatar) { document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar})`; document.getElementById('profileAvatar').style.backgroundSize = 'cover'; document.getElementById('profileAvatar').innerHTML = ''; } renderAlbum(); }
        }
        
        function viewImage(src) { const win = window.open(); win.document.write(`<img src="${src}" style="max-width:100%; margin:0 auto; display:block;">`); }
        function viewImage(src) { const win = window.open(); win.document.write(`<img src="${src}" style="max-width:100%;">`); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        function startHearts() { setInterval(() => { const heart = document.createElement('div'); heart.className = 'heart'; heart.innerHTML = ['❤️', '💖', '💗', '💕', '💘'][Math.floor(Math.random()*5)]; heart.style.left = Math.random()*100+'%'; heart.style.fontSize = (18+Math.random()*22)+'px'; document.getElementById('hearts').appendChild(heart); setTimeout(() => heart.remove(), 4000); }, 2000); }
        
        function toggleTheme() { document.body.classList.toggle('day-mode'); document.getElementById('themeToggle').innerHTML = document.body.classList.contains('day-mode') ? '☀️' : '🌙'; }

        // ============ ინიციალიზაცია ============
        function init() {
            loadData();
            loadAlbums();
            renderRooms();
            renderOnlineUsers();
            renderPrivateChatsList();
            startHearts();
            loadData(); loadAlbums(); renderRooms(); renderOnlineUsers(); renderFriendsList(); renderPrivateChatsList(); startHearts();
            document.getElementById('userId').innerHTML = Math.floor(Math.random() * 10000) + 1000;
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => { btn.addEventListener('click', () => showPage(btn.getAttribute('data-page'))); });
            showPage('home');
        }
        init();
    </script>
</body>
</html>
