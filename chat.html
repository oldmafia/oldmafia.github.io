<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body.night-mode {
            --bg: #030000;
            --sidebar: #0a0202;
            --card: #1a0a0a;
            --text: #eee;
            --border: #882222;
            --accent: #ff8888;
            --hover: #2a0a0a;
            --bubble-bg: #1a0a0a;
            --input-bg: #1a0808;
        }
        body.day-mode {
            --bg: #f0f2f5;
            --sidebar: #ffffff;
            --card: #ffffff;
            --text: #1c1e21;
            --border: #dddfe2;
            --accent: #c55a3a;
            --hover: #f0f2f5;
            --bubble-bg: #ffffff;
            --input-bg: #ffffff;
            background-image: radial-gradient(circle at 15% 25%, rgba(255,77,77,0.15) 3px, transparent 3px);
            background-size: 55px 55px;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* ========= მარცხენა მენიუ ========= */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .logo {
            padding: 16px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }
        .profile-preview {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .profile-preview img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-preview .info {
            flex: 1;
        }
        .profile-preview .name {
            font-weight: bold;
        }
        .profile-preview .status {
            font-size: 12px;
            color: #888;
        }
        
        .menu-items {
            flex: 1;
            padding: 12px 0;
        }
        .menu-item {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text);
            border-radius: 8px;
            margin: 2px 8px;
        }
        .menu-item:hover { background: var(--hover); }
        .menu-item.active { background: var(--accent); color: white; }
        .menu-icon { font-size: 1.2rem; width: 28px; text-align: center; }
        
        .bottom-menu {
            border-top: 1px solid var(--border);
            padding: 12px 0;
        }
        
        /* ========= მარჯვენა მხარე - ჩატი ========= */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
