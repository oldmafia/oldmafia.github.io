<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ChatApp - სრული ვერსია</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            background: #0a0a0a;
        }

        /* ღამის რეჟიმი */
        body.night {
            background: #0a0a0a;
        }
        body.night .app {
            background: rgba(0,0,0,0.9);
        }
        body.night .top-bar {
            background: #1a1a1a;
            border-bottom: 2px solid #800020;
        }
        body.night .sidebar {
            background: #111;
            border-right: 1px solid #800020;
        }
        body.night .message {
            background: #2a2a2a;
            color: #fff;
        }
        body.night .message.my {
            background: #800020;
        }
        body.night .room-item {
            background: #222;
            color: #fff;
        }
        body.night .room-item.active {
            background: #800020;
        }
        body.night .user-item {
            background: #222;
            color: #fff;
        }
        body.night .input-area input {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #800020;
        }

        /* დღის რეჟიმი */
        body.day {
            background: #fff5e8;
        }
        body.day .app {
            background: rgba(255,245,235,0.95);
        }
        body.day .top-bar {
            background: #fff0e4;
            border-bottom: 2px solid #b85c1a;
        }
        body.day .sidebar {
            background: #fff5ed;
            border-right: 1px solid #e4c4b0;
        }
        body.day .message {
            background: #fff;
            color: #4a2a1a;
            border: 1px solid #e4c4b0;
        }
        body.day .message.my {
            background: #ffe4d4;
        }
        body.day .room-item {
            background: #fff0e4;
            border: 1px solid #e4c4b0;
            color: #5a2a1a;
        }
        body.day .room-item.active {
            background: #b85c1a;
            color: #fff;
        }
        body.day .user-item {
            background: #fff0e4;
            border: 1px solid #e4c4b0;
            color: #5a2a1a;
        }
        body.day .input-area input {
            background: #fff;
            border: 1px solid #e4c4b0;
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ზედა ბარი */
        .top-bar {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .top-buttons {
            display: flex;
            gap: 8px;
        }
        .top-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            background: #3a3a3a;
            color: #fff;
        }
        body.day .top-btn {
            background: #e4c4b0;
            color: #5a2a1a;
        }
        .theme-btn {
            background: #800020 !important;
            color: #fff !important;
        }

        /* მთავარი */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* გვერდითი პანელი */
        .sidebar {
            width: 260px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-section {
            padding: 12px;
            border-bottom: 1px solid;
        }
        body.night .sidebar-section {
            border-bottom-color: #800020;
        }
        body.day .sidebar-section {
            border-bottom-color: #e4c4b0;
        }
        .section-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .room-item {
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .users-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #b85c1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .user-info {
            flex: 1;
        }
        .user-name {
            font-weight: bold;
            font-size: 13px;
        }
        .user-status {
            font-size: 10px;
            opacity: 0.7;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
        }

        /* ჩატი */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid;
        }
        body.night .chat-header {
            border-bottom-color: #800020;
        }
        body.day .chat-header {
            border-bottom-color: #e4c4b0;
        }
        .room-name {
            font-size: 16px;
            font-weight: bold;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 30px;
        }
        .profile-header:hover {
            background: rgba(128,0,32,0.2);
        }
        .profile-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #b85c1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .profile-name {
            font-weight: bold;
            font-size: 13px;
        }
        .profile-status {
            font-size: 10px;
            opacity: 0.7;
        }

        /* შეტყობინებები */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 16px;
            position: relative;
        }
        .message.left {
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message.right {
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            font-size: 10px;
        }
        .msg-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #b85c1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }
        .msg-name {
            font-weight: bold;
        }
        .msg-time {
            font-size: 9px;
            opacity: 0.6;
        }
        .msg-text {
            font-size: 13px;
            word-break: break-word;
        }
        .delete-msg {
            position: absolute;
            right: 4px;
            top: 4px;
            cursor: pointer;
            font-size: 10px;
            opacity: 0;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 10px;
        }
        .message:hover .delete-msg {
            opacity: 1;
        }
        .sticker-img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 12px;
            cursor: pointer;
        }

        /* შეყვანის ველი */
        .input-area {
            padding: 10px 12px;
            display: flex;
            gap: 8px;
            border-top: 1px solid;
        }
        body.night .input-area {
            border-top-color: #800020;
        }
        body.day .input-area {
            border-top-color: #e4c4b0;
        }
        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 30px;
            outline: none;
            font-size: 14px;
        }
        .emoji-btn, .gallery-btn, .send-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
        }
        .emoji-btn { background: #b85c1a; color: #fff; }
        .gallery-btn { background: #4a6a8a; color: #fff; }
        .send-btn { background: #800020; color: #fff; }

        /* ემოჯი პანელი */
        .emoji-panel {
            position: fixed;
            bottom: 70px;
            right: 10px;
            width: 320px;
            background: #2a2a2a;
            border-radius: 16px;
            padding: 12px;
            display: none;
            z-index: 200;
            border: 1px solid #800020;
        }
        body.day .emoji-panel {
            background: #fff;
            border: 1px solid #e4c4b0;
        }
        .emoji-panel.show {
            display: block;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            max-height: 180px;
            overflow-y: auto;
        }
        .emoji-item {
            font-size: 26px;
            cursor: pointer;
            text-align: center;
            padding: 5px;
        }
        .emoji-admin {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .emoji-admin button {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* მოდალები */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            width: 90%;
            max-width: 360px;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #800020;
        }
        body.day .modal-content {
            background: #fff;
            border: 1px solid #e4c4b0;
        }
        .modal-content h3 {
            margin-bottom: 12px;
        }
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-primary { background: #800020; color: #fff; }
        .btn-danger { background: #c0392b; color: #fff; }

        /* მინი მესინჯერი */
        .mini-messenger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 400px;
            background: #2a2a2a;
            border-radius: 16px;
            display: none;
            flex-direction: column;
            z-index: 300;
            border: 1px solid #800020;
        }
        body.day .mini-messenger {
            background: #fff;
            border: 1px solid #e4c4b0;
        }
        .mini-messenger.show {
            display: flex;
        }
        .mini-header {
            padding: 10px;
            background: #800020;
            color: #fff;
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
        }
        .mini-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .mini-msg {
            margin: 5px 0;
            padding: 6px 10px;
            border-radius: 12px;
            max-width: 85%;
            font-size: 12px;
        }
        .mini-msg.left {
            background: #b85c1a;
            color: #fff;
        }
        .mini-msg.right {
            background: #800020;
            color: #fff;
            margin-left: auto;
        }
        .mini-input-area {
            display: flex;
            padding: 8px;
            gap: 6px;
            border-top: 1px solid #800020;
        }
        .mini-input-area input {
            flex: 1;
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid;
        }

        .search-input {
            width: 100%;
            padding: 6px 10px;
            border-radius: 20px;
            margin-bottom: 8px;
            border: 1px solid;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #800020; border-radius: 4px; }
    </style>
</head>
<body class="night">
    <div class="app">
        <!-- ზედა ბარი -->
        <div class="top-bar">
            <div class="logo">💗 ChatApp</div>
            <div class="top-buttons">
                <button class="top-btn" id="profileBtn">👤 პროფილი</button>
                <button class="top-btn" id="friendsBtn">👥 მეგობრები</button>
                <button class="top-btn" id="usersBtn">📋 მომხმარებლები</button>
                <button class="top-btn theme-btn" id="themeBtn">🌙</button>
            </div>
        </div>

        <div class="main">
            <!-- მარცხენა პანელი -->
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="section-title">📌 ოთახები (12)</div>
                    <div class="rooms-list" id="roomsList"></div>
                </div>
                <div class="sidebar-section">
                    <div class="section-title">👥 მეგობრები</div>
                    <div class="users-list" id="friendsSidebar"></div>
                </div>
                <div class="sidebar-section">
                    <div class="section-title">🟢 ონლაინ</div>
                    <div class="users-list" id="onlineUsersList"></div>
                </div>
                <div class="sidebar-section" id="allUsersSection">
                    <div class="section-title">👥 ყველა მომხმარებელი</div>
                    <input type="text" id="searchUsers" class="search-input" placeholder="🔍 ძებნა...">
                    <div class="users-list" id="allUsersList"></div>
                </div>
            </div>

            <!-- ჩატის არე -->
            <div class="chat">
                <div class="chat-header">
                    <div class="room-name" id="roomName">ოთახი 1</div>
                    <div class="profile-header" id="profileHeader">
                        <div>
                            <div class="profile-name" id="headerName">მომხმარებელი</div>
                            <div class="profile-status" id="headerStatus">💗 აქტიური</div>
                        </div>
                        <div class="profile-avatar" id="headerAvatar">👤</div>
                    </div>
                </div>

                <div class="messages-area" id="messagesArea"></div>

                <div class="input-area">
                    <button class="emoji-btn" id="emojiBtn">😊</button>
                    <button class="gallery-btn" id="galleryBtn">🖼️</button>
                    <input type="text" id="messageInput" placeholder="დაწერე შეტყობინება...">
                    <button class="send-btn" id="sendBtn">📤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ემოჯი პანელი -->
    <div class="emoji-panel" id="emojiPanel">
        <div class="emoji-grid" id="emojiGrid"></div>
        <div class="emoji-admin" id="emojiAdmin" style="display:none">
            <button id="addEmojiBtn" class="btn-primary">➕ ემოჯი</button>
            <button id="addStickerBtn" class="btn-primary">🖼️ სტიკერი</button>
            <button id="removeEmojiBtn" class="btn-danger">❌ წაშლა</button>
        </div>
    </div>

    <!-- ფარული file input -->
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <!-- პროფილის მოდალი -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h3>💗 ჩემი პროფილი</h3>
            <div style="display:flex; justify-content:center; margin-bottom:10px">
                <div class="profile-avatar" id="modalAvatar" style="width:70px; height:70px; font-size:30px;">👤</div>
            </div>
            <input type="file" id="profilePhoto" accept="image/*">
            <input type="text" id="editName" placeholder="ნიკნეიმი">
            <textarea id="editStatus" rows="2" placeholder="სტატუსი"></textarea>
            <div class="modal-buttons">
                <button id="saveProfileBtn" class="btn-primary">💾 შენახვა</button>
                <button id="closeProfileBtn">❌</button>
            </div>
        </div>
    </div>

    <!-- მეგობრების მოდალი -->
    <div class="modal" id="friendsModal">
        <div class="modal-content">
            <h3>👥 ჩემი მეგობრები</h3>
            <input type="text" id="friendSearch" class="search-input" placeholder="🔍 ძებნა...">
            <div id="friendsModalList" style="max-height:300px; overflow-y:auto"></div>
            <button id="closeFriendsModal" class="btn-primary">დახურვა</button>
        </div>
    </div>

    <!-- მეგობრის მოთხოვნა -->
    <div class="modal" id="requestModal">
        <div class="modal-content">
            <h3>💌 მეგობრის მოთხოვნა</h3>
            <p id="requestText"></p>
            <div class="modal-buttons">
                <button id="acceptRequest" class="btn-primary">✅ დასტური</button>
                <button id="rejectRequest" class="btn-danger">❌ უარი</button>
            </div>
        </div>
    </div>

    <!-- დაბლოკვის მოდალი -->
    <div class="modal" id="banModal">
        <div class="modal-content">
            <h3>🚫 დაბლოკვა</h3>
            <p id="banUserName"></p>
            <textarea id="banReason" rows="2" placeholder="მიზეზი..."></textarea>
            <div class="modal-buttons">
                <button id="confirmBan" class="btn-danger">🔒 დაბლოკვა</button>
                <button id="cancelBan">გაუქმება</button>
            </div>
        </div>
    </div>

    <!-- როლის მინიჭება -->
    <div class="modal" id="roleModal">
        <div class="modal-content">
            <h3>👑 როლის მინიჭება</h3>
            <p id="roleUserName"></p>
            <select id="roleSelect">
                <option value="member">👥 წევრი</option>
                <option value="admin">🛡️ ადმინი</option>
                <option value="founder">👑 დამფუძნებელი</option>
            </select>
            <div class="modal-buttons">
                <button id="assignRole" class="btn-primary">მინიჭება</button>
                <button id="closeRole">გაუქმება</button>
            </div>
        </div>
    </div>

    <!-- მინი მესინჯერი -->
    <div class="mini-messenger" id="miniMessenger">
        <div class="mini-header">
            <span id="miniFriendName"></span>
            <button id="closeMini" style="background:none; border:none; color:#fff; font-size:18px;">✕</button>
        </div>
        <div class="mini-messages" id="miniMessages"></div>
        <div class="mini-input-area">
            <input type="text" id="miniInput" placeholder="დაწერე...">
            <button id="miniSend" style="background:#800020; border:none; border-radius:20px; padding:6px 12px; color:#fff;">📤</button>
        </div>
    </div>

    <script>
        // ==================== მონაცემები ====================
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || {
            id: 'user_' + Date.now(),
            name: 'მომხმარებელი_' + Math.floor(Math.random() * 1000),
            avatar: '👤',
            status: '💗 აქტიური',
            role: 'founder',
            friends: []
        };

        let users = JSON.parse(localStorage.getItem('users')) || [];
        if (users.length === 0) {
            users = [
                { id: 'user2', name: 'ანა', avatar: '👩', status: '😊', role: 'member', friends: [] },
                { id: 'user3', name: 'ნიკა', avatar: '👨', status: '💪', role: 'admin', friends: [] },
                { id: 'user4', name: 'სოფო', avatar: '👧', status: '🌸', role: 'member', friends: [] },
                { id: 'user5', name: 'გიორგი', avatar: '👦', status: '🎮', role: 'member', friends: [] }
            ];
            users.push(currentUser);
            localStorage.setItem('users', JSON.stringify(users));
        } else {
            let exists = users.find(u => u.id === currentUser.id);
            if (!exists) {
                users.push(currentUser);
                localStorage.setItem('users', JSON.stringify(users));
            }
        }

        // ოთახები
        let rooms = [];
        for (let i = 1; i <= 12; i++) {
            rooms.push({
                id: i,
                name: `ოთახი ${i}`,
                messages: JSON.parse(localStorage.getItem(`room_${i}`)) || [],
                banned: JSON.parse(localStorage.getItem(`room_${i}_banned`)) || []
            });
        }

        let customEmojis = JSON.parse(localStorage.getItem('customEmojis')) || ['😊', '😂', '❤️', '😍', '🎉', '🔥', '👍', '🙏', '🥰', '😢'];
        let customStickers = JSON.parse(localStorage.getItem('customStickers')) || [];
        let privateMessages = JSON.parse(localStorage.getItem('privateMessages')) || {};
        let currentRoom = 0;
        let selectedFriend = null;
        let pendingRequest = null;

        // ==================== ფუნქციები ====================
        function saveUsers() { localStorage.setItem('users', JSON.stringify(users)); }
        function saveCurrentUser() { localStorage.setItem('currentUser', JSON.stringify(currentUser)); }

        function renderRooms() {
            let container = document.getElementById('roomsList');
            container.innerHTML = rooms.map((room, i) => `
                <div class="room-item ${currentRoom === i ? 'active' : ''}" onclick="changeRoom(${i})">
                    📌 ${room.name}
                </div>
            `).join('');
        }

        window.changeRoom = function(i) {
            currentRoom = i;
            document.getElementById('roomName').innerHTML = rooms[i].name;
            renderRooms();
            renderMessages();
        };

        function renderMessages() {
            let room = rooms[currentRoom];
            let container = document.getElementById('messagesArea');
            container.innerHTML = room.messages.map(msg => {
                let isMy = msg.userId === currentUser.id;
                let user = users.find(u => u.id === msg.userId) || { name: msg.userName, avatar: msg.avatar };
                let isSticker = msg.isSticker === true;
                return `
                    <div class="message ${isMy ? 'right' : 'left'}">
                        <div class="message-header">
                            <div class="msg-avatar">${user.avatar || '👤'}</div>
                            <span class="msg-name">${escapeHtml(user.name)}</span>
                            <span class="msg-time">${msg.time}</span>
                        </div>
                        <div class="msg-text">
                            ${isSticker ? `<img src="${msg.text}" class="sticker-img" onclick="window.open('${msg.text}','_blank')">` : escapeHtml(msg.text)}
                        </div>
                        ${(currentUser.role === 'admin' || currentUser.role === 'founder') ? `<span class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</span>` : ''}
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        window.deleteMessage = function(id) {
            let room = rooms[currentRoom];
            room.messages = room.messages.filter(m => m.id !== id);
            localStorage.setItem(`room_${room.id}`, JSON.stringify(room.messages));
            renderMessages();
        };

        function sendMessage(text, isSticker = false) {
            if (!text) return;
            let room = rooms[currentRoom];
            if (room.banned.includes(currentUser.id)) {
                alert('⚠️ დაბლოკილი ხარ ამ ოთახში!');
                return;
            }
            let msg = {
                id: Date.now(),
                userId: currentUser.id,
                userName: currentUser.name,
                avatar: currentUser.avatar,
                text: text,
                time: new Date().toLocaleTimeString(),
                isSticker: isSticker
            };
            room.messages.push(msg);
            localStorage.setItem(`room_${room.id}`, JSON.stringify(room.messages));
            renderMessages();
        }

        function sendTextMessage() {
            let input = document.getElementById('messageInput');
            sendMessage(input.value.trim());
            input.value = '';
        }

        function sendSticker(imageUrl) {
            sendMessage(imageUrl, true);
        }

        function renderUsers() {
            // მეგობრები
            let friends = users.filter(u => currentUser.friends.includes(u.id));
            document.getElementById('friendsSidebar').innerHTML = friends.map(user => `
                <div class="user-item" onclick="openMiniChat('${user.id}')">
                    <div class="user-avatar">${user.avatar}</div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name)}</div>
                        <div class="user-status">${user.status}</div>
                    </div>
                    <div class="online-dot"></div>
                </div>
            `).join('') || '<div style="padding:10px;text-align:center;">💗 არ გყავს მეგობრები</div>';

            // ონლაინ (ყველა სხვა)
            let online = users.filter(u => u.id !== currentUser.id);
            document.getElementById('onlineUsersList').innerHTML = online.map(user => `
                <div class="user-item" onclick="openUserMenu('${user.id}')">
                    <div class="user-avatar">${user.avatar}</div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name)}</div>
                        <div class="user-status">${user.status}</div>
                    </div>
                    <div class="online-dot"></div>
                </div>
            `).join('');

            // ყველა მომხმარებელი
            let search = document.getElementById('searchUsers')?.value.toLowerCase() || '';
            let all = users.filter(u => u.id !== currentUser.id && u.name.toLowerCase().includes(search));
            document.getElementById('allUsersList').innerHTML = all.map(user => `
                <div class="user-item" onclick="openUserMenu('${user.id}')">
                    <div class="user-avatar">${user.avatar}</div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name)}</div>
                        <div class="user-status">${user.status}</div>
                    </div>
                </div>
            `).join('');
        }

        window.openUserMenu = function(userId) {
            let user = users.find(u => u.id === userId);
            if (!user) return;
            let actions = ['💬 პირადი მესიჯი'];
            if (currentUser.role === 'founder') actions.push('👑 როლის მინიჭება');
            if (currentUser.role === 'admin' || currentUser.role === 'founder') actions.push('🚫 დაბლოკვა');
            if (!currentUser.friends.includes(user.id)) actions.push('👥 მეგობრად დამატება');
            
            let choice = prompt(`${user.name}\n\n${actions.map((a,i)=>`${i+1}. ${a}`).join('\n')}`);
            if (choice === '1') openMiniChat(user.id);
            else if (choice === '2' && actions[1] === '👑 როლის მინიჭება') openRoleModal(user);
            else if ((choice === '2' && actions[1] === '🚫 დაბლოკვა') || (choice === '3' && actions[2] === '🚫 დაბლოკვა')) openBanModal(user);
            else if (choice === (actions.length) && actions[actions.length-1] === '👥 მეგობრად დამატება') sendFriendRequest(user);
        };

        function openBanModal(user) {
            document.getElementById('banUserName').innerHTML = user.name;
            document.getElementById('banModal').classList.add('show');
            document.getElementById('confirmBan').onclick = () => {
                let room = rooms[currentRoom];
                if (!room.banned.includes(user.id)) {
                    room.banned.push(user.id);
                    localStorage.setItem(`room_${room.id}_banned`, JSON.stringify(room.banned));
                    alert(`✅ ${user.name} დაბლოკილია`);
                }
                document.getElementById('banModal').classList.remove('show');
            };
            document.getElementById('cancelBan').onclick = () => document.getElementById('banModal').classList.remove('show');
        }

        function openRoleModal(user) {
            document.getElementById('roleUserName').innerHTML = user.name;
            document.getElementById('roleModal').classList.add('show');
            document.getElementById('assignRole').onclick = () => {
                user.role = document.getElementById('roleSelect').value;
                saveUsers();
                alert(`✅ ${user.name} ახლა არის ${user.role === 'founder' ? 'დამფუძნებელი' : user.role === 'admin' ? 'ადმინი' : 'წევრი'}`);
                document.getElementById('roleModal').classList.remove('show');
                renderUsers();
            };
            document.getElementById('closeRole').onclick = () => document.getElementById('roleModal').classList.remove('show');
        }

        function sendFriendRequest(user) {
            if (currentUser.friends.includes(user.id)) { alert('უკვე მეგობარი ხართ'); return; }
            pendingRequest = user;
            document.getElementById('requestText').innerHTML = `💗 ${user.name} - მეგობრად დამატება?`;
            document.getElementById('requestModal').classList.add('show');
        }

        // მინი მესინჯერი
        function openMiniChat(userId) {
            selectedFriend = users.find(u => u.id === userId);
            if (!selectedFriend) return;
            document.getElementById('miniFriendName').innerHTML = selectedFriend.name;
            document.getElementById('miniMessenger').classList.add('show');
            renderMiniMessages();
        }

        function renderMiniMessages() {
            let chatId = [currentUser.id, selectedFriend.id].sort().join('-');
            let msgs = privateMessages[chatId] || [];
            document.getElementById('miniMessages').innerHTML = msgs.map(msg => `
                <div class="mini-msg ${msg.from === currentUser.id ? 'right' : 'left'}">
                    <small>${new Date(msg.time).toLocaleTimeString()}</small>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
        }

        function sendPrivateMsg() {
            let input = document.getElementById('miniInput');
            let text = input.value.trim();
            if (!text || !selectedFriend) return;
            let chatId = [currentUser.id, selectedFriend.id].sort().join('-');
            if (!privateMessages[chatId]) privateMessages[chatId] = [];
            privateMessages[chatId].push({
                from: currentUser.id,
                to: selectedFriend.id,
                text: text,
                time: Date.now()
            });
            localStorage.setItem('privateMessages', JSON.stringify(privateMessages));
            input.value = '';
            renderMiniMessages();
        }

        // ემოჯები
        function renderEmojis() {
            let html = customEmojis.map(e => `<div class="emoji-item" onclick="addEmoji('${e}')">${e}</div>`).join('');
            html += customStickers.map(s => `
                <div class="emoji-item" onclick="sendSticker('${s}')">
                    <img src="${s}" style="width:40px; height:40px; object-fit:cover; border-radius:8px;">
                </div>
            `).join('');
            document.getElementById('emojiGrid').innerHTML = html;
            if (currentUser.role === 'admin' || currentUser.role === 'founder') {
                document.getElementById('emojiAdmin').style.display = 'flex';
            } else {
                document.getElementById('emojiAdmin').style.display = 'none';
            }
        }

        window.addEmoji = function(e) {
            document.getElementById('messageInput').value += e;
            document.getElementById('emojiPanel').classList.remove('show');
        };

        function addStickerFromGallery() {
            let input = document.getElementById('fileInput');
            input.onchange = function(e) {
                let file = e.target.files[0];
                if (file) {
                    let reader = new FileReader();
                    reader.onload = function(ev) {
                        customStickers.push(ev.target.result);
                        localStorage.setItem('customStickers', JSON.stringify(customStickers));
                        renderEmojis();
                        alert('✅ სტიკერი დაემატა!');
                    };
                    reader.readAsDataURL(file);
                }
                input.value = '';
            };
            input.click();
        }

        function sendImageDirectly() {
            let input = document.getElementById('fileInput');
            input.onchange = function(e) {
                let file = e.target.files[0];
                if (file) {
                    let reader = new FileReader();
                    reader.onload = function(ev) {
                        sendSticker(ev.target.result);
                    };
                    reader.readAsDataURL(file);
                }
                input.value = '';
            };
            input.click();
        }

        // პროფილი
        function updateProfileUI() {
            document.getElementById('headerName').innerHTML = currentUser.name;
            document.getElementById('headerStatus').innerHTML = currentUser.status;
            document.getElementById('headerAvatar').innerHTML = currentUser.avatar;
            document.getElementById('modalAvatar').innerHTML = currentUser.avatar;
            document.getElementById('editName').value = currentUser.name;
            document.getElementById('editStatus').value = currentUser.status;
        }

        function saveProfile() {
            let newName = document.getElementById('editName').value.trim();
            if (newName) currentUser.name = newName;
            currentUser.status = document.getElementById('editStatus').value;
            
            let photo = document.getElementById('profilePhoto');
            if (photo.files && photo.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    currentUser.avatar = `<img src="${e.target.result}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                    saveCurrentUser();
                    let idx = users.findIndex(u => u.id === currentUser.id);
                    if (idx !== -1) users[idx] = currentUser;
                    saveUsers();
                    updateProfileUI();
                    renderUsers();
                    renderMessages();
                };
                reader.readAsDataURL(photo.files[0]);
            } else {
                saveCurrentUser();
                let idx = users.findIndex(u => u.id === currentUser.id);
                if (idx !== -1) users[idx] = currentUser;
                saveUsers();
                updateProfileUI();
                renderUsers();
                renderMessages();
            }
            document.getElementById('profileModal').classList.remove('show');
        }

        function openFriendsModal() {
            let friends = users.filter(u => currentUser.friends.includes(u.id));
            document.getElementById('friendsModalList').innerHTML = friends.map(f => `
                <div class="user-item" onclick="openMiniChat('${f.id}'); document.getElementById('friendsModal').classList.remove('show');">
                    <div class="user-avatar">${f.avatar}</div>
                    <div class="user-info"><div class="user-name">${escapeHtml(f.name)}</div></div>
                </div>
            `).join('') || '<div style="padding:20px;text-align:center;">💗 არ გყავს მეგობრები</div>';
            document.getElementById('friendsModal').classList.add('show');
        }

        function toggleTheme() {
            let body = document.body;
            let btn = document.getElementById('themeBtn');
            if (body.classList.contains('night')) {
                body.classList.remove('night');
                body.classList.add('day');
                btn.innerHTML = '☀️';
            } else {
                body.classList.remove('day');
                body.classList.add('night');
                btn.innerHTML = '🌙';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ==================== Event Listeners ====================
        document.getElementById('sendBtn').onclick = sendTextMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendTextMessage(); };
        document.getElementById('emojiBtn').onclick = () => document.getElementById('emojiPanel').classList.toggle('show');
        document.getElementById('galleryBtn').onclick = sendImageDirectly;
        document.getElementById('profileBtn').onclick = () => document.getElementById('profileModal').classList.add('show');
        document.getElementById('profileHeader').onclick = () => document.getElementById('profileModal').classList.add('show');
        document.getElementById('saveProfileBtn').onclick = saveProfile;
        document.getElementById('closeProfileBtn').onclick = () => document.getElementById('profileModal').classList.remove('show');
        document.getElementById('friendsBtn').onclick = openFriendsModal;
        document.getElementById('closeFriendsModal').onclick = () => document.getElementById('friendsModal').classList.remove('show');
        document.getElementById('usersBtn').onclick = () => document.getElementById('allUsersSection').scrollIntoView({ behavior: 'smooth' });
        document.getElementById('themeBtn').onclick = toggleTheme;
        document.getElementById('searchUsers').oninput = renderUsers;
        document.getElementById('friendSearch').oninput = function() {
            let search = this.value.toLowerCase();
            let friends = users.filter(u => currentUser.friends.includes(u.id) && u.name.toLowerCase().includes(search));
            document.getElementById('friendsModalList').innerHTML = friends.map(f => `
                <div class="user-item" onclick="openMiniChat('${f.id}'); document.getElementById('friendsModal').classList.remove('show');">
                    <div class="user-avatar">${f.avatar}</div>
                    <div class="user-info"><div class="user-name">${escapeHtml(f.name)}</div></div>
                </div>
            `).join('') || '<div style="padding:20px;text-align:center;">💗 ვერ მოიძებნა</div>';
        };
        
        document.getElementById('acceptRequest').onclick = () => {
            if (pendingRequest && !currentUser.friends.includes(pendingRequest.id)) {
                currentUser.friends.push(pendingRequest.id);
                saveCurrentUser();
                let idx = users.findIndex(u => u.id === currentUser.id);
                if (idx !== -1) users[idx] = currentUser;
                saveUsers();
                alert(`💗 ${pendingRequest.name} დაემატა მეგობრებში!`);
                renderUsers();
            }
            document.getElementById('requestModal').classList.remove('show');
            pendingRequest = null;
        };
        document.getElementById('rejectRequest').onclick = () => {
            document.getElementById('requestModal').classList.remove('show');
            pendingRequest = null;
        };
        
        document.getElementById('closeMini').onclick = () => document.getElementById('miniMessenger').classList.remove('show');
        document.getElementById('miniSend').onclick = sendPrivateMsg;
        document.getElementById('miniInput').onkeypress = (e) => { if (e.key === 'Enter') sendPrivateMsg(); };
        
        document.getElementById('addEmojiBtn').onclick = () => {
            let emoji = prompt('ახალი ემოჯი:');
            if (emoji && !customEmojis.includes(emoji)) {
                customEmojis.push(emoji);
                localStorage.setItem('customEmojis', JSON.stringify(customEmojis));
                renderEmojis();
            }
        };
        document.getElementById('addStickerBtn').onclick = addStickerFromGallery;
        document.getElementById('removeEmojiBtn').onclick = () => {
            let type = prompt('წაშლა: 1 - ემოჯი, 2 - ყველა სტიკერი');
            if (type === '1') {
                let emoji = prompt('წასაშლელი ემოჯი:');
                let idx = customEmojis.indexOf(emoji);
                if (idx !== -1) {
                    customEmojis.splice(idx, 1);
                    localStorage.setItem('customEmojis', JSON.stringify(customEmojis));
                    renderEmojis();
                }
            } else if (type === '2') {
                customStickers = [];
                localStorage.setItem('customStickers', JSON.stringify(customStickers));
                renderEmojis();
                alert('✅ ყველა სტიკერი წაიშალა');
            }
        };

        // ==================== ინიციალიზაცია ====================
        renderRooms();
        renderUsers();
        renderMessages();
        renderEmojis();
        updateProfileUI();
        changeRoom(0);
    </script>
</body>
</html>
