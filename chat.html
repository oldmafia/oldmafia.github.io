<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --dark-red: #4a0000; --deep-red: #800000; --bright-red: #ff0000;
            --blood-red: #660000; --bg-black: #030000; --text-glow: 0 0 10px rgba(255, 0, 0, 0.7);
            --shadow-red: rgba(138, 0, 0, 0.5);
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--dark-red); height: 60px; flex-shrink: 0; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 25px; color: var(--bright-red); margin-right: 15px; }
        #room-name { font-weight: bold; color: var(--bright-red); flex: 1; text-align: center; font-size: 19px; }
        
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #1a0000 0%, #030000 100%); }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; max-width: 95%; }
        .msg-avatar { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--dark-red); object-fit: cover; cursor: pointer; }
        
        .bubble { background: rgba(15, 0, 0, 0.85); border: 1px solid var(--blood-red); padding: 10px 14px; border-radius: 4px 18px 18px 18px; position: relative; }
        .m-nick { font-weight: bold; color: #ff3333; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .m-time { font-size: 10px; color: #666; font-weight: normal; }
        .del-msg { color: #444; cursor: pointer; font-size: 12px; margin-left: 8px; }
        .del-msg:hover { color: red; }

        .input-zone { background: black; padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--dark-red); }
        .input-zone input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--blood-red); background: #080000; color: white; outline: none; }
        .send-btn { background: var(--dark-red); border: none; width: 45px; height: 45px; border-radius: 50%; color: cyan; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }

        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; border-right: 3px solid var(--dark-red); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3500; }
        .overlay.active { display: block; }
        .sidebar-header { padding: 25px 15px; text-align: center; border-bottom: 2px solid var(--dark-red); }
        .sidebar-header img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--dark-red); object-fit: cover; cursor: pointer; }
        
        .rooms-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .room-item { padding: 12px 20px; cursor: pointer; color: #999; border-bottom: 1px solid #150000; font-size: 14px; }
        .room-item.active { background: var(--dark-red); color: white; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
        .modal-content { background: #080000; border: 2px solid var(--dark-red); padding: 25px; border-radius: 25px; width: 320px; text-align: center; }
        .modal-btn { display: block; width: 100%; padding: 12px; margin: 7px 0; border: 1px solid var(--blood-red); background: #110000; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <input type="file" id="avatar-input" style="display:none" onchange="uploadAvatar(this)">
        <img id="my-avatar-img" src="https://i.ibb.co/v3m6y6R/avatar.png" onclick="document.getElementById('avatar-input').click()">
        <div id="my-nick-label" style="font-weight:bold; color:var(--bright-red); margin-top:5px;">...</div>
        <div id="my-role-label" style="font-size: 11px; color: #888;">...</div>
        <div onclick="changeStatus()" style="font-size: 11px; color: #0c0; cursor:pointer; margin-top:8px; text-decoration: underline;">💬 სტატუსის შეცვლა</div>
    </div>
    <div class="rooms-list">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('💎 ვიპ საუბრები', this)">💎 ვიპ საუბრები</div>
        <div class="room-item" onclick="changeRoom('🕴 მაფიის ღამე', this)">🕴 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🕵️ გამოძიება', this)">🕵️ გამოძიება</div>
        <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('❓ ვიქტორინა', this)">❓ ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('😵 ჩამოხრჩობანა', this)">😵 ჩამოხრჩობანა</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('🎲 ნარდი', this)">🎲 ნარდი</div>
        <div class="room-item" onclick="changeRoom('🎵 მუსიკა', this)">🎵 მუსიკა</div>
        <div class="room-item" onclick="changeRoom('😂 იუმორი', this)">😂 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🏛️ ფორუმი', this)">🏛️ ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('🆘 დახმარება', this)">🆘 დახმარება</div>
        <div class="room-item" onclick="window.location.href='all_users.html'">🗂️ ყველა წევრი</div>
    </div>
    <div style="padding:15px; text-align:center; color:var(--bright-red); cursor:pointer; font-weight:bold; border-top:1px solid #111;" onclick="logout()">🚪 გასვლა</div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="targetAvatar" src="" style="width:85px; height:85px; border-radius:50%; border:2px solid var(--dark-red); object-fit: cover;">
        <h3 id="targetName" style="color:var(--bright-red); margin: 10px 0;">ნიკი</h3>
        <p id="targetRoleLabel" style="font-size:12px; color:#aaa; margin-top:-5px;"></p>
        <div id="targetStatusDisplay" style="font-size:13px; color:#0c0; font-style:italic; margin: 15px 0; min-height: 20px;"></div>
        <button id="send-pm-btn" class="modal-btn" style="background: #004444; color: cyan;">✉️ მიწერა</button>
        <div id="adminOptions" style="display:none; border-top: 1px solid var(--dark-red); margin-top: 10px; padding-top: 10px;">
            <button class="modal-btn" onclick="setRole('Admin')">🛡️ ადმინისტრატორი</button>
            <button class="modal-btn" onclick="setRole('Owner')">👑 დამფუძნებელი</button>
            <button class="modal-btn" style="background: #200;" onclick="setRole('Member')">✨ როლის ჩახსნა</button>
            <button class="modal-btn" style="background: #400;" onclick="setRole('Banned')">🚫 დაბლოკვა</button>
        </div>
        <button class="modal-btn" style="background:#111; margin-top:10px;" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname');
    let myRole = "Member";
    let currentRoom = "☕ კაფე-ბარი";

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function closeModal() { document.getElementById('userModal').style.display = "none"; }
    function translateRole(r) { const roles = {'Owner': '👑 დამფუძნებელი', 'Admin': '🛡️ ადმინისტრატორი', 'Banned': '🚫 დაბლოკილი', 'Member': '👤 მომხმარებელი'}; return roles[r] || '👤 მომხმარებელი'; }

    async function init() {
        if (!myNick) { location.href = 'index.html'; return; }
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = p.role || "Member";
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-role-label').innerText = translateRole(myRole);
            document.getElementById('my-avatar-img').src = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
        }
        loadMessages();
        _s.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
    }

    async function deleteMsg(id) {
        if (confirm("წავშალოთ მესიჯი?")) await _s.from('messages').delete().eq('id', id);
    }

    async function setRole(r) {
        const t = document.getElementById('targetName').innerText;
        if (confirm(`შეუცვალოთ ${t}-ს როლი: ${r}?`)) {
            await _s.from('profiles').update({ role: r }).eq('username', t);
            alert("განახლდა!"); closeModal(); location.reload();
        }
    }

    async function openProfile(n) {
        const { data: p } = await _s.from('profiles').select('*').eq('username', n).maybeSingle();
        if (p) {
            document.getElementById('targetName').innerText = p.username;
            document.getElementById('targetAvatar').src = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
            document.getElementById('targetRoleLabel').innerText = translateRole(p.role);
            document.getElementById('targetStatusDisplay').innerText = p.status_text ? "💬 " + p.status_text : "სტატუსი ცარიელია";
            
            document.getElementById('send-pm-btn').style.display = (n === myNick) ? "none" : "block";
            document.getElementById('send-pm-btn').onclick = () => { localStorage.setItem('chatWith', n); location.href = 'inbox.html'; };

            const adm = document.getElementById('adminOptions');
            if (myRole === "Owner" || (myRole === "Admin" && p.role !== "Owner")) adm.style.display = "block";
            else adm.style.display = "none";

            document.getElementById('userModal').style.display = "flex";
        }
    }

    async function loadMessages() {
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const { data: profs } = await _s.from('profiles').select('*');
        const box = document.getElementById("chat"); box.innerHTML = "";
        msgs?.forEach(m => {
            const p = profs?.find(u => u.username === m.user_name);
            const time = new Date(m.created_at).toLocaleTimeString('ka-GE', { hour: '2-digit', minute: '2-digit', hour12: false });
            const delBtn = (myRole === "Owner" || myRole === "Admin") ? `<span class="del-msg" onclick="deleteMsg(${m.id})">🗑️</span>` : "";
            
            box.innerHTML += `<div class="msg-container">
                <img src="${p?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar" onclick="openProfile('${m.user_name}')">
                <div class="bubble">
                    <span class="m-nick" onclick="openProfile('${m.user_name}')">${m.user_name} <span class="m-time">${time}</span> ${delBtn}</span>
                    <div style="color:#ddd; margin-top:3px;">${m.text}</div>
                </div>
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        if (myRole === "Banned") return alert("დაბლოკილი ხართ!");
        const i = document.getElementById("msg-input"); if (!i.value.trim()) return;
        await _s.from('messages').insert([{ user_name: myNick, text: i.value, room_name: currentRoom }]);
        i.value = "";
    }

    function changeRoom(n, el) { 
        currentRoom = n; document.getElementById('room-name').innerText = n; 
        document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active'); toggleMenu(); loadMessages(); 
    }

    async function changeStatus() {
        const s = prompt("შეიყვანე ახალი სტატუსი:");
        if (s !== null) { await _s.from('profiles').update({ status_text: s }).eq('username', myNick); location.reload(); }
    }

    async function uploadAvatar(el) {
        const file = el.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            await _s.from('profiles').update({ avatar_url: e.target.result }).eq('username', myNick);
            location.reload();
        };
        reader.readAsDataURL(file);
    }

    function logout() { localStorage.removeItem('nickname'); location.reload(); }
    window.onload = init;
  function logout() { localStorage.removeItem('nickname'); location.reload(); }
    window.onload = init;
</script> 

<script src="online.js"></script>

</body>
</html>
