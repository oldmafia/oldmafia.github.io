<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ჩატი</title>
</head>
<body>
    <h1>ჩატი</h1>
    <div id="status"></div>
    
    <script type="module">
        import { supabase } from './supabase-config.js';
        
        document.getElementById('status').innerHTML = 'Supabase დაკავშირებულია ✅';
        
        // შევამოწმოთ მონაცემები
        async function test() {
            const { data, error } = await supabase.from('users').select('*');
            console.log('მომხმარებლები:', data);
            document.getElementById('status').innerHTML += `<br>მომხმარებლები: ${data?.length || 0}`;
        }
        test();
    </script>
</body>
</html>
