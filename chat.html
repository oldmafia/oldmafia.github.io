<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat App - 12 ოთახი | მცურავი გულები | როლები</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body.day-mode {
            --bg: #FFF8F0;
            --surface: #FFF0E0;
            --text: #3E1F1F;
            --border: #A53F3F;
            --accent: #8B2C2C;
            --shadow: rgba(139, 44, 44, 0.2);
            --bubble-left: #FFFFFF;
            --bubble-right: #FFE0E0;
            --online: #2E8B57;
            --heart-color: rgba(139, 44, 44, 0.4);
        }

        body.night-mode {
            --bg: #1A1111;
            --surface: #2D1A1A;
            --text: #F5E6E6;
            --border: #7A2E2E;
            --accent: #B23C3C;
            --shadow: rgba(200, 50, 50, 0.3);
            --bubble-left: #2E1A1A;
            --bubble-right: #4A2525;
            --online: #00C49A;
            --heart-color: rgba(178, 60, 60, 0.6);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            color: var(--accent);
            font-size: 30px;
            opacity: 0.6;
            animation: floatHeart 14s linear infinite;
            user-select: none;
        }

        @keyframes floatHeart {
            0% { transform: translateY(100vh) scale(0.4); opacity: 0.7; }
            100% { transform: translateY(-20vh) scale(1.3); opacity: 0; }
        }

        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 2;
        }

        .sidebar {
            width: 280px;
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 4px 0 12px var(--shadow);
        }

        .room-list {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .room-item {
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 20px;
            cursor: pointer;
            background: var(--bg);
            font-weight: bold;
            text-align: center;
        }

        .room-item.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 8px var(--accent);
        }

        .online-groups {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }

        .group-title {
            font-size: 14px;
            font-weight: bold;
            margin: 12px 0 6px;
            border-left: 3px solid var(--accent);
            padding-left: 8px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px;
            cursor: pointer;
            border-radius: 12px;
        }

        .user-item:hover {
            background: var(--shadow);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            background-size: cover;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: gray;
            display: inline-block;
            margin-left: 6px;
        }

        .online-dot.online {
            background: var(--online);
            box-shadow: 0 0 4px var(--online);
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
        }

        .message-left {
            background: var(--bubble-left);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-right {
            background: var(--bubble-right);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
        }

        .delete-msg {
            font-size: 10px;
            color: red;
            cursor: pointer;
            margin-left: 8px;
        }

        .input-area {
            padding: 12px;
            background: var(--surface);
            display: flex;
            gap: 8px;
            border-top: 1px solid var(--border);
        }

        #messageInput {
            flex: 1;
            padding: 10px;
            border-radius: 24px;
            border: none;
            background: var(--bg);
            color: var(--text);
        }

        button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 24px;
            cursor: pointer;
        }

        .menu-bar {
            background: var(--surface);
            padding: 8px 16px;
            display: flex;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .menu-item {
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            background: var(--bg);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--surface);
            padding: 20px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .hidden {
            display: none;
        }

        input, textarea, select {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 16px;
            width: 100%;
            margin: 6px 0;
        }
    </style>
</head>
<body class="day-mode">
<div class="heart-bg" id="heartBg"></div>

<div class="app-container">
    <div class="sidebar">
        <div class="room-list" id="roomList"></div>
        <div class="online-groups" id="onlineGroups"></div>
    </div>

    <div class="chat-main">
        <div class="menu-bar">
            <div class="menu-item" id="menuRooms">🏠 ოთახები</div>
            <div class="menu-item" id="menuMessenger">💬 მესინჯერი</div>
            <div class="menu-item" id="menuProfile">👤 პროფილი</div>
            <div class="menu-item" id="menuFriends">👥 მეგობრები</div>
            <div class="menu-item" id="menuUsers">📋 მომხმარებლები</div>
            <div class="menu-item" id="themeToggle">🌙 ღამის რეჟიმი</div>
        </div>

        <div class="chat-header">
            <span id="currentRoomName">ჩატვირთვა...</span>
            <span id="clock">--:--:--</span>
        </div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="input-area">
            <button id="smileyPanelBtn" class="smiley-btn">😊</button>
            <input type="text" id="messageInput" placeholder="დაწერე მესიჯი...">
            <button id="sendBtn">გაგზავნა</button>
        </div>
    </div>
</div>

<div id="modal" class="modal hidden">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
    const supabaseUrl = 'https://ftfciebnywbondaiarnc.supabase.co';
    const supabaseKey = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let currentUser = null;
    let currentRoom = { id: 1, name: 'ოთახი 1', room_number: 1 };
    let allRooms = [];
    let allUsers = [];
    let onlineUsers = new Set();
    let customEmojis = [];

    // ---------- ავტორიზაცია (ავიღოთ მომხმარებელი რეგისტრაციიდან) ----------
    async function getCurrentUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            let { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            if (!profile) {
                // თუ პროფილი არ აქვს, შევქმნათ
                const username = user.email.split('@')[0];
                const { data: newProfile } = await supabase.from('profiles').insert([{
                    id: user.id,
                    username: username,
                    avatar_url: null,
                    status: 'გამარჯობა! ❤️',
                    emotion: '😊',
                    role: 'member'
                }]).select().single();
                return newProfile;
            }
            return profile;
        }
        // თუ არ არის ავტორიზებული, გადავამისამართოთ რეგისტრაციაზე
        window.location.href = 'index.html';
        return null;
    }

    // ---------- საათი ----------
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('ka-GE');
    }
    setInterval(updateClock, 1000);

    // ---------- მცურავი გულები ----------
    function createFloatingHearts() {
        const container = document.getElementById('heartBg');
        setInterval(() => {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = 8 + Math.random() * 10 + 's';
            heart.style.fontSize = 20 + Math.random() * 30 + 'px';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 14000);
        }, 800);
    }

    // ---------- ოთახების ჩატვირთვა ----------
    async function loadRooms() {
        let { data } = await supabase.from('rooms').select('*').order('room_number');
        if (!data || data.length === 0) {
            // თუ rooms ცხრილი ცარიელია, შევქმნათ 12 ოთახი
            const roomsToInsert = [];
            for (let i = 1; i <= 12; i++) {
                roomsToInsert.push({ name: `ოთახი ${i}`, room_number: i });
            }
            const { data: inserted } = await supabase.from('rooms').insert(roomsToInsert).select();
            allRooms = inserted;
        } else {
            allRooms = data;
        }
        renderRoomList();
        if (allRooms.length) setCurrentRoom(allRooms[0]);
    }

    function renderRoomList() {
        const container = document.getElementById('roomList');
        container.innerHTML = '';
        allRooms.forEach(room => {
            const div = document.createElement('div');
            div.className = 'room-item' + (currentRoom?.id === room.id ? ' active' : '');
            div.innerText = room.name;
            div.onclick = () => setCurrentRoom(room);
            container.appendChild(div);
        });
    }

    async function setCurrentRoom(room) {
        currentRoom = room;
        renderRoomList();
        document.getElementById('currentRoomName').innerText = room.name;
        await loadMessages();
    }

    // ---------- მესიჯების ჩატვირთვა ----------
    async function loadMessages() {
        const { data } = await supabase
            .from('messages')
            .select('*, profiles(username, avatar_url, role)')
            .eq('room_id', currentRoom.id)
            .order('created_at', { ascending: true });
        renderMessages(data || []);
    }

    function renderMessages(messages) {
        const container = document.getElementById('messagesArea');
        container.innerHTML = '';
        messages.forEach(msg => {
            const isMine = msg.user_id === currentUser?.id;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMine ? 'message-right' : 'message-left'}`;
            msgDiv.innerHTML = `
                <strong>${msg.profiles?.username || 'უცნობი'}</strong><br>
                ${msg.text}<br>
                <div class="message-time">${new Date(msg.created_at).toLocaleTimeString('ka-GE')}</div>
                ${(currentUser?.role === 'admin' || currentUser?.role === 'founder') ? `<span class="delete-msg" data-id="${msg.id}">🗑️ წაშლა</span>` : ''}
            `;
            container.appendChild(msgDiv);
        });
        // წაშლის ღილაკების მოვლენები
        document.querySelectorAll('.delete-msg').forEach(el => {
            el.addEventListener('click', async (e) => {
                e.stopPropagation();
                const msgId = el.dataset.id;
                await supabase.from('messages').delete().eq('id', msgId);
                loadMessages();
            });
        });
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        await supabase.from('messages').insert([{
            room_id: currentRoom.id,
            user_id: currentUser.id,
            text: text
        }]);
        input.value = '';
        loadMessages();
    }

    // ---------- ონლაინ სტატუსი (simulated - realtime ონლაინი) ----------
    async function loadUsers() {
        const { data } = await supabase.from('profiles').select('*');
        allUsers = data || [];
        renderOnlineGroups();
    }

    function renderOnlineGroups() {
        const container = document.getElementById('onlineGroups');
        if (!container) return;
        const founders = allUsers.filter(u => u.role === 'founder');
        const admins = allUsers.filter(u => u.role === 'admin');
        const members = allUsers.filter(u => u.role === 'member');
        container.innerHTML = `
            <div class="group-title">👑 დამფუძნებლები</div>
            ${renderUserList(founders)}
            <div class="group-title">🛡️ ადმინები</div>
            ${renderUserList(admins)}
            <div class="group-title">👥 წევრები</div>
            ${renderUserList(members)}
        `;
    }

    function renderUserList(users) {
        return users.map(u => `
            <div class="user-item" data-userid="${u.id}">
                <div class="avatar" style="background-image: url('${u.avatar_url || ''}'); background-size: cover;">${u.avatar_url ? '' : u.username[0]}</div>
                <span>${u.username} ${u.emotion || ''}</span>
                <span class="online-dot ${onlineUsers.has(u.id) ? 'online' : ''}"></span>
            </div>
        `).join('');
    }

    // ---------- პროფილის მოდალი (ფოტო, სტატუსი, ემოცია, კომენტარი) ----------
    function showProfileModal() {
        document.getElementById('modalContent').innerHTML = `
            <h3>👤 ჩემი პროფილი</h3>
            <label>ავატარის URL:</label>
            <input type="text" id="avatarUrl" value="${currentUser.avatar_url || ''}" placeholder="https://...">
            <label>სტატუსი:</label>
            <input type="text" id="status" value="${currentUser.status || ''}">
            <label>ემოცია:</label>
            <input type="text" id="emotion" value="${currentUser.emotion || '😊'}">
            <label>კომენტარი (პროფილზე):</label>
            <textarea id="comment" placeholder="დაწერე კომენტარი..."></textarea>
            <button id="saveProfile">💾 შენახვა</button>
            <button id="closeModal">❌ დახურვა</button>
        `;
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('saveProfile').onclick = async () => {
            const avatar = document.getElementById('avatarUrl').value;
            const status = document.getElementById('status').value;
            const emotion = document.getElementById('emotion').value;
            await supabase.from('profiles').update({ avatar_url: avatar, status, emotion }).eq('id', currentUser.id);
            currentUser.avatar_url = avatar;
            currentUser.status = status;
            currentUser.emotion = emotion;
            alert('პროფილი განახლდა!');
            document.getElementById('modal').classList.add('hidden');
            loadUsers();
        };
        document.getElementById('closeModal').onclick = () => document.getElementById('modal').classList.add('hidden');
    }

    // ---------- მეგობრები ----------
    async function showFriendsModal() {
        const { data: friendsList } = await supabase.from('friends').select('friend_id').eq('user_id', currentUser.id);
        const friendIds = friendsList.map(f => f.friend_id);
        const { data: friendProfiles } = await supabase.from('profiles').select('*').in('id', friendIds);
        document.getElementById('modalContent').innerHTML = `
            <h3>👥 მეგობრები</h3>
            ${friendProfiles.map(f => `<div>${f.username} ${f.emotion || ''}</div>`).join('')}
            <button id="closeModal">დახურვა</button>
        `;
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('closeModal').onclick = () => document.getElementById('modal').classList.add('hidden');
    }

    // ---------- მომხმარებლები + როლების მინიჭება/ბლოკი (ადმინისთვის) ----------
    async function showUsersModal() {
        let html = `<h3>📋 მომხმარებლები</h3>`;
        for (let u of allUsers) {
            if (u.id === currentUser.id) continue;
            html += `<div><strong>${u.username}</strong> (${u.role}) 
            ${currentUser.role === 'founder' ? `<button class="set-admin" data-id="${u.id}">👑 ადმინად დანიშვნა</button>
            <button class="remove-role" data-id="${u.id}">🔻 როლის მოხსნა</button>` : ''}
            ${currentUser.role === 'founder' || currentUser.role === 'admin' ? `<button class="ban-user" data-id="${u.id}">⛔ დაბლოკვა</button>` : ''}
            </div><hr>`;
        }
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
        // admin/founder actions
        document.querySelectorAll('.set-admin').forEach(btn => {
            btn.onclick = async () => {
                await supabase.from('profiles').update({ role: 'admin' }).eq('id', btn.dataset.id);
                alert('ადმინად დანიშნული!');
                location.reload();
            };
        });
        document.querySelectorAll('.remove-role').forEach(btn => {
            btn.onclick = async () => {
                await supabase.from('profiles').update({ role: 'member' }).eq('id', btn.dataset.id);
                alert('როლი მოხსნილი!');
                location.reload();
            };
        });
        document.querySelectorAll('.ban-user').forEach(btn => {
            btn.onclick = async () => {
                let reason = prompt('დაბლოკვის მიზეზი:');
                if (reason) {
                    await supabase.from('banned_users').insert([{ admin_id: currentUser.id, user_id: btn.dataset.id, reason }]);
                    alert('მომხმარებელი დაბლოკილია!');
                }
            };
        });
    }

    // ---------- სმაილები (ადმინებს შეუძლიათ დამატება/წაშლა) ----------
    async function showSmileyManager() {
        let { data: emojis } = await supabase.from('custom_emojis').select('*');
        let html = `<h3>😊 სმაილები</h3><div id="emojiList">`;
        (emojis || []).forEach(e => {
            html += `<span style="font-size:30px;margin:5px;display:inline-block;">${e.emoji_code} 
            ${(currentUser.role === 'admin' || currentUser.role === 'founder') ? `<button class="del-emoji" data-id="${e.id}">❌</button>` : ''}</span>`;
        });
        html += `</div>`;
        if (currentUser.role === 'admin' || currentUser.role === 'founder') {
            html += `<input type="text" id="newEmoji" placeholder="ახალი სმაილი (😍🔥...)"><button id="addEmojiBtn">➕ დამატება</button>`;
        }
        html += `<button id="closeModal">დახურვა</button>`;
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
        if (currentUser.role === 'admin' || currentUser.role === 'founder') {
            document.getElementById('addEmojiBtn').onclick = async () => {
                const newEmoji = document.getElementById('newEmoji').value;
                if (newEmoji) {
                    await supabase.from('custom_emojis').insert([{ added_by: currentUser.id, emoji_code: newEmoji }]);
                    showSmileyManager();
                }
            };
            document.querySelectorAll('.del-emoji').forEach(btn => {
                btn.onclick = async () => {
                    await supabase.from('custom_emojis').delete().eq('id', btn.dataset.id);
                    showSmileyManager();
                };
            });
        }
    }

    // ---------- თემა ----------
    function initTheme() {
        const isNight = localStorage.getItem('theme') === 'night';
        if (isNight) document.body.classList.add('night-mode');
        document.getElementById('themeToggle').onclick = () => {
            document.body.classList.toggle('night-mode');
            localStorage.setItem('theme', document.body.classList.contains('night-mode') ? 'night' : 'day');
        };
    }

    // ---------- ინიციალიზაცია ----------
    async function init() {
        currentUser = await getCurrentUser();
        if (!currentUser) return;
        await loadRooms();
        await loadUsers();
        createFloatingHearts();
        initTheme();
        setInterval(() => {
            onlineUsers.add(currentUser.id);
            renderOnlineGroups();
        }, 5000);
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('menuProfile').onclick = showProfileModal;
        document.getElementById('menuFriends').onclick = showFriendsModal;
        document.getElementById('menuUsers').onclick = showUsersModal;
        document.getElementById('menuMessenger').onclick = () => alert('პირადი მესინჯერი - ნიკზე დაჭერით იხსნება!');
        document.getElementById('smileyPanelBtn').onclick = showSmileyManager;
        // Realtime მესიჯებისთვის
        supabase.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMessages()).subscribe();
    }

    init();
</script>
</body>
