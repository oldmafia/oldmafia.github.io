<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --dark-red: #4a0000; --deep-red: #800000; --bright-red: #ff0000;
            --blood-red: #660000; --bg-black: #030000;
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--dark-red); height: 60px; flex-shrink: 0; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 25px; color: var(--bright-red); }
        #room-name { font-weight: bold; color: var(--bright-red); flex: 1; text-align: center; font-size: 16px; }
        
        #pm-btn { position: relative; cursor: pointer; font-size: 22px; margin-right: 15px; color: cyan; display: flex; align-items: center; }
        #pm-count { 
            position: absolute; top: -5px; right: -8px; 
            background: #ff0000; color: white; border-radius: 50%; 
            font-size: 11px; min-width: 18px; height: 18px; 
            display: none; align-items: center; justify-content: center; 
            font-weight: bold; border: 1px solid white; 
            box-shadow: 0 0 10px #ff0000;
            animation: blinker 1.5s linear infinite;
        }
        @keyframes blinker { 50% { opacity: 0.5; } }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #1a0000 0%, #030000 100%); }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; max-width: 95%; }
        .avatar-wrapper { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--dark-red); object-fit: cover; cursor: pointer; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #0f0; border: 2px solid black; border-radius: 50%; display: none; }
        .online-dot.active { display: block; box-shadow: 0 0 8px #0f0; }
        
        .bubble { background: rgba(25, 0, 0, 0.9); border: 1px solid var(--blood-red); padding: 8px 12px; border-radius: 4px 18px 18px 18px; position: relative; min-width: 80px; }
        .m-nick { font-weight: bold; color: #ff3333; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
        .m-text { color: #ddd; font-size: 14px; word-wrap: break-word; line-height: 1.4; }
        .m-footer { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 4px; }
        .m-time { font-size: 10px; color: #666; font-family: monospace; }

        .input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: black; padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--dark-red); z-index: 2000; }
        .input-zone input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--blood-red); background: #080000; color: white; outline: none; }
        .send-btn { background: var(--dark-red); border: none; width: 45px; height: 45px; border-radius: 50%; color: cyan; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }

        .sidebar, .online-sidebar { position: fixed; top: 0; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; display: flex; flex-direction: column; }
        .sidebar { left: -280px; border-right: 3px solid var(--dark-red); }
        .sidebar.active { left: 0; }
        .online-sidebar { right: -280px; border-left: 3px solid var(--dark-red); }
        .online-sidebar.active { right: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3500; }
        .overlay.active { display: block; }
        
        /* სმაილების ფანჯრის სტილი */
        #emoji-picker { 
            display: none; position: fixed; bottom: 80px; left: 10px; 
            background: rgba(0,0,0,0.95); border: 2px solid var(--dark-red); 
            padding: 10px; border-radius: 15px; grid-template-columns: repeat(4, 1fr); 
            gap: 10px; z-index: 9999; max-height: 250px; overflow-y: auto;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }
        .emoji-item { width: 45px; height: 45px; cursor: pointer; transition: 0.2s; border-radius: 5px; }
        .emoji-item:hover { transform: scale(1.1); background: rgba(255,255,255,0.1); }

        .room-item { padding: 14px 20px; cursor: pointer; color: #bbb; border-bottom: 1px solid #150000; font-size: 14px; }
        .room-item.active { background: var(--dark-red); color: white; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
        .modal-content { background: #080000; border: 2px solid var(--dark-red); padding: 25px; border-radius: 25px; width: 320px; text-align: center; }
        .modal-btn { display: block; width: 100%; padding: 12px; margin: 7px 0; border: 1px solid var(--blood-red); background: #110000; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div id="emoji-picker"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 20px 15px; text-align: center;">
        <input type="file" id="avatar-input" style="display:none" onchange="uploadAvatar(this)">
        <img id="my-avatar-img" src="https://i.ibb.co/v3m6y6R/avatar.png" style="width:65px; height:65px; border-radius:50%; border:2px solid var(--dark-red); object-fit: cover; cursor:pointer;" onclick="document.getElementById('avatar-input').click()">
        <div id="my-nick-label" style="font-weight:bold; color:var(--bright-red); margin-top:5px;">...</div>
        <div id="my-role-label" style="font-size: 11px; color: #888;">...</div>
        <div onclick="changeStatus()" style="font-size: 11px; color: #0c0; cursor:pointer; margin-top:5px; text-decoration: underline;">💬 სტატუსის შეცვლა</div>
    </div>
    <div class="rooms-list" style="flex:1; overflow-y:auto;">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('💎 ვიპ საუბრები', this)">💎 ვიპ საუბრები</div>
        <div class="room-item" onclick="changeRoom('🕴 მაფიის ღამე', this)">🕴 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🕵️ გამოძიება', this)">🕵️ გამოძიება</div>
        <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('❓ ვიქტორინა', this)">❓ ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('😵 ჩამოხრჩობანა', this)">😵 ჩამოხრჩობანა</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('🎲 ნარდი', this)">🎲 ნარდი</div>
        <div class="room-item" onclick="changeRoom('🎵 მუსიკა', this)">🎵 მუსიკა</div>
        <div class="room-item" onclick="changeRoom('😂 იუმორი', this)">😂 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🏛️ ფორუმი', this)">🏛️ ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('🆘 დახმარება', this)">🆘 დახმარება</div>
    </div>
    <div style="padding:15px; text-align:center; color:red; cursor:pointer; border-top:1px solid #222;" onclick="logout()">🚪 გასვლა</div>
</div>

<div class="online-sidebar" id="online-sidebar">
    <div style="padding:20px; color:#0f0; font-weight:bold; text-align:center; border-bottom:2px solid var(--dark-red);">🟢 ონლაინში</div>
    <div id="online-list-content"></div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
    <div id="pm-btn" onclick="location.href='pm.html'">✉️ <span id="pm-count">0</span></div>
    <div class="menu-btn" onclick="toggleOnline()">👥</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <button onclick="toggleEmojiPicker()" style="background:none; border:none; font-size:22px; cursor:pointer;">🎬</button>
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="targetAvatar" src="" style="width:85px; height:85px; border-radius:50%; border:2px solid var(--dark-red); object-fit: cover;">
        <h3 id="targetName" style="color:var(--bright-red); margin:10px 0;">ნიკი</h3>
        <p id="targetRoleLabel" style="font-size:12px; color:#aaa;"></p>
        <div id="targetStatusDisplay" style="color:#0c0; font-size:13px; font-style:italic; margin:10px 0;"></div>
        <div id="adminOptions"></div>
        <button class="modal-btn" style="background:#111; margin-top:10px;" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), myRole = "Member", currentRoom = "☕ კაფე-ბარი";

    function translateRole(r) { 
        const roles = {'Owner': '👑 დამფუძნებელი', 'Admin': '🛡️ ადმინისტრატორი', 'Member': '👤 მომხმარებელი', 'Banned': '🚫 დაბლოკილი'}; 
        return roles[r] || '👤 მომხმარებელი'; 
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function toggleOnline() { document.getElementById('online-sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); if(document.getElementById('online-sidebar').classList.contains('active')) loadOnline(); }
    function closeAll() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('online-sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); document.getElementById('emoji-picker').style.display='none'; }
    function closeModal() { document.getElementById('userModal').style.display = "none"; }

    // სმაილების ფუნქცია
    async function toggleEmojiPicker() {
        const picker = document.getElementById('emoji-picker');
        if(picker.style.display === 'grid') {
            picker.style.display = 'none';
        } else {
            const { data: emojis } = await _s.from('emojis').select('*');
            if(emojis) {
                picker.innerHTML = emojis.map(e => `
                    <img src="${e.url || e.char}" class="emoji-item" onclick="insertEmoji('${e.url || e.char}')">
                `).join('');
                picker.style.display = 'grid';
            }
        }
    }

    function insertEmoji(url) {
        const input = document.getElementById('msg-input');
        input.value += url + " ";
        input.focus();
        document.getElementById('emoji-picker').style.display = 'none';
    }

    async function init() {
        if (!myNick) { location.href = 'index.html'; return; }
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = p.role || "Member";
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-role-label').innerText = translateRole(myRole);
            document.getElementById('my-avatar-img').src = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
            
            await _s.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick);
            setInterval(() => _s.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick), 30000);
            
            checkPMs(); setInterval(checkPMs, 10000);
        }
        loadMessages();
        _s.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
    }

    async function checkPMs() {
        const { count } = await _s.from('private_messages').select('*', { count: 'exact', head: true }).eq('receiver', myNick).eq('is_read', false);
        const badge = document.getElementById('pm-count');
        if (badge) {
            if (count > 0) { badge.innerText = count; badge.style.display = 'flex'; }
            else { badge.style.display = 'none'; }
        }
    }

    async function loadMessages() {
        const box = document.getElementById("chat"); if(!box) return;
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const { data: profs } = await _s.from('profiles').select('*');
        box.innerHTML = "";
        
        msgs?.forEach(m => {
            const p = profs?.find(u => u.username === m.user_name);
            const active = (p?.last_online && (new Date() - new Date(p.last_online) < 300000)) ? "active" : "";
            const time = m.created_at ? new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "00:00";
            
            // ლინკის სურათად გადაქცევის ლოგიკა
            let finalBody = m.text;
            if(m.text.includes('http')) {
                finalBody = `<img src="${m.text}" style="max-width:120px; max-height:120px; border-radius:10px; display:block; margin-top:5px;">`;
            }

            const isOwnerMsg = p?.role === "Owner";
            const canDelete = (myRole === "Owner") || (myRole === "Admin" && !isOwnerMsg);
            let delBtn = (canDelete) ? `<span style="cursor:pointer;margin-left:8px;opacity:0.5;" onclick="deleteMsg(${m.id})">🗑️</span>` : "";

            box.innerHTML += `
                <div class="msg-container">
                    <div class="avatar-wrapper" onclick="openProfile('${m.user_name}')">
                        <img src="${p?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar">
                        <div class="online-dot ${active}"></div>
                    </div>
                    <div class="bubble">
                        <div class="m-nick" onclick="openProfile('${m.user_name}')">${m.user_name} ${delBtn}</div>
                        <div class="m-text">${finalBody}</div>
                        <div class="m-footer"><span class="m-time">${time}</span></div>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function openProfile(name) {
        const { data: p } = await _s.from('profiles').select('*').eq('username', name).maybeSingle();
        if(!p) return;
        document.getElementById('targetAvatar').src = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
        document.getElementById('targetName').innerText = p.username;
        document.getElementById('targetRoleLabel').innerText = translateRole(p.role);
        document.getElementById('targetStatusDisplay').innerText = p.status || "";
        
        const adminZone = document.getElementById('adminOptions');
        adminZone.innerHTML = "";
        adminZone.style.display = "block";

        if (name !== myNick) {
            adminZone.innerHTML += `<button class="modal-btn" style="background:#004a4a; border-color:cyan;" onclick="location.href='pm.html?to=${name}'">✉️ პირადი მიწერა</button>`;
            
            if (myRole === "Owner") {
                adminZone.innerHTML += `
                    <button class="modal-btn" onclick="setRole('Admin')">🛡️ ადმინად დანიშვნა</button>
                    <button class="modal-btn" onclick="setRole('Owner')">👑 დამფუძნებლად დანიშვნა</button>
                    <button class="modal-btn" style="background:#220000;" onclick="setRole('Member')">✨ როლის ჩახსნა</button>
                    <button class="modal-btn" style="background:#440000; color:red;" onclick="setRole('Banned')">🚫 დაბლოკვა (BAN)</button>`;
            } else if (myRole === "Admin" && p.role !== "Owner") {
                adminZone.innerHTML += `<button class="modal-btn" style="background:#440000; color:red;" onclick="setRole('Banned')">🚫 მომხმარებლის დაბლოკვა</button>`;
            }
        } else { adminZone.style.display = "none"; }
        
        document.getElementById('userModal').style.display = "flex";
        window.selectedUser = name;
    }

    async function setRole(role) {
        if(confirm("ნამდვილად გსურთ მოქმედების შესრულება?")) {
            await _s.from('profiles').update({ role: role }).eq('username', window.selectedUser);
            alert("შესრულებულია!"); closeModal(); loadOnline(); loadMessages();
        }
    }

    async function loadOnline() {
        const { data: users } = await _s.from('profiles').select('*');
        const list = document.getElementById('online-list-content');
        if(!list || !users) return;
        list.innerHTML = "";
        const now = new Date();
        users.filter(u => u.last_online && (now - new Date(u.last_online) < 300000)).forEach(u => {
            let roleColor = u.role === 'Owner' ? "red" : (u.role === 'Admin' ? "cyan" : "#777");
            list.innerHTML += `<div style="padding:12px 15px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #111; cursor:pointer;" onclick="openProfile('${u.username}')">
                <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" style="width:35px; height:35px; border-radius:50%; border:1.5px solid ${roleColor}; object-fit: cover;">
                <div style="display:flex; flex-direction:column;">
                    <span style="font-size:14px; color:#eee;">${u.username}</span>
                    <span style="font-size:9px; color:${roleColor};">${translateRole(u.role)}</span>
                </div>
            </div>`;
        });
    }

    async function deleteMsg(id) { if(confirm("წავშალო?")) { await _s.from('messages').delete().eq('id', id); loadMessages(); } }
    async function sendMsg() {
        const i = document.getElementById("msg-input"); if(!i.value.trim() || myRole === "Banned") return;
        await _s.from('messages').insert([{ user_name: myNick, text: i.value, room_name: currentRoom }]);
        i.value = "";
    }
    async function uploadAvatar(el) {
        const file = el.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            await _s.from('profiles').update({ avatar_url: e.target.result }).eq('username', myNick);
            location.reload();
        };
        reader.readAsDataURL(file);
    }
    async function changeStatus() {
        const s = prompt("ახალი სტატუსი:");
        if(s !== null) { await _s.from('profiles').update({ status: s }).eq('username', myNick); location.reload(); }
    }
    function changeRoom(n, el) {
        currentRoom = n; document.getElementById('room-name').innerText = n;
        document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active'); closeAll(); loadMessages();
    }
    function logout() { localStorage.removeItem('nickname'); location.href='index.html'; }
    init();
</script>
</body>
</html>
