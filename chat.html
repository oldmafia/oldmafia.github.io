<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Abu007 System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body.night-mode { --bg: #000; --txt: #e0c8a8; --accent: #ff0000; --nav: #050505; --card: #0a0a0a; --border: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); height: 100vh; overflow: hidden; transition: 0.3s; }

        /* ❤️ მფრინავი გულები */
        .fire-heart { position: fixed; color: #ff0000; font-size: 40px; pointer-events: none; z-index: 2; animation: float 6s linear infinite; filter: drop-shadow(0 0 10px red); }
        @keyframes float { 0% { bottom: -50px; opacity: 0; } 15% { opacity: 0.8; } 100% { bottom: 105%; opacity: 0; } }

        /* 📱 Layout */
        .page { display: none; height: calc(100vh - 65px); overflow-y: auto; }
        .page.active { display: block; }

        /* 😊 Emoji & Chat Bar */
        .chat-controls { background: var(--nav); border-top: 1px solid var(--accent); padding: 10px; position: sticky; bottom: 0; }
        .emoji-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; height: 45px; }
        .emoji-img { width: 32px; height: 32px; cursor: pointer; object-fit: contain; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        .input-row input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid var(--accent); background: none; color: white; }

        /* 🛡️ Admin Add Emoji */
        .admin-box { display: none; padding: 10px; border: 1px dashed red; margin: 10px; border-radius: 8px; }

        /* 👤 Profile */
        .profile-header { height: 160px; background: linear-gradient(red, black); position: relative; text-align: center; }
        .avatar-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid white; margin-top: 80px; object-fit: cover; cursor: pointer; }

        /* 🧭 Navigation */
        .navigation { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--nav); border-top: 1px solid var(--accent); display: flex; justify-content: space-around; align-items: center; z-index: 5000; }
        .nav-item { position: relative; cursor: pointer; font-size: 26px; opacity: 0.5; color: var(--txt); }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .badge { position: absolute; top: -5px; right: -5px; width: 12px; height: 12px; background: red; border-radius: 50%; display: none; }
    </style>
</head>
<body class="night-mode">

    <div id="heartsContainer"></div>

    <div id="homePage" class="page active">
        <h2 style="padding:15px; color:var(--accent);">🏰 ოთახები</h2>
        
        <div id="adminPanel" class="admin-box">
            <small>ადმინ: სმაილის დამატება</small><br>
            <input type="file" id="emojiFile" onchange="uploadEmoji()">
        </div>

        <div style="padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div onclick="openRoom('კაფე-ბარი')" style="background:var(--card); padding:20px; border-radius:10px; border:1px solid var(--border); text-align:center;">☕ კაფე-ბარი</div>
            <div onclick="openRoom('ნარდი')" style="background:var(--card); padding:20px; border-radius:10px; border:1px solid var(--border); text-align:center;">🎲 ნარდი</div>
            </div>
    </div>

    <div id="roomChatPage" class="page" style="flex-direction: column; display: none;">
        <div style="padding:15px; border-bottom:1px solid red; display:flex; justify-content:space-between;">
            <b id="roomTitle">ოთახი</b>
            <button onclick="showPage('homePage')">✖</button>
        </div>
        <div id="roomMsgs" style="flex:1; overflow-y:auto; padding:15px;"></div>
        
        <div class="chat-controls">
            <div class="emoji-bar" id="roomEmojiBar"></div>
            <div class="input-row">
                <input type="text" id="roomInp" placeholder="მესიჯი...">
                <button onclick="sendRoomMsg()" style="background:red; color:white; border:none; border-radius:50%; width:40px; height:40px;">✈</button>
            </div>
        </div>
    </div>

    <div id="profilePage" class="page">
        <div class="profile-header">
            <img id="myAvatar" class="avatar-img" src="" onclick="document.getElementById('avatarFile').click()">
            <input type="file" id="avatarFile" hidden onchange="updateProfile('avatar')">
        </div>
        <div style="margin-top:50px; text-align:center; padding:20px;">
            <h2 id="dispNick">Abu007</h2>
            <input type="text" id="statusInp" placeholder="შეცვალე სტატუსი..." onchange="updateProfile('status')" style="width:80%; background:none; border:1px solid var(--accent); color:white; padding:8px; border-radius:15px; text-align:center; margin-top:10px;">
            
            <div style="margin-top:30px; text-align:left;">
                <h3>👥 მეგობრები</h3>
                <div id="friendsList">ჯერ მეგობრები არ გყავს</div>
            </div>
        </div>
    </div>

    <div class="navigation">
        <div class="nav-item active" onclick="showPage('homePage', this)">🏠</div>
        <div class="nav-item" onclick="showPage('messengerPage', this)">💬 <div id="msgInd" class="badge"></div></div>
        <div class="nav-item" onclick="showPage('profilePage', this)">👤</div>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        const myNick = localStorage.getItem('nickname') || "Abu007";
        const admins = ["Abu007", "Lukinio", "Deda"]; // ჩაწერე ყველა ადმინი/დამფუძნებელი

        let currentRoom = "";

        async function init() {
            if (admins.includes(myNick)) document.getElementById('adminPanel').style.display = 'block';
            
            // პროფილის ჩატვირთვა
            const { data: user } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
            if (user) {
                document.getElementById('myAvatar').src = user.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
                document.getElementById('statusInp').value = user.status || "";
                document.getElementById('dispNick').innerText = user.username;
            }
            
            loadEmojis();
            startHearts();
        }

        // 😊 სმაილების მართვა
        async function loadEmojis() {
            const { data: emojis } = await _s.from('custom_emojis').select('*');
            const bars = [document.getElementById('roomEmojiBar')]; // დაამატე PM-ის ბარიც აქ
            bars.forEach(bar => {
                if(bar) bar.innerHTML = emojis?.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('') || "";
            });
        }

        function addEmoji(url) { document.getElementById('roomInp').value += ` :img:${url}: `; }

        async function uploadEmoji() {
            const file = document.getElementById('emojiFile').files[0];
            const path = `emojis/${Date.now()}_${file.name}`;
            await _s.storage.from('avatars').upload(path, file);
            const { data } = _s.storage.from('avatars').getPublicUrl(path);
            await _s.from('custom_emojis').insert({ emoji_url: data.publicUrl });
            loadEmojis();
            alert("სმაილი დაემატა ყველასთვის!");
        }

        // 📸 ფოტოს და სტატუსის განახლება
        async function updateProfile(type) {
            if (type === 'avatar') {
                const file = document.getElementById('avatarFile').files[0];
                const path = `avatars/${myNick}_${Date.now()}`;
                const { data: upData } = await _s.storage.from('avatars').upload(path, file);
                if (upData) {
                    const { data: urlData } = _s.storage.from('avatars').getPublicUrl(path);
                    await _s.from('profiles').update({ avatar_url: urlData.publicUrl }).eq('username', myNick);
                    document.getElementById('myAvatar').src = urlData.publicUrl;
                }
            } else if (type === 'status') {
                const val = document.getElementById('statusInp').value;
                await _s.from('profiles').update({ status: val }).eq('username', myNick);
                alert("სტატუსი განახლდა!");
            }
        }

        // 🏰 ოთახის ჩატის ლოგიკა
        function openRoom(name) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = name;
            showPage('roomChatPage');
            loadRoomMsgs();
        }

        async function loadRoomMsgs() {
            const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: false }).limit(30);
            const box = document.getElementById('roomMsgs');
            box.innerHTML = msgs?.reverse().map(m => `
                <div style="margin-bottom:10px;">
                    <b style="color:red;">${m.username}:</b> 
                    ${m.text.replace(/:img:(.*?):/g, '<img src="$1" style="width:28px; vertical-align:middle;">')}
                </div>
            `).join('') || "";
            box.scrollTop = box.scrollHeight;
        }

        async function sendRoomMsg() {
            const txt = document.getElementById('roomInp').value;
            if(!txt) return;
            await _s.from('messages').insert({ username: myNick, text: txt, room_name: currentRoom });
            document.getElementById('roomInp').value = "";
            loadRoomMsgs();
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => { p.style.display = 'none'; p.classList.remove('active'); });
            document.getElementById(id).style.display = id === 'roomChatPage' ? 'flex' : 'block';
            document.getElementById(id).classList.add('active');
            if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
        }

        function startHearts() {
            setInterval(() => {
                const h = document.createElement('div'); h.className = 'fire-heart'; h.innerText = '❤️';
                h.style.left = Math.random() * 95 + '%';
                document.getElementById('heartsContainer').appendChild(h);
                setTimeout(() => h.remove(), 6000);
            }, 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
