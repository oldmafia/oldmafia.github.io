<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Final Edition</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        
        :root { 
            --accent: #ff3b3b; --bg: #0a0c10; --txt: #e6e9f0; --nav: #11151c; 
            --card: rgba(21, 30, 42, 0.7); --border: #2a3440; --in-bg: #0f141c;
            --glow: 0 0 10px rgba(255, 59, 59, 0.4);
        }

        body.day-mode { 
            --bg: #fef8ef; --txt: #2c2418; --nav: #fff5e6; 
            --card: rgba(255, 255, 255, 0.85); --border: #ffe0b5; --in-bg: #fffaf2;
            --glow: 0 0 10px rgba(255, 59, 59, 0.2);
        }

        body { background: var(--bg); color: var(--txt); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }

        /* ⬆️ NAVIGATION */
        .navigation { width: 100%; height: 65px; background: var(--nav); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-around; align-items: center; z-index: 1000; flex-shrink: 0; box-shadow: var(--glow); }
        .nav-item { cursor: pointer; font-size: 26px; opacity: 0.5; color: var(--txt); position: relative; transition: 0.2s; }
        .nav-item.active { opacity: 1; color: var(--accent); transform: scale(1.1); text-shadow: var(--glow); }
        .badge { position: absolute; top: -5px; right: -8px; background: red; color: white; font-size: 10px; min-width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 1.5px solid white; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .content-area { flex: 1; overflow-y: auto; position: relative; scroll-behavior: smooth; }
        .page { display: none; height: 100%; width: 100%; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 🏠 ROOMS LIST (Vertical Glassmorphism) */
        .rooms-list { display: flex; flex-direction: column; gap: 8px; padding: 15px; }
        .room-card { 
            background: var(--card); padding: 16px 20px; border-radius: 12px; 
            border: 1px solid var(--border); border-left: 4px solid var(--accent); 
            display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s;
            backdrop-filter: blur(5px);
        }
        .room-card:active { transform: translateX(5px); background: var(--accent); color: white; box-shadow: var(--glow); }
        .room-card b { font-size: 16px; flex: 1; font-weight: 600; }
        .room-card span { font-size: 22px; }

        /* 👥 LIST ROWS & ONLINE INDICATOR */
        .row { display: flex; align-items: center; padding: 12px 15px; background: var(--card); margin: 6px 12px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .row img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 12px; object-fit: cover; }
        .row-info b { display: flex; align-items: center; font-size: 15px; gap: 8px; }
        .online-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 8px #2ecc71; }

        /* 😊 EMOJI BOARD */
        .emoji-board { 
            position: absolute; bottom: 80px; left: 10px; right: 10px; 
            background: var(--nav); border: 2px solid var(--accent); 
            border-radius: 20px; display: none; padding: 12px; 
            grid-template-columns: repeat(5, 1fr); gap: 10px; 
            max-height: 250px; overflow-y: auto; z-index: 2000;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.6);
        }
        .emoji-board.active { display: grid; }
        .emoji-img { width: 100%; aspect-ratio: 1/1; cursor: pointer; object-fit: contain; background: var(--in-bg); border-radius: 8px; padding: 4px; }
        .admin-plus { border: 2px dashed var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--accent); cursor: pointer; height: 50px; }

        /* 💬 CHAT FOOTER */
        .chat-footer { background: var(--nav); padding: 10px 15px; border-top: 1px solid var(--border); position: relative; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .chat-in-box { display: flex; gap: 10px; align-items: center; }
        .chat-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid var(--accent); background: var(--in-bg); color: var(--txt); outline: none; font-size: 15px; }
        .send-btn { background: var(--accent); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; box-shadow: var(--glow); }

        /* ❤️ HEARTS */
        .heart { position: fixed; color: #ff3366; font-size: 25px; pointer-events: none; animation: float 4s linear forwards; z-index: 9999; text-shadow: 0 0 10px rgba(255, 51, 102, 0.8); }
        @keyframes float { 0% { bottom: -20px; opacity: 1; transform: translateX(0); } 100% { bottom: 100%; opacity: 0; transform: translateX(40px); } }

        /* PM MODAL */
        .pm-modal { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; }
    </style>
</head>
<body class="night-mode">

    <div class="navigation">
        <div class="nav-item active" onclick="showPage('homePage', this)">🏠</div>
        <div class="nav-item" onclick="showPage('messengerPage', this)">💬 <div id="pmBadge" class="badge">0</div></div>
        <div class="nav-item" onclick="showPage('onlinePage', this)">👥</div>
        <div class="nav-item" onclick="showPage('profilePage', this)">👤</div>

    </div>

            </div>
            <input type="file" id="avaInput" hidden onchange="uploadAvatar()">
        </div>

        <div id="roomChatPage" class="page" style="flex-direction: column;">

                <b id="roomTitle">ოთახი</b>

            <div id="roomMsgs" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px;"></div>

                <div class="chat-in-box">
                    <span onclick="toggleEmoji()" style="font-size:30px; cursor:pointer;">😊</span>
                    <input type="text" id="msgInput" class="chat-input" placeholder="დაწერე...">
                    <button class="send-btn" onclick="sendMessage()">✈</button>
                </div>
            </div>
            <input type="file" id="emojiUp" hidden onchange="uploadEmoji()">
        </div>
    </div>

    <div id="pmModal" class="pm-modal">
        <div style="padding:15px; background:var(--nav); border-bottom:2px solid var(--accent); display:flex; justify-content:space-between; align-items:center;">
            <b id="pmPartner">სახელი</b> 
            <span onclick="closePM()" style="color:var(--accent); cursor:pointer; font-size:24px;">✖</span>
        </div>
        <div id="pmMsgs" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px;"></div>
        <div class="chat-footer">

                <button class="send-btn" onclick="sendPM()">✈</button>
            </div>
        </div>
    </div>

    <script>

        async function init() {
            document.getElementById('profileNick').innerText = MY_NICK;
            renderRooms();
            loadProfile();
            loadEmojis();
            startHearts();
            setupPresence();
            
            _s.channel('chat').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, (p) => {
                if(p.new.room_name === currentRoom) loadRoomMsgs();
            }).subscribe();

            _s.channel('pms').on('postgres_changes', {event:'INSERT', schema:'public', table:'direct_messages'}, (p) => {

        // 🟢 PRESENCE (ნამდვილი ონლაინი)
        function setupPresence() {
            const channel = _s.channel('online_users', { config: { presence: { key: MY_NICK } } });
            channel.on('presence', { event: 'sync' }, () => {
                onlineUsers = channel.presenceState();
                updateOnlineUI();
            }).subscribe(async (status) => {
                if (status === 'SUBSCRIBED') await channel.track({ online_at: new Date().toISOString() });
            });
        }

        async function updateOnlineUI() {
            const list = document.getElementById('onlineList');
            const onlineKeys = Object.keys(onlineUsers);
            document.getElementById('onlineCount').innerText = onlineKeys.length;
            
            const { data: profiles } = await _s.from('profiles').select('*').in('username', onlineKeys);
            
            list.innerHTML = profiles?.map(u => `

                </div>
            `).join('');
        }

        async function loadProfile() {
            const {data} = await _s.from('profiles').select('*').eq('username', MY_NICK).maybeSingle();
            if(!data) {
                await _s.from('profiles').insert({username: MY_NICK, status: 'ახალი წევრი'});
            } else {
                if(data.avatar_url) document.getElementById('myAvatar').src = data.avatar_url;
                document.getElementById('statusInput').value = data.status || "";
            }
        }

        async function uploadAvatar() {
            const file = document.getElementById('avaInput').files[0];
            const path = `avatars/${MY_NICK}_${Date.now()}`;
            await _s.storage.from('avatars').upload(path, file);
            const {data} = _s.storage.from('avatars').getPublicUrl(path);
            await _s.from('profiles').update({avatar_url: data.publicUrl}).eq('username', MY_NICK);
            document.getElementById('myAvatar').src = data.publicUrl;
        }

        async function updateStatus() {
            const s = document.getElementById('statusInput').value;
            await _s.from('profiles').update({status: s}).eq('username', MY_NICK);
            alert("სტატუსი განახლდა! ✅");
        }

        async function loadPMList() {
            const {data} = await _s.from('direct_messages').select('*').or(`sender.eq.${MY_NICK},receiver.eq.${MY_NICK}`).order('created_at', {ascending:false});
            const partners = new Set();
            const container = document.getElementById('pmListContainer');
            container.innerHTML = "";
            data?.forEach(m => {
                const p = (m.sender === MY_NICK) ? m.receiver : m.sender;
                if(!partners.has(p)) {
                    partners.add(p);
                    container.innerHTML += `<div class="row" onclick="openPM('${p}')"><div class="row-info"><b>${p}</b><span>${m.text.substring(0,25)}...</span></div></div>`;
                }
            });
        }

        function openPM(p) {
            currentPM = p;
            document.getElementById('pmPartner').innerText = "💬 " + p;
            document.getElementById('pmModal').style.display = 'flex';
            document.getElementById('pmBadge').style.display = 'none';
            document.getElementById('pmBadge').innerText = "0";
            loadPMMsgs();
        }

        async function loadPMMsgs() {
            const {data} = await _s.from('direct_messages').select('*').or(`and(sender.eq.${MY_NICK},receiver.eq.${currentPM}),and(sender.eq.${currentPM},receiver.eq.${MY_NICK})`).order('created_at', {ascending:true});
            const box = document.getElementById('pmMsgs');
            box.innerHTML = data?.map(m => `
                <div style="align-self: ${m.sender === MY_NICK ? 'flex-end' : 'flex-start'}; background: ${m.sender === MY_NICK ? 'var(--accent)' : 'var(--card)'}; padding: 10px 15px; border-radius: 15px; max-width: 80%; color:white;">
                    ${m.text}
                </div>
            `).join('') || "";
            box.scrollTop = box.scrollHeight;
        }

        async function sendPM() {
            const val = document.getElementById('pmInput').value.trim();
            if(!val) return;
            await _s.from('direct_messages').insert({sender:MY_NICK, receiver:currentPM, text:val});
            document.getElementById('pmInput').value = "";
            loadPMMsgs();
        }

        function closePM() { document.getElementById('pmModal').style.display = 'none'; currentPM = ""; }

        function openRoom(n) {
            currentRoom = n;
            document.getElementById('roomTitle').innerText = "📡 " + n;
            showPage('roomChatPage');
            loadRoomMsgs();
        }

        async function loadRoomMsgs() {
            if(!currentRoom) return;
            const {data} = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', {ascending:false}).limit(50);
            const box = document.getElementById('roomMsgs');
            box.innerHTML = data?.reverse().map(m => `
                <div style="align-self: ${m.username === MY_NICK ? 'flex-end' : 'flex-start'}; background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid var(--border); max-width: 85%;">
                    <b style="color:var(--accent); font-size: 11px;">${m.username}</b><br>
                    <div style="font-size:15px;">${m.text.replace(/:img:(.*?):/g, '<img src="$1" style="width:50px; display:block; margin:5px 0; border-radius:5px;">')}</div>
                </div>
            `).join('') || "";
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            const val = document.getElementById('msgInput').value.trim();
            if(!val) return;
            await _s.from('messages').insert({username:MY_NICK, text:val, room_name:currentRoom});
            document.getElementById('msgInput').value = "";
        }

        function closeRoom() { currentRoom = ""; showPage('homePage', document.querySelector('.nav-item')); }

        async function loadEmojis() {
            const {data} = await _s.from('custom_emojis').select('*');
            const board = document.getElementById('emojiBoard');
            let html = ADMINS.includes(MY_NICK) ? `<div class="admin-plus" onclick="document.getElementById('emojiUp').click()">+</div>` : "";
            html += data?.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('') || "";
            board.innerHTML = html;
        }

            const input = document.getElementById('msgInput');
            input.value += ` :img:${url}: `; 
            toggleEmoji(); 
            input.focus();
        }
