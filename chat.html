<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Old Mafia - ჩატი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        body {
            --bg: #0a0508;
            --text: #f0e6e8;
            --card: #1a0f12;
            --border: #4a1a2a;
            --nav: #120a0c;
            --accent: #8b0000;
            --accent-light: #a52a2a;
            --accent-dark: #5a0000;
            --input: #1f1216;
            --shadow: 0 4px 15px rgba(139, 0, 0, 0.3);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        body.day-mode {
            --bg: #fff5f0;
            --text: #2c1a1a;
            --card: #ffffff;
            --border: #e6b8a2;
            --nav: #ffe8e0;
            --accent: #8b0000;
            --input: #fffaf5;
        }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: var(--nav);
            padding: 8px 0;
            border-bottom: 2px solid var(--accent);
            flex-shrink: 0;
        }

        .nav-btn {
            font-size: 22px;
            background: none;
            border: none;
            color: #aa8a8a;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
        }

        .nav-btn.active {
            color: var(--accent);
            background: rgba(139, 0, 0, 0.2);
        }

        .pages {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
            padding: 12px;
        }

        .page.active {
            display: block;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 12px;
            color: var(--accent);
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }

        .room-card {
            background: var(--card);
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .room-card:active { transform: scale(0.98); background: var(--accent-dark); }
        .room-icon { font-size: 28px; }
        .room-name { font-size: 16px; font-weight: 600; }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            background: var(--card);
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        .chat-room-name { font-size: 18px; font-weight: bold; color: var(--accent); }
        .close-btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            background: var(--card);
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            align-self: flex-start;
            border: 1px solid var(--border);
            position: relative;
        }

        .message.admin-message { border-left: 4px solid gold; }
        .message.owner-message { border-left: 4px solid #ff00ff; }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
        }

        .message-name { font-weight: bold; color: var(--accent); font-size: 13px; cursor: pointer; }
        .message-time { font-size: 10px; opacity: 0.5; }
        .message-text { font-size: 14px; word-break: break-word; }
        .message-text img { max-width: 200px; max-height: 150px; border-radius: 8px; margin-top: 5px; cursor: pointer; }

        .delete-msg {
            position: absolute;
            right: 8px;
            top: 8px;
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: 0.2s;
        }
        .message:hover .delete-msg { opacity: 1; }

        .chat-input-area {
            background: var(--card);
            padding: 10px;
            display: flex;
            gap: 8px;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid var(--border);
        }

        .icon-btn {
            background: var(--accent-dark);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        .chat-input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 25px;
            border: 1px solid var(--accent);
            background: var(--input);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--card);
            margin-bottom: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .user-name { font-weight: bold; font-size: 16px; }
        .user-status { font-size: 11px; opacity: 0.6; }

        .pm-chat-container {
            position: fixed;
            bottom: 0;
            right: 20px;
            width: 320px;
            height: 450px;
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: 16px 16px 0 0;
            display: flex;
            flex-direction: column;
            z-index: 2000;
            box-shadow: var(--shadow);
        }

        .pm-header {
            background: var(--accent);
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
        }

        .pm-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .pm-message {
            background: var(--input);
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 85%;
            align-self: flex-start;
        }

        .pm-message.own {
            align-self: flex-end;
            background: var(--accent);
        }

        .pm-input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
            border-top: 1px solid var(--border);
        }

        .pm-input {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            background: var(--input);
            color: var(--text);
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .album-photo {
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid var(--accent);
        }

        .upload-photo-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
            margin: 10px;
            cursor: pointer;
            width: calc(100% - 20px);
        }

        .profile-card {
            text-align: center;
            padding: 20px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto;
            cursor: pointer;
            object-fit: cover;
            background-size: cover;
        }

        .profile-status-input {
            width: 80%;
            margin-top: 15px;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid var(--accent);
            background: var(--input);
            color: var(--text);
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
        }

        .heart {
            position: fixed;
            bottom: 0;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 4s forwards;
            z-index: 9999;
        }

        @keyframes floatUp {
            0% { bottom: 0; opacity: 1; }
            100% { bottom: 100%; opacity: 0; transform: translateX(40px); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--border); }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="online">👥</button>
        <button class="nav-btn" data-page="album">🖼️</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeToggle">🌙</button>
    </div>

    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 12 სათამაშო ოთახი</div>
            <div id="roomsList"></div>
        </div>

        <div id="messagesPage" class="page">
            <div class="section-title">💬 პირადი მიმოწერა</div>
            <div id="pmList"></div>
        </div>

        <div id="onlinePage" class="page">
            <div class="section-title">👥 ონლაინ მომხმარებლები</div>
            <div id="onlineList"></div>
        </div>

        <div id="albumPage" class="page">
            <div class="section-title">🖼️ ჩემი ალბომი</div>
            <button class="upload-photo-btn" onclick="document.getElementById('albumPhotoInput').click()">➕ ფოტოს დამატება</button>
            <div id="albumGrid" class="album-grid"></div>
            <input type="file" id="albumPhotoInput" hidden accept="image/*" onchange="addToAlbum(this)">
        </div>

        <div id="profilePage" class="page">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()">
                    👤
                </div>
                <h2 id="profileName" style="margin-top: 15px;">Abu007</h2>
                <input type="text" id="profileStatus" class="profile-status-input" placeholder="შენი სტატუსი...">
                <div class="empty-state" style="margin-top: 20px;">ID: #<span id="userId">007</span></div>
                <input type="file" id="avatarInput" hidden accept="image/*" onchange="uploadAvatar(this)">
            </div>
        </div>

        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-header">
                    <span class="chat-room-name" id="chatRoomName">ოთახი</span>
                    <button class="close-btn" onclick="closeChat()">✕</button>
                </div>
                <div id="chatMessages" class="messages"></div>
                <div class="chat-input-area">
                    <button class="icon-btn" onclick="openEmojiPicker()">😊</button>
                    <button class="icon-btn" onclick="document.getElementById('chatPhotoInput').click()">📷</button>
                    <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე შეტყობინება..." onkeypress="handleEnter(event)">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
            <input type="file" id="chatPhotoInput" hidden accept="image/*" onchange="addPhotoToMessage(this)">
        </div>
    </div>

    <div id="hearts"></div>
    <div id="pmContainer"></div>

    <script>
        // ============ მონაცემები ============
        let currentUser = localStorage.getItem('mafia_user') || "Abu007";
        let currentRoom = null;
        let currentPMUser = null;
        
        const OWNER = "Abu007";
        const ADMINS = ["Abu007", "Lukinio", "AdminMafia"];
        
        // 12 ოთახი სრულად
        const ROOMS = [
            { icon: "☕", name: "კაფე-ბარი" },
            { icon: "🎲", name: "ნარდი" },
            { icon: "🃏", name: "ჯოკერი" },
            { icon: "💎", name: "VIP საუბრები" },
            { icon: "📝", name: "ფორუმი" },
            { icon: "🛠️", name: "ადმინისტრაცია" },
            { icon: "😂", name: "იუმორი" },
            { icon: "🏆", name: "შიფროგრამა" },
            { icon: "🎭", name: "გამოძიება" },
            { icon: "🎵", name: "მუსიკალური" },
            { icon: "⁉️", name: "ვიქტორინა" },
            { icon: "🆘", name: "დახმარება" }
        ];
        
        let users = [
            { username: "Abu007", status: "👑 დამფუძნებელი", avatar: "👑", online: true, avatarImg: null },
            { username: "Lukinio", status: "🔧 ადმინი", avatar: "🔧", online: true, avatarImg: null },
            { username: "AdminMafia", status: "⚙️ ადმინი", avatar: "⚙️", online: true, avatarImg: null },
            { username: "Giorgi", status: "ონლაინ", avatar: "😊", online: true, avatarImg: null },
            { username: "Nika", status: "ონლაინ", avatar: "🔥", online: true, avatarImg: null },
            { username: "Mari", status: "ონლაინ", avatar: "🌸", online: true, avatarImg: null },
            { username: "David", status: "ონლაინ", avatar: "⚡", online: true, avatarImg: null },
            { username: "Sandro", status: "ონლაინ", avatar: "🎮", online: true, avatarImg: null }
        ];
        
        let messages = [];
        let privateMessages = [];
        let userPhotos = [];
        
        // ჩატვირთვა localStorage-დან
        function loadData() {
            const savedMessages = localStorage.getItem('mafia_messages');
            if (savedMessages) messages = JSON.parse(savedMessages);
            else {
                messages = [
                    { id: 1, username: "Abu007", text: "მოგესალმებით ყველას! 🔥", time: new Date().toISOString(), room: "კაფე-ბარი", image: null },
                    { id: 2, username: "Lukinio", text: "გამარჯობა მაფია! 👋", time: new Date().toISOString(), room: "კაფე-ბარი", image: null }
                ];
            }
            
            const savedPM = localStorage.getItem('mafia_pm');
            if (savedPM) privateMessages = JSON.parse(savedPM);
            else privateMessages = [];
            
            const savedPhotos = localStorage.getItem('mafia_photos');
            if (savedPhotos) userPhotos = JSON.parse(savedPhotos);
            else userPhotos = [];
            
            const savedAvatar = localStorage.getItem('mafia_avatar_' + currentUser);
            if (savedAvatar) {
                const user = users.find(u => u.username === currentUser);
                if (user) user.avatarImg = savedAvatar;
                document.getElementById('profileAvatar').style.backgroundImage = `url(${savedAvatar})`;
                document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                document.getElementById('profileAvatar').innerHTML = '';
            }
            
            const savedStatus = localStorage.getItem('mafia_status_' + currentUser);
            if (savedStatus) {
                const user = users.find(u => u.username === currentUser);
                if (user) user.status = savedStatus;
                document.getElementById('profileStatus').value = savedStatus;
            }
        }
        
        function saveMessages() { localStorage.setItem('mafia_messages', JSON.stringify(messages)); }
        function savePM() { localStorage.setItem('mafia_pm', JSON.stringify(privateMessages)); }
        function savePhotos() { localStorage.setItem('mafia_photos', JSON.stringify(userPhotos)); }
        
        // ============ გვერდების მართვა ============
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-page') === pageName) btn.classList.add('active');
            });
            if (pageName === 'online') renderOnlineUsers();
            if (pageName === 'messages') renderPrivateChatsList();
            if (pageName === 'album') renderAlbum();
        }
        
        // ============ ოთახები (12-ვე) ============
        function renderRooms() {
            document.getElementById('roomsList').innerHTML = ROOMS.map(room => `
                <div class="room-card" onclick="openRoom('${room.name}')">
                    <span class="room-icon">${room.icon}</span>
                    <span class="room-name">${room.name}</span>
                </div>
            `).join('');
        }
        
        function openRoom(roomName) {
            currentRoom = roomName;
            document.getElementById('chatRoomName').innerHTML = `📡 ${roomName}`;
            showPage('chat');
            renderMessages();
        }
        
        function closeChat() { currentRoom = null; showPage('home'); }
        
        // ============ შეტყობინებები ============
        function renderMessages() {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            
            const roomMessages = messages.filter(m => m.room === currentRoom).sort((a,b) => new Date(a.time) - new Date(b.time));
            
            if (roomMessages.length === 0) {
                container.innerHTML = '<div class="empty-state">💬 შეტყობინებები არ არის</div>';
                return;
            }
            
            container.innerHTML = roomMessages.map(msg => {
                const user = users.find(u => u.username === msg.username) || { avatar: "👤", avatarImg: null };
                const isAdmin = ADMINS.includes(msg.username);
                const isOwner = msg.username === OWNER;
                let extraClass = isOwner ? 'owner-message' : (isAdmin ? 'admin-message' : '');
                const timeStr = new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                const avatarHtml = user.avatarImg ? 
                    `<img src="${user.avatarImg}" style="width:28px; height:28px; border-radius:50%; object-fit:cover;">` : 
                    `<div class="message-avatar">${user.avatar}</div>`;
                
                return `
                    <div class="message ${extraClass}" data-id="${msg.id}">
                        <div class="message-header">
                            ${avatarHtml}
                            <span class="message-name" onclick="openPrivateChat('${msg.username}')">${escapeHtml(msg.username)}</span>
                            <span class="message-time">${timeStr}</span>
                        </div>
                        <div class="message-text">
                            ${escapeHtml(msg.text)}
                            ${msg.image ? `<img src="${msg.image}" onclick="viewImage('${msg.image}')">` : ''}
                        </div>
                        ${(ADMINS.includes(currentUser) || currentUser === OWNER) ? `
                            <button class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</button>
                        ` : ''}
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            const pendingImage = window.pendingImage;
            
            if (!text && !pendingImage) return;
            
            const newMsg = {
                id: Date.now(),
                username: currentUser,
                text: text || "",
                time: new Date().toISOString(),
                room: currentRoom,
                image: pendingImage || null
            };
            
            messages.push(newMsg);
            saveMessages();
            
            input.value = '';
            window.pendingImage = null;
            renderMessages();
        }
        
        function addPhotoToMessage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    window.pendingImage = e.target.result;
                    alert('📷 ფოტო დაემატა! გაგზავნეთ შეტყობინება');
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }
        
        function deleteMessage(msgId) {
            if (!ADMINS.includes(currentUser) && currentUser !== OWNER) {
                alert('❌ შეტყობინების წაშლა მხოლოდ ადმინებს შეუძლიათ!');
                return;
            }
            messages = messages.filter(m => m.id !== msgId);
            saveMessages();
            renderMessages();
        }
        
        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }
        
        // ============ ემოჯი პიკერი (გალერეიდან) ============
        function openEmojiPicker() {
            const emojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺', '💀', '👑', '💪', '🤡', '👻', '⭐', '🌈', '🍕', '🍺', '🎸'];
            const picker = document.createElement('div');
            picker.style.cssText = 'position:fixed; bottom:80px; left:10px; right:10px; background:var(--card); border:2px solid var(--accent); border-radius:16px; display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:12px; z-index:2000; max-height:250px; overflow-y:auto;';
            emojis.forEach(emoji => {
                const btn = document.createElement('div');
                btn.textContent = emoji;
                btn.style.cssText = 'font-size:32px; text-align:center; cursor:pointer; padding:8px; border-radius:8px;';
                btn.onmouseover = () => btn.style.background = 'var(--accent)';
                btn.onmouseout = () => btn.style.background = 'transparent';
                btn.onclick = () => {
                    document.getElementById('messageInput').value += emoji;
                    picker.remove();
                };
                picker.appendChild(btn);
            });
            document.body.appendChild(picker);
            setTimeout(() => {
                const closePicker = (e) => { if (!picker.contains(e.target)) picker.remove(); document.removeEventListener('click', closePicker); };
                setTimeout(() => document.addEventListener('click', closePicker), 100);
            }, 100);
        }
        
        // ============ ონლაინ მომხმარებლები ============
        function renderOnlineUsers() {
            const onlineUsers = users.filter(u => u.online);
            const container = document.getElementById('onlineList');
            if (onlineUsers.length === 0) {
                container.innerHTML = '<div class="empty-state">ონლაინ მომხმარებლები არ არიან</div>';
                return;
            }
            container.innerHTML = onlineUsers.map(user => `
                <div class="user-item" onclick="openPrivateChat('${user.username}')">
                    <div class="user-avatar" style="${user.avatarImg ? `background-image:url(${user.avatarImg}); background-size:cover;` : ''}">${user.avatarImg ? '' : user.avatar}</div>
                    <div>
                        <div class="user-name">${escapeHtml(user.username)}</div>
                        <div class="user-status">${escapeHtml(user.status)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ============ პირადი მიმოწერა ============
        function openPrivateChat(username) {
            if (username === currentUser) {
                alert('საკუთარ თავთან მიმოწერა არ შეიძლება');
                return;
            }
            
            if (currentPMUser === username && document.getElementById('pmContainer').innerHTML) {
                document.getElementById('pmContainer').innerHTML = '';
                currentPMUser = null;
                return;
            }
            
            currentPMUser = username;
            renderPrivateChat();
        }
        
        function renderPrivateChat() {
            if (!currentPMUser) return;
            
            const pmMsgs = privateMessages.filter(m => 
                (m.from === currentUser && m.to === currentPMUser) || 
                (m.from === currentPMUser && m.to === currentUser)
            ).sort((a,b) => new Date(a.time) - new Date(b.time));
            
            const user = users.find(u => u.username === currentPMUser) || { avatar: "👤", avatarImg: null };
            
            const pmHtml = `
                <div class="pm-chat-container" id="pmChatWindow">
                    <div class="pm-header" onclick="document.getElementById('pmChatWindow').remove(); currentPMUser=null;">
                        <span>💬 ${escapeHtml(currentPMUser)}</span>
                        <span>✕</span>
                    </div>
                    <div class="pm-messages" id="pmMessages">
                        ${pmMsgs.map(msg => `
                            <div class="pm-message ${msg.from === currentUser ? 'own' : ''}">
                                <div class="message-time" style="font-size:9px;">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                <div>${escapeHtml(msg.text)}</div>
                                ${msg.image ? `<img src="${msg.image}" style="max-width:150px; border-radius:8px; margin-top:5px;">` : ''}
                            </div>
                        `).join('') || '<div class="empty-state" style="padding:20px;">მიმოწერა ცარიელია</div>'}
                    </div>
                    <div class="pm-input-area">
                        <input type="text" id="pmInput" class="pm-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()">
                        <button class="icon-btn" style="width:40px; height:40px;" onclick="sendPM()">➤</button>
                    </div>
                </div>
            `;
            
            document.getElementById('pmContainer').innerHTML = pmHtml;
            const pmMessagesDiv = document.getElementById('pmMessages');
            if (pmMessagesDiv) pmMessagesDiv.scrollTop = pmMessagesDiv.scrollHeight;
            document.getElementById('pmInput')?.focus();
        }
        
        function sendPM() {
            const input = document.getElementById('pmInput');
            const text = input.value.trim();
            if (!text || !currentPMUser) return;
            
            privateMessages.push({
                id: Date.now(),
                from: currentUser,
                to: currentPMUser,
                text: text,
                time: new Date().toISOString(),
                image: null
            });
            savePM();
            input.value = '';
            renderPrivateChat();
            renderPrivateChatsList();
        }
        
        function renderPrivateChatsList() {
            const myPMs = privateMessages.filter(m => m.from === currentUser || m.to === currentUser);
            const uniqueUsers = new Set();
            myPMs.forEach(m => {
                const other = m.from === currentUser ? m.to : m.from;
                uniqueUsers.add(other);
            });
            
            const container = document.getElementById('pmList');
            if (uniqueUsers.size === 0) {
                container.innerHTML = '<div class="empty-state">ჯერ არ გქონია პირადი მიმოწერა</div>';
                return;
            }
            
            container.innerHTML = Array.from(uniqueUsers).map(username => {
                const lastMsg = myPMs.filter(m => (m.from === username || m.to === username)).pop();
                return `
                    <div class="user-item" onclick="openPrivateChat('${username}')">
                        <div class="user-avatar">${users.find(u=>u.username===username)?.avatar || "👤"}</div>
                        <div>
                            <div class="user-name">${escapeHtml(username)}</div>
                            <div class="user-status">${lastMsg ? lastMsg.text.substring(0,30) : '...'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ============ ალბომი ============
        function renderAlbum() {
            const container = document.getElementById('albumGrid');
            if (userPhotos.length === 0) {
                container.innerHTML = '<div class="empty-state">ალბომი ცარიელია. დაამატე ფოტოები!</div>';
                return;
            }
            container.innerHTML = userPhotos.map((photo, i) => `
                <img src="${photo}" class="album-photo" onclick="viewImage('${photo}')">
            `).join('');
        }
        
        function addToAlbum(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    userPhotos.push(e.target.result);
                    savePhotos();
                    renderAlbum();
                    alert('📸 ფოტო დაემატა ალბომში!');
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }
        
        // ============ პროფილი ============
        function uploadAvatar(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const imgData = e.target.result;
                    const user = users.find(u => u.username === currentUser);
                    if (user) user.avatarImg = imgData;
                    localStorage.setItem('mafia_avatar_' + currentUser, imgData);
                    document.getElementById('profileAvatar').style.backgroundImage = `url(${imgData})`;
                    document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                    document.getElementById('profileAvatar').innerHTML = '';
                    alert('✅ ავატარი განახლდა!');
                    renderOnlineUsers();
                    if (currentRoom) renderMessages();
                };
                reader.readAsDataURL(file);
            }
        }
        
        function saveStatus() {
            const status = document.getElementById('profileStatus').value;
            const user = users.find(u => u.username === currentUser);
            if (user) user.status = status;
            localStorage.setItem('mafia_status_' + currentUser, status);
        }
        
        // ============ დამხმარე ============
        function viewImage(src) {
            const win = window.open();
            win.document.write(`<img src="${src}" style="max-width:100%; margin:0 auto; display:block; background:black;">`);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                const hearts = ['❤️', '💖', '💗', '💕', '💘', '❤️‍🔥'];
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (18 + Math.random() * 22) + 'px';
                document.getElementById('hearts').appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 2000);
        }
        
        function toggleTheme() {
            document.body.classList.toggle('day-mode');
            const btn = document.getElementById('themeToggle');
            btn.innerHTML = document.body.classList.contains('day-mode') ? '☀️' : '🌙';
        }
        
        // ============ ინიციალიზაცია ============
        function init() {
            loadData();
            renderRooms();
            renderOnlineUsers();
            renderPrivateChatsList();
            renderAlbum();
            startHearts();
            
            document.getElementById('profileName').innerHTML = currentUser;
            document.getElementById('userId').innerHTML = Math.floor(Math.random() * 10000);
            document.getElementById('profileStatus').addEventListener('change', saveStatus);
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => showPage(btn.getAttribute('data-page')));
            });
        }
        
        init();
    </script>
</body>
</html>
