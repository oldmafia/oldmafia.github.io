<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - ONLINE SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root { --red: #800000; --bright: #ff0000; --bg: #030000; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--red); height: 60px; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 25px; color: var(--bright); }
        #room-name { font-weight: bold; color: var(--bright); flex: 1; text-align: center; }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle, #1a0000 0%, #030000 100%); }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; max-width: 95%; position: relative; }
        
        /* Online წერტილი ავატარზე */
        .avatar-wrapper { position: relative; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #0f0; border-radius: 50%; border: 2px solid black; display: none; }
        .is-online .online-dot { display: block; }
        
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--red); object-fit: cover; cursor: pointer; }
        .bubble { background: rgba(30, 0, 0, 0.9); border: 1px solid #500; padding: 8px 12px; border-radius: 4px 18px 18px 18px; min-width: 80px; }
        .m-nick { font-weight: bold; font-size: 13px; display: flex; justify-content: space-between; }
        .m-text { color: #ddd; font-size: 14px; margin-top: 3px; }
        .m-time { font-size: 9px; color: #666; display: block; text-align: right; }

        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; border-right: 3px solid var(--red); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3500; }
        .overlay.active { display: block; }
        
        .room-item { padding: 12px 20px; cursor: pointer; color: #bbb; border-bottom: 1px solid #150000; font-size: 14px; }
        .room-item.active { background: var(--red); color: white; }

        .online-list { padding: 10px; background: #111; border-top: 1px solid #333; max-height: 150px; overflow-y: auto; }
        .online-user { font-size: 12px; color: #0f0; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }

        .input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: black; padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--red); z-index: 2000; }
        .input-zone input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #080000; color: white; outline: none; }
        .send-btn { background: var(--red); border: none; width: 45px; height: 45px; border-radius: 50%; color: cyan; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
        .modal-content { background: #080000; border: 2px solid var(--red); padding: 25px; border-radius: 20px; width: 320px; text-align: center; }
        .modal-btn { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #400; background: #111; color: white; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 20px; text-align: center; border-bottom: 1px solid #222;">
        <img id="my-avatar-img" src="" style="width:70px; height:70px; border-radius:50%; border:2px solid gold; object-fit: cover;">
        <div id="my-nick-label" style="font-weight:bold; color:gold; font-size:17px; margin-top:10px;">...</div>
        <div id="my-role-label" style="font-size: 11px; color: #888;">...</div>
        <div id="my-status-display" style="color: #0f0; font-size: 12px; margin-top:5px; font-style: italic;"></div>
    </div>
    
    <div style="padding: 10px; font-size: 12px; color: #555; text-align: center;">🟢 ონლაინ რეჟიმი</div>
    <div class="online-list" id="online-users-box">
        </div>

    <div class="rooms-list" style="flex:1; overflow-y:auto;">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('🕴 მაფიის ღამე', this)">🕴 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('❓ ვიქტორინა', this)">❓ ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
    </div>
    <div style="padding:15px; text-align:center; color:red; cursor:pointer;" onclick="logout()">🚪 გასვლა</div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="targetAvatar" src="" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--red);">
        <h3 id="targetName" style="color:var(--bright); margin:10px 0;"></h3>
        <p id="targetRoleLabel" style="font-size:12px; color:#aaa;"></p>
        <div id="adminOptions"></div>
        <button class="modal-btn" style="background:#222;" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), myRole = "Member", currentRoom = "☕ კაფე-ბარი", targetUser = "";

    async function init() {
        if (!myNick) { location.href = 'index.html'; return; }
        
        // სტატუსის განახლება (Online)
        updateOnlineStatus();
        setInterval(updateOnlineStatus, 30000); // ყოველ 30 წამში

        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = (myNick === 'Abu007') ? 'Owner' : (p.role || "Member");
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-role-label').innerText = translateRole(myRole);
            document.getElementById('my-avatar-img').src = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
            document.getElementById('my-status-display').innerText = p.status || "";
            if(myRole === 'Owner') document.getElementById('my-nick-label').style.color = "gold";
        }
        
        loadMessages();
        loadOnlineList();
        _s.channel('room1').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
        _s.channel('profiles_track').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles' }, loadOnlineList).subscribe();
    }

    async function updateOnlineStatus() {
        // ბოლო აქტივობის დროს ვინახავთ profiles ცხრილში (სვეტი: last_seen)
        await _s.from('profiles').update({ last_seen: new Date().toISOString() }).eq('username', myNick);
    }

    async function loadOnlineList() {
        const fiveMinsAgo = new Date(Date.now() - 5 * 60000).toISOString();
        const { data: users } = await _s.from('profiles').select('username, last_seen').gt('last_seen', fiveMinsAgo);
        
        const box = document.getElementById('online-users-box');
        box.innerHTML = users?.map(u => `<div class="online-user"><span>●</span> ${u.username}</div>`).join('') || "არავინ არის";
        
        // მესიჯებზე Online წერტილებისთვის
        window.onlineUsers = users?.map(u => u.username) || [];
    }

    function translateRole(r) {
        const roles = {'Owner': '👑 დამფუძნებელი', 'Admin': '🛡️ ადმინისტრატორი', 'Member': '👤 მომხმარებელი', 'Banned': '🚫 დაბლოკილი'};
        return roles[r] || '👤 მომხმარებელი';
    }

    async function loadMessages() {
        const box = document.getElementById("chat");
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true }).limit(50);
        const { data: profs } = await _s.from('profiles').select('username, avatar_url, role');
        
        box.innerHTML = "";
        msgs?.forEach(m => {
            const p = profs?.find(u => u.username === m.user_name);
            const isOnline = window.onlineUsers?.includes(m.user_name);
            const isOwner = p?.role === 'Owner' || m.user_name === 'Abu007';
            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            box.innerHTML += `
                <div class="msg-container ${isOnline ? 'is-online' : ''}">
                    <div class="avatar-wrapper">
                        <img src="${p?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar" onclick="openProfile('${m.user_name}')">
                        <div class="online-dot"></div>
                    </div>
                    <div class="bubble">
                        <div class="m-nick" style="color:${isOwner ? 'gold' : '#ff3333'}" onclick="openProfile('${m.user_name}')">
                            ${m.user_name}
                            ${(myRole === 'Owner' || myRole === 'Admin') ? `<span onclick="deleteMsg(${m.id})" style="cursor:pointer;opacity:0.3;"> ✖</span>` : ''}
                        </div>
                        <div class="m-text">${m.text}</div>
                        <span class="m-time">${time}</span>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function openProfile(name) {
        targetUser = name;
        const { data: p } = await _s.from('profiles').select('*').eq('username', name).maybeSingle();
        if(!p) return;
        document.getElementById('targetAvatar').src = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
        document.getElementById('targetName').innerText = p.username;
        document.getElementById('targetRoleLabel').innerText = translateRole(p.role);
        
        const opt = document.getElementById('adminOptions'); opt.innerHTML = "";
        if((myRole === 'Owner' || myRole === 'Admin') && name !== myNick) {
            opt.innerHTML = `
                <button class="modal-btn" style="color:cyan" onclick="setRole('Admin')">ადმინად დანიშვნა</button>
                <button class="modal-btn" style="color:red" onclick="setRole('Banned')">დაბლოკვა (BAN)</button>
                <button class="modal-btn" onclick="setRole('Member')">ჩამორთმევა</button>
            `;
        }
        document.getElementById('userModal').style.display = "flex";
    }

    async function setRole(r) { 
        await _s.from('profiles').update({ role: r }).eq('username', targetUser); 
        closeModal(); location.reload(); 
    }

    async function sendMsg() {
        if(myRole === "Banned") return alert("ბლოკში ხარ!");
        const i = document.getElementById("msg-input"); if(!i.value.trim()) return;
        await _s.from('messages').insert([{ user_name: myNick, text: i.value, room_name: currentRoom }]);
        i.value = "";
    }

    function changeRoom(n, el) { currentRoom = n; document.getElementById('room-name').innerText = n; loadMessages(); closeAll(); }
    function toggleSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').classList.add('active'); }
    function closeAll() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
    function closeModal() { document.getElementById('userModal').style.display = "none"; }
    async function deleteMsg(id) { await _s.from('messages').delete().eq('id', id); loadMessages(); }
    function logout() { localStorage.clear(); location.href = 'index.html'; }
</script>
</body>
</html>
