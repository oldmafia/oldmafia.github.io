<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #075e54;
            --secondary-color: #128c7e;
            --bg-color: #e5ddd5;
            --my-msg-color: #dcf8c6;
            --other-msg-color: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        .chat-header { background: var(--primary-color); color: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        .chat-header h2 { font-size: 18px; flex: 1; }

        /* Messages Area */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; }

        .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: var(--my-msg-color); border-top-right-radius: 0; }
        .msg.received { align-self: flex-start; background: var(--other-msg-color); border-top-left-radius: 0; }

        .sender-name { font-size: 12px; font-weight: bold; color: var(--secondary-color); margin-bottom: 4px; display: block; }
        .msg-time { font-size: 10px; color: #888; display: block; text-align: right; margin-top: 5px; }

        /* Input Area */
        .input-box { background: #f0f0f0; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        #messageInput { flex: 1; border: none; padding: 12px 15px; border-radius: 25px; outline: none; font-size: 15px; }
        .send-btn { background: var(--secondary-color); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
        .send-btn:hover { transform: scale(1.1); background: var(--primary-color); }

        /* Scrollbar */
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="chat-header">
        <i class="fas fa-arrow-left"></i>
        <div class="avatar-circle" style="width: 40px; height: 40px; background: #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-user"></i>
        </div>
        <h2>ჩემი ჩატი</h2>
        <i class="fas fa-ellipsis-v"></i>
    </div>

    <div id="chat-window">
        </div>

    <div class="input-box">
        <i class="far fa-smile" style="font-size: 22px; color: #666; cursor: pointer;"></i>
        <input type="text" id="messageInput" placeholder="დაწერე მესიჯი..." autocomplete="off">
        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        // შენი Supabase მონაცემები
        const SB_URL = 'https://ftfcietulnzqntovvylf.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0ZmNpZXR1bG56cW50b3Z2eWxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjk3NjA2NTksImV4cCI6MjA0NTMzNjY1OX0.m-3A9Oshq4D_zZp_O6Z-C6Zp-C6Zp-C6Zp-C6Zp-C6Zp';
        const client = supabase.createClient(SB_URL, SB_KEY);

        // მომხმარებლის იდენტიფიკაცია
        let currentUser = localStorage.getItem('chat_user') || prompt("შეიყვანე შენი სახელი:") || "Anonymous";
        localStorage.setItem('chat_user', currentUser);

        const windowDiv = document.getElementById('chat-window');
        const inputField = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendBtn');

        // მესიჯების გამოტანა
        async function fetchAll() {
            const { data, error } = await client
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });

            if (data) {
                windowDiv.innerHTML = '';
                data.forEach(m => addMessageToUI(m));
                scrollToEnd();
            }
        }

        function addMessageToUI(msg) {
            const isMe = msg.username === currentUser;
            const timeStr = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
            msgDiv.innerHTML = `
                ${!isMe ? `<span class="sender-name">${msg.username}</span>` : ''}
                <div>${msg.content}</div>
                <span class="msg-time">${timeStr}</span>
            `;
            windowDiv.appendChild(msgDiv);
        }

        async function pushMessage() {
            const val = inputField.value.trim();
            if (!val) return;

            const { error } = await client
                .from('messages')
                .insert([{ content: val, username: currentUser }]);

            if (!error) {
                inputField.value = '';
            }
        }

        // Realtime განახლება
        client
            .channel('chat-room')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                addMessageToUI(payload.new);
                scrollToEnd();
            })
            .subscribe();

        function scrollToEnd() { windowDiv.scrollTop = windowDiv.scrollHeight; }

        sendButton.onclick = pushMessage;
        inputField.onkeydown = (e) => { if(e.key === 'Enter') pushMessage(); };

        fetchAll();
    </script>
</body>
</html>
