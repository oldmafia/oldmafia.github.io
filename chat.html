<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - ჩატი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background: #0a0508;
            color: #f0e6e8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .nav-bar {
            display: flex;
            justify-content: space-around;
            background: #120a0c;
            padding: 10px;
            border-bottom: 2px solid #8b0000;
        }
        .nav-btn {
            font-size: 22px;
            background: none;
            border: none;
            color: #aa8a8a;
            cursor: pointer;
            padding: 5px 12px;
        }
        .nav-btn.active {
            color: #8b0000;
            background: rgba(139,0,0,0.2);
            border-radius: 20px;
        }
        .pages {
            flex: 1;
            position: relative;
        }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
            padding: 15px;
        }
        .page.active {
            display: block;
        }
        .room-card {
            background: #1a0f12;
            padding: 14px;
            margin-bottom: 8px;
            border-radius: 10px;
            border-left: 4px solid #8b0000;
            cursor: pointer;
        }
        .chat-header {
            background: #1a0f12;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-radius: 10px;
        }
        .close-btn {
            background: none;
            border: none;
            color: #8b0000;
            font-size: 20px;
            cursor: pointer;
        }
        .messages {
            height: 70vh;
            overflow-y: auto;
            padding: 8px;
        }
        .message {
            background: #1a0f12;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            max-width: 80%;
        }
        .message.own {
            background: #8b0000;
            margin-left: auto;
        }
        .message-name {
            font-size: 11px;
            font-weight: bold;
            color: #8b0000;
        }
        .message.own .message-name {
            color: white;
        }
        .message-time {
            font-size: 9px;
            opacity: 0.6;
            margin-left: 5px;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            background: #1a0f12;
            padding: 10px;
            border-radius: 12px;
        }
        .chat-input {
            flex: 1;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #8b0000;
            background: #1f1216;
            color: white;
        }
        .send-btn {
            background: #8b0000;
            border: none;
            color: white;
            width: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        .user-item {
            background: #1a0f12;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .section-title {
            font-size: 18px;
            margin-bottom: 12px;
            color: #8b0000;
            border-left: 3px solid #8b0000;
            padding-left: 10px;
        }
        .profile-card {
            text-align: center;
            padding: 20px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto;
            cursor: pointer;
        }
        .status-input {
            width: 80%;
            margin-top: 15px;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #8b0000;
            background: #1f1216;
            color: white;
            text-align: center;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
        }
        .notification {
            position: fixed;
            top: 70px;
            right: 10px;
            background: #8b0000;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            z-index: 9999;
        }
        .heart {
            position: fixed;
            bottom: 0;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 4s forwards;
            z-index: 9999;
        }
        @keyframes floatUp {
            0% { bottom: 0; opacity: 1; }
            100% { bottom: 100%; opacity: 0; transform: translateX(30px); }
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="online">👥</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeBtn">🌙</button>
    </div>

    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 12 ოთახი</div>
            <div id="roomsList"></div>
        </div>

        <div id="messagesPage" class="page">
            <div class="section-title">💬 პირადი მიმოწერა</div>
            <div id="pmList" class="empty-state">მიმოწერა ცარიელია</div>
        </div>

        <div id="onlinePage" class="page">
            <div class="section-title">👥 მომხმარებლები</div>
            <div id="onlineList"></div>
        </div>

        <div id="profilePage" class="page">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarFile').click()">👤</div>
                <h2 id="profileName"></h2>
                <input type="text" id="statusInput" class="status-input" placeholder="სტატუსი...">
                <button onclick="saveStatus()" style="margin-top:10px; background:#8b0000; color:white; padding:10px 20px; border-radius:25px; border:none;">💾 შენახვა</button>
                <input type="file" id="avatarFile" hidden accept="image/*" onchange="uploadAvatar(this)">
            </div>
        </div>

        <div id="chatPage" class="page">
            <div class="chat-header">
                <span id="chatRoomName">ოთახი</span>
                <button class="close-btn" onclick="closeChat()">✕</button>
            </div>
            <div id="chatMessages" class="messages"></div>
            <div class="chat-input-area">
                <input type="text" id="msgInput" class="chat-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>
    <div id="hearts"></div>

    <script>
        // ===== მომხმარებელი =====
        let currentUser = localStorage.getItem('mafia_user');
        if (!currentUser) {
            currentUser = prompt("შეიყვანე შენი ნიკი:", "Abu007");
            if (!currentUser) currentUser = "Abu007";
            localStorage.setItem('mafia_user', currentUser);
        }
        console.log("მომხმარებელი:", currentUser);

        let currentRoom = null;
        let currentPMUser = null;
        
        let users = [];
        let messages = [];
        let privateMsgs = [];

        const ROOMS = [
            "☕ კაფე-ბარი", "🎲 ნარდი", "🃏 ჯოკერი", "💎 VIP", "📝 ფორუმი",
            "🛠️ ადმინები", "😂 იუმორი", "🏆 შიფროგრამა", "🎭 გამოძიება",
            "🎵 მუსიკა", "⁉️ ვიქტორინა", "🆘 დახმარება"
        ];

        function loadData() {
            let savedUsers = localStorage.getItem('users');
            if (savedUsers) users = JSON.parse(savedUsers);
            else users = [
                { name: "Abu007", status: "👑 დამფუძნებელი", avatar: null },
                { name: "Lukinio", status: "🔧 ადმინი", avatar: null }
            ];
            
            let savedMsgs = localStorage.getItem('msgs');
            if (savedMsgs) messages = JSON.parse(savedMsgs);
            else messages = [];
            
            let savedPM = localStorage.getItem('pm');
            if (savedPM) privateMsgs = JSON.parse(savedPM);
            else privateMsgs = [];
            
            if (!users.find(u => u.name === currentUser)) {
                users.push({ name: currentUser, status: "ახალი", avatar: null });
                saveUsers();
            }
            
            document.getElementById('profileName').innerHTML = currentUser;
            let user = users.find(u => u.name === currentUser);
            if (user?.avatar) {
                document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar})`;
                document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                document.getElementById('profileAvatar').innerHTML = '';
            }
            if (user?.status) document.getElementById('statusInput').value = user.status;
        }
        
        function saveUsers() { localStorage.setItem('users', JSON.stringify(users)); }
        function saveMsgs() { localStorage.setItem('msgs', JSON.stringify(messages)); }
        function savePM() { localStorage.setItem('pm', JSON.stringify(privateMsgs)); }
        
        // ===== ოთახები =====
        function renderRooms() {
            let html = '';
            ROOMS.forEach(room => {
                html += `<div class="room-card" onclick="openRoom('${room}')">${room}</div>`;
            });
            document.getElementById('roomsList').innerHTML = html;
        }
        
        function openRoom(room) {
            currentRoom = room;
            document.getElementById('chatRoomName').innerHTML = `📡 ${room}`;
            showPage('chat');
            renderMsgs();
        }
        
        function closeChat() { currentRoom = null; showPage('home'); }
        
        // ===== შეტყობინებები =====
        function renderMsgs() {
            let container = document.getElementById('chatMessages');
            let roomMsgs = messages.filter(m => m.room === currentRoom).sort((a,b) => new Date(a.time) - new Date(b.time));
            if (roomMsgs.length === 0) {
                container.innerHTML = '<div class="empty-state">შეტყობინებები არ არის</div>';
                return;
            }
            let html = '';
            roomMsgs.forEach(msg => {
                let isOwn = msg.user === currentUser;
                let time = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="message ${isOwn ? 'own' : ''}">
                    <div><span class="message-name">${escapeHtml(msg.user)}</span><span class="message-time">${time}</span></div>
                    <div>${escapeHtml(msg.text)}</div>
                </div>`;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMsg() {
            let input = document.getElementById('msgInput');
            let text = input.value.trim();
            if (!text || !currentRoom) return;
            messages.push({
                id: Date.now(),
                user: currentUser,
                text: text,
                time: new Date().toISOString(),
                room: currentRoom
            });
            saveMsgs();
            input.value = '';
            renderMsgs();
        }
        
        // ===== მომხმარებლები =====
        function renderOnline() {
            let container = document.getElementById('onlineList');
            let html = '';
            users.filter(u => u.name !== currentUser).forEach(user => {
                html += `<div class="user-item" onclick="startPM('${user.name}')">
                    <div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.name.charAt(0).toUpperCase()}</div>
                    <div><div><b>${escapeHtml(user.name)}</b></div><div style="font-size:12px;">${escapeHtml(user.status)}</div></div>
                </div>`;
            });
            container.innerHTML = html || '<div class="empty-state">მომხმარებლები არ არიან</div>';
        }
        
        // ===== პირადი მიმოწერა =====
        function startPM(username) {
            if (username === currentUser) return;
            currentPMUser = username;
            renderPM();
        }
        
        function renderPM() {
            let pmMsgs = privateMsgs.filter(m => 
                (m.from === currentUser && m.to === currentPMUser) || 
                (m.from === currentPMUser && m.to === currentUser)
            ).sort((a,b) => new Date(a.time) - new Date(b.time));
            
            let html = `
                <div id="pmWindow" style="position:fixed; bottom:10px; right:10px; width:300px; background:#1a0f12; border:2px solid #8b0000; border-radius:15px; z-index:2000;">
                    <div style="background:#8b0000; padding:10px; display:flex; justify-content:space-between; border-radius:12px 12px 0 0;">
                        <span>💬 ${escapeHtml(currentPMUser)}</span>
                        <button onclick="closePM()" style="background:none; border:none; color:white; font-size:18px;">✕</button>
                    </div>
                    <div id="pmMsgs" style="height:300px; overflow-y:auto; padding:8px;">${pmMsgs.map(m => `
                        <div style="background:${m.from === currentUser ? '#8b0000' : '#2a1f22'}; padding:6px 10px; border-radius:12px; margin-bottom:5px; max-width:85%; margin-left:${m.from === currentUser ? 'auto' : '0'};">
                            <div style="font-size:10px; opacity:0.7;">${new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
                            <div>${escapeHtml(m.text)}</div>
                        </div>
                    `).join('') || '<div style="text-align:center; padding:20px;">მიმოწერა ცარიელია</div>'}</div>
                    <div style="display:flex; padding:8px; gap:5px; border-top:1px solid #4a1a2a;">
                        <input type="text" id="pmInput" style="flex:1; padding:8px; border-radius:20px; border:1px solid #8b0000; background:#1f1216; color:white;" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()">
                        <button onclick="sendPM()" style="background:#8b0000; border:none; color:white; width:40px; border-radius:50%;">➤</button>
                    </div>
                </div>
            `;
            let old = document.getElementById('pmWindow');
            if (old) old.remove();
            document.body.insertAdjacentHTML('beforeend', html);
            let pmDiv = document.getElementById('pmMsgs');
            if (pmDiv) pmDiv.scrollTop = pmDiv.scrollHeight;
            document.getElementById('pmInput')?.focus();
        }
        
        function closePM() {
            let el = document.getElementById('pmWindow');
            if (el) el.remove();
            currentPMUser = null;
        }
        
        function sendPM() {
            let input = document.getElementById('pmInput');
            let text = input.value.trim();
            if (!text || !currentPMUser) return;
            privateMsgs.push({
                id: Date.now(),
                from: currentUser,
                to: currentPMUser,
                text: text,
                time: new Date().toISOString()
            });
            savePM();
            input.value = '';
            renderPM();
            renderPmList();
        }
        
        function renderPmList() {
            let myPMs = privateMsgs.filter(m => m.from === currentUser || m.to === currentUser);
            let usersSet = new Set();
            myPMs.forEach(m => {
                let other = m.from === currentUser ? m.to : m.from;
                usersSet.add(other);
            });
            let container = document.getElementById('pmList');
            if (usersSet.size === 0) {
                container.innerHTML = '<div class="empty-state">მიმოწერა ცარიელია</div>';
                return;
            }
            let html = '';
            usersSet.forEach(name => {
                let last = myPMs.filter(m => (m.from === name || m.to === name)).pop();
                html += `<div class="user-item" onclick="startPM('${name}')">
                    <div class="user-avatar">${name.charAt(0).toUpperCase()}</div>
                    <div><div><b>${escapeHtml(name)}</b></div><div style="font-size:11px;">${last ? last.text.substring(0,30) : '...'}</div></div>
                </div>`;
            });
            container.innerHTML = html;
        }
        
        // ===== პროფილი =====
        function saveStatus() {
            let status = document.getElementById('statusInput').value;
            let user = users.find(u => u.name === currentUser);
            if (user) user.status = status;
            saveUsers();
            showNotif('✅ სტატუსი განახლდა!');
            renderOnline();
        }
        
        function uploadAvatar(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    let user = users.find(u => u.name === currentUser);
                    if (user) user.avatar = e.target.result;
                    saveUsers();
                    document.getElementById('profileAvatar').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                    document.getElementById('profileAvatar').innerHTML = '';
                    renderOnline();
                    showNotif('✅ ავატარი განახლდა!');
                };
                reader.readAsDataURL(file);
            }
        }
        
        // ===== დამხმარე =====
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-page') === page) btn.classList.add('active');
            });
            if (page === 'online') renderOnline();
            if (page === 'messages') renderPmList();
        }
        
        function showNotif(msg) {
            let n = document.createElement('div');
            n.className = 'notification';
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 2000);
        }
        
        function escapeHtml(t) {
            let d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }
        
        function startHearts() {
            setInterval(() => {
                let h = document.createElement('div');
                h.className = 'heart';
                h.innerHTML = ['❤️', '💖', '💗', '💕'][Math.floor(Math.random()*4)];
                h.style.left = Math.random() * 90 + '%';
                document.getElementById('hearts').appendChild(h);
                setTimeout(() => h.remove(), 4000);
            }, 2000);
        }
        
        let isDay = false;
        document.getElementById('themeBtn').onclick = () => {
            isDay = !isDay;
            if (isDay) {
                document.body.style.background = '#fff5f0';
                document.body.style.color = '#2c1a1a';
                document.getElementById('themeBtn').innerHTML = '☀️';
            } else {
                document.body.style.background = '#0a0508';
                document.body.style.color = '#f0e6e8';
                document.getElementById('themeBtn').innerHTML = '🌙';
            }
        };
        
        loadData();
        renderRooms();
        renderOnline();
        renderPmList();
        startHearts();
        showPage('home');
    </script>
</body>
</html>
