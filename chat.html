<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OldMafia Founders Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #800020; --bg: #fff5f5; --card: #ffffff; --text: #333; --shadow: rgba(128, 0, 32, 0.2); }
        body.dark-mode { --bg: #1a0005; --card: #2d000a; --text: #ffe0e0; --shadow: rgba(0, 0, 0, 0.7); }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* --- დიდი მცურავი გულები --- */
        .hearts-container { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .heart { position: absolute; bottom: -60px; font-size: 60px; color: var(--primary); opacity: 0.5; animation: float 10s linear infinite; }
        @keyframes float { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 20% { opacity: 0.6; } 100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; } }

        /* --- ნავიგაცია --- */
        .top-navbar { background: var(--primary); padding: 10px; display: flex; justify-content: space-around; align-items: center; z-index: 100; box-shadow: 0 4px 15px var(--shadow); }
        .nav-item { color: white; cursor: pointer; font-weight: bold; font-size: 13px; display: flex; flex-direction: column; align-items: center; }

        .dropdown-panel { position: absolute; top: 65px; left: 5%; width: 90%; background: var(--card); border: 2px solid var(--primary); border-radius: 15px; padding: 15px; display: none; box-shadow: 0 10px 30px var(--shadow); z-index: 99; max-height: 70vh; overflow-y: auto; }

        /* --- ჩატი --- */
        .main-chat { flex: 1; display: flex; flex-direction: column; padding: 15px; z-index: 1; }
        #messages-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px; border-radius: 15px; background: var(--card); box-shadow: 4px 4px 10px var(--shadow); display: flex; gap: 10px; border-left: 4px solid var(--primary); align-self: flex-start; }
        .my-msg { align-self: flex-end; border-left: none; border-right: 4px solid var(--primary); flex-direction: row-reverse; }

        .input-area { display: flex; gap: 10px; background: var(--card); padding: 10px; border-radius: 30px; border: 2px solid var(--primary); }
        input[type="text"] { flex: 1; border: none; background: transparent; color: inherit; outline: none; }

        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .online-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; display: inline-block; border: 2px solid white; }

        #emoji-panel { position: absolute; bottom: 80px; left: 20px; background: var(--card); border: 2px solid var(--primary); display: none; padding: 10px; border-radius: 10px; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 105; box-shadow: 0 5px 15px var(--shadow); }
    </style>
</head>
<body class="dark-mode">

<div class="hearts-container" id="hearts-bg"></div>

<div class="top-navbar">
    <div class="nav-item" onclick="toggleMenu('rooms-menu')">🏠 <span>ოთახები</span></div>
    <div class="nav-item" onclick="toggleMenu('friends-menu')">👥 <span>ხალხი</span></div>
    <div class="nav-item" onclick="toggleMenu('messenger-menu')">💬 <span>პმ <b id="dm-dot" style="color:yellow; display:none;">●</b></span></div>
    <div class="nav-item" onclick="toggleMenu('profile-menu')">👤 <span>პროფილი</span></div>
    <div class="nav-item" onclick="toggleDarkMode()">🌓 <span>რეჟიმი</span></div>
</div>

<div id="rooms-menu" class="dropdown-panel">
    <div id="room-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"></div>
</div>

<div id="friends-menu" class="dropdown-panel">
    <h3>ონლაინ მომხმარებლები</h3>
    <div id="user-list"></div>
</div>

<div id="messenger-menu" class="dropdown-panel">
    <h3>პირადი შეტყობინებები</h3>
    <div id="dm-list">სიცარიელეა...</div>
</div>

<div id="profile-menu" class="dropdown-panel" style="text-align: center;">
    <img id="my-avatar" class="avatar" style="width: 80px; height: 80px;">
    <h2 id="my-name">...</h2>
    <p id="my-role-display" style="color: gold; font-weight: bold;"></p>
    <input type="text" id="status-input" placeholder="რა ხდება?" onchange="updateStatus(this.value)" style="width: 80%; text-align: center; padding: 5px; border-radius: 5px; border: 1px solid var(--primary);">
    <div id="founder-tools" style="display: none; margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px;">
        <button onclick="addEmojiAdmin()" style="background: gold; border: none; padding: 8px; border-radius: 5px; cursor: pointer;">➕ სმაილის დამატება</button>
    </div>
</div>

<div class="main-chat">
    <div id="messages-box"></div>
    <div id="emoji-panel"></div>
    <div class="input-area">
        <button onclick="toggleEmojis()" style="background: none; border: none; font-size: 22px; cursor: pointer;">😊</button>
        <input type="text" id="chat-input" placeholder="მიწერე მეგობარს...">
        <button onclick="send()" style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer;">➤</button>
    </div>
</div>

<script>
    const S_URL = 'https://ftfciebnywbondaiarnc.supabase.co';
    const S_KEY = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
    const sb = supabase.createClient(S_URL, S_KEY);

    let currentRoom = 1;
    let myUser = null;

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return;
        
        let { data: p } = await sb.from('profiles').select('*').eq('id', user.id).single();
        myUser = p;

        document.getElementById('my-avatar').src = p.avatar_url || 'https://via.placeholder.com/80';
        document.getElementById('my-name').innerText = p.username;
        document.getElementById('my-role-display').innerText = p.role.toUpperCase();

        if(p.role === 'owner' || p.role === 'admin') {
            document.getElementById('founder-tools').style.display = 'block';
        }

        genRooms(); loadMessages(); loadUsers(); loadEmojis(); hearts();
        sb.channel('chat').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, () => loadMessages()).subscribe();
    }

    function genRooms() {
        const list = document.getElementById('room-list');
        for(let i=1; i<=12; i++) {
            const d = document.createElement('div');
            d.style = "padding: 12px; background: var(--primary); color: white; border-radius: 8px; text-align: center; cursor: pointer;";
            d.innerText = "ოთახი " + i;
            d.onclick = () => { currentRoom = i; loadMessages(); toggleMenu('rooms-menu'); };
            list.appendChild(d);
        }
    }

    async function loadMessages() {
        const { data } = await sb.from('messages').select('*, profiles(username, avatar_url, role)').eq('room_id', currentRoom).order('created_at', {ascending: true});
        const box = document.getElementById('messages-box');
        box.innerHTML = '';
        data.forEach(m => {
            const isMe = m.user_id === myUser.id;
            box.innerHTML += `
                <div class="msg ${isMe ? 'my-msg' : ''}">
                    <img src="${m.profiles.avatar_url || 'https://via.placeholder.com/40'}" class="avatar">
                    <div>
                        <small><b>${m.profiles.username}</b> <span style="color:gold;">${m.profiles.role === 'owner' ? '👑' : ''}</span></small>
                        <div>${m.content}</div>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const inp = document.getElementById('chat-input');
        if(!inp.value.trim()) return;
        await sb.from('messages').insert([{ content: inp.value, user_id: myUser.id, room_id: currentRoom }]);
        inp.value = '';
    }

    async function loadUsers() {
        const { data } = await sb.from('profiles').select('*');
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        data.forEach(u => {
            list.innerHTML += `
                <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span class="online-dot"></span>
                        <img src="${u.avatar_url || 'https://via.placeholder.com/30'}" class="avatar" style="width:30px; height:30px;">
                        <b>${u.username}</b>
                    </div>
                    <button onclick="addFriend('${u.id}')" style="background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">➕</button>
                </div>`;
        });
    }

    async function loadEmojis() {
        const { data } = await sb.from('emojis').select('*');
        const p = document.getElementById('emoji-panel');
        p.innerHTML = '';
        data?.forEach(em => {
            const img = document.createElement('img');
            img.src = em.url; img.style = "width:35px; cursor:pointer;";
            img.onclick = () => { document.getElementById('chat-input').value += ` ${em.url} `; p.style.display='none'; };
            p.appendChild(img);
        });
    }

    async function addEmojiAdmin() {
        const url = prompt("ჩასვით სმაილის URL ლინკი:");
        if(url) {
            await sb.from('emojis').insert([{ url: url, name: 'custom' }]);
            loadEmojis();
            alert("სმაილი დაემატა!");
        }
    }

    async function addFriend(toId) {
        await sb.from('friend_requests').insert([{ from_id: myUser.id, to_id: toId, status: 'pending' }]);
        alert("მეგობრობის თხოვნა გაიგზავნა!");
    }

    function toggleMenu(id) {
        document.querySelectorAll('.dropdown-panel').forEach(m => m.style.display = (m.id === id && m.style.display !== 'block' ? 'block' : 'none'));
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function toggleEmojis() { const p = document.getElementById('emoji-panel'); p.style.display = (p.style.display === 'grid' ? 'none' : 'grid'); }

    function hearts() {
        setInterval(() => {
            const h = document.createElement('div'); h.className = 'heart'; h.innerHTML = '❤';
            h.style.left = Math.random() * 100 + 'vw'; h.style.animationDuration = (Math.random() * 5 + 6) + 's';
            document.getElementById('hearts-bg').appendChild(h);
            setTimeout(() => h.remove(), 10000);
        }, 1300);
    }

    init();
</script>

</body>
</html>
