<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OldMafia Premium Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #800020; /* შინდისფერი */
            --bg: #fff5f5; /* კრემისფერი */
            --card: #ffffff;
            --text: #333;
            --shadow: rgba(128, 0, 32, 0.2);
        }

        body.dark-mode {
            --bg: #1a0005; /* შავი შინდისფერში */
            --card: #2d000a;
            --text: #ffe0e0;
            --shadow: rgba(0, 0, 0, 0.7);
        }

        body {
            margin: 0; font-family: 'Helvetica', sans-serif;
            background-color: var(--bg); color: var(--text);
            transition: 0.3s; overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }

        /* --- ანიმაციური გულები --- */
        .hearts-container { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .heart { position: absolute; bottom: -50px; font-size: 50px; color: var(--primary); opacity: 0.5; animation: float 8s linear infinite; }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* --- ზედა მთავარი ბარი --- */
        .top-navbar {
            background: var(--primary);
            padding: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .nav-item {
            color: white; cursor: pointer; font-weight: bold; font-size: 14px;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }

        /* --- ჩამოსაშლელი პანელები --- */
        .dropdown-panel {
            position: absolute; top: 60px; left: 5%; width: 90%; 
            background: var(--card); border: 2px solid var(--primary);
            border-radius: 15px; padding: 15px; display: none;
            box-shadow: 0 10px 30px var(--shadow); z-index: 99;
            max-height: 70vh; overflow-y: auto;
        }

        /* --- ჩატის სივრცე --- */
        .main-chat { flex: 1; display: flex; flex-direction: column; padding: 15px; z-index: 1; }
        #messages-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }

        .msg {
            max-width: 70%; padding: 12px; border-radius: 15px; 
            background: var(--card); box-shadow: 5px 5px 15px var(--shadow);
            display: flex; gap: 10px; border-left: 4px solid var(--primary);
        }

        .my-msg { align-self: flex-end; border-left: none; border-right: 4px solid var(--primary); }

        /* --- საწერი ზოლი --- */
        .input-area {
            display: flex; gap: 10px; background: var(--card);
            padding: 12px; border-radius: 30px; border: 2px solid var(--primary);
            box-shadow: 0 -5px 15px var(--shadow);
        }

        input { flex: 1; border: none; background: transparent; color: inherit; outline: none; }

        .avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }

        /* პატარა წითელი წერტილი მესენჯერზე */
        .badge { background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
    </style>
</head>
<body>

<div class="hearts-container" id="hearts-bg"></div>

<div class="top-navbar">
    <div class="nav-item" onclick="toggleMenu('rooms-menu')">🏠 <span>ოთახები</span></div>
    <div class="nav-item" onclick="toggleMenu('friends-menu')">👥 <span>მეგობრები</span></div>
    <div class="nav-item" onclick="toggleMenu('messenger-menu')">💬 <span>მესენჯერი <b class="badge" id="dm-count">0</b></span></div>
    <div class="nav-item" onclick="toggleMenu('profile-menu')">👤 <span>პროფილი</span></div>
    <div class="nav-item" onclick="toggleDarkMode()">🌓 <span>რეჟიმი</span></div>
</div>

<div id="rooms-menu" class="dropdown-panel">
    <h3>აირჩიე ოთახი</h3>
    <div id="room-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
</div>

<div id="friends-menu" class="dropdown-panel">
    <h3>მეგობრები და ხალხი</h3>
    <div id="user-list"></div>
</div>

<div id="messenger-menu" class="dropdown-panel">
    <h3>პირადი შეტყობინებები</h3>
    <div id="dm-list">არ არის ახალი სმს</div>
</div>

<div id="profile-menu" class="dropdown-panel" style="text-align: center;">
    <img id="my-avatar" class="avatar" style="width: 80px; height: 80px;">
    <h2 id="my-name">სახელი</h2>
    <p id="my-status-text">ჩემი სტატუსი...</p>
    <button onclick="alert('ფოტოს შეცვლა')" style="padding: 10px; background: var(--primary); color: white; border: none; border-radius: 10px;">შეცვლა</button>
</div>

<div class="main-chat">
    <div id="messages-box"></div>

    <div class="input-area">
        <button style="background: none; border: none; font-size: 20px; cursor: pointer;">😊</button>
        <input type="text" id="chat-input" placeholder="დაწერე მესიჯი...">
        <button onclick="send()" style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer;">გაგზავნა</button>
    </div>
</div>

<script>
    const S_URL = 'https://ftfciebnywbondaiarnc.supabase.co';
    const S_KEY = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
    const sb = supabase.createClient(S_URL, S_KEY);

    let currentRoom = 1;
    let myUser = null;

    // --- მენიუების მართვა ---
    function toggleMenu(id) {
        const menus = document.querySelectorAll('.dropdown-panel');
        menus.forEach(m => {
            if(m.id === id) {
                m.style.display = (m.style.display === 'block' ? 'none' : 'block');
            } else {
                m.style.display = 'none';
            }
        });
    }

    // --- თემის შეცვლა ---
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
    }

    // --- ინიციალიზაცია ---
    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return;
        
        let { data: p } = await sb.from('profiles').select('*').eq('id', user.id).single();
        myUser = p;
        document.getElementById('my-avatar').src = p.avatar_url || 'https://via.placeholder.com/80';
        document.getElementById('my-name').innerText = p.username;

        createRooms();
        loadMessages();
        loadUsers();
        hearts();
        
        // Realtime მოსმენა
        sb.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, () => loadMessages()).subscribe();
    }

    function createRooms() {
        const list = document.getElementById('room-list');
        for(let i=1; i<=12; i++) {
            const btn = document.createElement('div');
            btn.style = "padding: 15px; background: var(--primary); color: white; border-radius: 10px; text-align: center; cursor: pointer;";
            btn.innerText = "ოთახი " + i;
            btn.onclick = () => { currentRoom = i; loadMessages(); toggleMenu('rooms-menu'); };
            list.appendChild(btn);
        }
    }

    async function loadMessages() {
        const { data } = await sb.from('messages').select('*, profiles(username, avatar_url, role)').eq('room_id', currentRoom).order('created_at', {ascending: true});
        const box = document.getElementById('messages-box');
        box.innerHTML = '';
        data.forEach(m => {
            const isMe = m.user_id === myUser.id;
            box.innerHTML += `
                <div class="msg ${isMe ? 'my-msg' : ''}">
                    <img src="${m.profiles.avatar_url || 'https://via.placeholder.com/35'}" class="avatar">
                    <div>
                        <small><b>${m.profiles.username}</b></small>
                        <div>${m.content}</div>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const inp = document.getElementById('chat-input');
        if(!inp.value) return;
        await sb.from('messages').insert([{ content: inp.value, user_id: myUser.id, room_id: currentRoom }]);
        inp.value = '';
    }

    function hearts() {
        setInterval(() => {
            const h = document.createElement('div'); h.className = 'heart'; h.innerHTML = '❤';
            h.style.left = Math.random() * 100 + 'vw'; h.style.animationDuration = (Math.random() * 4 + 6) + 's';
            document.getElementById('hearts-bg').appendChild(h);
            setTimeout(() => h.remove(), 8000);
        }, 1000);
    }

    init();
</script>

</body>
</html>
