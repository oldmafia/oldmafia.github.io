<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Old Mafia - Supabase ჩატი</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body {
            --bg: #0a0508; --text: #f0e6e8; --card: #1a0f12; --border: #4a1a2a;
            --accent: #8b0000; --input: #1f1216;
            background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
        }
        body.day-mode { --bg: #fff5f0; --text: #2c1a1a; --card: #ffffff; --border: #e6b8a2; --accent: #8b0000; --input: #fffaf5; }
        
        .nav-bar { display: flex; justify-content: space-around; background: #120a0c; padding: 10px 0; border-bottom: 2px solid var(--accent); flex-wrap: wrap; }
        .nav-btn { font-size: 22px; background: none; border: none; color: #aa8a8a; cursor: pointer; padding: 5px 12px; border-radius: 30px; }
        .nav-btn.active { color: var(--accent); background: rgba(139,0,0,0.2); }
        
        .pages { flex: 1; position: relative; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; display: none; padding: 12px; }
        .page.active { display: block; }
        .section-title { font-size: 18px; margin-bottom: 12px; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; }
        
        .room-card { background: var(--card); padding: 14px; margin-bottom: 8px; border-radius: 10px; border-left: 4px solid var(--accent); cursor: pointer; display: flex; gap: 12px; align-items: center; }
        .room-card:active { background: var(--accent-dark); }
        .room-icon { font-size: 28px; }
        
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-header { background: var(--card); padding: 12px; display: flex; justify-content: space-between; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .close-btn { color: var(--accent); font-size: 24px; cursor: pointer; background: none; border: none; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .message { background: var(--card); padding: 8px 12px; border-radius: 12px; max-width: 80%; align-self: flex-start; border: 1px solid var(--border); position: relative; }
        .message.own { align-self: flex-end; background: var(--accent); border: none; }
        .message-name { font-size: 11px; font-weight: bold; color: var(--accent); }
        .message.own .message-name { color: white; }
        .message-time { font-size: 9px; opacity: 0.6; margin-left: 5px; }
        .message-text { font-size: 14px; margin-top: 4px; word-break: break-word; }
        .delete-msg { position: absolute; right: 5px; top: 5px; background: none; border: none; color: #ff6666; cursor: pointer; font-size: 10px; opacity: 0; transition: 0.2s; }
        .message:hover .delete-msg { opacity: 1; }
        
        .chat-input-area { background: var(--card); padding: 10px; display: flex; gap: 8px; margin-top: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .chat-input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid var(--accent); background: var(--input); color: var(--text); }
        .send-btn { background: var(--accent); border: none; color: white; width: 44px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        
        .user-item { background: var(--card); padding: 12px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); position: relative; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; object-fit: cover; }
        .user-name { font-weight: bold; font-size: 16px; }
        .user-status { font-size: 11px; opacity: 0.7; }
        
        .profile-card { text-align: center; padding: 20px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto; cursor: pointer; object-fit: cover; }
        .status-input { width: 80%; margin-top: 15px; padding: 10px; border-radius: 25px; border: 1px solid var(--accent); background: var(--input); color: var(--text); text-align: center; }
        .upload-btn { background: var(--accent); border: none; color: white; padding: 10px; border-radius: 25px; margin: 10px 0; cursor: pointer; width: 100%; }
        
        .empty-state { text-align: center; padding: 40px; opacity: 0.5; }
        .notification { position: fixed; top: 70px; right: 10px; background: var(--accent); color: white; padding: 8px 15px; border-radius: 20px; z-index: 5000; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .heart { position: fixed; bottom: 0; font-size: 22px; pointer-events: none; animation: floatUp 4s forwards; z-index: 9999; }
        @keyframes floatUp { 0% { bottom: 0; opacity: 1; } 100% { bottom: 100%; opacity: 0; transform: translateX(30px); } }
        
        .current-user-bar {
            background: var(--accent); color: white; padding: 5px 15px; font-size: 14px; text-align: center; font-weight: bold;
        }
        
        .pm-chat-container { position: fixed; bottom: 20px; right: 20px; width: 320px; max-width: calc(100% - 40px); height: 450px; background: var(--card); border: 2px solid var(--accent); border-radius: 16px; display: flex; flex-direction: column; z-index: 2000; }
        .pm-header { background: var(--accent); padding: 10px 12px; display: flex; justify-content: space-between; border-radius: 14px 14px 0 0; cursor: pointer; }
        .pm-messages { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .pm-message { background: var(--input); padding: 6px 10px; border-radius: 12px; max-width: 85%; align-self: flex-start; }
        .pm-message.own { align-self: flex-end; background: var(--accent); }
        .pm-input-area { display: flex; padding: 8px; gap: 8px; border-top: 1px solid var(--border); }
        .pm-input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid var(--accent); background: var(--input); color: var(--text); }
    </style>
</head>
<body>
    <div class="current-user-bar" id="userBar">🔄 მზადდება...</div>
    
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="friends">👥</button>
        <button class="nav-btn" data-page="online">🌐</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeToggle">🌙</button>
    </div>

    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 12 სათამაშო ოთახი</div>
            <div id="roomsList"></div>
        </div>
        <div id="messagesPage" class="page"><div class="section-title">💬 პირადი მიმოწერა</div><div id="pmList"></div></div>
        <div id="friendsPage" class="page"><div class="section-title">👥 ჩემი მეგობრები</div><div id="friendsList"></div></div>
        <div id="onlinePage" class="page"><div class="section-title">🌐 ყველა მომხმარებელი</div><div id="onlineList"></div></div>
        <div id="profilePage" class="page">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()">👤</div>
                <h2 id="profileName"></h2>
                <input type="text" id="statusInput" class="status-input" placeholder="სტატუსი...">
                <button class="upload-btn" onclick="saveStatus()">💾 სტატუსის შენახვა</button>
                <input type="file" id="avatarInput" hidden accept="image/*" onchange="uploadAvatar(this)">
            </div>
        </div>
        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-header"><span class="chat-room-name" id="chatRoomName">ოთახი</span><button class="close-btn" onclick="closeChat()">✕</button></div>
                <div id="chatMessages" class="messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>
    <div id="hearts"></div>
    <div id="pmContainer"></div>

    <script>
        // ============ SUPABASE კონფიგურაცია ============
        // 🔴🔴🔴 ჩაწერეთ თქვენი Supabase URL და ANON KEY აქ! 🔴🔴🔴
        const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";  // შეცვალეთ!!!
        const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";  // შეცვალეთ!!!
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ============ მომხმარებლები ============
        let currentUser = null;
        let currentRoom = null;
        let currentPMUser = null;
        let usersList = [];
        let messagesChannel = null;
        const OWNER = "Abu007";
        
        const ROOMS = [
            { icon: "☕", name: "კაფე-ბარი" }, { icon: "🎲", name: "ნარდი" }, { icon: "🃏", name: "ჯოკერი" },
            { icon: "💎", name: "VIP" }, { icon: "📝", name: "ფორუმი" }, { icon: "🛠️", name: "ადმინები" },
            { icon: "😂", name: "იუმორი" }, { icon: "🏆", name: "შიფროგრამა" }, { icon: "🎭", name: "გამოძიება" },
            { icon: "🎵", name: "მუსიკა" }, { icon: "⁉️", name: "ვიქტორინა" }, { icon: "🆘", name: "დახმარება" }
        ];
        
        // ============ ინიციალიზაცია ============
        async function init() {
            let savedUser = localStorage.getItem('mafia_current_user');
            
            // ჩატვირთე მომხმარებლები users ცხრილიდან
            const { data: users, error } = await supabase.from('users').select('*');
            
            if (error) {
                console.error("მომხმარებლების ჩატვირთვის შეცდომა:", error);
                document.getElementById('userBar').innerHTML = "❌ Supabase-თან კავშირის შეცდომა! შეამოწმეთ URL და KEY";
                showNotification("❌ Supabase-თან კავშირის შეცდომა!");
                return;
            }
            
            usersList = users || [];
            
            if (usersList.length === 0) {
                // თუ ბაზა ცარიელია, შექმენი საწყისი მომხმარებლები
                const defaultUsers = [
                    { username: "Abu007", status: "👑 დამფუძნებელი", avatar: null, role: "owner" },
                    { username: "Lukinio", status: "🔧 ადმინი", avatar: null, role: "admin" },
                    { username: "Giorgi", status: "ონლაინ", avatar: null, role: "user" },
                    { username: "Nika", status: "ონლაინ", avatar: null, role: "user" }
                ];
                
                for (const u of defaultUsers) {
                    await supabase.from('users').insert(u);
                }
                
                const { data: newUsers } = await supabase.from('users').select('*');
                usersList = newUsers || [];
            }
            
            // მომხმარებლის არჩევა
            if (savedUser && usersList.find(u => u.username === savedUser)) {
                currentUser = savedUser;
            } else {
                currentUser = usersList[0]?.username || "Abu007";
            }
            
            localStorage.setItem('mafia_current_user', currentUser);
            
            document.getElementById('userBar').innerHTML = `👤 მიმდინარე მომხმარებელი: ${currentUser} ${currentUser === OWNER ? '👑' : ''}`;
            document.getElementById('profileName').innerHTML = currentUser;
            
            const currentUserData = usersList.find(u => u.username === currentUser);
            if (currentUserData?.avatar) {
                document.getElementById('profileAvatar').style.backgroundImage = `url(${currentUserData.avatar})`;
                document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                document.getElementById('profileAvatar').innerHTML = '';
            }
            if (currentUserData?.status) {
                document.getElementById('statusInput').value = currentUserData.status;
            }
            
            // გაუშვი Realtime listener messages ცხრილზე
            setupRealtimeMessages();
            
            renderRooms();
            renderOnlineUsers();
            renderPrivateChatsList();
            startHearts();
            
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => showPage(btn.getAttribute('data-page')));
            });
            
            showPage('home');
            console.log("✅ Supabase ჩატი გაშვებულია, მომხმარებელი:", currentUser);
        }
        
        // ============ REALTIME შეტყობინებები ============
        function setupRealtimeMessages() {
            if (messagesChannel) {
                supabase.removeChannel(messagesChannel);
            }
            
            messagesChannel = supabase
                .channel('messages-channel')
                .on('postgres_changes', 
                    { event: 'INSERT', schema: 'public', table: 'messages' },
                    (payload) => {
                        const newMsg = payload.new;
                        if (currentRoom && newMsg.room === currentRoom) {
                            addMessageToDOM(newMsg);
                        }
                        console.log("📨 ახალი შეტყობინება:", newMsg);
                    }
                )
                .on('postgres_changes',
                    { event: 'DELETE', schema: 'public', table: 'messages' },
                    () => {
                        if (currentRoom) {
                            loadMessages(currentRoom);
                        }
                    }
                )
                .subscribe();
        }
        
        async function loadMessages(roomName) {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .eq('room', roomName)
                .order('created_at', { ascending: true });
            
            if (error) {
                console.error("შეტყობინებების ჩატვირთვის შეცდომა:", error);
                return;
            }
            
            renderMessagesList(data || []);
        }
        
        function renderMessagesList(messagesData) {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            
            if (messagesData.length === 0) {
                container.innerHTML = '<div class="empty-state">💬 შეტყობინებები არ არის</div>';
                return;
            }
            
            container.innerHTML = messagesData.map(msg => {
                const isOwn = msg.username === currentUser;
                const canDelete = currentUser === OWNER || usersList.find(u => u.username === currentUser)?.role === 'admin';
                const timeStr = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                return `<div class="message ${isOwn ? 'own' : ''}" data-id="${msg.id}">
                    <div><span class="message-name">${escapeHtml(msg.username)}</span><span class="message-time">${timeStr}</span></div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    ${canDelete ? `<button class="delete-msg" onclick="deleteMessage('${msg.id}')">🗑️</button>` : ''}
                </div>`;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }
        
        function addMessageToDOM(msg) {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            
            const isOwn = msg.username === currentUser;
            const canDelete = currentUser === OWNER || usersList.find(u => u.username === currentUser)?.role === 'admin';
            const timeStr = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const msgHtml = `<div class="message ${isOwn ? 'own' : ''}" data-id="${msg.id}">
                <div><span class="message-name">${escapeHtml(msg.username)}</span><span class="message-time">${timeStr}</span></div>
                <div class="message-text">${escapeHtml(msg.text)}</div>
                ${canDelete ? `<button class="delete-msg" onclick="deleteMessage('${msg.id}')">🗑️</button>` : ''}
            </div>`;
            
            if (container.innerHTML.includes('შეტყობინებები არ არის')) {
                container.innerHTML = msgHtml;
            } else {
                container.insertAdjacentHTML('beforeend', msgHtml);
            }
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendMessage() {
            if (!currentRoom) {
                showNotification('ჯერ ოთახი არ არის არჩეული!');
                return;
            }
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const { error } = await supabase.from('messages').insert({
                username: currentUser,
                text: text,
                room: currentRoom,
                created_at: new Date().toISOString()
            });
            
            if (error) {
                console.error("შეტყობინების გაგზავნის შეცდომა:", error);
                showNotification("❌ შეტყობინების გაგზავნა ვერ მოხერხდა!");
            } else {
                input.value = '';
                console.log("✅ შეტყობინება გაიგზავნა");
            }
        }
        
        async function deleteMessage(msgId) {
            const canDelete = currentUser === OWNER || usersList.find(u => u.username === currentUser)?.role === 'admin';
            if (!canDelete) {
                showNotification('❌ შეტყობინების წაშლა მხოლოდ ადმინს შეუძლია!');
                return;
            }
            
            const { error } = await supabase.from('messages').delete().eq('id', msgId);
            if (error) {
                console.error("წაშლის შეცდომა:", error);
                showNotification("❕ წაშლა ვერ მოხერხდა");
            } else {
                showNotification("✅ შეტყობინება წაიშალა");
                if (currentRoom) loadMessages(currentRoom);
            }
        }
        
        // ============ ოთახები ============
        function renderRooms() {
            const container = document.getElementById('roomsList');
            container.innerHTML = ROOMS.map(room => `
                <div class="room-card" onclick="openRoom('${room.name}')">
                    <span class="room-icon">${room.icon}</span>
                    <span>${room.name}</span>
                </div>
            `).join('');
        }
        
        async function openRoom(roomName) {
            currentRoom = roomName;
            document.getElementById('chatRoomName').innerHTML = `📡 ${roomName}`;
            showPage('chat');
            await loadMessages(roomName);
        }
        
        function closeChat() { currentRoom = null; showPage('home'); }
        
        // ============ მომხმარებლები ============
        async function saveStatus() {
            const newStatus = document.getElementById('statusInput').value;
            const { error } = await supabase
                .from('users')
                .update({ status: newStatus })
                .eq('username', currentUser);
            
            if (error) {
                console.error("სტატუსის განახლების შეცდომა:", error);
            } else {
                showNotification('✅ სტატუსი განახლდა!');
                renderOnlineUsers();
            }
        }
        
        function uploadAvatar(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const { error } = await supabase
                        .from('users')
                        .update({ avatar: e.target.result })
                        .eq('username', currentUser);
                    
                    if (!error) {
                        document.getElementById('profileAvatar').style.backgroundImage = `url(${e.target.result})`;
                        document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                        document.getElementById('profileAvatar').innerHTML = '';
                        renderOnlineUsers();
                        showNotification('✅ ავატარი განახლდა!');
                    }
                };
                reader.readAsDataURL(file);
            }
        }
        
        async function renderOnlineUsers() {
            const { data, error } = await supabase.from('users').select('*').neq('username', currentUser);
            if (error) return;
            
            const container = document.getElementById('onlineList');
            container.innerHTML = (data || []).map(user => `
                <div class="user-item" onclick="showUserProfile('${user.username}')">
                    <div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(user.username)} ${user.role === 'owner' ? '👑' : (user.role === 'admin' ? '🔧' : '')}</div><div class="user-status">${escapeHtml(user.status || 'ონლაინ')}</div></div>
                </div>
            `).join('');
            if ((data || []).length === 0) container.innerHTML = '<div class="empty-state">მომხმარებლები არ არიან</div>';
        }
        
        function showUserProfile(username) {
            const user = usersList.find(u => u.username === username);
            if (user) {
                showNotification(`👤 ${user.username}: ${user.status || 'ონლაინ'}`);
            }
        }
        
        // ============ პირადი მიმოწერა (direct_messages ცხრილი) ============
        function openPrivateChat(username) {
            if (username === currentUser) return;
            currentPMUser = username;
            renderPrivateChat();
        }
        
        function renderPrivateChat() {
            if (!currentPMUser) return;
            const pmHtml = `<div class="pm-chat-container" id="pmChatWindow">
                <div class="pm-header" onclick="closePM()"><span>💬 ${escapeHtml(currentPMUser)}</span><span>✕</span></div>
                <div class="pm-messages" id="pmMessages"><div class="empty-state">მიმოწერა ცარიელია</div></div>
                <div class="pm-input-area">
                    <input type="text" id="pmInput" class="pm-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()">
                    <button class="send-btn" style="width:40px; height:40px;" onclick="sendPM()">➤</button>
                </div>
            </div>`;
            document.getElementById('pmContainer').innerHTML = pmHtml;
            loadPrivateMessages();
        }
        
        async function loadPrivateMessages() {
            if (!currentPMUser) return;
            const { data, error } = await supabase
                .from('direct_messages')
                .select('*')
                .or(`and(from_user.eq.${currentUser},to_user.eq.${currentPMUser}),and(from_user.eq.${currentPMUser},to_user.eq.${currentUser})`)
                .order('created_at', { ascending: true });
            
            if (error) {
                console.error("პირადი შეტყობინებების ჩატვირთვის შეცდომა:", error);
                return;
            }
            
            const container = document.getElementById('pmMessages');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-state">მიმოწერა ცარიელია</div>';
                return;
            }
            
            container.innerHTML = data.map(msg => `
                <div class="pm-message ${msg.from_user === currentUser ? 'own' : ''}">
                    <div style="font-size:9px;">${new Date(msg.created_at).toLocaleTimeString()}</div>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendPM() {
            const input = document.getElementById('pmInput');
            const text = input.value.trim();
            if (!text || !currentPMUser) return;
            
            const { error } = await supabase.from('direct_messages').insert({
                from_user: currentUser,
                to_user: currentPMUser,
                text: text,
                created_at: new Date().toISOString()
            });
            
            if (!error) {
                input.value = '';
                loadPrivateMessages();
                renderPrivateChatsList();
            } else {
                console.error("PM გაგზავნის შეცდომა:", error);
                showNotification("❌ შეტყობინების გაგზავნა ვერ მოხერხდა!");
            }
        }
        
        function closePM() {
            document.getElementById('pmContainer').innerHTML = '';
            currentPMUser = null;
        }
        
        async function renderPrivateChatsList() {
            const { data, error } = await supabase
                .from('direct_messages')
                .select('*')
                .or(`from_user.eq.${currentUser},to_user.eq.${currentUser}`);
            
            if (error) return;
            
            const usersSet = new Set();
            (data || []).forEach(msg => {
                const other = msg.from_user === currentUser ? msg.to_user : msg.from_user;
                usersSet.add(other);
            });
            
            const container = document.getElementById('pmList');
            if (usersSet.size === 0) {
                container.innerHTML = '<div class="empty-state">ჯერ არ გქონია მიმოწერა</div>';
                return;
            }
            
            container.innerHTML = Array.from(usersSet).map(username => `
                <div class="user-item" onclick="openPrivateChat('${username}')">
                    <div class="user-avatar">${username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(username)}</div></div>
                </div>
            `).join('');
        }
        
        // ============ დამხმარე ============
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-page') === pageName) btn.classList.add('active');
            });
            if (pageName === 'online') renderOnlineUsers();
            if (pageName === 'messages') renderPrivateChatsList();
            if (pageName === 'friends') {
                document.getElementById('friendsList').innerHTML = '<div class="empty-state">მალე დაემატება</div>';
            }
            if (pageName === 'profile') {
                const user = usersList.find(u => u.username === currentUser);
                if (user?.status) document.getElementById('statusInput').value = user.status;
            }
        }
        
        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2500);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️', '💖', '💗', '💕'][Math.floor(Math.random()*4)];
                heart.style.left = Math.random() * 90 + '%';
                document.getElementById('hearts').appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 2000);
        }
        
        function toggleTheme() {
            document.body.classList.toggle('day-mode');
            const btn = document.getElementById('themeToggle');
            btn.innerHTML = document.body.classList.contains('day-mode') ? '☀️' : '🌙';
        }
        
        // გაშვება
        init();
    </script>
</body>
</html>
