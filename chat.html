<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>პირადი - Abu007</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #050000; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { padding: 12px; text-align: center; border-bottom: 1px solid #200; background: #000; display: flex; align-items: center; justify-content: space-between; }
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 100px; display: none; }
        .active { display: block !important; }

        /* მესიჯების სტილი */
        .msg-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: flex-end; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; border: 1px solid #333; object-fit: cover; cursor: pointer; }
        .bubble { background: #0d0d0d; border: 1px solid #222; padding: 10px; border-radius: 12px; max-width: 80%; position: relative; }
        .nick { font-weight: bold; font-size: 13px; color: #ff0000; margin-bottom: 4px; display: block; cursor: pointer; }
        .txt { font-size: 14px; color: #eee; word-break: break-word; }
        .del-x { color: #f00; cursor: pointer; font-weight: bold; margin-left: 8px; font-size: 12px; }

        /* პროფილის მოდალი */
        #profile-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #000; width: 90%; max-width: 340px; border: 2px solid #500; border-radius: 20px; padding: 25px; text-align: center; }
        .m-ava { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #f00; margin-bottom: 10px; }
        .m-btn { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; border: 1px solid #333; background: #0a0a0a; color: white; cursor: pointer; font-size: 14px; font-weight: bold; }

        /* სმაილების დაფა */
        #emoji-picker { position: fixed; bottom: 85px; left: 10px; right: 10px; background: #000; border: 2px solid #500; border-radius: 15px; padding: 10px; display: none; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; z-index: 9999; max-height: 200px; overflow-y: auto; }
        .emoji-img { width: 100%; cursor: pointer; }

        /* ქვედა ზოლი */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #111; display: none; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: #080808; border: 1px solid #200; color: white; padding: 12px 18px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 22px;">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold;">პირადი</div>
    <div onclick="location.reload()" style="cursor:pointer;">🔄</div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div id="profile-modal" onclick="closeProfile()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="m-ava" src="" class="m-ava">
        <h2 id="m-nick" style="color:red; margin:5px 0;"></h2>
        <div id="m-role-text" style="font-size:13px; color:#888; margin-bottom:15px;">👤 მომხმარებელი</div>
        
        <div class="m-btn" style="background:#003333;" onclick="closeProfile()">✉ მიმოწერა</div>
        
        <div id="admin-controls" style="display:none;">
            <div class="m-btn" onclick="updateRole('ადმინი')">🛡 ადმინად დანიშვნა</div>
            <div class="m-btn" onclick="updateRole('დამფუძნებელი')">👑 დამფუძნებლად დანიშვნა</div>
            <div class="m-btn" onclick="updateRole('მომხმარებელი')">✨ როლის ჩახსნა</div>
            <div class="m-btn" style="color:#f33; border-color:#500;">🚫 დაბლოკვა (BAN)</div>
        </div>

        <div class="m-btn" onclick="closeProfile()" style="margin-top:10px; background:#111;">დახურვა</div>
    </div>
</div>

<div class="bottom-bar" id="input-bar">
    <div onclick="toggleEmojis()" style="font-size:28px; cursor:pointer">😊</div>
    <input type="text" id="main-input" class="input-box" placeholder="დაწერე მესიჯი...">
    <div onclick="sendMsg()" style="font-size:28px; cursor:pointer; color:red">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    let activeUser = new URLSearchParams(window.location.search).get('to');
    let uCache = {};

    function parseBB(t) { return t.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:100px; border-radius:5px; display:block; margin-top:5px;">'); }

    async function init() {
        const { data } = await _s.from('profiles').select('*');
        data?.forEach(u => uCache[u.username] = u);
        if (activeUser) openChat(activeUser); else loadInbox();
    }

    async function loadInbox() {
        const { data } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const box = document.getElementById('inbox-view'); box.innerHTML = "";
        const partners = new Set();
        data?.forEach(m => partners.add(m.sender === myNick ? m.receiver : m.sender));
        partners.forEach(p => {
            const u = uCache[p] || {};
            box.innerHTML += `<div style="display:flex; padding:15px; border-bottom:1px solid #111; align-items:center; cursor:pointer" onclick="openChat('${p}')">
                <img src="${u.avatar_url}" class="avatar">
                <b style="color:red; margin-left:15px;">${p}</b>
            </div>`;
        });
    }

    async function openChat(p) {
        activeUser = p; document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').style.display = 'none';
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex';
        loadMessages();
    }

    async function loadMessages() {
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeUser}"),and(sender.eq."${activeUser}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const area = document.getElementById('chat-view'); area.innerHTML = "";
        data?.forEach(m => {
            const u = uCache[m.sender] || {};
            area.innerHTML += `<div class="msg-row">
                <img src="${u.avatar_url}" class="avatar" onclick="showUser('${m.sender}')">
                <div class="bubble">
                    <span class="nick" onclick="showUser('${m.sender}')">${m.sender}</span>
                    <div class="txt">${parseBB(m.text)}</div>
                    ${myNick === 'Abu007' ? `<span class="del-x" onclick="deleteMsg('${m.id}')">✖</span>` : ''}
                </div>
            </div>`;
        });
        area.scrollTop = area.scrollHeight;
    }

    function showUser(n) {
        const u = uCache[n]; if(!u) return;
        document.getElementById('m-nick').innerText = u.username;
        document.getElementById('m-ava').src = u.avatar_url;
        document.getElementById('m-role-text').innerText = u.role || 'მომხმარებელი';

        // მხოლოდ შენთვის (Abu007) ჩანს ღილაკები
        document.getElementById('admin-controls').style.display = (myNick === 'Abu007') ? 'block' : 'none';
        document.getElementById('profile-modal').style.display = 'flex';
    }

    async function updateRole(r) {
        const target = document.getElementById('m-nick').innerText;
        await _s.from('profiles').update({ role: r }).eq('username', target);
        alert("როლი განახლდა!"); location.reload();
    }

    async function toggleEmojis() {
        const p = document.getElementById('emoji-picker');
        if (p.style.display === 'grid') { p.style.display = 'none'; return; }
        const { data } = await _s.from('emojis').select('*');
        p.innerHTML = data.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('');
        p.style.display = 'grid';
    }

    // სმაილების ჩამატება
    function addEmoji(url) {
        const inp = document.getElementById('main-input');
        if (inp) {
            inp.value += ` [img]${url}[/img] `;
            document.getElementById('emoji-picker').style.display = 'none';
            inp.focus();
        }
    }

    async function sendMsg() {
        const inp = document.getElementById('main-input');
        if (!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeUser, text: inp.value }]);
        inp.value = ""; loadMessages();
    }

    async function deleteMsg(id) {
        if(confirm("წავშალოთ მესიჯი?")) { await _s.from('private_messages').delete().eq('id', id); loadMessages(); }
    }

    function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }
    function goBack() { if(activeUser) { activeUser = null; location.href = 'pm.html'; } else { location.href = 'chat.html'; } }
    window.onload = init;
</script>
</body>
</html>
