                case 'messages':

                    break;
                case 'online':
                    targetPage = document.getElementById('onlinePage');
                    break;
                case 'profile':

            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');

            // ნავიგაციის ღილაკების განახლება
            document.querySelectorAll('.nav-btn').forEach(btn => {

                }
            });
        }

        // ოთახის გახსნა

        // შეტყობინებების ჩატვირთვა

        async function loadProfile() {

        // ონლაინ მომხმარებლები
        async function loadOnlineUsers() {
            const { data } = await supabase
                .from('profiles')
                .select('*')
                .eq('username', myNick)
                .maybeSingle();
                .limit(30);

            if (data) {
                if (data.avatar_url) document.getElementById('myAva').src = data.avatar_url;
                if (document.getElementById('dispStatus')) document.getElementById('dispStatus').value = data.status || "";
                if (document.getElementById('userId')) document.getElementById('userId').innerText = data.id ? data.id.substring(0, 8) : "000";
            }
            document.getElementById('profileNick').innerText = myNick;
        }
        
        async function doAvaUpload() {
            const file = document.getElementById('avaUp').files[0];
            if (!file) return;
            
            const path = `avatars/${myNick}_${Date.now()}.png`;
            await supabase.storage.from('avatars').upload(path, file);
            const { data } = supabase.storage.from('avatars').getPublicUrl(path);
            await supabase.from('profiles').update({ avatar_url: data.publicUrl }).eq('username', myNick);
            document.getElementById('myAva').src = data.publicUrl;
        }
        
        async function updateStatus() {
            const status = document.getElementById('dispStatus').value;
            await supabase.from('profiles').update({ status }).eq('username', myNick);

        async function loadOnline() {
            const { data } = await supabase.from('profiles').select('*').limit(50);
            const container = document.getElementById('onlineList');
            if (!container) return;

            if (!data || data.length === 0) {

                    <div class="row-info">
                <div class="user-item" onclick="alert('${user.username}')">
                    <div class="user-avatar">👤</div>
                    <div class="user-info">
                        <b>${escapeHtml(user.username)}</b>

        async function loadPMHistory() {

        // პროფილის ჩატვირთვა
        async function loadProfile() {
            document.getElementById('profileName').innerHTML = currentUser;
            
            const { data } = await supabase
                .from('direct_messages')
                .from('profiles')
                .select('*')
                .or(`sender.eq.${myNick},receiver.eq.${myNick}`)
                .order('created_at', { ascending: false })
                .limit(100);
                .eq('username', currentUser)
                .maybeSingle();

            const container = document.getElementById('pmHistoryList');
            if (!container) return;
            
            const partners = new Map();
            data?.forEach(msg => {
                const partner = msg.sender === myNick ? msg.receiver : msg.sender;
                if (!partners.has(partner)) partners.set(partner, msg.text);
            });
            
            if (partners.size === 0) {
                container.innerHTML = '<div class="empty-state">ჯერ არ გქონია მიმოწერა</div>';
                return;
            if (data) {
                if (data.status) {
                    document.getElementById('statusText').value = data.status;
                }
                if (data.id) {
                    document.getElementById('userId').innerHTML = data.id.substring(0, 8);
                }
            }
            
            container.innerHTML = Array.from(partners.entries()).map(([partner, lastMsg]) => `
                <div class="row" onclick="alert('💬 პირადი მიმოწერა ${partner}-თან')">
                    <div class="row-info">
                        <b>${escapeHtml(partner)}</b>
                        <span>${escapeHtml(lastMsg.substring(0, 35))}${lastMsg.length > 35 ? '...' : ''}</span>
                    </div>
                </div>
            `).join('');
        }
        

        // სტატუსის განახლება
        async function updateStatus() {
            const status = document.getElementById('statusText').value;
            await supabase
                .from('profiles')
                .update({ status: status })
                .eq('username', currentUser);
        }

        // ემოჯიების ჩატვირთვა
        async function loadEmojis() {
            const { data } = await supabase.from('custom_emojis').select('*');
            const board = document.getElementById('emojiBoard');
            if (!board) return;

            let html = '';
            if (admins.includes(myNick)) {
                html += `<div class="admin-plus" onclick="document.getElementById('emojiUp').click()">➕</div>`;
            }
            
            if (data && data.length > 0) {
                html += data.map(emoji => `
                    <img src="${emoji.emoji_url}" class="emoji-img" onclick="addEmoji('${emoji.emoji_url}')">
                `).join('');
            } else {
                const defaultEmojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳'];
                html += defaultEmojis.map(emoji => `
                    <div class="emoji-img" style="font-size: 32px; text-align: center; display: flex; align-items: center; justify-content: center;" onclick="addTextEmoji('${emoji}')">${emoji}</div>
                `).join('');
            }
            board.innerHTML = html;
        }
        
        function addEmoji(url) {
            const input = document.getElementById('msgInp');
            if (input) input.value += ` :img:${url}: `;
            toggleEmojiBoard();
        }
        
        function addTextEmoji(emoji) {
            const input = document.getElementById('msgInp');
            if (input) input.value += emoji;
            toggleEmojiBoard();
        }
        
        async function uploadEmoji() {
            const file = document.getElementById('emojiUp').files[0];
            if (!file) return;
            
            const path = `emojis/${Date.now()}.png`;
            await supabase.storage.from('avatars').upload(path, file);
            const { data } = supabase.storage.from('avatars').getPublicUrl(path);
            await supabase.from('custom_emojis').insert({ emoji_url: data.publicUrl });
            loadEmojis();
        }
        
        function openRoom(roomName) {
            currentRoom = roomName;
            document.getElementById('roomTitle').innerHTML = `📡 ${roomName}`;
            showPage('roomChatPage');
            loadRoomMsgs();
            const defaultEmojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺'];
            board.innerHTML = defaultEmojis.map(emoji => `
                <div class="emoji-item" onclick="addEmoji('${emoji}')">${emoji}</div>
            `).join('');
        }
        
        async function loadRoomMsgs() {
            if (!currentRoom) return;
            
            const { data } = await supabase
                .from('messages')
                .select('*')
                .eq('room_name', currentRoom)
                .order('created_at', { ascending: false })
                .limit(50);
                
            const container = document.getElementById('roomMsgs');
            if (!container) return;
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-state">შეტყობინებები ჯერ არ არის</div>';
                return;

        function addEmoji(emoji) {
            const input = document.getElementById('messageInput');
            if (input) {
                input.value += emoji;
            }
            
            container.innerHTML = data.reverse().map(msg => `
                <div class="message ${msg.username === myNick ? 'own' : ''}">
                    <b>${escapeHtml(msg.username)}</b>
                    <p>${formatMessage(msg.text)}</p>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
            toggleEmoji();
        }
        
        function formatMessage(text) {
            let formatted = escapeHtml(text);
            formatted = formatted.replace(/:img:(.*?):/g, '<img src="$1" style="width: 28px; vertical-align: middle;">');
            return formatted;

        function toggleEmoji() {
            const board = document.getElementById('emojiBoard');
            board.classList.toggle('active');
        }
        
        async function sendMsg() {
            const input = document.getElementById('msgInp');
            const text = input?.value.trim();
            if (!text || !currentRoom) return;
            
            await supabase.from('messages').insert({
                username: myNick,
                text: text,
                room_name: currentRoom
            });
            
            input.value = "";
            loadRoomMsgs();

        function formatMessage(text) {
            return escapeHtml(text);
        }
        

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        

        // გულების ანიმაცია
        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️', '💖', '💗', '💓', '💕'][Math.floor(Math.random() * 5)];
                heart.innerHTML = ['❤️', '💖', '💗', '💕'][Math.floor(Math.random() * 4)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (20 + Math.random() * 20) + 'px';
                document.getElementById('heartsContainer').appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
                heart.style.fontSize = (18 + Math.random() * 20) + 'px';
                document.getElementById('hearts').appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 2000);
        }
        

        // თემის შეცვლა
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            const root = document.documentElement;
            if (isDark) {
                root.style.setProperty('--bg', '#0a0c10');
                root.style.setProperty('--text', '#e6e9f0');
                root.style.setProperty('--card', '#151e2a');
                root.style.setProperty('--border', '#2a3440');
                document.getElementById('themeBtn').innerHTML = '🌙';
            } else {
                root.style.setProperty('--bg', '#fef8ef');
                root.style.setProperty('--text', '#2c2418');
                root.style.setProperty('--card', '#ffffff');
                root.style.setProperty('--border', '#ffe0b5');
                document.getElementById('themeBtn').innerHTML = '☀️';
            }
        }

        // ავატარის ატვირთვა
        document.getElementById('avatarInput')?.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            alert('ავატარის ატვირთვა დემო ვერსიაში');
        });

        // სტატუსის ავტომატური შენახვა
        let statusTimeout;
        document.getElementById('statusText')?.addEventListener('input', () => {
            clearTimeout(statusTimeout);
            statusTimeout = setTimeout(() => updateStatus(), 1000);
        });

        // Enter ღილაკით გაგზავნა
        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // რეალთაიმ აპდეითი
        supabase.channel('messages-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
                if (currentRoom) loadMessages();
            })
            .subscribe();

        // ინიციალიზაცია
        async function init() {
            console.log("Initializing...");
            console.log("🚀 აპლიკაცია იწყება...");

            renderRooms();
            await loadProfile();
            await loadOnline();
            await loadPMHistory();
            await loadOnlineUsers();
            await loadEmojis();
            startHearts();

            // თემის ჩატვირთვა
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'day') document.body.classList.add('day-mode');
            
            // ნავიგაციის ევენთები
            document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
            // ნავიგაციის ღილაკები
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const pageId = btn.getAttribute('data-page');
                    if (pageId) showPage(pageId);
                    const page = btn.getAttribute('data-page');
                    showPage(page);
                });
            });

            // თემის ტოგლი
            document.getElementById('themeToggle')?.addEventListener('click', toggleMode);
            
            // სტატუსის ავტომატური შენახვა
            let statusTimeout;
            const statusInput = document.getElementById('dispStatus');
            if (statusInput) {
                statusInput.addEventListener('input', () => {
                    clearTimeout(statusTimeout);
                    statusTimeout = setTimeout(() => updateStatus(), 1000);
                });
            }
            // თემის ღილაკი
            document.getElementById('themeBtn')?.addEventListener('click', toggleTheme);

            console.log("Initialization complete");
            console.log("✅ აპლიკაცია გაშვებულია");
        }

        window.onload = init;
        init();
    </script>
