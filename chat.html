<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Old Mafia - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
        body {
            --bg: #0a0508;
            --text: #f0e6e8;
            --card: #1a0f12;
            --border: #4a1a2a;
            --accent: #8b0000;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        body.day-mode {
            --bg: #fff5f0;
            --text: #2c1a1a;
            --card: #ffffff;
            --border: #e6b8a2;
            --accent: #8b0000;
        }
        
        .nav-bar {
            display: flex;
            justify-content: space-around;
            background: #120a0c;
            padding: 10px 0;
            border-bottom: 2px solid var(--accent);
            flex-shrink: 0;
        }
        .nav-btn {
            font-size: 24px;
            background: none;
            border: none;
            color: #aa8a8a;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 30px;
        }
        .nav-btn.active {
            color: var(--accent);
            background: rgba(139,0,0,0.2);
        }
        
        .pages { flex: 1; position: relative; overflow: hidden; }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
            padding: 15px;
        }
        .page.active { display: block; }
        .section-title {
            font-size: 18px;
            margin-bottom: 12px;
            color: var(--accent);
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }
        
        .rooms-list { display: flex; flex-direction: column; gap: 8px; }
        .room-card {
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            cursor: pointer;
            margin-bottom: 8px;
        }
        
        .chat-view {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }
        .chat-header {
            background: var(--card);
            padding: 12px;
            display: flex;
            justify-content: space-between;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .close-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            background: var(--card);
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            align-self: flex-start;
        }
        .message.own {
            background: var(--accent);
            align-self: flex-end;
        }
        .message-name {
            font-size: 11px;
            font-weight: bold;
            color: var(--accent);
        }
        .message.own .message-name { color: #ffcccc; }
        .message-time {
            font-size: 9px;
            opacity: 0.6;
            margin-left: 5px;
        }
        .chat-input-area {
            background: var(--card);
            padding: 10px;
            display: flex;
            gap: 8px;
            border-radius: 25px;
            margin-top: 8px;
        }
        .chat-input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid var(--accent);
            background: #1f1216;
            color: white;
            outline: none;
        }
        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        
        .user-item {
            background: var(--card);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .profile-card {
            text-align: center;
            padding: 20px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto;
            cursor: pointer;
        }
        .status-input {
            width: 80%;
            margin-top: 15px;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid var(--accent);
            background: #1f1216;
            color: white;
            text-align: center;
        }
        
        .empty-state { text-align: center; padding: 40px; opacity: 0.5; }
        .heart {
            position: fixed;
            bottom: 0;
            font-size: 32px;
            pointer-events: none;
            animation: floatUp 5s forwards;
            z-index: 9999;
        }
        @keyframes floatUp {
            0% { bottom: 0; opacity: 1; transform: scale(0.5); }
            50% { transform: scale(1.3); }
            100% { bottom: 100%; opacity: 0; transform: translateX(50px) rotate(360deg); }
        }
        .notification {
            position: fixed;
            top: 70px;
            right: 10px;
            background: var(--accent);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            z-index: 9999;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="online">👥</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeBtn">🌙</button>
    </div>

    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 12 სათამაშო ოთახი</div>
            <div id="roomsList" class="rooms-list"></div>
        </div>
        <div id="onlinePage" class="page">
            <div class="section-title">👥 ონლაინ მომხმარებლები</div>
            <div id="onlineList"></div>
        </div>
        <div id="profilePage" class="page">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()">👤</div>
                <h2 id="profileName"></h2>
                <input type="text" id="statusInput" class="status-input" placeholder="სტატუსი...">
                <button onclick="saveStatus()" style="margin-top:10px; background:#8b0000; color:white; padding:10px 20px; border-radius:25px; border:none;">💾 შენახვა</button>
                <input type="file" id="avatarInput" hidden accept="image/*" onchange="uploadAvatar(this)">
            </div>
        </div>
    </div>

    <div id="chatView" class="chat-view" style="display: none;">
        <div class="chat-header">
            <span id="chatRoomName">ოთახი</span>
            <button class="close-btn" onclick="closeChat()">✕</button>
        </div>
        <div id="chatMessages" class="messages"></div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
    <div id="hearts"></div>

    <script>
        // ============ Supabase ============
        const supabase = supabase.createClient(
            "https://ftfciebnywbondaiarnc.supabase.co",
            "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
        );
        
        // ============ მომხმარებელი ============
        let currentUser = localStorage.getItem('mafia_user');
        if (!currentUser || currentUser === "null") {
            currentUser = localStorage.getItem('nickname');
            if (!currentUser) currentUser = "Abu007";
            localStorage.setItem('mafia_user', currentUser);
        }
        document.getElementById('profileName').innerHTML = currentUser;
        console.log("✅ მომხმარებელი:", currentUser);
        
        let currentRoom = null;
        let users = [];
        let messages = [];
        let currentChannel = null;
        
        const ROOMS = [
            "☕ კაფე-ბარი", "🎲 ნარდი", "🃏 ჯოკერი", "💎 VIP", "📝 ფორუმი",
            "🛠️ ადმინები", "😂 იუმორი", "🏆 შიფროგრამა", "🎭 გამოძიება",
            "🎵 მუსიკა", "⁉️ ვიქტორინა", "🆘 დახმარება"
        ];
        
        // ============ მონაცემების ჩატვირთვა ============
        async function loadUsers() {
            const { data } = await supabase.from('profiles').select('*');
            if (data) users = data;
            if (!users.find(u => u.username === currentUser)) {
                await supabase.from('profiles').insert([{ username: currentUser, status: "ახალი მოთამაშე" }]);
                users.push({ username: currentUser, status: "ახალი მოთამაშე", avatar_url: null });
            }
            renderOnlineUsers();
            let user = users.find(u => u.username === currentUser);
            if (user?.avatar_url) {
                document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar_url})`;
                document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                document.getElementById('profileAvatar').innerHTML = '';
            }
            if (user?.status) document.getElementById('statusInput').value = user.status;
        }
        
        async function loadMessages() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
            if (data) messages = data;
            if (currentRoom) renderMessages();
        }
        
        // ============ Realtime ============
        function subscribeToRoom() {
            if (currentChannel) supabase.removeChannel(currentChannel);
            currentChannel = supabase
                .channel('room')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                    if (payload.new.room_name === currentRoom && payload.new.user_name !== currentUser) {
                        messages.push(payload.new);
                        renderMessages();
                        spawnHeart();
                    }
                })
                .subscribe();
        }
        
        // ============ ოთახები ============
        function renderRooms() {
            let html = '';
            ROOMS.forEach(room => {
                html += `<div class="room-card" onclick="openRoom('${room}')">${room}</div>`;
            });
            document.getElementById('roomsList').innerHTML = html;
        }
        
        function openRoom(room) {
            currentRoom = room;
            document.getElementById('chatRoomName').innerHTML = `📡 ${room}`;
            document.getElementById('chatView').style.display = 'flex';
            loadMessages();
            subscribeToRoom();
        }
        
        function closeChat() {
            currentRoom = null;
            document.getElementById('chatView').style.display = 'none';
            if (currentChannel) supabase.removeChannel(currentChannel);
        }
        
        // ============ შეტყობინებები ============
        function renderMessages() {
            let container = document.getElementById('chatMessages');
            let roomMessages = messages.filter(m => m.room_name === currentRoom).sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
            
            if (roomMessages.length === 0) {
                container.innerHTML = '<div class="empty-state">💬 შეტყობინებები არ არის</div>';
                return;
            }
            
            let html = '';
            roomMessages.forEach(msg => {
                let isOwn = msg.user_name === currentUser;
                let time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                html += `<div class="message ${isOwn ? 'own' : ''}">
                    <div><span class="message-name">${escapeHtml(msg.user_name)}</span><span class="message-time">${time}</span></div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                </div>`;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendMessage() {
            let input = document.getElementById('messageInput');
            let text = input.value.trim();
            if (!text || !currentRoom) return;
            
            const newMsg = {
                user_name: currentUser,
                text: text,
                room_name: currentRoom,
                created_at: new Date().toISOString()
            };
            
            await supabase.from('messages').insert([newMsg]);
            input.value = '';
            spawnHeart();
        }
        
        // ============ მომხმარებლები ============
        function renderOnlineUsers() {
            let container = document.getElementById('onlineList');
            let html = '';
            users.filter(u => u.username !== currentUser).forEach(user => {
                html += `<div class="user-item" onclick="alert('💬 ${user.username}')">
                    <div class="user-avatar" style="${user.avatar_url ? `background-image:url(${user.avatar_url}); background-size:cover;` : ''}">${user.avatar_url ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div><b>${escapeHtml(user.username)}</b></div><div style="font-size:12px;">${escapeHtml(user.status || 'ონლაინ')}</div></div>
                </div>`;
            });
            container.innerHTML = html || '<div class="empty-state">მომხმარებლები არ არიან</div>';
        }
        
        // ============ პროფილი ============
        async function saveStatus() {
            let status = document.getElementById('statusInput').value;
            await supabase.from('profiles').update({ status: status }).eq('username', currentUser);
            showNotification('✅ სტატუსი განახლდა!');
            await loadUsers();
        }
        
        async function uploadAvatar(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = async (e) => {
                    await supabase.from('profiles').update({ avatar_url: e.target.result }).eq('username', currentUser);
                    document.getElementById('profileAvatar').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                    document.getElementById('profileAvatar').innerHTML = '';
                    showNotification('✅ ავატარი განახლდა!');
                    await loadUsers();
                };
                reader.readAsDataURL(file);
            }
        }
        
        // ============ გულები ============
        function spawnHeart() {
            let heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['❤️', '💖', '💗', '💕', '💘'][Math.floor(Math.random()*5)];
            heart.style.left = Math.random() * 90 + '%';
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        
        function startHearts() {
            setInterval(() => {
                let heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️', '💖', '💗', '💕'][Math.floor(Math.random()*4)];
                heart.style.left = Math.random() * 90 + '%';
                document.getElementById('hearts').appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 3000);
        }
        
        // ============ დამხმარე ============
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-page') === pageName) btn.classList.add('active');
            });
            if (pageName === 'online') renderOnlineUsers();
        }
        
        function showNotification(msg) {
            let notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
        
        function escapeHtml(text) {
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toggleTheme() {
            document.body.classList.toggle('day-mode');
            let btn = document.getElementById('themeBtn');
            btn.innerHTML = document.body.classList.contains('day-mode') ? '☀️' : '🌙';
        }
        
        // ============ ინიციალიზაცია ============
        async function init() {
            await loadUsers();
            await loadMessages();
            renderRooms();
            startHearts();
            document.getElementById('themeBtn').addEventListener('click', toggleTheme);
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => showPage(btn.getAttribute('data-page')));
            });
            showPage('home');
            console.log("✅ ჩატი გაშვებულია!");
        }
        
        init();
    </script>
</body>
</html>
