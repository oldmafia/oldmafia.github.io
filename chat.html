<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - SOCIAL CHAT</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; transition: 0.2s ease; }
        
        /* 🔴 ღამის რეჟიმი — შენი ღაჟღაჟა წითელი 🔴 */
        body.night-mode {
            --bg-color: #000000;
            --text-color: #e0c8a8;
            --chat-bg: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
            --bubble-bg: #0a0000;
            --bubble-border: #ff0000;
            --nick-color: #ff4d4d;
            --sidebar-bg: #000000;
            --input-bg: #0a0000;
            --input-border: #ff0000;
            --topbar-bg: #050000;
            --modal-bg: #0a0000;
            --modal-border: #ff0000;
            --modal-text: #e0c8a8;
            --cover-gradient: linear-gradient(to bottom, #ff0000, #1a0000);
        }
        
        /* ❤️ დღის რეჟიმი — შენი ლამაზი გულები ❤️ */
        body.day-mode {
            --bg-color: #fff8f0;
            --text-color: #2c2418;
            --chat-bg: #fffef7;
            --bubble-bg: #ffffff;
            --bubble-border: #e8d4b0;
            --nick-color: #c55a3a;
            --sidebar-bg: #fff8ed;
            --input-bg: #ffffff;
            --input-border: #e8d4b0;
            --topbar-bg: #fff4e6;
            --modal-bg: #ffffff;
            --modal-border: #e8d4b0;
            --modal-text: #2c2418;
            --cover-gradient: linear-gradient(to bottom, #ffcccc, #fff8f0);
            background-image: radial-gradient(circle at 15% 25%, rgba(255, 77, 77, 0.2) 3px, transparent 3px),
                              radial-gradient(circle at 75% 60%, rgba(255, 77, 77, 0.15) 2.5px, transparent 2.5px);
            background-size: 55px 55px, 40px 40px;
        }

        /* გულების ანიმაცია დღის რეჟიმისთვის */
        body.day-mode .chat-area::after, body.day-mode .modal-content::after {
            content: "❤️"; position: fixed; bottom: 15%; right: 20px; font-size: 56px; opacity: 0.6; animation: floatHeartGlow 5s infinite ease-in-out; filter: drop-shadow(0 0 8px #ff6699); z-index: 100;
        }
        @keyframes floatHeartGlow { 0% { transform: translateY(0); } 50% { transform: translateY(-30px); } 100% { transform: translateY(0); } }

        /* ძირითადი სტრუქტურა */
        body { margin: 0; font-family: sans-serif; background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: var(--topbar-bg); padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--bubble-border); height: 60px; z-index: 1000; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: var(--chat-bg); position: relative; }
        .input-zone { padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--bubble-border); background: var(--topbar-bg); }
        .input-zone input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); outline: none; }
        
        .sidebar { position: fixed; left: -280px; width: 280px; height: 100%; background: var(--sidebar-bg); transition: 0.3s; z-index: 4000; border-right: 3px solid var(--bubble-border); }
        .sidebar.active { left: 0; }
        .room-item { padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,0,0,0.1); }
        .room-item.active { background: rgba(255,0,0,0.1); font-weight: bold; color: var(--nick-color); }
        
        /* 📱 Facebook Style პროფილის მოდალი */
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { 
            background: var(--modal-bg) !important; 
            border: 2px solid var(--modal-border) !important; 
            color: var(--modal-text) !important;
            width: 95% !important; max-width: 500px !important; 
            height: 85vh !important; overflow-y: auto !important; 
            padding: 0 !important; border-radius: 25px !important; position: relative;
        }

        .profile-cover { width: 100%; height: 140px; background: var(--cover-gradient); position: relative; }
        .profile-avatar-big { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--modal-bg); position: absolute; bottom: -50px; left: 20px; object-fit: cover; }
        .profile-info { padding: 60px 20px 20px 20px; text-align: left; }
        .profile-stats { display: flex; gap: 15px; margin: 15px 0; font-weight: bold; color: var(--nick-color); }
        
        .post-card { background: var(--bubble-bg); border: 1px solid var(--bubble-border); padding: 15px; border-radius: 15px; margin-top: 10px; }
        .modal-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--bubble-border); background: var(--bubble-bg); color: var(--text-color); border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body class="night-mode" id="mainBody">

<div class="sidebar" id="sidebar">
    <div style="padding: 20px; text-align: center;">
        <img id="my-avatar-img" src="" style="width:65px; height:65px; border-radius:50%; border:2px solid var(--bubble-border); object-fit: cover;">
        <div id="my-nick-label" style="font-weight:bold; margin-top:5px; color: var(--nick-color);">...</div>
    </div>
    <div class="rooms-list">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('📝 ფორუმი', this)">📝 ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('🎲 ნარდი', this)">🎲 ნარდი</div>
    </div>
</div>

<div class="topbar">
    <div onclick="toggleSidebar()" style="cursor:pointer; font-size:25px; color: var(--nick-color);">☰</div>
    <div id="room-name" style="flex:1; text-align:center; color: var(--nick-color); font-weight:bold;">☕ კაფე-ბარი</div>
    <button onclick="toggleTheme()" id="themeToggle" style="background:none; border:none; font-size:20px; cursor:pointer;">🌙</button>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი...">
    <button onclick="sendMsg()" style="border-radius:50%; width:45px; height:45px; background:var(--nick-color); border:none; color:white; cursor:pointer;">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <div class="profile-cover">
            <img id="targetAvatar" class="profile-avatar-big" src="">
        </div>
        <div class="profile-info">
            <h2 id="targetName" style="margin:0; color:var(--nick-color);">...</h2>
            <p id="targetStatus" style="font-size:13px; opacity:0.8; margin:5px 0;">🕵️ მაფიის წევრი</p>
            
            <div class="profile-stats">
                <span>🏆 <span id="quizPoints">0</span> ვიქტორინა</span>
                <span>🔐 <span id="cipherPoints">0</span> შიფრო</span>
            </div>

            <div style="display:flex; gap:10px; margin: 15px 0;">
                <button class="modal-btn" style="flex:1;">✉️ მიწერა</button>
                <button class="modal-btn" style="flex:1;">➕ მეგობრობა</button>
            </div>

            <hr style="border:0; border-top:1px solid var(--bubble-border); margin: 20px 0;">
            
            <h3 style="margin: 10px 0; color: var(--nick-color); font-size:16px;">📝 კედელი</h3>
            <div id="userWall">
                <div class="post-card">
                    <p style="margin:0; font-size:14px;">მომხმარებლის პოსტები იტვირთება... 📸</p>
                </div>
            </div>
            
            <div id="adminOptions"></div>
            <button class="modal-btn" onclick="closeModal()" style="margin-top:20px; background:var(--nick-color); color:white; border:none;">დახურვა</button>
        </div>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), currentRoom = "☕ კაფე-ბარი";

    function toggleTheme() {
        const b = document.body;
        const btn = document.getElementById('themeToggle');
        if (b.classList.contains('night-mode')) {
            b.classList.replace('night-mode', 'day-mode');
            btn.innerText = '☀️';
            localStorage.setItem('theme', 'day');
        } else {
            b.classList.replace('day-mode', 'night-mode');
            btn.innerText = '🌙';
            localStorage.setItem('theme', 'night');
        }
    }

    function changeRoom(n, el) {
        if (n === "📝 ფორუმი") { window.location.href = 'forum.html'; return; }
        currentRoom = n;
        document.getElementById('room-name').innerText = n;
        document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        toggleSidebar();
        loadMessages();
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function closeModal() { document.getElementById('userModal').style.display = "none"; }

    async function openProfile(username) {
        const { data: user } = await _s.from('profiles').select('*').eq('username', username).maybeSingle();
        if(user) {
            document.getElementById('targetName').innerText = user.username;
            document.getElementById('targetAvatar').src = user.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
            document.getElementById('quizPoints').innerText = user.points || 0;
            document.getElementById('cipherPoints').innerText = user.cipher_points || 0;
            document.getElementById('userModal').style.display = "flex";
        }
    }

    async function init() {
        const savedTheme = localStorage.getItem('theme') || 'night';
        if(savedTheme === 'day') toggleTheme();
        if (!myNick) { location.href = 'index.html'; return; }
        
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-avatar-img').src = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
        }
        loadMessages();
    }

    // loadMessages და sendMsg ფუნქციები აქ ჩაამატე შენი ძველი კოდიდან...

    window.onload = init;
</script>
</body>
</html>
