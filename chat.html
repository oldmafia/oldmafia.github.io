<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mafia Social Network</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --fb-blue: #0866ff;
            --night-bg: #000000;
            --red-accent: #ff0000;
        }

        body { margin: 0; font-family: Helvetica, Arial, sans-serif; background: var(--bg-color); height: 100vh; overflow: hidden; }

        /* 🔴 რეჟიმები */
        body.night-mode { --bg-color: #000; --text-color: #eee; --card-bg: #111; --border: #333; }
        body.day-mode { --bg-color: #f0f2f5; --text-color: #050505; --card-bg: #fff; --border: #ddd; }

        /* 📱 მთავარი კონტეინერები */
        .page { display: none; height: calc(100vh - 60px); overflow-y: auto; }
        .page.active { display: block; }

        /* NAVIGATION (Facebook Style) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: var(--card-bg); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { cursor: pointer; font-size: 24px; opacity: 0.6; padding: 10px; }
        .nav-item.active { opacity: 1; color: var(--red-accent); border-bottom: 3px solid var(--red-accent); }

        /* 👤 PROFILE PAGE (FB Layout) */
        .profile-header { position: relative; background: var(--card-bg); padding-bottom: 20px; }
        .cover-photo { width: 100%; height: 180px; background: linear-gradient(red, black); }
        .avatar-wrapper { 
            width: 130px; height: 130px; border-radius: 50%; 
            border: 4px solid var(--card-bg); position: absolute; 
            top: 110px; left: 50%; transform: translateX(-50%);
            overflow: hidden; background: #eee;
        }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .user-info { margin-top: 70px; text-align: center; }
        .user-info h1 { margin: 0; font-size: 24px; }

        /* 📝 POSTS (FB Style) */
        .post-card { 
            background: var(--card-bg); margin: 10px; padding: 15px; 
            border-radius: 10px; border: 1px solid var(--border);
        }

        /* 💬 MESSENGER PAGE */
        .messenger-container { height: 100%; display: flex; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; }
        .input-box { padding: 10px; background: var(--card-bg); display: flex; gap: 10px; }
    </style>
</head>
<body class="night-mode">

    <div id="messengerPage" class="page active">
        <div class="messenger-container">
            <div class="chat-area" id="chat">
                <p style="text-align:center; opacity:0.5;">მესენჯერი</p>
                </div>
            <div class="input-box">
                <input type="text" style="flex:1; border-radius:20px; border:1px solid var(--border); padding:10px;" placeholder="დაწერე მესიჯი...">
                <button style="border:none; background:none; font-size:24px;">✈️</button>
            </div>
        </div>
    </div>

    <div id="profilePage" class="page">
        <div class="profile-header">
            <div class="cover-photo"></div>
            <div class="avatar-wrapper">
                <img id="myAvatar" src="https://i.ibb.co/v3m6y6R/avatar.png">
            </div>
            <div class="user-info">
                <h1 id="myName">Lukinio</h1>
                <p>🕵️ მაფიის წევრი</p>
                <div style="display:flex; justify-content:center; gap:10px;">
                    <button style="background:var(--red-accent); color:#fff; border:none; padding:8px 20px; border-radius:6px; font-weight:bold;">პროფილის ჩასწორება</button>
                </div>
            </div>
        </div>

        <div class="profile-content">
            <div class="post-card">
                <b>მეგობრები (50)</b>
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:5px; margin-top:10px;">
                    <div style="height:80px; background:#333; border-radius:5px;"></div>
                    <div style="height:80px; background:#333; border-radius:5px;"></div>
                    <div style="height:80px; background:#333; border-radius:5px;"></div>
                </div>
            </div>

            <div class="post-card">
                <b>პოსტები</b>
                <div style="margin-top:15px; border-top:1px solid var(--border); padding-top:10px;">
                    <p>ეს არის ჩემი პირველი პოსტი ახალ დიზაინში! 🚀</p>
                    <small>❤️ 12 ლაიქი</small>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('messengerPage', this)">💬</div>
        <div class="nav-item" onclick="showPage('profilePage', this)">👤</div>
        <div class="nav-item" onclick="toggleTheme()">🌙</div>
    </div>

    <script>
        function showPage(pageId, el) {
            // ყველა გვერდის დამალვა
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // არჩეული გვერდის გამოჩენა
            document.getElementById(pageId).classList.add('active');
            // ნავიგაციის გააქტიურება
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleTheme() {
            document.body.classList.toggle('night-mode');
            document.body.classList.toggle('day-mode');
        }
    </script>
</body>
</html>
