<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Chat 2026 - Final Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --wine: #4a0404; --bg: #0b0000; --txt: #fff; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--txt); transition: 0.3s; overflow: hidden; height: 100vh; }
        body.light { --bg: #f5f5dc; --txt: #000; }

        /* მენიუ (შენი სურათის მიხედვით) */
        .top-nav { height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid var(--wine); }
        .nav-btn { font-size: 25px; cursor: pointer; position: relative; }
        .badge { position: absolute; top: -5px; right: -10px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }

        /* ოთახები */
        .room-bar { display: flex; overflow-x: auto; background: rgba(0,0,0,0.5); padding: 10px; gap: 10px; border-bottom: 1px solid var(--wine); }
        .room-btn { padding: 6px 15px; background: var(--wine); color: white; border-radius: 15px; cursor: pointer; white-space: nowrap; font-size: 12px; border: 1px solid transparent; }
        .room-btn.active { background: white; color: var(--wine); border-color: var(--wine); box-shadow: 0 0 10px white; }

        /* ჩათის არე */
        #chat-window { height: calc(100vh - 195px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-box { max-width: 85%; padding: 10px; border-radius: 12px; background: rgba(74,4,4,0.3); border: 1px solid var(--wine); backdrop-filter: blur(5px); }

        /* ქვედა ზოლი */
        .bottom-bar { height: 70px; background: #000; display: flex; align-items: center; padding: 0 15px; border-top: 2px solid var(--wine); }
        #input-msg { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: white; outline: none; }
        .send-btn { background: var(--wine); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; margin-left: 10px; }

        /* მოდალები */
        .modal { position: fixed; inset: 60px 0 0 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; padding: 20px; overflow-y: auto; }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .heart { position: absolute; font-size: 40px; color: var(--wine); pointer-events: none; animation: fly 10s linear infinite; opacity: 0; }
        @keyframes fly { 0% { bottom: -10%; opacity: 0; } 50% { opacity: 0.6; } 100% { bottom: 110%; opacity: 0; transform: scale(1.3); } }
    </style>
</head>
<body class="dark">

<div id="heart-container"></div>

<nav class="top-nav">
    <div class="nav-btn" onclick="closeM()">🏠</div>
    <div class="nav-btn" onclick="openM('messenger')">💬 <span class="badge">3</span></div>
    <div class="nav-btn" onclick="openM('online')">👥</div>
    <div class="nav-btn" onclick="openM('members')">🌐</div>
    <div class="nav-btn" onclick="openM('profile')">👤</div>
    <div class="nav-btn" id="theme-toggle">🌙</div>
</nav>

<div class="room-bar" id="room-nav"></div>

<div id="chat-window"></div>

<div class="bottom-bar">
    <button onclick="openM('emojis')" style="background:none; border:none; font-size:24px; cursor:pointer; margin-right:10px;">😊</button>
    <input type="text" id="input-msg" placeholder="დაწერე მესიჯი...">
    <button class="send-btn" onclick="sendMsg()">➤</button>
</div>

<div id="modal-emojis" class="modal">
    <h3>სმაილები</h3>
    <div class="emoji-grid" id="emoji-list"></div>
</div>

<div id="modal-profile" class="modal">
    <div style="text-align:center;">
        <button onclick="closeM()" style="float:right; color:red; border:none; background:none; font-size:20px;">X</button>
        <h2>პროფილი</h2>
        <img id="p-img" src="https://via.placeholder.com/100" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--wine);">
        <br><input type="file" id="up-avatar" style="margin:15px;">
        <br><input type="text" id="p-status" placeholder="სტატუსი..." style="width:80%; padding:10px; background:#222; color:#fff; border:none;">
        <br><button onclick="saveP()" style="margin-top:10px; background:green; color:white; padding:10px 20px; border:none; border-radius:5px;">შენახვა</button>
        <hr>
        <h3>ჩემი ალბომი</h3>
        <input type="file" multiple id="up-gallery">
        <div id="gallery-view" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;"></div>
    </div>
</div>

<script>
    const S_URL = 'https://ftfciebnywbondaiarnc.supabase.co';
    const S_KEY = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let activeRoom = "ოთახი 1";
    let myUserName = "Guest_" + Math.floor(Math.random() * 1000);

    // 1. ოთახების აწყობა
    const roomNav = document.getElementById('room-nav');
    for(let i=1; i<=12; i++) {
        roomNav.innerHTML += `<div class="room-btn" id="r-${i}" onclick="joinRoom(${i})">ოთახი ${i}</div>`;
    }
    document.getElementById('r-1').classList.add('active');

    function joinRoom(id) {
        activeRoom = "ოთახი " + id;
        document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`r-${id}`).classList.add('active');
        loadMsgs();
    }

    // 2. მესიჯის გაგზავნა (შენი ცხრილის სვეტებზე მორგებული)
    async function sendMsg() {
        const inp = document.getElementById('input-msg');
        if(!inp.value.trim()) return;

        const { error } = await _supabase.from('messages').insert([{
            text: inp.value,
            room_name: activeRoom, // სვეტი შენი სურათიდან
            user_name: myUserName  // სვეტი შენი სურათიდან
        }]);

        if(error) {
            console.error(error);
            alert("შეცდომა! შეამოწმე 'room_name' სვეტი ბაზაში.");
        } else {
            inp.value = '';
        }
    }

    // 3. ჩატვირთვა
    async function loadMsgs() {
        const { data } = await _supabase.from('messages').select('*').eq('room_name', activeRoom).order('created_at', {ascending: true});
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        if(data) data.forEach(m => {
            win.innerHTML += `<div class="msg-box"><b>${m.user_name || 'მომხმარებელი'}:</b><br>${m.text}</div>`;
        });
        win.scrollTop = win.scrollHeight;
    }

    // 4. სმაილები (emojis ცხრილიდან)
    async function loadEmojis() {
        const { data } = await _supabase.from('emojis').select('*');
        const list = document.getElementById('emoji-list');
        list.innerHTML = '';
        if(data) data.forEach(e => {
            list.innerHTML += `<img src="${e.url}" onclick="useEmoji('${e.url}')" style="width:100%; cursor:pointer; border-radius:5px;">`;
        });
    }

    function useEmoji(url) {
        document.getElementById('input-msg').value += ` [img]${url}[/img] `;
        closeM();
    }

    // 5. გულები
    function spawnHeart() {
        const h = document.createElement('div');
        h.innerHTML = '❤'; h.className = 'heart';
        h.style.left = Math.random() * 100 + 'vw';
        document.getElementById('heart-container').appendChild(h);
        setTimeout(() => h.remove(), 10000);
    }
    setInterval(spawnHeart, 1500);

    // 6. სხვა ფუნქციები
    function openM(id) {
        closeM();
        document.getElementById(`modal-${id}`).style.display = 'block';
        if(id === 'emojis') loadEmojis();
    }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    
    document.getElementById('theme-toggle').onclick = () => {
        document.body.classList.toggle('light');
        document.getElementById('theme-toggle').innerHTML = document.body.classList.contains('light') ? '🌙' : '🌙';
    };

    // Realtime
    _supabase.channel('messages').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, () => loadMsgs()).subscribe();
    
    loadMsgs();
</script>
</body>
</html>
