<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: Arial; overflow: hidden; display: flex; height: 100vh; }

        /* გვერდითა მენიუ (Sidebar) */
        .sidebar {
            position: fixed;
            left: -280px; /* თავიდან დამალულია */
            top: 0;
            width: 280px;
            height: 100%;
            background: #0d0d0d;
            border-right: 2px solid red;
            transition: 0.3s;
            z-index: 100;
            overflow-y: auto;
            padding-top: 60px;
        }

        .sidebar.open { left: 0; }

        /* ოთახების სტილი მენიუში */
        .room-link {
            padding: 15px 25px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            display: block;
            color: #ccc;
            transition: 0.2s;
            font-size: 16px;
        }

        .room-link:hover { background: #1a0000; color: red; }

        /* მთავარი კონტეინერი */
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* ზედა ზოლი */
        .top-bar {
            background: #050505;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid red;
        }

        .menu-btn { font-size: 25px; color: red; cursor: pointer; margin-right: 20px; }

        .current-room-name { flex: 1; text-align: center; font-weight: bold; font-size: 18px; text-shadow: 0 0 10px red; }

        /* ჩატის არეალი */
        #chat-display { flex: 1; overflow-y: auto; padding: 20px; background: radial-gradient(circle, #110000 0%, #000 100%); }

        /* წერის ზონა */
        .input-box { padding: 15px; background: #050505; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .send-btn { background: red; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; }

    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <div class="room-link" onclick="selectRoom('☕ კაფე-ბარი')">☕ კაფე-ბარი</div>
        <div class="room-link" onclick="selectRoom('💎 ვიპ საუბრები')">💎 ვიპ საუბრები</div>
        <div class="room-link" onclick="selectRoom('🕵️ გამოძიება')">🕵️ გამოძიება</div>
        <div class="room-link" onclick="selectRoom('🔐 შიფროგრამა')">🔐 შიფროგრამა</div>
        <div class="room-link" onclick="selectRoom('❓ ვიქტორინა')">❓ ვიქტორინა</div>
        <div class="room-link" onclick="selectRoom('😵 ჩამოხრჩობანა')">😵 ჩამოხრჩობანა</div>
        <div class="room-link" onclick="selectRoom('🕴 მაფიის ღამე')">🕴 მაფიის ღამე</div>
        <div class="room-link" onclick="selectRoom('🃏 ჯოკერი')">🃏 ჯოკერი</div>
        <div class="room-link" onclick="selectRoom('🎲 ნარდი')">🎲 ნარდი</div>
        <div class="room-link" onclick="selectRoom('🎵 მუსიკა')">🎵 მუსიკა</div>
        <div class="room-link" onclick="selectRoom('😂 იუმორი')">😂 იუმორი</div>
        <div class="room-link" onclick="selectRoom('🛠 ადმინისტრაცია')">🛠 ადმინისტრაცია</div>
        <div class="room-link" onclick="selectRoom('🆘 დახმარება')">🆘 დახმარება</div>
        <div class="room-link" onclick="selectRoom('📢 ფორუმი')">📢 ფორუმი</div>
        <div class="room-link" onclick="window.location.href='index.html'" style="color: red; border-top: 1px solid red;">🚪 გასვლა</div>
    </div>

    <div class="main-chat">
        <div class="top-bar">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>
            <div class="current-room-name" id="roomTitle">☕ კაფე-ბარი</div>
        </div>

        <div id="chat-display">
            <p style="color: #444; text-align: center;">აირჩიეთ ოთახი მენიუდან...</p>
        </div>

        <div class="input-box">
            <input type="text" placeholder="დაწერე მესიჯი...">
            <button class="send-btn">➤</button>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function selectRoom(name) {
            // სახელი ეწერება მაღლა
            document.getElementById('roomTitle').innerText = name;
            // მენიუ იკეცება
            document.getElementById('sidebar').classList.remove('open');
            // აქ მოხდება ჩატის გაწმენდა და ახალი მესიჯების ჩატვირთვა (შემდეგ ნაბიჯზე)
            document.getElementById('chat-display').innerHTML = `<p style="color:red; text-align:center;">თქვენ შეხვედით ოთახში: ${name}</p>`;
        }
    </script>

</body>
</html>
