<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Chat 2026 - FULL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --wine: #4a0404; --bg: #0b0000; --txt: #fff; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--txt); transition: 0.3s; overflow: hidden; height: 100vh; }
        body.light { --bg: #f5f5dc; --txt: #000; }

        /* მენიუ */
        .top-nav { height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid var(--wine); z-index: 1000; position: relative; }
        .nav-btn { font-size: 25px; cursor: pointer; position: relative; }
        .badge { position: absolute; top: -5px; right: -10px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }

        /* ოთახები */
        .room-bar { display: flex; overflow-x: auto; background: rgba(0,0,0,0.5); padding: 10px; gap: 10px; border-bottom: 1px solid var(--wine); }
        .room-btn { padding: 6px 15px; background: var(--wine); color: white; border-radius: 15px; cursor: pointer; white-space: nowrap; font-size: 12px; }
        .room-btn.active { background: #fff; color: var(--wine); font-weight: bold; }

        /* ჩათის არე */
        #chat-window { height: calc(100vh - 195px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 10; }
        .msg-box { max-width: 80%; padding: 10px; border-radius: 12px; background: rgba(74,4,4,0.3); border: 1px solid var(--wine); }

        /* მოდალები (ფანჯრები) */
        .modal { position: fixed; inset: 60px 0 0 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; padding: 20px; overflow-y: auto; }
        .user-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid #333; background: rgba(255,255,255,0.05); margin-bottom: 5px; border-radius: 8px; }
        .status-online { width: 10px; height: 10px; background: #0f0; border-radius: 50%; box-shadow: 0 0 5px #0f0; }

        /* ქვედა ზოლი */
        .bottom-bar { height: 70px; background: #000; display: flex; align-items: center; padding: 0 15px; border-top: 2px solid var(--wine); }
        #input-msg { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: white; outline: none; }
        .send-btn { background: var(--wine); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; margin-left: 10px; }
        
        /* გულები */
        .heart { position: absolute; font-size: 40px; color: var(--wine); pointer-events: none; animation: fly 10s linear infinite; opacity: 0; }
        @keyframes fly { 0% { bottom: -10%; opacity: 0; } 50% { opacity: 0.5; } 100% { bottom: 110%; opacity: 0; transform: scale(1.2); } }
    </style>
</head>
<body class="dark">

<div id="heart-container"></div>

<nav class="top-nav">
    <div class="nav-btn" onclick="closeAll()">🏠</div>
    <div class="nav-btn" onclick="openM('messenger')">💬 <span class="badge">3</span></div>
    <div class="nav-btn" onclick="openM('online')">👥 <span id="online-count" style="font-size: 10px; color: #0f0;">0</span></div>
    <div class="nav-btn" onclick="openM('members')">🌐</div>
    <div class="nav-btn" onclick="openM('profile')">👤</div>
    <div class="nav-btn" onclick="toggleTheme()">🌙</div>
</nav>

<div class="room-bar" id="room-list"></div>

<div id="chat-window"></div>

<div class="bottom-bar">
    <button onclick="openM('emojis')" style="background:none; border:none; font-size:24px; cursor:pointer; margin-right:10px;">😊</button>
    <input type="text" id="input-msg" placeholder="დაწერე მესიჯი...">
    <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<div id="modal-online" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>ახლა საიტზე არიან:</h3>
        <button onclick="closeAll()" style="color:red; background:none; border:none; font-size:20px;">X</button>
    </div>
    <div id="online-users-list"></div>
</div>

<div id="modal-members" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>ყველა რეგისტრირებული:</h3>
        <button onclick="closeAll()" style="color:red; background:none; border:none; font-size:20px;">X</button>
    </div>
    <div id="all-members-view"></div>
</div>

<div id="modal-emojis" class="modal">
    <h3>სმაილები</h3>
    <div id="emoji-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px;"></div>
</div>

<div id="modal-profile" class="modal">
    <div style="text-align:center;">
        <button onclick="closeAll()" style="float:right; color:red; border:none; background:none; font-size:20px;">X</button>
        <h2>ჩემი პროფილი</h2>
        <img id="my-avatar" src="https://via.placeholder.com/100" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--wine);">
        <br><input type="file" style="margin:15px;">
        <br><input type="text" placeholder="სტატუსი..." style="width:80%; padding:10px; background:#222; color:#fff; border:none; border-radius:5px;">
        <br><button style="margin-top:10px; background:green; color:white; padding:10px 20px; border:none; border-radius:5px;">შენახვა</button>
        <hr border="1" color="#4a0404">
        <h3>ჩემი ალბომი</h3>
        <div id="album-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
    </div>
</div>

<script>
    const S_URL = 'https://ftfciebnywbondaiarnc.supabase.co';
    const S_KEY = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let activeRoomName = "ოთახი 1";
    let myName = "მომხმარებელი_" + Math.floor(Math.random() * 999);

    // 1. ოთახების გენერაცია
    const rList = document.getElementById('room-list');
    for(let i=1; i<=12; i++) {
        rList.innerHTML += `<div class="room-btn" id="room-${i}" onclick="changeRoom(${i})">ოთახი ${i}</div>`;
    }
    document.getElementById('room-1').classList.add('active');

    function changeRoom(n) {
        activeRoomName = "ოთახი " + n;
        document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`room-${n}`).classList.add('active');
        loadMessages();
    }

    // 2. ონლაინ სისტემა (Presence) - სახელების გამოსაჩენად
    const channel = _supabase.channel('online_room', { config: { presence: { key: myName } } });
    
    channel.on('presence', { event: 'sync' }, () => {
        const state = channel.presenceState();
        document.getElementById('online-count').innerText = Object.keys(state).length;
        
        const list = document.getElementById('online-users-list');
        list.innerHTML = '';
        Object.keys(state).forEach(user => {
            list.innerHTML += `
                <div class="user-item">
                    <div class="status-online"></div>
                    <span style="font-weight:bold;">${user}</span>
                    <span style="font-size:10px; opacity:0.6;">(აქ არის)</span>
                </div>`;
        });
    }).subscribe(async (status) => {
        if (status === 'SUBSCRIBED') await channel.track({ online_at: new Date().toISOString() });
    });

    // 3. რეგისტრირებული წევრები (profiles ცხრილიდან)
    async function loadMembers() {
        const { data } = await _supabase.from('profiles').select('username');
        const view = document.getElementById('all-members-view');
        view.innerHTML = '';
        if(data) data.forEach(u => {
            view.innerHTML += `<div class="user-item">👤 ${u.username || 'უცნობი'}</div>`;
        });
    }

    // 4. ჩათის მართვა
    async function sendMessage() {
        const inp = document.getElementById('input-msg');
        if(!inp.value.trim()) return;
        
        await _supabase.from('messages').insert([{ 
            text: inp.value, 
            room_name: activeRoomName, // შენი ბაზის სვეტი
            user_name: myName          // შენი ბაზის სვეტი
        }]);
        inp.value = '';
    }

    async function loadMessages() {
        const { data } = await _supabase.from('messages').select('*').eq('room_name', activeRoomName).order('created_at', {ascending: true});
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        if(data) data.forEach(m => {
            win.innerHTML += `<div class="msg-box"><b>${m.user_name}:</b><br>${m.text}</div>`;
        });
        win.scrollTop = win.scrollHeight;
    }

    // 5. სმაილები
    async function loadEmojis() {
        const { data } = await _supabase.from('emojis').select('*');
        const grid = document.getElementById('emoji-grid');
        grid.innerHTML = '';
        if(data) data.forEach(e => {
            grid.innerHTML += `<img src="${e.url}" onclick="useEmoji('${e.url}')" style="width:100%; cursor:pointer;">`;
        });
    }
    function useEmoji(url) {
        document.getElementById('input-msg').value += ` [img]${url}[/img] `;
        closeAll();
    }

    // დამხმარე
    function openM(id) { 
        closeAll(); 
        document.getElementById(`modal-${id}`).style.display = 'block';
        if(id === 'members') loadMembers();
        if(id === 'emojis') loadEmojis();
    }
    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function toggleTheme() { document.body.classList.toggle('light'); }

    // Realtime განახლება
    _supabase.channel('msgs').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, () => loadMessages()).subscribe();
    
    // გულების ანიმაცია
    setInterval(() => {
        const h = document.createElement('div');
        h.innerHTML = '❤'; h.className = 'heart';
        h.style.left = Math.random() * 100 + 'vw';
        document.getElementById('heart-container').appendChild(h);
        setTimeout(() => h.remove(), 10000);
    }, 2000);

    loadMessages();
</script>
</body>
</html>
