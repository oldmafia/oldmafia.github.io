        // ============ დამფუძნებლად დანიშვნა ============
        async function makeOwner(username) {
            if (currentUser !== OWNER) { showNotification('❌ მხოლოდ დამფუძნებელს შეუძლია!'); return; }
            const oldOwner = usersList.find(u => u.role === 'owner');
            if (oldOwner) await supabase.from('profiles').update({ role: 'user', status: 'ონლაინ' }).eq('username', oldOwner.username);
            await supabase.from('profiles').update({ role: 'owner', status: '👑 დამფუძნებელი' }).eq('username', username);
            await loadUsers();
            showNotification(`👑 ${username} დამფუძნებელი გახდა!`);
            renderOnlineUsers();
        }
        
        async function makeAdmin(username) {
            if (currentUser !== OWNER) { showNotification('❌ მხოლოდ დამფუძნებელს შეუძლია!'); return; }
            await supabase.from('profiles').update({ role: 'admin', status: '🔧 ადმინი' }).eq('username', username);
            await loadUsers();
            showNotification(`✅ ${username} ადმინად დაინიშნა!`);
            renderOnlineUsers();
        }
        
        async function removeAdmin(username) {
            if (currentUser !== OWNER) { showNotification('❌ მხოლოდ დამფუძნებელს შეუძლია!'); return; }
            await supabase.from('profiles').update({ role: 'user', status: 'ონლაინ' }).eq('username', username);
            await loadUsers();
            showNotification(`🔻 ${username} ადმინის უფლებები ჩამოერთვა!`);
            renderOnlineUsers();
        }
        
        // ============ მეგობრების სისტემა ============
        async function sendFriendRequest(targetUser) {
            if (targetUser === currentUser) { showNotification('❓ საკუთარ თავს ვერ დაუმატებ'); return; }
            if (isBlocked(targetUser)) { showNotification('🔒 ეს მომხმარებელი დაბლოკილია'); return; }
            if (friendRequests.some(r => r.from_user === currentUser && r.to_user === targetUser && r.status === 'pending')) {
                showNotification('⏳ მოთხოვნა უკვე გაგზავნილია!'); return;
            }
            if (isFriend(targetUser)) { showNotification('👥 უკვე მეგობრები ხართ!'); return; }
            await supabase.from('friend_requests').insert({ from_user: currentUser, to_user: targetUser, status: 'pending' });
            await loadFriendRequests();
            showNotification(`📨 მოთხოვნა გაეგზავნა ${targetUser}-ს!`);
            renderFriendRequestsList();
            renderOnlineUsers();
        }
        
        async function acceptFriendRequest(fromUser) {
            await supabase.from('friend_requests').update({ status: 'accepted' }).eq('from_user', fromUser).eq('to_user', currentUser);
            await loadFriendRequests();
            showNotification(`✅ ${fromUser} დაემატა!`);
            renderFriendRequestsList();
            renderFriendsList();
            renderOnlineUsers();
        }
        
        async function rejectFriendRequest(fromUser) {
            await supabase.from('friend_requests').delete().eq('from_user', fromUser).eq('to_user', currentUser);
            await loadFriendRequests();
            showNotification(`❌ უარყავით`);
            renderFriendRequestsList();
            renderOnlineUsers();
        }
        
        function getFriendsList() {
            return friendRequests.filter(r => r.status === 'accepted' && (r.from_user === currentUser || r.to_user === currentUser))
                .map(r => r.from_user === currentUser ? r.to_user : r.from_user);
        }
        
        function isFriend(username) { return getFriendsList().includes(username); }
        
        // ============ სტატუსი და ავატარი ============
        async function saveStatus() {
            const newStatus = document.getElementById('statusInput').value;
            await supabase.from('profiles').update({ status: newStatus }).eq('username', currentUser);
            await loadUsers();
            showNotification('✅ სტატუსი განახლდა!');
            renderOnlineUsers();
        }
        
        function uploadAvatar(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    await supabase.from('profiles').update({ avatar: e.target.result }).eq('username', currentUser);
                    await loadUsers();
                    document.getElementById('profileAvatar').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                    document.getElementById('profileAvatar').innerHTML = '';
                    renderOnlineUsers();
                    showNotification('✅ ავატარი განახლდა!');
                };
                reader.readAsDataURL(file);
            }
        }
        
        // ============ ალბომი ============
        function renderAlbum() {
            const container = document.getElementById('albumGrid');
            const userAlbum = userAlbums[currentUser] || [];
            if (userAlbum.length === 0) { container.innerHTML = '<div class="empty-state">ალბომი ცარიელია</div>'; return; }
            container.innerHTML = userAlbum.map(photo => `<img src="${photo}" class="album-photo" onclick="openPhotoModal('${photo}', '${currentUser}')">`).join('');
        }
        
        async function addToAlbum(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    await supabase.from('user_photos').insert({ username: currentUser, url: e.target.result });
                    await loadUserAlbums();
                    renderAlbum();
                    showNotification('📸 ფოტო დაემატა!');
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }
        
        async function setAsProfilePhoto(photoUrl) {
            await supabase.from('profiles').update({ avatar: photoUrl }).eq('username', currentUser);
            await loadUsers();
            document.getElementById('profileAvatar').style.backgroundImage = `url(${photoUrl})`;
            document.getElementById('profileAvatar').style.backgroundSize = 'cover';
            document.getElementById('profileAvatar').innerHTML = '';
            renderOnlineUsers();
            showNotification('✅ პროფილის ფოტო განახლდა!');
        }
        
        // ============ ფოტოზე ლაიქი და კომენტარი ============
        function openPhotoModal(photoUrl, username) {
            const interactions = photoInteractions[photoUrl] || { likes: [], comments: [] };
            const modal = document.createElement('div'); modal.className = 'photo-modal';
            modal.innerHTML = `
                <div class="photo-modal-content">
                    <img src="${photoUrl}" class="photo-modal-img">
                    <div class="photo-actions">
                        <button class="action-btn" onclick="likePhoto('${photoUrl}', this)">❤️ ${interactions.likes.length}</button>
                        <button class="action-btn" onclick="document.getElementById('photoCommentInput').focus()">💬 ${interactions.comments.length}</button>
                        ${currentUser === username ? `<button class="action-btn" onclick="setAsProfilePhoto('${photoUrl}'); this.closest('.photo-modal').remove()">👤 პროფილის ფოტოდ</button>` : ''}
                    </div>
                    <div class="photo-comments" id="photoComments">${interactions.comments.map(c => `<div class="comment-item"><b>${escapeHtml(c.user)}</b>: ${escapeHtml(c.text)}</div>`).join('') || '<div>კომენტარები არ არის</div>'}</div>
                    <div class="comment-input-area">
                        <input type="text" id="photoCommentInput" class="comment-input" placeholder="დაწერე კომენტარი...">
                        <button class="action-btn" onclick="addPhotoComment('${photoUrl}')">📝</button>
                    </div>
                </div>
            `;
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            document.body.appendChild(modal);
        }
        
        async function likePhoto(photoUrl, btn) {
            if (!photoInteractions[photoUrl]) photoInteractions[photoUrl] = { likes: [], comments: [] };
            const idx = photoInteractions[photoUrl].likes.indexOf(currentUser);
            if (idx === -1) {
                photoInteractions[photoUrl].likes.push(currentUser);
                await supabase.from('photo_interactions').insert({ photo_url: photoUrl, username: currentUser, type: 'like' });
            } else {
                photoInteractions[photoUrl].likes.splice(idx, 1);
                await supabase.from('photo_interactions').delete().eq('photo_url', photoUrl).eq('username', currentUser).eq('type', 'like');
            }
            btn.innerHTML = `❤️ ${photoInteractions[photoUrl].likes.length}`;
        }
        
        async function addPhotoComment(photoUrl) {
            const input = document.getElementById('photoCommentInput');
            const text = input.value.trim();
            if (!text) return;
            if (!photoInteractions[photoUrl]) photoInteractions[photoUrl] = { likes: [], comments: [] };
            photoInteractions[photoUrl].comments.push({ user: currentUser, text: text });
            await supabase.from('photo_interactions').insert({ photo_url: photoUrl, username: currentUser, type: 'comment', comment_text: text });
            const commentsDiv = document.getElementById('photoComments');
            commentsDiv.innerHTML = photoInteractions[photoUrl].comments.map(c => `<div class="comment-item"><b>${escapeHtml(c.user)}</b>: ${escapeHtml(c.text)}</div>`).join('');
            input.value = '';
        }
        
        // ============ Realtime შეტყობინებები ============
        function setupRealtimeMessages() {
            if (messagesChannel) supabase.removeChannel(messagesChannel);
            messagesChannel = supabase.channel('messages-channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                    const newMsg = payload.new;
                    if (isBlocked(newMsg.username)) return;
                    if (currentRoom && newMsg.room === currentRoom) addMessageToDOM(newMsg);
                })
                .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, () => {
                    if (currentRoom) loadMessages(currentRoom);
                })
                .subscribe();
        }
        
        async function loadMessages(roomName) {
            const { data, error } = await supabase.from('messages').select('*').eq('room', roomName).order('created_at', { ascending: true });
            if (error) return;
            const filtered = data.filter(m => !isBlocked(m.username));
            renderMessagesList(filtered);
        }
        
        function renderMessagesList(messagesData) {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            if (messagesData.length === 0) { container.innerHTML = '<div class="empty-state">💬 შეტყობინებები არ არის</div>'; return; }
            container.innerHTML = messagesData.map(msg => {
                const isOwn = msg.username === currentUser;
                const canDelete = currentUser === OWNER || usersList.find(u => u.username === currentUser)?.role === 'admin';
                const timeStr = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const user = usersList.find(u => u.username === msg.username);
                const avatarHtml = user?.avatar ? `<img src="${user.avatar}" style="width:28px; height:28px; border-radius:50%; object-fit:cover;">` : `<div class="message-avatar">${msg.username.charAt(0).toUpperCase()}</div>`;
                return `<div class="message ${isOwn ? 'own' : ''}" data-id="${msg.id}">
                    <div class="message-header">${avatarHtml}<span class="message-name" onclick="showUserProfile('${msg.username}')">${escapeHtml(msg.username)}</span><span class="message-time">${timeStr}</span></div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    ${canDelete ? `<button class="delete-msg" onclick="deleteMessage('${msg.id}')">🗑️</button>` : ''}
                </div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function addMessageToDOM(msg) {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            const isOwn = msg.username === currentUser;
            const canDelete = currentUser === OWNER || usersList.find(u => u.username === currentUser)?.role === 'admin';
            const timeStr = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const user = usersList.find(u => u.username === msg.username);
            const avatarHtml = user?.avatar ? `<img src="${user.avatar}" style="width:28px; height:28px; border-radius:50%; object-fit:cover;">` : `<div class="message-avatar">${msg.username.charAt(0).toUpperCase()}</div>`;
            const msgHtml = `<div class="message ${isOwn ? 'own' : ''}" data-id="${msg.id}">
                <div class="message-header">${avatarHtml}<span class="message-name" onclick="showUserProfile('${msg.username}')">${escapeHtml(msg.username)}</span><span class="message-time">${timeStr}</span></div>
                <div class="message-text">${escapeHtml(msg.text)}</div>
                ${canDelete ? `<button class="delete-msg" onclick="deleteMessage('${msg.id}')">🗑️</button>` : ''}
            </div>`;
            if (container.innerHTML.includes('შეტყობინებები არ არის')) container.innerHTML = msgHtml;
            else container.insertAdjacentHTML('beforeend', msgHtml);
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendMessage() {
            if (!currentRoom) { showNotification('ჯერ ოთახი არ არის არჩეული!'); return; }
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            await supabase.from('messages').insert({ username: currentUser, text: text, room: currentRoom, created_at: new Date().toISOString() });
            input.value = '';
        }
        
        async function deleteMessage(msgId) {
            const canDelete = currentUser === OWNER || usersList.find(u => u.username === currentUser)?.role === 'admin';
            if (!canDelete) { showNotification('❌ შეტყობინების წაშლა მხოლოდ ადმინს შეუძლია!'); return; }
            await supabase.from('messages').delete().eq('id', msgId);
            showNotification('✅ შეტყობინება წაიშალა');
            if (currentRoom) loadMessages(currentRoom);
        }
        
        // ============ ოთახები ============
        function renderRooms() {
            const container = document.getElementById('roomsList');
            container.innerHTML = ROOMS.map(room => `<div class="room-card" onclick="openRoom('${room.name}')"><span class="room-icon">${room.icon}</span><span class="room-name">${room.name}</span></div>`).join('');
        }
        
        async function openRoom(roomName) {
            currentRoom = roomName;
            document.getElementById('chatRoomName').innerHTML = `📡 ${roomName}`;
            showPage('chat');
            await loadMessages(roomName);
        }
        
        function closeChat() { currentRoom = null; showPage('home'); }
        
        // ============ მომხმარებლები ============
        function showUserProfile(username) {
            const user = usersList.find(u => u.username === username);
            if (!user) return;
            const isBlockedUser = isBlocked(username);
            const isFriendUser = isFriend(username);
            const hasPendingFromMe = friendRequests.some(r => r.from_user === currentUser && r.to_user === username && r.status === 'pending');
            const hasPendingToMe = friendRequests.some(r => r.from_user === username && r.to_user === currentUser && r.status === 'pending');
            const isAdmin = user.role === 'admin';
            const isOwner = user.role === 'owner';
            const canManage = currentUser === OWNER;
            
            const modal = document.createElement('div'); modal.className = 'profile-modal';
            modal.innerHTML = `
                <div class="profile-modal-content">
                    <div class="profile-modal-header"><button class="profile-modal-close" onclick="this.closest('.profile-modal').remove()">✕</button>
                        <div class="profile-modal-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                        <h3>${escapeHtml(user.username)}</h3><div>${user.status}</div>
                        <div>${isOwner ? '👑 დამფუძნებელი' : (isAdmin ? '🔧 ადმინი' : '👤 მომხმარებელი')}</div>
                    </div>
                    <div class="profile-actions">
                        ${!isFriendUser && username !== currentUser && !hasPendingFromMe && !hasPendingToMe && !isBlockedUser ? `<button class="action-btn" onclick="sendFriendRequest('${username}'); this.closest('.profile-modal').remove()">➕ მეგობრობის მოთხოვნა</button>` : ''}
                        ${hasPendingFromMe ? `<button class="action-btn warning" disabled>⏳ მოთხოვნა გაგზავნილია</button>` : ''}
                        ${hasPendingToMe ? `<button class="action-btn" onclick="acceptFriendRequest('${username}'); this.closest('.profile-modal').remove()">✅ მიღება</button><button class="action-btn danger" onclick="rejectFriendRequest('${username}'); this.closest('.profile-modal').remove()">❌ უარყოფა</button>` : ''}
                        ${isFriendUser ? `<button class="action-btn success" disabled>✅ მეგობარი</button>` : ''}
                        ${!isBlockedUser && username !== currentUser ? `<button class="action-btn" onclick="openPrivateChat('${username}'); this.closest('.profile-modal').remove()">💬 მიწერა</button>` : ''}
                        ${isBlockedUser ? `<button class="action-btn warning" disabled>🔒 დაბლოკილია</button>` : ''}
                        ${(currentUser === OWNER || usersList.find(u => u.username === currentUser)?.role === 'admin') && username !== currentUser && !isOwner ? `<button class="action-btn danger" onclick="blockUser('${username}'); this.closest('.profile-modal').remove()">🔒 დაბლოკვა</button>` : ''}
                        ${isBlockedUser && (currentUser === OWNER || usersList.find(u => u.username === currentUser)?.role === 'admin') ? `<button class="action-btn" onclick="unblockUser('${username}'); this.closest('.profile-modal').remove()">🔓 განბლოკვა</button>` : ''}
                    </div>
                    ${canManage && username !== currentUser ? `
                        <div class="profile-actions">
                            ${!isOwner ? `<button class="action-btn success" onclick="makeOwner('${username}'); this.closest('.profile-modal').remove()">👑 დამფუძნებლად</button>` : ''}
                            ${isAdmin ? `<button class="action-btn danger" onclick="removeAdmin('${username}'); this.closest('.profile-modal').remove()">🔻 ადმინის ჩამორთმევა</button>` : ''}
                            ${!isAdmin && !isOwner ? `<button class="action-btn success" onclick="makeAdmin('${username}'); this.closest('.profile-modal').remove()">🔧 ადმინად</button>` : ''}
                        </div>
                    ` : ''}
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        async function renderOnlineUsers() {
            const { data } = await supabase.from('profiles').select('*').neq('username', currentUser);
            const container = document.getElementById('onlineList');
            container.innerHTML = (data || []).map(user => {
                const isBlockedUser = isBlocked(user.username);
                const isFriendUser = isFriend(user.username);
                const hasPendingFromMe = friendRequests.some(r => r.from_user === currentUser && r.to_user === user.username && r.status === 'pending');
                const hasPendingToMe = friendRequests.some(r => r.from_user === user.username && r.to_user === currentUser && r.status === 'pending');
                let badge = '';
                if (isBlockedUser) badge = '<div class="blocked-badge">🔒 დაბლოკილია</div>';
                else if (isFriendUser) badge = '<div class="friend-badge">✅ მეგობარი</div>';
                else if (hasPendingFromMe) badge = '<div class="request-badge" style="background:orange;">⏳ მოთხოვნა</div>';
                else if (hasPendingToMe) badge = '<div class="request-badge" style="background:gold; color:black;" onclick="event.stopPropagation(); acceptFriendRequest(\''+user.username+'\')">✅ მიღება</div>';
                else badge = '<div class="add-badge" onclick="event.stopPropagation(); sendFriendRequest(\''+user.username+'\')">➕ დამატება</div>';
                
                return `<div class="user-item ${isBlockedUser ? 'user-blocked' : ''}" onclick="${!isBlockedUser ? `showUserProfile('${user.username}')` : ''}">
                    <div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(user.username)} ${user.role === 'owner' ? '👑' : (user.role === 'admin' ? '🔧' : '')}</div><div class="user-status">${escapeHtml(user.status)}</div></div>
                    ${badge}
                </div>`;
            }).join('');
            if ((data || []).length === 0) container.innerHTML = '<div class="empty-state">მომხმარებლები არ არიან</div>';
        }
        
        function renderFriendsList() {
            const friendsList = getFriendsList();
            const friendUsers = usersList.filter(u => friendsList.includes(u.username) && !isBlocked(u.username));
            const container = document.getElementById('friendsList');
            if (friendUsers.length === 0) { container.innerHTML = '<div class="empty-state">მეგობრები არ არიან</div>'; return; }
            container.innerHTML = friendUsers.map(user => `<div class="user-item" onclick="showUserProfile('${user.username}')"><div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(user.username)}</div><div class="user-status">${escapeHtml(user.status)}</div></div><div class="friend-badge">✅ მეგობარი</div></div>`).join('');
        }
        
        function renderFriendRequestsList() {
            const pendingRequests = friendRequests.filter(r => r.to_user === currentUser && r.status === 'pending');
            const container = document.getElementById('friendRequestsList');
            if (pendingRequests.length === 0) { container.innerHTML = '<div class="empty-state">მოთხოვნები არ არის</div>'; return; }
            container.innerHTML = pendingRequests.map(req => `<div class="user-item"><div class="user-avatar">${req.from_user.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(req.from_user)}</div><div class="user-status">მეგობრობის მოთხოვნა</div></div><div style="display:flex; gap:5px;"><button class="action-btn" style="background:#2d6a4f;" onclick="acceptFriendRequest('${req.from_user}'); this.closest('.user-item').remove()">✅ მიღება</button><button class="action-btn danger" onclick="rejectFriendRequest('${req.from_user}'); this.closest('.user-item').remove()">❌ უარყოფა</button></div></div>`).join('');
        }
        
        // ============ პირადი მიმოწერა ============
        function openPrivateChat(username) {
            if (username === currentUser) { showNotification('საკუთარ თავთან არ შეიძლება'); return; }
            if (isBlocked(username)) { showNotification('🔒 ეს მომხმარებელი დაბლოკილია'); return; }
            currentPMUser = username;
            renderPrivateChat();
        }
        
        async function renderPrivateChat() {
            if (!currentPMUser) return;
            const { data } = await supabase.from('direct_messages').select('*')
                .or(`and(from_user.eq.${currentUser},to_user.eq.${currentPMUser}),and(from_user.eq.${currentPMUser},to_user.eq.${currentUser})`)
                .order('created_at', { ascending: true });
            const pmHtml = `<div class="pm-chat-container" id="pmChatWindow"><div class="pm-header" onclick="closePM()"><span>💬 ${escapeHtml(currentPMUser)}</span><span>✕</span></div><div class="pm-messages" id="pmMessages">${(data || []).map(msg => `<div class="pm-message ${msg.from_user === currentUser ? 'own' : ''}"><div style="font-size:9px;">${new Date(msg.created_at).toLocaleTimeString()}</div><div>${escapeHtml(msg.text)}</div></div>`).join('') || '<div class="empty-state">მიმოწერა ცარიელია</div>'}</div><div class="pm-input-area"><input type="text" id="pmInput" class="pm-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()"><button class="send-btn" style="width:40px; height:40px;" onclick="sendPM()">➤</button></div></div>`;
            document.getElementById('pmContainer').innerHTML = pmHtml;
            const pmDiv = document.getElementById('pmMessages'); if (pmDiv) pmDiv.scrollTop = pmDiv.scrollHeight;
            document.getElementById('pmInput')?.focus();
        }
        
        function closePM() { document.getElementById('pmContainer').innerHTML = ''; currentPMUser = null; }
        
        async function sendPM() {
            const input = document.getElementById('pmInput');
            const text = input.value.trim();
            if (!text || !currentPMUser) return;
            await supabase.from('direct_messages').insert({ from_user: currentUser, to_user: currentPMUser, text: text, created_at: new Date().toISOString() });
            input.value = '';
            renderPrivateChat();
            renderPrivateChatsList();
        }
        
        async function renderPrivateChatsList() {
            const { data } = await supabase.from('direct_messages').select('*').or(`from_user.eq.${currentUser},to_user.eq.${currentUser}`);
            const usersSet = new Set();
            (data || []).forEach(msg => { const other = msg.from_user === currentUser ? msg.to_user : msg.from_user; usersSet.add(other); });
            const container = document.getElementById('pmList');
            if (usersSet.size === 0) { container.innerHTML = '<div class="empty-state">ჯერ არ გქონია მიმოწერა</div>'; return; }
            container.innerHTML = Array.from(usersSet).map(username => `<div class="user-item" onclick="openPrivateChat('${username}')"><div class="user-avatar">${username.charAt(0).toUpperCase()}</div><div><div class="user-name">${escapeHtml(username)}</div></div></div>`).join('');
        }
        
        // ============ ემოჯები ============
        function toggleEmojiPanel(target) {
            const panel = document.getElementById('emojiPanel');
            if (panel.classList.contains('active')) { panel.classList.remove('active'); return; }
            const defaultEmojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺', '💀', '👑', '💪', '🤡', '👻', '⭐'];
            const allEmojis = [...defaultEmojis, ...customEmojis];
            panel.innerHTML = `<div class="emoji-grid">${allEmojis.map(e => `<div class="emoji-item" onclick="insertEmoji('${e}')">${e}</div>`).join('')}</div>`;
            const isAdmin = usersList.find(u => u.username === currentUser)?.role === 'admin';
            if (isAdmin || currentUser === OWNER) {
                const addBtn = document.createElement('div'); addBtn.className = 'emoji-item'; addBtn.textContent = '➕'; addBtn.style.background = 'var(--accent)';
                addBtn.onclick = () => { panel.classList.remove('active'); document.getElementById('emojiUploadInput').click(); };
                document.querySelector('.emoji-grid').appendChild(addBtn);
            }
            panel.classList.add('active');
        }
        
        function insertEmoji(emoji) {
            const input = document.getElementById('messageInput');
            if (input) input.value += emoji;
            document.getElementById('emojiPanel').classList.remove('active');
        }
        
        async function uploadEmojiImage(input) {
            const file = input.files[0];
            const isAdmin = usersList.find(u => u.username === currentUser)?.role === 'admin';
            if (file && (isAdmin || currentUser === OWNER)) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    await supabase.from('emojis').insert({ url: e.target.result });
                    await loadCustomEmojis();
                    showNotification('✅ ემოჯი დაემატა!');
                };
                reader.readAsDataURL(file);
            } else showNotification('❌ ემოჯის დამატება მხოლოდ ადმინებს შეუძლიათ!');
            input.value = '';
        }
        
        // ============ დამხმარე ============
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => { btn.classList.remove('active'); if (btn.getAttribute('data-page') === pageName) btn.classList.add('active'); });
            if (pageName === 'online') renderOnlineUsers();
            if (pageName === 'friends') { renderFriendsList(); renderFriendRequestsList(); }
            if (pageName === 'messages') renderPrivateChatsList();
            if (pageName === 'profile') renderAlbum();
        }
        
        function showNotification(msg) { const notif = document.createElement('div'); notif.className = 'notification'; notif.textContent = msg; document.body.appendChild(notif); setTimeout(() => notif.remove(), 2500); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function toggleTheme() { document.body.classList.toggle('day-mode'); document.getElementById('themeToggle').innerHTML = document.body.classList.contains('day-mode') ? '☀️' : '🌙'; }
        
        init();
    </script>
</body>
</html>
