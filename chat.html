<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mafia Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- ფერები და ბაზა --- */
        :root {
            --dark-bg: #1a0505; /* მუქი შინდისფერი */
            --burgundy: #800020;
            --cream: #f5f5dc;
            --text-white: #ffffff;
            --input-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body { height: 100vh; width: 100vw; overflow: hidden; transition: 0.3s; }
        
        /* ღამის რეჟიმი (Default) */
        body.dark-mode { background: radial-gradient(circle, #2a0505, #000); color: var(--text-white); }
        body.light-mode { background: var(--cream); color: #333; }
        body.light-mode .top-bar, body.light-mode .bottom-nav { background: #e2d2b0; border-color: var(--burgundy); }

        /* --- ანიმაციური გულები --- */
        .hearts-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .heart { position: absolute; color: var(--burgundy); font-size: 35px; animation: floatUp 10s linear infinite; opacity: 0.5; }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            20% { opacity: 0.7; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        /* --- ინტერფეისი --- */
        .app { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }

        .top-bar { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: rgba(0,0,0,0.4); border-bottom: 2px solid var(--burgundy); }
        
        .chat-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        /* მესიჯის სტილი */
        .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .msg.left { align-self: flex-start; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--burgundy); cursor: pointer; }
        .msg-bubble { background: rgba(128, 0, 32, 0.4); padding: 10px; border-radius: 15px 15px 15px 0; position: relative; }
        .msg-time { font-size: 10px; opacity: 0.6; display: block; margin-top: 4px; }

        /* საწერი ზოლი */
        .input-area { padding: 10px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.2); }
        .input-area input { flex: 1; padding: 12px 20px; border-radius: 25px; border: none; outline: none; font-size: 16px; }
        .send-btn { background: var(--burgundy); color: white; border: none; padding: 10px 18px; border-radius: 20px; font-weight: bold; }

        /* ქვედა ნავიგაცია */
        .bottom-nav { height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--burgundy); }
        .nav-item { font-size: 22px; cursor: pointer; position: relative; }
        .badge { position: absolute; top: -5px; right: -10px; background: red; font-size: 10px; padding: 2px 5px; border-radius: 50%; }

        /* --- პატარა მესინჯერი (Popup) --- */
        #mini-messenger { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; background: #2a0505; border: 2px solid var(--burgundy);
            border-radius: 15px; padding: 15px; display: none; z-index: 100;
            box-shadow: 0 0 20px #000;
        }

        /* --- ონლაინ სია (Side Panel) --- */
        #online-panel {
            position: fixed; right: 0; top: 0; width: 70%; height: 100%;
            background: #1a0505; z-index: 99; transform: translateX(100%);
            transition: 0.3s; padding: 20px; border-left: 2px solid var(--burgundy);
        }
        .user-cat { margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px; }

    </style>
</head>
<body class="dark-mode">

    <div class="hearts-box" id="hearts-layer"></div>

    <div class="app">
        <header class="top-bar">
            <span id="room-title">ოთახი #1</span>
            <select id="room-select" onchange="changeRoom(this.value)" style="background:none; color:white; border:1px solid var(--burgundy);">
                <script>
                    for(let i=1; i<=12; i++) document.write(`<option value="${i}">ოთახი ${i}</option>`);
                </script>
            </select>
        </header>

        <div class="chat-content" id="chat-box">
            <div class="msg left">
                <img src="https://i.pravatar.cc/100" class="msg-avatar" onclick="openMessenger('ნიკო')">
                <div class="msg-bubble">
                    <strong>ნიკო</strong>
                    <p>გამარჯობა! 👋</p>
                    <span class="msg-time">22:15</span>
                </div>
            </div>
        </div>

        <div class="input-area">
            <button style="background:none; border:none; font-size:22px;">😊</button>
            <input type="text" id="msg-input" placeholder="დაწერე რამე...">
            <button class="send-btn" onclick="sendMsg()">გაგზავნა</button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item">🏠</div>
            <div class="nav-item">💬 <span class="badge" id="sms-count">0</span></div>
            <div class="nav-item" onclick="toggleOnline()">👥</div>
            <div class="nav-item" onclick="toggleTheme()">🌙</div>
        </nav>
    </div>

    <div id="mini-messenger">
        <h4 id="messenger-name">ჩეთი</h4>
        <div style="height: 150px; overflow-y: auto; border: 1px solid #444; margin: 10px 0; padding: 5px;" id="pm-box"></div>
        <input type="text" placeholder="პირადი სმს..." style="width: 100%; padding: 8px;">
        <button onclick="closeMessenger()" style="margin-top: 10px;">დახურვა</button>
    </div>

    <div id="online-panel">
        <button onclick="toggleOnline()">❌ დახურვა</button>
        <div class="user-cat" style="color: gold;">👑 დამფუძნებლები</div>
        <div id="list-founders"></div>
        <div class="user-cat" style="color: silver;">🛡️ ადმინები</div>
        <div id="list-admins"></div>
        <div class="user-cat">👥 წევრები</div>
        <div id="list-members"></div>
    </div>

    <script>
        // --- გულების ფუნქცია ---
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.getElementById('hearts-layer').appendChild(heart);
            setTimeout(() => heart.remove(), 10000);
        }
        setInterval(createHeart, 1200);

        // --- რეჟიმის შეცვლა ---
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');
        }

        // --- ოთახის შეცვლა ---
        function changeRoom(val) {
            document.getElementById('room-title').innerText = "ოთახი #" + val;
            document.getElementById('chat-box').innerHTML = ""; // ასუფთავებს ჩატს
        }

        // --- მესიჯის გაგზავნა (ვიზუალური) ---
        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(!inp.value) return;
            
            const box = document.getElementById('chat-box');
            const d = new Date();
            const time = d.getHours() + ":" + d.getMinutes();

            box.innerHTML += `
                <div class="msg left">
                    <img src="https://i.pravatar.cc/101" class="msg-avatar">
                    <div class="msg-bubble">
                        <strong>მე</strong>
                        <p>${inp.value}</p>
                        <span class="msg-time">${time}</span>
                    </div>
                </div>
            `;
            inp.value = "";
            box.scrollTop = box.scrollHeight;
        }

        // --- პატარა მესინჯერი ---
        function openMessenger(name) {
            document.getElementById('messenger-name').innerText = "ჩეთი: " + name;
            document.getElementById('mini-messenger').style.display = 'block';
        }
        function closeMessenger() {
            document.getElementById('mini-messenger').style.display = 'none';
        }

        // --- ონლაინ სიის გამოჩენა ---
        let onlineVisible = false;
        function toggleOnline() {
            const panel = document.getElementById('online-panel');
            onlineVisible = !onlineVisible;
            panel.style.transform = onlineVisible ? 'translateX(0)' : 'translateX(100%)';
        }
    </script>
</body>
</html>
