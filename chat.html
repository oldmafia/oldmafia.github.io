<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Magical Chat - Old Mafia 💖</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            /* ღამის რეჟიმი (ნაგულისხმევი) */
            --bg: #1a0205; --panel: #2d0a0e; --text: #eecaca; --maroon: #800020; --gold: #ffd700;
        }
        .light-mode {
            --bg: #f5f5dc; --panel: #ffffff; --text: #800020;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; transition: 0.5s; }

        /* მცურავი გულები */
        .hearts-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .heart { position: absolute; color: var(--maroon); opacity: 0.5; animation: floatUp 7s linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(110vh) rotate(0deg); } 100% { transform: translateY(-10vh) rotate(360deg); } }

        /* სტრუქტურა */
        .container { display: flex; height: 100vh; position: relative; z-index: 1; }
        .sidebar { width: 320px; background: var(--panel); border-right: 2px solid var(--maroon); display: flex; flex-direction: column; padding: 15px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .chat-area { flex: 1; display: flex; flex-direction: column; }

        /* ოთახების სტილი */
        .rooms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .room-btn { padding: 10px; border: 1px solid var(--maroon); border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; transition: 0.3s; }
        .room-btn.active { background: var(--maroon); color: white; }

        /* მესიჯები */
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { align-self: flex-start; display: flex; gap: 10px; max-width: 80%; }
        .msg-bubble { background: var(--panel); padding: 10px 15px; border-radius: 15px 15px 15px 0; border: 1px solid var(--maroon); position: relative; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--maroon); cursor: pointer; }
        .msg-time { font-size: 10px; opacity: 0.6; display: block; margin-top: 5px; }

        /* როლები */
        .role-badge { font-size: 9px; padding: 2px 5px; border-radius: 4px; vertical-align: middle; margin-left: 5px; }
        .role-founder { background: var(--gold); color: black; }
        .role-admin { background: var(--maroon); color: white; }

        /* ინდიკატორი */
        #unread-pvt { position: absolute; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 11px; margin-left: -10px; }

        /* Input */
        .input-bar { padding: 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid var(--maroon); background: var(--bg); color: var(--text); outline: none; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="hearts-bg" id="hearts-box"></div>

<div class="container">
    <aside class="sidebar">
        <div style="text-align:center">
            <img id="my-avatar" src="https://via.placeholder.com/60" style="width:60px; height:60px; border-radius:50%; border:2px solid var(--gold)">
            <h3 id="my-nick">...</h3>
            <button onclick="document.body.classList.toggle('light-mode')" style="background:var(--maroon); color:white; border:none; border-radius:10px; padding:5px 10px; cursor:pointer">☀️/🌙</button>
        </div>

        <div class="rooms-grid">
            <script>
                for(let i=1; i<=12; i++) document.write(`<div class="room-btn" id="room-${i}" onclick="joinRoom(${i})">ოთახი ${i}</div>`);
            </script>
        </div>

        <div style="overflow-y:auto">
            <h5 style="color:var(--gold)">👑 დამფუძნებლები</h5>
            <div id="list-founder"></div>
            <h5 style="color:#ff4d4d">🛡️ ადმინები</h5>
            <div id="list-admin"></div>
            <h5>👥 წევრები</h5>
            <div id="list-member"></div>
        </div>
    </aside>

    <main class="chat-area">
        <div class="messages" id="msg-box"></div>
        <div class="input-bar">
            <button onclick="toggleEmoji()" style="font-size:20px; background:none; border:none; cursor:pointer">😊</button>
            <input type="text" id="msg-input" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:var(--maroon); color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer">გაგზავნა</button>
        </div>
    </main>
</div>

<script>
    const SB_URL = "https://ftfciebnywbondaiarnc.supabase.co"; // შენი პროექტის URL
    const SB_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    let currentRoom = 1;
    let me = null;

    // 1. გულების გენერაცია
    setInterval(() => {
        const h = document.createElement('div');
        h.className = 'heart'; h.innerHTML = '❤';
        h.style.left = Math.random() * 100 + 'vw';
        h.style.fontSize = (Math.random() * 20 + 20) + 'px';
        document.getElementById('hearts-box').appendChild(h);
        setTimeout(() => h.remove(), 7000);
    }, 800);

    // 2. მონაცემების ჩატვირთვა (Messages)
    async function loadMessages() {
        const { data } = await _sb.from('messages').select('*, profiles(*)').eq('room_id', currentRoom).order('created_at', {ascending: true});
        const box = document.getElementById('msg-box');
        box.innerHTML = '';
        data?.forEach(m => {
            const isBoss = me?.role === 'admin' || me?.role === 'founder';
            box.innerHTML += `
                <div class="msg">
                    <img src="${m.profiles.avatar_url}" class="msg-avatar">
                    <div class="msg-bubble">
                        <strong style="font-size:12px">${m.profiles.nickname}</strong>
                        <div>${m.content}</div>
                        <span class="msg-time">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        ${isBoss ? `<small onclick="delMsg('${m.id}')" style="color:red; cursor:pointer">წაშლა</small>` : ''}
                    </div>
                </div>
            `;
        });
        box.scrollTop = box.scrollHeight;
    }

    // 3. გაგზავნა
    async function send() {
        const el = document.getElementById('msg-input');
        if(!el.value) return;
        await _sb.from('messages').insert([{ content: el.value, room_id: currentRoom, profile_id: me.id }]);
        el.value = '';
    }

    // 4. ადმინ ფუნქცია: წაშლა
    async function delMsg(id) {
        if(confirm("წავშალოთ?")) {
            await _sb.from('messages').delete().eq('id', id);
            loadMessages();
        }
    }

    // 5. ოთახის შეცვლა
    function joinRoom(id) {
        currentRoom = id;
        document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`room-${id}`).classList.add('active');
        loadMessages();
    }

    // 6. Realtime მოსმენა
    _sb.channel('db-changes').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, () => loadMessages()).subscribe();

    // 7. საწყისი იდენტიფიკაცია (მაგალითისთვის)
    async function init() {
        const { data: { user } } = await _sb.auth.getUser();
        if(user) {
            const { data: prof } = await _sb.from('profiles').select('*').eq('id', user.id).single();
            me = prof;
            document.getElementById('my-nick').innerText = me.nickname;
            document.getElementById('my-avatar').src = me.avatar_url;
        }
        loadMessages();
    }

    init();
</script>
</body>
</html>
