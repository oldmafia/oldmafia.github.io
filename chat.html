<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --red: #e34d4d;
            --dark: #12161f;
            --darker: #0c0f16;
            --card: #191e2a;
            --text: #eef2ff;
            --border: #262d3a;
        }

        body {
            font-family: -apple-system, 'Segoe UI', system-ui;
            background: var(--dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* REGISTER SCREEN */
        .register-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.96);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-box {
            background: var(--card);
            border-radius: 48px;
            padding: 48px 32px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            border: 2px solid var(--red);
        }

        .register-box h1 {
            color: var(--red);
            font-size: 32px;
            margin-bottom: 8px;
        }

        .register-box p {
            color: #8b92a8;
            margin-bottom: 28px;
        }

        .register-box input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border);
            border-radius: 60px;
            background: var(--darker);
            color: var(--text);
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
        }

        .register-box input:focus {
            outline: none;
            border-color: var(--red);
        }

        .register-box button {
            width: 100%;
            padding: 14px;
            background: var(--red);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .register-error {
            color: var(--red);
            margin-top: 12px;
            font-size: 13px;
        }

        /* MAIN APP */
        .app {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .top-bar {
            background: var(--darker);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--red);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--red);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-name {
            background: var(--card);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text);
        }

        .tabs {
            display: flex;
            background: var(--darker);
            padding: 0 12px;
            gap: 4px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 12px 18px;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.6;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            opacity: 1;
            color: var(--red);
            border-bottom-color: var(--red);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .room-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
        }

        .room-card:active {
            background: var(--red);
            transform: scale(0.97);
        }

        .room-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .room-name {
            font-weight: bold;
            font-size: 15px;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--card);
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .user-row:active {
            background: var(--red);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--red);
        }

        .profile-header {
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--red);
            cursor: pointer;
            margin-bottom: 16px;
        }

        .status-input {
            width: 90%;
            padding: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text);
            text-align: center;
            margin-top: 16px;
        }

        .chat-room {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--dark);
            z-index: 1000;
        }

        .chat-header {
            background: var(--darker);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            background: var(--card);
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 85%;
        }

        .message.my {
            align-self: flex-end;
            background: var(--red);
        }

        .message-name {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .chat-footer {
            background: var(--darker);
            padding: 12px;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
        }

        .send-btn {
            background: var(--red);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        .emoji-board {
            position: fixed;
            bottom: 80px;
            left: 12px;
            right: 12px;
            background: var(--card);
            border: 1px solid var(--red);
            border-radius: 28px;
            display: none;
            padding: 16px;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            max-height: 260px;
            overflow-y: auto;
            z-index: 1001;
        }

        .emoji-board.active {
            display: grid;
        }

        .emoji-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            cursor: pointer;
            background: var(--darker);
            border-radius: 12px;
            padding: 6px;
        }

        .admin-plus {
            border: 2px dashed var(--red);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            aspect-ratio: 1;
        }

        .pm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--darker);
            z-index: 10001;
            display: flex;
            flex-direction: column;
        }
