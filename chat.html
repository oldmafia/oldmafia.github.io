<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>შავი შინდისფერი - სოციალური ქსელი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0f1a 100%);
            color: #e0e0e0;
        }

        /* ჰედერი */
        .header {
            background: linear-gradient(90deg, #0f0a0f 0%, #1a0f1a 100%);
            border-bottom: 2px solid #8b1a3a;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff3366, #8b1a3a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            font-size: 32px;
        }

        .search-bar {
            background: #2a1a2a;
            border: 1px solid #8b1a3a;
            border-radius: 25px;
            padding: 10px 20px;
            width: 300px;
            color: #e0e0e0;
            outline: none;
            transition: all 0.3s;
        }

        .search-bar:focus {
            border-color: #ff3366;
            box-shadow: 0 0 10px rgba(255,51,102,0.3);
        }

        .user-menu {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .user-menu i {
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .user-menu i:hover {
            color: #ff3366;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3366, #8b1a3a);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }

        /* მთავარი კონტენტი */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            padding: 0 20px;
        }

        /* მარცხენა საიდბარი */
        .sidebar-left {
            background: linear-gradient(135deg, #0f0a0f, #1a0f1a);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #8b1a3a;
            height: fit-content;
        }

        .profile-card {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #8b1a3a;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3366, #8b1a3a);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .profile-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .menu-item {
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-item:hover {
            background: #8b1a3a;
            transform: translateX(5px);
        }

        /* ძირითადი ფიდი */
        .main-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .create-post {
            background: linear-gradient(135deg, #0f0a0f, #1a0f1a);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #8b1a3a;
        }

        .post-input {
            background: #2a1a2a;
            border: 1px solid #8b1a3a;
            border-radius: 25px;
            padding: 15px;
            width: 100%;
            color: #e0e0e0;
            resize: none;
            font-family: inherit;
            outline: none;
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .post-btn {
            background: linear-gradient(135deg, #ff3366, #8b1a3a);
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .post-btn:hover {
            transform: scale(1.05);
        }

        /* პოსტი */
        .post {
            background: linear-gradient(135deg, #0f0a0f, #1a0f1a);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #8b1a3a;
            transition: transform 0.2s;
        }

        .post:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139,26,58,0.3);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3366, #8b1a3a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .post-info h4 {
            font-size: 16px;
            margin-bottom: 3px;
        }

        .post-info p {
            font-size: 12px;
            color: #888;
        }

        .post-content {
            margin: 15px 0;
            line-height: 1.5;
        }

        .post-stats {
            display: flex;
            gap: 20px;
            padding: 10px 0;
            border-top: 1px solid #8b1a3a;
            border-bottom: 1px solid #8b1a3a;
            margin: 10px 0;
        }

        .post-stats span {
            cursor: pointer;
            transition: color 0.3s;
        }

        .post-stats span:hover {
            color: #ff3366;
        }

        .like-btn {
            cursor: pointer;
            transition: all 0.3s;
            font-size: 18px;
        }

        .like-btn.liked {
            color: #ff3366;
            animation: heartBeat 0.3s;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* მარჯვენა საიდბარი */
        .sidebar-right {
            background: linear-gradient(135deg, #0f0a0f, #1a0f1a);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #8b1a3a;
            height: fit-content;
        }

        .suggestion {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .suggestion:hover {
            background: #8b1a3a;
        }

        .suggestion-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3366, #8b1a3a);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .follow-btn {
            margin-left: auto;
            background: transparent;
            border: 1px solid #ff3366;
            padding: 5px 15px;
            border-radius: 20px;
            color: #ff3366;
            cursor: pointer;
            transition: all 0.3s;
        }

        .follow-btn:hover {
            background: #ff3366;
            color: white;
        }

        /* რესპონსივი */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar-left, .sidebar-right {
                display: none;
            }
            .search-bar {
                width: 200px;
            }
        }

        /* სქროლი */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f0a0f;
        }

        ::-webkit-scrollbar-thumb {
            background: #8b1a3a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff3366;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <span>❤️</span> SHINDI<span style="color: #ff3366;">SOCIAL</span>
            </div>
            <input type="text" class="search-bar" placeholder="🔍 ძებნა...">
            <div class="user-menu">
                <i>🏠</i>
                <i>👥</i>
                <i>💬</i>
                <i>🔔</i>
                <div class="avatar">👤</div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- მარცხენა საიდბარი -->
        <div class="sidebar-left">
            <div class="profile-card">
                <div class="profile-avatar">👤</div>
                <div class="profile-name">შინდის მეგობარი</div>
                <div style="color: #888; font-size: 14px;">@shindi_lover</div>
            </div>
            <div class="menu-item">
                <span>🏠</span> მთავარი
            </div>
            <div class="menu-item">
                <span>👥</span> მეგობრები
            </div>
            <div class="menu-item">
                <span>📷</span> ფოტოები
            </div>
            <div class="menu-item">
                <span>❤️</span> ლაიქები
            </div>
            <div class="menu-item">
                <span>⚙️</span> პარამეტრები
            </div>
        </div>

        <!-- ძირითადი ფიდი -->
        <div class="main-feed" id="feed">
            <div class="create-post">
                <textarea class="post-input" id="postInput" rows="3" placeholder="რა გინდა რომ გაიზიარო? 🍷"></textarea>
                <div class="post-actions">
                    <div style="display: flex; gap: 10px;">
                        <span style="cursor: pointer;">📷</span>
                        <span style="cursor: pointer;">🎥</span>
                        <span style="cursor: pointer;">❤️</span>
                    </div>
                    <button class="post-btn" onclick="createPost()">გაზიარება</button>
                </div>
            </div>

            <!-- პოსტები აქ დაემატება -->
        </div>

        <!-- მარჯვენა საიდბარი -->
        <div class="sidebar-right">
            <h3 style="margin-bottom: 15px;">✨ შესაძლოა მოგეწონოს</h3>
            <div class="suggestion">
                <div class="suggestion-avatar">🍷</div>
                <div>
                    <div style="font-weight: bold;">ღვინის მოყვარული</div>
                    <div style="font-size: 12px; color: #888;">15 მეგობარი</div>
                </div>
                <button class="follow-btn">მიყევი</button>
            </div>
            <div class="suggestion">
                <div class="suggestion-avatar">🎵</div>
                <div>
                    <div style="font-weight: bold;">მუსიკის ფანი</div>
                    <div style="font-size: 12px; color: #888;">23 მეგობარი</div>
                </div>
                <button class="follow-btn">მიყევი</button>
            </div>
            <div class="suggestion">
                <div class="suggestion-avatar">📸</div>
                <div>
                    <div style="font-weight: bold;">ფოტოგრაფი</div>
                    <div style="font-size: 12px; color: #888;">8 მეგობარი</div>
                </div>
                <button class="follow-btn">მიყევი</button>
            </div>

            <h3 style="margin: 20px 0 15px;">🔥 ტრენდული</h3>
            <div style="font-size: 14px; margin: 10px 0;">#შავიშინდი</div>
            <div style="font-size: 14px; margin: 10px 0;">#წითელიგული</div>
            <div style="font-size: 14px; margin: 10px 0;">#ქართულისოციალური</div>
        </div>
    </div>

    <script>
        let posts = [
            {
                id: 1,
                name: "შინდის გურმანი",
                username: "@wine_lover",
                avatar: "🍷",
                content: "შავი შინდისფერი ღამეები და წითელი გულები... 💔🍷",
                time: "2 საათის წინ",
                likes: 24,
                comments: 5,
                liked: false
            },
            {
                id: 2,
                name: "მთვარის შვილი",
                username: "@moon_child",
                avatar: "🌙",
                content: "შენი გული წითლად ანათებს შავ შინდისფერში ❤️",
                time: "5 საათის წინ",
                likes: 42,
                comments: 12,
                liked: true
            }
        ];

        function renderPosts() {
            const feed = document.getElementById('feed');
            const postsHTML = posts.map(post => `
                <div class="post" data-id="${post.id}">
                    <div class="post-header">
                        <div class="post-avatar">${post.avatar}</div>
                        <div class="post-info">
                            <h4>${post.name}</h4>
                            <p>${post.username} • ${post.time}</p>
                        </div>
                    </div>
                    <div class="post-content">
                        ${post.content}
                    </div>
                    <div class="post-stats">
                        <span class="like-btn" onclick="toggleLike(${post.id})" style="cursor: pointer;">
                            ${post.liked ? '❤️' : '🤍'} ${post.likes}
                        </span>
                        <span>💬 ${post.comments}</span>
                        <span>🔄 გაზიარება</span>
                    </div>
                </div>
            `).join('');
            
            feed.innerHTML = `
                <div class="create-post">
                    <textarea class="post-input" id="postInput" rows="3" placeholder="რა გინდა რომ გაიზიარო? 🍷"></textarea>
                    <div class="post-actions">
                        <div style="display: flex; gap: 10px;">
                            <span style="cursor: pointer;">📷</span>
                            <span style="cursor: pointer;">🎥</span>
                            <span style="cursor: pointer;">❤️</span>
                        </div>
                        <button class="post-btn" onclick="createPost()">გაზიარება</button>
                    </div>
                </div>
                ${postsHTML}
            `;
        }

        function createPost() {
            const input = document.getElementById('postInput');
            const content = input.value.trim();
            
            if (content) {
                const newPost = {
                    id: Date.now(),
                    name: "შინდის მეგობარი",
                    username: "@shindi_lover",
                    avatar: "👤",
                    content: content,
                    time: "ახლახანს",
                    likes: 0,
                    comments: 0,
                    liked: false
                };
                posts.unshift(newPost);
                renderPosts();
                input.value = '';
                
                // ანიმაცია
                const newPostEl = document.querySelector('.post');
                if (newPostEl) {
                    newPostEl.style.animation = 'heartBeat 0.5s';
                    setTimeout(() => {
                        newPostEl.style.animation = '';
                    }, 500);
                }
            }
        }

        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                if (post.liked) {
                    post.likes--;
                    post.liked = false;
                } else {
                    post.likes++;
                    post.liked = true;
                }
                renderPosts();
            }
        }

        // საწყისი რენდერი
        renderPosts();
    </script>
</body>
</html>
