<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s ease, color 0.2s ease; }
        
        body.night-mode {
            --bg: #030000;
            --sidebar: #0a0202;
            --card: #1a0a0a;
            --text: #eee;
            --border: #882222;
            --accent: #ff8888;
            --hover: #2a0a0a;
            --bubble-bg: #1a0a0a;
            --input-bg: #1a0808;
        }
        body.day-mode {
            --bg: #fff8f0;
            --sidebar: #fff8ed;
            --card: #ffffff;
            --text: #2c2418;
            --border: #e8d4b0;
            --accent: #c55a3a;
            --hover: #fff0e6;
            --bubble-bg: #ffffff;
            --input-bg: #ffffff;
            background-image: radial-gradient(circle at 15% 25%, rgba(255, 77, 77, 0.25) 3px, transparent 3px),
                              radial-gradient(circle at 75% 60%, rgba(255, 77, 77, 0.2) 2.5px, transparent 2.5px);
            background-size: 55px 55px, 40px 40px;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .logo {
            padding: 16px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }
        .profile-preview {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .profile-preview img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-preview .info { flex: 1; }
        .profile-preview .name { font-weight: bold; }
        .profile-preview .status { font-size: 12px; color: #888; }
        
        .menu-items {
            flex: 1;
            padding: 12px 0;
        }
        .menu-item {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text);
            border-radius: 8px;
            margin: 2px 8px;
        }
        .menu-item:hover { background: var(--hover); }
        .menu-item.active { background: var(--accent); color: white; }
        .menu-icon { font-size: 1.2rem; width: 28px; text-align: center; }
        
        .bottom-menu {
            border-top: 1px solid var(--border);
            padding: 12px 0;
        }
        
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--sidebar);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h2 { font-size: 1.2rem; color: var(--accent); }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 85%;
        }
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }
        .message-bubble {
            background: var(--bubble-bg);
            padding: 8px 12px;
            border-radius: 18px;
            border: 1px solid var(--border);
        }
        .message-name {
            font-weight: bold;
            color: var(--accent);
            font-size: 12px;
            margin-bottom: 4px;
        }
        .message-text { font-size: 14px; word-break: break-word; }
        .message-time { font-size: 10px; color: #888; margin-top: 4px; }
        
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: var(--sidebar);
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            outline: none;
        }
        .input-area button {
            background: var(--accent);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-size: 18px;
        }
        
        @media (max-width: 700px) {
            .sidebar { width: 70px; }
            .menu-item span:last-child, .profile-preview .info { display: none; }
            .logo { text-align: center; padding: 16px 0; font-size: 1.2rem; }
            .menu-icon { font-size: 1.5rem; width: 100%; text-align: center; }
            .profile-preview img { width: 40px; height: 40px; margin: 0 auto; }
            .profile-preview { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">🃏 MF</div>
    
    <div class="profile-preview" onclick="location.href='profile.html'">
        <img id="previewAvatar" src="https://i.ibb.co/v3m6y6R/avatar.png">
        <div class="info">
            <div class="name" id="previewName">...</div>
            <div class="status" id="previewStatus">...</div>
        </div>
    </div>
    
    <div class="menu-items" id="roomsList"></div>
    
    <div class="bottom-menu">
        <div class="menu-item" id="themeToggle">
            <div class="menu-icon" id="themeIcon">🌙</div>
            <span>რეჟიმი</span>
        </div>
        <div class="menu-item" onclick="logout()">
            <div class="menu-icon">🚪</div>
            <span>გასვლა</span>
        </div>
    </div>
</div>

<div class="main">
    <div class="chat-header">
        <h2 id="roomName">☕ კაფე-ბარი</h2>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">✈</button>
    </div>
</div>

<script>
    const supabase = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || 'მოთამაშე';
    let myAvatar = localStorage.getItem('avatar') || 'https://i.ibb.co/v3m6y6R/avatar.png';
    let currentRoom = "☕ კაფე-ბარი";
    
    const rooms = ["☕ კაფე-ბარი", "💎 ვიპ საუბრები", "🕴 მაფიის ღამე", "🕵️ გამოძიება", "🔐 შიფროგრამა", "❓ ვიქტორინა", "😵 ჩამოხრჩობანა", "🃏 ჯოკერი", "🎲 ნარდი", "📝 ფორუმი", "🎵 მუსიკა", "😂 იუმორი", "🏛️ ფორუმი", "🛡️ ადმინისტრაცია", "🆘 დახმარება"];
    
    function setTheme(theme) {
        document.body.classList.remove('night-mode', 'day-mode');
        if (theme === 'day') {
            document.body.classList.add('day-mode');
            document.getElementById('themeIcon').innerHTML = '☀️';
            localStorage.setItem('theme', 'day');
        } else {
            document.body.classList.add('night-mode');
            document.getElementById('themeIcon').innerHTML = '🌙';
            localStorage.setItem('theme', 'night');
        }
    }
    function toggleTheme() { setTheme(document.body.classList.contains('night-mode') ? 'day' : 'night'); }
    
    function loadRooms() {
        document.getElementById('roomsList').innerHTML = rooms.map(room => `
            <div class="menu-item ${room === currentRoom ? 'active' : ''}" onclick="changeRoom('${room}')">
                <div class="menu-icon">${room.charAt(0)}</div>
                <span>${room}</span>
            </div>
        `).join('');
    }
    
    function changeRoom(room) {
        if (room === "🃏 ჯოკერი") { window.location.href = 'joker.html'; return; }
        if (room === "🎲 ნარდი") { window.location.href = 'nardi.html'; return; }
        if (room === "📝 ფორუმი") { window.location.href = 'forum.html'; return; }
        currentRoom = room;
        document.getElementById('roomName').innerHTML = room;
        loadRooms();
        loadMessages();
        if (room === "❓ ვიქტორინა") setTimeout(startQuiz, 1000);
        if (room === "🔐 შიფროგრამა") setTimeout(startCipher, 1000);
    }
    
    async function loadProfilePreview() {
        const { data: profile } = await supabase.from('profiles').select('avatar_url, status').eq('username', myNick).single();
        if (profile) {
            document.getElementById('previewAvatar').src = profile.avatar_url || myAvatar;
            document.getElementById('previewName').innerText = myNick;
            document.getElementById('previewStatus').innerText = profile.status || '💬';
        }
    }
    
    async function loadMessages() {
        const { data: msgs } = await supabase.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const { data: profiles } = await supabase.from('profiles').select('username, avatar_url');
        const avatarMap = {};
        profiles?.forEach(p => { avatarMap[p.username] = p.avatar_url; });
        const container = document.getElementById('chatMessages');
        if (!msgs?.length) { container.innerHTML = '<div style="text-align:center; padding:40px; color:#888;">💬 მესიჯები არ არის</div>'; return; }
        container.innerHTML = msgs.map(m => `<div class="message"><img class="message-avatar" src="${m.user_name.includes('BOT') ? 'https://cdn-icons-png.flaticon.com/512/4712/4712035.png' : (avatarMap[m.user_name] || 'https://i.ibb.co/v3m6y6R/avatar.png')}"><div class="message-bubble"><div class="message-name">${escapeHtml(m.user_name)}</div><div class="message-text">${escapeHtml(m.text)}</div><div class="message-time">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div></div></div>`).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    async function sendMsg() {
        const inp = document.getElementById('msgInput');
        if (!inp.value.trim()) return;
        await supabase.from('messages').insert({ user_name: myNick, text: inp.value, room_name: currentRoom });
        inp.value = '';
        loadMessages();
    }
    
    async function startQuiz() {
        const { data: q } = await supabase.from('quiz_questions').select('*');
        if (!q?.length) return;
        const question = q[Math.floor(Math.random() * q.length)];
        await supabase.from('messages').insert({ room_name: "❓ ვიქტორინა", user_name: "🤖 QUIZ_BOT", text: `❓ **ვიქტორინა:** ${question.question}` });
    }
    async function startCipher() {
        const { data: c } = await supabase.from('cipher_games').select('*');
        if (!c?.length) return;
        const cipher = c[Math.floor(Math.random() * c.length)];
        await supabase.from('messages').insert({ room_name: "🔐 შიფროგრამა", user_name: "🔐 CIPHER_BOT", text: `🧩 **ააწყვეთ სიტყვა:** 👉 ${cipher.scrambled}` });
    }
    
    function logout() { localStorage.clear(); location.href = 'index.html'; }
    function escapeHtml(t) { return t?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) || ''; }
    
    window.changeRoom = changeRoom;
    const savedTheme = localStorage.getItem('theme') || 'night';
    setTheme(savedTheme);
    document.getElementById('themeToggle').onclick = toggleTheme;
    loadRooms();
    loadProfilePreview();
    loadMessages();
    supabase.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
    setInterval(() => supabase.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick), 30000);
</script>
</body>
</html>
