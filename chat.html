<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Old Mafia - სრული ჩატი</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body {
            background: #0a0508;
            color: #f0e6e8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .nav-bar {
            display: flex;
            justify-content: space-around;
            background: #120a0c;
            padding: 10px;
            border-bottom: 2px solid #8b0000;
        }
        .nav-btn {
            font-size: 22px;
            background: none;
            border: none;
            color: #aa8a8a;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 30px;
        }
        .nav-btn.active {
            color: #8b0000;
            background: rgba(139,0,0,0.2);
        }
        .pages {
            flex: 1;
            position: relative;
        }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
            padding: 15px;
        }
        .page.active {
            display: block;
        }
        .section-title {
            font-size: 18px;
            margin-bottom: 12px;
            color: #8b0000;
            border-left: 3px solid #8b0000;
            padding-left: 10px;
        }
        .room-card {
            background: #1a0f12;
            padding: 14px;
            margin-bottom: 8px;
            border-radius: 10px;
            border-left: 4px solid #8b0000;
            cursor: pointer;
        }
        .chat-view {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0508;
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }
        .chat-header {
            background: #1a0f12;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .close-btn {
            background: none;
            border: none;
            color: #8b0000;
            font-size: 24px;
            cursor: pointer;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            background: #1a0f12;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            align-self: flex-start;
        }
        .message.own {
            background: #8b0000;
            align-self: flex-end;
        }
        .message-name {
            font-size: 11px;
            font-weight: bold;
            color: #8b0000;
        }
        .message.own .message-name { color: #ffcccc; }
        .message-time {
            font-size: 9px;
            opacity: 0.6;
            margin-left: 5px;
        }
        .chat-input-area {
            background: #1a0f12;
            padding: 10px;
            display: flex;
            gap: 8px;
            border-radius: 25px;
            margin-top: 8px;
        }
        .chat-input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #8b0000;
            background: #1f1216;
            color: white;
            outline: none;
        }
        .send-btn {
            background: #8b0000;
            border: none;
            color: white;
            width: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        .user-item {
            background: #1a0f12;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }
        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .friend-badge {
            position: absolute;
            right: 10px;
            background: #2d6a4f;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
        }
        .add-badge {
            position: absolute;
            right: 10px;
            background: #8b0000;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
        }
        .request-badge {
            position: absolute;
            right: 10px;
            background: #b8860b;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
        }
        .profile-card {
            text-align: center;
            padding: 20px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto;
            cursor: pointer;
        }
        .status-input {
            width: 80%;
            margin-top: 15px;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #8b0000;
            background: #1f1216;
            color: white;
            text-align: center;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
        }
        .heart {
            position: fixed;
            bottom: 0;
            font-size: 32px;
            pointer-events: none;
            animation: floatUp 5s forwards;
            z-index: 9999;
        }
        @keyframes floatUp {
            0% { bottom: 0; opacity: 1; transform: scale(0.5); }
            50% { transform: scale(1.3); }
            100% { bottom: 100%; opacity: 0; transform: translateX(50px) rotate(360deg); }
        }
        .notification {
            position: fixed;
            top: 70px;
            right: 10px;
            background: #8b0000;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            z-index: 9999;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .emoji-panel {
            position: fixed;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background: #1a0f12;
            border: 2px solid #8b0000;
            border-radius: 16px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            padding: 10px;
            z-index: 200;
            max-height: 250px;
            overflow-y: auto;
        }
        .emoji-panel.active { display: grid; }
        .emoji-item {
            font-size: 32px;
            text-align: center;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
        }
        .emoji-item:hover { background: #8b0000; }
        .pm-chat {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 300px;
            height: 400px;
            background: #1a0f12;
            border: 2px solid #8b0000;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            z-index: 200;
        }
        .pm-header {
            background: #8b0000;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            border-radius: 14px 14px 0 0;
            cursor: pointer;
        }
        .pm-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .pm-message {
            background: #1f1216;
            padding: 6px 10px;
            border-radius: 12px;
            margin-bottom: 5px;
            max-width: 85%;
        }
        .pm-message.own {
            background: #8b0000;
            margin-left: auto;
        }
        .pm-input-area {
            display: flex;
            padding: 8px;
            gap: 8px;
            border-top: 1px solid #4a1a2a;
        }
        .pm-input {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid #8b0000;
            background: #1f1216;
            color: white;
        }
        .album-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 10px;
        }
        .album-photo {
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid #8b0000;
        }
        .upload-btn {
            background: #8b0000;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 25px;
            margin: 10px 0;
            cursor: pointer;
            width: 100%;
        }
        .photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        .photo-modal-content {
            background: #1a0f12;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            border: 2px solid #8b0000;
        }
        .photo-modal-img { width: 100%; max-height: 55vh; object-fit: contain; }
        .photo-actions { display: flex; gap: 15px; justify-content: center; padding: 12px; }
        .photo-comments { padding: 10px; max-height: 150px; overflow-y: auto; border-top: 1px solid #4a1a2a; }
        .comment-item { padding: 5px 0; font-size: 12px; border-bottom: 1px solid #4a1a2a; }
        .comment-input-area { display: flex; gap: 8px; padding: 10px; }
        .comment-input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid #8b0000; background: #1f1216; color: white; }
        .like-btn { background: none; border: none; font-size: 20px; cursor: pointer; }
        .like-btn.active { color: #ff3366; }
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        .profile-modal-content {
            background: #1a0f12;
            border-radius: 20px;
            max-width: 350px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid #8b0000;
        }
        .profile-modal-header {
            background: #8b0000;
            padding: 15px;
            text-align: center;
            position: relative;
        }
        .profile-modal-close {
            position: absolute;
            right: 15px;
            top: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .profile-modal-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #5a0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto;
        }
        .profile-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 12px;
        }
        .action-btn {
            background: #5a0000;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .action-btn.success { background: #2d6a4f; }
        .action-btn.danger { background: #8b0000; }
        .delete-msg { background:none; border:none; cursor:pointer; font-size:12px; color:#ff4444; margin-left:10px; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="messages">💬</button>
        <button class="nav-btn" data-page="friends">👥</button>
        <button class="nav-btn" data-page="online">🌐</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button class="nav-btn" id="themeBtn">🌙</button>
    </div>

    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 12 სათამაშო ოთახი</div>
            <div id="roomsList"></div>
        </div>
        <div id="messagesPage" class="page">
            <div class="section-title">💬 პირადი მიმოწერა</div>
            <div id="pmList"></div>
        </div>
        <div id="friendsPage" class="page">
            <div class="section-title">👥 ჩემი მეგობრები</div>
            <div id="friendsList"></div>
            <div class="section-title" style="margin-top:20px;">📨 მეგობრობის მოთხოვნები</div>
            <div id="friendRequestsList"></div>
        </div>
        <div id="onlinePage" class="page">
            <div class="section-title">🌐 ყველა მომხმარებელი</div>
            <div id="onlineList"></div>
        </div>
        <div id="profilePage" class="page">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()">👤</div>
                <h2 id="profileName"></h2>
                <input type="text" id="statusInput" class="status-input" placeholder="სტატუსი...">
                <button class="upload-btn" onclick="saveStatus()">💾 სტატუსის შენახვა</button>
                <div class="section-title" style="margin-top:20px;">📸 ჩემი ალბომი</div>
                <button class="upload-btn" onclick="document.getElementById('albumInput').click()">➕ ფოტოს დამატება</button>
                <div id="albumGrid" class="album-grid"></div>
                <input type="file" id="albumInput" hidden accept="image/*" onchange="addToAlbum(this)">
            </div>
            <input type="file" id="avatarInput" hidden accept="image/*" onchange="uploadAvatar(this)">
            <input type="file" id="emojiUploadInput" hidden accept="image/*" onchange="uploadEmojiImage(this)">
        </div>
    </div>

    <div id="chatView" class="chat-view" style="display: none;">
        <div class="chat-header">
            <span id="chatRoomName">ოთახი</span>
            <button class="close-btn" onclick="closeChat()">✕</button>
        </div>
        <div id="chatMessages" class="messages"></div>
        <div class="chat-input-area">
            <button class="icon-btn" onclick="openEmojiPanel()">😊</button>
            <button class="icon-btn" onclick="document.getElementById('chatPhotoInput').click()">📷</button>
            <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
        <input type="file" id="chatPhotoInput" hidden accept="image/*" onchange="addPhotoToMessage(this)">
    </div>
    <div id="emojiPanel" class="emoji-panel"></div>
    <div id="hearts"></div>

    <script>
        let currentUser = localStorage.getItem('mafia_user');
        if (!currentUser || currentUser === "null") {
            currentUser = localStorage.getItem('nickname');
            if (!currentUser) currentUser = "Abu007";
            localStorage.setItem('mafia_user', currentUser);
        }
        document.getElementById('profileName').innerHTML = currentUser;
        
        let currentRoom = null;
        let currentPMUser = null;
        let pendingImage = null;
        let users = [];
        let messages = [];
        let privateMessages = [];
        let friendRequests = [];
        let customEmojis = [];
        let userAlbums = {};
        let photoInteractions = {};
        
        const ROOMS = [
            "☕ კაფე-ბარი", "🎲 ნარდი", "🃏 ჯოკერი", "💎 VIP", "📝 ფორუმი",
            "🛠️ ადმინები", "😂 იუმორი", "🏆 შიფროგრამა", "🎭 გამოძიება",
            "🎵 მუსიკა", "⁉️ ვიქტორინა", "🆘 დახმარება"
        ];
        
        const OWNER = "Abu007";
        const ADMINS = ["Abu007", "Lukinio", "AdminMafia"];
        
        function loadData() {
            let savedUsers = localStorage.getItem('mafia_users');
            if (savedUsers) users = JSON.parse(savedUsers);
            else users = [
                { username: "Abu007", status: "👑 დამფუძნებელი", avatar: null, role: "owner" },
                { username: "Lukinio", status: "🔧 ადმინი", avatar: null, role: "admin" },
                { username: "Giorgi", status: "ონლაინ", avatar: null, role: "user" },
                { username: "Nika", status: "ონლაინ", avatar: null, role: "user" }
            ];
            
            let savedMessages = localStorage.getItem('mafia_messages');
            if (savedMessages) messages = JSON.parse(savedMessages);
            else messages = [];
            
            let savedPM = localStorage.getItem('mafia_pm');
            if (savedPM) privateMessages = JSON.parse(savedPM);
            else privateMessages = [];
            
            let savedRequests = localStorage.getItem('mafia_friend_requests');
            if (savedRequests) friendRequests = JSON.parse(savedRequests);
            else friendRequests = [];
            
            let savedEmojis = localStorage.getItem('mafia_emojis');
            if (savedEmojis) customEmojis = JSON.parse(savedEmojis);
            else customEmojis = [];
            
            let savedAlbums = localStorage.getItem('mafia_albums');
            if (savedAlbums) userAlbums = JSON.parse(savedAlbums);
            else userAlbums = {};
            
            let savedInteractions = localStorage.getItem('mafia_photo_interactions');
            if (savedInteractions) photoInteractions = JSON.parse(savedInteractions);
            else photoInteractions = {};
            
            if (!users.find(u => u.username === currentUser)) {
                users.push({ username: currentUser, status: "ახალი მოთამაშე", avatar: null, role: "user" });
                saveUsers();
            }
            
            let user = users.find(u => u.username === currentUser);
            if (user?.avatar) {
                document.getElementById('profileAvatar').style.backgroundImage = `url(${user.avatar})`;
                document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                document.getElementById('profileAvatar').innerHTML = '';
            }
            if (user?.status) document.getElementById('statusInput').value = user.status;
            renderAlbum();
        }

        // სინქრონიზაციის მთავარი ფუნქცია:
        window.addEventListener('storage', (e) => {
            loadData(); // მონაცემების თავიდან ჩატვირთვა
            if (currentRoom) renderMessages(); // თუ ჩატი ღიაა, განახლება
            if (currentPMUser) renderPMChat(); // თუ პირადი ჩატი ღიაა
            renderOnlineUsers();
            renderFriendsList();
            renderFriendRequestsList();
            renderPrivateChatsList();
        });
        
        function saveUsers() { localStorage.setItem('mafia_users', JSON.stringify(users)); }
        function saveMessages() { localStorage.setItem('mafia_messages', JSON.stringify(messages)); }
        function savePM() { localStorage.setItem('mafia_pm', JSON.stringify(privateMessages)); }
        function saveRequests() { localStorage.setItem('mafia_friend_requests', JSON.stringify(friendRequests)); }
        function saveEmojis() { localStorage.setItem('mafia_emojis', JSON.stringify(customEmojis)); }
        function saveAlbums() { localStorage.setItem('mafia_albums', JSON.stringify(userAlbums)); }
        function saveInteractions() { localStorage.setItem('mafia_photo_interactions', JSON.stringify(photoInteractions)); }
        
        function renderRooms() {
            let html = '';
            ROOMS.forEach(room => {
                html += `<div class="room-card" onclick="openRoom('${room}')">${room}</div>`;
            });
            document.getElementById('roomsList').innerHTML = html;
        }
        
        function openRoom(room) {
            currentRoom = room;
            document.getElementById('chatRoomName').innerHTML = `📡 ${room}`;
            document.getElementById('chatView').style.display = 'flex';
            renderMessages();
        }
        
        function closeChat() {
            currentRoom = null;
            document.getElementById('chatView').style.display = 'none';
        }
        
        function renderMessages() {
            let container = document.getElementById('chatMessages');
            let roomMessages = messages.filter(m => m.room === currentRoom).sort((a,b) => new Date(a.time) - new Date(b.time));
            if (roomMessages.length === 0) {
                container.innerHTML = '<div class="empty-state">💬 შეტყობინებები არ არის</div>';
                return;
            }
            let html = '';
            roomMessages.forEach(msg => {
                let isOwn = msg.user === currentUser;
                let time = new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let canDelete = (currentUser === OWNER) || ADMINS.includes(currentUser);
                html += `<div class="message ${isOwn ? 'own' : ''}">
                    <div><span class="message-name" onclick="showUserProfile('${msg.user}')">${escapeHtml(msg.user)}</span><span class="message-time">${time}</span></div>
                    <div class="message-text">${escapeHtml(msg.text)}${msg.image ? `<img src="${msg.image}" style="max-width:150px; border-radius:8px; margin-top:5px;" onclick="openPhotoModal('${msg.image}')">` : ''}</div>
                    ${canDelete ? `<button class="delete-msg" onclick="deleteMessage(${msg.id})">🗑️</button>` : ''}
                </div>`;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMessage() {
            let input = document.getElementById('messageInput');
            let text = input.value.trim();
            if (!text && !pendingImage) return;
            if (!currentRoom) return;
            
            messages.push({
                id: Date.now(),
                user: currentUser,
                text: text || "",
                time: new Date().toISOString(),
                room: currentRoom,
                image: pendingImage || null
            });
            saveMessages();
            input.value = '';
            pendingImage = null;
            renderMessages();
            spawnHeart();
        }
        
        function deleteMessage(msgId) {
            if (currentUser === OWNER || ADMINS.includes(currentUser)) {
                messages = messages.filter(m => m.id !== msgId);
                saveMessages();
                renderMessages();
                showNotification('✅ შეტყობინება წაიშალა!');
            } else {
                showNotification('❌ წაშლა მხოლოდ ადმინებს შეუძლიათ!');
            }
        }
        
        function addPhotoToMessage(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    pendingImage = e.target.result;
                    showNotification('📷 ფოტო დაემატა! დააჭირე გაგზავნას');
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }
        
        function openEmojiPanel() {
            let panel = document.getElementById('emojiPanel');
            if (panel.classList.contains('active')) { panel.classList.remove('active'); return; }
            let defaultEmojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺', '💀', '👑', '💪', '🤡', '👻', '⭐'];
            let allEmojis = [...defaultEmojis, ...customEmojis];
            panel.innerHTML = '';
            allEmojis.forEach(emoji => {
                let div = document.createElement('div');
                div.className = 'emoji-item';
                if (typeof emoji === 'string' && emoji.startsWith('http')) {
                    div.innerHTML = `<img src="${emoji}" style="width:42px; height:42px; object-fit:cover; border-radius:8px;">`;
                    div.onclick = () => {
                        document.getElementById('messageInput').value += ` :img:${emoji}: `;
                        panel.classList.remove('active');
                    };
                } else {
                    div.textContent = emoji;
                    div.onclick = () => {
                        document.getElementById('messageInput').value += emoji;
                        panel.classList.remove('active');
                    };
                }
                panel.appendChild(div);
            });
            if (ADMINS.includes(currentUser) || currentUser === OWNER) {
                let addBtn = document.createElement('div');
                addBtn.className = 'emoji-item';
                addBtn.textContent = '➕';
                addBtn.style.background = '#8b0000';
                addBtn.onclick = () => { panel.classList.remove('active'); document.getElementById('emojiUploadInput').click(); };
                panel.appendChild(addBtn);
            }
            panel.classList.add('active');
        }
        
        function uploadEmojiImage(input) {
            let file = input.files[0];
            if (file && (ADMINS.includes(currentUser) || currentUser === OWNER)) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    customEmojis.push(e.target.result);
                    saveEmojis();
                    showNotification('✅ ემოჯი დაემატა!');
                };
                reader.readAsDataURL(file);
            } else showNotification('❌ ემოჯის დამატება მხოლოდ ადმინებს შეუძლიათ!');
            input.value = '';
        }
        
        function renderOnlineUsers() {
            let container = document.getElementById('onlineList');
            let html = '';
            users.filter(u => u.username !== currentUser).forEach(user => {
                let isFriendUser = isFriend(user.username);
                let pendingFromMe = hasPendingFromMe(user.username);
                let pendingToMe = hasPendingToMe(user.username);
                let badge = '';
                if (isFriendUser) badge = '<div class="friend-badge">✅ მეგობარი</div>';
                else if (pendingFromMe) badge = '<div class="request-badge" style="background:orange;">⏳ მოთხოვნა</div>';
                else if (pendingToMe) badge = '<div class="request-badge" style="background:gold; color:black;" onclick="event.stopPropagation(); acceptFriendRequest(\''+user.username+'\')">✅ მიღება</div>';
                else badge = '<div class="add-badge" onclick="event.stopPropagation(); sendFriendRequest(\''+user.username+'\')">➕ დამატება</div>';
                html += `<div class="user-item" onclick="showUserProfile('${user.username}')">
                    <div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(user.username)} ${user.role === 'owner' ? '👑' : (user.role === 'admin' ? '🔧' : '')}</div><div class="user-status">${escapeHtml(user.status)}</div></div>
                    ${badge}
                </div>`;
            });
            container.innerHTML = html || '<div class="empty-state">მომხმარებლები არ არიან</div>';
        }
        
        function renderFriendsList() {
            let container = document.getElementById('friendsList');
            let friendsList = getFriendsList();
            let friendUsers = users.filter(u => friendsList.includes(u.username));
            if (friendUsers.length === 0) {
                container.innerHTML = '<div class="empty-state">მეგობრები არ არიან</div>';
                return;
            }
            let html = '';
            friendUsers.forEach(user => {
                html += `<div class="user-item" onclick="showUserProfile('${user.username}')">
                    <div class="user-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(user.username)}</div><div class="user-status">${escapeHtml(user.status)}</div></div>
                    <div class="friend-badge">✅ მეგობარი</div>
                </div>`;
            });
            container.innerHTML = html;
        }
        
        function renderFriendRequestsList() {
            let container = document.getElementById('friendRequestsList');
            let pendingRequests = friendRequests.filter(r => r.to === currentUser && r.status === 'pending');
            if (pendingRequests.length === 0) {
                container.innerHTML = '<div class="empty-state">მოთხოვნები არ არის</div>';
                return;
            }
            let html = '';
            pendingRequests.forEach(req => {
                let user = users.find(u => u.username === req.from);
                html += `<div class="user-item" style="justify-content:space-between;">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="user-avatar" style="${user?.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user?.avatar ? '' : req.from.charAt(0).toUpperCase()}</div>
                        <div><div class="user-name">${escapeHtml(req.from)}</div><div class="user-status">მეგობრობის მოთხოვნა</div></div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button onclick="acceptFriendRequest('${req.from}'); this.closest('.user-item').remove()" style="background:#2d6a4f; border:none; color:white; padding:5px 12px; border-radius:20px;">✅ მიღება</button>
                        <button onclick="rejectFriendRequest('${req.from}'); this.closest('.user-item').remove()" style="background:#8b0000; border:none; color:white; padding:5px 12px; border-radius:20px;">❌ უარყოფა</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }
        
        function sendFriendRequest(targetUser) {
            if (targetUser === currentUser) { showNotification('❓ საკუთარ თავს ვერ დაუმატებ'); return; }
            if (friendRequests.some(r => r.from === currentUser && r.to === targetUser && r.status === 'pending')) {
                showNotification('⏳ მოთხოვნა უკვე გაგზავნილია!'); return;
            }
            if (isFriend(targetUser)) { showNotification('👥 უკვე მეგობრები ხართ!'); return; }
            friendRequests.push({ from: currentUser, to: targetUser, status: 'pending', date: Date.now() });
            saveRequests();
            showNotification(`📨 მოთხოვნა გაეგზავნა ${targetUser}-ს!`);
            renderFriendRequestsList();
            renderOnlineUsers();
        }
        
        function acceptFriendRequest(fromUser) {
            let request = friendRequests.find(r => r.from === fromUser && r.to === currentUser && r.status === 'pending');
            if (request) {
                request.status = 'accepted';
                saveRequests();
                showNotification(`✅ ${fromUser} დაემატა მეგობრებში!`);
                renderFriendRequestsList();
                renderFriendsList();
                renderOnlineUsers();
            }
        }
        
        function rejectFriendRequest(fromUser) {
            let request = friendRequests.find(r => r.from === fromUser && r.to === currentUser && r.status === 'pending');
            if (request) {
                request.status = 'rejected';
                saveRequests();
                showNotification(`❌ მოთხოვნა უარყავით`);
                renderFriendRequestsList();
                renderOnlineUsers();
            }
        }
        
        function getFriendsList() {
            return friendRequests.filter(r => r.status === 'accepted' && (r.from === currentUser || r.to === currentUser))
                .map(r => r.from === currentUser ? r.to : r.from);
        }
        
        function isFriend(username) { return getFriendsList().includes(username); }
        function hasPendingFromMe(username) { return friendRequests.some(r => r.from === currentUser && r.to === username && r.status === 'pending'); }
        function hasPendingToMe(username) { return friendRequests.some(r => r.from === username && r.to === currentUser && r.status === 'pending'); }
        
        function startPM(username) {
            if (username === currentUser) { showNotification('საკუთარ თავთან არ შეიძლება'); return; }
            if (currentPMUser === username && document.getElementById('pmContainer')?.innerHTML) { closePM(); return; }
            currentPMUser = username;
            renderPMChat();
        }
        
        function renderPMChat() {
            let old = document.getElementById('pmContainer');
            if (old) old.remove();
            let pmMsgs = privateMessages.filter(m => (m.from === currentUser && m.to === currentPMUser) || (m.from === currentPMUser && m.to === currentUser)).sort((a,b) => new Date(a.time) - new Date(b.time));
            let pmHtml = `
                <div id="pmContainer" class="pm-chat">
                    <div class="pm-header" onclick="closePM()"><span>💬 ${escapeHtml(currentPMUser)}</span><span>✕</span></div>
                    <div class="pm-messages" id="pmMessages">${pmMsgs.map(msg => `<div class="pm-message ${msg.from === currentUser ? 'own' : ''}"><div style="font-size:9px;">${new Date(msg.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div><div>${escapeHtml(msg.text)}</div></div>`).join('') || '<div class="empty-state" style="padding:20px;">მიმოწერა ცარიელია</div>'}</div>
                    <div class="pm-input-area">
                        <button class="icon-btn" style="width:36px; height:36px; font-size:18px;" onclick="openPMEmojiPanel()">😊</button>
                        <input type="text" id="pmInput" class="pm-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendPM()">
                        <button class="icon-btn" style="width:36px; height:36px;" onclick="sendPM()">➤</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', pmHtml);
            let pmDiv = document.getElementById('pmMessages');
            if (pmDiv) pmDiv.scrollTop = pmDiv.scrollHeight;
            document.getElementById('pmInput')?.focus();
        }
        
        function openPMEmojiPanel() {
            let panel = document.getElementById('emojiPanel');
            if (panel.classList.contains('active')) { panel.classList.remove('active'); return; }
            let defaultEmojis = ['😊', '😂', '❤️', '🔥', '👍', '🎉', '😍', '🥳', '😎', '🥺', '💀', '👑', '💪', '🤡', '👻', '⭐'];
            let allEmojis = [...defaultEmojis, ...customEmojis];
            panel.innerHTML = '';
            allEmojis.forEach(emoji => {
                let div = document.createElement('div');
                div.className = 'emoji-item';
                if (typeof emoji === 'string' && emoji.startsWith('http')) {
                    div.innerHTML = `<img src="${emoji}" style="width:42px; height:42px; object-fit:cover; border-radius:8px;">`;
                    div.onclick = () => {
                        document.getElementById('pmInput').value += ` :img:${emoji}: `;
                        panel.classList.remove('active');
                    };
                } else {
                    div.textContent = emoji;
                    div.onclick = () => {
                        document.getElementById('pmInput').value += emoji;
                        panel.classList.remove('active');
                    };
                }
                panel.appendChild(div);
            });
            panel.classList.add('active');
        }
        
        function closePM() {
            let el = document.getElementById('pmContainer');
            if (el) el.remove();
            currentPMUser = null;
        }
        
        function sendPM() {
            let input = document.getElementById('pmInput');
            let text = input.value.trim();
            if (!text || !currentPMUser) return;
            privateMessages.push({
                id: Date.now(),
                from: currentUser,
                to: currentPMUser,
                text: text,
                time: new Date().toISOString()
            });
            savePM();
            input.value = '';
            renderPMChat();
            renderPrivateChatsList();
        }
        
        function renderPrivateChatsList() {
            let myPMs = privateMessages.filter(m => m.from === currentUser || m.to === currentUser);
            let usersSet = new Set();
            myPMs.forEach(m => {
                let other = m.from === currentUser ? m.to : m.from;
                usersSet.add(other);
            });
            let container = document.getElementById('pmList');
            if (usersSet.size === 0) {
                container.innerHTML = '<div class="empty-state">ჯერ არ გქონია მიმოწერა</div>';
                return;
            }
            let html = '';
            usersSet.forEach(username => {
                let lastMsg = myPMs.filter(m => (m.from === username || m.to === username)).pop();
                html += `<div class="user-item" onclick="startPM('${username}')">
                    <div class="user-avatar">${username.charAt(0).toUpperCase()}</div>
                    <div><div class="user-name">${escapeHtml(username)}</div><div class="user-status">${lastMsg ? lastMsg.text.substring(0,30) : '...'}</div></div>
                </div>`;
            });
            container.innerHTML = html;
        }
        
        function saveStatus() {
            let status = document.getElementById('statusInput').value;
            let user = users.find(u => u.username === currentUser);
            if (user) user.status = status;
            saveUsers();
            showNotification('✅ სტატუსი განახლდა!');
            renderOnlineUsers();
        }
        
        function uploadAvatar(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    let user = users.find(u => u.username === currentUser);
                    if (user) user.avatar = e.target.result;
                    saveUsers();
                    document.getElementById('profileAvatar').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('profileAvatar').style.backgroundSize = 'cover';
                    document.getElementById('profileAvatar').innerHTML = '';
                    renderOnlineUsers();
                    showNotification('✅ ავატარი განახლდა!');
                };
                reader.readAsDataURL(file);
            }
        }
        
        function renderAlbum() {
            let container = document.getElementById('albumGrid');
            let userAlbum = userAlbums[currentUser] || [];
            if (userAlbum.length === 0) {
                container.innerHTML = '<div class="empty-state">ალბომი ცარიელია</div>';
                return;
            }
            container.innerHTML = userAlbum.map(photo => `<img src="${photo}" class="album-photo" onclick="openPhotoModal('${photo}')">`).join('');
        }
        
        function addToAlbum(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    if (!userAlbums[currentUser]) userAlbums[currentUser] = [];
                    userAlbums[currentUser].push(e.target.result);
                    saveAlbums();
                    renderAlbum();
                    showNotification('📸 ფოტო დაემატა ალბომში!');
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }
        
        function openPhotoModal(photoUrl) {
            let interactions = photoInteractions[photoUrl] || { likes: [], comments: [] };
            let hasLiked = interactions.likes.includes(currentUser);
            let modal = document.createElement('div');
            modal.className = 'photo-modal';
            modal.innerHTML = `
                <div class="photo-modal-content">
                    <img src="${photoUrl}" class="photo-modal-img">
                    <div class="photo-actions">
                        <button class="like-btn ${hasLiked ? 'active' : ''}" onclick="likePhoto('${photoUrl}', this)">❤️ ${interactions.likes.length}</button>
                        <button class="action-btn" onclick="document.getElementById('photoCommentInput').focus()">💬 ${interactions.comments.length}</button>
                        <button class="action-btn success" onclick="setAsProfilePhoto('${photoUrl}'); this.closest('.photo-modal').remove()">👤 პროფილის ფოტოდ</button>
                    </div>
                    <div class="photo-comments" id="photoComments">
                        ${interactions.comments.map(c => `<div class="comment-item"><b>${escapeHtml(c.user)}</b>: ${escapeHtml(c.text)}</div>`).join('') || '<div>კომენტარები არ არის</div>'}
                    </div>
                    <div class="comment-input-area">
                        <input type="text" id="photoCommentInput" class="comment-input" placeholder="დაწერე კომენტარი...">
                        <button class="action-btn" onclick="addPhotoComment('${photoUrl}')">📝</button>
                    </div>
                </div>
            `;
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            document.body.appendChild(modal);
        }
        
        function likePhoto(photoUrl, btn) {
            if (!photoInteractions[photoUrl]) photoInteractions[photoUrl] = { likes: [], comments: [] };
            let idx = photoInteractions[photoUrl].likes.indexOf(currentUser);
            if (idx === -1) photoInteractions[photoUrl].likes.push(currentUser);
            else photoInteractions[photoUrl].likes.splice(idx, 1);
            saveInteractions();
            btn.innerHTML = `❤️ ${photoInteractions[photoUrl].likes.length}`;
            btn.classList.toggle('active');
        }
        
        function addPhotoComment(photoUrl) {
            let input = document.getElementById('photoCommentInput');
            let text = input.value.trim();
            if (!text) return;
            if (!photoInteractions[photoUrl]) photoInteractions[photoUrl] = { likes: [], comments: [] };
            photoInteractions[photoUrl].comments.push({ user: currentUser, text: text, time: Date.now() });
            saveInteractions();
            let commentsDiv = document.getElementById('photoComments');
            commentsDiv.innerHTML = photoInteractions[photoUrl].comments.map(c => `<div class="comment-item"><b>${escapeHtml(c.user)}</b>: ${escapeHtml(c.text)}</div>`).join('');
            input.value = '';
        }
        
        function setAsProfilePhoto(photoUrl) {
            let user = users.find(u => u.username === currentUser);
            if (user) user.avatar = photoUrl;
            saveUsers();
            document.getElementById('profileAvatar').style.backgroundImage = `url(${photoUrl})`;
            document.getElementById('profileAvatar').style.backgroundSize = 'cover';
            document.getElementById('profileAvatar').innerHTML = '';
            showNotification('✅ პროფილის ფოტო განახლდა!');
        }
        
        function showUserProfile(username) {
            let user = users.find(u => u.username === username);
            if (!user) return;
            let isFriendUser = isFriend(username);
            let pendingFromMe = hasPendingFromMe(username);
            let pendingToMe = hasPendingToMe(username);
            let modal = document.createElement('div');
            modal.className = 'profile-modal';
            modal.innerHTML = `
                <div class="profile-modal-content">
                    <div class="profile-modal-header">
                        <button class="profile-modal-close" onclick="this.closest('.profile-modal').remove()">✕</button>
                        <div class="profile-modal-avatar" style="${user.avatar ? `background-image:url(${user.avatar}); background-size:cover;` : ''}">${user.avatar ? '' : user.username.charAt(0).toUpperCase()}</div>
                        <h3>${escapeHtml(user.username)}</h3>
                        <div>${escapeHtml(user.status)}</div>
                        <div>${user.role === 'owner' ? '👑 დამფუძნებელი' : (user.role === 'admin' ? '🔧 ადმინი' : '👤 მომხმარებელი')}</div>
                    </div>
                    <div class="profile-actions">
                        ${!isFriendUser && username !== currentUser && !pendingFromMe && !pendingToMe ? `<button class="action-btn success" onclick="sendFriendRequest('${username}'); this.closest('.profile-modal').remove()">➕ მეგობრობის მოთხოვნა</button>` : ''}
                        ${pendingFromMe ? `<button class="action-btn" disabled style="background:orange;">⏳ მოთხოვნა გაგზავნილია</button>` : ''}
                        ${pendingToMe ? `<button class="action-btn success" onclick="acceptFriendRequest('${username}'); this.closest('.profile-modal').remove()">✅ მიღება</button><button class="action-btn danger" onclick="rejectFriendRequest('${username}'); this.closest('.profile-modal').remove()">❌ უარყოფა</button>` : ''}
                        ${isFriendUser ? `<button class="action-btn success" disabled>✅ მეგობარი</button>` : ''}
                        <button class="action-btn" onclick="startPM('${username}'); this.closest('.profile-modal').remove()">💬 მიწერა</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function spawnHeart() {
            let heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['❤️', '💖', '💗', '💕', '💘'][Math.floor(Math.random()*5)];
            heart.style.left = Math.random() * 90 + '%';
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        
        function startHearts() {
            setInterval(() => {
                let heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️', '💖', '💗', '💕'][Math.floor(Math.random()*4)];
                heart.style.left = Math.random() * 90 + '%';
                document.getElementById('hearts').appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 3000);
        }
        
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-page') === pageName) btn.classList.add('active');
            });
            if (pageName === 'online') renderOnlineUsers();
            if (pageName === 'friends') { renderFriendsList(); renderFriendRequestsList(); }
            if (pageName === 'messages') renderPrivateChatsList();
            if (pageName === 'profile') renderAlbum();
        }
        
        function showNotification(msg) {
            let notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
        
        function escapeHtml(text) {
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toggleTheme() {
            document.body.classList.toggle('day-mode');
            let btn = document.getElementById('themeBtn');
            btn.innerHTML = document.body.classList.contains('day-mode') ? '☀️' : '🌙';
        }
        
        function init() {
            loadData();
            renderRooms();
            renderOnlineUsers();
            renderFriendsList();
            renderFriendRequestsList();
            renderPrivateChatsList();
            startHearts();
            document.getElementById('themeBtn').addEventListener('click', toggleTheme);
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => showPage(btn.getAttribute('data-page')));
            });
            showPage('home');
        }
        
        init();
    </script>
</body>
</html>
