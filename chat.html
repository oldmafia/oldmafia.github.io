<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: #0b0000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ზედა ზოლი */
        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #500; height: 60px; flex-shrink: 0; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 25px; color: red; margin-right: 15px; }
        #room-name { font-weight: bold; color: red; flex: 1; text-align: center; font-size: 18px; }

        /* ჩატის ზონა */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050000; }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; max-width: 95%; }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid red; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        
        .bubble { background: #1a0000; border: 1px solid #333; padding: 8px 12px; border-radius: 4px 15px 15px 15px; word-wrap: break-word; position: relative; }
        .m-nick { font-weight: bold; color: #ff4d4d; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .m-time { font-size: 10px; color: #666; font-weight: normal; }
        .del-btn { color: #444; font-size: 12px; cursor: pointer; margin-left: 5px; }

        /* ინპუტი */
        .input-zone { background: black; padding: 12px; display: flex; gap: 10px; border-top: 1px solid #222; flex-shrink: 0; }
        .input-zone input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .send-btn { background: red; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; }

        /* მენიუ (Sidebar) */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #070000; transition: 0.3s; z-index: 4000; display: flex; flex-direction: column; border-right: 1px solid red; box-shadow: 2px 0 15px red; }
        .sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3500; }
        .overlay.active { display: block; }
        
        .sidebar-header { padding: 25px 15px; text-align: center; background: #1a0000; border-bottom: 1px solid red; }
        .sidebar-header img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid red; object-fit: cover; }
        
        .rooms-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .room-item { padding: 12px 20px; cursor: pointer; color: #ccc; font-size: 14px; border-bottom: 1px solid #111; }
        .room-item:hover { background: #1a0000; }
        .room-item.active { background: red; color: white; font-weight: bold; }

        /* მოდალი */
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #0a0000; border: 2px solid red; padding: 20px; border-radius: 20px; width: 290px; text-align: center; }
        .modal-btn { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #500; background: #200; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <input type="file" id="avatar-input" style="display:none" accept="image/*" onchange="uploadAvatar(this)">
        <img id="my-avatar-img" src="https://i.ibb.co/v3m6y6R/avatar.png" onclick="document.getElementById('avatar-input').click()">
        <div id="my-nick-label" style="font-weight:bold; color:red; margin-top:5px;">...</div>
        <div id="my-role-label" style="font-size: 11px; color: gold;">...</div>
    </div>
    
    <div class="rooms-list">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('💎 ვიპ საუბრები', this)">💎 ვიპ საუბრები</div>
        <div class="room-item" onclick="changeRoom('🕴 მაფიის ღამე', this)">🕴 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🕵️ გამოძიება', this)">🕵️ გამოძიება</div>
        <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('❓ ვიქტორინა', this)">❓ ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('😵 ჩამოხრჩობანა', this)">😵 ჩამოხრჩობანა</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('🎲 ნარდი', this)">🎲 ნარდი</div>
        <div class="room-item" onclick="changeRoom('🎵 მუსიკა', this)">🎵 მუსიკა</div>
        <div class="room-item" onclick="changeRoom('😂 იუმორი', this)">😂 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🛠 ადმინისტრაცია', this)">🛠 ადმინისტრაცია</div>
    </div>
    
    <div style="padding:15px; text-align:center; color:red; cursor:pointer;" onclick="logout()">🚪 გასვლა</div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">➤</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="targetAvatar" src="" style="width:80px; height:80px; border-radius:50%; border:2px solid red; object-fit: cover;">
        <h3 id="targetName" style="color:red; margin: 10px 0;">ნიკი</h3>
        <p id="targetRoleLabel" style="font-size:12px; color:gold;"></p>
        <div id="targetStatusText" style="font-size:14px; color:#0f0; margin-bottom: 10px;"></div>
        
        <button class="modal-btn" style="background: #004400;">✉ მიწერა (PM)</button>
        
        <div id="adminOptions" style="display:none; border-top: 1px solid #333; margin-top: 10px; padding-top: 10px;">
            <button class="modal-btn" onclick="setRole('Admin')">🛡️ ადმინისტრატორი</button>
            <button class="modal-btn" onclick="setRole('Owner')">👑 დამფუძნებელი</button>
            <button class="modal-btn" style="background: #444;" onclick="setRole('Member')">✨ როლის ჩახსნა</button>
            <button class="modal-btn" style="background: #400;" onclick="setRole('Banned')">🚫 დაბლოკვა</button>
        </div>
        
        <button class="modal-btn" style="background:#222; margin-top:10px;" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || "სტუმარი";
    let myRole = "Member";
    let currentRoom = "☕ კაფე-ბარი";
    let selectedUser = "";

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function closeModal() { document.getElementById('userModal').style.display = "none"; }
    
    function translateRole(r) {
        const roles = {'Owner': '👑 დამფუძნებელი', 'Admin': '🛡️ ადმინისტრატორი', 'Banned': '🚫 დაბლოკილი', 'Member': '👤 მომხმარებელი'};
        return roles[r] || '👤 მომხმარებელი';
    }

    async function init() {
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = p.role || "Member";
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-role-label').innerText = translateRole(myRole);
            document.getElementById('my-avatar-img').src = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
        }
        loadMessages();
        _s.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
    }

    async function loadMessages() {
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const { data: profs } = await _s.from('profiles').select('*');
        const box = document.getElementById("chat"); box.innerHTML = "";
        
        msgs?.forEach(m => {
            const p = profs?.find(u => u.username === m.user_name);
            const time = new Date(m.created_at).toLocaleTimeString('ka-GE', { hour: '2-digit', minute: '2-digit', hour12: false });
            box.innerHTML += `
                <div class="msg-container">
                    <img src="${p?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar" onclick="openProfile('${m.user_name}')">
                    <div class="bubble">
                        <span class="m-nick" onclick="openProfile('${m.user_name}')">${m.user_name} 
                            <span class="m-time">${time}</span>
                            ${myRole === "Owner" ? `<span class="del-btn" onclick="deleteMsg('${m.id}')">🗑️</span>` : ''}
                        </span>
                        <div style="margin-top:2px;">${m.text}</div>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function openProfile(n) {
        selectedUser = n;
        const { data: p } = await _s.from('profiles').select('*').eq('username', n).maybeSingle();
        if (p) {
            document.getElementById('targetName').innerText = p.username;
            document.getElementById('targetAvatar').src = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
            document.getElementById('targetRoleLabel').innerText = translateRole(p.role);
            document.getElementById('targetStatusText').innerText = p.status || "";
            document.getElementById('adminOptions').style.display = (myRole === "Owner" && n !== myNick) ? "block" : "none";
            document.getElementById('userModal').style.display = "flex";
        }
    }

    async function setRole(r) {
        if(confirm("დავადასტუროთ ცვლილება?")) {
            await _s.from('profiles').update({ role: r }).eq('username', selectedUser);
            alert("განახლდა!"); closeModal(); loadMessages();
        }
    }

    async function deleteMsg(id) {
        if(confirm("წავშალოთ მესიჯი?")) { await _s.from('messages').delete().eq('id', id); loadMessages(); }
    }

    function changeRoom(n, el) { 
        currentRoom = n; 
        document.getElementById('room-name').innerText = n; 
        document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        toggleMenu(); loadMessages(); 
    }
    
    async function sendMsg() {
        const i = document.getElementById("msg-input"); if (!i.value.trim()) return;
        await _s.from('messages').insert([{ user_name: myNick, text: i.value, room_name: currentRoom }]);
        i.value = "";
    }

    async function uploadAvatar(input) {
        const file = input.files[0]; if (!file) return;
        const fileName = `avatars/${myNick}-${Date.now()}.png`;
        const { data, error } = await _s.storage.from('avatars').upload(fileName, file);
        if (error) return alert("შეცდომა ატვირთვისას!");
        const { data: url } = _s.storage.from('avatars').getPublicUrl(fileName);
        await _s.from('profiles').update({ avatar_url: url.publicUrl }).eq('username', myNick);
        location.reload();
    }

    function logout() { localStorage.removeItem('nickname'); location.reload(); }
    window.onload = init;
</script>
</body>
</html>
