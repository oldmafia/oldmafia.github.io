<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
        body{--bg:#0a0508;--text:#f0e6e8;--card:#1a0f12;--border:#8b3a3a;--nav:#120a0c;--accent:#8b0000;background:var(--bg);color:var(--text);min-height:100vh;}
        body.day-mode{--bg:#fdf5e6;--text:#3a2a2a;--card:#fff;--border:#d9b0a0;--nav:#fae6d8;--accent:#9b2e2e;}
        
        .nav-bar{display:flex;justify-content:center;align-items:center;background:var(--nav);padding:10px;border-bottom:2px solid var(--accent);gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
        .nav-btn{font-size:18px;background:none;border:none;color:#aa8a8a;cursor:pointer;padding:8px 14px;border-radius:30px;}
        .nav-btn.active{color:var(--accent);background:rgba(139,0,0,0.2);}
        .logout-btn{background:#8b0000;color:white;border:none;padding:8px 14px;border-radius:20px;cursor:pointer;}
        #themeBtn{background:none;border:none;font-size:18px;cursor:pointer;padding:8px 14px;}
        
        .pages{position:relative;min-height:calc(100vh - 65px);}
        .page{display:none;padding:15px;}
        .page.active{display:block;}
        .section-title{font-size:16px;margin:12px 0;color:var(--accent);border-left:3px solid var(--accent);padding-left:10px;font-weight:bold;}
        
        .rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;}
        .room-card{background:var(--card);padding:14px;border-radius:12px;border-left:4px solid var(--accent);cursor:pointer;font-weight:bold;text-align:center;transition:0.2s;}
        .room-card:hover{transform:translateY(-2px);}
        
        .chat-container{display:flex;flex-direction:column;height:calc(100vh - 120px);}
        .chat-header{background:var(--card);padding:10px;border-radius:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
        .chat-header button{background:#5a0000;padding:5px 12px;border-radius:20px;border:none;color:white;cursor:pointer;}
        .messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
        
        .msg-row{display:flex;align-items:flex-end;gap:8px;max-width:80%;}
        .msg-row.own{flex-direction:row-reverse;align-self:flex-end;}
        .msg-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background-size:cover;}
        .message{background:var(--card);padding:8px 12px;border-radius:16px;word-break:break-word;max-width:100%;}
        .msg-row.own .message{background:var(--accent);}
        .message-name{font-weight:bold;font-size:11px;color:#ff8888;}
        .message-time{font-size:9px;opacity:0.6;margin-left:5px;}
        .message-text{font-size:13px;margin-top:3px;}
        .message-img{max-width:150px;border-radius:8px;margin-top:4px;cursor:pointer;}
        .delete-msg{float:right;background:none;border:none;color:#aaa;cursor:pointer;font-size:10px;margin-left:8px;}
        
        .chat-input-area{display:flex;gap:8px;padding:10px;background:var(--card);border-radius:20px;margin-top:8px;align-items:center;}
        .chat-input{flex:1;padding:10px 14px;border-radius:25px;border:1px solid var(--accent);background:var(--bg);color:var(--text);outline:none;}
        .send-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;color:white;cursor:pointer;font-size:18px;}
        .icon-btn{width:38px;height:38px;border-radius:50%;background:#5a0000;border:none;color:white;cursor:pointer;}
        
        #pendingImgWrap{display:none;padding:5px 10px;align-items:center;gap:8px;background:var(--card);border-radius:20px;margin-top:5px;}
        #pendingImgWrap img{max-height:40px;border-radius:6px;}
        
        .user-item{background:var(--card);padding:10px;border-radius:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;}
        .user-avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background-size:cover;position:relative;}
        .online-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;background:#2ecc71;border-radius:50%;border:2px solid var(--card);}
        
        .profile-avatar{width:90px;height:90px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:40px;margin:10px auto;cursor:pointer;background-size:cover;}
        .status-input{width:90%;padding:8px;margin:10px auto;border-radius:25px;border:1px solid var(--accent);background:var(--bg);color:var(--text);text-align:center;display:block;}
        .album-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
        .album-photo{aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;border:2px solid var(--accent);width:100%;}
        .upload-btn{background:var(--accent);border:none;color:white;padding:8px;border-radius:25px;margin:5px 0;cursor:pointer;width:100%;}
        
        .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:2000;}
        .modal-content{background:var(--card);border-radius:20px;padding:20px;max-width:320px;width:90%;text-align:center;}
        
        .pm-window{position:fixed;bottom:15px;right:15px;width:280px;height:360px;background:var(--card);border:2px solid var(--accent);border-radius:16px;display:flex;flex-direction:column;z-index:1500;}
        .pm-header{background:var(--accent);padding:8px 12px;border-radius:14px 14px 0 0;color:white;display:flex;justify-content:space-between;cursor:pointer;}
        .pm-messages{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}
        .pm-input{display:flex;padding:8px;gap:5px;border-top:1px solid var(--accent);}
        .pm-input input{flex:1;padding:6px 10px;border-radius:20px;border:1px solid var(--accent);background:var(--bg);color:var(--text);}
        
        .emoji-panel{position:fixed;bottom:80px;left:10px;right:10px;background:var(--card);border-radius:16px;display:none;padding:10px;z-index:1400;max-height:250px;overflow-y:auto;border:1px solid var(--accent);}
        .emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
        .emoji-item{font-size:24px;text-align:center;cursor:pointer;padding:5px;}
        
        .notification{position:fixed;top:70px;right:10px;background:var(--accent);padding:8px 16px;border-radius:30px;z-index:3000;animation:slideIn 0.3s;}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
        
        .empty-state{text-align:center;padding:30px;opacity:0.6;}
        button{background:var(--accent);color:white;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;}
        .action-btn{background:var(--accent);padding:5px 10px;border-radius:20px;font-size:11px;margin:2px;}
        
        .heart{position:fixed;bottom:-20px;pointer-events:none;z-index:9999;animation:floatUp 5s ease-in forwards;}
        @keyframes floatUp{0%{bottom:-20px;opacity:1;}100%{bottom:100%;opacity:0;transform:scale(1.2);}}
        
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-track{background:var(--border);}
        ::-webkit-scrollbar-thumb{background:var(--accent);}
    </style>
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn active" data-page="home">🏠</button>
        <button class="nav-btn" data-page="rooms">💬</button>
        <button class="nav-btn" data-page="messages">📨</button>
        <button class="nav-btn" data-page="friends">👥</button>
        <button class="nav-btn" data-page="online">🌐</button>
        <button class="nav-btn" data-page="profile">👤</button>
        <button id="themeBtn">🌙</button>
        <button class="logout-btn" onclick="window.location.href='index.html'">🚪</button>
    </div>

    <div class="pages">
        <div id="homePage" class="page active">
            <div class="section-title">🏰 სათამაშო ოთახები</div>
            <div class="rooms-grid" id="roomsList"></div>
        </div>
        <div id="roomsPage" class="page">
            <div class="section-title">🏠 ყველა ოთახი</div>
            <div class="rooms-grid" id="roomsListFull"></div>
        </div>
        <div id="messagesPage" class="page">
            <div class="section-title">💬 პირადი მიმოწერა</div>
            <div id="pmList"></div>
        </div>
        <div id="friendsPage" class="page">
            <div class="section-title">👥 მეგობრები</div>
            <div id="friendsList"></div>
            <div class="section-title">📨 მოთხოვნები</div>
            <div id="requestsList"></div>
        </div>
        <div id="onlinePage" class="page">
            <div class="section-title">🌐 ყველა მომხმარებელი</div>
            <div id="usersList"></div>
        </div>
        <div id="profilePage" class="page">
            <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarFile').click()">👤</div>
            <button class="upload-btn" style="background:#5a0000;" onclick="removeAvatar()">🗑️ ავატარის წაშლა</button>
            <h2 id="profileName" style="text-align:center;"></h2>
            <input type="text" id="statusInput" class="status-input" placeholder="სტატუსი...">
            <button class="upload-btn" onclick="saveStatus()">💾 შენახვა</button>
            <div class="section-title">📸 ალბომი</div>
            <button class="upload-btn" onclick="document.getElementById('albumFile').click()">➕ ფოტოს დამატება</button>
            <div id="albumGrid" class="album-grid"></div>
            <input type="file" id="avatarFile" hidden accept="image/*" onchange="uploadAvatar(this)">
            <input type="file" id="albumFile" hidden accept="image/*" onchange="addToAlbum(this)">
        </div>
        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-header">
                    <span id="chatRoomName"></span>
                    <button onclick="closeChat()">✕ გასვლა</button>
                </div>
                <div id="chatMessages" class="messages"></div>
                <div id="pendingImgWrap">
                    <img id="pendingImgPreview">
                    <button onclick="clearPendingImg()">✕</button>
                </div>
                <div class="chat-input-area">
                    <button class="icon-btn" onclick="toggleEmojiPanel()">😊</button>
                    <button class="icon-btn" onclick="document.getElementById('chatPhoto').click()">📷</button>
                    <input type="text" id="messageInput" class="chat-input" placeholder="დაწერე...">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
                <input type="file" id="chatPhoto" hidden accept="image/*" onchange="addChatPhoto(this)">
            </div>
        </div>
    </div>
    <div id="emojiPanel" class="emoji-panel"></div>
    <div id="hearts"></div>
    <div id="pmContainer"></div>

    <script>
        // ==================== SUPABASE ====================
        const supabaseUrl = 'https://ftfciebnywbondaiarnc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0ZmNpZWJueXdib25kYWlhcm5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMjYwNTYsImV4cCI6MjA4NjkwMjA1Nn0.2A5wgpS2gaFmgnGB2mWH7dpmjLvo75IE0QPRPrtUbzI';
        const { createClient } = supabase;
        const supabaseClient = createClient(supabaseUrl, supabaseKey);
        
        // ==================== STATE ====================
        let currentUser = null;
        let currentProfile = null;
        let currentRoom = null;
        let currentPMUser = null;
        let messageSubscription = null;
        let pmSubscription = null;
        let onlineInterval = null;
        let unreadPM = {};
        
        // ==================== GET USER FROM URL ====================
        async function getCurrentUser() {
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('userId');
            if (!userId) {
                window.location.href = 'index.html';
                return null;
            }
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', userId).single();
            if (data) {
                currentUser = { id: data.id };
                currentProfile = data;
                return data;
            }
            window.location.href = 'index.html';
            return null;
        }
        
        // ==================== HEARTS ====================
        const hearts = ['❤️','🌹','💜','✨','💫','🌙','⭐','💎','🦋','🌸'];
        function spawnHeart() {
            const container = document.getElementById('hearts');
            if (!container) return;
            const h = document.createElement('div');
            h.className = 'heart';
            h.style.left = Math.random() * 90 + '%';
            h.style.fontSize = (18 + Math.random() * 28) + 'px';
            h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            container.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
        setInterval(spawnHeart, 2500);
        
        // ==================== INIT ====================
        async function init() {
            const user = await getCurrentUser();
            if (!user) return;
            await loadProfile();
            setupUI();
            loadRooms();
            loadUsers();
            loadFriends();
            loadPMList();
            startOnlinePresence();
            setupNavigation();
            setupTheme();
            buildEmojiPanel();
            subscribeToNotifications();
        }
        
        // ==================== PROFILE ====================
        async function loadProfile() {
            if (!currentProfile) {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
                currentProfile = data;
            }
        }
        
        function setupUI() {
            document.getElementById('profileName').textContent = currentProfile.username;
            document.getElementById('statusInput').value = currentProfile.status || '';
            if (currentProfile.avatar_url) {
                const av = document.getElementById('profileAvatar');
                av.style.backgroundImage = `url(${currentProfile.avatar_url})`;
                av.textContent = '';
            }
            loadAlbum();
        }
        
        async function saveStatus() {
            const s = document.getElementById('statusInput').value;
            await supabaseClient.from('profiles').update({ status: s }).eq('id', currentUser.id);
            currentProfile.status = s;
            showNotification('✓ სტატუსი შენახულია');
        }
        
        async function uploadAvatar(input) {
            const file = input.files[0];
            if (!file) return;
            const path = `avatars/${currentUser.id}.${file.name.split('.').pop()}`;
            await supabaseClient.storage.from('avatars').upload(path, file, { upsert: true });
            const { data } = supabaseClient.storage.from('avatars').getPublicUrl(path);
            await supabaseClient.from('profiles').update({ avatar_url: data.publicUrl }).eq('id', currentUser.id);
            currentProfile.avatar_url = data.publicUrl;
            const av = document.getElementById('profileAvatar');
            av.style.backgroundImage = `url(${data.publicUrl})`;
            av.textContent = '';
            showNotification('✓ ავატარი განახლდა');
        }
        
        async function removeAvatar() {
            await supabaseClient.from('profiles').update({ avatar_url: null }).eq('id', currentUser.id);
            currentProfile.avatar_url = null;
            const av = document.getElementById('profileAvatar');
            av.style.backgroundImage = '';
            av.textContent = '👤';
            showNotification('ავატარი წაიშალა');
        }
        
        async function loadAlbum() {
            const { data } = await supabaseClient.from('user_photos').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            const grid = document.getElementById('albumGrid');
            grid.innerHTML = '';
            (data || []).forEach(p => {
                const img = document.createElement('img');
                img.className = 'album-photo';
                img.src = p.photo_url;
                img.onclick = () => window.open(p.photo_url, '_blank');
                grid.appendChild(img);
            });
        }
        
        async function addToAlbum(input) {
            const file = input.files[0];
            if (!file) return;
            const path = `album/${currentUser.id}/${Date.now()}.${file.name.split('.').pop()}`;
            await supabaseClient.storage.from('avatars').upload(path, file);
            const { data } = supabaseClient.storage.from('avatars').getPublicUrl(path);
            await supabaseClient.from('user_photos').insert({ user_id: currentUser.id, photo_url: data.publicUrl });
            loadAlbum();
            showNotification('✓ ფოტო დაემატა');
        }
        
        // ==================== ROOMS ====================
        const ROOMS = [
            { id: 'general', name: '🏙️ მთავარი მოედანი' },
            { id: 'mafia', name: '🕵️ მაფიის სახლი' },
            { id: 'casino', name: '🎰 კაზინო' },
            { id: 'bar', name: '🍷 ბარი' },
            { id: 'market', name: '💼 ბაზარი' },
            { id: 'prison', name: '⛓️ ციხე' },
            { id: 'vip', name: '👑 VIP ლაუნჯი' },
            { id: 'war', name: '⚔️ ომის ოთახი' },
            { id: 'music', name: '🎵 მუსიკა' }
        ];
        
        function loadRooms() {
            const list = document.getElementById('roomsList');
            const listFull = document.getElementById('roomsListFull');
            const html = (room) => `<div class="room-card" onclick="openRoom('${room.id}','${room.name}')">${room.name}</div>`;
            list.innerHTML = ROOMS.map(html).join('');
            if (listFull) listFull.innerHTML = ROOMS.map(html).join('');
        }
        
        function openRoom(roomId, roomName) {
            currentRoom = roomId;
            document.getElementById('chatRoomName').textContent = roomName;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('chatPage').classList.add('active');
            document.getElementById('chatMessages').innerHTML = '';
            loadRoomMessages();
            subscribeRoom();
        }
        
        function closeChat() {
            if (messageSubscription) supabaseClient.removeChannel(messageSubscription);
            currentRoom = null;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('homePage').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.nav-btn[data-page="home"]').classList.add('active');
        }
        
        async function loadRoomMessages() {
            const { data } = await supabaseClient.from('messages')
                .select('*, profiles(username, avatar_url)')
                .eq('room_id', currentRoom)
                .order('created_at', { ascending: true })
                .limit(50);
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            (data || []).forEach(msg => renderMessage(msg));
            container.scrollTop = container.scrollHeight;
        }
        
        function subscribeRoom() {
            if (messageSubscription) supabaseClient.removeChannel(messageSubscription);
            messageSubscription = supabaseClient.channel('room:' + currentRoom)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${currentRoom}` }, async payload => {
                    const { data } = await supabaseClient.from('messages').select('*, profiles(username, avatar_url)').eq('id', payload.new.id).single();
                    if (data) {
                        renderMessage(data);
                        const container = document.getElementById('chatMessages');
                        container.scrollTop = container.scrollHeight;
                    }
                })
                .subscribe();
        }
        
        function renderMessage(msg) {
            const isOwn = msg.user_id === currentUser.id;
            const container = document.getElementById('chatMessages');
            const row = document.createElement('div');
            row.className = 'msg-row' + (isOwn ? ' own' : '');
            const avStyle = msg.profiles?.avatar_url ? `style="background-image:url(${msg.profiles.avatar_url});background-color:transparent;"` : '';
            const avText = msg.profiles?.avatar_url ? '' : (msg.profiles?.username?.[0]?.toUpperCase() || '?');
            const time = new Date(msg.created_at).toLocaleTimeString('ka-GE', { hour: '2-digit', minute: '2-digit' });
            let content = '';
            if (msg.image_url) content += `<img src="${msg.image_url}" class="message-img" onclick="window.open('${msg.image_url}','_blank')">`;
            if (msg.content) content += `<div class="message-text">${escapeHtml(msg.content)}</div>`;
            row.innerHTML = `
                <div class="msg-avatar" ${avStyle}>${avText}</div>
                <div class="message">
                    <span class="message-name">${msg.profiles?.username || '?'}</span>
                    <span class="message-time">${time}</span>
                    ${content}
                </div>`;
            container.appendChild(row);
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            const pendingImg = window._pendingImageUrl;
            if (!text && !pendingImg) return;
            input.value = '';
            await supabaseClient.from('messages').insert({ 
                room_id: currentRoom, 
                user_id: currentUser.id, 
                content: text || null, 
                image_url: pendingImg || null 
            });
            clearPendingImg();
        }
        
        async function addChatPhoto(input) {
            const file = input.files[0];
            if (!file) return;
            const path = `chat/${Date.now()}.${file.name.split('.').pop()}`;
            const { error } = await supabaseClient.storage.from('avatars').upload(path, file);
            if (error) { showNotification('შეცდომა'); return; }
            const { data } = supabaseClient.storage.from('avatars').getPublicUrl(path);
            window._pendingImageUrl = data.publicUrl;
            document.getElementById('pendingImgPreview').src = data.publicUrl;
            document.getElementById('pendingImgWrap').style.display = 'flex';
        }
        
        function clearPendingImg() {
            window._pendingImageUrl = null;
            document.getElementById('pendingImgWrap').style.display = 'none';
        }
        
        // ==================== USERS ====================
        async function loadUsers() {
            const { data } = await supabaseClient.from('profiles').select('*').order('is_online', { ascending: false });
            const list = document.getElementById('usersList');
            list.innerHTML = '';
            (data || []).forEach(user => {
                if (user.id === currentUser.id) return;
                const div = document.createElement('div');
                div.className = 'user-item';
                div.onclick = () => openPM(user.id, user.username);
                const avStyle = user.avatar_url ? `style="background-image:url(${user.avatar_url});background-color:transparent;"` : '';
                div.innerHTML = `
                    <div class="user-avatar" ${avStyle}>${user.avatar_url ? '' : (user.username?.[0]?.toUpperCase() || '?')}
                        ${user.is_online ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div><b>${user.username}</b><br><small>${user.is_online ? '🟢 ონლაინ' : '⚫ ოფლაინ'}</small></div>`;
                list.appendChild(div);
            });
        }
        
        // ==================== FRIENDS ====================
        async function loadFriends() {
            const { data: friends } = await supabaseClient.from('friends').select('friend_id, profiles!friends_friend_id_fkey(*)').eq('user_id', currentUser.id);
            const { data: requests } = await supabaseClient.from('friend_requests').select('from_id, profiles!friend_requests_from_id_fkey(*)').eq('to_id', currentUser.id).eq('status', 'pending');
            const fl = document.getElementById('friendsList');
            const rl = document.getElementById('requestsList');
            fl.innerHTML = !friends?.length ? '<div class="empty-state">მეგობრები არ გყავს</div>' : '';
            (friends || []).forEach(f => {
                const u = f.profiles;
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `<div class="user-avatar">${u.username?.[0]?.toUpperCase()}</div><div><b>${u.username}</b></div><button class="action-btn" onclick="event.stopPropagation();openPM('${u.id}','${u.username}')">💬</button>`;
                fl.appendChild(div);
            });
            rl.innerHTML = !requests?.length ? '<div class="empty-state">მოთხოვნები არ არის</div>' : '';
            (requests || []).forEach(r => {
                const u = r.profiles;
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `<div class="user-avatar">${u.username?.[0]?.toUpperCase()}</div><div><b>${u.username}</b></div><button class="action-btn success" onclick="acceptFriend('${r.from_id}')">✓</button>`;
                rl.appendChild(div);
            });
        }
        
        async function acceptFriend(fromId) {
            await supabaseClient.from('friend_requests').update({ status: 'accepted' }).eq('from_id', fromId).eq('to_id', currentUser.id);
            await supabaseClient.from('friends').insert([{ user_id: currentUser.id, friend_id: fromId }, { user_id: fromId, friend_id: currentUser.id }]);
            loadFriends();
        }
        
        // ==================== PRIVATE MESSAGES ====================
        async function loadPMList() {
            const { data } = await supabaseClient.from('direct_messages').select('*').or(`from_id.eq.${currentUser.id},to_id.eq.${currentUser.id}`).order('created_at', { ascending: false });
            const list = document.getElementById('pmList');
            list.innerHTML = '';
            const seen = new Set();
            (data || []).forEach(msg => {
                const otherId = msg.from_id === currentUser.id ? msg.to_id : msg.from_id;
                if (!seen.has(otherId)) {
                    seen.add(otherId);
                    loadUserAndAddToList(otherId, list);
                }
            });
        }
        
        async function loadUserAndAddToList(userId, list) {
            const { data: user } = await supabaseClient.from('profiles').select('*').eq('id', userId).single();
            if (!user) return;
            const div = document.createElement('div');
            div.className = 'user-item';
            div.onclick = () => openPM(user.id, user.username);
            div.innerHTML = `<div class="user-avatar">${user.username?.[0]?.toUpperCase()}</div><div><b>${user.username}</b></div>`;
            list.appendChild(div);
        }
        
        function openPM(userId, username) {
            currentPMUser = { id: userId, username };
            document.getElementById('pmWindow')?.remove();
            const win = document.createElement('div');
            win.className = 'pm-window';
            win.id = 'pmWindow';
            win.innerHTML = `
                <div class="pm-header" onclick="togglePMWindow()">
                    <span>💬 ${username}</span>
                    <span onclick="document.getElementById('pmWindow').remove()">✕</span>
                </div>
                <div class="pm-messages" id="pmMessages"></div>
                <div class="pm-input">
                    <input id="pmInput" placeholder="შეტყობინება..." onkeydown="if(event.key==='Enter')sendPM()">
                    <button onclick="sendPM()">➤</button>
                </div>`;
            document.body.appendChild(win);
            loadPMMessages();
            subscribePM();
        }
        
        let pmMinimized = false;
        function togglePMWindow() {
            const msgs = document.getElementById('pmMessages');
            const input = document.querySelector('.pm-input');
            if (!msgs) return;
            pmMinimized = !pmMinimized;
            msgs.style.display = pmMinimized ? 'none' : 'flex';
            if (input) input.style.display = pmMinimized ? 'none' : 'flex';
        }
        
        async function loadPMMessages() {
            const { data } = await supabaseClient.from('direct_messages')
                .select('*')
                .or(`and(from_id.eq.${currentUser.id},to_id.eq.${currentPMUser.id}),and(from_id.eq.${currentPMUser.id},to_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true })
                .limit(50);
            const container = document.getElementById('pmMessages');
            container.innerHTML = '';
            (data || []).forEach(msg => {
                const isOwn = msg.from_id === currentUser.id;
                const div = document.createElement('div');
                div.style.cssText = `display:flex;justify-content:${isOwn ? 'flex-end' : 'flex-start'};margin-bottom:5px;`;
                div.innerHTML = `<div style="background:${isOwn ? 'var(--accent)' : 'var(--card)'};padding:6px 10px;border-radius:12px;max-width:180px;">${escapeHtml(msg.content)}</div>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendPM() {
            const input = document.getElementById('pmInput');
            const text = input.value.trim();
            if (!text || !currentPMUser) return;
            input.value = '';
            await supabaseClient.from('direct_messages').insert({ from_id: currentUser.id, to_id: currentPMUser.id, content: text });
            loadPMMessages();
        }
        
        function subscribePM() {
            if (pmSubscription) supabaseClient.removeChannel(pmSubscription);
            pmSubscription = supabaseClient.channel('pm:' + currentUser.id)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'direct_messages', filter: `to_id=eq.${currentUser.id}` }, async payload => {
                    if (currentPMUser && payload.new.from_id === currentPMUser.id) {
                        loadPMMessages();
                    } else {
                        showNotification(`💬 ახალი შეტყობინება`);
                        loadPMList();
                    }
                })
                .subscribe();
        }
        
        // ==================== ONLINE ====================
        function startOnlinePresence() {
            updateOnline();
            onlineInterval = setInterval(updateOnline, 30000);
            window.addEventListener('beforeunload', () => {
                supabaseClient.from('profiles').update({ is_online: false }).eq('id', currentUser.id);
            });
        }
        
        async function updateOnline() {
            await supabaseClient.from('profiles').update({ is_online: true, last_seen: new Date().toISOString() }).eq('id', currentUser.id);
        }
        
        // ==================== EMOJI ====================
        async function buildEmojiPanel() {
            const panel = document.getElementById('emojiPanel');
            const emojis = ['😀','😂','🥰','😎','🤔','😢','😡','👍','❤️','🔥','💀','🎉','🍷','🎰','⚔️','👑','💰','🎲','🌙','⭐','💎'];
            panel.innerHTML = `<div class="emoji-grid">${emojis.map(e => `<div class="emoji-item" onclick="insertEmoji('${e}')">${e}</div>`).join('')}</div>`;
        }
        
        function insertEmoji(emoji) {
            const input = document.getElementById('messageInput');
            input.value += emoji;
            input.focus();
            document.getElementById('emojiPanel').style.display = 'none';
        }
        
        function toggleEmojiPanel() {
            const p = document.getElementById('emojiPanel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }
        
        // ==================== NOTIFICATIONS ====================
        function subscribeToNotifications() {
            supabaseClient.channel('notif:' + currentUser.id)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'friend_requests', filter: `to_id=eq.${currentUser.id}` }, () => {
                    showNotification('👥 ახალი მეგობრობის მოთხოვნა');
                    loadFriends();
                })
                .subscribe();
        }
        
        function showNotification(msg) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        // ==================== NAVIGATION ====================
        function setupNavigation() {
            document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = btn.dataset.page;
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById(page + 'Page').classList.add('active');
                    if (page === 'online') loadUsers();
                    if (page === 'friends') loadFriends();
                    if (page === 'messages') loadPMList();
                });
            });
        }
        
        // ==================== THEME ====================
        function setupTheme() {
            const btn = document.getElementById('themeBtn');
            const saved = localStorage.getItem('om_theme');
            if (saved === 'day') document.body.classList.add('day-mode');
            btn.addEventListener('click', () => {
                document.body.classList.toggle('day-mode');
                btn.textContent = document.body.classList.contains('day-mode') ? '☀️' : '🌙';
                localStorage.setItem('om_theme', document.body.classList.contains('day-mode') ? 'day' : 'night');
            });
        }
        
        function escapeHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        
        // ==================== START ====================
        init();
    </script>
</body>
</html>
