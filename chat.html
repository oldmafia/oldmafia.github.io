<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ჩატი</title>
    <style>
        body {
            font-family: system-ui;
            background: #fae8d8;
            margin: 0;
            padding: 20px;
        }
        .chat {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        .header {
            background: #800020;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #fff5f0;
        }
        .msg {
            background: #f0e0d0;
            padding: 8px 12px;
            margin: 8px 0;
            border-radius: 15px;
        }
        .input-area {
            display: flex;
            padding: 15px;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #ccc;
        }
        .input-area button {
            background: #800020;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat">
        <div class="header">
            <h2>💬 ჩატი</h2>
            <div>მოგესალმები, <span id="userName"></span>!</div>
        </div>
        <div class="messages" id="messages">
            <div class="msg">ჩატი მზად არის! დაწერე შეტყობინება 👇</div>
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე...">
            <button onclick="send()">გაგზავნა</button>
        </div>
    </div>

    <script>
        let nickname = localStorage.getItem('nickname') || 'მეგობარი';
        document.getElementById('userName').innerText = nickname;
        
        function send() {
            let input = document.getElementById('msgInput');
            let text = input.value.trim();
            if (!text) return;
            
            let msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.innerHTML = '<strong>' + nickname + ':</strong> ' + text;
            
            document.getElementById('messages').appendChild(msgDiv);
            input.value = '';
            
            // ავტომატურად ჩამოწიეთ ქვემოთ
            let msgs = document.getElementById('messages');
            msgs.scrollTop = msgs.scrollHeight;
        }
        
        document.getElementById('msgInput').onkeypress = function(e) {
            if (e.key === 'Enter') send();
        };
    </script>
</body>
</html>
