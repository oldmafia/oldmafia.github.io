<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0b0000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: black; padding: 12px; display: flex; align-items: center; border-bottom: 1px solid #500; position: relative; z-index: 3001; }
        .menu-btn { cursor: pointer; font-size: 25px; color: red; margin-right: 15px; flex-shrink: 0; }
        
        /* გვერდითა მენიუ */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #070000; box-shadow: 2px 0 15px red; transition: 0.3s ease; z-index: 4000; display: flex; flex-direction: column; border-right: 1px solid red; }
        .sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3500; }
        .overlay.active { display: block; }
        
        .sidebar-header { padding: 30px 15px; text-align: center; background: #1a0000; border-bottom: 1px solid red; }
        .sidebar-header img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid red; object-fit: cover; margin-bottom: 10px; }
        
        /* ოთახების სია */
        .rooms-list { flex: 1; overflow-y: auto; padding: 10px; }
        .room-item { padding: 12px; background: #111; border: 1px solid #222; border-radius: 5px; cursor: pointer; font-size: 14px; margin-bottom: 5px; color: #ccc; transition: 0.2s; }
        .room-item:hover { background: #300; border-color: red; color: white; }
        .room-item.active { background: red; color: white; font-weight: bold; }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050000; }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid red; cursor: pointer; object-fit: cover; }
        .bubble { background: #1a0000; border: 1px solid #333; padding: 8px 12px; border-radius: 4px 15px 15px 15px; max-width: 80%; }
        .m-nick { font-weight: bold; color: #ff4d4d; font-size: 12px; margin-bottom: 3px; cursor: pointer; }
        .m-time { color: #666; font-size: 10px; margin-left: 8px; font-weight: normal; }

        .input-zone { background: black; padding: 12px; display: flex; gap: 10px; border-top: 1px solid #222; }
        .input-zone input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .send-btn { background: red; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #0a0000; border: 2px solid red; padding: 25px; border-radius: 20px; width: 280px; text-align: center; }
        .modal-btn { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #500; background: #200; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img id="my-avatar-img" src="https://i.ibb.co/v3m6y6R/avatar.png">
        <div id="my-nick-label" style="font-weight:bold; color:red;">...</div>
        <div id="my-status-label" style="font-size: 11px; color: gold;">...</div>
    </div>
    
    <div class="rooms-list" id="rooms-container">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი')">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('💎 ვიპ საუბრები')">💎 ვიპ საუბრები</div>
        <div class="room-item" onclick="changeRoom('🕴 მაფიის ღამე')">🕴 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🕵️ გამოძიება')">🕵️ გამოძიება</div>
        <div class="room-item" onclick="changeRoom('🎵 მუსიკა')">🎵 მუსიკა</div>
        <div class="room-item" onclick="changeRoom('🛠 ადმინისტრაცია')">🛠 ადმინისტრაცია</div>
    </div>

    <div style="padding:15px; text-align:center; color:red; cursor:pointer; border-top: 1px solid #300;" onclick="logout()">🚪 გასვლა</div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div id="room-name" style="font-weight:bold; color: red; flex: 1; text-align: center;">☕ კაფე-ბარი</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="targetAvatar" src="" style="width:80px; height:80px; border-radius:50%; border:2px solid red; object-fit: cover;">
        <h3 id="targetName" style="color:red; margin: 10px 0;">ნიკი</h3>
        <p id="targetRole" style="font-size:12px; color:gold; font-weight:bold;"></p>
        <div id="targetStatus" style="font-size:14px; color:#0f0; font-style:italic; margin: 10px 0;"></div>
        <button class="modal-btn" style="background:#333" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const _supabase = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = (localStorage.getItem('nickname') || "სტუმარი").trim();
    let currentRoom = "☕ კაფე-ბარი";

    function toggleMenu() { 
        document.getElementById('sidebar').classList.toggle('active'); 
        document.getElementById('overlay').classList.toggle('active'); 
    }
    
    function closeModal() { document.getElementById('userModal').style.display = "none"; }
    function formatTime(t) { const d = new Date(t); return d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0'); }

    async function init() {
        const { data: prof } = await _supabase.from('profiles').select('*').ilike('username', myNick).maybeSingle();
        if (prof) {
            document.getElementById('my-nick-label').innerText = prof.username;
            document.getElementById('my-status-label').innerText = prof.role || "Member";
            document.getElementById('my-avatar-img').src = prof.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
        }
        loadMessages();
        
        // რეალურ დროში განახლება
        _supabase.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
            if(payload.new.room_name === currentRoom) loadMessages();
        }).subscribe();
    }

    async function loadMessages() {
        const { data: msgs } = await _supabase.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const { data: profs } = await _supabase.from('profiles').select('*');
        const chatDiv = document.getElementById("chat"); 
        chatDiv.innerHTML = "";
        
        msgs?.forEach(m => {
            const p = profs?.find(u => u.username.toLowerCase() === m.user_name.toLowerCase());
            chatDiv.innerHTML += `
                <div class="msg-container">
                    <img src="${p?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar" onclick="openProfile('${m.user_name}')">
                    <div class="bubble">
                        <div class="m-nick" onclick="openProfile('${m.user_name}')">${m.user_name} <span class="m-time">${formatTime(m.created_at)}</span></div>
                        <div style="font-size:14px; word-break: break-word;">${m.text}</div>
                    </div>
                </div>`;
        });
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById("msg-input"); 
        if (!i.value.trim()) return;
        await _supabase.from('messages').insert([{ user_name: myNick, text: i.value, room_name: currentRoom }]);
        i.value = "";
    }

    function changeRoom(name) {
        currentRoom = name;
        document.getElementById('room-name').innerText = name;
        
        // აქტიური ოთახის მონიშვნა მენიუში
        const items = document.querySelectorAll('.room-item');
        items.forEach(item => {
            item.classList.remove('active');
            if(item.innerText === name) item.classList.add('active');
        });

        toggleMenu(); // მენიუს დახურვა
        loadMessages(); // ახალი ოთახის მესიჯების ჩატვირთვა
    }

    async function openProfile(n) {
        const { data: p } = await _supabase.from('profiles').select('*').ilike('username', n).maybeSingle();
        if (p) {
            document.getElementById('targetName').innerText = p.username;
            document.getElementById('targetAvatar').src = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
            document.getElementById('targetRole').innerText = p.role || "Member";
            document.getElementById('targetStatus').innerText = p.status || "";
            document.getElementById('userModal').style.display = "flex";
        }
    }

    function logout() { localStorage.removeItem('nickname'); location.href = 'index.html'; }
    window.onload = init;
</script>
</body>
</html>
