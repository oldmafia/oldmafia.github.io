<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - საჩუქარი ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Day Mode */
        body.day-mode {
            --bg: #fff8f0;
            --text: #4a2c2c;
            --card-bg: #fff0e0;
            --border: #8b3a3a;
            --shadow: rgba(139, 58, 58, 0.2);
            --input-bg: #fff5ea;
        }

        /* Night Mode */
        body.night-mode {
            --bg: #1a0f0f;
            --text: #e8d8d8;
            --card-bg: #2a1a1a;
            --border: #8b3a3a;
            --shadow: rgba(0, 0, 0, 0.5);
            --input-bg: #2f1e1e;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Floating Hearts */
        .heart {
            position: fixed;
            color: #8b3a3a;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 6s linear forwards;
            z-index: 9999;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Menu Bar */
        .menu-bar {
            width: 70px;
            background-color: var(--card-bg);
            border-right: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 25px;
            box-shadow: 4px 0 10px var(--shadow);
        }

        .menu-icon {
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
            color: var(--text);
        }

        .menu-icon:hover {
            transform: scale(1.1);
            color: #8b3a3a;
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Rooms Panel */
        .rooms-panel {
            width: 200px;
            background-color: var(--card-bg);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 15px;
        }

        .room-item {
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 8px;
            background-color: var(--bg);
            text-align: center;
            font-weight: bold;
            transition: all 0.2s;
        }

        .room-item:hover {
            background-color: #8b3a3a;
            color: white;
        }

        .room-item.active {
            background-color: #8b3a3a;
            color: white;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
        }

        .message {
            background-color: var(--input-bg);
            padding: 10px;
            border-radius: 12px;
            max-width: 70%;
            align-self: flex-start;
            border-left: 4px solid #8b3a3a;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 12px;
            color: #8b3a3a;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b3a3a, #c25a5a);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .message-time {
            font-size: 10px;
            margin-left: auto;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 25px;
            background-color: var(--input-bg);
            color: var(--text);
            outline: none;
        }

        .emoji-btn, .send-btn {
            padding: 10px 20px;
            background-color: #8b3a3a;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .emoji-btn:hover, .send-btn:hover {
            background-color: #6b2a2a;
            transform: scale(1.05);
        }

        /* Right Panel */
        .right-panel {
            width: 280px;
            background-color: var(--card-bg);
            border-left: 1px solid var(--border);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .group-title {
            font-weight: bold;
            border-bottom: 2px solid #8b3a3a;
            margin-bottom: 8px;
            padding-bottom: 4px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.2s;
        }

        .user-item:hover {
            background-color: var(--bg);
        }

        .online-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #4caf50;
            display: inline-block;
            margin-left: auto;
            box-shadow: 0 0 5px #4caf50;
        }

        .search-box {
            width: 100%;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background-color: var(--input-bg);
            color: var(--text);
            margin-bottom: 10px;
            outline: none;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            width: 450px;
            max-height: 80%;
            overflow-y: auto;
            border: 2px solid #8b3a3a;
        }

        button {
            background-color: #8b3a3a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background-color: #6b2a2a;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background-color: var(--input-bg);
            color: var(--text);
            outline: none;
        }

        .private-chat-modal {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 450px;
            background-color: var(--card-bg);
            border: 2px solid #8b3a3a;
            border-radius: 15px;
            display: none;
            flex-direction: column;
            z-index: 1001;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .private-chat-header {
            background-color: #8b3a3a;
            padding: 12px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            color: white;
            font-weight: bold;
        }

        .private-chat-header button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        #privateMessages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .emoji-panel {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--card-bg);
            border: 2px solid #8b3a3a;
            border-radius: 20px;
            padding: 15px;
            z-index: 1002;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .current-room-title {
            margin-bottom: 15px;
            color: #8b3a3a;
            font-size: 24px;
        }
    </style>
</head>
<body class="day-mode">
    <div id="heart-container"></div>

    <div class="app-container">
        <!-- Menu Bar -->
        <div class="menu-bar">
            <div class="menu-icon" onclick="showRoomsMenu()">🏠</div>
            <div class="menu-icon" onclick="showMessenger()">💬</div>
            <div class="menu-icon" onclick="showProfile()">👤</div>
            <div class="menu-icon" onclick="showFriends()">👥</div>
            <div class="menu-icon" onclick="showUsers()">🌍</div>
            <div class="menu-icon" onclick="toggleTheme()">🌓</div>
        </div>

        <!-- Main -->
        <div class="main-content">
            <div class="rooms-panel" id="roomsPanel">
                <div style="text-align:center; padding:20px;">Loading rooms...</div>
            </div>

            <div class="chat-area">
                <h2 class="current-room-title" id="currentRoomTitle">Room 1</h2>
                <div class="messages-container" id="messagesContainer">
                    <div style="text-align:center; padding:20px;">Select a room to start chatting ❤️</div>
                </div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="emoji-btn" onclick="openEmojiPanel()">😊</button>
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>

            <div class="right-panel" id="rightPanel">
                <div style="text-align:center; padding:20px;">Loading users...</div>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h2>👤 My Profile</h2>
            <input type="file" id="avatarUpload" accept="image/*">
            <input type="text" id="statusInput" placeholder="Your status...">
            <button onclick="updateProfile()">💾 Update Profile</button>
            <h3>📸 My Photos</h3>
            <div id="userPhotos"></div>
            <h3>💬 Comments on my wall</h3>
            <div id="profileComments"></div>
            <input type="text" id="newComment" placeholder="Write something on your wall...">
            <button onclick="addComment()">📝 Post Comment</button>
            <button onclick="closeModal('profileModal')">❌ Close</button>
        </div>
    </div>

    <!-- Private Chat Modal -->
    <div id="privateChatModal" class="private-chat-modal">
        <div class="private-chat-header">
            <span id="privateChatUser">User</span>
            <button onclick="closePrivateChat()">✖</button>
        </div>
        <div id="privateMessages" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div style="padding:10px; display:flex; gap:5px;">
            <input type="text" id="privateMessageInput" placeholder="Type a message..." style="flex:1;" onkeypress="if(event.key==='Enter') sendPrivateMessage()">
            <button onclick="sendPrivateMessage()" style="padding:8px 12px;">Send</button>
        </div>
    </div>

    <script>
        // ========== SUPABASE CONFIG ==========
        const supabaseUrl = 'https://ftfciebnywbondaiarnc.supabase.co';
        const supabaseKey = 'sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // ========== GLOBAL ==========
        let currentUser = null;
        let currentRoom = 'Room 1';
        let allUsers = [];
        let onlineUsers = new Set();
        let currentPrivateChatWith = null;
        let allEmojis = ['😊', '😂', '❤️', '👍', '🎉', '🔥', '🥰', '😍', '💖', '✨'];

        // ========== FLOATING HEARTS ==========
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
            document.getElementById('heart-container').appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 800);

        // ========== THEME ==========
        function toggleTheme() {
            document.body.classList.toggle('night-mode');
            document.body.classList.toggle('day-mode');
        }

        // ========== AUTH CHECK ==========
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return null;
            }
            return user;
        }

        // ========== INIT PROFILE ==========
        async function initProfile(user) {
            const { data: existing } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();
            
            if (!existing) {
                await supabase.from('profiles').insert([{ 
                    id: user.id, 
                    username: user.email.split('@')[0], 
                    avatar: null, 
                    status: 'New here! ❤️',
                    role: 'member',
                    last_seen: new Date()
                }]);
            }
        }

        // ========== LOAD ALL USERS ==========
        async function loadAllUsers() {
            const { data } = await supabase.from('profiles').select('*');
            allUsers = data || [];
            return allUsers;
        }

        // ========== ROOMS ==========
        const rooms = ['Room 1', 'Room 2', 'Room 3', 'Room 4', 'Room 5', 'Room 6', 'Room 7', 'Room 8', 'Room 9', 'Room 10', 'Room 11', 'Room 12'];

        function loadRooms() {
            const panel = document.getElementById('roomsPanel');
            if (!panel) return;
            panel.innerHTML = rooms.map(room => `
                <div class="room-item ${room === currentRoom ? 'active' : ''}" onclick="joinRoom('${room}')">
                    ${room}
                </div>
            `).join('');
        }

        function joinRoom(room) {
            currentRoom = room;
            document.getElementById('currentRoomTitle').innerText = room;
            loadRooms();
            loadMessages();
        }

        // ========== MESSAGES ==========
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            if (!input || !input.value.trim()) return;
            
            const { error } = await supabase.from('messages').insert([{
                room: currentRoom,
                user_id: currentUser.id,
                username: currentUser.email.split('@')[0],
                message: input.value,
                created_at: new Date()
            }]);
            
            if (error) {
                console.error('Send error:', error);
                alert('Error sending message: ' + error.message);
            } else {
                input.value = '';
                loadMessages();
            }
        }

        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .eq('room', currentRoom)
                .order('created_at', { ascending: true });
            
            if (error) {
                console.error('Load error:', error);
                return;
            }
            
            displayMessages(data || []);
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            
            const currentUserRole = allUsers.find(u => u.id === currentUser?.id)?.role || 'member';
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">✨ No messages yet. Say something! ✨</div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message">
                    <div class="message-header">
                        <div class="avatar">${(msg.username || '?')[0].toUpperCase()}</div>
                        <strong>${msg.username || 'Unknown'}</strong>
                        <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
                        ${(currentUserRole === 'founder' || currentUserRole === 'admin' || msg.user_id === currentUser?.id) ? 
                            `<button onclick="deleteMessage('${msg.id}')" style="margin-left:auto; padding:2px 8px; font-size:12px;">🗑️</button>` : ''}
                    </div>
                    <div>${msg.message}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function deleteMessage(id) {
            await supabase.from('messages').delete().eq('id', id);
            loadMessages();
        }

        // ========== REAL-TIME ==========
        function setupRealtime() {
            supabase
                .channel('messages-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMessages())
                .subscribe();
                
            supabase
                .channel('profiles-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => {
                    loadAllUsers();
                    loadRightPanel();
                })
                .subscribe();
        }

        // ========== RIGHT PANEL ==========
        async function loadRightPanel() {
            await loadAllUsers();
            
            const founders = allUsers.filter(p => p.role === 'founder');
            const admins = allUsers.filter(p => p.role === 'admin');
            const members = allUsers.filter(p => !p.role || p.role === 'member');
            const currentUserRole = allUsers.find(u => u.id === currentUser?.id)?.role;
            
            const html = `
                <input type="text" class="search-box" id="userSearch" placeholder="🔍 Search users..." onkeyup="filterUsers()">
                <div id="usersList">
                    ${renderGroup('👑 FOUNDERS', founders, currentUserRole)}
                    ${renderGroup('⚙️ ADMINS', admins, currentUserRole)}
                    ${renderGroup('👥 MEMBERS', members, currentUserRole)}
                </div>
                <div style="margin-top:10px; text-align:center;">
                    <div class="group-title">📊 Online: ${onlineUsers.size}</div>
                </div>
            `;
            
            const panel = document.getElementById('rightPanel');
            if (panel) panel.innerHTML = html;
        }

        function renderGroup(title, users, currentUserRole) {
            if (!users.length) return '';
            return `
                <div class="group-title">${title}</div>
                ${users.map(u => `
                    <div class="user-item" onclick="openPrivateChat('${u.id}', '${u.username}')">
                        <div class="avatar">${(u.username || '?')[0].toUpperCase()}</div>
                        <span style="flex:1;">${u.username || 'Unknown'}</span>
                        ${onlineUsers.has(u.id) ? '<span class="online-indicator" title="Online"></span>' : '<span style="width:10px;"></span>'}
                        ${currentUserRole === 'founder' && u.id !== currentUser?.id ? `
                            <button onclick="event.stopPropagation(); changeRole('${u.id}', 'admin')" style="font-size:10px; padding:2px 6px;">👑</button>
                            <button onclick="event.stopPropagation(); changeRole('${u.id}', 'member')" style="font-size:10px; padding:2px 6px;">⬇️</button>
                            <button onclick="event.stopPropagation(); blockUser('${u.id}')" style="font-size:10px; padding:2px 6px;">🚫</button>
                        ` : ''}
                        ${currentUserRole === 'admin' && u.id !== currentUser?.id ? `
                            <button onclick="event.stopPropagation(); blockUser('${u.id}')" style="font-size:10px; padding:2px 6px;">🚫</button>
                        ` : ''}
                    </div>
                `).join('')}
            `;
        }

        function filterUsers() {
            const search = document.getElementById('userSearch')?.value.toLowerCase() || '';
            const filtered = allUsers.filter(u => u.username?.toLowerCase().includes(search));
            const founders = filtered.filter(p => p.role === 'founder');
            const admins = filtered.filter(p => p.role === 'admin');
            const members = filtered.filter(p => !p.role || p.role === 'member');
            const currentUserRole = allUsers.find(u => u.id === currentUser?.id)?.role;
            
            const container = document.getElementById('usersList');
            if (container) {
                container.innerHTML = renderGroup('👑 FOUNDERS', founders, currentUserRole) +
                    renderGroup('⚙️ ADMINS', admins, currentUserRole) +
                    renderGroup('👥 MEMBERS', members, currentUserRole);
            }
        }

        // ========== ONLINE STATUS ==========
        async function updateOnlineStatus() {
            if (!currentUser) return;
            await supabase.from('profiles').update({ last_seen: new Date() }).eq('id', currentUser.id);
            const { data } = await supabase.from('profiles').select('id').gt('last_seen', new Date(Date.now() - 60000));
            onlineUsers = new Set(data?.map(d => d.id) || []);
            loadRightPanel();
        }

        // ========== ROLE MANAGEMENT ==========
        async function changeRole(userId, newRole) {
            await supabase.from('profiles').update({ role: newRole }).eq('id', userId);
            await loadAllUsers();
            loadRightPanel();
        }

        async function blockUser(userId) {
            const reason = prompt('Enter block reason:');
            if (reason) {
                await supabase.from('profiles').update({ blocked: true, block_reason: reason }).eq('id', userId);
                alert(`User blocked! Reason: ${reason}`);
            }
        }

        // ========== PROFILE ==========
        function showProfile() {
            const modal = document.getElementById('profileModal');
            if (modal) modal.style.display = 'flex';
            loadUserPhotos();
            loadProfileComments();
        }

        async function updateProfile() {
            const status = document.getElementById('statusInput')?.value;
            if (status) {
                await supabase.from('profiles').update({ status }).eq('id', currentUser.id);
            }
            
            const file = document.getElementById('avatarUpload')?.files[0];
            if (file) {
                const fileName = `${currentUser.id}_${Date.now()}`;
                const { error } = await supabase.storage.from('avatars').upload(fileName, file);
                if (!error) {
                    const { data } = supabase.storage.from('avatars').getPublicUrl(fileName);
                    await supabase.from('profiles').update({ avatar: data.publicUrl }).eq('id', currentUser.id);
                }
            }
            alert('Profile updated!');
            closeModal('profileModal');
        }

        async function loadUserPhotos() {
            const { data } = await supabase.from('user_photos').select('*').eq('user_id', currentUser.id);
            const container = document.getElementById('userPhotos');
            if (container) {
                container.innerHTML = data?.map(p => `<img src="${p.url}" width="50" style="margin:5px; border-radius:10px;">`).join('') || 'No photos yet';
            }
        }

        async function loadProfileComments() {
            const { data } = await supabase.from('profile_comments').select('*').eq('profile_id', currentUser.id).order('created_at', { ascending: false });
            const container = document.getElementById('profileComments');
            if (container) {
                container.innerHTML = data?.map(c => `<div><strong>${c.username}</strong>: ${c.comment}</div>`).join('') || 'No comments';
            }
        }

        async function addComment() {
            const comment = document.getElementById('newComment')?.value;
            if (!comment) return;
            await supabase.from('profile_comments').insert([{ 
                profile_id: currentUser.id, 
                username: currentUser.email.split('@')[0], 
                comment,
                created_at: new Date()
            }]);
            document.getElementById('newComment').value = '';
            loadProfileComments();
        }

        // ========== PRIVATE MESSAGES ==========
        function openPrivateChat(userId, username) {
            currentPrivateChatWith = userId;
            const modal = document.getElementById('privateChatModal');
            const title = document.getElementById('privateChatUser');
            if (modal && title) {
                title.innerText = username;
                modal.style.display = 'flex';
                loadPrivateMessages();
            }
        }

        function closePrivateChat() {
            const modal = document.getElementById('privateChatModal');
            if (modal) modal.style.display = 'none';
            currentPrivateChatWith = null;
        }

        async function loadPrivateMessages() {
            if (!currentPrivateChatWith) return;
            
            const { data } = await supabase
                .from('private_messages')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentPrivateChatWith}),and(sender_id.eq.${currentPrivateChatWith},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });
            
            const container = document.getElementById('privateMessages');
            if (!container) return;
            
            container.innerHTML = data?.map(msg => `
                <div style="text-align: ${msg.sender_id === currentUser.id ? 'right' : 'left'}; margin:5px;">
                    <span style="background-color: #8b3a3a; padding:5px 10px; border-radius:15px; display:inline-block; max-width:90%; word-wrap:break-word;">
                        ${msg.message}
                    </span>
                    <div style="font-size:10px; color:gray;">${new Date(msg.created_at).toLocaleTimeString()}</div>
                </div>
            `).join('') || '<div style="text-align:center;">No messages yet</div>';
            container.scrollTop = container.scrollHeight;
        }

        async function sendPrivateMessage() {
            const input = document.getElementById('privateMessageInput');
            if (!input.value.trim() || !currentPrivateChatWith) return;
            
            await supabase.from('private_messages').insert([{
                sender_id: currentUser.id,
                receiver_id: currentPrivateChatWith,
                message: input.value,
                created_at: new Date(),
                is_read: false
            }]);
            input.value = '';
            loadPrivateMessages();
        }

        function setupPrivateRealtime() {
            supabase
                .channel('private-channel')
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'private_messages'
                }, (payload) => {
                    if (currentPrivateChatWith && 
                        ((payload.new.sender_id === currentPrivateChatWith && payload.new.receiver_id === currentUser.id) ||
                         (payload.new.sender_id === currentUser.id && payload.new.receiver_id === currentPrivateChatWith))) {
                        loadPrivateMessages();
                    }
                    if (payload.new.receiver_id === currentUser.id && payload.new.sender_id !== currentUser.id) {
                        const notif = document.createElement('div');
                        notif.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#8b3a3a; color:white; padding:10px; border-radius:10px; z-index:1003;';
                        notif.innerText = '💬 New private message!';
                        document.body.appendChild(notif);
                        setTimeout(() => notif.remove(), 3000);
                    }
                })
                .subscribe();
        }

        // ========== EMOJI ==========
        function openEmojiPanel() {
            const existing = document.querySelector('.emoji-panel');
            if (existing) {
                existing.remove();
                return;
            }
            
            const currentUserRole = allUsers.find(u => u.id === currentUser?.id)?.role;
            const isAdmin = currentUserRole === 'founder' || currentUserRole === 'admin';
            
            const panel = document.createElement('div');
            panel.className = 'emoji-panel';
            panel.innerHTML = `
                <div style="display:flex; gap:10px; flex-wrap:wrap; max-width:300px; margin-bottom:10px;">
                    ${allEmojis.map(emoji => `<span style="font-size:30px; cursor:pointer;" onclick="insertEmoji('${emoji}')">${emoji}</span>`).join('')}
                </div>
                ${isAdmin ? `
                    <input type="text" id="newEmojiInput" placeholder="New emoji..." style="width:100%; margin-bottom:5px;">
                    <button onclick="addEmoji()">Add Emoji</button>
                    <button onclick="removeLastEmoji()">Remove Last</button>
                ` : ''}
                <button onclick="closeEmojiPanel()" style="margin-top:10px;">Close</button>
            `;
            document.body.appendChild(panel);
        }
        
        function insertEmoji(emoji) {
            const input = document.getElementById('messageInput');
            if (input) input.value += emoji;
        }
        
        function addEmoji() {
            const input = document.getElementById('newEmojiInput');
            if (input && input.value && !allEmojis.includes(input.value)) {
                allEmojis.push(input.value);
                input.value = '';
                openEmojiPanel();
            }
        }
        
        function removeLastEmoji() {
            allEmojis.pop();
            openEmojiPanel();
        }
        
        function closeEmojiPanel() {
            document.querySelector('.emoji-panel')?.remove();
        }

        // ========== MENU ==========
        function showRoomsMenu() { alert('🏠 Select a room from the left panel'); }
        function showMessenger() { alert('💬 Click on any user to start private chat'); }
        function showFriends() { alert('👥 Friends feature coming soon!'); }
        function showUsers() { alert('🌍 All users are shown in the right panel'); }
        function closeModal(id) { 
            const modal = document.getElementById(id);
            if (modal) modal.style.display = 'none';
        }

        // ========== INIT ==========
        async function init() {
            const user = await checkAuth();
            if (!user) return;
            
            currentUser = user;
            await initProfile(user);
            await loadAllUsers();
            loadRooms();
            await loadRightPanel();
            await loadMessages();
            setupRealtime();
            setupPrivateRealtime();
            updateOnlineStatus();
            setInterval(() => updateOnlineStatus(), 10000);
        }
        
        init();
    </script>
</body>
</html>
