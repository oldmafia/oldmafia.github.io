<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩემი ჩატი - Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --dark-burgundy: #1a0505;
            --light-burgundy: #4a0414;
            --accent-red: #800020;
            --cream: #f5f5dc;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* რეჟიმები */
        body.dark-mode { background: var(--dark-burgundy); color: #fff; }
        body.light-mode { background: var(--cream); color: #333; }

        /* ანიმაციური გულები */
        .hearts-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .heart { position: absolute; color: var(--accent-red); font-size: 30px; animation: float 8s linear infinite; opacity: 0.7; }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* ლეიაუთი */
        .app-wrapper { display: flex; height: 100vh; position: relative; z-index: 1; }

        /* ოთახების სვეტი */
        .sidebar-rooms { width: 200px; background: rgba(0,0,0,0.3); border-right: 1px solid var(--accent-red); overflow-y: auto; padding: 15px; }
        .room-btn { padding: 10px; margin: 5px 0; cursor: pointer; border-radius: 5px; transition: 0.3s; border: 1px solid transparent; }
        .room-btn:hover { background: var(--accent-red); }

        /* ჩატის ცენტრალური ნაწილი */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.1); }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* შეტყობინებების სტილი */
        .msg { display: flex; align-items: center; max-width: 80%; }
        .msg.left { align-self: flex-start; }
        .msg-bubble { background: rgba(128, 0, 32, 0.4); padding: 10px 15px; border-radius: 15px 15px 15px 0; position: relative; box-shadow: 2px 2px 10px var(--shadow); }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 10px; border: 2px solid var(--accent-red); }
        .msg-info { font-size: 11px; opacity: 0.7; margin-top: 5px; }

        /* ინპუტის ზონა */
        .input-box { padding: 15px; background: rgba(0,0,0,0.2); display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: none; outline: none; }
        .btn-send { background: var(--accent-red); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }

        /* მარჯვენა სვეტი (ონლაინ ხალხი) */
        .sidebar-users { width: 250px; background: rgba(0,0,0,0.3); border-left: 1px solid var(--accent-red); padding: 15px; }
        .user-group { margin-bottom: 20px; }
        .user-group h4 { border-bottom: 1px solid var(--accent-red); padding-bottom: 5px; font-size: 14px; }
        .user-item { display: flex; align-items: center; gap: 8px; margin-top: 5px; font-size: 13px; }
        .online-dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; }

        /* სმაილების პანელი */
        #emoji-panel { position: absolute; bottom: 70px; left: 220px; background: var(--dark-burgundy); border: 1px solid var(--accent-red); padding: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 5px; z-index: 10; }
    </style>
</head>
<body class="dark-mode">

    <div class="hearts-container" id="hearts-box"></div>

    <div class="app-wrapper">
        <aside class="sidebar-rooms">
            <h3 style="text-align: center;">🚪 ოთახები</h3>
            <div id="rooms-list"></div>
            <hr>
            <button onclick="toggleTheme()" style="width:100%; cursor:pointer;">🌓 რეჟიმი</button>
        </aside>

        <main class="chat-area">
            <header style="padding: 10px; border-bottom: 1px solid var(--accent-red); font-weight: bold;" id="active-room-title">
                ოთახი #1
            </header>
            
            <div class="messages-container" id="chat-messages">
                </div>

            <div id="emoji-panel">
                <span onclick="addEmoji('❤️')">❤️</span>
                <span onclick="addEmoji('😊')">😊</span>
                <span onclick="addEmoji('🔥')">🔥</span>
            </div>

            <div class="input-box">
                <button onclick="toggleEmoji()" style="background:none; border:none; font-size:20px; cursor:pointer;">😊</button>
                <input type="text" id="message-input" placeholder="დაწერე რამე...">
                <button class="btn-send" onclick="sendMessage()">გაგზავნა</button>
            </div>
        </main>

        <aside class="sidebar-users">
            <div id="my-profile" style="text-align: center; margin-bottom: 20px;">
                <img src="https://via.placeholder.com/60" id="user-avatar" style="border-radius:50%;">
                <h4 id="user-name">ჩემი ნიკი</h4>
                <small id="user-role">დამფუძნებელი</small>
            </div>

            <div class="user-group">
                <h4>👑 დამფუძნებლები</h4>
                <div id="founders"></div>
            </div>
            <div class="user-group">
                <h4>🛡️ ადმინები</h4>
                <div id="admins"></div>
            </div>
            <div class="user-group">
                <h4>👥 წევრები</h4>
                <div id="members"></div>
            </div>
        </aside>
    </div>

    <script>
        // --- Supabase კონფიგურაცია ---
        const SUPABASE_URL = 'შენი_URL_აქ';
        const SUPABASE_KEY = 'შენი_KEY_აქ';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentRoom = 1;

        // 1. 12 ოთახის გენერაცია
        const roomsContainer = document.getElementById('rooms-list');
        for (let i = 1; i <= 12; i++) {
            const div = document.createElement('div');
            div.className = 'room-btn';
            div.innerText = `ოთახი ${i}`;
            div.onclick = () => { currentRoom = i; document.getElementById('active-room-title').innerText = `ოთახი #${i}`; loadMessages(); };
            roomsContainer.appendChild(div);
        }

        // 2. ანიმაციური გულები
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 5) + 's';
            document.getElementById('hearts-box').appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }
        setInterval(createHeart, 1000);

        // 3. რეჟიმის შეცვლა
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.body.classList.toggle('dark-mode');
        }

        // 4. სმაილები
        function toggleEmoji() {
            const panel = document.getElementById('emoji-panel');
            panel.style.display = panel.style.display === 'grid' ? 'none' : 'grid';
        }
        function addEmoji(emoji) {
            document.getElementById('message-input').value += emoji;
        }

        // 5. მესიჯების გაგზავნა (Supabase)
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value;
            if(!text) return;

            const { data, error } = await supabase
                .from('messages')
                .insert([{ 
                    content: text, 
                    room_id: currentRoom,
                    user_id: supabase.auth.user()?.id,
                    created_at: new Date()
                }]);
            
            input.value = '';
            loadMessages();
        }

        // 6. მესიჯების წამოღება (Realtime)
        async function loadMessages() {
            const { data: messages } = await supabase
                .from('messages')
                .select('*, profiles(username, avatar_url)')
                .eq('room_id', currentRoom)
                .order('created_at', { ascending: true });

            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            
            messages.forEach(m => {
                const div = document.createElement('div');
                div.className = 'msg left';
                div.innerHTML = `
                    <img src="${m.profiles.avatar_url}" class="msg-avatar">
                    <div class="msg-bubble">
                        <strong>${m.profiles.username}</strong>
                        <p style="margin:5px 0;">${m.content}</p>
                        <span class="msg-info">${new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        ${ (/* შემოწმება თუ ადმინია */ true) ? `<button onclick="deleteMsg('${m.id}')" style="color:red; background:none; border:none; cursor:pointer;">🗑️</button>` : '' }
                    </div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        // 7. წაშლის ფუნქცია (ადმინისთვის)
        async function deleteMsg(id) {
            const { error } = await supabase.from('messages').delete().eq('id', id);
            loadMessages();
        }

        // რეალურ დროში განახლება
        supabase.channel('custom-all-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => {
                loadMessages();
            }).subscribe();

    </script>
</body>
</html>
