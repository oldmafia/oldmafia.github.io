<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Abu007 Pro</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        :root { --accent: #ff3b3b; --bg: #0a0c10; --txt: #e6e9f0; --nav: #11151c; --card: #151e2a; --border: #2a3440; }
        body.day-mode { --bg: #fef8ef; --txt: #2c2418; --nav: #fff5e6; --card: #ffffff; --border: #ffe0b5; }
        
        body { background: var(--bg); color: var(--txt); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* 📱 NAVIGATION & MENU */
        .navigation { width: 100%; height: 60px; background: var(--nav); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { cursor: pointer; font-size: 24px; opacity: 0.5; color: var(--txt); transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--accent); transform: scale(1.1); }

        .content-area { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .page { display: none; padding: 10px; }
        .page.active { display: block; }

        /* 🏰 ROOMS - FIXED WIDTH */
        .rooms-container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .room-card { 
            background: var(--card); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--border); border-left: 4px solid var(--accent);
            display: flex; align-items: center; justify-content: space-between; cursor: pointer;
        }
        .room-card:active { background: var(--accent); }

        /* 💬 CHAT BOXES */
        .msg-box { background: var(--card); padding: 10px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 8px; max-width: 85%; }
        .my-msg { align-self: flex-end; border-right: 3px solid var(--accent); }
        .other-msg { align-self: flex-start; border-left: 3px solid #3498db; }

        /* 😊 EMOJI BOARD */
        .emoji-board { 
            position: absolute; bottom: 70px; left: 10px; right: 10px; 
            background: var(--nav); border: 2px solid var(--accent); 
            border-radius: 15px; display: none; padding: 10px; 
            grid-template-columns: repeat(5, 1fr); gap: 8px; z-index: 2000;
        }
        .emoji-board.active { display: grid; }
        .emoji-img { width: 100%; cursor: pointer; object-fit: contain; }

        /* ⌨️ FOOTER INPUT */
        .chat-footer { background: var(--nav); padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
        .chat-input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid var(--accent); background: var(--bg); color: var(--txt); outline: none; }
        .send-btn { background: var(--accent); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        /* 💌 PM MODAL (FULL SCREEN) */
        #pmModal { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; }
        .modal-header { padding: 15px; background: var(--nav); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }

        /* ❤️ HEARTS */
        .heart { position: fixed; color: #ff3366; font-size: 20px; pointer-events: none; animation: float 4s linear forwards; z-index: 999; }
        @keyframes float { 0% { bottom: 0; opacity: 1; } 100% { bottom: 100%; opacity: 0; } }
    </style>
</head>
<body class="night-mode">

    <div class="navigation">
        <div class="nav-item active" onclick="showPage('homePage', this)">🏠</div>
        <div class="nav-item" onclick="showPage('messengerPage', this)">💬</div>
        <div class="nav-item" onclick="showPage('onlinePage', this)">👥</div>
        <div class="nav-item" onclick="showPage('profilePage', this)">👤</div>
        <div class="nav-item" onclick="toggleMode()">🌗</div>
    </div>

    <div class="content-area">
        <div id="homePage" class="page active">
            <h3 style="text-align:center; padding:15px; color:var(--accent);">🏰 12 სათამაშო ოთახი</h3>
            <div id="roomsList" class="rooms-container"></div>
        </div>

        <div id="messengerPage" class="page">
            <h3 style="padding:15px;">💬 პირადი მიმოწერები</h3>
            <div id="pmListContainer"></div>
        </div>

        <div id="onlinePage" class="page">
            <h3 style="padding:15px;">👥 ონლაინ ხალხი</h3>
            <div id="onlineList"></div>
        </div>

        <div id="profilePage" class="page" style="text-align: center;">
            <img id="myAva" src="https://i.ibb.co/v3m6y6R/avatar.png" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent); margin-top:30px; cursor:pointer;" onclick="document.getElementById('fileUp').click()">
            <h2 id="myNickDisplay" style="margin:10px 0;">Abu007</h2>
            <input type="text" id="myStatus" onchange="saveStatus()" placeholder="სტატუსი..." style="width:80%; padding:10px; border-radius:15px; border:1px solid var(--border); background:none; color:var(--txt); text-align:center;">
            <p style="margin-top:20px; opacity:0.5;">ID: #007</p>
            <input type="file" id="fileUp" hidden onchange="uploadAvatar()">
        </div>

        <div id="roomPage" class="page" style="flex-direction: column; height: 100%;">
            <div class="modal-header"><b id="roomTitle">ოთახი</b><span onclick="showPage('homePage')" style="cursor:pointer; font-size:24px;">✖</span></div>
            <div id="roomMsgs" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
            <div class="chat-footer">
                <div id="roomEmoji" class="emoji-board"></div>
                <span onclick="toggleEmoji('roomEmoji')" style="font-size:25px; cursor:pointer;">😊</span>
                <input type="text" id="roomInput" class="chat-input" placeholder="დაწერე...">
                <button class="send-btn" onclick="sendRoomMsg()">✈</button>
            </div>
            <input type="file" id="emojiFile" hidden onchange="uploadEmoji()">
        </div>
    </div>

    <div id="pmModal">
        <div class="modal-header"><b id="pmPartner">---</b><span onclick="closePM()" style="cursor:pointer; font-size:24px;">✖</span></div>
        <div id="pmMsgs" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
        <div class="chat-footer">
            <input type="text" id="pmInput" class="chat-input" placeholder="პირადი მესიჯი...">
            <button class="send-btn" onclick="sendPM()">✈</button>
        </div>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        const MY_NICK = localStorage.getItem('nickname') || "Abu007";
        const ADMINS = ["Abu007", "Lukinio", "AdminMafia"];
        let activeRoom = "", activePM = "";

        const ROOMS = ["კაფე-ბარი", "ნარდი", "ჯოკერი", "VIP საუბრები", "ფორუმი", "ადმინისტრაცია", "იუმორი", "შიფროგრამა", "გამოძიება", "მუსიკალური", "ვიქტორინა", "დახმარება"];

        async function init() {
            document.getElementById('myNickDisplay').innerText = MY_NICK;
            renderRooms();
            loadProfile();
            loadEmojis();
            loadPMList();
            startHearts();
            
            // Real-time sync
            _s.channel('any').on('postgres_changes', {event:'*', schema:'public'}, () => {
                if(activeRoom) loadRoomMsgs();
                if(activePM) loadPMMsgs();
                loadPMList();
            }).subscribe();
        }

        function renderRooms() {
            document.getElementById('roomsList').innerHTML = ROOMS.map(r => `
                <div class="room-card" onclick="openRoom('${r}')"><b>${r}</b> <span>➔</span></div>
            `).join('');
        }

        function openRoom(name) {
            activeRoom = name;
            document.getElementById('roomTitle').innerText = name;
            showPage('roomPage');
            loadRoomMsgs();
        }

        async function loadRoomMsgs() {
            const {data} = await _s.from('messages').select('*').eq('room_name', activeRoom).order('created_at', {ascending:false}).limit(40);
            const box = document.getElementById('roomMsgs');
            box.innerHTML = data?.reverse().map(m => `
                <div class="msg-box ${m.username === MY_NICK ? 'my-msg' : 'other-msg'}">
                    <b style="color:var(--accent); font-size:11px;">${m.username}</b><br>
                    ${m.text.replace(/:img:(.*?):/g, '<img src="$1" style="width:35px;">')}
                </div>
            `).join('') || "";
            box.scrollTop = box.scrollHeight;
        }

        async function sendRoomMsg() {
            const val = document.getElementById('roomInput').value.trim();
            if(!val) return;
            await _s.from('messages').insert({username:MY_NICK, text:val, room_name:activeRoom});
            document.getElementById('roomInput').value = "";
        }

        // --- PRIVATE MESSAGES (FIXED) ---
        function openPM(partner) {
            activePM = partner;
            document.getElementById('pmPartner').innerText = partner;
            document.getElementById('pmModal').style.display = 'flex';
            loadPMMsgs();
        }

        async function loadPMMsgs() {
            const {data} = await _s.from('direct_messages').select('*').or(`and(sender.eq.${MY_NICK},receiver.eq.${activePM}),and(sender.eq.${activePM},receiver.eq.${MY_NICK})`).order('created_at', {ascending:true});
            const box = document.getElementById('pmMsgs');
            box.innerHTML = data?.map(m => `
                <div class="msg-box ${m.sender === MY_NICK ? 'my-msg' : 'other-msg'}">${m.text}</div>
            `).join('') || "";
            box.scrollTop = box.scrollHeight;
        }

        async function sendPM() {
            const val = document.getElementById('pmInput').value.trim();
            if(!val) return;
            await _s.from('direct_messages').insert({sender:MY_NICK, receiver:activePM, text:val});
            document.getElementById('pmInput').value = "";
            loadPMMsgs();
        }

        async function loadPMList() {
            const {data} = await _s.from('direct_messages').select('*').or(`sender.eq.${MY_NICK},receiver.eq.${MY_NICK}`).order('created_at', {ascending:false});
            const partners = new Set();
            const box = document.getElementById('pmListContainer');
            box.innerHTML = "";
            data?.forEach(m => {
                const p = m.sender === MY_NICK ? m.receiver : m.sender;
                if(!partners.has(p)) {
                    partners.add(p);
                    box.innerHTML += `<div class="room-card" onclick="openPM('${p}')"><b>${p}</b><span>📩</span></div>`;
                }
            });
        }

        function closePM() { document.getElementById('pmModal').style.display = 'none'; activePM = ""; }

        // --- EMOJIS & AVATAR ---
        async function loadEmojis() {
            const {data} = await _s.from('custom_emojis').select('*');
            const board = document.getElementById('roomEmoji');
            let html = ADMINS.includes(MY_NICK) ? `<div class="admin-plus" style="border:1px dashed var(--accent); text-align:center; cursor:pointer;" onclick="document.getElementById('emojiFile').click()">+</div>` : "";
            html += data?.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('') || "";
            board.innerHTML = html;
        }

        function addEmoji(url) { document.getElementById('roomInput').value += ` :img:${url}: `; toggleEmoji('roomEmoji'); }

        async function uploadEmoji() {
            const file = document.getElementById('emojiFile').files[0];
            const name = `emoji_${Math.random()}_${file.name}`;
            await _s.storage.from('avatars').upload(name, file);
            const {data} = _s.storage.from('avatars').getPublicUrl(name);
            await _s.from('custom_emojis').insert({emoji_url: data.publicUrl});
            loadEmojis();
        }

        async function uploadAvatar() {
            const file = document.getElementById('fileUp').files[0];
            const name = `avatar_${MY_NICK}_${Math.random()}.png`;
            await _s.storage.from('avatars').upload(name, file);
            const {data} = _s.storage.from('avatars').getPublicUrl(name);
            await _s.from('profiles').update({avatar_url: data.publicUrl}).eq('username', MY_NICK);
            document.getElementById('myAva').src = data.publicUrl;
        }

        async function loadProfile() {
            const {data} = await _s.from('profiles').select('*').eq('username', MY_NICK).maybeSingle();
            if(data) {
                if(data.avatar_url) document.getElementById('myAva').src = data.avatar_url;
                document.getElementById('myStatus').value = data.status || "";
            }
        }

        async function saveStatus() {
            const val = document.getElementById('myStatus').value;
            await _s.from('profiles').update({status: val}).eq('username', MY_NICK);
        }

        function toggleEmoji(id) { document.getElementById(id).classList.toggle('active'); }
        function toggleMode() { document.body.classList.toggle('day-mode'); }
        
        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(id);
            target.classList.add('active');
            target.style.display = (id === 'roomPage') ? 'flex' : 'block';
            if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
        }

        function startHearts() {
            setInterval(() => {
                const h = document.createElement('div'); h.className = 'heart'; h.innerText = '❤️';
                h.style.left = Math.random() * 95 + '%';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 4000);
            }, 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
