<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #0d0d0d;
  --card: #1a1a1a;
  --accent: #800020;
  --text: white;
}

.light {
  --bg: #f5e6d3;
  --card: #fff;
  --text: black;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
}

/* ❤️ hearts */
.heart {
  position: fixed;
  color: var(--accent);
  animation: float 6s linear infinite;
  opacity: 0.3;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

/* TOP */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: var(--card);
  border-bottom: 2px solid var(--accent);
}

/* ROOMS */
.rooms {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}

.room {
  min-width: 100px;
  padding: 10px;
  background: var(--card);
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  border: 2px solid transparent;
}

.room.active {
  border: 2px solid var(--accent);
}

/* CHAT */
.chat {
  height: calc(100vh - 160px);
  overflow-y: auto;
  padding: 10px;
}

.msg {
  background: var(--card);
  margin: 5px 0;
  padding: 10px;
  border-radius: 10px;
}

/* INPUT */
.inputArea {
  display: flex;
  position: fixed;
  bottom: 0;
  width: 100%;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px;
}
</style>
</head>

<body>

<div class="topbar">
  ❤️ MY CHAT
  <button onclick="toggleTheme()">🌗</button>
</div>

<div class="rooms" id="rooms"></div>

<div class="chat" id="chat"></div>

<div class="inputArea">
  <input id="msgInput" placeholder="დაწერე...">
  <button onclick="sendMessage()">გაგზავნა</button>
</div>

<script>

// 🔑 ჩასვი შენი მონაცემები აქ
const supabaseUrl = "PASTE_URL_HERE";
const supabaseKey = "PASTE_KEY_HERE";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentRoom = "room1";
let currentUser = null;

// 🏠 rooms
const rooms = [
  {name:"room1", icon:"🔥"},
  {name:"room2", icon:"❤️"},
  {name:"room3", icon:"🎮"},
  {name:"room4", icon:"😂"},
  {name:"room5", icon:"🎵"},
  {name:"room6", icon:"💎"},
  {name:"room7", icon:"🚀"},
  {name:"room8", icon:"👑"},
  {name:"room9", icon:"⚡"},
  {name:"room10", icon:"🍷"},
  {name:"room11", icon:"🎲"},
  {name:"room12", icon:"🌙"}
];

// ❤️ hearts
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (20 + Math.random() * 40) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 500);

// rooms UI
function renderRooms() {
  const container = document.getElementById("rooms");
  container.innerHTML = "";

  rooms.forEach(r => {
    const div = document.createElement("div");
    div.className = "room";
    if (r.name === currentRoom) div.classList.add("active");

    div.innerHTML = `<div style="font-size:25px">${r.icon}</div>${r.name}`;

    div.onclick = () => {
      currentRoom = r.name;
      renderRooms();
      loadMessages();
    };

    container.appendChild(div);
  });
}

// user
async function getUser() {
  const { data } = await supabase.auth.getUser();
  currentUser = data.user;
}

// load messages
async function loadMessages() {
  const { data } = await supabase
    .from("messages")
    .select("*")
    .eq("room", currentRoom)
    .order("created_at", { ascending: true });

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(msg => {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `${msg.avatar} <b>${msg.nickname}</b>: ${msg.text}`;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

// send
async function sendMessage() {
  const input = document.getElementById("msgInput");
  if (!input.value) return;

  await supabase.from("messages").insert([{
    text: input.value,
    room: currentRoom,
    nickname: currentUser?.email || "Guest",
    avatar: "🙂"
  }]);

  input.value = "";
}

// realtime
supabase
  .channel("chat")
  .on("postgres_changes",
    { event: "INSERT", schema: "public", table: "messages" },
    payload => {
      if (payload.new.room === currentRoom) loadMessages();
    }
  )
  .subscribe();

// theme
function toggleTheme() {
  document.body.classList.toggle("light");
}

// init
(async () => {
  await getUser();
  renderRooms();
  loadMessages();
})();

</script>

</body>
</html>
