<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --dark-red: #4a0000; --deep-red: #800000; --bright-red: #ff0000;
            --blood-red: #660000; --bg-black: #030000;
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--dark-red); height: 60px; flex-shrink: 0; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 25px; color: var(--bright-red); }
        #room-name { font-weight: bold; color: var(--bright-red); flex: 1; text-align: center; font-size: 16px; }
        #pm-btn { position: relative; cursor: pointer; font-size: 22px; margin-right: 15px; color: cyan; }
        #pm-count { position: absolute; top: -5px; right: -8px; background: red; color: white; border-radius: 50%; font-size: 10px; padding: 2px 5px; display: none; font-weight: bold; }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #1a0000 0%, #030000 100%); }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; max-width: 95%; }
        .avatar-wrapper { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--dark-red); object-fit: cover; cursor: pointer; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #0f0; border: 2px solid black; border-radius: 50%; display: none; }
        .online-dot.active { display: block; box-shadow: 0 0 8px #0f0; }
        
        .bubble { background: rgba(25, 0, 0, 0.9); border: 1px solid var(--blood-red); padding: 8px 12px; border-radius: 4px 18px 18px 18px; position: relative; min-width: 80px; }
        .m-nick { font-weight: bold; color: #ff3333; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
        .m-text { color: #ddd; font-size: 14px; word-wrap: break-word; line-height: 1.4; }
        .m-footer { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 4px; }
        .m-time { font-size: 10px; color: #666; font-family: monospace; }

        .input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: black; padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--dark-red); z-index: 2000; }
        .input-zone input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--blood-red); background: #080000; color: white; outline: none; }
        .send-btn { background: var(--dark-red); border: none; width: 45px; height: 45px; border-radius: 50%; color: cyan; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }

        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; border-right: 3px solid var(--dark-red); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        
        .online-sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; border-left: 3px solid var(--dark-red); display: flex; flex-direction: column; }
        .online-sidebar.active { right: 0; }
        .group-header { padding: 10px 15px; font-size: 10px; color: #555; background: #080000; text-transform: uppercase; border-bottom: 1px solid #111; }
        .u-card { padding: 8px 15px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-bottom: 1px solid #0f0000; transition: 0.2s; }
        .u-card:hover { background: #150000; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3500; }
        .overlay.active { display: block; }
        
        .glow-red { border: 2px solid red !important; box-shadow: 0 0 8px red; }
        .glow-cyan { border: 2px solid cyan !important; box-shadow: 0 0 8px cyan; }
        .glow-green { border: 2px solid #0f0 !important; box-shadow: 0 0 8px #0f0; }
        
        .rooms-list { flex: 1; overflow-y: auto; border-top: 1px solid #222; }
        .room-item { padding: 14px 20px; cursor: pointer; color: #bbb; border-bottom: 1px solid #150000; font-size: 14px; transition: 0.2s; }
        .room-item:hover { background: #1a0000; }
        .room-item.active { background: var(--dark-red); color: white; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
        .modal-content { background: #080000; border: 2px solid var(--dark-red); padding: 25px; border-radius: 25px; width: 320px; text-align: center; }
        .modal-btn { display: block; width: 100%; padding: 12px; margin: 7px 0; border: 1px solid var(--blood-red); background: #110000; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 20px 15px; text-align: center;">
        <input type="file" id="avatar-input" style="display:none" onchange="uploadAvatar(this)">
        <img id="my-avatar-img" src="https://i.ibb.co/v3m6y6R/avatar.png" style="width:65px; height:65px; border-radius:50%; border:2px solid var(--dark-red); object-fit: cover; cursor:pointer;" onclick="document.getElementById('avatar-input').click()">
        <div id="my-nick-label" style="font-weight:bold; color:var(--bright-red); margin-top:5px;">...</div>
        <div id="my-role-label" style="font-size: 11px; color: #888;">...</div>
        <div onclick="changeStatus()" style="font-size: 11px; color: #0c0; cursor:pointer; margin-top:5px; text-decoration: underline;">💬 სტატუსის შეცვლა</div>
    </div>
    <div class="rooms-list">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('💎 ვიპ საუბრები', this)">💎 ვიპ საუბრები</div>
        <div class="room-item" onclick="changeRoom('🕴 მაფიის ღამე', this)">🕴 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🕵️ გამოძიება', this)">🕵️ გამოძიება</div>
        <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('❓ ვიქტორინა', this)">❓ ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('😵 ჩამოხრჩობანა', this)">😵 ჩამოხრჩობანა</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('🎲 ნარდი', this)">🎲 ნარდი</div>
        <div class="room-item" onclick="changeRoom('🎵 მუსიკა', this)">🎵 მუსიკა</div>
        <div class="room-item" onclick="changeRoom('😂 იუმორი', this)">😂 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🏛️ ფორუმი', this)">🏛️ ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('🆘 დახმარება', this)">🆘 დახმარება</div>
        <div class="room-item" style="color: #0f0;" onclick="changeRoom('📁 წევრების არქივი', this)">📁 წევრების არქივი</div>
    </div>
    <div style="padding:15px; text-align:center; color:red; cursor:pointer; border-top:1px solid #222;" onclick="logout()">🚪 გასვლა</div>
</div>

<div class="online-sidebar" id="online-sidebar">
    <div style="padding:15px; color:#0f0; font-weight:bold; text-align:center; border-bottom:1px solid var(--dark-red);">🟢 ონლაინში</div>
    <div id="online-list-content" style="flex:1; overflow-y:auto;"></div>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
    <div id="pm-btn" onclick="location.href='inbox.html'">✉️ <span id="pm-count">0</span></div>
    <div class="menu-btn" onclick="toggleOnline()">👥</div>
</div>

<div class="chat-area" id="chat"></div>

<div id="emoji-picker" style="display:none; position:fixed; bottom:80px; left:5%; width:90%; background:rgba(0,0,0,0.95); border:2px solid #800000; border-radius:15px; padding:10px; z-index:10000; max-height:200px; overflow-y:auto;">
    <div id="emoji-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap:10px;"></div>
</div>

<div class="input-zone" id="input-zone">
    <button onclick="toggleEmojiPicker()" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 5px;">😊</button>
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="targetAvatar" src="" style="width:85px; height:85px; border-radius:50%; border:2px solid var(--dark-red); object-fit: cover;">
        <h3 id="targetName" style="color:var(--bright-red); margin:10px 0;">ნიკი</h3>
        <p id="targetRoleLabel" style="font-size:12px; color:#aaa;"></p>
        <div id="targetStatusDisplay" style="color:#0c0; font-size:13px; font-style:italic; margin:10px 0;"></div>
        <div id="adminOptions" style="display:none; border-top:1px solid #333; margin-top:10px; padding-top:10px;"></div>
        <button class="modal-btn" style="background:#111;" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), myRole = "Member", currentRoom = "☕ კაფე-ბარი";

    function translateRole(r) { 
        const roles = {'Owner': '👑 დამფუძნებელი', 'Admin': '🛡️ ადმინისტრატორი', 'Member': '👤 მომხმარებელი', 'Banned': '🚫 დაბლოკილი'}; 
        return roles[r] || '👤 მომხმარებელი'; 
    }
    
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function toggleOnline() { document.getElementById('online-sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); if(document.getElementById('online-sidebar').classList.contains('active')) loadOnline(); }
    function closeAll() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('online-sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
    function closeModal() { document.getElementById('userModal').style.display = "none"; }

    async function init() {
        if (!myNick) { location.href = 'index.html'; return; }
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = p.role || "Member";
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-role-label').innerText = translateRole(myRole);
            document.getElementById('my-avatar-img').src = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
            setInterval(() => _s.from('profiles').update({ last_online: new Date().toISOString() }).eq('username', myNick), 10000);
            checkPMs(); setInterval(checkPMs, 5000);
            loadOnline(); setInterval(loadOnline, 15000);
        }
        loadMessages();
        _s.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
    }

    // მარჯვენა პანელი: მხოლოდ ონლაინ ხალხი
    async function loadOnline() {
        const { data: users } = await _s.from('profiles').select('*');
        const list = document.getElementById('online-list-content');
        if(!list || !users) return;
        list.innerHTML = "";
        const now = new Date();
        const online = users.filter(u => u.last_online && (now - new Date(u.last_online) < 60000));

        const renderGrp = (title, grp, glowClass) => {
            if(grp.length === 0) return "";
            let h = `<div class="group-header">${title} (${grp.length})</div>`;
            grp.forEach(u => {
                h += `<div class="u-card" onclick="openProfile('${u.username}')">
                    <div style="position:relative;">
                        <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar ${glowClass}" style="width:32px; height:32px;">
                        <div style="position:absolute; bottom:0; right:0; width:10px; height:10px; background:#0f0; border:2px solid black; border-radius:50%; box-shadow:0 0 5px #0f0;"></div>
                    </div>
                    <span style="font-size:13px; color:#ccc;">${u.username}</span>
                </div>`;
            });
            return h;
        };

        list.innerHTML += renderGrp("👑 დამფუძნებლები", online.filter(u => u.role === 'Owner'), "glow-red");
        list.innerHTML += renderGrp("🛡️ ადმინები", online.filter(u => u.role === 'Admin'), "glow-cyan");
        list.innerHTML += renderGrp("👤 წევრები", online.filter(u => u.role !== 'Owner' && u.role !== 'Admin'), "glow-green");
    }

    async function loadMessages() {
        if(currentRoom === '📁 წევრების არქივი') return;
        const box = document.getElementById("chat"); if(!box) return;
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const { data: profs } = await _s.from('profiles').select('*');
        box.innerHTML = "";
        const base = "https://ftfciebnywbondaiarnc.supabase.co/storage/v1/object/public/emojis/";

        msgs?.forEach(m => {
            const p = profs?.find(u => u.username === m.user_name);
            const active = (p?.last_online && (new Date() - new Date(p.last_online) < 60000)) ? "active" : "";
            const time = m.created_at ? new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "00:00";
            let txt = m.text || "";
            txt = txt.replace(/:([a-zA-Z0-9_-]+):/g, (match, name) => `<img src="${base}${name}.gif" style="height:45px; vertical-align:middle;">`);
            
            const canDelete = (myRole === "Owner") || (myRole === "Admin" && p?.role !== "Owner");
            let delBtn = (canDelete) ? `<span style="cursor:pointer;margin-left:8px; opacity:0.5;" onclick="deleteMsg(${m.id})">🗑️</span>` : "";

            box.innerHTML += `<div class="msg-container">
                <div class="avatar-wrapper" onclick="openProfile('${m.user_name}')"><img src="${p?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar"><div class="online-dot ${active}"></div></div>
                <div class="bubble">
                    <div class="m-nick" onclick="openProfile('${m.user_name}')">${m.user_name} ${delBtn}</div>
                    <div class="m-text">${txt}</div>
                    <div class="m-footer"><span class="m-time">${time}</span></div>
                </div>
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    function changeRoom(n, el) {
        currentRoom = n; document.getElementById('room-name').innerText = n;
        document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active'); closeAll();
        
        const chat = document.getElementById('chat');
        const inputZone = document.getElementById('input-zone');

        if(n === '📁 წევრების არქივი') {
            inputZone.style.display = "none";
            chat.innerHTML = `
                <div style="padding:20px;">
                    <input type="text" id="arc-search" placeholder="მოძებნე წევრი..." oninput="searchArchive(this.value)" 
                        style="width:100%; padding:12px; border-radius:20px; background:#111; border:1px solid var(--blood-red); color:white; outline:none; margin-bottom:20px;">
                    <div id="archive-results"></div>
                </div>`;
            searchArchive(""); 
        } else {
            inputZone.style.display = "flex";
            loadMessages();
        }
    }

    async function searchArchive(val) {
        const { data: users } = await _s.from('profiles').select('*').ilike('username', `%${val}%`).order('username');
        const res = document.getElementById('archive-results');
        if(!res || !users) return;
        res.innerHTML = users.map(u => `
            <div class="u-card" style="background:rgba(20,0,0,0.3); margin-bottom:5px; border-radius:10px;" onclick="openProfile('${u.username}')">
                <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" style="width:35px; height:35px; border-radius:50%; border:1px solid #444;">
                <div>
                    <div style="color:white; font-weight:bold; font-size:14px;">${u.username}</div>
                    <div style="color:#777; font-size:11px;">${translateRole(u.role)}</div>
                </div>
            </div>
        `).join('');
    }

    async function openProfile(name) {
        const { data: p } = await _s.from('profiles').select('*').eq('username', name).maybeSingle();
        if(!p) return;
        document.getElementById('targetAvatar').src = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
        document.getElementById('targetName').innerText = p.username;
        document.getElementById('targetRoleLabel').innerText = translateRole(p.role);
        document.getElementById('targetStatusDisplay').innerText = p.status || "";
        
        const adminZone = document.getElementById('adminOptions');
        if (adminZone) {
            adminZone.innerHTML = "";
            if (myRole === "Owner" && name !== myNick) {
                adminZone.style.display = "block";
                adminZone.innerHTML = `
                    <button class="modal-btn" onclick="setRole('Admin')">🛡️ ადმინად დანიშვნა</button>
                    <button class="modal-btn" onclick="setRole('Owner')">👑 დამფუძნებლად დანიშვნა</button>
                    <button class="modal-btn" style="background:#220000;" onclick="setRole('Member')">✨ როლის ჩახსნა</button>
                    <button class="modal-btn" style="background:#440000; color:red;" onclick="setRole('Banned')">🚫 ბანი</button>
                `;
            } else if (myRole === "Admin" && p.role !== "Owner" && name !== myNick) {
                adminZone.style.display = "block";
                adminZone.innerHTML = `<button class="modal-btn" style="background:#440000; color:red;" onclick="setRole('Banned')">🚫 ბანი</button>`;
            } else { adminZone.style.display = "none"; }
        }
        document.getElementById('userModal').style.display = "flex";
        window.selectedUser = name;
    }

    async function setRole(role) { await _s.from('profiles').update({ role: role }).eq('username', window.selectedUser); alert("განახლდა!"); closeModal(); loadOnline(); }
    async function sendMsg() { const i = document.getElementById("msg-input"); if(!i.value.trim() || myRole === "Banned") return; await _s.from('messages').insert([{ user_name: myNick, text: i.value, room_name: currentRoom }]); i.value = ""; }
    async function uploadAvatar(el) { const file = el.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = async (e) => { await _s.from('profiles').update({ avatar_url: e.target.result }).eq('username', myNick); location.reload(); }; reader.readAsDataURL(file); }
    async function changeStatus() { const s = prompt("შეიყვანეთ ახალი სტატუსი:"); if(s !== null) { await _s.from('profiles').update({ status: s }).eq('username', myNick); location.reload(); } }
    async function checkPMs() { const { count } = await _s.from('private_messages').select('*', { count: 'exact', head: true }).eq('receiver', myNick).eq('is_read', false); const b = document.getElementById('pm-count'); if(b) { b.innerText = count || 0; b.style.display = count > 0 ? 'block' : 'none'; } }
    async function deleteMsg(id) { if(confirm("წავშალო?")) { await _s.from('messages').delete().eq('id', id); loadMessages(); } }
    
    async function toggleEmojiPicker() {
        const p = document.getElementById('emoji-picker'); const l = document.getElementById('emoji-list');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
        if(l.innerHTML === "") {
            const { data } = await _s.from('emojis').select('name');
            data?.forEach(e => {
                const img = document.createElement('img');
                img.src = `https://ftfciebnywbondaiarnc.supabase.co/storage/v1/object/public/emojis/${e.name}`;
                img.style.width = "40px"; img.style.cursor = "pointer";
                img.onclick = () => { document.getElementById('msg-input').value += ` :${e.name.replace('.gif','')}: `; p.style.display='none'; };
                l.appendChild(img);
            });
        }
    }
    function logout() { localStorage.removeItem('nickname'); location.href='index.html'; }
    init();
</script>
</body>
</html>
