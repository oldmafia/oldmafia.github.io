<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - FULL ADMIN SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root { --dark-red: #4a0000; --bright-red: #ff0000; --blood-red: #660000; --bg-black: #030000; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: black; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--dark-red); height: 60px; z-index: 1000; }
        #room-name { font-weight: bold; color: var(--bright-red); flex: 1; text-align: center; }
        #pm-btn { position: relative; cursor: pointer; font-size: 22px; margin-right: 15px; }
        #pm-count { position: absolute; top: -5px; right: -8px; background: red; color: white; border-radius: 50%; font-size: 11px; min-width: 18px; height: 18px; display: none; align-items: center; justify-content: center; border: 1px solid white; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; } }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #1a0000 0%, #030000 100%); }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; max-width: 95%; }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--dark-red); object-fit: cover; cursor: pointer; }
        .bubble { background: rgba(25, 0, 0, 0.9); border: 1px solid var(--blood-red); padding: 8px 12px; border-radius: 4px 18px 18px 18px; min-width: 100px; position: relative; }
        .m-nick { font-weight: bold; color: #ff3333; font-size: 13px; cursor: pointer; }
        .m-text { color: #ddd; font-size: 14px; word-wrap: break-word; margin-top: 3px; }
        .m-text img { width: 45px; height: 45px; vertical-align: middle; }
        .m-time { text-align: right; font-size: 9px; color: #777; margin-top: 4px; font-family: monospace; }
        /* მართვის მენიუ */
        .admin-menu { position: absolute; background: #111; border: 1px solid red; padding: 5px; border-radius: 5px; display: none; flex-direction: column; z-index: 5000; min-width: 120px; }
        .admin-menu button { background: none; border: none; color: white; padding: 8px; text-align: left; cursor: pointer; font-size: 11px; border-bottom: 1px solid #222; }
        .admin-menu button:hover { background: #300; }
        
        .input-zone { position: fixed; bottom: 0; width: 100%; background: black; padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--dark-red); z-index: 2000; }
        .input-zone input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--blood-red); background: #080000; color: white; outline: none; }
        .sidebar, .online-sidebar { position: fixed; top: 0; width: 280px; height: 100%; background: #050000; transition: 0.3s; z-index: 4000; }
        .sidebar { left: -280px; border-right: 3px solid var(--dark-red); }
        .sidebar.active { left: 0; }
        .online-sidebar { right: -280px; border-left: 3px solid var(--dark-red); overflow-y: auto; }
        .online-sidebar.active { right: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3500; }
        .overlay.active { display: block; }
        .room-item { padding: 12px 20px; cursor: pointer; color: #bbb; border-bottom: 1px solid #150000; }
        .room-item.active { background: var(--dark-red); color: white; font-weight: bold; }
        #emoji-picker { display: none; position: fixed; bottom: 80px; left: 10px; background: #080000; border: 2px solid var(--dark-red); padding: 10px; border-radius: 15px; width: 300px; z-index: 3000; }
        #emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-height: 250px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeAll()"></div>
<div id="emoji-picker"><div id="emoji-grid"></div></div>
<div id="admin-ctx-menu" class="admin-menu"></div>

<div class="sidebar" id="sidebar">
    <div style="padding: 20px; text-align: center; border-bottom: 1px solid #220000;">
        <input type="file" id="avatar-input" style="display:none" onchange="uploadAvatar(this)">
        <img id="my-avatar-img" src="" style="width:65px; height:65px; border-radius:50%; border:2px solid var(--dark-red); object-fit:cover; cursor:pointer;" onclick="document.getElementById('avatar-input').click()">
        <div id="my-nick-label" style="font-weight:bold; color:var(--bright-red); margin-top:5px;">...</div>
        <div id="my-role-label" style="font-size:11px; color:#888;">...</div>
    </div>
    <div id="rooms-list" style="overflow-y:auto; height: calc(100% - 220px);">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('💎 ვიპ საუბრები', this)">💎 ვიპ საუბრები</div>
        <div class="room-item" onclick="changeRoom('🕴 მაფიის ღამე', this)">🕴 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🕵️ გამოძიება', this)">🕵️ გამოძიება</div>
        <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('❓ ვიქტორინა', this)">❓ ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('😵 ჩამოხრჩობანა', this)">😵 ჩამოხრჩობანა</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('🎲 ნარდი', this)">🎲 ნარდი</div>
        <div class="room-item" onclick="changeRoom('🎵 მუსიკა', this)">🎵 მუსიკა</div>
        <div class="room-item" onclick="changeRoom('😂 იუმორი', this)">😂 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🏛️ ფორუმი', this)">🏛️ ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('🆘 დახმარება', this)">🆘 დახმარება</div>
    </div>
</div>

<div class="online-sidebar" id="online-sidebar">
    <div id="online-list-content"></div>
</div>

<div class="topbar">
    <div onclick="toggleSidebar()" style="cursor:pointer; font-size:25px; color:red; padding:10px;">☰</div>
    <div id="room-name">☕ კაფე-ბარი</div>
    <div id="pm-btn" onclick="location.href='pm.html'">📩 <span id="pm-count">0</span></div>
    <div onclick="toggleOnline()" style="cursor:pointer; font-size:25px; color:red; padding:10px;">👥</div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <button onclick="toggleEmojiPicker()" style="background:none; border:none; font-size:24px; cursor:pointer;">😊</button>
    <input type="text" id="msg-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()" style="background:var(--dark-red); border:none; width:45px; height:45px; border-radius:50%; color:cyan; cursor:pointer;">✈</button>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), myRole = "Member", currentRoom = "☕ კაფე-ბარი";

    function parseEmojis(t) { return t ? t.replace(/(\S+\.(gif|png|jpg|webp))/gi, `<img src="https://ftfciebnywbondaiarnc.supabase.co/storage/v1/object/public/emojis/$1">`) : ""; }

    async function init() {
        const { data: p } = await _s.from('profiles').select('*').eq('username', myNick).maybeSingle();
        if (p) {
            myRole = p.role;
            document.getElementById('my-nick-label').innerText = p.username;
            document.getElementById('my-role-label').innerText = p.role;
            document.getElementById('my-avatar-img').src = p.avatar_url || "https://i.ibb.co/v3m6y6R/avatar.png";
        }
        loadMessages();
        checkPMs();
        _s.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
    }

    // მართვის ფუნქციები
    function showAdminMenu(e, targetNick, targetRole, msgId) {
        e.preventDefault();
        const menu = document.getElementById('admin-ctx-menu');
        menu.style.display = 'flex';
        menu.style.top = e.pageY + 'px';
        menu.style.left = e.pageX + 'px';
        
        let html = `<button onclick="location.href='pm.html?to=${targetNick}'">📩 მიწერა</button>`;
        
        if (myRole === "Owner" || (myRole === "Admin" && targetRole !== "Owner" && targetRole !== "Admin")) {
            html += `<button onclick="deleteMsg(${msgId})">🗑️ წაშლა</button>`;
            html += `<button onclick="banUser('${targetNick}')">🚫 დაბლოკვა</button>`;
        }
        
        if (myRole === "Owner") {
            const nextRole = targetRole === "Admin" ? "Member" : "Admin";
            html += `<button onclick="updateRole('${targetNick}', '${nextRole}')">👑 ${nextRole === 'Admin' ? 'გაადმინება' : 'ადმინის ჩამორთმევა'}</button>`;
        }
        
        menu.innerHTML = html;
    }

    async function updateRole(nick, role) { if(confirm(`${nick}-ს ვანიჭებთ ${role}-ს?`)) { await _s.from('profiles').update({role}).eq('username', nick); location.reload(); } }
    async function deleteMsg(id) { await _s.from('messages').delete().eq('id', id); loadMessages(); closeAll(); }
    async function banUser(nick) { if(confirm(`${nick}-ს ვბლოკავთ?`)) { alert("ბლოკი მზადდება..."); closeAll(); } }

    async function loadMessages() {
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const { data: profs } = await _s.from('profiles').select('*');
        const box = document.getElementById("chat"); box.innerHTML = "";
        msgs?.forEach(m => {
            const p = profs?.find(u => u.username === m.user_name);
            const time = new Date(m.created_at).toLocaleTimeString('ka-GE', { hour: '2-digit', minute: '2-digit', hour12: false });
            box.innerHTML += `
                <div class="msg-container">
                    <img src="${p?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="msg-avatar" onclick="location.href='pm.html?to=${m.user_name}'">
                    <div class="bubble">
                        <div class="m-nick" onclick="showAdminMenu(event, '${m.user_name}', '${p?.role || 'Member'}', ${m.id})">${m.user_name}</div>
                        <div class="m-text">${parseEmojis(m.text)}</div>
                        <div class="m-time">${time}</div>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById("msg-input"); if(!i.value.trim()) return;
        await _s.from('messages').insert([{ user_name: myNick, text: i.value, room_name: currentRoom }]);
        i.value = "";
    }

    async function checkPMs() {
        const { count } = await _s.from('private_messages').select('*', { count: 'exact', head: true }).eq('receiver', myNick).eq('is_read', false);
        const b = document.getElementById('pm-count'); b.innerText = count || 0; b.style.display = count > 0 ? 'flex' : 'none';
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function toggleOnline() { document.getElementById('online-sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function closeAll() { 
        document.getElementById('sidebar').classList.remove('active'); 
        document.getElementById('online-sidebar').classList.remove('active'); 
        document.getElementById('overlay').classList.remove('active'); 
        document.getElementById('admin-ctx-menu').style.display='none';
    }
    function changeRoom(n, el) { currentRoom = n; document.getElementById('room-name').innerText = n; document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); closeAll(); loadMessages(); }

    init();
</script>
</body>
</html>
