<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👥 მეგობრები - OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff8f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e8d4b0;
        }
        h1 {
            color: #c55a3a;
            font-size: 1.8rem;
        }
        .back-btn {
            background: #c55a3a;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
        }
        .friends-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .friend-card {
            background: white;
            border: 1px solid #e8d4b0;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        .friend-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        .friend-name {
            font-weight: bold;
            font-size: 16px;
            flex: 1;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
        }
        body.night-mode {
            background: #030000;
            color: white;
        }
        body.night-mode .friend-card {
            background: #1a1a1a;
            border-color: #660000;
        }
        body.night-mode .back-btn {
            background: #ff6666;
        }
        body.night-mode h1 {
            color: #ff6666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 ჩემი მეგობრები</h1>
            <div>
                <button class="theme-toggle" id="themeToggle">🌙</button>
                <a href="chat.html" class="back-btn">← ჩატში</a>
            </div>
        </div>
        <div class="friends-list" id="friendsList"></div>
    </div>

<script>
    const supabase = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co",
        "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
    );
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    let profMap = {};

    function setTheme(theme) {
        document.body.classList.remove('night-mode', 'day-mode');
        if (theme === 'day') {
            document.body.classList.add('day-mode');
            document.getElementById('themeToggle').innerHTML = '🌙';
            localStorage.setItem('friends_theme', 'day');
        } else {
            document.body.classList.add('night-mode');
            document.getElementById('themeToggle').innerHTML = '☀️';
            localStorage.setItem('friends_theme', 'night');
        }
    }
    
    function toggleTheme() {
        if (document.body.classList.contains('night-mode')) setTheme('day');
        else setTheme('night');
    }
    
    async function loadFriends() {
        const { data: profiles } = await supabase.from('profiles').select('username, avatar_url');
        profiles?.forEach(p => profMap[p.username] = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png');
        
        const { data: friends } = await supabase
            .from('friends')
            .select('friend_name')
            .eq('user_name', myNick);
        
        const listDiv = document.getElementById('friendsList');
        if (!friends || friends.length === 0) {
            listDiv.innerHTML = '<div class="empty">📭 ჯერ არ გყავს მეგობრები</div>';
            return;
        }
        
        listDiv.innerHTML = friends.map(f => `
            <div class="friend-card" onclick="window.location.href='chat.html'">
                <img src="${profMap[f.friend_name]}" class="friend-avatar" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                <div class="friend-name">${f.friend_name}</div>
            </div>
        `).join('');
    }
    
    document.getElementById('themeToggle').onclick = toggleTheme;
    const savedTheme = localStorage.getItem('friends_theme') || 'night';
    setTheme(savedTheme);
    loadFriends();
</script>
</body>
</html>
