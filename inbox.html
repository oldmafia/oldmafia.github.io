<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INBOX - OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; background: #000; border-bottom: 2px solid #4a0000; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        .back-btn { background: #111; border: 1px solid #4a0000; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .chat-title { color: #ff0000; font-weight: bold; text-shadow: 0 0 10px #ff0000; }
        
        #pm-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; border: 1px solid #222; }
        .sent { align-self: flex-end; background: #300; border-color: #600; }
        .received { align-self: flex-start; background: #111; border-color: #333; }

        .input-area { padding: 15px; display: flex; gap: 10px; background: #000; border-top: 1px solid #222; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #4a0000; color: white; padding: 12px; border-radius: 20px; outline: none; }
        button { background: #ff0000; border: none; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px #ff0000; }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="location.href='chat.html'">← უკან</button>
    <div class="chat-title" id="chat-with-title">INBOX</div>
    <div></div>
</div>

<div id="pm-messages"></div>

<div class="input-area">
    <input type="text" id="pm-text" placeholder="დაწერე პირადი შეტყობინება...">
    <button onclick="sendPM()">გაგზავნა</button>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname');
    const chatWith = localStorage.getItem('chatWith');

    async function initInbox() {
        if (!myNick || !chatWith) { location.href = 'chat.html'; return; }
        document.getElementById('chat-with-title').innerText = "მიწერა: " + chatWith;
        loadPMs();
        
        // რეალურ დროში მესიჯების მოსვლა
        _s.channel('pvt_chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'private_messages' }, loadPMs).subscribe();
    }

    async function loadPMs() {
        // მესიჯების წამოღება სადაც მე ვარ გამგზავნი ან მიმღები
        const { data } = await _s.from('private_messages')
            .select('*')
            .or(`and(sender.eq.${myNick},receiver.eq.${chatWith}),and(sender.eq.${chatWith},receiver.eq.${myNick})`)
            .order('created_at', { ascending: true });

        const box = document.getElementById('pm-messages');
        box.innerHTML = "";
        data?.forEach(m => {
            const type = m.sender === myNick ? 'sent' : 'received';
            box.innerHTML += `<div class="msg ${type}">${m.text}</div>`;
        });
        box.scrollTop = box.scrollHeight;

        // წაკითხულად მონიშვნა
        await _s.from('private_messages').update({ is_read: true }).eq('receiver', myNick).eq('sender', chatWith);
    }

    async function sendPM() {
        const txt = document.getElementById('pm-text');
        if (!txt.value.trim()) return;

        await _s.from('private_messages').insert([
            { sender: myNick, receiver: chatWith, text: txt.value.trim(), is_read: false }
        ]);
        txt.value = "";
        loadPMs();
    }

    window.onload = initInbox;
</script>
</body>
</html>
