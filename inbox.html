<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პირადი - OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root { --dark-red: #4a0000; --bright-red: #ff0000; --bg-black: #050000; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ჰედერი */
        .header { padding: 15px; text-align: center; border-bottom: 2px solid var(--dark-red); background: black; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .back-btn { color: white; text-decoration: none; font-size: 24px; cursor: pointer; width: 40px; }
        .title { color: var(--bright-red); font-weight: bold; flex: 1; font-size: 18px; text-shadow: 0 0 10px red; }
        .menu-btn { font-size: 24px; cursor: pointer; width: 40px; text-align: right; color: var(--bright-red); }

        /* მარჯვენა ჰამბურგერ მენიუ */
        .side-menu { position: fixed; right: -280px; top: 0; width: 280px; height: 100%; background: #0a0000; border-left: 2px solid var(--dark-red); transition: 0.3s; z-index: 100; overflow-y: auto; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .side-menu.open { right: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 99; }
        .menu-overlay.show { display: block; }

        /* როლების სექციები მენიუში */
        .role-section { margin-bottom: 20px; }
        .role-title { color: var(--bright-red); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #300; margin-bottom: 10px; padding-bottom: 3px; letter-spacing: 2px; font-weight: bold; }
        
        .user-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; cursor: pointer; padding: 8px; border-radius: 10px; transition: 0.2s; position: relative; }
        .user-row:hover { background: rgba(255, 0, 0, 0.1); }
        .user-row img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #00ff00; object-fit: cover; box-shadow: 0 0 5px #00ff00; }
        .user-name { font-size: 14px; color: #eee; font-weight: 500; }

        /* ინბოქსის სია */
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; display: none; padding: 15px; }
        #inbox-view.active, #chat-view.active { display: block; }
        .history-item { background: rgba(20, 0, 0, 0.9); border: 1px solid var(--dark-red); padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .history-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .unread-dot { width: 10px; height: 10px; background: var(--bright-red); border-radius: 50%; box-shadow: 0 0 10px var(--bright-red); margin-left: auto; }

        /* ჩატის ბუშტები */
        .msg { margin-bottom: 10px; padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .sent { background: var(--dark-red); margin-left: auto; border-bottom-right-radius: 2px; }
        .received { background: #222; border-bottom-left-radius: 2px; border: 1px solid #333; }

        /* საწერი ზონა */
        .input-area { padding: 12px; background: black; border-top: 1px solid var(--dark-red); display: none; gap: 10px; }
        .input-area.active { display: flex; }
        .input-area input { flex: 1; background: #111; border: 1px solid var(--dark-red); color: white; padding: 10px 15px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="back-btn" onclick="goBack()">⬅</div>
    <div class="title" id="view-title">პირადი</div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="side-menu">
    <h3 style="color:white; font-size: 16px; margin-bottom: 20px; text-align: center; border-bottom: 1px solid var(--dark-red); padding-bottom: 10px;">ონლაინ</h3>
    <div id="online-users-container">
        </div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>

<div class="input-area" id="chat-input">
    <input type="text" id="msg-text" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button style="background:none; border:none; color:var(--bright-red); font-size:22px; cursor:pointer;" onclick="sendMessage()">✈</button>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname');
    let activeChatPartner = null;

    if (!myNick) location.href = 'index.html';

    function toggleMenu() {
        document.getElementById('side-menu').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
        if(document.getElementById('side-menu').classList.contains('open')) loadOnlineSidebar();
    }

    // მენიუში მხოლოდ ონლაინ იუზერების ჩვენება
    async function loadOnlineSidebar() {
        const { data: users } = await _s.from('profiles').select('username, avatar_url, last_seen, role');
        const container = document.getElementById('online-users-container');
        container.innerHTML = "";

        const groups = { 'Founder': [], 'Admin': [], 'User': [] };
        const now = new Date();

        users?.forEach(u => {
            // თუ ბოლო აქტივობა 2 წუთზე ნაკლებია - ე.ი ონლაინაა
            const diff = (now - new Date(u.last_seen)) / 1000 / 60;
            if (diff < 2 && u.username !== myNick) {
                const html = `
                    <div class="user-row" onclick="openChat('${u.username}'); toggleMenu();">
                        <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}">
                        <div class="user-name">${u.username}</div>
                    </div>`;
                if (groups[u.role]) groups[u.role].push(html); else groups['User'].push(html);
            }
        });

        for (const role in groups) {
            if (groups[role].length > 0) {
                container.innerHTML += `<div class="role-section"><div class="role-title">${role}S</div>${groups[role].join('')}</div>`;
            }
        }
        
        if (container.innerHTML === "") {
            container.innerHTML = "<p style='color:#555; text-align:center; font-size:12px;'>ამჟამად არავინაა ონლაინ</p>";
        }
    }

    async function loadInbox() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq.${myNick},receiver.eq.${myNick}`).order('created_at', { ascending: false });
        const historyDiv = document.getElementById('inbox-view');
        historyDiv.innerHTML = "";
        const chats = {};
        msgs?.forEach(m => {
            const partner = (m.sender === myNick) ? m.receiver : m.sender;
            if (!chats[partner]) chats[partner] = { lastMsg: m.text, unread: (m.receiver === myNick && !m.is_read) };
        });
        for (const partner in chats) {
            const { data: p } = await _s.from('profiles').select('avatar_url').eq('username', partner).maybeSingle();
            historyDiv.innerHTML += `
                <div class="history-item" onclick="openChat('${partner}')">
                    <img src="${p?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}">
                    <div style="flex:1">
                        <div style="font-weight:bold;color:red">${partner}</div>
                        <div style="font-size:12px;color:#aaa; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:150px;">${chats[partner].lastMsg}</div>
                    </div>
                    ${chats[partner].unread ? '<div class="unread-dot"></div>' : ''}
                </div>`;
        }
    }

    async function openChat(partner) {
        activeChatPartner = partner;
        document.getElementById('view-title').innerText = partner;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('chat-input').classList.add('active');
        await _s.from('private_messages').update({ is_read: true }).eq('receiver', myNick).eq('sender', partner);
        loadPrivateMessages();
    }

    async function loadPrivateMessages() {
        if (!activeChatPartner) return;
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq.${myNick},receiver.eq.${activeChatPartner}),and(sender.eq.${activeChatPartner},receiver.eq.${myNick})`).order('created_at', { ascending: true });
        const chatDiv = document.getElementById('chat-view');
        chatDiv.innerHTML = msgs?.map(m => `<div class="msg ${(m.sender === myNick) ? 'sent' : 'received'}">${m.text}</div>`).join('') || "";
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMessage() {
        const inp = document.getElementById('msg-text');
        if (!inp.value.trim() || !activeChatPartner) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeChatPartner, text: inp.value.trim(), is_read: false }]);
        inp.value = "";
        loadPrivateMessages();
    }

    function goBack() {
        if (activeChatPartner) {
            activeChatPartner = null;
            document.getElementById('view-title').innerText = "პირადი";
            document.getElementById('chat-view').classList.remove('active');
            document.getElementById('chat-input').classList.remove('active');
            document.getElementById('inbox-view').classList.add('active');
            loadInbox();
        } else { location.href = 'chat.html'; }
    }

    window.onload = () => {
        loadInbox();
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('to')) openChat(urlParams.get('to'));
        
        // სტატუსის განახლება (რომ სხვებმაც დაგინახონ ონლაინში)
        setInterval(async () => {
            await _s.from('profiles').update({ last_seen: new Date().toISOString() }).eq('username', myNick);
            if(document.getElementById('side-menu').classList.contains('open')) loadOnlineSidebar();
        }, 30000);
    };

    _s.channel('pms').on('postgres_changes', { event: '*', schema: 'public', table: 'private_messages' }, () => {
        if (activeChatPartner) loadPrivateMessages();
        loadInbox();
    }).subscribe();
</script>
</body>
</html>
