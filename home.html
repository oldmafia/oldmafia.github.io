<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - LOBBY</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ძირითადი სტილები */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #050505; color: white; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header {
            height: 55px; background: #000; border-bottom: 2px solid red;
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            z-index: 1001; box-shadow: 0 2px 10px rgba(255, 0, 0, 0.2);
        }
        .logo { font-weight: bold; color: red; letter-spacing: 1px; font-size: 18px; text-transform: uppercase; }
        .nav-icons { display: flex; gap: 15px; font-size: 20px; cursor: pointer; }

        /* Main Wrapper */
        .wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }

        /* Lobby Grid System */
        .lobby-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Room Cards */
        .room-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .room-card:hover {
            border-color: red;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
            background: #1a0000;
        }

        .room-card .icon { font-size: 35px; }
        .room-card h3 { font-size: 13px; font-weight: 500; color: #fff; text-transform: uppercase; }

        /* სპეციალური სტილები */
        .room-card.game { border-bottom: 3px solid red; }
        .room-card.vip { border: 1px solid #ffd700; }
        .room-card.vip:hover { box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .room-card.logout { border-color: #444; }
        .room-card.logout:hover { background: #300; border-color: #f00; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: red; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="nav-icons">☰</div>
    <div class="logo">OLD MAFIA</div>
    <div class="nav-icons">👤</div>
</header>

<div class="wrapper">
    <div class="lobby-grid">
        <div class="room-card" onclick="openRoom('general')">
            <span class="icon">💬</span>
            <h3>ზოგადი ჩატი</h3>
        </div>

        <div class="room-card vip" onclick="openRoom('vip')">
            <span class="icon">👑</span>
            <h3>ვიპ საუბრები</h3>
        </div>

        <div class="room-card game" onclick="openRoom('investigation')">
            <span class="icon">🔍</span>
            <h3>გამოძიება</h3>
        </div>

        <div class="room-card game" onclick="openRoom('cipher')">
            <span class="icon">🔐</span>
            <h3>შიფროგრამა</h3>
        </div>

        <div class="room-card game" onclick="openRoom('quiz')">
            <span class="icon">💡</span>
            <h3>ვიქტორინა</h3>
        </div>

        <div class="room-card game" onclick="openRoom('hangman')">
            <span class="icon">😵</span>
            <h3>ჩამოხრჩობანა</h3>
        </div>

        <div class="room-card" onclick="openRoom('admin')">
            <span class="icon">🛡️</span>
            <h3>ადმინისტრაცია</h3>
        </div>

        <div class="room-card" onclick="openRoom('humor')">
            <span class="icon">😂</span>
            <h3>იუმორი</h3>
        </div>

        <div class="room-card" onclick="openRoom('music')">
            <span class="icon">🎵</span>
            <h3>მუსიკა</h3>
        </div>

        <div class="room-card" onclick="openRoom('gallery')">
            <span class="icon">🖼️</span>
            <h3>გალერეა</h3>
        </div>

        <div class="room-card" onclick="openRoom('help')">
            <span class="icon">❓</span>
            <h3>დახმარება</h3>
        </div>

        <div class="room-card logout" onclick="handleLogout()">
            <span class="icon">🚪</span>
            <h3>გასვლა</h3>
        </div>
    </div>
</div>

<script>
    // Supabase-ის კონფიგურაცია (აქ ჩასვი შენი მონაცემები)
    const supabaseUrl = 'YOUR_SUPABASE_URL';
    const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
    const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

    // ოთახში შესვლის ფუნქცია
    function openRoom(room) {
        alert(room + "-ის ოთახი მალე მზად იქნება!");
        // მაგალითად: window.location.href = room + ".html";
    }

    // გასვლის ფუნქცია
    async function handleLogout() {
        const confirmLogout = confirm("ნამდვილად გსურთ გასვლა?");
        if (confirmLogout) {
            const { error } = await supabase.auth.signOut();
            if (!error) {
                window.location.href = "index.html"; 
            } else {
                alert("შეცდომა გასვლისას: " + error.message);
            }
        }
    }

    // შემოწმება: თუ მომხმარებელი არაა შესული, დააბრუნე index-ზე
    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            window.location.href = "index.html";
        }
    }
    
    // გააქტიურე შემოწმება თუ გინდა დაცვა
    // checkUser();
</script>

</body>
</html>
