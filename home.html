<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Ultimate</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff4d4d; --gold: #ffd700; --dark: #050505; --panel: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { margin: 0; background: var(--dark); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ჰედერი - მთლიანი ზოლის დაჭერით იხსნება მენიუ */
        header { 
            background: var(--panel); padding: 12px 15px; border-bottom: 2px solid var(--red); 
            display: flex; align-items: center; justify-content: space-between; z-index: 2000; cursor: pointer;
        }
        .av-box { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--red); overflow: hidden; background: #222; position: relative; }
        .av-box img { width: 100%; height: 100%; object-fit: cover; }
        .room-title { font-size: 14px; font-weight: bold; color: #fff; flex-grow: 1; text-align: center; }

        /* ზემოდან ჩამოსაშლელი მენიუ */
        .top-menu { 
            position: absolute; top: -100%; left: 0; width: 100%; background: rgba(10, 10, 10, 0.98); 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1500; padding: 20px; 
            border-bottom: 2px solid var(--red); display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .top-menu.open { top: 60px; }
        .m-item { background: #1a1a1a; padding: 15px; border-radius: 12px; text-align: center; font-size: 13px; border: 1px solid #333; }
        .m-item:active { background: var(--red); }

        /* სტატუსის ზოლი */
        .status-bar { padding: 8px 15px; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; font-size: 11px; color: #777; }

        /* ჩატი */
        #chatBox { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg { padding: 10px 15px; border-radius: 18px; font-size: 14px; background: #1a1a1a; max-width: 85%; align-self: flex-start; }
        .me { align-self: flex-end; background: var(--red); color: #fff; }
        .u-name { font-size: 10px; color: var(--gold); display: block; margin-bottom: 3px; font-weight: bold; }

        /* ინფუთი */
        .input-zone { padding: 15px; background: #0c0c0c; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        input[type="text"] { flex: 1; background: #151515; border: 1px solid #333; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; }
        .send-btn { background: var(--red); border: none; width: 45px; height: 45px; border-radius: 50%; color: #fff; cursor: pointer; font-size: 20px; }
    </style>
</head>
