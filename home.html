<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA ROOMS</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* მენიუ */
        #sidebar { 
            position: fixed; left: 0; top: 0; width: 280px; height: 100%; 
            background: #000; border-right: 2px solid red; transition: 0.3s ease; z-index: 1000;
            display: flex; flex-direction: column;
        }
        #sidebar.closed { transform: translateX(-100%); }
        .sidebar-top { padding: 15px; border-bottom: 2px solid red; display: flex; justify-content: space-between; align-items: center; }
        .close-x { color: red; font-size: 32px; cursor: pointer; font-weight: bold; }
        .kaif-btn { border: 1.5px solid red; padding: 6px 14px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }

        .room-list { flex: 1; overflow-y: auto; }
        .room-item { padding: 14px 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #ccc; }
        .room-item.active { background: #111; color: red; border-left: 5px solid red; font-weight: bold; }

        /* ჩატის მხარე */
        #mainChat { flex: 1; display: flex; flex-direction: column; background: #000; width: 100%; }
        .header { height: 60px; border-bottom: 2px solid red; display: flex; justify-content: center; align-items: center; position: relative; }
        .menu-btn { position: absolute; left: 15px; font-size: 30px; color: red; cursor: pointer; }
        #roomTitle { color: red; font-weight: bold; font-size: 18px; text-transform: uppercase; }

        #messageList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* მესიჯის ბუშტი */
        .msg-row { display: flex; width: 100%; justify-content: flex-start; }
        .msg-bubble { background: #151515; border: 1px solid #222; padding: 10px 14px; border-radius: 18px; max-width: 85%; }
        .msg-bubble.is-me { border-color: red; }
        .msg-user { font-size: 13px; font-weight: bold; color: #00e5ff; display: block; margin-bottom: 4px; }
        .msg-content { display: flex; align-items: flex-end; gap: 10px; }
        .msg-text { font-size: 15px; color: #fff; line-height: 1.4; }
        .msg-time { font-size: 10px; color: #555; white-space: nowrap; }

        /* საწერი ველი */
        .input-container { padding: 15px; background: #000; border-top: 2px solid red; }
        .input-wrapper { 
            position: relative; display: flex; align-items: center; 
            background: #0a0a0a; border: 1px solid #333; border-radius: 30px; padding: 4px;
        }
        input { flex: 1; padding: 10px 15px; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        
        /* წითელი ღილაკი */
        .send-btn { 
            background: red; 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            flex-shrink: 0;
            font-size: 22px; /* Emoji-ს ზომა */
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-top">
            <div class="close-x" onclick="toggleSidebar()">X</div>
            <div class="kaif-btn" onclick="toggleSidebar()">😎 კაიფმანია</div>
        </div>
        <div class="room-list">
            <div class="room-item active" onclick="changeRoom('ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
            <div class="room-item" onclick="changeRoom('VIP საუბრები', this)">💎 VIP საუბრები</div>
            <div class="room-item" onclick="changeRoom('გამოძიება', this)">🔍 გამოძიება</div>
            <div class="room-item" onclick="changeRoom('შიფროგრამა', this)">🔐 შიფროგრამა</div>
            <div class="room-item" onclick="changeRoom('ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="room-item" onclick="changeRoom('ჩამოხრჩობანა', this)">🪢 ჩამოხრჩობანა</div>
            <div class="room-item" onclick="changeRoom('მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="room-item" onclick="changeRoom('ჯოკერი', this)">🃏 ჯოკერი</div>
            <div class="room-item" onclick="changeRoom('ნარდი', this)">🎲 ნარდი</div>
            <div class="room-item" onclick="changeRoom('მუსიკა', this)">🎵 მუსიკა</div>
            <div class="room-item" onclick="changeRoom('იუმორი', this)">🤣 იუმორი</div>
            <div class="room-item" onclick="changeRoom('გალერეა', this)">🖼️ გალერეა</div>
            <div class="room-item" onclick="changeRoom('ფორუმი', this)">📝 ფორუმი</div>
            <div class="room-item" onclick="changeRoom('ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
            <div class="room-item" onclick="changeRoom('დახმარება', this)">❓ დახმარება</div>
        </div>
    </div>

    <div id="mainChat">
        <div class="header">
            <div class="menu-btn" onclick="toggleSidebar()">☰</div>
            <div id="roomTitle">ზოგადი ჩატი</div>
        </div>
        <div id="messageList"></div>
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." autocomplete="off" onkeypress="if(event.key==='Enter') sendMsg()">
                <div class="send-btn" onclick="sendMsg()">
                    ✈️
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let myName = "abu007";

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('closed'); }

        async function init() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) return window.location.href = 'index.html';
            const { data: p } = await client.from('profiles').select('username').eq('id', user.id).maybeSingle();
            if (p && p.username) myName = p.username;
            loadMsgs();
            client.channel('chat').on('postgres_changes', { event: '*', table: 'messages' }, loadMsgs).subscribe();
        }

        async function loadMsgs() {
            const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).order('id', { ascending: true });
            const list = document.getElementById('messageList');
            if(!list) return;
            list.innerHTML = msgs ? msgs.map(m => `
                <div class="msg-row">
                    <div class="msg-bubble ${m.username === myName ? 'is-me' : ''}">
                        <span class="msg-user">${m.username || 'სტუმარი'}</span>
                        <div class="msg-content">
                            <span class="msg-text">${m.text}</span>
                            <span class="msg-time">${new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                    </div>
                </div>`).join('') : '';
            list.scrollTop = list.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const txt = input.value.trim();
            if(!txt) return;
            input.value = '';
            const { data: { user } } = await client.auth.getUser();
            await client.from('messages').insert([{ user_id: user.id, username: myName, text: txt, room_name: currentRoom }]);
            loadMsgs();
        }

        function changeRoom(name, el) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = name;
            document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            toggleSidebar();
            loadMsgs();
        }

        init();
    </script>
</body>
</html>
