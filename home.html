<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - Home</title>
    <style>
        /* --- ძირითადი სტილები --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- საიდბარი (Sidebar) --- */
        .sidebar {
            width: 280px;
            background: #050505;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            transition: 0.3s ease;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .sidebar-avatar {
            width: 75px;
            height: 75px;
            border-radius: 12px;
            border: 2px solid #ff0000;
            margin: 0 auto 10px;
            background: #111; /* აქ გამოჩნდება იუზერის ფოტო */
        }

        .user-name {
            color: #ff0000;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* --- ოთახების სია --- */
        .menu-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        /* სქროლის სტილი */
        .menu-items::-webkit-scrollbar { width: 3px; }
        .menu-items::-webkit-scrollbar-thumb { background: #ff0000; }

        .menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            color: #bbb;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        .menu-item:hover, .menu-item.active {
            background: linear-gradient(90deg, #1a0000, transparent);
            color: #ff0000;
            border-left: 3px solid #ff0000;
        }

        /* --- ჩატის ზონა --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            padding: 15px 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            color: #ff0000;
            font-weight: bold;
        }

        .messages-area {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- შეტყობინების სტილი --- */
        .msg {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .msg-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 1px solid #ff0000;
            background: #111;
        }

        .msg-bubble {
            background: #0d0d0d;
            padding: 10px 15px;
            border-radius: 0 15px 15px 15px;
            max-width: 75%;
            border: 1px solid #1a1a1a;
        }

        .msg-time {
            font-size: 10px;
            color: #444;
            display: block;
            text-align: right;
            margin-top: 5px;
        }

        /* --- ქვედა პანელი (Input) --- */
        .bottom-bar {
            padding: 15px;
            background: #0a0a0a;
            border-top: 1px solid #222;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex-grow: 1;
            background: #111;
            border: 1px solid #333;
            padding: 12px 20px;
            border-radius: 25px;
            color: white;
            outline: none;
        }

        input:focus { border-color: #ff0000; }

        .send-btn {
            background: none;
            border: none;
            color: #ff0000;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.1) rotate(-10deg); }

        /* --- მობილური ვერსია --- */
        .burger {
            display: none;
            font-size: 24px;
            color: #ff0000;
            background: none;
            border: none;
            margin-right: 15px;
            cursor: pointer;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; top: 0; }
            .sidebar.open { left: 0; }
            .burger { display: block; }
            .overlay.show { display: block; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-avatar"></div>
        <div class="user-name">abu007</div>
    </div>
    <div class="menu-items">
        <div class="menu-item active">☕ კაფე-ბარი</div>
        <div class="menu-item">👑 ვიპ საუბრები</div>
        <div class="menu-item">🕵️ გამოძიება</div>
        <div class="menu-item">🔐 შიფროგრამა</div>
        <div class="menu-item">❓ ვიქტორინა</div>
        <div class="menu-item">🪢 ჩამოხრჩობანა</div>
        <div class="menu-item">🌑 მაფიის ღამე</div>
        <div class="menu-item">🃏 ჯოკერი</div>
        <div class="menu-item">🎲 ნარდი</div>
        <div class="menu-item">🎵 მუსიკა</div>
        <div class="menu-item">😂 იუმორი</div>
        <div class="menu-item">🚀 კაიფმანია</div>
        <div class="menu-item">🛠️ ადმინისტრაცია</div>
        <div class="menu-item">❓ დახმარება</div>
        <div class="menu-item">📝 ფორუმი</div>
        <div class="menu-item" style="color:#555; margin-top:20px;">🚪 გასვლა</div>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <button class="burger" onclick="toggleMenu()">☰</button>
        <span id="roomTitle">კაფე-ბარი</span>
    </div>
    
    <div class="messages-area" id="chatContainer"></div>

    <div class="bottom-bar">
        <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor">
                <path d="M22,16v-2l-8.5-5V3.5c0-0.83-0.67-1.5-1.5-1.5s-1.5,0.67-1.5,1.5V9L2,14v2l8.5-2.5V19L8,21v2l4-1l4,1v-2l-2.5-2v-5.5L22,16z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }

    // ოთახების გადართვა
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            
            const name = this.innerText;
            document.getElementById('roomTitle').innerText = name;
            
            // მობილურზე ავტომატურად შეიკეცოს
            if(window.innerWidth <= 768) toggleMenu();
            
            // აქ შეგიძლია ჩაამატო ამ კონკრეტული ოთახის მესიჯების წამოღება Supabase-დან
            document.getElementById('chatContainer').innerHTML = ""; 
        });
    });

    function send() {
        let input = document.getElementById('msgInput');
        if(!input.value.trim()) return;
        
        let time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        let chat = document.getElementById('chatContainer');
        
        let msgHtml = `
            <div class="msg">
                <div class="msg-avatar"></div>
                <div class="msg-bubble">
                    <div style="color:#ff0000; font-weight:bold; font-size:13px; margin-bottom:2px;">abu007</div>
                    <div>${input.value}</div>
                    <span class="msg-time">${time}</span>
                </div>
            </div>`;
        
        chat.innerHTML += msgHtml;
        input.value = "";
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
