<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA ROOMS</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* გვერდითა მენიუ */
        #sidebar { 
            width: 280px; background: #000; border-right: 2px solid red; 
            display: flex; flex-direction: column; transition: 0.3s; z-index: 1000;
        }
        .sidebar-header { padding: 20px; text-align: center; color: red; font-weight: bold; font-size: 22px; border-bottom: 2px solid red; }

        .room-item { 
            padding: 12px 18px; border-bottom: 1px solid #111; cursor: pointer; 
            color: #ccc; transition: 0.2s; display: flex; align-items: center; gap: 12px; font-size: 15px;
        }
        .room-item:hover { background: #111; color: red; }
        .room-item.active { background: #111; color: red; font-weight: bold; border-left: 5px solid red; }

        /* ჩატი */
        #mainChat { flex: 1; display: flex; flex-direction: column; background: #050505; position: relative; }
        .header { padding: 12px; border-bottom: 1px solid red; display: flex; justify-content: space-between; align-items: center; background: #000; }
        .menu-btn { font-size: 28px; color: red; cursor: pointer; background: none; border: none; padding: 0 10px; }

        #messageList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-card { padding: 12px; border-radius: 10px; background: #0a0a0a; border-left: 3px solid #333; line-height: 1.5; }
        .msg-owner { border-left: 3px solid red; }

        /* საწერი გრაფა */
        .input-box { padding: 15px; background: #000; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; background: #0a0a0a; border: 1px solid #333; color: white; border-radius: 12px; outline: none; font-size: 16px; }
        .send-btn { background: red; color: white; border: none; padding: 10px 22px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 20px; }

        /* მობილურისთვის დაკეცვა */
        @media (max-width: 768px) {
            #sidebar { position: absolute; left: -280px; height: 100%; }
            #sidebar.open { left: 0; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">MAFIA ROOMS</div>
        <div class="room-item active" onclick="changeRoom('ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
        <div class="room-item" onclick="changeRoom('VIP საუბრები', this)">💎 VIP საუბრები</div>
        <div class="room-item" onclick="changeRoom('გამოძიება', this)">🔍 გამოძიება</div>
        <div class="room-item" onclick="changeRoom('შიფროგრამა', this)">🔐 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('ვიქტორინა', this)">🧩 ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('ჩამოხრჩობანა', this)">🪢 ჩამოხრჩობანა</div>
        <div class="room-item" onclick="changeRoom('მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('ნარდი', this)">🎲 ნარდი</div>
        <div class="room-item" onclick="changeRoom('მუსიკა', this)">🎵 მუსიკა</div>
        <div class="room-item" onclick="changeRoom('იუმორი', this)">🤣 იუმორი</div>
        <div class="room-item" onclick="changeRoom('ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('დახმარება', this)">❓ დახმარება</div>
        <div class="room-item" onclick="changeRoom('ფორუმი', this)">📝 ფორუმი</div>
        
        <div style="margin-top:auto; padding:15px; background: #000; border-top: 2px solid red;">
            <button onclick="window.location.href='user.html'" style="width:100%; padding:12px; background:#111; color:white; border:1px solid red; border-radius:10px; cursor:pointer; margin-bottom: 8px; font-weight:bold;">👤 პროფილი</button>
            <button onclick="logout()" style="width:100%; padding:12px; background:#000; color:red; border:1px solid #333; border-radius:10px; cursor:pointer; font-weight:bold;">🚪 გასვლა</button>
        </div>
    </div>

    <div id="mainChat">
        <div class="header">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div id="roomTitle" style="color:red; font-weight:bold; font-size: 18px;">ზოგადი ჩატი</div>
            <div style="width:45px;"></div>
        </div>
        <div id="messageList"></div>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="დაწერე მესიჯი...">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let myId = "", myName = "";

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = 'index.html';
            myId = user.id;
            const { data: p } = await supabase.from('profiles').select('username').eq('id', myId).single();
            myName = p ? p.username : "guest";
            loadMsgs();
            supabase.channel('chat').on('postgres_changes', { event: '*', table: 'messages' }, loadMsgs).subscribe();
        }

        async function loadMsgs() {
            const { data: prof } = await supabase.from('profiles').select('role').eq('id', myId).maybeSingle();
            const isAdmin = prof && (prof.role === 'owner' || prof.role === 'admin');
            const { data: msgs } = await supabase.from('messages').select('*').eq('room_name', currentRoom).order('id', { ascending: true });

            const list = document.getElementById('messageList');
            list.innerHTML = msgs ? msgs.map(m => {
                const isAbu = m.username === 'abu007';
                const del = isAdmin ? `<span onclick="deleteMsg(${m.id})" style="cursor:pointer; color:#444; font-size:14px;">🗑️</span>` : '';
                return `
                    <div class="msg-card ${isAbu ? 'msg-owner' : ''}" id="msg-${m.id}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <b onclick="window.location.href='user.html?id=${m.user_id}'" style="cursor:pointer; color:${isAbu ? 'red' : '#999'};">${m.username}</b>
                            ${del}
                        </div>
                        <div style="color:#eee;">${m.text}</div>
                    </div>`;
            }).join('') : '';
            list.scrollTop = list.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const txt = input.value.trim();
            if(!txt) return;
            input.value = '';
            await supabase.from('messages').insert([{ user_id: myId, username: myName, text: txt, room_name: currentRoom }]);
        }

        async function deleteMsg(id) { if(confirm("წავშალოთ?")) await supabase.from('messages').delete().eq('id', id); }

        function changeRoom(name, el) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = name;
            document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(window.innerWidth <= 768) toggleSidebar();
            loadMsgs();
        }

        async function logout() { await supabase.auth.signOut(); window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
