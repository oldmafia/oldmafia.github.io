<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - CLASSIC RED</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #0b0b0b; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #111; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo { font-weight: bold; color: #cc0000; font-size: 18px; text-transform: uppercase; }

        /* ოთახების ზოლი - ზუსტად შენი სურათის სტილში */
        .room-bar { 
            background: #111; padding: 10px; display: flex; gap: 8px; 
            overflow-x: auto; border-bottom: 1px solid #222; 
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .room-bar::-webkit-scrollbar { display: none; }
        
        .room-btn { 
            background: #222; color: #888; border: none; padding: 8px 15px; 
            border-radius: 12px; cursor: pointer; white-space: nowrap; font-size: 13px; transition: 0.2s;
        }
        .room-btn.active { background: #cc0000; color: white; }

        #messageList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #050505; }
        
        /* მესიჯი საათით */
        .msg { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #1a1a1a; width: 100%; }
        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .msg-nick { font-weight: bold; font-size: 14px; cursor: pointer; }
        .msg-time { color: #444; font-size: 10px; }
        .msg-text { color: #ccc; font-size: 15px; word-break: break-word; }

        .input-area { background: #0a0a0a; padding: 12px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #222; color: white; padding: 12px; border-radius: 8px; outline: none; }
        .send-btn { background: #cc0000; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .prof-btn { background: #222; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div class="logo">OLD MAFIA</div>
    <button class="prof-btn" onclick="window.location.href='user.html'">პროფილი 👤</button>
</header>

<div class="room-bar">
    <button class="room-btn active" onclick="switchRoom('ზოგადი ჩატი')">ზოგადი ჩატი</button>
    <button class="room-btn" onclick="switchRoom('ვიპ საუბრები')">ვიპ საუბრები</button>
    <button class="room-btn" onclick="switchRoom('გამოძიება')">გამოძიება</button>
    <button class="room-btn" onclick="switchRoom('შიფროგრამა')">შიფროგრამა</button>
    <button class="room-btn" onclick="switchRoom('ვიქტორეინა')">ვიქტორეინა</button>
    <button class="room-btn" onclick="switchRoom('ჩამოხრჩობანა')">ჩამოხრჩობანა</button>
    <button class="room-btn" onclick="switchRoom('მაფიის ღამე')">მაფიის ღამე</button>
    <button class="room-btn" onclick="switchRoom('ჯოკერი')">ჯოკერი</button>
    <button class="room-btn" onclick="switchRoom('ნარდი')">ნარდი</button>
    <button class="room-btn" onclick="switchRoom('მუსიკა')">მუსიკა</button>
    <button class="room-btn" onclick="switchRoom('იუმორი')">იუმორი</button>
    <button class="room-btn" onclick="switchRoom('ადმინისტრაცია')">ადმინისტრაცია</button>
    <button class="room-btn" onclick="switchRoom('დახმარება')">დახმარება</button>
    <button class="room-btn" onclick="switchRoom('ფორუმი')">ფორუმი</button>
    <button class="room-btn" onclick="logout()" style="color:#ff4444;">გასვლა</button>
</div>

<div id="messageList"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">გაგზავნა</button>
</div>
