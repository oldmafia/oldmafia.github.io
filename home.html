<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - FINAL</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --red: #ff0000; --dark: #000; --panel: #0d0d0d; --blue: #00a2ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--red); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        @media (max-width: 768px) { .sidebar { position: absolute; left: -280px; height: 100%; } .sidebar.open { left: 0; box-shadow: 5px 0 15px rgba(255,0,0,0.5); } }

        .profile-box { padding: 25px; text-align: center; border-bottom: 1px solid #222; }
        .p-avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--red); margin-bottom: 10px; }
        .p-nick { font-weight: bold; color: white; font-size: 1.1rem; }

        .rooms-scroll { flex-grow: 1; overflow-y: auto; padding: 5px 0; }
        .room-btn { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #ccc; border-left: 3px solid transparent; transition: 0.2s; }
        .room-btn:hover { background: rgba(255,0,0,0.05); }
        .room-btn.active { background: rgba(255,0,0,0.2); color: var(--red); border-left-color: var(--red); font-weight: bold; }
        .room-btn i { width: 20px; text-align: center; color: var(--red); }

        /* Chat Area */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #050505; }
        .header { height: 60px; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 20px; background: #0a0a0a; }
        .burger { display: none; font-size: 1.5rem; color: var(--red); margin-right: 15px; cursor: pointer; }
        @media (max-width: 768px) { .burger { display: block; } }

        #msg-list { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        /* მესიჯი მარცხნივ */
        .msg-line { align-self: flex-start; max-width: 85%; display: flex; flex-direction: column; margin-bottom: 5px; }
        .msg-user { color: var(--red); font-size: 0.8rem; font-weight: bold; margin-bottom: 2px; padding-left: 5px; }
        .msg-bubble { background: #151515; padding: 8px 15px; border-radius: 0 15px 15px 15px; border: 1px solid #222; position: relative; }
        .msg-text { color: #eee; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        .msg-time { font-size: 0.65rem; color: #555; margin-top: 4px; align-self: flex-end; }

        /* Input area & SVG Plane */
        .input-zone { padding: 15px; background: #0d0d0d; display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; }
        .input-box { flex-grow: 1; background: #1a1a1a; border-radius: 25px; border: 1px solid #333; padding: 5px 15px; }
        input { width: 100%; background: transparent; border: none; padding: 10px; color: white; outline: none; font-size: 1rem; }
        
        /* ლურჯი თვითმფრინავის ღილაკი (SVG - არასოდეს გაფუჭდება) */
        .send-svg { width: 35px; height: 35px; cursor: pointer; fill: var(--blue); transition: 0.2s; }
        .send-svg:hover { transform: scale(1.1) rotate(-5deg); filter: drop-shadow(0 0 5px var(--blue)); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: none; }
        .overlay.active { display: block; }
    </style>
</head>

        </div>
