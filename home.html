<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #050505; color: white; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { 
            height: 55px; background: #000; border-bottom: 2px solid red;
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0;
            z-index: 1001;
        }
        .btn-m { color: red; font-size: 24px; cursor: pointer; width: 40px; text-align: center; }
        .logo { font-weight: bold; color: red; letter-spacing: 1px; font-size: 14px; text-transform: uppercase; }

        /* Main Wrapper */
        .wrapper { flex: 1; position: relative; display: flex; overflow: hidden; }

        /* Side Panels */
        .panel { 
            position: absolute; top: 0; width: 260px; height: 100%; background: #0a0a0a; 
            z-index: 1000; transition: 0.3s; border: 1px solid #1a1a1a; overflow-y: auto;
        }
        #side-l { left: -260px; border-right: 2px solid red; }
        #side-r { right: -260px; border-left: 2px solid red; }
        .panel.open-l { left: 0; }
        .panel.open-r { right: 0; }

        /* Chat Area */
        #chat-main { flex: 1; display: flex; flex-direction: column; background: #050505; height: 100%; }
        #flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* Messages */
        .m-box { max-width: 85%; }
        .m-n { font-size: 10px; color: #666; font-weight: bold; margin-bottom: 2px; }
        .m-t { padding: 10px 14px; background: #111; border-radius: 0 12px 12px 12px; font-size: 14px; color: #ccc; border: 1px solid #1a1a1a; word-wrap: break-word; }
        .me { align-self: flex-end; }
        .me .m-n { color: red; text-align: right; }
        .me .m-t { background: #1a0505; border-right: 3px solid red; border-radius: 12px 0 12px 12px; color: #fff; }

        /* Items */
        .h-side { padding: 15px; color: red; font-weight: bold; font-size: 12px; border-bottom: 1px solid #1a1a1a; text-transform: uppercase; }
        .room-row { padding: 12px 20px; color: #888; border-bottom: 1px solid #0d0d0d; cursor: pointer; font-size: 14px; }
        .active-r { background: #1a0505; color: red; font-weight: bold; }

        /* Input Area */
        .input-box { height: 65px; background: #000; border-top: 1px solid #1a1a1a; display: flex; padding: 10px; gap: 10px; flex-shrink: 0; }
        #msg-input { flex: 1; background: #0d0d0d; border: 1px solid #222; border-radius: 20px; color: white; padding: 0 15px; outline: none; }
        .send-btn { background: red; border: none; width: 45px; border-radius: 50%; color: white; font-weight: bold; cursor: pointer; }

        /* Dark Overlay */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeAll()"></div>

    <header>
        <div class="btn-m" onclick="toggleP('side-l')">☰</div>
        <div class="logo" id="r-title">ზოგადი ჩატი</div>
        <div class="btn-m" onclick="toggleP('side-r')">👥</div>
    </header>

    <div class="wrapper">
        <div id="side-l" class="panel">
            <div class="h-side">ოთახები</div>
