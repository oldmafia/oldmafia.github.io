<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - PRO CHAT</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .header { height: 60px; border-bottom: 2px solid red; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; z-index: 1001; }
        .burger { color: red; font-size: 26px; cursor: pointer; }
        #roomTitle { font-size: 14px; font-weight: bold; text-transform: uppercase; color: #fff; }

        /* Sidebar */
        #sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: #000; transition: 0.3s; z-index: 2000; border-right: 2px solid red; overflow-y: auto; }
        #sidebar.open { left: 0; }
        .prof-section { padding: 30px 20px; text-align: center; border-bottom: 1px solid #222; }
        .prof-pic { width: 80px; height: 80px; border-radius: 50%; border: 2px solid red; margin-bottom: 10px; box-shadow: 0 0 10px red; }
        .room-item { padding: 15px 25px; border-bottom: 1px solid #111; color: #bbb; cursor: pointer; }
        .room-item.active { color: #fff; font-weight: bold; border-left: 5px solid red; background: #1a0000; }

        /* Chat Area */
        #msgList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        
        /* SMS Bubbles */
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.other { justify-content: flex-start; }

        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; position: relative; font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        /* შენი ფერადი სმს */
        .me .bubble { background: #ff0000; color: #fff; border-bottom-right-radius: 2px; }
        /* სხვისი სმს */
        .other .bubble { background: #222; color: #fff; border-bottom-left-radius: 2px; border: 1px solid #333; }

        .u-nick { font-size: 11px; font-weight: bold; display: block; margin-bottom: 4px; color: #ffcccc; }
        .other .u-nick { color: red; }
        
        .m-time { font-size: 9px; opacity: 0.6; display: block; text-align: right; margin-top: 4px; }

        /* Input Area */
        .input-area { padding: 12px; border-top: 1px solid red; display: flex; gap: 10px; background: #000; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid red; border-radius: 25px; padding: 0 15px; height: 48px; display: flex; align-items: center; }
        input { width: 100%; border: none; background: transparent; color: #fff; outline: none; font-size: 16px; }
        .send-btn { background: red; color: #000; width: 48px; height: 48px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="header">
        <div class="burger" onclick="toggleMenu()">☰</div>
        <div id="roomTitle">💬 კაიფმანია</div>
        <div style="width:26px;"></div>
    </div>

    <div id="sidebar">
        <div class="prof-section">
            <img src="" class="prof-pic" id="myImg">
            <p id="myNick" style="font-weight:bold; color: #fff;"></p>
        </div>
        <div id="roomsContainer">
            <div class="room-item active" onclick="changeRoom('💬 კაიფმანია', this)">💬 კაიფმანია</div>
            <div class="room-item" onclick="changeRoom('🍷 კაფე-ბარი', this)">🍷 კაფე-ბარი</div>
            <div class="room-item" onclick="changeRoom('🔐 VIP-საუბრები', this)">🔐 VIP-საუბრები</div>
            <div class="room-item" onclick="changeRoom('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="room-item" onclick="changeRoom('🔓 შიფროგრამა', this)">🔓 შიფროგრამა</div>
            <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
            <div class="room-item" onclick="changeRoom('⚜️ ნარდი', this)">⚜️ ნარდი</div>
            <div class="room-item" onclick="changeRoom('💖 სიყვარული', this)">💖 სიყვარული</div>
            <div class="room-item" onclick="changeRoom('🤣 იუმორი', this)">🤣 იუმორი</div>
            <div class="room-item" onclick="changeRoom('🎵 მელომანია', this)">🎵 მელომანია</div>
            <div class="room-item" onclick="changeRoom('📜 ფორუმი', this)">📜 ფორუმი</div>
            <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
            <div class="room-item" onclick="changeRoom('🆘 SOS', this)">🆘 SOS</div>
            <div class="room-item" onclick="logout()" style="color:red; margin-top:20px; font-weight:bold;">🚪 გასვლა</div>
        </div>
    </div>

    <div id="msgList"></div>

    <div class="input-area">
        <div class="input-box"><input type="text" id="msgInput" placeholder="დაწერე რამე..." autocomplete="off"></div>
        <button class="send-btn" onclick="sendMsg()">✈️</button>
    </div>

<script>
    const client = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myId, myName, currentRoom = '💬 კაიფმანია';

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;

        let raw = user.user_metadata?.username || user.email.split('@')[0];
        myName = raw.split('@')[0];

        document.getElementById('myNick').innerText = myName;
        document.getElementById('myImg').src = `https://ui-avatars.com/api/?name=${myName}&background=000&color=f00`;

        loadMsgs();

        // Realtime - სხვისი მესიჯების მომენტალურად მისაღებად
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (p) => {
            if(p.new.room_name === currentRoom && p.new.user_id !== myId) {
                appendMsg(p.new);
            }
        }).subscribe();
    }

    async function loadMsgs() {
        const list = document.getElementById('msgList');
        list.innerHTML = "";
        const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        if(msgs) msgs.forEach(m => appendMsg(m));
        list.scrollTop = list.scrollHeight;
    }

    function appendMsg(m) {
        const list = document.getElementById('msgList');
        const isMe = m.user_id === myId;
        
        // დროის გამოჩენა
        const time = new Date(m.created_at || new Date()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        // ნიკის გასუფთავება
        let nick = m.username || "სტუმარი";
        if(nick.includes('@')) nick = nick.split('@')[0];

        const div = document.createElement('div');
        div.className = `msg-row ${isMe ? 'me' : 'other'}`;
        div.innerHTML = `
            <div class="bubble">
                <span class="u-nick">${isMe ? 'შენ' : nick}</span>
                <span>${m.text}</span>
                <span class="m-time">${time}</span>
            </div>`;
        
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInput');
        const val = inp.value.trim();
        if(!val) return;
        inp.value = "";

        // 1. ეგრევე ვხატავთ ეკრანზე (დარეფრეშება არ უნდა)
        appendMsg({ user_id: myId, username: myName, text: val, created_at: new Date().toISOString() });

        // 2. ვაგზავნით ბაზაში
        await client.from('messages').insert([{ 
            user_id: myId, username: myName, text: val, room_name: currentRoom 
        }]);
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function changeRoom(n, el) { 
        currentRoom = n; 
        document.getElementById('roomTitle').innerText = n; 
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        toggleMenu(); 
        loadMsgs(); 
    }
    async function logout() { await client.auth.signOut(); window.location.href = 'index.html'; }
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

    init();
</script>
</body>
</html>
