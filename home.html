<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>კაიფმანია 🕶️</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #cc0000; --dark-bg: #0b0b0b; --panel-bg: #161616; --text-gray: #999; }
        * { box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { margin: 0; height: 100vh; display: flex; background: var(--dark-bg); color: #ddd; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 280px; min-width: 280px; background: #000; border-right: 1px solid #222; display: flex; flex-direction: column; overflow-y: auto; transition: 0.3s; }
        .sidebar-header { padding: 25px; font-size: 20px; font-weight: bold; text-align: center; color: var(--main-red); letter-spacing: 1px; }
        .menu-item { padding: 12px 20px; margin: 2px 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-gray); font-size: 14px; transition: 0.2s; }
        .menu-item:hover { background: #111; color: #fff; }
        .menu-item.active { background: #1a1a1a; color: var(--main-red); font-weight: bold; border-left: 3px solid var(--main-red); }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; top: 0; height: 100%; z-index: 1000; }
            .sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; background: var(--dark-bg); }
        .top-nav { height: 60px; background: #000; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .menu-btn { font-size: 22px; background: none; border: none; color: var(--main-red); cursor: pointer; display: none; }
        @media (max-width: 768px) { .menu-btn { display: block; } }

        .user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px 10px; border-radius: 20px; }
        .nav-avatar { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #333; object-fit: cover; }

        #messageList { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-box { background: var(--panel-bg); padding: 12px 16px; border-radius: 15px; border: 1px solid #222; max-width: 85%; align-self: flex-start; }
        .msg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .msg-avatar { width: 30px; height: 30px; border-radius: 50%; }
        .username { color: var(--main-red); font-weight: bold; font-size: 13px; }
        
        .del-btn { color: #444; font-size: 16px; background: none; border: none; margin-left: auto; cursor: pointer; transition: 0.2s; }
        .del-btn:hover { color: #ff4444; transform: scale(1.2); }

        .msg-text { font-size: 15px; color: #eee; line-height: 1.4; word-break: break-word; }

        .input-area { padding: 20px; background: #000; border-top: 1px solid #222; display: flex; gap: 12px; }
        input { flex-grow: 1; padding: 14px 20px; background: #111; border: 1px solid #333; color: #fff; border-radius: 25px; outline: none; }
        .send-btn { background: var(--main-red); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">კაიფმანია 🕶️</div>
        <div id="roomItems">
            <div class="menu-item active" onclick="changeRoom('ზოგადი ჩატი', '💬')">💬 ზოგადი ჩატი</div>
            <div class="menu-item" onclick="changeRoom('ვიპ საუბრები', '💎')">💎 ვიპ საუბრები</div>
            <div class="menu-item" onclick="changeRoom('გამოძიება', '🔍')">🔍 გამოძიება</div>
            <div class="menu-item" onclick="changeRoom('შიფროგრამა', '🔐')">🔐 შიფროგრამა</div>
            <div class="menu-item" onclick="changeRoom('ვიქტორინა', '🧠')">🧠 ვიქტორინა</div>
            <div class="menu-item" onclick="changeRoom('ჩამოხრჩობანა', '💀')">💀 ჩამოხრჩობანა</div>
            <div class="menu-item" onclick="changeRoom('მაფიის ღამე', '🕵️‍♂️')">🕵️‍♂️ მაფიის ღამე</div>
            <div class="menu-item" onclick="changeRoom('ჯოკერი', '🃏')">🃏 ჯოკერი</div>
            <div class="menu-item" onclick="changeRoom('ნარდი', '🎲')">🎲 ნარდი</div>
            <div class="menu-item" onclick="changeRoom('მუსიკა', '🎵')">🎵 მუსიკა</div>
            <div class="menu-item" onclick="changeRoom('იუმორი', '😂')">😂 იუმორი</div>
            <div class="menu-item" style="color: gold;" onclick="changeRoom('ადმინისტრაცია', '🛡️')">🛡️ ადმინისტრაცია</div>
            <div class="menu-item" onclick="changeRoom('დახმარება', '🆘')">🆘 დახმარება</div>
            <div class="menu-item" onclick="changeRoom('ფორუმი', '🏛️')">🏛️ ფორუმი</div>
            <div class="menu-item" style="color: #ff4444;" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div id="roomTitle" style="font-weight:bold;">💬 ზოგადი ჩატი</div>
            <div class="user-info" id="profileBtn">
                <img id="navAvatar" class="nav-avatar" src="">
                <div id="userDisplay" style="color:var(--main-red); font-weight:bold;">...</div>
            </div>
        </div>
        <div id="messageList"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">✈️</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let myData = { id: '', nick: '', avatar: '', role: 'user' };

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = "index.html";

            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
            myData.id = user.id;
            myData.role = (user.email === 'to222ji@gmail.com') ? 'owner' : (profile?.role || 'user');
            myData.nick = (myData.role === 'owner') ? 'abu007' : (profile?.username || 'Guest');
            myData.avatar = profile?.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${myData.nick}`;

            document.getElementById('userDisplay').innerHTML = (myData.role === 'owner') ? `👑 ${myData.nick}` : myData.nick;
            document.getElementById('navAvatar').src = myData.avatar;
            document.getElementById('profileBtn').onclick = () => window.location.href = `user.html?id=${myData.id}`;

            loadMsgs();
            supabaseClient.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMsgs()).subscribe();
        }

        async function loadMsgs() {
            const { data: msgs } = await supabaseClient.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
            const list = document.getElementById('messageList');
            list.innerHTML = '';

            msgs?.forEach(msg => {
                const isOwner = (msg.username === 'abu007');
                const canDel = (myData.role === 'owner');
                const ava = msg.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${msg.username}`;

                const div = document.createElement('div');
                div.className = 'msg-box';
                div.innerHTML = `
                    <div class="msg-header">
                        <img src="${ava}" class="msg-avatar">
                        <span class="username" onclick="window.location.href='user.html?id=${msg.user_id}'">${isOwner ? '👑' : ''} ${msg.username}</span>
                        ${canDel ? `<button class="del-btn" onclick="deleteMessage(${msg.id})">✖</button>` : ''}
                    </div>
                    <div class="msg-text">${msg.text}</div>
                `;
                list.appendChild(div);
            });
            list.scrollTop = list.scrollHeight;
        }

        async function deleteMessage(id) {
            await supabaseClient.from('messages').delete().eq('id', id);
            loadMsgs();
        }

        async function send() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            await supabaseClient.from('messages').insert([{ username: myData.nick, text: input.value, room_name: currentRoom, user_id: myData.id, avatar_url: myData.avatar }]);
            input.value = '';
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        function changeRoom(name, icon) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = `${icon} ${name}`;
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if(window.innerWidth <= 768) toggleMenu();
            loadMsgs();
        }

        async function logout() { await supabaseClient.auth.signOut(); window.location.href = "index.html"; }
        init();
    </script>
</body>
</html>
