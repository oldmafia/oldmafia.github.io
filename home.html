<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>კაიფმანია 🕶️</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #cc0000; --dark-bg: #0b0b0b; --panel-bg: #161616; --text-gray: #999; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; height: 100vh; display: flex; background: var(--dark-bg); color: #ddd; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 280px; min-width: 280px; background: #000; border-right: 1px solid #222; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-header { padding: 25px; font-size: 20px; font-weight: bold; text-align: center; color: var(--main-red); }
        .menu-item { padding: 12px 20px; margin: 2px 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-gray); font-size: 14px; transition: 0.2s; }
        .menu-item:hover { background: #111; color: white; }
        .menu-item.active { background: #1a1a1a; color: var(--main-red); font-weight: bold; border-left: 3px solid var(--main-red); }

        /* Main Content Styles */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; background: var(--dark-bg); }
        .top-nav { height: 60px; background: #000; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        
        .user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px 10px; border-radius: 20px; }
        .nav-avatar { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #333; object-fit: cover; }

        #messageList { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-box { background: var(--panel-bg); padding: 12px 16px; border-radius: 15px; border: 1px solid #222; max-width: 85%; align-self: flex-start; }
        .msg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .msg-avatar { width: 30px; height: 30px; border-radius: 50%; }
        .username { font-weight: bold; font-size: 13px; cursor: pointer; }

        .input-area { padding: 20px; background: #000; border-top: 1px solid #222; display: flex; gap: 12px; }
        input { flex-grow: 1; padding: 14px 20px; background: #111; border: 1px solid #333; color: #fff; border-radius: 25px; outline: none; }
        .send-btn { background: var(--main-red); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">კაიფმანია 🕶️</div>
        <div id="roomItems">
            <div class="menu-item active" onclick="changeRoom('ზოგადი ჩატი', '💬', this)">💬 ზოგადი ჩატი</div>
            <div class="menu-item" onclick="changeRoom('ვიპ საუბრები', '💎', this)">💎 ვიპ საუბრები</div>
            <div class="menu-item" onclick="changeRoom('გამოძიება', '🔍', this)">🔍 გამოძიება</div>
            <div class="menu-item" onclick="changeRoom('შიფროგრამა', '🔐', this)">🔐 შიფროგრამა</div>
            <div class="menu-item" onclick="changeRoom('ვიქტორინა', '🧠', this)">🧠 ვიქტორინა</div>
            <div class="menu-item" onclick="changeRoom('ჩამოხრჩობანა', '💀', this)">💀 ჩამოხრჩობანა</div>
            <div class="menu-item" onclick="changeRoom('მაფიის ღამე', '🕵️‍♂️', this)">🕵️‍♂️ მაფიის ღამე</div>
            <div class="menu-item" onclick="changeRoom('ჯოკერი', '🃏', this)">🃏 ჯოკერი</div>
            <div class="menu-item" onclick="changeRoom('ნარდი', '🎲', this)">🎲 ნარდი</div>
            <div class="menu-item" onclick="changeRoom('მუსიკა', '🎵', this)">🎵 მუსიკა</div>
            <div class="menu-item" onclick="changeRoom('იუმორი', '😂', this)">😂 იუმორი</div>
            <div class="menu-item" style="color: gold;" onclick="changeRoom('ადმინისტრაცია', '🛡️', this)">🛡️ ადმინისტრაცია</div>
            <div class="menu-item" style="color: #00ccff;" onclick="changeRoom('დახმარება', '🆘', this)">🆘 დახმარება</div>
            <div class="menu-item" onclick="changeRoom('ფორუმი', '🏛️', this)">🏛️ ფორუმი</div>
            <div class="menu-item" style="color: #ff4444;" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <div id="roomTitle" style="font-weight:bold;">💬 ზოგადი ჩატი</div>
            <div class="user-info" onclick="window.location.href='user.html'">
                <img id="navAvatar" class="nav-avatar" src="">
                <div id="userDisplay" style="color:var(--main-red); font-weight:bold;">იტვირთება...</div>
            </div>
        </div>
        <div id="messageList"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">✈️</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let myData = { id: '', nick: '', avatar: '' };

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = "index.html";

            myData.id = user.id;
            myData.nick = user.email.split('@')[0];

            // ვიღებთ პროფილს
            const { data: p } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
            
            if (p) {
                myData.nick = p.username || myData.nick;
                myData.avatar = p.avatar_url;
            }

            document.getElementById('userDisplay').innerText = myData.nick;
            document.getElementById('navAvatar').src = myData.avatar || `https://api.dicebear.com/7.x/identicon/svg?seed=${myData.nick}`;

            loadMsgs();
            
            // მესიჯების მოსმენა
            supabaseClient.channel('chat_realtime')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                    if (payload.new.room_name === currentRoom) loadMsgs();
                }).subscribe();
        }

        async function loadMsgs() {
            const { data: msgs } = await supabaseClient.from('messages')
                .select('*')
                .eq('room_name', currentRoom)
                .order('id', { ascending: true });

            const list = document.getElementById('messageList');
            list.innerHTML = '';

            if (msgs) {
                msgs.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'msg-box';
                    div.innerHTML = `
                        <div class="msg-header">
                            <img src="${msg.avatar_url || 'https://api.dicebear.com/7.x/identicon/svg?seed=' + msg.username}" class="msg-avatar">
                            <span class="username" style="color:var(--main-red)" onclick="window.location.href='user.html?id=${msg.user_id}'">
                                ${msg.username}
                            </span>
                        </div>
                        <div class="msg-text">${msg.text}</div>
                    `;
                    list.appendChild(div);
                });
            }
            list.scrollTop = list.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msgInput');
            const val = input.value.trim();
            if (!val) return;

            const { error } = await supabaseClient.from('messages').insert([{
                user_id: myData.id,
                username: myData.nick,
                text: val,
                room_name: currentRoom,
                avatar_url: myData.avatar
            }]);

            if (error) alert("შეცდომა გაგზავნისას: " + error.message);
            input.value = '';
        }

        function changeRoom(name, icon, el) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = `${icon} ${name}`;
            
            // აქტიური ოთახის მონიშვნა
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            loadMsgs();
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        init();
    </script>
</body>
</html>
