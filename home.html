<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafia Rooms - Full</title>
    <style>
        /* --- ძირითადი სტილები --- */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            background-color: #000; color: #fff; overflow: hidden;
        }

        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* მობილური Overlay */
        .sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            z-index: 99;
        }

        /* --- სიდბარი (მენიუ) --- */
        .sidebar {
            width: 280px; min-width: 280px; background-color: #0d0d0d;
            border-right: 2px solid #ff0000; display: flex; flex-direction: column;
            transition: transform 0.3s ease; z-index: 100;
        }

        .sidebar-header {
            padding: 25px 20px; text-align: center;
            border-bottom: 1px solid #222; background: linear-gradient(to bottom, #1a0000, #0d0d0d);
        }

        .sidebar-title {
            color: #ff0000; font-size: 20px; margin: 0;
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }

        /* ოთახების სია */
        .sidebar-menu { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        
        /* სქროლის სტილი */
        .sidebar-menu::-webkit-scrollbar { width: 4px; }
        .sidebar-menu::-webkit-scrollbar-thumb { background: #ff0000; }

        .menu-item {
            display: flex; align-items: center; padding: 14px 20px;
            color: #ddd; text-decoration: none; font-size: 15px;
            border-bottom: 1px solid #1a1a1a; transition: 0.2s;
        }

        .menu-item:hover { background: #1a0000; color: #ff0000; padding-left: 30px; }
        .icon { margin-right: 15px; font-size: 18px; width: 25px; text-align: center; }

        /* სპეციალური სტილი "მაფიის ღამისთვის" */
        .special-item { background: rgba(255, 0, 0, 0.05); font-weight: bold; color: #ff0000 !important; }

        /* ფუტერი (გასვლა) */
        .sidebar-footer { border-top: 1px solid #333; background-color: #050505; }
        .logout-btn {
            display: flex; align-items: center; padding: 18px 20px;
            color: #ff4444; text-decoration: none; font-weight: bold; cursor: pointer;
        }
        .logout-btn:hover { background: #220000; }

        /* --- ჩატის მხარე --- */
        .main-chat { flex-grow: 1; display: flex; flex-direction: column; background-color: #000; }

        .chat-header {
            height: 65px; border-bottom: 2px solid #ff0000;
            display: flex; align-items: center; padding: 0 20px; background-color: #0d0d0d;
        }

        .menu-toggle {
            display: none; background: #ff0000; border: none; color: white;
            padding: 10px 15px; border-radius: 4px; cursor: pointer; margin-right: 15px;
            font-size: 18px;
        }

        .chat-header h2 { font-size: 18px; color: #ff0000; margin: 0; text-transform: uppercase; display: flex; align-items: center; }

        /* ჩატის კონტენტი */
        .chat-area {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
            text-align: center; color: #444;
        }

        /* --- მობილური ადაპტაცია --- */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar {
                position: fixed; left: 0; top: 0; height: 100%;
                transform: translateX(-100%);
            }
            .sidebar.active { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">MAFIA ROOMS</h2>
        </div>

        <div class="sidebar-menu">
            <a href="#" class="menu-item" onclick="openRoom('💬', 'ზოგადი ჩატი')"><span class="icon">💬</span> ზოგადი ჩატი</a>
            <a href="#" class="menu-item" onclick="openRoom('💎', 'VIP საუბრები')"><span class="icon">💎</span> VIP საუბრები</a>
            <a href="#" class="menu-item" onclick="openRoom('🔍', 'გამოძიება')"><span class="icon">🔍</span> გამოძიება</a>
            <a href="#" class="menu-item" onclick="openRoom('🔐', 'შიფროგრამა')"><span class="icon">🔐</span> შიფროგრამა</a>
            <a href="#" class="menu-item" onclick="openRoom('🧩', 'ვიქტორინა')"><span class="icon">🧩</span> ვიქტორინა</a>
            <a href="#" class="menu-item" onclick="openRoom('🪢', 'ჩამოხრჩობანა')"><span class="icon">🪢</span> ჩამოხრჩობანა</a>
            <a href="#" class="menu-item special-item" onclick="openRoom('🌑', 'მაფიის ღამე')"><span class="icon">🌑</span> მაფიის ღამე</a>
            <a href="#" class="menu-item" onclick="openRoom('🎵', 'მუსიკა')"><span class="icon">🎵</span> მუსიკა</a>
            <a href="#" class="menu-item" onclick="openRoom('🖼️', 'გალერეა')"><span class="icon">🖼️</span> გალერეა</a>
            <a href="#" class="menu-item" onclick="openRoom('📝', 'ფორუმი')"><span class="icon">📝</span> ფორუმი</a>
            <a href="#" class="menu-item" onclick="openRoom('🛡️', 'ადმინისტრაცია')"><span class="icon">🛡️</span> ადმინისტრაცია</a>
        </div>

        <div class="sidebar-footer">
            <a href="index.html" class="logout-btn"><span class="icon">🚪</span> გასვლა</a>
        </div>
    </nav>

    <main class="main-chat">
        <header class="chat-header">
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            <h2 id="room-title">აირჩიე ოთახი</h2>
        </header>
        
        <div class="chat-area" id="chat-content">
            <p style="font-size: 20px;">მოგესალმებით!</p>
            <p>გთხოვთ, აირჩიოთ სასურველი ოთახი მენიუდან საუბრის დასაწყებად.</p>
        </div>
    </main>
</div>

<script>
    // მენიუს გახსნა/დაკეტვა მობილურზე
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    // ოთახის შეცვლა
    function openRoom(icon, name) {
        // სათაურის განახლება
        document.getElementById('room-title').innerHTML = `<span style="margin-right:10px">${icon}</span> ${name}`;
        
        // კონტენტის განახლება (აქ ჩაჯდება მერე Supabase-ის მესიჯები)
        document.getElementById('chat-content').innerHTML = `
            <p style="color: #ff0000; font-weight: bold;">[ ${name} ]</p>
            <p style="color: #666;">შეტყობინებები ჯერ არ არის...</p>
        `;

        // თუ მობილურზეა, მენიუ დავკეტოთ არჩევის მერე
        if (window.innerWidth <= 768) {
            toggleMenu();
        }
    }
</script>

</body>
</html>
