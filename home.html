<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>MAFIA ROOMS</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; background: #000; color: white; font-family: sans-serif; }
        .sidebar { width: 250px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar h2 { color: #f00; padding: 20px; text-align: center; font-size: 18px; text-transform: uppercase; }
        .room-btn { 
            padding: 15px 20px; background: none; border: none; color: #ccc; 
            text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .room-btn:hover { background: #111; color: white; }
        .active { color: #f00; font-weight: bold; background: #111; border-left: 3px solid #f00; }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        header { padding: 15px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        #room-title { color: #f00; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 10px; font-size: 14px; }
        .founder-txt { color: gold; font-weight: bold; }
        .input-area { padding: 15px; background: #050505; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; background: #111; border: 1px solid #222; color: white; border-radius: 20px; }
        button#send { background: #f00; border: none; padding: 10px 20px; color: white; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>MAFIA ROOMS</h2>
    <button class="room-btn active" onclick="setRoom('ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</button>
    <button class="room-btn" onclick="setRoom('VIP საუბრები', this)">💎 VIP საუბრები</button>
    <button class="room-btn" onclick="setRoom('გამოძიება', this)">🔍 გამოძიება</button>
    <button class="room-btn" onclick="setRoom('შიფროგრამა', this)">🔒 შიფროგრამა</button>
    <button class="room-btn" onclick="setRoom('ვიქტორინა', this)">🧩 ვიქტორინა</button>
    <button class="room-btn" onclick="setRoom('ჩამომხრჩობანა', this)">🪢 ჩამომხრჩობანა</button>
    <button class="room-btn" onclick="setRoom('მუსიკა', this)">🎵 მუსიკა</button>
    <button class="room-btn" onclick="setRoom('გალერეა', this)">🖼️ გალერეა</button>
    <button class="room-btn" onclick="setRoom('ფორუმი', this)">📝 ფორუმი</button>
    <button class="room-btn" onclick="setRoom('ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</button>
</div>

<div class="chat-main">
    <header>
        <div id="room-title">💬 ზოგადი ჩატი</div>
        <div id="status" style="font-size: 12px; color: #555;">tojina</div>
    </header>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="msgIn" placeholder="დაწერე მესიჯი...">
        <button id="send" onclick="send()">➤</button>
    </div>
</div>

<script>
    const supabaseClient = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co",
        "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
    );

    let curRoom = 'ზოგადი ჩატი';
    let profile = null;

    async function init() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return;
        
        const { data: p } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
        profile = p;
        document.getElementById('status').innerText = profile.username;
        load();
    }

    async function load() {
        const { data } = await supabaseClient.from('messages').select('*').eq('room', curRoom).order('inserted_at');
        const box = document.getElementById('messages');
        box.innerHTML = '';
        if (data) data.forEach(m => addMsg(m));
    }

    async function send() {
        const input = document.getElementById('msgIn');
        if (!input.value) return;
        await supabaseClient.from('messages').insert([{
            content: input.value,
            user_email: profile.username,
            room: curRoom
        }]);
        input.value = '';
    }

    function addMsg(m) {
        const box = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'msg';
        const isF = m.user_email === 'tojina';
        div.innerHTML = `<span class="${isF ? 'founder-txt' : ''}">${m.user_email}:</span> ${m.content}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function setRoom(name, btn) {
        curRoom = name;
        document.getElementById('room-title').innerText = name;
        document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        load();
    }

    supabaseClient.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
        if (p.new.room === curRoom) addMsg(p.new);
    }).subscribe();

    init();
</script>
</body>
</html>
