<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - FIXED</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #161616; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .room-bar { background: #1a1a1a; padding: 10px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #222; scrollbar-width: none; }
        .room-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .room-btn.active { background: #cc0000; }
        #messageList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #161616; padding: 10px; border-radius: 10px; border: 1px solid #222; }
        .input-area { background: #161616; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; }
        .send-btn { background: #cc0000; color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; color:#cc0000; font-size: 20px;">OLD MAFIA</div>
    <button onclick="window.location.href='user.html'" style="color:white; background:#333; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">პროფილი 👤</button>
</header>

<div class="room-bar">
    <button class="room-btn active" onclick="switchRoom('ზოგადი ჩატი')">ზოგადი ჩატი</button>
    <button class="room-btn" onclick="switchRoom('ვიპ საუბრები')">ვიპ საუბრები</button>
    <button class="room-btn" onclick="switchRoom('გამოძიება')">გამოძიება</button>
    <button class="room-btn" onclick="switchRoom('შიფროგრამა')">შიფროგრამა</button>
    <button class="room-btn" onclick="switchRoom('ვიქტორეინა')">ვიქტორეინა</button>
    <button class="room-btn" onclick="switchRoom('ჩამოხრჩობანა')">ჩამოხრჩობანა</button>
    <button class="room-btn" onclick="switchRoom('მაფიის ღამე')">მაფიის ღამე</button>
    <button class="room-btn" onclick="switchRoom('ჯოკერი')">ჯოკერი</button>
    <button class="room-btn" onclick="switchRoom('ნარდი')">ნარდი</button>
    <button class="room-btn" onclick="switchRoom('მუსიკა')">მუსიკა</button>
    <button class="room-btn" onclick="switchRoom('იუმორი')">იუმორი</button>
    <button class="room-btn" onclick="switchRoom('ადმინისტრაცია')">ადმინისტრაცია</button>
    <button class="room-btn" onclick="switchRoom('დახმარება')">დახმარება</button>
    <button class="room-btn" onclick="switchRoom('ფორუმი')">ფორუმი</button>
    <button class="room-btn" onclick="location.href='index.html'" style="background:#442222; color:#ff4444;">გასვლა</button>
</div>

<div id="messageList"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">გაგზავნა</button>
</div>

<script>
    // ⚠️ შენი მონაცემები (არ შეცვალო თუ მუშაობს)
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co"; 
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    let currentRoom = 'ზოგადი ჩატი';
    let myUser = null;

    async function init() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return window.location.href = 'index.html';
        
        const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
        myUser = { id: user.id, username: profile?.username || 'Guest' };
        
        loadMsgs();
        
        // რეალურ დროში მოსმენა
        supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => {
            loadMsgs();
        }).subscribe();
    }

    async function loadMsgs() {
        const { data: msgs, error } = await supabaseClient.from('messages')
            .select('*')
            .eq('room_name', currentRoom)
            .order('id', { ascending: true });
        
        if (error) {
            console.error("ბაზის შეცდომა:", error);
            return;
        }

        const list = document.getElementById('messageList');
        list.innerHTML = msgs ? msgs.map(m => `
            <div class="msg">
                <b style="color:${m.username === 'abu007' ? 'red' : '#00ccff'}; cursor:pointer;" 
                   onclick="window.location.href='user.html?id=${m.user_id}'">${m.username}</b>: 
                <span>${m.text}</span>
            </div>
        `).join('') : '';
        list.scrollTop = list.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !myUser) return;
        
        const { error } = await supabaseClient.from('messages').insert([{ 
            user_id: myUser.id, 
            username: myUser.username, 
            text: text, 
            room_name: currentRoom 
        }]);
        
        if (error) alert("ვერ გაიგზავნა: " + error.message);
        input.value = '';
    }

    function switchRoom(name) {
        currentRoom = name;
        document.querySelectorAll('.room-btn').forEach(b => b.classList.toggle('active', b.innerText === name));
        loadMsgs();
    }

    init();
</script>
</body>
</html>
