<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OLD MAFIA - FIXED</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #111; padding: 12px; border-radius: 0 15px 15px 15px; border: 1px solid #222; align-self: flex-start; max-width: 80%; border-left: 3px solid red; }
        .u { color: red; font-weight: bold; font-size: 12px; display: block; margin-bottom: 5px; }
        .inp-zone { padding: 15px; background: #000; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; outline: none; }
        button { background: red; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat">იტვირთება...</div>
    <div class="inp-zone">
        <input type="text" id="t" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">➤</button>
    </div>
<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const nick = localStorage.getItem('username') || 'მაფიოზი';

    async function load() {
        const { data } = await sb.from('messages').select('*').order('created_at', { ascending: false }).limit(50);
        const div = document.getElementById('chat');
        if (data) {
            div.innerHTML = data.reverse().map(m => `
                <div class="msg"><span class="u">${m.nickname}</span><span>${m.message}</span></div>
            `).join('');
            div.scrollTop = div.scrollHeight;
        }
    }
    async function send() {
        const i = document.getElementById('t');
        if(!i.value.trim()) return;
        await sb.from('messages').insert([{ nickname: nick, message: i.value }]);
        i.value = ""; load();
    }
    setInterval(load, 2500);
    load();
</script>
</body>
</html>
