<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - Full Original</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff4d4d; --dark: #050505; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #111; padding: 15px; border-bottom: 2px solid var(--red); text-align: center; cursor: pointer; z-index: 100; }
        
        /* მენიუ ყველა ოთახით */
        #menu { 
            display: none; background: #0c0c0c; padding: 15px; 
            grid-template-columns: 1fr 1fr; gap: 10px; 
            border-bottom: 2px solid var(--red); 
            max-height: 80vh; overflow-y: auto;
        }
        .room-btn { 
            background: #1a1a1a; padding: 12px; text-align: left; 
            border-radius: 8px; font-size: 13px; border: 1px solid #333; 
            color: #ccc; display: flex; align-items: center; gap: 8px;
        }
        .room-btn:active { background: var(--red); color: white; }

        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 15px; background: #1a1a1a; max-width: 85%; align-self: flex-start; }
        .msg.me { align-self: flex-end; background: var(--red); }

        .input-bar { padding: 15px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #151515; color: white; outline: none; }
    </style>
</head>
<body>

    <header onclick="toggleMenu()">
        <b id="roomName">💬 ზოგადი ჩატი ▾</b>
    </header>

    <div id="menu">
        <div class="room-btn" onclick="setRoom('💬 ზოგადი ჩატი')">💬 ზოგადი ჩატი</div>
        <div class="room-btn" onclick="setRoom('💎 VIP საუბრები')">💎 VIP საუბრები</div>
        <div class="room-btn" onclick="setRoom('🔍 გამოძიება')">🔍 გამოძიება</div>
        <div class="room-btn" onclick="setRoom('🔐 შიფროგრამა')">🔐 შიფროგრამა</div>
        <div class="room-btn" onclick="setRoom('🧩 ვიქტორინა')">🧩 ვიქტორინა</div>
        <div class="room-btn" onclick="setRoom('⛓️ ჩამოხრჩობანა')">⛓️ ჩამოხრჩობანა</div>
        <div class="room-btn" onclick="setRoom('🌑 მაფიის ღამე')">🌑 მაფიის ღამე</div>
        <div class="room-btn" onclick="setRoom('🎵 მუსიკა')">🎵 მუსიკა</div>
        <div class="room-btn" onclick="setRoom('😂 იუმორი')">😂 იუმორი</div>
        <div class="room-btn" onclick="setRoom('🎲 ნარდი')">🎲 ნარდი</div>
        <div class="room-btn" onclick="setRoom('🃏 ჯოკერი')">🃏 ჯოკერი</div>
        <div class="room-btn" onclick="setRoom('🛡️ ადმინისტრაცია')">🛡️ ადმინისტრაცია</div>
        
        <div class="room-btn" onclick="alert('დახმარებისთვის მოგვწერეთ ადმინებს')" style="color: #4da6ff;">❓ დახმარება</div>
        <div class="room-btn" onclick="logout()" style="color: #ff4d4d;">🚪 გასვლა</div>
    </div>

    <div id="chatBox"></div>

    <div class="input-bar">
        <input type="text" id="mIn" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="background:var(--red); border:none; color:white; width:45px; height:45px; border-radius:50%;">➤</button>
    </div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let room = '💬 ზოგადი ჩატი', myNick = '...';

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(user) myNick = user.email.split('@')[0];
        load();
        sb.channel('chat').on('postgres_changes',{event:'*',schema:'public',table:'messages'},()=>load()).subscribe();
    }

    async function load() {
        const { data } = await sb.from('messages').select('*').eq('room', room).order('created_at', { ascending: true });
        const box = document.getElementById('chatBox');
        box.innerHTML = (data || []).map(m => `
            <div class="msg">
                <small style="color:gold; font-size:10px">${m.username}</small><br>${m.text}
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('mIn'); if(!i.value.trim()) return;
        const { data: { user } } = await sb.auth.getUser();
        await sb.from('messages').insert([{ 
            text: i.value, room: room, username: myNick, user_id: user?.id 
        }]);
        i.value = "";
    }

    function toggleMenu() {
        const m = document.getElementById('menu');
        m.style.display = m.style.display === 'grid' ? 'none' : 'grid';
    }

    function setRoom(n) {
        room = n;
        document.getElementById('roomName').innerText = n + ' ▾';
        toggleMenu();
        load();
    }

    init();
</script>
</body>
</html>
