<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია 🕶️</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-red: #ff0000; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; height: 100vh; display: flex; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* გვერდითა მენიუ */
        .sidebar { width: 280px; min-width: 280px; background: #000; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; transition: 0.3s ease; z-index: 1000; }
        .sidebar-header { padding: 25px; font-size: 24px; font-weight: bold; text-align: center; color: var(--neon-red); border-bottom: 1px solid #1a1a1a; }
        
        .menu-items { flex-grow: 1; overflow-y: auto; padding: 10px; scrollbar-width: thin; scrollbar-color: #222 transparent; }
        .menu-item { padding: 12px 18px; margin: 4px 0; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #888; transition: 0.3s; font-size: 14px; }
        .menu-item:hover { background: rgba(255, 0, 0, 0.05); color: #fff; transform: translateX(5px); }
        .menu-item.active { background: rgba(255, 0, 0, 0.1); color: #fff; border-left: 3px solid var(--neon-red); }

        /* მობილურის ადაპტაცია */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; }
            .sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.7); }
        }

        /* მთავარი კონტენტი */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        .top-nav { height: 65px; background: rgba(10, 10, 10, 0.9); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #1a1a1a; backdrop-filter: blur(10px); }
        
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .menu-toggle { display: none; background: none; border: 1px solid #333; color: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }

        #messageList { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-container { display: flex; gap: 12px; max-width: 90%; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .username { color: var(--neon-red); font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .timestamp { color: #444; font-size: 10px; font-weight: normal; }
        .msg-bubble { background: #0d0d0d; padding: 12px 16px; border-radius: 0 18px 18px 18px; border: 1px solid #1a1a1a; margin-top: 5px; font-size: 14px; line-height: 1.5; color: #ddd; }
        
        .delete-btn { color: #ff4444; font-size: 11px; cursor: pointer; margin-left: 10px; font-weight: bold; visibility: hidden; }
        .msg-container:hover .delete-btn { visibility: visible; }

        /* წერის ზოლი */
        .input-area { padding: 20px; background: #080808; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        input { flex-grow: 1; padding: 14px; background: #111; border: 1px solid #222; color: white; border-radius: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon-red); }
        .send-btn { background: var(--neon-red); color: white; border: none; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">კაიფმანია 🕶️</div>
        <div class="menu-items">
            <div class="menu-item active" onclick="changeRoom('ზოგადი ჩატი', '💬')">💬 ზოგადი ჩატი</div>
            <div class="menu-item" onclick="changeRoom('ვიპ საუბრები', '💎')">💎 ვიპ საუბრები</div>
            <div class="menu-item" onclick="changeRoom('გამოძიება', '🔍')">🔍 გამოძიება</div>
            <div class="menu-item" onclick="changeRoom('შიფროგრამა', '🔐')">🔐 შიფროგრამა</div>
            <div class="menu-item" onclick="changeRoom('ვიქტორინა', '🧠')">🧠 ვიქტორინა</div>
            <div class="menu-item" onclick="changeRoom('ჩამოხრჩობანა', '💀')">💀 ჩამოხრჩობანა</div>
            <div class="menu-item" onclick="changeRoom('მაფიის ღამე', '🕵️‍♂️')">🕵️‍♂️ მაფიის ღამე</div>
            <div class="menu-item" onclick="changeRoom('ჯოკერი', '🃏')">🃏 ჯოკერი</div>
            <div class="menu-item" onclick="changeRoom('ნარდი', '🎲')">🎲 ნარდი</div>
            <div class="menu-item" onclick="changeRoom('მუსიკა', '🎵')">🎵 მუსიკა</div>
            <div class="menu-item" onclick="changeRoom('იუმორი', '😂')">😂 იუმორი</div>
            <div class="menu-item" style="color: gold; font-weight: bold;" onclick="changeRoom('ადმინისტრაცია', '🛡️')">🛡️ ადმინისტრაცია</div>
            <div class="menu-item" onclick="changeRoom('დახმარება', '🆘')">🆘 დახმარება</div>
            <div class="menu-item" onclick="changeRoom('ფორუმი', '🏛️')">🏛️ ფორუმი</div>
            <div class="menu-item" style="color: #ff4444; border-top: 1px solid #1a1a1a; margin-top: 15px; font-weight: bold;" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <div class="nav-left">
                <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                <div id="roomTitle" style="font-weight: bold; font-size: 15px;">💬 ზოგადი ჩატი</div>
            </div>
            <div id="userDisplay" style="color:var(--neon-red); font-weight:bold; font-size: 14px;">...</div>
        </div>
        <div id="messageList"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">გაგზავნა</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let currentUser = null;
        let myNick = "";
        let myRole = "user";

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = "index.html"; return; }
            currentUser = user;

            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
            myNick = profile?.username || "abu007";
            myRole = profile?.role || 'user';
            
            const displayArea = document.getElementById('userDisplay');
            displayArea.innerHTML = (myRole === 'owner') ? `<span style="color: gold;">👑 დამფუძნებელი:</span> ${myNick}` : myNick;

            loadMessages();
            subscribeToMessages();
        }

        async function loadMessages() {
            const { data: msgs } = await supabaseClient.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
            const list = document.getElementById('messageList');
            list.innerHTML = '';
            if (msgs) msgs.forEach(msg => renderMessage(msg));
            list.scrollTop = list.scrollHeight;
        }

        function renderMessage(msg) {
            const list = document.getElementById('messageList');
            const time = new Date(msg.created_at).toLocaleTimeString('ka-GE', {hour: '2-digit', minute: '2-digit'});
            const isOwner = (msg.username === 'abu007');
            const canDelete = (myRole === 'owner' || msg.user_id === currentUser.id);

            const div = document.createElement('div');
            div.className = 'msg-container';
            div.id = `msg-${msg.id}`;
            div.innerHTML = `
                <div style="width:38px; height:38px; border-radius:12px; border:1px solid ${isOwner ? 'gold' : '#222'}; background:#111; flex-shrink:0;"></div>
                <div style="flex-grow: 1;">
                    <div class="username">
                        ${msg.username} ${isOwner ? '<span style="color: gold; font-size:9px;">[დამფუძნებელი]</span>' : ''}
                        <span class="timestamp">${time}</span>
                        ${canDelete ? `<span class="delete-btn" onclick="deleteMsg(${msg.id})">წაშლა</span>` : ''}
                    </div>
                    <div class="msg-bubble">${msg.text}</div>
                </div>
            `;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        async function deleteMsg(id) {
            const { error } = await supabaseClient.from('messages').delete().eq('id', id);
            if (error) {
                alert("წაშლა ვერ მოხერხდა. დარწმუნდი რომ SQL გაუშვი Supabase-ში.");
            }
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            await supabaseClient.from('messages').insert([{
                user_id: currentUser.id,
                username: myNick,
                text: input.value,
                room_name: currentRoom
            }]);
            input.value = '';
        }

        function subscribeToMessages() {
            supabaseClient.channel('chat_realtime')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                if (payload.new.room_name === currentRoom) renderMessage(payload.new);
            })
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, payload => {
                const el = document.getElementById(`msg-${payload.old.id}`);
                if (el) el.remove();
            })
            .subscribe();
        }

        async function changeRoom(name, icon) {
            currentRoom = name;
            document.getElementById('roomTitle').innerHTML = `${icon} ${name}`;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
            loadMessages();
        }

        async function logout() { await supabaseClient.auth.signOut(); window.location.href = "index.html"; }
        init();
    </script>
</body>
</html>
