<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - CLASSIC</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #050505; --card: #111; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; }
        .head-btn { font-size: 24px; color: var(--red); cursor: pointer; }

        /* მენიუები */
        .side-panel { position: fixed; top: 0; height: 100%; background: #080808; z-index: 2000; transition: 0.3s; width: 280px; overflow-y: auto; padding: 20px; border: 1px solid var(--border); }
        #side-left { left: -280px; }
        #side-right { right: -280px; }
        .open-left { left: 0 !important; }
        .open-right { right: 0 !important; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }

        /* ჩატის სტილი - ყველა ერთ მხარეს */
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }

        .msg-line { display: flex; align-items: flex-start; gap: 10px; width: 100%; margin-bottom: 5px; }
        .msg-ava { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid #333; flex-shrink: 0; }
        
        .bubble-wrap { display: flex; flex-direction: column; max-width: 85%; }
        .msg-nick { font-size: 11px; font-weight: bold; color: #777; margin-bottom: 2px; }
        
        /* ბუშტები */
        .bubble { padding: 10px 14px; background: #161616; border: 1px solid #222; border-radius: 0 15px 15px 15px; font-size: 14px; line-height: 1.4; word-break: break-word; }
        
        /* შენი მესიჯის განსხვავება */
        .is-me .msg-nick { color: var(--red); }
        .is-me .bubble { border-color: #600; background: #200; }

        /* მომხმარებლების სია */
        .u-card { display: flex; align-items: center; gap: 10px; padding: 10px; background: #111; border-radius: 12px; margin-bottom: 8px; border: 1px solid #222; cursor: pointer; }
        .u-ava-list { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        /* ინპუტი */
        .input-box { padding: 15px; background: #000; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        #msg-in { flex: 1; background: #111; border: 1px solid #333; padding: 12px 18px; border-radius: 25px; color: #fff; outline: none; }

        /* მოდალი */
        #prof-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 330px; background: #0a0a0a; border: 1px solid #333; border-radius: 25px; padding: 25px; z-index: 3000; text-align: center; }
        .p-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: #fff; }
    </style>
</head>
<body>
    <div class="overlay" id="blur" onclick="closeAll()"></div>
    <div id="prof-modal"></div>

    <nav id="side-left" class="side-panel"><h3>ოთახები
