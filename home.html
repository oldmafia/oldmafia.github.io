<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - PRO EDITION</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #e60000; --bg: #0a0a0a; --panel: #141414; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .user-profile { padding: 25px; text-align: center; border-bottom: 1px solid #222; }
        .avatar-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--main-red); padding: 3px; }
        
        .rooms-list { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        .room { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #999; transition: 0.3s; font-size: 14px; }
        .room:hover { background: #1a1a1a; color: #fff; }
        .room.active { background: #222; color: #fff; border-left: 4px solid var(--main-red); font-weight: bold; }
        .room-icon { width: 20px; text-align: center; font-style: normal; font-weight: bold; color: var(--main-red); }

        /* Chat Area */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #080808; }
        .chat-header { height: 60px; padding: 0 25px; display: flex; align-items: center; background: var(--panel); border-bottom: 1px solid #222; font-size: 18px; font-weight: bold; color: var(--main-red); }
        
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

        /* Message Bubble - დრო შიგნით */
        .msg-box { align-self: flex-start; max-width: 75%; }
        .msg-sender { font-size: 11px; color: var(--main-red); font-weight: bold; margin-bottom: 4px; margin-left: 5px; }
        .msg-bubble { 
            background: #1e1e1e; padding: 10px 15px; border-radius: 4px 18px 18px 18px; 
            border: 1px solid #333; position: relative; min-width: 120px;
        }
        .msg-content { font-size: 14px; line-height: 1.5; color: #ddd; padding-bottom: 15px; }
        .msg-time { position: absolute; bottom: 6px; right: 12px; font-size: 10px; color: #555; font-family: monospace; }

        /* Input Zone */
        .input-zone { padding: 20px; background: var(--panel); display: flex; align-items: center; gap: 15px; border-top: 1px solid #222; }
        .input-field-wrap { flex-grow: 1; background: #000; border-radius: 30px; border: 1px solid #333; padding: 5px 20px; }
        input { width: 100%; background: transparent; border: none; padding: 10px; color: #fff; outline: none; font-size: 15px; }

        /* ✈️ ნამდვილი თვითმფრინავი (Image) */
        .plane-send { 
            width: 48px; height: 48px; cursor: pointer; transition: 0.3s ease; 
            filter: drop-shadow(0 0 5px rgba(230,0,0,0.5));
        }
        .plane-send:hover { transform: scale(1.1) rotate(-5deg); filter: brightness(1.2); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-profile">
            <img id="uAvatar" src="https://api.dicebear.com/7.x/identicon/svg?seed=Kaif" class="avatar-img">
            <div id="uName" style="margin-top:12px; font-weight:bold;">იტვირთება...</div>
        </div>
        <div class="rooms-list" id="roomsContainer"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="currentRoomName">კაფე-ბარი</div>
        <div id="messages"></div>
        <div class="input-zone">
            <div class="input-field-wrap">
                <input type="text" id="chatInput" placeholder="დაწერე შეტყობინება...">
            </div>
            <img src="https://cdn-icons-png.flaticon.com/512/739/739249.png" class="plane-send" id="sendBtn" title="გაგზავნა">
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");

        const roomData = [
            {n: "კაიფმანია", i: "★"}, {n: "კაფე-ბარი", i: "☕"},
            {n: "ვიპ საუბრები", i: "👑"}, {n: "გამოძიება", i: "🔍"},
            {n: "შიფროგრამა", i: "⌨"}, {n: "ვიქტორინა", i: "💡"},
            {n: "ჩამოხრჩობანა", i: "💀"}, {n: "მაფიის ღამე", i: "🌑"},
            {n: "ჯოკერი", i: "♠"}, {n: "ნარდი", i: "🎲"},
            {n: "მუსიკა", i: "🎵"}, {n: "იუმორი", i: "😂"},
            {n: "ადმინისტრაცია", i: "🛡"}, {n: "დახმარება", i: "❓"},
            {n: "ფორუმი", i: "💬"}, {n: "გასვლა", i: "🚪"}
        ];

        let activeRoom = "კაფე-ბარი";
        let userName = "სტუმარი";

        async function start() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                userName = session.user.user_metadata.nickname || "User";
                document.getElementById('uName').innerText = userName;
                document.getElementById('uAvatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${userName}`;
            }

            const container = document.getElementById('roomsContainer');
            roomData.forEach(r => {
                const div = document.createElement('div');
                div.className = `room ${r.n === activeRoom ? 'active' : ''}`;
                div.innerHTML = `<span class="room-icon">${r.i}</span> <span>${r.n}</span>`;
                div.onclick = () => {
                    if(r.n === "გასვლა") { location.href = "index.html"; return; }
                    activeRoom = r.n;
                    document.getElementById('currentRoomName').innerText = r.n;
                    document.querySelectorAll('.room').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    getMessages();
                };
                container.appendChild(div);
            });
            getMessages();
        }

        async function getMessages() {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML = "";
            const { data } = await supabaseClient.from('messages').select('*').eq('room_name', activeRoom).order('created_at', { ascending: true });
            if(data) data.forEach(addMessage);
        }

        function addMessage(m) {
            const msgDiv = document.getElementById('messages');
            const time = new Date(m.created_at).toLocaleTimeString('ka-GE', {hour:'2-digit', minute:'2-digit'});
            
            const wrap = document.createElement('div');
            wrap.className = 'msg-box';
            wrap.innerHTML = `
                <div class="msg-sender">${m.username}</div>
                <div class="msg-bubble">
                    <div class="msg-content">${m.text}</div>
                    <div class="msg-time">${time}</div>
                </div>
            `;
            msgDiv.appendChild(wrap);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }

        async function send() {
            const inp = document.getElementById('chatInput');
            if(!inp.value.trim()) return;
            const val = inp.value;
            inp.value = ""; 
            
            await supabaseClient.from('messages').insert([{ 
                text: val, 
                room_name: activeRoom, 
                username: userName 
            }]);
        }

        document.getElementById('sendBtn').onclick = send;
        document.getElementById('chatInput').onkeypress = (e) => { if(e.key==='Enter') send(); };

        supabaseClient.channel('realtime-msgs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            if(payload.new.room_name === activeRoom) addMessage(payload.new);
        }).subscribe();

        start();
    </script>
</body>
</html>
