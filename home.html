<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - OFFICIAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #050505; --panel: #0a0a0a; --border: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { 
            height: 60px; background: #000; border-bottom: 2px solid var(--red);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            z-index: 2001; position: relative; box-shadow: 0 2px 10px rgba(255,0,0,0.2);
        }
        .menu-btn { font-size: 24px; color: var(--red); cursor: pointer; padding: 5px; width: 40px; text-align: center; }
        .logo { color: var(--red); font-weight: 900; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }

        .wrapper { flex: 1; display: flex; position: relative; overflow: hidden; }

        /* გვერდითა პანელები */
        .side-panel { 
            position: absolute; top: 0; bottom: 0; width: 260px; background: #080808; 
            z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border); overflow-y: auto;
        }
        #side-left { left: -265px; border-right: 2px solid var(--red); }
        #side-right { right: -265px; border-left: 2px solid var(--red); }
        
        /* მენიუს გახსნა */
        .side-panel.open { transform: translateX(0); }
        #side-left.open { left: 0; }
        #side-right.open { right: 0; }

        /* ჩატის ზონა */
        .chat-area { flex: 1; display: flex; flex-direction: column; z-index: 100; position: relative; width: 100%; background: #050505; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* მესიჯები */
        .m-wrap { max-width: 85%; margin-bottom: 5px; }
        .m-nick { font-size: 10px; font-weight: bold; color: #555; margin-bottom: 2px; }
        .m-msg { padding: 10px 15px; background: #111; border: 1px solid #1a1a1a; border-radius: 0 12px 12px 12px; font-size: 14px; color: #ccc; line-height: 1.4; }
        
        .is-me { align-self: flex-end; }
        .is-me .m-nick { color: var(--red); text-align: right; }
        .is-me .m-msg { background: #1a0505; border-right: 3px solid var(--red); border-radius: 12px 0 12px 12px; color: #fff; border-left: none; }

        /* მენიუს ელემენტები */
        .side-h { padding: 20px; font-size: 12px; color: var(--red); font-weight: bold; border-bottom: 1px solid #111; text-transform: uppercase; letter-spacing: 1px; }
        .room-btn { padding: 15px 20px; cursor: pointer; color: #888; border-bottom: 1px solid #0d0d0d; font-size: 14px; transition: 0.2s; }
        .room-btn:active { background: #111; }
        .room-active { background: #1a0505; color: var(--red); font-weight: bold; border-left: 4px solid var(--red); }

        /* ქვედა პანელი */
        .input-wrap { padding: 12px; background: #000; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        #msg-in { 
            flex: 1; background: #0d0d0d; border: 1px solid #222; padding: 12px 18px; 
            border-radius: 25px; color: #fff; outline: none; font-size: 14px;
        }
        #msg-in:focus { border-color: var(--red); }
        .send-btn { background: var(--red); border: none; width: 45px; height: 45px; border-radius: 50%; color: #fff; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* ბლარი მენიუს დროს */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; backdrop-filter: blur(3px); }
        .overlay.show { display: block; }

        /* ონლაინ სია */
        .u-item { padding: 12px 20px; display: flex; align-items: center; gap: 10px; font-size: 14px; color: #eee; }
        .u-dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; box-shadow: 0 0 8px #0f0; }
    </style>
</head>

    </div>
