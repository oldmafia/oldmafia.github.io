<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>კაიფმანია 🕶️</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #cc0000; --dark-bg: #0b0b0b; --panel-bg: #161616; --text-gray: #999; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; height: 100vh; display: flex; background: var(--dark-bg); color: #ddd; overflow: hidden; }
        
        /* მარცხენა მენიუ */
        .sidebar { width: 260px; min-width: 260px; background: #000; border-right: 1px solid #222; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-header { padding: 25px; font-size: 20px; font-weight: bold; text-align: center; color: var(--main-red); text-transform: uppercase; letter-spacing: 2px; }
        .menu-item { padding: 12px 20px; margin: 2px 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-gray); font-size: 14px; transition: 0.2s; }
        .menu-item:hover { background: #111; color: white; }
        .menu-item.active { background: #1a1a1a; color: var(--main-red); font-weight: bold; border-left: 3px solid var(--main-red); }

        /* მთავარი კონტენტი */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; background: #000; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10; }
        
        .user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px 10px; border-radius: 20px; transition: 0.2s; }
        .user-info:hover { background: #111; }
        .nav-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--main-red); object-fit: cover; }

        /* ჩატის მესიჯები */
        #messageList { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #080808; }
        .msg-box { background: var(--panel-bg); padding: 12px 16px; border-radius: 12px; border: 1px solid #222; max-width: 80%; align-self: flex-start; animation: fadeIn 0.3s ease; }
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .msg-avatar { width: 24px; height: 24px; border-radius: 50%; }
        .username { font-weight: bold; font-size: 13px; cursor: pointer; color: var(--main-red); }
        .msg-text { font-size: 15px; line-height: 1.4; color: #eee; }

        /* ტექსტის შეყვანა */
        .input-area { padding: 15px 20px; background: #000; border-top: 1px solid #222; display: flex; gap: 12px; align-items: center; }
        input { flex-grow: 1; padding: 12px 20px; background: #111; border: 1px solid #333; color: #fff; border-radius: 25px; outline: none; font-size: 14px; }
        input:focus { border-color: var(--main-red); }
        .send-btn { background: var(--main-red); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:hover { transform: scale(1.1); background: #f00; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">კაიფმანია 🕶️</div>
        <div class="menu-item active" onclick="changeRoom('ზოგადი ჩატი', '💬', this)">💬 ზოგადი ჩატი</div>
        <div class="menu-item" onclick="changeRoom('ვიპ საუბრები', '💎', this)">💎 ვიპ საუბრები</div>
        <div class="menu-item" onclick="changeRoom('გამოძიება', '🔍', this)">🔍 გამოძიება</div>
        <div class="menu-item" onclick="changeRoom('შიფროგრამა', '🔐', this)">🔐 შიფროგრამა</div>
        <div class="menu-item" onclick="changeRoom('ვიქტორინა', '🧠', this)">🧠 ვიქტორინა</div>
        <div class="menu-item" onclick="changeRoom('ჩამოხრჩობანა', '💀', this)">💀 ჩამოხრჩობანა</div>
        <div class="menu-item" onclick="changeRoom('მაფიის ღამე', '🕵️‍♂️', this)">🕵️‍♂️ მაფიის ღამე</div>
        <div class="menu-item" onclick="changeRoom('ჯოკერი', '🃏', this)">🃏 ჯოკერი</div>
        <div class="menu-item" onclick="changeRoom('ნარდი', '🎲', this)">🎲 ნარდი</div>
        <div class="menu-item" onclick="changeRoom('მუსიკა', '🎵', this)">🎵 მუსიკა</div>
        <div class="menu-item" onclick="changeRoom('იუმორი', '😂', this)">😂 იუმორი</div>
        <div class="menu-item" style="color: gold;" onclick="changeRoom('ადმინისტრაცია', '🛡️', this)">🛡️ ადმინისტრაცია</div>
        <div class="menu-item" style="color: #00ccff;" onclick="changeRoom('დახმარება', '🆘', this)">🆘 დახმარება</div>
        <div class="menu-item" onclick="changeRoom('ფორუმი', '🏛️', this)">🏛️ ფორუმი</div>
        <div class="menu-item" style="color: #ff4444;" onclick="logout()">🚪 გასვლა</div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <div id="roomTitle" style="font-weight:bold; color: white;">💬 ზოგადი ჩატი</div>
            <div class="user-info" onclick="window.location.href='user.html'">
                <img id="navAvatar" class="nav-avatar" src="https://api.dicebear.com/7.x/identicon/svg?seed=abu">
                <div id="userDisplay" style="color:var(--main-red); font-weight:bold;">იტვირთება...</div>
            </div>
        </div>
        <div id="messageList"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">✈️</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let myData = { id: '', nick: 'abu007', avatar: '', role: 'owner' };

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = "index.html";

            myData.id = user.id;

            // შენი ID-ს სპეციალური შემოწმება
            if (user.id === '1b0d3a82-fac3-471a-98d1-2cc5697669d0') {
                myData.nick = 'abu007';
                myData.role = 'owner';
            } else {
                const { data: p } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
                if(p) {
                    myData.nick = p.username || user.email.split('@')[0];
                    myData.avatar = p.avatar_url;
                    myData.role = p.role || 'user';
                }
            }

            document.getElementById('userDisplay').innerText = (myData.role === 'owner' ? '👑 ' : '') + myData.nick;
            document.getElementById('navAvatar').src = myData.avatar || `https://api.dicebear.com/7.x/identicon/svg?seed=${myData.nick}`;

            loadMsgs();
            
            // რეალურ დროში განახლება
            supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => {
                loadMsgs();
            }).subscribe();
        }

        async function loadMsgs() {
            const { data: msgs } = await supabaseClient.from('messages')
                .select('*')
                .eq('room_name', currentRoom)
                .order('id', { ascending: true });

            const list = document.getElementById('messageList');
            list.innerHTML = '';

            if (msgs) {
                msgs.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'msg-box';
                    div.innerHTML = `
                        <div class="msg-header">
                            <span class="username" onclick="window.location.href='user.html?id=${msg.user_id}'">${msg.username}</span>
                        </div>
                        <div class="msg-text">${msg.text}</div>
                    `;
                    list.appendChild(div);
                });
            }
            list.scrollTop = list.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msgInput');
            const val = input.value.trim();
            if (!val) return;

            const { error } = await supabaseClient.from('messages').insert([{
                user_id: myData.id,
                username: myData.nick,
                text: val,
                room_name: currentRoom
            }]);

            if (error) {
                console.error(error);
                alert("ვერ გაიგზავნა!");
            }
            input.value = '';
        }

        function changeRoom(name, icon, el) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = `${icon} ${name}`;
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            loadMsgs();
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        init();
    </script>
</body>
</html>
