<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .header { height: 60px; border-bottom: 2px solid red; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .burger, .pm-trigger { color: red; font-size: 26px; cursor: pointer; }
        #roomTitle { font-size: 14px; font-weight: bold; text-transform: uppercase; }

        /* Sidebar */
        #sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #000; transition: 0.3s; z-index: 2000; border-right: 2px solid red; overflow-y: auto; }
        #sidebar.open { left: 0; }
        .prof-box { padding: 30px 20px; text-align: center; border-bottom: 1px solid #222; }
        .prof-img { width: 75px; height: 75px; border-radius: 50%; border: 2px solid red; object-fit: cover; }

        /* Rooms List */
        .room-item { padding: 15px 25px; border-bottom: 1px solid #111; color: #bbb; cursor: pointer; }
        .room-item.active { color: red; font-weight: bold; border-left: 5px solid red; }

        /* Messages Area */
        #msgList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        /* შენი მესიჯები მარჯვნივ */
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #333; }
        .me .msg-avatar { border-color: red; }

        .bubble { padding: 10px 14px; border-radius: 15px; font-size: 15px; position: relative; }
        .other .bubble { background: #111; border: 1px solid #222; border-bottom-left-radius: 2px; }
        .me .bubble { background: #000; border: 1px solid red; border-bottom-right-radius: 2px; }
        
        .u-nick { font-size: 11px; font-weight: bold; color: #ff4d4d; display: block; margin-bottom: 3px; }

        /* Input Area */
        .input-area { padding: 12px; border-top: 1px solid red; display: flex; gap: 10px; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid red; border-radius: 25px; padding: 0 15px; height: 45px; display: flex; align-items: center; }
        input { width: 100%; border: none; background: transparent; color: #fff; outline: none; }
        .btn-send { background: red; color: #000; width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="burger" onclick="toggleMenu()">☰</div>
        <div id="roomTitle">💬 კაიფმანია</div>
        <div class="pm-trigger" onclick="openInbox()">📩</div>
    </div>

    <div id="sidebar">
        <div class="prof-box">
            <img src="" class="prof-img" id="myImg">
            <p id="myNick" style="margin-top:10px; font-weight:bold;"></p>
        </div>
        <div id="roomsContainer">
            <div class="room-item active" onclick="changeRoom('💬 კაიფმანია', this)">💬 კაიფმანია</div>
            <div class="room-item" onclick="changeRoom('🍷 კაფე-ბარი', this)">🍷 კაფე-ბარი</div>
            <div class="room-item" onclick="changeRoom('🔐 VIP-საუბრები', this)">🔐 VIP-საუბრები</div>
            <div class="room-item" onclick="changeRoom('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="room-item" onclick="changeRoom('🔓 შიფროგრამა', this)">🔓 შიფროგრამა</div>
            <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div style="padding:20px; color:red; text-align:center;" onclick="toggleMenu()">✕ დახურვა</div>
        </div>
    </div>

    <div id="msgList"></div>

    <div class="input-area" id="inputBar">
        <div class="input-box"><input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." autocomplete="off"></div>
        <button class="btn-send" onclick="sendMsg()">✈️</button>
    </div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let myId, myName, myAvatar, currentRoom = '💬 კაიფმანია', isInbox = false;

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;

        // წამოვიღოთ ნამდვილი ნიკი profiles ცხრილიდან
        const { data: prof } = await client.from('profiles').select('*').eq('id', myId).single();
        
        // თუ ბაზაში ნიკი არ არის, გამოვიყენოთ რეგისტრაციისას მითითებული სახელი
        myName = prof?.username || user.user_metadata?.username || user.user_metadata?.full_name;
        myAvatar = prof?.avatar_url || "https://ui-avatars.com/api/?name=" + myName + "&background=000&color=f00";

        document.getElementById('myNick').innerText = myName;
        document.getElementById('myImg').src = myAvatar;

        loadMsgs();
        
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (payload) => {
            if (!isInbox && payload.new.room_name === currentRoom) {
                if(payload.new.user_id !== myId) appendMsg(payload.new);
            }
        }).subscribe();
    }

    async function loadMsgs() {
        const list = document.getElementById('msgList');
        list.innerHTML = "";

        if (isInbox) {
            document.getElementById('inputBar').style.display = "none";
            const { data: pms } = await client.from('private_messages').select('*').eq('receiver_id', myId).order('created_at', { ascending: false });
            list.innerHTML = pms?.map(m => `<div class="bubble other" style="margin-bottom:10px;"><b>${m.sender_name}:</b> ${m.text}</div>`).join('') || "ცარიელია";
        } else {
            document.getElementById('inputBar').style.display = "flex";
            const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true }).limit(50);
            list.innerHTML = msgs ? msgs.map(m => renderMsg(m)).join('') : '';
        }
        list.scrollTop = list.scrollHeight;
    }

    function renderMsg(m) {
        const isMe = m.user_id === myId;
        return `
            <div class="msg-row ${isMe ? 'me' : 'other'}">
                <img src="${m.avatar_url || 'https://via.placeholder.com/50'}" class="msg-avatar">
                <div class="bubble">
                    <span class="u-nick">${m.username}</span>
                    <span>${m.text}</span>
                </div>
            </div>`;
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim()) return;

        // ვაგზავნით ნამდვილ ნიკს და არა მეილს
        const { error } = await client.from('messages').insert([{ 
            user_id: myId, 
            username: myName, 
            text: inp.value, 
            room_name: currentRoom,
            avatar_url: myAvatar 
        }]);

        if(!error) {
            appendMsg({ user_id: myId, username: myName, text: inp.value, avatar_url: myAvatar });
            inp.value = '';
        }
    }

    function appendMsg(m) {
        const list = document.getElementById('msgList');
        list.innerHTML += renderMsg(m);
        list.scrollTop = list.scrollHeight;
    }

    function openInbox() { isInbox = true; document.getElementById('roomTitle').innerText = "📥 პირადი ყუთი"; loadMsgs(); }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function changeRoom(name, el) {
        isInbox = false; currentRoom = name;
        document.getElementById('roomTitle').innerText = name;
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        toggleMenu(); loadMsgs();
    }

    init();
</script>
</body>
</html>
