<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - THE BOSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #050505; --dark: #111; --glass: rgba(255,255,255,0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* ჰედერი */
        header { height: 60px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; z-index: 1000; }
        #room-title { color: var(--red); font-weight: bold; text-transform: uppercase; font-size: 14px; }

        /* მენიუები */
        .side-panel { position: fixed; top: 0; height: 100%; background: #080808; z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; width: 280px; overflow-y: auto; border: 1px solid #222; }
        #side-left { left: -280px; }
        #side-right { right: -280px; }
        .open { transform: translateX(280px); }
        #side-right.open { transform: translateX(-280px); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; backdrop-filter: blur(5px); }
        .active { display: block; }

        /* ჩატი */
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .msg { display: flex; gap: 10px; max-width: 85%; align-self: flex-start; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .avatar-chat { width: 42px; height: 42px; border-radius: 12px; object-fit: cover; border: 1px solid #333; cursor: pointer; }
        .bubble { padding: 12px 16px; background: var(--dark); border-radius: 18px; font-size: 14px; line-height: 1.5; border: 1px solid #222; position: relative; }
        .msg.me .bubble { background: #2a0505; border-color: #600; }
        .u-info { font-size: 10px; color: #666; margin-bottom: 4px; display: block; }
        .msg.me .u-info { text-align: right; }

        /* პროფილის მოდალი - გასუფთავებული */
        #prof-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 340px; background: #0a0a0a; border: 1px solid #333; border-radius: 25px; padding: 30px; z-index: 3000; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 20px; cursor: pointer; color: #555; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; color: #fff; font-size: 13px; transition: 0.2s; }

        /* ინპუტი */
        .input-bar { padding: 15px; background: #000; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        #msg-input { flex: 1; background: #111; border: 1px solid #333; padding: 12px 20px; border-radius: 25px; color: #fff; outline: none; }
        
        /* ოთახების სტილი */
        .room-btn { padding: 12px; border-radius: 12px; background: var(--glass); margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; display: flex; align-items: center; gap: 10px; }
        .room-btn:active { background: #200; border-color: #500; }

        .u-card { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--glass); border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
    </style>
</head>

        document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
    }
