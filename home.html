<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* მობილური მენიუს ღილაკი */
        .menu-toggle { display: none; position: fixed; top: 15px; left: 15px; z-index: 1000; background: red; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }

        /* მარცხენა მენიუ - Sidebar */
        .sidebar { width: 100px; background: #0a0a0a; border-right: 2px solid #222; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; transition: 0.3s; z-index: 999; }
        
        .room-icon { 
            width: 65px; height: 65px; background: #151515; border-radius: 20px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; border: 2px solid #333; 
            transition: 0.4s; font-size: 11px; font-weight: bold; text-align: center; color: #888;
        }
        .room-icon:hover, .room-icon.active { border-color: red; color: white; box-shadow: 0 0 20px red; transform: scale(1.05); background: #200; }

        /* ჩატის მთავარი ნაწილი */
        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        .header { 
            height: 70px; background: #0d0d0d; border-bottom: 1px solid #222; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px; 
        }
        .header h2 { color: red; margin: 0; font-size: 20px; text-shadow: 0 0 15px red; animation: glow 2s infinite alternate; }
        @keyframes glow { from { opacity: 0.7; } to { opacity: 1; } }

        /* მესიჯების ფანჯარა */
        .messages-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { 
            background: rgba(20, 20, 20, 0.8); padding: 12px 18px; border-radius: 15px; 
            border-left: 4px solid red; max-width: 85%; animation: fadeIn 0.3s ease; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message b { color: red; display: block; font-size: 13px; margin-bottom: 5px; }

        /* ქვედა საწერი ზოლი */
        .input-bar { padding: 15px 25px; background: #0d0d0d; border-top: 1px solid #222; display: flex; gap: 15px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 15px; color: white; border-radius: 30px; outline: none; transition: 0.3s; }
        input:focus { border-color: red; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        .send-btn { background: red; color: white; border: none; padding: 0 30px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .send-btn:hover { background: darkred; box-shadow: 0 0 20px red; }

        /* მობილურის დიზაინი */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -110px; height: 100%; }
            .sidebar.active { left: 0; }
            .menu-toggle { display: block; }
            .header { padding-left: 70px; }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <div class="sidebar" id="sidebar">
        <div style="margin-top: 50px;"></div>
        <div class="room-icon active" id="btn-general" onclick="changeRoom('general')">ზოგადი</div>
        <div class="room-icon" id="btn-mafia" onclick="changeRoom('mafia')">მაფია</div>
        <div class="room-icon" id="id-vip" onclick="changeRoom('vip')">VIP</div>
    </div>

    <div class="chat-main">
        <div class="header">
            <h2 id="room-title">ზოგადი ჩატი</h2>
            <div id="user-info" style="color: #aaa; font-size: 14px;">იტვირთება...</div>
        </div>

        <div class="messages-box" id="chat-messages"></div>

        <div class="input-bar">
            <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება...">
            <button class="send-btn" onclick="sendMessage()">გაგზავნა</button>
        </div>
    </div>
