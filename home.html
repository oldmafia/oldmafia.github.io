<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon-red: #ff0000;
            --dark-bg: #050505;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            background: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* სიდებარი */
        .sidebar {
            width: 280px;
            background: #0d0d0d;
            border-right: 2px solid var(--neon-red);
            display: flex;
            flex-direction: column;
            transition: 0.4s;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -285px; height: 100%; }
            .sidebar.open { left: 0; }
        }

        .sidebar-header {
            padding: 25px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px var(--neon-red);
            border-bottom: 1px solid #222;
        }

        .menu-items { flex-grow: 1; overflow-y: auto; padding: 15px; }

        .menu-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
        }

        .menu-item:hover {
            border-color: var(--neon-red);
            background: rgba(255, 0, 0, 0.1);
        }

        /* ჩატის არე */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #150000 0%, #000 100%);
        }

        .top-nav {
            height: 65px;
            background: #0d0d0d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #222;
        }

        #messageList {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* შეტყობინების სტილი (ყველა მარცხნივ) */
        .msg-box {
            display: flex;
            gap: 12px;
            background: rgba(20, 20, 20, 0.8);
            padding: 12px;
            border-radius: 12px;
            border-left: 3px solid var(--neon-red);
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--neon-red); object-fit: cover; }

        .msg-info { display: flex; flex-direction: column; gap: 4px; }

        .msg-header { display: flex; align-items: center; gap: 10px; }

        .username { color: var(--neon-red); font-weight: bold; font-size: 14px; text-shadow: 0 0 5px var(--neon-red); }

        .time { color: #666; font-size: 11px; }

        .msg-text { color: #eee; font-size: 14px; line-height: 1.5; }

        /* ინპუტის ზონა */
        .input-area {
            padding: 20px;
            background: #0d0d0d;
            display: flex;
            gap: 10px;
            border-top: 1px solid #222;
        }

        .input-area input {
            flex-grow: 1;
            padding: 15px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
            outline: none;
        }

        .input-area button {
            background: var(--neon-red);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">

        <div class="menu-items">

            <div class="menu-item" onclick="openRoom('ვიქტორინა', '🧠')">🧠 ვიქტორინა</div>

            <div class="menu-item" onclick="openRoom('მაფიის ღამე', '🕵️‍♂️')">🕵️‍♂️ მაფიის ღამე</div>

            <div class="menu-item" onclick="openRoom('ფორუმი', '🏛️')">🏛️ ფორუმი</div>
            <div class="menu-item" style="color: #ff4444;" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

        </div>
    </div>
