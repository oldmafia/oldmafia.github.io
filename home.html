<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* Header - შავი და წითელი ნეონი */
        .header { 
            height: 60px; background: #000; border-bottom: 2px solid red; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            position: relative; z-index: 2001;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .burger { font-size: 28px; color: red; cursor: pointer; text-shadow: 0 0 10px red; }
        #roomTitle { font-weight: bold; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .pm-trigger { color: red; font-size: 24px; cursor: pointer; text-shadow: 0 0 10px red; }

        /* Sidebar - მენიუ */
        #sidebar { 
            position: fixed; top: -100vh; left: 0; width: 100%; height: 100vh; 
            background: rgba(0, 0, 0, 0.95); transition: 0.5s; z-index: 2000; 
            overflow-y: auto; padding-top: 80px;
        }
        #sidebar.open { top: 0; }
        .room-item { 
            padding: 18px 25px; font-size: 17px; border-bottom: 1px solid #1a1a1a; 
            display: flex; align-items: center; gap: 15px; cursor: pointer; color: #ccc;
        }
        .room-item.active { color: red; text-shadow: 0 0 10px red; background: #050505; }

        /* ჩატი */
        #main { display: flex; flex-direction: column; height: 100vh; }
        #msgList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg-bubble { padding: 10px 14px; border-radius: 12px; max-width: 80%; background: #1a1a1a; border: 1px solid #333; }
        .msg-bubble.is-me { background: #000; border: 1px solid red; align-self: flex-end; box-shadow: 0 0 8px rgba(255, 0, 0, 0.3); }
        .u-name { color: #ff4d4d; font-size: 12px; font-weight: bold; margin-bottom: 4px; display: block; }

        /* Input Area - თვითმფრინავით */
        .input-area { padding: 15px; background: #000; border-top: 2px solid red; display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: #111; border: 1px solid red; border-radius: 25px; padding: 5px 15px; }
        input { width: 100%; border: none; background: transparent; color: #fff; padding: 10px; outline: none; }
        .send-btn { 
            background: red; color: #000; width: 45px; height: 45px; border-radius: 50%; 
            border: none; font-size: 24px; cursor: pointer; box-shadow: 0 0 15px red;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div class="burger" onclick="toggleMenu()">☰</div>
            <div id="roomTitle">კაიფმანია 😎🔥</div>
        </div>
        <div class="pm-trigger" onclick="loadPMs()">📩</div>
    </div>

    <div id="sidebar">
        <div class="room-item active" onclick="changeRoom('💬 კაიფმანია', this)">💬 კაიფმანია</div>
        <div class="room-item" onclick="changeRoom('🍷 კაფე-ბარი', this)">🍷 კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('🔐 VIP-საუბრები', this)">🔐 VIP-საუბრები</div>
        <div class="room-item" onclick="changeRoom('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('🔓 შიფროგრამა', this)">🔓 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('⚜️ ნარდი', this)">⚜️ ნარდი</div>
        <div class="room-item" onclick="changeRoom('💖 სიყვარული', this)">💖 სიყვარული</div>
        <div class="room-item" onclick="changeRoom('🤣 იუმორი', this)">🤣 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🎵 მელომანია', this)">🎵 მელომანია</div>
        <div class="room-item" onclick="changeRoom('📜 ფორუმი', this)">📜 ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('🆘 SOS', this)">🆘 SOS</div>
        <div class="room-item" style="color:red" onclick="toggleMenu()">✕ დახურვა</div>
    </div>

    <div id="main">
        <div id="msgList"></div>
        <div class="input-area" id="inputArea">
            <div class="input-box"><input type="text" id="msgInput" placeholder="დაწერე..."></div>
            <button class="send-btn" onclick="sendMsg()">✈️</button>
        </div>
    </div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let myId, myName = "User", currentRoom = '💬 კაიფმანია';

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;
        const { data: p } = await client.from('profiles').select('username').eq('id', myId).single();
        if(p) myName = p.username;
        loadMsgs();
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (pl) => {
            if(pl.new.room_name === currentRoom) loadMsgs();
        }).subscribe();
    }

    async function loadMsgs() {
        const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).order('id', { ascending: true });
        const list = document.getElementById('msgList');
        list.innerHTML = msgs ? msgs.map(m => `
            <div class="msg-bubble ${m.username === myName ? 'is-me' : ''}">
                <span class="u-name">${m.username}</span>
                <span>${m.text}</span>
            </div>`).join('') : '';
        list.scrollTop = list.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim()) return;
        await client.from('messages').insert([{ user_id: myId, username: myName, text: inp.value, room_name: currentRoom }]);
        inp.value = '';
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function changeRoom(n, el) { 
        currentRoom = n; document.getElementById('roomTitle').innerText = n; 
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active'); toggleMenu(); loadMsgs(); 
    }
    init();
</script>
</body>
</html>
