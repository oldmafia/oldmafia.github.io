<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Full</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --dark: #000; --panel: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--dark); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: var(--panel); border-bottom: 1px solid #222; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; z-index: 100; position: relative; }
        
        .room-selector { background: #1a1a1a; padding: 10px 15px; border-radius: 20px; border: 1px solid var(--red); cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #fff; font-weight: bold; flex: 1; margin: 0 15px; justify-content: center; }

        /* ჩამოსაშლელი მენიუ - სრული სია */
        .dropdown-menu { position: absolute; top: 100%; left: 0; width: 100%; background: #0d0d0d; border-bottom: 3px solid var(--red); display: none; padding: 10px; box-shadow: 0 15px 40px rgba(0,0,0,0.9); grid-template-columns: 1fr 1fr; gap: 8px; z-index: 200; }
        .dropdown-menu.show { display: grid; }
        .drop-room { padding: 12px; background: #151515; border-radius: 8px; text-align: center; font-size: 12px; color: #ccc; cursor: pointer; border: 1px solid #222; }
        .drop-room:active { background: var(--red); color: #fff; border-color: #fff; }

        .top-user { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .top-user img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--red); object-fit: cover; }

        #mBox { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 18px; font-size: 14px; position: relative; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .msg-u { font-size: 10px; color: var(--red); font-weight: bold; margin-bottom: 3px; display: block; }
        .me { align-self: flex-end; background: var(--red); color: #fff; border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: #1a1a1a; color: #eee; border-bottom-left-radius: 4px; border: 1px solid #333; }

        .input-bar { padding: 12px; background: #000; border-top: 1px solid #111; display: flex; gap: 8px; align-items: center; }
        .input-bar input { flex: 1; background: #151515; border: 1px solid #333; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 14px; }
        .send-btn { background: var(--red); border: none; width: 45px; height: 45px; border-radius: 50%; color: #fff; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header>
        <div class="top-user" onclick="editProfile()">
            <img id="uImg" src="https://via.placeholder.com/38">
        </div>
        
        <div class="room-selector" id="curRoom" onclick="toggleMenu()">
            💬 ზოგადი ჩატი ▾
        </div>

        <div style="font-size: 20px; cursor: pointer;" onclick="logout()">🚪</div>

        <div class="dropdown-menu" id="dropMenu">
            <div class="drop-room" onclick="setR('💬 ზოგადი ჩატი')">💬 ზოგადი</div>
            <div class="drop-room" onclick="setR('💎 VIP საუბრები')">💎 VIP ჩატი</div>
            <div class="drop-room" onclick="setR('🔍 გამოძიება')">🔍 გამოძიება</div>
            <div class="drop-room" onclick="setR('🔐 შიფროგრამა')">🔐 შიფროგრამა</div>
            <div class="drop-room" onclick="setR('🧩 ვიქტორინა')">🧩 ვიქტორინა</div>
            <div class="drop-room" onclick="setR('🪢 ჩამოხრჩობანა')">🪢 ჩამოხრჩობანა</div>
            <div class="drop-room" onclick="setR('🌑 მაფიის ღამე')">🌑 მაფია</div>
            <div class="drop-room" onclick="setR('🎵 მუსიკა')">🎵 მუსიკა</div>
            <div class="drop-room" onclick="setR('🖼️ გალერეა')">🖼️ გალერეა</div>
            <div class="drop-room" onclick="setR('📝 ფორუმი')">📝 ფორუმი</div>
            <div class="drop-room" onclick="setR('🛡️ ადმინისტრაცია')">🛡️ ადმინი</div>
        </div>
    </header>

    <div id="mBox"></div>

    <div class="input-bar">
        <input type="text" id="mIn" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">➤</button>
    </div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let me = {}, room = '💬 ზოგადი ჩატი';

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return location.href="index.html";

        let { data: p } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
        me = { id: user.id, nick: p?.username || "tojina", avatar: p?.avatar_url || "https://via.placeholder.com/38", stat: p?.status || "" };

        document.getElementById('uImg').src = me.avatar;

        load();
        sb.channel('chat').on('postgres_changes',{event:'*',schema:'public',table:'messages'},()=>load()).subscribe();
    }

    function toggleMenu() { document.getElementById('dropMenu').classList.toggle('show'); }

    function setR(n) {
        room = n; 
        document.getElementById('curRoom').innerText = n + " ▾";
        toggleMenu(); 
        load();
    }

    async function editProfile() {
        const s = prompt("შეცვალე სტატუსი:", me.stat);
        if(s !== null) {
            await sb.from('profiles').update({ status: s }).eq('id', me.id);
            me.stat = s;
        }
        const a = prompt("ჩასვი ფოტოს ლინკი (URL):", me.avatar);
        if(a) {
            await sb.from('profiles').update({ avatar_url: a }).eq('id', me.id);
            document.getElementById('uImg').src = a;
        }
    }

    async function load() {
        const { data } = await sb.from('messages').select('*').eq('room', room).order('created_at', { ascending: true });
        const box = document.getElementById('mBox');
        if(!data) return;
        box.innerHTML = data.map(m => `
            <div class="msg ${m.user_id === me.id ? 'me' : 'other'}">
                <span class="msg-u">${m.username}</span>
                ${m.text}
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('mIn'); if(!i.value.trim()) return;
        await sb.from('messages').insert([{ text: i.value, room: room, user_id: me.id, username: me.nick }]);
        i.value = "";
    }

    async function logout() { await sb.auth.signOut(); location.href="index.html"; }
    init();
</script>
</body>
</html>
