<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Final Edition</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --dark: #0a0a0a; --panel: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header */
        header { background: var(--panel); padding: 12px 15px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        .menu-btn { font-size: 26px; color: var(--red); cursor: pointer; border: none; background: none; }
        .room-name { font-weight: bold; font-size: 15px; }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--dark); z-index: 1000; transition: 0.3s; border-right: 1px solid var(--red); display: flex; flex-direction: column; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; }
        .overlay.active { display: block; }

        .side-profile { padding: 30px 15px; text-align: center; border-bottom: 1px solid #222; }
        .side-nick { color: var(--red); font-weight: bold; font-size: 18px; }

        .side-nav { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .nav-item { padding: 12px 15px; border-radius: 8px; color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; font-size: 14px; position: relative; }
        .nav-item.active { background: rgba(255,0,0,0.15); color: var(--red); font-weight: bold; }
        .dot { width: 8px; height: 8px; background: gold; border-radius: 50%; position: absolute; right: 15px; display: none; }

        /* ჩატი */
        #chatBox { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .me-row { align-self: flex-end; flex-direction: row-reverse; }
        .msg { padding: 10px 14px; border-radius: 18px; font-size: 14px; background: #1a1a1a; position: relative; }
        .me { background: var(--red); color: #fff; }
        .msg-time { font-size: 9px; color: #555; margin-top: 4px; display: block; text-align: right; }

        /* Inbox Style */
        .inbox-card { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; gap: 12px; align-items: center; }
        .av-circle { width: 40px; height: 40px; border-radius: 50%; background: #222; border: 1px solid var(--red); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--red); }

        .input-zone { padding: 12px; background: #000; border-top: 1px solid #111; display: flex; gap: 10px; }
        .input-zone input { flex: 1; background: #151515; border: 1px solid #333; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; }
        .send-btn { background: var(--red); border: none; width: 45px; height: 45px; border-radius: 50%; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="room-name" id="roomTitle">💬 ზოგადი ჩატი</div>
        <div style="width: 24px;"></div>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="side-profile">
            <div class="side-nick" id="myNick">...</div>
        </div>
        <div class="side-nav">
            <div class="nav-item" onclick="showInbox()" style="color: gold; border-bottom: 1px solid #222; margin-bottom: 10px;">
                💌 ინბოქსი <span id="inboxDot" class="dot"></span>
            </div>
            <div class="nav-item active" onclick="setR('💬 ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
            <div class="nav-item" onclick="setR('💎 VIP საუბრები', this)">💎 VIP საუბრები</div>
            <div class="nav-item" onclick="setR('🔍 გამოძიება', this)">🔍 გამოძიება</div>
            <div class="nav-item" onclick="setR('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
            <div class="nav-item" onclick="setR('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="nav-item" onclick="setR('🪢 ჩამოხრჩობანა', this)">🪢 ჩამოხრჩობანა</div>
            <div class="nav-item" onclick="setR('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="nav-item" onclick="setR('🎵 მუსიკა', this)">🎵 მუსიკა</div>
            <div class="nav-item" onclick="setR('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        </div>
        <div style="padding: 20px; text-align: center; color: #444;" onclick="logout()">🚪 გასვლა</div>
    </div>

    <div id="chatBox"></div>

    <div class="input-zone" id="inputZone">
        <input type="text" id="mIn" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">➤</button>
    </div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let me = {}, room = '💬 ზოგადი ჩატი', dmId = null;

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return location.href="index.html";

        let { data: p } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
        me = { id: user.id, nick: p?.username || user.email.split('@')[0] };
        document.getElementById('myNick').innerText = me.nick;

        load();
        
        sb.channel('chat').on('postgres_changes',{event:'*',schema:'public',table:'messages'},(payload)=>{
            if(payload.new.receiver_id === me.id) document.getElementById('inboxDot').style.display = 'block';
            load();
        }).subscribe();
    }

    async function showInbox() {
        toggleMenu(); dmId = null;
        document.getElementById('inboxDot').style.display = 'none';
        document.getElementById('roomTitle').innerText = "💌 ინბოქსი";
        document.getElementById('inputZone').style.display = 'none';

        const { data } = await sb.from('messages').select('*').eq('receiver_id', me.id).order('created_at', {ascending: false});
        const box = document.getElementById('chatBox');
        
        const unique = [...new Map(data?.map(m => [m.user_id, m])).values()];
        box.innerHTML = unique.map(c => `
            <div class="inbox-card" onclick="openDM('${c.user_id}', '${c.username}')">
                <div class="av-circle">${c.username[0].toUpperCase()}</div>
                <div style="flex:1">
                    <div style="font-weight:bold; color:red">${c.username}</div>
                    <div style="font-size:12px; color:#555">${c.text.substring(0,30)}...</div>
                </div>
                <div style="font-size:10px; color:#333">${new Date(c.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
            </div>
        `).join('');
    }

    function openDM(uid, nick) {
        dmId = uid;
        room = 'dm_' + [me.id, uid].sort().join('_');
        document.getElementById('roomTitle').innerText = "✉️ ჩატი: " + nick;
        document.getElementById('inputZone').style.display = 'flex';
        load();
    }

    async function load() {
        if(document.getElementById('roomTitle').innerText === "💌 ინბოქსი") return;

        let query = sb.from('messages').select('*').eq('room', room);
        if (dmId) {
            query = query.or(`and(user_id.eq.${me.id},receiver_id.eq.${dmId}),and(user_id.eq.${dmId},receiver_id.eq.${me.id})`);
        } else {
            query = query.is('receiver_id', null);
        }

        const { data } = await query.order('created_at', { ascending: true });
        const box = document.getElementById('chatBox');
        box.innerHTML = (data || []).map(m => {
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            return `
                <div class="msg-row ${m.user_id === me.id ? 'me-row' : ''}">
                    <div class="msg ${m.user_id === me.id ? 'me' : ''}">
                        ${!dmId && m.user_id !== me.id ? `<b style="font-size:10px;color:red;display:block">${m.username}</b>` : ''}
                        ${m.text}
                        <span class="msg-time">${time}</span>
                    </div>
                </div>
            `;
        }).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('mIn'); if(!i.value.trim()) return;
        await sb.from('messages').insert([{ text: i.value, room: room, user_id: me.id, username: me.nick, receiver_id: dmId }]);
        i.value = "";
    }

    function setR(n, el) {
        dmId = null; room = n;
        document.getElementById('roomTitle').innerText = n;
        document.getElementById('inputZone').style.display = 'flex';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active'); toggleMenu(); load();
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function logout() { await sb.auth.signOut(); location.href="index.html"; }
    init();
</script>
</body>
</html>
