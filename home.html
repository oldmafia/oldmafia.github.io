<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - სრული ვერსია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* სტილები იგივე რჩება რაც წინა კოდში გვქონდა */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 300px; min-width: 300px; background: #0d0d0d; border-right: 2px solid red; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; z-index: 100; }
        .profile-section { padding: 20px; background: #151515; border-bottom: 1px solid #222; text-align: center; }
        .avatar-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid red; object-fit: cover; }
        .rooms-list { flex-grow: 1; overflow-y: auto; }
        .room-item { padding: 12px 20px; color: #ccc; cursor: pointer; border-bottom: 1px solid #111; display: flex; align-items: center; }
        .room-item:hover, .room-item.active { background: #1a0000; color: red; }
        .main-chat { flex-grow: 1; display: flex; flex-direction: column; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; gap: 10px; max-width: 85%; }
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid red; }
        .msg-bubble { background: #1a1a1a; padding: 10px; border-radius: 10px; font-size: 14px; }
        .me .msg-bubble { background: red; }
        .chat-input-bar { padding: 15px; background: #0d0d0d; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #222; color: #fff; outline: none; }
        @media (max-width: 800px) { .sidebar { position: fixed; left: -300px; height: 100%; } .sidebar.active { left: 0; } }
    </style>
</head>
<body>

<div class="app-container">
    <nav class="sidebar" id="sidebar">
        <div class="profile-section">
            <img src="" id="myImg" class="avatar-img">
            <p id="myNick" style="color:red; font-weight:bold;"></p>
            <span id="myStatusDisplay" style="font-size:11px; color:#888;"></span>
        </div>

        <div class="rooms-list">
            <div class="room-item active" onclick="changeRoom('💬', 'ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
            <div class="room-item" onclick="changeRoom('💎', 'VIP საუბრები', this)">💎 VIP საუბრები</div>
            <div class="room-item" onclick="changeRoom('🔍', 'გამოძიება', this)">🔍 გამოძიება</div>
            <div class="room-item" onclick="changeRoom('🔐', 'შიფროგრამა', this)">🔐 შიფროგრამა</div>
            <div class="room-item" onclick="changeRoom('🧩', 'ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="room-item" onclick="changeRoom('🪢', 'ჩამოხრჩობანა', this)">🪢 ჩამოხრჩობანა</div>
            <div class="room-item" onclick="changeRoom('🌑', 'მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="room-item" onclick="changeRoom('🎵', 'მუსიკა', this)">🎵 მუსიკა</div>
            <div class="room-item" onclick="changeRoom('🖼️', 'გალერეა', this)">🖼️ გალერეა</div>
            <div class="room-item" onclick="changeRoom('📝', 'ფორუმი', this)">📝 ფორუმი</div>
            <div class="room-item" onclick="changeRoom('🛡️', 'ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        </div>
    </nav>

    <main class="main-chat">
        <header style="padding:15px; border-bottom:1px solid red; display:flex; align-items:center;">
            <button onclick="document.getElementById('sidebar').classList.toggle('active')" style="background:red; color:white; border:none; padding:5px 10px; margin-right:10px;">☰</button>
            <h2 id="roomTitle" style="margin:0; font-size:16px; color:red;">💬 ზოგადი ჩატი</h2>
        </header>
        <div class="chat-messages" id="chatBox"></div>
        <div class="chat-input-bar">
            <input type="text" id="msgInp" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="background:red; border:none; color:white; padding:10px 20px; border-radius:20px;">➤</button>
        </div>
    </main>
</div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let me = { id: '', nick: '', avatar: '' };
    let currentRoom = 'ზოგადი ჩატი';

    async function init() {
        const { data: { user: auth } } = await sb.auth.getUser();
        if (!auth) { window.location.href = "index.html"; return; }
        
        let { data: p } = await sb.from('profiles').select('*').eq('id', auth.id).single();
        me = { id: auth.id, nick: p.username, avatar: p.avatar_url || 'https://via.placeholder.com/80' };

        document.getElementById('myNick').innerText = me.nick;
        document.getElementById('myImg').src = me.avatar;
        document.getElementById('myStatusDisplay').innerText = p.status || "";

        loadMessages();
        sb.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMessages()).subscribe();
    }

    async function loadMessages() {
        const { data } = await sb.from('messages').select('*').eq('room', currentRoom).order('created_at', { ascending: true });
        const box = document.getElementById('chatBox');
        box.innerHTML = data.map(m => `
            <div class="msg-row ${m.user_id === me.id ? 'me' : ''}">
                <img src="${m.avatar || 'https://via.placeholder.com/40'}" class="msg-avatar">
                <div class="msg-content">
                    <span style="font-size:10px; color:red;">${m.username}</span>
                    <div class="msg-bubble">${m.text}</div>
                </div>
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
        const inp = document.getElementById('msgInp');
        if (!inp.value.trim()) return;
        await sb.from('messages').insert([{ text: inp.value, room: currentRoom, user_id: me.id, username: me.nick, avatar: me.avatar }]);
        inp.value = "";
    }

    function changeRoom(icon, name, el) {
        currentRoom = name;
        document.getElementById('roomTitle').innerText = icon + " " + name;
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        loadMessages();
        if(window.innerWidth < 800) document.getElementById('sidebar').classList.remove('active');
    }

    init();
</script>
</body>
</html>
