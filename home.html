<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Old Mafia - Home</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: #050505; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .sidebar-avatar { width: 80px; height: 80px; border-radius: 12px; border: 2px solid red; margin: 0 auto 12px; background: #111 center/cover; }
        .user-name { color: red; font-weight: bold; font-size: 20px; }
        .menu-items { flex-grow: 1; overflow-y: auto; }
        .menu-item { padding: 13px 25px; color: #999; cursor: pointer; font-size: 14px; border-left: 4px solid transparent; }
        .menu-item.active { background: #1a0000; color: red; border-left: 4px solid red; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-bar { padding: 15px 25px; background: #0a0a0a; border-bottom: 1px solid #222; color: red; font-weight: bold; }
        .messages-area { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { background: #0d0d0d; padding: 12px; border-radius: 0 15px 15px 15px; border: 1px solid #1a1a1a; max-width: 80%; position: relative; }
        .msg-time { font-size: 11px; color: #444; float: right; margin-top: 4px; margin-left: 10px; }
        .bottom-bar { padding: 15px 20px; background: #0a0a0a; display: flex; gap: 12px; align-items: center; border-top: 1px solid #222; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; padding: 14px 20px; border-radius: 30px; color: #fff; outline: none; }
        
        /* ნამდვილი კლასიკური თვითმფრინავი */
        .send-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; }
        .send-btn svg { fill: #007bff; width: 40px; height: 40px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header" onclick="window.location.href='profile.html'">
        <div class="sidebar-avatar" id="uAvat"></div>
        <div id="uNick" class="user-name">იტვირთება...</div>
    </div>
    <div class="menu-items">
        <div class="menu-item active">☕ კაფე-ბარი</div>
        <div class="menu-item">👑 ვიპ საუბრები</div>
        <div class="menu-item">🕵️ გამოძიება</div>
        <div class="menu-item">🔐 შიფროგრამა</div>
        <div class="menu-item">❓ ვიქტორინა</div>
        <div class="menu-item">🪢 ჩამოხრჩობანა</div>
        <div class="menu-item">🌑 მაფიის ღამე</div>
        <div class="menu-item">🃏 ჯოკერი</div>
        <div class="menu-item">🎲 ნარდი</div>
        <div class="menu-item">🎵 მუსიკა</div>
        <div class="menu-item">😂 იუმორი</div>
        <div class="menu-item">🚀 კაიფმანია</div>
        <div class="menu-item">🛠️ ადმინისტრაცია</div>
        <div class="menu-item">❓ დახმარება</div>
        <div class="menu-item">📝 ფორუმი</div>
    </div>
</div>

<div class="main-content">
    <div class="top-bar" id="roomTitle">☕ კაფე-ბარი</div>
    <div class="messages-area" id="chatContainer"></div>
    <div class="bottom-bar">
        <input type="text" id="msgInput" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script>
    const client = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myProfile = null;
    let currentRoom = "☕ კაფე-ბარი";

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) return window.location.href = "index.html";

        const { data: profile } = await client.from('profiles').select('*').eq('id', session.user.id).single();
        if (profile) {
            myProfile = profile;
            document.getElementById('uNick').innerText = profile.username;
            if(profile.avatar_url) document.getElementById('uAvat').style.backgroundImage = `url('${profile.avatar_url}')`;
        }
        loadMessages();
    }

    async function loadMessages() {
        const { data } = await client.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const chat = document.getElementById('chatContainer');
        chat.innerHTML = "";
        if (data) data.forEach(displayMsg);
        chat.scrollTop = chat.scrollHeight;
    }

    function displayMsg(msg) {
        const chat = document.getElementById('chatContainer');
        const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const color = (myProfile && msg.username === myProfile.username) ? 'yellow' : 'red';
        
        chat.innerHTML += `
            <div class="msg">
                <div class="msg-bubble">
                    <b style="color:${color};">${msg.username}</b>
                    <span class="msg-time">${time}</span><br>
                    <span style="color:#eee;">${msg.text}</span>
                </div>
            </div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !myProfile) return;

        const { error } = await client.from('messages').insert([{ 
            text: text, 
            username: myProfile.username, 
            room_name: currentRoom,
            user_id: myProfile.id 
        }]);

        if (!error) {
            input.value = "";
            loadMessages();
        }
    }

    // ოთახების გადართვა
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            currentRoom = this.innerText.trim();
            document.getElementById('roomTitle').innerText = currentRoom;
            loadMessages();
        });
    });

    init();
</script>
</body>
</html>
