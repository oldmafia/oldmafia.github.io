<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - THE BOSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #050505; --card: #111; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; z-index: 1000; }
        .head-btn { font-size: 24px; color: var(--red); cursor: pointer; padding: 5px; }

        /* Side Panels */
        .side-panel { position: fixed; top: 0; height: 100%; background: #080808; z-index: 2000; transition: 0.3s; width: 280px; overflow-y: auto; padding: 20px; border: 1px solid var(--border); }
        #side-left { left: -280px; }
        #side-right { right: -280px; }
        .open-left { transform: translateX(280px); }
        .open-right { transform: translateX(-280px); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; backdrop-filter: blur(5px); }
        .active { display: block; }

        /* Rooms & Users */
        .room-item { padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; cursor: pointer; font-size: 14px; }
        .room-active { border-color: var(--red); background: #1a0505; color: var(--red); font-weight: bold; }
        .u-card { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--card); border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .u-ava { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; border: 1px solid #333; }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; position: absolute; left: 40px; bottom: 10px; border: 2px solid var(--card); }
        .section-title { color: var(--red); font-size: 11px; font-weight: bold; margin: 20px 0 10px; text-transform: uppercase; }

        /* Chat */
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg { display: flex; gap: 10px; max-width: 85%; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 12px 16px; background: var(--card); border-radius: 18px; font-size: 14px; border: 1px solid var(--border); }
        .msg.me .bubble { background: #300; border-color: #600; }

        /* Profile Modal */
        #prof-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 350px; background: #0a0a0a; border: 1px solid #333; border-radius: 30px; padding: 25px; z-index: 3000; text-align: center; }
        .p-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: #fff; font-size: 14px; }

        /* Input Bar */
        .input-box { padding: 15px; background: #000; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        #msg-in { flex: 1; background: #111; border: 1px solid #333; padding: 12px 20px; border-radius: 25px; color: #fff; outline: none; }
    </style>
</head>
<body>
    <div class="overlay" id="blur" onclick="closeAll()"></div>
    <div id="prof-modal"></div>

    <nav id="side-left" class="side-panel">
        <div class="section-title">🕵️ ოთახები</div>
        <div id="rooms-list"></div>
    </nav>

    <aside id="side-right" class="side-panel">
        <div class="section-title">👑 ადმინისტრაცია</div>
        <div id="staff-list"></div>
        <div class="section-title">👤 წევრები</div>
        <div id="members-list"></div>
    </aside>

    <header>
        <div class="head-btn" onclick="openMenu('left')">☰</div>
        <div id="room-title">💬 ზოგადი ჩატი</div>
        <div class="head-btn" onclick="openMenu('right')">👥</div>
    </header>

    <div id="chat-flow"></div>

    <div class="input-box">

        <input type="text" id="msg-in" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()" style="background:none; border:none; color:red; font-size:28px; cursor:pointer;">➤</button>
    </div>
