<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - OFFICIAL</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #0b0b0b; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #161616; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; min-height: 55px; }
        .logo { font-weight: bold; color: #cc0000; font-size: 18px; }

        /* ოთახების მენიუს გასწორება */
        .room-bar { 
            background: #1a1a1a; 
            padding: 10px; 
            display: flex; 
            gap: 8px; 
            overflow-x: auto; 
            border-bottom: 1px solid #222; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none;
        }
        .room-bar::-webkit-scrollbar { display: none; }
        
        .room-btn { 
            background: #2a2a2a; color: #bbb; border: 1px solid #333; padding: 8px 15px; 
            border-radius: 15px; cursor: pointer; white-space: nowrap; font-size: 13px; transition: 0.2s;
        }
        .room-btn.active { background: #cc0000; color: white; border-color: #ff0000; }

        #messageList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #000; }
        
        /* მესიჯის დიზაინი */
        .msg { background: #161616; padding: 10px; border-radius: 10px; border: 1px solid #222; width: 100%; max-width: 100%; }
        .msg-user { font-weight: bold; cursor: pointer; margin-right: 8px; }

        .input-area { background: #161616; padding: 12px; display: flex; gap: 8px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; outline: none; }
        .send-btn { background: #cc0000; color: white; border: none; padding: 0 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">OLD MAFIA</div>
    <button onclick="window.location.href='user.html'" style="background:#333; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:12px;">პროფილი 👤</button>
</header>

<div class="room-bar">
    <button class="room-btn active" onclick="switchRoom('ზოგადი ჩატი')">ზოგადი ჩატი</button>
    <button class="room-btn" onclick="switchRoom('ვიპ საუბრები')">ვიპ საუბრები</button>
    <button class="room-btn" onclick="switchRoom('გამოძიება')">გამოძიება</button>
    <button class="room-btn" onclick="switchRoom('შიფროგრამა')">შიფროგრამა</button>
    <button class="room-btn" onclick="switchRoom('ვიქტორეინა')">ვიქტორეინა</button>
    <button class="room-btn" onclick="switchRoom('ჩამოხრჩობანა')">ჩამოხრჩობანა</button>
    <button class="room-btn" onclick="switchRoom('მაფიის ღამე')">მაფიის ღამე</button>
    <button class="room-btn" onclick="switchRoom('ჯოკერი')">ჯოკერი</button>
    <button class="room-btn" onclick="switchRoom('ნარდი')">ნარდი</button>
    <button class="room-btn" onclick="switchRoom('მუსიკა')">მუსიკა</button>
    <button class="room-btn" onclick="switchRoom('იუმორი')">იუმორი</button>
    <button class="room-btn" onclick="switchRoom('ადმინისტრაცია')">ადმინისტრაცია</button>
    <button class="room-btn" onclick="switchRoom('დახმარება')">დახმარება</button>
    <button class="room-btn" onclick="switchRoom('ფორუმი')">ფორუმი</button>
    <button class="room-btn" onclick="logout()" style="color:#ff4444;">გასვლა 🚪</button>
</div>

<div id="messageList"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">გაგზავნა</button>
</div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co"; 
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let currentRoom = 'ზოგადი ჩატი';
    let myUser = null;

    async function init() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return window.location.href = 'index.html';
        
        const { data: p } = await supabase.from('profiles').select('username, role').eq('id', user.id).maybeSingle();
        myUser = { id: user.id, username: p?.username || 'Guest', role: p?.role || 'user' };
        
        loadMsgs();
        
        // რეალურ დროში განახლება (Realtime)
        supabase.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
            if (payload.new.room_name === currentRoom) {
                appendMsg(payload.new);
            }
        }).subscribe();
    }

    async function loadMsgs() {
        const { data: msgs } = await supabase.from('messages').select('*').eq('room_name', currentRoom).order('id', { ascending: true }).limit(50);
        const list = document.getElementById('messageList');
        list.innerHTML = '';
        if (msgs) msgs.forEach(m => appendMsg(m));
        list.scrollTop = list.scrollHeight;
    }

    function appendMsg(m) {
        const list = document.getElementById('messageList');
        const isMe = (m.username === 'abu007');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<span class="msg-user" style="color:${isMe ? 'red' : '#00ccff'}" onclick="window.location.href='user.html?id=${m.user_id}'">${m.username}:</span> <span>${m.text}</span>`;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !myUser) return;
        
        input.value = ''; // ეგრევე ვასუფთავებთ, რომ სწრაფად გამოჩნდეს
        const { error } = await supabase.from('messages').insert([{ 
            user_id: myUser.id, username: myUser.username, text: text, room_name: currentRoom 
        }]);
        
        if (error) alert("შეცდომა: " + error.message);
    }

    function switchRoom(name) {
        currentRoom = name;
        document.querySelectorAll('.room-btn').forEach(b => b.classList.toggle('active', b.innerText === name));
        loadMsgs();
    }

    async function logout() {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
    }

    init();
</script>
</body>
</html>
