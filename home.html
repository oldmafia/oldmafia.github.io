<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .header { height: 60px; background: #000; border-bottom: 2px solid red; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1001; }
        .burger, .pm-trigger { color: red; font-size: 28px; cursor: pointer; }
        #roomTitle { font-size: 13px; font-weight: bold; text-transform: uppercase; color: #fff; }

        /* Messages */
        #msgList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg-bubble { padding: 10px 14px; border-radius: 12px; max-width: 85%; background: #111; border: 1px solid #222; align-self: flex-start; }
        .msg-bubble.is-me { border: 1px solid red; align-self: flex-end; background: #0a0a0a; }
        .u-name { color: #ff4d4d; font-size: 11px; font-weight: bold; display: block; margin-bottom: 4px; }
        .msg-time { color: #444; font-size: 9px; float: right; margin-top: 5px; margin-left: 8px; }

        /* Inbox Style */
        .inbox-item { padding: 15px; background: #111; border-radius: 10px; border-left: 4px solid red; margin-bottom: 10px; cursor: pointer; display: flex; flex-direction: column; }
        .inbox-nick { color: red; font-weight: bold; margin-bottom: 5px; }

        /* Input */
        .input-area { padding: 12px; background: #000; border-top: 1px solid red; display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid red; border-radius: 25px; padding: 0 15px; height: 45px; display: flex; align-items: center; }
        input { width: 100%; border: none; background: transparent; color: #fff; outline: none; font-size: 16px; }
        .send-btn { background: red; color: #000; width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; }

        /* Sidebar */
        #sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #000; transition: 0.3s; z-index: 2000; overflow-y: auto; border-right: 2px solid red; }
        #sidebar.open { left: 0; }
        .room-item { padding: 16px 25px; border-bottom: 1px solid #111; color: #ccc; cursor: pointer; }
        .room-item.active { color: red; font-weight: bold; background: #080808; border-left: 5px solid red; }
    </style>
</head>
<body>

    <div class="header">
        <div class="burger" onclick="toggleMenu()">☰</div>
        <div id="roomTitle">💬 კაიფმანია</div>
        <div class="pm-trigger" onclick="openInbox()">📩</div>
    </div>

    <div id="sidebar">
        <div style="padding: 20px; color: red; text-align: right;" onclick="toggleMenu()">✕ დახურვა</div>
        <div class="room-item active" onclick="changeRoom('💬 კაიფმანია', this)">💬 კაიფმანია</div>
        <div class="room-item" onclick="changeRoom('🍷 კაფე-ბარი', this)">🍷 კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('🔐 VIP-საუბრები', this)">🔐 VIP-საუბრები</div>
        <div class="room-item" onclick="changeRoom('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('🔓 შიფროგრამა', this)">🔓 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('⚜️ ნარდი', this)">⚜️ ნარდი</div>
        <div class="room-item" onclick="changeRoom('💖 სიყვარული', this)">💖 სიყვარული</div>
        <div class="room-item" onclick="changeRoom('🤣 იუმორი', this)">🤣 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🎵 მელომანია', this)">🎵 მელომანია</div>
        <div class="room-item" onclick="changeRoom('📜 ფორუმი', this)">📜 ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('🆘 SOS', this)">🆘 SOS</div>
    </div>

    <div id="msgList"></div>

    <div class="input-area">
        <div class="input-box"><input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." autocomplete="off"></div>
        <button class="send-btn" onclick="sendMsg()">✈️</button>
    </div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let myId, myName, currentRoom = '💬 კაიფმანია', isInbox = false;

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;

        // რეგისტრაციის ნამდვილი ნიკის წამოღება (user_metadata-დან)
        myName = user.user_metadata?.username || user.user_metadata?.display_name || user.email.split('@')[0];

        loadMsgs();
        
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (payload) => {
            if(!isInbox && payload.new.room_name === currentRoom && !payload.new.receiver_id) {
                if(payload.new.user_id !== myId) appendMsg(payload.new);
            }
        }).subscribe();
    }

    async function loadMsgs() {
        const list = document.getElementById('msgList');
        list.innerHTML = "";
        
        if (isInbox) {
            // პირადი ყუთი - ნიკების სია
            const { data: pms } = await client.from('messages').select('*').eq('receiver_id', myId).order('created_at', { ascending: false });
            list.innerHTML = pms?.map(m => `
                <div class="inbox-item">
                    <span class="inbox-nick">${m.username}</span>
                    <span style="font-size:13px; color:#888;">${m.text}</span>
                </div>
            `).join('') || "ცარიელია";
        } else {
            const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).is('receiver_id', null).order('created_at', { ascending: true }).limit(50);
            list.innerHTML = msgs?.map(m => renderMsg(m)).join('') || "";
        }
        list.scrollTop = list.scrollHeight;
    }

    function renderMsg(m) {
        const isMe = m.user_id === myId;
        const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `
            <div class="msg-bubble ${isMe ? 'is-me' : ''}">
                <span class="u-name">${m.username}</span>
                <span>${m.text}</span>
                <span class="msg-time">${time}</span>
            </div>`;
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim()) return;

        const { error } = await client.from('messages').insert([{ 
            user_id: myId, 
            username: myName, 
            text: inp.value, 
            room_name: currentRoom 
        }]);
        
        if(!error) {
            appendMsg({ user_id: myId, username: myName, text: inp.value, created_at: new Date() });
            inp.value = '';
        }
    }

    function appendMsg(m) {
        const list = document.getElementById('msgList');
        list.innerHTML += renderMsg(m);
        list.scrollTop = list.scrollHeight;
    }

    function openInbox() { isInbox = true; document.getElementById('roomTitle').innerText = "📥 პირადი ყუთი"; loadMsgs(); }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function changeRoom(name, el) {
        isInbox = false; currentRoom = name;
        document.getElementById('roomTitle').innerText = name;
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        toggleMenu(); loadMsgs();
    }

    init();
</script>
</body>
</html>
