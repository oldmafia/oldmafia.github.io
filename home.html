<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia Online</title>
    <style>
        /* --- CSS დიზაინი (შენი ფერები) --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000; /* შავი ფონი */
            color: white;
            overflow-x: hidden;
        }

        /* გვერდის მთავარი კონტენტი */
        .main-content {
            margin-left: 0;
            transition: 0.3s;
            padding: 20px;
            text-align: center;
        }

        /* სექცია სადაც ჩატი გამოჩნდება */
        #chat-window {
            height: 80vh;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 10px;
            margin-top: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
        }

        /* --- SIDEBAR (მენიუ) --- */
        .sidebar {
            height: 100%;
            width: 0; /* თავიდან დაკეტილია */
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: #0d0d0d;
            overflow-x: hidden;
            transition: 0.4s;
            border-right: 2px solid #ff0000; /* შენი წითელი ხაზი */
            box-shadow: 5px 0 15px rgba(255, 0, 0, 0.2);
        }

        .sidebar-header {
            padding: 25px 10px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .sidebar-header h2 {
            color: #ff0000;
            margin: 0;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .menu-list {
            padding: 10px 0;
        }

        .menu-item {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 16px;
            color: #ccc;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
            transition: 0.3s;
        }

        .menu-item:hover {
            background: #1a1a1a;
            color: #ff0000;
            padding-left: 35px;
        }

        .menu-item .icon {
            margin-right: 15px;
            font-size: 18px;
            width: 25px;
            text-align: center;
        }

        /* განსაკუთრებული ღილაკი: მაფიის ღამე */
        .special-item {
            background: linear-gradient(90deg, #0d0d0d 0%, #2b0000 100%);
            color: #ff4d4d;
            font-weight: bold;
        }

        /* გასვლის ღილაკი ქვემოთ */
        .logout-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            border-top: 1px solid #222;
        }

        .logout-btn {
            color: #ff3333 !important;
        }

        /* მენიუს გახსნის ღილაკი */
        .open-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            font-size: 24px;
            background: #ff0000;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 999;
        }

    </style>
</head>
<body>

    <button class="open-btn" onclick="toggleSidebar()">☰</button>

    <div id="mySidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>MAFIA ROOMS</h2>
        </div>
        
        <div class="menu-list">
            <a href="#" class="menu-item"><span class="icon">💬</span> ზოგადი ჩატი</a>
            <a href="#" class="menu-item"><span class="icon">💎</span> VIP საუბრები</a>
            <a href="#" class="menu-item"><span class="icon">🔍</span> გამოძიება</a>
            <a href="#" class="menu-item"><span class="icon">🔐</span> შიფროგრამა</a>
            <a href="#" class="menu-item"><span class="icon">🧩</span> ვიქტორინა</a>
            <a href="#" class="menu-item"><span class="icon">🪢</span> ჩამოხრჩობანა</a>
            
            <a href="#" class="menu-item special-item"><span class="icon">🌑</span> მაფიის ღამე</a>
            
            <a href="#" class="menu-item"><span class="icon">🎵</span> მუსიკა</a>
            <a href="#" class="menu-item"><span class="icon">🖼️</span> გალერეა</a>
            <a href="#" class="menu-item"><span class="icon">📝</span> ფორუმი</a>
            <a href="#" class="menu-item"><span class="icon">🛡️</span> ადმინისტრაცია</a>
        </div>

        <div class="logout-area">
            <a href="#" class="menu-item logout-btn"><span class="icon">🚪</span> გასვლა</a>
        </div>
    </div>

    <div class="main-content" id="main">
        <h3 id="room-title">აირჩიე ოთახი მენიუდან</h3>
        <div id="chat-window">
            აქ გამოჩნდება შეტყობინებები...
        </div>
    </div>

    <script>
        let sidebarOpen = false;

        function toggleSidebar() {
            const sidebar = document.getElementById("mySidebar");
            const main = document.getElementById("main");

            if (!sidebarOpen) {
                sidebar.style.width = "280px";
                // თუ გინდა კონტენტიც გადაიწიოს, ეს ჩართე:
                // main.style.marginLeft = "280px"; 
                sidebarOpen = true;
            } else {
                sidebar.style.width = "0";
                main.style.marginLeft = "0";
                sidebarOpen = false;
            }
        }

        // მენიუს დახურვა ეკრანზე დაჭერისას (ტელეფონისთვის მოსახერხებელია)
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById("mySidebar");
            const btn = document.querySelector(".open-btn");
            if (sidebarOpen && !sidebar.contains(event.target) && event.target !== btn) {
                toggleSidebar();
            }
        });
    </script>

</body>
</html>
