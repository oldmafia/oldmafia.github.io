<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>კაიფმანია 🕶️</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #cc0000; --dark-bg: #080808; --panel-bg: #121212; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; height: 100vh; display: flex; background: var(--dark-bg); color: #ccc; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 280px; min-width: 280px; background: #000; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; overflow-y: auto; transition: 0.3s; }
        .sidebar-header { padding: 20px; font-size: 22px; font-weight: bold; text-align: center; color: var(--main-red); border-bottom: 1px solid #1a1a1a; }
        .menu-item { padding: 12px; margin: 3px 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #888; font-size: 14px; }
        .menu-item.active { background: #111; color: var(--main-red); border-left: 3px solid var(--main-red); }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; top: 0; height: 100%; z-index: 1000; }
            .sidebar.open { left: 0; box-shadow: 5px 0 15px rgba(0,0,0,0.8); }
            .menu-btn { display: block !important; }
        }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-nav { height: 60px; background: #000; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .menu-btn { display: none; font-size: 24px; background: none; border: none; color: var(--main-red); cursor: pointer; }
        .user-info { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .nav-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--main-red); object-fit: cover; }

        /* Messages */
        #messageList { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-box { background: var(--panel-bg); padding: 12px; border-radius: 12px; border: 1px solid #1a1a1a; max-width: 85%; align-self: flex-start; }
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .msg-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        .username { color: var(--main-red); font-weight: bold; font-size: 13px; cursor: pointer; }
        .del-btn { color: #555; font-size: 10px; margin-left: auto; cursor: pointer; transition: 0.2s; }
        .del-btn:hover { color: red; }
        .msg-text { font-size: 14px; color: #eee; padding-left: 36px; word-break: break-word; }

        .input-area { padding: 15px; background: #000; border-top: 1px solid #1a1a1a; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; background: #050505; border: 1px solid #222; color: #fff; border-radius: 8px; outline: none; }
        .send-btn { background: var(--main-red); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">კაიფმანია 🕶️</div>
        <div id="roomList">
            <div class="menu-item active" onclick="changeRoom('ზოგადი ჩატი', '💬')">💬 ზოგადი ჩატი</div>
            <div class="menu-item" onclick="changeRoom('ვიპ საუბრები', '💎')">💎 ვიპ საუბრები</div>
            <div class="menu-item" onclick="changeRoom('გამოძიება', '🔍')">🔍 გამოძიება</div>
            <div class="menu-item" onclick="changeRoom('შიფროგრამა', '🔐')">🔐 შიფროგრამა</div>
            <div class="menu-item" onclick="changeRoom('ვიქტორინა', '🧠')">🧠 ვიქტორინა</div>
            <div class="menu-item" onclick="changeRoom('ჩამოხრჩობანა', '💀')">💀 ჩამოხრჩობანა</div>
            <div class="menu-item" onclick="changeRoom('მაფიის ღამე', '🕵️‍♂️')">🕵️‍♂️ მაფიის ღამე</div>
            <div class="menu-item" onclick="changeRoom('ჯოკერი', '🃏')">🃏 ჯოკერი</div>
            <div class="menu-item" onclick="changeRoom('ნარდი', '🎲')">🎲 ნარდი</div>
            <div class="menu-item" onclick="changeRoom('მუსიკა', '🎵')">🎵 მუსიკა</div>
            <div class="menu-item" onclick="changeRoom('იუმორი', '😂')">😂 იუმორი</div>
            <div class="menu-item" style="color: gold;" onclick="changeRoom('ადმინისტრაცია', '🛡️')">🛡️ ადმინისტრაცია</div>
            <div class="menu-item" onclick="changeRoom('დახმარება', '🆘')">🆘 დახმარება</div>
            <div class="menu-item" onclick="changeRoom('ფორუმი', '🏛️')">🏛️ ფორუმი</div>
            <div class="menu-item" style="color: #ff4444;" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div id="roomTitle" style="font-weight:bold;">💬 ზოგადი ჩატი</div>
            <div class="user-info" id="myProfileLink">
                <img id="navAvatar" class="nav-avatar" src="https://api.dicebear.com/7.x/identicon/svg?seed=abu">
                <div id="userDisplay" style="color:var(--main-red); font-weight:bold;">...</div>
            </div>
        </div>
        <div id="messageList"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">✈️</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let myData = { id: '', nick: '', avatar: '', role: 'user' };

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = "index.html";

            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
            myData.id = user.id;

            // ადმინის იდენტიფიკაცია
            if (user.email === 'to222ji@gmail.com') {
                myData.nick = 'abu007';
                myData.role = 'owner';
            } else {
                myData.nick = profile?.username || 'Guest';
                myData.role = profile?.role || 'user';
            }

            myData.avatar = profile?.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${myData.nick}`;
            document.getElementById('userDisplay').innerHTML = (myData.role === 'owner') ? `👑 ${myData.nick}` : myData.nick;
            document.getElementById('navAvatar').src = myData.avatar;
            document.getElementById('myProfileLink').onclick = () => window.location.href = `user.html?id=${myData.id}`;

            loadMsgs();
            supabaseClient.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMsgs()).subscribe();
        }

        async function loadMsgs() {
            const { data: msgs } = await supabaseClient.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
            const list = document.getElementById('messageList');
            list.innerHTML = '';

            msgs?.forEach(msg => {
                const isOwnerMsg = (msg.username === 'abu007');
                const showDel = (myData.role === 'owner'); // მხოლოდ შენ ხედავ წაშლას
                
                const div = document.createElement('div');
                div.className = 'msg-box';
                div.innerHTML = `
                    <div class="msg-header">
                        <img src="${msg.avatar_url || 'https://api.dicebear.com/7.x/identicon/svg?seed='+msg.username}" class="msg-avatar">
                        <span class="username" onclick="window.location.href='user.html?id=${msg.user_id}'">
                            ${isOwnerMsg ? '👑' : ''} ${msg.username}
                        </span>
                        ${showDel ? `<span class="del-btn" onclick="delMsg(${msg.id})">წაშლა</span>` : ''}
                    </div>
                    <div class="msg-text">${msg.text}</div>
                `;
                list.appendChild(div);
            });
            list.scrollTop = list.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            await supabaseClient.from('messages').insert([{ 
                username: myData.nick, text: input.value, room_name: currentRoom, user_id: myData.id, avatar_url: myData.avatar 
            }]);
            input.value = '';
        }

        async function delMsg(id) {
            if (!confirm("ნამდვილად გსურს წაშლა?")) return;
            await supabaseClient.from('messages').delete().eq('id', id);
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

        function changeRoom(name, icon) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = `${icon} ${name}`;
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if(window.innerWidth <= 768) toggleMenu();
            loadMsgs();
        }

        async function logout() { await supabaseClient.auth.signOut(); window.location.href = "index.html"; }
        init();
    </script>
</body>
</html>
