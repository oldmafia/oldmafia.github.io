<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - FINAL FIXED</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #0a0a0a; --blue: #00a2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ზედა ბარი */
        .navbar { height: 60px; background: #111; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #222; justify-content: space-between; z-index: 1000; }
        .menu-btn { cursor: pointer; font-size: 24px; color: var(--red); display: flex; align-items: center; gap: 10px; }
        .active-room-name { font-weight: bold; color: white; }

        /* ჩამოსაშლელი მენიუ */
        .dropdown-menu { 
            position: absolute; top: -100%; left: 0; width: 100%; background: #111; 
            transition: 0.4s ease; z-index: 999; border-bottom: 2px solid var(--red);
            max-height: 70vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .dropdown-menu.open { top: 60px; }

        .room-item { padding: 15px 25px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .room-item:hover { background: #1a1a1a; }
        .room-item span { font-size: 1.1rem; }
        .room-item.exit { color: #ff4444; border-top: 1px solid #333; }

        /* ჩატი */
        #chat-box { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .m-wrap { align-self: flex-start; max-width: 85%; }
        .m-nick { font-size: 11px; color: var(--red); font-weight: bold; margin-left: 5px; margin-bottom: 2px; }
        .m-bubble { background: #1a1a1a; border: 1px solid #333; padding: 10px 15px; border-radius: 0 15px 15px 15px; position: relative; min-width: 120px; }
        .m-text { font-size: 15px; color: #eee; padding-bottom: 15px; }
        .m-time { position: absolute; bottom: 5px; right: 10px; font-size: 10px; color: #555; }

        /* ინპუტი */
        .bottom-bar { padding: 15px; background: #111; display: flex; align-items: center; gap: 10px; border-top: 1px solid #222; }
        .input-wrap { flex-grow: 1; background: #000; border-radius: 30px; border: 1px solid #333; padding: 5px 15px; }
        input { width: 100%; background: transparent; border: none; padding: 8px; color: white; outline: none; font-size: 16px; }

        /* ✈️ ნამდვილი თვითმფრინავის SVG */
        .plane-send { width: 45px; height: 45px; cursor: pointer; fill: var(--blue); transition: 0.3s; }
        .plane-send:hover { transform: scale(1.1) rotate(-5deg); filter: drop-shadow(0 0 5px var(--blue)); }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="menu-btn" onclick="toggleMenu()">
            <span>☰</span>
            <span class="active-room-name" id="currentRoom">კაფე-ბარი</span>
        </div>
        <div id="user-info" style="font-size: 12px; color: #888;"></div>
    </div>

    <div class="dropdown-menu" id="menu">
        <div class="room-item" onclick="changeRoom('კაიფმანია', '✨')"><span>✨</span> კაიფმანია</div>
        <div class="room-item" onclick="changeRoom('კაფე-ბარი', '☕')"><span>☕</span> კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('ვიპ საუბრები', '👑')"><span>👑</span> ვიპ საუბრები</div>
        <div class="room-item" onclick="changeRoom('გამოძიება', '🔍')"><span>🔍</span> გამოძიება</div>
        <div class="room-item" onclick="changeRoom('შიფროგრამა', '⌨')"><span>⌨</span> შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('ვიქტორინა', '💡')"><span>💡</span> ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('ჩამოხრჩობანა', '😵')"><span>😵</span> ჩამოხრჩობანა</div>
        <div class="room-item" onclick="changeRoom('მაფიის ღამე', '🌑')"><span>🌑</span> მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('ჯოკერი', '♠')"><span>♠</span> ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('ნარდი', '🎲')"><span>🎲</span> ნარდი</div>
        <div class="room-item" onclick="changeRoom('მუსიკა', '🎵')"><span>🎵</span> მუსიკა</div>
        <div class="room-item" onclick="changeRoom('იუმორი', '😂')"><span>😂</span> იუმორი</div>
        <div class="room-item" onclick="changeRoom('ადმინისტრაცია', '🛡')"><span>🛡</span> ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('დახმარება', '❓')"><span>❓</span> დახმარება</div>
        <div class="room-item" onclick="changeRoom('ფორუმი', '📝')"><span>📝</span> ფორუმი</div>
        <div class="room-item exit" onclick="exitChat()"><span>🚪</span> გასვლა</div>
    </div>

    <div id="chat-box"></div>

    <div class="bottom-bar">
        <div class="input-wrap"><input type="text" id="msgIn" placeholder="დაწერე შეტყობინება..."></div>
        <svg id="sendBtn" class="plane-send" viewBox="0 0 512 512">
            <path d="M499.7 31.2c-15.5-11-34.7-10.7-50 1L23.4 300.7c-21.7 15.6-25.2 45.1-7.8 65.4l82.8 96.6c13.2 15.4 33.1 22.8 53.1 19.8l293.9-44.1c11.7-1.8 22.2-7.8 29.8-16.8L506.7 66.8c11-12.9 8.2-32.3-7-35.6zM212.7 334.3l-28.1 82.2c-1.8 5.4-9.3 5.3-10.9-.1L141.1 315c-1.1-3.6 .3-7.5 3.3-9.7l170-120c4-2.8 8.9 1.9 6.2 5.8l-107.9 143.2z"/>
        </svg>
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let activeRoom = "კაფე-ბარი";
        let myNick = "სტუმარი";

        function toggleMenu() { document.getElementById('menu').classList.toggle('open'); }

        function changeRoom(name, icon) {
            activeRoom = name;
            document.getElementById('currentRoom').innerText = icon + " " + name;
            toggleMenu();
            loadMessages();
        }

        async function exitChat() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                myNick = session.user.user_metadata.nickname || "User";
                document.getElementById('user-info').innerText = "მოგესალმებით, " + myNick;
            }
            loadMessages();
        }

        async function loadMessages() {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            const { data } = await supabaseClient.from('messages').select('*').eq('room_name', activeRoom).order('created_at', { ascending: true });
            if (data) data.forEach(renderMsg);
        }

        function renderMsg(m) {
            const box = document.getElementById('chat-box');
            const time = new Date(m.created_at).toLocaleTimeString('ka-GE', {hour:'2-digit', minute:'2-digit'});
            const wrap = document.createElement('div');
            wrap.className = 'm-wrap';
            wrap.innerHTML = `<div class="m-nick">${m.username}</div><div class="m-bubble"><div class="m-text">${m.text}</div><div class="m-time">${time}</div></div>`;
            box.appendChild(wrap);
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const inp = document.getElementById('msgIn');
            if(!inp.value.trim()) return;
            const text = inp.value; inp.value = "";
            await supabaseClient.from('messages').insert([{ text, room_name: activeRoom, username: myNick }]);
        }

        document.getElementById('sendBtn').onclick = send;
        document.getElementById('msgIn').onkeypress = (e) => { if(e.key==='Enter') send(); };

        supabaseClient.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
            if(p.new.room_name === activeRoom) renderMsg(p.new);
        }).subscribe();

        init();
    </script>
</body>
</html>
