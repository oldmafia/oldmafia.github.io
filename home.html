<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩათი & დრო</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* მენიუს კონტეინერი */
        .chat-container {
            background: #111;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        /* მესიჯების ველი */
        #chat-box {
            height: 200px;
            overflow-y: auto;
            border-bottom: 1px solid #333;
            margin-bottom: 15px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ერთი მესიჯის სტილი */
        .message {
            background: #222;
            padding: 8px 12px;
            border-radius: 10px;
            border-left: 3px solid #ff0000;
            font-size: 14px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        /* დროის სტილი მესიჯში */
        .msg-time {
            font-size: 10px;
            color: #888;
            float: right;
            margin-top: 5px;
            margin-left: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ინპუტი */
        #user-input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 10px;
            outline: none;
        }

        /* გაგზავნის ღილაკი თვითმფრინავით */
        .send-btn {
            width: 100%;
            background: #ff0000;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .send-btn i {
            font-size: 18px;
            transition: 0.4s;
        }

        .send-btn:hover {
            box-shadow: 0 0 15px #ff0000;
        }

        .send-btn:hover i {
            transform: translate(10px, -10px) rotate(-15deg);
        }

    </style>
</head>
<body>

    <h2 style="text-shadow: 0 0 10px red;">კაიფმანია 😎🔥</h2>

    <div class="chat-container">
        <div id="chat-box">
            <div class="message">გამარჯობა! მოგვწერე რამე... <span class="msg-time">00:00</span></div>
        </div>

        <input type="text" id="user-input" placeholder="ჩაწერე მესიჯი..." onkeypress="checkEnter(event)">

        <button class="send-btn" onclick="sendMessage()">
            გაგზავნა <i class="fas fa-plane-departure"></i>
        </button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            
            if (input.value.trim() === "") return;

            // დროის ამოღება
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const timeString = hours + ":" + minutes;

            // ახალი მესიჯის შექმნა
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.innerHTML = `
                ${input.value}
                <span class="msg-time">${timeString}</span>
            `;

            // ჩათში დამატება
            chatBox.appendChild(messageDiv);
            
            // გასუფთავება და სქროლი ბოლოში
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Enter-ზე რომ გაიგზავნოს
        function checkEnter(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>

</body>
</html>
