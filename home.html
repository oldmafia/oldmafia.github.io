<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - მთავარი</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --dark-red: #4a0000; 
            --bright-red: #ff0000; 
            --gold: #ffd700; 
            --admin-blue: #00e5ff; 
            --online-green: #00ff00;
        }
        * { box-sizing: border-box; }
        body { 
            background: radial-gradient(circle, #0a0000 0%, #000000 100%); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        /* Topbar */
        .topbar { 
            height: 60px; 
            background: rgba(0,0,0,0.9); 
            border-bottom: 2px solid var(--dark-red); 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            justify-content: space-between;
            z-index: 1000;
        }
        .logo { font-weight: bold; color: var(--bright-red); letter-spacing: 2px; font-size: 18px; }

        /* Hamburger Icon (Right Side) */
        .hamburger { 
            font-size: 30px; 
            color: var(--online-green); 
            cursor: pointer; 
            transition: 0.3s;
        }

        /* Main Welcome Area */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(2, 150px);
            gap: 20px;
            margin-top: 30px;
        }
        .room-btn {
            background: #050000;
            border: 1px solid var(--dark-red);
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            font-size: 14px;
        }
        .room-btn:hover { border-color: var(--bright-red); background: #1a0000; transform: translateY(-5px); }
        .room-btn i { font-size: 24px; display: block; margin-bottom: 10px; }

        /* Sidebar Right (Online Users) */
        .sidebar-right { 
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%; 
            background: #050000; border-left: 2px solid var(--dark-red); 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 3000;
            display: flex; flex-direction: column;
        }
        .sidebar-right.active { right: 0; }
        
        .sidebar-header {
            padding: 25px 20px; text-align: center; font-weight: bold; color: var(--online-green);
            border-bottom: 1px solid #111; font-size: 14px;
        }

        .sidebar-content { flex: 1; overflow-y: auto; padding-bottom: 30px; }

        .category-title { 
            padding: 12px 15px; font-size: 10px; font-weight: bold; 
            text-transform: uppercase; color: #444; background: #080000; display: block;
        }

        .user-row { 
            display: flex; align-items: center; gap: 12px; padding: 10px 15px; 
            cursor: pointer; transition: 0.2s; 
        }
        .user-row:hover { background: #110000; }
        .user-row img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #222; object-fit: cover; }
        
        .name-owner { color: var(--gold); font-weight: bold; }
        .name-admin { color: var(--admin-blue); font-weight: bold; }
        .name-user { color: white; }

        /* Overlay */
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 2500; backdrop-filter: blur(3px);
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="topbar">
    <div class="logo">OLD MAFIA</div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
</div>

<div class="hero">
    <h1 style="color:white; font-size: 24px;">მოგესალმებით ოჯახში</h1>
    <p style="color:#666; font-size: 14px;">აირჩიეთ ოთახი</p>
    
    <div class="rooms-grid">
        <a href="chat.html" class="room-btn">☕<br>კაფე-ბარი</a>
        <a href="chat.html?room=Mafia" class="room-btn">🔫<br>მაფია</a>
        <a href="archive.html" class="room-btn">📂<br>არქივი</a>
        <a href="profile.html" class="room-btn">👤<br>პროფილი</a>
    </div>
</div>

<div class="sidebar-right" id="sidebar">
    <div class="sidebar-header">🟢 ახლა საიტზე</div>
    <div class="sidebar-content">
        <span class="category-title">👑 დამფუძნებლები</span>
        <div id="list-owner"></div>

        <span class="category-title">🛡️ ადმინისტრაცია</span>
        <div id="list-admin"></div>

        <span class="category-title">👤 წევრები</span>
        <div id="list-user"></div>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        if(document.getElementById('sidebar').classList.contains('active')) loadOnlineUsers();
    }

    async function loadOnlineUsers() {
        const now = new Date();
        const fiveMinAgo = new Date(now.getTime() - 5 * 60 * 1000).toISOString();

        const { data: users, error } = await _s
            .from('profiles')
            .select('*')
            .gt('last_online', fiveMinAgo);

        if (error) return;

        const lists = {
            'Owner': document.getElementById('list-owner'),
            'Admin': document.getElementById('list-admin'),
            'User': document.getElementById('list-user')
        };

        Object.values(lists).forEach(l => l.innerHTML = "");

        users?.forEach(u => {
            const role = u.role || 'User';
            const row = `
                <div class="user-row" onclick="location.href='profile.html?user=${u.username}'">
                    <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" 
                         style="border-color: ${role === 'Owner' ? 'var(--gold)' : (role === 'Admin' ? 'var(--admin-blue)' : '#0f0')}">
                    <div class="name-${role.toLowerCase()}">${u.username}</div>
                </div>`;
            
            if (lists[role]) lists[role].innerHTML += row;
            else lists['User'].innerHTML += row;
        });

        Object.keys(lists).forEach(r => {
            if (!lists[r].innerHTML) lists[r].innerHTML = "<div style='padding:10px 15px; color:#222; font-size:11px;'>არავინაა</div>";
        });
    }

    // განახლება ყოველ 30 წამში
    setInterval(() => {
        if (document.getElementById('sidebar').classList.contains('active')) loadOnlineUsers();
    }, 30000);
</script>

</body>
</html>
