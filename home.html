<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA - FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #111; border-bottom: 1px solid red; text-align: center; color: red; font-weight: bold; }
        
        /* მესიჯები - ყველაფერი მარცხნივ */
        #chat { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .m-line { background: #111; border-left: 3px solid red; padding: 10px; border-radius: 0 10px 10px 10px; max-width: 90%; align-self: flex-start; }
        .m-user { color: #888; font-size: 11px; font-weight: bold; display: block; margin-bottom: 3px; }
        .m-text { color: #ccc; font-size: 14px; word-break: break-all; }

        /* წერის ზონა */
        .input-box { padding: 10px; background: #111; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 5px; outline: none; }
        button { background: red; color: white; border: none; padding: 0 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header>🕵️ OLD MAFIA CHAT</header>
    <div id="chat">იტვირთება...</div>
    <div class="input-box">
        <input type="text" id="msg-in" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">➤</button>
    </div>

<script>
    // შენი მონაცემები
    const _URL = "https://ftfciebnywbondaiarnc.supabase.co";
    const _KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const _sb = supabase.createClient(_URL, _KEY);
    
    // ნიკნეიმი (თუ არ არის, დაარქმევს 'სტუმარს')
    const myNick = localStorage.getItem('username') || 'სტუმარი';

    async function loadMsgs() {
        try {
            const { data, error } = await _sb
                .from('messages_v3')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(40);

            if (error) throw error;

            const chat = document.getElementById('chat');
            if (data && data.length > 0) {
                chat.innerHTML = data.reverse().map(m => `
                    <div class="m-line">
                        <span class="m-user">${m.nickname}</span>
                        <span class="m-text">${m.message}</span>
                    </div>
                `).join('');
                chat.scrollTop = chat.scrollHeight;
            } else {
                chat.innerHTML = '<div style="color:#444;text-align:center">მესიჯები არ არის</div>';
            }
        } catch (e) {
            document.getElementById('chat').innerHTML = '<div style="color:red">ბაზასთან კავშირი გაწყდა!</div>';
        }
    }

    async function send() {
        const inp = document.getElementById('msg-in');
        const txt = inp.value.trim();
        if (!txt) return;

        const { error } = await _sb
            .from('messages_v3')
            .insert([{ nickname: myNick, message: txt }]);

        if (error) {
            alert("შეცდომა გაგზავნისას!");
        } else {
            inp.value = "";
            loadMsgs();
        }
    }

    // განახლება ყოველ 3 წამში
    setInterval(loadMsgs, 3000);
    loadMsgs();
</script>
</body>
</html>
