<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - CORRECT VERSION</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #0d0d0d; --blue: #0088ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .header { height: 60px; background: #000; display: flex; align-items: center; padding: 0 15px; border-bottom: 2px solid #222; z-index: 1001; }
        .burger { font-size: 30px; cursor: pointer; color: var(--red); margin-right: 15px; }
        .room-name { font-weight: bold; font-size: 18px; color: #fff; }

        /* Dropdown Menu */
        .menu { 
            position: absolute; top: -100vh; left: 0; width: 100%; background: #111; 
            transition: 0.3s; z-index: 1000; max-height: 80vh; overflow-y: auto; 
            border-bottom: 3px solid var(--red); box-shadow: 0 10px 30px #000;
        }
        .menu.open { top: 60px; }
        .room { padding: 15px 20px; border-bottom: 1px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 16px; }
        .room:active { background: #222; }
        .room.exit { color: #ff4444; border-top: 2px solid #333; }

        /* Chat Area - Wide */
        #chat { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #0a0a0a; }
        .m-wrap { align-self: flex-start; width: 95%; } /* აი აქ არის სიფართოვე */
        .m-bubble { background: #1a1a1a; border: 1px solid #333; padding: 12px 15px; border-radius: 5px 20px 20px 20px; position: relative; box-shadow: 2px 2px 10px rgba(0,0,0,0.4); }
        .m-nick { font-size: 12px; color: var(--red); font-weight: bold; margin-bottom: 4px; display: block; }
        .m-text { font-size: 15px; color: #eee; padding-bottom: 15px; word-break: break-word; line-height: 1.4; }
        .m-time { position: absolute; bottom: 6px; right: 12px; font-size: 10px; color: #555; }

        /* Input Bar */
        .footer { padding: 12px; background: #000; display: flex; align-items: center; gap: 10px; border-top: 1px solid #222; }
        .in-box { flex-grow: 1; background: #111; border: 1px solid #333; border-radius: 25px; padding: 5px 15px; }
        input { width: 100%; background: transparent; border: none; padding: 10px; color: white; outline: none; font-size: 16px; }

        /* Real Plane Image */
        .send-img { width: 45px; height: 45px; cursor: pointer; transition: 0.2s; }
        .send-img:hover { transform: scale(1.1); filter: brightness(1.2); }
    </style>
</head>
<body>

    <div class="header">
        <div class="burger" onclick="toggle()">☰</div>
        <div class="room-name" id="curTitle">☕ კაფე-ბარი</div>
    </div>

    <div class="menu" id="menu">
        <div class="room" onclick="sel('კაიფმანია', '✨')">✨ კაიფმანია</div>
        <div class="room" onclick="sel('კაფე-ბარი', '☕')">☕ კაფე-ბარი</div>
        <div class="room" onclick="sel('ვიპ საუბრები', '👑')">👑 ვიპ საუბრები</div>
        <div class="room" onclick="sel('გამოძიება', '🔍')">🔍 გამოძიება</div>
        <div class="room" onclick="sel('ჯოკერი', '♠')">♠ ჯოკერი</div>
        <div class="room" onclick="sel('ნარდი', '🎲')">🎲 ნარდი</div>
        <div class="room" onclick="sel('მუსიკა', '🎵')">🎵 მუსიკა</div>
        <div class="room" onclick="sel('იუმორი', '😂')">😂 იუმორი</div>
        <div class="room exit" onclick="exit()">🚪 გასვლა</div>
    </div>

    <div id="chat"></div>

    <div class="footer">
        <div class="in-box"><input type="text" id="mIn" placeholder="დაწერე რამე..."></div>
        <img src="https://cdn-icons-png.flaticon.com/512/739/739249.png" class="send-img" id="mSend">
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let activeR = "კაფე-ბარი", nick = "სტუმარი";

        function toggle() { document.getElementById('menu').classList.toggle('open'); }
        function sel(n, e) { activeR = n; document.getElementById('curTitle').innerText = e + " " + n; toggle(); load(); }
        async function exit() { await supabaseClient.auth.signOut(); window.location.href = "index.html"; }

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) nick = session.user.user_metadata.nickname || "User";
            load();
        }

        async function load() {
            const b = document.getElementById('chat'); b.innerHTML = "";
            const { data } = await supabaseClient.from('messages').select('*').eq('room_name', activeR).order('created_at', { ascending: true });
            if (data) data.forEach(draw);
        }

        function draw(m) {
            const b = document.getElementById('chat');
            const t = new Date(m.created_at).toLocaleTimeString('ka-GE', {hour:'2-digit', minute:'2-digit'});
            const w = document.createElement('div');
            w.className = 'm-wrap';
            w.innerHTML = `<div class="m-bubble"><span class="m-nick">${m.username}</span><div class="m-text">${m.text}</div><div class="m-time">${t}</div></div>`;
            b.appendChild(w);
            b.scrollTop = b.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('mIn'); if(!i.value.trim()) return;
            const text = i.value; i.value = "";
            await supabaseClient.from('messages').insert([{ text, room_name: activeR, username: nick }]);
        }

        document.getElementById('mSend').onclick = send;
        document.getElementById('mIn').onkeypress = (e) => { if(e.key==='Enter') send(); };

        supabaseClient.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
            if(p.new.room_name === activeR) draw(p.new);
        }).subscribe();

        init();
    </script>
</body>
</html>
