<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>MAFIA - FINAL FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #000; border-bottom: 1px solid red; text-align: center; color: red; font-weight: bold; }
        
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #111; padding: 10px; border-radius: 0 10px 10px 10px; border: 1px solid #222; align-self: flex-start; max-width: 85%; }
        .m-nick { font-size: 11px; color: red; font-weight: bold; margin-bottom: 3px; display: block; }
        
        .input-box { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 5px; outline: none; }
        button { background: red; color: white; border: none; padding: 0 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header>🕵️ OLD MAFIA CHAT</header>
    <div id="chat-flow">იტვირთება...</div>
    <div class="input-box">
        <input type="text" id="msg-in" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">➤</button>
    </div>

<script>
    const _sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('username') || 'Anonymous';

    async function sync() {
        try {
            const { data: msgs } = await _sb.from('messages_v3').select('*').order('created_at', { ascending: false }).limit(30);
            const flow = document.getElementById('chat-flow');
            
            if (msgs && msgs.length > 0) {
                flow.innerHTML = msgs.reverse().map(m => `
                    <div class="msg">
                        <span class="m-nick">${m.nickname}</span>
                        <span>${m.message}</span>
                    </div>
                `).join('');
            } else {
                flow.innerHTML = '<div style="text-align:center;color:#444">მესიჯები არ არის...</div>';
            }
            flow.scrollTop = flow.scrollHeight;
        } catch (e) { console.log("შეცდომაა!"); }
    }

    async function send() {
        const inp = document.getElementById('msg-in');
        if(!inp.value.trim()) return;
        await _sb.from('messages_v3').insert([{ nickname: myNick, message: inp.value }]);
        inp.value = ""; sync();
    }

    setInterval(sync, 3000);
    sync();
</script>
</body>
</html>
