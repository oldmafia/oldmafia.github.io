<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA ROOMS</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* მობილური მენიუ (Sidebar) */
        #sidebar { 
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%; 
            background: #000; border-right: 2px solid red; transition: 0.3s; z-index: 1000;
            display: flex; flex-direction: column;
        }
        #sidebar.open { left: 0; }
        
        .sidebar-header { padding: 20px; text-align: center; color: red; font-weight: bold; font-size: 22px; border-bottom: 2px solid red; }
        .room-list { flex: 1; overflow-y: auto; }

        .room-item { 
            padding: 12px 18px; border-bottom: 1px solid #111; cursor: pointer; 
            color: #ccc; display: flex; align-items: center; gap: 12px; font-size: 15px;
        }
        .room-item:hover, .room-item.active { background: #111; color: red; font-weight: bold; }

        /* მთავარი ჩატის კონტეინერი */
        #mainChat { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%; }
        
        .header { 
            height: 60px; padding: 0 15px; border-bottom: 1px solid red; 
            display: flex; justify-content: space-between; align-items: center; background: #000;
        }
        .menu-btn { font-size: 30px; color: red; cursor: pointer; background: none; border: none; }

        #messageList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg-card { padding: 10px; border-radius: 8px; background: #0a0a0a; border-left: 3px solid #333; }
        .msg-owner { border-left: 3px solid red; }

        /* საწერი გრაფა ქვევით */
        .input-box { 
            padding: 10px; background: #000; border-top: 1px solid red; 
            display: flex; gap: 10px; align-items: center;
        }
        input { 
            flex: 1; padding: 12px; background: #0a0a0a; border: 1px solid #333; 
            color: white; border-radius: 20px; outline: none;
        }
        .send-btn { 
            background: red; color: white; border: none; width: 45px; height: 45px; 
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* მენიუს ჩამკეტი ფონი */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 999; 
        }
        #overlay.show { display: block; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div class="sidebar-header">MAFIA ROOMS</div>
        <div class="room-list">
            <div class="room-item active" onclick="changeRoom('ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
            <div class="room-item" onclick="changeRoom('VIP საუბრები', this)">💎 VIP საუბრები</div>
            <div class="room-item" onclick="changeRoom('გამოძიება', this)">🔍 გამოძიება</div>
            <div class="room-item" onclick="changeRoom('შიფროგრამა', this)">🔐 შიფროგრამა</div>
            <div class="room-item" onclick="changeRoom('ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="room-item" onclick="changeRoom('ჩამოხრჩობანა', this)">🪢 ჩამოხრჩობანა</div>
            <div class="room-item" onclick="changeRoom('მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="room-item" onclick="changeRoom('ჯოკერი', this)">🃏 ჯოკერი</div>
            <div class="room-item" onclick="changeRoom('ნარდი', this)">🎲 ნარდი</div>
            <div class="room-item" onclick="changeRoom('მუსიკა', this)">🎵 მუსიკა</div>
            <div class="room-item" onclick="changeRoom('იუმორი', this)">🤣 იუმორი</div>
            <div class="room-item" onclick="changeRoom('ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
            <div class="room-item" onclick="changeRoom('დახმარება', this)">❓ დახმარება</div>
            <div class="room-item" onclick="changeRoom('ფორუმი', this)">📝 ფორუმი</div>
        </div>
        <div style="padding: 15px; border-top: 2px solid red;">
            <button onclick="window.location.href='user.html'" style="width:100%; padding:12px; background:#111; color:white; border:1px solid red; border-radius:10px; margin-bottom: 8px;">👤 პროფილი</button>
            <button onclick="logout()" style="width:100%; padding:12px; background:#000; color:red; border:1px solid #333; border-radius:10px;">🚪 გასვლა</button>
        </div>
    </div>

    <div id="mainChat">
        <div class="header">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div id="roomTitle" style="color:red; font-weight:bold;">ზოგადი ჩატი</div>
            <div style="width:30px;"></div>
        </div>
        <div id="messageList"></div>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="დაწერე მესიჯი...">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let myId = "", myName = "";

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = 'index.html';
            myId = user.id;
            const { data: p } = await supabase.from('profiles').select('username').eq('id', myId).single();
            myName = p ? p.username : "guest";
            loadMsgs();
            supabase.channel('chat').on('postgres_changes', { event: '*', table: 'messages' }, loadMsgs).subscribe();
        }

        async function loadMsgs() {
            const { data: msgs } = await supabase.from('messages').select('*').eq('room_name', currentRoom).order('id', { ascending: true });
            const list = document.getElementById('messageList');
            list.innerHTML = msgs ? msgs.map(m => `
                <div class="msg-card ${m.username === 'abu007' ? 'msg-owner' : ''}">
                    <b onclick="window.location.href='user.html?id=${m.user_id}'" style="color:${m.username === 'abu007' ? 'red' : '#999'}; cursor:pointer;">${m.username}</b>
                    <div style="margin-top:5px;">${m.text}</div>
                </div>
            `).join('') : '';
            list.scrollTop = list.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const txt = input.value.trim();
            if(!txt) return;
            input.value = '';
            await supabase.from('messages').insert([{ user_id: myId, username: myName, text: txt, room_name: currentRoom }]);
        }

        function changeRoom(name, el) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = name;
            document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            toggleSidebar();
            loadMsgs();
        }

        async function logout() { await supabase.auth.signOut(); window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
