<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-red: #ff0000; }
        * { box-sizing: border-box; }
        body { margin: 0; height: 100vh; display: flex; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .sidebar { width: 280px; min-width: 280px; background: #0a0a0a; border-right: 2px solid var(--neon-red); display: flex; flex-direction: column; z-index: 2000; transition: 0.3s; }
        @media (max-width: 768px) { .sidebar { position: absolute; left: -280px; height: 100%; } .sidebar.open { left: 0; } }
        .sidebar-header { padding: 20px; font-size: 22px; font-weight: bold; text-align: center; text-shadow: 0 0 15px var(--neon-red); border-bottom: 1px solid #1a1a1a; position: relative; }
        .close-menu { display: none; position: absolute; right: 15px; top: 20px; cursor: pointer; color: red; font-size: 24px; }
        @media (max-width: 768px) { .close-menu { display: block; } }
        .menu-items { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .menu-item { padding: 12px 15px; margin: 4px 0; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #bbb; transition: 0.2s; font-size: 14px; }
        .menu-item:hover { background: rgba(255, 0, 0, 0.1); color: #fff; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; background: #000; min-width: 0; }
        .top-nav { height: 65px; background: #0d0d0d; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #1a1a1a; }
        #messageList { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-container { display: flex; gap: 10px; max-width: 95%; align-items: flex-start; }
        .username { color: var(--neon-red); font-weight: bold; font-size: 13px; }
        .msg-bubble { background: #111; padding: 10px 14px; border-radius: 0 15px 15px 15px; border: 1px solid #222; margin-top: 3px; font-size: 14px; word-wrap: break-word; }
        .input-area { padding: 15px; background: #080808; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        input { flex-grow: 1; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; outline: none; }
        button.send-btn { background: var(--neon-red); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .toggle-btn { background: none; border: 1px solid red; color: red; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">კაიფმანია 🕶️ <span class="close-menu" onclick="toggleMenu()">×</span></div>
        <div class="menu-items">
            <div class="menu-item" onclick="changeRoom('ზოგადი ჩატი', '💬')">💬 ზოგადი ჩატი</div>
            <div class="menu-item" onclick="changeRoom('ვიპ საუბრები', '💎')">💎 ვიპ საუბრები</div>
            <div class="menu-item" onclick="changeRoom('გამოძიება', '🔍')">🔍 გამოძიება</div>
            <div class="menu-item" onclick="changeRoom('შიფროგრამა', '🔐')">🔐 შიფროგრამა</div>
            <div class="menu-item" onclick="changeRoom('ვიქტორინა', '🧠')">🧠 ვიქტორინა</div>
            <div class="menu-item" onclick="changeRoom('ჩამოხრჩობანა', '💀')">💀 ჩამოხრჩობანა</div>
            <div class="menu-item" onclick="changeRoom('მაფიის ღამე', '🕵️‍♂️')">🕵️‍♂️ მაფიის ღამე</div>
            <div class="menu-item" onclick="changeRoom('ჯოკერი', '🃏')">🃏 ჯოკერი</div>
            <div class="menu-item" onclick="changeRoom('ნარდი', '🎲')">🎲 ნარდი</div>
            <div class="menu-item" onclick="changeRoom('მუსიკა', '🎵')">🎵 მუსიკა</div>
            <div class="menu-item" onclick="changeRoom('იუმორი', '😂')">😂 იუმორი</div>
            <div class="menu-item" id="adminBtn" style="display:none; color: gold;" onclick="changeRoom('ადმინისტრაცია', '🛡️')">🛡️ ადმინისტრაცია</div>
            <div class="menu-item" onclick="changeRoom('დახმარება', '🆘')">🆘 დახმარება</div>
            <div class="menu-item" onclick="changeRoom('ფორუმი', '🏛️')">🏛️ ფორუმი</div>
            <div class="menu-item" style="color: #ff4444; margin-top: 20px;" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <button class="toggle-btn" onclick="toggleMenu()">☰ მენიუ</button>
            <div id="roomTitle">💬 ზოგადი ჩატი</div>
            <div id="userDisplay" style="color:red; font-weight:bold;">...</div>
        </div>
        <div id="messageList"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">გაგზავნა</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let currentUser = null;
        let myNick = "სტუმარი";

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = "index.html"; return; }
            currentUser = user;
            
            // ნიკის დაყენება
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
            myNick = profile ? profile.username : (user.user_metadata.nickname || user.email.split('@')[0]);
            document.getElementById('userDisplay').innerText = myNick;
            
            if (profile && (profile.role === 'owner' || profile.role === 'admin')) {
                document.getElementById('adminBtn').style.display = 'flex';
            }

            loadMessages();
            subscribeToMessages();
        }

        async function changeRoom(name, icon) {
            currentRoom = name;
            document.getElementById('roomTitle').innerHTML = `${icon} ${name}`;
            document.getElementById('messageList').innerHTML = '';
            if (window.innerWidth <= 768) toggleMenu();
            loadMessages();
        }

        async function loadMessages() {
            const { data: msgs } = await supabaseClient.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
            const list = document.getElementById('messageList');
            list.innerHTML = '';
            if (msgs) msgs.forEach(msg => renderMessage(msg));
            list.scrollTop = list.scrollHeight;
        }

        function renderMessage(msg) {
            const list = document.getElementById('messageList');
            const div = document.createElement('div');
            div.className = 'msg-container';
            div.innerHTML = `
                <div style="width:35px; height:35px; border-radius:50%; border:1px solid red; background:#222;"></div>
                <div>
                    <span class="username">${msg.username || 'უცნობი'}</span>
                    <div class="msg-bubble">${msg.text || ''}</div>
                </div>
            `;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const val = input.value.trim();
            if (!val || !currentUser) return;
            const { error } = await supabaseClient.from('messages').insert([{
                user_id: currentUser.id,
                username: myNick,
                text: val,
                room_name: currentRoom
            }]);
            if (error) alert("შეცდომა: " + error.message);
            else input.value = '';
        }

        function subscribeToMessages() {
            supabaseClient.channel('chat_realtime').on('postgres_changes', { 
                event: 'INSERT', schema: 'public', table: 'messages' 
            }, payload => {
                if (payload.new.room_name === currentRoom) renderMessage(payload.new);
            }).subscribe();
        }

        async function logout() { await supabaseClient.auth.signOut(); window.location.href = "index.html"; }
        init();
    </script>
</body>
</html>
