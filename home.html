<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია 🕶️</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #cc0000; --dark-bg: #0b0b0b; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; height: 100vh; display: flex; background: var(--dark-bg); color: #ddd; overflow: hidden; }

        /* Sidebar ლოგიკა */
        .sidebar { 
            width: 260px; min-width: 260px; background: #000; border-right: 1px solid #222; 
            display: flex; flex-direction: column; transition: 0.3s; z-index: 1000;
            overflow-y: auto;
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; height: 100%; }
            .sidebar.active { left: 0; }
        }

        .sidebar-header { padding: 20px; font-size: 20px; font-weight: bold; text-align: center; color: var(--main-red); border-bottom: 1px solid #111; }
        .menu-item { padding: 12px 20px; cursor: pointer; color: #999; display: flex; align-items: center; gap: 10px; font-size: 14px; border-bottom: 1px solid #080808; }
        .menu-item:hover { background: #0a0a0a; color: white; }
        .menu-item.active { background: #1a1a1a; color: var(--main-red); font-weight: bold; border-left: 3px solid var(--main-red); }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
        .top-nav { height: 60px; background: #000; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        
        .menu-toggle { font-size: 24px; cursor: pointer; color: white; display: none; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }

        .nav-user { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .nav-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #444; object-fit: cover; }

        #messageList { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #080808; }
        .msg { background: #161616; padding: 12px; border-radius: 12px; border: 1px solid #222; align-self: flex-start; max-width: 85%; }
        .msg-nick { color: var(--main-red); font-weight: bold; font-size: 13px; margin-bottom: 4px; display: block; cursor: pointer; }

        .input-area { padding: 15px; background: #000; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        input { flex-grow: 1; padding: 12px 18px; background: #111; border: 1px solid #333; color: #fff; border-radius: 25px; outline: none; }
        .send-btn { background: var(--main-red); border: none; width: 42px; height: 42px; border-radius: 50%; color: white; cursor: pointer; font-size: 18px; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 998; }
        .sidebar.active + .overlay { display: block; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">კაიფმანია 🕶️</div>
        <div id="roomContainer">
            <div class="menu-item active" onclick="changeRoom('ზოგადი ჩატი', '💬', this)">💬 ზოგადი ჩატი</div>
            <div class="menu-item" onclick="changeRoom('ვიპ საუბრები', '💎', this)">💎 ვიპ საუბრები</div>
            <div class="menu-item" onclick="changeRoom('გამოძიება', '🔍', this)">🔍 გამოძიება</div>
            <div class="menu-item" onclick="changeRoom('შიფროგრამა', '🔐', this)">🔐 შიფროგრამა</div>
            <div class="menu-item" onclick="changeRoom('ვიქტორინა', '🧠', this)">🧠 ვიქტორინა</div>
            <div class="menu-item" onclick="changeRoom('ჩამოხრჩობანა', '💀', this)">💀 ჩამოხრჩობანა</div>
            <div class="menu-item" onclick="changeRoom('მაფიის ღამე', '🕵️‍♂️', this)">🕵️‍♂️ მაფიის ღამე</div>
            <div class="menu-item" onclick="changeRoom('ჯოკერი', '🃏', this)">🃏 ჯოკერი</div>
            <div class="menu-item" onclick="changeRoom('ნარდი', '🎲', this)">🎲 ნარდი</div>
            <div class="menu-item" onclick="changeRoom('მუსიკა', '🎵', this)">🎵 მუსიკა</div>
            <div class="menu-item" onclick="changeRoom('იუმორი', '😂', this)">😂 იუმორი</div>
            <div class="menu-item" style="color: gold;" onclick="changeRoom('ადმინისტრაცია', '🛡️', this)">🛡️ ადმინისტრაცია</div>
            <div class="menu-item" style="color: #00ccff;" onclick="changeRoom('დახმარება', '🆘', this)">🆘 დახმარება</div>
            <div class="menu-item" onclick="changeRoom('ფორუმი', '🏛️', this)">🏛️ ფორუმი</div>
            <div class="menu-item" style="color: #ff4444; margin-top: 20px;" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="main-content">
        <div class="top-nav">
            <div class="menu-toggle" onclick="toggleMenu()">☰</div>
            <div id="roomTitle" style="font-weight:bold; color: white;">💬 ზოგადი ჩატი</div>
            <div class="nav-user" onclick="window.location.href='user.html'">
                <img id="navAvatar" class="nav-avatar" src="https://api.dicebear.com/7.x/identicon/svg?seed=abu">
                <div id="navNick" style="color:var(--main-red); font-weight:bold;">იტვირთება...</div>
            </div>
        </div>

        <div id="messageList"></div>

        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">✈️</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let myData = { id: '', nick: 'abu007', avatar: '' };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = "index.html";
            myData.id = user.id;

            const { data: p } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
            if (p) {
                myData.nick = p.username || 'abu007';
                myData.avatar = p.avatar_url;
                document.getElementById('navNick').innerText = (p.role === 'owner' ? '👑 ' : '') + myData.nick;
                if (p.avatar_url) document.getElementById('navAvatar').src = p.avatar_url;
            }

            loadMsgs();
            
            // რეალურ დროში მოსმენა
            supabaseClient.channel('chat_realtime')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                    if (payload.new.room_name === currentRoom) loadMsgs();
                }).subscribe();
        }

        async function loadMsgs() {
            const { data: msgs } = await supabaseClient.from('messages')
                .select('*')
                .eq('room_name', currentRoom)
                .order('id', { ascending: true });

            const list = document.getElementById('messageList');
            list.innerHTML = msgs ? msgs.map(m => `
                <div class="msg">
                    <span class="msg-nick" onclick="window.location.href='user.html?id=${m.user_id}'">${m.username}</span>
                    <div style="color: #eee;">${m.text}</div>
                </div>
            `).join('') : '';
            list.scrollTop = list.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msgInput');
            const val = input.value.trim();
            if (!val) return;

            await supabaseClient.from('messages').insert([{
                user_id: myData.id,
                username: myData.nick,
                text: val,
                room_name: currentRoom,
                avatar_url: myData.avatar
            }]);
            input.value = '';
        }

        function changeRoom(name, icon, el) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = icon + ' ' + name;
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            // თუ მობილურზე ვართ, მენიუ დავხუროთ არჩევისას
            if (window.innerWidth < 768) toggleMenu();
            loadMsgs();
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        init();
    </script>
</body>
</html>
