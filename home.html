<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - Pro</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; background: #0a0a0a; border-right: 1px solid #333; display: flex; flex-direction: column; overflow-y: auto; }
        
        /* პროფილის სტილი */
        .profile { padding: 25px 15px; text-align: center; background: linear-gradient(to bottom, #1a0000, #000); border-bottom: 1px solid #222; }
        .avatar-container { position: relative; width: 85px; height: 85px; margin: 0 auto 10px; cursor: pointer; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; border: 2px solid red; object-fit: cover; }
        .avatar-edit { position: absolute; bottom: 0; right: 0; background: red; border-radius: 50%; padding: 4px; font-size: 10px; }
        
        .badge-founder { background: gold; color: black; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; display: inline-block; margin-top: 5px; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .status-text { font-size: 12px; color: #888; margin-top: 8px; font-style: italic; }
        .status-input { width: 90%; background: #111; border: 1px solid #333; color: #fff; padding: 5px; border-radius: 5px; font-size: 11px; margin-top: 5px; outline: none; }

        /* მენიუს სრული სია */
        .menu { flex-grow: 1; padding: 10px 0; }
        .menu-item { padding: 12px 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; color: #bbb; }
        .menu-item:hover { background: #150000; color: #fff; }
        .menu-item.active { background: #200000; color: red; border-left: 4px solid red; }
        .menu-item i { font-size: 18px; }

        .chat { flex-grow: 1; display: flex; flex-direction: column; background: #050505; }
        #chatBox { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .input-area { padding: 15px; background: #0a0a0a; border-top: 1px solid #222; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: #151515; border: 1px solid #444; color: #fff; padding: 10px 15px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="profile">
            <div class="avatar-container" onclick="document.getElementById('fileInp').click()">
                <img id="uImg" src="https://via.placeholder.com/85" class="avatar">
                <div class="avatar-edit">📷</div>
            </div>
            <input type="file" id="fileInp" hidden onchange="uploadAvatar(this)" accept="image/*">
            
            <p id="uNick" style="color:red; font-weight:bold; margin: 5px 0 2px; font-size: 18px;">...</p>
            <div id="uBadge"></div>
            
            <div id="uStatus" class="status-text">სტატუსი არაა</div>
            <input type="text" id="statusInp" class="status-input" placeholder="შეცვალე სტატუსი..." onkeypress="if(event.key==='Enter') saveStatus()">
        </div>

        <div class="menu">
            <div class="menu-item active" onclick="setRoom('ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
            <div class="menu-item" onclick="setRoom('VIP საუბრები', this)">💎 VIP საუბრები</div>
            <div class="menu-item" onclick="setRoom('გამოძიება', this)">🔍 გამოძიება</div>
            <div class="menu-item" onclick="setRoom('შიფროგრამა', this)">🔐 შიფროგრამა</div>
            <div class="menu-item" onclick="setRoom('ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="menu-item" onclick="setRoom('ჩამოხრჩობანა', this)">🪢 ჩამოხრჩობანა</div>
            <div class="menu-item" onclick="setRoom('მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="menu-item" onclick="setRoom('მუსიკა', this)">🎵 მუსიკა</div>
            <div class="menu-item" onclick="setRoom('გალერეა', this)">🖼️ გალერეა</div>
            <div class="menu-item" onclick="setRoom('ფორუმი', this)">📝 ფორუმი</div>
            <div class="menu-item" onclick="setRoom('ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        </div>

        <button onclick="logout()" style="padding:15px; background:none; border:none; color:red; cursor:pointer; font-weight:bold; border-top: 1px solid #222;">🚪 გასვლა</button>
    </div>

    <div class="chat">
        <header style="padding:15px; border-bottom:1px solid #222; background:#0a0a0a;">
            📍 <span id="roomTitle" style="color:red; font-weight:bold;">ზოგადი ჩატი</span>
        </header>
        <div id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="mInp" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:red; color:white; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer;">➤</button>
        </div>
    </div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let me = {};
    let room = 'ზოგადი ჩატი';

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return window.location.href="index.html";

        let { data: p } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
        
        me = {
            id: user.id,
            nick: (p && p.username) ? p.username : "tojina",
            role: (p && p.role) ? p.role : "owner",
            avatar: (p && p.avatar_url) ? p.avatar_url : "https://via.placeholder.com/85",
            status: (p && p.status) ? p.status : "სტატუსი არაა"
        };

        document.getElementById('uNick').innerText = me.nick;
        document.getElementById('uImg').src = me.avatar;
        document.getElementById('uStatus').innerText = me.status;
        
        if(me.role === 'owner') {
            document.getElementById('uBadge').innerHTML = '<span class="badge-founder">დამფუძნებელი</span>';
        }

        load();
        sb.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => load()).subscribe();
    }

    async function saveStatus() {
        const val = document.getElementById('statusInp').value;
        if(!val) return;
        await sb.from('profiles').update({ status: val }).eq('id', me.id);
        document.getElementById('uStatus').innerText = val;
        document.getElementById('statusInp').value = "";
    }

    async function uploadAvatar(el) {
        const file = el.files[0];
        if(!file) return;
        const name = me.id + "_" + Date.now();
        const { data, error } = await sb.storage.from('avatars').upload(name, file);
        if(data) {
            const { data: { publicUrl } } = sb.storage.from('avatars').getPublicUrl(name);
            await sb.from('profiles').update({ avatar_url: publicUrl }).eq('id', me.id);
            document.getElementById('uImg').src = publicUrl;
        }
    }

    async function load() {
        const { data } = await sb.from('messages').select('*').eq('room', room).order('created_at', { ascending: true });
        const box = document.getElementById('chatBox');
        if(data) {
            box.innerHTML = data.map(m => `
                <div style="margin-bottom:15px; display: flex; flex-direction: column; align-items: ${m.user_id === me.id ? 'flex-end' : 'flex-start'}">
                    <small style="color:#666; font-size:10px; margin-bottom:2px;">${m.username}</small>
                    <div style="background:${m.user_id === me.id ? 'red' : '#1a1a1a'}; color: white; padding:10px 15px; border-radius:15px; max-width: 80%;">
                        ${m.text}
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }
    }

    async function send() {
        const i = document.getElementById('mInp');
        if(!i.value.trim()) return;
        await sb.from('messages').insert([{ text: i.value, room: room, user_id: me.id, username: me.nick }]);
        i.value = "";
    }

    function setRoom(name, el) {
        room = name;
        document.getElementById('roomTitle').innerText = name;
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
        load();
    }

    async function logout() { await sb.auth.signOut(); window.location.href="index.html"; }
    init();
</script>
</body>
</html>
