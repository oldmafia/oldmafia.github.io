<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Old Mafia</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 280px; background: #050505; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .sidebar-avatar { width: 80px; height: 80px; border-radius: 10px; border: 2px solid red; margin: 0 auto 10px; background: #111 center/cover; }
        .user-name { color: red; font-weight: bold; font-size: 20px; }
        .menu-items { flex-grow: 1; overflow-y: auto; }
        .menu-item { padding: 12px 20px; color: #999; cursor: pointer; border-left: 3px solid transparent; }
        .menu-item.active { background: #1a0000; color: red; border-left: 3px solid red; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .messages-area { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { background: #0d0d0d; padding: 10px; border-radius: 0 12px 12px 12px; border: 1px solid #1a1a1a; max-width: 80%; }
        .bottom-bar { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; align-items: center; border-top: 1px solid #222; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; padding: 12px; border-radius: 20px; color: #fff; outline: none; }
        .send-btn { background: none; border: none; cursor: pointer; }
        .send-btn svg { fill: #007bff; width: 40px; height: 40px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-avatar" id="uAvat"></div>
        <div id="uNick" class="user-name">...</div>
    </div>
    <div class="menu-items">
        <div class="menu-item active">☕ კაფე-ბარი</div>
        <div class="menu-item">👑 ვიპ საუბრები</div>
        <div class="menu-item">🕵️ გამოძიება</div>
        <div class="menu-item">🔐 შიფროგრამა</div>
        <div class="menu-item">❓ ვიქტორინა</div>
        <div class="menu-item">🪢 ჩამოხრჩობანა</div>
        <div class="menu-item">🌑 მაფიის ღამე</div>
        <div class="menu-item">🃏 ჯოკერი</div>
        <div class="menu-item">🎲 ნარდი</div>
        <div class="menu-item">🎵 მუსიკა</div>
        <div class="menu-item">😂 იუმორი</div>
        <div class="menu-item">🚀 კაიფმანია</div>
        <div class="menu-item">🛠️ ადმინისტრაცია</div>
        <div class="menu-item">❓ დახმარება</div>
        <div class="menu-item">📝 ფორუმი</div>
    </div>
</div>

<div class="main-content">
    <div class="messages-area" id="chatContainer"></div>
    <div class="bottom-bar">
        <input type="text" id="msgInput" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script>
    const client = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myProfile = null;
    let currentRoom = "☕ კაფე-ბარი";

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) return window.location.href = "index.html";

        const { data: profile } = await client.from('profiles').select('*').eq('id', session.user.id).single();
        if (profile) {
            myProfile = profile;
            document.getElementById('uNick').innerText = profile.username;
            if(profile.avatar_url) document.getElementById('uAvat').style.backgroundImage = `url('${profile.avatar_url}')`;
        }
        loadMessages();
    }

    async function loadMessages() {
        const { data } = await client.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        const chat = document.getElementById('chatContainer');
        chat.innerHTML = "";
        if (data) data.forEach(m => {
            chat.innerHTML += `<div class="msg-bubble"><b style="color:red">${m.username}</b><br>${m.text}</div>`;
        });
        chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        await client.from('messages').insert([{ text: input.value, username: myProfile.username, room_name: currentRoom, user_id: myProfile.id }]);
        input.value = "";
        loadMessages();
    }

    init();
</script>
</body>
</html>
