<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - FULL ROOMS</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #000; --panel: #0a0a0a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar - ზუსტად 14 ოთახი */
        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; transition: 0.3s; flex-shrink: 0; }
        .sidebar.hidden { margin-left: -260px; }
        
        .profile { padding: 25px 10px; text-align: center; border-bottom: 1px solid #111; }
        .avatar { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--red); margin-bottom: 8px; }
        .u-name { font-weight: bold; font-size: 14px; color: #eee; }

        .r-list { flex-grow: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #333 transparent; }
        .r-item { padding: 10px 18px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 13px; color: #999; border-bottom: 1px solid #0f0f0f; transition: 0.2s; }
        .r-item:hover { background: #111; color: #fff; }
        .r-item.active { background: linear-gradient(90deg, #300 0%, #0a0a0a 100%); color: #fff; border-left: 3px solid var(--red); }
        .r-item.exit { color: #ff3333; font-weight: bold; border-top: 1px solid #222; margin-top: 5px; }

        /* Main Chat */
        .main { flex-grow: 1; display: flex; flex-direction: column; }
        .top-bar { height: 50px; background: #000; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #1a1a1a; }
        .burger { font-size: 24px; cursor: pointer; color: var(--red); margin-right: 15px; }
        .room-title { font-weight: bold; color: var(--red); font-size: 15px; }

        #chat-window { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Message Bubbles */
        .msg-wrap { align-self: flex-start; max-width: 85%; }
        .msg-nick { font-size: 11px; color: var(--red); font-weight: bold; margin-bottom: 2px; }
        .msg-bubble { background: #161616; padding: 10px 14px; border-radius: 0 15px 15px 15px; position: relative; min-width: 100px; border: 1px solid #222; }
        .msg-text { font-size: 14px; color: #ccc; padding-bottom: 12px; }
        .msg-time { position: absolute; bottom: 4px; right: 10px; font-size: 9px; color: #444; }

        /* Input Area & Blue Plane */
        .input-area { padding: 12px; background: #000; border-top: 1px solid #1a1a1a; display: flex; align-items: center; gap: 10px; }
        .in-field { flex-grow: 1; background: #080808; border-radius: 20px; border: 1px solid #222; padding: 2px 15px; }
        input { width: 100%; background: transparent; border: none; padding: 8px; color: white; outline: none; }

        .plane-send { width: 32px; height: 32px; cursor: pointer; fill: #00a2ff; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="profile">
            <img id="uPic" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=abu007" class="avatar">
            <div id="uNick" class="u-name">abu007</div>
        </div>
        <div class="r-list" id="rList">
            <div class="r-item" onclick="sel('კაიფმანია')">💬 კაიფმანია</div>
            <div class="r-item active" onclick="sel('კაფე-ბარი')">☕ კაფე-ბარი</div>
            <div class="r-item" onclick="sel('ვიპ საუბრები')">👑 ვიპ საუბრები</div>
            <div class="r-item" onclick="sel('გამოძიება')">🔍 გამოძიება</div>
            <div class="r-item" onclick="sel('შიფროგრამა')">📟 შიფროგრამა</div>
            <div class="r-item" onclick="sel('ვიქტორინა')">💡 ვიქტორინა</div>
            <div class="r-item" onclick="sel('ჩამოხრჩობანა')">💀 ჩამოხრჩობანა</div>
            <div class="r-item" onclick="sel('მაფიის ღამე')">🌑 მაფიის ღამე</div>
            <div class="r-item" onclick="sel('ჯოკერი')">🃏 ჯოკერი</div>
            <div class="r-item" onclick="sel('ნარდი')">🎲 ნარდი</div>
            <div class="r-item" onclick="sel('მუსიკა')">🎵 მუსიკა</div>
            <div class="r-item" onclick="sel('იუმორი')">😂 იუმორი</div>
            <div class="r-item" onclick="sel('ადმინისტრაცია')">🛡️ ადმინისტრაცია</div>
            <div class="r-item" onclick="sel('დახმარება')">❓ დახმარება</div>
            <div class="r-item" onclick="sel('ფორუმი')">📝 ფორუმი</div>
            <div class="r-item exit" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

    <div class="main">
        <div class="top-bar">
            <div class="burger" onclick="toggleSidebar()">☰</div>
            <div class="room-title" id="rTitle">კაფე-ბარი</div>
        </div>
        <div id="chat-window"></div>
        <div class="input-area">
            <div class="in-field"><input type="text" id="mIn" placeholder="დაწერე შეტყობინება..."></div>
            <svg id="mSend" class="plane-send" viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
            </svg>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let activeR = "კაფე-ბარი", myNick = "abu007";

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }

        function sel(n) {
            activeR = n;
            document.getElementById('rTitle').innerText = n;
            document.querySelectorAll('.r-item').forEach(el => {
                el.classList.remove('active');
                if(el.innerText.includes(n)) el.classList.add('active');
            });
            load();
        }

        async function logout() { await supabaseClient.auth.signOut(); window.location.href = "index.html"; }

        async function load() {
            const box = document.getElementById('chat-window'); box.innerHTML = "";
            const { data } = await supabaseClient.from('messages').select('*').eq('room_name', activeR).order('created_at', { ascending: true });
            if (data) data.forEach(render);
        }

        function render(m) {
            const box = document.getElementById('chat-window');
            const time = new Date(m.created_at).toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12: true});
            const w = document.createElement('div');
            w.className = 'msg-wrap';
            w.innerHTML = `<div class="msg-nick">${m.username}</div><div class="msg-bubble"><div class="msg-text">${m.text}</div><div class="msg-time">${time}</div></div>`;
            box.appendChild(w);
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const inp = document.getElementById('mIn'); if(!inp.value.trim()) return;
            const text = inp.value; inp.value = "";
            await supabaseClient.from('messages').insert([{ text, room_name: activeR, username: myNick }]);
        }

        document.getElementById('mSend').onclick = send;
        document.getElementById('mIn').onkeypress = (e) => { if(e.key==='Enter') send(); };

        supabaseClient.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
            if(p.new.room_name === activeR) render(p.new);
        }).subscribe();

        load();
    </script>
</body>
</html>
