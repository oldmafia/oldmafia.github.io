<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - THE BOSS EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #050505; --card: #111; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; z-index: 1000; }
        #room-title { color: var(--red); font-weight: bold; font-size: 14px; text-transform: uppercase; }

        .side-panel { position: fixed; top: 0; height: 100%; background: #080808; z-index: 2000; transition: 0.3s; width: 280px; overflow-y: auto; padding: 20px; border: 1px solid var(--border); }
        #side-left { left: -280px; }
        #side-right { right: -280px; }
        .open-left { transform: translateX(280px); }
        .open-right { transform: translateX(-280px); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; backdrop-filter: blur(5px); }
        .active { display: block; }

        .my-prof-card { background: linear-gradient(45deg, #200, #000); padding: 15px; border-radius: 15px; border: 1px solid #500; margin-bottom: 20px; text-align: center; cursor: pointer; }
        .room-item { padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; cursor: pointer; font-size: 14px; }
        .room-active { border-color: var(--red); background: #1a0505; color: var(--red); font-weight: bold; }

        .u-card { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--card); border-radius: 12px; margin-bottom: 5px; border: 1px solid var(--border); cursor: pointer; }
        .u-ava { width: 38px; height: 38px; border-radius: 10px; object-fit: cover; }
        .section-title { color: var(--red); font-size: 11px; font-weight: bold; margin: 20px 0 10px; text-transform: uppercase; opacity: 0.7; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { display: flex; gap: 10px; max-width: 85%; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 12px 16px; background: var(--card); border-radius: 18px; font-size: 14px; border: 1px solid var(--border); }
        .msg.me .bubble { background: #300; border-color: #600; }

        #prof-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 360px; background: #0a0a0a; border: 1px solid #333; border-radius: 30px; padding: 25px; z-index: 3000; text-align: center; box-shadow: 0 0 50px #000; }
        .p-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: #fff; font-size: 14px; }
        .btn-blue { background: #0055ff; }
        .btn-gray { background: #222; border: 1px solid #444; color: gold; }
    </style>
</head>
<body>
    <div class="overlay" id="blur" onclick="closeAll()"></div>
    <div id="prof-modal"></div>

    <nav id="side-left" class="side-panel">
        <div class="my-prof-card" onclick="openProfile(myNick)">
            <div id="my-side-ava"></div>
            <h3 id="my-name-side" style="margin-top:10px;">ბოსი</h3>
            <p style="font-size:10px; color:red;">ნახე შენი პროფილი</p>
        </div>
        <div class="section-title">ოთახები</div>
        <div id="rooms-list"></div>
    </nav>

    <aside id="side-right" class="side-panel">
        <div class="section-title">👑 ადმინისტრაცია</div>
        <div id="staff-list"></div>
        <div class="section-title">👤 წევრები</div>
        <div id="members-list"></div>
    </aside>

    <header>
        <div onclick="openMenu('left')" style="font-size:24px; color:red; cursor:pointer;">☰</div>
        <div id="room-title">💬 ზოგადი ჩატი</div>
        <div id="top-ava" onclick="openProfile(myNick)" style="cursor:pointer;"></div>
    </header>

    <div id="chat-flow"></div>

    <div style="padding:15px; background:#000; border-top:1px solid #222; display:flex; gap:10px;">
        <input type="text" id="msg-input" placeholder="დაწერე..." style="flex:1; background:#111; border:1px solid #333; padding:12px; border-radius:20px; color:#fff; outline:none;" onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()" style="background:none; border:none; color:red; font-size:24px;">➤</button>
    </div>

<script>
    const _sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('username');
    let curRoom = '💬 ზოგადი ჩატი', myRole = '';

    const rooms = ['💬 ზოგადი ჩატი', '🛡️ ადმინისტრაცია', '💎 VIP საუბრები', '🕵️ საგამოძიებო', '📜 წესები', '🔒 შიფროგრამა', '🎯 ვიქტორინა', '🪢 ჩამოხრჩობანა', '😂 იუმორი', '🎵 მუსიკა', '🖼️ გალერეა', '🤝 გაცნობა', '📝 პოეზია'];

    function openMenu(s) { document.getElementById('side-'+s).classList.add(s==='left'?'open-left':'open-right'); document.getElementById('blur').classList.add('active'); }
    function closeAll() { document.querySelectorAll('.side-panel').forEach(p=>p.classList.remove('open-left','open-right')); document.getElementById('prof-modal').style.display='none'; document.getElementById('blur').classList.remove('active'); }

    async function sync() {
        if(!myNick) return;
        const { data: users } = await _sb.from('avatars_v3').select('*');
        const { data: msgs } = await _sb.from('messages_v3').select('*').eq('room_name', curRoom).order('created_at', { ascending: false }).limit(50);
        
        let uMap = {}, staffH = '', membH = '';
        users?.forEach(u => {
            uMap[u.nickname] = u;
            if(u.nickname === myNick) {
                myRole = u.role || 'წევრი';
                document.getElementById('top-ava').innerHTML = `<img src="${u.avatar_url || 'https://i.ibb.co/4pLKV60/user.png'}" style="width:35px; height:35px; border-radius:50%; border:1px solid red;">`;
                document.getElementById('my-side-ava').innerHTML = `<img src="${u.avatar_url || 'https://i.ibb.co/4pLKV60/user.png'}" style="width:60px; height:60px; border-radius:15px; border:2px solid red;">`;
                document.getElementById('my-name-side').innerText = u.nickname;
            }
            const card = `<div class="u-card" onclick="openProfile('${u.nickname}')">
                <img src="${u.avatar_url || 'https://i.ibb.co/4pLKV60/user.png'}" class="u-ava">
                <div><div style="font-weight:bold; font-size:13px;">${u.nickname}</div><div style="font-size:10px; color:red;">${u.role || 'წევრი'}</div></div>
            </div>`;
            if((u.role||'').includes('ადმინ') || (u.role||'').includes('დამფუძნ')) staffH += card; else membH += card;
        });

        document.getElementById('staff-list').innerHTML = staffH;
        document.getElementById('members-list').innerHTML = membH;
        document.getElementById('chat-flow').innerHTML = msgs?.reverse().map(m => {
            const u = uMap[m.nickname] || {};
            return `<div class="msg ${m.nickname===myNick?'me':''}">
                <img src="${u.avatar_url || 'https://i.ibb.co/4pLKV60/user.png'}" class="u-ava" style="width:30px; height:30px;" onclick="openProfile('${m.nickname}')">
                <div><div class="bubble">${m.message}</div></div>
            </div>`;
        }).join('') || '';
        document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
    }

    async function openProfile(nick) {
        closeAll();
        const { data: u } = await _sb.from('avatars_v3').select('*').eq('nickname', nick).single();
        const modal = document.getElementById('prof-modal');
        modal.style.display = 'block'; document.getElementById('blur').classList.add('active');
        
        const isMe = nick === myNick;
        const isAdmin = myRole.includes('დამფუძნებელი');

        modal.innerHTML = `
            <div style="text-align:right; cursor:pointer;" onclick="closeAll()">✕</div>
            <img src="${u.avatar_url || 'https://i.ibb.co/4pLKV60/user.png'}" style="width:100px; height:100px; border-radius:20px; border:2px solid red; object-fit:cover; margin-bottom:10px;">
            <h2>${u.nickname}</h2>
            <div style="color:red; font-weight:bold; margin-bottom:15px;">${u.role || 'წევრი'}</div>
            <div style="background:#000; padding:10px; border-radius:10px; border:1px solid #222; margin-bottom:15px;">${u.status || '...'}</div>
            
            ${isMe ? `<button class="p-btn btn-pm" style="background:red;" onclick="logout()">🚪 გასვლა</button>` : `
                <button class="p-btn btn-blue" onclick="startPM('${u.nickname}')">✉️ პირადი მიმოწერა</button>
                ${isAdmin ? `
                    <button class="p-btn btn-gray" onclick="setRole('${u.nickname}', '🛡️ ადმინისტრატორი')">⭐ ადმინი</button>
                    <button class="p-btn btn-pm" style="background:#444;" onclick="setRole('${u.nickname}', 'წევრი')">❌ ჩამორთმევა</button>
                ` : ''}
            `}
        `;
    }

    async function setRole(n, r) { await _sb.from('avatars_v3').update({ role: r }).eq('nickname', n); alert('როლი განახლდა!'); sync(); }
    function startPM(t) { curRoom = [myNick, t].sort().join('_PM_'); document.getElementById('room-title').innerText = '📩 PM: ' + t; closeAll(); sync(); }
    async function sendMsg() {
        const i = document.getElementById('msg-input'); if(!i.value.trim()) return;
        await _sb.from('messages_v3').insert([{ nickname: myNick, message: i.value, room_name: curRoom }]);
        i.value = ""; sync();
    }
    function initRooms() { document.getElementById('rooms-list').innerHTML = rooms.map(r => `<div class="room-item ${r===curRoom?'room-active':''}" onclick="changeR('${r}')">${r}</div>`).join(''); }
    function changeR(r) { curRoom = r; document.getElementById('room-title').innerText = r; closeAll(); initRooms(); sync(); }
    function logout() { localStorage.clear(); location.href='index.html'; }
    window.onload = () => { if(!myNick) { location.href='index.html'; return; } initRooms(); sync(); setInterval(sync, 4000); };
</script>
</body>
</html>
