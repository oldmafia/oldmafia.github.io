<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-red: #ff0000; }
        body { margin: 0; height: 100vh; display: flex; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* სიდებარი */
        .sidebar { width: 260px; background: #0a0a0a; border-right: 2px solid var(--neon-red); display: flex; flex-direction: column; z-index: 1000; transition: 0.4s; }
        @media (max-width: 768px) { .sidebar { position: absolute; left: -285px; height: 100%; } .sidebar.open { left: 0; } }
        
        .sidebar-header { padding: 25px; font-size: 20px; font-weight: bold; text-align: center; text-shadow: 0 0 15px var(--neon-red); border-bottom: 1px solid #1a1a1a; }
        .menu-items { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .menu-item { padding: 12px 15px; margin: 4px 0; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #999; font-size: 14px; transition: 0.3s; }
        .menu-item:hover { background: rgba(255, 0, 0, 0.1); color: #fff; border-left: 3px solid red; }
        
        /* მთავარი არე */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        .top-nav { height: 65px; background: #0d0d0d; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #1a1a1a; }
        
        #messageList { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg-container { display: flex; gap: 12px; max-width: 90%; align-items: flex-start; animation: fadeIn 0.2s ease; margin-bottom: 5px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .avatar { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--neon-red); object-fit: cover; }
        .msg-body { display: flex; flex-direction: column; }
        .username { color: var(--neon-red); font-weight: bold; font-size: 13px; text-shadow: 0 0 5px red; }
        .time { color: #444; font-size: 10px; margin-left: 8px; font-weight: normal; }
        .msg-bubble { background: rgba(20, 20, 20, 0.9); padding: 10px 14px; border-radius: 0 15px 15px 15px; border: 1px solid #1a1a1a; margin-top: 4px; font-size: 14px; color: #eee; }

        /* ინპუტის ზონა */
        .input-area { padding: 20px; background: #080808; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        input { flex-grow: 1; padding: 14px; background: #111; border: 1px solid #222; color: white; border-radius: 10px; outline: none; }
        input:focus { border-color: red; }
        button { background: var(--neon-red); color: white; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">OLD MAFIA 🕶️</div>
        <div class="menu-items">
            <div class="menu-item" onclick="changeRoom('ზოგადი ჩატი', '💬')">💬 ზოგადი ჩატი</div>
            <div class="menu-item" onclick="changeRoom('ვიპ საუბრები', '💎')">💎 ვიპ საუბრები</div>
            <div class="menu-item" onclick="changeRoom('გამოძიება', '🔍')">🔍 გამოძიება</div>
            <div class="menu-item" onclick="changeRoom('შიფროგრამა', '🔐')">🔐 შიფროგრამა</div>
            <div class="menu-item" onclick="changeRoom('ვიქტორინა', '🧠')">🧠 ვიქტორინა</div>
            <div class="menu-item" onclick="changeRoom('ჩამოხრჩობანა', '💀')">💀 ჩამოხრჩობანა</div>
            <div class="menu-item" onclick="changeRoom('მაფიის ღამე', '🕵️‍♂️')">🕵️‍♂️ მაფიის ღამე</div>
            <div class="menu-item" onclick="changeRoom('ჯოკერი', '🃏')">🃏 ჯოკერი</div>
            <div class="menu-item" onclick="changeRoom('ნარდი', '🎲')">🎲 ნარდი</div>
            <div class="menu-item" onclick="changeRoom('მუსიკა', '🎵')">🎵 მუსიკა</div>
            <div class="menu-item" onclick="changeRoom('იუმორი', '😂')">😂 იუმორი</div>
            <div class="menu-item" id="adminBtn" style="display:none; color: gold;" onclick="changeRoom('ადმინისტრაცია', '🛡️')">🛡️ ადმინისტრაცია</div>
            <div class="menu-item" onclick="changeRoom('დახმარება', '🆘')">🆘 დახმარება</div>
            <div class="menu-item" onclick="changeRoom('ფორუმი', '🏛️')">🏛️ ფორუმი</div>
            <div class="menu-item" style="color: #ff4444; margin-top: 15px; border-top: 1px solid #222;" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:none; border:1px solid red; color:red; cursor:pointer; padding: 5px 10px; border-radius: 5px;">☰ მენიუ</button>
            <div id="roomTitle" style="font-weight:bold;">💬 ზოგადი ჩატი</div>
            <div id="userDisplay" style="color:red; font-weight:bold; border: 1px solid red; padding: 3px 10px; border-radius: 15px;">...</div>
        </div>
        <div id="messageList"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">გაგზავნა</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let currentUser = null;
        let myNick = "";

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = "index.html"; return; }
            currentUser = user;

            // ნიკის წამოღება Profiles-დან
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
            
            myNick = profile?.username || user.user_metadata.nickname || user.email.split('@')[0];
            document.getElementById('userDisplay').innerText = myNick;

            // ადმინის შემოწმება
            if (profile?.role === 'owner' || profile?.role === 'admin') {
                document.getElementById('adminBtn').style.display = 'flex';
            }

            loadMessages();
            subscribeToMessages();
        }

        async function changeRoom(name, icon) {
            currentRoom = name;
            document.getElementById('roomTitle').innerHTML = `${icon} ${name}`;
            document.getElementById('messageList').innerHTML = '';
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
            loadMessages();
        }

        async function loadMessages() {
            const { data: msgs, error } = await supabaseClient
