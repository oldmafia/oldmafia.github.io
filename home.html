<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - 15 Rooms</title>
    <style>
        /* მთავარი სტილები */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* საიდბარი */
        .sidebar {
            width: 280px;
            background: #050505;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .user-name {
            color: #ff0000;
            font-weight: bold;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        /* მენიუს ოთახები */
        .menu-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        /* სქროლბარის გასუფთავება */
        .menu-items::-webkit-scrollbar { width: 4px; }
        .menu-items::-webkit-scrollbar-thumb { background: #ff0000; }

        .menu-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            color: #bbb;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-item:hover, .menu-item.active {
            background: linear-gradient(90deg, #1a0000, transparent);
            color: #ff0000;
            border-left: 3px solid #ff0000;
        }

        /* ჩატის არე */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            padding: 15px 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            color: #ff0000;
            font-weight: bold;
        }

        .messages-area {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* ინპუტის ზოლი */
        .bottom-input {
            padding: 20px;
            background: #0a0a0a;
            border-top: 1px solid #222;
            display: flex;
            gap: 12px;
        }

        input {
            flex-grow: 1;
            background: #111;
            border: 1px solid #333;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            outline: none;
        }

        input:focus { border-color: #ff0000; }

        .send-btn {
            background: none;
            border: none;
            color: #ff0000;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.1) rotate(-5deg); }

        /* მობილური ადაპტაცია */
        .burger {
            display: none;
            font-size: 24px;
            color: #ff0000;
            background: none;
            border: none;
            margin-right: 15px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100%;
            }
            .sidebar.open { left: 0; }
            .burger { display: block; }
            .overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.8);
                z-index: 999;
            }
            .overlay.show { display: block; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div style="width:70px; height:70px; background:#111; border:2px solid #ff0000; border-radius:10px; margin:0 auto;"></div>
        <div class="user-name">abu007</div>
    </div>
    
    <div class="menu-items">
        <a href="#" class="menu-item">🎭 კაიფმანია</a>
        <a href="#" class="menu-item active">☕ კაფე-ბარი</a>
        <a href="#" class="menu-item">👑 ვიპ საუბრები</a>
        <a href="#" class="menu-item">🕵️ გამოძიება</a>
        <a href="#" class="menu-item">🔐 შიფროგრამა</a>
        <a href="#" class="menu-item">❓ ვიქტორინა</a>
        <a href="#" class="menu-item">ოკ ჩამოხრჩობანა</a>
        <a href="#" class="menu-item">🌑 მაფიის ღამე</a>
        <a href="#" class="menu-item">🃏 ჯოკერი</a>
        <a href="#" class="menu-item">🎲 ნარდი</a>
        <a href="#" class="menu-item">🎵 მუსიკა</a>
        <a href="#" class="menu-item">😂 იუმორი</a>
        <a href="#" class="menu-item">🛠️ ადმინისტრაცია</a>
        <a href="#" class="menu-item">❓ დახმარება</a>
        <a href="#" class="menu-item">📝 ფორუმი</a>
        <a href="#" class="menu-item" style="margin-top:20px; color:#555;">🚪 გასვლა</a>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <button class="burger" onclick="toggleMenu()">☰</button>
        კაფე-ბარი
    </div>
    
    <div class="messages-area" id="chat">
        </div>

    <div class="bottom-input">
        <input type="text" placeholder="დაწერე შეტყობინება..." id="textInp">
        <button class="send-btn" onclick="send()">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor">
                <path d="M21,16.5C21,16.88 20.79,17.21 20.47,17.38L12.57,21.82C12.41,21.94 12.21,22 12,22C11.79,22 11.59,21.94 11.43,21.82L3.53,17.38C3.21,17.21 3,16.88 3,16.5V15.5L11,13.5V6.5L12,2L13,6.5V13.5L21,15.5V16.5Z" />
            </svg>
        </button>
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }

    function send() {
        let val = document.getElementById('textInp').value;
        if(val.trim()){
            let div = document.createElement('div');
            div.innerHTML = `<span style="color:#ff0000">abu007:</span> ${val}`;
            div.style.padding = "5px 0";
            document.getElementById('chat').appendChild(div);
            document.getElementById('textInp').value = "";
        }
    }
</script>

</body>
</html>
