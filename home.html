<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - Dashboard</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon-red: #ff0000;
            --dark-bg: #050505;
            --card-bg: #0d0d0d;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* გვერდითა მენიუ (Sidebar) */
        .sidebar {
            width: 280px;
            background: var(--dark-bg);
            border-right: 2px solid var(--neon-red);
            box-shadow: 10px 0 30px rgba(255, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100%;
            left: 0;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        /* როცა მენიუ დაკეტილია მობილურზე */
        @media (max-width: 768px) {
            .sidebar { left: -285px; }
            .sidebar.open { left: 0; }
        }

        .sidebar-header {
            padding: 25px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red);
            border-bottom: 1px solid #222;
        }

        .close-menu {
            display: none;
            position: absolute;
            right: 15px;
            top: 15px;
            font-size: 25px;
            cursor: pointer;
            color: var(--neon-red);
        }

        @media (max-width: 768px) { .close-menu { display: block; } }

        .menu-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .menu-item {
            padding: 14px 18px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ccc;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
        }

        .menu-item:hover {
            color: #fff;
            border-color: var(--neon-red);
            background: rgba(255, 0, 0, 0.15);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            transform: translateX(5px);
        }

        .menu-item.active {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 20px var(--neon-red);
        }

        /* მთავარი კონტენტი */
        .main-content {
            flex-grow: 1;
            margin-left: 280px;
            display: flex;
            flex-direction: column;
            transition: 0.4s;
        }

        @media (max-width: 768px) { .main-content { margin-left: 0; } }

        .top-nav {
            height: 70px;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-bottom: 1px solid #222;
        }

        .room-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a0000 0%, #000 100%);
            text-align: center;
        }

        .mobile-btn {
            display: none;
            background: none;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-red);
        }

        @media (max-width: 768px) { .mobile-btn { display: block; } }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: var(--neon-red);
            text-shadow: 0 0 5px var(--neon-red);
        }

        .logout-btn {
            margin-top: 20px;
            color: #ff4444 !important;
            border: 1px solid rgba(255, 68, 68, 0.3) !important;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <span class="close-menu" onclick="toggleSidebar()">×</span>
        <div class="sidebar-header">კაიფმანია 😎</div>
        <div class="menu-items">
            <div class="menu-item" onclick="openRoom('ზოგადი ჩატი', '💬')">💬 ზოგადი ჩატი</div>
            <div class="menu-item" onclick="openRoom('ვიპ საუბრები', '💎')">💎 ვიპ საუბრები</div>
            <div class="menu-item" onclick="openRoom('გამოძიება', '🔍')">🔍 გამოძიება</div>
            <div class="menu-item" onclick="openRoom('შიფროგრამა', '🔐')">🔐 შიფროგრამა</div>
            <div class="menu-item" onclick="openRoom('ვიქტორინა', '🧠')">🧠 ვიქტორინა</div>
            <div class="menu-item" onclick="openRoom('ჩამოხრჩობანა', 'ოკ')">ოკ ჩამოხრჩობანა</div>
            <div class="menu-item" onclick="openRoom('მაფიის ღამე', '🕵️‍♂️')">🕵️‍♂️ მაფიის ღამე</div>
            <div class="menu-item" onclick="openRoom('ჯოკერი', '🃏')">🃏 ჯოკერი</div>
            <div class="menu-item" onclick="openRoom('ნარდი', '🎲')">🎲 ნარდი</div>
            <div class="menu-item" onclick="openRoom('მუსიკა', '🎵')">🎵 მუსიკა</div>
            <div class="menu-item" onclick="openRoom('იუმორი', '😂')">😂 იუმორი</div>
            <div class="menu-item" id="adminRoom" style="display:none; color: gold;" onclick="openRoom('ადმინისტრაცია', '🛡️')">🛡️ ადმინისტრაცია</div>
            <div class="menu-item" onclick="openRoom('დახმარება', '🆘')">🆘 დახმარება</div>
            <div class="menu-item" onclick="openRoom('ფორუმი', '🏛️')">🏛️ ფორუმი</div>
            <div class="menu-item logout-btn" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <button class="mobile-btn" onclick="toggleSidebar()">☰ მენიუ</button>
            <div id="roomTitle" style="font-size: 20px; text-shadow: 0 0 10px red;">მთავარი</div>
            <div class="user-info">
                <span id="userName">...</span>
            </div>
        </div>

        <div class="room-area" id="roomArea">
            <h1 style="font-size: 40px; text-shadow: 0 0 20px red;">მოგესალმებით 🔥</h1>
            <p style="color: #888;">აირჩიე სასურველი ოთახი და დაიწყე გართობა</p>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // მენიუს გადართვა
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // ოთახის გახსნა
        function openRoom(name, icon) {
            document.getElementById('roomTitle').innerHTML = `${icon} ${name}`;
            document.getElementById('roomArea').innerHTML = `
                <h2 style="text-shadow: 0 0 15px red;">${icon} ${name}</h2>
                <p>აქ მალე გაიხსნება ${name}-ის ფუნქციონალი!</p>
            `;
            // თუ მობილურია, მენიუ ავტომატურად დაიკეტოს არჩევისას
            if (window.innerWidth <= 768) {
                toggleSidebar();
            }
        }

        // სესიის შემოწმება
        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = "index.html";
                return;
            }

            const nickname = user.user_metadata.nickname || user.email;
            document.getElementById('userName').innerText = nickname;

            // როლის შემოწმება ადმინისთვის
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('role')
                .eq('id', user.id)
                .single();

            if (profile && (profile.role === 'owner' || profile.role === 'admin')) {
                document.getElementById('adminRoom').style.display = 'flex';
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        checkUser();
    </script>
</body>
</html>
