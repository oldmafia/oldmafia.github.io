<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLD MAFIA CHAT</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:sans-serif;background:#0b0000;color:white;height:100vh;display:flex;flex-direction:column;}
.topbar{background:black;padding:12px;display:flex;align-items:center;gap:10px;box-shadow:0 0 10px red;}
.menu-btn{font-size:22px;cursor:pointer;}
#room-name{font-weight:bold;}
.sidebar{position:fixed;left:-260px;top:0;width:250px;height:100%;background:#070000;box-shadow:0 0 20px red;transition:0.3s;padding-top:60px;z-index:100;overflow-y:auto;}
.sidebar.active{left:0;}
.room{padding:15px;border-bottom:1px solid #300;cursor:pointer;}
.room:hover{background:#200;}
.chat{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;}
.message{display:flex;gap:10px;margin-bottom:15px;}
.avatar{width:40px;height:40px;border-radius:50%;background:red;flex-shrink:0;}
.msg{background:#111;padding:10px;border-radius:10px;box-shadow:0 0 5px red;max-width:75%;}
.nick{font-weight:bold;color:#ff4d4d;}
.time{font-size:11px;color:#888;margin-left:8px;}
.text-box{margin-top:4px;word-wrap:break-word;}
.input-area{display:flex;gap:10px;padding:10px;background:black;}
.input-area input{flex:1;padding:12px;border:none;border-radius:10px;background:#111;color:white;}
.send-btn{background:red;border:none;padding:10px 16px;border-radius:10px;color:white;font-size:18px;cursor:pointer;box-shadow:0 0 10px red;}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="room">☕ კაფე-ბარი</div>
  <div class="room">💎 ვიპ საუბრები</div>
  <div class="room">🕵️ გამოძიება</div>
  <div class="room">🔐 შიფროგრამა</div>
  <div class="room">❓ ვიქტორინა</div>
  <div class="room">😵 ჩამოხრჩობანა</div>
  <div class="room">🕴 მაფიის ღამე</div>
  <div class="room">🃏 ჯოკერი</div>
  <div class="room">🎲 ნარდი</div>
  <div class="room">🎵 მუსიკა</div>
  <div class="room">😂 იუმორი</div>
  <div class="room">🛠 ადმინისტრაცია</div>
  <div class="room" onclick="logout()">🚪 გასვლა</div>
</div>

<div class="topbar"><div class="menu-btn" onclick="menu()">☰</div><div id="room-name">აირჩიეთ ოთახი</div></div>
<div class="chat" id="chat"></div>
<div class="input-area"><input id="msg-input" placeholder="დაწერე მესიჯი..."><button class="send-btn" onclick="sendMsg()">✈</button></div>

<script>
const SUPABASE_URL = "https://ftfciebnywbondaiarnc.supabase.co";
const SUPABASE_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let nick = localStorage.getItem("nick") || "უცნობი";
let currentRoom = "☕ კაფე-ბარი"; // თავიდანვე იყოს არჩეული

function menu(){ document.getElementById("sidebar").classList.toggle("active"); }
function logout(){ localStorage.clear(); window.location.href="index.html"; }

function renderMessage(user, text, time) {
  let chat = document.getElementById("chat");
  chat.innerHTML += `<div class="message"><div class="avatar"></div><div class="msg"><span class="nick">${user}</span><span class="time">${time}</span><div class="text-box">${text}</div></div></div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function loadMessages(roomName) {
  const chatContainer = document.getElementById("chat");
  chatContainer.innerHTML = "<p style='color:red'>იტვირთება...</p>";
  
  let { data: messages, error } = await _supabase
    .from('messages')
    .select('*')
    .eq('room_nan', roomName) 
    .order('created_at', { ascending: true });

  chatContainer.innerHTML = ""; 
  if (messages) {
    messages.forEach(m => {
      let time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      renderMessage(m.user_nam || "უცნობი", m.text, time); 
    });
  }
}

document.querySelectorAll(".room").forEach(r => {
  r.onclick = () => {
    if(r.textContent.includes("გასვლა")) return;
    currentRoom = r.textContent.trim();
    document.getElementById("room-name").textContent = currentRoom;
    document.getElementById("sidebar").classList.remove("active");
    loadMessages(currentRoom);
  }
});

// ყველაზე მთავარი: გაგზავნის ფუნქცია
async function sendMsg() {
  const input = document.getElementById("msg-input");
  const messageText = input.value.trim();
  
  if (messageText === "") return;

  // ეგრევე ვასუფთავებთ ველს, რომ "გაჭედვის" ეფექტი არ ქონდეს
  input.value = "";

  const { error } = await _supabase.from('messages').insert([
    { 
      user_nam: nick, 
      text: messageText, 
      room_nan: currentRoom 
    }
  ]);
  
  if(error) {
    alert("ვერ გაიგზავნა: " + error.message);
    input.value = messageText; // თუ ვერ გაიგზავნა, ტექსტი დავაბრუნოთ
  }
}

// Real-time მოსმენა
_supabase.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
    if (payload.new.room_nan === currentRoom) {
        let time = new Date(payload.new.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        renderMessage(payload.new.user_nam, payload.new.text, time);
    }
}).subscribe();

document.getElementById("msg-input").addEventListener("keypress", (e) => { if (e.key === "Enter") sendMsg(); });

// ავტომატურად ჩავტვირთოთ პირველი ოთახი
loadMessages(currentRoom);
</script>
</body>
</html>
