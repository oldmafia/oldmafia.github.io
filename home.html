<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - CHAT</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; }

        /* მენიუ */
        #sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: #000; border-right: 1px solid red; transition: 0.3s; z-index: 1000; }
        #sidebar.closed { transform: translateX(-100%); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid red; display: flex; justify-content: space-between; align-items: center; }
        .room-list { padding: 10px 0; height: calc(100% - 130px); overflow-y: auto; }
        .room-item { padding: 12px 20px; cursor: pointer; color: #ccc; border-bottom: 1px solid #111; font-size: 13px; display: flex; align-items: center; gap: 10px; }
        .room-item.active { color: red; font-weight: bold; background: #0a0a0a; border-left: 4px solid red; }

        /* ჩატი */
        #main { flex: 1; display: flex; flex-direction: column; }
        .header { height: 60px; border-bottom: 1px solid red; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        .burger { font-size: 24px; color: red; cursor: pointer; }
        #roomTitle { color: red; font-weight: bold; font-size: 16px; text-transform: uppercase; }

        #msgList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { background: #0a0a0a; border: 1px solid #222; padding: 10px 15px; border-radius: 18px; max-width: 85%; align-self: flex-start; position: relative; }
        .msg-bubble.is-me { border-color: red; align-self: flex-end; }
        .u-name { color: #00e5ff; font-size: 11px; font-weight: bold; cursor: pointer; display: block; margin-bottom: 4px; }
        .msg-time { font-size: 9px; color: #444; margin-left: 8px; }

        /* საწერი */
        .input-area { padding: 15px; background: #000; border-top: 1px solid #111; }
        .input-box { display: flex; align-items: center; background: #0a0a0a; border: 1px solid #333; border-radius: 30px; padding: 5px 15px; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; height: 40px; }
        .send-btn { background: red; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .plane { font-size: 20px; transform: rotate(-15deg); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <a href="profile.html" style="color:white; text-decoration:none; border:1px solid red; padding:5px 10px; border-radius:10px; font-size:12px;">😎 პროფილი</a>
            <span style="color:red; cursor:pointer;" onclick="toggleMenu()">✕</span>
        </div>
        <div class="room-list">
            <div class="room-item active" onclick="changeRoom('💬 ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
            <div class="room-item" onclick="loadPrivateMessages(this)" style="color: #00e5ff; font-weight:bold;">📩 პირადი ყუთი</div>
            <div class="room-item" onclick="changeRoom('💎 VIP საუბრები', this)">💎 VIP საუბრები</div>
            <div class="room-item" onclick="changeRoom('🔍 გამოძიება', this)">🔍 გამოძიება</div>
            <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
            <div class="room-item" onclick="changeRoom('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="room-item" onclick="changeRoom('🪢 ჩამოხრჩობანა', this)">🪢 ჩამოხრჩობანა</div>
            <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
            <div class="room-item" onclick="changeRoom('🎲 ნარდი', this)">🎲 ნარდი</div>
            <div class="room-item" onclick="changeRoom('🎵 მუსიკა', this)">🎵 მუსიკა</div>
            <div class="room-item" onclick="changeRoom('🤣 იუმორი', this)">🤣 იუმორი</div>
            <div class="room-item" onclick="changeRoom('🎞️ კინოთეატრი', this)">🎞️ კინოთეატრი</div>
            <div class="room-item" onclick="changeRoom('🤝 გაცნობა', this)">🤝 გაცნობა</div>
            <div class="room-item" onclick="changeRoom('💭 ფილოსოფია', this)">💭 ფილოსოფია</div>
            <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        </div>
    </div>

    <div id="main">
        <div class="header">
            <div class="burger" onclick="toggleMenu()">☰</div>
            <div id="roomTitle">ზოგადი ჩატი</div>
        </div>
        <div id="msgList"></div>
        <div class="input-area" id="inputArea">
            <div class="input-box">
                <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." autocomplete="off">
                <button class="send-btn" onclick="sendMsg()"><span class="plane">✈️</span></button>
            </div>
        </div>
    </div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let myName = "User", myId = null, currentRoom = '💬 ზოგადი ჩატი';

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;
        const { data: p } = await client.from('profiles').select('username').eq('id', myId).single();
        if(p) myName = p.username;
        loadMsgs();
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (payload) => {
            if(payload.new.room_name === currentRoom) loadMsgs();
        }).subscribe();
    }

    async function loadMsgs() {
        if(currentRoom === "PRIVATE") return;
        const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).order('id', { ascending: true });
        const list = document.getElementById('msgList');
        list.innerHTML = msgs ? msgs.map(m => {
            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return `<div class="msg-bubble ${m.username === myName ? 'is-me' : ''}">
                <span class="u-name" onclick="directMsg('${m.user_id}', '${m.username}')">${m.username}</span>
                <span>${m.text} <small class="msg-time">${time}</small></span>
            </div>`;
        }).join('') : '';
        list.scrollTop = list.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const txt = input.value.trim();
        if(!txt) return;
        input.value = '';
        await client.from('messages').insert([{ user_id: myId, username: myName, text: txt, room_name: currentRoom }]);
    }

    async function directMsg(tid, tname) {
        if(tid === myId) return;
        const msg = prompt(`მიწერე პირადში ${tname}-ს:`);
        if(msg) {
            await client.from('private_messages').insert([{ sender_id: myId, receiver_id: tid, text: msg }]);
            alert("გაიგზავნა! 📩");
        }
    }

    async function loadPrivateMessages(el) {
        currentRoom = "PRIVATE";
        document.getElementById('roomTitle').innerText = "📩 პირადი ყუთი";
        document.getElementById('inputArea').style.display = 'none';
        
        const { data: dms } = await client.from('private_messages')
            .select('*, sender:sender_id(username), receiver:receiver_id(username)')
            .or(`receiver_id.eq.${myId},sender_id.eq.${myId}`)
            .order('created_at', { ascending: false });

        const list = document.getElementById('msgList');
        list.innerHTML = dms && dms.length > 0 ? dms.map(m => {
            const isMe = m.sender_id === myId;
            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return `<div class="msg-bubble" style="border-color: ${isMe ? 'red' : '#00e5ff'}; align-self: ${isMe ? 'flex-end' : 'flex-start'}; width: 90%;">
                <span class="u-name" onclick="directMsg('${isMe ? m.receiver_id : m.sender_id}', '${isMe ? m.receiver?.username : m.sender?.username}')">
                    ${isMe ? 'მე -> ' + m.receiver?.username : m.sender?.username + ' -> მე'} (პასუხი)
                </span>
                <span>${m.text} <small class="msg-time">${time}</small></span>
            </div>`;
        }).join('') : '<p style="text-align:center;">ცარიელია</p>';
        
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        toggleMenu();
    }

    function changeRoom(name, el) {
        currentRoom = name;
        document.getElementById('roomTitle').innerText = name;
        document.getElementById('inputArea').style.display = 'block';
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        toggleMenu();
        loadMsgs();
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('closed'); }
    init();
    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
