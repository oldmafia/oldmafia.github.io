<!DOCTYPE html>
<html lang="ka">
<head>

    <title>კაიფმანია - მთავარი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --dark: #0a0a0a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; }
        
        /* მარცხენა მენიუ */
        .sidebar { width: 260px; background: #111; border-right: 2px solid var(--red); display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(255,0,0,0.2); }
        .sidebar h2 { color: var(--red); text-align: center; padding: 20px; text-shadow: 0 0 10px var(--red); margin: 0; border-bottom: 1px solid #222; }
        .rooms { flex-grow: 1; overflow-y: auto; }
        .room-link { padding: 12px 20px; display: block; color: #ccc; text-decoration: none; border-bottom: 1px solid #1a1a1a; transition: 0.3s; cursor: pointer; }
        .room-link:hover, .room-link.active { background: var(--red); color: white; box-shadow: 0 0 10px var(--red); }

        /* ჩატის მხარე */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 25px; background: #151515; border-bottom: 1px solid var(--red); display: flex; justify-content: space-between; align-items: center; }
        #chat-messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* მესიჯის სტილი */
        .msg { background: #1a1a1a; padding: 10px 15px; border-radius: 10px; border-left: 3px solid var(--red); max-width: 80%; }
        .msg-user { color: var(--red); font-weight: bold; font-size: 0.85rem; margin-bottom: 4px; }

        /* ინპუტი */
        .input-box { padding: 20px; background: #111; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex-grow: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; outline: none; }
        input:focus { border-color: var(--red); }
        button#sendBtn { background: var(--red); color: white; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        #user-info { font-size: 0.9rem; color: #888; }
    </style>
</head>

<div class="sidebar">
    <h2>კაიფმანია 🔗</h2>
    <div class="rooms" id="roomsList"></div>
    <a href="#" onclick="logout()" class="room-link" style="color: #ff4444; border-top: 1px solid #333;">გასვლა 🚪</a>

<div class="chat-area">
    <div class="chat-header">
        <span id="activeRoomTitle">აირჩიეთ ოთახი</span>
        <span id="user-info">იტვირთება...</span>
    </div>
    <div id="chat-messages"></div>
    <div class="input-box">
        <input type="text" id="messageInput" placeholder="დაწერე შეტყობინება...">
        <button id="sendBtn">გაგზავნა</button>
