<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .header { height: 50px; background: #000; border-bottom: 2px solid red; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-shadow: 0 0 10px red; z-index: 100; }
        .burger { font-size: 24px; color: red; cursor: pointer; }
        #roomTitle { font-size: 14px; font-weight: bold; }
        
        /* შეტყობინებების მთვლელი */
        .pm-container { position: relative; display: flex; align-items: center; }
        .pm-trigger { color: red; font-size: 24px; cursor: pointer; }
        #pmCounter { 
            position: absolute; top: -5px; right: -8px; background: red; color: white; 
            font-size: 10px; font-weight: bold; min-width: 18px; height: 18px; 
            border-radius: 50%; display: none; align-items: center; justify-content: center; 
            box-shadow: 0 0 5px white; border: 1px solid black;
        }

        /* Chat */
        #msgList { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg-bubble { padding: 8px 12px; border-radius: 12px; max-width: 80%; background: #111; border: 1px solid #222; font-size: 14px; }
        .msg-bubble.is-me { background: #000; border: 1px solid red; align-self: flex-end; box-shadow: 0 0 8px rgba(255,0,0,0.2); }
        .u-name { color: #ff4d4d; font-size: 11px; font-weight: bold; margin-bottom: 3px; display: block; }

        /* Input Area */
        .input-area { padding: 10px; background: #000; border-top: 1px solid red; display: flex; gap: 8px; align-items: center; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid red; border-radius: 20px; padding: 0 15px; height: 40px; display: flex; align-items: center; }
        input { width: 100%; border: none; background: transparent; color: #fff; outline: none; font-size: 15px; }
        .send-btn { background: red; color: #000; width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px red; }

        /* Sidebar */
        #sidebar { position: fixed; top: -100vh; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.98); transition: 0.4s; z-index: 2000; padding-top: 60px; overflow-y: auto; }
        #sidebar.open { top: 0; }
        .room-item { padding: 15px 25px; border-bottom: 1px solid #111; color: #bbb; cursor: pointer; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .room-item.active { color: red; font-weight: bold; background: #080808; border-left: 5px solid red; }
    </style>
</head>
<body>

    <div class="header">
        <div class="burger" onclick="toggleMenu()">☰</div>
        <div id="roomTitle">💬 კაიფმანია</div>
        <div class="pm-container" onclick="openPM()">
            <div class="pm-trigger">📩</div>
            <div id="pmCounter">0</div>
        </div>
    </div>

    <div id="sidebar">
        <div class="room-item active" onclick="changeRoom('💬 კაიფმანია', this)">💬 კაიფმანია</div>
        <div class="room-item" onclick="changeRoom('🍷 კაფე-ბარი', this)">🍷 კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('🔐 VIP-საუბრები', this)">🔐 VIP-საუბრები</div>
        <div class="room-item" onclick="changeRoom('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('🔓 შიფროგრამა', this)">🔓 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('⚜️ ნარდი', this)">⚜️ ნარდი</div>
        <div class="room-item" onclick="changeRoom('💖 სიყვარული', this)">💖 სიყვარული</div>
        <div class="room-item" onclick="changeRoom('🤣 იუმორი', this)">🤣 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🎵 მელომანია', this)">🎵 მელომანია</div>
        <div class="room-item" onclick="changeRoom('📜 ფორუმი', this)">📜 ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('🆘 SOS', this)">🆘 SOS</div>
        <div style="text-align:center; padding: 25px; color:red; font-weight:bold" onclick="toggleMenu()">✕ დახურვა</div>
    </div>

    <div id="msgList"></div>

    <div class="input-area">
        <div class="input-box"><input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." autocomplete="off"></div>
        <button class="send-btn" onclick="sendMsg()">✈️</button>
    </div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let myId, myName = "User", currentRoom = '💬 კაიფმანია', unreadCount = 0;

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;

        const { data: p } = await client.from('profiles').select('username').eq('id', myId).single();
        myName = (p && p.username) ? p.username : user.email.split('@')[0];

        loadMsgs();
        
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (pl) => {
            if(pl.new.room_name === currentRoom) {
                appendMsg(pl.new);
            } else {
                updateCounter();
            }
        }).subscribe();
    }

    function updateCounter() {
        unreadCount++;
        const badge = document.getElementById('pmCounter');
        badge.innerText = unreadCount;
        badge.style.display = 'flex';
    }

    async function loadMsgs() {
        const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).order('id', { ascending: true }).limit(50);
        const list = document.getElementById('msgList');
        list.innerHTML = msgs ? msgs.map(m => renderMsg(m)).join('') : '';
        list.scrollTop = list.scrollHeight;
    }

    function renderMsg(m) {
        return `<div class="msg-bubble ${m.username === myName ? 'is-me' : ''}">
                    <span class="u-name">${m.username}</span>
                    <span>${m.text}</span>
                </div>`;
    }

    function appendMsg(m) {
        const list = document.getElementById('msgList');
        list.innerHTML += renderMsg(m);
        list.scrollTop = list.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim()) return;
        const txt = inp.value;
        inp.value = '';
        await client.from('messages').insert([{ user_id: myId, username: myName, text: txt, room_name: currentRoom }]);
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    
    function openPM() { 
        unreadCount = 0;
        document.getElementById('pmCounter').style.display = 'none';
        alert("პირადი ყუთი იხსნება..."); 
    }

    function changeRoom(name, el) {
        currentRoom = name;
        document.getElementById('roomTitle').innerText = name;
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        toggleMenu();
        loadMsgs();
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    init();
</script>
</body>
</html>
