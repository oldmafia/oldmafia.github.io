<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OLD MAFIA CHAT</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0b0000;
color:white;
}

/* ზედა ბარი */

.topbar{
display:flex;
align-items:center;
background:#000;
padding:10px;
box-shadow:0 0 10px red;
}

.menu-btn{
font-size:24px;
cursor:pointer;
margin-right:10px;
}

/* sidebar */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:250px;
height:100%;
background:#050000;
box-shadow:0 0 20px red;
transition:0.3s;
padding-top:60px;
z-index:100;
}

.sidebar.active{
left:0;
}

.room{
padding:15px;
border-bottom:1px solid #300;
cursor:pointer;
}

.room:hover{
background:#200;
}

/* ჩატი */

.chat-container{
display:flex;
flex-direction:column;
height:100vh;
}

.chat{
flex:1;
overflow-y:auto;
padding:15px;
}

/* მესიჯი */

.message{
display:flex;
gap:10px;
margin-bottom:15px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:red;
}

.msg-box{
background:#111;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px red;
max-width:70%;
}

.nick{
font-weight:bold;
}

.time{
font-size:11px;
color:#aaa;
margin-left:5px;
}

/* შეტყობინების ველი */

.input-area{
display:flex;
padding:10px;
background:#000;
gap:10px;
}

.input-area input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#111;
color:white;
}

.send{
background:red;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 10px red;
}

</style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar" id="sidebar">

<div class="room">☕ კაფე-ბარი</div>
<div class="room">💎 ვიპ საუბრები</div>
<div class="room">🕵️ გამოძიება</div>
<div class="room">🔐 შიფროგრამა</div>
<div class="room">❓ ვიქტორინა</div>
<div class="room">😵 ჩამოხრჩობანა</div>
<div class="room">🕴 მაფიის ღამე</div>
<div class="room">🃏 ჯოკერი</div>
<div class="room">🎲 ნარდი</div>
<div class="room">🎵 მუსიკა</div>
<div class="room">😂 იუმორი</div>
<div class="room">🛠 ადმინისტრაცია</div>
<div class="room">🆘 დახმარება</div>
<div class="room">💬 ფორუმი</div>
<div class="room">🚪 გასვლა</div>

</div>

<div class="chat-container">

<!-- ზედა ბარი -->

<div class="topbar">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div>OLD MAFIA CHAT</div>

</div>

<!-- ჩატი -->

<div class="chat" id="chat">

<div class="message">

<div class="avatar"></div>

<div class="msg-box">

<span class="nick">Nika</span>
<span class="time">21:34</span>

<div>გამარჯობა 👋</div>

</div>

</div>

</div>

<!-- ტექსტის ველი -->

<div class="input-area">

<input id="msgInput" placeholder="დაწერე მესიჯი...">

<button class="send" onclick="sendMsg()">✈</button>

</div>

</div>

<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

document.querySelectorAll(".room").forEach(room=>{
room.onclick=function(){
document.getElementById("sidebar").classList.remove("active");
}
})

function sendMsg(){

let input=document.getElementById("msgInput");

if(input.value.trim()=="") return;

let chat=document.getElementById("chat");

let time=new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

let msg=`
<div class="message">
<div class="avatar"></div>
<div class="msg-box">
<span class="nick">შენ</span>
<span class="time">${time}</span>
<div>${input.value}</div>
</div>
</div>
`;

chat.innerHTML+=msg;

input.value="";

chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
