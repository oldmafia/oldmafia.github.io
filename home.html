<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - OLD STYLE</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #000; --panel: #111; --blue: #00a2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar - ზუსტად ისე, როგორც სქრინზეა */
        .sidebar { width: 250px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .p-area { padding: 20px; text-align: center; border-bottom: 1px solid #222; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--red); }
        .u-nick { margin-top: 10px; font-weight: bold; color: #fff; }

        .r-list { flex-grow: 1; overflow-y: auto; }
        .r-item { padding: 12px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #aaa; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
        .r-item:hover { background: #1a1a1a; color: white; }
        .r-item.active { background: rgba(255, 0, 0, 0.2); color: white; border-left: 4px solid var(--red); }
        .r-item svg { width: 16px; height: 16px; fill: var(--red); }

        /* გასვლა */
        .exit-btn { color: #ff4444 !important; border-top: 1px solid #333; margin-top: 10px; }
        .exit-btn svg { fill: #ff4444 !important; }

        /* Chat Area */
        .chat-main { flex-grow: 1; display: flex; flex-direction: column; }
        .header { height: 50px; padding: 0 20px; display: flex; align-items: center; background: #080808; border-bottom: 1px solid #222; color: var(--red); font-weight: bold; }
        #msgs { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        /* Message Bubble - დრო შიგნით */
        .m-wrap { align-self: flex-start; max-width: 80%; }
        .m-nick { font-size: 11px; color: var(--red); font-weight: bold; margin-bottom: 2px; }
        .m-bubble { background: #1e1e1e; padding: 10px 15px; border-radius: 0 15px 15px 15px; border: 1px solid #333; position: relative; min-width: 100px; }
        .m-text { font-size: 14px; color: #ddd; padding-bottom: 12px; word-break: break-word; }
        .m-time { position: absolute; bottom: 4px; right: 10px; font-size: 10px; color: #666; }

        /* Input */
        .input-bar { padding: 15px; background: #000; border-top: 1px solid #222; display: flex; align-items: center; gap: 10px; }
        .in-wrap { flex-grow: 1; background: #111; border-radius: 20px; border: 1px solid #333; padding: 0 15px; }
        input { width: 100%; background: transparent; border: none; padding: 10px; color: white; outline: none; }

        /* ✈️ რეალური თვითმფრინავი (SVG) */
        .plane-send { width: 40px; height: 40px; cursor: pointer; fill: var(--blue); transition: 0.2s; }
        .plane-send:hover { transform: scale(1.1); filter: brightness(1.2); }
    </style>
</head>
