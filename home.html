<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - FINAL</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 60px; border-bottom: 2px solid red; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; }
        .burger { color: red; font-size: 26px; cursor: pointer; }
        #sidebar { position: fixed; top: 0; left: -100%; width: 80%; height: 100%; background: #000; transition: 0.3s; z-index: 2000; border-right: 2px solid red; overflow-y: auto; }
        #sidebar.open { left: 0; }
        .room-item { padding: 15px 25px; border-bottom: 1px solid #111; color: #bbb; cursor: pointer; }
        .room-item.active { color: red; background: #080808; border-left: 5px solid red; }
        #msgList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg-row { display: flex; flex-direction: column; align-items: flex-start; max-width: 85%; align-self: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 18px; background: #111; border: 1px solid #222; width: 100%; }
        .me .bubble { border-color: red; }
        .u-nick { font-size: 11px; font-weight: bold; color: red; display: block; margin-bottom: 3px; }
        .m-time { font-size: 9px; color: #555; float: right; margin-top: 5px; }
        .input-area { padding: 12px; border-top: 1px solid red; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: #0a0a0a; border: 1px solid red; border-radius: 25px; padding: 10px 15px; color: #fff; outline: none; }
        button { background: red; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><div class="burger" onclick="toggleMenu()">☰</div><div id="roomTitle">💬 კაიფმანია</div><div></div></div>
    <div id="sidebar">
        <div style="padding:40px 20px; text-align:center; border-bottom:1px solid #222;">
            <img id="myImg" style="width:70px; border-radius:50%; border:2px solid red;">
            <p id="myNick" style="margin-top:10px; font-weight:bold;"></p>
        </div>
        <div class="room-item active" onclick="changeRoom('💬 კაიფმანია', this)">💬 კაიფმანია</div>
        <div class="room-item" onclick="changeRoom('🍷 კაფე-ბარი', this)">🍷 კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
        <div class="room-item" onclick="logout()" style="color:red; margin-top:20px;">🚪 გასვლა</div>
    </div>
    <div id="msgList"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="დაწერე..." autocomplete="off">
        <button onclick="sendMsg()">✈️</button>
    </div>

<script>
    const client = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myId, myName, currentRoom = '💬 კაიფმანია';

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;

        // ნიკის გასწორება (მეილის მოჭრა)
        let raw = user.user_metadata?.username || user.email.split('@')[0];
        myName = raw.split('@')[0]; 

        document.getElementById('myNick').innerText = myName;
        document.getElementById('myImg').src = `https://ui-avatars.com/api/?name=${myName}&background=000&color=f00`;

        loadMsgs();

        // Realtime - მხოლოდ სხვისი მესიჯებისთვის
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (p) => {
            if(p.new.room_name === currentRoom && p.new.user_id !== myId) appendMsg(p.new);
        }).subscribe();
    }

    async function loadMsgs() {
        const list = document.getElementById('msgList');
        list.innerHTML = "";
        const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        if(msgs) msgs.forEach(m => appendMsg(m));
        list.scrollTop = list.scrollHeight;
    }

    function appendMsg(m) {
        const list = document.getElementById('msgList');
        const isMe = m.user_id === myId;
        const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const div = document.createElement('div');
        div.className = `msg-row ${isMe ? 'me' : ''}`;
        div.innerHTML = `<div class="bubble"><span class="u-nick">${m.username}</span><span>${m.text}</span><span class="m-time">${time}</span></div>`;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim()) return;
        const text = inp.value; inp.value = "";
        
        // ჯერ ვხატავთ ჩვენთან
        appendMsg({ user_id: myId, username: myName, text: text, created_at: new Date() });
        
        // მერე ვაგზავნით ბაზაში
        await client.from('messages').insert([{ user_id: myId, username: myName, text: text, room_name: currentRoom }]);
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function changeRoom(n, el) { currentRoom = n; document.getElementById('roomTitle').innerText = n; loadMsgs(); toggleMenu(); }
    async function logout() { await client.auth.signOut(); window.location.href = 'index.html'; }
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
    init();
</script>
</body>
</html>
