<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* მარცხენა მენიუ - ოთახები */
        .sidebar { width: 90px; background: #0a0a0a; border-right: 2px solid #222; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; }
        .room-icon { width: 65px; height: 65px; background: #151515; border-radius: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 2px solid #333; transition: 0.4s; font-size: 11px; font-weight: bold; text-align: center; color: #888; }
        .room-icon:hover, .room-icon.active { border-color: red; color: white; box-shadow: 0 0 20px red; transform: scale(1.05); background: #200; }

        /* ჩატის ცენტრალური ნაწილი */
        .chat-main { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #222; }
        .header { height: 70px; background: #0d0d0d; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; }
        .header h2 { color: red; margin: 0; font-size: 20px; text-shadow: 0 0 15px red; }

        .messages-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* ყველა მესიჯი მარცხნივ */
        .message { 
            background: rgba(25, 25, 25, 0.9); 
            padding: 10px 15px; 
            border-radius: 5px 15px 15px 15px; 
            border-left: 3px solid red; 
            max-width: 85%; 
            align-self: flex-start; /* აი ეს აჩერებს ყველაფერს მარცხნივ */
        }
        .message b { color: red; display: block; font-size: 12px; margin-bottom: 2px; }
        .message span { font-size: 15px; line-height: 1.4; }

        /* მარჯვენა დაფა - იუზერები */
        .users-panel { width: 220px; background: #0a0a0a; padding: 20px 10px; overflow-y: auto; }
        .user-item { padding: 10px; background: #151515; border-radius: 10px; cursor: pointer; border: 1px solid #333; margin-bottom: 8px; transition: 0.3s; font-size: 14px; color: #bbb; }
        .user-item:hover, .user-item.active { border-color: red; color: white; box-shadow: 0 0 10px red; background: #1a0000; }

        /* ქვედა საწერი ზოლი */
        .input-bar { padding: 15px 25px; background: #0d0d0d; border-top: 1px solid #222; display: flex; gap: 15px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 14px; color: white; border-radius: 25px; outline: none; }
        input:focus { border-color: red; }
        .send-btn { background: red; color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .send-btn:hover { background: darkred; box-shadow: 0 0 10px red; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="room-icon active" onclick="setMode('room', 'general', this)">ზოგადი</div>
        <div class="room-icon" onclick="setMode('room', 'mafia', this)">მაფია</div>
        <div class="room-icon" onclick="setMode('room', 'vip', this)">VIP</div>
    </div>

    <div class="chat-main">
        <div class="header">
            <h2 id="chat-title">ზოგადი ჩატი</h2>
            <div id="my-name" style="color: #666; font-size: 13px;">...</div>
        </div>
        <div class="messages-box" id="chat-messages"></div>
        <div class="input-bar">
            <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">გაგზავნა</button>
        </div>
    </div>

    <div class="users-panel">
        <h4 style="color: red; margin: 0 0 15px 10px; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">ონლაინ იუზერები</h4>
        <div id="users-list"></div>
    </div>

    <script>
        const SB_URL = "https://ftfciebnywbondaiarnc.supabase.co";
        const SB_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let myProfile = null;
        let chatMode = 'room'; 
        let targetId = 'general'; 

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = "index.html"; return; }

            let { data: p } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
            myProfile = p || { id: user.id, username: user.email.split('@')[0] };
            document.getElementById('my-name').innerText = "შენ: " + myProfile.username;

            loadMessages();
            loadUsers();
            setupRealtime();
        }

        async function loadUsers() {
            const { data } = await supabaseClient.from('profiles').select('*').neq('id', myProfile.id);
            const list = document.getElementById('users-list');
            list.innerHTML = '';
            data?.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerText = u.username;
                div.onclick = () => setMode('private', u.id, div, u.username);
                list.appendChild(div);
            });
        }

        async function loadMessages() {
            const box = document.getElementById('chat-messages');
            box.innerHTML = '';
            
            let query;
            if (chatMode === 'room') {
                query = supabaseClient.from('messages').select('*').eq('room', targetId);
            } else {
                query = supabaseClient.from('private_messages').select('*')
                    .or(`and(sender_id.eq.${myProfile.id},receiver_id.eq.${targetId}),and(sender_id.eq.${targetId},receiver_id.eq.${myProfile.id})`);
            }

            const { data } = await query.order('inserted_at', { ascending: true });
            data?.forEach(m => renderMsg(m));
            box.scrollTop = box.scrollHeight;
        }

        function setMode(mode, id, el, name) {
            chatMode = mode;
            targetId = id;
            document.getElementById('chat-title').innerText = mode === 'room' ? id.toUpperCase() + " ჩატი" : "პრივატი: " + name;
            document.querySelectorAll('.room-icon, .user-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            loadMessages();
        }

        async function sendMessage() {
            const inp = document.getElementById('msgInput');
            const val = inp.value.trim();
            if (!val) return;

            if (chatMode === 'room') {
                await supabaseClient.from('messages').insert([{
                    content: val, 
                    user_id: myProfile.id, 
                    user_email: myProfile.username, 
                    room: targetId 
                }]);
            } else {
                await supabaseClient.from('private_messages').insert([{
                    content: val, 
                    sender_id: myProfile.id, 
                    receiver_id: targetId, 
                    sender_username: myProfile.username 
                }]);
            }
            inp.value = '';
        }

        function renderMsg(m) {
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<b>${m.user_email || m.sender_username}</b><span>${m.content}</span>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function setupRealtime() {
            supabaseClient.channel('db-changes').on('postgres_changes', { event: 'INSERT', schema: 'public' }, payload => {
                const m = payload.new;
                const table = payload.table;

                if (table === 'messages' && chatMode === 'room' && m.room === targetId) {
                    renderMsg(m);
                } else if (table === 'private_messages' && chatMode === 'private') {
                    if ((m.sender_id === myProfile.id && m.receiver_id === targetId) || 
                        (m.sender_id === targetId && m.receiver_id === myProfile.id)) {
                        renderMsg(m);
                    }
                }
            }).subscribe();
        }

        init();
    </script>
</body>
</html>
