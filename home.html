<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - SIDEBAR VERSION</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #0a0a0a; --panel: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .nav { height: 60px; background: #000; display: flex; align-items: center; padding: 0 15px; border-bottom: 2px solid #222; z-index: 100; }
        .burger { font-size: 30px; cursor: pointer; color: var(--red); margin-right: 15px; }
        .room-title { font-weight: bold; font-size: 18px; }

        /* Sidebar - გვერდიდან გამოსასვლელი */
        .sidebar { 
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%; 
            background: var(--panel); z-index: 1000; transition: 0.3s ease;
            box-shadow: 5px 0 20px rgba(0,0,0,0.8); display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }
        
        /* ფონი მენიუს დროს */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; z-index: 999; 
        }
        .overlay.active { display: block; }

        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #222; }
        .rooms-container { flex-grow: 1; overflow-y: auto; }
        .room-btn { padding: 15px 20px; border-bottom: 1px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 16px; }
        .room-btn:hover { background: #1a1a1a; }
        .room-btn.exit { color: #ff4444; border-top: 2px solid #333; font-weight: bold; }

        /* Chat Area */
        #chat { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .m-wrap { align-self: flex-start; width: 95%; }
        .m-bubble { background: #1a1a1a; border: 1px solid #333; padding: 12px 15px; border-radius: 4px 18px 18px 18px; position: relative; }
        .m-nick { font-size: 12px; color: var(--red); font-weight: bold; margin-bottom: 4px; display: block; }
        .m-text { font-size: 15px; color: #eee; padding-bottom: 15px; }
        .m-time { position: absolute; bottom: 5px; right: 12px; font-size: 10px; color: #555; }

        /* Input Bar */
        .footer { padding: 12px; background: #000; display: flex; align-items: center; gap: 10px; border-top: 1px solid #222; }
        .input-wrap { flex-grow: 1; background: #111; border-radius: 25px; border: 1px solid #333; padding: 2px 15px; }
        input { width: 100%; background: transparent; border: none; padding: 10px; color: white; outline: none; font-size: 16px; }

        /* ✈️ აი ეს არის ნამდვილი თვითმფრინავი */
        .plane-btn { width: 45px; height: 45px; cursor: pointer; transition: 0.2s; }
        .plane-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="nav">
        <div class="burger" onclick="openNav()">☰</div>
        <div class="room-title" id="curRoom">☕ კაფე-ბარი</div>
    </div>

    <div class="overlay" id="overlay" onclick="closeNav()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 style="color:var(--red)">მენიუ</h2>
        </div>
        <div class="rooms-container">
            <div class="room-btn" onclick="sel('კაიფმანია', '✨')">✨ კაიფმანია</div>
            <div class="room-btn" onclick="sel('კაფე-ბარი', '☕')">☕ კაფე-ბარი</div>
            <div class="room-btn" onclick="sel('ვიპ საუბრები', '👑')">👑 ვიპ საუბრები</div>
            <div class="room-btn" onclick="sel('გამოძიება', '🔍')">🔍 გამოძიება</div>
            <div class="room-btn" onclick="sel('ჯოკერი', '♠')">♠ ჯოკერი</div>
            <div class="room-btn" onclick="sel('ნარდი', '🎲')">🎲 ნარდი</div>
            <div class="room-btn" onclick="sel('მუსიკა', '🎵')">🎵 მუსიკა</div>
            <div class="room-btn exit" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

    <div id="chat"></div>

    <div class="footer">
        <div class="input-wrap"><input type="text" id="mIn" placeholder="დაწერე რამე..."></div>
        <img src="https://cdn-icons-png.flaticon.com/512/739/739249.png" class="plane-btn" id="mSend" alt="Send">
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let activeR = "კაფე-ბარი", nick = "სტუმარი";

        function openNav() { 
            document.getElementById('sidebar').classList.add('open'); 
            document.getElementById('overlay').classList.add('active'); 
        }
        function closeNav() { 
            document.getElementById('sidebar').classList.remove('open'); 
            document.getElementById('overlay').classList.remove('active'); 
        }

        function sel(n, e) { 
            activeR = n; 
            document.getElementById('curRoom').innerText = e + " " + n; 
            closeNav(); 
            load(); 
        }

        async function logout() { await supabaseClient.auth.signOut(); window.location.href = "index.html"; }

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
