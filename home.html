<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar - ლამაზი დიზაინი */
        .sidebar { width: 260px; min-width: 260px; background: #080808; border-right: 1px solid red; display: flex; flex-direction: column; }
        .profile-area { padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; background: linear-gradient(to bottom, #150000, #000); }
        
        .avatar-box { width: 80px; height: 80px; margin: 0 auto 10px; position: relative; }
        .avatar-box img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid red; object-fit: cover; }
        .cam-icon { position: absolute; bottom: 0; right: 0; background: red; border-radius: 50%; padding: 4px; font-size: 10px; cursor: pointer; }

        .nick { color: red; font-size: 18px; font-weight: bold; margin: 5px 0; }
        .founder-badge { background: gold; color: #000; font-size: 10px; padding: 2px 10px; border-radius: 10px; font-weight: bold; text-transform: uppercase; }
        
        .status-display { font-size: 11px; color: #888; margin: 8px 0; min-height: 14px; font-style: italic; }
        .status-btn { background: #1a1a1a; border: 1px solid #333; color: #ccc; font-size: 10px; padding: 5px 10px; border-radius: 5px; cursor: pointer; width: 100%; }

        /* მენიუ */
        .rooms { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        .room { padding: 12px 20px; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; transition: 0.2s; }
        .room:hover { background: #111; color: #fff; }
        .room.active { background: #1a0000; color: red; border-left: 3px solid red; font-weight: bold; }

        /* ჩატი */
        .chat-main { flex-grow: 1; display: flex; flex-direction: column; background: #050505; }
        .chat-header { padding: 15px; border-bottom: 1px solid #111; font-weight: bold; font-size: 14px; color: red; background: #080808; }
        .messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg-bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg-user { font-size: 9px; color: #666; margin-bottom: 3px; display: block; }
        .my-msg { align-self: flex-end; background: red; color: #fff; border-bottom-right-radius: 2px; }
        .other-msg { align-self: flex-start; background: #1a1a1a; color: #eee; border-bottom-left-radius: 2px; }

        .input-bar { padding: 10px; background: #080808; border-top: 1px solid #111; display: flex; gap: 8px; }
        .input-bar input { flex: 1; background: #151515; border: 1px solid #333; color: #fff; padding: 10px 15px; border-radius: 20px; outline: none; font-size: 14px; }
        .send-btn { background: red; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        @media (max-width: 700px) { .sidebar { width: 100px; min-width: 100px; } .room span { display: none; } .nick, .status-btn, .founder-badge { font-size: 9px; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="profile-area">
            <div class="avatar-box" onclick="document.getElementById('fInp').click()">
                <img id="uImg" src="https://via.placeholder.com/80">
                <div class="cam-icon">📷</div>
            </div>
            <input type="file" id="fInp" hidden onchange="upAv(this)">
            <div class="nick" id="uNick">...</div>
            <div class="founder-badge">დამფუძნებელი</div>
            <div class="status-display" id="uStat">სტატუსი არაა</div>
            <button class="status-btn" onclick="setStat()">სტატუსის შეცვლა</button>
        </div>

        <div class="rooms">
            <div class="room active" onclick="chRoom('💬 ზოგადი ჩატი', this)">💬 <span>ზოგადი ჩატი</span></div>
            <div class="room" onclick="chRoom('💎 VIP საუბრები', this)">💎 <span>VIP საუბრები</span></div>
            <div class="room" onclick="chRoom('🔍 გამოძიება', this)">🔍 <span>გამოძიება</span></div>
            <div class="room" onclick="chRoom('🔐 შიფროგრამა', this)">🔐 <span>შიფროგრამა</span></div>
            <div class="room" onclick="chRoom('🧩 ვიქტორინა', this)">🧩 <span>ვიქტორინა</span></div>
            <div class="room" onclick="chRoom('🪢 ჩამოხრჩობანა', this)">🪢 <span>ჩამოხრჩობანა</span></div>
            <div class="room" onclick="chRoom('🌑 მაფიის ღამე', this)">🌑 <span>მაფიის ღამე</span></div>
            <div class="room" onclick="chRoom('🎵 მუსიკა', this)">🎵 <span>მუსიკა</span></div>
            <div class="room" onclick="chRoom('🛡️ ადმინისტრაცია', this)">🛡️ <span>ადმინისტრაცია</span></div>
        </div>
        <div style="padding:15px; border-top:1px solid #111; cursor:pointer; color:red; font-size:12px;" onclick="logout()">🚪 გასვლა</div>
    </div>

    <div class="chat-main">
        <div class="chat-header" id="rTitle">💬 ზოგადი ჩატი</div>
        <div class="messages" id="mBox"></div>
        <div class="input-bar">
            <input type="text" id="mIn" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let me = {}, room = '💬 ზოგადი ჩატი';

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return location.href="index.html";

        let { data: p } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
        me = { id: user.id, nick: p?.username || "tojina", avatar: p?.avatar_url || "https://via.placeholder.com/80", stat: p?.status || "სტატუსი არაა" };

        document.getElementById('uNick').innerText = me.nick;
        document.getElementById('uImg').src = me.avatar;
        document.getElementById('uStat').innerText = me.stat;

        load();
        sb.channel('any').on('postgres_changes',{event:'*',schema:'public',table:'messages'},()=>load()).subscribe();
    }

    async function setStat() {
        const s = prompt("შეიყვანე ახალი სტატუსი:");
        if(!s) return;
        const { error } = await sb.from('profiles').update({ status: s }).eq('id', me.id);
        if(!error) { document.getElementById('uStat').innerText = s; me.stat = s; }
    }

    async function upAv(el) {
        const file = el.files[0]; if(!file) return;
        const path = `avatars/${me.id}_${Date.now()}`;
        const { data } = await sb.storage.from('avatars').upload(path, file);
        if(data) {
            const { data: { publicUrl } } = sb.storage.from('avatars').getPublicUrl(path);
            await sb.from('profiles').update({ avatar_url: publicUrl }).eq('id', me.id);
            document.getElementById('uImg').src = publicUrl;
        }
    }

    async function load() {
        const { data } = await sb.from('messages').select('*').eq('room', room).order('created_at', { ascending: true }).limit(50);
        const box = document.getElementById('mBox');
        if(!data) return;
        box.innerHTML = data.map(m => `
            <div class="msg-bubble ${m.user_id === me.id ? 'my-msg' : 'other-msg'}">
                <span class="msg-user">${m.username}</span>
                ${m.text}
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('mIn'); if(!i.value.trim()) return;
        await sb.from('messages').insert([{ text: i.value, room: room, user_id: me.id, username: me.nick }]);
        i.value = "";
    }

    function chRoom(n, el) {
        room = n; document.getElementById('rTitle').innerText = n;
        document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
        el.classList.add('active'); load();
    }

    async function logout() { await sb.auth.signOut(); location.href="index.html"; }
    init();
</script>
</body>
</html>
