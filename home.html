<!DOCTYPE html>

    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ჰედერი */
        .header { height: 60px; background: #0a0a0a; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #1a1a1a; z-index: 1000; }
        .room-btn { background: #1a0000; border: 1px solid #ff0000; color: white; padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; }

        /* ოთახების ჩამონათვალი (ჩამოსაშლელი) */
        .rooms-dropdown { 
            position: absolute; top: 65px; left: 10px; right: 10px; 
            background: rgba(10, 10, 10, 0.98); border: 1px solid #ff0000; 
            border-radius: 15px; display: none; flex-direction: column; 
            max-height: 70vh; overflow-y: auto; z-index: 2000; 
        }
        .room-item { padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 14px; color: #ccc; }
        .room-item:active { background: #2b0000; color: #ff0000; }

        /* ჩატის ველი */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #000; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg.others { background: #111; align-self: flex-start; border: 1px solid #222; }
        .msg.me { background: #220000; align-self: flex-end; border: 1px solid #440000; }
        .msg b { display: block; font-size: 11px; color: #ff0000; margin-bottom: 3px; }

        /* საწერი ველი */
        .footer { padding: 10px; background: #0a0a0a; display: flex; gap: 10px; align-items: center; border-top: 1px solid #1a1a1a; }
        #input { flex: 1; background: #1a1a1a; border: none; padding: 12px 18px; color: white; border-radius: 25px; outline: none; }
        .btn-send { background: #ff0000; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* ონლაინ ხალხის პანელი */
        .online-modal { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: #000; z-index: 3000; transition: 0.3s; padding: 20px; }
        .online-modal.active { right: 0; }
        .u-item { padding: 15px; background: #0d0d0d; border-radius: 10px; margin-bottom: 8px; border: 1px solid #1a1a1a; }
    </style>
</head>
