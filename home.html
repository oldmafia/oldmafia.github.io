<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLD MAFIA CHAT</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0000;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* TOP BAR */
.topbar{
  background:black;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 0 10px red;
}
.menu-btn{
  font-size:22px;
  cursor:pointer;
}
#room-name{
  font-weight:bold;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:250px;
  height:100%;
  background:#070000;
  box-shadow:0 0 20px red;
  transition:0.3s;
  padding-top:60px;
  z-index:100;
}
.sidebar.active{ left:0; }
.room{
  padding:15px;
  border-bottom:1px solid #300;
  cursor:pointer;
}
.room:hover{ background:#200; }

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

/* MESSAGE */
.message{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}
.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:red;
  flex-shrink:0;
}
.msg{
  background:#111;
  padding:10px;
  border-radius:10px;
  box-shadow:0 0 10px red;
  max-width:70%;
}
.nick{ font-weight:bold; }
.time{ font-size:11px; color:#aaa; margin-left:5px; }
.text{ margin-top:4px; }

/* INPUT */
.input{
  display:flex;
  gap:10px;
  padding:10px;
  background:black;
}
.input input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
}
.send{
  background:red;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  color:white;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 10px red;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <div class="room">☕ კაფე-ბარი</div>
  <div class="room">💎 ვიპ საუბრები</div>
  <div class="room">🕵️ გამოძიება</div>
  <div class="room">🔐 შიფროგრამა</div>
  <div class="room">❓ ვიქტორინა</div>
  <div class="room">😵 ჩამოხრჩობანა</div>
  <div class="room">🕴 მაფიის ღამე</div>
  <div class="room">🃏 ჯოკერი</div>
  <div class="room">🎲 ნარდი</div>
  <div class="room">🎵 მუსიკა</div>
  <div class="room">😂 იუმორი</div>
  <div class="room">🛠 ადმინისტრაცია</div>
  <div class="room">🆘 დახმარება</div>
  <div class="room">💬 ფორუმი</div>
  <div class="room">🚪 გასვლა</div>
</div>

<div class="topbar">
  <div class="menu-btn" onclick="menu()">☰</div>
  <div id="room-name">არცერთი ოთახი</div>
</div>

<div class="chat" id="chat"></div>

<div class="input">
  <input id="msg" placeholder="დაწერე მესიჯი...">
  <button class="send" onclick="sendMsg()">✈</button>
</div>

<script>
// ნიკი რეგისტრაციიდან
let nick = localStorage.getItem("nick") || "უცნობი";

// ჰამბურგერ მენიუ
function menu(){ document.getElementById("sidebar").classList.toggle("active"); }

// ოთახების კლიკი
let chats = {}; // შენახვა თითო ოთახისთვის
let currentRoom = null;

document.querySelectorAll(".room").forEach(r=>{
  r.onclick = ()=>{
    currentRoom = r.textContent;
    document.getElementById("room-name").textContent = currentRoom;
    document.getElementById("sidebar").classList.remove("active");
    // ჩატში ოთახის მესიჯები ჩატვირთე
    document.getElementById("chat").innerHTML = chats[currentRoom] || "";
  }
});

// მესიჯის გაგზავნა
function sendMsg(){
  let input = document.getElementById("msg");
  if(input.value.trim()==="" || !currentRoom) return;
  let chat = document.getElementById("chat");
  let time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  let html = `<div class="message">
    <div class="avatar"></div>
    <div class="msg">
      <span class="nick">${nick}</span>
      <span class="time">${time}</span>
      <div class="text">${input.value}</div>
    </div>
  </div>`;

  chat.innerHTML += html;

  // შენახვა ოთახისთვის
  if(!chats[currentRoom]) chats[currentRoom] = "";
  chats[currentRoom] += html;

  input.value="";
  chat.scrollTop = chat.scrollHeight;
}

// Enter-ით გაგზავნა
document.getElementById("msg").addEventListener("keypress", function(e){
  if(e.key==="Enter") sendMsg();
});
</script>

</body>
</html>
