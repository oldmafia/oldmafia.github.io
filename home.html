<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>კაიფმანია - სრული ვერსია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* სიდბარი */
        .sidebar { width: 280px; min-width: 280px; background: #0d0d0d; border-right: 2px solid red; display: flex; flex-direction: column; transition: 0.3s ease; z-index: 100; }
        .profile-box { padding: 20px; background: #151515; border-bottom: 1px solid #222; text-align: center; }
        .avatar-main { width: 70px; height: 70px; border-radius: 50%; border: 2px solid red; object-fit: cover; margin-bottom: 10px; cursor: pointer; background: #222; }
        #myNick { color: red; font-size: 18px; font-weight: bold; margin: 0; }
        #myStatus { color: #888; font-size: 11px; display: block; margin: 5px 0; font-style: italic; }
        .badge { font-size: 9px; background: red; color: #fff; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        .sidebar-menu { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        .menu-item { display: flex; align-items: center; padding: 10px 20px; color: #bbb; cursor: pointer; border-bottom: 1px solid #111; font-size: 14px; }
        .menu-item:hover, .menu-item.active { background: #1a0000; color: red; }
        .icon { margin-right: 12px; width: 20px; text-align: center; }

        /* ჩატი */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .chat-header { height: 60px; border-bottom: 2px solid red; display: flex; align-items: center; padding: 0 15px; background: #0d0d0d; }
        .m-toggle { display: none; background: red; border: none; color: #fff; padding: 8px; border-radius: 4px; margin-right: 10px; }
        
        .chat-area { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle, #0f0000 0%, #000 100%); }
        
        /* მესიჯის დიზაინი */
        .msg { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.3s; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid red; flex-shrink: 0; }
        .msg-info { display: flex; flex-direction: column; }
        .u-name { font-size: 10px; color: red; font-weight: bold; margin-bottom: 2px; }
        .u-text { background: #1a1a1a; padding: 10px; border-radius: 0 12px 12px 12px; font-size: 14px; cursor: pointer; border: 1px solid #222; }
        .me .u-text { background: red; color: white; border-radius: 12px 0 12px 12px; border: none; }
        .me .u-name { text-align: right; }

        /* ინპუტი */
        .input-bar { padding: 15px; background: #0d0d0d; border-top: 1px solid #222; display: flex; gap: 10px; }
        #mInp { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 12px 18px; color: #fff; outline: none; }
        .send-btn { background: red; border: none; width: 45px; height: 45px; border-radius: 50%; color: #fff; cursor: pointer; font-size: 18px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 850px) {
            .m-toggle { display: block; }
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <nav class="sidebar" id="sidebar">
        <div class="profile-box">
            <img src="https://via.placeholder.com/70" id="myImg" class="avatar-main" onclick="changeAvatar()" title="შეცვალე ფოტო">
            <p id="myNick">იტვირთება...</p>
            <span id="myStatus">სტატუსი...</span><br>
            <span class="badge" id="myRole">USER</span>
            <input type="text" id="statusEdit" placeholder="შეცვალე სტატუსი..." style="width:100%; margin-top:10px; background:#000; color:#fff; border:1px solid red; font-size:10px; padding:4px; border-radius:4px; outline:none;" onkeypress="updStat(event)">
        </div>

        <div class="sidebar-menu">
            <div class="menu-item active" onclick="setR('💬', 'ზოგადი ჩატი', this)"><span class="icon">💬</span> ზოგადი ჩატი</div>
            <div class="menu-item" onclick="setR('💎', 'VIP საუბრები', this)"><span class="icon">💎</span> VIP საუბრები</div>
            <div class="menu-item" onclick="setR('🔍', 'გამოძიება', this)"><span class="icon">🔍</span> გამოძიება</div>
            <div class="menu-item" onclick="setR('🔐', 'შიფროგრამა', this)"><span class="icon">🔐</span> შიფროგრამა</div>
            <div class="menu-item" onclick="setR('🧩', 'ვიქტორინა', this)"><span class="icon">🧩</span> ვიქტორინა</div>
            <div class="menu-item" onclick="setR('🪢', 'ჩამოხრჩობანა', this)"><span class="icon">🪢</span> ჩამოხრჩობანა</div>
            <div class="menu-item" style="color:red;" onclick="setR('🌑', 'მაფიის ღამე', this)"><span class="icon">🌑</span> მაფიის ღამე</div>
            <div class="menu-item" onclick="setR('🎵', 'მუსიკა', this)"><span class="icon">🎵</span> მუსიკა</div>
            <div class="menu-item" onclick="setR('🖼️', 'გალერეა', this)"><span class="icon">🖼️</span> გალერეა</div>
            <div class="menu-item" onclick="setR('📝', 'ფორუმი', this)"><span class="icon">📝</span> ფორუმი</div>
            <div class="menu-item" onclick="setR('🛡️', 'ადმინისტრაცია', this)"><span class="icon">🛡️</span> ადმინისტრაცია</div>
        </div>

        <div style="padding:15px; border-top:1px solid #222;">
            <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold; width:100%; text-align:left;">🚪 გასვლა</button>
        </div>
    </nav>

    <main class="main-content">
        <header class="chat-header">
            <button class="m-toggle" onclick="toggleM()">☰</button>
            <h2 id="roomTitle" style="font-size:16px; color:red; margin:0;">💬 ზოგადი ჩატი</h2>
        </header>
        <div class="chat-area" id="chatBox"></div>
        <div class="input-bar">
            <input type="text" id="mInp" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </main>
</div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let me = { id: '', nick: '', role: '', img: '' };
    let curR = 'ზოგადი ჩატი';

    async function init() {
        const { data: { user: auth } } = await sb.auth.getUser();
        if (!auth) { window.location.href = "index.html"; return; }
        
        let { data: p } = await sb.from('profiles').select('*').eq('id', auth.id).single();
        if(!p) {
            const { data: n } = await sb.from('profiles').insert([{ id: auth.id, username: 'მოთამაშე' }]).select().single();
            p = n;
        }

        me = { id: auth.id, nick: p.username, role: p.role, img: p.avatar_url || 'https://via.placeholder.com/40' };

        document.getElementById('myNick').innerText = me.nick;
        document.getElementById('myStatus').innerText = p.status || "სტატუსი არაა";
        document.getElementById('myRole').innerText = me.role;
        document.getElementById('myImg').src = me.img;
        if(me.role === 'owner') document.getElementById('myRole').style.background = 'gold';

        load();
        sb.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => load()).subscribe();
    }

    async function load() {
        const { data } = await sb.from('messages').select('*').eq('room', curR).order('created_at', { ascending: true });
        const box = document.getElementById('chatBox');
        box.innerHTML = data.map(m => `
            <div class="msg ${m.user_id === me.id ? 'me' : ''}">
                <img src="${m.avatar || 'https://via.placeholder.com/40'}" class="msg-img">
                <div class="msg-info">
                    <span class="u-name">${m.username}</span>
                    <div class="u-text" onclick="adminAction('${m.user_id}', '${m.username}', ${m.id})">${m.text}</div>
                </div>
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const inp = document.getElementById('mInp');
        if (!inp.value.trim()) return;
        await sb.from('messages').insert([{ text: inp.value, room: curR, user_id: me.id, username: me.nick, avatar: me.img }]);
        inp.value = "";
    }

    async function adminAction(tid, tnick, mid) {
        if (me.role !== 'owner' && me.role !== 'admin') return;
        if (tid === me.id) return;

        const cmd = prompt(`მართვა: ${tnick}\n1: Make Admin\n2: User\n3: Delete Msg\n4: Block (შალე ბაზიდან)`);
        if (cmd === "1" && me.role === 'owner') await sb.from('profiles').update({ role: 'admin' }).eq('id', tid);
        if (cmd === "2" && me.role === 'owner') await sb.from('profiles').update({ role: 'user' }).eq('id', tid);
        if (cmd === "3") await sb.from('messages').delete().eq('id', mid);
        alert('შესრულდა!');
    }

    async function changeAvatar() {
        const url = prompt("ჩასვით ფოტოს ლინკი (URL):");
        if (url) {
            await sb.from('profiles').update({ avatar_url: url }).eq('id', me.id);
            document.getElementById('myImg').src = url;
            me.img = url;
            alert('ფოტო განახლდა!');
        }
    }

    async function updStat(e) {
        if(e.key === 'Enter') {
            await sb.from('profiles').update({ status: e.target.value }).eq('id', me.id);
            document.getElementById('myStatus').innerText = e.target.value;
            e.target.value = '';
        }
    }

    function toggleM() { document.getElementById('sidebar').classList.toggle('active'); }
    
    function setR(icon, name, el) {
        curR = name;
        document.getElementById('roomTitle').innerText = icon + ' ' + name;
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
        load();
        if(window.innerWidth < 850) toggleM();
    }

    async function logout() { await sb.auth.signOut(); window.location.href = "index.html"; }

    init();
</script>
</body>
</html>
