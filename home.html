<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .header { height: 60px; background: #000; border-bottom: 2px solid red; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1001; }
        .burger, .pm-trigger { color: red; font-size: 28px; cursor: pointer; }
        #roomTitle { font-size: 13px; font-weight: bold; text-transform: uppercase; color: #fff; }

        /* Chat & Inbox */
        #msgList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }

        /* მესიჯის ბუშტები - შენი მარჯვნივ */
        .msg-bubble { padding: 10px 14px; border-radius: 15px; max-width: 80%; background: #111; border: 1px solid #222; align-self: flex-start; }
        .msg-bubble.is-me { border: 1px solid red; align-self: flex-end; background: #0a0a0a; }
        .u-name { color: #ff4d4d; font-size: 11px; font-weight: bold; display: block; margin-bottom: 4px; }
        .msg-time { color: #444; font-size: 9px; float: right; margin-top: 5px; margin-left: 10px; }

        /* ინბოქსის დიზაინი (ნიკების სია) */
        .inbox-row { padding: 15px; background: #111; border-radius: 12px; border-left: 5px solid red; margin-bottom: 10px; cursor: pointer; }
        .inbox-nick { font-weight: bold; color: red; font-size: 16px; display: block; }
        .inbox-msg { font-size: 12px; color: #888; }

        /* Input */
        .input-area { padding: 12px; background: #000; border-top: 1px solid red; display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid red; border-radius: 25px; padding: 0 18px; height: 45px; display: flex; align-items: center; }
        input { width: 100%; border: none; background: transparent; color: #fff; outline: none; font-size: 16px; }
        .send-btn { background: red; color: #000; width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Sidebar - ყველა ოთახი */
        #sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #000; transition: 0.3s; z-index: 2000; overflow-y: auto; border-right: 2px solid red; }
        #sidebar.open { left: 0; }
        .room-item { padding: 18px 25px; border-bottom: 1px solid #111; color: #ccc; cursor: pointer; font-size: 15px; }
        .room-item.active { color: red; font-weight: bold; border-left: 6px solid red; }
    </style>
</head>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let myId, myName, currentRoom = '💬 კაიფმანია', isInbox = false;

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;

        // ნიკის წამოღების იძულებითი ლოგიკა
        const { data: profile } = await client.from('profiles').select('username').eq('id', myId).single();
        myName = profile?.username || user.user_metadata?.username || user.email.split('@')[0];

        loadMsgs();
        
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (payload) => {
            if (isInbox && payload.new.receiver_id === myId) loadMsgs();
            else if (!isInbox && payload.new.room_name === currentRoom && !payload.new.receiver_id) {
                if(payload.new.user_id !== myId) appendMsg(payload.new);
            }
        }).subscribe();
    }
