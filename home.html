<style>
    /* მესიჯების ბლოკი */
    #msgList { 
        flex: 1; 
        overflow-y: auto; 
        padding: 15px; 
        display: flex; 
        flex-direction: column; 
        gap: 15px; 
        background: #050505; 
    }

    /* ყველა მესიჯი მარცხნივ */
    .msg-row { 
        display: flex; 
        align-items: flex-end; 
        gap: 10px; 
        max-width: 90%; 
        align-self: flex-start; /* აი აქ გასწორდა მარცხნივ */
    }

    /* შენი მესიჯის განსხვავებული ფერი */
    .msg-row.me .bubble {
        border-color: #ff0000;
        background: rgba(255, 0, 0, 0.05);
    }

    .msg-avatar { 
        width: 38px; 
        height: 38px; 
        border-radius: 50%; 
        border: 1px solid #333; 
        object-fit: cover;
    }

    .bubble { 
        padding: 10px 14px; 
        border-radius: 18px; 
        background: #111; 
        border: 1px solid #222; 
        border-bottom-left-radius: 2px;
        position: relative;
    }

    .u-nick { 
        font-size: 11px; 
        font-weight: bold; 
        color: #ff4d4d; 
        display: block; 
        margin-bottom: 4px; 
    }
</style>

<script>
    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return;
        myId = user.id;

        // ნიკის წამოღების ყველაზე საიმედო გზა
        const { data: prof } = await client.from('profiles').select('*').eq('id', myId).single();
        
        // ვამოწმებთ ყველა შესაძლო ადგილს, სადაც ნიკი ინახება
        let registrationNick = user.user_metadata?.username || 
                               user.user_metadata?.full_name || 
                               prof?.username;

        // თუ ნიკი მაინც ვერ იპოვა ან მეილია, მომხმარებელს სახელს ვაჭრით მეილიდან
        if (!registrationNick || registrationNick.includes('@')) {
            myName = registrationNick ? registrationNick.split('@')[0] : user.email.split('@')[0];
        } else {
            myName = registrationNick;
        }

        myAvatar = prof?.avatar_url || "https://ui-avatars.com/api/?name=" + myName + "&background=000&color=f00";

        // ბაზაში განახლება, რომ შემდეგშიც ეს ნიკი გამოიყენოს
        await client.from('profiles').upsert({ id: myId, username: myName, avatar_url: myAvatar });

        document.getElementById('myNick').innerText = myName;
        document.getElementById('myImg').src = myAvatar;
        loadMsgs();
    }

    function renderMsg(m) {
        const isMe = m.user_id === myId;
        // მესიჯის დახატვა ყოველთვის მარცხნიდან
        return `
            <div class="msg-row ${isMe ? 'me' : 'other'}">
                <img src="${m.avatar_url || 'https://via.placeholder.com/50'}" class="msg-avatar">
                <div class="bubble">
                    <span class="u-nick">${m.username}</span>
                    <span>${m.text}</span>
                </div>
            </div>`;
    }
</script>
