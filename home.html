<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-red: #ff0000; }
        * { box-sizing: border-box; }
        body { margin: 0; height: 100vh; display: flex; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* სიდებარი */
        .sidebar { width: 260px; min-width: 260px; background: #0a0a0a; border-right: 2px solid var(--neon-red); display: flex; flex-direction: column; z-index: 1000; }
        @media (max-width: 768px) { .sidebar { position: absolute; left: -260px; height: 100%; transition: 0.3s; } .sidebar.open { left: 0; } }
        
        .sidebar-header { padding: 25px; font-size: 22px; font-weight: bold; text-align: center; text-shadow: 0 0 15px var(--neon-red); border-bottom: 1px solid #1a1a1a; color: white; }
        .menu-items { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .menu-item { padding: 12px 15px; margin: 4px 0; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #bbb; font-size: 14px; transition: 0.2s; }
        .menu-item:hover { background: rgba(255, 0, 0, 0.1); color: #fff; }
        
        /* მთავარი არე */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; background: #000; min-width: 0; }
        .top-nav { height: 65px; background: #0d0d0d; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #1a1a1a; }
        
        #messageList { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg-container { display: flex; gap: 12px; max-width: 95%; align-items: flex-start; margin-bottom: 5px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--neon-red); background: #111; }
        .username { color: var(--neon-red); font-weight: bold; font-size: 13px; text-shadow: 0 0 5px red; }
        .msg-bubble { background: #111; padding: 10px 14px; border-radius: 0 15px 15px 15px; border: 1px solid #222; margin-top: 4px; font-size: 14px; word-wrap: break-word; }

        /* ინპუტი */
        .input-area { padding: 15px; background: #080808; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        input { flex-grow: 1; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; outline: none; }
        button { background: var(--neon-red); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .toggle-btn { display: none; background: none; border: 1px solid red; color: red; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        @media (max-width: 768px) { .toggle-btn { display: block; } }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">კაიფმანია 🕶️</div>
        <div class="menu-items">
            <div class="menu-item" onclick="changeRoom('ზოგადი ჩატი', '💬')">💬 ზოგადი ჩატი</div>
            <div class="menu-item" onclick="changeRoom('ვიპ საუბრები', '💎')">💎 ვიპ საუბრები</div>
            <div class="menu-item" onclick="changeRoom('გამოძიება', '🔍')">🔍 გამოძიება</div>
            <div class="menu-item" onclick="changeRoom('შიფროგრამა', '🔐')">🔐 შიფროგრამა</div>
            <div class="menu-item" onclick="changeRoom('ვიქტორინა', '🧠')">🧠 ვიქტორინა</div>
            <div class="menu-item" onclick="changeRoom('ჩამოხრჩობანა', '💀')">💀 ჩამოხრჩობანა</div>
            <div class="menu-item" onclick="changeRoom('მაფიის ღამე', '🕵️‍♂️')">🕵️‍♂️ მაფიის ღამე</div>
            <div class="menu-item" onclick="changeRoom('ჯოკერი', '🃏')">🃏 ჯოკერი</div>
            <div class="menu-item" onclick="changeRoom('ნარდი', '🎲')">🎲 ნარდი</div>
            <div class="menu-item" onclick="changeRoom('მუსიკა', '🎵')">🎵 მუსიკა</div>
            <div class="menu-item" onclick="changeRoom('იუმორი', '😂')">😂 იუმორი</div>
            <div class="menu-item" id="adminBtn" style="display:none; color: gold;" onclick="changeRoom('ადმინისტრაცია', '🛡️')">🛡️ ადმინისტრაცია</div>
            <div class="menu-item" onclick="changeRoom('დახმარება', '🆘')">🆘 დახმარება</div>
            <div class="menu-item" onclick="changeRoom('ფორუმი', '🏛️')">🏛️ ფორუმი</div>
            <div class="menu-item" style="color: #ff4444; margin-top: 15px;" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <button class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
            <div id="roomTitle" style="font-weight:bold;">💬 ზოგადი ჩატი</div>
            <div id="userDisplay" style="color:red; font-weight:bold; border: 1px solid red; padding: 3px 12px; border-radius: 15px;">...</div>
        </div>
        <div id="messageList"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">გაგზავნა</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let currentUser = null;
        let myNick = "სტუმარი";

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = "index.html"; return; }
            currentUser = user;

            // 1. ჯერ ავიღოთ ნიკი რეგისტრაციიდან (სწრაფი გზა)
            myNick = user.user_metadata.nickname || user.email.split('@')[0];
            document.getElementById('userDisplay').innerText = myNick;

            // 2. მერე ვცადოთ ბაზიდან წამოღება (თუ იქ სხვა უწერია)
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
            if (profile) {
                myNick = profile.username;
                document.getElementById('userDisplay').innerText = myNick;
                if (profile.role === 'owner' || profile.role === 'admin') {
                    document.getElementById('adminBtn').style.display = 'flex';
                }
            }

            loadMessages();
            subscribeToMessages();
        }

        async function changeRoom(name, icon) {
            currentRoom = name;
            document.getElementById('roomTitle').innerHTML = `${icon} ${name}`;
            document.getElementById('messageList').innerHTML = '';
            document.getElementById('sidebar').classList.remove('open');
            loadMessages();
        }

        async function loadMessages() {
            const { data: msgs } = await supabaseClient.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
            const list = document.getElementById('messageList');
            list.innerHTML = '';
            if (msgs) msgs.forEach(msg => renderMessage(msg));
            list.scrollTop = list.scrollHeight;
        }

        function renderMessage(msg) {
            const list = document.getElementById('messageList');
            const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = 'msg-container';
            div.innerHTML = `
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="avatar">
                <div>
                    <span class="username">${msg.username}</span> <span style="font-size:10px; color:#444;">${time}</span>
                    <div class="msg-bubble">${msg.content}</div>
                </div>
            `;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !currentUser) return;

            const { error } = await supabaseClient.from('messages').insert([{
                user_id: currentUser.id,
                username: myNick,
                content: text,
                room_name: currentRoom
            }]);

            if (error) alert("შეცდომა: " + error.message);
            else input.value = '';
        }

        function subscribeToMessages() {
            supabaseClient.channel('chat').on('postgres_changes', { 
                event: 'INSERT', schema: 'public', table: 'messages' 
            }, payload => {
                if (payload.new.room_name === currentRoom) renderMessage(payload.new);
            }).subscribe();
        }

        async function logout() { await supabaseClient.auth.signOut(); window.location.href = "index.html"; }

        init();
    </script>
</body>
</html>
