<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #050505; color: white; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { 
            height: 55px; background: #000; border-bottom: 2px solid red;
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0;
        }
        .btn { color: red; font-size: 22px; cursor: pointer; width: 40px; text-align: center; }
        .logo { font-weight: bold; color: red; letter-spacing: 1px; font-size: 14px; }

        /* Main Wrapper */
        .wrapper { flex: 1; position: relative; overflow: hidden; display: flex; }

        /* Side Panels (Mobile Ready) */
        .panel { 
            position: absolute; top: 0; width: 260px; height: 100%; background: #0a0a0a; 
            z-index: 1000; transition: 0.3s; border: 1px solid #1a1a1a; overflow-y: auto;
        }
        #left { left: -260px; border-right: 2px solid red; }
        #right { right: -260px; border-left: 2px solid red; }
        .panel.show-l { left: 0; }
        .panel.show-r { right: 0; }

        /* Chat Area */
        #chat-container { flex: 1; display: flex; flex-direction: column; height: 100%; background: #050505; }
        #flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* Messages */
        .msg { max-width: 85%; margin-bottom: 5px; }
        .nick { font-size: 10px; color: #666; font-weight: bold; margin-bottom: 2px; }
        .text { padding: 10px 14px; background: #111; border-radius: 0 12px 12px 12px; font-size: 14px; color: #ccc; border: 1px solid #1a1a1a; }
        
        .me { align-self: flex-end; }
        .me .nick { color: red; text-align: right; }
        .me .text { background: #1a0505; border-right: 3px solid red; border-radius: 12px 0 12px 12px; color: #fff; }

        /* Rooms & Users List */
        .p-head { padding: 15px; color: red; font-weight: bold; font-size: 12px; border-bottom: 1px solid #1a1a1a; text-transform: uppercase; }
        .item { padding: 12px 20px; color: #888; border-bottom: 1px solid #0d0d0d; cursor: pointer; font-size: 14px; }
        .active { background: #1a0505; color: red; font-weight: bold; }

        /* Input Area */
        .input-box { height: 65px; background: #000; border-top: 1px solid #1a1a1a; display: flex; padding: 10px; gap: 10px; flex-shrink: 0; }
        input { flex: 1; background: #0d0d0d; border: 1px solid #222; border-radius: 20px; color: white; padding: 0 15px; outline: none; font-size: 14px; }
        .send { background: red; border: none; width: 45px; border-radius: 50%; color: white; font-weight: bold; cursor: pointer; }

        /* Overlay */
        #ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 900; }
    </style>
</head>
<body>

    <div id="ov" onclick="closeAll()"></div>

    <header>
        <div class="btn" onclick="openP('left')">☰</div>
        <div class="logo" id="title">ზოგადი ჩატი</div>
        <div class="btn" onclick="openP('right')">👥</div>
    </header>

    <div class="wrapper">
        <div id="left" class="panel">
            <div class="p-head">ოთახები</div>
            <div class="item active" onclick="goR('ზოგადი ჩატი')">💬 ზოგადი ჩატი</div>
            <div class="item" onclick="goR('ვიპ საუბრები')">💎 ვიპ საუბრები</div>
            <div class="item" onclick="goR('გამოძიება')">🔍 გამოძიება</div>
            <div class="item" onclick="goR('ვიქტორინა')">❓ ვიქტორინა</div>
            <div class="item" onclick="goR('შიფროგრამა')">🔐 შიფროგრამა</div>
            <div class="item" onclick="goR('ჩამოხრჩობანა')">🪢 ჩამოხრჩობანა</div>
            <div class="item" onclick="goR('მუსიკა')">🎵 მუსიკა</div>
            <div class="item" onclick="goR('იუმორი')">😂 იუმორი</div>
            <div class="item" onclick="goR('გალერეა')">🖼️ გალერეა</div>
            <div class="item" onclick="goR('ადმინისტრაცია')">🛡️ ადმინისტრაცია</div>
            <div class="item" onclick="goR('დახმარება')">🆘 დახმარება</div>
        </div>

        <div id="chat-container">
            <div id="flow">იტვირთება...</div>
            <div class="input-box">
                <input type="text" id="in" placeholder="დაწერე..." autocomplete="off">
                <button class="send" onclick="send()">➤</button>
            </div>
        </div>

        <div id="right" class="panel">
            <div class="p-head">პროფილი</div>
            <div style="padding: 20px; text-align: center;">
                <img src="https://i.ibb.co/4pLKV60/user.png" style="width: 60px; border-radius: 50%; border: 2px solid red;">
                <div id="my-n" style="color:red; font-weight:bold; margin-top:10px; font-size: 18px;"></div>
            </div>
            <div class="p-head">ონლაინ</div>
            <div class="item">🟢 <span id="my-n2"></span></div>
        </div>
    </div>

<script>
    const _sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('username') || 'მაფიოზი';
    let room = 'ზოგადი ჩატი';

    document.getElementById('my-n').innerText = myNick;
    document.getElementById('my-n2').innerText = myNick;

    function openP(id) {
        closeAll();
        document.getElementById(id).classList.add(id === 'left' ? 'show-l' : 'show-r');
        document.getElementById('ov').style.display = 'block';
    }

    function closeAll() {
        document.getElementById('left').classList.remove('show-l');
        document.getElementById('right').classList.remove('show-r');
        document.getElementById('ov').style.display = 'none';
    }

    function goR(name) {
        room = name;
        document.getElementById('title').innerText = name;
        document.querySelectorAll('.item').forEach(i => i.classList.toggle('active', i.innerText.includes(name)));
        closeAll();
        sync();
    }

    async function sync() {
        const { data: msgs } = await _sb.from('messages').select('*').eq('room_name', room).order('created_at', { ascending: false }).limit(40);
        if (msgs) {
            document.getElementById('flow').innerHTML = msgs.reverse().map(m => `
                <div class="msg ${m.nickname === myNick ? 'me' : ''}">
                    <div class="nick">${m.nickname}</div>
                    <div class="text">${m.message}</div>
                </div>
            `).join('');
            const f = document.getElementById('flow');
            f.scrollTop = f.scrollHeight;
        }
    }

    async function send() {
        const i = document.getElementById('in');
        if(!i.value.trim()) return;
        const t = i.value; i.value = "";
        await _sb.from('messages').insert([{ nickname: myNick, message: t, room_name: room }]);
        sync();
    }

    document.getElementById('in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    setInterval(sync, 2500);
    sync();
</script>
</body>
</html>
