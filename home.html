<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ზოგადი ჩატი</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #050505; color: white; height: 100vh; display: flex; flex-direction: column; }

        /* მესიჯების კონტეინერი */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            background: #1a1a1a;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
            border-left: 3px solid red;
        }

        .message .user { color: red; font-weight: bold; font-size: 12px; margin-bottom: 5px; }

        /* ქვედა პანელი (წერა) */
        .input-area {
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }

        input {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            padding: 12px;
            color: white;
            border-radius: 5px;
            outline: none;
        }

        input:focus { border-color: red; }

        button {
            background: red;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header style="padding: 15px; border-bottom: 1px solid red; text-align: center;">
        <h3 style="color: red;">ზოგადი ჩატი</h3>
    </header>

    <div id="chat-window">
        </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება...">
        <button onclick="sendMessage()">გაგზავნა</button>
    </div>

    <script>
        // Supabase-ის მონაცემები (ჩასვი შენი)
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

        const chatWindow = document.getElementById('chat-window');
        const msgInput = document.getElementById('msgInput');

        // 1. მესიჯების გაგზავნა
        async function sendMessage() {
            const text = msgInput.value;
            if (!text) return;

            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                const { error } = await supabase
                    .from('messages') // დარწმუნდი რომ ბაზაში გაქვს ცხრილი 'messages'
                    .insert([{ 
                        content: text, 
                        user_id: user.id, 
                        user_email: user.email,
                        room: 'general' 
                    }]);

                if (error) console.error(error);
                msgInput.value = ''; // ველის გასუფთავება
            } else {
                alert("გთხოვთ გაიაროთ ავტორიზაცია!");
            }
        }

        // 2. მესიჯების რეალურ დროში მიღება (Realtime)
        supabase
            .channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                displayMessage(payload.new);
            })
            .subscribe();

        // 3. მესიჯის ვიზუალურად ჩვენება
        function displayMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<div class="user">${msg.user_email}</div><div>${msg.content}</div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight; // ავტომატური სქროლი ქვემოთ
        }

        // Enter-ზე გაგზავნა
        msgInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
