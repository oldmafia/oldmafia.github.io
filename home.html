<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - FINAL FULL</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --dark: #000; --bubble: #1a1a1a; --blue: #00a2ff; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: #0d0d0d; border-right: 1px solid var(--red); display: flex; flex-direction: column; height: 100vh; }
        .profile-area { padding: 15px; text-align: center; border-bottom: 1px solid #222; flex-shrink: 0; }
        .p-avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--red); box-shadow: 0 0 10px var(--red); }
        
        .rooms-scroll { flex-grow: 1; overflow-y: auto; padding-bottom: 10px; }
        .room-item { padding: 10px 18px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #888; border-bottom: 1px solid #111; font-size: 0.85rem; transition: 0.2s; }
        .room-item:hover { background: rgba(255,0,0,0.1); color: white; }
        .room-item.active { background: rgba(255,0,0,0.25); color: white; font-weight: bold; border-left: 4px solid var(--red); }
        .room-item svg { width: 18px; height: 18px; fill: var(--red); flex-shrink: 0; }
        .room-item.exit-btn { color: #ff4444; border-top: 1px solid #333; margin-top: 5px; }
        .room-item.exit-btn svg { fill: #ff4444; }

        /* Chat */
        .chat-main { flex-grow: 1; display: flex; flex-direction: column; background: #050505; }
        .header { height: 55px; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 20px; background: #000; font-weight: bold; color: var(--red); flex-shrink: 0; }
        #msg-display { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        /* მესიჯი - დრო გრაფის შიგნით */
        .msg-wrap { align-self: flex-start; max-width: 85%; display: flex; flex-direction: column; }
        .msg-nick { color: var(--red); font-size: 0.75rem; font-weight: bold; margin-bottom: 2px; margin-left: 5px; }
        .msg-bubble { 
            background: var(--bubble); padding: 10px 12px; border-radius: 0 18px 18px 18px; 
            border: 1px solid #252525; position: relative; min-width: 100px;
        }
        .msg-text { color: #eee; font-size: 0.95rem; line-height: 1.4; padding-bottom: 15px; word-break: break-word; }
        .msg-time { position: absolute; bottom: 5px; right: 10px; font-size: 0.65rem; color: #555; }

        /* Input */
        .bottom-bar { padding: 12px; background: #0d0d0d; display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; flex-shrink: 0; }
        .input-wrap { flex-grow: 1; background: #111; border-radius: 25px; border: 1px solid #333; padding: 2px 15px; }
        input { width: 100%; background: transparent; border: none; padding: 10px; color: white; outline: none; font-size: 1rem; }

        /* ✈️ რეალური თვითმფრინავის SVG */
        .plane-btn { width: 45px; height: 45px; cursor: pointer; fill: var(--blue); transition: 0.3s; flex-shrink: 0; }
        .plane-btn:hover { transform: scale(1.1) translateY(-2px); filter: drop-shadow(0 0 8px var(--blue)); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="profile-area">
            <img id="uPic" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Kaif" class="p-avatar">
            <div id="uNick" style="margin-top:10px; font-weight:bold; font-size:0.9rem;">იტვირთება...</div>
        </div>
        <div class="rooms-scroll" id="roomsList"></div>
    </div>

    <div class="chat-main">
        <div class="header" id="activeTitle">კაფე-ბარი</div>
        <div id="msg-display"></div>
        <div class="bottom-bar">
            <div class="input-wrap">
                <input type="text" id="mInput" placeholder="დაწერე შეტყობინება...">
            </div>
            <svg id="mSend" class="plane-btn" viewBox="0 0 512 512">
                <path d="M499.7 31.2c-15.5-11-34.7-10.7-50 1L23.4 300.7c-21.7 15.6-25.2 45.1-7.8 65.4l82.8 96.6c13.2 15.4 33.1 22.8 53.1 19.8l293.9-44.1c11.7-1.8 22.2-7.8 29.8-16.8L506.7 66.8c11-12.9 8.2-32.3-7-35.6zM212.7 334.3l-28.1 82.2c-1.8 5.4-9.3 5.3-10.9-.1L141.1 315c-1.1-3.6 .3-7.5 3.3-9.7l170-120c4-2.8 8.9 1.9 6.2 5.8l-107.9 143.2z"/>
            </svg>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");

        const icons = {
            chat: '<svg viewBox="0 0 24 24"><path d="M20,2H4C2.9,2,2,2.9,2,4V22L6,18H20C21.1,18,22,17.1,22,16V4C22,2.9,21.1,2,20,2M20,16H5.2L4,17.2V4H20V16Z"/></svg>',
            game: '<svg viewBox="0 0 24 24"><path d="M21,6H3C1.9,6,1,6.9,1,8V16C1,17.1,1.9,18,3,18H21C22.1,18,23,17.1,23,16V8C23,6.9,22.1,6,21,6M12,15H10V13H8V11H10V9H12V11H14V13H12V15M18,15H16V13H18V15M18,11H16V9H18V11Z"/></svg>',
            spade: '<svg viewBox="0 0 24 24"><path d="M12,2C9,2 7,4 7,7C7,9 8,11 10,12.5C7,13.5 3,16 3,20C3,21 4,22 5,22H19C20,22 21,21 21,20C21,16 17,13.5 14,12.5C16,11 17,9 17,7C17,4 15,2 12,2Z"/></svg>',
            exit: '<svg viewBox="0 0 24 24"><path d="M16,17V14H9V10H16V7L21,12L16,17M14,2A2,2 0 0,1 16,4V6H14V4H5V20H14V18H16V20A2,2 0 0,1 14,22H5A2,2 0 0,1 3,20V4A2,2 0 0,1 5,2H14Z"/></svg>'
        };

        const rooms = [
            {n: "კაიფმანია", i: icons.chat}, {n: "კაფე-ბარი", i: icons.chat},
            {n: "ვიპ საუბრები", i: icons.chat}, {n: "გამოძიება", i: icons.game},
            {n: "შიფროგრამა", i: icons.game}, {n: "ვიქტორინა", i: icons.game},
            {n: "ჩამოხრჩობანა", i: icons.game}, {n: "მაფიის ღამე", i: icons.game},
            {n: "ჯოკერი", i: icons.spade}, {n: "ნარდი", i: icons.game},
            {n: "მუსიკა", i: icons.chat}, {n: "იუმორი", i: icons.chat},
            {n: "ადმინისტრაცია", i: icons.chat}, {n: "დახმარება", i: icons.chat},
            {n: "ფორუმი", i: icons.chat}, {n: "გასვლა", i: icons.exit, class: "exit-btn"}
        ];

        let curR = "კაფე-ბარი", curN = "სტუმარი";

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                curN = session.user.user_metadata.nickname || "User";
                document.getElementById('uNick').innerText = curN;
                document.getElementById('uPic').src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${curN}`;
            }

            const rBox = document.getElementById('roomsList');
            rooms.forEach(r => {
                const item = document.createElement('div');
                item.className = `room-item ${r.n === curR ? 'active' : ''} ${r.class || ''}`;
                item.innerHTML = `${r.i} <span>${r.n}</span>`;
                item.onclick = () => {
                    if(r.n === "გასვლა") { window.location.href = "index.html"; return; }
                    curR = r.n;
                    document.getElementById('activeTitle').innerText = r.n;
                    document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    loadMsgs();
                };
                rBox.appendChild(item);
            });
            loadMsgs();
        }

        async function loadMsgs() {
            const display = document.getElementById('msg-display');
            display.innerHTML = "";
            const { data } = await supabaseClient.from('messages').select('*').eq('room_name', curR).order('created_at', { ascending: true });
            if(data) data.forEach(render);
        }

        function render(m) {
            const display = document.getElementById('msg-display');
            const time = new Date(m.created_at).toLocaleTimeString('ka-GE', {hour:'2-digit', minute:'2-digit'});
            const wrap = document.createElement('div');
            wrap.className = 'msg-wrap';
            wrap.innerHTML = `<div class="msg-nick">${m.username}</div><div class="msg-bubble"><div class="msg-text">${m.text}</div><div class="msg-time">${time}</div></div>`;
            display.appendChild(wrap);
            display.scrollTop = display.scrollHeight;
        }

        async function send() {
            const inp = document.getElementById('mInput');
            if(!inp.value.trim()) return;
            const txt = inp.value; inp.value = "";
            await supabaseClient.from('messages').insert([{ text: txt, room_name: curR, username: curN }]);
        }

        document.getElementById('mSend').onclick = send;
        document.getElementById('mInput').onkeypress = (e) => { if(e.key==='Enter') send(); };

        supabaseClient.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
            if(p.new.room_name === curR) render(p.new);
        }).subscribe();

        init();
    </script>
</body>
</html>
