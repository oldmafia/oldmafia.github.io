<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - Chat</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* საიდბარი */
        .sidebar { width: 280px; background: #050505; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .sidebar-avatar { width: 70px; height: 70px; border-radius: 12px; border: 2px solid #ff0000; margin: 0 auto 10px; background: #111 center/cover; }
        .user-name { color: #ff0000; font-weight: bold; }

        /* ოთახების სია */
        .menu-items { flex-grow: 1; }
        .menu-item { padding: 12px 20px; color: #bbb; cursor: pointer; border-left: 3px solid transparent; font-size: 14px; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: #1a0000; color: #ff0000; border-left: 3px solid #ff0000; }
        .logout-item { color: #555 !important; border-top: 1px solid #1a1a1a; margin-top: 20px; }

        /* ჩატის ზონა */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-bar { padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; color: #ff0000; font-weight: bold; font-size: 18px; }
        .messages-area { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #000; }
        .msg-bubble { background: #0d0d0d; padding: 12px; border-radius: 0 12px 12px 12px; border: 1px solid #1a1a1a; max-width: 80%; }
        
        /* ქვედა პანელი */
        .bottom-bar { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; align-items: center; border-top: 1px solid #222; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; padding: 12px; border-radius: 20px; color: #fff; outline: none; }
        .send-btn { background: none; border: none; cursor: pointer; color: #007bff; font-size: 24px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header" onclick="location.href='profile.html'">
        <div class="sidebar-avatar" id="uAvat"></div>
        <div class="user-name" id="uNick">იტვირთება...</div>
    </div>
    <div class="menu-items" id="roomList">
        <div class="menu-item active">☕ კაფე-ბარი</div>
        <div class="menu-item">👑 ვიპ საუბრები</div>
        <div class="menu-item">🕵️ გამოძიება</div>
        <div class="menu-item">🔐 შიფროგრამა</div>
        <div class="menu-item">❓ ვიქტორინა</div>
        <div class="menu-item">🪢 ჩამოხრჩობანა</div>
        <div class="menu-item">🌑 მაფიის ღამე</div>
        <div class="menu-item">🃏 ჯოკერი</div>
        <div class="menu-item">🎲 ნარდი</div>
        <div class="menu-item">🎵 მუსიკა</div>
        <div class="menu-item">😂 იუმორი</div>
        <div class="menu-item">🚀 კაიფმანია</div>
        <div class="menu-item">🛠️ ადმინისტრაცია</div>
        <div class="menu-item">❓ დახმარება</div>
        <div class="menu-item">📝 ფორუმი</div>
        <div class="menu-item logout-item" onclick="logout()">🚪 გასვლა</div>
    </div>
</div>

<div class="main-content">
    <div class="top-bar" id="roomTitle">☕ კაფე-ბარი</div>
    <div class="messages-area" id="chatContainer"></div>
    <div class="bottom-bar">
        <input type="text" id="msgInput" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let currentRoom = '☕ კაფე-ბარი';
    let myProfile = null;

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if (!user) return window.location.href = "index.html";

        let { data: profile } = await client.from('profiles').select('*').eq('id', user.id).single();
        if (profile) {
            myProfile = profile;
            document.getElementById('uNick').innerText = profile.username;
            if(profile.avatar_url) document.getElementById('uAvat').style.backgroundImage = `url('${profile.avatar_url}')`;
            loadMessages(currentRoom);
        }
    }

    async function loadMessages(room) {
        const chat = document.getElementById('chatContainer');
        chat.innerHTML = "<p style='color:gray;text-align:center;'>იტვირთება შეტყობინებები...</p>";
        
        const { data } = await client.from('messages')
            .select('*')
            .eq('room_name', room)
            .order('created_at', { ascending: true });
        
        chat.innerHTML = "";
        if (data) data.forEach(displayMsg);
        chat.scrollTop = chat.scrollHeight;
    }

    function displayMsg(msg) {
        const chat = document.getElementById('chatContainer');
        const isMod = (myProfile.role === 'დამფუძნებელი' || myProfile.role === 'ადმინი');
        const del = isMod ? `<span onclick="deleteMsg('${msg.id}')" style="color:gray;cursor:pointer;float:right;font-size:10px;">[X]</span>` : '';
        
        chat.innerHTML += `
            <div class="msg" id="msg-${msg.id}">
                <div class="msg-bubble">
                    ${del} <b style="color:red;">${msg.username}</b><br>${msg.text}
                </div>
            </div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
        const input = document.getElementById('msgInput');
        const val = input.value.trim();
        if (!val || myProfile.is_blocked) return;

        await client.from('messages').insert([{ 
            text: val, 
            username: myProfile.username, 
            room_name: currentRoom, 
            user_id: myProfile.id 
        }]);
        input.value = "";
    }

    async function deleteMsg(id) {
        if(confirm("წავშალოთ?")) {
            await client.from('messages').delete().eq('id', id);
            document.getElementById('msg-' + id).remove();
        }
    }

    // ოთახების გადართვის ლოგიკა
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', function() {
            if (this.classList.contains('logout-item')) return;
            
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            
            currentRoom = this.innerText.trim();
            document.getElementById('roomTitle').innerText = currentRoom;
            loadMessages(currentRoom);
        });
    });

    function logout() { client.auth.signOut().then(() => location.href='index.html'); }

    client.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
        if(p.new.room_name === currentRoom) displayMsg(p.new);
    }).subscribe();

    init();
</script>
</body>
</html>
