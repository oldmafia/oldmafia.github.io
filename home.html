<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - THE KINGDOM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #050505; --panel: #0a0a0a; --border: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* ზედა ზოლი */
        header { 
            height: 60px; background: #000; border-bottom: 2px solid var(--red);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            box-shadow: 0 2px 15px rgba(255,0,0,0.2); z-index: 100;
        }
        .logo { color: var(--red); font-weight: 900; font-size: 20px; letter-spacing: 3px; text-shadow: 2px 2px #000; }
        
        .user-top { display: flex; align-items: center; gap: 12px; background: #111; padding: 6px 15px; border-radius: 5px; border: 1px solid #222; }
        .user-top img { width: 30px; height: 30px; border-radius: 3px; border: 1px solid var(--red); }
        .user-top span { font-size: 14px; font-weight: bold; color: var(--red); }

        .wrapper { flex: 1; display: flex; overflow: hidden; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }

        /* მარცხენა მენიუ - ოთახები */
        .side-rooms { width: 240px; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; }
        .side-h { padding: 20px; font-size: 11px; color: #444; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #111; }
        .room-btn { 
            padding: 15px 20px; cursor: pointer; color: #888; transition: 0.3s; 
            border-bottom: 1px solid #0d0d0d; display: flex; align-items: center; gap: 10px;
        }
        .room-btn:hover { background: #111; color: #fff; }
        .room-active { background: #1a0505 !important; color: var(--red) !important; border-left: 4px solid var(--red); font-weight: bold; }

        /* ჩატი */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(5,5,5,0.8); }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* მესიჯების დიზაინი */
        .m-wrap { max-width: 85%; margin-bottom: 5px; }
        .m-nick { font-size: 11px; font-weight: bold; color: #555; margin-bottom: 2px; padding-left: 5px; }
        .m-msg { padding: 12px 18px; background: #111; border: 1px solid #1a1a1a; border-radius: 5px 15px 15px 15px; font-size: 14px; line-height: 1.5; color: #ddd; position: relative; }
        
        .is-me { align-self: flex-end; }
        .is-me .m-nick { color: var(--red); text-align: right; padding-right: 5px; }
        .is-me .m-msg { background: #1a0505; border-color: #2a0a0a; border-radius: 15px 5px 15px 15px; border-right: 3px solid var(--red); color: #fff; }

        /* მარჯვენა მენიუ - წევრები */
        .side-users { width: 220px; background: var(--panel); border-left: 1px solid var(--border); padding: 0; }
        .u-item { padding: 12px 20px; display: flex; align-items: center; gap: 10px; font-size: 13px; border-bottom: 1px solid #0d0d0d; }
        .u-status { width: 8px; height: 8px; background: #0f0; border-radius: 50%; box-shadow: 0 0 8px #0f0; }

        /* ქვედა პანელი */
        .input-wrap { padding: 20px; background: #000; border-top: 1px solid var(--border); display: flex; gap: 15px; }
        #msg-in { 
            flex: 1; background: #0a0a0a; border: 1px solid #222; padding: 15px 25px; 
            border-radius: 5px; color: #fff; outline: none; font-size: 14px;
        }
        #msg-in:focus { border-color: var(--red); }
        .send-btn { background: var(--red); border: none; width: 55px; border-radius: 5px; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .send-btn:hover { background: #cc0000; transform: translateY(-2px); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
