<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - FINAL FIX</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #0b0b0b; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #161616; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-weight: bold; color: #cc0000; font-size: 18px; }

        /* ჩამოსაშლელი მენიუ */
        .menu-area { background: #1a1a1a; padding: 8px 12px; border-bottom: 1px solid #222; display: flex; gap: 10px; }
        select { flex: 1; background: #2a2a2a; color: white; border: 1px solid #444; padding: 8px; border-radius: 8px; outline: none; }

        #messageList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #000; }
        
        /* მესიჯის ბლოკი საათით */
        .msg { background: #161616; padding: 10px; border-radius: 10px; border: 1px solid #222; }
        .msg-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
        .msg-nick { font-weight: bold; cursor: pointer; }
        .msg-time { color: #555; font-size: 11px; }
        .msg-body { color: #eee; line-height: 1.4; word-break: break-word; }

        .input-area { background: #161616; padding: 12px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; }
        .send-btn { background: #cc0000; color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .send-btn:disabled { background: #444; opacity: 0.5; }
    </style>
</head>
<body>

<header>
    <div class="logo">OLD MAFIA</div>
    <button onclick="window.location.href='user.html'" style="background:#333; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer;">პროფილი 👤</button>
</header>

<div class="menu-area">
    <select id="roomSelect" onchange="switchRoom(this.value)">
        <option value="ზოგადი ჩატი">ზოგადი ჩატი</option>
        <option value="ვიპ საუბრები">ვიპ საუბრები</option>
        <option value="გამოძიება">გამოძიება</option>
        <option value="შიფროგრამა">შიფროგრამა</option>
        <option value="ვიქტორეინა">ვიქტორეინა</option>
        <option value="ჩამოხრჩობანა">ჩამოხრჩობანა</option>
        <option value="მაფიის ღამე">მაფიის ღამე</option>
        <option value="ჯოკერი">ჯოკერი</option>
        <option value="ნარდი">ნარდი</option>
        <option value="მუსიკა">მუსიკა</option>
        <option value="იუმორი">იუმორი</option>
        <option value="ადმინისტრაცია">ადმინისტრაცია</option>
        <option value="დახმარება">დახმარება</option>
        <option value="ფორუმი">ფორუმი</option>
    </select>
    <button onclick="logout()" style="background:none; border:none; color:#ff4444; cursor:pointer;">გასვლა</button>
</div>

<div id="messageList"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="მოწმდება პროფილი..." disabled>
    <button id="sendBtn" class="send-btn" onclick="sendMsg()" disabled>გაგზავნა</button>
</div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co"; 
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let currentRoom = 'ზოგადი ჩატი';
    let myUser = null;

    async function init() {
        // 1. ვამოწმებთ ავტორიზაციას
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return window.location.href = 'index.html';
        
        // 2. ვიღებთ პროფილს - აქ მნიშვნელოვანია, რომ ცხრილს ერქვას 'profiles'
        const { data: p, error: pErr } = await supabase.from('profiles').select('*').eq('id', user.id).maybeSingle();
        
        if (p && p.username) {
            myUser = { id: user.id, username: p.username };
            document.getElementById('msgInput').disabled = false;
            document.getElementById('msgInput').placeholder = "დაწერე მესიჯი...";
            document.getElementById('sendBtn').disabled = false;
        } else {
            alert("პროფილი ვერ მოიძებნა! შექმენი ნიკი.");
            window.location.href = 'user.html';
        }

        loadMsgs();

        // Realtime განახლება
        supabase.channel('chat-room').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            if (payload.new.room_name === currentRoom) appendMsg(payload.new);
        }).subscribe();
    }

    async function loadMsgs() {
        const { data: msgs } = await supabase.from('messages').select('*').eq('room_name', currentRoom).order('id', { ascending: true }).limit(50);
        const list = document.getElementById('messageList');
        list.innerHTML = '';
        if (msgs) msgs.forEach(m => appendMsg(m));
        list.scrollTop = list.scrollHeight;
    }

    function appendMsg(m) {
        const list = document.getElementById('messageList');
        // საათის გამოჩენა
        const date = m.created_at ? new Date(m.created_at) : new Date();
        const time = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        const isMe = (m.username === 'abu007');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `
            <div class="msg-header">
                <span class="msg-nick" style="color:${isMe ? 'red' : '#00ccff'}" onclick="window.location.href='user.html?id=${m.user_id}'">${m.username}</span>
                <span class="msg-time">${time}</span>
            </div>
            <div class="msg-body">${m.text}</div>
        `;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !myUser) return;
        
        input.value = '';
        const { error } = await supabase.from('messages').insert([{ 
            user_id: myUser.id, 
            username: myUser.username, 
            text: text, 
            room_name: currentRoom 
        }]);
        
        if (error) {
            alert("შეცდომა ბაზაში: " + error.message);
            input.value = text;
        }
    }

    function switchRoom(val) {
        currentRoom = val;
        loadMsgs();
    }

    async function logout() {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
    }

    init();
</script>
</body>
</html>
