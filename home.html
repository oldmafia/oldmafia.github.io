<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA ROOMS</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* მენიუ (Sidebar) */
        #sidebar { 
            position: fixed; left: 0; top: 0; width: 280px; height: 100%; 
            background: #000; border-right: 3px solid red; transition: 0.3s ease-in-out; z-index: 1000;
            display: flex; flex-direction: column;
        }
        #sidebar.closed { left: -285px; } /* აქ დავამატე 5px რომ კარგად დაიმალოს */
        
        /* მენიუს ზედა ნაწილი: X და 😎 კაიფმანია */
        .sidebar-top { 
            padding: 15px; border-bottom: 2px solid red; display: flex; 
            justify-content: space-between; align-items: center; background: #000;
        }
        .close-x { color: red; font-size: 30px; cursor: pointer; font-weight: bold; padding: 0 10px; }
        .kaif-btn { 
            background: #000; color: #fff; border: 1px solid red; padding: 6px 15px; 
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px;
        }

        /* ოთახების სია */
        .room-list { flex: 1; overflow-y: auto; }
        .room-item { 
            padding: 14px 20px; border-bottom: 1px solid #111; cursor: pointer; 
            color: #eee; display: flex; align-items: center; gap: 12px; transition: 0.2s;
        }
        .room-item:hover, .room-item.active { background: #111; color: red; font-weight: bold; }

        /* ჩატის მხარე */
        #mainChat { flex: 1; display: flex; flex-direction: column; background: #000; width: 100%; height: 100%; }
        .header { 
            height: 60px; border-bottom: 2px solid red; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 15px; background: #000;
        }
        .menu-toggle { font-size: 28px; color: red; cursor: pointer; }

        #messageList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        
        /* მესიჯის დიზაინი */
        .msg-card { padding: 10px; border-radius: 8px; background: #0a0a0a; border-left: 3px solid #333; }
        .msg-owner { border-left: 3px solid red; }
        .msg-header { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; }
        .msg-time { color: #555; font-size: 11px; }

        /* საწერი გრაფა და ცისფერი თვითმფრინავი */
        .input-box { padding: 12px; background: #000; border-top: 2px solid red; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px 18px; background: #0a0a0a; border: 1px solid #333; color: white; border-radius: 25px; outline: none; }
        
        .send-circle { 
            background: red; width: 50px; height: 50px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
        }
        .plane-svg { width: 24px; height: 24px; fill: #00d4ff; transform: rotate(0deg); } /* ცისფერი თვითმფრინავი */
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-top">
            <div class="close-x" onclick="toggleSidebar()">X</div>
            <div class="kaif-btn" onclick="toggleSidebar()">😎 კაიფმანია</div>
        </div>
        <div class="room-list">
            <div class="room-item active" onclick="selectRoom('ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
            <div class="room-item" onclick="selectRoom('VIP საუბრები', this)">💎 VIP საუბრები</div>
            <div class="room-item" onclick="selectRoom('გამოძიება', this)">🔍 გამოძიება</div>
            <div class="room-item" onclick="selectRoom('შიფროგრამა', this)">🔐 შიფროგრამა</div>
            <div class="room-item" onclick="selectRoom('ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="room-item" onclick="selectRoom('ჩამოხრჩობანა', this)">🪢 ჩამოხრჩობანა</div>
            <div class="room-item" onclick="selectRoom('მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="room-item" onclick="selectRoom('ჯოკერი', this)">🃏 ჯოკერი</div>
            <div class="room-item" onclick="selectRoom('ნარდი', this)">🎲 ნარდი</div>
            <div class="room-item" onclick="selectRoom('მუსიკა', this)">🎵 მუსიკა</div>
            <div class="room-item" onclick="selectRoom('იუმორი', this)">🤣 იუმორი</div>
            <div class="room-item" onclick="selectRoom('ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
            <div class="room-item" onclick="selectRoom('დახმარება', this)">❓ დახმარება</div>
            <div class="room-item" onclick="selectRoom('ფორუმი', this)">📝 ფორუმი</div>
        </div>
    </div>

    <div id="mainChat">
        <div class="header">
            <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
            <div id="roomTitle" style="color:red; font-weight:bold; font-size: 18px; text-transform: uppercase;">ზოგადი ჩატი</div>
            <div style="width:30px;"></div>
        </div>
        <div id="messageList"></div>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." autocomplete="off">
            <div class="send-circle" onclick="sendMsg()">
                <svg class="plane-svg" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let myId = "", myName = "";

        // მენიუს გადამრთველი
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('closed');
        }

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = 'index.html';
            myId = user.id;
            const { data: p } = await supabase.from('profiles').select('username').eq('id', myId).single();
            myName = p ? p.username : "guest";
            loadMsgs();
            supabase.channel('chat').on('postgres_changes', { event: '*', table: 'messages' }, loadMsgs).subscribe();
        }

        async function loadMsgs() {
            const { data: msgs } = await supabase.from('messages').select('*').eq('room_name', currentRoom).order('id', { ascending: true });
            const list = document.getElementById('messageList');
            list.innerHTML = msgs ? msgs.map(m => {
                const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                return `
                <div class="msg-card ${m.username === 'abu007' ? 'msg-owner' : ''}">
                    <div class="msg-header">
                        <b style="color:${m.username === 'abu007' ? 'red' : '#999'}; cursor:pointer;">${m.username}</b>
                        <span class="msg-time">${time}</span>
                    </div>
                    <div>${m.text}</div>
                </div>`;
            }).join('') : '';
            list.scrollTop = list.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const txt = input.value.trim();
            if(!txt) return;
            input.value = '';
            await supabase.from('messages').insert([{ user_id: myId, username: myName, text: txt, room_name: currentRoom }]);
        }

        // ოთახის არჩევა
        function selectRoom(name, el) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = name;
            document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            toggleSidebar(); // ოთახის არჩევისას მენიუ თავისით იხურება
            loadMsgs();
        }

        init();
    </script>
</body>
</html>
