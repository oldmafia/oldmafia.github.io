<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>კაიფმანია - PRO CHAT</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ff0000; --blue: #0088cc; --dark: #000; --panel: #0d0d0d; }
        
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar - მარცხენა მენიუ */
        .sidebar { 
            width: 280px; background: var(--panel); border-right: 1px solid var(--red); 
            transition: 0.3s; display: flex; flex-direction: column; z-index: 1000;
        }
        
        /* ტელეფონისთვის sidebar-ის დამალვა */
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -280px; height: 100%; }
            .sidebar.open { left: 0; box-shadow: 5px 0 20px rgba(255,0,0,0.5); }
        }

        .user-profile { padding: 20px; text-align: center; border-bottom: 1px solid #222; }
        .user-avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--red); margin-bottom: 10px; box-shadow: 0 0 15px var(--red); }
        .user-nick { font-weight: bold; font-size: 1.2rem; color: #fff; text-shadow: 0 0 5px var(--red); }

        .rooms-list { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        .room-item { 
            padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px;
            transition: 0.2s; border-left: 3px solid transparent;
        }
        .room-item:hover { background: rgba(255,0,0,0.1); }
        .room-item.active { background: rgba(255,0,0,0.2); border-left-color: var(--red); color: var(--red); }
        .room-item i { width: 20px; text-align: center; font-size: 1.1rem; }

        /* მთავარი ჩატის არე */
        .main-chat { flex-grow: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
        
        .header { 
            height: 60px; background: var(--panel); border-bottom: 1px solid var(--red);
            display: flex; align-items: center; padding: 0 15px; font-weight: bold;
        }
        .menu-toggle { font-size: 1.5rem; color: var(--red); cursor: pointer; margin-right: 15px; display: none; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }

        #messages-container { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        /* მესიჯების სტილი - მარცხნივ */
        .msg-box { display: flex; align-items: flex-end; gap: 10px; align-self: flex-start; max-width: 85%; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--red); flex-shrink: 0; }
        .msg-content { 
            background: #151515; padding: 10px 15px; border-radius: 15px 15px 15px 2px;
            border: 1px solid #333; position: relative;
        }
        .msg-sender { color: var(--red); font-size: 0.75rem; font-weight: bold; display: block; margin-bottom: 4px; }
        .msg-text { font-size: 0.95rem; line-height: 1.4; color: #eee; }

        /* ინპუტი და ლამაზი თვითმფრინავი */
        .input-bar { padding: 15px; background: var(--panel); display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; }
        .input-box { flex-grow: 1; background: #1a1a1a; border-radius: 25px; border: 1px solid #333; padding: 5px 15px; display: flex; }
        input { flex-grow: 1; background: transparent; border: none; padding: 10px; color: white; outline: none; font-size: 1rem; }
        
        .send-btn { 
            color: var(--blue); font-size: 1.8rem; cursor: pointer; 
            transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .send-btn:hover { transform: scale(1.1); filter: drop-shadow(0 0 8px var(--blue)); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: none; }
        .overlay.active { display: block; }
    </style>
</head>
