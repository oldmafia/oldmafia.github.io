<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - HOME</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #161616; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-weight: bold; color: #cc0000; font-size: 18px; letter-spacing: 1px; }
        
        /* ოთახების სრიალა მენიუ */
        .room-bar { 
            background: #1a1a1a; 
            padding: 10px; 
            display: flex; 
            gap: 8px; 
            overflow-x: auto; 
            border-bottom: 1px solid #222; 
            scrollbar-width: none; 
        }
        .room-bar::-webkit-scrollbar { display: none; }
        
        .room-btn { 
            background: #2a2a2a; 
            color: #bbb; 
            border: 1px solid #333; 
            padding: 8px 16px; 
            border-radius: 20px; 
            cursor: pointer; 
            white-space: nowrap; 
            font-size: 13px; 
            transition: 0.3s;
        }
        .room-btn.active { background: #cc0000; color: white; border-color: #ff0000; box-shadow: 0 0 10px rgba(204, 0, 0, 0.3); }
        
        #messageList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #000; }
        .msg { background: #161616; padding: 10px; border-radius: 10px; border: 1px solid #222; max-width: 85%; align-self: flex-start; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-nick { font-weight: bold; font-size: 14px; cursor: pointer; text-decoration: none; }
        .del-icon { cursor: pointer; color: #555; font-size: 12px; margin-left: 10px; transition: 0.2s; }
        .del-icon:hover { color: #ff4444; }

        .input-area { background: #161616; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; }
        input:focus { border-color: #cc0000; }
        .send-btn { background: #cc0000; color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">OLD MAFIA</div>
    <button onclick="window.location.href='user.html'" style="background:#333; border:none; color:white; padding:8px 12px; border-radius:8px; cursor:pointer; font-size: 13px;">პროფილი 👤</button>
</header>

<div class="room-bar" id="roomBar">
    <button class="room-btn active" onclick="switchRoom('ზოგადი ჩატი')">ზოგადი ჩატი</button>
    <button class="room-btn" onclick="switchRoom('ვიპ საუბრები')">ვიპ საუბრები</button>
    <button class="room-btn" onclick="switchRoom('გამოძიება')">გამოძიება</button>
    <button class="room-btn" onclick="switchRoom('შიფროგრამა')">შიფროგრამა</button>
    <button class="room-btn" onclick="switchRoom('ვიქტორეინა')">ვიქტორეინა</button>
    <button class="room-btn" onclick="switchRoom('ჩამოხრჩობანა')">ჩამოხრჩობანა</button>
    <button class="room-btn" onclick="switchRoom('მაფიის ღამე')">მაფიის ღამე</button>
    <button class="room-btn" onclick="switchRoom('ჯოკერი')">ჯოკერი</button>
    <button class="room-btn" onclick="switchRoom('ნარდი')">ნარდი</button>
    <button class="room-btn" onclick="switchRoom('მუსიკა')">მუსიკა</button>
    <button class="room-btn" onclick="switchRoom('იუმორი')">იუმორი</button>
    <button class="room-btn" onclick="switchRoom('ადმინისტრაცია')">ადმინისტრაცია</button>
    <button class="room-btn" onclick="switchRoom('დახმარება')">დახმარება</button>
    <button class="room-btn" onclick="switchRoom('ფორუმი')">ფორუმი</button>
    <button class="room-btn" onclick="logout()" style="background: #221111; color: #ff4444; border-color: #442222;">გასვლა 🚪</button>
</div>

<div id="messageList"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">გაგზავნა</button>
</div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    let currentRoom = 'ზოგადი ჩატი';
    let myData = null;

    async function init() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return window.location.href = 'index.html';
        
        const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
        myData = { id: user.id, username: profile?.username || 'Guest', role: profile?.role || 'user' };
        
        loadMsgs();
        
        // რეალურ დროში განახლება
        supabaseClient.channel('chat-room').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => {
            loadMsgs();
        }).subscribe();
    }

    async function loadMsgs() {
        const { data: msgs } = await supabaseClient.from('messages')
            .select('*').eq('room_name', currentRoom).order('id', { ascending: true });

        const list = document.getElementById('messageList');
        const canDelete = (myData.role === 'owner' || myData.role === 'admin');

        list.innerHTML = msgs ? msgs.map(m => {
            const nickColor = (m.username === 'abu007') ? '#ff0000' : '#00ccff';
            const deleteBtn = canDelete ? `<span class="del-icon" onclick="deleteMsg(${m.id})">🗑️</span>` : '';

            return `
                <div class="msg" id="msg-${m.id}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="msg-nick" style="color:${nickColor}" onclick="window.location.href='user.html?id=${m.user_id}'">${m.username}</span>
                        ${deleteBtn}
                    </div>
                    <div style="color: #eee; margin-top:5px; line-height: 1.4;">${m.text}</div>
                </div>
            `;
        }).join('') : '';
        list.scrollTop = list.scrollHeight;
    }
