<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - Final Version</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* საიდბარი */
        .sidebar {
            width: 280px;
            background: #050505;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .sidebar-avatar {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            border: 2px solid #ff0000;
            margin: 0 auto 10px;
            background: url('https://via.placeholder.com/70/111/ff0000?text=User') center/cover;
        }

        .user-name {
            color: #ff0000;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* მენიუ */
        .menu-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .menu-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            color: #bbb;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-item:hover, .menu-item.active {
            background: linear-gradient(90deg, #1a0000, transparent);
            color: #ff0000;
            border-left: 3px solid #ff0000;
        }

        /* ჩატის ზონა */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            padding: 15px 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            color: #ff0000;
            font-weight: bold;
        }

        .messages-area {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* შეტყობინების დიზაინი */
        .msg {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .msg-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 1px solid #ff0000;
            background: #111;
        }

        .msg-bubble {
            background: #0d0d0d;
            padding: 10px 15px;
            border-radius: 0 15px 15px 15px;
            max-width: 75%;
            border: 1px solid #1a1a1a;
        }

        .msg-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 15px;
            margin-top: 5px;
        }

        .msg-time {
            font-size: 10px;
            color: #444;
        }

        /* ინპუტი */
        .bottom-bar {
            padding: 15px;
            background: #0a0a0a;
            border-top: 1px solid #222;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex-grow: 1;
            background: #111;
            border: 1px solid #333;
            padding: 12px 20px;
            border-radius: 25px;
            color: white;
            outline: none;
        }

        input:focus { border-color: #ff0000; }

        .send-btn {
            background: none;
            border: none;
            color: #ff0000;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .send-btn:hover { transform: scale(1.1) rotate(-10deg); }

        .burger {
            display: none;
            font-size: 24px;
            color: #ff0000;
            background: none;
            border: none;
            margin-right: 15px;
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; }
            .sidebar.open { left: 0; }
            .burger { display: block; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-avatar"></div>
        <div class="user-name">abu007</div>
    </div>
    <div class="menu-items">
        <a href="#" class="menu-item">🎭 კაიფმანია</a>
        <a href="#" class="menu-item active">☕ კაფე-ბარი</a>
        <a href="#" class="menu-item">👑 ვიპ საუბრები</a>
        <a href="#" class="menu-item">🕵️ გამოძიება</a>
        <a href="#" class="menu-item">🔐 შიფროგრამა</a>
        <a href="#" class="menu-item">❓ ვიქტორინა</a>
        <a href="#" class="menu-item">🪢 ჩამოხრჩობანა</a> <a href="#" class="menu-item">🌑 მაფიის ღამე</a>
        <a href="#" class="menu-item">🃏 ჯოკერი</a>
        <a href="#" class="menu-item">🎲 ნარდი</a>
        <a href="#" class="menu-item">🎵 მუსიკა</a>
        <a href="#" class="menu-item">😂 იუმორი</a>
        <a href="#" class="menu-item">🛠️ ადმინისტრაცია</a>
        <a href="#" class="menu-item">❓ დახმარება</a>
        <a href="#" class="menu-item">📝 ფორუმი</a>
        <a href="#" class="menu-item" style="color:#555; margin-top:20px;">🚪 გასვლა</a>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <button class="burger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        კაფე-ბარი
    </div>
    <div class="messages-area" id="chat"></div>
    <div class="bottom-bar">
        <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                <path d="M21,16v-2l-8.5-5V3.5c0-0.83-0.67-1.5-1.5-1.5s-1.5,0.67-1.5,1.5V9L2,14v2l8.5-2.5V19L8,21v2l4-1l4,1v-2l-2.5-2v-5.5L22,16z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    function send() {
        let input = document.getElementById('msgInput');
        if(!input.value.trim()) return;
        
        let time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        let msgHtml = `
            <div class="msg">
                <div class="msg-avatar"></div>
                <div class="msg-bubble">
                    <div style="color:#ff0000; font-weight:bold; font-size:13px;">abu007</div>
                    <div style="margin-top:2px;">${input.value}</div>
                    <div class="msg-info"><span class="msg-time">${time}</span></div>
                </div>
            </div>`;
        
        let chat = document.getElementById('chat');
        chat.innerHTML += msgHtml;
        input.value = "";
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
