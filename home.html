<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ბოლო ვერსია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --red: #ff0000; --dark: #000; --bubble: #1a1a1a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: #0d0d0d; border-right: 1px solid var(--red); display: flex; flex-direction: column; z-index: 100; }
        .profile-box { padding: 20px; text-align: center; border-bottom: 1px solid #222; }
        .p-avatar { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--red); }
        .rooms-scroll { flex-grow: 1; overflow-y: auto; }
        .room-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #aaa; transition: 0.2s; }
        .room-item.active { background: rgba(255,0,0,0.2); color: white; font-weight: bold; border-left: 4px solid var(--red); }
        .room-item i { width: 20px; text-align: center; color: var(--red); }

        /* Chat Area */
        .chat-container { flex-grow: 1; display: flex; flex-direction: column; background: #050505; }
        .header { height: 60px; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 20px; background: #000; }
        #msg-list { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        /* მესიჯის ბაბლი */
        .msg-wrap { align-self: flex-start; max-width: 80%; display: flex; flex-direction: column; }
        .msg-nick { color: var(--red); font-size: 0.75rem; font-weight: bold; margin-bottom: 2px; margin-left: 5px; }
        .msg-bubble { 
            background: var(--bubble); padding: 8px 12px; border-radius: 0 15px 15px 15px; 
            border: 1px solid #333; position: relative; min-width: 80px;
        }
        .msg-text { color: #eee; font-size: 0.95rem; padding-right: 40px; word-break: break-word; }
        
        /* დრო ტექსტის შიგნით */
        .msg-time { 
            position: absolute; bottom: 5px; right: 8px; 
            font-size: 0.65rem; color: #555; 
        }

        /* Input Zone */
        .input-area { padding: 15px; background: #0d0d0d; display: flex; align-items: center; gap: 10px; border-top: 1px solid #222; }
        .input-wrap { flex-grow: 1; background: #111; border-radius: 20px; border: 1px solid #333; padding: 2px 15px; }
        input { width: 100%; background: transparent; border: none; padding: 10px; color: white; outline: none; }

        /* 🚀 ნამდვილი ჩახატული თვითმფრინავის სურათი */
        .plane-img { 
            width: 40px; height: 40px; cursor: pointer; transition: 0.3s; 
            filter: drop-shadow(0 0 5px #00a2ff); 
        }
        .plane-img:hover { transform: scale(1.1) rotate(-10deg); }
    </style>
</head>
<body>

            </div>

        </div>
    </div>
