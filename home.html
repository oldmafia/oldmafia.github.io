<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - MOBILE READY</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #0a0a0a; --panel: #141414; --blue: #0088cc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ზედა ზოლი (Navbar) */
        .navbar { height: 60px; background: #000; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; z-index: 100; }
        .menu-toggle { cursor: pointer; fill: white; width: 30px; height: 30px; }
        .room-title { color: var(--red); font-weight: bold; font-size: 1.1rem; }

        /* გვერდითა მენიუ (Sidebar) - რომელიც იშლება */
        .sidebar { 
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%; 
            background: var(--panel); z-index: 200; transition: 0.4s ease;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5); display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 150; }
        .overlay.show { display: block; }

        .p-area { padding: 30px 20px; text-align: center; border-bottom: 1px solid #222; background: #0d0d0d; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--red); margin-bottom: 10px; }
        
        .r-list { flex-grow: 1; overflow-y: auto; }
        .r-item { padding: 12px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #bbb; border-bottom: 1px solid #1a1a1a; font-size: 0.95rem; }
        .r-item:hover { background: #222; color: white; }
        .r-item.active { background: #333; color: white; border-left: 5px solid var(--red); }
        .r-item svg { width: 18px; height: 18px; fill: var(--red); }
        .exit-btn { color: #ff4444 !important; border-top: 2px solid #222; font-weight: bold; }
        .exit-btn svg { fill: #ff4444 !important; }

        /* ჩატი */
        #msgs { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #080808; }
        .m-wrap { align-self: flex-start; max-width: 85%; }
        .m-nick { font-size: 11px; color: var(--red); font-weight: bold; margin: 0 0 3px 5px; }
        .m-bubble { background: #1e1e1e; padding: 10px 15px; border-radius: 2px 18px 18px 18px; border: 1px solid #333; position: relative; min-width: 120px; }
        .m-text { font-size: 14px; color: #eee; padding-bottom: 15px; line-height: 1.4; }
        .m-time { position: absolute; bottom: 5px; right: 12px; font-size: 10px; color: #555; }

        /* Input Zone */
        .input-bar { padding: 15px; background: #000; border-top: 1px solid #222; display: flex; align-items: center; gap: 10px; }
        .in-wrap { flex-grow: 1; background: #111; border-radius: 25px; border: 1px solid #333; padding: 2px 15px; }
        input { width: 100%; background: transparent; border: none; padding: 10px; color: white; outline: none; }

        /* ✈️ ნამდვილი თვითმფრინავი (SVG) */
        .plane-send { width: 45px; height: 45px; cursor: pointer; fill: var(--blue); transition: 0.3s; }
        .plane-send:hover { transform: scale(1.1) rotate(-10deg); filter: brightness(1.2); }
    </style>
</head>
<body>

    <div class="navbar">
        <svg class="menu-toggle" id="openMenu" viewBox="0 0 24 24"><path d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z"/></svg>
        <div class="room-title" id="rTitle">კაფე-ბარი</div>
        <div style="width: 30px;"></div> </div>

    <div class="overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="p-area">
            <img id="uPic" src="https://api.dicebear.com/7.x/bottts/svg?seed=User" class="avatar">
            <div id="uNick" style="font-weight:bold;">იტვირთება...</div>
        </div>
        <div class="r-list" id="rContainer"></div>
    </div>

    <div id="msgs"></div>

    <div class="input-bar">
        <div class="in-wrap"><input type="text" id="mIn" placeholder="დაწერე რამე..."></div>
        <svg id="mSend" class="plane-send" viewBox="0 0 512 512">
            <path d="M499.7 31.2c-15.5-11-34.7-10.7-50 1L23.4 300.7c-21.7 15.6-25.2 45.1-7.8 65.4l82.8 96.6c13.2 15.4 33.1 22.8 53.1 19.8l293.9-44.1c11.7-1.8 22.2-7.8 29.8-16.8L506.7 66.8c11-12.9 8.2-32.3-7-35.6zM212.7 334.3l-28.1 82.2c-1.8 5.4-9.3 5.3-10.9-.1L141.1 315c-1.1-3.6 .3-7.5 3.3-9.7l170-120c4-2.8 8.9 1.9 6.2 5.8l-107.9 143.2z"/>
        </svg>
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");

        // მენიუს გახსნა/დაკეტვა
        const side = document.getElementById('sidebar');
        const over = document.getElementById('overlay');
        document.getElementById('openMenu').onclick = () => { side.classList.add('open'); over.classList.add('show'); };
        over.onclick = () => { side.classList.remove('open'); over.classList.remove('show'); };

        const ico = {
            msg: '<svg viewBox="0 0 24 24"><path d="M20,2H4C2.9,2 2,2.9 2,4V22L6,18H20C21.1,18 22,17.1 22,16V4C22,2.9 21.1,2 20,2Z"/></svg>',
            game: '<svg viewBox="0 0 24 24"><path d="M21,6H3C1.9,6 1,6.9 1,8V16C1,17.1 1.9,18 3,18H21C22.1,18 23,17.1 23,16V8C23,6.9 22.1,6 21,6Z"/></svg>',
            exit: '<svg viewBox="0 0 24 24"><path d="M16,17V14H9V10H16V7L21,12L16,17M14,2A2,2 0 0,1 16,4V6H14V4H5V20H14V18H16V20A2,2 0 0,1 14,22H5A2,2 0 0,1 3,20V4A2,2 0 0,1 5,2H14Z"/></svg>'
        };

        const rooms = [
            {n: "კაიფმანია", i: ico.msg}, {n: "კაფე-ბარი", i: ico.msg}, {n: "ვიპ საუბრები", i: ico.msg},
            {n: "გამოძიება", i: ico.game}, {n: "შიფროგრამა", i: ico.game}, {n: "ვიქტორინა", i: ico.game},
            {n: "ჩამოხრჩობანა", i: ico.game}, {n: "მაფიის ღამე", i: ico.game}, {n: "ჯოკერი", i: ico.game},
            {n: "ნარდი", i: ico.game}, {n: "მუსიკა", i: ico.msg}, {n: "იუმორი", i: ico.msg},
            {n: "ადმინისტრაცია", i: ico.msg}, {n: "დახმარება", i: ico.msg}, {n: "ფორუმი", i: ico.msg},
            {n: "გასვლა", i: ico.exit, cl: "exit-btn"}
        ];

        let curR = "კაფე-ბარი", curN = "სტუმარი";

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                curN = session.user.user_metadata.nickname || "User";
                document.getElementById('uNick').innerText = curN;
                document.getElementById('uPic').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${curN}`;
            }

            const rBox = document.getElementById('rContainer');
            rooms.forEach(r => {
                const div = document.createElement('div');
                div.className = `r-item ${r.n === curR ? 'active' : ''} ${r.cl || ''}`;
                div.innerHTML = `${r.i} <span>${r.n}</span>`;
                div.onclick = async () => {
                    if(r.n === "გასვლა") { await supabaseClient.auth.signOut(); window.location.href = "index.html"; return; }
                    curR = r.n;
                    document.getElementById('rTitle').innerText = r.n;
                    document.querySelectorAll('.r-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    side.classList.remove('open'); over.classList.remove('show'); // მენიუს დაკეტვა
                    load();
                };
                rBox.appendChild(div);
            });
            load();
        }

        async function load() {
            const box = document.getElementById('msgs'); box.innerHTML = "";
            const { data } = await supabaseClient.from('messages').select('*').eq('room_name', curR).order('created_at', { ascending: true });
            if(data) data.forEach(render);
        }

        function render(m) {
            const box = document.getElementById('msgs');
            const time = new Date(m.created_at).toLocaleTimeString('ka-GE', {hour:'2-digit', minute:'2-digit'});
            const w = document.createElement('div');
            w.className = 'm-wrap';
            w.innerHTML = `<div class="m-nick">${m.username}</div><div class="m-bubble"><div class="m-text">${m.text}</div><div class="m-time">${time}</div></div>`;
            box.appendChild(w);
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const inp = document.getElementById('mIn'); if(!inp.value.trim()) return;
            const t = inp.value; inp.value = "";
            await supabaseClient.from('messages').insert([{ text: t, room_name: curR, username: curN }]);
        }

        document.getElementById('mSend').onclick = send;
        document.getElementById('mIn').onkeypress = (e) => { if(e.key==='Enter') send(); };

        supabaseClient.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
            if(p.new.room_name === curR) render(p.new);
        }).subscribe();

        init();
    </script>
</body>
</html>
