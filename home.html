<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header */
        .header { 
            height: 55px; background: #000; border-bottom: 2px solid red; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; box-shadow: 0 0 15px rgba(255, 0, 0, 0.6); z-index: 2001;
        }
        .burger { font-size: 26px; color: red; cursor: pointer; text-shadow: 0 0 10px red; }
        #roomTitle { font-size: 14px; font-weight: bold; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .pm-trigger { color: red; font-size: 22px; cursor: pointer; text-shadow: 0 0 10px red; }

        /* Chat Messages Area */
        #msgList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg-bubble { padding: 10px 14px; border-radius: 12px; max-width: 85%; background: #111; border: 1px solid #222; position: relative; }
        .msg-bubble.is-me { background: #000; border: 1px solid red; align-self: flex-end; box-shadow: 0 0 10px rgba(255, 0, 0, 0.3); }
        .u-name { color: #ff4d4d; font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; text-shadow: 0 0 5px rgba(255, 0, 0, 0.2); }
        .msg-text { font-size: 14px; color: #eee; line-height: 1.4; word-wrap: break-word; }

        /* Input Bar */
        .input-area { padding: 10px; background: #000; border-top: 2px solid red; display: flex; gap: 10px; align-items: center; box-shadow: 0 -5px 15px rgba(255, 0, 0, 0.2); }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid red; border-radius: 25px; padding: 2px 15px; box-shadow: inset 0 0 5px red; }
        input { width: 100%; border: none; background: transparent; color: #fff; padding: 10px; outline: none; font-size: 15px; }
        .send-btn { background: red; color: #000; width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px red; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }

        /* Sidebar Menu */
        #sidebar { 
            position: fixed; top: -100vh; left: 0; width: 100%; height: 100vh; 
            background: rgba(0, 0, 0, 0.98); transition: 0.5s ease-in-out; 
            z-index: 2000; padding-top: 70px; overflow-y: auto;
        }
        #sidebar.open { top: 0; }
        .room-item { 
            padding: 16px 25px; border-bottom: 1px solid #151515; 
            color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 16px; transition: 0.3s;
        }
        .room-item.active { color: red; font-weight: bold; background: #0a0a0a; border-left: 5px solid red; text-shadow: 0 0 10px red; }
        .close-btn { text-align: center; padding: 25px; color: red; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="burger" onclick="toggleMenu()">☰</div>
        <div id="roomTitle">💬 კაიფმანია</div>
        <div class="pm-trigger" onclick="alert('პირადი ყუთი მალე დაემატება!')">📩</div>
    </div>

    <div id="sidebar">
        <div class="room-item active" onclick="changeRoom('💬 კაიფმანია', this)">💬 კაიფმანია</div>
        <div class="room-item" onclick="changeRoom('🍷 კაფე-ბარი', this)">🍷 კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('🔐 VIP-საუბრები', this)">🔐 VIP-საუბრები</div>
        <div class="room-item" onclick="changeRoom('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('🔓 შიფროგრამა', this)">🔓 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('⚜️ ნარდი', this)">⚜️ ნარდი</div>
        <div class="room-item" onclick="changeRoom('💖 სიყვარული', this)">💖 სიყვარული</div>
        <div class="room-item" onclick="changeRoom('🤣 იუმორი', this)">🤣 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🎵 მელომანია', this)">🎵 მელომანია</div>
        <div class="room-item" onclick="changeRoom('📜 ფორუმი', this)">📜 ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('🆘 SOS', this)">🆘 SOS</div>
        <div class="close-btn" onclick="toggleMenu()">✕ დახურვა</div>
    </div>

    <div id="msgList"></div>

    <div class="input-area">
        <div class="input-box"><input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." autocomplete="off"></div>
        <button class="send-btn" onclick="sendMsg()">✈️</button>
    </div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let myId, myName = "User", currentRoom = '💬 კაიფმანია';

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;

        // ნიკის დაფიქსირება რეგისტრაციის მიხედვით
        if (user.user_metadata && user.user_metadata.username) {
            myName = user.user_metadata.username;
        } else {
            const { data: p } = await client.from('profiles').select('username').eq('id', myId).single();
            myName = (p && p.username) ? p.username : user.email.split('@')[0];
        }

        loadMsgs();
        
        // რეალურ დროში მოსმენა
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (pl) => {
            if(pl.new.room_name === currentRoom) appendMsg(pl.new);
        }).subscribe();
    }

    async function loadMsgs() {
        const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).order('id', { ascending: true }).limit(50);
        const list = document.getElementById('msgList');
        list.innerHTML = msgs ? msgs.map(m => renderMsg(m)).join('') : '';
        list.scrollTop = list.scrollHeight;
    }

    function renderMsg(m) {
        const isMe = m.username === myName;
        return `<div class="msg-bubble ${isMe ? 'is-me' : ''}">
                    <span class="u-name">${m.username}</span>
                    <span class="msg-text">${m.text}</span>
                </div>`;
    }

    function appendMsg(m) {
        const list = document.getElementById('msgList');
        list.innerHTML += renderMsg(m);
        list.scrollTop = list.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInput');
        const txt = inp.value.trim();
        if(!txt) return;
        inp.value = '';
        await client.from('messages').insert([{ user_id: myId, username: myName, text: txt, room_name: currentRoom }]);
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    
    function changeRoom(name, el) {
        currentRoom = name;
        document.getElementById('roomTitle').innerText = name;
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        toggleMenu();
        loadMsgs();
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    init();
</script>
</body>
</html>
