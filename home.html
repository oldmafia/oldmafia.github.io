<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>OLD MAFIA - REBORN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; border-bottom: 1px solid #222; text-align: center; background: #000; color: red; font-weight: bold; }
        
        /* მესიჯების სია - მარცხნივ */
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .m-box { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 5px; }
        .m-ava { width: 35px; height: 35px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .m-txt-side { display: flex; flex-direction: column; }
        .m-nick { font-size: 11px; color: #888; margin-bottom: 2px; }
        .m-msg { background: #111; padding: 8px 12px; border-radius: 0 12px 12px 12px; border: 1px solid #222; font-size: 14px; max-width: 85%; }
        
        /* ინპუტი */
        .input-zone { padding: 15px; background: #000; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; background: #111; border: 1px solid #333; color: white; border-radius: 5px; }
        button { background: red; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <header>🕵️ OLD MAFIA - ჩატი</header>
    <div id="chat-flow">იტვირთება...</div>
    <div class="input-zone">
        <input type="text" id="msg-in" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">➤</button>
    </div>

<script>
    const _sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('username') || 'Anonymous';

    async function sync() {
        try {
            // 1. მესიჯების წამოღება
            const { data: msgs, error } = await _sb.from('messages_v3').select('*').order('created_at', { ascending: false }).limit(30);
            if(error) throw error;

            const flow = document.getElementById('chat-flow');
            if(msgs && msgs.length > 0) {
                flow.innerHTML = msgs.reverse().map(m => `
                    <div class="m-box">
                        <img src="https://i.ibb.co/4pLKV60/user.png" class="m-ava">
                        <div class="m-txt-side">
                            <span class="m-nick">${m.nickname}</span>
                            <div class="m-msg">${m.message}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                flow.innerHTML = '<div style="color:#444; text-align:center;">მესიჯები ჯერ არ არის. დაწერე პირველი!</div>';
            }
            flow.scrollTop = flow.scrollHeight;
        } catch (err) {
            document.getElementById('chat-flow').innerHTML = '<div style="color:red;">შეცდომაა! ნახე SQL თუ გაუშვი სწორად.</div>';
        }
    }

    async function send() {
        const i = document.getElementById('msg-in');
        if(!i.value.trim()) return;
        await _sb.from('messages_v3').insert([{ nickname: myNick, message: i.value }]);
        i.value = "";
        sync();
    }

    setInterval(sync, 3000);
    sync();
</script>
</body>
</html>
