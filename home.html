<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OLD MAFIA CHAT</title>

<style>

body{
background:#0b0000;
font-family:sans-serif;
margin:0;
color:white;
}

/* ოთახების მენიუ */

.rooms{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.room{
background:#111;
border-radius:15px;
padding:20px;
text-align:center;
font-size:22px;
cursor:pointer;

box-shadow:0 0 10px red;
transition:0.3s;
}

.room span{
display:block;
margin-top:10px;
font-size:14px;
}

.room:hover{
transform:scale(1.05);
box-shadow:0 0 20px red;
}

.exit{
background:#200;
}

/* ჩატი */

.chat{
height:300px;
overflow-y:auto;
padding:10px;
border-top:1px solid #333;
}

/* მესიჯი */

.message{
display:flex;
gap:10px;
margin-bottom:15px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:red;
}

.msg-content{
background:#111;
padding:10px;
border-radius:10px;
box-shadow:0 0 8px red;
max-width:70%;
}

.nick{
font-weight:bold;
font-size:14px;
}

.time{
font-size:11px;
color:#aaa;
margin-left:5px;
}

.text{
font-size:14px;
margin-top:3px;
}

/* შეტყობინების ველი */

.input-area{
display:flex;
gap:10px;
padding:10px;
background:#000;
}

.input-area input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#111;
color:white;
}

.send{
background:red;
border:none;
color:white;
font-size:18px;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
box-shadow:0 0 10px red;
}

</style>
</head>

<body>

<!-- ოთახები -->

<div class="rooms">

<div class="room">☕<span>კაფე-ბარი</span></div>
<div class="room">💎<span>ვიპ საუბრები</span></div>
<div class="room">🕵️<span>გამოძიება</span></div>
<div class="room">🔐<span>შიფროგრამა</span></div>
<div class="room">❓<span>ვიქტორინა</span></div>
<div class="room">😵<span>ჩამოხრჩობანა</span></div>
<div class="room">🕴<span>მაფიის ღამე</span></div>
<div class="room">🃏<span>ჯოკერი</span></div>
<div class="room">🎲<span>ნარდი</span></div>
<div class="room">🎵<span>მუსიკა</span></div>
<div class="room">😂<span>იუმორი</span></div>
<div class="room">🛠<span>ადმინისტრაცია</span></div>
<div class="room">🆘<span>დახმარება</span></div>
<div class="room">💬<span>ფორუმი</span></div>
<div class="room exit">🚪<span>გასვლა</span></div>

</div>

<!-- ჩატი -->

<div class="chat">

<div class="message">

<div class="avatar"></div>

<div class="msg-content">
<span class="nick">Nika</span>
<span class="time">21:34</span>

<div class="text">
გამარჯობა ყველას 👋
</div>

</div>

</div>

</div>

<!-- შეტყობინება -->

<div class="input-area">

<input type="text" placeholder="დაწერე მესიჯი...">

<button class="send">✈</button>

</div>

</body>
</html>
