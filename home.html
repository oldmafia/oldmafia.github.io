<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Pro</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff4d4d; --gold: #ffd700; --dark: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { margin: 0; background: var(--dark); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { background: #111; padding: 12px 15px; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: space-between; z-index: 2000; }
        .room-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 13px; }

        /* ჩამოსაშლელი მენიუ */
        .top-menu { position: absolute; top: -500px; left: 0; width: 100%; background: #0c0c0c; transition: 0.4s; z-index: 1500; padding: 20px; border-bottom: 2px solid var(--red); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .top-menu.open { top: 60px; }
        .menu-item { background: #151515; padding: 12px; border-radius: 10px; text-align: center; font-size: 12px; cursor: pointer; border: 1px solid #222; }

        /* პროფილი */
        .profile-section { padding: 10px 15px; display: flex; align-items: center; gap: 12px; background: #080808; border-bottom: 1px solid #111; }
        .avatar-wrapper { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--red); overflow: hidden; position: relative; background: #222; flex-shrink: 0; }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .user-info { flex-grow: 1; }
        .u-nick { font-weight: bold; color: var(--red); font-size: 16px; margin: 0; }
        .u-status { font-size: 11px; color: #666; margin: 0; cursor: pointer; }

        /* ჩატი */
        #chatBox { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 15px; border-radius: 18px; font-size: 14px; background: #1a1a1a; max-width: 85%; align-self: flex-start; position: relative; }
        .me { align-self: flex-end; background: var(--red); color: #fff; }
        .m-name { font-size: 10px; color: var(--gold); display: block; margin-bottom: 3px; }

        .input-zone { padding: 15px; background: #0c0c0c; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        input[type="text"] { flex: 1; background: #151515; border: 1px solid #333; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

    <header>
        <button class="room-btn" onclick="toggleMenu()">🔍 ოთახები ▾</button>
        <div style="color:var(--gold); font-weight:bold; font-size:12px;">OLD MAFIA</div>
        <button onclick="logout()" style="background:none; border:none; color:#444; font-size:12px;">გასვლა</button>
    </header>

    <div id="topMenu" class="top-menu">
        <div class="menu-item" onclick="setR('💬 ზოგადი ჩატი')">💬 ზოგადი</div>
        <div class="menu-item" onclick="setR('💎 VIP საუბრები')">💎 VIP</div>
        <div class="menu-item" onclick="setR('🌑 მაფიის ღამე')">🌑 მაფია</div>
        <div class="menu-item" onclick="setR('🛡️ ადმინისტრაცია')">🛡️ ადმინი</div>
        <div class="menu-item" onclick="showInbox()" style="grid-column: span 2; color:var(--gold); border-color:var(--gold)">💌 შემოსული მესიჯები</div>
    </div>

    <div class="profile-section">
        <div class="avatar-wrapper" onclick="document.getElementById('fileIn').click()">
            <img id="myAv" src="https://via.placeholder.com/60">
            <input type="file" id="fileIn" hidden accept="image/*" onchange="uploadAv(this)">
        </div>
        <div class="user-info">
            <p class="u-nick" id="myNick">დამამუშავებელი...</p>
            <p class="u-status" id="myStatus" onclick="changeStatus()">დააჭირე სტატუსის შესაცვლელად...</p>
        </div>
    </div>

    <div id="chatBox"></div>

    <div class="input-zone">
        <input type="text" id="mIn" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="background:var(--red); border:none; width:45px; height:45px; border-radius:50%; color:#fff; cursor:pointer">➤</button>
    </div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let me = {}, room = '💬 ზოგადი ჩატი', dmId = null;

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return location.href="index.html";

        let { data: p } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
        if(!p) {
            const nick = user.email.split('@')[0];
            await sb.from('profiles').insert([{ id: user.id, username: nick }]);
            p = { username: nick, avatar_url: '', status: '' };
        }
        
        me = { id: user.id, nick: p.username, av: p.avatar_url || 'https://via.placeholder.com/60', status: p.status || 'აქ დაწერე სტატუსი...' };
        
        document.getElementById('myNick').innerText = me.nick;
        document.getElementById('myAv').src = me.av;
        document.getElementById('myStatus').innerText = me.status;

        load();
        sb.channel('chat').on('postgres_changes',{event:'*',schema:'public',table:'messages'},()=>load()).subscribe();
    }

    async function uploadAv(input) {
        const file = input.files[0];
        if(!file) return;
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = e.target.result;
            const { error } = await sb.from('profiles').update({ avatar_url: base64 }).eq('id', me.id);
            if(!error) {
                document.getElementById('myAv').src = base64;
                me.av = base64;
            } else { alert("ვერ აიტვირთა!"); }
        };
        reader.readAsDataURL(file);
    }

    async function changeStatus() {
        const s = prompt("შეიყვანე ახალი სტატუსი:", me.status);
        if(s) {
            await sb.from('profiles').update({ status: s }).eq('id', me.id);
            document.getElementById('myStatus').innerText = s;
            me.status = s;
        }
    }

    async function load() {
        let q = sb.from('messages').select('*').eq('room', room);
        if(dmId) {
            q = q.or(`and(user_id.eq.${me.id},receiver_id.eq.${dmId}),and(user_id.eq.${dmId},receiver_id.eq.${me.id})`);
        } else {
            q = q.is('receiver_id', null);
        }
        const { data } = await q.order('created_at', { ascending: true });
        const box = document.getElementById('chatBox');
        box.innerHTML = (data || []).map(m => `
            <div class="msg ${m.user_id === me.id ? 'me' : ''}">
                <span class="m-name">${m.username}</span>
                ${m.text}
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('mIn'); if(!i.value.trim()) return;
        const { error } = await sb.from('messages').insert([{ 
            text: i.value, room: room, user_id: me.id, username: me.nick, receiver_id: dmId 
        }]);
        if(error) alert("შეცდომა! SQL Policy-ს ბრალია.");
        i.value = "";
    }

    function setR(n) { room = n; dmId = null; toggleMenu(); load(); }
    function toggleMenu() { document.getElementById('topMenu').classList.toggle('open'); }
    async function logout() { await sb.auth.signOut(); location.href="index.html"; }
    init();
</script>
</body>
</html>
