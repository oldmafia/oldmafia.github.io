<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - ADMIN CONTROL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #050505; --card: #111; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; z-index: 1000; }
        #room-title { color: var(--red); font-weight: bold; font-size: 14px; text-transform: uppercase; }

        .side-panel { position: fixed; top: 0; height: 100%; background: #080808; z-index: 2000; transition: 0.3s; width: 280px; overflow-y: auto; padding: 20px; border: 1px solid var(--border); }
        #side-left { left: -280px; }
        #side-right { right: -280px; }
        .open-left { transform: translateX(280px); }
        .open-right { transform: translateX(-280px); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; backdrop-filter: blur(5px); }
        .active { display: block; }

        .prof-link { width: 100%; padding: 15px; background: #1a0505; border: 1px solid #500; border-radius: 12px; color: white; font-weight: bold; margin-bottom: 15px; cursor: pointer; text-align: center; }
        .room-item { padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; cursor: pointer; font-size: 14px; }
        .room-active { border-color: var(--red); background: #200; color: var(--red); }

        .u-card { display: flex; align-items: center; gap: 12px; padding: 10px; background: var(--card); border-radius: 12px; margin-bottom: 6px; border: 1px solid var(--border); cursor: pointer; }
        .u-ava { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; }
        .list-section { color: var(--red); font-size: 11px; font-weight: bold; margin: 20px 0 10px; text-transform: uppercase; opacity: 0.7; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { display: flex; gap: 10px; max-width: 85%; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 15px; background: var(--card); border-radius: 15px; font-size: 14px; border: 1px solid var(--border); }
        .msg.me .bubble { background: #300; border-color: #600; }

        #prof-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 360px; background: #0d0d0d; border: 1px solid #333; border-radius: 25px; padding: 25px; z-index: 3000; text-align: center; }
        .p-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: #fff; }
        .btn-blue { background: #0055ff; }
        .btn-red { background: var(--red); }
        .btn-gray { background: #222; }
    </style>
</head>
<body>

    <div id="prof-modal"></div>

    <nav id="side-left" class="side-panel">

        <div id="rooms-list"></div>
    </nav>

    <aside id="side-right" class="side-panel">

        <div class="list-section">👤 წევრები</div>
        <div id="members-list"></div>

    <div id="chat-flow"></div>

        <button onclick="sendMsg()" style="background:none; border:none; color:red; font-size:24px;">➤</button>
    </div>
