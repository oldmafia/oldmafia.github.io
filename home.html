<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - Full Edition</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff4d4d; --dark: #050505; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #111; padding: 15px; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; cursor: pointer; z-index: 2000; }
        
        /* ჩამოსაშლელი მენიუ - 2 სვეტად */
        #menu { 
            position: absolute; top: -100%; left: 0; width: 100%;
            background: #0c0c0c; padding: 15px; display: grid; 
            grid-template-columns: 1fr 1fr; gap: 10px; 
            border-bottom: 2px solid var(--red); transition: 0.4s; z-index: 1500;
        }
        #menu.active { top: 60px; }
        .room-btn { 
            background: #1a1a1a; padding: 12px; text-align: left; 
            border-radius: 8px; font-size: 13px; border: 1px solid #333; color: #ccc;
        }

        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 15px; background: #1a1a1a; max-width: 85%; }

        .input-bar { padding: 15px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #151515; color: white; outline: none; }
    </style>
</head>
<body>

    <header onclick="toggleMenu()">
        <div style="width: 40px;"></div> <b id="roomName">💬 ზოგადი ჩატი ▾</b>
        <div style="color:var(--red); font-weight:bold;">OM</div>
    </header>

    <div id="menu">
        <div class="room-btn" onclick="setRoom('💬 ზოგადი ჩატი')">💬 ზოგადი</div>
        <div class="room-btn" onclick="setRoom('💎 VIP საუბრები')">💎 VIP</div>
        <div class="room-btn" onclick="setRoom('🔍 გამოძიება')">🔍 გამოძიება</div>
        <div class="room-btn" onclick="setRoom('🔐 შიფროგრამა')">🔐 შიფროგრამა</div>
        <div class="room-btn" onclick="setRoom('🧩 ვიქტორინა')">🧩 ვიქტორინა</div>
        <div class="room-btn" onclick="setRoom('⛓️ ჩამოხრჩობანა')">⛓️ ჩამოხრჩობანა</div>
        <div class="room-btn" onclick="setRoom('🌑 მაფიის ღამე')">🌑 მაფია</div>
        <div class="room-btn" onclick="setRoom('🎵 მუსიკა')">🎵 მუსიკა</div>
        <div class="room-btn" onclick="setRoom('😂 იუმორი')">😂 იუმორი</div>
        <div class="room-btn" onclick="setRoom('🎲 ნარდი')">🎲 ნარდი</div>
        <div class="room-btn" onclick="setRoom('🃏 ჯოკერი')">🃏 ჯოკერი</div>
        <div class="room-btn" onclick="setRoom('🛡️ ადმინისტრაცია')">🛡️ ადმინი</div>
        <div class="room-btn" onclick="alert('დახმარება მალე!')" style="color: #4da6ff;">❓ დახმარება</div>
        <div class="room-btn" onclick="logout()" style="color: #ff4d4d;">🚪 გასვლა</div>
    </div>

    <div id="chatBox"></div>

    <div class="input-bar">
        <input type="text" id="mIn" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="background:var(--red); border:none; color:white; width:45px; height:45px; border-radius:50%;">➤</button>
    </div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let room = '💬 ზოგადი ჩატი', myNick = 'User';

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(user) myNick = user.email.split('@')[0];
        load();
        sb.channel('chat').on('postgres_changes',{event:'*',schema:'public',table:'messages'},()=>load()).subscribe();
    }

    function toggleMenu() { document.getElementById('menu').classList.toggle('active'); }

    async function load() {
        const { data } = await sb.from('messages').select('*').eq('room', room).order('created_at', { ascending: true });
        document.getElementById('chatBox').innerHTML = (data || []).map(m => `<div class="msg"><b>${m.username}:</b> ${m.text}</div>`).join('');
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    async function send() {
        const i = document.getElementById('mIn'); if(!i.value.trim()) return;
        await sb.from('messages').insert([{ text: i.value, room: room, username: myNick }]);
        i.value = "";
    }

    function setRoom(n) { room = n; document.getElementById('roomName').innerText = n + ' ▾'; toggleMenu(); load(); }
    async function logout() { await sb.auth.signOut(); location.href="index.html"; }
    init();
</script>
</body>
</html>
