<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კაიფმანია - მთავარი</title>
    <style>
        body { margin: 0; background-color: #000; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* მარცხენა მენიუ */
        #sidebar {
            width: 260px;
            background: #0a0a0a;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .profile-area { padding: 20px; text-align: center; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .av-img { width: 60px; border-radius: 50%; border: 2px solid #ff0000; }

        /* ოთახების სია სქროლით */
        .rooms-list { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .rooms-list::-webkit-scrollbar { width: 4px; }
        .rooms-list::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }

        .r-item {
            padding: 10px 15px;
            margin: 4px 0;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            color: #bbb;
        }

        .r-item:hover { background: #1a1a1a; color: #fff; }
        .r-item.active { background: rgba(255, 0, 0, 0.15); color: #ff0000; font-weight: bold; border-left: 3px solid #ff0000; }

        /* ჩატი */
        #main-chat { flex-grow: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 25px; background: #0a0a0a; border-bottom: 1px solid #222; color: #ff0000; font-weight: bold; font-size: 18px; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        
        .msg { background: #111; padding: 10px 15px; border-radius: 12px; max-width: 75%; border-left: 3px solid #ff0000; }
        
        .input-area { padding: 20px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: #ff0000; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="profile-area">
            <img src="https://via.placeholder.com/60" class="av-img">
            <div style="margin-top:10px; font-weight: bold;">tojina</div>
            <div style="color: gold; font-size: 10px;">PREMIUM MEMBER</div>
        </div>

        <div class="rooms-list" id="menuList">
            </div>
    </div>

    <div id="main-chat">
        <div class="chat-header" id="currentRoom">ზოგადი ჩატი</div>
        <div id="messages">
            <div class="msg">მოგესალმებით კაიფმანიაში! აირჩიეთ სასურველი ოთახი მენიუდან.</div>
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება...">
            <button onclick="sendMsg()">გაგზავნა</button>
        </div>
    </div>

    <script>
        // ზუსტად შენი ჩამოთვლილი 15 პუნქტი
        const rooms = [
            "💬 ზოგადი ჩატი", 
            "💎 ვიპ საუბრები", 
            "🔍 გამოძიება", 
            "🔐 შიფროგრამა", 
            "❓ ვიქტორინა", 
            "😵 ჩამოხრჩობანა", 
            "🕵️ მაფიის ღამე", 
            "🃏 ჯოკერი", 
            "🎲 ნარდი", 
            "🎵 მუსიკა", 
            "😂 იუმორი", 
            "🛡️ ადმინისტრაცია", 
            "❓ დახმარება", 
            "🏛️ ფორუმი", 
            "🚪 გასვლა"
        ];

        let currentActive = "💬 ზოგადი ჩატი";

        function renderMenu() {
            const container = document.getElementById('menuList');
            container.innerHTML = "";
            
            rooms.forEach(room => {
                const item = document.createElement('div');
                item.className = `r-item ${room === currentActive ? 'active' : ''}`;
                item.innerText = room;
                
                item.onclick = () => {
                    if(room === "🚪 გასვლა") {
                        window.location.href = "index.html"; // გადადის მთავარზე
                        return;
                    }
                    currentActive = room;
                    document.getElementById('currentRoom').innerText = room;
                    document.getElementById('messages').innerHTML = `<div class="msg">თქვენ შემოხვედით ოთახში: <b>${room}</b></div>`;
                    renderMenu();
                };
                
                container.appendChild(item);
            });
        }

        function sendMsg() {
            const input = document.getElementById('msgInput');
            if(input.value.trim() !== "") {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<b>შენ:</b> ${input.value}`;
                document.getElementById('messages').appendChild(div);
                input.value = "";
                const chat = document.getElementById('messages');
                chat.scrollTop = chat.scrollHeight;
            }
        }

        // პირველი ჩატვირთვა
        renderMenu();
    </script>
</body>
</html>
