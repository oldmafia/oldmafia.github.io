<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - სრული მენიუ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container {
            background: #0d0d0d;
            width: 100%;
            max-width: 500px;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
            color: white;
        }

        .header {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 0 0 15px red;
            color: #fff;
        }

        /* მენიუს სტრუქტურა - მობილურზე 2 სვეტი */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .item {
            background: #1a1a1a;
            padding: 14px 10px;
            border-radius: 12px;
            text-align: left;
            padding-left: 15px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #333;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }

        .item:hover {
            background: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
            transform: scale(1.05);
            border-color: #fff;
        }

        /* გასვლის ღილაკი */
        .exit {
            grid-column: span 2;
            justify-content: center;
            background: transparent;
            border: 1px solid #ff0000;
            color: #ff4d4d;
        }

        /* ჩათის ზონა */
        .input-area {
            border-top: 2px solid #222;
            padding-top: 20px;
        }

        #msg-input {
            width: 100%;
            background: #151515;
            border: 1px solid #ff000055;
            padding: 15px;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .send-btn {
            width: 100%;
            background: #ff0000;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 17px;
            transition: 0.3s;
        }

        .send-btn i {
            font-size: 20px;
            transition: 0.5s ease;
        }

        .send-btn:hover {
            background: #cc0000;
            box-shadow: 0 0 20px #ff0000;
        }

        .send-btn:hover i {
            transform: translate(15px, -15px) rotate(-20deg);
        }

        .time-label {
            display: block;
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #888;
            min-height: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">კაიფმანია 😎🔥</div>

    <div class="menu-grid">
        <a href="#" class="item">☕ კაფე-ბარი</a>
        <a href="#" class="item">💎 ვიპ საუბრები</a>
        <a href="#" class="item">🔍 გამოძიება</a>
        <a href="#" class="item">📑 შიფროგრამა</a>
        <a href="#" class="item">🧠 ვიქტორინა</a>
        <a href="#" class="item">🪢 ჩამოხრჩობანა</a>
        <a href="#" class="item">🎭 მაფიის ღამე</a>
        <a href="#" class="item">🃏 ჯოკერი</a>
        <a href="#" class="item">🎲 ნარდი</a>
        <a href="#" class="item">🎵 მუსიკა</a>
        <a href="#" class="item">😂 იუმორი</a>
        <a href="#" class="item">🛠️ ადმინისტრაცია</a>
        <a href="#" class="item">❓ დახმარება</a>
        <a href="#" class="item">🏛️ ფორუმი</a>
        <a href="#" class="item exit">🚪 გასვლა</a>
    </div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="ჩაწერე მესიჯი...">
        <button class="send-btn" onclick="sendWithTime()">
            გაგზავნა <i class="fas fa-plane-departure"></i>
        </button>
        <span id="time-status" class="time-label"></span>
    </div>
</div>

<script>
    function sendWithTime() {
        const input = document.getElementById('msg-input');
        const status = document.getElementById('time-status');

        if (input.value.trim() === "") {
            status.innerText = "გთხოვთ ჩაწეროთ ტექსტი!";
            status.style.color = "orange";
            return;
        }

        const now = new Date();
        const time = now.getHours().toString().padStart(2, '0') + ":" + 
                     now.getMinutes().toString().padStart(2, '0');

        status.innerText = "ბოლო მესიჯი გაიგზავნა: " + time;
        status.style.color = "#888";
        input.value = ""; // ველის გასუფთავება
    }
</script>

</body>
</html>
