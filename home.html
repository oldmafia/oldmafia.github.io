<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - მთავარი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* საიდბარი */
        .sidebar { width: 280px; background: #050505; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .sidebar-avatar { width: 65px; height: 65px; border-radius: 10px; border: 2px solid red; margin: 0 auto 10px; background: #111 center/cover; }
        .user-name { color: red; font-weight: bold; font-size: 18px; }

        /* 15 ოთახი */
        .menu-items { flex-grow: 1; overflow-y: auto; }
        .menu-item { padding: 12px 20px; color: #bbb; cursor: pointer; font-size: 14px; border-left: 3px solid transparent; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: #1a0000; color: red; border-left: 3px solid red; }
        .logout-item { color: #555 !important; border-top: 1px solid #1a1a1a; margin-top: auto; }

        /* მთავარი ზონა */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
        .top-bar { padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; color: red; font-weight: bold; display: flex; align-items: center; }
        .messages-area { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #000; }
        
        /* მესიჯის ბუშტი */
        .msg-bubble { background: #0d0d0d; padding: 12px; border-radius: 0 15px 15px 15px; border: 1px solid #1a1a1a; max-width: 80%; line-height: 1.4; }
        
        /* ქვედა პანელი და თვითმფრინავი */
        .bottom-bar { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; align-items: center; border-top: 1px solid #222; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; padding: 12px 18px; border-radius: 25px; color: #fff; outline: none; font-size: 15px; }
        .send-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
        .send-btn svg { fill: #007bff; }
        .send-btn:hover { transform: scale(1.1); }

        .burger { display: none; font-size: 24px; color: red; background: none; border: none; margin-right: 15px; cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; }
            .sidebar.open { left: 0; }
            .burger { display: block; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header" onclick="location.href='profile.html'">
        <div class="sidebar-avatar" id="uAvat"></div>
        <div class="user-name" id="uNick">იტვირთება...</div>
    </div>
    <div class="menu-items" id="roomList">
        <div class="menu-item active">☕ კაფე-ბარი</div>
        <div class="menu-item">👑 ვიპ საუბრები</div>
        <div class="menu-item">🕵️ გამოძიება</div>
        <div class="menu-item">🔐 შიფროგრამა</div>
        <div class="menu-item">❓ ვიქტორინა</div>
        <div class="menu-item">🪢 ჩამოხრჩობანა</div>
        <div class="menu-item">🌑 მაფიის ღამე</div>
        <div class="menu-item">🃏 ჯოკერი</div>
        <div class="menu-item">🎲 ნარდი</div>
        <div class="menu-item">🎵 მუსიკა</div>
        <div class="menu-item">😂 იუმორი</div>
        <div class="menu-item">🚀 კაიფმანია</div>
        <div class="menu-item">🛠️ ადმინისტრაცია</div>
        <div class="menu-item">❓ დახმარება</div>
        <div class="menu-item">📝 ფორუმი</div>
        <div class="menu-item logout-item" onclick="logout()">🚪 გასვლა</div>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <button class="burger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <span id="roomTitle">☕ კაფე-ბარი</span>
    </div>
    <div class="messages-area" id="chatContainer"></div>
    <div class="bottom-bar">
        <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">
            <svg viewBox="0 0 24 24" width="35" height="35"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/></svg>
        </button>
    </div>
</div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let currentRoom = '☕ კაფე-ბარი';
    let myProfile = null;

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if (!user) return window.location.href = "index.html";

        // 1. ვცდილობთ პროფილის წამოღებას
        let { data: profile } = await client.from('profiles').select('*').eq('id', user.id).maybeSingle();

        // 2. თუ პროფილი არ არსებობს, ავტომატურად ვქმნით
        if (!profile) {
            const { data: newP, error } = await client.from('profiles').insert([{
                id: user.id,
                username: user.user_metadata.nickname || "იუზერი_" + Math.floor(Math.random()*1000),
                role: 'მომხმარებელი',
                avatar_url: 'https://via.placeholder.com/150'
            }]).select().single();
            profile = newP;
        }

        myProfile = profile;
        document.getElementById('uNick').innerText = profile.username;
        if(profile.avatar_url) document.getElementById('uAvat').style.backgroundImage = `url('${profile.avatar_url}')`;
        
        loadMessages(currentRoom);
    }

    async function loadMessages(room) {
        const chat = document.getElementById('chatContainer');
        chat.innerHTML = "";
        const { data } = await client.from('messages').select('*').eq('room_name', room).order('created_at', { ascending: true });
        if (data) data.forEach(displayMsg);
        chat.scrollTop = chat.scrollHeight;
    }

    function displayMsg(msg) {
        const chat = document.getElementById('chatContainer');
        const isMod = (myProfile.role === 'დამფუძნებელი' || myProfile.role === 'ადმინი');
        const delBtn = isMod ? `<span onclick="deleteMsg('${msg.id}')" style="color:#444; cursor:pointer; float:right; font-size:12px;">[X]</span>` : '';
        const nameColor = (msg.username === myProfile.username) ? 'yellow' : 'red';

        chat.innerHTML += `
            <div class="msg" id="msg-${msg.id}">
                <div class="msg-bubble">
                    ${delBtn} <b style="color:${nameColor};">${msg.username}</b><br>
                    <span style="color:#eee;">${msg.text}</span>
                </div>
            </div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
        const input = document.getElementById('msgInput');
        const val = input.value.trim();
        if (!val || myProfile.is_blocked) return;

        const { error } = await client.from('messages').insert([{ 
            text: val, 
            username: myProfile.username, 
            room_name: currentRoom, 
            user_id: myProfile.id 
        }]);
        
        if(!error) input.value = "";
    }

    async function deleteMsg(id) {
        if(confirm("წავშალოთ?")) {
            await client.from('messages').delete().eq('id', id);
            document.getElementById('msg-' + id).remove();
        }
    }

    function logout() { client.auth.signOut().then(() => location.href='index.html'); }

    // ოთახების გადართვა
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', function() {
            if (this.classList.contains('logout-item')) return;
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            currentRoom = this.innerText.trim();
            document.getElementById('roomTitle').innerText = currentRoom;
            document.getElementById('sidebar').classList.remove('open');
            loadMessages(currentRoom);
        });
    });

    client.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
        if(p.new.room_name === currentRoom) displayMsg(p.new);
    }).subscribe();

    init();
</script>
</body>
</html>
