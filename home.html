<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - მთავარი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* გვერდითა მენიუ (Sidebar) */
        .sidebar {
            width: 260px;
            background: #0d0d0d;
            border-right: 2px solid red;
            box-shadow: 5px 0 30px rgba(255, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px red;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .menu-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .menu-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            font-size: 14px;
        }

        .menu-item:hover {
            border-color: red;
            background: rgba(255, 0, 0, 0.1);
            box-shadow: 0 0 10px red;
        }

        .menu-item.active {
            background: red;
            box-shadow: 0 0 15px red;
        }

        /* მთავარი კონტენტი */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 60px;
            background: #0d0d0d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #222;
        }

        .room-area {
            flex-grow: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #220000 0%, #000 80%);
        }

        /* მობილურისთვის */
        .mobile-toggle {
            display: none;
            background: red;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -260px;
                height: 100%;
            }
            .sidebar.open {
                left: 0;
            }
            .mobile-toggle {
                display: block;
            }
        }

        .logout-btn {
            color: #ff4444;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">კაიფმანია 🕶️</div>
        <div class="menu-items">
            <div class="menu-item" onclick="openRoom('ზოგადი ჩატი')">1. ზოგადი ჩატი</div>
            <div class="menu-item" onclick="openRoom('ვიპ საუბრები')">2. ვიპ საუბრები</div>
            <div class="menu-item" onclick="openRoom('გამოძიება')">3. გამოძიება</div>
            <div class="menu-item" onclick="openRoom('შიფროგრამა')">4. შიფროგრამა</div>
            <div class="menu-item" onclick="openRoom('ვიქტორინა')">5. ვიქტორინა</div>
            <div class="menu-item" onclick="openRoom('ჩამოხრჩობანა')">6. ჩამოხრჩობანა</div>
            <div class="menu-item" onclick="openRoom('მაფიის ღამე')">7. მაფიის ღამე</div>
            <div class="menu-item" onclick="openRoom('ჯოკერი')">8. ჯოკერი</div>
            <div class="menu-item" onclick="openRoom('ნარდი')">9. ნარდი</div>
            <div class="menu-item" onclick="openRoom('მუსიკა')">10. მუსიკა</div>
            <div class="menu-item" onclick="openRoom('იუმორი')">11. იუმორი</div>
            <div class="menu-item" id="adminRoom" style="display:none; color: gold;" onclick="openRoom('ადმინისტრაცია')">12. ადმინისტრაცია</div>
            <div class="menu-item" onclick="openRoom('დახმარება')">13. დახმარება</div>
            <div class="menu-item" onclick="openRoom('ფორუმი')">14. ფორუმი</div>
            <div class="menu-item logout-btn" onclick="logout()">15. გასვლა</div>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <button class="mobile-toggle" onclick="toggleSidebar()">☰ ოთახები</button>
            <div id="roomTitle">მთავარი</div>
            <div id="userBadge" style="font-size: 12px; color: #aaa;">ამომცნობი...</div>
        </div>
        <div class="room-area" id="roomArea">
            <h2 id="welcomeMsg">მოგესალმებით!</h2>
            <p>აირჩიე ოთახი გვერდითა მენიუდან.</p>
        </div>
    </div>

    <script>
        // Supabase-ის მონაცემები (შენი კოდიდან ამოღებული)
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // სიდებარის გამოჩენა მობილურზე
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // ოთახების გადართვა
        function openRoom(name) {
            document.getElementById('roomTitle').innerText = name;
            document.getElementById('roomArea').innerHTML = `<h3>ოთახი: ${name}</h3><p>მალე აქ დაემატება ${name}-ის ფუნქციონალი.</p>`;
            if (window.innerWidth <= 768) toggleSidebar();
        }

        // იუზერის სტატუსის და როლის შემოწმება
        async function checkSession() {
            const { data: { user }, error } = await supabaseClient.auth.getUser();

            if (error || !user) {
                window.location.href = "index.html";
                return;
            }

            // ნიკნეიმის გამოჩენა
            const nickname = user.user_metadata.nickname || user.email;
            document.getElementById('userBadge').innerText = nickname;
            document.getElementById('welcomeMsg').innerText = "გამარჯობა, " + nickname + "!";

            // როლის შემოწმება profiles ცხრილიდან
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('role')
                .eq('id', user.id)
                .single();

            if (profile && (profile.role === 'owner' || profile.role === 'admin')) {
                document.getElementById('adminRoom').style.display = 'block';
            }
        }

        // გამოსვლა
        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        checkSession();
    </script>
</body>
</html>
