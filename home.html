<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Mafia - Home</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: #050505; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .sidebar-avatar { width: 70px; height: 70px; border-radius: 12px; border: 2px solid red; margin: 0 auto 10px; background: #111; }
        .user-name { color: red; font-weight: bold; }
        .menu-items { flex-grow: 1; overflow-y: auto; }
        .menu-item { padding: 12px 20px; color: #bbb; cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; }
        .menu-item:hover, .menu-item.active { background: #1a0000; color: red; border-left: 3px solid red; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-bar { padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; display: flex; align-items: center; color: red; font-weight: bold; }
        .messages-area { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { display: flex; gap: 10px; margin-bottom: 10px; }
        .msg-bubble { background: #0d0d0d; padding: 10px; border-radius: 0 10px 10px 10px; border: 1px solid #1a1a1a; max-width: 80%; }
        .bottom-bar { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; padding: 12px; border-radius: 20px; color: #fff; outline: none; }
        .send-btn { background: none; border: none; color: red; cursor: pointer; }
        .burger { display: none; font-size: 24px; color: red; background: none; border: none; margin-right: 10px; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; }
            .sidebar.open { left: 0; }
            .burger { display: block; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-avatar"></div>
        <div class="user-name" id="userName">ჩამომტვირთავი...</div>
    </div>
    <div class="menu-items">
        <div class="menu-item active">☕ კაფე-ბარი</div>
        <div class="menu-item">👑 ვიპ საუბრები</div>
        <div class="menu-item">🕵️ გამოძიება</div>
        <div class="menu-item">🔐 შიფროგრამა</div>
        <div class="menu-item">❓ ვიქტორინა</div>
        <div class="menu-item">🪢 ჩამოხრჩობანა</div>
        <div class="menu-item">🌑 მაფიის ღამე</div>
        <div class="menu-item">🃏 ჯოკერი</div>
        <div class="menu-item">🎲 ნარდი</div>
        <div class="menu-item">🎵 მუსიკა</div>
        <div class="menu-item">😂 იუმორი</div>
        <div class="menu-item">🚀 კაიფმანია</div>
        <div class="menu-item">🛠️ ადმინისტრაცია</div>
        <div class="menu-item">📝 ფორუმი</div>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <button class="burger" onclick="toggleMenu()">☰</button>
        <span id="roomTitle">☕ კაფე-ბარი</span>
    </div>
    <div class="messages-area" id="chatContainer"></div>
    <div class="bottom-bar">
        <input type="text" id="msgInput" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
    // მონაცემები შენი კოდიდან
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let currentRoom = '☕ კაფე-ბარი';
    let myNickname = 'სტუმარი';

    // მომხმარებლის ამოცნობა
    async function init() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            myNickname = user.user_metadata.nickname || 'abu007';
            document.getElementById('userName').innerText = myNickname;
        }
        loadMessages(currentRoom);
    }

    // მენიუს ჩაკეტვა/გახსნა
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    // მესიჯების ჩატვირთვა
    async function loadMessages(room) {
        const chat = document.getElementById('chatContainer');
        chat.innerHTML = '<div style="color:#333; font-size:12px; text-align:center;">იტვირთება...</div>';
        
        const { data, error } = await supabase
            .from('messages')
            .select('*')
            .eq('room_name', room)
            .order('created_at', { ascending: true });

        if (data) {
            chat.innerHTML = "";
            data.forEach(displayMsg);
            chat.scrollTop = chat.scrollHeight;
        }
    }

    function displayMsg(msg) {
        const chat = document.getElementById('chatContainer');
        const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        chat.innerHTML += `
            <div class="msg">
                <div class="msg-bubble">
                    <b style="color:red; font-size:12px;">${msg.username}</b><br>
                    ${msg.text}
                    <div style="font-size:9px; color:#444; text-align:right;">${time}</div>
                </div>
            </div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    // გაგზავნა
    async function send() {
        const input = document.getElementById('msgInput');
        const val = input.value.trim();
        if (!val) return;

        const { error } = await supabase
            .from('messages')
            .insert([{ text: val, username: myNickname, room_name: currentRoom }]);

        if (!error) input.value = "";
    }

    // რეალურ დროში განახლება
    supabase.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
        if(payload.new.room_name === currentRoom) displayMsg(payload.new);
    }).subscribe();

    // ოთახების გადართვა (ეს ნაწილი აკეთებს ყველაფერს)
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            
            currentRoom = this.innerText;
            document.getElementById('roomTitle').innerText = currentRoom;
            
            if (window.innerWidth <= 768) toggleMenu(); // მობილურზე მენიუს ჩაკეცვა
            loadMessages(currentRoom); // მესიჯების ჩატვირთვა
        });
    });

    init();
</script>
</body>
</html>
