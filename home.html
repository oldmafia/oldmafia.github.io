<!DOCTYPE html>
<html lang="ka">

    <title>OLD MAFIA - SUPREME</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --bg: #050505; --card: #111; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        .side-btn { position: absolute; font-size: 24px; color: var(--red); cursor: pointer; top: 15px; }
        #left-btn { left: 15px; } #right-btn { right: 15px; }

        /* ჩატის ზონა */
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* მესიჯის სტილი - ყველა მარცხნივ */
        .msg-row { display: flex; gap: 12px; align-items: flex-start; max-width: 90%; animation: fadeIn 0.3s ease; }
        .msg-ava { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #333; object-fit: cover; background: #222; }
        .msg-body { display: flex; flex-direction: column; }
        .msg-nick { font-size: 12px; font-weight: bold; color: #888; margin-bottom: 4px; cursor: pointer; }
        .is-me .msg-nick { color: var(--red); }
        .bubble { padding: 10px 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 0 15px 15px 15px; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .is-me .bubble { border-color: #500; background: #200; }

        /* ქვედა პანელი */
        .input-area { padding: 15px; background: #000; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        #msg-in { flex: 1; background: #111; border: 1px solid #333; padding: 12px 20px; border-radius: 30px; color: #fff; outline: none; }
        .send-btn { color: var(--red); font-size: 28px; cursor: pointer; border: none; background: none; }

        /* მენიუები */
        .side-panel { position: fixed; top: 0; height: 100%; background: #080808; z-index: 2000; transition: 0.3s; width: 280px; padding: 20px; border: 1px solid var(--border); }
        #side-left { left: -280px; } #side-right { right: -280px; }
        .open-l { left: 0 !important; } .open-r { right: 0 !important; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; }
        .show { display: block; }
        
        /* პროფილი */
        #prof-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: #0a0a0a; border: 1px solid #333; border-radius: 20px; padding: 25px; z-index: 3000; text-align: center; }
        .p-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        <button onclick="send()" class="send-btn">➤</button>
    </div>
