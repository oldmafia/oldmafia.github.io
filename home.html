<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAIFMANIA - MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* მენიუ */
        #sidebar { 
            position: fixed; left: 0; top: 0; width: 280px; height: 100%; 
            background: #000; border-right: 2px solid red; transition: 0.3s ease; z-index: 1000;
            display: flex; flex-direction: column;
        }
        #sidebar.closed { transform: translateX(-100%); }
        .sidebar-top { padding: 20px; border-bottom: 2px solid red; display: flex; justify-content: space-between; align-items: center; }
        .close-x { color: red; font-size: 30px; cursor: pointer; font-weight: bold; }
        .kaif-btn { border: 1.5px solid red; padding: 8px 16px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }

        .room-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .room-item { padding: 15px 20px; border-bottom: 1px solid #111; cursor: pointer; color: #aaa; display: flex; align-items: center; gap: 10px; }
        .room-item.active { background: #111; color: red; border-left: 5px solid red; font-weight: bold; }

        .sidebar-footer { padding: 15px; border-top: 1px solid red; background: #000; }
        .logout-btn { width: 100%; padding: 12px; border: 1.5px solid red; background: transparent; color: white; border-radius: 12px; cursor: pointer; font-weight: bold; }

        /* ჩატი */
        #mainChat { flex: 1; display: flex; flex-direction: column; background: #000; }
        .header { height: 70px; border-bottom: 2px solid red; display: flex; justify-content: center; align-items: center; position: relative; }
        .menu-btn { position: absolute; left: 20px; font-size: 30px; color: red; cursor: pointer; }
        #roomTitle { color: red; font-weight: bold; font-size: 18px; text-transform: uppercase; }

        #messageList { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; width: 100%; justify-content: flex-start; }
        .msg-bubble { background: #121212; border: 1px solid #222; padding: 10px 15px; border-radius: 18px; max-width: 85%; }
        .msg-bubble.is-me { border-color: red; }
        .msg-user { font-size: 12px; font-weight: bold; color: #00e5ff; display: block; margin-bottom: 4px; }

        /* საწერი ველი */
        .input-container { padding: 15px; background: #000; border-top: 1px solid #222; }
        .input-wrapper { display: flex; align-items: center; background: #0a0a0a; border: 1px solid #333; border-radius: 30px; padding: 5px; }
        input { flex: 1; padding: 10px 15px; background: transparent; border: none; color: white; outline: none; }
        .send-btn { background: red; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
        .plane-emoji { font-size: 24px; filter: drop-shadow(0 0 2px #00e5ff); transform: rotate(-10deg); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-top">
            <div class="close-x" onclick="toggleSidebar()">✕</div>
            <div class="kaif-btn" onclick="location.href='profile.html'">😎 კაიფმანია</div>
        </div>
        <div class="room-list">
            <div class="room-item active" onclick="changeRoom('💬 ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
            <div class="room-item" onclick="changeRoom('💎 VIP საუბრები', this)">💎 VIP საუბრები</div>
            <div class="room-item" onclick="changeRoom('🔍 გამოძიება', this)">🔍 გამოძიება</div>
            <div class="room-item" onclick="changeRoom('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
            <div class="room-item" onclick="changeRoom('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="room-item" onclick="changeRoom('🪢 ჩამოხრჩობანა', this)">🪢 ჩამოხრჩობანა</div>
            <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
            <div class="room-item" onclick="changeRoom('🎲 ნარდი', this)">🎲 ნარდი</div>
            <div class="room-item" onclick="changeRoom('🎵 მუსიკა', this)">🎵 მუსიკა</div>
            <div class="room-item" onclick="changeRoom('🤣 იუმორი', this)">🤣 იუმორი</div>
            <div class="room-item" onclick="changeRoom('🖼️ გალერეა', this)">🖼️ გალერეა</div>
            <div class="room-item" onclick="changeRoom('📝 ფორუმი', this)">📝 ფორუმი</div>
            <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
            <div class="room-item" onclick="changeRoom('❓ დახმარება', this)">❓ დახმარება</div>
        </div>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logout()">🚪 საიტიდან გასვლა</button>
        </div>
    </div>

    <div id="mainChat">
        <div class="header">
            <div class="menu-btn" onclick="toggleSidebar()">☰</div>
            <div id="roomTitle">ზოგადი ჩატი</div>
        </div>
        <div id="messageList"></div>
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." autocomplete="off" onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="send-btn" onclick="sendMsg()">
                    <span class="plane-emoji">✈️</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = '💬 ზოგადი ჩატი';
        let myName = "abu007";
        let currentQuestion = null;

        const quizQuestions = [
            { q: "რა არის საქართველოს დედაქალაქი?", a: "თბილისი" },
            { q: "ვინ დაწერა 'ვეფხისტყაოსანი'?", a: "შოთა რუსთაველი" },
            { q: "რამდენი ფერია საქართველოს დროშაზე?", a: "2" },
            { q: "რომელ წელს მოხდა დიდგორის ბრძოლა?", a: "1121" },
            { q: "ვინ იყო საქართველოს პირველი პრეზიდენტი?", a: "ზვიად გამსახურდია" },
            { q: "რა ჰქვია დედამიწასთან ყველაზე ახლოს მდებარე ვარსკვლავს?", a: "მზე" },
            { q: "რომელ კონტინენტზეა ეგვიპტე?", a: "აფრიკა" },
            { q: "რა არის წყლის ქიმიური ფორმულა?", a: "H2O" },
            { q: "რამდენი კბილი აქვს ზრდასრულ ადამიანს?", a: "32" },
            { q: "რომელი პლანეტაა ცნობილი როგორც 'წითელი პლანეტა'?", a: "მარსი" },
            { q: "ვინ მოიგონა ტელეფონი?", a: "ბელი" },
            { q: "რა არის ყველაზე დიდი ოკეანე?", a: "წყნარი" },
            { q: "რომელი ცხოველია 'უდაბნოს ხომალდი'?", a: "აქლემი" },
            { q: "რამდენი კონტინენტია დედამიწაზე?", a: "7" },
            { q: "რომელ ქალაქშია ეიფელის კოშკი?", a: "პარიზი" },
            { q: "რა ჰქვია იაპონიის დედაქალაქს?", a: "ტოკიო" },
            { q: "ვინ დახატა 'მონა ლიზა'?", a: "და ვინჩი" },
            { q: "რომელი ენაა ყველაზე გავრცელებული მსოფლიოში?", a: "ჩინური" },
            { q: "რამდენი ფეხი აქვს ობობას?", a: "8" },
            { q: "რომელი ქვეყნის სიმბოლოა კენგურუ?", a: "ავსტრალია" },
            { q: "რა არის ყველაზე მაღალი მთა მსოფლიოში?", a: "ევერესტი" },
            { q: "რომელ წელს დაიწყო მეორე მსოფლიო ომი?", a: "1939" },
            { q: "რა ჰქვია ყველაზე პატარა პლანეტას?", a: "მერკური" },
            { q: "ვინ იყო საფრანგეთის იმპერატორი 1804 წელს?", a: "ნაპოლეონი" },
            { q: "რომელ წელს ჩაიძირა 'ტიტანიკი'?", a: "1912" },
            { q: "რამდენი თვეა წელიწადში?", a: "12" },
            { q: "რომელი ფრინველია მშვიდობის სიმბოლო?", a: "მტრედი" },
            { q: "რა არის ყველაზე სწრაფი ცხოველი?", a: "ავაზა" },
            { q: "რომელ ქვეყანაში მდებარეობს პირამიდები?", a: "ეგვიპტე" },
            { q: "ვინ იყო აშშ-ს პირველი პრეზიდენტი?", a: "ვაშინგტონი" },
            { q: "რა არის ყველაზე დიდი ძუძუმწოვარი?", a: "ვეშაპი" },
            { q: "რამდენი გრადუსია მართი კუთხე?", a: "90" },
            { q: "რომელი მეფე იყო 'აღმაშენებელი'?", a: "დავითი" },
            { q: "რა ჰქვია საქართველოს უმაღლეს მწვერვალს?", a: "შხარა" },
            { q: "რომელი პლანეტაა 'გიგანტი'?", a: "იუპიტერი" },
            { q: "რა არის ბრილიანტის საფუძველი?", a: "ნახშირბადი" },
            { q: "ვინ დაწერა 'ჰამლეტი'?", a: "შექსპირი" },
            { q: "რომელ ქვეყანაშია კოლიზეუმი?", a: "იტალია" },
            { q: "რა ჰქვია მზის სისტემის ცენტრს?", a: "მზე" },
            { q: "რომელ თვეშია 28 დღე?", a: "თებერვალი" },
            { q: "რა არის ყველაზე გრძელი მდინარე მსოფლიოში?", a: "ნილოსი" },
            { q: "ვინ აღმოაჩინა ამერიკა?", a: "კოლუმბი" },
            { q: "რამდენი საათია დღე-ღამეში?", a: "24" },
            { q: "რომელი ცხოველია 'ტყის მეფე'?", a: "ლომი" },
            { q: "რომელ წელს დასრულდა მეორე მსოფლიო ომი?", a: "1945" },
            { q: "რა არის ყველაზე მარილიანი ზღვა?", a: "მკვდარი" },
            { q: "ვინ იყო ვაჟა-ფშაველა?", a: "პოეტი" },
            { q: "რომელ ქვეყანაშია ჩინეთის დიდი კედელი?", a: "ჩინეთი" },
            { q: "რა ჰქვია დედამიწის ბუნებრივ თანამგზავრს?", a: "მთვარე" },
            { q: "რამდენი გული აქვს რვაფეხას?", a: "3" }
        ];

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('closed'); }

        async function init() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) return window.location.href = 'index.html';
            const { data: p } = await client.from('profiles').select('username').eq('id', user.id).maybeSingle();
            if (p && p.username) myName = p.username;
            loadMsgs();
            client.channel('chat').on('postgres_changes', { event: '*', table: 'messages' }, loadMsgs).subscribe();
        }

        async function loadMsgs() {
            const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).order('id', { ascending: true });
            const list = document.getElementById('messageList');
            list.innerHTML = msgs ? msgs.map(m => `
                <div class="msg-row">
                    <div class="msg-bubble ${m.username === myName ? 'is-me' : ''}">
                        <span class="msg-user">${m.username}</span>
                        <span style="color:white;">${m.text}</span>
                    </div>
                </div>`).join('') : '';
            list.scrollTop = list.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const txt = input.value.trim();
            if(!txt) return;
            input.value = '';
            const { data: { user } } = await client.auth.getUser();
            
            // მესიჯის გაგზავნა
            await client.from('messages').insert([{ user_id: user.id, username: myName, text: txt, room_name: currentRoom }]);
            
            // ვიქტორინის ლოგიკა
            if (currentRoom === "🧩 ვიქტორინა") {
                checkQuiz(txt, user.id);
            }
            loadMsgs();
        }

        async function checkQuiz(ans, uid) {
            if (ans.toLowerCase() === "დაწყება") {
                askNewQuestion();
                return;
            }
            if (currentQuestion && ans.toLowerCase() === currentQuestion.a.toLowerCase()) {
                const winner = myName;
                currentQuestion = null;
                await client.rpc('increment_score', { row_id: uid });
                await sendBotMsg(`✅ სწორია, ${winner}! შენ მიიღე 1 ქულა. 🎉`);
                setTimeout(askNewQuestion, 3000);
            }
        }

        async function askNewQuestion() {
            const rnd = Math.floor(Math.random() * quizQuestions.length);
            currentQuestion = quizQuestions[rnd];
            await sendBotMsg(`❓ კითხვა: ${currentQuestion.q}`);
        }

        async function sendBotMsg(t) {
            await client.from('messages').insert([{ username: "🤖 ბოტი", text: t, room_name: "🧩 ვიქტორინა", user_id: '00000000-0000-0000-0000-000000000000' }]);
        }

        async function logout() { await client.auth.signOut(); window.location.href = 'index.html'; }

        function changeRoom(name, el) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = name;
            document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            toggleSidebar();
            loadMsgs();
            if(name === "🧩 ვიქტორინა") sendBotMsg("ვიქტორინის დასაწყებად დაწერეთ: **დაწყება**");
        }

        init();
    </script>
</body>
</html>
