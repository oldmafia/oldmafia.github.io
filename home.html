<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კაიფმანია - ჩატი</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* ზედა პანელი */
        .header {
            height: 60px;
            background: #0a0a0a;
            border-bottom: 2px solid #ff0000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            z-index: 100;
        }

        .menu-toggle {
            background: #ff0000;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px #ff0000;
        }

        /* გვერდითა სრიალა მენიუ (მარცხნივ) */
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px; /* თავიდან დამალულია მარცხნივ */
            width: 280px;
            height: 100%;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(10px);
            border-right: 1px solid #ff0000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            padding-top: 60px;
        }

        .sidebar.open { left: 0; }

        .menu-item {
            padding: 15px 25px;
            cursor: pointer;
            border-bottom: 1px solid #222;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-item:hover {
            background: rgba(255, 0, 0, 0.1);
            color: #ff0000;
            padding-left: 35px;
        }

        /* ჩატის ზონა */
        .chat-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
        }

        #messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            background: #111;
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 80%;
            border-left: 3px solid #ff0000;
            position: relative;
        }

        .msg b { color: #ff0000; font-size: 13px; }

        /* წერის ადგილი */
        .input-box {
            padding: 20px;
            background: #000;
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            outline: none;
        }

        input:focus { border-color: #ff0000; }

        .send-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* ფონი მენიუს გახსნისას */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 900;
        }
        .overlay.show { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="header">
        <button class="menu-toggle" onclick="toggleMenu()">☰ მენიუ</button>
        <div style="font-weight: bold; letter-spacing: 2px;">კაიფმანია</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="menu-item" onclick="changeRoom('💬 ზოგადი ჩატი')">💬 ზოგადი ჩატი</div>
        <div class="menu-item" onclick="changeRoom('💎 ვიპ საუბრები')">💎 ვიპ საუბრები</div>
        <div class="menu-item" onclick="changeRoom('🔍 გამოძიება')">🔍 გამოძიება</div>
        <div class="menu-item" onclick="changeRoom('🔐 შიფროგრამა')">🔐 შიფროგრამა</div>
        <div class="menu-item" onclick="changeRoom('❓ ვიქტორინა')">❓ ვიქტორინა</div>
        <div class="menu-item" onclick="changeRoom('😵 ჩამოხრჩობანა')">😵 ჩამოხრჩობანა</div>
        <div class="menu-item" onclick="changeRoom('🕵️ მაფიის ღამე')">🕵️ მაფიის ღამე</div>
        <div class="menu-item" onclick="changeRoom('🃏 ჯოკერი')">🃏 ჯოკერი</div>
        <div class="menu-item" onclick="changeRoom('🎲 ნარდი')">🎲 ნარდი</div>
        <div class="menu-item" onclick="changeRoom('🎵 მუსიკა')">🎵 მუსიკა</div>
        <div class="menu-item" onclick="changeRoom('😂 იუმორი')">😂 იუმორი</div>
        <div class="menu-item" onclick="changeRoom('🛡️ ადმინისტრაცია')">🛡️ ადმინისტრაცია</div>
        <div class="menu-item" onclick="changeRoom('❓ დახმარება')">❓ დახმარება</div>
        <div class="menu-item" onclick="changeRoom('🏛️ ფორუმი')">🏛️ ფორუმი</div>
        <div class="menu-item" onclick="location.href='index.html'" style="color: #666;">🚪 გასვლა</div>
    </div>

    <div class="chat-main">
        <div id="messages">
            <div class="msg"><b>სისტემა</b><p>მოგესალმებით! აირჩიეთ ოთახი მენიუდან.</p></div>
        </div>

        <div class="input-box">
            <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">გაგზავნა</button>
        </div>
    </div>

    <script>
        // 1. დინამიური ნიკის ლოგიკა
        // თუ რეგისტრაციისას სახელი შეინახე localStorage-ში, ის გამოჩნდება. 
        // თუ არა - დაეწერება "სტუმარი"
        const currentNick = localStorage.getItem('userName') || "სტუმარი";

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function changeRoom(name) {
            document.getElementById('messages').innerHTML += `<div class="msg" style="border-color: #555"><b>სისტემა</b><p>გადახვედით ოთახში: ${name}</p></div>`;
            toggleMenu();
        }

        function send() {
            const input = document.getElementById('msgInput');
            if(input.value.trim() !== "") {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg';
                msgDiv.style.alignSelf = 'flex-end'; // შენი მესიჯები მარჯვნივ
                msgDiv.style.borderLeft = 'none';
                msgDiv.style.borderRight = '3px solid #ff0000';
                
                msgDiv.innerHTML = `<b>${currentNick}</b><p>${input.value}</p>`;
                
                document.getElementById('messages').appendChild(msgDiv);
                input.value = "";
                const chat = document.getElementById('messages');
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
