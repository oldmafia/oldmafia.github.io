<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - OFFICIAL</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* ძირითადი სტილი */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .header { height: 60px; border-bottom: 2px solid #ff0000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; z-index: 1001; }
        .burger, .pm-trigger { color: #ff0000; font-size: 26px; cursor: pointer; }
        #roomTitle { font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* Sidebar & Rooms */
        #sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #000; transition: 0.3s; z-index: 2000; border-right: 2px solid #ff0000; overflow-y: auto; }
        #sidebar.open { left: 0; }
        .prof-section { padding: 30px 20px; text-align: center; border-bottom: 1px solid #222; background: linear-gradient(180deg, #1a0000 0%, #000 100%); }
        .prof-pic { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #ff0000; object-fit: cover; margin-bottom: 10px; }
        .room-item { padding: 15px 25px; border-bottom: 1px solid #111; color: #bbb; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .room-item.active { color: #ff0000; font-weight: bold; border-left: 5px solid #ff0000; background: #080808; }

        /* Messages Area (მარცხენა განლაგება) */
        #msgList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg-row { display: flex; align-items: flex-end; gap: 10px; max-width: 90%; align-self: flex-start; } /* მესიჯები მარცხნივ */
        
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #333; background: #111; }
        .me .msg-avatar { border-color: #ff0000; }

        .bubble { padding: 10px 14px; border-radius: 15px; font-size: 15px; background: #111; border: 1px solid #222; border-bottom-left-radius: 2px; position: relative; width: 100%; }
        .me .bubble { border-color: #ff0000; background: rgba(255, 0, 0, 0.05); }
        
        .u-nick { font-size: 11px; font-weight: bold; color: #ff4d4d; display: block; margin-bottom: 3px; }
        .m-time { font-size: 9px; color: #555; float: right; margin-top: 5px; margin-left: 10px; } /* დროის სტილი */

        /* Input Area */
        .input-area { padding: 12px; border-top: 1px solid #ff0000; display: flex; gap: 10px; background: #000; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid #ff0000; border-radius: 25px; padding: 0 18px; height: 45px; display: flex; align-items: center; }
        input { width: 100%; border: none; background: transparent; color: #fff; outline: none; font-size: 16px; }
        .send-btn { background: #ff0000; color: #000; width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="burger" onclick="toggleMenu()">☰</div>
        <div id="roomTitle">💬 კაიფმანია</div>
        <div class="pm-trigger" onclick="openInbox()">📩</div>
    </div>

    <div id="sidebar">
        <div class="prof-section">
            <img src="" class="prof-pic" id="myImg">
            <p id="myNick" style="margin-top:10px; font-weight:bold; color: #fff;"></p>
        </div>
        <div id="roomsContainer">
            <div class="room-item active" onclick="changeRoom('💬 კაიფმანია', this)">💬 კაიფმანია</div>
            <div class="room-item" onclick="changeRoom('🍷 კაფე-ბარი', this)">🍷 კაფე-ბარი</div>
            <div class="room-item" onclick="changeRoom('🔐 VIP-საუბრები', this)">🔐 VIP-საუბრები</div>
            <div class="room-item" onclick="changeRoom('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="room-item" onclick="changeRoom('🔓 შიფროგრამა', this)">🔓 შიფროგრამა</div>
            <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
            <div class="room-item" onclick="changeRoom('⚜️ ნარდი', this)">⚜️ ნარდი</div>
            <div class="room-item" onclick="changeRoom('💖 სიყვარული', this)">💖 სიყვარული</div>
            <div class="room-item" onclick="changeRoom('🤣 იუმორი', this)">🤣 იუმორი</div>
            <div class="room-item" onclick="changeRoom('🎵 მელომანია', this)">🎵 მელომანია</div>
            <div class="room-item" onclick="changeRoom('📜 ფორუმი', this)">📜 ფორუმი</div>
            <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
            <div class="room-item" onclick="changeRoom('🆘 SOS', this)">🆘 SOS</div>
            <div class="room-item" onclick="changeRoom('🚪 გასვლა', this)" style="color: red;">🚪 გასვლა</div>
            <div style="padding:25px; color:#ff0000; text-align:center; cursor:pointer; font-weight:bold;" onclick="toggleMenu()">დახურვა ✕</div>
        </div>
    </div>

    <div id="msgList"></div>

    <div class="input-area" id="inputBar">
        <div class="input-box"><input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." autocomplete="off"></div>
        <button class="send-btn" onclick="sendMsg()">✈️</button>
    </div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let myId, myName, myAvatar, currentRoom = '💬 კაიფმანია', isInbox = false;

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;

        // ნამდვილი ნიკის წამოღება რეგისტრაციიდან
        let rawNick = user.user_metadata?.username || user.user_metadata?.full_name || user.email.split('@')[0];
        // მეილის გასუფთავება
        myName = rawNick.includes('@') ? rawNick.split('@')[0] : rawNick;

        const { data: prof } = await client.from('profiles').select('*').eq('id', myId).single();
        myAvatar = prof?.avatar_url || "https://ui-avatars.com/api/?name=" + myName + "&background=000&color=f00";

        // ბაზაში შენახვა
        await client.from('profiles').upsert({ id: myId, username: myName, avatar_url: myAvatar });

        document.getElementById('myNick').innerText = myName;
        document.getElementById('myImg').src = myAvatar;

        loadMsgs();
        
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (payload) => {
            if (!isInbox && payload.new.room_name === currentRoom) {
                if(payload.new.user_id !== myId) appendMsg(payload.new);
            }
        }).subscribe();
    }

    async function loadMsgs() {
        const list = document.getElementById('msgList');
        list.innerHTML = "";
        document.getElementById('inputBar').style.display = isInbox ? "none" : "flex";

        if (isInbox) {
            const { data: pms } = await client.from('private_messages').select('*').eq('receiver_id', myId).order('created_at', { ascending: false });
            list.innerHTML = pms?.map(m => `
                <div class="msg-row">
                    <div class="bubble"><b>${m.sender_name}:</b> ${m.text}</div>
                </div>`).join('') || "<p style='text-align:center;padding:20px;color:#444;'>ყუთი ცარიელია</p>";
        } else {
            const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true }).limit(50);
            list.innerHTML = msgs ? msgs.map(m => renderMsg(m)).join('') : '';
        }
        list.scrollTop = list.scrollHeight;
    }

    function renderMsg(m) {
        const isMe = m.user_id === myId;
        // დროის დამატება
        const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `
            <div class="msg-row ${isMe ? 'me' : 'other'}">
                <img src="${m.avatar_url || 'https://via.placeholder.com/50'}" class="msg-avatar">
                <div class="bubble">
                    <span class="u-nick">${m.username}</span>
                    <span>${m.text}</span>
                    <span class="m-time">${time}</span>
                </div>
            </div>`;
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim()) return;

        const { error } = await client.from('messages').insert([{ 
            user_id: myId, 
            username: myName, 
            text: inp.value, 
            room_name: currentRoom,
            avatar_url: myAvatar 
        }]);

        if(!error) {
            appendMsg({ user_id: myId, username: myName, text: inp.value, avatar_url: myAvatar, created_at: new Date().toISOString() });
            inp.value = '';
        }
    }

    function appendMsg(m) {
        const list = document.getElementById('msgList');
        list.innerHTML += renderMsg(m);
        list.scrollTop = list.scrollHeight;
    }

    function openInbox() { isInbox = true; document.getElementById('roomTitle').innerText = "📥 პირადი ყუთი"; loadMsgs(); }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function changeRoom(name, el) {
        if(name === '🚪 გასვლა') { client.auth.signOut(); return; }
        isInbox = false; currentRoom = name;
        document.getElementById('roomTitle').innerText = name;
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        toggleMenu(); loadMsgs();
    }

    init();
</script>
</body>
</html>
