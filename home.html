<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAIFMANIA - CHAT</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f0f2f5; color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; }

        /* მოდერნი ჰედერი */
        .header { 
            height: 60px; background: #00bcd4; color: white;
            display: flex; align-items: center; padding: 0 15px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; z-index: 2001;
        }
        .burger { font-size: 26px; cursor: pointer; margin-right: 15px; }
        #roomTitle { font-size: 18px; font-weight: 600; }

        /* ჩამოსაშლელი მენიუ */
        #sidebar { 
            position: fixed; top: -100vh; left: 0; width: 100%; height: 100vh; 
            background: white; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 2000; overflow-y: auto; padding-top: 70px;
        }
        #sidebar.open { top: 0; }
        
        .room-item { 
            padding: 15px 25px; font-size: 16px; border-bottom: 1px solid #f0f0f0; 
            display: flex; align-items: center; gap: 12px; cursor: pointer; color: #444;
        }
        .room-item:active { background: #e0f7fa; }
        .room-item.active { color: #00bcd4; background: #f1f8f9; border-left: 5px solid #00bcd4; }
        .close-menu { text-align: center; padding: 20px; color: red; font-weight: bold; cursor: pointer; }

        /* ჩატის ვიზუალი */
        #main { display: flex; flex-direction: column; height: 100vh; }
        #msgList { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 12px;
            background: url('https://www.transparenttextures.com/patterns/cubes.png'); /* მსუბუქი ფონი */
        }
        
        .msg-bubble { 
            padding: 10px 14px; border-radius: 15px; max-width: 75%; 
            position: relative; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            background: white; align-self: flex-start; border-bottom-left-radius: 2px;
        }
        .msg-bubble.is-me { 
            background: #e1ffc7; align-self: flex-end; 
            border-bottom-left-radius: 15px; border-bottom-right-radius: 2px;
        }
        
        .u-name { color: #075e54; font-size: 12px; font-weight: bold; margin-bottom: 4px; display: block; }
        .msg-text { font-size: 15px; word-wrap: break-word; }
        .msg-time { font-size: 10px; color: #888; float: right; margin-top: 5px; margin-left: 10px; }

        /* საწერი ველი */
        .input-area { 
            padding: 10px 15px; background: #fff; border-top: 1px solid #ddd;
            display: flex; align-items: center; gap: 10px;
        }
        .input-box { 
            flex: 1; background: #f0f2f5; border-radius: 25px; 
            padding: 5px 15px; display: flex; align-items: center;
        }
        input { 
            flex: 1; border: none; background: transparent; 
            padding: 10px; outline: none; font-size: 15px; 
        }
        .send-btn { 
            background: #00bcd4; color: white; width: 45px; height: 45px; 
            border-radius: 50%; border: none; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="burger" onclick="toggleMenu()">☰</div>
        <div id="roomTitle">💬 კაიფმანია</div>
    </div>

    <div id="sidebar">
        <div class="room-item active" onclick="changeRoom('💬 კაიფმანია', this)">💬 კაიფმანია</div>
        <div class="room-item" onclick="loadPMs(this)" style="color: #00bcd4; font-weight: bold;">📩 პირადი ყუთი</div>
        <div class="room-item" onclick="changeRoom('🍷 კაფე-ბარი', this)">🍷 კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('🔐 VIP-საუბრები', this)">🔐 VIP-საუბრები</div>
        <div class="room-item" onclick="changeRoom('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('🔓 შიფროგრამა', this)">🔓 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('⚜️ ნარდი', this)">⚜️ ნარდი</div>
        <div class="room-item" onclick="changeRoom('💖 სიყვარული', this)">💖 სიყვარული</div>
        <div class="room-item" onclick="changeRoom('🤣 იუმორი', this)">🤣 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🎵 მელომანია', this)">🎵 მელომანია</div>
        <div class="room-item" onclick="changeRoom('📜 ფორუმი', this)">📜 ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('🆘 SOS', this)">🆘 SOS</div>
        <div class="close-menu" onclick="toggleMenu()">✕ დახურვა</div>
    </div>

    <div id="main">
        <div id="msgList"></div>
        <div class="input-area" id="inputArea">
            <div class="input-box">
                <input type="text" id="msgInput" placeholder="დაწერე მესიჯი...">
            </div>
            <button class="send-btn" onclick="sendMsg()">✈️</button>
        </div>
    </div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let myId, myName = "მომხმარებელი", currentRoom = '💬 კაიფმანია';

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;

        // აი აქ ვასწორებთ "User"-ის პრობლემას
        const { data: p } = await client.from('profiles').select('username').eq('id', myId).single();
        if(p && p.username) myName = p.username;

        loadMsgs();
        
        // რეალურ დროში განახლება
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (p) => {
            if(p.new.room_name === currentRoom) loadMsgs();
        }).subscribe();
    }

    async function loadMsgs() {
        if(currentRoom === "PRIVATE") return;
        const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        
        const list = document.getElementById('msgList');
        list.innerHTML = msgs ? msgs.map(m => {
            const isMe = m.username === myName;
            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return `
                <div class="msg-bubble ${isMe ? 'is-me' : ''}">
                    <span class="u-name" onclick="directMsg('${m.user_id}', '${m.username}')">${m.username}</span>
                    <span class="msg-text">${m.text}</span>
                    <span class="msg-time">${time}</span>
                </div>`;
        }).join('') : '';
        list.scrollTop = list.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const txt = input.value.trim();
        if(!txt) return;
        input.value = '';
        await client.from('messages').insert([{ user_id: myId, username: myName, text: txt, room_name: currentRoom }]);
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function changeRoom(name, el) {
        currentRoom = name;
        document.getElementById('roomTitle').innerText = name;
        document.getElementById('inputArea').style.display = 'flex';
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        toggleMenu();
        loadMsgs();
    }

    function directMsg(tid, tname) {
        if(tid === myId) return;
        const msg = prompt(`მიწერე პირადში ${tname}-ს:`);
        if(msg) client.from('private_messages').insert([{ sender_id: myId, receiver_id: tid, text: msg }]);
    }

    init();
    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
