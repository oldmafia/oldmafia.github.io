    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* მარცხენა მენიუ */
        .sidebar { width: 280px; background: #050505; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .sidebar-avatar { width: 75px; height: 75px; border-radius: 15px; border: 2px solid red; margin: 0 auto 10px; background: #111 center/cover; }
        .user-name { color: #ff0000; font-weight: bold; font-size: 18px; text-shadow: 0 0 5px rgba(255,0,0,0.5); }

        /* ოთახების სია */
        .menu-items { flex-grow: 1; overflow-y: auto; }
        .menu-item { padding: 12px 20px; color: #bbb; cursor: pointer; font-size: 14px; border-left: 3px solid transparent; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: #1a0000; color: #ff0000; border-left: 3px solid #ff0000; }
        
        /* ჩატის ზონა */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-bar { padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; color: #ff0000; font-weight: bold; }
        .messages-area { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* მესიჯის დიზაინი */
        .msg-bubble { background: #0d0d0d; padding: 12px; border-radius: 0 15px 15px 15px; border: 1px solid #1a1a1a; max-width: 80%; }
        
        /* ქვედა პანელი და ლურჯი თვითმფრინავი */
        .bottom-bar { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; align-items: center; border-top: 1px solid #222; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; padding: 12px 20px; border-radius: 25px; color: #fff; outline: none; }
        .send-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
        .send-btn svg { fill: #0088cc; width: 38px; height: 38px; }
        .send-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="main-content">

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let currentRoom = '☕ კაფე-ბარი';
    let myProfile = null;

    async function init() {
        // ვამოწმებთ სესიას პირდაპირ
        const { data: { session } } = await client.auth.getSession();
        if (!session) return window.location.href = "index.html";

        // ვიღებთ პროფილს ID-ით. ვიყენებთ username-ს და არა email-ს!
        const { data: profile } = await client.from('profiles').select('*').eq('id', session.user.id).single();
        
        if (profile) {
            myProfile = profile;
            document.getElementById('uNick').innerText = profile.username; // აქ გამოჩნდება to222ji
            if(profile.avatar_url) document.getElementById('uAvat').style.backgroundImage = `url('${profile.avatar_url}')`;
            loadMessages(currentRoom);
        }
    }

    async function loadMessages(room) {
        const chat = document.getElementById('chatContainer');
        chat.innerHTML = "";
        const { data } = await client.from('messages').select('*').eq('room_name', room).order('created_at', { ascending: true });
        if (data) data.forEach(displayMsg);
        chat.scrollTop = chat.scrollHeight;
    }

    function displayMsg(msg) {
        const chat = document.getElementById('chatContainer');
        const color = (msg.username === myProfile.username) ? 'yellow' : 'red';
        chat.innerHTML += `
            <div class="msg">
                <div class="msg-bubble">
                    <b style="color:${color};">${msg.username}</b><br>
                    <span style="color:#fff;">${msg.text}</span>
                </div>
            </div>`;
        chat.scrollTop = chat.scrollHeight;
    }
