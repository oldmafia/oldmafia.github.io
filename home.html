<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* სტილები იგივე რჩება, რაც გქონდა */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 50px; background: #000; border-bottom: 2px solid red; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; }
        .burger { font-size: 24px; color: red; cursor: pointer; }
        #roomTitle { font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .pm-container { position: relative; cursor: pointer; }
        .pm-trigger { color: red; font-size: 24px; }
        #pmCounter { position: absolute; top: -5px; right: -8px; background: red; color: white; font-size: 10px; font-weight: bold; min-width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 1px solid #000; }
        #msgList { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; background: #000; }
        .msg-bubble { padding: 8px 12px; border-radius: 12px; max-width: 85%; background: #111; border: 1px solid #222; align-self: flex-start; }
        .msg-bubble.is-me { border: 1px solid red; }
        .u-name { color: #ff4d4d; font-size: 10px; font-weight: bold; margin-bottom: 3px; display: block; }
        .msg-time { color: #666; font-size: 9px; float: right; margin-top: 5px; margin-left: 8px; }
        .input-area { padding: 10px; background: #000; border-top: 1px solid red; display: flex; gap: 8px; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid red; border-radius: 20px; padding: 0 15px; height: 40px; display: flex; align-items: center; }
        input { width: 100%; border: none; background: transparent; color: #fff; outline: none; }
        .send-btn { background: red; color: #000; width: 42px; height: 42px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; }
        #sidebar { position: fixed; top: -100vh; left: 0; width: 100%; height: 100vh; background: #000; transition: 0.4s; z-index: 2000; padding-top: 60px; overflow-y: auto; }
        #sidebar.open { top: 0; }
        .room-item { padding: 15px 25px; border-bottom: 1px solid #111; color: #bbb; cursor: pointer; }
        .room-item.active { color: red; font-weight: bold; border-left: 5px solid red; }
    </style>
</head>
<body>

    <div class="header">
        <div class="burger" onclick="toggleMenu()">☰</div>
        <div id="roomTitle">💬 კაიფმანია</div>
        <div class="pm-container" onclick="openPrivateInbox()">
            <div class="pm-trigger">📩</div>
            <div id="pmCounter">0</div>
        </div>
    </div>

    <div id="sidebar">
        <div class="room-item active" onclick="changeRoom('💬 კაიფმანია', this)">💬 კაიფმანია</div>
        <div class="room-item" onclick="changeRoom('🍷 კაფე-ბარი', this)">🍷 კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('🔐 VIP-საუბრები', this)">🔐 VIP-საუბრები</div>
        <div class="room-item" onclick="changeRoom('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('🔓 შიფროგრამა', this)">🔓 შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('⚜️ ნარდი', this)">⚜️ ნარდი</div>
        <div class="room-item" onclick="changeRoom('💖 სიყვარული', this)">💖 სიყვარული</div>
        <div class="room-item" onclick="changeRoom('🤣 იუმორი', this)">🤣 იუმორი</div>
        <div class="room-item" onclick="changeRoom('🎵 მელომანია', this)">🎵 მელომანია</div>
        <div class="room-item" onclick="changeRoom('📜 ფორუმი', this)">📜 ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        <div class="room-item" onclick="changeRoom('🆘 SOS', this)">🆘 SOS</div>
        <div style="text-align:center; padding: 25px; color:red;" onclick="toggleMenu()">✕ დახურვა</div>
    </div>

    <div id="msgList"></div>

    <div class="input-area">
        <div class="input-box"><input type="text" id="msgInput" placeholder="დაწერე..." autocomplete="off"></div>
        <button class="send-btn" onclick="sendMsg()">✈️</button>
    </div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let myId, myName = "User", currentRoom = '💬 კაიფმანია', isPrivate = false, targetUserId = null;

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;
        myName = user.user_metadata.username || user.email.split('@')[0];

        loadMsgs();
        
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (payload) => {
            // პირადი მესიჯის შეტყობინება
            if (payload.new.receiver_id === myId) {
                updateCounter();
                if(isPrivate) appendMsg(payload.new);
            } else if (payload.new.room_name === currentRoom && !payload.new.receiver_id) {
                if (payload.new.user_id !== myId) appendMsg(payload.new);
            }
        }).subscribe();
    }

    async function loadMsgs() {
        let query = client.from('messages').select('*').order('created_at', { ascending: true });
        
        if (isPrivate) {
            // მხოლოდ ჩემი და სხვისი პირადი მიმოწერის წამოღება
            query = query.or(`and(user_id.eq.${myId},receiver_id.not.is.null),receiver_id.eq.${myId}`);
        } else {
            query = query.eq('room_name', currentRoom).is('receiver_id', null);
        }

        const { data: msgs } = await query.limit(50);
        const list = document.getElementById('msgList');
        list.innerHTML = msgs ? msgs.map(m => renderMsg(m)).join('') : '';
        list.scrollTop = list.scrollHeight;
    }

    function renderMsg(m) {
        const time = new Date(m.created_at || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const isMe = m.user_id === myId;
        return `<div class="msg-bubble ${isMe ? 'is-me' : ''}" onclick="setTarget('${m.user_id}', '${m.username}')">
                    <span class="u-name">${m.username} ${m.receiver_id ? '🔒' : ''}</span>
                    <span>${m.text}</span>
                    <span class="msg-time">${time}</span>
                </div>`;
    }

    function setTarget(id, name) {
        if(id === myId) return;
        if(confirm("გსურთ მისწეროთ პირადად: " + name + "?")) {
            targetUserId = id;
            isPrivate = true;
            document.getElementById('roomTitle').innerText = "🔒 მიმოწერა: " + name;
            loadMsgs();
        }
    }

    function openPrivateInbox() {
        isPrivate = true;
        targetUserId = null; // ყველა პირადი მესიჯი გამოჩნდეს
        document.getElementById('roomTitle').innerText = "📥 პირადი ყუთი";
        document.getElementById('pmCounter').style.display = 'none';
        loadMsgs();
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim()) return;
        const txt = inp.value;
        
        const msgData = { 
            user_id: myId, 
            username: myName, 
            text: txt, 
            room_name: isPrivate ? 'PRIVATE' : currentRoom,
            receiver_id: isPrivate ? targetUserId : null // თუ პირადია, ვამატებთ ადრესატს
        };

        appendMsg({...msgData, created_at: new Date().toISOString()});
        inp.value = '';
        await client.from('messages').insert([msgData]);
    }

    function appendMsg(m) {
        const list = document.getElementById('msgList');
        list.innerHTML += renderMsg(m);
        list.scrollTop = list.scrollHeight;
    }

    function updateCounter() {
        const badge = document.getElementById('pmCounter');
        badge.innerText = parseInt(badge.innerText || 0) + 1;
        badge.style.display = 'flex';
    }

    function changeRoom(name, el) {
        isPrivate = false; targetUserId = null;
        currentRoom = name;
        document.getElementById('roomTitle').innerText = name;
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        toggleMenu();
        loadMsgs();
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    init();
</script>
</body>
</html>
