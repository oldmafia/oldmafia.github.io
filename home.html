<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - The Founder</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --dark: #0a0a0a; --panel: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header */
        header { background: var(--panel); padding: 12px 15px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
        .menu-btn { font-size: 26px; color: var(--red); cursor: pointer; border: none; background: none; outline: none; }
        .room-name { font-weight: bold; font-size: 15px; color: #fff; }

        /* Sidebar - მარცხენა მენიუ */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--dark); z-index: 1000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid var(--red); display: flex; flex-direction: column; }
        .sidebar.open { left: 0; box-shadow: 10px 0 50px rgba(255,0,0,0.2); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; }
        .overlay.active { display: block; }

        /* პროფილის ბლოკი მენიუში */
        .side-profile { padding: 35px 15px; background: linear-gradient(to bottom, #1a0000, #0a0a0a); text-align: center; border-bottom: 1px solid #222; }
        .side-av { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--red); object-fit: cover; cursor: pointer; margin-bottom: 10px; }
        .side-nick { color: var(--red); font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .side-rank { background: gold; color: #000; font-size: 10px; padding: 2px 12px; border-radius: 10px; font-weight: bold; text-transform: uppercase; display: inline-block; }

        /* ოთახების სია */
        .side-nav { flex-grow: 1; overflow-y: auto; padding: 10px; scrollbar-width: none; }
        .nav-item { padding: 12px 15px; border-radius: 8px; color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; font-size: 14px; transition: 0.2s; }
        .nav-item:active { background: #222; }
        .nav-item.active { background: rgba(255,0,0,0.15); color: var(--red); font-weight: bold; border-left: 4px solid var(--red); }

        .logout-btn { padding: 20px; color: #555; font-size: 13px; border-top: 1px solid #222; cursor: pointer; text-align: center; }

        /* ჩატი */
        #chatBox { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg-row { display: flex; align-items: flex-end; gap: 10px; max-width: 85%; animation: fadeIn 0.3s ease; }
        .me-row { align-self: flex-end; flex-direction: row-reverse; }
        .msg-av-mini { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #333; cursor: pointer; object-fit: cover; }
        .msg { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; background: #1a1a1a; color: #eee; }
        .me { background: var(--red); color: #fff; border-bottom-right-radius: 2px; }
        .other { border-bottom-left-radius: 2px; border: 1px solid #222; }

        /* ინპუტი */
        .input-zone { padding: 12px; background: #000; border-top: 1px solid #111; display: flex; gap: 10px; align-items: center; }
        .input-zone input { flex: 1; background: #151515; border: 1px solid #333; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 15px; }
        .send-btn { background: var(--red); border: none; width: 45px; height: 45px; border-radius: 50%; color: #fff; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }

        /* პროფილის მოდალი */
        #pView { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .p-card { background: #0d0d0d; width: 100%; max-width: 320px; padding: 35px 20px; border-radius: 25px; border: 1px solid var(--red); text-align: center; }
        .admin-tools { margin-top: 20px; padding-top: 20px; border-top: 1px solid #222; display: flex; flex-direction: column; gap: 8px; }
        .btn-adm { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="room-name" id="roomTitle">💬 ზოგადი ჩატი</div>
        <div style="width: 26px;"></div>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="side-profile">
            <img id="myAv" src="https://via.placeholder.com/90" class="side-av" onclick="showUser(me.id)">
            <div class="side-nick" id="myNick">...</div>
            <div id="myRankDisplay" class="side-rank">წევრი</div>
        </div>

        <div class="side-nav">
            <div class="nav-item active" onclick="setR('💬 ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
            <div class="nav-item" onclick="setR('💎 VIP საუბრები', this)">💎 VIP საუბრები</div>
            <div class="nav-item" onclick="setR('🔍 გამოძიება', this)">🔍 გამოძიება</div>
            <div class="nav-item" onclick="setR('🔐 შიფროგრამა', this)">🔐 შიფროგრამა</div>
            <div class="nav-item" onclick="setR('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="nav-item" onclick="setR('🪢 ჩამოხრჩობანა', this)">🪢 ჩამოხრჩობანა</div>
            <div class="nav-item" onclick="setR('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="nav-item" onclick="setR('🎵 მუსიკა', this)">🎵 მუსიკა</div>
            <div class="nav-item" onclick="setR('🖼️ გალერეა', this)">🖼️ გალერეა</div>
            <div class="nav-item" onclick="setR('📝 ფორუმი', this)">📝 ფორუმი</div>
            <div class="nav-item" onclick="setR('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        </div>

        <div class="logout-btn" onclick="logout()">🚪 სისტემიდან გასვლა</div>
    </div>

    <div id="chatBox"></div>

    <div class="input-zone">
        <input type="text" id="mIn" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">➤</button>
    </div>

    <div id="pView" onclick="if(event.target==this) closeP()">
        <div class="p-card">
            <img id="pImg" src="" style="width:110px;height:110px;border-radius:50%;border:3px solid red;object-fit:cover">
            <h2 id="pNick" style="margin:10px 0 5px;color:red">...</h2>
            <div id="pRank" class="side-rank">მოთამაშე</div>
            <div style="margin-top:20px">
                <input type="text" id="pStat" style="width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:12px;border-radius:10px;text-align:center" placeholder="სტატუსი...">
            </div>
            <div id="adminTools" class="admin-tools" style="display:none;">
                <button class="btn-adm" style="background:#500; color:white" onclick="banUser()">🚫 დაბლოკვა (BAN)</button>
                <button class="btn-adm" style="background:#222; color:white" onclick="muteUser()">🔇 ჩახსნა (MUTE)</button>
                <button class="btn-adm" style="background:gold; color:black" onclick="setRole('admin')">👑 ადმინად ქცევა</button>
            </div>
            <div id="pActions" style="margin-top:20px">
                <button id="saveBtn" onclick="updateStat()" style="background:red;color:white;border:none;padding:12px 30px;border-radius:10px;font-weight:bold;display:none;width:100%">შენახვა</button>
                <button onclick="closeP()" style="background:none;color:#555;border:none;margin-top:10px;width:100%">დახურვა</button>
            </div>
        </div>
    </div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let me = {}, room = '💬 ზოგადი ჩატი', selectedUid = null;

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return location.href="index.html";

        let { data: p } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
        me = { id: user.id, nick: p?.username || "უცნობი", avatar: p?.avatar_url || "https://via.placeholder.com/90", role: p?.role || 'user', stat: p?.status || "" };

        document.getElementById('myNick').innerText = me.nick;
        document.getElementById('myAv').src = me.avatar;
        if(me.role === 'owner') document.getElementById('myRankDisplay').innerText = "დამფუძნებელი";

        load();
        sb.channel('chat').on('postgres_changes',{event:'*',schema:'public',table:'messages'},()=>load()).subscribe();
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function showUser(uid) {
        selectedUid = uid;
        const { data: p } = await sb.from('profiles').select('*').eq('id', uid).maybeSingle();
        if(!p) return;

        document.getElementById('pImg').src = p.avatar_url || "https://via.placeholder.com/90";
        document.getElementById('pNick').innerText = p.username;
        document.getElementById('pStat').value = p.status || "სტატუსი არაა";
        document.getElementById('pRank').innerText = p.role === 'owner' ? 'დამფუძნებელი' : (p.role === 'admin' ? 'ადმინისტრატორი' : 'მოთამაშე');
        
        const isMe = (uid === me.id);
        document.getElementById('saveBtn').style.display = isMe ? 'block' : 'none';
        document.getElementById('pStat').readOnly = !isMe;
        document.getElementById('adminTools').style.display = (me.role === 'owner' && !isMe) ? 'flex' : 'none';
        
        document.getElementById('pView').style.display = 'flex';
    }

    function closeP() { document.getElementById('pView').style.display = 'none'; }

    async function banUser() {
        if(!confirm("დაბლოკვა ნამდვილად გსურს?")) return;
        await sb.from('profiles').update({ is_banned: true }).eq('id', selectedUid);
        alert("მომხმარებელი დაიბლოკა!"); closeP();
    }

    async function updateStat() {
        const val = document.getElementById('pStat').value;
        await sb.from('profiles').update({ status: val }).eq('id', me.id);
        me.stat = val; closeP();
    }

    function setR(n, el) {
        room = n; document.getElementById('roomTitle').innerText = n;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active'); toggleMenu(); load();
    }

    async function load() {
        const { data } = await sb.from('messages').select('*').eq('room', room).order('created_at', { ascending: true });
        const box = document.getElementById('chatBox');
        if(!data) return;

        box.innerHTML = data.map(m => `
            <div class="msg-row ${m.user_id === me.id ? 'me-row' : ''}">
                <img src="${m.avatar_url || 'https://via.placeholder.com/35'}" class="msg-av-mini" onclick="showUser('${m.user_id}')">
                <div class="msg ${m.user_id === me.id ? 'me' : 'other'}">
                    <b style="font-size:10px; display:block; margin-bottom:2px" onclick="showUser('${m.user_id}')">${m.username}</b>
                    ${m.text}
                </div>
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('mIn'); if(!i.value.trim()) return;
        const { error } = await sb.from('messages').insert([{ text: i.value, room: room, user_id: me.id, username: me.nick, avatar_url: me.avatar }]);
        if(error) alert("თქვენ დაბლოკილი ხართ!");
        i.value = "";
    }

    async function logout() { await sb.auth.signOut(); location.href="index.html"; }
    init();
</script>
</body>
</html>
