<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon-red: #ff0000;
            --dark-bg: #050505;
            --msg-bg: rgba(20, 20, 20, 0.9);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* გვერდითა მენიუ */
        .sidebar {
            width: 280px;
            background: #0a0a0a;
            border-right: 2px solid var(--neon-red);
            display: flex;
            flex-direction: column;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: 10px 0 30px rgba(255, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -285px; height: 100%; }
            .sidebar.open { left: 0; }
        }

        .sidebar-header {
            padding: 25px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-red);
            border-bottom: 1px solid #1a1a1a;
        }

        .menu-items { flex-grow: 1; overflow-y: auto; padding: 15px; }

        .menu-item {
            padding: 12px 18px;
            margin: 6px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            color: #bbb;
        }

        .menu-item:hover {
            border-color: var(--neon-red);
            background: rgba(255, 0, 0, 0.1);
            color: #fff;
            transform: translateX(5px);
        }

        /* მთავარი ჩატის არე */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #100000 0%, #000 100%);
            position: relative;
        }

        .top-nav {
            height: 65px;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-bottom: 1px solid #1a1a1a;
            backdrop-filter: blur(10px);
        }

        #messageList {
            flex-grow: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* მესიჯების სტილი - ყველა მარცხნივ */
        .msg-container {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            max-width: 80%;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--neon-red);
            object-fit: cover;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .username {
            color: var(--neon-red);
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }

        .time {
            color: #555;
            font-size: 11px;
        }

        .msg-bubble {
            background: var(--msg-bg);
            color: #eee;
            padding: 12px 18px;
            border-radius: 0 18px 18px 18px;
            border: 1px solid #222;
            line-height: 1.5;
            font-size: 14.5px;
            position: relative;
        }

        /* ინპუტის ზონა */
        .input-area {
            padding: 25px;
            background: #080808;
            display: flex;
            gap: 15px;
            border-top: 1px solid #1a1a1a;
        }

        .input-area input {
            flex-grow: 1;
            padding: 15px 20px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-area input:focus {
            border-color: var(--neon-red);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }

        .input-area button {
            background: var(--neon-red);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .input-area button:hover {
            box-shadow: 0 0 20px var(--neon-red);
            transform: scale(1.05);
        }

        /* მობილურის მენიუს ღილაკი */
        .mobile-btn {
            display: none;
            background: none;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        @media (max-width: 768px) { .mobile-btn { display: block; } }

        /* სქროლის გასუფთავება */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-red); }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">კაიფმანია 😎🔥</div>
        <div class="menu-items">
            <div class="menu-item" onclick="changeRoom('ზოგადი ჩატი', '💬')">💬 ზოგადი ჩატი</div>
            <div class="menu-item" onclick="changeRoom('ვიპ საუბრები', '💎')">💎 ვიპ საუბრები</div>
            <div class="menu-item" onclick="changeRoom('გამოძიება', '🔍')">🔍 გამოძიება</div>
            <div class="menu-item" onclick="changeRoom('შიფროგრამა', '🔐')">🔐 შიფროგრამა</div>
            <div class="menu-item" onclick="changeRoom('ვიქტორინა', '🧠')">🧠 ვიქტორინა</div>
            <div class="menu-item" onclick="changeRoom('ჩამოხრჩობანა', '🪢')">🪢 ჩამოხრჩობანა</div>
            <div class="menu-item" onclick="changeRoom('მაფიის ღამე', '🕵️‍♂️')">🕵️‍♂️ მაფიის ღამე</div>
            <div class="menu-item" onclick="changeRoom('ჯოკერი', '🃏')">🃏 ჯოკერი</div>
            <div class="menu-item" onclick="changeRoom('ნარდი', '🎲')">🎲 ნარდი</div>
            <div class="menu-item" onclick="changeRoom('მუსიკა', '🎵')">🎵 მუსიკა</div>
            <div class="menu-item" onclick="changeRoom('იუმორი', '😂')">😂 იუმორი</div>
            <div class="menu-item" id="adminRoom" style="display:none; color: gold;" onclick="changeRoom('ადმინისტრაცია', '🛡️')">🛡️ ადმინისტრაცია</div>
            <div class="menu-item" onclick="changeRoom('დახმარება', '🆘')">🆘 დახმარება</div>
            <div class="menu-item" onclick="changeRoom('ფორუმი', '🏛️')">🏛️ ფორუმი</div>
            <div class="menu-item" style="color: #ff4444; margin-top: 20px;" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <button class="mobile-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
            <div id="roomTitle" style="font-size: 18px; font-weight: bold; text-shadow: 0 0 10px red;">💬 ზოგადი ჩატი</div>
            <div id="userDisplay" style="color: #888; font-size: 13px;">...</div>
        </div>

        <div id="messageList"></div>

        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">გაგზავნა</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let currentUser = null;

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = "index.html"; return; }
            currentUser = user;
            document.getElementById('userDisplay').innerText = user.user_metadata.nickname || user.email;
            
            checkAdmin();
            loadMessages();
            subscribeMessages();
        }

        async function checkAdmin() {
            const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', currentUser.id).single();
            if (profile && (profile.role === 'owner' || profile.role === 'admin')) {
                document.getElementById('adminRoom').style.display = 'flex';
            }
        }

        async function changeRoom(name, icon) {
            currentRoom = name;
            document.getElementById('roomTitle').innerHTML = `${icon} ${name}`;
            document.getElementById('messageList').innerHTML = '';
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
            
            loadMessages();
            subscribeMessages();
        }

        async function loadMessages() {
            const { data: msgs } = await supabaseClient
                .from('messages')
                .select('*')
                .eq('room_name', currentRoom)
                .order('created_at', { ascending: true })
                .limit(50);

            if (msgs) {
                msgs.forEach(msg => renderMessage(msg));
                scrollDown();
            }
        }

        function renderMessage(msg) {
            const list = document.getElementById('messageList');
            const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const avatar = msg.avatar_url || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            const div = document.createElement('div');
            div.className = 'msg-container';
            div.innerHTML = `
                <img src="${avatar}" class="avatar">
                <div class="msg-content">
                    <div class="msg-header">
                        <span class="username">${msg.username}</span>
                        <span class="time">${time}</span>
                    </div>
                    <div class="msg-bubble">${msg.content}</div>
                </div>
            `;
            list.appendChild(div);
            scrollDown();
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            const { error } = await supabaseClient.from('messages').insert([{
                user_id: currentUser.id,
                username: currentUser.user_metadata.nickname || currentUser.email,
                content: text,
                room_name: currentRoom,
                avatar_url: currentUser.user_metadata.avatar_url
            }]);

            if (!error) input.value = '';
        }

        function subscribeMessages() {
            supabaseClient.channel('any').on('postgres_changes', { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'messages',
                filter: `room_name=eq.${currentRoom}`
            }, payload => {
                renderMessage(payload.new);
            }).subscribe();
        }

        function scrollDown() {
            const list = document.getElementById('messageList');
            list.scrollTop = list.scrollHeight;
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        init();
    </script>
</body>
</html>
