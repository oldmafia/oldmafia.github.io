<html lang="ka">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { height: 60px; border-bottom: 2px solid red; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; z-index: 1001; }
        .burger { color: red; font-size: 26px; cursor: pointer; }
        #roomTitle { font-size: 14px; font-weight: bold; color: #fff; text-transform: uppercase; }

        #sidebar { position: fixed; top: 0; left: -100%; width: 80%; height: 100%; background: #000; transition: 0.3s; z-index: 2000; border-right: 2px solid red; overflow-y: auto; }
        #sidebar.open { left: 0; }
        .prof-section { padding: 30px 20px; text-align: center; border-bottom: 1px solid #222; }
        .prof-pic { width: 75px; height: 75px; border-radius: 50%; border: 2px solid red; margin-bottom: 10px; object-fit: cover; }
        
        .room-item { padding: 15px 25px; border-bottom: 1px solid #111; color: #bbb; cursor: pointer; }
        .room-item.active { color: red; font-weight: bold; border-left: 5px solid red; background: #080808; }

        #msgList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg-row { display: flex; flex-direction: column; align-items: flex-start; max-width: 85%; align-self: flex-start; margin-bottom: 5px; }
        .bubble { padding: 10px 14px; border-radius: 18px; background: #111; border: 1px solid #222; border-bottom-left-radius: 2px; width: 100%; }
        .me .bubble { border-color: red; }
        
        .u-nick { font-size: 11px; font-weight: bold; color: #ff4d4d; display: block; margin-bottom: 3px; }
        .m-time { font-size: 9px; color: #555; float: right; margin-top: 5px; margin-left: 10px; }

        .input-area { padding: 12px; border-top: 1px solid red; display: flex; gap: 10px; background: #000; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid red; border-radius: 25px; padding: 0 15px; height: 45px; display: flex; align-items: center; }
        input { width: 100%; border: none; background: transparent; color: #fff; outline: none; }
        .send-btn { background: red; color: #000; width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; }
    </style>
</head>
