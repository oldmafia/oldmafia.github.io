<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>კაიფმანია - Home</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* სიდბარი */
        .sidebar { width: 280px; min-width: 280px; background: #0d0d0d; border-right: 2px solid red; display: flex; flex-direction: column; transition: 0.3s ease; z-index: 100; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #222; }
        .user-card { background: #151515; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        #myNickname { color: red; font-weight: bold; font-size: 18px; margin: 0; text-shadow: 0 0 10px rgba(255,0,0,0.3); }
        #myStatus { color: #888; font-size: 12px; margin: 5px 0; }
        .status-input { background: #000; border: 1px solid red; color: #fff; font-size: 11px; padding: 5px; width: 100%; border-radius: 5px; outline: none; }

        .sidebar-menu { flex-grow: 1; overflow-y: auto; padding-top: 10px; }
        .menu-item { display: flex; align-items: center; padding: 12px 20px; color: #ddd; text-decoration: none; border-bottom: 1px solid #1a1a1a; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .menu-item:hover { background: #1a0000; }
        .menu-item.active { background: #220000; color: red; border-left: 3px solid red; }
        .icon { margin-right: 15px; width: 20px; text-align: center; font-size: 18px; }

        /* ჩატის მხარე */
        .main-chat { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        .chat-header { height: 60px; border-bottom: 2px solid red; display: flex; align-items: center; padding: 0 15px; background: #0d0d0d; justify-content: space-between; }
        .header-left { display: flex; align-items: center; }
        .menu-toggle { background: red; border: none; color: white; padding: 10px; border-radius: 5px; cursor: pointer; margin-right: 15px; }

        .chat-area { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #110000 0%, #000 100%); }
        
        /* მესიჯის დიზაინი */
        .msg-wrapper { display: flex; gap: 10px; max-width: 85%; }
        .avatar { width: 35px; height: 35px; background: #222; border: 1px solid red; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .msg-body { display: flex; flex-direction: column; }
        .u-info { font-size: 11px; color: red; font-weight: bold; margin-bottom: 3px; display: flex; gap: 5px; }
        .u-text { background: #1a1a1a; padding: 10px 14px; border-radius: 0 15px 15px 15px; font-size: 14px; color: #eee; line-height: 1.4; border: 1px solid #222; }
        
        .is-me { align-self: flex-end; flex-direction: row-reverse; }
        .is-me .u-text { background: red; color: white; border-radius: 15px 0 15px 15px; border: none; box-shadow: 0 4px 10px rgba(255,0,0,0.2); }
        .is-me .u-info { justify-content: flex-end; }

        /* ინპუტი */
        .input-bar { padding: 15px; background: #0d0d0d; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        .msg-input { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 25px; padding: 12px 20px; color: #fff; outline: none; }
        .send-btn { background: red; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; font-size: 20px; transition: 0.3s; }
        .send-btn:active { transform: scale(0.9); }

        @media (max-width: 900px) {
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="user-card">
                <p id="myNickname">იტვირთება...</p>
                <p id="myStatus">სტატუსი არაა</p>
                <input type="text" id="statusInp" class="status-input" placeholder="შეცვალე სტატუსი..." onkeypress="updateStatus(event)">
            </div>
        </div>
        
        <div class="sidebar-menu" id="menuList">
            <div class="menu-item active" onclick="changeR('💬', 'ზოგადი ჩატი', this)"><span class="icon">💬</span> ზოგადი ჩატი</div>
            <div class="menu-item" onclick="changeR('💎', 'VIP საუბრები', this)"><span class="icon">💎</span> VIP საუბრები</div>
            <div class="menu-item" onclick="changeR('🔍', 'გამოძიება', this)"><span class="icon">🔍</span> გამოძიება</div>
            <div class="menu-item" onclick="changeR('🔐', 'შიფროგრამა', this)"><span class="icon">🔐</span> შიფროგრამა</div>
            <div class="menu-item" onclick="changeR('🧩', 'ვიქტორინა', this)"><span class="icon">🧩</span> ვიქტორინა</div>
            <div class="menu-item" onclick="changeR('🪢', 'ჩამოხრჩობანა', this)"><span class="icon">🪢</span> ჩამოხრჩობანა</div>
            <div class="menu-item" style="color:red; font-weight:bold;" onclick="changeR('🌑', 'მაფიის ღამე', this)"><span class="icon">🌑</span> მაფიის ღამე</div>
            <div class="menu-item" onclick="changeR('🎵', 'მუსიკა', this)"><span class="icon">🎵</span> მუსიკა</div>
            <div class="menu-item" onclick="changeR('🖼️', 'გალერეა', this)"><span class="icon">🖼️</span> გალერეა</div>
            <div class="menu-item" onclick="changeR('📝', 'ფორუმი', this)"><span class="icon">📝</span> ფორუმი</div>
            <div class="menu-item" onclick="changeR('🛡️', 'ადმინისტრაცია', this)"><span class="icon">🛡️</span> ადმინისტრაცია</div>
        </div>

        <div style="padding:15px; border-top:1px solid #222;">
            <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold; font-size:16px;">🚪 გასვლა</button>
        </div>
    </nav>

    <main class="main-chat">
        <header class="chat-header">
            <div class="header-left">
                <button class="menu-toggle" onclick="toggleM()">☰</button>
                <h2 id="roomTitle">💬 ზოგადი ჩატი</h2>
            </div>
        </header>
        
        <div class="chat-area" id="chatBox"></div>

        <div class="input-bar">
            <input type="text" id="msgInp" class="msg-input" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </main>
</div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    
    let userNick = "";
    let curRoom = "ზოგადი ჩატი";
    let myID = "";

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) { window.location.href = "index.html"; return; }
        myID = user.id;

        let { data: profile } = await sb.from('profiles').select('*').eq('id', myID).single();
        userNick = profile?.username || "უცნობი";
        document.getElementById('myNickname').innerText = userNick;
        document.getElementById('myStatus').innerText = profile?.status || "სტატუსი არაა";
        
        loadMessages();
        subscribeToChat();
    }

    async function loadMessages() {
        const { data } = await sb.from('messages').select('*').eq('room', curRoom).order('created_at', { ascending: true });
        const box = document.getElementById('chatBox');
        if (data) {
            box.innerHTML = data.map(m => `
                <div class="msg-wrapper ${m.user_id === myID ? 'is-me' : ''}">
                    <div class="avatar">👤</div>
                    <div class="msg-body">
                        <div class="u-info"><span>${m.username}</span></div>
                        <div class="u-text">${m.text}</div>
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInp');
        const text = inp.value.trim();
        if (!text) return;

        const { error } = await sb.from('messages').insert([{ text, room: curRoom, user_id: myID, username: userNick }]);
        if(error) console.log(error);
        inp.value = "";
    }

    async function updateStatus(e) {
        if (e.key === 'Enter') {
            const newStatus = e.target.value;
            await sb.from('profiles').update({ status: newStatus }).eq('id', myID);
            document.getElementById('myStatus').innerText = newStatus;
            e.target.value = "";
        }
    }

    function subscribeToChat() {
        sb.channel('realtime_chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            if (payload.new.room === curRoom) {
                appendSingleMessage(payload.new);
            }
        }).subscribe();
    }

    function appendSingleMessage(m) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `msg-wrapper ${m.user_id === myID ? 'is-me' : ''}`;
        div.innerHTML = `
            <div class="avatar">👤</div>
            <div class="msg-body">
                <div class="u-info"><span>${m.username}</span></div>
                <div class="u-text">${m.text}</div>
            </div>
        `;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function toggleM() { document.getElementById('sidebar').classList.toggle('active'); }
    
    function changeR(icon, name, el) {
        curRoom = name;
        document.getElementById('roomTitle').innerText = icon + " " + name;
        
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
        
        loadMessages();
        if(window.innerWidth < 900) toggleM();
    }

    async function logout() { await sb.auth.signOut(); window.location.href = "index.html"; }

    init();
</script>
</body>
</html>
