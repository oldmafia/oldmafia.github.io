<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Luxury Edition</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff4d4d; --gold: #ffd700; --dark: #050505; --card: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Poppins', sans-serif; }
        body { margin: 0; background: var(--dark); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* მდიდრული ჰედერი */
        header { background: rgba(18, 18, 18, 0.95); padding: 15px; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: space-between; box-shadow: 0 0 15px rgba(255, 77, 77, 0.2); }
        .menu-btn { font-size: 28px; color: var(--red); cursor: pointer; background: none; border: none; text-shadow: 0 0 10px var(--red); }
        .room-name { font-weight: bold; letter-spacing: 1px; color: var(--gold); text-transform: uppercase; font-size: 14px; }

        /* Sidebar დიზაინი */
        .sidebar { position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: #0a0a0a; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 2px solid var(--red); display: flex; flex-direction: column; }
        .sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.9); }
        .side-profile { padding: 40px 20px; text-align: center; background: linear-gradient(180deg, #1a0505 0%, #0a0a0a 100%); }
        .side-nick { color: var(--red); font-weight: bold; font-size: 22px; text-shadow: 0 0 10px rgba(255, 77, 77, 0.5); margin-top: 10px; }

        /* ნავიგაცია */
        .side-nav { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 15px; margin-bottom: 8px; transition: 0.3s; border: 1px solid transparent; }
        .nav-item:hover { background: rgba(255, 77, 77, 0.05); color: #fff; }
        .nav-item.active { background: rgba(255, 77, 77, 0.15); color: var(--red); border: 1px solid rgba(255, 77, 77, 0.3); font-weight: bold; }

        /* ჩატი */
        #chatBox { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .msg-row { display: flex; align-items: flex-end; gap: 10px; max-width: 85%; transition: 0.3s; }
        .me-row { align-self: flex-end; flex-direction: row-reverse; }
        .msg { padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5; background: #1a1a1a; border: 1px solid #222; position: relative; }
        .me { background: linear-gradient(135deg, #ff4d4d 0%, #b30000 100%); color: #fff; border: none; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3); }
        .msg-time { font-size: 9px; opacity: 0.6; margin-top: 5px; display: block; text-align: right; }

        /* ინფუთი */
        .input-zone { padding: 20px; background: #0a0a0a; border-top: 1px solid #1a1a1a; display: flex; gap: 12px; }
        .input-zone input { flex: 1; background: #151515; border: 1px solid #333; color: #fff; padding: 14px 20px; border-radius: 30px; outline: none; transition: 0.3s; }
        .input-zone input:focus { border-color: var(--red); box-shadow: 0 0 10px rgba(255, 77, 77, 0.2); }
        .send-btn { background: var(--red); border: none; width: 50px; height: 50px; border-radius: 50%; color: #fff; cursor: pointer; box-shadow: 0 0 15px rgba(255, 77, 77, 0.4); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="side-profile">
            <div id="avCircle" style="width:80px; height:80px; border-radius:50%; background:var(--red); margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:bold; color:white; box-shadow:0 0 20px rgba(255,77,77,0.4)">?</div>
            <div class="side-nick" id="myNick">...</div>
            <div style="font-size:10px; color:var(--gold); margin-top:5px; letter-spacing:2px">PREMIUM MEMBER</div>
        </div>
        <div class="side-nav">
            <div class="nav-item" onclick="showInbox()" style="color: var(--gold); border: 1px solid var(--gold); margin-bottom: 15px;">💌 MESSENGER <span id="dot" style="width:8px; height:8px; background:var(--red); border-radius:50%; display:none; margin-left:auto"></span></div>
            <div class="nav-item active" onclick="setR('💬 ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
            <div class="nav-item" onclick="setR('💎 VIP საუბრები', this)">💎 VIP საუბრები</div>
            <div class="nav-item" onclick="setR('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="nav-item" onclick="setR('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        </div>
        <div style="padding: 20px; text-align: center; color: #444; font-size: 12px; cursor: pointer;" onclick="logout()">🚪 DISCONNECT</div>
    </div>

    <div id="overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; z-index:999" onclick="toggleMenu()"></div>

    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="room-name" id="roomTitle">💬 ზოგადი ჩატი</div>
        <div style="width: 28px;"></div>
    </header>

    <div id="chatBox"></div>

    <div class="input-zone">
        <input type="text" id="mIn" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">➤</button>
    </div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let me = {}, room = '💬 ზოგადი ჩატი', dmId = null;

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return location.href="index.html";

        let { data: p } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
        me = { id: user.id, nick: p?.username || user.email.split('@')[0] };
        
        document.getElementById('myNick').innerText = me.nick;
        document.getElementById('avCircle').innerText = me.nick[0].toUpperCase();

        load();
        sb.channel('chat').on('postgres_changes',{event:'*',schema:'public',table:'messages'},(payload)=>{
            if(payload.new.receiver_id === me.id) document.getElementById('dot').style.display = 'block';
            load();
        }).subscribe();
    }

    async function load() {
        if(document.getElementById('roomTitle').innerText === "💌 MESSENGER") return;
        let query = sb.from('messages').select('*').eq('room', room);
        if (dmId) {
            query = query.or(`and(user_id.eq.${me.id},receiver_id.eq.${dmId}),and(user_id.eq.${dmId},receiver_id.eq.${me.id})`);
        } else {
            query = query.is('receiver_id', null);
        }

        const { data } = await query.order('created_at', { ascending: true });
        const box = document.getElementById('chatBox');
        box.innerHTML = (data || []).map(m => {
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            return `
                <div class="msg-row ${m.user_id === me.id ? 'me-row' : ''}">
                    <div class="msg ${m.user_id === me.id ? 'me' : ''}">
                        ${!dmId && m.user_id !== me.id ? `<b style="font-size:10px; color:var(--gold); display:block; margin-bottom:4px">${m.username}</b>` : ''}
                        ${m.text}
                        <span class="msg-time">${time}</span>
                    </div>
                </div>
            `;
        }).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('mIn'); if(!i.value.trim()) return;
        const { error } = await sb.from('messages').insert([{ 
            text: i.value, 
            room: room, 
            user_id: me.id, 
            username: me.nick, 
            receiver_id: dmId 
        }]);
        if(error) alert("ვერ გაიგზავნა! SQL Policy შეამოწმე.");
        i.value = "";
    }

    function showInbox() { /* ინბოქსის ლოგიკა იგივე რჩება რაც წინა კოდში იყო */ }

    function setR(n, el) {
        dmId = null; room = n;
        document.getElementById('roomTitle').innerText = n;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active'); toggleMenu(); load();
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
    }

    async function logout() { await sb.auth.signOut(); location.href="index.html"; }
    init();
</script>
</body>
</html>
