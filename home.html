<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA ROOMS - SMART</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-red: #ff0000; --dark-bg: #000; --panel-bg: #0a0a0a; --glass: rgba(15, 15, 15, 0.95); }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ჰედერი */
        .top-bar { height: 65px; background: var(--panel-bg); border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; }
        .room-selector-btn { background: rgba(255, 0, 0, 0.1); border: 1px solid var(--neon-red); color: white; padding: 10px 18px; border-radius: 25px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* მენიუ */
        .mobile-menu { position: absolute; top: 70px; left: 10px; right: 10px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255, 0, 0, 0.3); border-radius: 20px; display: none; flex-direction: column; max-height: 65vh; overflow-y: auto; z-index: 999; }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; color: #ddd; cursor: pointer; }

        /* ჩატის ველი */
        .messages-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #000; }
        .msg-row { display: flex; gap: 8px; align-items: flex-end; max-width: 85%; margin-bottom: 4px; }
        
        /* სტილის ცვლილება - ოთახი vs პირადი */
        .msg-row.is-private.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.is-private.me .bubble { background: #1a0000; border-color: rgba(255,0,0,0.3); border-radius: 15px 15px 2px 15px; }

        .avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--neon-red); display: flex; align-items: center; justify-content: center; color: var(--neon-red); font-size: 10px; font-weight: bold; flex-shrink: 0; }
        .bubble { background: #121212; padding: 10px 14px; border-radius: 15px 15px 15px 2px; border: 1px solid #1a1a1a; }
        .bubble b { color: var(--neon-red); display: block; font-size: 10px; margin-bottom: 3px; }
        .bubble span { font-size: 14px; color: #efefef; }

        /* ნოტიფიკაციის წერტილი */
        .notif-dot { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background: yellow; border-radius: 50%; display: none; box-shadow: 0 0 5px yellow; }

        /* ონლაინ პანელი */
        .users-modal { position: fixed; right: -100%; top: 0; width: 85%; height: 100%; background: #050505; z-index: 2000; transition: 0.3s; padding: 25px; border-left: 2px solid var(--neon-red); }
        .users-modal.active { right: 0; }
        .u-card { background: #0d0d0d; padding: 14px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .new-msg-tag { font-size: 9px; color: yellow; font-weight: bold; display: none; }

        .input-area { padding: 12px; background: var(--panel-bg); border-top: 1px solid #1a1a1a; display: flex; gap: 8px; }
        #msgInp { flex: 1; background: #121212; border: 1px solid #222; padding: 12px 18px; color: white; border-radius: 25px; outline: none; }
        .send-btn { background: var(--neon-red); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="room-selector-btn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i> <span id="current-room-label">💬 ზოგადი ჩატი</span>
        </button>
        <div onclick="toggleUsers()" style="color: var(--neon-red); font-size: 22px; position: relative;">
            <i class="fas fa-users"></i>
            <div id="main-notif" class="notif-dot"></div>
        </div>
    </div>

    <div class="mobile-menu" id="menu"></div>
    <div id="chat-box" class="messages-box"></div>

    <div class="input-area">
        <input type="text" id="msgInp" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div class="users-modal" id="users-modal">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="color: red; margin: 0; font-size: 14px;">ონლაინ</h3>
            <i class="fas fa-times" onclick="toggleUsers()" style="font-size: 22px;"></i>
        </div>
        <div id="u-list"></div>
    </div>

    <script>
        const SB_URL = "https://ftfciebnywbondaiarnc.supabase.co";
        const SB_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let me = null, mode = 'room', activeTarget = '💬 ზოგადი ჩატი';
        const rooms = ["💬 ზოგადი ჩატი", "💎 VIP საუბრები", "🔍 გამოძიება", "🔒 შიფროგრამა", "🧩 ვიქტორინა", "🪢 ჩამომხრჩობანა", "🎵 მუსიკა", "🖼️ გალერეა", "📝 ფორუმი", "🛡️ ადმინისტრაცია", "🎲 კაზინო", "⚖️ სასამართლო", "🔫 მაფიის ბუნაგი"];

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = "index.html";
            let { data: p } = await supabaseClient.from('profiles').select('username').eq('id', user.id).single();
            me = { id: user.id, username: p ? p.username : "User" };
            renderMenu(); setupPresence(); loadMsgs(); subscribe();
        }

        function renderMenu() {
            const m = document.getElementById('menu');
            rooms.forEach(r => {
                const item = document.createElement('div');
                item.className = 'menu-item';
                item.innerText = r;
                item.onclick = () => { activeTarget = r; mode = 'room'; document.getElementById('current-room-label').innerText = r; toggleMenu(); loadMsgs(); };
                m.appendChild(item);
            });
        }

        function setupPresence() {
            const channel = supabaseClient.channel('online_users', { config: { presence: { key: me.id } } });
            channel.on('presence', { event: 'sync' }, () => {
                const state = channel.presenceState();
                const list = document.getElementById('u-list'); list.innerHTML = '';
                for (const id in state) {
                    if (id === me.id) continue;
                    const u = state[id][0];
                    const card = document.createElement('div');
                    card.className = 'u-card';
                    card.id = `user-card-${id}`;
                    card.onclick = () => { startPrivate(id, u.username); card.querySelector('.new-msg-tag').style.display='none'; };
                    card.innerHTML = `<div><b>${u.username}</b> <span class="new-msg-tag">● ახალი</span></div><i class="fas fa-chevron-right"></i>`;
                    list.appendChild(card);
                }
            }).subscribe(async (s) => { if (s === 'SUBSCRIBED') await channel.track({ username: me.username }); });
        }

        function startPrivate(id, name) {
            mode = 'private'; activeTarget = id;
            document.getElementById('current-room-label').innerText = "✉️ " + name;
            toggleUsers(); loadMsgs();
            document.getElementById('main-notif').style.display = 'none';
        }

        async function loadMsgs() {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            let q = (mode === 'room') ? supabaseClient.from('messages').select('*').eq('room', activeTarget) : 
                supabaseClient.from('private_messages').select('*').or(`and(sender_id.eq.${me.id},receiver_id.eq.${activeTarget}),and(sender_id.eq.${activeTarget},receiver_id.eq.${me.id})`);
            const { data } = await q.order('inserted_at', { ascending: true });
            data?.forEach(m => draw(m));
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('msgInp'); if (!i.value.trim()) return;
            const table = (mode === 'room') ? 'messages' : 'private_messages';
            const data = (mode === 'room') ? { content: i.value, user_id: me.id, user_email: me.username, room: activeTarget } : 
                { content: i.value, sender_id: me.id, receiver_id: activeTarget, sender_username: me.username };
            await supabaseClient.from(table).insert([data]); i.value = '';
        }

        function draw(m) {
            const box = document.getElementById('chat-box');
            const name = m.user_email || m.sender_username;
            const isMe = (m.user_id === me.id || m.sender_id === me.id);
            const div = document.createElement('div'); 
            // თუ პირადში ვართ, დაამატე me კლასი მარჯვნივ გადასატანად
            div.className = `msg-row ${mode === 'private' ? 'is-private' : ''} ${isMe ? 'me' : ''}`;
            div.innerHTML = `<div class="avatar">${name[0].toUpperCase()}</div><div class="bubble"><b>${name}</b><span>${m.content}</span></div>`;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        function subscribe() {
            supabaseClient.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public' }, p => {
                const m = p.new;
                if (p.table === 'messages' && mode === 'room' && m.room === activeTarget) draw(m);
                else if (p.table === 'private_messages') {
                    if (mode === 'private' && (m.sender_id === activeTarget || m.receiver_id === activeTarget)) {
                        draw(m);
                    } else if (m.receiver_id === me.id) {
                        // თუ სხვაგან ხარ და მოგივიდა პირადი მესიჯი
                        document.getElementById('main-notif').style.display = 'block';
                        const uCard = document.getElementById(`user-card-${m.sender_id}`);
                        if (uCard) uCard.querySelector('.new-msg-tag').style.display = 'inline';
                    }
                }
            }).subscribe();
        }
        function toggleMenu() { const m = document.getElementById('menu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function toggleUsers() { document.getElementById('users-modal').classList.toggle('active'); }
        init();
    </script>
</body>
</html>
