<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Arial', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* მარცხენა მენიუ - ოთახები */
        .sidebar { width: 90px; background: #0a0a0a; border-right: 2px solid #222; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; }
        .room-icon { width: 60px; height: 60px; background: #151515; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 2px solid #333; transition: 0.3s; font-size: 11px; text-transform: uppercase; font-weight: bold; text-align: center; color: #888; }
        .room-icon:hover { border-color: red; color: white; box-shadow: 0 0 15px red; }
        .room-icon.active { border-color: red; background: #200; color: white; }

        /* ჩატის მთავარი ნაწილი */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #000; }
        
        /* ზედა ზოლი - ნიკი და ოთახის სახელი */
        .header { height: 60px; background: #0d0d0d; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; }
        .header h2 { color: red; margin: 0; font-size: 18px; text-shadow: 0 0 10px red; }
        .my-nickname { color: #aaa; font-size: 14px; }

        /* მესიჯების ფანჯარა */
        .messages-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { background: #111; padding: 12px; border-radius: 12px; border-left: 4px solid red; max-width: 75%; }
        .message b { color: red; display: block; font-size: 13px; margin-bottom: 4px; }
        .message span { color: #eee; font-size: 15px; }

        /* ქვედა საწერი ზოლი */
        .input-bar { padding: 20px; background: #0d0d0d; border-top: 1px solid #222; display: flex; gap: 15px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 14px; color: white; border-radius: 12px; outline: none; font-size: 15px; }
        input:focus { border-color: red; }
        button { background: red; color: white; border: none; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: darkred; box-shadow: 0 0 10px red; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="room-icon active" onclick="changeRoom('general', this)">ზოგადი</div>
        <div class="room-icon" onclick="changeRoom('mafia', this)">მაფია</div>
        <div class="room-icon" onclick="changeRoom('vip', this)">VIP</div>
    </div>

    <div class="chat-main">
        <div class="header">
            <h2 id="room-title">ზოგადი ჩატი</h2>
            <div id="user-info" class="my-nickname">გამარჯობა, იტვირთება...</div>
        </div>

        <div class="messages-box" id="chat-messages">
            </div>

        <div class="input-bar">
            <input type="text" id="msgInput" placeholder="დაწერე რამე...">
            <button onclick="sendMessage()">გაგზავნა</button>
        </div>
    </div>
