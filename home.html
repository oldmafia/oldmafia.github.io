<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MAFIA CHAT</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #ccc; font-family: sans-serif; margin: 0; }
        #chat { height: 80vh; overflow-y: auto; padding: 10px; border-bottom: 1px solid #222; }
        .m-line { margin-bottom: 10px; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .m-nick { color: red; font-weight: bold; font-size: 13px; }
        .m-text { display: block; margin-top: 3px; }
        .inp-box { padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; background: #111; border: 1px solid #333; color: white; }
        button { padding: 10px; background: red; color: white; border: none; }
    </style>
</head>
<body>
    <div id="chat">ჩატვირთვა...</div>
    <div class="inp-box">
        <input type="text" id="msg-in" placeholder="დაწერე...">
        <button onclick="send()">➤</button>
    </div>

<script>
    const _sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('username');

    async function sync() {
        const { data: msgs } = await _sb.from('messages_v3').select('*').order('created_at', { ascending: false }).limit(30);
        if (msgs) {
            document.getElementById('chat').innerHTML = msgs.reverse().map(m => `
                <div class="m-line">
                    <span class="m-nick" onclick="alert('${m.nickname}')">${m.nickname}:</span>
                    <span class="m-text">${m.message}</span>
                </div>
            `).join('');
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }
    }

    async function send() {
        const i = document.getElementById('msg-in');
        if(!i.value) return;
        await _sb.from('messages_v3').insert([{ nickname: myNick, message: i.value }]);
        i.value = ""; sync();
    }

    setInterval(sync, 3000);
    sync();
</script>
</body>
</html>
