<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - სრული ვერსია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ff0000; --dark: #000; --panel: #0d0d0d; }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--red); display: flex; flex-direction: column; transition: 0.3s; }
        @media (max-width: 768px) { .sidebar { position: absolute; left: -280px; height: 100%; z-index: 1000; } .sidebar.open { left: 0; } }

        .profile-area { padding: 25px; text-align: center; border-bottom: 1px solid #222; background: linear-gradient(to bottom, #1a0000, transparent); }
        .p-avatar { width: 75px; height: 75px; border-radius: 50%; border: 2px solid var(--red); box-shadow: 0 0 15px var(--red); margin-bottom: 10px; }
        .p-nick { font-weight: bold; color: #fff; font-size: 1.1rem; }

        /* ოთახების სია */
        .rooms-list { flex-grow: 1; overflow-y: auto; }
        .room-row { 
            padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; 
            transition: 0.2s; border-bottom: 1px solid #111; color: #ccc;
        }
        .room-row:hover { background: rgba(255,0,0,0.1); color: white; }
        .room-row.active { background: var(--red); color: white; font-weight: bold; }
        .room-row i { width: 25px; text-align: center; font-size: 1.1rem; color: #ff4d4d; }
        .room-row.active i { color: white; }

        /* ჩატი */
        .chat-container { flex-grow: 1; display: flex; flex-direction: column; background: #050505; position: relative; }
        .top-nav { height: 60px; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 20px; background: #0a0a0a; }
        .burger-menu { display: none; font-size: 1.5rem; color: var(--red); margin-right: 15px; cursor: pointer; }
        @media (max-width: 768px) { .burger-menu { display: block; } }

        #msg-display { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

        /* მესიჯი მარცხნივ */
        .msg-wrap { align-self: flex-start; max-width: 80%; display: flex; flex-direction: column; }
        .msg-bubble { background: #1a1a1a; padding: 10px 15px; border-radius: 0 15px 15px 15px; border: 1px solid #333; }
        .msg-info { color: var(--red); font-size: 0.75rem; font-weight: bold; margin-bottom: 3px; }
        .msg-text { color: #eee; font-size: 0.95rem; line-height: 1.4; }

        /* ქვედა პანელი და თვითმფრინავი */
        .input-bar { padding: 15px 20px; background: #0d0d0d; display: flex; align-items: center; gap: 15px; border-top: 1px solid #222; }
        .field-wrap { flex-grow: 1; background: #151515; border-radius: 25px; border: 1px solid #444; padding: 5px 15px; }
        input { width: 100%; background: transparent; border: none; padding: 10px; color: white; outline: none; }
        
        /* ნამდვილი ჩახატული თვითმფრინავი */
        .plane-img { 
            width: 45px; height: 45px; cursor: pointer; transition: 0.3s; 
            filter: drop-shadow(0 0 5px #00a2ff); 
        }
        .plane-img:hover { transform: scale(1.1) rotate(-10deg); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: none; }
        .overlay.on { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="profile-area">
            <img id="myPic" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Admin" class="p-avatar">
            <div id="myNickname" class="p-nick">იტვირთება...</div>
        </div>
        <div class="rooms-list" id="roomsBox"></div>
    </div>

    <div class="chat-container">
        <div class="top-nav">
            <i class="fas fa-bars burger-menu" onclick="toggleMenu()"></i>
            <span id="currentRoomTitle" style="font-weight: bold; letter-spacing: 1px;">კაფე-ბარი</span>
        </div>
        <div id="msg-display"></div>
        <div class="input-bar">
            <div class="field-wrap">
                <input type="text" id="chatInput" placeholder="დაწერე შეტყობინება...">
            </div>
            <img src="https://img.icons8.com/external-flatart-icons-flat-flatarticons/128/external-paper-plane-startup-and-new-business-flatart-icons-flat-flatarticons.png" 
                 class="plane-img" id="sendBtn">
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");

        // 14 ოთახის სრული სია
        const allRooms = [
            {n: "კაფე-ბარი", i: "fa-coffee"}, {n: "ვიპ საუბრები", i: "fa-crown"},
            {n: "გამოძიება", i: "fa-search"}, {n: "შიფროგრამა", i: "fa-user-secret"},
            {n: "ვიქტორინა", i: "fa-lightbulb"}, {n: "ჩამოხრჩობანა", i: "fa-ghost"},
            {n: "მაფიის ღამე", i: "fa-moon"}, {n: "ჯოკერი", i: "fa-suit-spades"},
            {n: "ნარდი", i: "fa-dice"}, {n: "მუსიკა", i: "fa-music"},
            {n: "იუმორი", i: "fa-laugh"}, {n: "ადმინისტრაცია", i: "fa-shield-alt"},
            {n: "დახმარება", i: "fa-question-circle"}, {n: "ფორუმი", i: "fa-comments"}
        ];

        let activeRoom = "კაფე-ბარი";
        let userNick = "სტუმარი";

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('on');
        }

        async function init() {
            // მომხმარებლის ამოცნობა
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                userNick = session.user.user_metadata.nickname || "User";
                document.getElementById('myNickname').innerText = userNick;
                document.getElementById('myPic').src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${userNick}`;
            }

            const box = document.getElementById('roomsBox');
            allRooms.forEach(room => {
                const div = document.createElement('div');
                div.className = `room-row ${room.n === activeRoom ? 'active' : ''}`;
                div.innerHTML = `<i class="fas ${room.i}"></i> <span>${room.n}</span>`;
                div.onclick = () => {
                    activeRoom = room.n;
                    document.getElementById('currentRoomTitle').innerText = room.n;
                    document.querySelectorAll('.room-row').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    if(window.innerWidth < 768) toggleMenu();
                    loadMessages();
                };
                box.appendChild(div);
            });
            loadMessages();
        }

        async function loadMessages() {
            const list = document.getElementById('msg-display');
            list.innerHTML = "";
            const { data } = await supabaseClient.from('messages').select('*').eq('room_name', activeRoom).order('created_at', { ascending: true });
            if(data) data.forEach(render);
        }

        function render(m) {
            const list = document.getElementById('msg-display');
            const wrap = document.createElement('div');
            wrap.className = 'msg-wrap';
            wrap.innerHTML = `
                <div class="msg-info">${m.username}</div>
                <div class="msg-bubble">
                    <div class="msg-text">${m.text}</div>
                </div>
            `;
            list.appendChild(wrap);
            list.scrollTop = list.scrollHeight;
        }

        async function send() {
            const inp = document.getElementById('chatInput');
            if(!inp.value.trim()) return;
            await supabaseClient.from('messages').insert([{ text: inp.value, room_name: activeRoom, username: userNick }]);
            inp.value = "";
        }

        document.getElementById('sendBtn').onclick = send;
        document.getElementById('chatInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };

        supabaseClient.channel('realtime').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
            if(p.new.room_name === activeRoom) render(p.new);
        }).subscribe();

        init();
    </script>
</body>
</html>
