<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>MAFIA ROOMS - REBORN</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Sidebar სტილი შენი სურათის მიხედვით */
        .sidebar { width: 260px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar h2 { color: #f00; padding: 20px; text-align: center; font-size: 18px; text-transform: uppercase; border-bottom: 1px solid #111; }
        
        .room-btn { 
            padding: 15px 20px; background: none; border: none; color: #bbb; 
            text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px;
        }
        .room-btn:hover { background: #111; color: white; }
        .active { color: #f00; font-weight: bold; background: #111; border-left: 4px solid #f00; }

        /* ჩატის კონტეინერი */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #050505; }
        header { padding: 10px 20px; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        
        /* პროფილი და ავატარი */
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar-img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #f00; background: #222; object-fit: cover; }
        .founder-txt { color: gold !important; font-weight: bold; text-shadow: 0 0 5px gold; }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-line { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .user-nick { color: #ff4d4d; font-weight: bold; margin-right: 10px; }

        .input-area { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        input { flex: 1; padding: 12px 20px; background: #111; border: 1px solid #222; color: white; border-radius: 25px; outline: none; }
        button#send { background: #f00; border: none; width: 45px; height: 45px; color: white; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>MAFIA ROOMS</h2>
    <button class="room-btn active" onclick="setRoom('ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</button>
    <button class="room-btn" onclick="setRoom('VIP საუბრები', this)">💎 VIP საუბრები</button>
    <button class="room-btn" onclick="setRoom('გამოძიება', this)">🔍 გამოძიება</button>
    <button class="room-btn" onclick="setRoom('შიფროგრამა', this)">🔒 შიფროგრამა</button>
    <button class="room-btn" onclick="setRoom('ვიქტორინა', this)">🧩 ვიქტორინა</button>
    <button class="room-btn" onclick="setRoom('ჩამომხრჩობანა', this)">🪢 ჩამომხრჩობანა</button>
    <button class="room-btn" onclick="setRoom('მუსიკა', this)">🎵 მუსიკა</button>
    <button class="room-btn" onclick="setRoom('გალერეა', this)">🖼️ გალერეა</button>
    <button class="room-btn" onclick="setRoom('ფორუმი', this)">📝 ფორუმი</button>
    <button class="room-btn" onclick="setRoom('ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</button>
</div>

<div class="chat-main">
    <header>
        <div id="room-name" style="color: #f00; font-weight: bold;">💬 ზოგადი ჩატი</div>
        <div class="user-info">
            <span id="myStatus" style="color: #666; font-size: 11px;"></span>
            <span id="myNick">...</span>
            <img src="" id="myAv" class="avatar-img" onerror="this.src='https://via.placeholder.com/35'">
        </div>
    </header>

    <div id="messages"></div>

    <div class="input-area">
        <input type="text" id="minp" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button id="send" onclick="sendMsg()">➤</button>
    </div>
</div>

        if (data) data.forEach(m => render(m));
        box.scrollTop = box.scrollHeight;
    }
