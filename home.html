<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Elite</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff4d4d; --gold: #ffd700; --dark: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Poppins', sans-serif; }
        body { margin: 0; background: var(--dark); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ზედა პანელი */
        header { background: #111; padding: 15px; border-bottom: 2px solid var(--red); display: flex; align-items: center; justify-content: space-between; z-index: 2000; position: relative; }
        .room-btn { background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; }

        /* ჩამოსაშლელი მენიუ ზემოდან */
        .top-menu { position: absolute; top: -100%; left: 0; width: 100%; background: #0c0c0c; transition: 0.4s; z-index: 1500; padding: 20px; border-bottom: 2px solid var(--red); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .top-menu.open { top: 60px; }
        .menu-item { background: #151515; padding: 12px; border-radius: 10px; text-align: center; font-size: 12px; cursor: pointer; border: 1px solid #222; }
        .menu-item.active { border-color: var(--red); color: var(--red); }

        /* პროფილი */
        .profile-bar { padding: 15px; background: #0c0c0c; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 15px; }
        .avatar-box { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--red); overflow: hidden; position: relative; cursor: pointer; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .status-text { font-size: 11px; color: #666; font-style: italic; }

        /* ჩატი */
        #chatBox { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg { padding: 10px 15px; border-radius: 18px; font-size: 14px; background: #1a1a1a; max-width: 85%; align-self: flex-start; }
        .me { align-self: flex-end; background: var(--red); color: #fff; }
        .msg-n { font-size: 10px; color: var(--gold); display: block; margin-bottom: 3px; }

        /* ინფუთი */
        .input-zone { padding: 15px; background: #0c0c0c; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        input { flex: 1; background: #151515; border: 1px solid #333; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

    <header>
        <div class="avatar-box" onclick="changeAvatar()">
            <img id="myImg" src="https://via.placeholder.com/50">
        </div>
        <button class="room-btn" onclick="toggleMenu()">🔍 ოთახის არჩევა ▾</button>
        <div id="status" class="status-text" onclick="changeStatus()">სტატუსის დადება...</div>
    </header>

    <div id="topMenu" class="top-menu">
        <div class="menu-item active" onclick="setR('💬 ზოგადი ჩატი')">💬 ზოგადი ჩატი</div>
        <div class="menu-item" onclick="setR('💎 VIP საუბრები')">💎 VIP საუბრები</div>
        <div class="menu-item" onclick="setR('🌑 მაფიის ღამე')">🌑 მაფიის ღამე</div>
        <div class="menu-item" onclick="setR('🔍 გამოძიება')">🔍 გამოძიება</div>
        <div class="menu-item" onclick="setR('🔐 შიფროგრამა')">🔐 შიფროგრამა</div>
        <div class="menu-item" onclick="setR('🛡️ ადმინისტრაცია')">🛡️ ადმინისტრაცია</div>
        <div class="menu-item" onclick="showInbox()" style="color:var(--gold)">💌 MESSENGER</div>
        <div class="menu-item" onclick="logout()" style="color:#444">🚪 გასვლა</div>
    </div>

    <div id="chatBox"></div>

    <div class="input-zone">
        <input type="text" id="mIn" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="background:var(--red); border:none; width:45px; height:45px; border-radius:50%; color:#fff; cursor:pointer">➤</button>
    </div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let me = {}, room = '💬 ზოგადი ჩატი', dmId = null;

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return location.href="index.html";

        // პროფილის წამოღება ან შექმნა
        let { data: p } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
        if(!p) {
            const nick = user.email.split('@')[0];
            await sb.from('profiles').insert([{ id: user.id, username: nick }]);
            p = { username: nick, avatar_url: '', status: '' };
        }
        
        me = { id: user.id, nick: p.username, av: p.avatar_url || 'https://via.placeholder.com/50', status: p.status || 'სტატუსი...' };
        
        document.getElementById('myImg').src = me.av;
        document.getElementById('status').innerText = me.status;

        load();
        sb.channel('chat').on('postgres_changes',{event:'*',schema:'public',table:'messages'},()=>load()).subscribe();
    }

    async function load() {
        let q = sb.from('messages').select('*').eq('room', room);
        if(dmId) {
            q = q.or(`and(user_id.eq.${me.id},receiver_id.eq.${dmId}),and(user_id.eq.${dmId},receiver_id.eq.${me.id})`);
        } else {
            q = q.is('receiver_id', null);
        }

        const { data } = await q.order('created_at', { ascending: true });
        const box = document.getElementById('chatBox');
        box.innerHTML = (data || []).map(m => `
            <div class="msg ${m.user_id === me.id ? 'me' : ''}">
                <span class="msg-n">${m.username}</span>
                ${m.text}
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('mIn'); if(!i.value.trim()) return;
        await sb.from('messages').insert([{ text: i.value, room: room, user_id: me.id, username: me.nick, receiver_id: dmId }]);
        i.value = "";
    }

    async function changeStatus() {
        const s = prompt("შეიყვანე ახალი სტატუსი:", me.status);
        if(s) {
            await sb.from('profiles').update({ status: s }).eq('id', me.id);
            location.reload();
        }
    }

    async function changeAvatar() {
        const url = prompt("ჩასვი ფოტოს ლინკი (URL):", me.av);
        if(url) {
            await sb.from('profiles').update({ avatar_url: url }).eq('id', me.id);
            location.reload();
        }
    }

    function setR(n) { room = n; dmId = null; document.querySelector('.room-btn').innerText = n + ' ▾'; toggleMenu(); load(); }
    function toggleMenu() { document.getElementById('topMenu').classList.toggle('open'); }
    async function logout() { await sb.auth.signOut(); location.href="index.html"; }
    init();
</script>
</body>
</html>
