<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - MAFIA ROOMS</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* მთავარი სტილი */
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* ზედა ზოლი */
        .chat-header { 
            padding: 15px; 
            background: #000; 
            border-bottom: 1px solid #222; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }
        .room-title { font-weight: bold; color: #ff0000; font-size: 20px; letter-spacing: 1px; }
        .user-info { position: absolute; right: 15px; color: #ff4444; font-size: 13px; font-weight: bold; }
        .back-btn { position: absolute; left: 15px; background: #222; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; display: none; }

        /* ოთახების მენიუ (ვერტიკალური სია) */
        #rooms-menu { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            padding: 20px; 
            overflow-y: auto; 
            flex: 1; 
        }
        .room-card { 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 12px; 
            padding: 16px 20px; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            transition: 0.2s; 
            font-size: 17px;
        }
        .room-card:active { transform: scale(0.98); background: #1a1a1a; }
        .room-card span { margin-right: 15px; font-size: 22px; }
        .vip-card { border-left: 4px solid gold; }

        /* ჩატის ფანჯარა */
        #chat-window { display: none; flex-direction: column; flex: 1; background: #050505; }
        .messages-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1a1a1a; padding: 10px 15px; border-radius: 12px; max-width: 85%; align-self: flex-start; border-left: 3px solid red; }
        .msg b { color: #ff4444; display: block; font-size: 12px; margin-bottom: 3px; }

        /* საწერი ზოლი */
        .input-area { padding: 15px; background: #0d0d0d; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px; color: white; border-radius: 10px; outline: none; }
        .send-btn { background: red; color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .logout-btn { margin-top: 10px; color: #ff4444 !important; border-color: #333; justify-content: center; }
    </style>
</head>
<body>

    <div class="chat-header">
        <button class="back-btn" id="back-to-menu" onclick="showMenu()">←</button>
        <span class="room-title" id="header-title">MAFIA ROOMS</span>
        <span class="user-info" id="user-nickname">იტვირთება...</span>
    </div>

    <div id="rooms-menu">
        <div class="room-card" onclick="openChat('general', '💬 ზოგადი ჩატი')"><span>💬</span> ზოგადი ჩატი</div>
        <div class="room-card vip-card" onclick="openChat('vip', '💎 VIP საუბრები')"><span>💎</span> VIP საუბრები</div>
        <div class="room-card" onclick="openChat('investigation', '🔍 გამოძიება')"><span>🔍</span> გამოძიება</div>
        <div class="room-card" onclick="openChat('cipher', '🔐 შიფროგრამა')"><span>🔐</span> შიფროგრამა</div>
        <div class="room-card" onclick="openChat('quiz', '🧩 ვიქტორინა')"><span>🧩</span> ვიქტორინა</div>
        <div class="room-card" onclick="openChat('hangman', '🪢 ჩამოხრჩობანა')"><span>🪢</span> ჩამოხრჩობანა</div>
        <div class="room-card" onclick="openChat('music', '🎵 მუსიკა')"><span>🎵</span> მუსიკა</div>
        <div class="room-card" onclick="openChat('gallery', '🖼️ გალერეა')"><span>🖼️</span> გალერეა</div>
        <div class="room-card" onclick="openChat('forum', '📝 ფორუმი')"><span>📝</span> ფორუმი</div>
        <div class="room-card" onclick="openChat('admin', '🛡️ ადმინისტრაცია')"><span>🛡️</span> ადმინისტრაცია</div>
        <div class="room-card" onclick="openChat('help', '🆘 დახმარება')"><span>🆘</span> დახმარება</div>
        <div class="room-card logout-btn" onclick="logout()"><span>🚪</span> გასვლა</div>
    </div>

    <div id="chat-window">
        <div class="messages-container" id="chat-messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://ftfciebnywbondaiarnc.supabase.co";
        const SB_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = '';
        let myNickname = '';

        async function loadProfile() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }

            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('username')
                .eq('id', user.id)
                .single();

            myNickname = (profile && profile.username) ? profile.username : user.email.split('@')[0];
            document.getElementById('user-nickname').innerText = myNickname;
        }

        function openChat(room, title) {
            currentRoom = room;
            document.getElementById('rooms-menu').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('back-to-menu').style.display = 'block';
            document.getElementById('header-title').innerText = title;
            document.getElementById('chat-messages').innerHTML = ''; 
            loadMessages();
        }

        function showMenu() {
            document.getElementById('rooms-menu').style.display = 'flex';
            document.getElementById('chat-window').style.display = 'none';
            document.getElementById('back-to-menu').style.display = 'none';
            document.getElementById('header-title').innerText = 'MAFIA ROOMS';
        }

        async function loadMessages() {
            const { data } = await supabaseClient
                .from('messages')
                .select('*')
                .eq('room', currentRoom)
                .order('inserted_at', { ascending: true });
            if (data) data.forEach(msg => renderMessage(msg));
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            await supabaseClient.from('messages').insert([{ 
                content: text, user_id: user.id, user_email: myNickname, room: currentRoom 
            }]);
            input.value = '';
        }

        function renderMessage(msg) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>${msg.user_email}</b> ${msg.content}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        supabaseClient.channel('messages-realtime').on('postgres_changes', 
            { event: 'INSERT', schema: 'public', table: 'messages' }, 
            payload => { if (payload.new.room === currentRoom) renderMessage(payload.new); }
        ).subscribe();

        async function logout() { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; }
        loadProfile();
    </script>
</body>
</html>
