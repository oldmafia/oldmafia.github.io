<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA ROOMS</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* მენიუ (Sidebar) */
        #sidebar { 
            position: fixed; left: 0; top: 0; width: 280px; height: 100%; 
            background: #000; border-right: 2px solid red; transition: 0.3s ease; z-index: 1000;
            display: flex; flex-direction: column;
        }
        #sidebar.closed { transform: translateX(-100%); }
        
        /* ზედა ნაწილი: წითელი X და 😎 კაიფმანია */
        .sidebar-top { 
            padding: 15px; border-bottom: 2px solid red; display: flex; 
            justify-content: space-between; align-items: center; 
        }
        .close-x { color: red; font-size: 28px; cursor: pointer; font-weight: bold; }
        .kaif-btn { 
            background: #000; color: #fff; border: 1px solid red; padding: 5px 12px; 
            border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px;
        }

        .room-list { flex: 1; overflow-y: auto; }
        .room-item { 
            padding: 12px 20px; border-bottom: 1px solid #111; cursor: pointer; 
            color: #eee; display: flex; align-items: center; gap: 10px; font-size: 15px;
        }
        .room-item:hover, .room-item.active { background: #111; color: red; border-left: 3px solid red; }

        /* ჩატის მხარე */
        #mainChat { flex: 1; display: flex; flex-direction: column; background: #000; width: 100%; }
        .header { 
            height: 60px; border-bottom: 2px solid red; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 15px;
        }
        .room-name-display { color: red; font-weight: bold; font-size: 16px; text-transform: uppercase; }

        #messageList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* მესიჯის ბუშტები */
        .msg-bubble { 
            max-width: 85%; padding: 10px 14px; border-radius: 15px; background: #151515; 
            position: relative; align-self: flex-start; border: 1px solid #222;
        }
        .msg-owner { border: 1px solid red; background: #0a0a0a; }
        .msg-user { font-size: 12px; font-weight: bold; margin-bottom: 4px; display: block; }
        .msg-time { font-size: 10px; color: #555; float: right; margin-top: 5px; margin-left: 8px; }

        /* საწერი გრაფა და ცისფერი თვითმფრინავი */
        .input-box { padding: 12px; background: #000; border-top: 2px solid red; display: flex; gap: 10px; align-items: center; }
        input { 
            flex: 1; padding: 12px 18px; background: #0a0a0a; border: 1px solid #333; 
            color: white; border-radius: 25px; outline: none; font-size: 16px;
        }
        
        .send-btn { 
            background: red; width: 48px; height: 48px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
        }
        /* SVG თვითმფრინავი ზუსტად შენი ფერის (#00e5ff) */
        .plane-svg { width: 24px; height: 24px; fill: #00e5ff; }

        .profile-area { padding: 15px; border-top: 2px solid red; display: flex; flex-direction: column; gap: 8px; }
        .prof-link { width: 100%; padding: 10px; background: #0a0a0a; border: 1px solid red; color: white; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; }
        .logout-link { color: red; text-align: center; font-size: 13px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-top">
            <div class="close-x" onclick="toggleSidebar()">X</div>
            <div class="kaif-btn" onclick="toggleSidebar()">😎 კაიფმანია</div>
        </div>
        <div class="room-list">
            <div class="room-item active" onclick="changeRoom('ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
            <div class="room-item" onclick="changeRoom('VIP საუბრები', this)">💎 VIP საუბრები</div>
            <div class="room-item" onclick="changeRoom('გამოძიება', this)">🔍 გამოძიება</div>
            <div class="room-item" onclick="changeRoom('შიფროგრამა', this)">🔐 შიფროგრამა</div>
            <div class="room-item" onclick="changeRoom('ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="room-item" onclick="changeRoom('ჩამოხრჩობანა', this)">🪢 ჩამოხრჩობანა</div>
            <div class="room-item" onclick="changeRoom('მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="room-item" onclick="changeRoom('ჯოკერი', this)">🃏 ჯოკერი</div>
            <div class="room-item" onclick="changeRoom('ნარდი', this)">🎲 ნარდი</div>
            <div class="room-item" onclick="changeRoom('მუსიკა', this)">🎵 მუსიკა</div>
            <div class="room-item" onclick="changeRoom('იუმორი', this)">🤣 იუმორი</div>
            <div class="room-item" onclick="changeRoom('გალერეა', this)">🖼️ გალერეა</div>
            <div class="room-item" onclick="changeRoom('ფორუმი', this)">📝 ფორუმი</div>
            <div class="room-item" onclick="changeRoom('ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
            <div class="room-item" onclick="changeRoom('დახმარება', this)">❓ დახმარება</div>
        </div>
        <div class="profile-area">
            <div class="prof-link" onclick="window.location.href='user.html'">👤 პროფილი</div>
            <div class="logout-link" onclick="logout()">🚪 გასვლა</div>
        </div>
    </div>

    <div id="mainChat">
        <div class="header">
            <div style="font-size: 28px; color: red; cursor: pointer;" onclick="toggleSidebar()">☰</div>
            <div class="room-name-display" id="roomTitle">ზოგადი ჩატი</div>
            <div style="width: 30px;"></div>
        </div>
        <div id="messageList"></div>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMsg()">
            <div class="send-btn" onclick="sendMsg()">
                <svg class="plane-svg" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoom = 'ზოგადი ჩატი';
        let myId = "", myName = "";

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('closed'); }

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = 'index.html';
            myId = user.id;
            const { data: p } = await supabase.from('profiles').select('username').eq('id', myId).maybeSingle();
            myName = p ? p.username : "guest";
            loadMsgs();
            supabase.channel('chat').on('postgres_changes', { event: '*', table: 'messages' }, loadMsgs).subscribe();
        }

        async function loadMsgs() {
            const { data: msgs } = await supabase.from('messages').select('*').eq('room_name', currentRoom).order('id', { ascending: true });
            const list = document.getElementById('messageList');
            list.innerHTML = msgs ? msgs.map(m => {
                const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const isMe = m.username === 'abu007';
                return `
                <div class="msg-bubble ${isMe ? 'msg-owner' : ''}">
                    <span class="msg-user" style="color:${isMe ? 'red' : '#00e5ff'};">${m.username}</span>
                    <div>${m.text}</div>
                    <span class="msg-time">${time}</span>
                </div>`;
            }).join('') : '';
            list.scrollTop = list.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const txt = input.value.trim();
            if(!txt) return;
            input.value = '';
            await supabase.from('messages').insert([{ user_id: myId, username: myName, text: txt, room_name: currentRoom }]);
        }

        function changeRoom(name, el) {
            currentRoom = name;
            document.getElementById('roomTitle').innerText = name;
            document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            toggleSidebar();
            loadMsgs();
        }

        async function logout() { await supabase.auth.signOut(); window.location.href = 'index.html'; }

        init();
    </script>
</body>
</html>
