<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - MAFIA ROOMS</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* ზედა ზოლი */
        .header { 
            padding: 15px; 
            background: #0d0d0d; 
            border-bottom: 2px solid red; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100;
        }
        .menu-btn { background: #222; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 20px; }
        .room-title { font-weight: bold; color: red; font-size: 18px; text-transform: uppercase; }
        .user-name { color: #888; font-size: 14px; }

        /* გვერდიდან გამოსასვლელი მენიუ (Sidebar) */
        .sidebar {
            position: fixed;
            left: -100%; /* თავიდან დამალულია */
            top: 0;
            width: 280px;
            height: 100%;
            background: #111;
            z-index: 1000;
            transition: 0.4s ease-in-out;
            box-shadow: 5px 0 15px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        .sidebar.active { left: 0; } /* როცა აქტიურია, გამოდის */

        .sidebar h2 { color: red; text-align: center; font-size: 20px; margin-bottom: 20px; }
        
        .room-item { 
            padding: 15px 25px; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            border-bottom: 1px solid #222;
            transition: 0.3s;
        }
        .room-item:hover { background: #1a1a1a; }
        .room-item span { margin-right: 15px; font-size: 20px; }

        /* ფონი, რომელიც იფარება მენიუს დროს */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 999;
        }
        .overlay.active { display: block; }

        /* ჩატის ზონა */
        #chat-container { flex: 1; display: flex; flex-direction: column; background: #050505; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1a1a1a; padding: 12px; border-radius: 15px; max-width: 85%; align-self: flex-start; border-left: 4px solid red; }
        .msg b { color: #ff4444; display: block; font-size: 13px; margin-bottom: 4px; }

        /* საწერი ზოლი (ბოლოში) */
        .input-bar { padding: 15px; background: #0d0d0d; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px; color: white; border-radius: 25px; outline: none; }
        button.send-btn { background: red; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        .logout-btn { color: red !important; margin-top: auto; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="room-title" id="active-room-name">ზოგადი ჩატი</div>
        <div class="user-name" id="user-display">...</div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h2>MAFIA ROOMS</h2>
        <div class="room-item" onclick="changeRoom('general', '💬 ზოგადი ჩატი')"><span>💬</span> ზოგადი ჩატი</div>
        <div class="room-item" onclick="changeRoom('vip', '💎 VIP საუბრები')"><span>💎</span> VIP საუბრები</div>
        <div class="room-item" onclick="changeRoom('investigation', '🔍 გამოძიება')"><span>🔍</span> გამოძიება</div>
        <div class="room-item" onclick="changeRoom('cipher', '🔐 შიფროგრამა')"><span>🔐</span> შიფროგრამა</div>
        <div class="room-item" onclick="changeRoom('quiz', '🧩 ვიქტორინა')"><span>🧩</span> ვიქტორინა</div>
        <div class="room-item" onclick="changeRoom('hangman', '🪢 ჩამოხრჩობანა')"><span>🪢</span> ჩამოხრჩობანა</div>
        <div class="room-item" onclick="changeRoom('music', '🎵 მუსიკა')"><span>🎵</span> მუსიკა</div>
        <div class="room-item" onclick="changeRoom('gallery', '🖼️ გალერეა')"><span>🖼️</span> გალერეა</div>
        <div class="room-item" onclick="changeRoom('forum', '📝 ფორუმი')"><span>📝</span> ფორუმი</div>
        <div class="room-item" onclick="changeRoom('admin', '🛡️ ადმინისტრაცია')"><span>🛡️</span> ადმინისტრაცია</div>
        <div class="room-item logout-btn" onclick="logout()"><span>🚪</span> გასვლა</div>
    </div>

    <div id="chat-container">
        <div class="messages" id="chat-messages"></div>
        <div class="input-bar">
            <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://ftfciebnywbondaiarnc.supabase.co";
        const SB_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = 'general';
        let myNickname = '';

        // მენიუს გამოღება/დამალვა
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // ოთახის შეცვლა
        function changeRoom(id, title) {
            currentRoom = id;
            document.getElementById('active-room-name').innerText = title;
            document.getElementById('chat-messages').innerHTML = ''; 
            toggleMenu(); // მენიუს დახურვა არჩევის შემდეგ
            loadMessages();
        }

        async function loadProfile() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return;
            const { data: profile } = await supabaseClient.from('profiles').select('username').eq('id', user.id).single();
            myNickname = (profile && profile.username) ? profile.username : user.email.split('@')[0];
            document.getElementById('user-display').innerText = myNickname;
        }

        async function loadMessages() {
            const { data } = await supabaseClient.from('messages').select('*').eq('room', currentRoom).order('inserted_at', { ascending: true });
            if (data) data.forEach(msg => renderMessage(msg));
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            await supabaseClient.from('messages').insert([{ 
                content: input.value, user_id: user.id, user_email: myNickname, room: currentRoom 
            }]);
            input.value = '';
        }

        function renderMessage(msg) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>${msg.user_email}</b> ${msg.content}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        supabaseClient.channel('realtime-chat').on('postgres_changes', 
            { event: 'INSERT', schema: 'public', table: 'messages' }, 
            payload => { if (payload.new.room === currentRoom) renderMessage(payload.new); }
        ).subscribe();

        async function logout() { await supabaseClient.auth.signOut(); location.reload(); }
        
        loadProfile();
        loadMessages();
    </script>
</body>
</html>
