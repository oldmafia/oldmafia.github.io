<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Home</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar - მარცხენა მენიუ */
        .sidebar { width: 300px; min-width: 300px; background: #0d0d0d; border-right: 2px solid red; display: flex; flex-direction: column; transition: 0.3s; z-index: 100; }
        .profile-section { padding: 20px; background: #151515; border-bottom: 1px solid #222; text-align: center; }
        
        .avatar-wrapper { position: relative; width: 85px; height: 85px; margin: 0 auto 10px; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid red; object-fit: cover; background: #222; }
        .upload-btn { position: absolute; bottom: 0; right: 0; background: red; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #000; font-size: 14px; }
        
        #myNick { color: red; font-size: 20px; font-weight: bold; margin: 5px 0; }
        .role-badge { font-size: 10px; padding: 3px 10px; border-radius: 5px; font-weight: bold; display: inline-block; margin-bottom: 10px; text-transform: uppercase; }

        #myStatusDisplay { font-size: 12px; color: #888; display: block; margin-bottom: 8px; font-style: italic; }
        .status-box { display: flex; gap: 5px; padding: 0 10px; }
        .status-box input { flex: 1; background: #000; border: 1px solid red; color: #fff; padding: 6px; border-radius: 4px; font-size: 11px; outline: none; }
        .save-btn { background: red; border: none; color: #fff; padding: 0 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* ოთახების სია */
        .rooms-list { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        .room-item { padding: 12px 20px; color: #ccc; cursor: pointer; border-bottom: 1px solid #111; display: flex; align-items: center; font-size: 14px; transition: 0.2s; }
        .room-item:hover, .room-item.active { background: #1a0000; color: red; border-left: 4px solid red; }

        /* ჩატის არეალი */
        .main-chat { flex-grow: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        .chat-header { height: 60px; border-bottom: 2px solid red; display: flex; align-items: center; padding: 0 15px; background: #0d0d0d; font-weight: bold; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        
        /* მესიჯები */
        .msg-row { display: flex; gap: 10px; max-width: 85%; }
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1px solid red; flex-shrink: 0; object-fit: cover; }
        .msg-content { display: flex; flex-direction: column; }
        .msg-user { font-size: 10px; color: red; font-weight: bold; margin-bottom: 2px; }
        .msg-bubble { background: #1a1a1a; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
        .me .msg-bubble { background: red; color: #fff; }

        /* ტექსტის შესაყვანი */
        .chat-input-bar { padding: 15px; background: #0d0d0d; border-top: 1px solid #222; display: flex; gap: 10px; }
        .text-input { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 25px; padding: 12px 20px; color: #fff; outline: none; }
        .send-btn { background: red; border: none; width: 45px; height: 45px; border-radius: 50%; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        @media (max-width: 800px) {
            .sidebar { position: fixed; left: -300px; height: 100%; width: 280px; }
            .sidebar.active { left: 0; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <nav class="sidebar" id="sidebar">
        <div class="profile-section">
            <div class="avatar-wrapper">
                <img src="https://via.placeholder.com/90" id="myImg" class="avatar-img">
                <label for="imgInp" class="upload-btn">📷</label>
                <input type="file" id="imgInp" hidden accept="image/*" onchange="uploadAvatar(this)">
            </div>
            <p id="myNick">იტვირთება...</p>
            <span class="role-badge" id="myRole">მოთამაშე</span>
            <div class="status-area">
                <span id="myStatusDisplay">სტატუსი არაა</span>
                <div class="status-box">
                    <input type="text" id="statusInp" placeholder="შეცვალე...">
                    <button class="save-btn" onclick="saveStatus()">✅</button>
                </div>
            </div>
        </div>

        <div class="rooms-list">
            <div class="room-item active" onclick="switchRoom('💬', 'ზოგადი ჩატი', this)">💬 ზოგადი ჩატი</div>
            <div class="room-item" onclick="switchRoom('💎', 'VIP საუბრები', this)">💎 VIP საუბრები</div>
            <div class="room-item" onclick="switchRoom('🔍', 'გამოძიება', this)">🔍 გამოძიება</div>
            <div class="room-item" onclick="switchRoom('🔐', 'შიფროგრამა', this)">🔐 შიფროგრამა</div>
            <div class="room-item" onclick="switchRoom('🧩', 'ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="room-item" onclick="switchRoom('🪢', 'ჩამოხრჩობანა', this)">🪢 ჩამოხრჩობანა</div>
            <div class="room-item" onclick="switchRoom('🌑', 'მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="room-item" onclick="switchRoom('🎵', 'მუსიკა', this)">🎵 მუსიკა</div>
            <div class="room-item" onclick="switchRoom('🖼️', 'გალერეა', this)">🖼️ გალერეა</div>
            <div class="room-item" onclick="switchRoom('📝', 'ფორუმი', this)">📝 ფორუმი</div>
            <div class="room-item" onclick="switchRoom('🛡️', 'ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
        </div>
        <button onclick="logout()" style="margin:15px; background:none; border:1px solid red; color:red; padding:10px; cursor:pointer; border-radius:5px;">🚪 გასვლა</button>
    </nav>

    <main class="main-chat">
        <header class="chat-header">
            <button onclick="document.getElementById('sidebar').classList.toggle('active')" style="background:red; border:none; color:white; padding:8px 12px; margin-right:12px; border-radius:5px; cursor:pointer;">☰</button>
            <span id="roomTitle" style="color:red;">💬 ზოგადი ჩატი</span>
        </header>
        <div class="chat-messages" id="chatBox"></div>
        <div class="chat-input-bar">
            <input type="text" id="msgInput" class="text-input" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </main>
</div>

<script>
    const sb = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let me = { id: '', nick: '', role: '', avatar: '' };
    let room = 'ზოგადი ჩატი';

    async function init() {
        const { data: { user: auth } } = await sb.auth.getUser();
        if (!auth) { window.location.href = "index.html"; return; }
        
        let { data: p } = await sb.from('profiles').select('*').eq('id', auth.id).single();
        if(!p) {
            // თუ პროფილი არ არსებობს, ვქმნით
            const { data: n } = await sb.from('profiles').insert([{ id: auth.id, username: 'მოთამაშე', role: 'user' }]).select().single();
            p = n;
        }

        me = { id: auth.id, nick: p.username, role: p.role, avatar: p.avatar_url || 'https://via.placeholder.com/90' };

        document.getElementById('myNick').innerText = me.nick;
        document.getElementById('myImg').src = me.avatar;
        document.getElementById('myStatusDisplay').innerText = p.status || "სტატუსი არაა";
        
        const badge = document.getElementById('myRole');
        if(me.role === 'owner') { badge.innerText = 'დამფუძნებელი'; badge.style.background = 'gold'; badge.style.color = '#000'; }
        else if(me.role === 'admin') { badge.innerText = 'ადმინისტრატორი'; badge.style.background = 'red'; }
        else { badge.innerText = 'მოთამაშე'; badge.style.background = '#333'; }

        loadMsgs();
        sb.channel('global').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMsgs()).subscribe();
    }

    async function loadMsgs() {
        const { data } = await sb.from('messages').select('*').eq('room', room).order('created_at', { ascending: true });
        const box = document.getElementById('chatBox');
        if(!data) return;
        box.innerHTML = data.map(m => `
            <div class="msg-row ${m.user_id === me.id ? 'me' : ''}">
                <img src="${m.avatar || 'https://via.placeholder.com/40'}" class="msg-avatar">
                <div class="msg-content">
                    <span class="msg-user">${m.username}</span>
                    <div class="msg-bubble" onclick="adminAction('${m.id}', '${m.user_id}', '${m.username}')">${m.text}</div>
                </div>
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim()) return;
        await sb.from('messages').insert([{ text: input.value, room, user_id: me.id, username: me.nick, avatar: me.avatar }]);
        input.value = "";
    }

    async function saveStatus() {
        const txt = document.getElementById('statusInp').value;
        if(!txt) return;
        await sb.from('profiles').update({ status: txt }).eq('id', me.id);
        document.getElementById('myStatusDisplay').innerText = txt;
        document.getElementById('statusInp').value = "";
        alert("შენახულია!");
    }

    async function uploadAvatar(input) {
        const file = input.files[0];
        if(!file) return;
        const path = `avatars/${me.id}_${Date.now()}.png`;
        const { data, error } = await sb.storage.from('avatars').upload(path, file);
        if(data) {
            const { data: { publicUrl } } = sb.storage.from('avatars').getPublicUrl(path);
            await sb.from('profiles').update({ avatar_url: publicUrl }).eq('id', me.id);
            document.getElementById('myImg').src = publicUrl;
            me.avatar = publicUrl;
            alert("ავატარი განახლდა!");
        }
    }

    function switchRoom(icon, name, el) {
        room = name;
        document.getElementById('roomTitle').innerText = icon + " " + name;
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        loadMsgs();
        if(window.innerWidth < 800) document.getElementById('sidebar').classList.remove('active');
    }

    async function adminAction(mid, uid, uname) {
        if(me.role !== 'owner' && me.role !== 'admin') return;
        if(uid === me.id) return;
        const a = prompt(`მართვა: ${uname}\n1: წაშლა\n2: ბლოკი`);
        if(a === "1") await sb.from('messages').delete().eq('id', mid);
    }

    async function logout() { await sb.auth.signOut(); window.location.href="index.html"; }
    init();
</script>
</body>
</html>
