<style>
    /* ჰედერის შესწორება */
    .header { 
        height: 60px; background: #000; border-bottom: 2px solid red; 
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        display: flex; align-items: center; justify-content: space-between; /* ეს გაყოფს მენიუს და პირადს */
        padding: 0 15px; position: relative; z-index: 2001;
    }
    .header-left { display: flex; align-items: center; }
    .pm-trigger { 
        color: red; font-size: 22px; cursor: pointer; 
        text-shadow: 0 0 10px red; padding: 5px;
    }

    /* თვითმფრინავის ღილაკი */
    .send-btn { 
        background: red; color: #000; width: 45px; height: 45px; 
        border-radius: 50%; border: none; font-size: 24px;
        box-shadow: 0 0 15px red; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: 0.3s;
    }
    .send-btn:active { transform: scale(0.9); box-shadow: 0 0 5px red; }

    /* მენიუდან ამოვიღე პირადი ყუთი */
    .room-item.pm-link { display: none; } 
</style>

<div class="header">
    <div class="header-left">
        <div class="burger" onclick="toggleMenu()">☰</div>
        <div id="roomTitle">კაიფმანია 😎🔥</div>
    </div>
    <div class="pm-trigger" onclick="loadPMs(this)">📩</div>
</div>

<div class="input-area">
    <div class="input-box"><input type="text" id="msgInput" placeholder="დაწერე მესიჯი..."></div>
    <button class="send-btn" onclick="sendMsg()">✈️</button>
</div>
