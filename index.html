<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>კაიფმანია</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {
    background: radial-gradient(circle, #330000 0%, #000 70%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
    margin: 0;
}
.card {
    background: #0d0d0d;
    padding: 40px;
    border-radius: 30px;
    text-align: center;
    border: 2px solid red;
    box-shadow: 0 0 50px rgba(255,0,0,0.3);
    width: 320px;
}
h1 {
    color: white;
    text-shadow: 0 0 10px red;
    margin-bottom: 30px;
}
input {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    background: #1a1a1a;
    border: 1px solid #333;
    color: white;
    border-radius: 12px;
    box-sizing: border-box;
}
button {
    background: red;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    margin: 5px;
    font-size: 16px;
    font-weight: bold;
}
button:hover {
    background: darkred;
}
.hidden {
    display: none;
}
#message {
    color: #ff6666;
    margin-top: 15px;
    font-size: 13px;
}
.back-link {
    color: #888;
    cursor: pointer;
    font-size: 12px;
    margin-top: 10px;
    display: inline-block;
}
</style>
</head>
<body>

<div class="card">
    <h1>🔥 კაიფმანია 🔥</h1>
    
    <div id="mainButtons">
        <button onclick="showForm('reg')">📝 რეგისტრაცია</button>
        <button onclick="showForm('log')">🔑 შესვლა</button>
    </div>
    
    <div id="formSection" class="hidden">
        <input type="text" id="nickname" placeholder="ნიკნეიმი">
        <input type="password" id="password" placeholder="პაროლი">
        <button id="submitBtn" onclick="handleAuth()">✅ გაგზავნა</button>
        <div class="back-link" onclick="location.reload()">◀ უკან დაბრუნება</div>
    </div>
    
    <p id="message"></p>
</div>

<script>
const SUPABASE_URL = "https://ftfciebnywbondaiarnc.supabase.co";
const SUPABASE_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let mode = "";

function showForm(m) {
    mode = m;
    document.getElementById("mainButtons").classList.add("hidden");
    document.getElementById("formSection").classList.remove("hidden");
    document.getElementById("submitBtn").innerText = (m === 'reg') ? "📝 რეგისტრაცია" : "🔑 შესვლა";
    document.getElementById("message").innerText = "";
}

async function handleAuth() {
    const nick = document.getElementById("nickname").value.trim();
    const pass = document.getElementById("password").value.trim();
    const msg = document.getElementById("message");

    if (!nick || !pass) {
        msg.innerText = "⚠️ შეავსე ყველა ველი!";
        return;
    }

    if (mode === "reg") {
        console.log("რეგისტრაცია:", nick);
        
        // ვამოწმებთ არსებობს თუ არა უკვე
        const { data: existing, error: checkError } = await supabase
            .from('users')
            .select('nickname')
            .eq('nickname', nick);
        
        if (checkError) {
            console.error("შემოწმების შეცდომა:", checkError);
            msg.innerText = "❌ შეცდომა: " + checkError.message;
            return;
        }
        
        if (existing && existing.length > 0) {
            msg.innerText = "❌ ეს ნიკნეიმი უკვე დაკავებულია!";
            return;
        }
        
        // ახალი მომხმარებლის დამატება
        const { data, error } = await supabase
            .from('users')
            .insert([{
                nickname: nick,
                password: pass,
                role: 'Member',
                status: 'online',
                shipro_score: 0,
                quiz_score: 0,
                hang_score: 0,
                joker_score: 0,
                nardi_score: 0,
                avatar_url: '',
                is_banned: false
            }]);
        
        if (error) {
            console.error("ჩაწერის შეცდომა:", error);
            msg.innerText = "❌ შეცდომა: " + error.message;
        } else {
            alert("✅ წარმატებით დარეგისტრირდი! 🎉");
            location.reload();
        }
        
    } else if (mode === "log") {
        console.log("შესვლა:", nick);
        
        const { data, error } = await supabase
            .from('users')
            .select('*')
            .eq('nickname', nick)
            .eq('password', pass);
        
        if (error) {
            console.error("შესვლის შეცდომა:", error);
            msg.innerText = "❌ შეცდომა: " + error.message;
        } else if (data && data.length > 0) {
            localStorage.setItem('nickname', nick);
            localStorage.setItem('userId', data[0].id);
            alert("✅ წარმატებით შეხვედი! 👋");
            // window.location.href = "chat.html";
        } else {
            msg.innerText = "❌ ნიკნეიმი ან პაროლი არასწორია!";
        }
    }
}
</script>
</body>
</html>
