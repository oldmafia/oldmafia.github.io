<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კაიფმანია</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: radial-gradient(circle, #330000 0%, #000 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .card {
            background: #0d0d0d;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid red;
            width: 350px;
        }
        h1 { color: white; text-shadow: 0 0 10px red; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
        }
        button {
            background: red;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
            font-size: 16px;
        }
        button:hover { background: darkred; }
        .hidden { display: none; }
        #message { color: #ff6666; margin-top: 15px; }
        .back-link { color: #888; cursor: pointer; margin-top: 15px; display: inline-block; }
    </style>
</head>
<body>

<div class="card">
    <h1>🔥 კაიფმანია 🔥</h1>
    
    <div id="mainButtons">
        <button onclick="showForm('reg')">📝 რეგისტრაცია</button>
        <button onclick="showForm('log')">🔑 შესვლა</button>
    </div>
    
    <div id="formSection" class="hidden">
        <input type="email" id="email" placeholder="ელ. ფოსტა">
        <input type="text" id="nickname" placeholder="ნიკნეიმი">
        <input type="password" id="password" placeholder="პაროლი (მინ 6 სიმბოლო)">
        <button id="submitBtn" onclick="handleAuth()">✅ გაგზავნა</button>
        <div class="back-link" onclick="location.reload()">◀ უკან</div>
    </div>
    
    <p id="message"></p>
</div>

<script>
const supabase = supabase.createClient(
    "https://ftfciebnywbondaiarnc.supabase.co",
    "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
);

let mode = "";

async function checkUser() {
    const { data: { user } } = await supabase.auth.getUser();
    if (user) {
        document.getElementById("mainButtons").innerHTML = '<p style="color:green;">✅ შესული ხარ!</p><button onclick="logout()">🚪 გასვლა</button>';
    }
}
checkUser();

async function logout() {
    await supabase.auth.signOut();
    location.reload();
}

function showForm(m) {
    mode = m;
    document.getElementById("mainButtons").classList.add("hidden");
    document.getElementById("formSection").classList.remove("hidden");
    const btn = document.getElementById("submitBtn");
    btn.innerText = (m === 'reg') ? "📝 რეგისტრაცია" : "🔑 შესვლა";
    
    // რეგისტრაციისას ნიკნეიმი სავალდებულოა
    document.getElementById("nickname").style.display = (m === 'reg') ? "block" : "none";
    document.getElementById("message").innerText = "";
}

async function handleAuth() {
    const email = document.getElementById("email").value.trim();
    const nick = document.getElementById("nickname").value.trim();
    const pass = document.getElementById("password").value.trim();
    const msg = document.getElementById("message");

    if (mode === "reg") {
        if (!email || !nick || !pass) {
            msg.innerText = "⚠️ შეავსე ყველა ველი!";
            return;
        }
        if (pass.length < 6) {
            msg.innerText = "⚠️ პაროლი უნდა იყოს მინიმუმ 6 სიმბოლო!";
            return;
        }
        
        msg.innerText = "🔄 რეგისტრაცია მიმდინარეობს...";
        
        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: pass,
            options: {
                data: { username: nick }
            }
        });
        
        if (error) {
            msg.innerText = "❌ " + error.message;
        } else {
            msg.innerText = "✅ რეგისტრაცია წარმატებულია! შეამოწმე ელ.ფოსტა დასადასტურებლად.";
            setTimeout(() => location.reload(), 3000);
        }
        
    } else if (mode === "log") {
        if (!email || !pass) {
            msg.innerText = "⚠️ შეავსე ელ.ფოსტა და პაროლი!";
            return;
        }
        
        msg.innerText = "🔄 შესვლა მიმდინარეობს...";
        
        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: pass
        });
        
        if (error) {
            msg.innerText = "❌ ელ.ფოსტა ან პაროლი არასწორია!";
        } else {
            msg.innerText = "✅ წარმატებით შეხვედი!";
            setTimeout(() => location.reload(), 1500);
        }
    }
}
</script>
</body>
</html>
