<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #330000 0%, #000 70%);
            font-family: Arial;
        }
        
        .card {
            background: #0d0d0d;
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 50px red;
            border: 1px solid red;
        }
        
        h1 {
            color: white;
            text-shadow: 0 0 20px red;
            margin-bottom: 30px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid red;
            background: #1a1a1a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: red;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        button:hover {
            background: darkred;
        }
        
        .back-link {
            color: #888;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
            display: inline-block;
        }
        
        #message {
            color: #ff8888;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>კაიფმანია 🔥</h1>
        
        <div id="mainButtons">
            <button onclick="showReg()">რეგისტრაცია</button>
            <button onclick="showLogin()">შესვლა</button>
        </div>
        
        <div id="regForm" class="hidden">
            <input type="text" id="regNick" placeholder="ნიკნეიმი">
            <input type="password" id="regPass" placeholder="პაროლი">
            <button onclick="register()">რეგისტრაცია</button>
            <span class="back-link" onclick="backToMenu()">უკან</span>
        </div>
        
        <div id="loginForm" class="hidden">
            <input type="text" id="loginNick" placeholder="ნიკნეიმი">
            <input type="password" id="loginPass" placeholder="პაროლი">
            <button onclick="login()">შესვლა</button>
            <span class="back-link" onclick="backToMenu()">უკან</span>
        </div>
        
        <div id="message"></div>
    </div>

    <script>
        const supabaseUrl = 'https://ftfciebnywbondaiarnc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0ZmNpZWJueXdib25kYWlhcm5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMjYwNTYsImV4cCI6MjA4NjkwMjA1Nn0.2A5wgpS2gaFmgnGB2mWH7dpmjLvo75IE0QPRPrtUbzI';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);
        
        function showReg() {
            document.getElementById('mainButtons').classList.add('hidden');
            document.getElementById('regForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('message').innerHTML = '';
        }
        
        function showLogin() {
            document.getElementById('mainButtons').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('regForm').classList.add('hidden');
            document.getElementById('message').innerHTML = '';
        }
        
        function backToMenu() {
            document.getElementById('mainButtons').classList.remove('hidden');
            document.getElementById('regForm').classList.add('hidden');
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('message').innerHTML = '';
        }
        
        async function register() {
            const nick = document.getElementById('regNick').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            const msg = document.getElementById('message');
            
            if (!nick || !pass) {
                msg.innerHTML = '⚠️ შეავსე ყველა ველი!';
                return;
            }
            
            const { data: existing } = await supabase.from('profiles').select('username').eq('username', nick).maybeSingle();
            if (existing) {
                msg.innerHTML = '❌ ნიკი დაკავებულია!';
                return;
            }
            
            const { error } = await supabase.from('profiles').insert([{ username: nick, password: pass, role: 'user' }]);
            if (error) {
                msg.innerHTML = '❌ შეცდომა: ' + error.message;
            } else {
                alert('✅ რეგისტრაცია წარმატებულია! ახლა შედი.');
                backToMenu();
            }
        }
        
        async function login() {
            const nick = document.getElementById('loginNick').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const msg = document.getElementById('message');
            
            if (!nick || !pass) {
                msg.innerHTML = '⚠️ შეავსე ყველა ველი!';
                return;
            }
            
            const { data: user } = await supabase.from('profiles').select('*').eq('username', nick).maybeSingle();
            
            if (user && user.password === pass) {
                localStorage.setItem('mafia_user', user.username);
                localStorage.setItem('mafia_user_id', user.id);
                window.location.href = 'chat.html';
            } else {
                msg.innerHTML = '❌ ნიკი ან პაროლი არასწორია!';
            }
        }
    </script>
</body>
</html>
