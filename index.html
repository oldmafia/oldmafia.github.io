<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - NO FLICKER</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { height: 60px; border-bottom: 2px solid red; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #000; z-index: 1001; }
        .burger { color: red; font-size: 26px; cursor: pointer; }
        #roomTitle { font-size: 14px; font-weight: bold; color: #fff; text-transform: uppercase; }

        #sidebar { position: fixed; top: 0; left: -100%; width: 80%; height: 100%; background: #000; transition: 0.3s; z-index: 2000; border-right: 2px solid red; overflow-y: auto; }
        #sidebar.open { left: 0; }
        .prof-section { padding: 30px 20px; text-align: center; border-bottom: 1px solid #222; }
        .prof-pic { width: 75px; height: 75px; border-radius: 50%; border: 2px solid red; margin-bottom: 10px; object-fit: cover; }
        
        .room-item { padding: 15px 25px; border-bottom: 1px solid #111; color: #bbb; cursor: pointer; }
        .room-item.active { color: red; font-weight: bold; border-left: 5px solid red; background: #080808; }

        #msgList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; scroll-behavior: smooth; }
        .msg-row { display: flex; flex-direction: column; align-items: flex-start; max-width: 85%; align-self: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 18px; background: #111; border: 1px solid #222; border-bottom-left-radius: 2px; position: relative; width: 100%; animation: fadeIn 0.3s ease; }
        .me .bubble { border-color: red; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .u-nick { font-size: 11px; font-weight: bold; color: #ff4d4d; display: block; margin-bottom: 3px; }
        .m-time { font-size: 9px; color: #555; float: right; margin-top: 5px; margin-left: 10px; }

        .input-area { padding: 12px; border-top: 1px solid red; display: flex; gap: 10px; background: #000; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid red; border-radius: 25px; padding: 0 15px; height: 45px; display: flex; align-items: center; }
        input { width: 100%; border: none; background: transparent; color: #fff; outline: none; font-size: 16px; }
        .send-btn { background: red; color: #000; width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="burger" onclick="toggleMenu()">☰</div>
        <div id="roomTitle">💬 კაიფმანია</div>
        <div style="width:26px;"></div>
    </div>

    <div id="sidebar">
        <div class="prof-section">
            <img src="" class="prof-pic" id="myImg">
            <p id="myNick" style="font-weight:bold; color: #fff;"></p>
        </div>
        <div id="roomsContainer">
            <div class="room-item active" onclick="changeRoom('💬 კაიფმანია', this)">💬 კაიფმანია</div>
            <div class="room-item" onclick="changeRoom('🍷 კაფე-ბარი', this)">🍷 კაფე-ბარი</div>
            <div class="room-item" onclick="changeRoom('🔐 VIP-საუბრები', this)">🔐 VIP-საუბრები</div>
            <div class="room-item" onclick="changeRoom('🧩 ვიქტორინა', this)">🧩 ვიქტორინა</div>
            <div class="room-item" onclick="changeRoom('🔓 შიფროგრამა', this)">🔓 შიფროგრამა</div>
            <div class="room-item" onclick="changeRoom('🌑 მაფიის ღამე', this)">🌑 მაფიის ღამე</div>
            <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
            <div class="room-item" onclick="changeRoom('⚜️ ნარდი', this)">⚜️ ნარდი</div>
            <div class="room-item" onclick="changeRoom('💖 სიყვარული', this)">💖 სიყვარული</div>
            <div class="room-item" onclick="changeRoom('🤣 იუმორი', this)">🤣 იუმორი</div>
            <div class="room-item" onclick="changeRoom('🎵 მელომანია', this)">🎵 მელომანია</div>
            <div class="room-item" onclick="changeRoom('📜 ფორუმი', this)">📜 ფორუმი</div>
            <div class="room-item" onclick="changeRoom('🛡️ ადმინისტრაცია', this)">🛡️ ადმინისტრაცია</div>
            <div class="room-item" onclick="changeRoom('🆘 SOS', this)">🆘 SOS</div>
            <div class="room-item" onclick="logout()" style="color:red; margin-top:20px;">🚪 გასვლა</div>
        </div>
    </div>

    <div id="msgList"></div>

    <div class="input-area">
        <div class="input-box"><input type="text" id="msgInput" placeholder="დაწერე მესიჯი..." autocomplete="off"></div>
        <button class="send-btn" onclick="sendMsg()">✈️</button>
    </div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let myId, myName, myAvatar, currentRoom = '💬 კაიფმანია';

    async function init() {
        const { data: { user } } = await client.auth.getUser();
        if(!user) return window.location.href = 'index.html';
        myId = user.id;

        let rawNick = user.user_metadata?.username || user.user_metadata?.nickname || user.email.split('@')[0];
        myName = rawNick.includes('@') ? rawNick.split('@')[0] : rawNick;
        myAvatar = `https://ui-avatars.com/api/?name=${myName}&background=000&color=f00`;

        await client.from('profiles').upsert({ id: myId, username: myName, avatar_url: myAvatar });

        document.getElementById('myNick').innerText = myName;
        document.getElementById('myImg').src = myAvatar;

        loadMsgs();
        
        client.channel('chat').on('postgres_changes', { event: 'INSERT', table: 'messages' }, (p) => {
            if(p.new.room_name === currentRoom && p.new.user_id !== myId) appendMsg(p.new);
        }).subscribe();
    }

    async function loadMsgs() {
        const list = document.getElementById('msgList');
        const { data: msgs } = await client.from('messages').select('*').eq('room_name', currentRoom).order('created_at', { ascending: true });
        list.innerHTML = ""; // მხოლოდ ჩატვირთვისას ვასუფთავებთ ერთხელ
        if(msgs) msgs.forEach(m => appendMsg(m));
    }

    function appendMsg(m) {
        const list = document.getElementById('msgList');
        const isMe = m.user_id === myId;
        const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        const div = document.createElement('div');
        div.className = `msg-row ${isMe ? 'me' : ''}`;
        div.innerHTML = `
            <div class="bubble">
                <span class="u-nick">${m.username || "სტუმარი"}</span>
                <span>${m.text}</span>
                <span class="m-time">${time}</span>
            </div>`;
        
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('msgInput');
        const text = inp.value.trim();
        if(!text) return;
        inp.value = ''; // ეგრევე ვასუფთავებთ ინპუტს, რომ არ დაიჭედოს

        const { error } = await client.from('messages').insert([{ 
            user_id: myId, username: myName, text: text, room_name: currentRoom 
        }]);

        if(!error) {
            appendMsg({ user_id: myId, username: myName, text: text, created_at: new Date().toISOString() });
        }
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    
    function changeRoom(name, el) {
        currentRoom = name;
        document.getElementById('roomTitle').innerText = name;
        document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        toggleMenu();
        loadMsgs();
    }

    async function logout() { await client.auth.signOut(); window.location.href = 'index.html'; }
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
    init();
</script>
</body>
</html>
