<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>კაიფმანია - შესვლა</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #330000 0%, #000 70%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.card-wrapper {
    position: relative;
    width: 350px;
}

.card-wrapper::before {
    content: "";
    position: absolute;
    inset: 0;
    background: red;
    border-radius: 30px;
    transform: rotate(-4deg);
    box-shadow: 0 0 80px red;
    z-index: 0;
}

.card {
    position: relative;
    background: #0d0d0d;
    padding: 40px 25px;
    border-radius: 30px;
    transform: rotate(-2deg);
    z-index: 1;
    text-align: center;
    border: 1px solid #222;
}

h1 {
    color: white;
    text-shadow: 0 0 20px red;
    margin-bottom: 25px;
    font-size: 28px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: white;
    outline: none;
    box-sizing: border-box;
}

input:focus {
    border-color: red;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 20px;
    background: red;
    color: white;
    font-weight: bold;
    margin-bottom: 12px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    background: darkred;
    box-shadow: 0 0 15px red;
}

.hidden {
    display: none;
}

#message {
    color: white;
    margin-top: 10px;
    min-height: 20px;
    font-size: 13px;
}
</style>
</head>
<body>

<div class="card-wrapper">
    <div class="card">
        <h1>კაიფმანია 😎🔥</h1>

        <div id="mainButtons">
            <button id="regBtn">რეგისტრაცია</button>
            <button id="logBtn">შესვლა</button>
        </div>

        <div id="formSection" class="hidden">
            <input type="text" id="nickname" placeholder="აირჩიე ნიკნეიმი">
            <input type="email" id="email" placeholder="ელფოსტა">
            <input type="password" id="password" placeholder="პაროლი">
            <button id="submitBtn"></button>
            <button onclick="location.reload()" style="background:transparent; font-size:12px; color:#555;">უკან დაბრუნება</button>
        </div>

        <p id="message"></p>
    </div>
</div>

<script>
// Supabase-ის კონფიგურაცია
const { createClient } = supabase;
const supabaseClient = createClient(
  "https://ftfciebnywbondaiarnc.supabase.co",
  "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
);

const mainButtons = document.getElementById("mainButtons");
const formSection = document.getElementById("formSection");
const nicknameInput = document.getElementById("nickname");
const submitBtn = document.getElementById("submitBtn");
const message = document.getElementById("message");

// ღილაკების ლოგიკა
document.getElementById("regBtn").addEventListener("click", () => {
  mainButtons.classList.add("hidden");
  formSection.classList.remove("hidden");
  nicknameInput.style.display = "block";
  submitBtn.innerText = "რეგისტრაცია";
  submitBtn.onclick = register;
});

document.getElementById("logBtn").addEventListener("click", () => {
  mainButtons.classList.add("hidden");
  formSection.classList.remove("hidden");
  nicknameInput.style.display = "none";
  submitBtn.innerText = "შესვლა";
  submitBtn.onclick = login;
});

// რეგისტრაციის ფუნქცია
async function register() {
  const nickname = nicknameInput.value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!nickname || !email || !password) {
    message.innerText = "⚠️ შეავსე ყველა ველი";
    return;
  }

  message.innerText = "მიმდინარეობს რეგისტრაცია...";

  // 1. ვარეგისტრირებთ მომხმარებელს Auth-ში
  const { data, error } = await supabaseClient.auth.signUp({
    email: email,
    password: password,
    options: {
      data: { nickname: nickname }
    }
  });

  if(error) {
    message.innerText = "❌ " + error.message;
    return;
  }

  // 2. ავტომატურად ვამატებთ ნიკს Profiles ცხრილში
  if (data.user) {
    const { error: profileError } = await supabaseClient
      .from('profiles')
      .insert([{ id: data.user.id, username: nickname }]);

    if (profileError) {
      console.log("ბაზაში ნიკი ვერ ჩაიწერა:", profileError.message);
    }
  }

  localStorage.setItem('username', nickname);
  message.style.color = "#00ff00";
  message.innerText = "✅ წარმატებით დარეგისტრირდი!";
  
  setTimeout(() => { window.location.href = "home.html"; }, 1500);
}

// შესვლის ფუნქცია
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password) {
    message.innerText = "⚠️ შეიყვანე მეილი და პაროლი";
    return;
  }

  message.innerText = "მოწმდება მონაცემები...";

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });

  if(error) {
    message.innerText = "❌ " + error.message;
    return;
  }

  // ნიკის წამოღება მეტამონაცემებიდან
  const userNickname = data.user.user_metadata.nickname || "მოთამაშე";
  localStorage.setItem('username', userNickname);

  message.style.color = "#00ff00";
  message.innerText = "✅ მოგესალმებით, " + userNickname + "!";
  
  setTimeout(() => { window.location.href = "home.html"; }, 1500);
}
</script>

</body>
</html>
