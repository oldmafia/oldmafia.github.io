<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - ჩატი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        
        /* მარცხენა მენიუ (ოთახები) */
        .sidebar { width: 80px; background: #0d0d0d; border-right: 1px solid #222; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; }
        .room-icon { width: 50px; height: 50px; background: #1a1a1a; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid #333; transition: 0.3s; font-size: 12px; text-align: center; }
        .room-icon:hover { border-color: red; box-shadow: 0 0 10px red; }
        .room-icon.active { border-color: red; background: #300; }

        /* მთავარი ჩატის არე */
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; background: #0d0d0d; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* მესიჯის სტილი */
        .msg { background: #111; padding: 10px; border-radius: 10px; border-left: 3px solid red; max-width: 80%; }
        .msg b { color: red; display: block; font-size: 12px; margin-bottom: 3px; }

        /* ქვედა საწერი ზოლი */
        .input-area { padding: 20px; background: #0d0d0d; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px; color: white; border-radius: 10px; outline: none; }
        input:focus { border-color: red; }
        button { background: red; color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="room-icon active" onclick="changeRoom('general', this)">ზოგადი</div>
        <div class="room-icon" onclick="changeRoom('mafia', this)">მაფია</div>
        <div class="room-icon" onclick="changeRoom('vip', this)">VIP</div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <span id="room-name">ოთახი: ზოგადი</span>
            <span id="user-nickname" style="color: #555; font-size: 14px;">იტვირთება...</span>
        </div>

        <div class="messages-container" id="chat-messages">
            </div>

        <div class="input-area">
            <input type="text" id="msgInput" placeholder="დაწერე შეტყობინება...">
            <button onclick="sendMessage()">გაგზავნა</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://ftfciebnywbondaiarnc.supabase.co";
        const SB_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = 'general';
        let myNickname = '';

        // 1. მომხმარებლის ნიკის გაგება
        async function loadProfile() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('username')
                .eq('id', user.id)
                .single();

            myNickname = profile ? profile.username : user.email;
            document.getElementById('user-nickname').innerText = "შენი ნიკი: " + myNickname;
            
            loadMessages(); // მესიჯების ჩატვირთვა
        }

        // 2. ოთახის შეცვლა
        function changeRoom(room, el) {
            currentRoom = room;
            document.getElementById('room-name').innerText = "ოთახი: " + room.toUpperCase();
            
            // ღილაკების ფერის შეცვლა
            document.querySelectorAll('.room-icon').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            document.getElementById('chat-messages').innerHTML = ''; // გასუფთავება
            loadMessages();
        }

        // 3. ძველი მესიჯების ჩატვირთვა
        async function loadMessages() {
            const { data } = await supabaseClient
                .from('messages')
                .select('*')
                .eq('room', currentRoom)
                .order('inserted_at', { ascending: true });

            if (data) {
                data.forEach(msg => renderMessage(msg));
            }
        }

        // 4. მესიჯის გაგზავნა
        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            const { data: { user } } = await supabaseClient.auth.getUser();

            const { error } = await supabaseClient
                .from('messages')
                .insert([{ 
                    content: text, 
                    user_id: user.id, 
                    user_email: myNickname, 
                    room: currentRoom 
                }]);

            if (!error) input.value = '';
        }

        // 5. მესიჯის ეკრანზე დახატვა
        function renderMessage(msg) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>${msg.user_email}</b> ${msg.content}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // 6. რეალურ დროში მოსმენა
        supabaseClient
            .channel('schema-db-changes')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                if (payload.new.room === currentRoom) {
                    renderMessage(payload.new);
                }
            })
            .subscribe();

        loadProfile();
    </script>
</body>
</html>
