<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #330000 0%, #000 70%);
            font-family: Arial;
            overflow: hidden;
        }

        /* ბარათის გარე "ჩარჩო" რომელიც ქმნის დახრილ ნათებას */
        .card-wrapper {
            position: relative;
            width: 350px;
        }

        .card-wrapper::before {
            content: "";
            position: absolute;
            inset: 0;
            background: red;
            border-radius: 30px;
            transform: rotate(-4deg); /* აი აქ არის დახრა */
            box-shadow: 0 0 80px red;
            z-index: 0;
        }

        /* მთავარი ბარათი */
        .card {
            position: relative;
            background: #0d0d0d;
            padding: 40px 25px;
            border-radius: 30px;
            transform: rotate(-2deg); /* ესეც დახრილია საპირისპიროდ */
            z-index: 1;
            text-align: center;
            border: 1px solid #222;
        }

        h1 {
            color: white;
            text-shadow: 0 0 20px red;
            margin-bottom: 25px;
            font-size: 26px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: none;
            background: #1a1a1a;
            color: white;
            outline: none;
            border: 1px solid #333;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 20px;
            background: red;
            color: white;
            font-weight: bold;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: darkred;
        }

        .hidden { display: none; }

        #message {
            color: white;
            margin-top: 10px;
            min-height: 20px;
            font-size: 13px;
        }

        .back-link {
            color: #888;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

<div class="card-wrapper">
    <div class="card">
        <h1>კაიფმანია 😎🔥</h1>

        <div id="mainButtons">
            <button onclick="openForm('reg')">რეგისტრაცია</button>
            <button onclick="openForm('log')">შესვლა</button>
        </div>

        <div id="formSection" class="hidden">
            <input type="text" id="nickname" placeholder="ნიკნეიმი">
            <input type="password" id="password" placeholder="პაროლი">
            <button id="submitBtn" onclick="handleAuth()">გაგზავნა</button>
            <span class="back-link" onclick="goBack()">← უკან</span>
        </div>

        <p id="message"></p>
    </div>
</div>

<script>
    const _supabase = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");

    let mode = "";

    function openForm(m) {
        mode = m;
        document.getElementById("mainButtons").classList.add("hidden");
        document.getElementById("formSection").classList.remove("hidden");
        document.getElementById("submitBtn").innerText = (m === 'reg') ? "რეგისტრაცია" : "შესვლა";
        document.getElementById("message").innerText = "";
    }

    function goBack() {
        document.getElementById("mainButtons").classList.remove("hidden");
        document.getElementById("formSection").classList.add("hidden");
    }

    async function handleAuth() {
        const nick = document.getElementById("nickname").value.trim();
        const pass = document.getElementById("password").value.trim();
        const msg = document.getElementById("message");

        if (!nick || !pass) { msg.innerText = "შეავსე ველები!"; return; }

        if (mode === "reg") {
            const { data: user } = await _supabase.from('profiles').select('username').ilike('username', nick).maybeSingle();
            if (user) { msg.innerText = "ნიკი დაკავებულია!"; return; }

            const { error } = await _supabase.from('profiles').insert([{ username: nick, password: pass, role: 'Member' }]);
            if (!error) {
                alert("წარმატებით დარეგისტრირდი!");
                openForm('log');
            } else { msg.innerText = "შეცდომა რეგისტრაციისას."; }
        } else {
            const { data: user } = await _supabase.from('profiles').select('*').ilike('username', nick).maybeSingle();
            if (user && user.password === pass) {
                localStorage.setItem('nickname', user.username);
                window.location.href = "chat.html";
            } else {
                msg.innerText = "ნიკი ან პაროლი არასწორია!";
            }
        }
    }
</script>

</body>
</html>
