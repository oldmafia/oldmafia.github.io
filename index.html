<!DOCTYPE html>
<html>
<head>
    <title>კაიფმანია - მარტივი</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background: #1a1a1a; color: white; text-align: center; padding: 50px; font-family: Arial;">
    <h1 style="color: red;">🔥 კაიფმანია 🔥</h1>
    
    <div>
        <input type="text" id="nickname" placeholder="ნიკნეიმი" style="padding: 10px; margin: 5px; width: 200px;">
        <br>
        <input type="password" id="password" placeholder="პაროლი" style="padding: 10px; margin: 5px; width: 200px;">
        <br>
        <button onclick="register()" style="background: red; color: white; padding: 10px 20px; margin: 5px; border: none;">რეგისტრაცია</button>
        <button onclick="login()" style="background: blue; color: white; padding: 10px 20px; margin: 5px; border: none;">შესვლა</button>
    </div>
    
    <p id="result" style="margin-top: 20px;"></p>

    <script>
        const supabase = supabase.createClient(
            "https://ftfciebnywbondaiarnc.supabase.co",
            "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
        );

        async function register() {
            const nick = document.getElementById("nickname").value;
            const pass = document.getElementById("password").value;
            const result = document.getElementById("result");
            
            if (!nick || !pass) {
                result.innerText = "❌ შეავსე ველები!";
                return;
            }
            
            result.innerText = "🔄 იტვირთება...";
            
            try {
                const { data, error } = await supabase
                    .from('users')
                    .insert([{ nickname: nick, password: pass }]);
                
                if (error) {
                    result.innerText = "❌ შეცდომა: " + error.message;
                } else {
                    result.innerText = "✅ რეგისტრაცია წარმატებულია!";
                }
            } catch(err) {
                result.innerText = "❌ შეცდომა: " + err.message;
            }
        }
        
        async function login() {
            const nick = document.getElementById("nickname").value;
            const pass = document.getElementById("password").value;
            const result = document.getElementById("result");
            
            if (!nick || !pass) {
                result.innerText = "❌ შეავსე ველები!";
                return;
            }
            
            result.innerText = "🔄 იტვირთება...";
            
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('nickname', nick)
                    .eq('password', pass);
                
                if (error) {
                    result.innerText = "❌ შეცდომა: " + error.message;
                } else if (data.length > 0) {
                    result.innerText = "✅ შესვლა წარმატებულია! მოგესალმები, " + nick + "!";
                } else {
                    result.innerText = "❌ ნიკნეიმი ან პაროლი არასწორია!";
                }
            } catch(err) {
                result.innerText = "❌ შეცდომა: " + err.message;
            }
        }
    </script>
</body>
</html>
