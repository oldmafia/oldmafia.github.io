<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია - შესვლა</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .auth-box { 
            background: #111; padding: 30px; border-radius: 20px; border: 2px solid red; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); text-align: center; width: 300px; 
        }
        h2 { color: white; margin-bottom: 20px; }
        input { 
            width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; 
            border: 1px solid #333; background: #000; color: white; outline: none; 
        }
        button { 
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; 
            border: none; background: red; color: white; font-weight: bold; cursor: pointer; 
        }
        button:hover { background: #b30000; }
        .toggle-link { color: #888; font-size: 12px; margin-top: 15px; cursor: pointer; display: block; }
    </style>
</head>
<body>

<div class="auth-box" id="auth-container">
    <h2 id="title">კაიფმანია 😎🔥</h2>
    <input type="text" id="username" placeholder="ნიკი">
    <input type="password" id="password" placeholder="პაროლი">
    <button id="main-btn" onclick="handleAuth()">შესვლა</button>
    <span class="toggle-link" id="toggle-text" onclick="toggleMode()">არ გაქვს აქაუნთი? რეგისტრაცია</span>
</div>

<script>
    // Supabase-თან კავშირი
    const _supabase = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    
    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? "კაიფმანია 😎🔥" : "რეგისტრაცია ✨";
        document.getElementById('main-btn').innerText = isLoginMode ? "შესვლა" : "რეგისტრაცია";
        document.getElementById('toggle-text').innerText = isLoginMode ? "არ გაქვს აქაუნთი? რეგისტრაცია" : "უკვე გაქვს აქაუნთი? შესვლა";
    }

    async function handleAuth() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();

        if (!user || !pass) return alert("შეავსე ველები!");

        if (isLoginMode) {
            // შესვლის ლოგიკა
            const { data, error } = await _supabase.from('profiles').select('*').ilike('username', user).maybeSingle();
            if (data && data.password === pass) {
                localStorage.setItem('nickname', data.username);
                window.location.href = 'chat.html'; // გადაგიყვანს ჩატზე
            } else {
                alert("ნიკი ან პაროლი არასწორია!");
            }
        } else {
            // რეგისტრაციის ლოგიკა
            const { data: existing } = await _supabase.from('profiles').select('username').ilike('username', user).maybeSingle();
            if (existing) return alert("ეს ნიკი უკვე დაკავებულია!");

            const { error } = await _supabase.from('profiles').insert([{ username: user, password: pass, role: 'Member' }]);
            if (!error) {
                alert("რეგისტრაცია წარმატებულია!");
                toggleMode();
            } else {
                alert("შეცდომა რეგისტრაციისას!");
            }
        }
    }
</script>

</body>
</html>
