<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #330000 0%, #000 70%); font-family: Arial; overflow: hidden; }
        .card-wrapper { position: relative; width: 350px; }
        .card-wrapper::before { content: ""; position: absolute; inset: 0; background: red; border-radius: 30px; transform: rotate(-4deg); box-shadow: 0 0 80px red; z-index: 0; }
        .card { position: relative; background: #0d0d0d; padding: 40px 25px; border-radius: 30px; transform: rotate(-2deg); z-index: 1; text-align: center; }
        h1 { color: white; text-shadow: 0 0 20px red; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: none; background: #1a1a1a; color: white; box-sizing: border-box; outline: none; border: 1px solid #333; }
        button { width: 100%; padding: 14px; border: none; border-radius: 20px; background: red; color: white; font-weight: bold; margin-bottom: 12px; cursor: pointer; font-size: 16px; }
        button:hover { background: darkred; }
        .hidden { display: none; }
        #message { color: white; margin-top: 10px; min-height: 20px; font-size: 13px; }
        .back-link { color: #888; cursor: pointer; font-size: 12px; display: block; margin-top: 10px; text-decoration: underline; }
    </style>
</head>
<body>
<div class="card-wrapper">
    <div class="card">
        <h1>კაიფმანია 😎🔥</h1>
        <div id="mainButtons">
            <button onclick="showForm('reg')">რეგისტრაცია</button>
            <button onclick="showForm('log')">შესვლა</button>
        </div>
        <div id="formSection" class="hidden">
            <input type="text" id="nickname" placeholder="ნიკნეიმი">
            <input type="password" id="password" placeholder="პაროლი">
            <button id="submitBtn" onclick="handleAuth()">გაგზავნა</button>
            <span class="back-link" onclick="location.reload()">უკან დაბრუნება</span>
        </div>
        <p id="message"></p>
    </div>
</div>

<script>
    // Supabase კონფიგურაცია
    const supabaseUrl = 'https://ftfciebnywbondaiarnc.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0ZmNpZWJueXdib25kYWlhcm5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMjYwNTYsImV4cCI6MjA4NjkwMjA1Nn0.2A5wgpS2gaFmgnGB2mWH7dpmjLvo75IE0QPRPrtUbzI';
    
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);
    let mode = '';

    function showForm(m) {
        mode = m;
        document.getElementById('mainButtons').classList.add('hidden');
        document.getElementById('formSection').classList.remove('hidden');
        document.getElementById('submitBtn').innerText = m === 'reg' ? 'რეგისტრაცია' : 'შესვლა';
        document.getElementById('message').innerText = '';
    }

    async function handleAuth() {
        const nick = document.getElementById('nickname').value.trim();
        const pass = document.getElementById('password').value.trim();
        const msgEl = document.getElementById('message');
        
        if (!nick || !pass) {
            msgEl.innerText = '⚠️ შეავსე ველები!';
            return;
        }

        if (mode === 'reg') {
            // რეგისტრაცია
            const { data: existing } = await supabase
                .from('profiles')
                .select('username')
                .eq('username', nick)
                .maybeSingle();
            
            if (existing) {
                msgEl.innerText = '❌ ნიკი დაკავებულია!';
                return;
            }
            
            const { error } = await supabase
                .from('profiles')
                .insert([{ 
                    username: nick, 
                    password: pass,
                    role: 'user',
                    is_online: false,
                    is_banned: false
                }]);
            
            if (error) {
                msgEl.innerText = '❌ შეცდომა: ' + error.message;
            } else {
                alert('✅ დარეგისტრირდი წარმატებით! ახლა შედი.');
                location.reload();
            }
        } else {
            // შესვლა
            const { data: user } = await supabase
                .from('profiles')
                .select('*')
                .eq('username', nick)
                .maybeSingle();
            
            if (user && user.password === pass) {
                localStorage.setItem('mafia_user', user.username);
                localStorage.setItem('mafia_user_id', user.id);
                window.location.href = 'chat.html';
            } else {
                msgEl.innerText = '❌ ნიკი ან პაროლი არასწორია!';
            }
        }
    }
</script>
</body>
</html>
