<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>კაიფმანია</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle,#330000 0%,#000 70%);font-family:Arial;overflow:hidden;}
.card-wrapper{position:relative;width:350px;}
.card-wrapper::before{content:"";position:absolute;inset:0;background:red;border-radius:30px;transform:rotate(-4deg);box-shadow:0 0 80px red;z-index:0;}
.card{position:relative;background:#0d0d0d;padding:40px 25px;border-radius:30px;transform:rotate(-2deg);z-index:1;text-align:center;}
h1{color:white;text-shadow:0 0 20px red;margin-bottom:25px;}
input{width:100%;padding:12px;margin-bottom:15px;border-radius:12px;border:none;background:#1a1a1a;color:white;box-sizing:border-box;outline:none;border:1px solid #333;}
button{width:100%;padding:14px;border:none;border-radius:20px;background:red;color:white;font-weight:bold;margin-bottom:12px;cursor:pointer;font-size:16px;}
button:hover{background:darkred;}
.hidden{display:none;}
#message{color:#ff6666;margin-top:10px;min-height:20px;font-size:13px;}
.back-link{color:#888;cursor:pointer;font-size:12px;display:block;margin-top:10px;text-decoration:underline;}
</style>
</head>
<body>

<div class="card-wrapper">
<div class="card">
    <h1>კაიფმანია 😎🔥</h1>
    <div id="mainButtons">
        <button onclick="showForm('reg')">რეგისტრაცია</button>
        <button onclick="showForm('log')">შესვლა</button>
    </div>
    <div id="formSection" class="hidden">
        <input type="text" id="nickname" placeholder="ნიკნეიმი">
        <input type="password" id="password" placeholder="პაროლი">
        <button id="submitBtn" onclick="handleAuth()">გაგზავნა</button>
        <span class="back-link" onclick="location.reload()">უკან დაბრუნება</span>
    </div>
    <p id="message"></p>
</div>
</div>

<script>
const SUPABASE_URL = "https://ftfciebnywbondaiarnc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let mode = "";

function showForm(m) {
    mode = m;
    document.getElementById("mainButtons").classList.add("hidden");
    document.getElementById("formSection").classList.remove("hidden");
    document.getElementById("submitBtn").innerText = (m === 'reg') ? "რეგისტრაცია" : "შესვლა";
    document.getElementById("message").innerText = "";
}

async function handleAuth() {
    const nick = document.getElementById("nickname").value.trim();
    const pass = document.getElementById("password").value.trim();
    const msg = document.getElementById("message");

    if (!nick || !pass) {
        msg.innerText = "⚠️ შეავსე ველები!";
        return;
    }

    if (mode === "reg") {
        // ვამოწმებთ ნიკი თავისუფალია თუ არა
        const { data: existingUser, error: findError } = await supabase
            .from('users')
            .select('nickname')
            .eq('nickname', nick)
            .maybeSingle();
        
        if (existingUser) {
            msg.innerText = "❌ ეს ნიკნეიმი უკვე დაკავებულია!";
            return;
        }
        
        // ვქმნით ახალ მომხმარებელს
        const { error: insertError } = await supabase
            .from('users')
            .insert([{
                nickname: nick,
                password: pass,
                role: 'Member',
                status: 'online',
                shipro_score: 0,
                quiz_score: 0,
                hang_score: 0,
                joker_score: 0,
                nardi_score: 0,
                avatar_url: null,
                is_banned: false
            }]);
        
        if (insertError) {
            msg.innerText = "❌ შეცდომა: " + insertError.message;
        } else {
            alert("✅ წარმატებით დარეგისტრირდი! ახლა შედი სისტემაში.");
            location.reload();
        }
        
    } else if (mode === "log") {
        // შესვლა - ვამოწმებთ nickname და password
        const { data: user, error } = await supabase
            .from('users')
            .select('*')
            .eq('nickname', nick)
            .eq('password', pass)
            .maybeSingle();
        
        if (error) {
            msg.innerText = "❌ შეცდომა: " + error.message;
            return;
        }
        
        if (user) {
            localStorage.setItem('nickname', user.nickname);
            localStorage.setItem('userId', user.id);
            window.location.href = "chat.html";
        } else {
            msg.innerText = "❌ ნიკნეიმი ან პაროლი არასწორია!";
        }
    }
}
</script>
</body>
</html>
