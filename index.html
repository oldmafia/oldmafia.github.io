<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კაიფმანია</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(circle, #330000 0%, #000 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .card {
            background: #0d0d0d;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid red;
            box-shadow: 0 0 50px rgba(255,0,0,0.3);
            width: 350px;
        }
        
        h1 {
            color: white;
            text-shadow: 0 0 10px red;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        input {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 14px;
        }
        
        input:focus {
            outline: none;
            border-color: red;
        }
        
        button {
            background: red;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        button:hover {
            background: darkred;
            transform: scale(1.02);
        }
        
        .hidden {
            display: none;
        }
        
        #message {
            color: #ff6666;
            margin-top: 15px;
            font-size: 13px;
        }
        
        #success {
            color: #66ff66;
            margin-top: 15px;
            font-size: 13px;
        }
        
        .back-link {
            color: #888;
            cursor: pointer;
            font-size: 12px;
            margin-top: 15px;
            display: inline-block;
        }
        
        .back-link:hover {
            color: red;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🔥 კაიფმანია 🔥</h1>
    
    <div id="mainButtons">
        <button onclick="showForm('reg')">📝 რეგისტრაცია</button>
        <button onclick="showForm('log')">🔑 შესვლა</button>
    </div>
    
    <div id="formSection" class="hidden">
        <input type="text" id="nickname" placeholder="ნიკნეიმი">
        <input type="password" id="password" placeholder="პაროლი">
        <button id="submitBtn" onclick="handleAuth()">✅ გაგზავნა</button>
        <div class="back-link" onclick="location.reload()">◀ უკან დაბრუნება</div>
    </div>
    
    <p id="message"></p>
    <p id="success"></p>
</div>

<script>
const SUPABASE_URL = "https://ftfciebnywbondaiarnc.supabase.co";
const SUPABASE_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let mode = "";

function showForm(m) {
    mode = m;
    document.getElementById("mainButtons").classList.add("hidden");
    document.getElementById("formSection").classList.remove("hidden");
    const btn = document.getElementById("submitBtn");
    btn.innerText = (m === 'reg') ? "📝 რეგისტრაცია" : "🔑 შესვლა";
    document.getElementById("message").innerText = "";
    document.getElementById("success").innerText = "";
}

async function handleAuth() {
    const nick = document.getElementById("nickname").value.trim();
    const pass = document.getElementById("password").value.trim();
    const msg = document.getElementById("message");
    const success = document.getElementById("success");

    if (!nick || !pass) {
        msg.innerText = "⚠️ შეავსე ყველა ველი!";
        return;
    }

    if (mode === "reg") {
        // რეგისტრაცია
        msg.innerText = "🔄 მოწმდება...";
        
        const { data: existing, error: checkError } = await supabase
            .from('users')
            .select('nickname')
            .eq('nickname', nick);
        
        if (checkError) {
            msg.innerText = "❌ შეცდომა: " + checkError.message;
            return;
        }
        
        if (existing && existing.length > 0) {
            msg.innerText = "❌ ეს ნიკნეიმი უკვე დაკავებულია!";
            return;
        }
        
        const { error: insertError } = await supabase
            .from('users')
            .insert([{
                nickname: nick,
                password: pass,
                role: 'Member',
                status: 'online'
            }]);
        
        if (insertError) {
            msg.innerText = "❌ შეცდომა: " + insertError.message;
        } else {
            success.innerText = "✅ რეგისტრაცია წარმატებულია! ახლა შედი.";
            msg.innerText = "";
            setTimeout(() => location.reload(), 2000);
        }
        
    } else if (mode === "log") {
        // შესვლა
        msg.innerText = "🔄 მოწმდება...";
        
        const { data, error } = await supabase
            .from('users')
            .select('*')
            .eq('nickname', nick)
            .eq('password', pass);
        
        if (error) {
            msg.innerText = "❌ შეცდომა: " + error.message;
        } else if (data && data.length > 0) {
            localStorage.setItem('nickname', nick);
            success.innerText = "✅ შესვლა წარმატებულია!";
            msg.innerText = "";
            setTimeout(() => {
                alert("კეთილი იყოს შენი მობრძანება, " + nick + "! 🎉");
            }, 500);
        } else {
            msg.innerText = "❌ ნიკნეიმი ან პაროლი არასწორია!";
        }
    }
}

console.log("საიტი ჩაიტვირთა!");
console.log("Supabase URL:", SUPABASE_URL);
</script>
</body>
</html>
