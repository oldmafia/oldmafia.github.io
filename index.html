<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLD MAFIA - COMPLETE</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:sans-serif;background:#0b0000;color:white;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:black;padding:10px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 0 15px red;z-index:10;border-bottom: 1px solid #500;}
.menu-btn{font-size:22px;cursor:pointer; text-shadow: 0 0 5px red;}

/* გვერდითა მენიუ (Sidebar) */
.sidebar{position:fixed;left:-260px;top:0;width:250px;height:100%;background:#070000;box-shadow:0 0 20px red;transition:0.3s;padding-top:60px;z-index:100;overflow-y:auto;}
.sidebar.active{left:0;}
.room{padding:12px;border-bottom:1px solid #200;cursor:pointer;font-size:14px; transition: 0.2s;}
.room:hover{background:#300; color: red;}

/* ჩატი */
.chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;background:#050000;}
.message{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start;}
.avatar-small{width:34px;height:34px;border-radius:50%;background:red;flex-shrink:0;box-shadow: 0 0 8px red; object-fit:cover;}
.msg {background:#0d0d0d; padding:8px 12px; border-radius:12px; border:1px solid #f00; max-width:80%; box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);}
.nick{font-weight:bold;font-size:14px;color: #ff4d4d;}

/* პროფილის მოდალი */
.modal { display:none; position:fixed; z-index:1001; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; }
.modal-content { background:#0d0d0d; padding:25px; border-radius:20px; border:2px solid red; box-shadow:0 0 40px red; text-align:center; width:80%; max-width:300px; }
.prof-pic-big { width:100px; height:100px; border-radius:50%; border:3px solid red; margin-bottom:15px; box-shadow:0 0 15px red; object-fit:cover; }
.role-badge { display:inline-block; padding:4px 12px; border-radius:12px; background:red; font-size:11px; font-weight:bold; margin-bottom:10px; }

/* ქვედა ველი */
.input-area{display:flex;gap:8px;padding:10px;background:black;border-top:1px solid #300;}
.input-area input{flex:1;padding:12px;border:none;border-radius:25px;background:#111;color:white;outline:none;}
.send-btn{background:red;border:none;width:42px;height:42px;border-radius:50%;color:white;cursor:pointer;box-shadow:0 0 12px red;}
input[type="file"] { display:none; }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="room">☕ კაფე-ბარი</div>
  <div class="room">💎 ვიპ საუბრები</div>
  <div class="room">🕵️ გამოძიება</div>
  <div class="room">🔐 შიფროგრამა</div>
  <div class="room">❓ ვიქტორინა</div>
  <div class="room">😵 ჩამოხრჩობანა</div>
  <div class="room">🕴 მაფიის ღამე</div>
  <div class="room">🃏 ჯოკერი</div>
  <div class="room">🎲 ნარდი</div>
  <div class="room">🎵 მუსიკა</div>
  <div class="room">😂 იუმორი</div>
  <div class="room">🛠 ადმინისტრაცია</div>
  <div class="room">🆘 დახმარება</div>
  <div class="room">💬 ფორუმი</div>
  <div class="room" onclick="logout()" style="color:gray;">🚪 გასვლა</div>
</div>

<div class="topbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div id="room-name" style="text-shadow:0 0 5px red; font-weight:bold;">☕ კაფე-ბარი</div>
  <div onclick="openProfile()" style="cursor:pointer; font-size:14px; border:1px solid red; padding:4px 10px; border-radius:15px; background:#1a0000;">👤 პროფილი</div>
</div>

<div id="chat" class="chat"></div>

<div id="profileModal" class="modal" onclick="if(event.target==this) closeProfile()">
  <div class="modal-content">
    <img src="https://via.placeholder.com/100?text=MAFIA" id="userImg" class="prof-pic-big">
    <br>
    <label style="background:#222; padding:6px; border-radius:8px; cursor:pointer; font-size:11px; border:1px solid #444;">
      📸 შეცვლა <input type="file" accept="image/*" onchange="previewFile(this)">
    </label>
    <h2 id="profNick" style="margin:15px 0 5px 0; color:white;">ნიკი</h2>
    <div class="role-badge" id="profRole">მომხმარებელი</div>
    <div style="display:flex; justify-content:space-around; margin-top:15px; border-top:1px solid #222; padding-top:10px;">
        <div style="font-size:12px;">ქულები<br><span id="userScore" style="color:red; font-weight:bold;">0</span></div>
        <div style="font-size:12px;">მოგება<br><span style="color:red; font-weight:bold;">0</span></div>
    </div>
    <button onclick="closeProfile()" style="margin-top:15px; background:none; border:none; color:#666; cursor:pointer;">დახურვა</button>
  </div>
</div>

<div class="input-area">
  <input id="msg-input" placeholder="დაწერე მესიჯი...">
  <button class="send-btn" onclick="sendMsg()">✈</button>
</div>

<script>
const SUPABASE_URL = "https://ftfciebnywbondaiarnc.supabase.co";
const SUPABASE_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let nick = localStorage.getItem("user_nick") || "სტუმარი";
let currentRoom = "☕ კაფე-ბარი";

function toggleMenu() { document.getElementById("sidebar").classList.toggle("active"); }
function openProfile() { 
    document.getElementById("profileModal").style.display = "flex"; 
    document.getElementById("profNick").innerText = nick;
    if(nick.toLowerCase() === "მარი") {
        document.getElementById("profRole").innerText = "დამფუძნებელი";
        document.getElementById("profRole").style.background = "gold";
        document.getElementById("profRole").style.color = "black";
    }
}
function closeProfile() { document.getElementById("profileModal").style.display = "none"; }
function logout(){ localStorage.clear(); window.location.href="index.html"; }

function previewFile(input) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onloadend = function() {
        document.getElementById("userImg").src = reader.result;
        localStorage.setItem("user_avatar", reader.result);
    }
    if (file) reader.readAsDataURL(file);
}

function renderMessage(user, text, time) {
    let chat = document.getElementById("chat");
    let avatar = (user === nick && localStorage.getItem("user_avatar")) ? localStorage.getItem("user_avatar") : "https://via.placeholder.com/34?text=U";
    chat.innerHTML += `
        <div class="message">
            <img src="${avatar}" class="avatar-small">
            <div class="msg">
                <span class="nick">${user} <span style="font-size:10px; color:#555;">${time}</span></span>
                <div style="font-size:15px; margin-top:2px;">${text}</div>
            </div>
        </div>`;
    chat.scrollTop = chat.scrollHeight;
}

async function loadMessages(roomName) {
    let { data: messages } = await _supabase.from('messages').select('*').eq('room_nan', roomName).order('created_at', { ascending: true });
    document.getElementById("chat").innerHTML = "";
    if (messages) {
        messages.forEach(m => {
            let time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            renderMessage(m.user_nam || "უცნობი", m.text, time);
        });
    }
}

document.querySelectorAll(".room").forEach(r => {
    r.onclick = () => {
        if(r.textContent.includes("გასვლა")) return;
        currentRoom = r.textContent.trim();
        document.getElementById("room-name").textContent = currentRoom;
        document.getElementById("sidebar").classList.remove("active");
        loadMessages(currentRoom);
    }
});

async function sendMsg() {
    const input = document.getElementById("msg-input");
    if (!input.value.trim()) return;
    await _supabase.from('messages').insert([{ user_nam: nick, text: input.value.trim(), room_nan: currentRoom }]);
    input.value = "";
}

_supabase.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
    if (payload.new.room_nan === currentRoom) {
        let time = new Date(payload.new.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        renderMessage(payload.new.user_nam, payload.new.text, time);
    }
}).subscribe();

document.getElementById("msg-input").addEventListener("keypress", (e) => { if (e.key === "Enter") sendMsg(); });
if(localStorage.getItem("user_avatar")) document.getElementById("userImg").src = localStorage.getItem("user_avatar");
loadMessages(currentRoom);
</script>
</body>
</html>
