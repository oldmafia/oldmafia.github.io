<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px; border-bottom: 2px solid red; background: #050505; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #main-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        /* Inbox */
        .inbox-item { padding: 15px; border-bottom: 1px solid #111; display: flex; align-items: center; cursor: pointer; }
        .inbox-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid red; object-fit: cover; margin-right: 15px; background: #111; }
        .inbox-nick { font-weight: bold; font-size: 16px; }

        /* Chat */
        #chat-view { padding: 15px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .msg-row { display: flex; align-items: flex-start; gap: 10px; }
        .mini-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid red; object-fit: cover; background: #222; }
        .bubble { background: #111; border: 1px solid #333; padding: 10px; border-radius: 12px; max-width: 75%; border-left: 3px solid red; position: relative; }
        .msg-nick { color: red; font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; }
        .msg-text { color: #eee; font-size: 14px; line-height: 1.4; word-break: break-all; }
        .msg-text img { width: 28px; vertical-align: middle; margin: 2px; }
        .msg-info { font-size: 9px; color: #444; margin-top: 5px; display: flex; justify-content: space-between; }
        .del-btn { color: #f00; cursor: pointer; font-weight: bold; margin-left: 10px; }

        /* Emoji Picker */
        #emoji-picker { position: fixed; bottom: 80px; left: 10px; right: 10px; background: #080808; border: 2px solid red; border-radius: 15px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; max-height: 250px; overflow-y: auto; z-index: 1000; box-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .emoji-wrapper { position: relative; display: inline-block; width: 100%; }
        .emoji-img { width: 100%; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        .emoji-img:active { transform: scale(0.9); }
        .emoji-del { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid black; font-weight: bold; z-index: 10; }
        .upload-btn { grid-column: span 5; background: red; color: white; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* Controls */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; padding: 12px; background: #000; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; box-sizing: border-box; }
        .input-box { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>
    <div class="header">
        <b onclick="goBack()" style="cursor:pointer; color:red; font-size:22px;">⬅</b>
        <span id="p-name">შემოსულები</span>
        <b onclick="location.reload()">🔄</b>
    </div>

    <div id="main-container">
        <div id="chat-view" style="display:none;"></div>
        <div id="inbox-view"></div>
    </div>

    <div id="emoji-picker"></div>

    <div id="controls" class="bottom-bar" style="display:none;">
        <div onclick="toggleEmoji()" style="font-size:30px; cursor:pointer;">😊</div>
        <input type="text" id="pm-input" class="input-box" placeholder="დაწერე მესიჯი...">
        <div onclick="sendMsg()" style="font-size:30px; color:red; cursor:pointer;">✈</div>
    </div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    if(myNick === 'Abu007') localStorage.setItem('role', 'დამფუძნებელი');
    const myRole = localStorage.getItem('role');

    const partner = new URLSearchParams(window.location.search).get('to');
    let profMap = {};
    let emojiList = [];

    async function init() {
        const { data: profiles } = await _s.from('profiles').select('username, avatar_url');
        profiles?.forEach(p => profMap[p.username] = p.avatar_url);
        
        const { data: emojis } = await _s.from('emojis').select('*');
        emojiList = emojis || [];

        if (partner) {
            document.getElementById('inbox-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('p-name').innerText = partner;
            loadChat();
            setInterval(loadChat, 4000);
        } else {
            loadInbox();
        }
    }

    async function loadInbox() {
        const { data: msgs } = await _s.from('private_messages').select('sender, receiver').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`);
        const partners = [...new Set(msgs?.map(m => m.sender === myNick ? m.receiver : m.sender))];
        document.getElementById('inbox-view').innerHTML = partners.map(p => `
            <div class="inbox-item" onclick="window.location.href='pm.html?to=${p}'">
                <img src="${profMap[p] || ''}" class="inbox-avatar">
                <span class="inbox-nick">${p}</span>
            </div>
        `).join('') || '<p style="text-align:center; padding:20px; color:#555;">მესიჯები არ არის</p>';
    }

    async function loadChat() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        if(msgs) {
            document.getElementById('chat-view').innerHTML = msgs.map(m => {
                let text = m.text;
                emojiList.forEach(e => {
                    const reg = new RegExp(`:e${e.id}:`, 'g');
                    text = text.replace(reg, `<img src="${e.emoji_url}">`);
                });
                const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                return `
                    <div class="msg-row">
                        <img src="${profMap[m.sender] || ''}" class="mini-avatar">
                        <div class="bubble">
                            <b class="msg-nick">${m.sender}</b>
                            <div class="msg-text">${text}</div>
                            <div class="msg-info">
                                <span>${time}</span>
                                ${(m.sender === myNick || myRole === 'დამფუძნებელი') ? `<span class="del-btn" onclick="delMsg(${m.id})">✖</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('chat-view').scrollTop = 99999;
        }
    }

    async function sendMsg() {
        const inp = document.getElementById('pm-input');
        if(!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: inp.value, is_read: false }]);
        inp.value = ""; loadChat();
    }

    async function delMsg(id) {
        if(confirm("წავშალოთ?")) { await _s.from('private_messages').delete().eq('id', id); loadChat(); }
    }

    function goBack() { window.location.href = partner ? 'pm.html' : 'chat.html'; }

    async function toggleEmoji() {
        const p = document.getElementById('emoji-picker');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
        if(p.style.display === 'grid') {
            const { data } = await _s.from('emojis').select('*');
            emojiList = data || [];
            p.innerHTML = emojiList.map(e => `
                <div class="emoji-wrapper">
                    <img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.id}')">
                    ${myRole === 'დამფუძნებელი' ? `<div class="emoji-del" onclick="deleteEmoji('${e.id}', '${e.emoji_url}')">×</div>` : ''}
                </div>
            `).join('') +
            `<label class="upload-btn">➕ ატვირთვა<input type="file" hidden accept="image/*" onchange="upFile(this)"></label>`;
        }
    }

    async function deleteEmoji(id, url) {
        if(!confirm("ნამდვილად გსურს ამ სმაილის წაშლა?")) return;
        // 1. ბაზიდან წაშლა
        await _s.from('emojis').delete().eq('id', id);
        // 2. Storage-დან წაშლა (თუ ფაილის სახელს ამოვიღებთ URL-დან)
        const fileName = url.split('/').pop();
        await _s.storage.from('emojis').remove([fileName]);
        
        toggleEmoji(); // განახლება
    }

    async function upFile(input) {
        const file = input.files[0];
        const name = `${Date.now()}_${file.name}`;
        const { data, error } = await _s.storage.from('emojis').upload(name, file);
        if(!error) {
            const { data: url } = _s.storage.from('emojis').getPublicUrl(name);
            await _s.from('emojis').insert([{ emoji_url: url.publicUrl }]);
            toggleEmoji();
        }
    }

    function addEmoji(id) {
        const inp = document.getElementById('pm-input');
        inp.value += ` :e${id}: `;
        document.getElementById('emoji-picker').style.display = 'none';
        inp.focus();
    }

    init();
</script>
</body>
</html>
