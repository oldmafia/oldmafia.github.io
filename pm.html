<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Message</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { cursor: pointer; font-size: 30px; color: #fff; text-decoration: none; }
        #chat-view { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .msg-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .bubble { background: #111; border: 1px solid #222; padding: 10px; border-radius: 12px; max-width: 80%; }
        .nick { font-weight: bold; font-size: 12px; color: #ff3333; margin-bottom: 4px; display: block; }
        .txt { font-size: 14px; color: #ddd; word-break: break-word; }
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid #333; color: white; padding: 12px; border-radius: 20px; outline: none; }
        #emoji-picker { position: fixed; bottom: 70px; left: 10px; right: 10px; background: #050505; border: 2px solid #500; border-radius: 10px; padding: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 200px; overflow-y: auto; }
        .emoji-img { width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <a href="chat.html" class="back-btn">⬅</a>
    <div id="view-title" style="color:red; font-weight:bold;">პირადი</div>
    <div onclick="location.reload()" style="font-size: 20px;">🔄</div>
</div>

<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div class="bottom-bar">
    <div id="emoji-btn" style="font-size:25px; cursor:pointer; display:none;" onclick="toggleEmoji()">😊</div>
    <input type="text" id="pm-input" class="input-box" placeholder="დაწერე...">
    <div onclick="sendMsg()" style="font-size:25px; color:red; cursor:pointer;">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    const partner = new URLSearchParams(window.location.search).get('to');
    let users = {};

    function parseBB(t) { return t.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:80px; display:block;">'); }

    async function init() {
        if (!partner) { return; } // თუ პარტნიორი არაა, უბრალოდ ცარიელია და არ გადაყავს არსად
        
        document.getElementById('view-title').innerText = partner;
        const { data: uData } = await _s.from('profiles').select('*');
        uData?.forEach(u => users[u.username] = u);
        
        // სმაილების ღილაკი მხოლოდ შენთვის
        if (myNick === 'Abu007') { document.getElementById('emoji-btn').style.display = 'block'; }
        
        loadMsgs();
        // ავტომატური განახლება 5 წამში ერთხელ
        setInterval(loadMsgs, 5000);
    }

    async function loadMsgs() {
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const area = document.getElementById('chat-view');
        let html = "";
        data?.forEach(m => {
            const u = users[m.sender] || { avatar_url: 'default.png' };
            html += `<div class="msg-row">
                <img src="${u.avatar_url}" class="avatar">
                <div class="bubble">
                    <span class="nick">${m.sender}</span>
                    <div class="txt">${parseBB(m.text)}</div>
                </div>
            </div>`;
        });
        area.innerHTML = html;
        area.scrollTop = area.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('pm-input');
        if (!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: inp.value }]);
        inp.value = ""; loadMsgs();
    }

    async function toggleEmoji() {
        const p = document.getElementById('emoji-picker');
        if (p.style.display === 'grid') { p.style.display = 'none'; return; }
        const { data } = await _s.from('emojis').select('*');
        p.innerHTML = data.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addE('${e.emoji_url}')">`).join('');
        p.style.display = 'grid';
    }

    function addE(url) {
        document.getElementById('pm-input').value += ` [img]${url}[/img] `;
        document.getElementById('emoji-picker').style.display = 'none';
    }

    window.onload = init;
</script>
</body>
</html>
