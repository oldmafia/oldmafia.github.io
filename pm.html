<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM System - Abu007</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; border-bottom: 2px solid #500; background: #050505; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { cursor: pointer; font-size: 25px; color: #fff; text-decoration: none; padding: 5px 10px; }
        
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .active { display: block !important; }

        .list-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; background: #080808; margin-bottom: 5px; border-radius: 8px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #444; object-fit: cover; }
        
        .msg-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: flex-end; }
        .bubble { background: #111; border: 1px solid #333; padding: 10px; border-radius: 15px; max-width: 80%; position: relative; }
        .nick { font-weight: bold; font-size: 12px; color: #ff3333; margin-bottom: 4px; display: block; }
        .txt { font-size: 15px; color: #eee; word-break: break-word; }
        .msg-info { font-size: 10px; color: #555; margin-top: 5px; display: flex; justify-content: space-between; width: 100%; }

        #emoji-picker { position: fixed; bottom: 80px; left: 10px; right: 10px; background: #050505; border: 2px solid #500; border-radius: 15px; padding: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 1000; max-height: 200px; overflow-y: auto; }
        .emoji-img { width: 100%; cursor: pointer; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 12px; border-top: 1px solid #222; display: none; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="back-btn" onclick="goBack()">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold; font-size: 18px;">შემოსულები</div>
    <div onclick="location.reload()" style="font-size: 20px; cursor:pointer;">🔄</div>
</div>

<div id="inbox-view"></div>
<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div class="bottom-bar" id="input-bar">
    <div id="emoji-btn" style="font-size:28px; cursor:pointer; display:none;" onclick="toggleEmoji()">😊</div>
    <input type="text" id="pm-input" class="input-box" placeholder="დაწერე მესიჯი...">
    <div onclick="sendMsg()" style="font-size:28px; color:red; cursor:pointer;">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    
    // ძალისმიერი მეთოდით ვიღებთ ნიკს
    let myNick = localStorage.getItem('nickname');
    if(!myNick || myNick === 'null') { myNick = 'Abu007'; } 

    let partner = new URLSearchParams(window.location.search).get('to');
    let allUsers = {};

    function parseBB(t) { return t.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:100px; display:block; margin-top:5px;">'); }

    function goBack() {
        if (partner) { window.location.href = 'pm.html'; } 
        else { window.location.href = 'chat.html'; }
    }

    async function init() {
        // 1. მომხმარებლების დატვირთვა
        const { data: users } = await _s.from('profiles').select('*');
        users?.forEach(u => allUsers[u.username] = u);

        // 2. დამფუძნებლის ფუნქციების გააქტიურება
        if (myNick === 'Abu007' || allUsers[myNick]?.role === 'დამფუძნებელი') {
            document.getElementById('emoji-btn').style.display = 'block';
        }

        if (partner) {
            startChat(partner);
        } else {
            showInbox();
        }
    }

    async function showInbox() {
        document.getElementById('view-title').innerText = "შემოსულები";
        document.getElementById('inbox-view').classList.add('active');
        document.getElementById('chat-view').classList.remove('active');
        document.getElementById('input-bar').style.display = 'none';

        // ვიღებთ მესიჯებს სადაც ჩვენ ვართ ან გამგზავნი ან მიმღები
        const { data } = await _s.from('private_messages')
            .select('*')
            .or(`sender.eq."${myNick}",receiver.eq."${myNick}"`)
            .order('created_at', { ascending: false });

        const box = document.getElementById('inbox-view');
        box.innerHTML = "";

        if (!data || data.length === 0) {
            box.innerHTML = "<center style='margin-top:50px; color:#444;'>მესიჯები არ არის</center>";
            return;
        }

        // ვპოულობთ უნიკალურ ნიკებს ვისთანაც გვაქვს მიმოწერა
        const partners = [...new Set(data.map(m => m.sender === myNick ? m.receiver : m.sender))];
        
        partners.forEach(p => {
            const u = allUsers[p] || { avatar_url: 'https://via.placeholder.com/45' };
            box.innerHTML += `
                <div class="list-item" onclick="window.location.href='pm.html?to=${p}'">
                    <img src="${u.avatar_url}" class="avatar">
                    <div style="margin-left:15px;">
                        <b style="color:red; font-size:16px;">${p}</b>
                        <div style="font-size:11px; color:#555;">დააჭირე მიმოწერისთვის</div>
                    </div>
                </div>`;
        });
    }

    async function startChat(p) {
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex';
        
        loadMsgs();
        setInterval(loadMsgs, 4000);
    }

    async function loadMsgs() {
        const { data } = await _s.from('private_messages')
            .select('*')
            .or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`)
            .order('created_at', { ascending: true });

        const area = document.getElementById('chat-view');
        area.innerHTML = "";
        
        data?.forEach(m => {
            const u = allUsers[m.sender] || { avatar_url: 'https://via.placeholder.com/45' };
            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            area.innerHTML += `
                <div class="msg-row">
                    <img src="${u.avatar_url}" class="avatar">
                    <div class="bubble">
                        <span class="nick">${m.sender}</span>
                        <div class="txt">${parseBB(m.text)}</div>
                        <div class="msg-info">
                            <span>${time}</span>
                            ${myNick === 'Abu007' ? `<b style="color:red; cursor:pointer;" onclick="deleteMsg('${m.id}')">✖</b>` : ''}
                        </div>
                    </div>
                </div>`;
        });
        area.scrollTop = area.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('pm-input');
        if (!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: inp.value }]);
        inp.value = ""; loadMsgs();
    }

    async function deleteMsg(id) {
        if(confirm("წავშალოთ მესიჯი?")) {
            await _s.from('private_messages').delete().eq('id', id);
            loadMsgs();
        }
    }

    async function toggleEmoji() {
        const p = document.getElementById('emoji-picker');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
        if (p.style.display === 'grid') {
            const { data } = await _s.from('emojis').select('*');
            p.innerHTML = data.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('');
        }
    }

    function addEmoji(url) {
        document.getElementById('pm-input').value += ` [img]${url}[/img] `;
        document.getElementById('emoji-picker').style.display = 'none';
        document.getElementById('pm-input').focus();
    }

    window.onload = init;
</script>
</body>
</html>
