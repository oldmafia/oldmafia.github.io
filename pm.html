<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* მარცხენა პანელი - კონტაქტები */
        .sidebar { width: 320px; border-right: 2px solid #e60000; background: #080808; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #e60000; font-weight: bold; text-align: center; font-size: 18px; }
        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; transition: 0.3s; }
        .contact-item:hover { background: #151515; }
        .contact-avatar { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #e60000; margin-right: 12px; }
        .contact-nick { font-weight: bold; font-size: 15px; }

        /* ჩატის ზონა */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #000; }
        .chat-header { padding: 15px; background: #0d0d0d; border-bottom: 1px solid #222; font-weight: bold; color: #e60000; }
        .messages-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* მესიჯის სტილი */
        .msg-line { display: flex; gap: 10px; max-width: 85%; }
        .msg-line.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #e60000; }
        .msg-bubble { background: #222; padding: 10px 15px; border-radius: 12px; position: relative; }
        .me .msg-bubble { background: #e60000; }
        .msg-info { display: block; font-size: 10px; color: #777; margin-top: 5px; }
        .delete-btn { color: #555; cursor: pointer; font-size: 11px; margin-left: 8px; }
        .delete-btn:hover { color: #fff; }

        /* ქვედა პანელი - ინპუტი და სმაილები */
        .chat-footer { padding: 15px; background: #0a0a0a; border-top: 1px solid #222; }
        .admin-panel { margin-bottom: 10px; padding: 10px; background: #111; border: 1px solid #333; display: flex; gap: 10px; }
        .input-area { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 5px; }
        button { background: #e60000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">📩 შემოსულები</div>
    <div id="contact-list" class="contact-list">
        </div>
</div>

<div class="main-chat">
    <div id="active-nick" class="chat-header">აირჩიე ნიკი...</div>
    <div id="messages-flow" class="messages-flow"></div>
    
    <div class="chat-footer">
        <div class="admin-panel">
            <input type="text" id="emoji-url" placeholder="სმაილის ლინკი...">
            <button onclick="addEmojiToDB()">➕ დამატება</button>
        </div>
        
        <div class="input-area">
            <input type="text" id="pm-input" placeholder="დაწერე მესიჯი...">
            <button onclick="sendPrivateMessage()">გაგზავნა</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
    // კონფიგურაცია
    const supabase = supabase.createClient('შენი_URL', 'შენი_KEY');
    let selectedUserId = null;

    // 1. კონტაქტების ჩატვირთვა (ვინ მომწერა)
    async function loadContacts() {
        const user = supabase.auth.user();
        const { data } = await supabase.from('private_messages')
            .select('*').eq('receiver_id', user.id).order('created_at', {ascending: false});

        const list = document.getElementById('contact-list');
        list.innerHTML = '';
        const seen = new Set();

        data.forEach(m => {
            if (!seen.has(m.sender_id)) {
                seen.add(m.sender_id);
                list.insertAdjacentHTML('beforeend', `
                    <div class="contact-item" onclick="openChat('${m.sender_id}', '${m.sender_nickname}')">
                        <img src="${m.sender_avatar || 'default-avatar.png'}" class="contact-avatar">
                        <span class="contact-nick">${m.sender_nickname}</span>
                    </div>
                `);
            }
        });
    }

    // 2. ჩატის გახსნა
    async function openChat(uid, nick) {
        selectedUserId = uid;
        document.getElementById('active-nick').innerText = "საუბარი: " + nick;
        fetchMessages();
    }

    // 3. მესიჯების წამოღება (წაშლის უფლებით)
    async function fetchMessages() {
        if(!selectedUserId) return;
        const user = supabase.auth.user();
        const { data } = await supabase.from('private_messages')
            .select('*').or(`sender_id.eq.${selectedUserId},receiver_id.eq.${selectedUserId}`);

        const flow = document.getElementById('messages-flow');
        flow.innerHTML = '';
        data.forEach(m => {
            const isMe = m.sender_id === user.id;
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            flow.insertAdjacentHTML('beforeend', `
                <div class="msg-line ${isMe ? 'me' : ''}">
                    <img src="${m.sender_avatar || 'default.png'}" class="msg-avatar">
                    <div class="msg-bubble">
                        <b>${m.sender_nickname}:</b> ${m.content}
                        <span class="msg-info">${time} <span class="delete-btn" onclick="deleteMsg('${m.id}')">✖</span></span>
                    </div>
                </div>
            `);
        });
        flow.scrollTop = flow.scrollHeight;
    }

    // 4. მესიჯის წაშლა (ადმინისთვის)
    async function deleteMsg(id) {
        if(!confirm("წავშალოთ სმს?")) return;
        await supabase.from('private_messages').delete().eq('id', id);
        fetchMessages();
    }

    // 5. სმაილის დამატება
    async function addEmojiToDB() {
        const url = document.getElementById('emoji-url').value;
        if(!url) return;
        await supabase.from('emojis').insert([{ url: url }]);
        alert("სმაილი დაემატა!");
        document.getElementById('emoji-url').value = '';
    }

    // საწყისი ჩატვირთვა
    loadContacts();
</script>
</body>
</html>
