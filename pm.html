<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease; }
        
        /* ღამის რეჟიმი */
        body.night-mode {
            --bg-color: #030000;
            --text-color: white;
            --chat-bg: radial-gradient(circle at center, #1a0000 0%, #030000 100%);
            --bubble-bg: rgba(25, 0, 0, 0.9);
            --bubble-border: #660000;
            --nick-color: #ff6666;
            --input-bg: #080000;
            --input-border: #660000;
            --topbar-bg: black;
            --inbox-border: #150000;
            --inbox-hover: #1a0000;
            --heart-color: #ff6666;
        }
        
        /* დღის რეჟიმი — მსუბუქი, მიმოფანტული გულები (წრეების ნაცვლად) */
        body.day-mode {
            --bg-color: #fff8f0;
            --text-color: #2c2418;
            --chat-bg: #fffef7;
            --bubble-bg: #ffffff;
            --bubble-border: #e8d4b0;
            --nick-color: #c55a3a;
            --input-bg: #ffffff;
            --input-border: #e8d4b0;
            --topbar-bg: #fff4e6;
            --inbox-border: #f0e4cc;
            --inbox-hover: #fff0e6;
            --heart-color: #ff8888;
            /* მსუბუქი, მიმოფანტული გულები — არა ერთმანეთზე მიკერილი */
            background-image: 
                radial-gradient(circle at 8% 20%, transparent 14px, #ffaaaa 14px, transparent 15px),
                radial-gradient(circle at 85% 15%, transparent 12px, #ffaaaa 12px, transparent 13px),
                radial-gradient(circle at 20% 70%, transparent 10px, #ffaaaa 10px, transparent 11px),
                radial-gradient(circle at 92% 80%, transparent 16px, #ffaaaa 16px, transparent 17px),
                radial-gradient(circle at 45% 45%, transparent 9px, #ffaaaa 9px, transparent 10px),
                radial-gradient(circle at 65% 88%, transparent 11px, #ffaaaa 11px, transparent 12px),
                radial-gradient(circle at 35% 92%, transparent 13px, #ffaaaa 13px, transparent 14px),
                radial-gradient(circle at 72% 35%, transparent 8px, #ffaaaa 8px, transparent 9px),
                radial-gradient(circle at 12% 55%, transparent 15px, #ffaaaa 15px, transparent 16px),
                radial-gradient(circle at 55% 75%, transparent 10px, #ffaaaa 10px, transparent 11px);
            background-size: 200px 200px, 180px 180px, 220px 220px, 240px 240px, 160px 160px, 190px 190px, 210px 210px, 170px 170px, 230px 230px, 200px 200px;
            background-repeat: no-repeat;
            background-position: 0% 0%, 85% 5%, 15% 65%, 90% 75%, 40% 40%, 60% 85%, 30% 90%, 70% 30%, 5% 50%, 50% 70%;
        }
        
        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        .header {
            padding: 15px;
            border-bottom: 2px solid var(--nick-color);
            background: var(--topbar-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .header b:first-child {
            cursor: pointer;
            color: var(--nick-color);
            font-size: 22px;
        }
        #p-name {
            font-weight: bold;
            color: var(--nick-color);
        }
        .header b:last-child {
            cursor: pointer;
            color: var(--nick-color);
            font-size: 18px;
        }
        
        #main-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background: transparent;
        }
        
        /* Inbox View */
        .inbox-item {
            padding: 15px;
            border-bottom: 1px solid var(--inbox-border);
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            background: rgba(255, 255, 255, 0.75);
        }
        body.night-mode .inbox-item {
            background: rgba(0, 0, 0, 0.6);
        }
        .inbox-item:hover {
            background: var(--inbox-hover);
        }
        .inbox-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--nick-color);
            object-fit: cover;
            margin-right: 15px;
            background: #c0a080;
        }
        .inbox-nick {
            font-weight: bold;
            font-size: 16px;
            flex: 1;
            color: var(--text-color);
        }
        .unread-dot {
            width: 12px;
            height: 12px;
            background: #ff4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4444;
            margin-left: 10px;
        }
        
        /* Chat View */
        #chat-view {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 100px;
        }
        .msg-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .msg-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 1px solid var(--nick-color);
            object-fit: cover;
            background: #c0a080;
        }
        .bubble {
            background: var(--bubble-bg);
            border: 1px solid var(--bubble-border);
            padding: 10px;
            border-radius: 12px;
            max-width: 75%;
            border-left: 3px solid var(--nick-color);
        }
        .msg-nick {
            color: var(--nick-color);
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
        }
        .msg-text {
            color: var(--text-color);
            font-size: 14px;
            line-height: 1.4;
            word-break: break-all;
        }
        .msg-info {
            font-size: 9px;
            color: #888;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
        }
        
        .bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 12px;
            background: var(--topbar-bg);
            border-top: 1px solid var(--bubble-border);
            display: flex;
            gap: 10px;
            align-items: center;
            box-sizing: border-box;
        }
        .input-box {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
            padding: 12px;
            border-radius: 20px;
            outline: none;
        }
        .send-btn {
            font-size: 30px;
            color: var(--nick-color);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0 10px;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 0 10px;
        }
        .emoji-btn {
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <b onclick="goBack()">⬅</b>
        <span id="p-name">შემოსულები</span>
        <div style="display: flex; align-items: center;">
            <button class="theme-toggle" id="themeToggle">🌙</button>
            <b onclick="location.reload()">🔄</b>
        </div>
    </div>

    <div id="main-container">
        <div id="chat-view" style="display:none;"></div>
        <div id="inbox-view"></div>
    </div>

    <div id="controls" class="bottom-bar" style="display:none;">
        <button class="emoji-btn" onclick="alert('ემოჯი მალე')">😊</button>
        <input type="text" id="pm-input" class="input-box" placeholder="დაწერე მესიჯი...">
        <button class="send-btn" onclick="sendMsg()">✈</button>
    </div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    const partner = new URLSearchParams(window.location.search).get('to');
    let profMap = {};

    function setTheme(theme) {
        const body = document.body;
        body.classList.remove('night-mode', 'day-mode');
        if (theme === 'day') {
            body.classList.add('day-mode');
            document.getElementById('themeToggle').innerHTML = '🌙';
            localStorage.setItem('pm_theme', 'day');
        } else {
            body.classList.add('night-mode');
            document.getElementById('themeToggle').innerHTML = '☀️';
            localStorage.setItem('pm_theme', 'night');
        }
    }
    
    function toggleTheme() {
        if (document.body.classList.contains('night-mode')) setTheme('day');
        else setTheme('night');
    }
    
    async function init() {
        const savedTheme = localStorage.getItem('pm_theme') || 'night';
        setTheme(savedTheme);
        
        const { data: profiles } = await _s.from('profiles').select('username, avatar_url');
        if (profiles) {
            profiles.forEach(p => {
                profMap[p.username] = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
            });
        }

        if (partner) {
            document.getElementById('inbox-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('p-name').innerText = partner;
            await markAsRead();
            loadChat();
            setInterval(loadChat, 3000);
        } else {
            loadInbox();
        }
    }

    async function markAsRead() {
        await _s.from('private_messages')
            .update({ is_read: true })
            .eq('sender', partner)
            .eq('receiver', myNick);
    }

    async function loadInbox() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', {ascending: false});
        const partners = [...new Set(msgs?.map(m => m.sender === myNick ? m.receiver : m.sender))];
        const unreadFrom = msgs?.filter(m => m.receiver === myNick && !m.is_read).map(m => m.sender);

        document.getElementById('inbox-view').innerHTML = (partners || []).map(p => `
            <div class="inbox-item" onclick="window.location.href='pm.html?to=${p}'">
                <img src="${profMap[p]}" class="inbox-avatar" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                <span class="inbox-nick">${p}</span>
                ${unreadFrom?.includes(p) ? '<div class="unread-dot"></div>' : ''}
            </div>
        `).join('') || '<p style="text-align:center; padding:20px; color:#888;">💬 მესიჯები არ არის</p>';
    }

    async function loadChat() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        if(msgs && msgs.length > 0) {
            document.getElementById('chat-view').innerHTML = msgs.map(m => {
                const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                return `<div class="msg-row">
                    <img src="${profMap[m.sender]}" class="msg-avatar" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                    <div class="bubble">
                        <b class="msg-nick">${m.sender}</b>
                        <div class="msg-text">${escapeHtml(m.text)}</div>
                        <div class="msg-info"><span>${time}</span></div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('chat-view').scrollTop = 99999;
        } else {
            document.getElementById('chat-view').innerHTML = '<p style="text-align:center; padding:20px; color:#888;">💬 მესიჯები არ არის</p>';
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function sendMsg() {
        const inp = document.getElementById('pm-input');
        if(!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: inp.value, is_read: false }]);
        inp.value = "";
        loadChat();
    }

    function goBack() { 
        if (partner) {
            window.location.href = 'pm.html';
        } else {
            window.location.href = 'chat.html';
        }
    }

    document.getElementById('themeToggle').onclick = toggleTheme;
    init();
</script>
</body>
</html>
