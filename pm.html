<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>პირადი - OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bright-red: #ff0000; --bg-black: #050000; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 12px; text-align: center; border-bottom: 1px solid #200; background: #000; display: flex; align-items: center; justify-content: space-between; }
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; display: none; padding: 10px; padding-bottom: 150px; }
        #inbox-view.active, #chat-view.active { display: block; }

        .message-row { display: flex; gap: 8px; margin-bottom: 15px; align-items: flex-start; }
        .avatar-box { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
        .avatar-img { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid #500; object-fit: cover; }
        .message-bubble { background: rgba(25, 5, 5, 0.9); border: 1px solid #400; border-radius: 10px; padding: 8px 12px; flex: 1; max-width: 85%; }
        .sender-nick { color: #f33; font-weight: bold; font-size: 13px; }
        .message-content { font-size: 14px; color: #ddd; line-height: 1.4; word-break: break-word; }
        .message-time { font-size: 10px; color: #444; text-align: right; margin-top: 4px; }

        /* საწერი გრაფა - თავიდან დამალულია */
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 12px; border-top: 1px solid #200; display: none; align-items: center; gap: 10px; padding-bottom: 30px; z-index: 2000; }
        .input-container { flex: 1; background: #0a0a0a; border: 1px solid #300; border-radius: 25px; display: flex; align-items: center; padding: 2px 15px; }
        .input-container input { flex: 1; background: none; border: none; color: white; padding: 10px; outline: none; }
        .send-btn { width: 42px; height: 42px; background: #300; border: 1px solid #600; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: cyan; }

        .inbox-item { display: flex; align-items: center; gap: 12px; padding: 15px; border-bottom: 1px solid #111; }
        .unread-dot { background: red; color: white; border-radius: 50%; width: 10px; height: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 20px;">⬅</div>
    <div style="color:red; font-weight:bold;" id="view-title">პირადი</div>
    <div style="width:20px;"></div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>

<div class="bottom-bar" id="chat-input-bar">
    <div class="input-container">
        <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." autocomplete="off">
    </div>
    <div class="send-btn" onclick="sendMessage()">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname');
    let activePartner = null;

    function checkUrlPartner() {
        const params = new URLSearchParams(window.location.search);
        const to = params.get('to');
        if (to) { openChat(to); } else { loadInbox(); }
    }

    async function loadInbox() {
        if (!myNick) return;
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const box = document.getElementById('inbox-view');
        box.innerHTML = "";
        const partners = {};
        msgs?.forEach(m => {
            const p = m.sender === myNick ? m.receiver : m.sender;
            if (!partners[p]) { partners[p] = { lastMsg: m.text, unread: (m.receiver === myNick && !m.is_read) }; }
        });
        for (let p in partners) {
            box.innerHTML += `<div class="inbox-item" onclick="openChat('${p}')"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${p}" width="45" height="45" style="border-radius:50%; border:1px solid #400;"><div style="flex:1; margin-left:10px;"><b style="color:red">${p}</b><br><small style="color:#555">${partners[p].lastMsg}</small></div>${partners[p].unread ? `<div class="unread-dot"></div>` : ''}</div>`;
        }
    }

    async function openChat(p) {
        activePartner = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        
        // აი ეს ხაზი იყო აკლდა - აჩენს საწერ გრაფას
        document.getElementById('chat-input-bar').style.display = 'flex';
        
        loadMessages();
    }

    async function loadMessages() {
        if(!activePartner) return;
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activePartner}"),and(sender.eq."${activePartner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const area = document.getElementById('chat-view');
        area.innerHTML = msgs?.map(m => `<div class="message-row"><div class="avatar-box"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${m.sender}" class="avatar-img"></div><div class="message-bubble"><div class="sender-nick">${m.sender}</div><div class="message-content">${m.text}</div></div></div>`).join('') || "";
        area.scrollTop = area.scrollHeight;
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim() || !activePartner) return;
        const t = i.value; i.value = "";
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activePartner, text: t, is_read: false }]);
        loadMessages();
    }

    function goBack() {
        if(activePartner) { window.location.href = 'pm.html'; } else { window.location.href = 'chat.html'; }
    }

    window.onload = checkUrlPartner;
    document.getElementById('msg-input').addEventListener('keypress', e => { if(e.key==='Enter') sendMessage() });
</script>
</body>
</html>
