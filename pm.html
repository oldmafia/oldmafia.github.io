<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; border-bottom: 1px solid #400; display: flex; justify-content: space-between; align-items: center; }
        #chat-view { flex: 1; overflow-y: auto; padding: 15px; background: #050505; }
        .bubble { background: #111; border: 1px solid #333; padding: 10px; border-radius: 12px; margin-bottom: 10px; max-width: 85%; border-left: 3px solid red; }
        .bottom-bar { padding: 12px; display: flex; gap: 10px; background: #000; border-top: 1px solid #222; align-items: center; }
        .input-box { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 20px; outline: none; }
        #emoji-picker { position: fixed; bottom: 75px; left: 10px; right: 10px; background: #0a0a0a; border: 1px solid red; border-radius: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 10px; max-height: 200px; overflow-y: auto; z-index: 1000; }
    </style>
</head>
<body>
    <div class="header">
        <b onclick="window.location.href='chat.html'" style="cursor:pointer; color:red; font-size:18px;">⬅ უკან</b>
        <span id="p-name" style="font-weight:bold;">მიმოწერა</span>
        <b onclick="location.reload()" style="cursor:pointer;">🔄</b>
    </div>

    <div id="chat-view"></div>
    <div id="emoji-picker"></div>

    <div class="bottom-bar">
        <div onclick="toggleEmoji()" style="font-size:25px; cursor:pointer;">😊</div>
        <input type="text" id="pm-input" class="input-box" placeholder="დაწერე მესიჯი...">
        <div onclick="sendMsg()" style="font-size:25px; color:red; cursor:pointer;">✈</div>
    </div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    const partner = new URLSearchParams(window.location.search).get('to');

    async function load() {
        if(!partner) return; 
        document.getElementById('p-name').innerText = partner;
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        
        document.getElementById('chat-view').innerHTML = data.map(m => `
            <div style="display:flex; justify-content: ${m.sender === myNick ? 'flex-end' : 'flex-start'}; margin-bottom:10px;">
                <div class="bubble">
                    <b style="color:red; font-size:11px;">${m.sender}</b>
                    <div style="margin-top:5px; word-break:break-all;">${m.text.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:100px; border-radius:5px; display:block; margin:5px 0;">')}</div>
                </div>
            </div>
        `).join('');
        document.getElementById('chat-view').scrollTop = 99999;
    }

    async function sendMsg() {
        const inp = document.getElementById('pm-input');
        if(!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: inp.value }]);
        inp.value = ""; 
        load();
    }

    async function toggleEmoji() {
        const p = document.getElementById('emoji-picker');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
        if(p.style.display === 'grid') {
            const { data } = await _s.from('emojis').select('*');
            p.innerHTML = data.map(e => `<img src="${e.emoji_url}" style="width:100%; cursor:pointer;" onclick="addEmoji('${e.emoji_url}')">`).join('');
        }
    }

    function addEmoji(url) {
        const inp = document.getElementById('pm-input');
        inp.value += ` [img]${url}[/img] `;
        document.getElementById('emoji-picker').style.display = 'none';
        inp.focus();
    }

    setInterval(load, 3000); 
    load();
</script>
</body>
</html>
