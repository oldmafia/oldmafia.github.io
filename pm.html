<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Private Chat</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        
        .header { padding: 15px; border-bottom: 1px solid #300; display: flex; justify-content: space-between; align-items: center; background: #000; position: sticky; top: 0; z-index: 10; }
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; padding: 10px; display: none; }
        .active { display: block !important; }

        /* მესიჯების სწორი განლაგება */
        .message-row { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; clear: both; }
        .my-msg { justify-content: flex-end; }
        .other-msg { justify-content: flex-start; }

        .avatar-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #500; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        
        .bubble { padding: 12px; border-radius: 15px; max-width: 70%; position: relative; word-wrap: break-word; }
        .other-msg .bubble { background: #1a0505; border: 1px solid #300; }
        .my-msg .bubble { background: #001a33; border: 1px solid #004; }

        .msg-sender { font-size: 11px; font-weight: bold; color: #f33; display: block; margin-bottom: 5px; }
        .msg-text img { max-width: 150px; border-radius: 8px; display: block; margin-top: 5px; }

        /* დრო და წაშლა */
        .msg-info { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; font-size: 10px; color: #555; }
        .del-btn { cursor: pointer; color: #ff0000; margin-left: 8px; }

        #emoji-picker { position: fixed; bottom: 80px; left: 5%; right: 5%; background: #000; border: 1px solid #f00; border-radius: 15px; padding: 10px; display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 20; max-height: 200px; overflow-y: auto; }
        .emoji-item { width: 100%; height: 60px; object-fit: contain; cursor: pointer; }

        .bottom-bar { padding: 15px; background: #000; border-top: 1px solid #200; display: none; gap: 10px; align-items: center; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 20px;">🔙 BACK</div>
    <div id="view-title" style="color:red; font-weight:bold;">PM SYSTEM</div>
    <div onclick="location.reload()" style="cursor:pointer;">🔄</div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div class="bottom-bar" id="input-bar">
    <div onclick="toggleEmojis()" style="font-size:24px; cursor:pointer;">😊</div>
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი...">
    <div onclick="sendMessage()" style="font-size:24px; cursor:pointer;">🚀</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || "Abu007";
    let activeP = null;
    let userAvatars = {};

    function parseBBCode(text) {
        return text ? text.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1">') : "";
    }

    async function loadInbox() {
        const { data: profs } = await _s.from('profiles').select('username, avatar_url');
        profs?.forEach(p => userAvatars[p.username] = p.avatar_url);

        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        
        const box = document.getElementById('inbox-view');
        box.innerHTML = "";
        const partners = new Set();
        
        msgs?.forEach(m => {
            const p = m.sender === myNick ? m.receiver : m.sender;
            if (!partners.has(p)) {
                partners.add(p);
                const ava = userAvatars[p] || 'https://via.placeholder.com/45';
                box.innerHTML += `
                    <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #111; cursor:pointer;" onclick="openChat('${p}')">
                        <img src="${ava}" class="avatar-img">
                        <div style="margin-left:15px"><b style="color:red">${p}</b><br><small style="color:#555">${m.text.substring(0,20)}...</small></div>
                    </div>`;
            }
        });
    }

    async function openChat(p) {
        activeP = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex';
        loadMessages();
    }

    async function loadMessages() {
        if(!activeP) return;
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        
        const area = document.getElementById('chat-view'); 
        area.innerHTML = "";
        
        msgs?.forEach(m => {
            const isMe = m.sender === myNick;
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const ava = userAvatars[m.sender] || 'https://via.placeholder.com/45';
            
            area.innerHTML += `
                <div class="message-row ${isMe ? 'my-msg' : 'other-msg'}">
                    ${!isMe ? `<img src="${ava}" class="avatar-img" onclick="window.location.href='profile.html?user=${m.sender}'">` : ''}
                    <div class="bubble">
                        <span class="msg-sender">${m.sender}</span>
                        <div class="msg-text">${parseBBCode(m.text)}</div>
                        <div class="msg-info">
                            <span>${time}</span>
                            ${myNick === 'Abu007' ? `<span class="del-btn" onclick="deleteMsg('${m.id}')">🗑️</span>` : ''}
                        </div>
                    </div>
                    ${isMe ? `<img src="${ava}" class="avatar-img" onclick="window.location.href='profile.html?user=${m.sender}'">` : ''}
                </div>`;
        });
        area.scrollTop = area.scrollHeight;
    }

    async function toggleEmojis() {
        const picker = document.getElementById('emoji-picker');
        picker.style.display = picker.style.display === 'grid' ? 'none' : 'grid';
        if(picker.style.display === 'grid') {
            const { data } = await _s.from('emojis').select('*');
            picker.innerHTML = data ? data.map(e => `<img src="${e.emoji_url}" class="emoji-item" onclick="addEmoji('${e.emoji_url}')">`).join('') : "";
        }
    }

    function addEmoji(url) {
        document.getElementById('msg-input').value += `[img]${url}[/img]`;
        document.getElementById('emoji-picker').style.display = 'none';
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: i.value }]);
        i.value = ""; loadMessages();
    }

    async function deleteMsg(id) {
        if(confirm("წავშალოთ?")) {
            await _s.from('private_messages').delete().eq('id', id);
            loadMessages();
        }
    }

    function goBack() { activeP ? location.reload() : window.history.back(); }
    window.onload = loadInbox;
</script>
</body>
</html>
