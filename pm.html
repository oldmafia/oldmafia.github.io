<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM SYSTEM - FIXED</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .header { padding: 15px; text-align: center; border-bottom: 2px solid #500; background: #050000; display: flex; align-items: center; justify-content: space-between; }
        
        /* Main Content */
        .content { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 80px; position: relative; }
        
        #inbox-view, #chat-view { width: 100%; display: none; }
        .active { display: block !important; }

        /* Inbox Style */
        .user-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a0000; cursor: pointer; background: #0a0000; margin-bottom: 5px; border-radius: 8px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #800; margin-right: 15px; }

        /* Chat Bubbles */
        .bubble { background: #1a0505; border: 1px solid #400; padding: 12px; border-radius: 15px; margin-bottom: 12px; max-width: 85%; position: relative; word-wrap: break-word; line-height: 1.4; }
        .my-msg { background: #300000; border-color: #700; margin-left: auto; }
        .time { font-size: 10px; color: #777; display: block; text-align: right; margin-top: 5px; }
        .del-btn { color: red; float: right; cursor: pointer; font-size: 16px; margin-left: 10px; }

        /* Bottom Bar */
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #050000; padding: 12px; border-top: 2px solid #500; display: none; gap: 10px; align-items: center; z-index: 100; }
        input { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 12px 15px; border-radius: 25px; outline: none; font-size: 16px; }
        .send-btn { background: #800; color: white; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .emoji-btn { background: #222; color: #ffcc00; width: 40px; height: 40px; display: none; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 24px; color: red;">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold;">შემოსულები</div>
    <div onclick="location.reload()" style="cursor:pointer; font-size: 20px; color: red;">🔄</div>
</div>

<div class="content" id="scroll-area">
    <div id="inbox-view" class="active"></div>
    <div id="chat-view"></div>
</div>

<div class="bottom-bar" id="input-bar">
    <div id="admin-emoji" class="emoji-btn" onclick="alert('სმაილები')">😊</div>
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMessage()">
    <div onclick="sendMessage()" class="send-btn">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || "Abu007";
    let activeP = null;
    const admins = ["Abu007"]; // შენი ნიკი

    function formatTime(ts) {
        const d = ts ? new Date(ts) : new Date();
        return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }

    // ინბოქსის ჩატვირთვა
    async function loadInbox() {
        activeP = null;
        document.getElementById('view-title').innerText = "შემოსულები";
        document.getElementById('inbox-view').classList.add('active');
        document.getElementById('chat-view').classList.remove('active');
        document.getElementById('input-bar').style.display = 'none';

        const { data } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        
        const box = document.getElementById('inbox-view');
        box.innerHTML = "";
        const partners = new Set();

        if (data) {
            data.forEach(m => {
                const p = m.sender === myNick ? m.receiver : m.sender;
                if (!partners.has(p)) {
                    partners.add(p);
                    box.innerHTML += `
                        <div class="user-row" onclick="openChat('${p}')">
                            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${p}" class="avatar">
                            <b style="color:red; font-size:18px;">${p}</b>
                        </div>`;
                }
            });
        }
    }

    // ჩატის გახსნა
    async function openChat(p) {
        activeP = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex'; // საწერი გრაფა გამოდის!

        if (admins.includes(myNick)) {
            document.getElementById('admin-emoji').style.display = 'flex';
        }

        loadMessages();
    }

    async function loadMessages() {
        if(!activeP) return;
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        
        const area = document.getElementById('chat-view');
        area.innerHTML = data.map(m => `
            <div class="bubble ${m.sender === myNick ? 'my-msg' : ''}" id="msg-${m.id}">
                ${(admins.includes(myNick)) ? `<span class="del-btn" onclick="deleteMessage('${m.id}')">🗑️</span>` : ''}
                <b style="color:red; font-size:11px;">${m.sender}</b><br>
                ${m.text}
                <span class="time">${formatTime(m.created_at)}</span>
            </div>
        `).join('');
        
        const scroll = document.getElementById('scroll-area');
        scroll.scrollTop = scroll.scrollHeight;
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        if (!i.value.trim() || !activeP) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: i.value }]);
        i.value = ""; 
        loadMessages();
    }

    async function deleteMessage(id) {
        if(confirm("წავშალოთ?")) {
            await _s.from('private_messages').delete().eq('id', id);
            document.getElementById(`msg-${id}`).remove();
        }
    }

    function goBack() {
        if(document.getElementById('chat-view').classList.contains('active')) {
            loadInbox();
        } else {
            window.history.back();
        }
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const chatWith = urlParams.get('chat');
        if (chatWith) {
            openChat(chatWith);
        } else {
            loadInbox();
        }
    };
</script>
</body>
</html>
