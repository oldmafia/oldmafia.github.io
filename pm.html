<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Private System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* მაფიოზური ფონი და სტილი */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle, #1a0000 0%, #000000 100%); 
            color: #e0e0e0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        .header { 
            padding: 15px; 
            text-align: center; 
            border-bottom: 2px solid #600; 
            background: rgba(0,0,0,0.9); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            box-shadow: 0 0 15px #f003;
        }

        #inbox-view, #chat-view { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .active { display: block !important; }

        /* მესიჯების სტილი */
        .message-row { display: flex; gap: 12px; margin-bottom: 20px; align-items: flex-end; }
        .my-msg { flex-direction: row-reverse; }

        /* ავატარი - ზუსტად ის, რაც მთავარზეა */
        .avatar-img { 
            width: 50px; 
            height: 50px; 
            border-radius: 8px; 
            border: 2px solid #800; 
            cursor: pointer; 
            object-fit: cover; 
            background: #111;
            transition: 0.3s;
        }
        .avatar-img:hover { border-color: #f00; transform: scale(1.05); }
        
        .bubble { 
            padding: 12px 16px; 
            border-radius: 12px; 
            max-width: 75%; 
            position: relative; 
            border: 1px solid #400; 
            background: linear-gradient(145deg, #200000, #0a0000); 
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
        }
        .my-msg .bubble { background: linear-gradient(145deg, #001a33, #00050a); border-color: #004466; }

        .msg-sender { font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px; color: #ff4d4d; text-transform: uppercase; }
        .my-msg .msg-sender { color: #00ccff; text-align: right; }

        .msg-text { line-height: 1.4; word-wrap: break-word; }
        .msg-text img { max-width: 130px; border-radius: 5px; display: block; margin-top: 8px; border: 1px solid #333; }

        /* სმაილების პანელი */
        #emoji-picker { 
            position: fixed; 
            bottom: 85px; 
            left: 10px; 
            right: 10px; 
            background: #0a0000; 
            border: 2px solid #800; 
            border-radius: 12px; 
            padding: 12px; 
            display: none; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
            z-index: 2000; 
            max-height: 250px; 
            overflow-y: auto;
            box-shadow: 0 0 20px #000;
        }
        .emoji-item { width: 100%; height: 65px; cursor: pointer; object-fit: contain; border-radius: 4px; background: #000; transition: 0.2s; }
        .emoji-item:hover { transform: scale(1.1); background: #1a0000; }

        /* ქვედა პანელი */
        .bottom-bar { padding: 15px; background: #050000; border-top: 1px solid #300; display: none; gap: 12px; align-items: center; }
        input { 
            flex: 1; 
            background: #111; 
            border: 1px solid #444; 
            color: #fff; 
            padding: 12px 18px; 
            border-radius: 25px; 
            outline: none; 
            transition: 0.3s;
        }
        input:focus { border-color: #f00; box-shadow: 0 0 5px #f005; }
        
        .send-btn { font-size: 28px; cursor: pointer; color: #800; transition: 0.2s; }
        .send-btn:hover { color: #f00; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="font-size: 24px; cursor:pointer">🍷</div>
    <div id="view-title" style="color:#ff0000; font-weight:bold; letter-spacing: 3px; text-shadow: 2px 2px 5px #000;">MAFIA PM</div>
    <div onclick="location.reload()" style="font-size: 20px; cursor:pointer">🔄</div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div class="bottom-bar" id="input-bar">
    <div onclick="toggleEmojis()" style="font-size:26px; cursor:pointer">🎭</div>
    <input type="text" id="msg-input" placeholder="აკრიფე საიდუმლო მესიჯი...">
    <div onclick="sendMessage()" class="send-btn">🔫</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || "Abu007";
    let activeP = null;
    let userAvatars = {};

    function parseBBCode(text) {
        if(!text) return "";
        return text.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" onerror="this.src=\'https://via.placeholder.com/100?text=IMAGE+ERROR\'">');
    }

    async function loadInbox() {
        const { data: profs } = await _s.from('profiles').select('username, avatar_url');
        profs?.forEach(p => userAvatars[p.username] = p.avatar_url);

        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        
        const box = document.getElementById('inbox-view');
        box.innerHTML = "";
        const partners = new Set();
        
        msgs?.forEach(m => {
            const p = m.sender === myNick ? m.receiver : m.sender;
            if (!partners.has(p)) {
                partners.add(p);
                const ava = userAvatars[p] || 'https://via.placeholder.com/50?text=No+Img';
                box.innerHTML += `
                    <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #200; cursor:pointer; background: rgba(20,0,0,0.3); margin-bottom:5px; border-radius:8px;" onclick="openChat('${p}')">
                        <img src="${ava}" class="avatar-img">
                        <div style="margin-left:15px">
                            <b style="color:#ff4d4d; font-size:16px;">${p}</b><br>
                            <small style="color:#777">${m.text.substring(0,30)}...</small>
                        </div>
                    </div>`;
            }
        });
    }

    async function openChat(p) {
        activeP = p;
        document.getElementById('view-title').innerText = p.toUpperCase();
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex';
        loadMessages();
    }

    async function loadMessages() {
        if(!activeP) return;
        
        // ყოველთვის თავიდან წამოვიღოთ ავატარები, რომ მთავართან სინქრონში იყოს
        const { data: profs } = await _s.from('profiles').select('username, avatar_url');
        profs?.forEach(p => userAvatars[p.username] = p.avatar_url);

        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        
        const area = document.getElementById('chat-view'); 
        area.innerHTML = "";
        
        msgs?.forEach(m => {
            const isMe = m.sender === myNick;
            const ava = userAvatars[m.sender] || 'https://via.placeholder.com/50?text=?';
            
            area.innerHTML += `
                <div class="message-row ${isMe ? 'my-msg' : ''}">
                    <img src="${ava}" class="avatar-img" onclick="window.location.href='profile.html?user=${m.sender}'">
                    <div class="bubble">
                        <span class="msg-sender">${m.sender}</span>
                        <div class="msg-text">${parseBBCode(m.text)}</div>
                        <div style="text-align:right; font-size:9px; color:#500; margin-top:5px;">
                            ${myNick === 'Abu007' ? `<span onclick="deleteMsg('${m.id}')" style="cursor:pointer">🗑️</span>` : ''}
                        </div>
                    </div>
                </div>`;
        });
        area.scrollTop = area.scrollHeight;
    }

    async function toggleEmojis() {
        const picker = document.getElementById('emoji-picker');
        if (picker.style.display === 'grid') { picker.style.display = 'none'; return; }
        
        const { data } = await _s.from('emojis').select('*');
        if(data && data.length > 0) {
            const col = Object.keys(data[0]).find(k => k !== 'id' && k !== 'created_at');
            picker.innerHTML = data.map(e => `
                <img src="${e[col]}" class="emoji-item" onclick="addEmoji('${e[col]}')">
            `).join('');
            picker.style.display = 'grid';
        }
    }

    function addEmoji(url) {
        document.getElementById('msg-input').value += `[img]${url}[/img]`;
        document.getElementById('emoji-picker').style.display = 'none';
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: i.value }]);
        i.value = ""; loadMessages();
    }

    async function deleteMsg(id) {
        if(confirm("წავშალოთ მტკიცებულება?")) {
            await _s.from('private_messages').delete().eq('id', id);
            loadMessages();
        }
    }

    function goBack() { activeP ? location.reload() : window.history.back(); }
    window.onload = loadInbox;
</script>
</body>
</html>
