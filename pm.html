<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - PM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .header { height: 60px; padding: 0 15px; border-bottom: 2px solid #500; background: #050000; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        
        /* Content Area */
        .content { flex: 1; overflow-y: auto; padding: 10px; background: #000; }
        
        /* User List Style */
        .user-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a0000; cursor: pointer; background: #0a0000; margin-bottom: 5px; border-radius: 8px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #800; margin-right: 12px; }

        /* Chat Bubbles */
        .bubble { background: #1a0505; border: 1px solid #400; padding: 10px; border-radius: 12px; margin-bottom: 10px; max-width: 80%; word-wrap: break-word; }
        .my-msg { background: #300000; margin-left: auto; border-color: #700; }

        /* 🔥 საწერი გრაფა - აქ იყო პრობლემა 🔥 */
        .bottom-bar { 
            height: 70px; 
            background: #080000; 
            border-top: 2px solid #500; 
            display: none; /* თავიდან დამალულია */
            align-items: center; 
            padding: 0 10px; 
            gap: 10px; 
            flex-shrink: 0;
            position: relative;
            z-index: 99999;
        }
        
        input { 
            flex: 1; 
            height: 45px; 
            background: #151515; 
            border: 1px solid #444; 
            color: white; 
            padding: 0 15px; 
            border-radius: 25px; 
            font-size: 16px; 
            outline: none;
        }
        
        .send-btn { 
            width: 45px; 
            height: 45px; 
            background: #800; 
            color: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            cursor: pointer; 
        }

        #inbox-view, #chat-view { width: 100%; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 24px; color: red;">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold; font-size: 18px;">შემოსულები</div>
    <div onclick="location.reload()" style="cursor:pointer; font-size: 20px; color: red;">🔄</div>
</div>

<div class="content" id="scroll-area">
    <div id="inbox-view"></div>
    <div id="chat-view" style="display:none;"></div>
</div>

<div class="bottom-bar" id="input-bar">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMessage()">
    <div onclick="sendMessage()" class="send-btn">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || "Abu007";
    let activeP = null;

    // 1. ინბოქსის ჩვენება
    async function showInbox() {
        activeP = null;
        document.getElementById('view-title').innerText = "შემოსულები";
        document.getElementById('inbox-view').style.display = 'block';
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('input-bar').style.display = 'none'; // ინბოქსში ვმალავთ საწერს

        const { data } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        
        let html = "";
        const seen = new Set();
        if (data) {
            data.forEach(m => {
                const p = m.sender === myNick ? m.receiver : m.sender;
                if (!seen.has(p)) {
                    seen.add(p);
                    html += `<div class="user-row" onclick="openChat('${p}')">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${p}" class="avatar">
                        <b style="color:red;">${p}</b>
                    </div>`;
                }
            });
        }
        document.getElementById('inbox-view').innerHTML = html || "<p style='text-align:center;color:#444;'>ცარიელია</p>";
    }

    // 2. ჩატის გახსნა (პროფილიდან გადმოსვლისასაც ეს მუშაობს)
    async function openChat(p) {
        activeP = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').style.display = 'none';
        document.getElementById('chat-view').style.display = 'block';
        
        // 🔥 ვაჩენთ საწერ გრაფას აუცილებლად! 🔥
        document.getElementById('input-bar').style.display = 'flex';

        loadMessages();
    }

    async function loadMessages() {
        if(!activeP) return;
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        
        const area = document.getElementById('chat-view');
        area.innerHTML = data.map(m => `
            <div class="bubble ${m.sender === myNick ? 'my-msg' : ''}">
                <small style="color:red; font-size:10px;">${m.sender}</small><br>${m.text}
            </div>
        `).join('') || "<p style='text-align:center;color:#444;'>მიწერე პირველი...</p>";
        
        document.getElementById('scroll-area').scrollTop = document.getElementById('scroll-area').scrollHeight;
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        if (!i.value.trim() || !activeP) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: i.value }]);
        i.value = ""; 
        loadMessages();
    }

    function goBack() {
        if(document.getElementById('chat-view').style.display === 'block') showInbox();
        else window.history.back();
    }

    // შემოწმება: პროფილიდან მოვიდა თუ ისე შევიდა
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const chatWith = urlParams.get('chat');
        if (chatWith) openChat(chatWith);
        else showInbox();
    };
</script>
</body>
</html>
