<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px; border-bottom: 2px solid #500; background: #050505; display: flex; justify-content: space-between; align-items: center; }
        #chat-view { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .bubble { background: #111; border: 1px solid #333; padding: 12px; border-radius: 15px; margin-bottom: 12px; max-width: 85%; border-left: 3px solid red; }
        .bottom-bar { position: fixed; bottom: 0; width: 100%; padding: 12px; background: #000; display: flex; gap: 10px; align-items: center; border-top: 1px solid #222; }
        .input-box { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 20px; outline: none; }
        #emoji-picker { position: fixed; bottom: 80px; left: 10px; right: 10px; background: #050505; border: 2px solid red; border-radius: 15px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 12px; max-height: 220px; overflow-y: auto; z-index: 1000; }
        .emoji-img { width: 100%; cursor: pointer; transition: 0.2s; }
        .emoji-img:active { transform: scale(0.8); }
    </style>
</head>
<body>
    <div class="header">
        <b onclick="window.location.href='chat.html'" style="cursor:pointer; color:red; font-size:22px;">⬅</b>
        <span id="p-name" style="font-weight:bold; color:white;">მიმოწერა</span>
        <b onclick="location.reload()" style="cursor:pointer; font-size:20px;">🔄</b>
    </div>

    <div id="chat-view"></div>
    <div id="emoji-picker"></div>

    <div class="bottom-bar">
        <div onclick="toggleEmoji()" style="font-size:28px; cursor:pointer;">😊</div>
        <input type="text" id="pm-input" class="input-box" placeholder="დაწერე მესიჯი...">
        <div onclick="sendMsg()" style="font-size:28px; color:red; cursor:pointer;">✈</div>
    </div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    const partner = new URLSearchParams(window.location.search).get('to');

    async function load() {
        if(!partner) return;
        document.getElementById('p-name').innerText = partner;

        // მესიჯების ჩატვირთვა
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        
        if (data) {
            document.getElementById('chat-view').innerHTML = data.map(m => `
                <div style="display:flex; justify-content: ${m.sender === myNick ? 'flex-end' : 'flex-start'};">
                    <div class="bubble">
                        <b style="color:red; font-size:11px; display:block; margin-bottom:5px;">${m.sender}</b>
                        <div style="word-break:break-all;">${m.text.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:120px; display:block; margin-top:5px; border-radius:8px;">')}</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('chat-view').scrollTop = 99999;
        }

        // ინდიკატორის გასუფთავება (რომ აღარ ეწეროს "ახალი მესიჯი")
        await _s.from('private_messages').update({ is_read: true }).eq('receiver', myNick).eq('sender', partner);
    }

    async function sendMsg() {
        const inp = document.getElementById('pm-input');
        if(!inp.value.trim()) return;

        // მესიჯის გაგზავნა
        const { error } = await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: inp.value, is_read: false }]);
        
        if (!error) {
            inp.value = ""; 
            load();
        } else {
            alert("შეცდომა! SMS არ გაიგზავნა. შეამოწმე ბაზა.");
        }
    }

    async function toggleEmoji() {
        const p = document.getElementById('emoji-picker');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
        if(p.style.display === 'grid') {
            const { data } = await _s.from('emojis').select('*');
            if (data) {
                p.innerHTML = data.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('');
            }
        }
    }

    function addEmoji(url) {
        const inp = document.getElementById('pm-input');
        inp.value += ` [img]${url}[/img] `;
        document.getElementById('emoji-picker').style.display = 'none';
        inp.focus();
    }

    // ავტომატური განახლება ყოველ 3 წამში
    setInterval(load, 3000); 
    load();
</script>
</body>
</html>
