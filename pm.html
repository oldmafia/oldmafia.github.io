<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პირადი - OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root { --dark-red: #4a0000; --bright-red: #ff0000; --bg-black: #050000; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: 15px; text-align: center; border-bottom: 2px solid var(--dark-red); background: black; display: flex; align-items: center; justify-content: space-between; z-index: 1001; }
        .back-btn { color: white; text-decoration: none; font-size: 24px; cursor: pointer; padding: 0 10px; }
        
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; display: none; padding: 15px; }
        #inbox-view.active, #chat-view.active { display: block; }
        
        .user-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; cursor: pointer; padding: 12px; border-radius: 15px; background: rgba(40,0,0,0.4); border: 1px solid #600; }
        .avatar-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid var(--bright-red); }

        .msg-wrap { display: flex; width: 100%; margin-bottom: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 14px; word-wrap: break-word; }
        .sent { background: var(--dark-red); margin-left: auto; border-bottom-right-radius: 2px; }
        .received { background: #1a1a1a; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .m-text img { width: 45px; height: 45px; vertical-align: middle; margin: 2px; }

        /* სმაილების ფანჯარა */
        #emoji-picker { 
            display: none; position: fixed; bottom: 80px; left: 10px; 
            background: #0a0000; border: 2px solid var(--dark-red); 
            padding: 10px; border-radius: 15px; width: 280px; z-index: 3000; 
        }
        #emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-height: 200px; overflow-y: auto; }
        .emoji-item { width: 45px; height: 45px; cursor: pointer; object-fit: contain; }

        /* საწერი გრაფა */
        .input-area { padding: 12px; background: black; border-top: 2px solid var(--dark-red); display: none; gap: 10px; align-items: center; }
        .input-area.show { display: flex !important; }
        .input-area input { flex: 1; background: #080808; border: 1px solid var(--dark-red); color: white; padding: 12px; border-radius: 25px; outline: none; }

        .side-menu { position: fixed; right: -280px; top: 0; width: 280px; height: 100%; background: #0a0000; border-left: 2px solid var(--dark-red); transition: 0.3s; z-index: 2000; padding: 20px; overflow-y: auto; }
        .side-menu.open { right: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; }
        .overlay.show { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="header">
    <div class="back-btn" onclick="goBack()">⬅</div>
    <div id="view-title" style="color:var(--bright-red); font-weight:bold;">პირადი</div>
    <div style="font-size:24px; cursor:pointer;" onclick="toggleMenu()">👥</div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>
<div class="side-menu" id="side-menu"><div id="online-users-container"></div></div>

<div id="emoji-picker"><div id="emoji-grid"></div></div>

<div class="input-area" id="chat-input">
    <button onclick="toggleEmojiPicker()" style="background:none; border:none; font-size:22px; cursor:pointer;">😊</button>
    <input type="text" id="msg-text" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()" style="background:none; border:none; color:cyan; font-size:26px; cursor:pointer;">✈</button>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), activeChatPartner = null;
    const emojiBase = "https://ftfciebnywbondaiarnc.supabase.co/storage/v1/object/public/emojis/";

    if (!myNick) location.href = 'index.html';

    function parseEmojis(text) {
        if (!text) return "";
        return text.split(' ').map(word => {
            if (word.trim().match(/\.(gif|png|jpg|webp)$/i)) return `<img src="${emojiBase}${word.trim()}">`;
            return word;
        }).join(' ');
    }

    async function loadInbox() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const { data: profiles } = await _s.from('profiles').select('username, avatar_url');
        const historyDiv = document.getElementById('inbox-view');
        historyDiv.innerHTML = "";
        const chats = {};

        msgs?.forEach(m => {
            const partner = (m.sender === myNick) ? m.receiver : m.sender;
            if (!chats[partner]) {
                const prof = profiles?.find(p => p.username === partner);
                chats[partner] = { 
                    lastMsg: m.text, 
                    avatar: prof?.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${partner}` 
                };
            }
        });

        for (const partner in chats) {
            historyDiv.innerHTML += `
                <div class="user-row" onclick="openChat('${partner}')">
                    <img src="${chats[partner].avatar}" class="avatar-img">
                    <div style="flex:1">
                        <b style="color:var(--bright-red)">${partner}</b><br>
                        <small style="opacity:0.5">${chats[partner].lastMsg.substring(0,25)}...</small>
                    </div>
                </div>`;
        }
    }

    async function openChat(partner) {
        activeChatPartner = partner;
        document.getElementById('view-title').innerText = partner;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('chat-input').classList.add('show');
        loadPrivateMessages();
    }

    async function loadPrivateMessages() {
        if (!activeChatPartner) return;
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeChatPartner}"),and(sender.eq."${activeChatPartner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const chatDiv = document.getElementById('chat-view');
        chatDiv.innerHTML = msgs?.map(m => `
            <div class="msg-wrap"><div class="msg ${m.sender === myNick ? 'sent' : 'received'}">
                <div style="font-size:10px; color:gold; margin-bottom:4px;">${m.sender}</div>
                <div class="m-text">${parseEmojis(m.text)}</div>
            </div></div>`).join('');
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMessage() {
        const inp = document.getElementById('msg-text');
        const txt = inp.value.trim();
        if (!txt || !activeChatPartner) return;
        inp.value = "";
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeChatPartner, text: txt }]);
        loadPrivateMessages();
    }

    async function loadEmojis() {
        const { data: ems } = await _s.from('emojis').select('*').order('id');
        const grid = document.getElementById('emoji-grid');
        grid.innerHTML = (ems || []).map(e => `<img src="${emojiBase}${e.name}" class="emoji-item" onclick="insertEmoji('${e.name}')">`).join('');
    }

    function insertEmoji(name) {
        const input = document.getElementById('msg-text');
        input.value += name + " ";
        input.focus();
    }

    function toggleEmojiPicker() {
        const p = document.getElementById('emoji-picker');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        if (p.style.display === 'block') loadEmojis();
    }

    function toggleMenu() {
        document.getElementById('side-menu').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
        if(document.getElementById('side-menu').classList.contains('open')) loadOnlineSidebar();
    }

    async function loadOnlineSidebar() {
        const { data: users } = await _s.from('profiles').select('username, avatar_url');
        const container = document.getElementById('online-users-container');
        container.innerHTML = '<h3 style="text-align:center; color:#0f0;">👥 იუზერები</h3>';
        users?.forEach(u => {
            if (u.username !== myNick) {
                const ava = u.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${u.username}`;
                container.innerHTML += `<div class="user-row" onclick="openChat('${u.username}'); toggleMenu();"><img src="${ava}" class="avatar-img"><span>${u.username}</span></div>`;
            }
        });
    }

    function goBack() {
        if (activeChatPartner) {
            activeChatPartner = null;
            document.getElementById('view-title').innerText = "პირადი";
            document.getElementById('chat-view').classList.remove('active');
            document.getElementById('chat-input').classList.remove('show');
            document.getElementById('inbox-view').classList.add('active');
            document.getElementById('emoji-picker').style.display = 'none';
            loadInbox();
        } else { location.href = 'chat.html'; }
    }

    window.onload = loadInbox;

    _s.channel('pms_realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'private_messages' }, () => {
        if (activeChatPartner) loadPrivateMessages();
        loadInbox();
    }).subscribe();
</script>
</body>
</html>
