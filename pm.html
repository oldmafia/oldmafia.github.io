<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM - Abu007 System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #050000; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Header */
        .header { padding: 12px; text-align: center; border-bottom: 1px solid #200; background: #000; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { cursor: pointer; font-size: 24px; color: white; }
        
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 100px; display: none; }
        .active { display: block !important; }

        /* Messages */
        .msg-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #333; object-fit: cover; cursor: pointer; }
        .bubble { background: #0d0d0d; border: 1px solid #222; padding: 10px; border-radius: 12px; max-width: 80%; }
        .nick { font-weight: bold; font-size: 13px; color: #ff0000; margin-bottom: 5px; cursor: pointer; display: block; }
        .txt { font-size: 14px; color: #eee; word-break: break-word; }
        .meta { font-size: 10px; color: #444; margin-top: 5px; display: flex; gap: 10px; align-items: center; }
        .del-link { color: #500; cursor: pointer; font-weight: bold; }

        /* Profile Modal */
        #profile-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #000; width: 90%; max-width: 360px; border: 2px solid #500; border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        .m-ava { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #f00; object-fit: cover; margin-bottom: 15px; }
        .m-nick { color: red; font-size: 24px; margin: 0; }
        .m-role { color: #aaa; font-size: 14px; margin: 5px 0 15px; }
        .stats-box { background: #080808; padding: 12px; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; text-align: left; }
        
        /* Admin Buttons */
        .admin-controls { display: none; flex-direction: column; gap: 8px; }
        .m-btn { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #0a0a0a; color: white; cursor: pointer; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .m-btn.chat-btn { background: #004444; border-color: #006666; display: flex; }
        .m-btn.ban-btn { color: #f33; border-color: #500; }

        /* Emoji Board */
        #emoji-picker { position: fixed; bottom: 85px; left: 10px; right: 10px; background: #000; border: 2px solid #500; border-radius: 15px; padding: 10px; display: none; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; z-index: 9999; max-height: 220px; overflow-y: auto; }
        .emoji-img { width: 100%; cursor: pointer; transition: 0.1s; }
        .emoji-img:active { transform: scale(0.9); }

        /* Input Bar */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #111; display: none; gap: 10px; align-items: center; z-index: 9000; }
        .input-box { flex: 1; background: #050505; border: 1px solid #200; color: white; padding: 12px 18px; border-radius: 30px; outline: none; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" class="back-btn">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold;">პირადი</div>
    <div onclick="location.reload()" style="cursor:pointer; font-size: 20px;">🔄</div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div id="profile-modal" onclick="closeProfile()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="m-ava" src="" class="m-ava">
        <h2 id="m-nick" class="m-nick"></h2>
        <div id="m-role-text" class="m-role">👤 მომხმარებელი</div>
        
        <div class="stats-box">
            <p style="margin:5px 0">🏆 ვიქტორინა: <span id="m-quiz" style="color:gold">0</span></p>
            <p style="margin:5px 0">🔐 შიფროგრამა: <span id="m-cipher" style="color:#0cf">0</span></p>
        </div>

        <div class="m-btn chat-btn" onclick="closeProfile()">✉ მიმოწერა</div>
        
        <div id="admin-area" class="admin-controls">
            <div class="m-btn" onclick="updateUserRole('ადმინი')">🛡 ადმინად დანიშვნა</div>
            <div class="m-btn" onclick="updateUserRole('დამფუძნებელი')">👑 დამფუძნებლად დანიშვნა</div>
            <div class="m-btn">✨ როლის ჩახსნა</div>
            <div class="m-btn ban-btn">🚫 დაბლოკვა (BAN)</div>
        </div>

        <div class="m-btn" onclick="closeProfile()" style="background:#1a0000; margin-top:10px;">დახურვა</div>
    </div>
</div>

<div class="bottom-bar" id="input-bar">
    <div onclick="toggleEmojis()" style="font-size:28px; cursor:pointer">😊</div>
    <input type="text" id="main-input" class="input-box" placeholder="დაწერე მესიჯი...">
    <div onclick="sendMsg()" style="font-size:28px; cursor:pointer; color:red">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    let activeUser = new URLSearchParams(window.location.search).get('to');
    let uCache = {};

    function parseBB(t) { return t.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:120px; border-radius:8px; display:block; margin-top:5px;">'); }

    async function init() {
        const { data } = await _s.from('profiles').select('*');
        data?.forEach(u => uCache[u.username] = u);
        if (activeUser) openChat(activeUser); else loadInbox();
    }

    async function loadInbox() {
        const { data } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const box = document.getElementById('inbox-view'); box.innerHTML = "";
        const partners = new Set();
        data?.forEach(m => partners.add(m.sender === myNick ? m.receiver : m.sender));
        partners.forEach(p => {
            const u = uCache[p] || {};
            box.innerHTML += `<div style="display:flex; padding:15px; border-bottom:1px solid #111; align-items:center; cursor:pointer" onclick="openChat('${p}')">
                <img src="${u.avatar_url}" class="avatar">
                <b style="color:red; margin-left:15px;">${p}</b>
            </div>`;
        });
    }

    async function openChat(p) {
        activeUser = p; document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').style.display = 'none';
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex';
        loadMessages();
    }

    async function loadMessages() {
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeUser}"),and(sender.eq."${activeUser}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const area = document.getElementById('chat-view'); area.innerHTML = "";
        data?.forEach(m => {
            const u = uCache[m.sender] || {};
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            area.innerHTML += `<div class="msg-row">
                <img src="${u.avatar_url}" class="avatar" onclick="showUser('${m.sender}')">
                <div class="bubble">
                    <span class="nick" onclick="showUser('${m.sender}')">${m.sender}</span>
                    <div class="txt">${parseBB(m.text)}</div>
                    <div class="meta">${time} ${m.sender === myNick ? `<span class="del-link" onclick="deleteMsg('${m.id}')">წაშლა</span>` : ''}</div>
                </div>
            </div>`;
        });
        area.scrollTop = area.scrollHeight;
    }

    function showUser(n) {
        const u = uCache[n]; if(!u) return;
        document.getElementById('m-nick').innerText = u.username;
        document.getElementById('m-ava').src = u.avatar_url;
        document.getElementById('m-quiz').innerText = u.quiz_points || 0;
        document.getElementById('m-cipher').innerText = u.cipher_points || 0;
        
        // როლის ტექსტი
        const rTxt = document.getElementById('m-role-text');
        if(u.role === 'დამფუძნებელი') rTxt.innerHTML = `👑 <span style="color:orange">დამფუძნებელი</span>`;
        else if(u.role === 'ადმინი') rTxt.innerHTML = `🛡 <span style="color:cyan">ადმინი</span>`;
        else rTxt.innerHTML = `👤 მომხმარებელი`;

        // უფლებების შემოწმება - მხოლოდ Abu007 ხედავს ადმინ ღილაკებს
        document.getElementById('admin-area').style.display = (myNick === 'Abu007') ? 'flex' : 'none';
        document.getElementById('profile-modal').style.display = 'flex';
    }

    async function updateUserRole(newRole) {
        const target = document.getElementById('m-nick').innerText;
        const { error } = await _s.from('profiles').update({ role: newRole }).eq('username', target);
        if(!error) { alert("როლი განახლდა!"); location.reload(); }
    }

    async function toggleEmojis() {
        const p = document.getElementById('emoji-picker');
        if (p.style.display === 'grid') { p.style.display = 'none'; return; }
        const { data } = await _s.from('emojis').select('*');
        p.innerHTML = data.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('');
        p.style.display = 'grid';
    }

    function addEmoji(url) {
        const input = document.getElementById('main-input');
        input.value += `[img]${url}[/img]`;
        document.getElementById('emoji-picker').style.display = 'none';
        input.focus();
    }

    async function sendMsg() {
        const inp = document.getElementById('main-input');
        if (!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeUser, text: inp.value }]);
        inp.value = ""; loadMessages();
    }

    async function deleteMsg(id) {
        if(confirm("წავშალოთ მესიჯი?")) {
            await _s.from('private_messages').delete().eq('id', id);
            loadMessages();
        }
    }

    function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }
    function goBack() { location.href = activeUser ? 'pm.html' : 'chat.html'; }
    window.onload = init;
</script>
</body>
</html>
