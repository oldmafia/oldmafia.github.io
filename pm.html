<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease; }
        
        /* ღამის რეჟიმი */
        body.night-mode {
            --bg-color: #030000;
            --text-color: white;
            --chat-bg: radial-gradient(circle at center, #1a0000 0%, #030000 100%);
            --bubble-bg: rgba(25, 0, 0, 0.9);
            --bubble-border: #660000;
            --nick-color: #ff6666;
            --input-bg: #080000;
            --input-border: #660000;
            --topbar-bg: black;
            --inbox-border: #150000;
            --inbox-hover: #1a0000;
            --heart-color: #ff6666;
        }
        
        /* დღის რეჟიმი */
        body.day-mode {
            --bg-color: #fff8f0;
            --text-color: #2c2418;
            --chat-bg: #fffef7;
            --bubble-bg: #ffffff;
            --bubble-border: #e8d4b0;
            --nick-color: #c55a3a;
            --input-bg: #ffffff;
            --input-border: #e8d4b0;
            --topbar-bg: #fff4e6;
            --inbox-border: #f0e4cc;
            --inbox-hover: #fff0e6;
            --heart-color: #ff4d4d;
            /* CSS გულები ფონზე */
            background-image: 
                radial-gradient(circle at 10% 15%, transparent 8px, #ff4d4d 8px, transparent 9px),
                radial-gradient(circle at 25% 45%, transparent 6px, #ff4d4d 6px, transparent 7px),
                radial-gradient(circle at 40% 75%, transparent 10px, #ff4d4d 10px, transparent 11px),
                radial-gradient(circle at 55% 25%, transparent 7px, #ff4d4d 7px, transparent 8px),
                radial-gradient(circle at 70% 55%, transparent 9px, #ff4d4d 9px, transparent 10px),
                radial-gradient(circle at 85% 85%, transparent 5px, #ff4d4d 5px, transparent 6px),
                radial-gradient(circle at 92% 35%, transparent 8px, #ff4d4d 8px, transparent 9px);
            background-size: 180px 180px, 220px 220px, 200px 200px, 250px 250px, 190px 190px, 210px 210px, 170px 170px;
            background-repeat: repeat;
            background-position: 0 0, 30px 50px, 80px 20px, 120px 100px, 40px 150px, 160px 80px, 200px 180px;
        }
        
        /* ღაჟღაჟა გულების ანიმაცია */
        @keyframes heartGlow {
            0% { filter: drop-shadow(0 0 2px #ff6699) drop-shadow(0 0 4px #ff3366); transform: scale(1); }
            50% { filter: drop-shadow(0 0 12px #ff88aa) drop-shadow(0 0 20px #ff4466); transform: scale(1.05); }
            100% { filter: drop-shadow(0 0 2px #ff6699) drop-shadow(0 0 4px #ff3366); transform: scale(1); }
        }
        
        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        .header {
            padding: 15px;
            border-bottom: 2px solid var(--nick-color);
            background: var(--topbar-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .header b:first-child {
            cursor: pointer;
            color: var(--nick-color);
            font-size: 22px;
        }
        #p-name {
            font-weight: bold;
            color: var(--nick-color);
        }
        .header b:last-child {
            cursor: pointer;
            color: var(--nick-color);
            font-size: 18px;
        }
        
        #main-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background: transparent;
        }
        
        /* Inbox View */
        .inbox-item {
            padding: 15px;
            border-bottom: 1px solid var(--inbox-border);
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
            background: rgba(255, 255, 255, 0.7);
        }
        body.night-mode .inbox-item {
            background: rgba(0, 0, 0, 0.5);
        }
        .inbox-item:hover {
            background: var(--inbox-hover);
        }
        .inbox-avatar-wrapper {
            width: 50px;
            height: 50px;
            margin-right: 15px;
            position: relative;
        }
        .inbox-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--nick-color);
            object-fit: cover;
            background: #c0a080;
        }
        .inbox-heart {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            filter: drop-shadow(0 0 8px #ff6699);
            animation: heartGlow 1.5s infinite;
            color: var(--heart-color);
            background: transparent;
        }
        .inbox-nick {
            font-weight: bold;
            font-size: 16px;
            flex: 1;
            color: var(--text-color);
        }
        .unread-dot {
            width: 12px;
            height: 12px;
            background: #ff4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4444;
            margin-left: 10px;
            animation: heartGlow 1s infinite;
        }
        
        /* Chat View */
        #chat-view {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 100px;
        }
        .msg-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            position: relative;
        }
        .msg-avatar-wrapper {
            width: 35px;
            height: 35px;
            position: relative;
        }
        .msg-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid var(--nick-color);
            object-fit: cover;
            background: #c0a080;
        }
        .msg-heart {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            filter: drop-shadow(0 0 6px #ff6699);
            animation: heartGlow 1.5s infinite;
            color: var(--heart-color);
            background: transparent;
        }
        .bubble {
            background: var(--bubble-bg);
            border: 1px solid var(--bubble-border);
            padding: 10px;
            border-radius: 12px;
            max-width: 75%;
            border-left: 3px solid var(--nick-color);
            position: relative;
        }
        .msg-nick {
            color: var(--nick-color);
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
        }
        .msg-text {
            color: var(--text-color);
            font-size: 14px;
            line-height: 1.4;
            word-break: break-all;
        }
        .msg-text img {
            width: 28px;
            vertical-align: middle;
            margin: 2px;
        }
        .msg-info {
            font-size: 9px;
            color: #888;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
        }
        .del-btn {
            color: #ff6666;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }
        
        /* Controls */
        #emoji-picker {
            position: fixed;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background: var(--bubble-bg);
            border: 2px solid var(--bubble-border);
            border-radius: 15px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 15px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
        }
        .emoji-wrapper {
            position: relative;
        }
        .emoji-img {
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
        }
        .emoji-del {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #000;
        }
        .bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 12px;
            background: var(--topbar-bg);
            border-top: 1px solid var(--bubble-border);
            display: flex;
            gap: 10px;
            align-items: center;
            box-sizing: border-box;
        }
        .input-box {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
            padding: 12px;
            border-radius: 20px;
            outline: none;
        }
        .upload-btn {
            grid-column: span 5;
            background: var(--nick-color);
            color: white;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            margin-top: 5px;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 0 10px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <b onclick="goBack()" style="cursor:pointer;">⬅</b>
        <span id="p-name">შემოსულები</span>
        <div style="display: flex; align-items: center;">
            <button class="theme-toggle" id="themeToggle
