<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>პირადი - Abu007</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #050000; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { padding: 12px; text-align: center; border-bottom: 1px solid #300; background: #000; display: flex; align-items: center; justify-content: space-between; }
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 100px; display: none; }
        .active { display: block !important; }

        /* მესიჯების სტილი - ფოტოზე როგორცაა */
        .msg-container { display: flex; width: 100%; margin-bottom: 15px; gap: 10px; justify-content: flex-start; align-items: flex-start; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid #444; cursor: pointer; }
        .bubble { padding: 10px; border-radius: 10px; max-width: 75%; background: #0a0a0a; border: 1px solid #200; position: relative; }
        .nick-label { font-weight: bold; font-size: 13px; color: #ff0000; margin-bottom: 4px; cursor: pointer; }
        .msg-text { font-size: 14px; color: #eee; line-height: 1.4; }

        /* საათი და წაშლა */
        .msg-info { display: flex; gap: 10px; align-items: center; margin-top: 6px; font-size: 10px; color: #444; }
        .del-btn { color: #800; cursor: pointer; font-weight: bold; }

        /* პროფილის მოდალი - ფოტოდან */
        #profile-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; display: none;
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: #000; width: 90%; max-width: 340px; border: 2px solid #500;
            border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 0 30px rgba(255,0,0,0.2);
        }
        .modal-avatar { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #f00; object-fit: cover; margin-bottom: 15px; }
        .modal-btn { 
            display: block; width: 100%; padding: 14px; margin-top: 12px; 
            border-radius: 12px; border: 1px solid #333; background: #080808; color: white;
            font-weight: bold; cursor: pointer;
        }

        /* სმაილების დაფა */
        #emoji-picker { 
            position: fixed; bottom: 85px; left: 10px; right: 10px; 
            background: #000; border: 2px solid #500; border-radius: 15px; 
            padding: 12px; display: none; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); 
            gap: 10px; z-index: 8000; max-height: 300px; overflow-y: auto;
        }
        .emoji-img { width: 100%; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .emoji-img:hover { transform: scale(1.1); background: #222; }

        /* ქვედა პანელი */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #111; display: none; gap: 10px; align-items: center; z-index: 7000; }
        .input-box { flex: 1; background: #050505; border: 1px solid #200; color: white; padding: 12px 18px; border-radius: 30px; outline: none; }
        .unread-dot { background: #f00; color: #fff; border-radius: 12px; padding: 2px 8px; font-size: 11px; font-weight: bold; margin-left: auto; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 22px;">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold; font-size: 18px;">პირადი</div>
    <div onclick="location.reload()" style="cursor:pointer;">🔄</div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div id="profile-modal" onclick="closeProfile()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="m-ava" src="" class="modal-avatar">
        <h2 id="m-nick" style="color:red; margin: 0 0 15px 0; font-size: 24px;"></h2>
        <div style="text-align: left; padding: 0 20px; font-size: 15px;">
            <p style="color:#gold; margin: 8px 0;">🏆 ვიქტორინა: <span id="m-quiz" style="color:gold">0</span></p>
            <p style="color:#0cf; margin: 8px 0;">🔐 შიფროგრამა: <span id="m-cipher" style="color:#0cf">0</span></p>
        </div>
        <div class="modal-btn" style="background: #1a0000; border-color: #500; color: red;" onclick="closeProfile()">დახურვა</div>
    </div>
</div>

<div class="bottom-bar" id="input-bar">
    <div onclick="toggleEmojis()" style="font-size:28px; cursor:pointer">😊</div>
    <input type="text" id="msg-input" class="input-box" placeholder="დაწერე მესიჯი...">
    <div onclick="sendMessage()" style="font-size:28px; cursor:pointer; color:red">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || 'Abu007';
    let activeP = new URLSearchParams(window.location.search).get('to');
    let usersData = {};

    function parseBBCode(text) {
        return text.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:120px; border-radius:8px; display:block; margin:8px 0;">');
    }

    async function loadData() {
        const { data: profs } = await _s.from('profiles').select('*');
        profs?.forEach(p => usersData[p.username] = p);
        if (activeP) { openChat(activeP); } else { loadInbox(); }
    }

    async function loadInbox() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const box = document.getElementById('inbox-view'); box.innerHTML = "";
        const partners = {};
        msgs?.forEach(m => {
            const p = m.sender === myNick ? m.receiver : m.sender;
            if (!partners[p]) partners[p] = { text: m.text, unreadCount: 0 };
            if (m.receiver === myNick && !m.is_read) partners[p].unreadCount++;
        });

        for (let p in partners) {
            const ava = usersData[p]?.avatar_url || 'https://via.placeholder.com/50';
            box.innerHTML += `
                <div style="display:flex; padding:18px; border-bottom:1px solid #111; align-items:center; cursor:pointer" onclick="openChat('${p}')">
                    <img src="${ava}" class="avatar">
                    <div style="flex:1; margin-left:15px;">
                        <b style="color:red; font-size:16px;">${p}</b><br>
                        <small style="color:#666">${partners[p].text.substring(0,35)}...</small>
                    </div>
                    ${partners[p].unreadCount > 0 ? `<span class="unread-dot">${partners[p].unreadCount}</span>` : ''}
                </div>`;
        }
    }

    async function openChat(p) {
        activeP = p; 
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').style.display = 'none';
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex';
        await _s.from('private_messages').update({ is_read: true }).match({ sender: p, receiver: myNick, is_read: false });
        loadMessages();
    }

    async function loadMessages() {
        if(!activeP) return;
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const area = document.getElementById('chat-view'); area.innerHTML = "";
        
        msgs?.forEach(m => {
            const isMe = m.sender === myNick;
            const u = usersData[m.sender] || { avatar_url: '' };
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            area.innerHTML += `
                <div class="msg-container">
                    <img src="${u.avatar_url}" class="avatar" onclick="showProfile('${m.sender}')">
                    <div class="bubble">
                        <div class="nick-label" onclick="showProfile('${m.sender}')">${m.sender}</div>
                        <div class="msg-text">${parseBBCode(m.text)}</div>
                        <div class="msg-info">
                            <span>${time}</span>
                            ${(myNick === 'Abu007') ? `<span class="del-btn" onclick="deleteMsg('${m.id}')">✖</span>` : ''}
                        </div>
                    </div>
                </div>`;
        });
        area.scrollTop = area.scrollHeight;
    }

    function showProfile(nick) {
        const u = usersData[nick] || { username: nick, avatar_url: '', quiz_points: 0, cipher_points: 0 };
        document.getElementById('m-nick').innerText = u.username;
        document.getElementById('m-ava').src = u.avatar_url || 'https://via.placeholder.com/110';
        document.getElementById('m-quiz').innerText = u.quiz_points || 0;
        document.getElementById('m-cipher').innerText = u.cipher_points || 0;
        document.getElementById('profile-modal').style.display = 'flex';
    }

    function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }

    async function toggleEmojis() {
        const picker = document.getElementById('emoji-picker');
        if (picker.style.display === 'grid') { picker.style.display = 'none'; return; }
        const { data } = await _s.from('emojis').select('*');
        picker.innerHTML = data?.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('');
        picker.style.display = 'grid';
    }

    function addEmoji(url) {
        const input = document.getElementById('msg-input');
        input.value += `[img]${url}[/img]`;
        document.getElementById('emoji-picker').style.display = 'none';
        input.focus();
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        if (!i.value.trim() || !activeP) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: i.value, is_read: false }]);
        i.value = ""; loadMessages();
    }

    async function deleteMsg(id) {
        if (confirm("წავშალოთ მესიჯი?")) {
            await _s.from('private_messages').delete().eq('id', id);
            loadMessages();
        }
    }

    function goBack() { 
        if(activeP) { window.location.href = 'pm.html'; } 
        else { window.location.href = 'chat.html'; }
    }
    window.onload = loadData;
</script>
</body>
</html>
