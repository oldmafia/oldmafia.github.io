<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 15px; border-bottom: 2px solid red; background: #050505; display: flex; justify-content: space-between; align-items: center; }
        #chat-view { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        /* ყველა მესიჯი მარცხნივ */
        .bubble { 
            background: #111; 
            border: 1px solid #333; 
            padding: 10px; 
            border-radius: 15px; 
            max-width: 85%; 
            align-self: flex-start; /* აიძულებს ყველას მარცხნივ ყოფნას */
            border-left: 3px solid red;
        }
        .msg-info { font-size: 9px; color: #555; margin-top: 5px; display: flex; justify-content: space-between; }
        .del-btn { color: #f00; cursor: pointer; margin-left: 10px; font-weight: bold; }
        .bottom-bar { padding: 12px; background: #000; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 20px; outline: none; }
        #emoji-picker { position: fixed; bottom: 80px; left: 10px; right: 10px; background: #080808; border: 2px solid red; border-radius: 15px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; max-height: 250px; overflow-y: auto; }
        .emoji-img { width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <b onclick="window.location.href='pm.html'" style="cursor:pointer; color:red;">⬅</b>
        <span id="p-name">მიმოწერა</span>
        <b onclick="location.reload()">🔄</b>
    </div>

    <div id="chat-view"></div>
    <div id="emoji-picker"></div>

    <div class="bottom-bar">
        <div onclick="toggleEmoji()" style="font-size:30px; cursor:pointer;">😊</div>
        <input type="text" id="pm-input" class="input-box" placeholder="დაწერე მესიჯი...">
        <div onclick="sendMsg()" style="font-size:30px; color:red; cursor:pointer;">✈</div>
    </div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    const partner = new URLSearchParams(window.location.search).get('to');
    const myRole = localStorage.getItem('role');

    async function load() {
        if(!partner) return;
        document.getElementById('p-name').innerText = partner;
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        
        document.getElementById('chat-view').innerHTML = data.map(m => {
            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return `
                <div class="bubble">
                    <b style="color:red; font-size:11px;">${m.sender}</b>
                    <div style="word-break:break-all; margin-top:4px;">
                        ${m.text.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:120px; border-radius:8px; display:block; margin-top:5px;">')}
                    </div>
                    <div class="msg-info">
                        <span>${time}</span>
                        ${(m.sender === myNick || myRole === 'დამფუძნებელი') ? `<span class="del-btn" onclick="delMsg(${m.id})">✖</span>` : ''}
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('chat-view').scrollTop = 99999;
        await _s.from('private_messages').update({ is_read: true }).eq('receiver', myNick).eq('sender', partner);
    }

    async function delMsg(id) {
        if(!confirm("წავშალოთ მესიჯი?")) return;
        await _s.from('private_messages').delete().eq('id', id);
        load();
    }

    async function sendMsg() {
        const inp = document.getElementById('pm-input');
        if(!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: inp.value, is_read: false }]);
        inp.value = ""; load();
    }

    async function toggleEmoji() {
        const p = document.getElementById('emoji-picker');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
        if(p.style.display === 'grid') {
            const { data } = await _s.from('emojis').select('*');
            p.innerHTML = (data || []).map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('') +
            `<button onclick="addEmojiToDB()" style="grid-column: span 5; background:red; color:white; border:none; padding:10px; border-radius:5px; margin-top:10px; cursor:pointer;">➕ სმაილის დამატება</button>`;
        }
    }

    async function addEmojiToDB() {
        const url = prompt("ჩაწერე სმაილის URL:");
        if (url) {
            await _s.from('emojis').insert([{ emoji_url: url }]);
            toggleEmoji();
        }
    }

    function addEmoji(url) {
        document.getElementById('pm-input').value += ` [img]${url}[/img] `;
        document.getElementById('emoji-picker').style.display = 'none';
        document.getElementById('pm-input').focus();
    }

    setInterval(load, 4000); load();
</script>
</body>
</html>
