<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>პირადი - OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --dark-red: #4a0000; --bright-red: #ff0000; --bg-black: #050000; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-black); color: white; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        /* ჰედერი */
        .header { 
            padding: 15px; text-align: center; border-bottom: 2px solid var(--bright-red); 
            background: #000; display: flex; align-items: center; justify-content: space-between; 
            z-index: 1001; box-shadow: 0 2px 10px rgba(255,0,0,0.2);
        }
        .back-btn { color: white; font-size: 24px; cursor: pointer; padding: 0 10px; }

        /* ჩატის ზონა */
        #inbox-view, #chat-view { 
            flex: 1; overflow-y: auto; display: none; padding: 15px; 
            padding-bottom: 150px; /* ადგილი საწერი გრაფისთვის */
            scroll-behavior: smooth;
        }
        #inbox-view.active, #chat-view.active { display: block; }

        /* მესიჯების სტილი - რომ არ "ჩაიყაროს" ბანძურად */
        .msg-wrap { display: flex; width: 100%; margin-bottom: 15px; align-items: flex-end; }
        .msg { 
            padding: 12px 16px; border-radius: 18px; max-width: 80%; 
            font-size: 15px; line-height: 1.5; position: relative;
            word-wrap: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .sent { 
            background: linear-gradient(135deg, #600, #300); 
            margin-left: auto; border: 1px solid #900; 
            border-bottom-right-radius: 4px; color: #eee;
        }
        .received { 
            background: #1a1a1a; border: 1px solid #333; 
            border-bottom-left-radius: 4px; color: #fff;
        }
        .m-info { font-size: 10px; color: gold; margin-bottom: 4px; font-weight: bold; opacity: 0.8; }
        .m-text img { width: 40px; height: 40px; vertical-align: middle; margin: 2px; }

        /* ინბოქსის იუზერები */
        .user-row { 
            display: flex; align-items: center; gap: 12px; margin-bottom: 12px; 
            cursor: pointer; padding: 15px; border-radius: 12px; 
            background: #0a0a0a; border: 1px solid #400; transition: 0.3s;
        }
        .user-row:active { background: #150000; }
        .avatar-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--bright-red); }

        /* სმაილების ფანჯარა */
        #emoji-picker { 
            display: none; position: fixed; bottom: 110px; left: 10px; 
            background: #000; border: 2px solid var(--bright-red); 
            padding: 10px; border-radius: 15px; width: 90%; max-width: 320px; z-index: 3000; 
        }
        #emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 200px; overflow-y: auto; }
        .emoji-item { width: 45px; height: 45px; cursor: pointer; object-fit: contain; }

        /* საწერი გრაფა - იდეალურად აწეული */
        .input-area { 
            padding: 15px; background: #000; 
            border-top: 3px solid var(--bright-red); 
            display: none; gap: 10px; align-items: center; 
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding-bottom: 50px; /* აწეულია კომფორტულად */
            z-index: 2000;
        }
        .input-area.show { display: flex !important; }
        .input-area input { 
            flex: 1; background: #111; border: 1px solid #600; 
            color: white; padding: 12px 15px; border-radius: 25px; 
            outline: none; font-size: 16px;
        }
        .send-btn { background: none; border: none; color: var(--bright-red); font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="back-btn" onclick="goBack()">⬅</div>
    <div id="view-title" style="color:var(--bright-red); font-weight:bold; font-size: 18px;">პირადი</div>
    <div style="font-size:24px; cursor:pointer;" onclick="toggleMenu()">👥</div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>

<div id="emoji-picker"><div id="emoji-grid"></div></div>

<div class="input-area" id="chat-input">
    <button onclick="toggleEmojiPicker()" style="background:none; border:none; font-size:24px; cursor:pointer;">😊</button>
    <input type="text" id="msg-text" placeholder="დაწერე მესიჯი..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">✈</button>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), activeChatPartner = null;
    const emojiBase = "https://ftfciebnywbondaiarnc.supabase.co/storage/v1/object/public/emojis/";

    function parseEmojis(text) {
        if (!text) return "";
        return text.split(' ').map(word => {
            if (word.trim().match(/\.(gif|png|jpg|webp)$/i)) return `<img src="${emojiBase}${word.trim()}">`;
            return word;
        }).join(' ');
    }

    async function loadInbox() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const { data: profiles } = await _s.from('profiles').select('username, avatar_url');
        const historyDiv = document.getElementById('inbox-view');
        historyDiv.innerHTML = "";
        const chats = {};

        msgs?.forEach(m => {
            const partner = (m.sender === myNick) ? m.receiver : m.sender;
            if (!chats[partner]) {
                const prof = profiles?.find(p => p.username === partner);
                chats[partner] = { lastMsg: m.text, avatar: prof?.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${partner}` };
            }
        });

        for (const partner in chats) {
            historyDiv.innerHTML += `
                <div class="user-row" onclick="openChat('${partner}')">
                    <img src="${chats[partner].avatar}" class="avatar-img">
                    <div style="flex:1">
                        <b style="color:var(--bright-red)">${partner}</b><br>
                        <small style="opacity:0.5">${chats[partner].lastMsg.substring(0,25)}...</small>
                    </div>
                </div>`;
        }
    }

    async function openChat(partner) {
        activeChatPartner = partner;
        document.getElementById('view-title').innerText = partner;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('chat-input').classList.add('show');
        loadPrivateMessages();
    }

    async function loadPrivateMessages() {
        if (!activeChatPartner) return;
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeChatPartner}"),and(sender.eq."${activeChatPartner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const chatDiv = document.getElementById('chat-view');
        chatDiv.innerHTML = msgs?.map(m => `
            <div class="msg-wrap">
                <div class="msg ${m.sender === myNick ? 'sent' : 'received'}">
                    <div class="m-info">${m.sender}</div>
                    <div class="m-text">${parseEmojis(m.text)}</div>
                </div>
            </div>`).join('');
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMessage() {
        const inp = document.getElementById('msg-text');
        const txt = inp.value.trim();
        if (!txt || !activeChatPartner) return;
        inp.value = "";
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeChatPartner, text: txt, is_read: false }]);
        loadPrivateMessages();
    }

    async function loadEmojis() {
        const { data: ems } = await _s.from('emojis').select('*').order('id');
        const grid = document.getElementById('emoji-grid');
        grid.innerHTML = (ems || []).map(e => `<img src="${emojiBase}${e.name}" class="emoji-item" onclick="insertEmoji('${e.name}')">`).join('');
    }

    function insertEmoji(name) {
        document.getElementById('msg-text').value += name + " ";
        document.getElementById('msg-text').focus();
    }

    function toggleEmojiPicker() {
        const p = document.getElementById('emoji-picker');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        if (p.style.display === 'block') loadEmojis();
    }

    function goBack() {
        if (activeChatPartner) {
            activeChatPartner = null;
            document.getElementById('view-title').innerText = "პირადი";
            document.getElementById('chat-view').classList.remove('active');
            document.getElementById('chat-input').classList.remove('show');
            document.getElementById('inbox-view').classList.add('active');
            document.getElementById('emoji-picker').style.display = 'none';
            loadInbox();
        } else { location.href = 'chat.html'; }
    }

    window.onload = loadInbox;

    _s.channel('pms_realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'private_messages' }, () => {
        if (activeChatPartner) loadPrivateMessages();
        loadInbox();
    }).subscribe();

    // ენტერზე გაგზავნა
    document.getElementById('msg-text').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
