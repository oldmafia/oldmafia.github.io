<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px; border-bottom: 2px solid red; background: #050505; display: flex; justify-content: space-between; align-items: center; }
        #chat-view { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 80px; }
        .bubble { background: #111; border: 1px solid #333; padding: 10px; border-radius: 12px; max-width: 85%; align-self: flex-start; border-left: 3px solid red; position: relative; }
        .msg-info { font-size: 9px; color: #555; margin-top: 5px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { color: #f00; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .bottom-bar { position: fixed; bottom: 0; width: 100%; padding: 12px; background: #000; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; box-sizing: border-box; }
        .input-box { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 20px; outline: none; }
        #emoji-picker { position: fixed; bottom: 70px; left: 10px; right: 10px; background: #080808; border: 2px solid red; border-radius: 15px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; max-height: 250px; overflow-y: auto; z-index: 1000; }
        .emoji-img { width: 100%; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        .emoji-img:active { transform: scale(0.8); }
        .upload-lbl { grid-column: span 5; background: red; color: white; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <b onclick="window.location.href='chat.html'" style="cursor:pointer; color:red; font-size:22px;">⬅</b>
        <span id="p-name" style="font-weight:bold;">მიმოწერა</span>
        <b onclick="location.reload()" style="cursor:pointer;">🔄</b>
    </div>

    <div id="chat-view"></div>
    <div id="emoji-picker"></div>

    <div class="bottom-bar">
        <div onclick="toggleEmoji()" style="font-size:30px; cursor:pointer;">😊</div>
        <input type="text" id="pm-input" class="input-box" placeholder="დაწერე მესიჯი...">
        <div onclick="sendMsg()" style="font-size:30px; color:red; cursor:pointer;">✈</div>
    </div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    const partner = new URLSearchParams(window.location.search).get('to');
    const myRole = localStorage.getItem('role');

    async function load() {
        if(!partner) return;
        document.getElementById('p-name').innerText = partner;
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        
        if(data) {
            document.getElementById('chat-view').innerHTML = data.map(m => {
                const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                return `
                    <div class="bubble">
                        <b style="color:red; font-size:10px; display:block;">${m.sender}</b>
                        <div style="word-break:break-all; margin-top:4px; font-size:14px;">
                            ${m.text.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:140px; border-radius:8px; display:block; margin-top:5px;">')}
                        </div>
                        <div class="msg-info">
                            <span>${time}</span>
                            ${(m.sender === myNick || myRole === 'დამფუძნებელი') ? `<span class="del-btn" onclick="delMsg(${m.id})">✖</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('chat-view').scrollTop = 99999;
        }
        await _s.from('private_messages').update({ is_read: true }).eq('receiver', myNick).eq('sender', partner);
    }

    async function sendMsg() {
        const inp = document.getElementById('pm-input');
        if(!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: inp.value, is_read: false }]);
        inp.value = ""; load();
    }

    async function delMsg(id) {
        if(!confirm("წავშალოთ მესიჯი?")) return;
        await _s.from('private_messages').delete().eq('id', id);
        load();
    }

    async function toggleEmoji() {
        const p = document.getElementById('emoji-picker');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
        if(p.style.display === 'grid') {
            const { data } = await _s.from('emojis').select('*');
            p.innerHTML = (data || []).map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('') +
            `<label class="upload-lbl" id="up-btn">➕ ატვირთე მოწყობილობიდან
                <input type="file" hidden accept="image/*" onchange="uploadFile(this)">
            </label>`;
        }
    }

    async function uploadFile(input) {
        if (!input.files || input.files.length === 0) return;
        const btn = document.getElementById('up-btn');
        btn.innerText = "იტვირთება...";
        
        const file = input.files[0];
        const fileName = `${Date.now()}_${file.name}`;

        // 1. ატვირთვა Storage-ში
        const { data, error } = await _s.storage.from('emojis').upload(fileName, file);
        if (error) { alert("შეცდომა: " + error.message); btn.innerText = "➕ ატვირთე მოწყობილობიდან"; return; }

        // 2. ლინკის მიღება და ბაზაში ჩაწერა
        const { data: urlData } = _s.storage.from('emojis').getPublicUrl(fileName);
        await _s.from('emojis').insert([{ emoji_url: urlData.publicUrl }]);
        
        btn.innerText = "წარმატებულია!";
        setTimeout(toggleEmoji, 1000); 
    }

    function addEmoji(url) {
        document.getElementById('pm-input').value += ` [img]${url}[/img] `;
        document.getElementById('emoji-picker').style.display = 'none';
        document.getElementById('pm-input').focus();
    }

    setInterval(load, 5000);
    load();
</script>
</body>
</html>
