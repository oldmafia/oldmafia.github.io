<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { padding: 12px; text-align: center; border-bottom: 1px solid #300; background: #000; display: flex; align-items: center; justify-content: space-between; }
        .content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        #inbox-view, #chat-view { display: none; padding: 10px; }
        .active { display: block !important; }
        .user-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #111; cursor: pointer; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #500; margin-right: 12px; }
        .bubble { background: #150505; border: 1px solid #300; padding: 10px; border-radius: 12px; margin-bottom: 10px; max-width: 80%; }
        .my-msg { background: #0a1520; border-color: #004466; margin-left: auto; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 12px; border-top: 1px solid #200; display: none; gap: 10px; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #333; color: white; padding: 10px; border-radius: 20px; outline: none; }
        .send-btn { color: red; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 24px;">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold;">PM SYSTEM</div>
    <div onclick="location.reload()" style="cursor:pointer; font-size: 20px;">🔄</div>
</div>

<div class="content">
    <div id="inbox-view" class="active"></div>
    <div id="chat-view"></div>
</div>

<div class="bottom-bar" id="input-bar">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი...">
    <div onclick="sendMessage()" class="send-btn">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || "Abu007";
    let activeP = null;

    async function loadInbox() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const box = document.getElementById('inbox-view');
        box.innerHTML = "";
        const partners = new Set();
        
        msgs?.forEach(m => {
            const p = m.sender === myNick ? m.receiver : m.sender;
            if (!partners.has(p)) {
                partners.add(p);
                box.innerHTML += `<div class="user-row" onclick="openChat('${p}')">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${p}" class="avatar">
                    <b style="color:red">${p}</b>
                </div>`;
            }
        });
    }

    async function openChat(p) {
        activeP = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex';
        loadMessages();
    }

    async function loadMessages() {
        if(!activeP) return;
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const area = document.getElementById('chat-view');
        area.innerHTML = data.map(m => `
            <div class="bubble ${m.sender === myNick ? 'my-msg' : ''}">
                <small style="color:red">${m.sender}</small><br>${m.text}
            </div>
        `).join('');
        area.scrollTop = area.scrollHeight;
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        if (!i.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: i.value }]);
        i.value = ""; loadMessages();
    }

    function goBack() { location.href = "pm.html"; }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const chatWith = urlParams.get('chat');
        if (chatWith) openChat(chatWith); else loadInbox();
    };
</script>
</body>
</html>
