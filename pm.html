<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA PM - FIXED</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        .header { height: 60px; background: #050000; border-bottom: 2px solid #500; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        
        #main-area { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* საწერი ბარი - ყოველთვის გამოჩნდება ჩატში */
        #input-bar { 
            height: 70px; background: #080000; border-top: 2px solid #500; 
            display: none; align-items: center; padding: 10px; gap: 10px;
        }
        
        input { flex: 1; height: 45px; background: #151515; border: 1px solid #444; color: white; padding: 0 15px; border-radius: 20px; outline: none; }
        .send-btn { background: #800; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .user-row { padding: 15px; border-bottom: 1px solid #1a0000; background: #0a0000; cursor: pointer; margin-bottom: 5px; }
        .bubble { background: #1a0505; border: 1px solid #400; padding: 10px; border-radius: 12px; margin-bottom: 10px; max-width: 85%; }
        .my-msg { background: #300000; margin-left: auto; border-color: #700; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 24px; color: red;">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold;">PM SYSTEM</div>
    <div onclick="location.reload()" style="cursor:pointer; font-size: 20px; color: red;">🔄</div>
</div>

<div id="main-area">
    <div id="inbox-list"></div>
    <div id="chat-messages" style="display:none;"></div>
</div>

<div id="input-bar">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი...">
    <div onclick="sendMessage()" class="send-btn">SEND</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || "Abu007";
    let activeP = null;

    // 1. ინბოქსის ფუნქცია (კონვერტით შესვლისას)
    async function loadInbox() {
        activeP = null;
        document.getElementById('view-title').innerText = "შემოსულები";
        document.getElementById('inbox-list').style.display = 'block';
        document.getElementById('chat-messages').style.display = 'none';
        document.getElementById('input-bar').style.display = 'none';

        const { data } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        
        let html = "";
        const seen = new Set();
        if (data && data.length > 0) {
            data.forEach(m => {
                const p = m.sender === myNick ? m.receiver : m.sender;
                if (!seen.has(p)) {
                    seen.add(p);
                    html += `<div class="user-row" onclick="openChat('${p}')"><b style="color:red;">${p}</b></div>`;
                }
            });
        }
        document.getElementById('inbox-list').innerHTML = html || "<p style='text-align:center; padding:20px;'>მესიჯები არ არის</p>";
    }

    // 2. ჩატის გახსნის ფუნქცია (ეს ხსნის საწერ გრაფას მაშინაც, თუ მესიჯი არაა!)
    async function openChat(p) {
        if(!p) return;
        activeP = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-list').style.display = 'none';
        document.getElementById('chat-messages').style.display = 'block';
        
        // აი ეს არის მთავარი!
        document.getElementById('input-bar').style.display = 'flex';

        fetchMessages();
    }

    async function fetchMessages() {
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        
        const area = document.getElementById('chat-messages');
        if (data && data.length > 0) {
            area.innerHTML = data.map(m => `
                <div class="bubble ${m.sender === myNick ? 'my-msg' : ''}">
                    <b style="color:red; font-size:10px;">${m.sender}</b><br>${m.text}
                </div>
            `).join('');
        } else {
            area.innerHTML = "<p id='no-msg' style='text-align:center; padding:20px; color:#555;'>ამ ადამიანთან მიმოწერა ჯერ არ გაქვს. მიწერე!</p>";
        }
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        if (!i.value.trim()) return;
        
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: i.value }]);
        i.value = "";
        fetchMessages();
    }

    function goBack() {
        if (document.getElementById('chat-messages').style.display === 'block') loadInbox();
        else window.history.back();
    }

    // 🚀 ეს ნაწილი წყვეტს "SMS არა აქვს" პრობლემას
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const userToChat = urlParams.get('chat');
        
        if (userToChat) {
            openChat(userToChat); // თუ პროფილიდან მოვიდა, პირდაპირ ჩატს შლის
        } else {
            loadInbox(); // თუ კონვერტიდან მოვიდა, ნიკებს აჩვენებს
        }
    };
</script>
</body>
</html>
