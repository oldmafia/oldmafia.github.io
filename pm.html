<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Old Mafia PM</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* მარცხენა პანელი - ნიკები და ავატარები */
        .sidebar { width: 300px; border-right: 2px solid #e60000; background: #080808; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #e60000; font-weight: bold; text-align: center; font-size: 16px; }
        .contacts { flex: 1; overflow-y: auto; }
        .user-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .user-row:hover { background: #111; }
        .u-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #e60000; margin-right: 12px; }
        .u-nick { font-weight: bold; font-size: 14px; }

        /* მარჯვენა მხარე - ჩატი */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #000; }
        .chat-header { padding: 15px; border-bottom: 1px solid #222; color: #e60000; font-weight: bold; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* მესიჯის ბუშტები */
        .msg { display: flex; gap: 10px; max-width: 80%; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { background: #1a1a1a; padding: 10px; border-radius: 10px; position: relative; }
        .me .msg-bubble { background: #e60000; }
        .m-info { font-size: 9px; color: #666; display: block; margin-top: 5px; }
        .del-btn { color: #444; cursor: pointer; margin-left: 10px; font-size: 10px; }
        .del-btn:hover { color: #fff; }

        /* ქვედა ზონა - ინპუტი და სმაილები */
        .footer { padding: 15px; background: #0a0a0a; border-top: 1px solid #222; }
        .admin-tools { display: flex; gap: 5px; margin-bottom: 10px; }
        .input-row { display: flex; gap: 5px; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 4px; }
        button { background: #e60000; color: #fff; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">📩 შემოსულები</div>
    <div id="contacts-list" class="contacts"></div>
</div>

<div class="chat-area">
    <div id="chat-title" class="chat-header">აირჩიე ნიკი...</div>
    <div id="msg-box" class="messages"></div>
    
    <div class="footer">
        <div class="admin-tools">
            <input type="text" id="emoji-url" placeholder="სმაილის URL...">
            <button onclick="addEmoji()">➕</button>
        </div>
        <div class="input-row">
            <input type="text" id="msg-text" placeholder="დაწერე მესიჯი...">
            <button onclick="sendMessage()">✈️</button>
        </div>
    </div>
</div>

<script>
    let currentPeer = null;

    // 1. კონტაქტების ჩატვირთვა (ვინ მოგწერა)
    async function loadContacts() {
        const { data } = await supabase.from('private_messages')
            .select('*').eq('receiver_id', supabase.auth.user().id).order('created_at', {ascending: false});
        
        const list = document.getElementById('contacts-list');
        list.innerHTML = '';
        const seen = new Set();

        data.forEach(m => {
            if(!seen.has(m.sender_id)) {
                seen.add(m.sender_id);
                list.insertAdjacentHTML('beforeend', `
                    <div class="user-row" onclick="startChat('${m.sender_id}', '${m.sender_nickname}')">
                        <img src="${m.sender_avatar || 'default.png'}" class="u-avatar">
                        <span class="u-nick">${m.sender_nickname}</span>
                    </div>
                `);
            }
        });
    }

    // 2. ჩატის გახსნა
    function startChat(id, nick) {
        currentPeer = id;
        document.getElementById('chat-title').innerText = "საუბარი: " + nick;
        fetchMessages();
    }

    // 3. მესიჯების წამოღება (წაშლის ღილაკით)
    async function fetchMessages() {
        const { data } = await supabase.from('private_messages')
            .select('*').or(`sender_id.eq.${currentPeer},receiver_id.eq.${currentPeer}`);
        
        const box = document.getElementById('msg-box');
        box.innerHTML = '';
        data.forEach(m => {
            const isMe = m.sender_id === supabase.auth.user().id;
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            box.insertAdjacentHTML('beforeend', `
                <div class="msg ${isMe ? 'me' : ''}">
                    <div class="msg-bubble">
                        <b>${m.sender_nickname}:</b> ${m.content}
                        <span class="m-info">${time} <span class="del-btn" onclick="deleteMsg('${m.id}')">✖</span></span>
                    </div>
                </div>
            `);
        });
        box.scrollTop = box.scrollHeight;
    }

    // 4. სმაილის დამატება
    async function addEmoji() {
        const url = document.getElementById('emoji-url').value;
        if(url) {
            await supabase.from('emojis').insert([{ url: url }]);
            alert("სმაილი დაემატა!");
        }
    }

    // 5. მესიჯის წაშლა
    async function deleteMsg(id) {
        if(confirm("წავშალოთ?")) {
            await supabase.from('private_messages').delete().eq('id', id);
            fetchMessages();
        }
    }

    loadContacts();
</script>
</body>
</html>
