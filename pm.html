<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პირადი - OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        :root { --dark-red: #4a0000; --bright-red: #ff0000; --bg-black: #050000; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: 15px; text-align: center; border-bottom: 2px solid var(--dark-red); background: black; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { color: white; text-decoration: none; font-size: 24px; cursor: pointer; }

        #inbox-view, #chat-view { flex: 1; overflow-y: auto; display: none; padding: 15px; }
        #inbox-view.active, #chat-view.active { display: block; }

        /* ჩატის ჩარჩოები (რაც სურათზე გაქვს) */
        .user-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; cursor: pointer; padding: 15px; border-radius: 15px; background: rgba(30,0,0,0.5); border: 1px solid #500; }
        .avatar-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid var(--bright-red); }

        /* მესიჯები */
        .msg-wrap { display: flex; width: 100%; margin-bottom: 10px; }
        .msg { padding: 10px; border-radius: 12px; max-width: 80%; font-size: 14px; }
        .sent { background: var(--dark-red); margin-left: auto; }
        .received { background: #222; border: 1px solid #444; }

        /* საწერი გრაფა - იძულებითი გამოჩენა */
        .input-area { padding: 12px; background: black; border-top: 2px solid var(--dark-red); display: none; gap: 10px; align-items: center; }
        .input-area.show { display: flex !important; }
        .input-area input { flex: 1; background: #111; border: 1px solid #600; color: white; padding: 12px; border-radius: 20px; outline: none; }
        
        .side-menu { position: fixed; right: -280px; top: 0; width: 280px; height: 100%; background: #0a0000; border-left: 2px solid var(--dark-red); transition: 0.3s; z-index: 2000; padding: 20px; }
        .side-menu.open { right: 0; }
    </style>
</head>
<body>

<div class="header">
    <div class="back-btn" onclick="goBack()">⬅</div>
    <div id="view-title" style="color:var(--bright-red); font-weight:bold;">პირადი</div>
    <div style="font-size:24px; cursor:pointer;" onclick="toggleMenu()">👥</div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>

<div class="side-menu" id="side-menu"><div id="online-users-container"></div></div>

<div class="input-area" id="chat-input">
    <input type="text" id="msg-text" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()" style="background:none; border:none; color:cyan; font-size:24px; cursor:pointer;">✈</button>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), activeChatPartner = null;

    async function loadInbox() {
        // მოგვაქვს მესიჯები და იუზერების ინფორმაცია ავატარებისთვის
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const { data: profiles } = await _s.from('profiles').select('username, avatar_url');
        
        const historyDiv = document.getElementById('inbox-view');
        historyDiv.innerHTML = "";
        const chats = {};

        msgs?.forEach(m => {
            const partner = (m.sender === myNick) ? m.receiver : m.sender;
            if (!chats[partner]) {
                const prof = profiles?.find(p => p.username === partner);
                chats[partner] = { 
                    lastMsg: m.text, 
                    avatar: prof?.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${partner}` 
                };
            }
        });

        for (const partner in chats) {
            historyDiv.innerHTML += `
                <div class="user-row" onclick="openChat('${partner}')">
                    <img src="${chats[partner].avatar}" class="avatar-img">
                    <div style="flex:1">
                        <b style="color:var(--bright-red)">${partner}</b><br>
                        <small style="opacity:0.5">${chats[partner].lastMsg.substring(0,20)}...</small>
                    </div>
                </div>`;
        }
    }

    async function openChat(partner) {
        activeChatPartner = partner;
        document.getElementById('view-title').innerText = partner;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        
        // აი აქ არის მთავარი - ვაძალებთ გამოჩენას
        document.getElementById('chat-input').classList.add('show');
        
        loadPrivateMessages();
    }

    async function loadPrivateMessages() {
        if (!activeChatPartner) return;
        const { data: msgs } = await _s.from('private_messages').select('*')
            .or(`and(sender.eq."${myNick}",receiver.eq."${activeChatPartner}"),and(sender.eq."${activeChatPartner}",receiver.eq."${myNick}")`)
            .order('created_at', { ascending: true });

        const chatDiv = document.getElementById('chat-view');
        chatDiv.innerHTML = msgs?.map(m => `
            <div class="msg-wrap"><div class="msg ${m.sender === myNick ? 'sent' : 'received'}">
                <div style="font-size:10px; color:gold; margin-bottom:3px;">${m.sender}</div>
                <div>${m.text}</div>
            </div></div>`).join('');
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMessage() {
        const inp = document.getElementById('msg-text');
        const txt = inp.value.trim();
        if (!txt || !activeChatPartner) return;
        inp.value = "";
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeChatPartner, text: txt }]);
        loadPrivateMessages();
    }

    function goBack() {
        activeChatPartner = null;
        document.getElementById('view-title').innerText = "პირადი";
        document.getElementById('chat-view').classList.remove('active');
        document.getElementById('chat-input').classList.remove('show');
        document.getElementById('inbox-view').classList.add('active');
        loadInbox();
    }

    window.onload = loadInbox;

    // რეალურ დროში განახლება
    _s.channel('realtime_pms').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'private_messages' }, () => {
        if (activeChatPartner) loadPrivateMessages();
        loadInbox();
    }).subscribe();
</script>
</body>
</html>
