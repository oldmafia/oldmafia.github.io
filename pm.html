<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA PM - FINAL</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .header { height: 60px; background: #050000; border-bottom: 2px solid #500; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; }
        
        /* Main Area */
        #main-container { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* User List (Inbox) */
        .user-row { padding: 15px; border-bottom: 1px solid #1a0000; background: #0a0000; cursor: pointer; margin-bottom: 5px; border-radius: 8px; color: red; font-weight: bold; font-size: 18px; }
        
        /* Chat Messages */
        .bubble { background: #1a0505; border: 1px solid #400; padding: 12px; border-radius: 12px; margin-bottom: 10px; max-width: 85%; word-wrap: break-word; position: relative; }
        .mine { background: #300000; margin-left: auto; border-color: #700; }
        .sender-name { color: red; font-size: 10px; display: block; margin-bottom: 4px; }

        /* 🔥 INPUT BAR - FIXED & ALWAYS VISIBLE IN CHAT 🔥 */
        #input-bar { 
            height: 70px; background: #050000; border-top: 2px solid #500; 
            display: none; align-items: center; padding: 0 10px; gap: 10px; 
            flex-shrink: 0; position: relative; z-index: 999;
        }
        
        input { flex: 1; height: 45px; background: #111; border: 1px solid #444; color: white; padding: 0 15px; border-radius: 20px; outline: none; font-size: 16px; }
        .send-btn { background: #800; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 24px; color: red;">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold;">შემოსულები</div>
    <div onclick="location.reload()" style="cursor:pointer; font-size: 20px; color: red;">🔄</div>
</div>

<div id="main-container">
    <div id="inbox-view"></div>
    <div id="chat-view" style="display:none;"></div>
</div>

<div id="input-bar">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') send()">
    <div onclick="send()" class="send-btn">SEND</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    
    // აქ ჩაიწერება იმის ნიკი ვინც შედის (Abu007 მაგალითად)
    let myNick = localStorage.getItem('nickname') || "Abu007"; 
    let activeP = null;

    // 1. ნიკების სიის ჩატვირთვა
    async function loadInbox() {
        activeP = null;
        document.getElementById('view-title').innerText = "შემოსულები";
        document.getElementById('inbox-view').style.display = 'block';
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('input-bar').style.display = 'none';

        const { data } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        
        const box = document.getElementById('inbox-view');
        box.innerHTML = "";
        const partners = new Set();
        if (data && data.length > 0) {
            data.forEach(m => {
                const p = m.sender === myNick ? m.receiver : m.sender;
                if (!partners.has(p)) {
                    partners.add(p);
                    box.innerHTML += `<div class="user-row" onclick="openChat('${p}')">${p}</div>`;
                }
            });
        } else {
            box.innerHTML = "<p style='text-align:center; padding:30px; color:#555;'>ჯერ არავინ გწერს</p>";
        }
    }

    // 2. ჩატის გახსნა (პროფილიდან გადმოსვლისასაც)
    async function openChat(p) {
        if(!p) return;
        activeP = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').style.display = 'none';
        document.getElementById('chat-view').style.display = 'block';
        
        // საწერი გრაფა ჩნდება ყოველთვის!
        document.getElementById('input-bar').style.display = 'flex';

        fetchMessages();
    }

    async function fetchMessages() {
        if(!activeP) return;
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        
        const area = document.getElementById('chat-view');
        area.innerHTML = data.map(m => `
            <div class="bubble ${m.sender === myNick ? 'mine' : ''}">
                <span class="sender-name">${m.sender}</span>
                ${m.text}
            </div>
        `).join('') || "<p style='text-align:center; padding:20px; color:#555;'>მიწერე პირველი...</p>";
        
        const cont = document.getElementById('main-container');
        cont.scrollTop = cont.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('msg-input');
        if (!i.value.trim() || !activeP) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: i.value }]);
        i.value = "";
        fetchMessages();
    }

    function goBack() {
        if(document.getElementById('input-bar').style.display === 'flex') loadInbox();
        else window.history.back();
    }

    // 🚀 მთავარი ლოგიკა: პროფილიდან გადმოხვედი თუ ისე?
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const userToChat = params.get('chat');
        if (userToChat) {
            openChat(userToChat); // თუ პროფილიდან მოხვედი, პირდაპირ ჩატს გიხსნის
        } else {
            loadInbox(); // თუ ისე შეხვედი, ნიკებს აჩვენებს
        }
    };
</script>
</body>
</html>
