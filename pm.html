<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM SYSTEM - FIXED</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #300; background: #050000; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
        
        .content { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 90px; background: radial-gradient(circle, #0a0000 0%, #000 100%); }
        
        #inbox-view, #chat-view { display: none; width: 100%; }
        .active { display: block !important; }

        .user-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a0000; cursor: pointer; transition: 0.3s; }
        .user-row:active { background: #1a0000; }
        
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #800; margin-right: 15px; }

        .bubble { background: #1a0505; border: 1px solid #400; padding: 10px 15px; border-radius: 18px 18px 18px 2px; margin-bottom: 12px; max-width: 85%; position: relative; word-wrap: break-word; animation: fadeIn 0.3s; }
        .my-msg { background: #300000; border-color: #600; margin-left: auto; border-radius: 18px 18px 2px 18px; color: #fff; }

        .msg-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 13px; }
        .time { font-size: 10px; color: #888; margin-top: 5px; text-align: right; display: block; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #050000; padding: 15px; border-top: 1px solid #300; display: flex; gap: 10px; align-items: center; }
        
        input { flex: 1; background: #151515; border: 1px solid #444; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        input:focus { border-color: red; }

        .send-btn { background: red; color: white; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); background: #b00; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 24px; color: red;">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold; letter-spacing: 1px;">PM SYSTEM</div>
    <div onclick="location.reload()" style="cursor:pointer; font-size: 20px; color: red;">🔄</div>
</div>

<div class="content" id="scroll-area">
    <div id="inbox-view" class="active"></div>
    <div id="chat-view"></div>
</div>

<div class="bottom-bar" id="input-bar" style="display: none;">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMessage()">
    <div onclick="sendMessage()" class="send-btn">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || "Abu007";
    let activeP = null;

    // დროის ფორმატირება (საათი:წუთი)
    function formatTime(dateStr) {
        const d = new Date(dateStr);
        return d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }

    async function loadInbox() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const box = document.getElementById('inbox-view');
        box.innerHTML = "";
        const partners = new Set();
        
        if(!msgs || msgs.length === 0) {
            box.innerHTML = "<div style='text-align:center; margin-top:20px; color:#555;'>მესიჯები არ არის</div>";
            return;
        }

        msgs.forEach(m => {
            const p = m.sender === myNick ? m.receiver : m.sender;
            if (!partners.has(p)) {
                partners.add(p);
                box.innerHTML += `
                <div class="user-row" onclick="openChat('${p}')">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${p}" class="avatar">
                    <div style="flex:1">
                        <b style="color:red; font-size:18px;">${p}</b>
                        <div style="font-size:12px; color:#666;">დააჭირე ჩატის გასახსნელად</div>
                    </div>
                </div>`;
            }
        });
    }

    async function openChat(p) {
        activeP = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex'; // გამოვაჩინოთ საწერი გრაფა
        loadMessages();
        
        // რეალურ დროში განახლება
        _s.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'private_messages' }, payload => {
            if(payload.new.sender === activeP || payload.new.receiver === activeP) loadMessages();
        }).subscribe();
    }

    async function loadMessages() {
        if(!activeP) return;
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const area = document.getElementById('chat-view');
        
        area.innerHTML = data.map(m => `
            <div class="bubble ${m.sender === myNick ? 'my-msg' : ''}">
                <div class="msg-info">
                    <b style="color:${m.sender === myNick ? '#ff4d4d' : 'red'}">${m.sender}</b>
                </div>
                <div class="msg-text">${m.text}</div>
                <span class="time">${formatTime(m.created_at)}</span>
            </div>
        `).join('');
        
        const scrollArea = document.getElementById('scroll-area');
        scrollArea.scrollTop = scrollArea.scrollHeight;
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        const txt = i.value.trim();
        if (!txt || !activeP) return;
        
        const { error } = await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: txt }]);
        if(error) { alert("შეცდომა გაგზავნისას!"); return; }
        
        i.value = ""; 
        loadMessages();
    }

    function goBack() {
        if(document.getElementById('chat-view').classList.contains('active')) {
            document.getElementById('chat-view').classList.remove('active');
            document.getElementById('input-bar').style.display = 'none';
            document.getElementById('inbox-view').classList.add('active');
            document.getElementById('view-title').innerText = "PM SYSTEM";
            activeP = null;
            loadInbox();
        } else {
            window.history.back();
        }
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const chatWith = urlParams.get('chat');
        if (chatWith) openChat(chatWith); else loadInbox();
    };
</script>
</body>
</html>
