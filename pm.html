<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease; }
        
        /* бғҰбғҗбғӣбғҳбғЎ бғ бғ”бғҹбғҳбғӣбғҳ вҖ” бғңбғҗбғ—бғ”бғҡбғҳ бғ¬бғҳбғ—бғ”бғҡбғҳ, бғ’бғҗбғӣбғқбғҷбғ•бғ”бғ—бғҳбғҡбғҳ */
        body.night-mode {
            --bg-color: #030000;
            --text-color: #f0f0f0;
            --chat-bg: radial-gradient(circle at center, #1a0000 0%, #030000 100%);
            --bubble-bg: rgba(30, 0, 0, 0.95);
            --bubble-border: #ff5555;
            --nick-color: #ff7777;
            --input-bg: #1a0505;
            --input-border: #ff5555;
            --topbar-bg: #0a0202;
            --inbox-border: #442222;
            --inbox-hover: #2a0a0a;
            --header-border: #ff5555;
            --avatar-border: #ff7777;
            --send-color: #33ccff;
        }
        
        /* бғ“бғҰбғҳбғЎ бғ бғ”бғҹбғҳбғӣбғҳ */
        body.day-mode {
            --bg-color: #fff8f0;
            --text-color: #2c2418;
            --chat-bg: #fffef7;
            --bubble-bg: #ffffff;
            --bubble-border: #e8d4b0;
            --nick-color: #c55a3a;
            --input-bg: #ffffff;
            --input-border: #e8d4b0;
            --topbar-bg: #fff4e6;
            --inbox-border: #f0e4cc;
            --inbox-hover: #fff0e6;
            --header-border: #e8d4b0;
            --avatar-border: #c55a3a;
            --send-color: #c55a3a;
        }
        
        /* бғңбғҗбғӣбғ“бғ•бғҳбғҡбғҳ вқӨпёҸ бғ’бғЈбғҡбғ”бғ‘бғҳ */
        .heart-bg {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: heartFloat 3s infinite ease-in-out;
            color: #ff4d4d;
            text-shadow: 0 0 8px #ff8888, 0 0 15px #ff6666;
            font-family: system-ui, 'Segoe UI', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
        }
        
        @keyframes heartFloat {
            0% { transform: translateY(0px) scale(1); opacity: 0.5; text-shadow: 0 0 5px #ff8888; }
            50% { transform: translateY(-12px) scale(1.08); opacity: 0.9; text-shadow: 0 0 20px #ff6666, 0 0 30px #ff4444; }
            100% { transform: translateY(0px) scale(1); opacity: 0.5; text-shadow: 0 0 5px #ff8888; }
        }
        
        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        .header {
            padding: 15px 20px;
            border-bottom: 3px solid var(--header-border);
            background: var(--topbar-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .header b:first-child { cursor: pointer; color: var(--nick-color); font-size: 24px; }
        #p-name { font-weight: 600; font-size: 18px; color: var(--nick-color); }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .theme-toggle { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--nick-color); }
        .reload-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--nick-color); }
        
        #main-container { flex: 1; overflow-y: auto; background: transparent; position: relative; z-index: 1; }
        
        .inbox-item {
            padding: 14px 20px;
            border-bottom: 2px solid var(--inbox-border);
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            background: rgba(255, 255, 255, 0.7);
            position: relative;
            z-index: 2;
        }
        body.night-mode .inbox-item { background: rgba(0, 0, 0, 0.65); border-bottom-color: #aa3333; }
        .inbox-item:hover { background: var(--inbox-hover); }
        .inbox-avatar { width: 48px; height: 48px; border-radius: 50%; border: 3px solid var(--avatar-border); object-fit: cover; margin-right: 15px; background: #c0a080; }
        .inbox-nick { font-weight: 600; font-size: 16px; flex: 1; color: var(--text-color); }
        .unread-dot { width: 12px; height: 12px; background: #ff4444; border-radius: 50%; margin-left: 10px; box-shadow: 0 0 12px #ff4444; }
        
        #chat-view {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 80px;
            position: relative;
            z-index: 2;
        }
        .msg-row { display: flex; align-items: flex-start; gap: 12px; }
        .msg-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--avatar-border); object-fit: cover; background: #c0a080; }
        .bubble { 
            background: var(--bubble-bg); 
            border: 2px solid var(--bubble-border); 
            padding: 10px 14px; 
            border-radius: 18px; 
            max-width: 75%; 
            border-left: 5px solid var(--nick-color);
        }
        .msg-nick { color: var(--nick-color); font-size: 12px; font-weight: bold; margin-bottom: 4px; display: block; }
        .msg-text { color: var(--text-color); font-size: 14px; line-height: 1.4; word-break: break-word; }
        .msg-info { font-size: 10px; color: #999; margin-top: 6px; }
        
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            background: var(--topbar-bg);
            border-top: 3px solid var(--header-border);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 100;
        }
        .input-box { flex: 1; background: var(--input-bg); border: 2px solid var(--input-border); color: var(--text-color); padding: 12px 16px; border-radius: 30px; outline: none; font-size: 15px; }
        .send-btn { 
            font-size: 28px; 
            color: var(--send-color); 
            cursor: pointer; 
            background: none; 
            border: none; 
            padding: 0 8px;
            transition: transform 0.1s;
        }
        .send-btn:active { transform: scale(0.95); }
        .empty-state { text-align: center; padding: 50px 20px; color: #aaa; }
    </style>
</head>
<body>
    <div class="header">
        <b onclick="goBack()">вҶҗ</b>
        <span id="p-name">бғЁбғ”бғӣбғқбғЎбғЈбғҡбғ”бғ‘бғҳ</span>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle">рҹҢҷ</button>
            <button class="reload-btn" onclick="location.reload()">вҹі</button>
        </div>
    </div>
    <div id="main-container">
        <div id="chat-view" style="display:none;"></div>
        <div id="inbox-view"></div>
    </div>
    <div id="controls" class="bottom-bar" style="display:none;">
        <input type="text" id="pm-input" class="input-box" placeholder="бғ“бғҗбғ¬бғ”бғ бғ” бғӣбғ”бғЎбғҳбғҜбғҳ...">
        <button class="send-btn" onclick="sendMsg()">вңҲ</button>
    </div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    const partner = new URLSearchParams(window.location.search).get('to');
    let profMap = {};

    function addHearts() {
        removeHearts();
        if (document.body.classList.contains('day-mode')) {
            const hearts = ['вқӨпёҸ', 'вқӨпёҸ', 'вқӨпёҸ', 'вқӨпёҸ', 'вқӨпёҸ', 'вқӨпёҸ', 'вқӨпёҸ', 'вқӨпёҸ'];
            const positions = [
                { top: '5%', left: '4%' }, { top: '4%', left: '86%' },
                { top: '20%', left: '45%' }, { top: '70%', left: '91%' },
                { top: '86%', left: '2%' }, { top: '42%', left: '40%' },
                { top: '60%', left: '18%' }, { top: '30%', left: '75%' }
            ];
            const sizes = ['52px', '48px', '58px', '68px', '45px', '54px', '50px', '60px'];
            for (let i = 0; i < hearts.length; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-bg';
                heart.innerHTML = hearts[i];
                heart.style.cssText = `position:fixed; top:${positions[i].top}; left:${positions[i].left}; font-size:${sizes[i]}; animation-delay:${i*0.3}s; z-index:0;`;
                document.body.appendChild(heart);
            }
        }
    }
    function removeHearts() { document.querySelectorAll('.heart-bg').forEach(h => h.remove()); }
    function setTheme(theme) {
        document.body.classList.remove('night-mode', 'day-mode');
        if (theme === 'day') {
            document.body.classList.add('day-mode');
            document.getElementById('themeToggle').innerHTML = 'рҹҢҷ';
            localStorage.setItem('theme', 'day');
        } else {
            document.body.classList.add('night-mode');
            document.getElementById('themeToggle').innerHTML = 'вҳҖпёҸ';
            localStorage.setItem('theme', 'night');
        }
        addHearts();
    }
    function toggleTheme() { setTheme(document.body.classList.contains('night-mode') ? 'day' : 'night'); }
    
    async function init() {
        setTheme(localStorage.getItem('theme') || 'night');
        const { data: profiles } = await _s.from('profiles').select('username, avatar_url');
        profiles?.forEach(p => profMap[p.username] = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png');
        if (partner) {
            document.getElementById('inbox-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('p-name').innerText = partner;
            await markAsRead();
            loadChat();
            setInterval(loadChat, 3000);
        } else loadInbox();
    }
    async function markAsRead() { await _s.from('private_messages').update({ is_read: true }).eq('sender', partner).eq('receiver', myNick); }
    async function loadInbox() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', {ascending: false});
        const partners = [...new Set(msgs?.map(m => m.sender === myNick ? m.receiver : m.sender))];
        const unreadFrom = msgs?.filter(m => m.receiver === myNick && !m.is_read).map(m => m.sender);
        if (!partners?.length) { document.getElementById('inbox-view').innerHTML = '<div class="empty-state">рҹ’¬ бғӣбғ”бғЎбғҳбғҜбғ”бғ‘бғҳ бғҗбғ  бғҗбғ бғҳбғЎ</div>'; return; }
        document.getElementById('inbox-view').innerHTML = partners.map(p => `
            <div class="inbox-item" onclick="window.location.href='pm.html?to=${p}'">
                <img src="${profMap[p]}" class="inbox-avatar" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                <span class="inbox-nick">${p}</span>
                ${unreadFrom?.includes(p) ? '<div class="unread-dot"></div>' : ''}
            </div>
        `).join('');
    }
    async function loadChat() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        if (msgs?.length) {
            document.getElementById('chat-view').innerHTML = msgs.map(m => {
                let text = m.text;
                return `<div class="msg-row"><img src="${profMap[m.sender]}" class="msg-avatar" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'"><div class="bubble"><b class="msg-nick">${m.sender}</b><div class="msg-text">${escapeHtml(text)}</div><div class="msg-info">${new Date(m.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })}</div></div></div>`;
            }).join('');
            document.getElementById('chat-view').scrollTop = 99999;
        } else document.getElementById('chat-view').innerHTML = '<div class="empty-state">рҹ’¬ бғӣбғ”бғЎбғҳбғҜбғ”бғ‘бғҳ бғҗбғ  бғҗбғ бғҳбғЎ</div>';
    }
    function escapeHtml(t) { return t?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) || ''; }
    async function sendMsg() {
        const inp = document.getElementById('pm-input');
        if (!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: inp.value, is_read: false }]);
        inp.value = ""; loadChat();
    }
    function goBack() { window.location.href = partner ? 'pm.html' : 'chat.html'; }
    document.getElementById('themeToggle').onclick = toggleTheme;
    init();
</script>
</body>
</html>
