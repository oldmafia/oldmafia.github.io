<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - PM SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; text-align: center; border-bottom: 2px solid #500; background: #050000; display: flex; align-items: center; justify-content: space-between; }
        .content { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 90px; }
        #inbox-view, #chat-view { width: 100%; display: none; }
        .active { display: block !important; }
        .user-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a0000; cursor: pointer; background: #0a0000; margin-bottom: 5px; border-radius: 8px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #800; margin-right: 15px; }
        .bubble { background: #1a0505; border: 1px solid #400; padding: 12px; border-radius: 15px; margin-bottom: 12px; max-width: 85%; position: relative; word-wrap: break-word; }
        .my-msg { background: #300000; border-color: #700; margin-left: auto; }
        .time { font-size: 10px; color: #777; display: block; text-align: right; margin-top: 5px; }
        .del-btn { color: red; float: right; cursor: pointer; margin-left: 10px; }
        /* საწერი გრაფა - ყოველთვის ბოლოში */
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #050000; padding: 12px; border-top: 2px solid #500; display: none; gap: 10px; align-items: center; z-index: 9999; }
        input { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 12px 15px; border-radius: 25px; outline: none; font-size: 16px; }
        .send-btn { background: #800; color: white; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 24px; color: red;">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold;">იტვირთება...</div>
    <div onclick="location.reload()" style="cursor:pointer; font-size: 20px; color: red;">🔄</div>
</div>

<div class="content" id="scroll-area">
    <div id="inbox-view"></div>
    <div id="chat-view"></div>
</div>

<div class="bottom-bar" id="input-bar">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMessage()">
    <div onclick="sendMessage()" class="send-btn">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || "Abu007";
    let activeP = null;

    function formatTime(ts) {
        const d = ts ? new Date(ts) : new Date();
        return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }

    async function loadInbox() {
        activeP = null;
        document.getElementById('view-title').innerText = "შემოსულები";
        document.getElementById('inbox-view').style.display = 'block';
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('input-bar').style.display = 'none';

        const { data } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        
        const box = document.getElementById('inbox-view');
        box.innerHTML = "";
        const partners = new Set();

        if (data && data.length > 0) {
            data.forEach(m => {
                const p = m.sender === myNick ? m.receiver : m.sender;
                if (!partners.has(p)) {
                    partners.add(p);
                    box.innerHTML += `<div class="user-row" onclick="openChat('${p}')"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=${p}" class="avatar"><b style="color:red; font-size:18px;">${p}</b></div>`;
                }
            });
        } else {
            box.innerHTML = "<div style='text-align:center; margin-top:50px; color:#444;'>მიმოწერები არ არის</div>";
        }
    }

    async function openChat(p) {
        if(!p) return;
        activeP = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').style.display = 'none';
        document.getElementById('chat-view').style.display = 'block';
        document.getElementById('input-bar').style.display = 'flex'; // საწერი გამოჩნდება 100%

        loadMessages();
    }

    async function loadMessages() {
        if(!activeP) return;
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        
        const area = document.getElementById('chat-view');
        if (data && data.length > 0) {
            area.innerHTML = data.map(m => `
                <div class="bubble ${m.sender === myNick ? 'my-msg' : ''}" id="msg-${m.id}">
                    ${(myNick === "Abu007") ? `<span class="del-btn" onclick="deleteMessage('${m.id}')">🗑️</span>` : ''}
                    <b style="color:red; font-size:11px;">${m.sender}</b><br>
                    ${m.text}
                    <span class="time">${formatTime(m.created_at)}</span>
                </div>
            `).join('');
        } else {
            area.innerHTML = "<div style='text-align:center; padding:20px; color:#444;'>მიწერე პირველი...</div>";
        }
        
        const scroll = document.getElementById('scroll-area');
        scroll.scrollTop = scroll.scrollHeight;
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        if (!i.value.trim() || !activeP) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: i.value }]);
        i.value = ""; 
        loadMessages();
    }

    function goBack() {
        if(document.getElementById('chat-view').style.display === 'block') {
            loadInbox();
        } else {
            window.history.back();
        }
    }

    // ეს ფუნქციაა ყველაზე მნიშვნელოვანი!
    function checkUrl() {
        const params = new URLSearchParams(window.location.search);
        const user = params.get('chat');
        if (user) {
            openChat(user);
        } else {
            loadInbox();
        }
    }

    // ეგრევე გაუშვი შემოწმება
    checkUrl();

</script>
</body>
</html>
