<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>პირადი - OLD MAFIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bright-red: #ff0000; --bg-black: #050000; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-black); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 12px; text-align: center; border-bottom: 1px solid #200; background: #000; display: flex; align-items: center; justify-content: space-between; }
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; display: none; padding: 10px; padding-bottom: 100px; }
        #inbox-view.active, #chat-view.active { display: block; }

        /* მესიჯების სტილი */
        .message-row { display: flex; gap: 8px; margin-bottom: 15px; align-items: flex-start; }
        .avatar-img { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #500; object-fit: cover; background: #111; }
        .message-bubble { background: rgba(25, 5, 5, 0.9); border: 1px solid #400; border-radius: 10px; padding: 8px 12px; flex: 1; max-width: 85%; }
        .sender-nick { color: #f33; font-weight: bold; font-size: 13px; margin-bottom: 3px; }
        .message-content { font-size: 14px; color: #ddd; word-break: break-word; }

        /* ინბოქსის სტილი */
        .inbox-item { display: flex; align-items: center; gap: 12px; padding: 15px; border-bottom: 1px solid #111; position: relative; cursor: pointer; }
        .unread-dot { background: red; color: white; border-radius: 50%; width: 12px; height: 12px; border: 2px solid black; position: absolute; right: 20px; }

        /* საწერი გრაფა */
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 10px; border-top: 1px solid #222; display: none; align-items: center; gap: 8px; z-index: 2000; }
        .input-container { flex: 1; background: #0a0a0a; border: 1px solid #300; border-radius: 20px; display: flex; align-items: center; padding: 0 10px; }
        .input-container input { flex: 1; background: none; border: none; color: white; padding: 10px; outline: none; }
        .emoji-btn { font-size: 20px; cursor: pointer; padding: 5px; }
        .send-btn { width: 40px; height: 40px; background: #300; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; border: 1px solid #600; }

        /* სმაილების პანელი */
        #emoji-picker { position: fixed; bottom: 70px; left: 10px; right: 10px; background: #111; border: 1px solid #333; border-radius: 10px; padding: 10px; display: none; grid-template-columns: repeat(6, 1fr); gap: 10px; max-height: 200px; overflow-y: auto; z-index: 3000; }
        .emoji-item { font-size: 24px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 20px;">⬅</div>
    <div style="color:red; font-weight:bold;" id="view-title">პირადი</div>
    <div style="width:20px;"></div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>

<div id="emoji-picker"></div>

<div class="bottom-bar" id="chat-input-bar">
    <div class="emoji-btn" onclick="toggleEmojis()">😊</div>
    <div class="input-container">
        <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." autocomplete="off">
    </div>
    <div class="send-btn" onclick="sendMessage()">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname');
    let activePartner = null;
    let userAvatars = {}; // აქ შევინახავთ ნამდვილ ავატარებს

    async function loadAvatars() {
        const { data: profiles } = await _s.from('profiles').select('username, avatar_url');
        profiles?.forEach(p => { userAvatars[p.username] = p.avatar_url; });
    }

    async function loadInbox() {
        if (!myNick) return;
        await loadAvatars();
        
        const { data: msgs } = await _s.from('private_messages')
            .select('*')
            .or(`sender.eq."${myNick}",receiver.eq."${myNick}"`)
            .order('created_at', { ascending: false });

        const box = document.getElementById('inbox-view');
        box.innerHTML = "";
        const partners = {};

        msgs?.forEach(m => {
            const p = m.sender === myNick ? m.receiver : m.sender;
            if (!partners[p]) { 
                partners[p] = { 
                    lastMsg: m.text, 
                    unreadCount: (m.receiver === myNick && !m.is_read) ? 1 : 0 
                }; 
            } else if (m.receiver === myNick && !m.is_read) {
                partners[p].unreadCount++;
            }
        });

        for (let p in partners) {
            const ava = userAvatars[p] || `https://api.dicebear.com/7.x/avataaars/svg?seed=${p}`;
            box.innerHTML += `
                <div class="inbox-item" onclick="openChat('${p}')">
                    <img src="${ava}" class="avatar-img">
                    <div style="flex:1; margin-left:10px;">
                        <b style="color:red">${p}</b><br>
                        <small style="color:#555">${partners[p].lastMsg.substring(0,30)}...</small>
                    </div>
                    ${partners[p].unreadCount > 0 ? `<div class="unread-dot"></div>` : ''}
                </div>`;
        }
    }

    async function openChat(p) {
        activePartner = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('chat-input-bar').style.display = 'flex';
        
        // ინდიკატორის გაქრობა: ვნიშნავთ წაკითხულად
        await _s.from('private_messages')
            .update({ is_read: true })
            .match({ sender: p, receiver: myNick, is_read: false });

        loadMessages();
    }

    async function loadMessages() {
        if(!activePartner) return;
        const { data: msgs } = await _s.from('private_messages')
            .select('*')
            .or(`and(sender.eq."${myNick}",receiver.eq."${activePartner}"),and(sender.eq."${activePartner}",receiver.eq."${myNick}")`)
            .order('created_at', { ascending: true });

        const area = document.getElementById('chat-view');
        area.innerHTML = msgs?.map(m => {
            const ava = userAvatars[m.sender] || `https://api.dicebear.com/7.x/avataaars/svg?seed=${m.sender}`;
            return `
            <div class="message-row">
                <img src="${ava}" class="avatar-img">
                <div class="message-bubble">
                    <div class="sender-nick">${m.sender}</div>
                    <div class="message-content">${m.text}</div>
                </div>
            </div>`;
        }).join('') || "";
        area.scrollTop = area.scrollHeight;
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim() || !activePartner) return;
        const t = i.value; i.value = "";
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activePartner, text: t, is_read: false }]);
        loadMessages();
    }

    // სმაილების ჩატვირთვა
    async function loadEmojis() {
        const { data: emojis } = await _s.from('emojis').select('*');
        const picker = document.getElementById('emoji-picker');
        picker.innerHTML = emojis?.map(e => `<span class="emoji-item" onclick="addEmoji('${e.emoji_char}')">${e.emoji_char}</span>`).join('') || "სმაილები არ არის";
    }

    function toggleEmojis() {
        const p = document.getElementById('emoji-picker');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
        if(p.style.display === 'grid') loadEmojis();
    }

    function addEmoji(char) {
        document.getElementById('msg-input').value += char;
        document.getElementById('emoji-picker').style.display = 'none';
    }

    function goBack() {
        if(document.getElementById('chat-view').classList.contains('active')) {
            window.location.href = 'pm.html';
        } else {
            window.location.href = 'chat.html';
        }
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const to = params.get('to');
        if (to) openChat(to); else loadInbox();
    };

    document.getElementById('msg-input').addEventListener('keypress', e => { if(e.key==='Enter') sendMessage() });
</script>
</body>
</html>
