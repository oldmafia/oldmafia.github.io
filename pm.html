<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM - Abu007 System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; border-bottom: 1px solid #222; background: #050505; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .back-btn { cursor: pointer; font-size: 30px; color: #fff; text-decoration: none; }
        
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: none; }
        .active { display: block !important; }

        /* ინბოქსის სტილი (ნიკების სია) */
        .inbox-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #111; cursor: pointer; background: #050505; margin-bottom: 5px; border-radius: 10px; }
        .inbox-item:hover { background: #111; }

        /* ჩატის სტილი */
        .msg-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: flex-end; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; border: 1px solid #333; object-fit: cover; }
        .bubble { background: #111; border: 1px solid #222; padding: 10px; border-radius: 15px; max-width: 80%; position: relative; }
        .nick { font-weight: bold; font-size: 12px; color: #ff3333; margin-bottom: 4px; display: block; }
        .txt { font-size: 15px; color: #ddd; word-break: break-word; }
        .msg-info { font-size: 10px; color: #444; margin-top: 5px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }

        /* სმაილები */
        #emoji-picker { position: fixed; bottom: 85px; left: 10px; right: 10px; background: #050505; border: 2px solid #500; border-radius: 15px; padding: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 10000; max-height: 220px; overflow-y: auto; }
        .emoji-img { width: 100%; cursor: pointer; transition: 0.2s; }
        .emoji-img:hover { transform: scale(1.2); }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #111; display: none; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid #333; color: white; padding: 12px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="back-btn" onclick="goBack()">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold;">პირადი</div>
    <div onclick="location.reload()" style="font-size: 20px; cursor:pointer;">🔄</div>
</div>

<div id="inbox-view"></div>

<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div class="bottom-bar" id="input-bar">
    <div id="emoji-btn" style="font-size:30px; cursor:pointer; display:none;" onclick="toggleEmoji()">😊</div>
    <input type="text" id="pm-input" class="input-box" placeholder="დაწერე მესიჯი...">
    <div onclick="sendMsg()" style="font-size:30px; color:red; cursor:pointer;">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    let partner = new URLSearchParams(window.location.search).get('to');
    let uData = {};

    function parseBB(t) { return t.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:100px; display:block; margin-top:5px;">'); }

    function goBack() {
        if (partner || document.getElementById('chat-view').classList.contains('active')) {
            window.location.href = 'pm.html';
        } else {
            window.location.href = 'chat.html';
        }
    }

    async function init() {
        // ყველა პროფილის ჩატვირთვა
        const { data: users } = await _s.from('profiles').select('*');
        users?.forEach(u => uData[u.username] = u);

        // დამფუძნებლის ფუნქციების მინიჭება
        const me = uData[myNick];
        if (myNick === 'Abu007' || (me && (me.role === 'დამფუძნებელი' || me.role === 'ადმინი'))) {
            document.getElementById('emoji-btn').style.display = 'block';
        }

        if (partner) {
            openChat(partner);
        } else {
            loadInbox();
        }
    }

    async function loadInbox() {
        document.getElementById('view-title').innerText = "შემოსულები";
        document.getElementById('chat-view').classList.remove('active');
        document.getElementById('input-bar').style.display = 'none';
        const box = document.getElementById('inbox-view');
        box.classList.add('active');
        box.innerHTML = "<p style='text-align:center;'>იტვირთება...</p>";

        const { data } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        
        if (!data || data.length === 0) {
            box.innerHTML = "<p style='text-align:center; color:#555;'>მესიჯები არ არის</p>";
            return;
        }

        const partners = [...new Set(data.map(m => m.sender === myNick ? m.receiver : m.sender))];
        box.innerHTML = "";
        
        partners.forEach(p => {
            const u = uData[p] || { avatar_url: 'https://via.placeholder.com/42' };
            box.innerHTML += `
                <div class="inbox-item" onclick="window.location.href='pm.html?to=${p}'">
                    <img src="${u.avatar_url}" class="avatar">
                    <b style="color:red; margin-left:15px; font-size:18px;">${p}</b>
                </div>`;
        });
    }

    async function openChat(p) {
        partner = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex';
        loadMsgs();
        setInterval(loadMsgs, 4000);
    }

    async function loadMsgs() {
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const area = document.getElementById('chat-view');
        area.innerHTML = "";
        
        data?.forEach(m => {
            const u = uData[m.sender] || { avatar_url: 'https://via.placeholder.com/42' };
            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            area.innerHTML += `
                <div class="msg-row">
                    <img src="${u.avatar_url}" class="avatar">
                    <div class="bubble">
                        <span class="nick">${m.sender}</span>
                        <div class="txt">${parseBB(m.text)}</div>
                        <div class="msg-info">
                            <span style="color:#444;">${time}</span>
                            ${myNick === 'Abu007' ? `<span style="color:red; cursor:pointer; font-weight:bold;" onclick="delMsg('${m.id}')">✖</span>` : ''}
                        </div>
                    </div>
                </div>`;
        });
        area.scrollTop = area.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('pm-input');
        if (!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: inp.value }]);
        inp.value = ""; loadMsgs();
    }

    async function delMsg(id) {
        if(confirm("წავშალოთ მესიჯი?")) {
            await _s.from('private_messages').delete().eq('id', id);
            loadMsgs();
        }
    }

    async function toggleEmoji() {
        const p = document.getElementById('emoji-picker');
        if (p.style.display === 'grid') { p.style.display = 'none'; return; }
        const { data } = await _s.from('emojis').select('*');
        p.innerHTML = data.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('');
        p.style.display = 'grid';
    }

    function addEmoji(url) {
        document.getElementById('pm-input').value += ` [img]${url}[/img] `;
        document.getElementById('emoji-picker').style.display = 'none';
        document.getElementById('pm-input').focus();
    }

    window.onload = init;
</script>
</body>
</html>
