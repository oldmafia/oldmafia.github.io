<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>პირადი - Abu007</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #050000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* კონტეინერები */
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .active { display: block !important; }

        /* მესიჯების განლაგება */
        .msg-row { display: flex; width: 100%; margin-bottom: 12px; gap: 10px; }
        .my-msg { justify-content: flex-end; }
        .other-msg { justify-content: flex-start; }
        
        .bubble { padding: 10px 14px; border-radius: 18px; max-width: 75%; border: 1px solid #333; position: relative; }
        .my-msg .bubble { background: #002d44; border-color: #005577; color: #fff; }
        .other-msg .bubble { background: #1a0505; border-color: #770000; }

        /* სმაილების დაფა - Grid */
        #emoji-picker { 
            position: fixed; bottom: 75px; left: 10px; right: 10px; 
            background: #000; border: 2px solid #500; border-radius: 10px; 
            padding: 10px; display: none; 
            grid-template-columns: repeat(6, 1fr); gap: 8px; z-index: 3000;
            max-height: 200px; overflow-y: auto;
        }
        .emoji-img { width: 100%; aspect-ratio: 1/1; cursor: pointer; object-fit: contain; }

        /* ქვედა საწერი ზოლი */
        .bottom-bar { 
            position: sticky; bottom: 0; background: #000; padding: 12px; 
            border-top: 1px solid #222; display: none; align-items: center; gap: 10px; 
        }
        .input-field { flex: 1; background: #0a0a0a; border: 1px solid #444; color: white; padding: 12px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div class="bottom-bar" id="input-bar">
    <div onclick="toggleEmojis()" style="font-size:24px; cursor:pointer">😊</div>
    <input type="text" id="msg-input" class="input-field" placeholder="დაწერე მესიჯი...">
    <div onclick="sendMessage()" style="font-size:24px; cursor:pointer; color:red">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname');
    let activeP = null;

    // ფუნქცია, რომელიც მესიჯებს სწორ მხარეს დაალაგებს
    async function loadMessages() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        
        const area = document.getElementById('chat-view'); area.innerHTML = "";
        msgs?.forEach(m => {
            const isMe = m.sender === myNick;
            area.innerHTML += `
                <div class="msg-row ${isMe ? 'my-msg' : 'other-msg'}">
                    <div class="bubble">
                        <div style="color:red; font-size:10px; font-weight:bold">${m.sender}</div>
                        <div style="margin-top:4px">${m.text.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="width:50px">')}</div>
                    </div>
                </div>`;
        });
        area.scrollTop = area.scrollHeight;
    }

    async function openChat(p) {
        activeP = p;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex'; // აქ აჩენს საწერ გრაფას!
        loadMessages();
    }

    async function toggleEmojis() {
        const p = document.getElementById('emoji-picker');
        if(p.style.display === 'grid') { p.style.display = 'none'; return; }
        const { data } = await _s.from('emojis').select('*');
        p.innerHTML = data.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('');
        p.style.display = 'grid';
    }

    function addEmoji(url) {
        document.getElementById('msg-input').value += `[img]${url}[/img]`;
        document.getElementById('emoji-picker').style.display = 'none';
    }

    // ... (დანარჩენი ლოგიკა იგივეა)
</script>
</body>
</html>
