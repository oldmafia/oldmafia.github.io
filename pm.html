<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>პირადი შეტყობინებები | Old Mafia</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        
        /* მარცხენა მხარე - ნიკების სია */
        .user-list { width: 30%; border-right: 1px solid #333; overflow-y: auto; background: #0a0a0a; }
        .user-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .user-item:hover { background: #1a1a1a; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #e60000; }

        /* მარჯვენა მხარე - ჩატის ფანჯარა */
        .chat-area { width: 70%; display: flex; flex-direction: column; }
        #messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* მესიჯების სტილი */
        .msg { max-width: 70%; padding: 10px; border-radius: 10px; position: relative; margin-bottom: 15px; }
        .msg.sent { align-self: flex-end; background: #e60000; color: white; }
        .msg.received { align-self: flex-start; background: #222; color: #eee; }
        .msg-time { font-size: 10px; opacity: 0.7; display: block; margin-top: 5px; }
        
        /* სმაილების და ინპუტის ზონა */
        .input-zone { padding: 15px; background: #111; border-top: 1px solid #333; }
        .emoji-bar { padding: 5px; display: flex; gap: 10px; font-size: 20px; cursor: pointer; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; }
        button { background: #e60000; border: none; color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="user-list" id="contacts">
        <h3 style="padding: 15px; color: #e60000;">📩 შეტყობინებები</h3>
        </div>

    <div class="chat-area">
        <div id="messages-container">
            </div>

        <div class="input-zone">
            <div class="emoji-bar" id="emoji-picker">
                <span onclick="addEmoji('😊')">😊</span>
                <span onclick="addEmoji('😎')">😎</span>
                <span onclick="addEmoji('🔥')">🔥</span>
                <span onclick="addEmoji('🕵️‍♂️')">🕵️‍♂️</span>
                <span onclick="addEmoji('💰')">💰</span>
            </div>
            <div class="input-row">
                <input type="text" id="msg-input" placeholder="დაწერე შეტყობინება...">
                <button onclick="sendPM()">გაგზავნა</button>
            </div>
        </div>
    </div>

    <script>
        // აქ უნდა იყოს შენი Supabase კონფიგურაცია
        let activeContactId = null;

        function addEmoji(emoji) {
            document.getElementById('msg-input').value += emoji;
        }

        async function loadContacts() {
            // ფუნქცია, რომელიც წამოიღებს იმ ხალხს, ვინც მოგწერა
            // აჩვენებს ნიკს და ავატარს ბაზიდან
        }

        async function sendPM() {
            const content = document.getElementById('msg-input').value;
            if(!content || !activeContactId) return;

            // Supabase-ში გაგზავნის ლოგიკა:
            // insert({ sender_id: myId, receiver_id: activeContactId, content: content })
            
            document.getElementById('msg-input').value = '';
        }

        // დროის ფორმატირება (მაგ: 14:59)
        function formatTime(dateString) {
            const d = new Date(dateString);
            return d.getHours() + ":" + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
        }
    </script>
</body>
</html>
