<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>პირადი - Abu007</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #050000; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* ჰედერი */
        .header { padding: 10px; text-align: center; border-bottom: 1px solid #200; background: #000; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 80px; display: none; }
        .active { display: block !important; }

        /* მესიჯების დიზაინი - ზუსტად ფოტოს მიხედვით */
        .msg-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 15px; width: 100%; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #333; cursor: pointer; }
        
        .bubble { 
            background: #0d0d0d; 
            border: 1px solid #222; 
            padding: 8px 12px; 
            border-radius: 10px; 
            max-width: 80%; 
            display: inline-block;
        }
        
        .nick { font-weight: bold; font-size: 12px; color: #ff3333; margin-bottom: 3px; cursor: pointer; display: block; }
        .text { color: #ccc; font-size: 14px; word-wrap: break-word; line-height: 1.4; }
        
        .time-info { font-size: 10px; color: #444; margin-top: 5px; display: flex; align-items: center; gap: 5px; }
        .del-btn { color: #600; cursor: pointer; font-weight: bold; }

        /* სმაილების დაფა - გასწორებული */
        #emoji-picker { 
            position: fixed; bottom: 70px; left: 5px; right: 5px; 
            background: #000; border: 2px solid #500; border-radius: 15px; 
            padding: 10px; display: none; 
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); 
            gap: 8px; z-index: 9999; max-height: 250px; overflow-y: auto;
        }
        .emoji-img { width: 100%; cursor: pointer; border-radius: 5px; transition: 0.1s; }
        .emoji-img:active { transform: scale(0.9); }

        /* ქვედა პანელი */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px; border-top: 1px solid #1a1a1a; display: none; gap: 8px; align-items: center; z-index: 9000; }
        .input-box { flex: 1; background: #080808; border: 1px solid #300; color: white; padding: 10px 15px; border-radius: 20px; outline: none; font-size: 14px; }
        
        /* პროფილის მოდალი */
        #profile-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-card { background: #000; width: 85%; max-width: 320px; border: 2px solid #500; border-radius: 20px; padding: 20px; text-align: center; }
        .m-ava { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #f00; object-fit: cover; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 20px;">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold; font-size: 16px;">პირადი</div>
    <div onclick="location.reload()" style="cursor:pointer;">🔄</div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div id="profile-modal" onclick="this.style.display='none'">
    <div class="modal-card" onclick="event.stopPropagation()">
        <img id="m-ava" src="" class="m-ava">
        <h3 id="m-nick" style="color:red; margin:5px 0;"></h3>
        <p id="m-stats" style="color:#777; font-size:13px;"></p>
        <button onclick="document.getElementById('profile-modal').style.display='none'" style="background:#200; color:red; border:1px solid #500; padding:10px 20px; border-radius:10px; margin-top:15px; width:100%; font-weight:bold;">დახურვა</button>
    </div>
</div>

<div class="bottom-bar" id="input-bar">
    <div onclick="toggleEmojis()" style="font-size:24px; cursor:pointer;">😊</div>
    <input type="text" id="msg-input" class="input-box" placeholder="დაწერე მესიჯი...">
    <div onclick="sendMessage()" style="font-size:24px; cursor:pointer; color:red;">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || 'Abu007';
    let activeP = new URLSearchParams(window.location.search).get('to');
    let uCache = {};

    function parseMsg(t) {
        return t.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:100px; border-radius:5px; display:block; margin-top:5px;">');
    }

    async function init() {
        const { data } = await _s.from('profiles').select('*');
        data?.forEach(u => uCache[u.username] = u);
        if (activeP) openChat(activeP); else loadInbox();
    }

    async function loadInbox() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const box = document.getElementById('inbox-view'); box.innerHTML = "";
        const partners = {};
        msgs?.forEach(m => {
            const p = m.sender === myNick ? m.receiver : m.sender;
            if (!partners[p]) partners[p] = { text: m.text, unread: 0 };
            if (m.receiver === myNick && !m.is_read) partners[p].unread++;
        });
        for (let p in partners) {
            const u = uCache[p] || {};
            box.innerHTML += `<div style="display:flex; padding:12px; border-bottom:1px solid #111; align-items:center; cursor:pointer" onclick="openChat('${p}')">
                <img src="${u.avatar_url || ''}" class="avatar">
                <div style="margin-left:12px; flex:1">
                    <b style="color:red">${p}</b><br><small style="color:#555">${partners[p].text.substring(0,25)}...</small>
                </div>
                ${partners[p].unread > 0 ? `<span style="background:red; border-radius:50%; padding:2px 7px; font-size:10px;">${partners[p].unread}</span>` : ''}
            </div>`;
        }
    }

    async function openChat(p) {
        activeP = p; document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').style.display = 'none';
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex';
        await _s.from('private_messages').update({ is_read: true }).match({ sender: p, receiver: myNick });
        loadMessages();
    }

    async function loadMessages() {
        if(!activeP) return;
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const area = document.getElementById('chat-view'); area.innerHTML = "";
        data?.forEach(m => {
            const u = uCache[m.sender] || { avatar_url: '' };
            const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            area.innerHTML += `
                <div class="msg-row">
                    <img src="${u.avatar_url}" class="avatar" onclick="showUser('${m.sender}')">
                    <div class="bubble">
                        <span class="nick" onclick="showUser('${m.sender}')">${m.sender}</span>
                        <div class="text">${parseMsg(m.text)}</div>
                        <div class="time-info">
                            ${time} ${(myNick === 'Abu007') ? `<span class="del-btn" onclick="delMsg('${m.id}')">✖</span>` : ''}
                        </div>
                    </div>
                </div>`;
        });
        area.scrollTop = area.scrollHeight;
    }

    function showUser(n) {
        const u = uCache[n];
        if(!u) return;
        document.getElementById('m-nick').innerText = u.username;
        document.getElementById('m-ava').src = u.avatar_url || '';
        document.getElementById('m-stats').innerText = `ვიქტორინა: ${u.quiz_points || 0} | შიფროგრამა: ${u.cipher_points || 0}`;
        document.getElementById('profile-modal').style.display = 'flex';
    }

    async function toggleEmojis() {
        const p = document.getElementById('emoji-picker');
        if(p.style.display === 'grid') { p.style.display = 'none'; return; }
        const { data } = await _s.from('emojis').select('*');
        p.innerHTML = data.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('');
        p.style.display = 'grid';
    }

    function addEmoji(url) {
        document.getElementById('msg-input').value += `[img]${url}[/img]`;
        document.getElementById('emoji-picker').style.display = 'none';
        document.getElementById('msg-input').focus();
    }

    async function sendMessage() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: inp.value, is_read: false }]);
        inp.value = ""; loadMessages();
    }

    async function delMsg(id) {
        if(confirm("წავშალოთ?")) { await _s.from('private_messages').delete().eq('id', id); loadMessages(); }
    }

    function goBack() { location.href = activeP ? 'pm.html' : 'chat.html'; }
    window.onload = init;
</script>
</body>
</html>
