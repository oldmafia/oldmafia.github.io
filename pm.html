<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || "Abu007";
    let activeP = null;
    let userAvatars = {};

    // ბიბი კოდის პარსერი სურათებისთვის/სმაილებისთვის
    function parseBBCode(text) {
        if (!text) return "";
        return text.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:100px; display:block; border-radius:5px;" onerror="this.style.display=\'none\'">');
    }

    // 1. ავატარების და ინბოქსის ჩატვირთვა
    async function loadInbox() {
        try {
            // ავატარების წამოღება პროფილებიდან
            const { data: profs } = await _s.from('profiles').select('username, avatar_url');
            profs?.forEach(p => {
                userAvatars[p.username] = p.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${p.username}`;
            });

            // მესიჯების წამოღება
            const { data: msgs } = await _s.from('private_messages')
                .select('*')
                .or(`sender.eq."${myNick}",receiver.eq."${myNick}"`)
                .order('created_at', { ascending: false });

            const box = document.getElementById('inbox-view');
            box.innerHTML = "";
            const partners = {};
            
            msgs?.forEach(m => {
                const p = m.sender === myNick ? m.receiver : m.sender;
                if (!partners[p]) {
                    partners[p] = { 
                        text: m.text, 
                        unreadCount: (m.receiver === myNick && !m.is_read) ? 1 : 0 
                    };
                } else if (m.receiver === myNick && !m.is_read) {
                    partners[p].unreadCount++;
                }
            });

            for (let p in partners) {
                const ava = userAvatars[p] || `https://api.dicebear.com/7.x/avataaars/svg?seed=${p}`;
                // ინდიკატორი (წითელი ციფრი)
                const unreadTag = partners[p].unreadCount > 0 
                    ? `<span style="background:red; color:white; border-radius:50%; padding:2px 7px; font-size:11px; margin-left:8px; font-weight:bold;">${partners[p].unreadCount}</span>` 
                    : '';
                
                box.innerHTML += `
                    <div class="message-row" style="padding:15px; border-bottom:1px solid #111; cursor:pointer; display:flex; align-items:center;" onclick="openChat('${p}')">
                        <img src="${ava}" class="avatar-img" style="width:45px; height:45px; border-radius:50%; border:1px solid #333;">
                        <div style="flex:1; margin-left:12px;">
                            <div style="display:flex; align-items:center;">
                                <b style="color:red; font-size:15px;">${p}</b> ${unreadTag}
                            </div>
                            <small style="color:#555; display:block; margin-top:3px;">${partners[p].text.substring(0,25)}...</small>
                        </div>
                    </div>`;
            }
        } catch (err) { console.error("Error:", err); }
    }

    // 2. ჩატის გახსნა და მესიჯების "წაკითხულად" მონიშვნა
    async function openChat(p) {
        activeP = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex';
        
        // ბაზაში მონიშვნა, რომ წავიკითხეთ (ინდიკატორი წაიშლება)
        await _s.from('private_messages').update({ is_read: true }).match({ sender: p, receiver: myNick });
        loadMessages();
    }

    // 3. მესიჯების გამოტანა ჩატში
    async function loadMessages() {
        if(!activeP) return;
        const { data: msgs } = await _s.from('private_messages')
            .select('*')
            .or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`)
            .order('created_at', { ascending: true });

        const area = document.getElementById('chat-view');
        area.innerHTML = "";
        
        msgs?.forEach(m => {
            const isMe = m.sender === myNick;
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            area.innerHTML += `
                <div class="message-row ${isMe ? 'my-msg' : 'other-msg'}" style="display:flex; margin-bottom:12px; ${isMe ? 'flex-direction:row-reverse' : ''}">
                    <img src="${userAvatars[m.sender] || ''}" class="avatar-img" style="width:35px; height:35px; border-radius:50%;">
                    <div class="bubble" style="margin: 0 10px; padding:10px; border-radius:12px; background:${isMe ? '#0a1520' : '#150505'}; border:1px solid ${isMe ? '#004466' : '#500'}; max-width:70%;">
                        <div style="color:${isMe ? '#0cf' : 'red'}; font-size:11px; font-weight:bold">${m.sender}</div>
                        <div class="msg-text" style="color:#eee; font-size:14px; margin-top:4px;">${parseBBCode(m.text)}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                            <span style="color:#444; font-size:10px;">${time}</span>
                            ${myNick === 'Abu007' ? `<span style="color:#800; cursor:pointer; font-weight:bold; font-size:12px; margin-left:10px;" onclick="deleteMsg('${m.id}')">🗑️</span>` : ''}
                        </div>
                    </div>
                </div>`;
        });
        area.scrollTop = area.scrollHeight;
    }

    // 4. მესიჯის გაგზავნა
    async function sendMessage() {
        const i = document.getElementById('msg-input');
        if (!i.value.trim() || !activeP) return;
        const { error } = await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: i.value, is_read: false }]);
        if(!error) { i.value = ""; loadMessages(); }
    }

    // 5. სმაილების პანელი
    async function toggleEmojis() {
        const picker = document.getElementById('emoji-picker');
        if (picker.style.display === 'grid') { picker.style.display = 'none'; return; }
        const { data } = await _s.from('emojis').select('*');
        if(data) {
            picker.innerHTML = data.map(e => `<img src="${e.emoji_url}" style="width:100%; cursor:pointer; background:#111; border-radius:5px;" onclick="addEmoji('${e.emoji_url}')">`).join('');
            picker.style.display = 'grid';
        }
    }

    function addEmoji(url) {
        document.getElementById('msg-input').value += `[img]${url}[/img]`;
        document.getElementById('emoji-picker').style.display = 'none';
    }

    async function deleteMsg(id) {
        if(confirm("წავშალოთ მესიჯი?")) {
            await _s.from('private_messages').delete().eq('id', id);
            loadMessages();
        }
    }

    function goBack() { location.reload(); }
    window.onload = loadInbox;
</script>
