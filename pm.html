<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname') || "Abu007";
    let activeP = null;
    let userAvatars = {};

    // ფუნქცია, რომელიც ამოწმებს ლინკი მუშაობს თუ არა
    function getImg(url, fallback) {
        return (url && url.includes('http')) ? url : fallback;
    }

    function parseBBCode(text) {
        if(!text) return "";
        return text.replace(/\[img\](.*?)\[\/img\]/g, (match, url) => {
            return `<img src="${url}" style="max-width:120px; border-radius:8px;" onerror="this.src='https://via.placeholder.com/50?text=Emoji'">`;
        });
    }

    async function loadInbox() {
        try {
            const { data: profs } = await _s.from('profiles').select('username, avatar_url');
            profs?.forEach(p => userAvatars[p.username] = p.avatar_url);

            const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
            
            const box = document.getElementById('inbox-view');
            box.innerHTML = "";
            const partners = {};
            
            msgs?.forEach(m => {
                const p = m.sender === myNick ? m.receiver : m.sender;
                if (!partners[p]) partners[p] = { text: m.text, unread: (m.receiver === myNick && !m.is_read) };
            });

            for (let p in partners) {
                // თუ ავატარი არ არის, ვიყენებთ DiceBear-ის გენერატორს
                const ava = getImg(userAvatars[p], `https://api.dicebear.com/7.x/bottts/svg?seed=${p}`);
                
                box.innerHTML += `
                    <div class="message-row" style="padding:15px; border-bottom:1px solid #111; align-items:center; cursor:pointer" onclick="openChat('${p}')">
                        <img src="${ava}" class="avatar-img" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=${p}'">
                        <div style="flex:1; margin-left:12px;">
                            <b style="color:red; font-size:15px;">${p}</b><br>
                            <small style="color:#666">${partners[p].text.substring(0,30)}</small>
                        </div>
                        ${partners[p].unread ? '<span style="color:red; font-size:18px;">●</span>' : ''}
                    </div>`;
            }
        } catch(e) { console.error(e); }
    }

    async function loadMessages() {
        if(!activeP) return;
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const area = document.getElementById('chat-view'); 
        area.innerHTML = "";
        
        msgs?.forEach(m => {
            const isMe = m.sender === myNick;
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            // ავატარის შემოწმება თითოეულ მესიჯზე
            const ava = getImg(userAvatars[m.sender], `https://api.dicebear.com/7.x/bottts/svg?seed=${m.sender}`);
            
            area.innerHTML += `
                <div class="message-row ${isMe ? 'my-msg' : 'other-msg'}">
                    <img src="${ava}" class="avatar-img" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=${m.sender}'">
                    <div class="bubble">
                        <div style="color:${isMe ? '#0cf' : 'red'}; font-size:11px; font-weight:bold; margin-bottom:3px;">${m.sender}</div>
                        <div class="msg-text">${parseBBCode(m.text)}</div>
                        <div class="msg-info">
                            <span>${time}</span>
                            ${myNick==='Abu007' ? `<span class="del-btn" onclick="deleteMsg('${m.id}')">🗑️</span>`:''}
                        </div>
                    </div>
                </div>`;
        });
        area.scrollTop = area.scrollHeight;
    }

    async function toggleEmojis() {
        const picker = document.getElementById('emoji-picker');
        if (picker.style.display === 'grid') { picker.style.display = 'none'; return; }
        
        const { data, error } = await _s.from('emojis').select('*');
        if(error || !data) { alert("ბაზიდან სმაილები ვერ წამოვიდა"); return; }
        
        picker.innerHTML = data.map(e => `
            <img src="${e.emoji_url}" class="emoji-img" 
                 onclick="addEmoji('${e.emoji_url}')" 
                 onerror="this.src='https://via.placeholder.com/50?text=?'">
        `).join('');
        picker.style.display = 'grid';
    }
</script>
