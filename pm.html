<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease; }
        
        /* ღამის რეჟიმი */
        body.night-mode {
            --bg-color: #030000;
            --text-color: white;
            --chat-bg: radial-gradient(circle at center, #1a0000 0%, #030000 100%);
            --bubble-bg: rgba(25, 0, 0, 0.9);
            --bubble-border: #660000;
            --nick-color: #ff6666;
            --input-bg: #080000;
            --input-border: #660000;
            --topbar-bg: black;
            --inbox-border: #150000;
            --inbox-hover: #1a0000;
        }
        
        /* დღის რეჟიმი — 4 დიდი, ბრჭყვიალა გული (ზუსტად როგორც ფოტოზე) */
        body.day-mode {
            --bg-color: #fff8f0;
            --text-color: #2c2418;
            --chat-bg: #fffef7;
            --bubble-bg: #ffffff;
            --bubble-border: #e8d4b0;
            --nick-color: #c55a3a;
            --input-bg: #ffffff;
            --input-border: #e8d4b0;
            --topbar-bg: #fff4e6;
            --inbox-border: #f0e4cc;
            --inbox-hover: #fff0e6;
            /* 4 დიდი, ბრჭყვიალა გული */
            background-image: 
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="15" y="30" font-size="52" fill="%23ff6666">❤️</text></svg>'),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="70" y="25" font-size="48" fill="%23ff6666">❤️</text></svg>'),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="80" y="75" font-size="56" fill="%23ff6666">❤️</text></svg>'),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="10" y="85" font-size="44" fill="%23ff6666">❤️</text></svg>');
            background-repeat: no-repeat;
            background-position: 5% 15%, 85% 10%, 88% 70%, 8% 85%;
            background-size: 90px 90px, 85px 85px, 100px 100px, 80px 80px;
            background-attachment: fixed;
        }
        
        /* ღაჟღაჟა ანიმაცია */
        @keyframes heartGlow {
            0% { filter: drop-shadow(0 0 2px #ff6699); opacity: 0.6; transform: scale(1); }
            50% { filter: drop-shadow(0 0 18px #ff88aa) drop-shadow(0 0 25px #ff4466); opacity: 1; transform: scale(1.05); }
            100% { filter: drop-shadow(0 0 2px #ff6699); opacity: 0.6; transform: scale(1); }
        }
        
        /* გულების ანიმაცია */
        body.day-mode {
            animation: bgHeartGlow 3s infinite;
        }
        
        @keyframes bgHeartGlow {
            0% { background-blend-mode: normal; }
            50% { background-blend-mode: overlay; }
            100% { background-blend-mode: normal; }
        }
        
        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        .header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--inbox-border);
            background: var(--topbar-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .header b:first-child {
            cursor: pointer;
            color: var(--nick-color);
            font-size: 24px;
        }
        #p-name {
            font-weight: 600;
            font-size: 18px;
            color: var(--nick-color);
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
        }
        .reload-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--nick-color);
        }
        
        #main-container {
            flex: 1;
            overflow-y: auto;
            background: transparent;
        }
        
        /* Inbox */
        .inbox-item {
            padding: 14px 20px;
            border-bottom: 1px solid var(--inbox-border);
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            background: rgba(255, 255, 255, 0.75);
        }
        body.night-mode .inbox-item {
            background: rgba(0, 0, 0, 0.5);
        }
        .inbox-item:hover {
            background: var(--inbox-hover);
        }
        .inbox-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--nick-color);
            object-fit: cover;
            margin-right: 15px;
            background: #c0a080;
        }
        .inbox-nick {
            font-weight: 600;
            font-size: 16px;
            flex: 1;
            color: var(--text-color);
        }
        .unread-dot {
            width: 10px;
            height: 10px;
            background: #ff5555;
            border-radius: 50%;
            margin-left: 10px;
            animation: heartGlow 1s infinite;
        }
        
        /* Chat View */
        #chat-view {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 80px;
        }
        .msg-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--nick-color);
            object-fit: cover;
            background: #c0a080;
        }
        .bubble {
            background: var(--bubble-bg);
            border: 1px solid var(--bubble-border);
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 75%;
            border-left: 3px solid var(--nick-color);
        }
        .msg-nick {
            color: var(--nick-color);
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
        }
        .msg-text {
            color: var(--text-color);
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }
        .msg-info {
            font-size: 10px;
            color: #999;
            margin-top: 6px;
        }
        
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            background: var(--topbar-bg);
            border-top: 1px solid var(--inbox-border);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-box {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
            padding: 12px 16px;
            border-radius: 30px;
            outline: none;
            font-size: 15px;
        }
        .send-btn {
            font-size: 28px;
            color: var(--nick-color);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="header">
        <b onclick="goBack()">←</b>
        <span id="p-name">შემოსულები</span>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle">🌙</button>
            <button class="reload-btn" onclick="location.reload()">⟳</button>
        </div>
    </div>

    <div id="main-container">
        <div id="chat-view" style="display:none;"></div>
        <div id="inbox-view"></div>
    </div>

    <div id="controls" class="bottom-bar" style="display:none;">
        <input type="text" id="pm-input" class="input-box" placeholder="დაწერე მესიჯი...">
        <button class="send-btn" onclick="sendMsg()">✈</button>
    </div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    const partner = new URLSearchParams(window.location.search).get('to');
    let profMap = {};

    function setTheme(theme) {
        const body = document.body;
        body.classList.remove('night-mode', 'day-mode');
        if (theme === 'day') {
            body.classList.add('day-mode');
            document.getElementById('themeToggle').innerHTML = '🌙';
            localStorage.setItem('pm_theme', 'day');
        } else {
            body.classList.add('night-mode');
            document.getElementById('themeToggle').innerHTML = '☀️';
            localStorage.setItem('pm_theme', 'night');
        }
    }
    
    function toggleTheme() {
        if (document.body.classList.contains('night-mode')) setTheme('day');
        else setTheme('night');
    }
    
    async function init() {
        const savedTheme = localStorage.getItem('pm_theme') || 'night';
        setTheme(savedTheme);
        
        const { data: profiles } = await _s.from('profiles').select('username, avatar_url');
        if (profiles) {
            profiles.forEach(p => {
                profMap[p.username] = p.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png';
            });
        }

        if (partner) {
            document.getElementById('inbox-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('p-name').innerText = partner;
            await markAsRead();
            loadChat();
            setInterval(loadChat, 3000);
        } else {
            loadInbox();
        }
    }

    async function markAsRead() {
        await _s.from('private_messages')
            .update({ is_read: true })
            .eq('sender', partner)
            .eq('receiver', myNick);
    }

    async function loadInbox() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', {ascending: false});
        const partners = [...new Set(msgs?.map(m => m.sender === myNick ? m.receiver : m.sender))];
        const unreadFrom = msgs?.filter(m => m.receiver === myNick && !m.is_read).map(m => m.sender);

        if (!partners || partners.length === 0) {
            document.getElementById('inbox-view').innerHTML = '<div class="empty-state">💬 მესიჯები არ არის</div>';
            return;
        }
        
        document.getElementById('inbox-view').innerHTML = partners.map(p => `
            <div class="inbox-item" onclick="window.location.href='pm.html?to=${p}'">
                <img src="${profMap[p]}" class="inbox-avatar" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                <span class="inbox-nick">${p}</span>
                ${unreadFrom?.includes(p) ? '<div class="unread-dot"></div>' : ''}
            </div>
        `).join('');
    }

    async function loadChat() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        if (msgs && msgs.length > 0) {
            document.getElementById('chat-view').innerHTML = msgs.map(m => {
                const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                return `<div class="msg-row">
                    <img src="${profMap[m.sender]}" class="msg-avatar" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                    <div class="bubble">
                        <b class="msg-nick">${m.sender}</b>
                        <div class="msg-text">${escapeHtml(m.text)}</div>
                        <div class="msg-info">${time}</div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('chat-view').scrollTop = 99999;
        } else {
            document.getElementById('chat-view').innerHTML = '<div class="empty-state">💬 მესიჯები არ არის</div>';
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function sendMsg() {
        const inp = document.getElementById('pm-input');
        if (!inp.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: inp.value, is_read: false }]);
        inp.value = "";
        loadChat();
    }

    function goBack() { 
        window.location.href = partner ? 'pm.html' : 'chat.html';
    }

    document.getElementById('themeToggle').onclick = toggleTheme;
    init();
</script>
</body>
</html>
