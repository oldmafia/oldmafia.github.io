<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM - Abu007 System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; border-bottom: 1px solid #222; background: #050505; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { cursor: pointer; font-size: 30px; color: #fff; text-decoration: none; padding: 0 10px; }
        
        #chat-view { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        
        /* მესიჯის ბლოკი ავატარით */
        .msg-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: flex-end; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; border: 1px solid #333; object-fit: cover; }
        .bubble { background: #111; border: 1px solid #222; padding: 10px; border-radius: 15px; max-width: 80%; position: relative; }
        .nick { font-weight: bold; font-size: 13px; color: #ff3333; margin-bottom: 4px; display: block; }
        .txt { font-size: 15px; color: #ddd; word-break: break-word; }

        /* სმაილების პანელი */
        #emoji-picker { position: fixed; bottom: 85px; left: 10px; right: 10px; background: #050505; border: 2px solid #500; border-radius: 15px; padding: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 10000; max-height: 220px; overflow-y: auto; }
        .emoji-img { width: 100%; cursor: pointer; border-radius: 5px; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #111; display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid #333; color: white; padding: 12px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

<div class="header">
    <a href="chat.html" class="back-btn">⬅</a>
    <div id="view-title" style="color:red; font-weight:bold;">იტვირთება...</div>
    <div onclick="location.reload()" style="font-size: 20px; cursor:pointer;">🔄</div>
</div>

<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div class="bottom-bar">
    <div id="emoji-btn" style="font-size:30px; cursor:pointer; display:none;" onclick="toggleEmoji()">😊</div>
    <input type="text" id="pm-input" class="input-box" placeholder="დაწერე მესიჯი...">
    <div onclick="sendMsg()" style="font-size:30px; color:red; cursor:pointer;">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    
    // ნიკის აღება და პარტნიორის იდენტიფიკაცია
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    const partner = new URLSearchParams(window.location.search).get('to');
    let profiles = {};

    function parseBB(t) { return t.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:100px; display:block; margin-top:5px;">'); }

    async function init() {
        if (!partner) { window.location.href = 'chat.html'; return; }
        document.getElementById('view-title').innerText = partner;

        // პროფილების ჩატვირთვა
        const { data: uData } = await _s.from('profiles').select('*');
        uData?.forEach(u => profiles[u.username] = u);

        // უფლებების მიცემა: თუ ხარ Abu007 ან გაქვს ადმინ/დამფუძნებლის როლი
        const me = profiles[myNick];
        if (myNick === 'Abu007' || (me && (me.role === 'ადმინი' || me.role === 'დამფუძნებელი'))) {
            document.getElementById('emoji-btn').style.display = 'block';
        }

        loadMsgs();
        setInterval(loadMsgs, 3000); // მესიჯების ავტომატური განახლება
    }

    async function loadMsgs() {
        const { data } = await _s.from('private_messages')
            .select('*')
            .or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`)
            .order('created_at', { ascending: true });

        const area = document.getElementById('chat-view');
        let html = "";

        data?.forEach(m => {
            const user = profiles[m.sender] || { avatar_url: 'https://via.placeholder.com/40', username: m.sender };
            html += `
                <div class="msg-row">
                    <img src="${user.avatar_url}" class="avatar">
                    <div class="bubble">
                        <span class="nick">${user.username}</span>
                        <div class="txt">${parseBB(m.text)}</div>
                        ${myNick === 'Abu007' ? `<div style="text-align:right; font-size:10px; color:red; cursor:pointer;" onclick="delMsg('${m.id}')">წაშლა</div>` : ''}
                    </div>
                </div>`;
        });

        area.innerHTML = html;
        area.scrollTop = area.scrollHeight;
    }

    async function sendMsg() {
        const inp = document.getElementById('pm-input');
        if (!inp.value.trim()) return;
        
        await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: inp.value }]);
        inp.value = ""; 
        loadMsgs();
    }

    async function delMsg(id) {
        if(confirm("წავშალოთ მესიჯი?")) {
            await _s.from('private_messages').delete().eq('id', id);
            loadMsgs();
        }
    }

    async function toggleEmoji() {
        const p = document.getElementById('emoji-picker');
        if (p.style.display === 'grid') { p.style.display = 'none'; return; }
        
        const { data } = await _s.from('emojis').select('*');
        p.innerHTML = data.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('');
        p.style.display = 'grid';
    }

    function addEmoji(url) {
        document.getElementById('pm-input').value += ` [img]${url}[/img] `;
        document.getElementById('emoji-picker').style.display = 'none';
        document.getElementById('pm-input').focus();
    }

    window.onload = init;
</script>
</body>
</html>
