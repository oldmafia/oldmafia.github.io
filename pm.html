<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abu007 - PM Control</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; border-bottom: 2px solid #500; background: #050505; display: flex; align-items: center; justify-content: space-between; }
        #chat-view, #inbox-view { flex: 1; overflow-y: auto; padding: 15px; display: none; padding-bottom: 100px; }
        .active { display: block !important; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #444; object-fit: cover; cursor: pointer; }
        .msg-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: flex-end; }
        .bubble { background: #111; border: 1px solid #333; padding: 10px; border-radius: 15px; max-width: 80%; }
        .nick { font-weight: bold; font-size: 12px; color: #ff3333; margin-bottom: 4px; display: block; }

        /* ადმინ მენიუ - ზუსტად როგორც ფოტოზეა */
        #admin-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; border: 2px solid red; padding: 20px; border-radius: 20px; display: none; z-index: 10001; width: 85%; text-align: center; box-shadow: 0 0 30px #f00; }
        .adm-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; }

        #emoji-picker { position: fixed; bottom: 85px; left: 10px; right: 10px; background: #050505; border: 2px solid #500; border-radius: 15px; padding: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 1000; max-height: 250px; overflow-y: auto; }
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 12px; border-top: 1px solid #222; display: none; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="window.location.href='chat.html'" style="cursor:pointer; font-size:25px;">⬅</div>
    <b id="view-title" style="color:red;">პირადი მიმოწერა</b>
    <div onclick="location.reload()" style="cursor:pointer; font-size:20px;">🔄</div>
</div>

<div id="inbox-view"></div>
<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div id="admin-modal">
    <h3 id="adm-name" style="color:white; margin-bottom:15px;">მომხმარებელი</h3>
    <button class="adm-btn" style="background:#005555;" onclick="openInboxRedirect()">✉ მიმოწერა</button>
    <button class="adm-btn" style="background:#550000;" onclick="updateUser('role', 'ადმინი')">🛡 ადმინად დანიშვნა</button>
    <button class="adm-btn" style="background:#886600;" onclick="updateUser('role', 'დამფუძნებელი')">👑 დამფუძნებლად დანიშვნა</button>
    <button class="adm-btn" style="background:#333;" onclick="updateUser('role', 'მომხმარებელი')">✨ როლის ჩახსნა</button>
    <button class="adm-btn" style="background:red;" onclick="updateUser('role', 'ბლოკი')">🚫 დაბლოკვა (BAN)</button>
    <button class="adm-btn" style="background:#111;" onclick="closeAdmin()">დახურვა</button>
</div>

<div class="bottom-bar" id="input-bar">
    <div style="font-size:28px; cursor:pointer;" onclick="toggleEmoji()">😊</div>
    <input type="text" id="pm-input" class="input-box" placeholder="დაწერე მესიჯი...">
    <div onclick="sendMsg()" style="font-size:28px; color:red; cursor:pointer;">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const myNick = localStorage.getItem('nickname') || 'Abu007';
    let partner = new URLSearchParams(window.location.search).get('to');
    let uCache = {};
    let selU = "";

    async function init() {
        const { data } = await _s.from('profiles').select('*');
        data?.forEach(u => uCache[u.username] = u);
        
        // Force Admin: თუ Abu007 ხარ, ბაზას აღარ ვკითხავთ უფლებას
        partner ? startChat(partner) : showInbox();
    }

    async function showInbox() {
        const box = document.getElementById('inbox-view');
        box.classList.add('active');
        const { data } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const partners = [...new Set(data?.map(m => m.sender === myNick ? m.receiver : m.sender))];
        box.innerHTML = partners.map(p => {
            const u = uCache[p] || { avatar_url: 'https://via.placeholder.com/45' };
            return `<div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #222;" onclick="window.location.href='pm.html?to=${p}'">
                <img src="${u.avatar_url}" class="avatar">
                <b style="color:red; margin-left:15px;">${p}</b>
            </div>`;
        }).join('');
    }

    async function startChat(p) {
        document.getElementById('view-title').innerText = p;
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex';
        loadMsgs(); setInterval(loadMsgs, 3000);
    }

    async function loadMsgs() {
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${partner}"),and(sender.eq."${partner}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        document.getElementById('chat-view').innerHTML = data.map(m => {
            const u = uCache[m.sender] || { avatar_url: 'https://via.placeholder.com/45' };
            return `<div class="msg-row">
                <img src="${u.avatar_url}" class="avatar" onclick="openAdmin('${m.sender}')">
                <div class="bubble">
                    <span class="nick">${m.sender}</span>
                    <div style="color:#eee; word-break:break-all;">${m.text.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" style="max-width:120px; display:block;">')}</div>
                    <div style="font-size:10px; color:#555; margin-top:5px; display:flex; justify-content:space-between;">
                        <span>${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        ${myNick === 'Abu007' ? `<b style="color:red; cursor:pointer;" onclick="deleteM('${m.id}')">✖</b>` : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
        document.getElementById('chat-view').scrollTop = 99999;
    }

    function openAdmin(u) {
        if (myNick !== 'Abu007') return;
        selU = u;
        document.getElementById('adm-name').innerText = u;
        document.getElementById('admin-modal').style.display = 'block';
    }

    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }

    async function updateUser(field, val) {
        await _s.from('profiles').update({ [field]: val }).eq('username', selU);
        alert("წარმატებით შეიცვალა!"); 
        location.reload();
    }

    async function sendMsg() {
        const i = document.getElementById('pm-input');
        if (!i.value.trim()) return;
        await _s.from('private_messages').insert([{ sender: myNick, receiver: partner, text: i.value }]);
        i.value = ""; loadMsgs();
    }

    async function deleteM(id) {
        if(confirm("წავშალოთ მესიჯი?")) { await _s.from('private_messages').delete().eq('id', id); loadMsgs(); }
    }

    async function toggleEmoji() {
        const p = document.getElementById('emoji-picker');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
        if (p.style.display === 'grid') {
            const { data } = await _s.from('emojis').select('*');
            p.innerHTML = data.map(e => `<img src="${e.emoji_url}" style="width:100%; cursor:pointer;" onclick="addEmoji('${e.emoji_url}')">`).join('');
        }
    }

    function addEmoji(url) {
        const inp = document.getElementById('pm-input');
        inp.value += ` [img]${url}[/img] `;
        document.getElementById('emoji-picker').style.display = 'none';
        inp.focus();
    }

    window.onload = init;
</script>
</body>
</html>
