<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - PM SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { padding: 15px; text-align: center; border-bottom: 2px solid #500; background: #050000; display: flex; align-items: center; justify-content: space-between; }
        
        .content { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 90px; background: #000; }
        
        #inbox-view, #chat-view { display: none; width: 100%; }
        .active { display: block !important; }

        .user-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a0000; cursor: pointer; background: #0a0000; margin-bottom: 5px; border-radius: 8px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #800; margin-right: 15px; }

        .bubble { background: #1a0505; border: 1px solid #400; padding: 10px 15px; border-radius: 15px 15px 15px 2px; margin-bottom: 12px; max-width: 85%; position: relative; word-wrap: break-word; }
        .my-msg { background: #300000; border-color: #700; margin-left: auto; border-radius: 15px 15px 2px 15px; }

        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px solid #300; padding-bottom: 3px; }
        .time { font-size: 10px; color: #888; display: block; text-align: right; margin-top: 5px; }
        .delete-btn { color: #ff0000; cursor: pointer; font-size: 14px; padding-left: 10px; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #050000; padding: 12px; border-top: 2px solid #500; display: none; gap: 10px; align-items: center; z-index: 100; }
        input { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 20px; outline: none; font-size: 16px; }
        .send-btn { background: #800; color: white; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 24px; color: red;">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold; font-size: 18px;">PM SYSTEM</div>
    <div onclick="location.reload()" style="cursor:pointer; font-size: 20px; color: red;">🔄</div>
</div>

<div class="content" id="scroll-area">
    <div id="inbox-view" class="active"></div>
    <div id="chat-view"></div>
</div>

<div class="bottom-bar" id="input-bar">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი..." onkeypress="if(event.key==='Enter') sendMessage()">
    <div onclick="sendMessage()" class="send-btn">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    
    // ნიკის აღება localStorage-დან (თუ არ არის, სტუმარი)
    let myNick = localStorage.getItem('nickname') || "Guest";
    let activeP = null;

    function formatTime(dateStr) {
        const d = dateStr ? new Date(dateStr) : new Date();
        return d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }

    async function loadInbox() {
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const box = document.getElementById('inbox-view');
        box.innerHTML = "";
        const partners = new Set();
        
        if(!msgs || msgs.length === 0) {
            box.innerHTML = "<div style='text-align:center; margin-top:50px; color:#444;'>მესიჯები არ არის</div>";
            return;
        }

        msgs.forEach(m => {
            const p = m.sender === myNick ? m.receiver : m.sender;
            if (!partners.has(p)) {
                partners.add(p);
                box.innerHTML += `
                <div class="user-row" onclick="openChat('${p}')">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${p}" class="avatar">
                    <b style="color:red; font-size:18px;">${p}</b>
                </div>`;
            }
        });
    }

    async function openChat(p) {
        activeP = p;
        document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        
        // ყველასთვის ვაჩენთ საწერ გრაფას!
        document.getElementById('input-bar').style.display = 'flex';
        
        loadMessages();
        
        _s.channel('pms').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'private_messages' }, payload => {
            if(payload.new.sender === activeP || payload.new.receiver === activeP) loadMessages();
        }).subscribe();
    }

    async function loadMessages() {
        if(!activeP) return;
        const { data } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const area = document.getElementById('chat-view');
        
        if (data.length === 0) {
            area.innerHTML = "<div style='text-align:center; margin-top:20px; color:#333;'>მიწერე პირველი...</div>";
        } else {
            area.innerHTML = data.map(m => `
                <div class="bubble ${m.sender === myNick ? 'my-msg' : ''}" id="msg-${m.id}">
                    <div class="msg-header">
                        <b style="color:red; font-size:12px;">${m.sender}</b>
                        ${(myNick === "Abu007") ? `<span class="delete-btn" onclick="deleteMessage('${m.id}')">🗑️</span>` : ''}
                    </div>
                    <div class="msg-text">${m.text}</div>
                    <span class="time">${formatTime(m.created_at)}</span>
                </div>
            `).join('');
        }
        
        const scrollArea = document.getElementById('scroll-area');
        scrollArea.scrollTop = scrollArea.scrollHeight;
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        const txt = i.value.trim();
        if (!txt || !activeP) return;

        // თუ მომხმარებელი "Guest"-ია, არ გაუშვა
        if(myNick === "Guest") { alert("გაიარე ავტორიზაცია!"); return; }

        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: txt }]);
        i.value = ""; 
        loadMessages();
    }

    async function deleteMessage(id) {
        if(!confirm("წავშალოთ?")) return;
        const { error } = await _s.from('private_messages').delete().eq('id', id);
        if(!error) document.getElementById(`msg-${id}`).style.display = 'none';
    }

    function goBack() {
        if(document.getElementById('chat-view').classList.contains('active')) {
            document.getElementById('chat-view').classList.remove('active');
            document.getElementById('input-bar').style.display = 'none';
            document.getElementById('inbox-view').classList.add('active');
            document.getElementById('view-title').innerText = "PM SYSTEM";
            activeP = null;
            loadInbox();
        } else {
            window.history.back();
        }
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const chatWith = urlParams.get('chat');
        if (chatWith) {
            openChat(chatWith); // აქ ავტომატურად გაიხსნება საწერი ველი
        } else {
            loadInbox();
        }
    };
</script>
</body>
</html>
