<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>პირადი - Abu007</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: #050000; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { padding: 12px; text-align: center; border-bottom: 1px solid #300; background: #000; display: flex; align-items: center; justify-content: space-between; }
        #inbox-view, #chat-view { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 100px; display: none; }
        .active { display: block !important; }

        /* მესიჯების მკაცრი დაყოფა */
        .message-row { display: flex; width: 100%; margin-bottom: 15px; gap: 10px; }
        .my-msg { justify-content: flex-end; } /* შენი მესიჯი მარჯვნივ */
        .other-msg { justify-content: flex-start; } /* სხვისი მესიჯი მარცხნივ */
        
        .avatar-img { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #500; object-fit: cover; flex-shrink: 0; }
        
        .bubble { padding: 10px; border-radius: 15px; max-width: 70%; border: 1px solid #333; position: relative; }
        .my-msg .bubble { background: #0a1a2a; border-color: #005577; border-bottom-right-radius: 2px; }
        .other-msg .bubble { background: #1a0505; border-color: #770000; border-bottom-left-radius: 2px; }

        .msg-text { font-size: 14px; word-break: break-word; }
        .msg-text img { max-width: 100px; max-height: 100px; display: block; margin: 5px 0; }

        .msg-info { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; font-size: 9px; color: #555; }
        .del-btn { color: #f00; cursor: pointer; margin-left: 10px; font-weight: bold; }

        /* სმაილების დაფის გასწორება */
        #emoji-picker { 
            position: fixed; bottom: 80px; left: 10px; right: 10px; 
            background: rgba(0,0,0,0.95); border: 2px solid #500; border-radius: 12px; 
            padding: 10px; display: none; 
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); 
            gap: 8px; z-index: 3000; max-height: 250px; overflow-y: auto;
            box-shadow: 0 0 20px #f00;
        }
        .emoji-img { width: 45px; height: 45px; cursor: pointer; object-fit: contain; background: #111; border-radius: 5px; padding: 2px; }
        .emoji-img:hover { background: #300; }

        /* ქვედა ზოლი */
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 12px; border-top: 1px solid #300; display: none; gap: 10px; align-items: center; z-index: 2000; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid #400; color: white; padding: 12px 15px; border-radius: 25px; outline: none; font-size: 14px; }
        
        .unread-dot { background: red; width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 8px red; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size: 22px;">⬅</div>
    <div id="view-title" style="color:red; font-weight:bold; text-transform: uppercase;">პირადი</div>
    <div onclick="location.reload()" style="cursor:pointer;">🔄</div>
</div>

<div id="inbox-view" class="active"></div>
<div id="chat-view"></div>
<div id="emoji-picker"></div>

<div class="bottom-bar" id="input-bar">
    <div onclick="toggleEmojis()" style="font-size:26px; cursor:pointer">😊</div>
    <input type="text" id="msg-input" class="input-box" placeholder="დაწერე მესიჯი..." autocomplete="off">
    <div onclick="sendMessage()" style="font-size:26px; cursor:pointer; color:red">✈</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname');
    let activeP = null;
    let userAvatars = {};

    function parseBBCode(text) {
        return text.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1">');
    }

    async function loadAvatars() {
        const { data } = await _s.from('profiles').select('username, avatar_url');
        data?.forEach(p => userAvatars[p.username] = p.avatar_url);
    }

    async function loadInbox() {
        if (!myNick) return;
        await loadAvatars();
        const { data: msgs } = await _s.from('private_messages').select('*').or(`sender.eq."${myNick}",receiver.eq."${myNick}"`).order('created_at', { ascending: false });
        const box = document.getElementById('inbox-view'); box.innerHTML = "";
        const partners = {};
        
        msgs?.forEach(m => {
            const p = m.sender === myNick ? m.receiver : m.sender;
            if (!partners[p]) partners[p] = { text: m.text, unread: (m.receiver === myNick && !m.is_read) };
        });

        for (let p in partners) {
            const ava = userAvatars[p] || `https://api.dicebear.com/7.x/avataaars/svg?seed=${p}`;
            box.innerHTML += `
                <div class="message-row" style="padding:15px; border-bottom:1px solid #111; align-items:center; cursor:pointer" onclick="openChat('${p}')">
                    <img src="${ava}" class="avatar-img">
                    <div style="flex:1; margin-left:15px;">
                        <b style="color:red; font-size:16px">${p}</b><br>
                        <small style="color:#666">${partners[p].text.substring(0,30)}</small>
                    </div>
                    ${partners[p].unread ? '<div class="unread-dot"></div>' : ''}
                </div>`;
        }
    }

    async function openChat(p) {
        activeP = p; document.getElementById('view-title').innerText = p;
        document.getElementById('inbox-view').classList.remove('active');
        document.getElementById('chat-view').classList.add('active');
        document.getElementById('input-bar').style.display = 'flex';
        await _s.from('private_messages').update({ is_read: true }).match({ sender: p, receiver: myNick, is_read: false });
        loadMessages();
    }

    async function loadMessages() {
        if(!activeP) return;
        const { data: msgs } = await _s.from('private_messages').select('*').or(`and(sender.eq."${myNick}",receiver.eq."${activeP}"),and(sender.eq."${activeP}",receiver.eq."${myNick}")`).order('created_at', { ascending: true });
        const area = document.getElementById('chat-view'); area.innerHTML = "";
        
        msgs?.forEach(m => {
            const isMe = m.sender === myNick;
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const ava = userAvatars[m.sender] || `https://api.dicebear.com/7.x/avataaars/svg?seed=${m.sender}`;

            area.innerHTML += `
                <div class="message-row ${isMe ? 'my-msg' : 'other-msg'}">
                    ${!isMe ? `<img src="${ava}" class="avatar-img">` : ''}
                    <div class="bubble">
                        <div style="color:${isMe ? '#00ccff' : '#ff4444'}; font-size:11px; font-weight:bold; margin-bottom:3px;">${m.sender}</div>
                        <div class="msg-text">${parseBBCode(m.text)}</div>
                        <div class="msg-info">
                            <span>${time}</span>
                            ${myNick === 'Abu007' ? `<span class="del-btn" onclick="deleteMsg('${m.id}')">✖</span>` : ''}
                        </div>
                    </div>
                    ${isMe ? `<img src="${ava}" class="avatar-img">` : ''}
                </div>`;
        });
        area.scrollTop = area.scrollHeight;
    }

    async function toggleEmojis() {
        const picker = document.getElementById('emoji-picker');
        if (picker.style.display === 'grid') { picker.style.display = 'none'; return; }
        const { data } = await _s.from('emojis').select('*');
        picker.innerHTML = data?.map(e => `<img src="${e.emoji_url}" class="emoji-img" onclick="addEmoji('${e.emoji_url}')">`).join('');
        picker.style.display = 'grid';
    }

    function addEmoji(url) {
        document.getElementById('msg-input').value += `[img]${url}[/img]`;
        document.getElementById('emoji-picker').style.display = 'none';
        document.getElementById('msg-input').focus();
    }

    async function sendMessage() {
        const i = document.getElementById('msg-input');
        if (!i.value.trim() || !activeP) return;
        const t = i.value; i.value = "";
        await _s.from('private_messages').insert([{ sender: myNick, receiver: activeP, text: t, is_read: false }]);
        loadMessages();
    }

    async function deleteMsg(id) {
        if(confirm("წავშალოთ მესიჯი?")) { await _s.from('private_messages').delete().eq('id', id); loadMessages(); }
    }

    function goBack() { 
        if(document.getElementById('chat-view').classList.contains('active')) location.href='pm.html'; 
        else location.href='chat.html'; 
    }

    window.onload = loadInbox;
    document.getElementById('msg-input').addEventListener('keypress', e => { if(e.key==='Enter') sendMessage() });
</script>
</body>
</html>
