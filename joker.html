<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🃏 ჯოკერი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a2a1a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 900px;
            width: 100%;
            background: #1e5a2e;
            border-radius: 55px;
            padding: 20px;
            border: 6px solid #d4a017;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #f5c542;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        /* მწვანე მაგიდა */
        .felt {
            background: radial-gradient(circle, #2f9e4a, #0f5622);
            border-radius: 100px;
            padding: 40px 20px;
            position: relative;
            min-height: 400px;
            border: 5px solid #c9942e;
        }
        .seats {
            position: relative;
            height: 320px;
        }
        .seat {
            position: absolute;
            text-align: center;
            width: 95px;
            background: #2a2418;
            padding: 8px 5px;
            border-radius: 45px;
            border: 2px solid #e6b84e;
        }
        .seat img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid gold;
            object-fit: cover;
        }
        .seat .name {
            font-size: 10px;
            font-weight: bold;
            color: #ffd966;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .seat .bid {
            font-size: 9px;
            color: #ffaa66;
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 1px 6px;
            border-radius: 15px;
        }
        .seat-bottom { bottom: -45px; left: 50%; transform: translateX(-50%); }
        .seat-top { top: -45px; left: 50%; transform: translateX(-50%); }
        .seat-left { left: -70px; top: 50%; transform: translateY(-50%); }
        .seat-right { right: -70px; top: 50%; transform: translateY(-50%); }

        .table-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.55);
            padding: 12px 22px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid gold;
        }
        .table-center .value {
            font-size: 24px;
            font-weight: bold;
            color: #ffe5a3;
        }
        .table-center .text {
            font-size: 11px;
            color: #ffdd99;
        }

        .actions {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        button, select {
            background: #f5bc4e;
            border: none;
            padding: 8px 18px;
            border-radius: 35px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }
        select {
            background: #2a5a2a;
            color: white;
        }
        .stats {
            margin-top: 20px;
            background: #102010cc;
            padding: 12px;
            border-radius: 25px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: #f0e0b0;
            font-size: 11px;
        }
        th, td {
            padding: 6px 3px;
            text-align: center;
            border-bottom: 1px solid #c6a24b;
        }
        th { color: #ffdf8c; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #ffdd99;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🃏 ჯოკერი</h1>

    <div class="felt">
        <div class="seats" id="seats"></div>
        <div class="table-center">
            <div class="value" id="roundValue">—</div>
            <div class="text" id="roundText">რაუნდი</div>
        </div>
    </div>

    <div class="actions">
        <button id="sitBtn">🪑 დაჯდომა</button>
        <select id="bidSelect">
            <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option>
            <option>5</option><option>6</option><option>7</option><option>8</option><option>9</option>
            <option>10</option><option>11</option><option>12</option><option>13</option>
        </select>
        <button id="bidBtn">📢 განაცხადი</button>
        <button id="startBtn">🎮 დაწყება</button>
    </div>

    <div class="stats">
        <div id="statsTable"></div>
    </div>

    <a href="chat.html" class="back-link">← ჩატში დაბრუნება</a>
</div>

<script>
    let myNick = localStorage.getItem('nickname') || "მოთამაშე";
    let myAvatar = localStorage.getItem('avatar') || "https://i.ibb.co/v3m6y6R/avatar.png";

    let players = JSON.parse(localStorage.getItem('joker_final2')) || [];
    let myIndex = players.findIndex(p => p.name === myNick);
    let gameActive = false;
    let currentRound = 1;
    let roundBids = [null, null, null, null];
    let roundTricks = [null, null, null, null];
    let totalScores = [0, 0, 0, 0];

    const ROUNDS = [1,2,3,4,5,6,7,8,9, 9,9,9,9, 9,8,7,6,5,4,3,2,1, 9,9,9,9];

    function save() { localStorage.setItem('joker_final2', JSON.stringify(players)); }

    function sitDown() {
        if (players.find(p => p.name === myNick)) { alert("უკვე ზიხარ"); return; }
        if (players.length >= 4) { alert("მაგიდა სავსეა"); return; }
        players.push({ name: myNick, avatar: myAvatar, bid: null, trick: null, total: 0 });
        myIndex = players.length - 1;
        save();
        render();
    }

    function startGame() {
        if (players.length !== 4) { alert("საჭიროა 4 მოთამაშე"); return; }
        currentRound = 1;
        totalScores = [0,0,0,0];
        roundBids = [null,null,null,null];
        roundTricks = [null,null,null,null];
        gameActive = true;
        for (let i=0; i<players.length; i++) {
            players[i].bid = null;
            players[i].trick = null;
            players[i].total = 0;
        }
        save();
        render();
        alert(`თამაში დაიწყო! რაუნდი 1/26 | ${ROUNDS[0]} ლივი`);
    }

    function makeBid() {
        if (!gameActive) { alert("თამაში არ დაწყებულა"); return; }
        if (roundBids[myIndex] !== null) { alert("უკვე გააკეთე განაცხადი"); return; }
        let bid = parseInt(document.getElementById("bidSelect").value);
        roundBids[myIndex] = bid;
        players[myIndex].bid = bid;
        save();
        render();
        if (roundBids.every(b => b !== null)) {
            alert("ყველამ გააკეთა განაცხადი! ახლა ჩაწერეთ ლივები");
            askTricks();
        }
    }

    function askTricks() {
        let tricks = prompt(`რაუნდი ${currentRound}/26\nრამდენი ლივი აიღეთ? (0-${ROUNDS[currentRound-1]})`, "0");
        tricks = parseInt(tricks);
        if (isNaN(tricks)) tricks = 0;
        roundTricks[myIndex] = tricks;
        players[myIndex].trick = tricks;

        let bid = roundBids[myIndex];
        let score = (bid === tricks) ? (10 + bid) : -Math.abs(bid - tricks);
        totalScores[myIndex] += score;
        players[myIndex].total = totalScores[myIndex];
        save();
        render();

        if (roundTricks.every(t => t !== null)) {
            let msg = `✅ რაუნდი ${currentRound} დასრულდა!\nქულები: ${totalScores.join(" | ")}`;
            if (currentRound < 26) {
                if (confirm(msg + "\nგადავიდეთ შემდეგ რაუნდზე?")) {
                    currentRound++;
                    roundBids = [null,null,null,null];
                    roundTricks = [null,null,null,null];
                    for (let i=0; i<players.length; i++) {
                        players[i].bid = null;
                        players[i].trick = null;
                    }
                    save();
                    render();
                    alert(`რაუნდი ${currentRound}/26 | ${ROUNDS[currentRound-1]} ლივი`);
                }
            } else {
                let winner = totalScores.reduce((iMax, x, i, arr) => x > arr[iMax] ? i : iMax, 0);
                alert(msg + `\n🏆 გამარჯვებული: ${players[winner].name} (${totalScores[winner]} ქულა)`);
                gameActive = false;
            }
        } else {
            alert("ლივები ჩაიწერა. ელოდეთ სხვა მოთამაშეებს");
        }
    }

    function render() {
        let seatsDiv = document.getElementById("seats");
        seatsDiv.innerHTML = "";
        let pos = ["seat-bottom", "seat-right", "seat-top", "seat-left"];
        for (let i=0; i<4; i++) {
            let p = players[i];
            if (p) {
                seatsDiv.innerHTML += `
                    <div class="seat ${pos[i]}">
                        <img src="${p.avatar}">
                        <div class="name">${p.name} ${i===myIndex ? "✨" : ""}</div>
                        <div class="bid">${p.bid !== null ? "🎯 "+p.bid : "—"}</div>
                    </div>
                `;
            } else {
                seatsDiv.innerHTML += `
                    <div class="seat ${pos[i]}">
                        <img src="https://i.ibb.co/v3m6y6R/avatar.png">
                        <div class="name">ცარიელი</div>
                        <div class="bid">—</div>
                    </div>
                `;
            }
        }
        document.getElementById("roundValue").innerHTML = ROUNDS[currentRound-1];
        document.getElementById("roundText").innerHTML = `🎯 რაუნდი ${currentRound}/26`;

        let html = `§<th>მოთამაშე</th><th>განაცხადი</th><th>აღებული</th><th>ქულა</th><th>ჯამი</th>`;
        for (let i=0; i<players.length; i++) {
            let p = players[i];
            let bid = roundBids[i] !== null ? roundBids[i] : "—";
            let trick = roundTricks[i] !== null ? roundTricks[i] : "—";
            let score = (bid !== "—" && trick !== "—") ? ((bid===trick) ? (10+bid) : -Math.abs(bid-trick)) : "—";
            html += `§<td style="text-align:left">${p?.name || "—"}§<td>${bid}§<td>${trick}§<td>${score}§<td><b>${totalScores[i]}</b>§`;
        }
        document.getElementById("statsTable").innerHTML = `§${html}§`;
    }

    document.getElementById("sitBtn").onclick = sitDown;
    document.getElementById("startBtn").onclick = startGame;
    document.getElementById("bidBtn").onclick = makeBid;
    render();
    if (players.length === 4 && !gameActive) alert("4 მოთამაშეა! დააჭირეთ 'დაწყებას'");
</script>
</body>
</html>
