<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🃏 ჯოკერი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a2a1a;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game {
            max-width: 480px;
            width: 100%;
            background: #1e5a2e;
            border-radius: 48px;
            padding: 16px;
            border: 3px solid #d4a017;
        }
        h1 {
            text-align: center;
            color: gold;
            font-size: 1.5rem;
            margin-bottom: 12px;
        }
        /* მრგვალი მაგიდა */
        .round-table {
            background: radial-gradient(circle, #2c8a3e, #0e3a1a);
            border-radius: 50%;
            aspect-ratio: 1 / 1;
            width: 280px;
            margin: 0 auto;
            position: relative;
            border: 4px solid #b87c2e;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 8px 16px rgba(0,0,0,0.3);
        }
        /* სკამები წრეზე */
        .chair {
            position: absolute;
            text-align: center;
            width: 70px;
            transform-origin: center;
        }
        .chair img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid gold;
            object-fit: cover;
            background: #2a2a1a;
        }
        .chair .name {
            font-size: 9px;
            font-weight: bold;
            color: #ffd966;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 20px;
        }
        .chair .bid {
            font-size: 8px;
            color: #ffaa66;
        }
        /* პოზიციები */
        .chair-1 { bottom: -55px; left: 50%; transform: translateX(-50%); }
        .chair-2 { top: -55px; left: 50%; transform: translateX(-50%); }
        .chair-3 { left: -55px; top: 50%; transform: translateY(-50%); }
        .chair-4 { right: -55px; top: 50%; transform: translateY(-50%); }

        /* ცენტრი */
        .table-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .table-center .round-num {
            font-size: 28px;
            font-weight: bold;
            color: gold;
        }
        .table-center .round-text {
            font-size: 10px;
            color: #ffdd99;
        }

        /* ჩემი ბარათი */
        .my-card {
            margin-top: 70px;
            background: #2a2a1a;
            border-radius: 50px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            border: 1px solid #e2b85c;
        }
        .my-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .my-info img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid gold;
        }
        .my-info .details h3 {
            color: #ffeaaf;
            font-size: 13px;
        }
        .my-info .details p {
            color: #ffcc77;
            font-size: 10px;
        }
        .bid-control {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        select, button {
            background: #f5bc4e;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
        }
        select {
            background: #2a5a2a;
            color: white;
        }
        .stats {
            margin-top: 16px;
            background: #102010cc;
            border-radius: 25px;
            padding: 10px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: #f0e0b0;
            font-size: 10px;
            min-width: 260px;
        }
        th, td {
            padding: 5px 3px;
            text-align: center;
            border-bottom: 1px solid #c6a24b;
        }
        th { color: #ffdf8c; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            color: #ffdd99;
            text-decoration: none;
            font-size: 12px;
        }
        button:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
<div class="game">
    <h1>🃏 JOKER</h1>

    <div class="round-table">
        <div id="chairs"></div>
        <div class="table-center">
            <div class="round-num" id="roundValue">1</div>
            <div class="round-text" id="roundInfo">რაუნდი 1/26</div>
        </div>
    </div>

    <div class="my-card">
        <div class="my-info">
            <img id="myAvatar" src="https://i.ibb.co/v3m6y6R/avatar.png">
            <div class="details">
                <h3 id="myName">მოთამაშე</h3>
                <p id="myBidScore">🎯 — | 🏆 0</p>
            </div>
        </div>
        <div class="bid-control">
            <select id="bidSelect">
                <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option>
                <option>5</option><option>6</option><option>7</option><option>8</option><option>9</option>
                <option>10</option><option>11</option><option>12</option><option>13</option>
            </select>
            <button id="bidBtn">📢</button>
            <button id="startBtn">🎮</button>
        </div>
    </div>

    <div class="stats">
        <div id="statsTable"></div>
    </div>

    <a href="chat.html" class="back-link">← ჩატში</a>
</div>

<script>
    let myNick = localStorage.getItem('nickname') || "მოთამაშე";
    let myAvatar = localStorage.getItem('avatar') || "https://i.ibb.co/v3m6y6R/avatar.png";

    let players = JSON.parse(localStorage.getItem('joker_round')) || [];
    let myIndex = players.findIndex(p => p.name === myNick);
    let gameActive = false;
    let currentRound = 1;
    let roundBids = [null, null, null, null];
    let roundTricks = [null, null, null, null];
    let totalScores = [0, 0, 0, 0];

    const ROUNDS = [1,2,3,4,5,6,7,8,9, 9,9,9,9, 9,8,7,6,5,4,3,2,1, 9,9,9,9];

    function save() { localStorage.setItem('joker_round', JSON.stringify(players)); }

    function sitDown() {
        if (players.find(p => p.name === myNick)) { alert("უკვე ზიხარ"); return; }
        if (players.length >= 4) { alert("მაგიდა სავსეა"); return; }
        players.push({ name: myNick, avatar: myAvatar, bid: null, trick: null, total: 0 });
        myIndex = players.length - 1;
        save();
        render();
    }

    function startGame() {
        if (players.length !== 4) { alert("საჭიროა 4 მოთამაშე"); return; }
        currentRound = 1;
        totalScores = [0,0,0,0];
        roundBids = [null,null,null,null];
        roundTricks = [null,null,null,null];
        gameActive = true;
        for (let i=0; i<players.length; i++) {
            players[i].bid = null;
            players[i].trick = null;
            players[i].total = 0;
        }
        save();
        render();
        alert(`თამაში დაიწყო! ${ROUNDS[0]} ლივი`);
    }

    function makeBid() {
        if (!gameActive) { alert("თამაში არ დაწყებულა"); return; }
        if (roundBids[myIndex] !== null) { alert("უკვე გააკეთე განაცხადი"); return; }
        let bid = parseInt(document.getElementById("bidSelect").value);
        roundBids[myIndex] = bid;
        players[myIndex].bid = bid;
        save();
        render();
        if (roundBids.every(b => b !== null)) {
            alert("ყველამ გააკეთა განაცხადი!");
            askTricks();
        }
    }

    function askTricks() {
        let tricks = prompt(`რაუნდი ${currentRound}/26\nრამდენი ლივი აიღეთ? (0-${ROUNDS[currentRound-1]})`, "0");
        tricks = parseInt(tricks);
        if (isNaN(tricks)) tricks = 0;
        roundTricks[myIndex] = tricks;
        players[myIndex].trick = tricks;

        let bid = roundBids[myIndex];
        let score = (bid === tricks) ? (10 + bid) : -Math.abs(bid - tricks);
        totalScores[myIndex] += score;
        players[myIndex].total = totalScores[myIndex];
        save();
        render();

        if (roundTricks.every(t => t !== null)) {
            if (currentRound < 26) {
                if (confirm(`რაუნდი ${currentRound} დასრულდა! გადავიდეთ შემდეგზე?`)) {
                    currentRound++;
                    roundBids = [null,null,null,null];
                    roundTricks = [null,null,null,null];
                    for (let i=0; i<players.length; i++) {
                        players[i].bid = null;
                        players[i].trick = null;
                    }
                    save();
                    render();
                    alert(`რაუნდი ${currentRound}/26 | ${ROUNDS[currentRound-1]} ლივი`);
                }
            } else {
                let winner = totalScores.reduce((iMax, x, i, arr) => x > arr[iMax] ? i : iMax, 0);
                alert(`🏆 გამარჯვებული: ${players[winner].name} (${totalScores[winner]} ქულა)`);
                gameActive = false;
            }
        }
    }

    function render() {
        let chairsDiv = document.getElementById("chairs");
        chairsDiv.innerHTML = "";
        let positions = ["chair-1", "chair-2", "chair-3", "chair-4"];
        for (let i=0; i<4; i++) {
            let p = players[i];
            if (p) {
                chairsDiv.innerHTML += `
                    <div class="chair ${positions[i]}">
                        <img src="${p.avatar}">
                        <div class="name">${p.name}</div>
                        <div class="bid">${p.bid !== null ? "🎯"+p.bid : "—"}</div>
                    </div>
                `;
            } else {
                chairsDiv.innerHTML += `
                    <div class="chair ${positions[i]}">
                        <img src="https://i.ibb.co/v3m6y6R/avatar.png">
                        <div class="name">ცარიელი</div>
                        <div class="bid">—</div>
                    </div>
                `;
            }
        }

        document.getElementById("roundValue").innerHTML = ROUNDS[currentRound-1];
        document.getElementById("roundInfo").innerHTML = `რაუნდი ${currentRound}/26`;
        
        document.getElementById("myName").innerHTML = myNick;
        document.getElementById("myAvatar").src = myAvatar;
        let myBid = players[myIndex]?.bid !== undefined ? players[myIndex].bid : "—";
        let myScore = players[myIndex]?.total || 0;
        document.getElementById("myBidScore").innerHTML = `🎯 ${myBid !== "—" ? myBid : "—"} | 🏆 ${myScore}`;

        let html = `§<th>მოთ.</th><th>გან.</th><th>აიღ.</th><th>ქ.</th><th>ჯამი</th>`;
        for (let i=0; i<players.length; i++) {
            let p = players[i];
            let bid = roundBids[i] !== null ? roundBids[i] : "—";
            let trick = roundTricks[i] !== null ? roundTricks[i] : "—";
            let score = (bid !== "—" && trick !== "—") ? ((bid===trick) ? (10+bid) : -Math.abs(bid-trick)) : "—";
            html += `§<td style="text-align:left">${p?.name?.substring(0,4) || "—"}§<td>${bid}§<td>${trick}§<td>${score}§<td><b>${totalScores[i]}</b>§`;
        }
        document.getElementById("statsTable").innerHTML = `§${html}§`;
    }

    document.getElementById("bidBtn").onclick = makeBid;
    document.getElementById("startBtn").onclick = startGame;
    
    let sitBtn = document.createElement("button");
    sitBtn.innerHTML = "🪑";
    sitBtn.onclick = sitDown;
    sitBtn.style.background = "#f5bc4e";
    document.querySelector(".bid-control").prepend(sitBtn);

    render();
    if (players.length === 4 && !gameActive) alert("4 მოთამაშეა! დააჭირეთ 🎮");
</script>
</body>
</html>
