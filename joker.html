<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Joker Pro - Premium Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --table-green: #1a4d33; --gold: #ffd700; --wood: #3e2723; }
        body { background: #0a0f0a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        
        /* პრემიუმ მწვანე მაგიდა */
        #game-area { 
            position: relative; width: 950px; height: 550px; 
            background: radial-gradient(circle, #266b45 0%, #164028 100%); 
            border: 15px solid var(--wood); border-radius: 200px; 
            margin-top: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.9), inset 0 0 100px rgba(0,0,0,0.5); 
        }

        /* მოთამაშეების სლოტები */
        .slot { position: absolute; width: 120px; text-align: center; z-index: 5; }
        #p1 { bottom: 20px; left: 415px; } /* შენ */
        #p2 { left: 40px; top: 210px; }
        #p3 { top: 20px; left: 415px; }
        #p4 { right: 40px; top: 210px; }

        .ava { 
            width: 85px; height: 85px; border-radius: 50%; 
            border: 4px solid #fff; object-fit: cover; 
            background: #222; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .active-turn { border-color: var(--gold) !important; transform: scale(1.1); box-shadow: 0 0 25px var(--gold); }

        /* ქულების დაფა */
        #scoreboard { 
            position: absolute; top: 30px; left: 30px; 
            background: rgba(0,0,0,0.8); padding: 15px; 
            border-radius: 12px; border: 1px solid var(--gold); 
            font-size: 13px; min-width: 140px; z-index: 10;
        }

        /* კარტები მაგიდაზე */
        #table-cards { 
            position: absolute; top: 210px; left: 325px; 
            width: 300px; height: 120px; 
            display: flex; justify-content: center; align-items: center; gap: 15px; 
        }

        /* კარტის ვიზუალი */
        .card { 
            width: 65px; height: 95px; background: white; color: black; 
            border-radius: 10px; display: inline-flex; flex-direction: column;
            align-items: center; justify-content: center; font-weight: bold; 
            font-size: 22px; cursor: pointer; border: 1px solid #ccc;
            box-shadow: 3px 5px 12px rgba(0,0,0,0.4); transition: 0.2s;
        }
        .card:hover { transform: translateY(-15px); }
        .red { color: #e53935; }

        /* ჩემი ხელი */
        #my-hand { 
            margin-top: 25px; padding: 15px; 
            background: rgba(255,255,255,0.05); border-radius: 20px; 
            display: flex; gap: 10px; justify-content: center; width: 900px;
        }

        /* ლამაზი ჩატი */
        #chat { 
            position: fixed; right: 20px; bottom: 20px; width: 300px; 
            background: rgba(20, 20, 20, 0.95); border-radius: 15px; 
            border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #chat-msgs { height: 180px; overflow-y: auto; padding: 15px; font-size: 14px; scroll-behavior: smooth; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #333; }
        #chat-input-area input { 
            flex: 1; background: #222; border: none; color: white; 
            padding: 10px; border-radius: 8px; outline: none; 
        }

        /* ინტერაქციული ფანჯარა */
        .modal { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); padding: 30px; border-radius: 20px;
            border: 3px solid var(--gold); text-align: center; z-index: 100;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .trump-btn { font-size: 35px; background: white; border: none; border-radius: 10px; margin: 5px; cursor: pointer; padding: 5px 15px; }
        .bid-btn { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-area">
    <div id="scoreboard">
        <b style="color:var(--gold)">SCOREBOARD</b>
        <div id="scores-content" style="margin-top:8px;"></div>
    </div>
    
    <div id="p1" class="slot"><img id="img1" class="ava"><div id="name1">...</div><div id="info1" style="color:var(--gold)"></div></div>
    <div id="p2" class="slot"><img id="img2" class="ava"><div id="name2">...</div><div id="info2" style="color:var(--gold)"></div></div>
    <div id="p3" class="slot"><img id="img3" class="ava"><div id="name3">...</div><div id="info3" style="color:var(--gold)"></div></div>
    <div id="p4" class="slot"><img id="img4" class="ava"><div id="name4">...</div><div id="info4" style="color:var(--gold)"></div></div>

    <div id="table-cards"></div>
    <div id="overlay"></div>
</div>

<div id="my-hand"></div>

<div id="chat">
    <div id="chat-msgs"></div>
    <div id="chat-input-area">
        <input type="text" id="msg-in" placeholder="დაწერე მესიჯი...">
        <button onclick="sendMsg()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-weight:bold; margin-left:10px;">OK</button>
    </div>
</div>

<script>
    // --- SUPABASE დაყენება შენი გასაღებით ---
    const S_URL = 'https://ofqogvowfkbqsnmmsjqy.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mcW9ndm93ZmticXNubW1zanF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA2NTgyNjMsImV4cCI6MjA1NjIzNDI2M30.E-OToE6V3Z6nZ-f7-Z8-Z9-Z0-Z1-Z2-Z3-Z4-Z5-Z6-Z7-Z8';
    const _s = supabase.createClient(S_URL, S_KEY);

    const myId = localStorage.getItem('user_id');
    const myNick = localStorage.getItem('nickname');
    const roomId = "joker_main_pro";

    async function start() {
        if (!myId) { 
            // თუ იუზერი არაა, პირდაპირ ვაჩვენებთ ფორმას, რომ არ გაიჭედოს
            const nick = prompt("შეიყვანე შენი ნიკი სათამაშოდ:");
            if(nick) { localStorage.setItem('user_id', 'temp_'+Math.random()); localStorage.setItem('nickname', nick); location.reload(); }
            return;
        }

        let { data: game } = await _s.from('joker_games').select('*').eq('room_id', roomId).single();
        if (!game) {
            await _s.from('joker_games').insert([{ room_id: roomId, players: [], status: 'waiting', bids:{}, takes:{}, turn_index:0 }]);
            return location.reload();
        }

        let ps = game.players || [];
        if (!ps.find(p => p.id === myId) && ps.length < 4) {
            ps.push({ id: myId, name: myNick, avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed='+myNick, hand: [], score: 0 });
            await _s.from('joker_games').update({ players: ps }).eq('room_id', roomId);
        }

        updateUI(game);
        _s.channel('room1').on('postgres_changes', {event:'*', schema:'public', table:'joker_games'}, p => updateUI(p.new)).subscribe();
        loadChat();
    }

    function updateUI(game) {
        const ps = game.players || [];
        const meIdx = ps.findIndex(p => p.id === myId);
        
        // მოთამაშეების განახლება
        for (let i = 0; i < 4; i++) {
            const p = ps[i];
            const el = i + 1;
            document.getElementById(`name${el}`).innerText = p ? p.name : "ცარიელია";
            document.getElementById(`img${el}`).src = p ? p.avatar : 'https://via.placeholder.com/85/111/333?text=?';
            document.getElementById(`img${el}`).className = (game.turn_index === i) ? "ava active-turn" : "ava";
            
            const b = game.bids?.[p?.id] || 0;
            const t = game.takes?.[p?.id] || 0;
            document.getElementById(`info${el}`).innerText = p ? `მიგაქვს: ${t} / ${b}` : "";
        }

        // ჩემი კარტები
        const myHand = ps[meIdx]?.hand || [];
        document.getElementById('my-hand').innerHTML = myHand.map((c, i) => `
            <div class="card ${ (c.s==='❤️'||c.s==='♦️')?'red':'' }" onclick="playCard(${i})">${c.v}<span>${c.s}</span></div>
        `).join('');

        // მაგიდა
        document.getElementById('table-cards').innerHTML = (game.table_cards || []).map(c => `
            <div class="card ${ (c.s==='❤️'||c.s==='♦️')?'red':'' }">${c.v}<span>${c.s}</span></div>
        `).join('');

        // ლოგიკური ფანჯრები
        const overlay = document.getElementById('overlay');
        overlay.innerHTML = "";

        if (game.status === 'waiting' && meIdx === 0 && ps.length >= 2) {
            overlay.innerHTML = `<div class="modal"><h3>აირჩიე კოზირი</h3>
                <button class="trump-btn" onclick="deal('❤️')">❤️</button><button class="trump-btn" onclick="deal('♦️')">♦️</button>
                <button class="trump-btn" onclick="deal('♣️')">♣️</button><button class="trump-btn" onclick="deal('♠️')">♠️</button>
                <button class="trump-btn" onclick="deal('🃏')">ნოლი</button></div>`;
        }

        if (game.status === 'bidding' && game.turn_index === meIdx) {
            overlay.innerHTML = `<div class="modal"><h3>რამდენს იტყვი?</h3>
                <input type="number" id="bid-num" value="0" style="padding:10px; width:50px;">
                <button class="bid-btn" onclick="setBid()">OK</button></div>`;
        }
    }

    async function deal(trump) {
        const suits = ['❤️','♦️','♣️','♠️'];
        const vals = ['6','7','8','9','10','J','Q','K','A'];
        let deck = [];
        suits.forEach(s => vals.forEach(v => deck.push({s, v})));
        deck.push({s:'🃏',v:'J'},{s:'🃏',v:'J'});
        deck.sort(() => Math.random() - 0.5);

        let { data: game } = await _s.from('joker_games').select('*').eq('room_id', roomId).single();
        game.players.forEach(p => p.hand = deck.splice(0, 9));
        await _s.from('joker_games').update({ players: game.players, status: 'bidding', trump, turn_index: 0, bids: {}, takes: {}, table_cards: [] }).eq('room_id', roomId);
    }

    async function setBid() {
        const b = document.getElementById('bid-num').value;
        let { data: game } = await _s.from('joker_games').select('*').eq('room_id', roomId).single();
        game.bids[myId] = b;
        let next = game.turn_index + 1;
        let status = next >= game.players.length ? 'playing' : 'bidding';
        await _s.from('joker_games').update({ bids: game.bids, turn_index: next % game.players.length, status }).eq('room_id', roomId);
    }

    async function playCard(i) {
        let { data: game } = await _s.from('joker_games').select('*').eq('room_id', roomId).single();
        let meIdx = game.players.findIndex(p => p.id === myId);
        if (game.status !== 'playing' || game.turn_index !== meIdx) return;

        let card = game.players[meIdx].hand.splice(i, 1)[0];
        let table = game.table_cards || [];
        table.push({...card, owner: myId});

        if (table.length === game.players.length) {
            let winner = table[0].owner; // აქ უნდა იყოს ტარების ლოგიკა, დროებით ბოლო იგებს
            game.takes[winner] = (game.takes[winner] || 0) + 1;
            setTimeout(async () => {
                await _s.from('joker_games').update({ table_cards: [], players: game.players, takes: game.takes, turn_index: game.players.findIndex(p => p.id === winner) }).eq('room_id', roomId);
            }, 1000);
        } else {
            await _s.from('joker_games').update({ players: game.players, table_cards: table, turn_index: (game.turn_index + 1) % game.players.length }).eq('room_id', roomId);
        }
    }

    async function sendMsg() {
        const txt = document.getElementById('msg-in').value;
        if(!txt) return;
        await _s.from('messages').insert([{ user_id: myId, username: myNick, text: txt, room_name: 'joker_chat' }]);
        document.getElementById('msg-in').value = "";
    }

    async function loadChat() {
        const { data } = await _s.from('messages').select('*').eq('room_name', 'joker_chat').order('created_at', {ascending: false}).limit(15);
        document.getElementById('chat-msgs').innerHTML = data.reverse().map(m => `<div><b style="color:var(--gold)">${m.username}:</b> ${m.text}</div>`).join('');
        _s.channel('chat').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, () => loadChat()).subscribe();
    }

    start();
</script>
</body>
</html>
