<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>🃏 ჯოკერი - კარტის თამაში</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a3a1a;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background: #1e5a2e;
            padding: 40px;
            border-radius: 60px;
            border: 8px solid #d4a017;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 { color: gold; font-size: 2.5rem; margin-bottom: 20px; }
        .table {
            width: 400px;
            height: 300px;
            background: radial-gradient(circle, #2c8a3e, #0e3a1a);
            border-radius: 100px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #b87c2e;
            color: gold;
            font-size: 24px;
            font-weight: bold;
        }
        button {
            background: gold;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 40px;
            margin: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .back-btn {
            display: inline-block;
            background: #8b3a2a;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 40px;
            margin-top: 20px;
        }
        p { color: #ffd966; margin: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🃏 ჯოკერი 🃏</h1>
        <div class="table">🃏 მწვანე მაგიდა 🃏</div>
        <p>🎯 4 მოთამაშე | 26 რაუნდი | განაცხადები | ქულები</p>
        <button onclick="alert('სრული ვერსია მალე! 🔥')">განაცხადის გაკეთება</button>
        <br>
        <a href="chat.html" class="back-btn">← ჩატში დაბრუნება</a>
    </div>
</body>
</html>
