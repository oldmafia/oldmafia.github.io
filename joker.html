<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🃏 JOKER TABLE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f2a1a;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        /* მთავარი კონტეინერი */
        .joker-room {
            max-width: 1100px;
            width: 100%;
            background: #1a4a2a;
            border-radius: 70px;
            padding: 25px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.6);
            border: 1px solid #e2b85c;
        }
        /* სათაური */
        .title {
            text-align: center;
            margin-bottom: 20px;
        }
        .title h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #f7e05e, #d4a017);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        /* მწვანე მაგიდა */
        .green-table {
            background: radial-gradient(circle at 30% 35%, #2a9a4a, #0a4a1a);
            border-radius: 50%;
            aspect-ratio: 1 / 1;
            max-width: 550px;
            margin: 0 auto;
            position: relative;
            border: 6px solid #e2b85c;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 15px 25px rgba(0,0,0,0.4);
        }
        /* სკამები */
        .chair {
            position: absolute;
            text-align: center;
            width: 100px;
        }
        .chair img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 3px solid #f3bc5c;
            object-fit: cover;
            background: #2a2a1a;
            box-shadow: 0 4px 8px black;
        }
        .chair .name {
            font-weight: bold;
            color: #ffeaaf;
            font-size: 12px;
            margin-top: 5px;
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
        }
        .chair .bid-score {
            font-size: 10px;
            color: #ffcc77;
            margin-top: 3px;
        }
        /* პოზიციები */
        .chair-bottom { bottom: -85px; left: 50%; transform: translateX(-50%); }
        .chair-top { top: -85px; left: 50%; transform: translateX(-50%); }
        .chair-left { left: -85px; top: 50%; transform: translateY(-50%); }
        .chair-right { right: -85px; top: 50%; transform: translateY(-50%); }

        /* ცენტრი */
        .table-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 15px 25px;
            border-radius: 60px;
            border: 1px solid gold;
        }
        .table-center h2 {
            color: gold;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }
        .table-center .round-info {
            color: #ffdd99;
            font-size: 0.8rem;
        }

        /* ქვემოთ — ჩემი ბარათი */
        .my-card {
            margin-top: 40px;
            background: #2a2a1a;
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border: 2px solid #e2b85c;
        }
        .my-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .my-info img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid gold;
        }
        .my-info .details h3 {
            color: #ffeaaf;
            font-size: 1rem;
        }
        .my-info .details p {
            color: #ffcc77;
            font-size: 0.8rem;
        }
        .bid-control {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        select, button {
            background: #f5bc4e;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        select {
            background: #2a5a2a;
            color: white;
        }
        .stats {
            margin-top: 25px;
            background: #102010cc;
            border-radius: 30px;
            padding: 12px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: #f0e0b0;
            font-size: 12px;
        }
        th, td {
            padding: 6px;
            text-align: center;
            border-bottom: 1px solid #c6a24b;
        }
        th { color: #ffdf8c; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #ffdd99;
            text-decoration: none;
        }
        @media (max-width: 700px) {
            .chair { width: 70px; }
            .chair img { width: 50px; height: 50px; }
            .chair-bottom { bottom: -60px; }
            .chair-top { top: -60px; }
            .chair-left { left: -60px; }
            .chair-right { right: -60px; }
            .green-table { max-width: 380px; }
            .table-center h2 { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="joker-room">
    <div class="title">
        <h1>🃏 JOKER TABLE</h1>
    </div>

    <div class="green-table">
        <div class="chairs" id="chairsContainer"></div>
        <div class="table-center">
            <h2>JOKER</h2>
            <div class="round-info" id="roundInfo">რაუნდი 1/26</div>
        </div>
    </div>

    <div class="my-card" id="myCardArea">
        <div class="my-info">
            <img id="myAvatar" src="https://i.ibb.co/v3m6y6R/avatar.png">
            <div class="details">
                <h3 id="myName">მოთამაშე</h3>
                <p id="myBidScore">განაცხადი: — | ქულა: 0</p>
            </div>
        </div>
        <div class="bid-control">
            <select id="bidSelect">
                <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option>
                <option>5</option><option>6</option><option>7</option><option>8</option><option>9</option>
                <option>10</option><option>11</option><option>12</option><option>13</option>
            </select>
            <button id="bidBtn">განაცხადი</button>
            <button id="startBtn">თამაშის დაწყება</button>
        </div>
    </div>

    <div class="stats">
        <div id="statsTable"></div>
    </div>

    <a href="chat.html" class="back-link">← ჩატში დაბრუნება</a>
</div>

<script>
    let myNick = localStorage.getItem('nickname') || "მოთამაშე";
    let myAvatar = localStorage.getItem('avatar') || "https://i.ibb.co/v3m6y6R/avatar.png";

    let players = JSON.parse(localStorage.getItem('joker_final3')) || [];
    let myIndex = players.findIndex(p => p.name === myNick);
    let gameActive = false;
    let currentRound = 1;
    let roundBids = [null, null, null, null];
    let roundTricks = [null, null, null, null];
    let totalScores = [0, 0, 0, 0];

    const ROUNDS = [1,2,3,4,5,6,7,8,9, 9,9,9,9, 9,8,7,6,5,4,3,2,1, 9,9,9,9];

    function save() { localStorage.setItem('joker_final3', JSON.stringify(players)); }

    function sitDown() {
        if (players.find(p => p.name === myNick)) { alert("უკვე ზიხარ"); return; }
        if (players.length >= 4) { alert("მაგიდა სავსეა"); return; }
        players.push({ name: myNick, avatar: myAvatar, bid: null, trick: null, total: 0 });
        myIndex = players.length - 1;
        save();
        render();
    }

    function startGame() {
        if (players.length !== 4) { alert("საჭიროა 4 მოთამაშე"); return; }
        currentRound = 1;
        totalScores = [0,0,0,0];
        roundBids = [null,null,null,null];
        roundTricks = [null,null,null,null];
        gameActive = true;
        for (let i=0; i<players.length; i++) {
            players[i].bid = null;
            players[i].trick = null;
            players[i].total = 0;
        }
        save();
        render();
        alert(`თამაში დაიწყო! რაუნდი 1/26 | ${ROUNDS[0]} ლივი`);
    }

    function makeBid() {
        if (!gameActive) { alert("თამაში არ დაწყებულა"); return; }
        if (roundBids[myIndex] !== null) { alert("უკვე გააკეთე განაცხადი"); return; }
        let bid = parseInt(document.getElementById("bidSelect").value);
        roundBids[myIndex] = bid;
        players[myIndex].bid = bid;
        save();
        render();
        if (roundBids.every(b => b !== null)) {
            alert("ყველამ გააკეთა განაცხადი! ახლა ჩაწერეთ ლივები");
            askTricks();
        }
    }

    function askTricks() {
        let tricks = prompt(`რაუნდი ${currentRound}/26\nრამდენი ლივი აიღეთ? (0-${ROUNDS[currentRound-1]})`, "0");
        tricks = parseInt(tricks);
        if (isNaN(tricks)) tricks = 0;
        roundTricks[myIndex] = tricks;
        players[myIndex].trick = tricks;

        let bid = roundBids[myIndex];
        let score = (bid === tricks) ? (10 + bid) : -Math.abs(bid - tricks);
        totalScores[myIndex] += score;
        players[myIndex].total = totalScores[myIndex];
        save();
        render();

        if (roundTricks.every(t => t !== null)) {
            let msg = `✅ რაუნდი ${currentRound} დასრულდა!\nქულები: ${totalScores.join(" | ")}`;
            if (currentRound < 26) {
                if (confirm(msg + "\nგადავიდეთ შემდეგ რაუნდზე?")) {
                    currentRound++;
                    roundBids = [null,null,null,null];
                    roundTricks = [null,null,null,null];
                    for (let i=0; i<players.length; i++) {
                        players[i].bid = null;
                        players[i].trick = null;
                    }
                    save();
                    render();
                    alert(`რაუნდი ${currentRound}/26 | ${ROUNDS[currentRound-1]} ლივი`);
                }
            } else {
                let winner = totalScores.reduce((iMax, x, i, arr) => x > arr[iMax] ? i : iMax, 0);
                alert(msg + `\n🏆 გამარჯვებული: ${players[winner].name} (${totalScores[winner]} ქულა)`);
                gameActive = false;
            }
        } else {
            alert("ლივები ჩაიწერა. ელოდეთ სხვა მოთამაშეებს");
        }
    }

    function render() {
        let chairsDiv = document.getElementById("chairsContainer");
        chairsDiv.innerHTML = "";
        let positions = ["chair-bottom", "chair-right", "chair-top", "chair-left"];
        for (let i=0; i<4; i++) {
            let p = players[i];
            if (p) {
                chairsDiv.innerHTML += `
                    <div class="chair ${positions[i]}">
                        <img src="${p.avatar}">
                        <div class="name">${p.name}</div>
                        <div class="bid-score">${p.bid !== null ? "🎯 "+p.bid : "—"} | ${p.total}</div>
                    </div>
                `;
            } else {
                chairsDiv.innerHTML += `
                    <div class="chair ${positions[i]}">
                        <img src="https://i.ibb.co/v3m6y6R/avatar.png">
                        <div class="name">ცარიელი</div>
                        <div class="bid-score">—</div>
                    </div>
                `;
            }
        }

        document.getElementById("roundInfo").innerHTML = `🎯 რაუნდი ${currentRound}/26 | ${ROUNDS[currentRound-1]} ლივი`;
        
        document.getElementById("myName").innerHTML = myNick;
        document.getElementById("myAvatar").src = myAvatar;
        let myBid = players[myIndex]?.bid !== undefined ? players[myIndex].bid : "—";
        let myScore = players[myIndex]?.total || 0;
        document.getElementById("myBidScore").innerHTML = `🎯 ${myBid !== "—" ? myBid : "—"} | 🏆 ${myScore}`;

        let html = `§<th>მოთამაშე</th><th>განაცხადი</th><th>აღებული</th><th>ქულა</th><th>ჯამი</th>`;
        for (let i=0; i<players.length; i++) {
            let p = players[i];
            let bid = roundBids[i] !== null ? roundBids[i] : "—";
            let trick = roundTricks[i] !== null ? roundTricks[i] : "—";
            let score = (bid !== "—" && trick !== "—") ? ((bid===trick) ? (10+bid) : -Math.abs(bid-trick)) : "—";
            html += `§<td style="text-align:left">${p?.name || "—"}§<td>${bid}§<td>${trick}§<td>${score}§<td><b>${totalScores[i]}</b>§`;
        }
        document.getElementById("statsTable").innerHTML = `§${html}§`;
    }

    document.getElementById("bidBtn").onclick = makeBid;
    document.getElementById("startBtn").onclick = startGame;

    let sitBtn = document.createElement("button");
    sitBtn.innerHTML = "🪑 დაჯდომა";
    sitBtn.onclick = sitDown;
    sitBtn.style.background = "#f5bc4e";
    sitBtn.style.marginRight = "10px";
    document.querySelector(".bid-control").prepend(sitBtn);

    render();
    if (players.length === 4 && !gameActive) alert("4 მოთამაშეა! დააჭირეთ 'თამაშის დაწყებას'");
</script>
</body>
</html>
