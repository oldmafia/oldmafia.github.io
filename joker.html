<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🃏 ჯოკერი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a3a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #1e5a2e;
            border-radius: 50px;
            border: 8px solid #d4a017;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: gold;
            margin-bottom: 20px;
        }
        .green-table {
            background: radial-gradient(circle at center, #2c8a3e, #0e3a1a);
            border-radius: 80px;
            padding: 30px;
            margin-bottom: 25px;
            border: 4px solid #b87c2e;
        }
        .table-center {
            text-align: center;
            color: gold;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .chairs {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }
        .chair {
            text-align: center;
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 25px;
            width: 130px;
        }
        .chair img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 3px solid #d4a017;
            object-fit: cover;
        }
        .chair .name {
            font-weight: bold;
            color: #ffd966;
            margin-top: 6px;
            font-size: 14px;
        }
        .chair .bid-info {
            font-size: 11px;
            color: #ffaa66;
            margin-top: 4px;
        }
        .panels {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .bid-panel {
            flex: 1;
            background: #0f2a0f;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
        }
        .bid-panel h3 {
            color: gold;
            margin-bottom: 12px;
        }
        .round-info {
            background: #2a4a2a;
            padding: 10px;
            border-radius: 15px;
            margin: 12px 0;
            color: gold;
            font-weight: bold;
        }
        select, button {
            padding: 10px 18px;
            font-size: 15px;
            border-radius: 30px;
            border: none;
            margin: 5px;
            cursor: pointer;
        }
        select {
            background: #2a4a2a;
            color: white;
        }
        button {
            background: gold;
            font-weight: bold;
        }
        .stats-panel {
            flex: 2;
            background: #0f2a0f;
            padding: 15px;
            border-radius: 20px;
            overflow-x: auto;
        }
        .stats-panel h3 {
            color: gold;
            margin-bottom: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: #eee;
            font-size: 12px;
        }
        th, td {
            padding: 6px 4px;
            text-align: center;
            border-bottom: 1px solid #4a6a3a;
        }
        th {
            color: gold;
        }
        .total-row {
            background: #2a4a2a;
            font-weight: bold;
            border-top: 2px solid gold;
        }
        .back-btn {
            display: inline-block;
            background: #8b3a2a;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 30px;
            margin-top: 15px;
            text-align: center;
        }
        .flex-center {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🃏 ჯოკერი 🃏</h1>

    <div class="green-table">
        <div class="table-center">🃏 მწვანე მაგიდა 🃏</div>
        <div class="chairs" id="chairsContainer"></div>
    </div>

    <div class="panels">
        <div class="bid-panel">
            <h3>🎲 განაცხადი</h3>
            <div class="round-info" id="roundInfo">რაუნდი: 1 / 26 | ლივები: 9</div>
            <select id="bidSelect">
                <option value="0">0</option><option value="1">1</option><option value="2">2</option>
                <option value="3">3</option><option value="4">4</option><option value="5">5</option>
                <option value="6">6</option><option value="7">7</option><option value="8">8</option>
                <option value="9">9</option><option value="10">10</option><option value="11">11</option>
                <option value="12">12</option><option value="13">13</option>
            </select>
            <button id="submitBidBtn">📢 განაცხადი</button>
            <button id="submitTricksBtn">✅ ლივების ჩაწერა</button>
        </div>

        <div class="stats-panel">
            <h3>📊 პულკები</h3>
            <div id="statsTable">მოთამაშეები ემატებიან...</div>
        </div>
    </div>

    <div class="flex-center">
        <a href="chat.html" class="back-btn">← ჩატში დაბრუნება</a>
    </div>
</div>

<script>
    const ROUNDS_CONFIG = [
        9,8,7,6,5,4,3,2,1,
        9,9,9,9,
        9,8,7,6,5,4,3,2,1,
        9,9,9,9
    ];
    
    let myNick = localStorage.getItem('nickname') || "მოთამაშე";
    let myAvatar = localStorage.getItem('avatar') || "https://i.ibb.co/v3m6y6R/avatar.png";
    
    let players = [
        { name: "გიო", avatar: "https://i.ibb.co/v3m6y6R/avatar.png", bids: [], tricks: [], scores: [] },
        { name: "ნიკა", avatar: "https://i.ibb.co/v3m6y6R/avatar.png", bids: [], tricks: [], scores: [] },
        { name: "ზურა", avatar: "https://i.ibb.co/v3m6y6R/avatar.png", bids: [], tricks: [], scores: [] },
        { name: "დათო", avatar: "https://i.ibb.co/v3m6y6R/avatar.png", bids: [], tricks: [], scores: [] }
    ];
    
    let currentRound = 1;
    let myPlayerIndex = 0;
    
    function calculateScore(bid, tricks) {
        if (bid === tricks) {
            return 10 + bid;
        } else {
            return -Math.abs(bid - tricks);
        }
    }
    
    function renderChairs() {
        const container = document.getElementById('chairsContainer');
        if (!container) return;
        let html = '';
        for (let i = 0; i < players.length; i++) {
            const p = players[i];
            const roundBid = p.bids[currentRound-1] !== undefined ? p.bids[currentRound-1] : '—';
            html += `
                <div class="chair">
                    <img src="${p.avatar}">
                    <div class="name">${p.name} ${i === myPlayerIndex ? '(თქვენ)' : ''}</div>
                    <div class="bid-info">🎯 ${roundBid !== '—' ? roundBid + ' ლივი' : 'არ გამოუცხადებია'}</div>
                </div>
            `;
        }
        container.innerHTML = html;
        const tricksGoal = ROUNDS_CONFIG[currentRound-1];
        const roundInfo = document.getElementById('roundInfo');
        if (roundInfo) roundInfo.innerHTML = `🎯 რაუნდი: ${currentRound} / 26 | 🃏 ლივები: ${tricksGoal}`;
    }
    
    function renderStats() {
        const statsDiv = document.getElementById('statsTable');
        if (!statsDiv) return;
        let html = `<table><th>მოთამაშე</th><th>განაცხადი</th><th>აღებული</th><th>ქულა</th><th>ჯამი</th>`;
        for (let i = 0; i < players.length; i++) {
            const p = players[i];
            const bid = p.bids[currentRound-1] !== undefined ? p.bids[currentRound-1] : '—';
            const trick = p.tricks[currentRound-1] !== undefined ? p.tricks[currentRound-1] : '—';
            const score = p.scores[currentRound-1] !== undefined ? p.scores[currentRound-1] : '—';
            const total = (p.scores || []).reduce((a,b) => a + (b || 0), 0);
            html += `<tr><td style="text-align:left">${p.name}</td><td>${bid}</td><td>${trick}</td><td>${score !== '—' ? score : ''}</td><td><b>${total}</b></td></tr>`;
        }
        html += `<tr class="total-row"><td colspan="5">📋 რაუნდების ისტორია</td></tr>`;
        html += `<tr><th>რაუნდი</th>`;
        for (let i = 0; i < players.length; i++) html += `<th>${players[i].name.substring(0,4)}</th>`;
        html += `</tr>`;
        for (let r = 0; r < currentRound; r++) {
            html += `<tr><td>${r+1}</td>`;
            for (let i = 0; i < players.length; i++) {
                const score = players[i].scores[r] !== undefined ? players[i].scores[r] : '—';
                html += `<td>${score}</td>`;
            }
            html += `</tr>`;
        }
        statsDiv.innerHTML = html;
    }
    
    function submitBid() {
        const bid = parseInt(document.getElementById('bidSelect').value);
        if (players[myPlayerIndex].bids[currentRound-1] !== undefined) {
            alert("ამ რაუნდში უკვე გაქვს განაცხადი გაკეთებული!");
            return;
        }
        players[myPlayerIndex].bids[currentRound-1] = bid;
        renderChairs();
        renderStats();
        alert(`განაცხადი ${bid} ლივი შენახულია!`);
    }
    
    function submitTricks() {
        if (players[myPlayerIndex].bids[currentRound-1] === undefined) {
            alert("ჯერ განაცხადი უნდა გააკეთო!");
            return;
        }
        if (players[myPlayerIndex].tricks[currentRound-1] !== undefined) {
            alert("ამ რაუნდში უკვე ჩაწერე ლივები!");
            return;
        }
        let tricks = prompt("რამდენი ლივი აიღე? (0-13)", "0");
        tricks = parseInt(tricks);
        if (isNaN(tricks) || tricks < 0 || tricks > 13) {
            alert("შეიყვანეთ რიცხვი 0-დან 13-მდე");
            return;
        }
        const bid = players[myPlayerIndex].bids[currentRound-1];
        const score = calculateScore(bid, tricks);
        players[myPlayerIndex].tricks[currentRound-1] = tricks;
        players[myPlayerIndex].scores[currentRound-1] = score;
        renderStats();
        if (score >= 0) alert(`✅ ზუსტად აიღე! +${score} ქულა`);
        else alert(`❌ არ ემთხვევა! ${score} ქულა`);
        
        let allHaveTricks = players.every(p => p.tricks[currentRound-1] !== undefined);
        if (allHaveTricks && currentRound < 26) {
            if (confirm(`რაუნდი ${currentRound} დასრულდა! გადავიდეთ ${currentRound+1} რაუნდზე?`)) {
                currentRound++;
                renderChairs();
                renderStats();
            }
        }
    }
    
    document.getElementById('submitBidBtn').onclick = submitBid;
    document.getElementById('submitTricksBtn').onclick = submitTricks;
    
    renderChairs();
    renderStats();
</script>

</body>
</html>
