<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>🃏 ჯოკერი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a3a1a;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game {
            background: #1e5a2e;
            padding: 30px;
            border-radius: 60px;
            border: 8px solid #b87c2e;
            width: 800px;
            max-width: 100%;
        }
        .table {
            background: radial-gradient(circle, #2c8a3e, #0e3a1a);
            border-radius: 100px;
            padding: 60px;
            text-align: center;
            position: relative;
            min-height: 400px;
            border: 4px solid #b87c2e;
        }
        .center-text {
            color: gold;
            font-size: 24px;
            font-weight: bold;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }
        .chairs {
            position: relative;
            height: 300px;
        }
        .chair {
            position: absolute;
            text-align: center;
            width: 100px;
        }
        .chair img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #b87c2e;
            background: #1e3a1a;
        }
        .chair .name {
            font-size: 12px;
            color: #ffd966;
            margin-top: 5px;
        }
        .chair-bottom { bottom: -80px; left: 50%; transform: translateX(-50%); }
        .chair-top { top: -80px; left: 50%; transform: translateX(-50%); }
        .chair-left { left: -100px; top: 50%; transform: translateY(-50%); }
        .chair-right { right: -100px; top: 50%; transform: translateY(-50%); }
        
        .back-btn {
            display: block;
            margin-top: 20px;
            background: #8b3a2a;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 30px;
            text-decoration: none;
        }
        .info {
            margin-top: 20px;
            text-align: center;
            color: gold;
        }
        button {
            margin-top: 15px;
            background: gold;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="game">
    <div class="table">
        <div class="chairs" id="chairs"></div>
        <div class="center-text">🃏 მწვანე მაგიდა 🃏</div>
    </div>
    <div class="info" id="info">მოთამაშეები: 0 / 4</div>
    <button id="sitBtn">🪑 დაჯდომა</button>
    <a href="chat.html" class="back-btn">← ჩატში დაბრუნება</a>
</div>

<script>
    // ჩემი ნიკი
    let myNick = "გიო";
    
    // მოთამაშეების სია
    let players = [];
    
    // სკამების ადგილები
    const chairs = ['bottom', 'right', 'top', 'left'];
    
    // სკამების ჩვენება
    function renderChairs() {
        const container = document.getElementById('chairs');
        let html = '';
        
        for (let i = 0; i < 4; i++) {
            let name = 'ცარიელი';
            let avatar = 'https://i.ibb.co/v3m6y6R/avatar.png';
            
            if (players[i]) {
                name = players[i].name;
                avatar = players[i].avatar;
            }
            
            html += `
                <div class="chair chair-${chairs[i]}">
                    <img src="${avatar}">
                    <div class="name">${name}</div>
                </div>
            `;
        }
        
        container.innerHTML = html;
        document.getElementById('info').innerHTML = `მოთამაშეები: ${players.length} / 4`;
    }
    
    // დაჯდომის ფუნქცია
    function sitDown() {
        // ვამოწმებ უკვე ვზივარ თუ არა
        for (let i = 0; i < players.length; i++) {
            if (players[i].name === myNick) {
                alert('უკვე ზიხარ!');
                return;
            }
        }
        
        // ვამოწმებ თუ ყველა სკამი სავსეა
        if (players.length >= 4) {
            alert('ყველა სკამი სავსეა!');
            return;
        }
        
        // დაჯექი
        players.push({
            name: myNick,
            avatar: 'https://i.ibb.co/v3m6y6R/avatar.png'
        });
        
        // განაახლე ეკრანი
        renderChairs();
    }
    
    // ღილაკი
    document.getElementById('sitBtn').onclick = sitDown;
    
    // თავიდან ჩვენება
    renderChairs();
</script>
</body>
</html>
