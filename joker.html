<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კაიფმანია - Joker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #ffd700; --red: #ff4d4d; --bg: #0a0a0a; --green: #1a4d33; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: space-between; min-height: 100vh; padding-top: 10px; }
        
        /* მაგიდა */
        #game-area { 
            position: relative; width: 850px; height: 450px; 
            background: radial-gradient(circle, #266b45 0%, #11331f 100%); 
            border: 12px solid #3e2723; border-radius: 200px; 
            box-shadow: 0 0 50px rgba(255,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }

        /* მოთამაშეები და ავატარები */
        .slot { position: absolute; padding: 10px; background: rgba(0,0,0,0.6); border-radius: 15px; text-align: center; min-width: 100px; border: 1px solid #444; display: flex; flex-direction: column; align-items: center; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #555; margin-bottom: 5px; }
        .slot b { color: var(--gold); font-size: 14px; margin-bottom: 3px; }
        .pulka { font-size: 11px; color: #aaa; }
        
        #p1 { bottom: -25px; border-color: var(--gold); } /* Abu007 */
        #p1 .avatar { border-color: var(--gold); }
        #p2 { left: -45px; top: 180px; }
        #p3 { top: -25px; left: 360px; }
        #p4 { right: -45px; top: 180px; }
        .active-turn { box-shadow: 0 0 20px var(--gold); background: rgba(255, 215, 0, 0.2); }

        /* კარტები */
        #my-hand-container { display: flex; flex-direction: column; align-items: center; gap: 10px; padding-bottom: 20px; width: 100%; }
        #my-hand { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .card { 
            width: 65px; height: 95px; background: white; color: black; 
            border-radius: 8px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-weight: bold; 
            font-size: 24px; cursor: pointer; position: relative;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5); transition: 0.2s;
            border: 1px solid #ccc;
        }
        .card:hover { transform: translateY(-20px); z-index: 100; }
        .red { color: var(--red); }
        
        #table-cards { display: flex; gap: 15px; min-height: 110px; align-items: center; }

        /* ჩატი */
        #chat-box { 
            position: fixed; bottom: 10px; right: 10px; width: 230px; height: 280px; 
            background: rgba(20,20,20,0.95); border: 1px solid #333; border-radius: 10px;
            display: flex; flex-direction: column; font-size: 12px;
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; color: #ccc; }
        #chat-input-container { display: flex; border-top: 1px solid #333; }
        #chat-input { flex: 1; background: #000; border: none; color: white; padding: 10px; border-radius: 0 0 0 10px; }
        #chat-submit { background: #333; border: none; color: white; padding: 10px; cursor: pointer; border-radius: 0 0 10px 0; }
        .msg-line { display: block; width: 100%; }
        .msg-line b { color: var(--gold); }

        .btn { padding: 10px 20px; background: #b71c1c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn:hover { background: #e53935; }
    </style>
</head>
<body>

    <h2 style="color:var(--gold); margin: 0;">კაიფმანია 😎🔥</h2>

    <div id="game-area">
        <div id="p3" class="slot">
            <img src="https://via.placeholder.com/50/222/555?text=P3" class="avatar">
            <b>Player 3</b><span class="pulka">0 / 0</span>
        </div>
        <div id="p2" class="slot">
            <img src="https://via.placeholder.com/50/222/555?text=P2" class="avatar">
            <b>Player 2</b><span class="pulka">0 / 0</span>
        </div>
        <div id="p4" class="slot">
            <img src="https://via.placeholder.com/50/222/555?text=P4" class="avatar">
            <b>Player 4</b><span class="pulka">0 / 0</span>
        </div>
        <div id="p1" class="slot">
            <img src="https://i.ibb.co/hC4v58V/abu007-avatar.png" class="avatar">
            <b>Abu007</b><span class="pulka">0 / 0</span>
        </div>
        
        <div id="table-cards"></div>
    </div>

    <div id="my-hand-container">
        <div id="my-hand"></div>
        <button class="btn" id="start-btn" onclick="dealCards()">ახალი დარიგება</button>
    </div>

    <div id="chat-box">
        <div id="chat-messages"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="მიწერე სასტავს..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button id="chat-submit" onclick="sendMsg()">></button>
        </div>
    </div>

    <script>
        // --- SUPABASE CONFIG ---
        const SB_URL = "https://fftciebnywbondaiarnc.supabase.co"; 
        const SB_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"; 
        const gameId = "b22aa812-511c-4ab8-a769-e390522639c7"; 
        const myName = "Abu007";

        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // 1. კარტების გენერატორი
        function generateDeck() {
            const suits = [{s:'♥', c:'red'}, {s:'♦', c:'red'}, {s:'♣', c:'black'}, {s:'♠', c:'black'}];
            const values = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
            let deck = [];
            suits.forEach(suit => {
                values.forEach(val => {
                    deck.push({ v: val, s: suit.s, c: suit.c });
                });
            });
            deck.push({ v: 'JK', s: 'Joker', c: 'black' });
            deck.push({ v: 'JK', s: 'Joker', c: 'black' });
            return deck.sort(() => Math.random() - 0.5);
        }

        // 2. დარიგება
        async function dealCards() {
            document.getElementById('start-btn').innerText = "ველით სხვებს...";
            const deck = generateDeck();
            const players = [
                { name: "Abu007", hand: deck.splice(0, 9), taken: 0, bet: 0, avatar: "https://i.ibb.co/hC4v58V/abu007-avatar.png" },
                { name: "Player 2", hand: deck.splice(0, 9), taken: 0, bet: 0, avatar: "https://via.placeholder.com/50/222/555?text=P2" },
                { name: "Player 3", hand: deck.splice(0, 9), taken: 0, bet: 0, avatar: "https://via.placeholder.com/50/222/555?text=P3" },
                { name: "Player 4", hand: deck.splice(0, 9), taken: 0, bet: 0, avatar: "https://via.placeholder.com/50/222/555?text=P4" }
            ];

            const { error } = await _supabase.from('joker_games').update({
                players: players,
                table_cards: [],
                current_turn_index: 0,
                status: 'playing'
            }).eq('id', gameId);
            
            if(error) alert("შეცდომა ბაზასთან: " + error.message);
        }

        // 3. კარტის დადება
        async function playCard(cardIndex) {
            let { data: game } = await _supabase.from('joker_games').select('*').eq('id', gameId).single();
            
            if (game.players[game.current_turn_index].name !== myName) {
                alert("ჯერ შენი ჯერი არ არის!");
                return;
            }

            let players = game.players;
            let card = players[game.current_turn_index].hand.splice(cardIndex, 1)[0];
            let table = game.table_cards || [];
            table.push({ card, player: myName });

            await _supabase.from('joker_games').update({
                players: players,
                table_cards: table,
                current_turn_index: (game.current_turn_index + 1) % 4
            }).eq('id', gameId);
        }

        // 4. ვიზუალის განახლება
        function updateUI(game) {
            // ჩემი ხელი
            const me = game.players.find(p => p.name === myName);
            const handDiv = document.getElementById('my-hand');
            handDiv.innerHTML = '';
            me.hand.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = `card ${card.c}`;
                div.innerHTML = `<span>${card.v}</span><span>${card.s}</span>`;
                div.onclick = () => playCard(i);
                handDiv.appendChild(div);
            });

            // მაგიდა
            const tableDiv = document.getElementById('table-cards');
            tableDiv.innerHTML = '';
            game.table_cards.forEach(t => {
                const div = document.createElement('div');
                div.className = `card ${t.card.c}`;
                div.style.transform = "scale(0.9)";
                div.innerHTML = `<small style="font-size:11px; margin-bottom: 2px;">${t.player}</small><b>${t.card.v}</b>`;
                tableDiv.appendChild(div);
            });

            // "პულკები" და ჯერი
            for(let i=1; i<=4; i++) {
                const pSlot = document.getElementById('p'+i);
                pSlot.classList.remove('active-turn');
                // განვაახლოთ პულკა
                if (game.players[i-1]) {
                    pSlot.querySelector('.pulka').innerText = `${game.players[i-1].taken} / ${game.players[i-1].bet}`;
                }
            }
            document.getElementById('p' + (game.current_turn_index + 1)).classList.add('active-turn');
            document.getElementById('start-btn').innerText = "დარიგება";
        }

        // 5. ჩატი
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        let currentMessages = [];

        async function sendMsg() {
            const text = chatInput.value.trim();
            if(!text) return;
            const newMsg = { p: myName, t: text };
            currentMessages.push(newMsg);
            if(currentMessages.length > 20) currentMessages.shift(); // შევინახოთ ბოლო 20

            // ატვირთვა ბაზაში (ამისთვის გვჭირდება ჩატი-ს სვეტი joker_games-ში, ან გამოვიყენოთ table_editor -> profiles -> messages)
            // დროებით, realtime-ით გავაგზავნოთ (Requires table config)
            // let's create a temporary payload update to simulate chat (this is not standard, best is special table)
            const { data: g } = await _supabase.from('joker_games').select('*').eq('id', gameId).single();
            await _supabase.from('joker_games').update({ 
                 // ვვარაუდობთ რომ გაქვს jsonb 'chat_msgs' სვეტი
                 // chat_msgs: currentMessages
            }).eq('id', gameId);
            
            chatInput.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight; // ჩამოვწიოთ
        }

        function updateChat(messages) {
            currentMessages = messages || [];
            chatMessages.innerHTML = '';
            currentMessages.forEach(m => {
                const pName = m.p === myName ? "შენ" : m.p;
                chatMessages.innerHTML += `<div class="msg-line"><b>${pName}:</b> ${m.t}</div>`;
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 6. Realtime კავშირი
        _supabase.channel('joker_room')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'joker_games' }, payload => {
                updateUI(payload.new);
                if (payload.new.chat_msgs) updateChat(payload.new.chat_msgs);
            })
            .subscribe();

        // საწყისი ჩატვირთვა
        async function init() {
            let { data } = await _supabase.from('joker_games').select('*').eq('id', gameId).single();
            if (data) {
                updateUI(data);
                if (data.chat_msgs) updateChat(data.chat_msgs);
            }
        }
        init();
    </script>
</body>
</html>
