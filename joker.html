<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Joker Game - Abu007 Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1a472a; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #game-container { position: relative; width: 800px; height: 500px; border: 5px solid #3e2723; border-radius: 50px; margin-top: 20px; background: radial-gradient(#2e7d32, #1b5e20); }
        .player-slot { position: absolute; text-align: center; width: 100px; }
        #p1 { bottom: 10px; left: 350px; color: gold; font-weight: bold; } /* შენ */
        #p2 { left: 10px; top: 200px; }
        #p3 { top: 10px; left: 350px; }
        #p4 { right: 10px; top: 200px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid white; display: block; margin: 0 auto; }
        #table-center { position: absolute; top: 180px; left: 250px; width: 300px; height: 140px; display: flex; justify-content: center; gap: 10px; align-items: center; border: 1px dashed rgba(255,255,255,0.2); }
        .card { width: 45px; height: 65px; background: white; color: black; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 1px solid #000; }
        #my-hand { margin-top: 20px; display: flex; gap: 5px; }
        #chat-section { width: 300px; position: fixed; right: 10px; bottom: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; }
        #chat-box { height: 150px; overflow-y: auto; font-size: 13px; margin-bottom: 5px; border-bottom: 1px solid #444; }
        .del-btn { color: red; cursor: pointer; margin-left: 5px; border: none; background: none; }
        .controls { margin-top: 10px; }
        button { cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>

    <h2>Joker Room: <span id="room-id-display">Main Table</span></h2>

    <div id="game-container">
        <div id="p1" class="player-slot"><img id="img1" class="avatar" src=""><span id="name1">...</span></div>
        <div id="p2" class="player-slot"><img id="img2" class="avatar" src=""><span id="name2">...</span></div>
        <div id="p3" class="player-slot"><img id="img3" class="avatar" src=""><span id="name3">...</span></div>
        <div id="p4" class="player-slot"><img id="img4" class="avatar" src=""><span id="name4">...</span></div>

        <div id="table-center"></div>
    </div>

    <div id="my-hand"></div>

    <div class="controls">
        <button onclick="dealCards()" id="deal-btn" style="display:none;">კარტის დარიგება (Admin)</button>
    </div>

    <div id="chat-section">
        <div id="chat-box"></div>
        <input type="text" id="chat-input" placeholder="დაწერე..." style="width:70%">
        <button onclick="sendMsg()">OK</button>
    </div>

<script>
    // --- 1. SUPABASE კავშირი (შეცვალე შენი მონაცემებით) ---
    const _s = supabase.createClient('შენი_URL', 'შენი_KEY');

    const myId = localStorage.getItem('user_id');
    const myNick = localStorage.getItem('nickname');
    const roomId = "joker_main_1";

    // --- 2. თამაშის დაწყება და "თხის" გაქრობა ---
    async function init() {
        if (!myId) return alert("გაიარე ავტორიზაცია!");
        
        // აჩვენე ადმინის ღილაკი მხოლოდ Abu007-ს
        if (myNick === "Abu007") document.getElementById('deal-btn').style.display = "inline";

        const { data: profile } = await _s.from('profiles').select('*').eq('id', myId).single();
        const { data: game } = await _s.from('joker_games').select('*').eq('room_id', roomId).single();
        
        let players = game.players || [];
        if (!players.find(p => p.id === myId) && players.length < 4) {
            players.push({ id: myId, name: profile.username, avatar: profile.avatar_url, hand: [], points: 0 });
            await _s.from('joker_games').update({ players }).eq('room_id', roomId);
        }
        
        render(game);
        loadChat();
    }

    // --- 3. ვიზუალის განახლება ---
    function render(game) {
        const players = game.players || [];
        // სლოტების გასუფთავება/შევსება
        for (let i = 1; i <= 4; i++) {
            const p = players[i-1];
            document.getElementById(`name${i}`).innerText = p ? p.name : "ელოდება...";
            document.getElementById(`img${i}`).src = p ? (p.avatar || 'default.png') : 'placeholder.png';
        }

        // მაგიდაზე დაგდებული კარტები
        const center = document.getElementById('table-center');
        center.innerHTML = (game.table_cards || []).map(c => `<div class="card">${c.v}${c.s}</div>`).join('');

        // ჩემი ხელის კარტები
        const me = players.find(p => p.id === myId);
        const handDiv = document.getElementById('my-hand');
        handDiv.innerHTML = me ? me.hand.map((c, i) => `<div class="card" onclick="playCard(${i})">${c.v}${c.s}</div>`).join('') : "";
    }

    // --- 4. კარტის დარიგება (Shuffle & Deal) ---
    async function dealCards() {
        const suits = ['❤️', '♦️', '♣️', '♠️'];
        const vals = ['6','7','8','9','10','J','Q','K','A'];
        let deck = [];
        suits.forEach(s => vals.forEach(v => deck.push({s, v})));
        deck.push({s:'🃏', v:'J'}, {s:'🃏', v:'J'});
        deck.sort(() => Math.random() - 0.5);

        const { data: game } = await _s.from('joker_games').select('players').eq('room_id', roomId).single();
        let players = game.players;
        players.forEach(p => p.hand = deck.splice(0, 9));

        await _s.from('joker_games').update({ players, table_cards: [], turn_index: 0 }).eq('room_id', roomId);
    }

    // --- 5. კარტის დაგდება ---
    async function playCard(idx) {
        const { data: game } = await _s.from('joker_games').select('*').eq('room_id', roomId).single();
        let players = game.players;
        let myIdx = players.findIndex(p => p.id === myId);
        
        if (game.turn_index !== myIdx) return alert("შენი ჯერი არაა!");

        let card = players[myIdx].hand.splice(idx, 1)[0];
        let table = game.table_cards || [];
        table.push(card);

        await _s.from('joker_games').update({ 
            players, 
            table_cards: table, 
            turn_index: (game.turn_index + 1) % players.length 
        }).eq('room_id', roomId);
    }

    // --- 6. ჩატი და წაშლა ---
    async function loadChat() {
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', 'joker_chat').order('created_at', {ascending:false}).limit(20);
        const box = document.getElementById('chat-box');
        box.innerHTML = msgs.reverse().map(m => `
            <div><b>${m.username}:</b> ${m.text} 
            ${(myNick === "Abu007" || m.user_id === myId) ? `<button class="del-btn" onclick="delMsg('${m.id}')">✖</button>` : ''}</div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('chat-input');
        if (!input.value.trim()) return;
        await _s.from('messages').insert([{ user_id: myId, username: myNick, text: input.value, room_name: 'joker_chat' }]);
        input.value = "";
    }

    async function delMsg(id) {
        await _s.from('messages').delete().eq('id', id);
    }

    // --- 7. REALTIME ---
    _s.channel('joker_live')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'joker_games' }, payload => render(payload.new))
        .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadChat())
        .subscribe();

    init();
</script>
</body>
</html>
