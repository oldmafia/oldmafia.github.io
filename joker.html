<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Joker Auto-Table</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1a472a; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #game-container { position: relative; width: 800px; height: 500px; border: 8px solid #3e2723; border-radius: 60px; margin-top: 30px; background: radial-gradient(#2e7d32, #1b5e20); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .player-slot { position: absolute; text-align: center; width: 120px; }
        #p1 { bottom: 20px; left: 340px; } 
        #p2 { left: 20px; top: 190px; }
        #p3 { top: 20px; left: 340px; }
        #p4 { right: 20px; top: 190px; }
        .avatar { width: 75px; height: 75px; border-radius: 50%; border: 3px solid #ddd; display: block; margin: 0 auto; background: #222; object-fit: cover; }
        .active-turn { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
        #table-center { position: absolute; top: 180px; left: 250px; width: 300px; height: 140px; display: flex; justify-content: center; gap: 10px; align-items: center; border: 2px dashed rgba(255,255,255,0.1); border-radius: 20px; }
        .card { width: 50px; height: 75px; background: white; color: black; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 1px solid #000; font-size: 18px; }
        #my-hand { margin-top: 30px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        #chat-section { width: 300px; position: fixed; right: 20px; bottom: 20px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; }
        #chat-box { height: 150px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; }
        button { cursor: pointer; padding: 10px; border-radius: 5px; border: none; background: #2e7d32; color: white; font-weight: bold; }
        .admin-btn { background: #2196F3 !important; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2 id="table-title">Joker Table</h2>
    <div id="game-container">
        <div id="p1" class="player-slot"><img id="img1" class="avatar" src=""><span id="name1">...</span></div>
        <div id="p2" class="player-slot"><img id="img2" class="avatar" src=""><span id="name2">...</span></div>
        <div id="p3" class="player-slot"><img id="img3" class="avatar" src=""><span id="name3">...</span></div>
        <div id="p4" class="player-slot"><img id="img4" class="avatar" src=""><span id="name4">...</span></div>
        <div id="table-center"></div>
    </div>

    <div id="my-hand"></div>
    <div id="admin-controls" style="margin-top:20px;"></div>

    <div id="chat-section">
        <div id="chat-box"></div>
        <input type="text" id="chat-input" style="width:70%; padding:5px;">
        <button onclick="sendMsg()">OK</button>
    </div>

<script>
    const S_URL = 'https://ofqogvowfkbqsnmmsjqy.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mcW9ndm93ZmticXNubW1zanF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA2NTgyNjMsImV4cCI6MjA1NjIzNDI2M30.E-OToE6V3Z6nZ-f7-Z8-Z9-Z0-Z1-Z2-Z3-Z4-Z5-Z6-Z7-Z8';
    const _s = supabase.createClient(S_URL, S_KEY);

    const myId = localStorage.getItem('user_id');
    const myNick = localStorage.getItem('nickname');
    const roomId = "joker_main_1";

    async function init() {
        if (!myId) return alert("გაიარე ავტორიზაცია!");

        let { data: game } = await _s.from('joker_games').select('*').eq('room_id', roomId).single();
        if (!game) {
            await _s.from('joker_games').insert([{ room_id: roomId, players: [], table_cards: [], turn_index: 0 }]);
            return setTimeout(init, 500);
        }

        let players = game.players || [];
        // მაგიდაზე ჩაჯდომა
        if (!players.find(p => p.id === myId) && players.length < 4) {
            const { data: prof } = await _s.from('profiles').select('avatar_url, username').eq('id', myId).single();
            players.push({ id: myId, name: prof.username || myNick, avatar: prof.avatar_url, hand: [] });
            const { data: updated } = await _s.from('joker_games').update({ players }).eq('room_id', roomId).select().single();
            game = updated;
        }

        render(game);
        loadChat();
    }

    function render(game) {
        const players = game.players || [];
        const isAdmin = players[0] && players[0].id === myId; // პირველი ვინც შევიდა, ისაა ადმინი

        for (let i = 1; i <= 4; i++) {
            const p = players[i-1];
            document.getElementById(`name${i}`).innerText = p ? p.name : "ცარიელია";
            document.getElementById(`img${i}`).src = p ? (p.avatar || 'https://via.placeholder.com/80') : 'https://via.placeholder.com/80';
            document.getElementById(`img${i}`).className = (game.turn_index === i-1) ? "avatar active-turn" : "avatar";
        }

        // ადმინის ღილაკის გამოჩენა (ვინც პირველია სიაში)
        const ctrl = document.getElementById('admin-controls');
        ctrl.innerHTML = isAdmin ? `<button class="admin-btn" onclick="dealCards()">🎴 კარტის დარიგება</button>` : `<small>ველოდებით დარიგებას...</small>`;

        document.getElementById('table-center').innerHTML = (game.table_cards || []).map(c => `<div class="card">${c.v}${c.s}</div>`).join('');

        const me = players.find(p => p.id === myId);
        if (me) {
            document.getElementById('my-hand').innerHTML = (me.hand || []).map((c, i) => 
                `<div class="card" onclick="playCard(${i})">${c.v}${c.s}</div>`
            ).join('');
        }
    }

    async function dealCards() {
        const suits = ['❤️', '♦️', '♣️', '♠️'];
        const vals = ['6','7','8','9','10','J','Q','K','A'];
        let deck = [];
        suits.forEach(s => vals.forEach(v => deck.push({s, v})));
        deck.push({s:'🃏', v:'J'}, {s:'🃏', v:'J'});
        deck.sort(() => Math.random() - 0.5);

        let { data: game } = await _s.from('joker_games').select('players').eq('room_id', roomId).single();
        let players = game.players;
        if(players.length < 2) return alert("მარტო ვერ ითამაშებ!");

        players.forEach(p => p.hand = deck.splice(0, 9));
        await _s.from('joker_games').update({ players, table_cards: [], turn_index: 0 }).eq('room_id', roomId);
    }

    async function playCard(idx) {
        let { data: game } = await _s.from('joker_games').select('*').eq('room_id', roomId).single();
        let myIdx = game.players.findIndex(p => p.id === myId);
        if (game.turn_index !== myIdx) return alert("შენი ჯერი არაა!");

        let players = game.players;
        let card = players[myIdx].hand.splice(idx, 1)[0];
        let table = game.table_cards || [];
        table.push(card);

        await _s.from('joker_games').update({ 
            players, 
            table_cards: table, 
            turn_index: (game.turn_index + 1) % players.length 
        }).eq('room_id', roomId);
    }

    // ჩატი და Realtime იგივე რჩება...
    async function loadChat() {
        const { data: msgs } = await _s.from('messages').select('*').eq('room_name', 'joker_chat').order('created_at', {ascending:false}).limit(20);
        document.getElementById('chat-box').innerHTML = msgs.reverse().map(m => `<div><b>${m.username}:</b> ${m.text}</div>`).join('');
    }

    async function sendMsg() {
        const inp = document.getElementById('chat-input');
        await _s.from('messages').insert([{ user_id: myId, username: myNick, text: inp.value, room_name: 'joker_chat' }]);
        inp.value = "";
    }

    _s.channel('joker_live').on('postgres_changes', { event: '*', schema: 'public', table: 'joker_games' }, payload => render(payload.new)).on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadChat()).subscribe();

    init();
</script>
</body>
</html>
