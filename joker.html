<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🃏 ჯოკერი - კლასიკური თამაში</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a3a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #1e5a2e;
            border-radius: 40px;
            border: 8px solid #d4a017;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: gold;
            margin-bottom: 20px;
        }
        /* მწვანე მაგიდა */
        .green-table {
            background: radial-gradient(circle at center, #2c8a3e, #0e3a1a);
            border-radius: 100px;
            padding: 30px;
            margin-bottom: 30px;
            border: 4px solid #b87c2e;
            position: relative;
            min-height: 300px;
        }
        .table-center {
            text-align: center;
            color: gold;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .chairs {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }
        .chair {
            text-align: center;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 30px;
            width: 140px;
        }
        .chair img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #d4a017;
            object-fit: cover;
        }
        .chair .name {
            font-weight: bold;
            color: #ffd966;
            margin-top: 8px;
        }
        .chair .bid-info {
            font-size: 12px;
            color: #ffaa66;
            margin-top: 5px;
        }
        /* პანელები */
        .panels {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .bid-panel {
            flex: 1;
            background: #0f2a0f;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
        }
        .bid-panel h3 {
            color: gold;
            margin-bottom: 10px;
        }
        .round-info {
            background: #2a4a2a;
            padding: 10px;
            border-radius: 15px;
            margin: 10px 0;
            color: gold;
        }
        select, button {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 30px;
            border: none;
            margin: 5px;
            cursor: pointer;
        }
        select {
            background: #2a4a2a;
            color: white;
        }
        button {
            background: gold;
            font-weight: bold;
        }
        .stats-panel {
            flex: 2;
            background: #0f2a0f;
            padding: 15px;
            border-radius: 20px;
            overflow-x: auto;
        }
        .stats-panel h3 {
            color: gold;
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: #eee;
            font-size: 13px;
        }

            padding: 8px;
