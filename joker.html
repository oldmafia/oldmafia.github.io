<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🃏 ჯოკერი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a3a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .game-container {
            background: #1e5a2e;
            padding: 20px;
            border-radius: 40px;
            border: 8px solid #d4a017;
            max-width: 100%;
        }
        .green-table {
            background: radial-gradient(circle at center, #2c8a3e, #0e3a1a);
            border-radius: 80px;
            padding: 40px;
            position: relative;
            min-height: 400px;
            border: 4px solid #b87c2e;
        }
        .table-center {
            text-align: center;
            color: gold;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .trump-area {
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 8px;
            border-radius: 30px;
            color: gold;
            font-size: 14px;
            margin-top: 10px;
        }
        .chairs-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .chair {
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 20px;
        }
        .chair img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #b87c2e;
            object-fit: cover;
        }
        .chair .name {
            font-size: 12px;
            color: #ffd966;
            margin-top: 5px;
        }
        .chair .cards-count {
            font-size: 10px;
            color: #aaa;
        }
        .info-panel {
            margin-top: 20px;
            text-align: center;
        }
        .info {
            background: #0f2a0f;
            padding: 10px;
            border-radius: 20px;
            color: gold;
            margin-bottom: 15px;
        }
        .my-cards {
            margin-top: 20px;
            background: #0f2a0f;
            padding: 15px;
            border-radius: 20px;
        }
        .my-cards h3 {
            color: gold;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .card {
            background: white;
            width: 55px;
            height: 75px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 1px solid gold;
        }
        button {
            background: gold;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            margin: 5px;
        }
        .back-btn {
            display: inline-block;
            background: #8b3a2a;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="green-table">
        <div class="table-center">🃏 მწვანე მაგიდა 🃏</div>
        <div class="chairs-container" id="chairsContainer"></div>
        <div class="trump-area" id="trumpArea"></div>
    </div>

    <div class="info-panel">
        <div class="info" id="info">თამაში მზად არის!</div>
        <a href="chat.html" class="back-btn">← ჩატში დაბრუნება</a>
    </div>

    <div class="my-cards" id="myCardsArea">
        <h3>🃏 შენი კარტები</h3>
        <div class="cards-container" id="cardsContainer"></div>
    </div>
</div>

<script>
    // ========== კარტების ფუნქციები ==========
    function createDeck() {
        const suits = ['♠', '♥', '♣', '♦'];
        const ranks = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
        let deck = [];
        suits.forEach(suit => {
            ranks.forEach(rank => {
                deck.push({ suit: suit, rank: rank, value: getCardValue(rank) });
            });
        });
        deck.push({ suit: '🃏', rank: 'JOKER', value: 14, type: 'joker' });
        deck.push({ suit: '🃏', rank: 'JOKER', value: 14, type: 'joker' });
        return shuffleDeck(deck);
    }
    
    function getCardValue(rank) {
        const values = { '6':6, '7':7, '8':8, '9':9, '10':10, 'J':11, 'Q':12, 'K':13, 'A':14 };
        return values[rank] || 0;
    }
    
    function shuffleDeck(deck) {
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        return deck;
    }
    
    function dealCards(deck, playersCount = 4) {
        const hands = [[], [], [], []];
        const cardsPerPlayer = Math.floor(deck.length / playersCount);
        for (let i = 0; i < cardsPerPlayer * playersCount; i++) {
            hands[i % playersCount].push(deck[i]);
        }
        return { hands };
    }
    
    // ========== მოთამაშეები (ტესტური) ==========
    let players = [
        { name: "გიო", avatar: "https://i.ibb.co/v3m6y6R/avatar.png" },
        { name: "ნიკა", avatar: "https://i.ibb.co/v3m6y6R/avatar.png" },
        { name: "ზურა", avatar: "https://i.ibb.co/v3m6y6R/avatar.png" },
        { name: "დათო", avatar: "https://i.ibb.co/v3m6y6R/avatar.png" }
    ];
    
    let myPlayerIndex = 0; // მე ვარ გიო
    
    // ========== თამაშის დაწყება ==========
    function startGame() {
        const fullDeck = createDeck();
        const { hands } = dealCards(fullDeck, 4);
        
        for (let i = 0; i < players.length; i++) {
            players[i].cards = hands[i];
        }
        
        const trumpCard = fullDeck[fullDeck.length - 1];
        document.getElementById('trumpArea').innerHTML = `🃏 ტრამპი: ${trumpCard.suit} ${trumpCard.rank}`;
        
        renderChairs();
        renderMyCards();
        
        document.getElementById('info').innerHTML = '✅ თამაში დაიწყო! შენი ჯერია';
    }
    
    function renderChairs() {
        const container = document.getElementById('chairsContainer');
        let html = '';
        
        for (let i = 0; i < players.length; i++) {
            const p = players[i];
            const cardsCount = p.cards ? p.cards.length : 0;
            html += `
                <div class="chair">
                    <img src="${p.avatar}">
                    <div class="name">${p.name} ${i === myPlayerIndex ? '(თქვენ)' : ''}</div>
                    <div class="cards-count">🃏 ${cardsCount} კარტი</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    function renderMyCards() {
        const me = players[myPlayerIndex];
        if (!me || !me.cards) return;
        
        const container = document.getElementById('cardsContainer');
        container.innerHTML = me.cards.map(card => {
            const color = (card.suit === '♥' || card.suit === '♦') ? 'red' : 'black';
            return `
                <div class="card" style="color: ${color}" onclick="alert('ააგდე ${card.rank}${card.suit}')">
                    <div style="font-size: 18px;">${card.rank}</div>
                    <div style="font-size: 24px;">${card.suit}</div>
                </div>
            `;
        }).join('');
    }
    
    // თამაშის დაწყება
    startGame();
</script>

</body>
</html>
