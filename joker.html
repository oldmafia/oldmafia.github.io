<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ჯოკერი</title>
    <style>
        body {
            background: #0a3a1a;
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            color: white;
        }
        .table {
            background: #2c7a3e;
            width: 500px;
            height: 300px;
            margin: 20px auto;
            border-radius: 100px;
            border: 8px solid #b87c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: gold;
        }
        button {
            background: gold;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        a {
            color: white;
            display: block;
            margin-top: 20px;
        }
        #info {
            margin-top: 20px;
            font-size: 18px;
            color: gold;
        }
    </style>
</head>
<body>

<h1>🃏 ჯოკერი</h1>

<div class="table">
    🃏 მწვანე მაგიდა 🃏
</div>

<div id="info">მოთამაშეები: 0 / 4</div>

<button id="sitBtn">🪑 დაჯდომა</button>

<a href="chat.html">← ჩატში დაბრუნება</a>

<script>
    // შენი ნიკი localStorage-დან
    let myNick = localStorage.getItem('nickname');
    
    // თუ არ არის, დავწეროთ "მოთამაშე"
    if (!myNick) {
        myNick = "მოთამაშე";
    }
    
    // მოთამაშეების სია
    let players = [];
    
    // დაჯდომის ფუნქცია
    function sitDown() {
        alert("დაჯექი! შენი ნიკი: " + myNick);
    }
    
    // ღილაკი
    document.getElementById('sitBtn').onclick = sitDown;
</script>

</body>
</html>
