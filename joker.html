<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Joker Game - Abu007</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #table { width: 800px; height: 400px; background: radial-gradient(#1a472a, #0d2617); border: 15px solid #3d2b1f; border-radius: 200px; position: relative; box-shadow: 0 0 50px red; }
        .player { position: absolute; padding: 10px; border: 2px solid gold; border-radius: 10px; background: rgba(0,0,0,0.7); }
        #me { bottom: -20px; left: 350px; }
        #p2 { left: 20px; top: 180px; }
        #p3 { top: -20px; left: 350px; }
        #p4 { right: 20px; top: 180px; }
        #hand { margin-top: 50px; display: flex; gap: 10px; }
        .card { width: 60px; height: 90px; background: white; color: black; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 1px solid #000; }
        .red { color: red; }
        button { margin-top: 20px; padding: 15px 30px; background: red; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>კაიფმანია 🃏</h1>

    <div id="table">
        <div id="me" class="player">Abu007 (შენ)</div>
        <div id="p2" class="player">Player 2</div>
        <div id="p3" class="player">Player 3</div>
        <div id="p4" class="player">Player 4</div>
        <div id="table-cards" style="position:absolute; top:150px; left:300px; display:flex; gap:10px;"></div>
    </div>

    <div id="hand"></div>
    <button onclick="start()">ახალი დარიგება</button>

    <script>
        const SB_URL = "https://fftciebnywbondaiarnc.supabase.co"; 
        const SB_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const gameId = "b22aa812-511c-4ab8-a769-e390522639c7";

        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function start() {
            console.log("დარიგება დაიწყო...");
            const suits = [{s:'♥', c:'red'}, {s:'♦', c:'red'}, {s:'♣', c:'black'}, {s:'♠', c:'black'}];
            const vals = ['6','7','8','9','10','J','Q','K','A'];
            let deck = [];
            suits.forEach(s => vals.forEach(v => deck.push({v, s:s.s, c:s.c})));
            deck.sort(() => Math.random() - 0.5);

            const players = [
                {name: "Abu007", hand: deck.splice(0,9)},
                {name: "P2", hand: deck.splice(0,9)},
                {name: "P3", hand: deck.splice(0,9)},
                {name: "P4", hand: deck.splice(0,9)}
            ];

            const { error } = await _supabase.from('joker_games').update({
                players: players,
                table_cards: [],
                current_turn_index: 0
            }).eq('id', gameId);

            if(error) alert("შეცდომა: " + error.message);
        }

        function draw(game) {
            const handDiv = document.getElementById('hand');
            handDiv.innerHTML = '';
            game.players[0].hand.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = `card ${c.c}`;
                d.innerHTML = c.v + c.s;
                handDiv.appendChild(d);
            });
        }

        _supabase.channel('any').on('postgres_changes', {event:'UPDATE', schema:'public', table:'joker_games'}, p => draw(p.new)).subscribe();
        
        async function load() {
            let { data } = await _supabase.from('joker_games').select('*').eq('id', gameId).single();
            if(data) draw(data);
        }
        load();
    </script>
</body>
</html>
