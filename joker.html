<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კაიფმანია - Joker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #ffd700; --red: #ff4d4d; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* მაგიდა */
        #game-area { 
            position: relative; width: 850px; height: 450px; 
            background: radial-gradient(circle, #266b45 0%, #11331f 100%); 
            border: 12px solid #3e2723; border-radius: 200px; margin-top: 20px; 
            box-shadow: 0 0 50px rgba(255,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }

        /* მოთამაშეები */
        .slot { position: absolute; padding: 10px; background: rgba(0,0,0,0.8); border-radius: 15px; text-align: center; min-width: 110px; border: 2px solid #444; }
        .avatar-box { width: 60px; height: 60px; border-radius: 50%; background: #333; margin: 0 auto 5px; border: 2px solid #666; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .dealer-mark { position: absolute; top: -10px; right: -10px; background: var(--gold); color: black; border-radius: 50%; width: 25px; height: 25px; font-weight: bold; line-height: 25px; font-size: 12px; }
        
        #p1 { bottom: -25px; left: 360px; } 
        #p2 { left: -55px; top: 180px; }
        #p3 { top: -25px; left: 360px; }
        #p4 { right: -55px; top: 180px; }
        .active-turn { border-color: var(--gold); box-shadow: 0 0 20px var(--gold); }

        /* კარტები */
        #my-hand { margin-top: 40px; display: flex; gap: 8px; justify-content: center; min-height: 100px; }
        .card { width: 65px; height: 95px; background: white; color: black; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 22px; cursor: pointer; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .red { color: var(--red); }

        /* ჩატი */
        #chat-box { position: fixed; bottom: 20px; right: 20px; width: 280px; height: 350px; background: rgba(15,15,15,0.95); border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        #chat-input { background: #000; border: none; border-top: 1px solid #333; color: white; padding: 12px; border-radius: 0 0 12px 12px; }
        .smile-btn { padding: 5px; cursor: pointer; font-size: 20px; }

        .btn { padding: 12px 25px; background: #b71c1c; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 id="game-status" style="color:var(--gold); margin: 15px 0;">ველოდებით მოთამაშეებს...</h2>

    <div id="game-area">
        <div id="p3" class="slot"><div class="avatar-box">?</div><b>P3</b><div class="pulka">0/0</div></div>
        <div id="p2" class="slot"><div class="avatar-box">?</div><b>P2</b><div class="pulka">0/0</div></div>
        <div id="p4" class="slot"><div class="avatar-box">?</div><b>P4</b><div class="pulka">0/0</div></div>
        <div id="p1" class="slot"><div class="avatar-box">?</div><b>შენ</b><div class="pulka">0/0</div></div>
        <div id="table-cards" style="position: absolute; display: flex; gap: 10px;"></div>
    </div>

    <div id="my-hand"></div>
    <div id="controls">
        <button class="btn" id="deal-btn" onclick="dealCards()">კარტის დარიგება</button>
    </div>

    <div id="chat-box">
        <div id="chat-msgs"></div>
        <div style="padding: 5px; display: flex; background: #222;">
            <span class="smile-btn" onclick="sendMsg('😂')">😂</span>
            <span class="smile-btn" onclick="sendMsg('🃏')">🃏</span>
            <span class="smile-btn" onclick="sendMsg('🔥')">🔥</span>
        </div>
        <input type="text" id="chat-input" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendMsg(this.value)">
    </div>

    <script>
        const SB_URL = "https://fftciebnywbondaiarnc.supabase.co"; 
        const SB_KEY = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"; 
        const gameId = "b22aa812-511c-4ab8-a769-e390522639c7"; 
        
        let myName = prompt("შეიყვანე შენი სახელი:", "Abu007") || "User";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // ჩატის გაგზავნა (ახალი SQL სვეტის გამოყენებით)
        async function sendMsg(text) {
            if(!text) return;
            let { data } = await _supabase.from('joker_games').select('chat_messages').eq('id', gameId).single();
            let msgs = data.chat_messages || [];
            msgs.push({ n: myName, m: text });
            if(msgs.length > 20) msgs.shift();
            await _supabase.from('joker_games').update({ chat_messages: msgs }).eq('id', gameId);
            document.getElementById('chat-input').value = '';
        }

        // დარიგება
        async function dealCards() {
            const suits = [{s:'♥', c:'red'}, {s:'♦', c:'red'}, {s:'♣', c:'black'}, {s:'♠', c:'black'}];
            const values = ['6','7','8','9','10','J','Q','K','A'];
            let deck = [];
            suits.forEach(s => values.forEach(v => deck.push({v, s:s.s, c:s.c})));
            deck.sort(() => Math.random() - 0.5);

            const players = [
                { name: myName, hand: deck.splice(0,9), avatar: "images/abu.png", taken: 0, bet: 0 },
                { name: "მოთამაშე 2", hand: deck.splice(0,9), avatar: "images/p2.png", taken: 0, bet: 0 },
                { name: "მოთამაშე 3", hand: deck.splice(0,9), avatar: "images/p3.png", taken: 0, bet: 0 },
                { name: "მოთამაშე 4", hand: deck.splice(0,9), avatar: "images/p4.png", taken: 0, bet: 0 }
            ];

            await _supabase.from('joker_games').update({ 
                players: players, 
                table_cards: [], 
                game_status: 'playing',
                dealer_index: 0 
            }).eq('id', gameId);
        }

        function render(game) {
            // ჩატი
            const chatDiv = document.getElementById('chat-msgs');
            chatDiv.innerHTML = (game.chat_messages || []).map(m => `<div><b>${m.n}:</b> ${m.m}</div>`).join('');
            chatDiv.scrollTop = chatDiv.scrollHeight;

            // მოთამაშეები და ავატარები
            game.players.forEach((p, i) => {
                const slot = document.getElementById('p' + (i + 1));
                if(slot) {
                    slot.querySelector('b').innerText = p.name;
                    slot.querySelector('.pulka').innerText = `${p.taken} / ${p.bet}`;
                    // ავატარის "წამოღება" საიტიდან
                    const avatarBox = slot.querySelector('.avatar-box');
                    if(p.avatar) {
                        avatarBox.innerHTML = `<img src="${p.avatar}" onerror="this.innerHTML='${p.name[0]}'">`;
                    } else {
                        avatarBox.innerText = p.name[0];
                    }
                    // დილერის ნიშანი
                    if(game.dealer_index === i) {
                        if(!slot.querySelector('.dealer-mark')) {
                            const d = document.createElement('div');
                            d.className = 'dealer-mark'; d.innerText = 'D';
                            slot.appendChild(d);
                        }
                    }
                }
            });

            // ჩემი კარტები
            const me = game.players.find(p => p.name === myName) || game.players[0];
            const handDiv = document.getElementById('my-hand');
            handDiv.innerHTML = me.hand.map(c => `<div class="card ${c.c}">${c.v}${c.s}</div>`).join('');
            
            document.getElementById('game-status').innerText = "თამაში მიმდინარეობს";
        }

        // Realtime მოსმენა
        _supabase.channel('joker').on('postgres_changes', {event:'UPDATE', schema:'public', table:'joker_games'}, p => render(p.new)).subscribe();

        async function init() {
            let { data } = await _supabase.from('joker_games').select('*').eq('id', gameId).single();
            if(data) render(data);
        }
        init();
    </script>
</body>
</html>
