<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - არქივი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #030000; color: white; font-family: sans-serif; margin: 0; padding: 15px; }

        /* ზედა პანელი */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #4a0000;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .back-link { color: #ff0000; text-decoration: none; font-weight: bold; font-size: 18px; }
        .page-title { color: white; font-size: 18px; margin: 0; }

        /* მომხმარებლების კონტეინერი */
        #users-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        /* მომხმარებლის ბარათი (შენი სტილით) */
        .user-card {
            width: 140px; 
            padding: 15px;
            background: rgba(15, 0, 0, 0.8);
            border: 1px solid #4a0000;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .user-card:hover { border-color: #ff0000; transform: translateY(-5px); }

        /* ავატარი და ონლაინ წერტილი (შენი სტილით) */
        .avatar-wrapper {
            position: relative;
            width: 70px;
            height: 70px;
            margin: 0 auto 10px;
        }
        .u-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4a0000;
        }
        .status-dot {
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 13px;
            height: 13px;
            background: #555; /* ოფლაინი */
            border: 2px solid black;
            border-radius: 50%;
        }
        .status-dot.online {
            background: #0f0;
            box-shadow: 0 0 8px #0f0;
        }

        .u-name { color: yellow; font-weight: bold; font-size: 14px; margin: 5px 0; overflow: hidden; }
        .u-role { color: #888; font-size: 10px; text-transform: uppercase; }

        /* მობილურზე მორგება */
        @media (max-width: 380px) {
            .user-card { width: 130px; padding: 10px; }
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="chat.html" class="back-link">← უკან</a>
    <h2 class="page-title">📂 სრული არქივი</h2>
    <div style="width: 40px;"></div> </div>

<div id="users-container">იტვირთება...</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");

    async function loadUsers() {
        const { data: users } = await _s.from('profiles').select('*');
        const container = document.getElementById('users-container');
        container.innerHTML = "";
        
        const now = new Date();

        // დავალაგოთ როლების მიხედვით
        const order = { 'Owner': 1, 'Admin': 2, 'Member': 3 };
        users.sort((a, b) => (order[a.role] || 3) - (order[b.role] || 3));

        users.forEach(u => {
            // ონლაინ სტატუსის შემოწმება (5 წუთი)
            const lastSeen = u.last_online ? new Date(u.last_online) : null;
            const isOnline = lastSeen && (now - lastSeen) < 300000;
            const dotClass = isOnline ? "online" : "";

            container.innerHTML += `
                <div class="user-card" onclick="location.href='profile.html?user=${u.username}'">
                    <div class="avatar-wrapper">
                        <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="u-avatar">
                        <div class="status-dot ${dotClass}"></div>
                    </div>
                    <div class="u-name">${u.username}</div>
                    <div class="u-role">${u.role || 'Member'}</div>
                </div>
            `;
        });
    }

    loadUsers();
    // განახლება ყოველ 30 წამში
    setInterval(loadUsers, 30000);
</script>

</body>
</html>
