<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - არქივი</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dark-red: #4a0000; --bright-red: #ff0000; }
        * { box-sizing: border-box; }
        
        body { 
            background: #030000; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* გვერდითა მენიუ */
        .sidebar-left { 
            width: 200px; 
            background: #050000; 
            border-right: 1px solid var(--dark-red); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0;
        }
        .sidebar-header { padding: 15px; text-align: center; border-bottom: 1px solid var(--dark-red); color: var(--bright-red); font-weight: bold; font-size: 14px; }
        .menu-item { padding: 12px 15px; color: #888; text-decoration: none; display: block; border-bottom: 1px solid #111; font-size: 13px; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ტოპბარი კონვერტის გარეშე */
        .topbar { 
            height: 60px; 
            background: black; 
            border-bottom: 1px solid var(--dark-red); 
            display: flex; 
            align-items: center; 
            padding: 0 15px;
        }

        .search-box {
            width: 100%; /* მთელ სიგანეზე გაიშალოს რადგან კონვერტი აღარაა */
            background: #111;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 10px 20px;
            color: white;
            outline: none;
            font-size: 14px;
        }

        /* წევრების კონტეინერი - გასწორებული დალაგებით */
        #users-container { 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
            padding: 20px; 
            justify-content: center;
            align-content: flex-start;
        }

        /* პატარა და ლამაზი ბარათები */
        .user-card { 
            width: 100px; 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            border-radius: 12px; 
            padding: 12px 5px; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .user-card:hover { border-color: var(--bright-red); transform: translateY(-3px); }

        .u-avatar { 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            border: 1px solid var(--dark-red); 
            object-fit: cover; 
            margin-bottom: 6px;
        }
        .u-name { 
            color: #eee; 
            font-weight: bold; 
            font-size: 10px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .u-role { color: #555; font-size: 8px; text-transform: uppercase; margin-top: 2px; }

        @media (max-width: 600px) { .sidebar-left { display: none; } }
    </style>
</head>
<body>

<div class="sidebar-left">
    <div class="sidebar-header">OLD MAFIA</div>
    <div class="menu-list">
        <a href="chat.html" class="menu-item">☕ კაფე-ბარი</a>
        <a href="chat.html?room=Mafia" class="menu-item">🔫 მაფია</a>
        <a href="profile.html" class="menu-item">👤 პროფილი</a>
    </div>
</div>

<div class="main-content">
    <div class="topbar">
        <input type="text" id="userSearch" class="search-box" placeholder="მოძებნე წევრი..." oninput="filterUsers()">
    </div>

    <div id="users-container">იტვირთება...</div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let allUsers = [];

    async function loadUsers() {
        const { data, error } = await _s.from('profiles').select('*').order('username', { ascending: true });
        if (error) return;
        allUsers = data || [];
        renderUsers(allUsers);
    }

    function renderUsers(list) {
        const container = document.getElementById('users-container');
        container.innerHTML = list.map(u => `
            <div class="user-card" onclick="location.href='profile.html?user=${u.username}'">
                <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" class="u-avatar">
                <div class="u-name">${u.username}</div>
                <div class="u-role">${u.role || 'Member'}</div>
            </div>
        `).join('');
    }

    function filterUsers() {
        const term = document.getElementById('userSearch').value.toLowerCase();
        renderUsers(allUsers.filter(u => u.username.toLowerCase().includes(term)));
    }

    loadUsers();
</script>
</body>
</html>
