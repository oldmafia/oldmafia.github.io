<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - არქივი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --dark-red: #4a0000; --bright-red: #ff0000; }
        * { box-sizing: border-box; }
        body { background: #030000; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* მარცხენა მუდმივი მენიუ (ოთახები - რაც ისედაც გაქვს) */
        .sidebar-left { 
            width: 250px; background: #050000; border-right: 2px solid var(--dark-red); 
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid var(--dark-red); color: var(--bright-red); font-weight: bold; }
        .menu-item { padding: 12px 20px; color: #bbb; text-decoration: none; display: block; border-bottom: 1px solid #111; font-size: 14px; }

        /* მთავარი შუა ნაწილი (არქივი) */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .topbar { 
            height: 60px; background: black; border-bottom: 1px solid var(--dark-red); 
            display: flex; align-items: center; padding: 0 15px; justify-content: space-between; 
        }

        /* მარჯვენა ტოპ-იკონები */
        .right-icons { display: flex; align-items: center; gap: 18px; }
        .inbox-btn { font-size: 22px; text-decoration: none; }
        .hamburger-online { font-size: 26px; color: #0f0; cursor: pointer; }

        /* მარჯვენა გამოსასვლელი მენიუ (ონლაინებისთვის) */
        .sidebar-right { 
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%; 
            background: #080000; border-left: 2px solid var(--dark-red); transition: 0.3s; z-index: 3000; 
        }
        .sidebar-right.active { right: 0; }
        .online-user { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid #111; }
        .online-user img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #0f0; }

        /* წევრების ბარათები (შენი 140px) */
        #users-container { flex: 1; overflow-y: auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 20px; }
        .user-card { width: 140px; padding: 15px; background: rgba(15, 0, 0, 0.8); border: 1px solid var(--dark-red); border-radius: 12px; text-align: center; }
