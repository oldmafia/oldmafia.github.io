    <br>
    <button class="btn-check" onclick="checkAnswer()">შემოწმება</button>
    
    <div class="score-panel">
        ⭐ ქულები: <span id="user-points">0</span>

    <a href="chat.html" class="back-link">⬅ ჩატში დაბრუნება</a>
</div>

<script>

    const myNick = localStorage.getItem('nickname');

    // შენი სიტყვების სია

        { s: "დარფა", c: "ფარდა" }, { s: "ლიკბი", c: "კბილი" }, { s: "ილუვერ", c: "რვეული" },
        { s: "ჭებედი", c: "ბეჭედი" }, { s: "გიდამა", c: "მაგიდა" }, { s: "ილღრუბე", c: "ღრუბელი" },
        { s: "მიკალა", c: "კალამი" }, { s: "ილიყვავ", c: "ყვავილი" }, { s: "ტერიმპიუკო", c: "კომპიუტერი" },
        { s: "ტაპლანე", c: "პლანეტა" }, { s: "ბოლამი", c: "ალბომი" }, { s: "შავილა", c: "ლავაში" },
        { s: "რიკინაბ", c: "ბანკირი" }, { s: "ვეჩემრლი", c: "მრჩეველი" }, { s: "თილები", c: "ბილეთი" },
        { s: "იმასაბყელ", c: "ყელსაბამი" }, { s: "რდივა", c: "ვარდი" }, { s: "თბოგამალები", c: "გამათბობელი" },
        { s: "ტოკარინიდი", c: "ინდიკატორი" }, { s: "შვიშა", c: "შაშვი" }, { s: "გარიგარ", c: "გარგარი" },
        { s: "რიდენბაი", c: "ბაინდერი" }, { s: "ქაითიფა", c: "აფთიაქი" }, { s: "რიმენო", c: "ნომერი" },
        { s: "ცემხი", c: "მხეცი" }, { s: "ნიფოლეტე", c: "ტელეფონი" }, { s: "რუჟლინა", c: "ჟურნალი" },
        { s: "ბირაწ", c: "წარბი" }, { s: "ლაკოდა", c: "კოდალა" }, { s: "ირაქამ", c: "ქამარი" },
        { s: "რიკურემ", c: "მერკური" }, { s: "კრიეჯო", c: "ჯოკერი" }, { s: "გჟინა", c: "ჟანგი" },
        { s: "კრამა", c: "მაკრატელი" }, { s: "იალაგ", c: "გალია" }, { s: "რტოშმი", c: "შტორმი" },
        { s: "თიასნა", c: "ასანთი" }, { s: "არღუბე", c: "ბეღურა" }, { s: "დანელკარი", c: "კალენდარი" },

        { s: "რწყოა", c: "წყარო" }, { s: "ეუწბროლი", c: "ბროწეული" }
    ];

    let currentIdx = 0;

    function nextRound() {
        currentIdx = Math.floor(Math.random() * wordPairs.length);
        document.getElementById('scrambled-display').innerText = wordPairs[currentIdx].s;
        document.getElementById('user-guess').value = "";
        document.getElementById('user-guess').focus();
    }

    async function checkAnswer() {
        const guess = document.getElementById('user-guess').value.trim();
        const msg = document.getElementById('msg');
        const correctAnswer = wordPairs[currentIdx].c;

        if (guess === correctAnswer) {
            msg.style.color = "lime";
            msg.innerText = "სწორია! +5 ⭐";
            await addPoints(5);
            setTimeout(() => { msg.innerText = ""; nextRound(); }, 1000);
        } else {
            msg.style.color = "red";
            msg.innerText = "არასწორია!";
            setTimeout(() => { msg.innerText = ""; }, 1000);
        }
    }

    async function addPoints(amount) {
        if(!myNick) return;
        const { data } = await _s.from('profiles').select('points').eq('username', myNick).single();
        let newScore = (data?.points || 0) + amount;
        await _s.from('profiles').update({ points: newScore }).eq('username', myNick);
        document.getElementById('user-points').innerText = newScore;
    }

    async function loadUserPoints() {
        if(!myNick) return;
        const { data } = await _s.from('profiles').select('points').eq('username', myNick).single();
        document.getElementById('user-points').innerText = data?.points || 0;
    }

    loadUserPoints();
    nextRound();

    document.getElementById("user-guess").addEventListener("keyup", (e) => {
        if (e.key === "Enter") checkAnswer();
    });
</script>
</body>
