<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 ფორუმი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a2f1a;
            font-family: system-ui, sans-serif;
            padding: 20px;
            color: white;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e8c28e;
        }
        h1 { color: #ffd966; }
        .back-btn {
            background: #c55a3a;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
        }
        .new-topic-btn {
            background: #ffaa44;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100%;
            color: #2c2418;
        }
        .topic-card {
            background: #1e5a2e;
            border-radius: 20px;
            padding: 15px;
            border: 1px solid #e8c28e;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .topic-title { font-size: 1.2rem; font-weight: bold; color: #ffd966; }
        .topic-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 8px;
        }
        .topic-view { display: none; }
        .back-to-list {
            background: none;
            border: none;
            color: #ffaa66;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .comments-list {
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .comment-card {
            background: #2a4a2a;
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .comment-author { font-weight: bold; color: #ffaa66; }
        .add-comment textarea {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #e8c28e;
            background: #2a4a2a;
            color: white;
        }
        .add-comment button {
            margin-top: 10px;
            background: #ffaa44;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2a4a2a;
            border-radius: 30px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 20px;
            border: 1px solid #e8c28e;
            background: #1e3a1e;
            color: white;
        }
        .modal-content button {
            background: #ffaa44;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
        }
        .empty-state { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📝 ფორუმი</h1>
        <a href="chat.html" class="back-btn">← ჩატში</a>
    </div>
    
    <div id="topicsView">
        <button id="newTopicBtn" class="new-topic-btn">➕ ახალი თემა</button>
        <div id="topicsList"></div>
    </div>
    
    <div id="topicView" class="topic-view">
        <button class="back-to-list" onclick="backToList()">← უკან</button>
        <div id="topicHeader"></div>
        <div id="commentsList" class="comments-list"></div>
        <div class="add-comment">
            <textarea id="newComment" rows="3" placeholder="დაწერე კომენტარი..."></textarea>
            <button onclick="addComment()">💬 გაგზავნა</button>
        </div>
    </div>
</div>

<div id="topicModal" class="modal">
    <div class="modal-content">
        <h3>📝 ახალი თემა</h3>
        <input type="text" id="topicTitle" placeholder="სათაური">
        <textarea id="topicContent" rows="4" placeholder="შინაარსი..."></textarea>
        <button id="createTopicBtn">✅ შექმნა</button>
        <button id="closeModalBtn">❌ გაუქმება</button>
    </div>
</div>

<script>
    const supabase = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co",
        "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
    );
    
    let myNick = localStorage.getItem('nickname') || 'მოთამაშე';
    let currentTopicId = null;
    
    async function loadTopics() {
        const { data: topics, error } = await supabase.from('forum_topics').select('*').order('created_at', { ascending: false });
        
        const list = document.getElementById('topicsList');
        if (error) {
            list.innerHTML = '<div class="empty-state">❌ შეცდომა: ' + error.message + '</div>';
            return;
        }
        if (!topics || topics.length === 0) {
            list.innerHTML = '<div class="empty-state">📭 თემები არ არის<br>👆 დააჭირე "ახალი თემა"</div>';
            return;
        }
        list.innerHTML = topics.map(t => `
            <div class="topic-card" onclick="openTopic(${t.id})">
                <div class="topic-title">${escapeHtml(t.title)}</div>
                <div class="topic-meta">
                    <span>👤 ${escapeHtml(t.author)}</span>
                    <span>💬 ${t.comment_count || 0}</span>
                </div>
            </div>
        `).join('');
    }
    
    async function openTopic(id) {
        currentTopicId = id;
        const { data: topic } = await supabase.from('forum_topics').select('*').eq('id', id).single();
        document.getElementById('topicHeader').innerHTML = `
            <h2>${escapeHtml(topic.title)}</h2>
            <p style="margin-top:10px;">${escapeHtml(topic.content)}</p>
        `;
        await loadComments(id);
        document.getElementById('topicsView').style.display = 'none';
        document.getElementById('topicView').style.display = 'block';
    }
    
    async function loadComments(topicId) {
        const { data: comments } = await supabase.from('forum_comments').select('*').eq('topic_id', topicId).order('created_at', { ascending: true });
        const list = document.getElementById('commentsList');
        if (!comments || comments.length === 0) {
            list.innerHTML = '<div class="empty-state">💬 კომენტარები არ არის</div>';
            return;
        }
        list.innerHTML = comments.map(c => `
            <div class="comment-card">
                <div class="comment-author">${escapeHtml(c.author)}</div>
                <div>${escapeHtml(c.content)}</div>
            </div>
        `).join('');
    }
    
    async function addComment() {
        const content = document.getElementById('newComment').value.trim();
        if (!content) return alert("ჩაწერე კომენტარი!");
        
        const { error } = await supabase.from('forum_comments').insert({ 
            topic_id: currentTopicId, 
            author: myNick, 
            content: content 
        });
        
        if (error) {
            alert("შეცდომა: " + error.message);
            return;
        }
        
        // განახლე კომენტარების რაოდენობა
        const { count } = await supabase.from('forum_comments').select('*', { count: 'exact', head: true }).eq('topic_id', currentTopicId);
        await supabase.from('forum_topics').update({ comment_count: count }).eq('id', currentTopicId);
        
        document.getElementById('newComment').value = '';
        loadComments(currentTopicId);
        alert("✅ კომენტარი დაემატა!");
    }
    
    function openModal() {
        document.getElementById('topicModal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('topicModal').style.display = 'none';
        document.getElementById('topicTitle').value = '';
        document.getElementById('topicContent').value = '';
    }
    async function createTopic() {
        const title = document.getElementById('topicTitle').value.trim();
        const content = document.getElementById('topicContent').value.trim();
        if (!title || !content) {
            alert("შეავსე ყველა ველი!");
            return;
        }
        
        const { error } = await supabase.from('forum_topics').insert({ 
            author: myNick, 
            title: title, 
            content: content, 
            comment_count: 0 
        });
        
        if (error) {
            alert("შეცდომა: " + error.message);
            return;
        }
        
        closeModal();
        loadTopics();
        alert("✅ თემა შეიქმნა!");
    }
    
    function backToList() {
        document.getElementById('topicsView').style.display = 'block';
        document.getElementById('topicView').style.display = 'none';
        loadTopics();
    }
    
    function escapeHtml(t) { 
        if (!t) return '';
        return t.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]) || ''; 
    }
    
    document.getElementById('newTopicBtn').onclick = openModal;
    document.getElementById('createTopicBtn').onclick = createTopic;
    document.getElementById('closeModalBtn').onclick = closeModal;
    
    loadTopics();
</script>
</body>
</html>
