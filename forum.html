<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - FULL SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease; }
        
        /* ცვლადები ღამის რეჟიმისთვის */
        body.night-mode {
            --bg-color: #030000;
            --text-color: #e0c8a8;
            --chat-bg: radial-gradient(circle at center, #1a0808 0%, #030000 100%);
            --bubble-bg: #1a0a0a;
            --bubble-border: #882222;
            --nick-color: #dd8888;
            --sidebar-bg: #050000;
            --input-bg: #1a0808;
            --input-border: #882222;
            --room-item-border: #331111;
            --room-item-active: #4a1a1a;
            --topbar-bg: #0a0202;
            --modal-bg: #1a0a0a;
            --modal-border: #882222;
            --modal-text: #e0c8a8;
        }
        
        /* ცვლადები დღის რეჟიმისთვის */
        body.day-mode {
            --bg-color: #fff8f0;
            --text-color: #2c2418;
            --chat-bg: #fffef7;
            --bubble-bg: #ffffff;
            --bubble-border: #e8d4b0;
            --nick-color: #c55a3a;
            --sidebar-bg: #fff8ed;
            --input-bg: #ffffff;
            --input-border: #e8d4b0;
            --room-item-border: #f0e4cc;
            --room-item-active: #ffe6d5;
            --topbar-bg: #fff4e6;
            --modal-bg: #ffffff;
            --modal-border: #e8d4b0;
            --modal-text: #2c2418;
            background-image: radial-gradient(circle at 15% 25%, rgba(255, 77, 77, 0.2) 3px, transparent 3px),
                              radial-gradient(circle at 75% 60%, rgba(255, 77, 77, 0.15) 2.5px, transparent 2.5px);
            background-size: 55px 55px, 40px 40px;
        }

        /* მოდალური ფანჯრის გასწორება (როლების მენიუ) */
        .modal-content { 
            background: var(--modal-bg) !important; 
            border: 2px solid var(--modal-border) !important; 
            color: var(--modal-text) !important;
            padding: 25px; border-radius: 25px; width: 320px; text-align: center; position: relative;
        }
        .modal-btn { 
            display: block; width: 100%; padding: 12px; margin: 7px 0; 
            border: 1px solid var(--bubble-border); 
            background: var(--bubble-bg); 
            color: var(--text-color); 
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; 
        }

        /* გულების ანიმაციები დღის რეჟიმში */
        body.day-mode .chat-area::after { content: "❤️"; position: fixed; bottom: 15%; right: 20px; font-size: 56px; opacity: 0.6; animation: floatHeart 5s infinite; z-index: 100; }
        @keyframes floatHeart { 0% { transform: translateY(0); } 50% { transform: translateY(-30px); } 100% { transform: translateY(0); } }

        /* ძირითადი სტილები */
        body { margin: 0; font-family: sans-serif; background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: var(--topbar-bg); padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--bubble-border); height: 60px; z-index: 1000; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: var(--chat-bg); }
        .input-zone { padding: 12px; display: flex; gap: 10px; border-top: 2px solid var(--bubble-border); background: var(--topbar-bg); }
        .input-zone input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); }
        
        .sidebar { position: fixed; left: -280px; width: 280px; height: 100%; background: var(--sidebar-bg); transition: 0.3s; z-index: 4000; border-right: 3px solid var(--bubble-border); }
        .sidebar.active { left: 0; }
        .room-item { padding: 15px; cursor: pointer; border-bottom: 1px solid var(--room-item-border); }
        .room-item.active { background: var(--room-item-active); font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
    </style>
</head>
<body class="night-mode" id="mainBody">

<div class="sidebar" id="sidebar">
    <div style="padding: 20px; text-align: center;">
        <img id="my-avatar-img" src="" style="width:65px; height:65px; border-radius:50%; border:2px solid var(--bubble-border); object-fit: cover;">
        <div id="my-nick-label" style="font-weight:bold; margin-top:5px;">...</div>
    </div>
    <div class="rooms-list">
        <div class="room-item active" onclick="changeRoom('☕ კაფე-ბარი', this)">☕ კაფე-ბარი</div>
        <div class="room-item" onclick="changeRoom('📝 ფორუმი', this)">📝 ფორუმი</div>
        <div class="room-item" onclick="changeRoom('🃏 ჯოკერი', this)">🃏 ჯოკერი</div>
        <div class="room-item" onclick="changeRoom('🎲 ნარდი', this)">🎲 ნარდი</div>
    </div>
</div>

<div class="topbar">
    <div onclick="toggleSidebar()" style="cursor:pointer; font-size:25px;">☰</div>
    <div id="room-name" style="flex:1; text-align:center;">☕ კაფე-ბარი</div>
    <button onclick="toggleTheme()" id="themeToggle" style="background:none; border:none; font-size:20px; cursor:pointer;">🌙</button>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-zone">
    <input type="text" id="msg-input" placeholder="დაწერე მესიჯი...">
    <button onclick="sendMsg()" style="border-radius:50%; width:45px; height:45px; background:var(--nick-color); border:none; color:white;">✈</button>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <img id="targetAvatar" src="" style="width:80px; height:80px; border-radius:50%;">
        <h3 id="targetName">ნიკი</h3>
        <div id="adminOptions"></div>
        <button class="modal-btn" onclick="closeModal()">დახურვა</button>
    </div>
</div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    let myNick = localStorage.getItem('nickname'), currentRoom = "☕ კაფე-ბარი";

    function toggleTheme() {
        const b = document.body;
        const btn = document.getElementById('themeToggle');
        if (b.classList.contains('night-mode')) {
            b.classList.replace('night-mode', 'day-mode');
            btn.innerText = '☀️';
            localStorage.setItem('theme', 'day');
        } else {
            b.classList.replace('day-mode', 'night-mode');
            btn.innerText = '🌙';
            localStorage.setItem('theme', 'night');
        }
    }

    function changeRoom(n, el) {
        // ფორუმზე გადასვლა
        if (n === "📝 ფორუმი" || n === "🏛️ ფორუმი") {
            window.location.href = 'forum.html';
            return;
        }
        currentRoom = n;
        document.getElementById('room-name').innerText = n;
        document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        toggleSidebar();
        loadMessages();
    }

    // მოდალის დახურვა
    function closeModal() { document.getElementById('userModal').style.display = "none"; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    async function init() {
        const savedTheme = localStorage.getItem('theme') || 'night';
        if(savedTheme === 'day') toggleTheme();
        loadMessages();
    }

    // ... (დანარჩენი ფუნქციები: loadMessages, sendMsg და ა.შ. იგივე რჩება)
    window.onload = init;
</script>
</body>
</html>
