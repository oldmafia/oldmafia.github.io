<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📝 ფორუმი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease; }
        
        body.night-mode {
            --bg-color: #030000;
            --text-color: white;
            --card-bg: #1a0a0a;
            --border-color: #660000;
            --nick-color: #ff6666;
            --input-bg: #080000;
            --topbar-bg: black;
        }
        
        body.day-mode {
            --bg-color: #fff8f0;
            --text-color: #2c2418;
            --card-bg: #ffffff;
            --border-color: #e8d4b0;
            --nick-color: #c55a3a;
            --input-bg: #ffffff;
            --topbar-bg: #fff4e6;
            background-image: radial-gradient(circle at 15% 25%, rgba(255, 77, 77, 0.3) 3px, transparent 3px),
                              radial-gradient(circle at 75% 60%, rgba(255, 77, 77, 0.25) 2.5px, transparent 2.5px),
                              radial-gradient(circle at 45% 85%, rgba(255, 77, 77, 0.2) 2px, transparent 2px);
            background-size: 55px 55px, 40px 40px, 70px 70px;
            background-attachment: fixed;
        }
        
        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }
        h1 { color: var(--nick-color); font-size: 1.8rem; }
        .back-btn {
            background: var(--nick-color);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
        }
        .new-topic-btn {
            background: var(--nick-color);
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100%;
            color: white;
        }
        .topic-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            margin-bottom: 12px;
        }
        .topic-title { font-size: 1.2rem; font-weight: bold; color: var(--nick-color); }
        .topic-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #888;
            margin-top: 8px;
        }
        .topic-view { display: none; }
        .back-to-list {
            background: none;
            border: none;
            color: var(--nick-color);
            cursor: pointer;
            margin-bottom: 15px;
        }
        .comments-list {
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .comment-card {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 10px;
        }
        body.day-mode .comment-card { background: #f9f5e8; }
        .comment-author { font-weight: bold; color: var(--nick-color); }
        .comment-text { color: var(--text-color); font-size: 0.9rem; margin-top: 5px; }
        .add-comment textarea {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
        }
        .add-comment button {
            margin-top: 10px;
            background: var(--nick-color);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
        }
        .modal-content button {
            background: var(--nick-color);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
            color: white;
        }
        .empty-state { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📝 ფორუმი</h1>
        <a href="chat.html" class="back-btn">← ჩატში</a>
    </div>
    
    <div id="topicsView">
        <button id="newTopicBtn" class="new-topic-btn">➕ ახალი თემა</button>
        <div id="topicsList"></div>
    </div>
    
    <div id="topicView" class="topic-view">
        <button class="back-to-list" onclick="backToList()">← უკან</button>
        <div id="topicHeader"></div>
        <div id="commentsList" class="comments-list"></div>
        <div class="add-comment">
            <textarea id="newComment" rows="3" placeholder="დაწერე კომენტარი..."></textarea>
            <button onclick="addComment()">💬 გაგზავნა</button>
        </div>
    </div>
</div>

<div id="topicModal" class="modal">
    <div class="modal-content">
        <h3>📝 ახალი თემა</h3>
        <input type="text" id="topicTitle" placeholder="სათაური">
        <textarea id="topicContent" rows="4" placeholder="შინაარსი..."></textarea>
        <button id="createTopicBtn">✅ შექმნა</button>
        <button id="closeModalBtn">❌ გაუქმება</button>
    </div>
</div>

<script>
    const supabase = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co",
        "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
    );
    
    let myNick = localStorage.getItem('nickname') || 'მოთამაშე';
    let currentTopicId = null;
    
    function setTheme() {
        const theme = localStorage.getItem('theme') || 'night';
        document.body.classList.remove('night-mode', 'day-mode');
        document.body.classList.add(theme === 'day' ? 'day-mode' : 'night-mode');
    }
    
    async function loadTopics() {
        const { data: topics } = await supabase.from('forum_topics').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('topicsList');
        if (!topics || topics.length === 0) {
            list.innerHTML = '<div class="empty-state">📭 თემები არ არის<br>👆 დააჭირე "ახალი თემა"</div>';
            return;
        }
        list.innerHTML = topics.map(t => `
            <div class="topic-card" onclick="openTopic(${t.id})">
                <div class="topic-title">${escape(t.title)}</div>
                <div class="topic-meta">
                    <span>👤 ${escape(t.author)}</span>
                    <span>💬 ${t.comment_count || 0}</span>
                </div>
            </div>
        `).join('');
    }
    
    async function openTopic(id) {
        currentTopicId = id;
        const { data: topic } = await supabase.from('forum_topics').select('*').eq('id', id).single();
        document.getElementById('topicHeader').innerHTML = `
            <h2>${escape(topic.title)}</h2>
            <p style="margin-top:10px;">${escape(topic.content)}</p>
        `;
        await loadComments(id);
        document.getElementById('topicsView').style.display = 'none';
        document.getElementById('topicView').style.display = 'block';
    }
    
    async function loadComments(topicId) {
        const { data: comments } = await supabase.from('forum_comments').select('*').eq('topic_id', topicId).order('created_at', { ascending: true });
        const list = document.getElementById('commentsList');
        if (!comments || comments.length === 0) {
            list.innerHTML = '<div class="empty-state">💬 კომენტარები არ არის</div>';
            return;
        }
        list.innerHTML = comments.map(c => `
            <div class="comment-card">
                <div class="comment-author">${escape(c.author)}</div>
                <div class="comment-text">${escape(c.content)}</div>
            </div>
        `).join('');
    }
    
    async function addComment() {
        const content = document.getElementById('newComment').value.trim();
        if (!content) return alert("ჩაწერე კომენტარი!");
        await supabase.from('forum_comments').insert({ topic_id: currentTopicId, author: myNick, content });
        const { count } = await supabase.from('forum_comments').select('*', { count: 'exact', head: true }).eq('topic_id', currentTopicId);
        await supabase.from('forum_topics').update({ comment_count: count }).eq('id', currentTopicId);
        document.getElementById('newComment').value = '';
        loadComments(currentTopicId);
        alert("✅ კომენტარი დაემატა!");
    }
    
    function openModal() {
        document.getElementById('topicModal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('topicModal').style.display = 'none';
        document.getElementById('topicTitle').value = '';
        document.getElementById('topicContent').value = '';
    }
    async function createTopic() {
        const title = document.getElementById('topicTitle').value.trim();
        const content = document.getElementById('topicContent').value.trim();
        if (!title || !content) return alert("შეავსე ყველა ველი!");
        
        const { error } = await supabase.from('forum_topics').insert({ 
            author: myNick, 
            title: title, 
            content: content, 
            comment_count: 0 
        });
        
        if (error) {
            alert("შეცდომა: " + error.message);
            return;
        }
        
        closeModal();
        loadTopics();
        alert("✅ თემა შეიქმნა!");
    }
    
    function backToList() {
        document.getElementById('topicsView').style.display = 'block';
        document.getElementById('topicView').style.display = 'none';
        loadTopics();
    }
    function escape(t) { return t?.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]) || ''; }
    
    document.getElementById('newTopicBtn').onclick = openModal;
    document.getElementById('createTopicBtn').onclick = createTopic;
    document.getElementById('closeModalBtn').onclick = closeModal;
    
    setTheme();
    loadTopics();
    
    window.addEventListener('storage', (e) => {
        if (e.key === 'theme') setTheme();
    });
</script>
</body>
</html>
