<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📝 ფორუმი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e3a1a;
            font-family: system-ui, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        body.day-mode { background: #f5efe0; }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e8c28e;
        }
        h1 { color: #ffd966; font-size: 1.8rem; }
        body.day-mode h1 { color: #c55a3a; }
        .theme-toggle, .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .back-btn {
            background: #c55a3a;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            margin-left: 10px;
        }
        .new-topic-btn {
            background: #ffaa44;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100%;
        }
        .new-topic-btn.hidden { display: none; }
        .topic-card {
            background: rgba(0,0,0,0.6);
            border-radius: 25px;
            padding: 18px;
            border: 1px solid #e8c28e;
            cursor: pointer;
            margin-bottom: 15px;
        }
        body.day-mode .topic-card { background: white; }
        .topic-title { font-size: 1.2rem; font-weight: bold; color: #ffd966; }
        body.day-mode .topic-title { color: #c55a3a; }
        .topic-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 8px;
        }
        .topic-view { display: none; }
        .back-to-list {
            background: none;
            border: none;
            color: #ffaa66;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .comments-list {
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .comment-card {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
        }
        body.day-mode .comment-card { background: #f9f5e8; }
        .comment-author { font-weight: bold; color: #ffaa66; }
        .comment-text { color: #ffefb9; font-size: 0.9rem; margin-top: 5px; }
        body.day-mode .comment-text { color: #2c2418; }
        .comment-time { font-size: 0.65rem; color: #888; margin-top: 5px; }
        .add-comment textarea {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #e8c28e;
            background: #2a2a1a;
            color: white;
            resize: vertical;
        }
        body.day-mode .add-comment textarea { background: white; color: #2c2418; }
        .add-comment button {
            margin-top: 10px;
            background: #ffaa44;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #4a3724;
            border-radius: 30px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
        }
        body.day-mode .modal-content { background: white; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 20px;
            border: 1px solid #e8c28e;
            background: #2a2a1a;
            color: white;
        }
        body.day-mode .modal-content input,
        body.day-mode .modal-content textarea { background: #f5efe0; color: #2c2418; }
        .modal-content button {
            background: #ffaa44;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
        }
        .empty-state { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📝 ფორუმი</h1>
        <div>
            <button class="theme-toggle" id="themeToggle">🌙</button>
            <a href="chat.html" class="back-btn">← ჩატში</a>
        </div>
    </div>
    
    <div id="topicsView">
        <button id="newTopicBtn" class="new-topic-btn hidden" onclick="openModal()">➕ ახალი თემა</button>
        <div id="topicsList"></div>
    </div>
    
    <div id="topicView" class="topic-view">
        <button class="back-to-list" onclick="backToList()">← უკან</button>
        <div id="topicHeader"></div>
        <div id="commentsList" class="comments-list"></div>
        <div class="add-comment">
            <textarea id="newComment" rows="3" placeholder="დაწერე კომენტარი..."></textarea>
            <button onclick="addComment()">💬 გაგზავნა</button>
        </div>
    </div>
</div>

<div id="topicModal" class="modal">
    <div class="modal-content">
        <h3>📝 ახალი თემა</h3>
        <input type="text" id="topicTitle" placeholder="სათაური">
        <textarea id="topicContent" rows="4" placeholder="შინაარსი..."></textarea>
        <button onclick="createTopic()">✅ შექმნა</button>
        <button onclick="closeModal()">❌ გაუქმება</button>
    </div>
</div>

<script>
    const supabase = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co",
        "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
    );
    
    let myNick = localStorage.getItem('nickname') || 'მოთამაშე';
    let myRole = null;
    let currentTopicId = null;
    
    async function loadUserRole() {
        try {
            const { data, error } = await supabase
                .from('profiles')
                .select('role')
                .eq('username', myNick)
                .single();
            
            if (error) {
                console.error("შეცდომა:", error);
                myRole = 'Member';
            } else {
                myRole = data?.role || 'Member';
            }
            
            console.log("ჩემი როლი:", myRole);
            
            const btn = document.getElementById('newTopicBtn');
            if (myRole === 'Owner' || myRole === 'Admin') {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        } catch(e) {
            console.error("შეცდომა:", e);
            myRole = 'Member';
        }
    }
    
    function setTheme(theme) {
        document.body.classList.remove('night-mode', 'day-mode');
        if (theme === 'day') {
            document.body.classList.add('day-mode');
            document.getElementById('themeToggle').innerHTML = '🌙';
            localStorage.setItem('forum_theme', 'day');
        } else {
            document.body.classList.add('night-mode');
            document.getElementById('themeToggle').innerHTML = '☀️';
            localStorage.setItem('forum_theme', 'night');
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('night-mode')) setTheme('day');
        else setTheme('night');
    }
    
    async function loadTopics() {
        const { data: topics } = await supabase.from('forum_topics').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('topicsList');
        if (!topics?.length) {
            list.innerHTML = '<div class="empty-state">📭 თემები არ არის</div>';
            return;
        }
        list.innerHTML = topics.map(t => `
            <div class="topic-card" onclick="openTopic(${t.id})">
                <div class="topic-title">${escape(t.title)}</div>
                <div class="topic-meta">
                    <span>👤 ${escape(t.author)}</span>
                    <span>📅 ${new Date(t.created_at).toLocaleDateString()}</span>
                    <span>💬 ${t.comment_count || 0}</span>
                </div>
            </div>
        `).join('');
    }
    
    async function openTopic(id) {
        currentTopicId = id;
        const { data: topic } = await supabase.from('forum_topics').select('*').eq('id', id).single();
        document.getElementById('topicHeader').innerHTML = `
            <h2>${escape(topic.title)}</h2>
            <div class="topic-meta">👤 ${escape(topic.author)} | 📅 ${new Date(topic.created_at).toLocaleString()}</div>
            <p style="margin-top:12px;">${escape(topic.content)}</p>
        `;
        await loadComments(id);
        document.getElementById('topicsView').style.display = 'none';
        document.getElementById('topicView').style.display = 'block';
    }
    
    async function loadComments(topicId) {
        const { data: comments } = await supabase.from('forum_comments').select('*').eq('topic_id', topicId).order('created_at', { ascending: true });
        const list = document.getElementById('commentsList');
        if (!comments?.length) {
            list.innerHTML = '<div class="empty-state">💬 კომენტარები არ არის<br>👆 იყავი პირველი!</div>';
            return;
        }
        list.innerHTML = comments.map(c => `
            <div class="comment-card">
                <div class="comment-author">${escape(c.author)}</div>
                <div class="comment-text">${escape(c.content)}</div>
                <div class="comment-time">📅 ${new Date(c.created_at).toLocaleString()}</div>
            </div>
        `).join('');
    }
    
    async function addComment() {
        const content = document.getElementById('newComment').value.trim();
        if (!content) return alert("ჩაწერე კომენტარი!");
        await supabase.from('forum_comments').insert({ topic_id: currentTopicId, author: myNick, content });
        const { count } = await supabase.from('forum_comments').select('*', { count: 'exact', head: true }).eq('topic_id', currentTopicId);
        await supabase.from('forum_topics').update({ comment_count: count }).eq('id', currentTopicId);
        document.getElementById('newComment').value = '';
        loadComments(currentTopicId);
    }
    
    function openModal() {
        if (myRole !== 'Owner' && myRole !== 'Admin') {
            alert("თემის შექმნა მხოლოდ ადმინისტრატორებს შეუძლიათ!");
            return;
        }
        document.getElementById('topicModal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('topicModal').style.display = 'none';
        document.getElementById('topicTitle').value = '';
        document.getElementById('topicContent').value = '';
    }
    async function createTopic() {
        const title = document.getElementById('topicTitle').value.trim();
        const content = document.getElementById('topicContent').value.trim();
        if (!title || !content) return alert("შეავსე ყველა ველი!");
        await supabase.from('forum_topics').insert({ author: myNick, title, content, comment_count: 0 });
        closeModal();
        loadTopics();
        alert("✅ თემა შეიქმნა!");
    }
    function backToList() {
        document.getElementById('topicsView').style.display = 'block';
        document.getElementById('topicView').style.display = 'none';
        loadTopics();
    }
    function escape(t) { return t?.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]) || ''; }
    
    document.getElementById('themeToggle').onclick = toggleTheme;
    const saved = localStorage.getItem('forum_theme') || 'night';
    setTheme(saved);
    loadUserRole();
    loadTopics();
</script>
</body>
</html>
