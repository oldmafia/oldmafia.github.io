<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ფორუმი</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #353535; color: #FFF; }
        .forum { margin: 20px; }
        .post { margin-top: 20px; padding: 10px; background-color: #575757; border-radius: 5px; }
        .comment { margin-top: 10px; padding: 5px; background-color: #4A4A4A; border-radius: 5px; }
    </style>
</head>
<body>

<div class="forum">
    <h1>ფორუმი</h1>
    <div id="posts"></div>

    <h2>დამატება</h2>
    <textarea id="newPost" rows="4" placeholder="შეიყვენით ახალი თემა..." required></textarea><br>
    <button onclick="addPost()">დაამატე თემა</button>
</div>

<script>
    const isAdmin = true; // შეცვალეთ true , თუ თქვენ ხართ ადმინი / დამფუძნებელი

    function addPost() {
        const newPostContent = document.getElementById('newPost').value;
        if (isAdmin && newPostContent) {
            const postsDiv = document.getElementById('posts');
            const postDiv = document.createElement('div');
            postDiv.className = 'post';
            postDiv.innerHTML = `<p>${newPostContent}</p>`;
            
            const commentBox = document.createElement('textarea');
            commentBox.placeholder = "შენიშვნის დამატება...";
            postDiv.appendChild(commentBox);
            
            const commentButton = document.createElement('button');
            commentButton.innerText = "შენიშვნის დამატება";
            commentButton.onclick = () => addComment(commentBox.value, postDiv);
            postDiv.appendChild(commentButton);
            
            postsDiv.appendChild(postDiv);
            document.getElementById('newPost').value = '';
        } else if (!isAdmin) {
            alert("ამ ფუნქციას მხოლოდ ადმინები და დამფუძნებლები იყენებენ!");
        }
    }

    function addComment(commentContent, postDiv) {
        if (commentContent) {
            const commentDiv = document.createElement('div');
            commentDiv.className = 'comment';
            commentDiv.innerText = commentContent;
            postDiv.appendChild(commentDiv);
        }
    }
</script>

</body>
</html>
