<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩემი პროფილი - MAFIA ROOMS</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .profile-card {
            width: 90%; max-width: 400px; background: #0a0a0a; border: 2px solid red; border-radius: 20px; padding: 30px; box-shadow: 0 0 20px rgba(255,0,0,0.2);
        }

        h2 { color: red; text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }

        .info-group { margin-bottom: 20px; }
        label { display: block; color: #555; font-size: 12px; margin-bottom: 5px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 10px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: red; }

        .btn-save { 
            width: 100%; padding: 15px; background: red; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn-save:active { transform: scale(0.95); }

        .btn-back { 
            display: block; text-align: center; margin-top: 20px; color: #555; text-decoration: none; font-size: 14px; 
        }
        .btn-back:hover { color: red; }

        #msg { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="profile-card">
        <h2>👤 პროფილი</h2>
        
        <div class="info-group">
            <label>შენი ნიკი</label>
            <input type="text" id="username" placeholder="შეიყვანე ნიკი">
        </div>

        <div class="info-group">
            <label>ახალი პაროლი</label>
            <input type="password" id="newPass" placeholder="დატოვე ცარიელი თუ არ ცვლი">
        </div>

        <button class="btn-save" onclick="updateProfile()">შენახვა</button>
        
        <a href="home.html" class="btn-back">🔙 უკან დაბრუნება</a>
        
        <div id="msg"></div>
    </div>

    <script>
        const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
        const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        async function loadProfile() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) return window.location.href = 'index.html';

            const { data: profile } = await client.from('profiles').select('username').eq('id', user.id).single();
            if (profile) document.getElementById('username').value = profile.username;
        }

        async function updateProfile() {
            const newNick = document.getElementById('username').value.trim();
            const newPass = document.getElementById('newPass').value;
            const msg = document.getElementById('msg');
            
            const { data: { user } } = await client.auth.getUser();

            // ნიკის განახლება
            if (newNick) {
                await client.from('profiles').update({ username: newNick }).eq('id', user.id);
            }

            // პაროლის განახლება
            if (newPass) {
                if (newPass.length < 6) {
                    msg.style.color = "yellow";
                    msg.innerText = "პაროლი 6 სიმბოლოზე მეტი უნდა იყოს!";
                    return;
                }
                await client.auth.updateUser({ password: newPass });
            }

            msg.style.color = "lime";
            msg.innerText = "წარმატებით განახლდა! ✅";
        }

        loadProfile();
    </script>
</body>
</html>
