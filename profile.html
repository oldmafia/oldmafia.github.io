<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>პროფილი - KAIFMANIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 450px; background: #0a0a0a; border: 2px solid red; border-radius: 20px; padding: 20px; }
        #avatarImg { width: 120px; height: 120px; border-radius: 50%; border: 2px solid red; display: block; margin: 0 auto 10px; object-fit: cover; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #333; color: white; border-radius: 10px; }
        .btn { width: 100%; padding: 10px; background: red; border: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .inbox { margin-top: 30px; border-top: 1px solid red; padding-top: 15px; }
        .msg { background: #111; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid red; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://via.placeholder.com/150" id="avatarImg">
        <h2 id="uName" style="text-align:center; color:red;">იტვირთება...</h2>
        <p id="uStatus" style="text-align:center; font-style:italic; color:#888;"></p>
        
        <input type="text" id="statusInput" placeholder="შეცვალე სტატუსი...">
        <button class="btn" onclick="updateStatus()">განახლება</button>

        <div class="inbox">
            <h3 style="color:red; margin-bottom:10px;">📩 პირადი მესიჯები</h3>
            <div id="inboxList">მესიჯები არ არის...</div>
        </div>
        <br>
        <a href="home.html" style="color:#555; text-decoration:none; display:block; text-align:center;">🔙 ჩატში დაბრუნება</a>
    </div>

    <script>
        const client = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myId;

        async function init() {
            const { data: { user } } = await client.auth.getUser();
            if(!user) return window.location.href = 'index.html';
            myId = user.id;

            const { data: p } = await client.from('profiles').select('*').eq('id', myId).single();
            if(p) {
                document.getElementById('uName').innerText = p.username;
                document.getElementById('uStatus').innerText = p.status || "სტატუსი არაა";
                if(p.avatar_url) document.getElementById('avatarImg').src = p.avatar_url;
            }
            loadInbox();
        }

        async function updateStatus() {
            const s = document.getElementById('statusInput').value;
            await client.from('profiles').update({ status: s }).eq('id', myId);
            location.reload();
        }

        async function loadInbox() {
            const { data: msgs } = await client.from('private_messages')
                .select('*, profiles:sender_id(username)')
                .eq('receiver_id', myId)
                .order('created_at', { ascending: false });

            if(msgs && msgs.length > 0) {
                document.getElementById('inboxList').innerHTML = msgs.map(m => `
                    <div class="msg">
                        <b style="color:red;">${m.profiles?.username}:</b> ${m.text}
                    </div>
                `).join('');
            }
        }
        init();
    </script>
</body>
</html>
