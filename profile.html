<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; padding-top: 30px; }
        .box { border: 2px solid red; padding: 25px; display: inline-block; border-radius: 20px; background: #050000; min-width: 320px; box-shadow: 0 0 20px red; }
        .p-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #ff0000; object-fit: cover; background: #111; cursor: pointer; }
        .status-tag { color: #00ff00; font-size: 14px; margin: 10px 0; display: block; cursor: pointer; border-bottom: 1px dashed #00ff0066; padding-bottom: 5px; }
        .role-name { color: gold; font-weight: bold; font-size: 16px; margin-top: 5px; }
        .btn { display: block; width: 100%; padding: 12px; margin-top: 10px; background: #200; color: white; border: 1px solid red; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .btn:hover { background: red; }
        #adm-panel { display: none; margin-top: 20px; border-top: 2px solid #300; padding-top: 15px; }
        .adm-opt { background: #300; border: 1px solid gold; color: gold; padding: 8px; margin: 3px; cursor: pointer; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="box">
        <img id="avatar-img" class="p-img" src="https://i.ibb.co/v3m6y6R/avatar.png" title="შეცვალე ავატარი" onclick="updateAvatar()">
        
        <h1 id="user-n">იტვირთება...</h1>
        <span id="user-st" class="status-tag" onclick="updateStatus()">დააყენე სტატუსი... ✏️</span>
        <p id="user-r" class="role-name"></p>

        <button class="btn" onclick="alert('PM სისტემა მუშავდება...')">✉️ მიწერა (PM)</button>
        
        <div id="adm-panel">
            <p style="font-size: 11px; color: #888;">ადმინისტრატორის მართვა</p>
            <button class="adm-opt" onclick="changeRole('Owner')">👑 Owner</button>
            <button class="adm-opt" onclick="changeRole('Admin')">🛡️ Admin</button>
            <button class="adm-opt" onclick="changeRole('მომხმარებელი')">✨ Reset</button>
        </div>

        <button class="btn" style="background:#444; border:none; margin-top: 20px;" onclick="location.href='chat.html'">🏠 უკან ჩატში</button>
    </div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    
    const urlParams = new URLSearchParams(window.location.search);
    const targetUser = urlParams.get('user') || localStorage.getItem('nickname');
    const myNick = localStorage.getItem('nickname');

    async function loadProfile() {
        // 1. მოგვაქვს პროფილის ინფო
        let { data: user, error } = await _s.from('profiles').select('*').eq('username', targetUser).maybeSingle();
        
        if(user) {
            document.getElementById('user-n').innerText = user.username;
            document.getElementById('user-r').innerText = user.role || "მომხმარებელი";
            
            // ავატარის ჩატვირთვა (თუ NULL-ია, რჩება დეფოლტი)
            if(user.avatar_url) document.getElementById('avatar-img').src = user.avatar_url;
            // სტატუსის ჩატვირთვა
            if(user.status) document.getElementById('user-st').innerText = user.status;

            // 2. ადმინ პანელის ლოგიკა (თუ მე ვარ ადმინი და ვუყურებ სხვას)
            let { data: me } = await _s.from('profiles').select('role').eq('username', myNick).maybeSingle();
            if(me && (me.role === 'Admin' || me.role === 'Owner') && myNick !== targetUser) {
                document.getElementById('adm-panel').style.display = 'block';
            }
        } else {
            document.getElementById('user-n').innerText = "არ მოიძებნა";
        }
    }

    // ფუნქცია: ავატარის შეცვლა (მხოლოდ შენსაზე)
    async function updateAvatar() {
        if(myNick !== targetUser) return;
        let newPic = prompt("ჩასვი სურათის ლინკი (URL):", document.getElementById('avatar-img').src);
        if(newPic && newPic.includes('http')) {
            await _s.from('profiles').update({ avatar_url: newPic }).eq('username', myNick);
            location.reload();
        }
    }

    // ფუნქცია: სტატუსის შეცვლა (მხოლოდ შენსაზე)
    async function updateStatus() {
        if(myNick !== targetUser) return;
        let newSt = prompt("დაწერე ახალი სტატუსი:", document.getElementById('user-st').innerText);
        if(newSt) {
            await _s.from('profiles').update({ status: newSt }).eq('username', myNick);
            location.reload();
        }
    }

    // ფუნქცია: როლის შეცვლა (ადმინებისთვის)
    async function changeRole(newRole) {
        await _s.from('profiles').update({ role: newRole }).eq('username', targetUser);
        location.reload();
    }

    loadProfile();
</script>
</body>
</html>
