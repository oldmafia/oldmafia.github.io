<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👤 პროფილი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .profile-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }
        .status {
            margin-top: 12px;
            padding: 8px;
            background: #f0f2f5;
            border-radius: 30px;
            cursor: pointer;
        }
        .create-post {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .create-post textarea {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #ddd;
        }
        .create-post button {
            margin-top: 10px;
            background: #c55a3a;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .post-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .like-btn { cursor: pointer; color: #c55a3a; }
        .comment {
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }
        .add-comment {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .add-comment input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid #ddd;
        }
        .add-comment button {
            background: #c55a3a;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #c55a3a;
            text-decoration: none;
        }
        .empty { text-align: center; padding: 20px; color: #888; }
        button { cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="profile-card" id="profileCard">
        <div id="profileInfo">იტვირთება...</div>
    </div>
    
    <div id="postsSection"></div>
    
    <a href="chat.html" class="back-link">← ჩატში დაბრუნება</a>
</div>

<script>
    const supabase = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co",
        "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
    );
    
    let myNick = localStorage.getItem('nickname') || 'მოთამაშე';
    let myAvatar = localStorage.getItem('avatar') || 'https://i.ibb.co/v3m6y6R/avatar.png';
    let currentUser = new URLSearchParams(window.location.search).get('user') || myNick;
    let isOwnProfile = (currentUser === myNick);
    
    async function loadProfile() {
        // პროფილის ჩატვირთვა
        const { data: profile } = await supabase.from('profiles').select('*').eq('username', currentUser).single();
        if (!profile) {
            document.getElementById('profileCard').innerHTML = '<div class="empty">❌ მომხმარებელი არ მოიძებნა</div>';
            return;
        }
        
        document.getElementById('profileCard').innerHTML = `
            <img src="${profile.avatar_url || myAvatar}" onerror="this.src='${myAvatar}'">
            <div style="font-size:1.3rem; font-weight:bold; margin-top:10px;">${escapeHtml(profile.username)}</div>
            <div style="color:#888;">${translateRole(profile.role)}</div>
            <div class="status" onclick="changeStatus()">💬 ${escapeHtml(profile.status || 'სტატუსი არ არის')}</div>
        `;
        
        // პოსტების ჩატვირთვა
        loadPosts();
    }
    
    async function loadPosts() {
        const { data: posts } = await supabase.from('profile_posts').select('*').eq('user_name', currentUser).order('created_at', { ascending: false });
        
        let html = '';
        
        if (isOwnProfile) {
            html += `
                <div class="create-post">
                    <textarea id="newPost" rows="3" placeholder="რა გინდა რომ გააზიარო?..."></textarea>
                    <button onclick="createPost()">📝 გაზიარება</button>
                </div>
            `;
        }
        
        if (!posts || posts.length === 0) {
            html += '<div class="empty">📝 პოსტები არ არის</div>';
        } else {
            for (let post of posts) {
                const { data: comments } = await supabase.from('post_comments').select('*').eq('post_id', post.id).order('created_at', { ascending: false });
                html += `
                    <div class="post-card">
                        <div><strong>${escapeHtml(post.user_name)}</strong> <span style="font-size:11px; color:#888;">${new Date(post.created_at).toLocaleString()}</span></div>
                        <div style="margin: 12px 0;">${escapeHtml(post.content)}</div>
                        <div><span class="like-btn" onclick="likePost(${post.id})">❤️ ${post.likes || 0}</span></div>
                        <div id="comments-${post.id}" style="margin-top: 12px;">
                            ${renderComments(comments)}
                        </div>
                        <div class="add-comment">
                            <input type="text" id="comment-${post.id}" placeholder="დაწერე კომენტარი...">
                            <button onclick="addComment(${post.id})">💬</button>
                        </div>
                    </div>
                `;
            }
        }
        
        document.getElementById('postsSection').innerHTML = html;
    }
    
    function renderComments(comments) {
        if (!comments || comments.length === 0) return '<div style="color:#888;">💬 კომენტარები არ არის</div>';
        return comments.map(c => `
            <div class="comment">
                <strong>${escapeHtml(c.user_name)}</strong> ${escapeHtml(c.comment)}
                <div style="font-size:10px; color:#888;">${new Date(c.created_at).toLocaleString()}</div>
            </div>
        `).join('');
    }
    
    async function changeStatus() {
        if (!isOwnProfile) return;
        const newStatus = prompt("ახალი სტატუსი:", "");
        if (newStatus !== null) {
            const { error } = await supabase.from('profiles').update({ status: newStatus }).eq('username', myNick);
            if (error) {
                alert("შეცდომა: " + error.message);
            } else {
                alert("✅ სტატუსი განახლდა!");
                loadProfile();
            }
        }
    }
    
    async function createPost() {
        const content = document.getElementById('newPost').value.trim();
        if (!content) return alert("ჩაწერე პოსტი!");
        
        const { error } = await supabase.from('profile_posts').insert({ 
            user_name: myNick, 
            content: content, 
            likes: 0 
        });
        
        if (error) {
            alert("შეცდომა: " + error.message);
        } else {
            document.getElementById('newPost').value = '';
            alert("✅ პოსტი დაემატა!");
            loadPosts();
        }
    }
    
    async function likePost(postId) {
        const { data: post } = await supabase.from('profile_posts').select('likes').eq('id', postId).single();
        await supabase.from('profile_posts').update({ likes: (post.likes || 0) + 1 }).eq('id', postId);
        loadPosts();
    }
    
    async function addComment(postId) {
        const input = document.getElementById(`comment-${postId}`);
        const comment = input.value.trim();
        if (!comment) return;
        
        const { error } = await supabase.from('post_comments').insert({ 
            post_id: postId, 
            user_name: myNick, 
            comment: comment 
        });
        
        if (error) {
            alert("შეცდომა: " + error.message);
        } else {
            input.value = '';
            loadPosts();
        }
    }
    
    function translateRole(role) {
        const roles = {'Owner':'👑 დამფუძნებელი', 'Admin':'🛡️ ადმინისტრატორი', 'Member':'👤 მომხმარებელი'};
        return roles[role] || '👤 მომხმარებელი';
    }
    
    function escapeHtml(t) { return t?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) || ''; }
    
    window.likePost = likePost;
    window.addComment = addComment;
    window.createPost = createPost;
    window.changeStatus = changeStatus;
    
    loadProfile();
</script>
</body>
</html>
