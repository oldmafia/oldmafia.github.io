<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - პროფილი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body.night-mode {
            --bg: #030000;
            --sidebar: #0a0202;
            --card: #1a0a0a;
            --text: #eee;
            --border: #882222;
            --accent: #ff8888;
            --hover: #2a0a0a;
        }
        body.day-mode {
            --bg: #f0f2f5;
            --sidebar: #ffffff;
            --card: #ffffff;
            --text: #1c1e21;
            --border: #dddfe2;
            --accent: #c55a3a;
            --hover: #f0f2f5;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* ========= მარცხენა მენიუ ========= */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .logo {
            padding: 16px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }
        .menu-items {
            flex: 1;
            padding: 12px 0;
        }
        .menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text);
            text-decoration: none;
        }
        .menu-item:hover { background: var(--hover); }
        .menu-item.active { background: var(--accent); color: white; }
        .menu-icon { font-size: 1.3rem; width: 28px; }
        
        .bottom-menu {
            border-top: 1px solid var(--border);
            padding: 12px 0;
        }
        
        /* ========= მარჯვენა მხარე - პროფილი ========= */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        /* პროფილის ქავერი */
        .cover {
            height: 200px;
            background: linear-gradient(135deg, #882222, #442222);
            border-radius: 16px;
            position: relative;
        }
        
        .avatar-wrapper {
            margin-top: -60px;
            padding: 0 20px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--card);
            object-fit: cover;
            background: var(--card);
        }
        
        .profile-info {
            padding: 16px 20px;
        }
        .profile-name {
            font-size: 1.8rem;
            font-weight: bold;
        }
        .profile-role {
            color: #888;
            margin-top: 4px;
        }
        .profile-status {
            background: var(--card);
            padding: 8px 16px;
            border-radius: 30px;
            margin: 12px 0;
            border: 1px solid var(--border);
            cursor: pointer;
            display: inline-block;
        }
        
        .stats-row {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .stat-card {
            background: var(--card);
            flex: 1;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent);
        }
        
        .friends-section {
            margin-top: 20px;
        }
        .friends-section h3 {
            margin-bottom: 16px;
        }
        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .friend-card {
            background: var(--card);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
        }
        .friend-card img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .friend-card .friend-name {
            flex: 1;
            font-weight: 500;
        }
        .friend-card button {
            background: var(--accent);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        
        .empty { text-align: center; padding: 40px; color: #888; }
        .add-friend-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            width: 100%;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        
        @media (max-width: 700px) {
            .sidebar { width: 70px; }
            .menu-item span:last-child { display: none; }
            .logo { text-align: center; padding: 16px 0; font-size: 1.2rem; }
            .menu-icon { font-size: 1.5rem; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

<!-- მარცხენა მენიუ -->
<div class="sidebar">
    <div class="logo">🃏 MF</div>
    <div class="menu-items">
        <div class="menu-item" onclick="location.href='chat.html'">
            <div class="menu-icon">💬</div>
            <span>ჩატი</span>
        </div>
        <div class="menu-item active">
            <div class="menu-icon">👤</div>
            <span>ჩემი პროფილი</span>
        </div>
        <div class="menu-item" onclick="location.href='friends.html'">
            <div class="menu-icon">👥</div>
            <span>მეგობრები</span>
        </div>
    </div>
    <div class="bottom-menu">
        <div class="menu-item" onclick="setThemeToggle()">
            <div class="menu-icon" id="themeIcon">🌙</div>
            <span>რეჟიმი</span>
        </div>
    </div>
</div>

<!-- მარჯვენა მხარე - პროფილი -->
<div class="main" id="mainContent"></div>

<script>
    const supabase = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co",
        "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
    );
    
    let myNick = localStorage.getItem('nickname') || 'მოთამაშე';
    let currentUser = myNick;
    
    function setTheme(theme) {
        const body = document.body;
        body.classList.remove('night-mode', 'day-mode');
        if (theme === 'day') {
            body.classList.add('day-mode');
            document.getElementById('themeIcon').innerHTML = '☀️';
            localStorage.setItem('theme', 'day');
        } else {
            body.classList.add('night-mode');
            document.getElementById('themeIcon').innerHTML = '🌙';
            localStorage.setItem('theme', 'night');
        }
    }
    
    function setThemeToggle() {
        const isNight = document.body.classList.contains('night-mode');
        setTheme(isNight ? 'day' : 'night');
    }
    
    async function loadProfile() {
        const { data: profile } = await supabase
            .from('profiles')
            .select('*')
            .eq('username', currentUser)
            .single();
        
        if (!profile) {
            document.getElementById('mainContent').innerHTML = '<div class="empty">❌ მომხმარებელი არ მოიძებნა</div>';
            return;
        }
        
        const { data: friends } = await supabase
            .from('friends')
            .select('friend_name')
            .eq('user_name', currentUser);
        
        // მეგობრების ავატარები
        let friendsWithAvatars = [];
        if (friends && friends.length > 0) {
            const friendNames = friends.map(f => f.friend_name);
            const { data: friendProfiles } = await supabase
                .from('profiles')
                .select('username, avatar_url')
                .in('username', friendNames);
            
            const avatarMap = {};
            friendProfiles?.forEach(fp => { avatarMap[fp.username] = fp.avatar_url; });
            
            friendsWithAvatars = friends.map(f => ({
                name: f.friend_name,
                avatar: avatarMap[f.friend_name] || 'https://i.ibb.co/v3m6y6R/avatar.png'
            }));
        }
        
        let friendsHtml = '';
        if (friendsWithAvatars.length === 0) {
            friendsHtml = '<div class="empty">📭 ჯერ არ გყავს მეგობრები</div>';
        } else {
            friendsHtml = '<div class="friends-grid">' + friendsWithAvatars.map(f => `
                <div class="friend-card">
                    <img src="${f.avatar}" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                    <div class="friend-name">${escapeHtml(f.name)}</div>
                    <button onclick="location.href='pm.html?to=${f.name}'">💬</button>
                </div>
            `).join('') + '</div>';
        }
        
        const html = `
            <div class="cover"></div>
            <div class="avatar-wrapper">
                <img class="avatar" src="${profile.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
            </div>
            <div class="profile-info">
                <div class="profile-name">${escapeHtml(profile.username)}</div>
                <div class="profile-role">${translateRole(profile.role)}</div>
                <div class="profile-status" onclick="changeStatus()">💬 ${escapeHtml(profile.status || 'სტატუსი არ არის')}</div>
                
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-number">${profile.points || 0}</div>
                        <div>🏆 ვიქტორინა</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${profile.cipher_points || 0}</div>
                        <div>🔐 შიფრო</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${friends?.length || 0}</div>
                        <div>👥 მეგობარი</div>
                    </div>
                </div>
                
                <div class="friends-section">
                    <h3>👥 მეგობრები</h3>
                    ${friendsHtml}
                </div>
            </div>
        `;
        
        document.getElementById('mainContent').innerHTML = html;
    }
    
    async function changeStatus() {
        const newStatus = prompt("ახალი სტატუსი:", "");
        if (newStatus !== null) {
            await supabase.from('profiles').update({ status: newStatus }).eq('username', myNick);
            loadProfile();
        }
    }
    
    function translateRole(role) {
        const roles = {'Owner': '👑 დამფუძნებელი', 'Admin': '🛡️ ადმინისტრატორი', 'Member': '👤 მომხმარებელი'};
        return roles[role] || '👤 მომხმარებელი';
    }
    
    function escapeHtml(t) { return t?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) || ''; }
    
    // თავდაპირველი რეჟიმი
    const savedTheme = localStorage.getItem('theme') || 'night';
    setTheme(savedTheme);
    
    loadProfile();
</script>
</body>
</html>
