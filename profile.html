<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👤 პროფილი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s ease, color 0.2s ease; }
        
        body.night-mode {
            --bg: #030000;
            --card: #1a0a0a;
            --text: #eee;
            --border: #882222;
            --accent: #ff8888;
            --hover: #2a0a0a;
            --input: #1a0808;
        }
        body.day-mode {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1c1e21;
            --border: #dddfe2;
            --accent: #c55a3a;
            --hover: #f0f2f5;
            --input: #ffffff;
            background-image: radial-gradient(circle at 15% 25%, rgba(255,77,77,0.15) 3px, transparent 3px);
            background-size: 55px 55px;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        /* ზედა ზოლი */
        .top-bar {
            background: var(--card);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .top-bar a {
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
        }
        
        /* მთავარი კონტეინერი (3 სვეტი) */
        .container {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }
        
        /* მარცხენა სვეტი */
        .left-column {
            width: 280px;
            flex-shrink: 0;
        }
        .profile-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .profile-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
        }
        .profile-card .name { font-size: 1.3rem; font-weight: bold; }
        .profile-card .role { 
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            margin-top: 8px;
        }
        .role-owner { background: #8b2c2c; color: #ffd966; }
        .role-admin { background: #1a4a6a; color: #66ccff; }
        .role-member { background: #2a2a1a; color: #ccccaa; }
        .profile-card .status {
            margin-top: 12px;
            padding: 8px;
            background: var(--hover);
            border-radius: 30px;
            cursor: pointer;
        }
        
        .friends-list {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
        }
        .friends-list h3 { margin-bottom: 12px; font-size: 1rem; }
        .friend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            cursor: pointer;
        }
        .friend-item img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        /* ცენტრალური სვეტი (პოსტები) */
        .center-column {
            flex: 1;
        }
        .create-post {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .create-post textarea {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--input);
            color: var(--text);
            resize: vertical;
            font-size: 14px;
        }
        .create-post button {
            margin-top: 10px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .post-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-header img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .post-author { font-weight: bold; }
        .post-time { font-size: 11px; color: #888; }
        .post-content { margin: 12px 0; line-height: 1.4; }
        .post-stats {
            display: flex;
            gap: 20px;
            padding: 8px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin: 10px 0;
        }
        .post-stats span { cursor: pointer; }
        .comments-section { margin-top: 12px; }
        .comment {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .comment-author { font-weight: bold; color: var(--accent); }
        .add-comment {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .add-comment input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--input);
            color: var(--text);
        }
        .add-comment button {
            background: var(--accent);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
        }
        
        /* მარჯვენა სვეტი */
        .right-column {
            width: 280px;
            flex-shrink: 0;
        }
        .online-list, .games-list {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .online-list h3, .games-list h3 { margin-bottom: 12px; font-size: 1rem; }
        .online-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }
        .online-dot {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
        }
        .game-item {
            padding: 8px 0;
            cursor: pointer;
            color: var(--accent);
        }
        
        .admin-buttons {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .admin-btn {
            background: #444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
        }
        
        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .left-column, .right-column { width: 100%; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">🃏 OLD MAFIA</div>
    <a href="chat.html">← ჩატში</a>
</div>

<div class="container" id="profileContainer"></div>

<script>
    const supabase = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co",
        "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
    );
    
    let myNick = localStorage.getItem('nickname') || 'მოთამაშე';
    let myRole = localStorage.getItem('role') || 'Member';
    let currentUser = new URLSearchParams(window.location.search).get('user') || myNick;
    let isOwnProfile = (currentUser === myNick);
    
    function setTheme() {
        const theme = localStorage.getItem('theme') || 'night';
        document.body.classList.remove('night-mode', 'day-mode');
        document.body.classList.add(theme === 'day' ? 'day-mode' : 'night-mode');
    }
    
    function getRoleClass(role) {
        const roles = {'Owner':'role-owner', 'Admin':'role-admin', 'Member':'role-member'};
        return roles[role] || 'role-member';
    }
    
    async function loadProfile() {
        // პროფილი
        const { data: profile } = await supabase.from('profiles').select('*').eq('username', currentUser).single();
        if (!profile) { document.getElementById('profileContainer').innerHTML = '<div style="padding:40px; text-align:center;">❌ მომხმარებელი არ მოიძებნა</div>'; return; }
        
        // მეგობრები
        const { data: friends } = await supabase.from('friends').select('friend_name').eq('user_name', currentUser);
        let friendsHtml = '';
        if (friends?.length) {
            const friendNames = friends.map(f => f.friend_name);
            const { data: friendProfiles } = await supabase.from('profiles').select('username, avatar_url').in('username', friendNames);
            const avatarMap = {};
            friendProfiles?.forEach(fp => { avatarMap[fp.username] = fp.avatar_url; });
            friendsHtml = friends.map(f => `
                <div class="friend-item" onclick="location.href='?user=${f.friend_name}'">
                    <img src="${avatarMap[f.friend_name] || 'https://i.ibb.co/v3m6y6R/avatar.png'}" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                    <span>${escapeHtml(f.friend_name)}</span>
                </div>
            `).join('');
        } else {
            friendsHtml = '<div style="padding:12px 0; color:#888;">📭 მეგობრები არ არის</div>';
        }
        
        // პოსტები
        const { data: posts } = await supabase.from('profile_posts').select('*').eq('user_name', currentUser).order('created_at', { ascending: false });
        let postsHtml = '';
        if (posts?.length) {
            for (let post of posts) {
                const { data: comments } = await supabase.from('post_comments').select('*').eq('post_id', post.id).order('created_at', { ascending: false });
                postsHtml += `
                    <div class="post-card" id="post-${post.id}">
                        <div class="post-header">
                            <img src="${profile.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}">
                            <div>
                                <div class="post-author">${escapeHtml(post.user_name)}</div>
                                <div class="post-time">${new Date(post.created_at).toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        <div class="post-stats">
                            <span onclick="likePost(${post.id})">❤️ ${post.likes || 0}</span>
                        </div>
                        <div class="comments-section" id="comments-${post.id}">
                            ${renderComments(comments)}
                        </div>
                        <div class="add-comment">
                            <input type="text" id="comment-${post.id}" placeholder="დაწერე კომენტარი...">
                            <button onclick="addComment(${post.id})">💬</button>
                        </div>
                    </div>
                `;
            }
        } else {
            postsHtml = '<div style="padding:20px; text-align:center; color:#888;">📝 პოსტები არ არის</div>';
        }
        
        // ონლაინი
        const { data: onlineUsers } = await supabase.from('profiles').select('username, avatar_url').gt('last_online', new Date(Date.now() - 5*60*1000).toISOString());
        let onlineHtml = '';
        onlineUsers?.forEach(u => {
            if (u.username !== currentUser) {
                onlineHtml += `<div class="online-item" onclick="location.href='?user=${u.username}'"><div class="online-dot"></div><img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" style="width:30px; height:30px; border-radius:50%;"><span>${escapeHtml(u.username)}</span></div>`;
            }
        });
        
        // ადმინის ღილაკები
        let adminButtons = '';
        if (myRole === 'Owner' && !isOwnProfile) {
            adminButtons = `
                <div class="admin-buttons">
                    <button class="admin-btn" onclick="setUserRole('Admin')">🛡️ ადმინად</button>
                    <button class="admin-btn" onclick="setUserRole('Member')">👤 მომხმარებლად</button>
                    <button class="admin-btn" style="background:#882222;" onclick="setUserRole('Banned')">🚫 დაბლოკვა</button>
                </div>
            `;
        } else if (myRole === 'Admin' && !isOwnProfile && profile.role !== 'Owner') {
            adminButtons = `
                <div class="admin-buttons">
                    <button class="admin-btn" onclick="setUserRole('Member')">👤 მომხმარებლად</button>
                    <button class="admin-btn" style="background:#882222;" onclick="setUserRole('Banned')">🚫 დაბლოკვა</button>
                </div>
            `;
        }
        
        // მეგობრის დამატების ღილაკი
        let friendBtn = '';
        if (!isOwnProfile) {
            const { data: isFriend } = await supabase.from('friends').select('id').eq('user_name', myNick).eq('friend_name', currentUser).maybeSingle();
            friendBtn = !isFriend ? 
                `<button style="width:100%; margin-top:12px; background:var(--accent); border:none; padding:8px; border-radius:30px; cursor:pointer;" onclick="addFriend()">➕ მეგობრად დამატება</button>` :
                `<button style="width:100%; margin-top:12px; background:#882222; border:none; padding:8px; border-radius:30px; cursor:pointer;" onclick="removeFriend()">💔 მეგობრიდან წაშლა</button>`;
        }
        
        const html = `
            <div class="left-column">
                <div class="profile-card">
                    <img src="${profile.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                    <div class="name">${escapeHtml(profile.username)}</div>
                    <div class="role ${getRoleClass(profile.role)}">${translateRole(profile.role)}</div>
                    <div class="status" onclick="changeStatus()">💬 ${escapeHtml(profile.status || 'სტატუსი არ არის')}</div>
                    ${friendBtn}
                    ${adminButtons}
                </div>
                <div class="friends-list">
                    <h3>👥 მეგობრები (${friends?.length || 0})</h3>
                    ${friendsHtml}
                </div>
            </div>
            <div class="center-column">
                ${isOwnProfile ? `
                <div class="create-post">
                    <textarea id="newPost" rows="3" placeholder="რა გინდა რომ გააზიარო?..."></textarea>
                    <button onclick="createPost()">📝 გაზიარება</button>
                </div>
                ` : ''}
                ${postsHtml}
            </div>
            <div class="right-column">
                <div class="online-list">
                    <h3>🟢 ონლაინში</h3>
                    ${onlineHtml || '<div style="padding:12px 0; color:#888;">სხვა აქტიური მომხმარებლები არ არიან</div>'}
                </div>
                <div class="games-list">
                    <h3>🎮 თამაშები</h3>
                    <div class="game-item" onclick="location.href='joker.html'">🃏 ჯოკერი</div>
                    <div class="game-item" onclick="location.href='nardi.html'">🎲 ნარდი</div>
                    <div class="game-item" onclick="location.href='forum.html'">📝 ფორუმი</div>
                    <div class="game-item" onclick="location.href='hangman.html'">🪢 ჩამოხრჩობანა</div>
                </div>
            </div>
        `;
        
        document.getElementById('profileContainer').innerHTML = html;
    }
    
    function renderComments(comments) {
        if (!comments?.length) return '<div style="padding:8px 0; color:#888;">💬 კომენტარები არ არის</div>';
        return comments.map(c => `
            <div class="comment">
                <span class="comment-author">${escapeHtml(c.user_name)}</span>
                <span> ${escapeHtml(c.comment)}</span>
                <div style="font-size:10px; color:#888;">${new Date(c.created_at).toLocaleString()}</div>
            </div>
        `).join('');
    }
    
    async function changeStatus() {
        if (!isOwnProfile) return;
        const newStatus = prompt("ახალი სტატუსი:", "");
        if (newStatus !== null) {
            await supabase.from('profiles').update({ status: newStatus }).eq('username', myNick);
            loadProfile();
        }
    }
    
    async function addFriend() {
        await supabase.from('friends').insert({ user_name: myNick, friend_name: currentUser });
        loadProfile();
    }
    
    async function removeFriend() {
        await supabase.from('friends').delete().eq('user_name', myNick).eq('friend_name', currentUser);
        loadProfile();
    }
    
    async function createPost() {
        const content = document.getElementById('newPost').value.trim();
        if (!content) return alert("ჩაწერე პოსტი!");
        await supabase.from('profile_posts').insert({ user_name: myNick, content, likes: 0 });
        document.getElementById('newPost').value = '';
        loadProfile();
    }
    
    async function likePost(postId) {
        const { data: post } = await supabase.from('profile_posts').select('likes').eq('id', postId).single();
        await supabase.from('profile_posts').update({ likes: (post.likes || 0) + 1 }).eq('id', postId);
        loadProfile();
    }
    
    async function addComment(postId) {
        const input = document.getElementById(`comment-${postId}`);
        const comment = input.value.trim();
        if (!comment) return;
        await supabase.from('post_comments').insert({ post_id: postId, user_name: myNick, comment });
        input.value = '';
        loadProfile();
    }
    
    async function setUserRole(role) {
        if (!confirm(`დარწმუნებული ხარ? ${currentUser} გახდება ${role}`)) return;
        await supabase.from('profiles').update({ role }).eq('username', currentUser);
        loadProfile();
    }
    
    function translateRole(role) {
        const roles = {'Owner':'👑 დამფუძნებელი', 'Admin':'🛡️ ადმინისტრატორი', 'Member':'👤 მომხმარებელი', 'Banned':'🚫 დაბლოკილი'};
        return roles[role] || '👤 მომხმარებელი';
    }
    
    function escapeHtml(t) { return t?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) || ''; }
    
    window.likePost = likePost;
    window.addComment = addComment;
    window.createPost = createPost;
    window.setUserRole = setUserRole;
    window.addFriend = addFriend;
    window.removeFriend = removeFriend;
    window.changeStatus = changeStatus;
    
    setTheme();
    loadProfile();
    
    window.addEventListener('storage', (e) => {
        if (e.key === 'theme') setTheme();
    });
</script>
</body>
</html>
