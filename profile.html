<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👤 პროფილი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body.night-mode {
            --bg: #030000;
            --card: #1a0a0a;
            --text: #eee;
            --border: #882222;
            --accent: #ff8888;
        }
        body.day-mode {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1c1e21;
            --border: #dddfe2;
            --accent: #c55a3a;
            background-image: none;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 0;
            margin: 0;
        }
        
        /* ზედა ზოლი */
        .top-bar {
            background: var(--card);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-bar h1 {
            font-size: 1.4rem;
            color: var(--accent);
        }
        .top-bar a {
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
        }
        
        /* ქავერი */
        .cover {
            height: 180px;
            background: linear-gradient(135deg, #882222, #442222);
            position: relative;
        }
        
        /* ავატარი */
        .avatar-wrapper {
            position: relative;
            margin-top: -60px;
            padding: 0 16px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--card);
            object-fit: cover;
            background: var(--card);
        }
        
        /* ინფო */
        .info {
            padding: 12px 16px;
        }
        .name {
            font-size: 1.8rem;
            font-weight: bold;
        }
        .role {
            color: #888;
            margin-top: 4px;
        }
        .status {
            background: var(--card);
            padding: 10px 16px;
            border-radius: 30px;
            margin: 12px 0;
            border: 1px solid var(--border);
            cursor: pointer;
            display: inline-block;
        }
        
        /* სტატისტიკა */
        .stats-row {
            display: flex;
            gap: 12px;
            margin: 16px 0;
        }
        .stat-box {
            background: var(--card);
            flex: 1;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-number {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--accent);
        }
        
        /* ჩანართები */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-top: 16px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .tab.active {
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
        }
        
        /* მეგობრების სია */
        .friends-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
        }
        .friend-card {
            background: var(--card);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
        }
        .friend-card img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .friend-card .friend-name {
            flex: 1;
            font-weight: 500;
        }
        .friend-card button {
            background: var(--accent);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .add-friend-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 30px;
            width: calc(100% - 32px);
            margin: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>👤 პროფილი</h1>
    <a href="chat.html">← ჩატში</a>
</div>

<div id="profileContent"></div>

<script>
    const supabase = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co",
        "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
    );
    
    let myNick = localStorage.getItem('nickname') || 'მოთამაშე';
    let targetUser = new URLSearchParams(window.location.search).get('user') || myNick;
    let currentUser = targetUser;
    let activeTab = 'friends';
    
    function setTheme() {
        const theme = localStorage.getItem('theme') || 'night';
        document.body.classList.remove('night-mode', 'day-mode');
        document.body.classList.add(theme === 'day' ? 'day-mode' : 'night-mode');
    }
    
    async function loadProfile() {
        const { data: profile } = await supabase
            .from('profiles')
            .select('*')
            .eq('username', currentUser)
            .single();
        
        if (!profile) {
            document.getElementById('profileContent').innerHTML = '<div class="empty">❌ მომხმარებელი არ მოიძებნა</div>';
            return;
        }
        
        const { data: friends } = await supabase
            .from('friends')
            .select('friend_name')
            .eq('user_name', currentUser);
        
        const isOwnProfile = (currentUser === myNick);
        
        // მეგობრების ავატარები
        let friendsHtml = '';
        if (!friends || friends.length === 0) {
            friendsHtml = '<div class="empty">📭 ჯერ არ გყავს მეგობრები</div>';
        } else {
            for (let f of friends) {
                const { data: fp } = await supabase
                    .from('profiles')
                    .select('avatar_url')
                    .eq('username', f.friend_name)
                    .single();
                friendsHtml += `
                    <div class="friend-card">
                        <img src="${fp?.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                        <div class="friend-name">${escapeHtml(f.friend_name)}</div>
                        <button onclick="location.href='pm.html?to=${f.friend_name}'">💬</button>
                    </div>
                `;
            }
        }
        
        // მეგობრის დამატების ღილაკი (სხვის პროფილზე)
        let addFriendBtn = '';
        if (!isOwnProfile) {
            const { data: isFriend } = await supabase
                .from('friends')
                .select('id')
                .eq('user_name', myNick)
                .eq('friend_name', currentUser)
                .single();
            
            if (!isFriend) {
                addFriendBtn = `<button class="add-friend-btn" onclick="addFriend()">➕ მეგობრად დამატება</button>`;
            } else {
                addFriendBtn = `<button class="add-friend-btn" style="background:#882222;" onclick="removeFriend()">💔 მეგობრიდან წაშლა</button>`;
            }
        }
        
        const html = `
            <div class="cover"></div>
            
            <div class="avatar-wrapper">
                <img class="avatar" src="${profile.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
            </div>
            
            <div class="info">
                <div class="name">${escapeHtml(profile.username)}</div>
                <div class="role">${translateRole(profile.role)}</div>
                <div class="status" onclick="changeStatus()">💬 ${escapeHtml(profile.status || 'სტატუსი არ არის')}</div>
                
                <div class="stats-row">
                    <div class="stat-box">
                        <div class="stat-number">${profile.points || 0}</div>
                        <div>🏆 ვიქტორინა</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${profile.cipher_points || 0}</div>
                        <div>🔐 შიფრო</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${friends?.length || 0}</div>
                        <div>👥 მეგობარი</div>
                    </div>
                </div>
            </div>
            
            <div class="tabs">
                <div class="tab ${activeTab === 'friends' ? 'active' : ''}" onclick="switchTab('friends')">👥 მეგობრები</div>
            </div>
            
            <div id="friendsTab" class="friends-grid">
                ${friendsHtml}
            </div>
            
            ${addFriendBtn}
        `;
        
        document.getElementById('profileContent').innerHTML = html;
    }
    
    function switchTab(tab) {
        activeTab = tab;
        loadProfile();
    }
    
    async function changeStatus() {
        if (currentUser !== myNick) return;
        const newStatus = prompt("ახალი სტატუსი:", "");
        if (newStatus !== null) {
            await supabase.from('profiles').update({ status: newStatus }).eq('username', myNick);
            loadProfile();
        }
    }
    
    async function addFriend() {
        const { error } = await supabase.from('friends').insert({
            user_name: myNick,
            friend_name: currentUser
        });
        if (error) alert("ვერ დაემატა: " + error.message);
        else loadProfile();
    }
    
    async function removeFriend() {
        const { error } = await supabase.from('friends')
            .delete()
            .eq('user_name', myNick)
            .eq('friend_name', currentUser);
        if (error) alert("ვერ წაიშალა: " + error.message);
        else loadProfile();
    }
    
    function translateRole(role) {
        const roles = {'Owner': '👑 დამფუძნებელი', 'Admin': '🛡️ ადმინისტრატორი', 'Member': '👤 მომხმარებელი'};
        return roles[role] || '👤 მომხმარებელი';
    }
    
    function escapeHtml(t) { return t?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) || ''; }
    
    window.switchTab = switchTab;
    window.changeStatus = changeStatus;
    window.addFriend = addFriend;
    window.removeFriend = removeFriend;
    
    setTheme();
    loadProfile();
    
    window.addEventListener('storage', (e) => {
        if (e.key === 'theme') setTheme();
    });
</script>
</body>
</html>
