<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👤 პროფილი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        .top-bar {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: #c55a3a; }
        .top-bar a {
            background: #c55a3a;
            color: white;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
        }
        
        .container {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .left-column {
            width: 280px;
            flex-shrink: 0;
        }
        .profile-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .profile-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-card .name { font-size: 1.3rem; font-weight: bold; margin-top: 10px; }
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            margin: 8px 0;
            background: #2a2a1a;
            color: #ccccaa;
        }
        .status {
            margin-top: 12px;
            padding: 8px;
            background: #f0f2f5;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .friends-list {
            background: white;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #ddd;
        }
        .friends-list h3 { margin-bottom: 12px; font-size: 1rem; }
        .friend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            cursor: pointer;
        }
        .friend-item img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .center-column {
            flex: 1;
            min-width: 280px;
        }
        .create-post {
            background: white;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .create-post textarea {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #ddd;
            resize: vertical;
            font-family: inherit;
        }
        .create-post button {
            margin-top: 10px;
            background: #c55a3a;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .post-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #ddd;
            margin-bottom: 16px;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-header img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .post-author { font-weight: bold; }
        .post-time { font-size: 11px; color: #888; }
        .post-content { margin: 12px 0; }
        .post-stats { padding: 8px 0; border-top: 1px solid #ddd; margin-top: 10px; }
        .like-btn { cursor: pointer; }
        
        .comments-section { margin-top: 12px; }
        .comment {
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
            font-size: 13px;
        }
        .comment-author { font-weight: bold; color: #c55a3a; }
        .add-comment {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .add-comment input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid #ddd;
        }
        .add-comment button {
            background: #c55a3a;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
        }
        
        .right-column {
            width: 280px;
            flex-shrink: 0;
        }
        .online-list, .games-list {
            background: white;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .online-list h3, .games-list h3 { margin-bottom: 12px; font-size: 1rem; }
        .online-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            cursor: pointer;
        }
        .online-dot {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
        }
        .online-item img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }
        .game-item {
            padding: 8px 0;
            cursor: pointer;
            color: #c55a3a;
        }
        
        .empty { padding: 20px; text-align: center; color: #888; }
        
        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .left-column, .right-column { width: 100%; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">🃏 OLD MAFIA</div>
    <a href="chat.html">← ჩატში</a>
</div>

<div class="container" id="profileContainer"></div>

<script>
    const supabase = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co",
        "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
    );
    
    let myNick = localStorage.getItem('nickname') || 'მოთამაშე';
    let currentUser = new URLSearchParams(window.location.search).get('user') || myNick;
    let isOwnProfile = (currentUser === myNick);
    
    async function loadProfile() {
        // პროფილი
        const { data: profile } = await supabase.from('profiles').select('*').eq('username', currentUser).single();
        if (!profile) {
            document.getElementById('profileContainer').innerHTML = '<div class="empty">❌ მომხმარებელი არ მოიძებნა</div>';
            return;
        }
        
        // მეგობრები
        const { data: friends } = await supabase.from('friends').select('friend_name').eq('user_name', currentUser);
        let friendsHtml = '';
        if (friends?.length) {
            const friendNames = friends.map(f => f.friend_name);
            const { data: friendProfiles } = await supabase.from('profiles').select('username, avatar_url').in('username', friendNames);
            const avatarMap = {};
            friendProfiles?.forEach(fp => avatarMap[fp.username] = fp.avatar_url);
            friendsHtml = friends.map(f => `
                <div class="friend-item" onclick="location.href='?user=${f.friend_name}'">
                    <img src="${avatarMap[f.friend_name] || 'https://i.ibb.co/v3m6y6R/avatar.png'}" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                    <span>${escapeHtml(f.friend_name)}</span>
                </div>
            `).join('');
        } else {
            friendsHtml = '<div class="empty">📭 მეგობრები არ არის</div>';
        }
        
        // ონლაინი
        const { data: onlineUsers } = await supabase.from('profiles').select('username, avatar_url').gt('last_online', new Date(Date.now() - 5*60*1000).toISOString());
        let onlineHtml = '';
        onlineUsers?.forEach(u => {
            if (u.username !== currentUser) {
                onlineHtml += `
                    <div class="online-item" onclick="location.href='?user=${u.username}'">
                        <div class="online-dot"></div>
                        <img src="${u.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                        <span>${escapeHtml(u.username)}</span>
                    </div>
                `;
            }
        });
        
        const html = `
            <div class="left-column">
                <div class="profile-card">
                    <img src="${profile.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}" onerror="this.src='https://i.ibb.co/v3m6y6R/avatar.png'">
                    <div class="name">${escapeHtml(profile.username)}</div>
                    <div class="role-badge">${translateRole(profile.role)}</div>
                    <div class="status" onclick="changeStatus()">💬 ${escapeHtml(profile.status || 'სტატუსი არ არის')}</div>
                </div>
                <div class="friends-list">
                    <h3>👥 მეგობრები (${friends?.length || 0})</h3>
                    ${friendsHtml}
                </div>
            </div>
            <div class="center-column">
                <div class="create-post">
                    <textarea id="newPost" rows="3" placeholder="რა გინდა რომ გააზიარო?..."></textarea>
                    <button onclick="createPost()">📝 გაზიარება</button>
                </div>
                <div id="postsList"></div>
            </div>
            <div class="right-column">
                <div class="online-list">
                    <h3>🟢 ონლაინში</h3>
                    ${onlineHtml || '<div class="empty">სხვა აქტიური მომხმარებლები არ არიან</div>'}
                </div>
                <div class="games-list">
                    <h3>🎮 თამაშები</h3>
                    <div class="game-item" onclick="location.href='joker.html'">🃏 ჯოკერი</div>
                    <div class="game-item" onclick="location.href='nardi.html'">🎲 ნარდი</div>
                    <div class="game-item" onclick="location.href='forum.html'">📝 ფორუმი</div>
                </div>
            </div>
        `;
        
        document.getElementById('profileContainer').innerHTML = html;
        
        // ჩატვირთე პოსტები
        loadPosts();
    }
    
    async function loadPosts() {
        const { data: posts } = await supabase.from('profile_posts').select('*').eq('user_name', currentUser).order('created_at', { ascending: false });
        const postsDiv = document.getElementById('postsList');
        if (!posts?.length) {
            postsDiv.innerHTML = '<div class="empty">📝 პოსტები არ არის</div>';
            return;
        }
        
        let html = '';
        for (let post of posts) {
            const { data: comments } = await supabase.from('post_comments').select('*').eq('post_id', post.id).order('created_at', { ascending: false });
            html += `
                <div class="post-card">
                    <div class="post-header">
                        <img src="${post.user_name === currentUser ? document.querySelector('.profile-card img')?.src || 'https://i.ibb.co/v3m6y6R/avatar.png' : 'https://i.ibb.co/v3m6y6R/avatar.png'}">
                        <div>
                            <div class="post-author">${escapeHtml(post.user_name)}</div>
                            <div class="post-time">${new Date(post.created_at).toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    <div class="post-stats">
                        <span class="like-btn" onclick="likePost(${post.id})">❤️ ${post.likes || 0}</span>
                    </div>
                    <div class="comments-section" id="comments-${post.id}">
                        ${renderComments(comments)}
                    </div>
                    <div class="add-comment">
                        <input type="text" id="comment-${post.id}" placeholder="დაწერე კომენტარი...">
                        <button onclick="addComment(${post.id})">💬</button>
                    </div>
                </div>
            `;
        }
        postsDiv.innerHTML = html;
    }
    
    function renderComments(comments) {
        if (!comments?.length) return '<div class="empty">💬 კომენტარები არ არის</div>';
        return comments.map(c => `
            <div class="comment">
                <span class="comment-author">${escapeHtml(c.user_name)}</span>
                <span> ${escapeHtml(c.comment)}</span>
                <div style="font-size:10px; color:#888;">${new Date(c.created_at).toLocaleString()}</div>
            </div>
        `).join('');
    }
    
    async function changeStatus() {
        if (!isOwnProfile) return;
        const newStatus = prompt("ახალი სტატუსი:", "");
        if (newStatus !== null) {
            await supabase.from('profiles').update({ status: newStatus }).eq('username', myNick);
            loadProfile();
        }
    }
    
    async function createPost() {
        const content = document.getElementById('newPost').value.trim();
        if (!content) return alert("ჩაწერე პოსტი!");
        await supabase.from('profile_posts').insert({ user_name: myNick, content, likes: 0 });
        document.getElementById('newPost').value = '';
        loadPosts();
    }
    
    async function likePost(postId) {
        const { data: post } = await supabase.from('profile_posts').select('likes').eq('id', postId).single();
        await supabase.from('profile_posts').update({ likes: (post.likes || 0) + 1 }).eq('id', postId);
        loadPosts();
    }
    
    async function addComment(postId) {
        const input = document.getElementById(`comment-${postId}`);
        const comment = input.value.trim();
        if (!comment) return;
        await supabase.from('post_comments').insert({ post_id: postId, user_name: myNick, comment });
        input.value = '';
        loadPosts();
    }
    
    function translateRole(role) {
        const roles = {'Owner':'👑 დამფუძნებელი', 'Admin':'🛡️ ადმინისტრატორი', 'Member':'👤 მომხმარებელი'};
        return roles[role] || '👤 მომხმარებელი';
    }
    
    function escapeHtml(t) { return t?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) || ''; }
    
    window.likePost = likePost;
    window.addComment = addComment;
    window.createPost = createPost;
    window.changeStatus = changeStatus;
    
    loadProfile();
</script>
</body>
</html>
