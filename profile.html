<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { border: 2px solid red; padding: 20px; display: inline-block; border-radius: 15px; background: #050000; }
        .btn { display: block; width: 100%; padding: 10px; margin-top: 5px; background: #200; color: white; border: 1px solid red; cursor: pointer; }
        #adm { display: none; margin-top: 15px; border-top: 1px dashed red; }
    </style>
</head>
<body>
    <div class="box">
        <h1 id="n">იტვირთება...</h1>
        <p id="r" style="color:gold"></p>
        <div id="adm">
            <button onclick="up('Owner')">👑 Owner</button>
            <button onclick="up('Admin')">🛡️ Admin</button>
            <button onclick="up('Member')">✨ Reset</button>
        </div>
        <button onclick="location.href='chat.html'">უკან</button>
    </div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    const p = new URLSearchParams(window.location.search);
    const target = p.get('user') || localStorage.getItem('nickname');
    const me = localStorage.getItem('nickname');

    async function start() {
        let { data: u } = await _s.from('profiles').select('*').eq('username', target).maybeSingle();
        if(u) {
            document.getElementById('n').innerText = u.username;
            document.getElementById('r').innerText = u.role || "Member";
            
            let { data: my } = await _s.from('profiles').select('role').eq('username', me).maybeSingle();
            if(my && (my.role === 'Admin' || my.role === 'Owner') && me !== target) {
                document.getElementById('adm').style.display = 'block';
            }
        } else { document.getElementById('n').innerText = "ვერ მოიძებნა"; }
    }

    async function up(role) {
        await _s.from('profiles').update({ role: role }).eq('username', target);
        location.reload();
    }
    start();
</script>
</body>
</html>
