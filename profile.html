<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პროფილი - Old Mafia</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        
        /* პროფილის ბარათი */
        .profile-card { background: #0d0d0d; border: 2px solid #ff0000; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        .avatar { width: 120px; height: 120px; border-radius: 15px; border: 2px solid red; margin: 0 auto 15px; background: #111 center/cover; position: relative; cursor: pointer; }
        .avatar:hover::after { content: "შეცვლა"; position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); font-size: 12px; padding: 5px 0; }
        
        h2 { margin: 10px 0; color: #ff0000; }
        .role-tag { font-size: 14px; color: #888; margin-bottom: 15px; }
        
        input[type="text"] { width: 90%; background: #111; border: 1px solid #333; padding: 10px; border-radius: 10px; color: #fff; margin-bottom: 10px; outline: none; }
        button { background: red; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        
        /* კომენტარების სექცია */
        .comments-section { width: 100%; max-width: 440px; background: #050505; border: 1px solid #222; border-radius: 15px; padding: 15px; }
        .comment-box { background: #111; border: 1px solid #222; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; }
        .comment-author { color: red; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar" id="pAvat" onclick="document.getElementById('fileInput').click()"></div>
        <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="uploadAvatar()">
        
        <h2 id="pNick">იტვირთება...</h2>
        <div class="role-tag" id="pRole"></div>
        
        <input type="text" id="pStatus" placeholder="დაწერე სტატუსი...">
        <button onclick="updateStatus()">განახლება</button>
        
        <div style="margin-top: 20px;">
            <a href="home.html" style="color: #555; text-decoration: none; font-size: 14px;">← ჩატში დაბრუნება</a>
        </div>
    </div>

    <div class="comments-section">
        <h3 style="color: #ff0000; font-size: 16px; border-bottom: 1px solid #222; padding-bottom: 10px;">💬 კომენტარები</h3>
        <div id="commentsContainer"></div>
        <div style="margin-top: 15px; display: flex; gap: 5px;">
            <input type="text" id="newComment" placeholder="დაწერე კომენტარი..." style="margin-bottom: 0;">
            <button onclick="postComment()" style="width: auto; margin-top: 0;">OK</button>
        </div>
    </div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let uId = null;
    let myNick = "";

    async function loadProfile() {
        const { data: { user } } = await client.auth.getUser();
        if (!user) return location.href = "index.html";
        uId = user.id;

        const { data: p } = await client.from('profiles').select('*').eq('id', uId).single();
        if (p) {
            myNick = p.username;
            document.getElementById('pNick').innerText = p.username;
            document.getElementById('pRole').innerText = p.role;
            document.getElementById('pStatus').value = p.status || "";
            if(p.avatar_url) document.getElementById('pAvat').style.backgroundImage = `url('${p.avatar_url}')`;
            
            loadComments();
        }
    }

    // 1. ფოტოს ატვირთვა
    async function uploadAvatar() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        const fileName = `avatar_${uId}_${Date.now()}`;
        
        // ატვირთვა 'avatars' ბაკეტში
        const { data, error } = await client.storage.from('avatars').upload(fileName, file);

        if (error) {
            alert("შეცდომა ატვირთვისას. დარწმუნდი რომ 'avatars' ბაკეტი შექმნილია!");
            return;
        }

        const { publicUrl } = client.storage.from('avatars').getPublicUrl(fileName).data;
        
        // ბაზაში განახლება
        await client.from('profiles').update({ avatar_url: publicUrl }).eq('id', uId);
        document.getElementById('pAvat').style.backgroundImage = `url('${publicUrl}')`;
        alert("ფოტო წარმატებით შეიცვალა!");
    }

    // 2. სტატუსის განახლება
    async function updateStatus() {
        const st = document.getElementById('pStatus').value;
        await client.from('profiles').update({ status: st }).eq('id', uId);
        alert("სტატუსი განახლდა!");
    }

    // 3. კომენტარების ჩატვირთვა
    async function loadComments() {
        const container = document.getElementById('commentsContainer');
        container.innerHTML = "";
        
        const { data } = await client.from('profile_comments')
            .select('*')
            .eq('profile_id', uId)
            .order('created_at', { ascending: false });

        if (data) {
            data.forEach(c => {
                container.innerHTML += `
                    <div class="comment-box">
                        <span class="comment-author">${c.author_name}:</span> ${c.comment_text}
                    </div>`;
            });
        }
    }

    // 4. კომენტარის დაწერა
    async function postComment() {
        const txt = document.getElementById('newComment').value.trim();
        if (!txt) return;

        await client.from('profile_comments').insert([{
            profile_id: uId,
            author_name: myNick,
            comment_text: txt
        }]);

        document.getElementById('newComment').value = "";
        loadComments();
    }

    loadProfile();
</script>
</body>
</html>
