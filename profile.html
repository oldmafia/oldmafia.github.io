<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პროფილი - KAIFMANIA</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }
        
        .profile-card { width: 100%; max-width: 400px; background: #0a0a0a; border: 2px solid red; border-radius: 25px; padding: 25px; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); }
        
        .avatar-circle { width: 100px; height: 100px; background: #111; border: 2px solid red; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        
        h2 { text-align: center; color: red; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .status-box { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #222; text-align: center; margin-bottom: 20px; font-style: italic; color: #ccc; }

        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 10px; outline: none; }
        input:focus { border-color: red; }

        .btn-update { width: 100%; padding: 12px; background: red; border: none; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-update:hover { background: darkred; }

        /* პირადი მესიჯების სექცია */
        .inbox { margin-top: 30px; border-top: 1px solid red; padding-top: 20px; }
        .inbox-title { color: red; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        #messageContainer { max-height: 250px; overflow-y: auto; }
        .dm-item { background: #111; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 3px solid #00e5ff; }
        .dm-sender { font-size: 11px; color: #00e5ff; font-weight: bold; display: block; margin-bottom: 4px; }
        .dm-text { font-size: 14px; color: #fff; }

        .back-btn { display: block; text-align: center; margin-top: 25px; color: #555; text-decoration: none; font-size: 14px; }
        .back-btn:hover { color: red; }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="avatar-circle">👤</div>
    <h2 id="userName">იტვირთება...</h2>
    
    <div class="status-box" id="userStatus">"თქვენი სტატუსი ცარიელია"</div>

    <input type="text" id="statusInput" placeholder="ახალი სტატუსი...">
    <button class="btn-update" onclick="updateStatus()">სტატუსის შეცვლა</button>

    <div class="inbox">
        <div class="inbox-title">📩 მოსული პირადი მესიჯები</div>
        <div id="messageContainer">
            <p style="color: #444; text-align: center; font-size: 13px;">წერილები არ არის...</p>
        </div>
    </div>

    <a href="home.html" class="back-btn">🔙 დაბრუნება ჩატში</a>
</div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    let myId = null;

    async function loadProfile() {
        const { data: { user } } = await client.auth.getUser();
        if (!user) return window.location.href = 'index.html';
        myId = user.id;

        // 1. პროფილის მონაცემების წამოღება
        const { data: p } = await client.from('profiles').select('*').eq('id', myId).single();
        if (p) {
            document.getElementById('userName').innerText = p.username;
            if (p.status) document.getElementById('userStatus').innerText = p.status;
        }

        // 2. პირადი მესიჯების წამოღება
        const { data: dms } = await client.from('private_messages')
            .select('*, profiles:sender_id(username)')
            .eq('receiver_id', myId)
            .order('created_at', { ascending: false });

        if (dms && dms.length > 0) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = dms.map(m => `
                <div class="dm-item">
                    <span class="dm-sender">ავტორი: ${m.profiles?.username || 'უცნობი'}</span>
                    <div class="dm-text">${m.text}</div>
                </div>
            `).join('');
        }
    }

    async function updateStatus() {
        const newStatus = document.getElementById('statusInput').value.trim();
        if (!newStatus) return;

        const { error } = await client.from('profiles').update({ status: newStatus }).eq('id', myId);
        if (!error) {
            document.getElementById('userStatus').innerText = newStatus;
            document.getElementById('statusInput').value = '';
            alert("სტატუსი განახლდა! ✨");
        }
    }

    loadProfile();
</script>

</body>
</html>
