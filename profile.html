<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პროფილი - OLD MAFIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; padding-top: 30px; margin: 0; }
        .box { border: 2px solid red; padding: 25px; display: inline-block; border-radius: 20px; background: #050000; min-width: 320px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
        .p-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid red; object-fit: cover; background: #111; cursor: pointer; transition: 0.3s; }
        .p-img:hover { transform: scale(1.05); filter: brightness(1.2); }
        h1 { margin: 10px 0 5px; color: #ff3333; }
        .status-text { color: #00ff00; font-size: 14px; margin-bottom: 15px; display: block; cursor: pointer; font-style: italic; }
        .role-tag { color: gold; font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 20px; display: block; }
        .btn { display: block; width: 100%; padding: 12px; margin-top: 10px; background: #200; color: white; border: 1px solid red; cursor: pointer; border-radius: 10px; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: red; }
        .btn-pm { background: green; border-color: #0f0; }
        .btn-pm:hover { background: #008000; }
        #adm-section { display: none; margin-top: 20px; border-top: 1px dashed red; padding-top: 15px; }
        .adm-btn { background: #300; border: 1px solid gold; color: gold; padding: 8px; margin: 3px; cursor: pointer; border-radius: 5px; font-size: 12px; width: 45%; }
    </style>
</head>
<body>

    <div class="box">
        <img id="p-avatar" class="p-img" src="https://i.ibb.co/v3m6y6R/avatar.png" onclick="editAvatar()" title="ავატარის შეცვლა">
        
        <h1 id="p-username">იტვირთება...</h1>
        <span id="p-status" class="status-text" onclick="editStatus()">სტატუსის დაყენება... ✏️</span>
        <span id="p-role" class="role-tag">Member</span>

        <button class="btn btn-pm" onclick="alert('PM სისტემა მალე ჩაირთვება!')">✉️ მიწერა (PM)</button>
        
        <div id="adm-section">
            <p style="font-size: 11px; color: gray; margin-bottom: 10px;">ადმინისტრაცია</p>
            <button class="adm-btn" onclick="setRole('Owner')">👑 Owner</button>
            <button class="adm-btn" onclick="setRole('Admin')">🛡️ Admin</button>
            <button class="adm-btn" onclick="setRole('მომხმარებელი')">✨ Reset</button>
            <button class="btn" style="border-color: #555; background: #111; font-size: 12px;" onclick="banUser()">🚫 დაბლოკვა</button>
        </div>

        <button class="btn" style="background:#333; border:none; margin-top: 20px;" onclick="location.href='chat.html'">🏠 უკან</button>
    </div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    
    const params = new URLSearchParams(window.location.search);
    const target = params.get('user') || localStorage.getItem('nickname');
    const me = localStorage.getItem('nickname');

    async function load() {
        // 1. მონაცემების წამოღება
        let { data: user } = await _s.from('profiles').select('*').eq('username', target).maybeSingle();
        
        if(user) {
            document.getElementById('p-username').innerText = user.username;
            document.getElementById('p-role').innerText = user.role || "მომხმარებელი";
            
            if(user.avatar_url) document.getElementById('p-avatar').src = user.avatar_url;
            if(user.status) document.getElementById('p-status').innerText = user.status;

            // 2. ადმინ-პანელის შემოწმება
            let { data: myAcc } = await _s.from('profiles').select('role').eq('username', me).maybeSingle();
            if(myAcc && (myAcc.role === 'Admin' || myAcc.role === 'Owner') && me !== target) {
                document.getElementById('adm-section').style.display = 'block';
            }
        } else {
            document.getElementById('p-username').innerText = "ვერ მოიძებნა";
        }
    }

    // ავატარის შეცვლა
    async function editAvatar() {
        if(me !== target) return;
        let url = prompt("ჩასვით სურათის ლინკი (URL):", document.getElementById('p-avatar').src);
        if(url && url.includes('http')) {
            const { error } = await _s.from('profiles').update({ avatar_url: url }).eq('username', me);
            if(!error) location.reload();
            else alert("შეცდომა: " + error.message);
        }
    }

    // სტატუსის შეცვლა
    async function editStatus() {
        if(me !== target) return;
        let st = prompt("დაწერეთ ახალი სტატუსი:", document.getElementById('p-status').innerText);
        if(st) {
            const { error } = await _s.from('profiles').update({ status: st }).eq('username', me);
            if(!error) location.reload();
            else alert("შეცდომა: " + error.message);
        }
    }

    // როლის შეცვლა
    async function setRole(newRole) {
        const { error } = await _s.from('profiles').update({ role: newRole }).eq('username', target);
        if(!error) location.reload();
    }

    // დაბლოკვა (როლის შეცვლა "Banned"-ზე)
    async function banUser() {
        if(confirm(`ნამდვილად გსურთ ${target}-ის დაბლოკვა?`)) {
            await _s.from('profiles').update({ role: 'Banned' }).eq('username', target);
            alert("მომხმარებელი დაიბლოკა");
            location.reload();
        }
    }

    load();
</script>
</body>
</html>
