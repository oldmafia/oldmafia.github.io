<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პროფილი</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #0d0d0d; border: 2px solid #ff0000; padding: 30px; border-radius: 20px; width: 320px; text-align: center; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid red; margin: 0 auto 15px; background: #111 center/cover; }
        input, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: none; }
        button { background: red; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar" id="pAvat"></div>
        <input type="file" id="fInput" style="display:none" onchange="upload()">
        <button onclick="document.getElementById('fInput').click()">🖼️ ფოტოს შეცვლა</button>
        <h2 id="pNick"></h2>
        <p>როლი: <b id="pRole" style="color:red"></b></p>
        <input type="text" id="pStatus" placeholder="სტატუსი...">
        <button onclick="save()">განახლება</button>
        <br><br>
        <a href="home.html" style="color:gray; text-decoration:none;">← უკან დაბრუნება</a>
    </div>

<script>
    const supabaseUrl = "https://ftfciebnywbondaiarnc.supabase.co";
    const supabaseKey = "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);
    let uId = null;

    async function load() {
        const { data: { user } } = await client.auth.getUser();
        if (!user) return location.href="index.html";
        uId = user.id;
        const { data: p } = await client.from('profiles').select('*').eq('id', uId).single();
        document.getElementById('pNick').innerText = p.nickname;
        document.getElementById('pRole').innerText = p.role;
        document.getElementById('pStatus').value = p.status || "";
        document.getElementById('pAvat').style.backgroundImage = `url('${p.avatar_url}')`;
    }

    async function save() {
        const st = document.getElementById('pStatus').value;
        await client.from('profiles').update({ status: st }).eq('id', uId);
        alert("შენახულია!");
    }

    async function upload() {
        const file = document.getElementById('fInput').files[0];
        const fName = uId + "_" + Date.now();
        const { data, error } = await client.storage.from('avatars').upload(fName, file);
        if(!error) {
            const { publicUrl } = client.storage.from('avatars').getPublicUrl(fName).data;
            await client.from('profiles').update({ avatar_url: publicUrl }).eq('id', uId);
            document.getElementById('pAvat').style.backgroundImage = `url('${publicUrl}')`;
            alert("ფოტო განახლდა!");
        }
    }
    load();
</script>
</body>
</html>
