<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>MAFIA PROFILE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .card { border: 2px solid red; padding: 20px; display: inline-block; border-radius: 15px; width: 300px; }
        img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid red; margin-bottom: 10px; }
        button { display: block; width: 100%; margin: 5px 0; padding: 10px; background: #200; color: white; border: 1px solid red; cursor: pointer; }
        #adm-area { display: none; margin-top: 15px; border-top: 1px dashed red; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <img id="u-img" src="https://i.ibb.co/v3m6y6R/avatar.png">
        <h1 id="u-nick">...</h1>
        <p id="u-role" style="color:gold"></p>
        
        <div id="adm-area">
            <button onclick="changeRole('Owner')">👑 დამფუძნებელის მინიჭება</button>
            <button onclick="changeRole('Admin')">🛡️ ადმინის მინიჭება</button>
            <button onclick="changeRole('Member')">✨ როლის ჩახსნა</button>
            <button onclick="changeRole('Ban')">🚫 დაბლოკვა</button>
        </div>
        <button onclick="location.href='chat.html'">უკან</button>
    </div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    
    // ვიღებთ იუზერს ლინკიდან
    const urlParams = new URLSearchParams(window.location.search);
    const target = urlParams.get('user');
    const myName = localStorage.getItem('nickname');

    async function start() {
        if(!target) { document.getElementById('u-nick').innerText = "იუზერი არ არის"; return; }

        let { data: p } = await _s.from('profiles').select('*').eq('username', target).maybeSingle();

        if(p) {
            document.getElementById('u-nick').innerText = p.username;
            document.getElementById('u-role').innerText = p.role || "Member";
            if(p.avatar_url) document.getElementById('u-img').src = p.avatar_url;

            // ვამოწმებთ, ვინ ვართ ჩვენ
            if(myName) {
                let { data: me } = await _s.from('profiles').select('role').eq('username', myName).maybeSingle();
                if(me && (me.role === 'Admin' || me.role === 'Owner') && myName !== target) {
                    document.getElementById('adm-area').style.display = 'block';
                }
            }
        } else {
            document.getElementById('u-nick').innerText = "ვერ ვიპოვნე";
        }
    }

    async function changeRole(r) {
        const { error } = await _s.from('profiles').update({ role: r }).eq('username', target);
        if(error) alert("შეცდომა: " + error.message);
        else location.reload();
    }

    start();
</script>
</body>
</html>
