<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { border: 2px solid red; padding: 20px; border-radius: 15px; display: inline-block; min-width: 250px; }
        .btn { display: block; width: 100%; margin: 10px 0; padding: 10px; background: red; color: black; font-weight: bold; border: none; cursor: pointer; }
        #debug { color: #555; font-size: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="u-nick">ძებნა...</h1>
        <p id="u-role" style="color:gold"></p>
        <div id="adm" style="display:none;">
            <button class="btn" onclick="upd('Owner')">👑 დამფუძნებელი</button>
            <button class="btn" onclick="upd('Admin')">🛡️ ადმინი</button>
            <button class="btn" onclick="upd('Member')">✨ როლის ჩახსნა</button>
        </div>
        <button class="btn" style="background:gray" onclick="history.back()">უკან</button>
    </div>

    <div id="debug"></div>

<script>
    const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
    
    const params = new URLSearchParams(window.location.search);
    // ვცდილობთ ნიკის ამოღებას ლინკიდან
    let target = params.get('user');
    const myName = localStorage.getItem('nickname');

    document.getElementById('debug').innerText = "ვეძებ იუზერს: " + target;

    async function load() {
        if(!target) {
            document.getElementById('u-nick').innerText = "ლინკში იუზერი არ წერია!";
            return;
        }

        // ვეძებთ იუზერს ისე, რომ დიდი და პატარა ასოები არ იყოს მნიშვნელოვანი (ilike)
        let { data: p, error } = await _s.from('profiles')
            .select('*')
            .filter('username', 'ilike', target)
            .maybeSingle();

        if(error) {
            document.getElementById('u-nick').innerText = "ბაზის შეცდომა!";
            document.getElementById('debug').innerText = error.message;
            return;
        }

        if(p) {
            document.getElementById('u-nick').innerText = p.username;
            document.getElementById('u-role').innerText = p.role || "Member";
            
            // ვამოწმებთ ჩვენს როლს
            if(myName) {
                let { data: me } = await _s.from('profiles').select('role').filter('username', 'ilike', myName).maybeSingle();
                if(me && (me.role === 'Admin' || me.role === 'Owner') && myName.toLowerCase() !== p.username.toLowerCase()) {
                    document.getElementById('adm').style.display = 'block';
                }
            }
        } else {
            document.getElementById('u-nick').innerText = "ვერ მოიძებნა!";
            document.getElementById('debug').innerText = "ბაზაში სახელი '" + target + "' არ ფიგურირებს.";
        }
    }

    window.upd = async (r) => {
        const { error } = await _s.from('profiles').update({ role: r }).filter('username', 'ilike', target);
        if(error) alert(error.message); else location.reload();
    }

    load();
</script>
</body>
</html>
