<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Mafia - Final Build</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        :root { --accent: #ff3b3b; --bg: #0a0c10; --txt: #e6e9f0; --nav: #11151c; --card: rgba(21, 30, 42, 0.9); --border: #2a3440; --glow: rgba(255, 59, 59, 0.3); }
        body.day-mode { --bg: #fef8ef; --txt: #2c2418; --nav: #fff5e6; --card: rgba(255, 255, 255, 0.95); --border: #ffe0b5; --glow: rgba(255, 59, 59, 0.15); }
        
        body { background: var(--bg); color: var(--txt); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }

        /* 🏠 NAVIGATION BAR */
        .navigation { width: 100%; height: 70px; background: var(--nav); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-around; align-items: center; z-index: 1000; flex-shrink: 0; box-shadow: 0 2px 15px var(--glow); }
        .nav-item { cursor: pointer; font-size: 24px; opacity: 0.4; color: var(--txt); position: relative; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { opacity: 1; color: var(--accent); transform: scale(1.1); text-shadow: 0 0 15px var(--accent); }
        .nav-label { font-size: 10px; margin-top: 4px; font-weight: bold; }
        .badge { position: absolute; top: -2px; right: -5px; background: red; color: white; font-size: 10px; min-width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 1px solid white; animation: pulse 1.5s infinite; }

        .content-area { flex: 1; overflow-y: auto; position: relative; }
        .page { display: none; height: 100%; width: 100%; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 🏰 ROOMS DESIGN (STATIC HTML) */
        .rooms-container { display: flex; flex-direction: column; gap: 12px; padding: 15px; }
        .room-card { 
            background: var(--card); padding: 18px 22px; border-radius: 18px; 
            border: 1px solid var(--border); border-left: 6px solid var(--accent);
            display: flex; align-items: center; gap: 15px; cursor: pointer;
            transition: 0.2s; backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .room-card:active { transform: scale(0.97); background: var(--accent); color: white; }
        .room-card b { font-size: 18px; flex: 1; letter-spacing: 0.5px; }
        .room-card .icon { font-size: 26px; filter: drop-shadow(0 0 5px var(--accent)); }

        /* 👥 LIST ROWS (Online & Friends) */
        .row { display: flex; align-items: center; padding: 15px; background: var(--card); margin: 10px 15px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .row:active { background: var(--border); }
        .row img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 15px; object-fit: cover; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-left: auto; background: #95a5a6; }
        .status-dot.online { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }

        /* 😊 EMOJI & CHAT */
        .emoji-board { position: absolute; bottom: 80px; left: 10px; right: 10px; background: var(--nav); border: 2px solid var(--accent); border-radius: 20px; display: none; padding: 15px; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 250px; overflow-y: auto; z-index: 2000; box-shadow: 0 -5px 25px rgba(0,0,0,0.5); }
        .emoji-board.active { display: grid; }
        .emoji-img { width: 100%; aspect-ratio: 1/1; cursor: pointer; object-fit: contain; }
        .admin-plus { border: 2px dashed var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--accent); cursor: pointer; height: 55px; }

        .chat-footer { background: var(--nav); padding: 15px; border-top: 1px solid var(--border); }
        .chat-in-box { display: flex; gap: 12px; align-items: center; }
        .chat-input { flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid var(--accent); background: var(--bg); color: var(--txt); outline: none; font-size: 16px; }
        .send-btn { background: var(--accent); border: none; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px var(--accent); }

        /* ❤️ ABU'S HEARTS */
        .heart { position: fixed; color: #ff3366; font-size: 25px; pointer-events: none; animation: floatHeart 4s linear forwards; z-index: 9999; filter: drop-shadow(0 0 8px #ff3366); }
        @keyframes floatHeart { 0% { bottom: -20px; opacity: 1; transform: scale(1); } 100% { bottom: 100%; opacity: 0; transform: scale(1.4) rotate(15deg); } }

        /* 📱 MODALS */
        .modal-full { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; }
        .modal-header { background: var(--nav); padding: 18px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body class="night-mode">

    <div class="navigation">
        <div class="nav-item active" onclick="showPage('homePage', this)">🏠<span class="nav-label">მთავარი</span></div>
        <div class="nav-item" onclick="showPage('messengerPage', this)">💬<div id="pmBadge" class="badge">0</div><span class="nav-label">ჩათი</span></div>
        <div class="nav-item" onclick="showPage('friendsPage', this)">⭐<span class="nav-label">მეგობრები</span></div>
        <div class="nav-item" onclick="showPage('onlinePage', this)">👥<span class="nav-label">ონლაინ</span></div>
        <div class="nav-item" onclick="showPage('profilePage', this)">👤<span class="nav-label">პროფილი</span></div>
        <div class="nav-item" onclick="toggleMode()">🌗<span class="nav-label">რეჟიმი</span></div>
    </div>

    <div class="content-area">
        <div id="homePage" class="page active">
            <h3 style="padding: 20px; color: var(--accent); text-align: center; letter-spacing: 1px;">🏰 12 სათამაშო ოთახი</h3>
            <div class="rooms-container">
                <div class="room-card" onclick="openRoom('კაფე-ბარი')"><span class="icon">☕</span><b>კაფე-ბარი</b></div>
                <div class="room-card" onclick="openRoom('ნარდი')"><span class="icon">🎲</span><b>ნარდი</b></div>
                <div class="room-card" onclick="openRoom('ჯოკერი')"><span class="icon">🃏</span><b>ჯოკერი</b></div>
                <div class="room-card" onclick="openRoom('VIP საუბრები')"><span class="icon">💎</span><b>VIP საუბრები</b></div>
                <div class="room-card" onclick="openRoom('ფორუმი')"><span class="icon">📝</span><b>ფორუმი</b></div>
                <div class="room-card" onclick="openRoom('ადმინისტრაცია')"><span class="icon">🛠️</span><b>ადმინისტრაცია</b></div>
                <div class="room-card" onclick="openRoom('იუმორი')"><span class="icon">😂</span><b>იუმორი</b></div>
                <div class="room-card" onclick="openRoom('შიფროგრამა')"><span class="icon">🏆</span><b>შიფროგრამა</b></div>
                <div class="room-card" onclick="openRoom('გამოძიება')"><span class="icon">🎭</span><b>გამოძიება</b></div>
                <div class="room-card" onclick="openRoom('მუსიკალური')"><span class="icon">🎵</span><b>მუსიკალური</b></div>
                <div class="room-card" onclick="openRoom('ვიქტორინა')"><span class="icon">⁉️</span><b>ვიქტორინა</b></div>
                <div class="room-card" onclick="openRoom('დახმარება')"><span class="icon">🆘</span><b>დახმარება</b></div>
            </div>
        </div>

        <div id="friendsPage" class="page">
            <h3 style="padding:15px; color:var(--accent);">⭐ ჩემი მეგობრები</h3>
            <div id="friendsList"></div>
        </div>

        <div id="messengerPage" class="page">
            <h3 style="padding:15px;">💬 პირადი მიმოწერა</h3>
            <div id="pmListContainer"></div>
        </div>

        <div id="onlinePage" class="page">
            <h3 style="padding:15px;">👥 ხალხი საიტზე (<span id="onlineCount">0</span>)</h3>
            <div id="onlineList"></div>
        </div>

        <div id="profilePage" class="page">
            <div style="text-align:center; padding-top:40px;">
                <div style="position:relative; display:inline-block;">
                    <img id="myAvatar" src="https://i.ibb.co/v3m6y6R/avatar.png" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--accent); object-fit:cover;">
                    <button onclick="document.getElementById('avaInput').click()" style="position:absolute; bottom:5px; right:5px; background:var(--accent); border:none; color:white; border-radius:50%; width:35px; height:35px; cursor:pointer; font-size:20px;">+</button>
                </div>
                <h2 id="profileNick" style="margin-top:15px; letter-spacing:1px;">Abu007</h2>
                <div style="margin-top:25px;">
                    <input type="text" id="statusInput" placeholder="დაწერე სტატუსი..." style="width:80%; padding:14px; border-radius:25px; border:1px solid var(--accent); background:none; color:var(--txt); text-align:center;">
                    <button onclick="updateStatus()" style="padding:12px 30px; background:var(--accent); color:white; border:none; border-radius:25px; margin-top:15px; cursor:pointer; font-weight:bold;">შენახვა</button>
                </div>
            </div>

                <span id="roomTitle">ოთახი</span> 
                <span onclick="closeRoom()" style="color:var(--accent); cursor:pointer; font-size:28px;">✖</span>
            </div>
            <div id="roomMsgs" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:12px;"></div>
            <div class="chat-footer">
                <div id="emojiBoard" class="emoji-board"></div>
                <div class="chat-in-box">
                    <span onclick="toggleEmoji()" style="font-size:32px; cursor:pointer;">😊</span>
                    <input type="text" id="msgInput" class="chat-input" placeholder="დაწერე შეტყობინება...">
                    <button class="send-btn" onclick="sendMessage()">✈</button>
                </div>
            </div>
            <input type="file" id="emojiUp" hidden onchange="uploadEmoji()">
        </div>
    </div>

    <div id="pmModal" class="modal-full">
        <div class="modal-header">
            <span id="pmPartner">სახელი</span> 
            <span onclick="closePM()" style="color:var(--accent); cursor:pointer; font-size:28px;">✖</span>
        </div>
        <div id="pmMsgs" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px;"></div>
        <div class="chat-footer">
            <div class="chat-in-box">
                <input type="text" id="pmInput" class="chat-input" placeholder="მიწერე პირადად...">
                <button class="send-btn" onclick="sendPM()">✈</button>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        const MY_NICK = localStorage.getItem('nickname') || "Abu007";
        const ADMINS = ["Abu007", "Lukinio", "AdminMafia"];
        let currentRoom = "", currentPM = "", presenceState = {};

        async function init() {
            document.getElementById('profileNick').innerText = MY_NICK;
            loadProfile();
            loadEmojis();
            setupPresence();
            startHearts();
            
            // Listen for NEW MESSAGES (PM Alert)
            _s.channel('pm-alert').on('postgres_changes', {event:'INSERT', schema:'public', table:'direct_messages', filter:`receiver=eq.${MY_NICK}`}, (p) => {
                if(currentPM !== p.new.sender) {
                    const b = document.getElementById('pmBadge');
                    b.innerText = parseInt(b.innerText || 0) + 1;
                    b.style.display = 'flex';
                }
                loadPMList();
                if(currentPM === p.new.sender) loadPMMsgs();
            }).subscribe();

            _s.channel('room-sync').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, () => { if(currentRoom) loadRoomMsgs(); }).subscribe();
        }

        function setupPresence() {
            const chan = _s.channel('online_users', { config: { presence: { key: MY_NICK } } });
            chan.on('presence', { event: 'sync' }, () => {
                presenceState = chan.presenceState();
                updateOnlineList();
                updateFriendsList();
            }).subscribe(async (s) => { if(s === 'SUBSCRIBED') await chan.track({ online_at: new Date() }); });
        }

        function updateOnlineList() {
            const onlineUsers = Object.keys(presenceState);
            document.getElementById('onlineCount').innerText = onlineUsers.length;
            document.getElementById('onlineList').innerHTML = onlineUsers.map(u => `
                <div class="row" onclick="openPM('${u}')">
                    <img src="https://i.ibb.co/v3m6y6R/avatar.png">
                    <div class="row-info"><b>${u}</b><span>ახლახანს</span></div>
                    <div class="status-dot online"></div>
                </div>
            `).join('');
        }

        async function updateFriendsList() {
            const onlineUsers = Object.keys(presenceState);
            const {data} = await _s.from('profiles').select('*').limit(20); // მეგობრების იმიტაცია
            document.getElementById('friendsList').innerHTML = data?.map(f => `
                <div class="row" onclick="openPM('${f.username}')">
                    <img src="${f.avatar_url || 'https://i.ibb.co/v3m6y6R/avatar.png'}">
                    <div class="row-info"><b>${f.username}</b><span>${f.status || 'მეგობარი'}</span></div>
                    <div class="status-dot ${onlineUsers.includes(f.username) ? 'online' : ''}"></div>
                </div>
            `).join('') || "მეგობრები არ გყავს";
        }

        async function loadProfile() {
            const {data} = await _s.from('profiles').select('*').eq('username', MY_NICK).maybeSingle();
            if(data) {
                if(data.avatar_url) document.getElementById('myAvatar').src = data.avatar_url;
                document.getElementById('statusInput').value = data.status || "";
            }
        }

        async function uploadAvatar() {
            const file = document.getElementById('avaInput').files[0];
            if(!file) return;
            const path = `avatars/${MY_NICK}_${Date.now()}`;
            await _s.storage.from('avatars').upload(path, file);
            const {data} = _s.storage.from('avatars').getPublicUrl(path);
            await _s.from('profiles').update({avatar_url: data.publicUrl}).eq('username', MY_NICK);
            document.getElementById('myAvatar').src = data.publicUrl;
            alert("ავატარი განახლდა!");
        }

        async function updateStatus() {
            const s = document.getElementById('statusInput').value;
            await _s.from('profiles').update({status: s}).eq('username', MY_NICK);
            alert("სტატუსი შენახულია!");
        }

        function openRoom(n) { currentRoom = n; document.getElementById('roomTitle').innerText = n; showPage('roomChatPage'); loadRoomMsgs(); }
        async function loadRoomMsgs() {
            if(!currentRoom) return;
            const {data} = await _s.from('messages').select('*').eq('room_name', currentRoom).order('created_at', {ascending:false}).limit(40);
            document.getElementById('roomMsgs').innerHTML = data?.reverse().map(m => `
                <div style="align-self: ${m.username === MY_NICK ? 'flex-end' : 'flex-start'}; background: var(--card); padding: 12px; border-radius: 15px; border: 1px solid var(--border); max-width: 85%;">
                    <b style="color:var(--accent); font-size: 11px;">${m.username}</b><br>
                    ${m.text.replace(/:img:(.*?):/g, '<img src="$1" style="width:35px; vertical-align:middle;">')}
                </div>
            `).join('') || "";
            const box = document.
