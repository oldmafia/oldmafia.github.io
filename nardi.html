<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">

    <title>OLD MAFIA - NARDI SUPREME</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; }
        h1 { color: #d4af37; text-transform: uppercase; letter-spacing: 3px; margin: 10px 0; font-size: 22px; }
        
        /* დაფის სრული ვიზუალი */
        .board {
            width: 95vw; max-width: 600px; height: 380px;
            background: #4e2e12; border: 12px solid #2e1a0a;
            display: flex; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border-radius: 4px;
        }
        .half { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; position: relative; border: 1px solid #3d2610; }
        .center-bar { width: 20px; background: #2e1a0a; height: 100%; box-shadow: inset 0 0 10px black; }

        /* სამკუთხედები */
        .points-row { display: flex; justify-content: space-around; width: 100%; height: 45%; }
        .point { width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; position: relative; }
        .down { border-top: 150px solid #8b5a2b; } 
        .up { border-bottom: 150px solid #c29b6d; }

        /* ქვების დიზაინი */
        .checker {
            width: 28px; height: 28px; border-radius: 50%;
            position: absolute; left: 50%; transform: translateX(-50%);
            border: 2px solid rgba(0,0,0,0.4); cursor: pointer;
            transition: 0.2s;
        }
        .checker:hover { transform: translateX(-50%) scale(1.1); filter: brightness(1.2); }
        .white { background: radial-gradient(circle, #ffffff, #cccccc); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .black { background: radial-gradient(circle, #444444, #111111); box-shadow: 0 2px 5px rgba(0,0,0,0.8); }

        /* მართვის პანელი */
        .controls { margin-top: 15px; display: flex; gap: 15px; align-items: center; background: #1a1a1a; padding: 15px 25px; border-radius: 50px; border: 1px solid #333; }
        .dice { width: 45px; height: 45px; background: #eee; color: #111; border-radius: 10px; 
                display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; box-shadow: 0 4px 0 #999; }
        .roll-btn { padding: 12px 30px; background: linear-gradient(#cc0000, #800000); border: none; color: white; cursor: pointer; border-radius: 25px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(255,0,0,0.3); }
        .roll-btn:active { transform: translateY(2px); box-shadow: none; }
        
        .back-btn { margin-top: 20px; color: #666; text-decoration: none; font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .back-btn:hover { color: #ff0000; border-color: #ff0000; }
    </style>
</head>
