<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>კაიფმანია - FINAL</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; margin: 0; padding: 5px; overflow: hidden; }
        .brand { font-size: 16px; color: #d4af37; font-weight: bold; margin: 5px 0; text-shadow: 0 0 10px gold; }
        
        /* სკამების სექცია */
        .lobby { display: flex; gap: 10px; margin-bottom: 10px; }
        .seat { padding: 10px 15px; border: 1px dashed #d4af37; border-radius: 10px; font-size: 13px; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05); }
        .seat.taken { border-style: solid; background: rgba(212,175,55,0.2); color: gold; cursor: default; }

        .status-bar { padding: 8px 20px; border-radius: 20px; margin-bottom: 8px; font-size: 14px; font-weight: bold; border: 1px solid #444; }
        .active { background: #d4af37; color: black; border-color: gold; box-shadow: 0 0 15px gold; }

        .board { width: 98vw; max-width: 600px; height: 380px; background: #4b2c11; border: 10px solid #2a1808; display: flex; position: relative; border-radius: 10px; box-shadow: 0 10px 40px black; }
        .half { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .board-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-90deg); color: rgba(212,175,55,0.1); font-size: 20px; font-weight: bold; pointer-events: none; white-space: nowrap; letter-spacing: 5px; }

        .points { display: flex; justify-content: space-around; width: 100%; height: 42%; }
        .p { width: 38px; height: 100%; position: relative; display: flex; align-items: center; flex-direction: column; z-index: 5; }
        .dn { justify-content: flex-start; } .up { justify-content: flex-start; flex-direction: column-reverse; }
        .p::before { content: ""; position: absolute; width: 0; height: 0; border-left: 17px solid transparent; border-right: 17px solid transparent; }
        .dn::before { border-top: 150px solid #5d3615; top: 0; }
        .up::before { border-bottom: 150px solid #7a4a21; bottom: 0; }

        .ch { width: 32px; height: 32px; border-radius: 50%; z-index: 10; cursor: grab; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.5); }
        .w { background: radial-gradient(circle at 35% 35%, #fff, #bbb); }
        .b { background: radial-gradient(circle at 35% 35%, #444, #000); }

        .dice-box { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; gap: 8px; pointer-events: none; }
        .die { width: 35px; height: 35px; background: white; color: black; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; box-shadow: 0 4px 10px black; }

        .controls { margin-top: 15px; display: flex; gap: 10px; }
        .btn { padding: 12px 25px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="brand">🔱 ნარდზე კაიფმანია 🔱</div>

    <div class="lobby">
        <div id="seat-w" class="seat" onclick="sit('w')">⚪ თეთრი: თავისუფალი</div>
        <div id="seat-b" class="seat" onclick="sit('b')">⚫ შავი: თავისუფალი</div>
    </div>

    <div id="status" class="status-bar">ჯერ დაჯექი მაგიდასთან!</div>

    <div class="board">
        <div class="half"><div class="board-label">ნარდზე კაიფმანია</div><div class="points" id="top-left"></div><div class="points" id="bot-left"></div></div>
        <div class="half"><div class="board-label">ნარდზე კაიფმანია</div><div class="points" id="top-right"></div><div class="points" id="bot-right"></div></div>
        <div class="dice-box" id="dice-container"></div>
    </div>

    <div class="controls">
        <button id="roll-btn" class="btn" style="background:#b00" onclick="roll()">გაგორება 🎲</button>
        <button id="end-btn" class="btn" style="background:#0055aa; display:none" onclick="endTurn()">სვლა დავასრულე ✅</button>
        <button class="btn" style="background:#444" onclick="resetBoard()">🔄 გასუფთავება</button>
    </div>

    <audio id="diceSound"><source src="https://assets.mixkit.co/active_storage/sfx/2006/2006-preview.mp3" type="audio/mpeg"></audio>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nickname') || "მოთამაშე";
        let mySide = null, currentTurn = "w", diceResults = [], draggedElement = null;

        async function init() {
            createBoard();
            syncGame();
            _s.channel('nardi_final').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: 'room_name=eq.nardi_sync' }, payload => {
                const msg = payload.new.text;
                if (msg.startsWith("SIT:")) { syncSeats(); }
                else if (msg.startsWith("MOVE:")) { 
                    const [_, from, to, color] = msg.split(":");
                    moveUI(from, to, color);
                }
                else if (msg.startsWith("DICE:")) {
                    diceResults = msg.split(":")[1].split(",").map(Number);
                    renderDice();
                }
                else if (msg.startsWith("TURN:")) {
                    currentTurn = msg.split(":")[1];
                    updateStatusUI();
                }
            }).subscribe();
            syncSeats();
        }

        function createBoard() {
            const layout = {'top-right':[12,13,14,15,16,17],'top-left':[18,19,20,21,22,23],'bot-left':[5,4,3,2,1,0],'bot-right':[11,10,9,8,7,6]};
            // გრძელი ნარდის საწყისი პოზიცია: თეთრი 23-ზე, შავი 11-ზე
            const start = { 23: {n:15, c:'w'}, 11: {n:15, c:'b'} };

            for (let s in layout) {
                const container = document.getElementById(s);
                layout[s].forEach(idx => {
                    const p = document.createElement('div');
                    p.className = `p ${s.includes('top')?'dn':'up'}`;
                    p.dataset.index = idx;
                    p.addEventListener('dragover', e => e.preventDefault());
                    p.addEventListener('drop', handleDrop);
                    if (start[idx]) for (let j=0; j<start[idx].n; j++) {
                        const ch = document.createElement('div');
                        ch.className = `ch ${start[idx].c}`;
                        ch.draggable = true;
                        ch.onmousedown = ch.ontouchstart = () => { if(mySide === currentTurn) draggedElement = ch; };
                        p.appendChild(ch);
                    }
                    container.appendChild(p);
                });
            }
        }

        async function sit(side) {
            if (mySide) return;
            await _s.from('messages').insert([{ user_name: myNick, text: `SIT:${side}`, room_name: 'nardi_sync' }]);
            mySide = side;
            syncSeats();
        }

        async function syncSeats() {
            const { data } = await _s.from('messages').select('*').eq('room_name', 'nardi_sync').order('created_at', { ascending: false });
            let wTaken = false, bTaken = false;
            data?.forEach(m => {
                if (m.text === "SIT:w" && !wTaken) { 
                    document.getElementById('seat-w').innerText = `⚪ თეთრი: ${m.user_name}`;
                    document.getElementById('seat-w').classList.add('taken');
                    if (m.user_name === myNick) mySide = 'w';
                    wTaken = true;
                }
                if (m.text === "SIT:b" && !bTaken) {
                    document.getElementById('seat-b').innerText = `⚫ შავი: ${m.user_name}`;
                    document.getElementById('seat-b').classList.add('taken');
                    if (m.user_name === myNick) mySide = 'b';
                    bTaken = true;
                }
            });
            updateStatusUI();
        }

        async function roll() {
            if (mySide !== currentTurn) return alert("შენი სვლა არ არის!");
            document.getElementById('diceSound').play().catch(()=>{});
            const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
            const res = (d1 === d2) ? [d1, d1, d1, d1] : [d1, d2];
            await _s.from('messages').insert([{ user_name: myNick, text: `DICE:${res.join(",")}`, room_name: 'nardi_sync' }]);
            document.getElementById('roll-btn').style.display = "none";
            document.getElementById('end-btn').style.display = "block";
        }

        function renderDice() {
            document.getElementById('dice-container').innerHTML = diceResults.map(d => `<div class="die">${d}</div>`).join('');
        }

        async function handleDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.p');
            if (!draggedElement || !target || diceResults.length === 0) return;
            if (!draggedElement.classList.contains(mySide)) return alert("ეს შენი ქვა არაა!");

            const fromIdx = draggedElement.parentElement.dataset.index;
            const toIdx = target.dataset.index;
            const diff = Math.abs(fromIdx - toIdx);

            const dIdx = diceResults.indexOf(diff);
            if (dIdx !== -1) {
                await _s.from('messages').insert([{ user_name: myNick, text: `MOVE:${fromIdx}:${toIdx}:${mySide}`, room_name: 'nardi_sync' }]);
                diceResults.splice(dIdx, 1);
                renderDice();
            }
        }

        function moveUI(from, to, color) {
            const fP = document.querySelector(`.p[data-index="${from}"]`);
            const tP = document.querySelector(`.p[data-index="${to}"]`);
            const ch = fP?.querySelector(`.ch.${color}`);
            if (ch && tP) tP.appendChild(ch);
        }

        async function endTurn() {
            const next = currentTurn === "w" ? "b" : "w";
            await _s.from('messages').insert([{ user_name: 'SYS', text: `TURN:${next}`, room_name: 'nardi_sync' }]);
            document.getElementById('end-btn').style.display = "none";
            document.getElementById('roll-btn').style.display = "block";
            diceResults = []; renderDice();
        }

        function updateStatusUI() {
            const s = document.getElementById('status');
            if (!mySide) s.innerText = "აირჩიე ფერი და დაჯექი!";
            else if (currentTurn === mySide) { s.innerText = "შენი სვლაა! 🎲"; s.className="status-bar active"; }
            else { s.innerText = "მოწინააღმდეგე აგორებს... ⏳"; s.className="status-bar"; }
        }

        async function resetBoard() {
            if(confirm("ნამდვილად გინდა მაგიდის გასუფთავება?")) {
                await _s.from('messages').delete().eq('room_name', 'nardi_sync');
                location.reload();
            }
        }

        document.addEventListener('touchend', e => {
            if (!draggedElement) return;
            const t = e.changedTouches[0];
            const target = document.elementFromPoint(t.clientX, t.clientY)?.closest('.p');
            if (target) handleDrop({ preventDefault:()=>{}, target: target });
            draggedElement = null;
        });

        init();
    </script>
</body>
</html>
