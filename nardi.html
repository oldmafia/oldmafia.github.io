<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - FAIR PLAY NARDI</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .scoreboard { font-size: 20px; color: gold; margin-bottom: 10px; font-weight: bold; }
        .turn-indicator { padding: 5px 15px; border-radius: 20px; margin-bottom: 10px; font-size: 14px; border: 1px solid gold; }
        .my-turn { background: gold; color: black; box-shadow: 0 0 15px gold; }
        
        .seats { display: flex; gap: 10px; margin-bottom: 15px; }
        .seat { padding: 10px 15px; border: 1px dashed #d4af37; border-radius: 10px; font-size: 12px; color: #888; background: rgba(0,0,0,0.4); position: relative; }
        .seat.occupied { border-style: solid; color: gold; background: rgba(212,175,55,0.1); }
        .winner-crown { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 20px; display: none; }
        .winner .winner-crown { display: block; }

        .board { width: 95vw; max-width: 600px; height: 380px; background: #4b2c11; border: 10px solid #2a1808; display: flex; position: relative; border-radius: 5px; touch-action: none; }
        .half { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .bar { width: 24px; background: #2a1808; height: 100%; display: flex; align-items: center; justify-content: center; }
        .dice-container { position: absolute; display: flex; gap: 8px; z-index: 100; }
        .die { width: 35px; height: 35px; background: white; color: black; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }

        .points { display: flex; justify-content: space-around; width: 100%; height: 45%; }
        .p { width: 40px; height: 100%; position: relative; display: flex; align-items: center; z-index: 5; }
        .dn { flex-direction: column; justify-content: flex-start; } 
        .up { flex-direction: column-reverse; justify-content: flex-start; }
        .p::before { content: ""; position: absolute; width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; z-index: 1; }
        .dn::before { border-top: 140px solid #7a4a21; top: 0; }
        .up::before { border-bottom: 140px solid #c49a6c; bottom: 0; }

        .ch { width: 32px; height: 32px; border-radius: 50%; z-index: 10; border: 1px solid rgba(0,0,0,0.4); cursor: grab; touch-action: none; flex-shrink: 0; }
        .w { background: radial-gradient(circle, #fff, #bbb); }
        .b { background: radial-gradient(circle, #444, #000); }

        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 20px; border: none; color: white; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-roll { background: #b00; }
        .btn-end { background: #0066cc; display: none; }
        .btn-win { background: gold; color: black; }
    </style>
</head>
<body>

    <audio id="diceSound"><source src="https://assets.mixkit.co/active_storage/sfx/2006/2006-preview.mp3" type="audio/mpeg"></audio>

    <div id="turn-msg" class="turn-indicator">იტვირთება...</div>

    <div class="seats">
        <div id="seat-w" class="seat" onclick="sit('w')"><span class="winner-crown">👑</span><span class="n">⚪ თეთრი: თავისუფალი</span></div>
        <div id="seat-b" class="seat" onclick="sit('b')"><span class="winner-crown">👑</span><span class="n">⚫ შავი: თავისუფალი</span></div>
    </div>

    <div class="board">
        <div class="half"><div class="points" id="top-left"></div><div class="points" id="bot-left"></div></div>
        <div class="bar"><div class="dice-container" id="dice-box"></div></div>
        <div class="half"><div class="points" id="top-right"></div><div class="points" id="bot-right"></div></div>
    </div>

    <div class="controls">
        <button id="roll-btn" class="btn btn-roll" onclick="roll()">გაგორება 🎲</button>
        <button id="end-btn" class="btn btn-end" onclick="endTurn()">სვლის დასრულება ✅</button>
        <button class="btn btn-win" onclick="declareWin()">მოვიგე! 🏆</button>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nickname') || "სტუმარი";
        let mySide = null; 
        let currentTurn = "w"; 
        let draggedElement = null;

        async function init() {
            createBoard();
            await syncStatus();
            
            _s.channel('nardi_sync').on('postgres_changes', { event: '*', schema: 'public', table: 'messages', filter: 'room_name=eq.nardi_status' }, () => {
                syncStatus();
            }).subscribe();
        }

        async function syncStatus() {
            const { data } = await _s.from('messages').select('*').eq('room_name', 'nardi_status').order('created_at', { ascending: false });
            
            let wUser = null, bUser = null;
            data?.forEach(m => {
                if (m.text.includes("დაჯდა_თეთრი") && !wUser) wUser = m.user_name;
                if (m.text.includes("დაჯდა_შავი") && !bUser) bUser = m.user_name;
                if (m.text.startsWith("TURN:") && !currentTurn) currentTurn = m.text.split(":")[1];
            });

            // ბოლო სვლის დადგენა
            const turnMsg = data?.find(m => m.text.startsWith("TURN:"));
            currentTurn = turnMsg ? turnMsg.text.split(":")[1] : "w";

            if (wUser) updateUI('w', wUser);
            if (bUser) updateUI('b', bUser);
            
            mySide = (wUser === myNick) ? "w" : (bUser === myNick ? "b" : null);
            
            const msgBox = document.getElementById('turn-msg');
            if (currentTurn === mySide) {
                msgBox.innerText = "შენი სვლაა! 🎲";
                msgBox.className = "turn-indicator my-turn";
            } else {
                msgBox.innerText = `იცდის ${currentTurn === 'w' ? 'თეთრი' : 'შავი'}... ⏳`;
                msgBox.className = "turn-indicator";
            }
        }

        function updateUI(side, name) {
            const s = document.getElementById('seat-' + side);
            s.querySelector('.n').innerText = (side==='w'?"⚪ ":"⚫ ") + name;
            s.classList.add('occupied');
        }

        async function sit(side) {
            if (mySide) return;
            await _s.from('messages').insert([{ user_name: myNick, text: `დაჯდა_${side==='w'?'თეთრი':'შავი'}`, room_name: 'nardi_status' }]);
            location.reload();
        }

        async function roll() {
            if (mySide !== currentTurn) return alert("ჯერ შენი სვლა არ არის!");
            document.getElementById('diceSound').play().catch(()=>{});
            const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
            document.getElementById('dice-box').innerHTML = `<div class="die">${d1}</div><div class="die">${d2}</div>`;
            document.getElementById('end-btn').style.display = "block";
            document.getElementById('roll-btn').style.display = "none";
        }

        async function endTurn() {
            const nextTurn = (currentTurn === "w" ? "b" : "w");
            await _s.from('messages').insert([{ user_name: 'SYSTEM', text: `TURN:${nextTurn}`, room_name: 'nardi_status' }]);
            document.getElementById('end-btn').style.display = "none";
            document.getElementById('roll-btn').style.display = "block";
        }

        function handleDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.p');
            if (draggedElement && target) {
                if (!draggedElement.classList.contains(mySide)) return alert("სხვის ქვას ვერ დაძრავ!");
                target.appendChild(draggedElement);
            }
        }

        // --- Board & Drag Logic ---
        function createBoard() {
            const layout = {'top-left':[{n:5,c:'w'},{},{},{},{n:3,c:'b'},{}],'top-right':[{},{},{},{},{},{n:2,c:'b'}],'bot-left':[{n:5,c:'b'},{},{},{},{n:3,c:'w'},{}],'bot-right':[{},{},{},{},{},{n:2,c:'w'}]};
            for (let side in layout) {
                const container = document.getElementById(side);
                layout[side].forEach(pos => {
                    const p = document.createElement('div');
                    p.className = `p ${side.includes('top') ? 'dn' : 'up'}`;
                    p.addEventListener('dragover', e => e.preventDefault());
                    p.addEventListener('drop', handleDrop);
                    if (pos.n) for (let j=0; j<pos.n; j++) {
                        const ch = document.createElement('div');
                        ch.className = `ch ${pos.c}`;
                        ch.draggable = true;
                        ch.onmousedown = () => draggedElement = ch;
                        ch.ontouchstart = () => draggedElement = ch;
                        p.appendChild(ch);
                    }
                    container.appendChild(p);
                });
            }
        }

        async function declareWin() {
            const { data } = await _s.from('profiles').select('wins').eq('nickname', myNick).single();
            await _s.from('profiles').update({ wins: (data?.wins || 0) + 1 }).eq('nickname', myNick);
            await _s.from('messages').delete().eq('room_name', 'nardi_status');
            alert("მოგება ჩაიწერა! მაგიდა გასუფთავდა.");
            location.reload();
        }

        document.addEventListener('touchend', e => {
            if (!draggedElement) return;
            const touch = e.changedTouches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const p = target ? target.closest('.p') : null;
            if (p) {
                if (!draggedElement.classList.contains(mySide)) { alert("სხვის ქვას ვერ დაძრავ!"); draggedElement = null; return; }
                p.appendChild(draggedElement);
            }
            draggedElement = null;
        });

        init();
    </script>
</body>
</html>
