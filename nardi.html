<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔱 ნარდზე კაიფმანია + CHAT 🔱</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; height: 100vh; overflow: hidden; }
        .main-container { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
        
        /* დაფის სტილები */
        .board { width: 90vw; max-width: 500px; height: 380px; background: #3d230d; border: 10px solid #1a0f05; display: flex; position: relative; border-radius: 8px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .half { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .bar { width: 35px; background: #1a0f05; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; z-index: 20; border: 1px solid #222; }
        .points { display: flex; justify-content: space-around; width: 100%; height: 45%; }
        .p { width: 38px; height: 100%; position: relative; display: flex; flex-direction: column; align-items: center; }
        .dn { justify-content: flex-start; } .up { justify-content: flex-start; flex-direction: column-reverse; }
        .p::before { content: ""; position: absolute; width: 0; height: 0; border-left: 17px solid transparent; border-right: 17px solid transparent; }
        .dn::before { border-top: 140px solid rgba(0,0,0,0.2); top: 0; }
        .up::before { border-bottom: 140px solid rgba(255,255,255,0.05); bottom: 0; }
        
        /* ქვები */
        .ch { width: 30px; height: 30px; border-radius: 50%; z-index: 10; cursor: grab; flex-shrink: 0; margin-top: -22px; border: 1px solid rgba(0,0,0,0.5); touch-action: none; }
        .dn .ch:first-child, .up .ch:first-child, .bar .ch { margin-top: 2px; margin-bottom: 2px; }
        .w { background: radial-gradient(circle at 30% 30%, #fff, #999); box-shadow: 0 3px 6px rgba(0,0,0,0.4); }
        .b { background: radial-gradient(circle at 30% 30%, #444, #000); box-shadow: 0 3px 6px rgba(0,0,0,0.6); }

        /* ჩატის სტილი */
        .chat-container { width: 280px; height: 400px; background: #161616; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; }
        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 13px; display: flex; flex-direction: column; gap: 5px; }
        .msg { background: #222; padding: 5px 10px; border-radius: 8px; border-left: 3px solid #d4af37; }
        .chat-input { display: flex; padding: 10px; border-top: 1px solid #333; }
        .chat-input input { flex-grow: 1; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; outline: none; }
        
        /* სხვა ელემენტები */
        .controls { margin-top: 15px; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .status-bar { padding: 8px 25px; border-radius: 25px; background: #1a1a1a; margin-bottom: 10px; border: 1px solid #333; }
        .active { background: #d4af37 !important; color: black; box-shadow: 0 0 15px gold; }
    </style>
</head>
<body>

    <h2 style="color:#d4af37">🔱 ნარდზე კაიფმანია 🔱</h2>

    <div class="main-container">
        <div style="display:flex; flex-direction:column; align-items:center">
            <div id="status" class="status-bar">დაჯექი რომელიმე მხარეს!</div>
            
            <div class="board" id="game-board">
                <div class="half"><div class="points" id="top-left"></div><div class="points" id="bot-left"></div></div>
                <div class="bar" id="mid-bar"></div>
                <div class="half"><div class="points" id="top-right"></div><div class="points" id="bot-right"></div></div>
                <div id="dice-container" style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); display:flex; gap:10px; pointer-events:none"></div>
            </div>

            <div class="controls">
                <button id="roll-btn" class="btn" style="background:#b00" onclick="roll()">გაგორება 🎲</button>
                <button id="end-btn" class="btn" style="background:#0055aa; display:none" onclick="endTurn()">დასრულება ✅</button>
                <button class="btn" style="background:#333" onclick="resetGame()">🔄 რესეტი</button>
                <button class="btn" style="background:gray" onclick="sit('w')">⚪</button>
                <button class="btn" style="background:black" onclick="sit('b')">⚫</button>
            </div>
        </div>

        <div class="chat-container">
            <div style="padding:10px; border-bottom:1px solid #333; font-weight:bold; color:#d4af37; text-align:center">💬 ჩატი</div>
            <div id="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chat-in" placeholder="დაწერე რამე..." onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>
    </div>

    <audio id="diceSound"><source src="https://assets.mixkit.co/active_storage/sfx/2006/2006-preview.mp3" type="audio/mpeg"></audio>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = "User_" + Math.floor(Math.random()*1000);
        let mySide = null, currentTurn = "w", diceResults = [], draggedElement = null;

        async function init() {
            createBoard();
            _s.channel('nardi_final').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: 'room_name=eq.nardi_sync' }, payload => {
                const msg = payload.new.text;
                const user = payload.new.user_name;
                if (msg.startsWith("CHAT:")) addChatMessage(user, msg.replace("CHAT:",""));
                else if (msg.startsWith("MOVE:")) executeMoveUI(...msg.split(":").slice(1));
                else if (msg.startsWith("DICE:")) { diceResults = msg.split(":")[1].split(",").map(Number); renderDice(); }
                else if (msg.startsWith("TURN:")) { currentTurn = msg.split(":")[1]; updateStatusUI(); }
                else if (msg === "RESET") location.reload();
            }).subscribe();
            restoreState();
        }

        function createBoard() {
            const layout = {'top-left':[12,13,14,15,16,17],'top-right':[18,19,20,21,22,23],'bot-right':[5,4,3,2,1,0],'bot-left':[11,10,9,8,7,6]};
            const start = {0:{n:2,c:'w'}, 11:{n:5,c:'w'}, 16:{n:3,c:'w'}, 18:{n:5,c:'w'}, 23:{n:2,c:'b'}, 12:{n:5,c:'b'}, 7:{n:3,c:'b'}, 5:{n:5,c:'b'}};
            for (let s in layout) {
                const container = document.getElementById(s);
                layout[s].forEach(idx => {
                    const p = document.createElement('div');
                    p.className = `p ${s.includes('top')?'dn':'up'}`;
                    p.dataset.index = idx;
                    p.addEventListener('dragover', e => e.preventDefault());
                    p.addEventListener('drop', handleDrop);
                    if (start[idx]) for (let j=0; j<start[idx].n; j++) addChecker(p, start[idx].c);
                    container.appendChild(p);
                });
            }
        }

        function addChecker(parent, color) {
            const ch = document.createElement('div');
            ch.className = `ch ${color}`;
            ch.draggable = true;
            ch.onmousedown = ch.ontouchstart = () => { if(mySide === currentTurn && ch.classList.contains(mySide)) draggedElement = ch; };
            parent.appendChild(ch);
        }

        async function sendChat() {
            const inp = document.getElementById('chat-in');
            if(!inp.value) return;
            await _s.from('messages').insert([{ user_name: myNick, text: `CHAT:${inp.value}`, room_name: 'nardi_sync' }]);
            inp.value = "";
        }

        function addChatMessage(user, text) {
            const box = document.getElementById('chat-messages');
            box.innerHTML += `<div class="msg"><b>${user}:</b> ${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function roll() {
            if (mySide !== currentTurn) return;
            const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
            const res = (d1 === d2) ? [d1, d1, d1, d1] : [d1, d2];
            await _s.from('messages').insert([{ user_name: myNick, text: `DICE:${res.join(",")}`, room_name: 'nardi_sync' }]);
            document.getElementById('roll-btn').style.display = "none";
            document.getElementById('end-btn').style.display = "block";
        }

        function renderDice() {
            document.getElementById('dice-container').innerHTML = diceResults.map(d => `<div style="width:30px;height:30px;background:white;color:black;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:bold">${d}</div>`).join('');
        }

        async function handleDrop(e) {
            const target = e.target.closest('.p');
            if (!draggedElement || !target || diceResults.length === 0) return;
            const fromIdx = draggedElement.parentElement.id === "mid-bar" ? "BAR" : draggedElement.parentElement.dataset.index;
            const toIdx = target.dataset.index;
            const diff = (fromIdx === "BAR") ? (mySide === 'w' ? 24 - toIdx : parseInt(toIdx) + 1) : Math.abs(fromIdx - toIdx);

            if (diceResults.includes(diff)) {
                await _s.from('messages').insert([{ user_name: myNick, text: `MOVE:${fromIdx}:${toIdx}:${mySide}`, room_name: 'nardi_sync' }]);
                diceResults.splice(diceResults.indexOf(diff), 1);
                renderDice();
            }
            draggedElement = null;
        }

        function executeMoveUI(from, to, color) {
            const fP = from === "BAR" ? document.getElementById('mid-bar') : document.querySelector(`.p[data-index="${from}"]`);
            const tP = document.querySelector(`.p[data-index="${to}"]`);
            const ch = fP?.querySelector(`.ch.${color}`);
            if (ch && tP) {
                const oppColor = color === 'w' ? 'b' : 'w';
                const opps = tP.querySelectorAll(`.ch.${oppColor}`);
                if (opps.length === 1) document.getElementById('mid-bar').appendChild(opps[0]);
                tP.appendChild(ch);
            }
        }

        async function sit(side) { mySide = side; updateStatusUI(); }

        function updateStatusUI() {
            const s = document.getElementById('status');
            s.innerText = currentTurn === mySide ? "შენი სვლაა! 🎲" : "მოწინააღმდეგე ფიქრობს...";
            s.className = currentTurn === mySide ? "status-bar active" : "status-bar";
        }

        async function endTurn() {
            const next = currentTurn === "w" ? "b" : "w";
            await _s.from('messages').insert([{ user_name: 'SYS', text: `TURN:${next}`, room_name: 'nardi_sync' }]);
            document.getElementById('end-btn').style.display = "none";
            document.getElementById('roll-btn').style.display = "block";
            diceResults = []; renderDice();
        }

        async function restoreState() {
            const { data } = await _s.from('messages').select('*').eq('room_name', 'nardi_sync').order('created_at', { ascending: true });
            data?.forEach(m => {
                if (m.text.startsWith("MOVE:")) executeMoveUI(...m.text.split(":").slice(1));
                if (m.text.startsWith("TURN:")) currentTurn = m.text.split(":")[1];
                if (m.text.startsWith("CHAT:")) addChatMessage(m.user_name, m.text.replace("CHAT:",""));
            });
            updateStatusUI();
        }

        async function resetGame() { if(confirm("რესეტი?")) { await _s.from('messages').delete().eq('room_name', 'nardi_sync'); location.reload(); } }

        init();
    </script>
</body>
</html>
