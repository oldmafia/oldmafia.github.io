<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎲 ნარდი · Backgammon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1e3a1a;
            font-family: system-ui, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-container {
            max-width: 800px;
            width: 100%;
            background: #c9a87b;
            border-radius: 28px;
            padding: 16px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
            border: 1px solid #e8c28e;
        }
        h1 {
            text-align: center;
            color: #f7e5b5;
            font-size: 1.5rem;
            margin-bottom: 12px;
        }
        .players-area {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 15px;
        }
        .player-card {
            background: #4a3724;
            border-radius: 50px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            justify-content: center;
            border: 2px solid #e8c28e;
        }
        .player-card img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .player-card .name {
            font-weight: bold;
            color: #ffefb9;
        }
        .player-card .ready {
            background: #4caf50;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            color: white;
        }
        .player-card.empty .ready {
            background: #888;
        }
        .board-wrapper {
            background: #8b5a2b;
            border-radius: 20px;
            padding: 10px;
            box-shadow: inset 0 0 0 2px #e8c28e;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #f3e5c0;
            border-radius: 16px;
            cursor: pointer;
        }
        .panel {
            margin-top: 16px;
            background: #4a3724;
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .turn {
            background: #000000aa;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffefb9;
            font-weight: bold;
        }
        .dice-area {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .die {
            background: #faf2e0;
            width: 55px;
            height: 55px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: bold;
            color: #3a2a1a;
            box-shadow: inset 0 0 0 3px #b97f3a, 0 4px 8px black;
        }
        button {
            background: #e4a842;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            color: #ffefb9;
            text-decoration: none;
        }
        .sit-btn {
            background: #2a7a3a;
            color: white;
        }
        @media (max-width: 600px) {
            .die { width: 45px; height: 45px; font-size: 30px; }
            button { padding: 6px 16px; }
            .player-card { padding: 5px 12px; }
            .player-card img { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🎲 ნარდი · Backgammon</h1>
    
    <div class="players-area" id="playersArea">
        <div class="player-card empty" id="playerWhite">
            <img src="https://i.ibb.co/v3m6y6R/avatar.png">
            <span class="name">თეთრი</span>
            <span class="ready" id="whiteReady">⏳</span>
        </div>
        <div class="player-card empty" id="playerBlack">
            <img src="https://i.ibb.co/v3m6y6R/avatar.png">
            <span class="name">შავი</span>
            <span class="ready" id="blackReady">⏳</span>
        </div>
    </div>
    
    <div class="board-wrapper">
        <canvas id="boardCanvas" width="750" height="520" style="width:100%; height:auto; max-width:750px; aspect-ratio:750/520"></canvas>
    </div>
    
    <div class="panel">
        <div class="turn" id="turnLabel">⏳ თამაში არ დაწყებულა</div>
        <div class="dice-area">
            <div class="die" id="die1">⚀</div>
            <div class="die" id="die2">⚀</div>
            <button id="rollBtn">🎲 ყარე</button>
        </div>
        <div>
            <button id="resetBtn">⟳ ახალი</button>
            <button id="sitBtn" class="sit-btn">🪑 დაჯდომა</button>
        </div>
    </div>
    <a href="chat.html" class="back-link">← ჩატში დაბრუნება</a>
</div>

<script>
    const supabase = supabase.createClient(
        "https://ftfciebnywbondaiarnc.supabase.co",
        "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI"
    );
    
    let myNick = localStorage.getItem('nickname') || 'მოთამაშე';
    let myAvatar = localStorage.getItem('avatar') || 'https://i.ibb.co/v3m6y6R/avatar.png';
    
    // მოთამაშეები
    let whitePlayer = null;
    let blackPlayer = null;
    let mySeat = null;
    
    // თამაშის მდგომარეობა
    let board = [
        2,0,0,0,0,-5,0,-3,0,0,0,0,
        5,-2,0,0,0,0,3,0,0,0,0,-4
    ];
    let whiteBar = 0, blackBar = 0;
    let turn = 'white';
    let dice = [0,0];
    let rolled = false;
    let possibleMoves = [];
    let selectedPoint = null;
    let gameStarted = false;
    
    const canvas = document.getElementById('boardCanvas');
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    
    // ========== დაჯდომა ==========
    function updatePlayersUI() {
        const whiteDiv = document.getElementById('playerWhite');
        const blackDiv = document.getElementById('playerBlack');
        
        if (whitePlayer) {
            whiteDiv.classList.remove('empty');
            whiteDiv.querySelector('img').src = whitePlayer.avatar;
            whiteDiv.querySelector('.name').innerHTML = whitePlayer.name;
            document.getElementById('whiteReady').innerHTML = '✅';
        } else {
            whiteDiv.classList.add('empty');
            whiteDiv.querySelector('img').src = 'https://i.ibb.co/v3m6y6R/avatar.png';
            whiteDiv.querySelector('.name').innerHTML = 'თეთრი';
            document.getElementById('whiteReady').innerHTML = '⏳';
        }
        
        if (blackPlayer) {
            blackDiv.classList.remove('empty');
            blackDiv.querySelector('img').src = blackPlayer.avatar;
            blackDiv.querySelector('.name').innerHTML = blackPlayer.name;
            document.getElementById('blackReady').innerHTML = '✅';
        } else {
            blackDiv.classList.add('empty');
            blackDiv.querySelector('img').src = 'https://i.ibb.co/v3m6y6R/avatar.png';
            blackDiv.querySelector('.name').innerHTML = 'შავი';
            document.getElementById('blackReady').innerHTML = '⏳';
        }
    }
    
    function sitDown() {
        if (mySeat) {
            alert("უკვე ზიხარ!");
            return;
        }
        
        if (!whitePlayer) {
            mySeat = 'white';
            whitePlayer = { name: myNick, avatar: myAvatar };
            updatePlayersUI();
            alert("დაჯექი თეთრად! ელოდე მეორე მოთამაშეს...");
        } else if (!blackPlayer) {
            mySeat = 'black';
            blackPlayer = { name: myNick, avatar: myAvatar };
            updatePlayersUI();
            alert("დაჯექი შავად! ელოდე მეორე მოთამაშეს...");
        } else {
            alert("მაგიდა სავსეა!");
            return;
        }
        
        if (whitePlayer && blackPlayer && !gameStarted) {
            alert("ორივე მოთამაშე დაჯდა! თამაში იწყება!");
            startGame();
        }
    }
    
    function startGame() {
        gameStarted = true;
        turn = 'white';
        rolled = false;
        dice = [0,0];
        document.getElementById('rollBtn').disabled = false;
        updateUI();
        drawBoard();
    }
    
    // ========== ნარდის ლოგიკა ==========
    function getDiceSymbol(v){
        return {1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'}[v];
    }
    
    function rollDice(){
        if(!gameStarted){
            alert("ჯერ ორივე მოთამაშე უნდა დაჯდეს!");
            return;
        }
        if((turn === 'white' && mySeat !== 'white') || (turn === 'black' && mySeat !== 'black')){
            alert("ახლა შენი ჯერი არ არის!");
            return;
        }
        if(rolled){
            alert("უკვე დაყარე! გადაიტანე ქვები.");
            return;
        }
        let d1 = Math.floor(Math.random()*6)+1;
        let d2 = Math.floor(Math.random()*6)+1;
        dice = [d1, d2];
        document.getElementById('die1').innerHTML = getDiceSymbol(d1);
        document.getElementById('die2').innerHTML = getDiceSymbol(d2);
        rolled = true;
        generateMoves();
        if(possibleMoves.length === 0){
            alert(`${turn === 'white' ? 'თეთრს' : 'შავს'} სვლა არ აქვს! ჯერი გადადის.`);
            nextTurn();
        }
        drawBoard();
    }
    
    function generateMoves(){
        possibleMoves = [];
        let bar = (turn === 'white') ? whiteBar : blackBar;
        let fromPoints = [];
        if(bar > 0){
            fromPoints.push(-1);
        } else {
            for(let i=0;i<24;i++){
                let val = board[i];
                if(turn === 'white' && val > 0) fromPoints.push(i);
                if(turn === 'black' && val < 0) fromPoints.push(i);
            }
        }
        for(let from of fromPoints){
            for(let d of dice){
                if(d===0) continue;
                let to;
                if(from === -1){
                    to = (turn === 'white') ? d-1 : 24-d;
                } else {
                    to = (turn === 'white') ? from + d : from - d;
                }
                if(isValidMove(from, to)){
                    possibleMoves.push({from, to, dieValue:d});
                }
            }
        }
        possibleMoves = possibleMoves.filter((v,i,a)=>a.findIndex(t=>t.from===v.from && t.to===v.to)===i);
    }
    
    function isValidMove(from, to){
        if(to < 0 || to > 23) return false;
        let bar = (turn === 'white') ? whiteBar : blackBar;
        if(from === -1 && bar === 0) return false;
        let srcCount = (from === -1) ? bar : (turn === 'white' ? board[from] : -board[from]);
        if(srcCount <= 0) return false;
        let destCount = (turn === 'white') ? board[to] : -board[to];
        if(destCount < -1) return false;
        return true;
    }
    
    function applyMove(move){
        let {from, to} = move;
        if(from === -1){
            if(turn === 'white'){
                whiteBar--;
                if(board[to] < 0){ blackBar++; board[to] = 1; }
                else { board[to] = (board[to] || 0) + 1; }
            } else {
                blackBar--;
                if(board[to] > 0){ whiteBar++; board[to] = -1; }
                else { board[to] = (board[to] || 0) - 1; }
            }
        } else {
            if(turn === 'white'){
                board[from]--;
                if(board[to] < 0){ blackBar++; board[to] = 1; }
                else { board[to] = (board[to] || 0) + 1; }
            } else {
                board[from]++;
                if(board[to] > 0){ whiteBar++; board[to] = -1; }
                else { board[to] = (board[to] || 0) - 1; }
            }
        }
    }
    
    function nextTurn(){
        turn = (turn === 'white') ? 'black' : 'white';
        rolled = false;
        dice = [0,0];
        document.getElementById('die1').innerHTML = '⚀';
        document.getElementById('die2').innerHTML = '⚀';
        possibleMoves = [];
        selectedPoint = null;
        updateUI();
        drawBoard();
    }
    
    function tryMove(from, to){
        if(!gameStarted) return false;
        if(!rolled){
            alert("ჯერ კამათელი უნდა ყარო!");
            return false;
        }
        if((turn === 'white' && mySeat !== 'white') || (turn === 'black' && mySeat !== 'black')){
            alert("ახლა შენი ჯერი არ არის!");
            return false;
        }
        let valid = possibleMoves.find(m => m.from === from && m.to === to);
        if(!valid){
            alert("არასწორი სვლა!");
            return false;
        }
        applyMove(valid);
        let idx = dice.indexOf(valid.dieValue);
        if(idx !== -1) dice[idx] = 0;
        generateMoves();
        drawBoard();
        if(possibleMoves.length === 0) nextTurn();
        return true;
    }
    
    // ========== დაფის დახატვა (გამოკვეთილი) ==========
    function drawBoard(){
        ctx.clearRect(0,0,w,h);
        
        // ფონი
        ctx.fillStyle = '#e8dbbd';
        ctx.fillRect(0,0,w,h);
        
        const pointWidth = w / 12;
        const triangleHeight = h/2 - 28;
        
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = '#6a4a2a';
        
        for(let i=0;i<12;i++){
            let x = i * pointWidth;
            // ზედა სამკუთხედი
            ctx.beginPath();
            ctx.moveTo(x + pointWidth/2, 10);
            ctx.lineTo(x + 8, 10 + triangleHeight);
            ctx.lineTo(x + pointWidth - 8, 10 + triangleHeight);
            ctx.fillStyle = (i % 2 === 0) ? '#c9944a' : '#f5e2b0';
            ctx.fill();
            ctx.stroke();
            // ქვედა სამკუთხედი
            ctx.beginPath();
            ctx.moveTo(x + pointWidth/2, h - 10);
            ctx.lineTo(x + 8, h - 10 - triangleHeight);
            ctx.lineTo(x + pointWidth - 8, h - 10 - triangleHeight);
            ctx.fillStyle = (i % 2 === 0) ? '#c9944a' : '#f5e2b0';
            ctx.fill();
            ctx.stroke();
        }
        
        // ცენტრალური ზოლი
        ctx.fillStyle = '#b87c3a';
        ctx.fillRect(w/2-12, 0, 24, h);
        ctx.fillStyle = '#e8bc8c';
        ctx.fillRect(w/2-5, 0, 10, h);
        
        // ქვები (დიდი, გამოკვეთილი)
        for(let i=0;i<24;i++){
            let cnt = board[i];
            if(cnt===0) continue;
            let isWhite = cnt>0;
            let absCnt = Math.min(Math.abs(cnt),5);
            let x = (i%12)* pointWidth + pointWidth/2;
            let yBase = (i<12) ? 40 : h - 55;
            let step = 15;
            let radius = 18;
            for(let j=0;j<absCnt;j++){
                let y = yBase + (isWhite ? -j*step : j*step);
                // ჩრდილი
                ctx.shadowBlur = 4;
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI*2);
                ctx.fillStyle = isWhite ? '#fefefe' : '#2c2418';
                ctx.fill();
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // ბზინვარება
                ctx.beginPath();
                ctx.arc(x-3, y-3, radius-6, 0, Math.PI*2);
                ctx.fillStyle = isWhite ? '#ffffff' : '#5a4a2a';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // ზოლის ქვები
        if(whiteBar>0){
            for(let j=0;j<Math.min(whiteBar,5);j++){
                ctx.beginPath();
                ctx.arc(w/2-22, 70 + j*28, 18, 0, Math.PI*2);
                ctx.fillStyle = '#fefefe';
                ctx.fill();
                ctx.stroke();
            }
        }
        if(blackBar>0){
            for(let j=0;j<Math.min(blackBar,5);j++){
                ctx.beginPath();
                ctx.arc(w/2+22, h-70 - j*28, 18, 0, Math.PI*2);
                ctx.fillStyle = '#2c2418';
                ctx.fill();
                ctx.stroke();
            }
        }
        
        // არჩეული წერტილი
        if(selectedPoint !== null && selectedPoint>=0 && selectedPoint<24){
            let x = (selectedPoint%12)* pointWidth;
            let y = (selectedPoint<12) ? 0 : h/2;
            ctx.fillStyle = '#ffcc66aa';
            ctx.fillRect(x, y, pointWidth, h/2);
        }
    }
    
    function updateUI(){
        if(gameStarted){
            let turnName = (turn === 'white') ? (whitePlayer?.name || 'თეთრი') : (blackPlayer?.name || 'შავი');
            document.getElementById('turnLabel').innerHTML = `${turn === 'white' ? '⚪' : '⚫'} ${turnName} - ჯერი`;
        } else {
            document.getElementById('turnLabel').innerHTML = '⏳ თამაში არ დაწყებულა';
        }
    }
    
    // ========== მოვლენები ==========
    canvas.addEventListener('click', (e)=>{
        if(!gameStarted) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = w / rect.width;
        const scaleY = h / rect.height;
        let mouseX = (e.clientX - rect.left) * scaleX;
        let mouseY = (e.clientY - rect.top) * scaleY;
        let point = Math.floor(mouseX / (w/12));
        if(point<0 || point>23) return;
        let isTopHalf = mouseY < h/2;
        let idx = isTopHalf ? point : point+12;
        
        if(selectedPoint === null){
            let val = board[idx];
            if(turn === 'white' && val>0) selectedPoint = idx;
            else if(turn === 'black' && val<0) selectedPoint = idx;
            else { alert("ეს შენი ქვა არ არის!"); return; }
            drawBoard();
        } else {
            tryMove(selectedPoint, idx);
            selectedPoint = null;
            drawBoard();
        }
    });
    
    document.getElementById('rollBtn').onclick = rollDice;
    document.getElementById('resetBtn').onclick = () => { location.reload(); };
    document.getElementById('sitBtn').onclick = sitDown;
    
    updatePlayersUI();
    drawBoard();
    updateUI();
</script>
</body>
</html>
