<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ნარდზე კაიფმანია - ONLINE</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 5px; overflow: hidden; }
        
        .brand { font-size: 14px; color: #d4af37; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin: 5px 0; }
        
        .game-chat { width: 95vw; max-width: 600px; height: 70px; background: rgba(0,0,0,0.6); border: 1px solid #444; border-radius: 8px; overflow-y: auto; padding: 5px; font-size: 13px; margin-bottom: 5px; }
        .chat-input { display: flex; gap: 5px; width: 95vw; max-width: 600px; margin-bottom: 8px; }
        .chat-input input { flex: 1; background: #1a1a1a; border: 1px solid #d4af37; color: white; padding: 8px; border-radius: 5px; outline: none; }

        .status-bar { padding: 8px 20px; border-radius: 20px; margin-bottom: 10px; font-size: 14px; font-weight: bold; border: 1px solid #d4af37; transition: 0.3s; box-shadow: 0 0 10px rgba(212,175,55,0.2); }
        .active-turn { background: #d4af37; color: black; box-shadow: 0 0 20px #d4af37; }

        .board { width: 98vw; max-width: 600px; height: 380px; background: #4b2c11; border: 10px solid #2a1808; display: flex; position: relative; border-radius: 10px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .half { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        
        /* წარწერა დაფაზე */
        .board-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-90deg); color: rgba(212,175,55,0.15); font-size: 18px; font-weight: bold; pointer-events: none; white-space: nowrap; }

        .points { display: flex; justify-content: space-around; width: 100%; height: 42%; }
        .p { width: 38px; height: 100%; position: relative; display: flex; align-items: center; flex-direction: column; z-index: 5; }
        .dn { justify-content: flex-start; } .up { justify-content: flex-start; flex-direction: column-reverse; }
        
        .p::before { content: ""; position: absolute; width: 0; height: 0; border-left: 17px solid transparent; border-right: 17px solid transparent; z-index: 1; }
        .dn::before { border-top: 150px solid #5d3615; top: 0; }
        .up::before { border-bottom: 150px solid #7a4a21; bottom: 0; }

        .ch { width: 32px; height: 32px; border-radius: 50%; z-index: 10; cursor: grab; flex-shrink: 0; border: 2px solid rgba(0,0,0,0.3); }
        .w { background: radial-gradient(circle at 30% 30%, #fff, #999); box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        .b { background: radial-gradient(circle at 30% 30%, #555, #000); box-shadow: 0 4px 6px rgba(0,0,0,0.6); }

        .dice-box { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; gap: 5px; z-index: 100; pointer-events: none; }
        .die { width: 34px; height: 34px; background: white; color: black; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; box-shadow: 0 4px 10px black; }

        .controls { margin-top: 12px; display: flex; gap: 10px; }
        .btn { padding: 10px 25px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-roll { background: #b00; color: white; }
        .btn-end { background: #0055aa; color: white; display: none; }
    </style>
</head>
<body>

    <div class="brand">ნარდზე კაიფმანია</div>

    <div class="game-chat" id="chat-box"></div>
    <div class="chat-input">
        <input type="text" id="chat-msg" placeholder="მოიკითხე ძმურად...">
        <button class="btn" style="background:#d4af37" onclick="sendMsg()">✉️</button>
    </div>

    <div id="status" class="status-bar">აკავშირებს...</div>

    <div class="board">
        <div class="half"><div class="board-text">ნარდზე კაიფმანია</div><div class="points" id="top-left"></div><div class="points" id="bot-left"></div></div>
        <div class="bar"></div>
        <div class="half"><div class="board-text">ნარდზე კაიფმანია</div><div class="points" id="top-right"></div><div class="points" id="bot-right"></div></div>
        <div class="dice-box" id="dice-container"></div>
    </div>

    <div class="controls">
        <button id="roll-btn" class="btn btn-roll" onclick="roll()">გაგორება 🎲</button>
        <button id="end-btn" class="btn btn-end" onclick="endTurn()">სვლა დავასრულე ✅</button>
    </div>

    <audio id="diceSound"><source src="https://assets.mixkit.co/active_storage/sfx/2006/2006-preview.mp3" type="audio/mpeg"></audio>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nickname') || "მოთამაშე";
        let mySide = "w", currentTurn = "w", diceResults = [], draggedElement = null;

        async function init() {
            createBoard();
            syncGame();
            
            // რეალურ დროში განახლება
            _s.channel('nardi_room').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: 'room_name=eq.nardi_sync' }, payload => {
                const cmd = payload.new.text;
                if (cmd.startsWith("MOVE:")) {
                    const [_, from, to, color] = cmd.split(":");
                    moveCheckerUI(from, to, color);
                } else if (cmd.startsWith("DICE:")) {
                    diceResults = cmd.split(":")[1].split(",").map(Number);
                    renderDice();
                } else if (cmd.startsWith("TURN:")) {
                    currentTurn = cmd.split(":")[1];
                    updateStatus();
                } else if (payload.new.room_name === "nardi_chat") {
                    addChatMsg(payload.new.user_name, payload.new.text);
                }
            }).subscribe();
        }

        function createBoard() {
            const layout = {'top-right':[12,13,14,15,16,17],'top-left':[18,19,20,21,22,23],'bot-left':[5,4,3,2,1,0],'bot-right':[11,10,9,8,7,6]};
            const start = {0:{n:2,c:'w'}, 11:{n:5,c:'b'}, 16:{n:3,c:'b'}, 18:{n:5,c:'w'}, 23:{n:2,c:'b'}, 12:{n:5,c:'w'}, 7:{n:3,c:'w'}, 5:{n:5,c:'b'}};
            
            for (let s in layout) {
                const container = document.getElementById(s);
                layout[s].forEach(idx => {
                    const p = document.createElement('div');
                    p.className = `p ${s.includes('top')?'dn':'up'}`;
                    p.dataset.index = idx;
                    p.addEventListener('dragover', e => e.preventDefault());
                    p.addEventListener('drop', handleDrop);
                    if (start[idx]) for (let j=0; j<start[idx].n; j++) addChecker(p, start[idx].c);
                    container.appendChild(p);
                });
            }
        }

        function addChecker(parent, color) {
            const ch = document.createElement('div');
            ch.className = `ch ${color}`;
            ch.draggable = true;
            ch.onmousedown = ch.ontouchstart = () => { if(currentTurn === mySide) draggedElement = ch; };
            parent.appendChild(ch);
        }

        async function roll() {
            if (currentTurn !== mySide) return;
            document.getElementById('diceSound').play().catch(()=>{});
            const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
            const res = (d1 === d2) ? [d1, d1, d1, d1] : [d1, d2];
            await _s.from('messages').insert([{ user_name: myNick, text: `DICE:${res.join(",")}`, room_name: 'nardi_sync' }]);
            document.getElementById('roll-btn').style.display = "none";
            document.getElementById('end-btn').style.display = "block";
        }

        function renderDice() {
            const box = document.getElementById('dice-container');
            box.innerHTML = diceResults.map(d => `<div class="die">${d}</div>`).join('');
        }

        async function handleDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.p');
            if (!draggedElement || !target || diceResults.length === 0) return;

            const fromIdx = draggedElement.parentElement.dataset.index;
            const toIdx = target.dataset.index;
            const diff = Math.abs(fromIdx - toIdx);

            const diceIdx = diceResults.indexOf(diff);
            if (diceIdx !== -1) {
                const color = draggedElement.classList.contains('w') ? 'w' : 'b';
                await _s.from('messages').insert([{ user_name: myNick, text: `MOVE:${fromIdx}:${toIdx}:${color}`, room_name: 'nardi_sync' }]);
                diceResults.splice(diceIdx, 1);
                renderDice();
            }
        }

        function moveCheckerUI(from, to, color) {
            const fromPoint = document.querySelector(`.p[data-index="${from}"]`);
            const toPoint = document.querySelector(`.p[data-index="${to}"]`);
            const checker = fromPoint.querySelector(`.ch.${color}`);
            if (checker && toPoint) toPoint.appendChild(checker);
        }

        async function endTurn() {
            const next = currentTurn === "w" ? "b" : "w";
            await _s.from('messages').insert([{ user_name: 'SYS', text: `TURN:${next}`, room_name: 'nardi_sync' }]);
            document.getElementById('end-btn').style.display = "none";
            document.getElementById('roll-btn').style.display = "block";
            diceResults = []; renderDice();
        }

        function updateStatus() {
            const s = document.getElementById('status');
            if (currentTurn === mySide) {
                s.innerText = "შენი სვლაა! აგორებ 🎲";
                s.className = "status-bar active-turn";
            } else {
                s.innerText = "მოწინააღმდეგის სვლაა... ⏳";
                s.className = "status-bar";
            }
        }

        async function sendMsg() {
            const input = document.getElementById('chat-msg');
            if (!input.value) return;
            await _s.from('messages').insert([{ user_name: myNick, text: input.value, room_name: 'nardi_chat' }]);
            input.value = "";
        }

        function addChatMsg(user, text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.innerHTML = `<span style="color:#d4af37">● ${user}:</span> ${text}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        document.addEventListener('touchend', e => {
            if (!draggedElement) return;
            const t = e.changedTouches[0];
            const target = document.elementFromPoint(t.clientX, t.clientY)?.closest('.p');
            if (target) handleDrop({ preventDefault:()=>{}, target: target });
            draggedElement = null;
        });

        init();
    </script>
</body>
</html>
