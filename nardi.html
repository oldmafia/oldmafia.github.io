<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔱 ნარდზე კაიფმანია 🔱</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; margin: 0; padding: 5px; }
        
        .header h2 { color: #d4af37; margin: 5px 0; font-size: 1.1rem; text-align: center; }
        
        /* ავატარების სექცია */
        .players-bar { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; max-width: 500px; justify-content: center; }
        .p-slot { display: flex; align-items: center; gap: 8px; padding: 5px 12px; border: 1px solid #333; border-radius: 20px; font-size: 12px; background: #151515; }
        .avatar { width: 15px; height: 15px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }
        .av-w { background: white; box-shadow: 0 0 5px white; }
        .av-b { background: #444; box-shadow: 0 0 5px #000; }

        .board { 
            width: 100%; max-width: 500px; aspect-ratio: 5/4; 
            background: #3d230d; border: 6px solid #1a0f05; 
            display: flex; position: relative; border-radius: 4px;
        }
        .half { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .bar { width: 30px; background: #1a0f05; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        .points-row { display: flex; width: 100%; height: 44%; justify-content: space-around; }
        .p { width: 15%; height: 100%; position: relative; display: flex; flex-direction: column; align-items: center; }
        .up { flex-direction: column-reverse; }

        /* ქვების დიზაინი */
        .ch { 
            width: 22px; height: 22px; border-radius: 50%; z-index: 10; 
            border: 1px solid rgba(0,0,0,0.4); margin-top: -14px; position: relative;
        }
        .dn .ch:first-child { margin-top: 2px; }
        .up .ch:first-child { margin-bottom: 2px; }
        .w { background: radial-gradient(circle at 30% 30%, #fff, #999); }
        .b { background: radial-gradient(circle at 30% 30%, #444, #000); }

        .chat-area { width: 100%; max-width: 500px; background: #111; margin-top: 8px; border-radius: 5px; border: 1px solid #222; }
        #chat-msgs { height: 70px; overflow-y: auto; padding: 5px; font-size: 11px; }
        .chat-input { display: flex; border-top: 1px solid #222; }
        .chat-input input { flex: 1; background: none; border: none; color: white; padding: 6px; font-size: 11px; outline: none; }

        .controls { display: flex; gap: 5px; margin: 8px 0; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; font-size: 11px; cursor: pointer; color: white; }
        .active-turn { border: 2px solid gold !important; background: #222 !important; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🔱 ნარდზე კაიფმანია 🔱</h2>
    </div>

    <div class="players-bar">
        <div id="slot-w" class="p-slot" onclick="sit('w')">
            <div class="avatar av-w"></div> <span id="name-w">თეთრი: თავისუფალი</span>
        </div>
        <div id="slot-b" class="p-slot" onclick="sit('b')">
            <div class="avatar av-b"></div> <span id="name-b">შავი: თავისუფალი</span>
        </div>
    </div>

    <div class="board" id="main-board">
        <div class="half">
            <div class="points-row" id="top-left"></div>
            <div class="points-row" id="bot-left"></div>
        </div>
        <div class="bar" id="mid-bar"></div>
        <div class="half">
            <div class="points-row" id="top-right"></div>
            <div class="points-row" id="bot-right"></div>
        </div>
        <div id="dice-res" style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); display:flex; gap:5px; pointer-events:none"></div>
    </div>

    <div class="controls">
        <button id="roll-btn" class="btn" style="background:#b00" onclick="roll()">გაგორება 🎲</button>
        <button id="end-btn" class="btn" style="background:#0055aa; display:none" onclick="endTurn()">დასრულება ✅</button>
        <button class="btn" style="background:#333" onclick="resetGame()">🔄 რესეტი</button>
    </div>

    <div class="chat-area">
        <div id="chat-msgs"></div>
        <div class="chat-input"><input type="text" id="chat-in" placeholder="დაწერე..." onkeypress="if(event.key==='Enter') sendChat()"></div>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nardi_nick') || "მოთამაშე_" + Math.floor(Math.random()*99);
        if(!localStorage.getItem('nardi_nick')) localStorage.setItem('nardi_nick', myNick);

        let mySide = null, currentTurn = "w", diceResults = [], draggedElement = null;

        function createBoard() {
            const layout = { 'top-left':[12,13,14,15,16,17], 'top-right':[18,19,20,21,22,23], 'bot-right':[5,4,3,2,1,0], 'bot-left':[11,10,9,8,7,6] };
            const start = { 0:{n:2,c:'w'}, 11:{n:5,c:'w'}, 16:{n:3,c:'w'}, 18:{n:5,c:'w'}, 23:{n:2,c:'b'}, 12:{n:5,c:'b'}, 7:{n:3,c:'b'}, 5:{n:5,c:'b'} };

            for (let rowId in layout) {
                const container = document.getElementById(rowId);
                layout[rowId].forEach(idx => {
                    const p = document.createElement('div');
                    p.className = `p ${rowId.includes('top')?'dn':'up'}`;
                    p.dataset.index = idx;
                    p.addEventListener('dragover', e => e.preventDefault());
                    p.addEventListener('drop', handleDrop);
                    if (start[idx]) for (let j=0; j<start[idx].n; j++) addChecker(p, start[idx].c);
                    container.appendChild(p);
                });
            }
        }

        function addChecker(parent, color) {
            const ch = document.createElement('div');
            ch.className = `ch ${color}`;
            ch.draggable = true;
            ch.onmousedown = ch.ontouchstart = () => { if(mySide === currentTurn && ch.classList.contains(mySide)) draggedElement = ch; };
            parent.appendChild(ch);
        }

        async function sit(side) {
            if(mySide) return;
            mySide = side;
            await _s.from('messages').insert([{ user_name: myNick, text: `SIT:${side}`, room_name: 'nardi_sync' }]);
        }

        async function sendChat() {
            const inp = document.getElementById('chat-in');
            if(!inp.value) return;
            await _s.from('messages').insert([{ user_name: myNick, text: `CHAT:${inp.value}`, room_name: 'nardi_sync' }]);
            inp.value = "";
        }

        function executeMoveUI(from, to, color) {
            const fP = from === "BAR" ? document.getElementById('mid-bar') : document.querySelector(`.p[data-index="${from}"]`);
            const tP = document.querySelector(`.p[data-index="${to}"]`);
            if (fP && tP) {
                const ch = fP.querySelector(`.ch.${color}`);
                if (ch) {
                    const opp = tP.querySelector(`.ch.${color==='w'?'b':'w'}`);
                    if(opp && tP.querySelectorAll('.ch').length === 1) document.getElementById('mid-bar').appendChild(opp);
                    tP.appendChild(ch);
                }
            }
        }

        async function roll() {
            if (mySide !== currentTurn) return;
            const res = [Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1];
            if (res[0] === res[1]) res.push(res[0], res[0]);
            await _s.from('messages').insert([{ user_name: myNick, text: `DICE:${res.join(",")}`, room_name: 'nardi_sync' }]);
            document.getElementById('roll-btn').style.display = "none";
            document.getElementById('end-btn').style.display = "block";
        }

        async function handleDrop(e) {
            const target = e.target.closest('.p');
            if (!draggedElement || !target || diceResults.length === 0) return;
            const fromIdx = draggedElement.parentElement.id === "mid-bar" ? "BAR" : draggedElement.parentElement.dataset.index;
            const toIdx = target.dataset.index;
            const diff = (fromIdx === "BAR") ? (mySide === 'w' ? 24 - toIdx : parseInt(toIdx) + 1) : Math.abs(fromIdx - toIdx);

            if (diceResults.includes(diff)) {
                await _s.from('messages').insert([{ user_name: myNick, text: `MOVE:${fromIdx}:${toIdx}:${mySide}`, room_name: 'nardi_sync' }]);
                diceResults.splice(diceResults.indexOf(diff), 1);
                document.getElementById('dice-res').innerHTML = diceResults.map(d => `<div style="background:white;color:black;padding:2px 6px;border-radius:3px;font-weight:bold">${d}</div>`).join('');
            }
            draggedElement = null;
        }

        async function endTurn() {
            const next = currentTurn === "w" ? "b" : "w";
            await _s.from('messages').insert([{ user_name: 'SYS', text: `TURN:${next}`, room_name: 'nardi_sync' }]);
            document.getElementById('end-btn').style.display = "none";
            document.getElementById('roll-btn').style.display = "block";
        }

        function init() {
            createBoard();
            _s.channel('nardi').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: 'room_name=eq.nardi_sync' }, payload => {
                const m = payload.new.text, u = payload.new.user_name;
                if (m.startsWith("SIT:")) { document.getElementById('name-'+m.split(":")[1]).innerText = u; }
                else if (m.startsWith("CHAT:")) { document.getElementById('chat-msgs').innerHTML += `<div><b>${u}:</b> ${m.replace("CHAT:","")}</div>`; }
                else if (m.startsWith("MOVE:")) executeMoveUI(...m.split(":").slice(1));
                else if (m.startsWith("DICE:")) { diceResults = m.split(":")[1].split(",").map(Number); document.getElementById('dice-res').innerHTML = diceResults.map(d => `<div style="background:white;color:black;padding:2px 6px;border-radius:3px;font-weight:bold">${d}</div>`).join(''); }
                else if (m.startsWith("TURN:")) { currentTurn = m.split(":")[1]; document.getElementById('slot-w').className = currentTurn==='w'?'p-slot active-turn':'p-slot'; document.getElementById('slot-b').className = currentTurn==='b'?'p-slot active-turn':'p-slot'; }
            }).subscribe();
        }

        function resetGame() { if(confirm("გასუფთავდეს დაფა?")) location.reload(); }
        init();
    </script>
</body>
</html>
