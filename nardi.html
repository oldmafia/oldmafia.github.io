<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎲 ნარდი · Backgammon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1e3a1a;
            font-family: system-ui, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-container {
            max-width: 700px;
            width: 100%;
            background: #c9a87b;
            border-radius: 28px;
            padding: 16px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
            border: 1px solid #e8c28e;
        }
        h1 {
            text-align: center;
            color: #f7e5b5;
            font-size: 1.4rem;
            margin-bottom: 12px;
            text-shadow: 1px 1px 2px #5a3a1a;
        }
        .board-wrapper {
            background: #8b5a2b;
            border-radius: 20px;
            padding: 10px;
            box-shadow: inset 0 0 0 2px #e8c28e, 0 6px 12px rgba(0,0,0,0.3);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #f3e5c0;
            border-radius: 16px;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .panel {
            margin-top: 16px;
            background: #4a3724;
            border-radius: 60px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: inset 0 1px 1px #e8c28e, 0 4px 8px black;
        }
        .turn {
            background: #000000aa;
            padding: 6px 16px;
            border-radius: 40px;
            color: #ffefb9;
            font-weight: bold;
            font-size: 0.85rem;
            backdrop-filter: blur(4px);
        }
        .dice-area {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .die {
            background: #faf2e0;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #3a2a1a;
            box-shadow: inset 0 0 0 2px #b97f3a, 0 3px 6px black;
        }
        button {
            background: #e4a842;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 3px 5px black;
            transition: 0.05s linear;
        }
        button:active { transform: scale(0.96); }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            color: #ffefb9;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }
        @media (max-width: 550px) {
            .die { width: 42px; height: 42px; font-size: 28px; }
            button { padding: 6px 14px; font-size: 0.75rem; }
            .turn { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🎲 ნარდი · Backgammon</h1>
    <div class="board-wrapper">
        <canvas id="boardCanvas" width="650" height="480" style="width:100%; height:auto; max-width:650px; aspect-ratio:650/480"></canvas>
    </div>
    <div class="panel">
        <div class="turn" id="turnLabel">⚪ თეთრის ჯერი</div>
        <div class="dice-area">
            <div class="die" id="die1">⚀</div>
            <div class="die" id="die2">⚀</div>
            <button id="rollBtn">🎲 ყარე</button>
        </div>
        <button id="resetBtn">⟳ ახალი</button>
    </div>
    <a href="chat.html" class="back-link">← ჩატში დაბრუნება</a>
</div>

<script>
    (function(){
        const canvas = document.getElementById('boardCanvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        
        // 24 წერტილი (0 = თეთრის სახლი, 23 = შავის სახლი)
        let board = [
            2,0,0,0,0,-5,0,-3,0,0,0,0,
            5,-2,0,0,0,0,3,0,0,0,0,-4
        ];
        let whiteBar = 0, blackBar = 0;
        let turn = 'white';
        let dice = [0,0];
        let rolled = false;
        let possibleMoves = [];
        let selectedPoint = null;
        
        function initGame(){
            board = [
                2,0,0,0,0,-5,0,-3,0,0,0,0,
                5,-2,0,0,0,0,3,0,0,0,0,-4
            ];
            whiteBar = 0; blackBar = 0;
            turn = 'white';
            dice = [0,0];
            rolled = false;
            possibleMoves = [];
            selectedPoint = null;
            drawBoard();
            updateUI();
        }
        
        function getDiceSymbol(v){
            return {1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'}[v];
        }
        
        function rollDice(){
            if(rolled){
                alert("უკვე დაყარე! გადაიტანე ქვები.");
                return;
            }
            let d1 = Math.floor(Math.random()*6)+1;
            let d2 = Math.floor(Math.random()*6)+1;
            dice = [d1, d2];
            document.getElementById('die1').innerHTML = getDiceSymbol(d1);
            document.getElementById('die2').innerHTML = getDiceSymbol(d2);
            rolled = true;
            generateMoves();
            if(possibleMoves.length === 0){
                alert(`${turn === 'white' ? 'თეთრს' : 'შავს'} სვლა არ აქვს! ჯერი გადადის.`);
                nextTurn();
            }
            drawBoard();
        }
        
        function generateMoves(){
            possibleMoves = [];
            let bar = (turn === 'white') ? whiteBar : blackBar;
            let fromPoints = [];
            if(bar > 0){
                fromPoints.push(-1);
            } else {
                for(let i=0;i<24;i++){
                    let val = board[i];
                    if(turn === 'white' && val > 0) fromPoints.push(i);
                    if(turn === 'black' && val < 0) fromPoints.push(i);
                }
            }
            for(let from of fromPoints){
                for(let d of dice){
                    if(d===0) continue;
                    let to;
                    if(from === -1){
                        to = (turn === 'white') ? d-1 : 24-d;
                    } else {
                        to = (turn === 'white') ? from + d : from - d;
                    }
                    if(isValidMove(from, to)){
                        possibleMoves.push({from, to, dieValue:d});
                    }
                }
            }
            possibleMoves = possibleMoves.filter((v,i,a)=>a.findIndex(t=>t.from===v.from && t.to===v.to)===i);
        }
        
        function isValidMove(from, to){
            if(to < 0 || to > 23) return false;
            let bar = (turn === 'white') ? whiteBar : blackBar;
            if(from === -1 && bar === 0) return false;
            let srcCount = (from === -1) ? bar : (turn === 'white' ? board[from] : -board[from]);
            if(srcCount <= 0) return false;
            let destCount = (turn === 'white') ? board[to] : -board[to];
            if(destCount < -1) return false;
            return true;
        }
        
        function applyMove(move){
            let {from, to} = move;
            if(from === -1){
                if(turn === 'white'){
                    whiteBar--;
                    if(board[to] < 0){ blackBar++; board[to] = 1; }
                    else { board[to] = (board[to] || 0) + 1; }
                } else {
                    blackBar--;
                    if(board[to] > 0){ whiteBar++; board[to] = -1; }
                    else { board[to] = (board[to] || 0) - 1; }
                }
            } else {
                if(turn === 'white'){
                    board[from]--;
                    if(board[to] < 0){ blackBar++; board[to] = 1; }
                    else { board[to] = (board[to] || 0) + 1; }
                } else {
                    board[from]++;
                    if(board[to] > 0){ whiteBar++; board[to] = -1; }
                    else { board[to] = (board[to] || 0) - 1; }
                }
            }
        }
        
        function nextTurn(){
            turn = (turn === 'white') ? 'black' : 'white';
            rolled = false;
            dice = [0,0];
            document.getElementById('die1').innerHTML = '⚀';
            document.getElementById('die2').innerHTML = '⚀';
            possibleMoves = [];
            selectedPoint = null;
            updateUI();
            drawBoard();
        }
        
        function tryMove(from, to){
            if(!rolled){
                alert("ჯერ კამათელი უნდა ყარო!");
                return false;
            }
            let valid = possibleMoves.find(m => m.from === from && m.to === to);
            if(!valid){
                alert("არასწორი სვლა!");
                return false;
            }
            applyMove(valid);
            let idx = dice.indexOf(valid.dieValue);
            if(idx !== -1) dice[idx] = 0;
            generateMoves();
            drawBoard();
            if(possibleMoves.length === 0) nextTurn();
            return true;
        }
        
        // ========== დაფის დახატვა (კლასიკური სტილი) ==========
        function drawBoard(){
            ctx.clearRect(0,0,w,h);
            
            // ხის ფონი
            ctx.fillStyle = '#e8dbbd';
            ctx.fillRect(0,0,w,h);
            
            // სამკუთხედები (points)
            const pointWidth = w / 12;
            const topY = 0;
            const bottomY = h/2;
            const triangleHeight = h/2 - 8;
            
            for(let i=0;i<12;i++){
                let x = i * pointWidth;
                // ზედა რიგი (0-11)
                ctx.beginPath();
                ctx.moveTo(x + pointWidth/2, topY + 5);
                ctx.lineTo(x + 5, topY + triangleHeight);
                ctx.lineTo(x + pointWidth - 5, topY + triangleHeight);
                ctx.fillStyle = (i % 2 === 0) ? '#aa7a44' : '#e8c8a0';
                ctx.fill();
                ctx.strokeStyle = '#8b5a2b';
                ctx.stroke();
                
                // ქვედა რიგი (12-23)
                ctx.beginPath();
                ctx.moveTo(x + pointWidth/2, h - 5);
                ctx.lineTo(x + 5, h - triangleHeight);
                ctx.lineTo(x + pointWidth - 5, h - triangleHeight);
                ctx.fillStyle = (i % 2 === 0) ? '#aa7a44' : '#e8c8a0';
                ctx.fill();
                ctx.stroke();
            }
            
            // ცენტრალური ზოლი
            ctx.fillStyle = '#b87c3a';
            ctx.fillRect(w/2-10, 0, 20, h);
            ctx.fillStyle = '#e8bc8c';
            ctx.fillRect(w/2-4, 0, 8, h);
            
            // ქვების დახატვა
            for(let i=0;i<24;i++){
                let cnt = board[i];
                if(cnt===0) continue;
                let isWhite = cnt>0;
                let absCnt = Math.min(Math.abs(cnt),5);
                let x = (i%12)* pointWidth + pointWidth/2;
                let yBase = (i<12) ? 30 : h-65;
                let step = 11;
                let radius = 13;
                for(let j=0;j<absCnt;j++){
                    let y = yBase + (isWhite ? -j*step : j*step);
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI*2);
                    ctx.fillStyle = isWhite ? '#f5f5f5' : '#3a2a1a';
                    ctx.fill();
                    ctx.strokeStyle = '#222';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    // 3D ეფექტი
                    ctx.beginPath();
                    ctx.arc(x-2, y-2, radius-3, 0, Math.PI*2);
                    ctx.fillStyle = isWhite ? '#ffffff' : '#5a4a2a';
                    ctx.fill();
                }
            }
            
            // ზოლის ქვები
            if(whiteBar>0){
                for(let j=0;j<Math.min(whiteBar,5);j++){
                    ctx.beginPath();
                    ctx.arc(w/2-18, 80 + j*20, 14, 0, Math.PI*2);
                    ctx.fillStyle = '#f5f5f5';
                    ctx.fill();
                }
            }
            if(blackBar>0){
                for(let j=0;j<Math.min(blackBar,5);j++){
                    ctx.beginPath();
                    ctx.arc(w/2+18, h-80 - j*20, 14, 0, Math.PI*2);
                    ctx.fillStyle = '#3a2a1a';
                    ctx.fill();
                }
            }
            
            // არჩეული წერტილის მონიშვნა
            if(selectedPoint !== null && selectedPoint >=0 && selectedPoint<24){
                let x = (selectedPoint%12)* pointWidth;
                let y = (selectedPoint<12) ? 0 : h/2;
                ctx.fillStyle = '#ffcc44aa';
                ctx.fillRect(x, y, pointWidth, h/2);
            }
        }
        
        function updateUI(){
            document.getElementById('turnLabel').innerHTML = (turn === 'white') ? '⚪ თეთრის ჯერი' : '⚫ შავის ჯერი';
        }
        
        // კლიკის დამუშავება
        canvas.addEventListener('click', (e)=>{
            const rect = canvas.getBoundingClientRect();
            const scaleX = w / rect.width;
            const scaleY = h / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            let point = Math.floor(mouseX / (w/12));
            if(point<0 || point>23) return;
            let isTopHalf = mouseY < h/2;
            let idx = isTopHalf ? point : point+12;
            
            if(selectedPoint === null){
                // არჩევა
                let val = board[idx];
                if(turn === 'white' && val>0) selectedPoint = idx;
                else if(turn === 'black' && val<0) selectedPoint = idx;
                else if(turn === 'white' && whiteBar>0 && idx=== -1) selectedPoint = -1;
                else if(turn === 'black' && blackBar>0 && idx=== -1) selectedPoint = -1;
                else { alert("ეს შენი ქვა არ არის!"); return; }
                drawBoard();
            } else {
                // გადატანა
                tryMove(selectedPoint, idx);
                selectedPoint = null;
                drawBoard();
            }
        });
        
        document.getElementById('rollBtn').onclick = rollDice;
        document.getElementById('resetBtn').onclick = ()=>{ initGame(); selectedPoint=null; };
        initGame();
    })();
</script>
</body>
</html>
