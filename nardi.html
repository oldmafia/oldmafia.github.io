<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - REALTIME NARDI</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        
        .seats { display: flex; gap: 20px; margin-bottom: 15px; }
        .seat { padding: 10px 20px; border: 1px dashed #d4af37; border-radius: 12px; font-size: 14px; color: #888; cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.3); }
        .seat.occupied { border-style: solid; color: gold; background: rgba(212,175,55,0.15); box-shadow: 0 0 10px rgba(212,175,55,0.2); }

        .board {
            width: 95vw; max-width: 600px; height: 420px;
            background: #4b2c11; border: 12px solid #2a1808;
            display: flex; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            border-radius: 5px;
        }
        .half { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .bar { width: 26px; background: #2a1808; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 15px black; }

        .dice-container { position: absolute; display: flex; gap: 10px; z-index: 100; pointer-events: none; }
        .die { width: 38px; height: 38px; background: white; color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 22px; box-shadow: 3px 3px 12px rgba(0,0,0,0.6); border: 1px solid #ccc; }

        .points { display: flex; justify-content: space-around; width: 100%; height: 42%; }
        .p { width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; position: relative; }
        .dn { border-top: 160px solid #7a4a21; } 
        .up { border-bottom: 160px solid #c49a6c; }
        .p:nth-child(even).dn { border-top-color: #c49a6c; }
        .p:nth-child(even).up { border-bottom-color: #7a4a21; }

        .ch { width: 28px; height: 28px; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); border: 1px solid rgba(0,0,0,0.4); box-shadow: 0 2px 4px black; }
        .w { background: radial-gradient(circle, #fff, #bbb); }
        .b { background: radial-gradient(circle, #444, #111); }

        .btn { margin-top: 25px; padding: 14px 50px; background: linear-gradient(#d00, #800); border: none; color: white; border-radius: 35px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 5px 15px rgba(255,0,0,0.3); transition: 0.2s; }
        .btn:active { transform: scale(0.95); box-shadow: none; }
        .back { margin-top: 20px; color: #666; text-decoration: none; font-size: 14px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="seats">
        <div id="seat-w" class="seat" onclick="sit('w')">⚪ თეთრი: თავისუფალი</div>
        <div id="seat-b" class="seat" onclick="sit('b')">⚫ შავი: თავისუფალი</div>
    </div>

    <div class="board">
        <div class="half">
            <div class="points" id="top-left"></div>
            <div class="points" id="bot-left"></div>
        </div>
        <div class="bar">
            <div class="dice-container" id="dice-box"></div>
        </div>
        <div class="half">
            <div class="points" id="top-right"></div>
            <div class="points" id="bot-right"></div>
        </div>
    </div>

    <button class="btn" onclick="roll()">გაგორება 🎲</button>
    <a href="chat.html" class="back">დაბრუნება ჩატში</a>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nickname') || "სტუმარი";

        async function init() {
            createBoard();
            await checkSeats();
            
            // რეალთაიმი: სხვამ რომ დაინახოს შენი დაჯდომა
            _s.channel('nardi_realtime')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: 'room_name=eq.nardi_status' }, payload => {
                    const side = payload.new.text.includes("თეთრი:") ? 'w' : 'b';
                    updateSeatUI(side, payload.new.user_name);
                })
                .subscribe();
        }

        function createBoard() {
            const layout = {
                'top-left':  [ {n:5, c:'w'}, {}, {}, {}, {n:3, c:'b'}, {} ],
                'top-right': [ {}, {}, {}, {}, {}, {n:2, c:'b'} ],
                'bot-left':  [ {n:5, c:'b'}, {}, {}, {}, {n:3, c:'w'}, {} ],
                'bot-right': [ {}, {}, {}, {}, {}, {n:2, c:'w'} ]
            };

            for (let side in layout) {
                const container = document.getElementById(side);
                const isTop = side.includes('top');
                container.innerHTML = "";
                layout[side].forEach((pos, i) => {
                    const p = document.createElement('div');
                    p.className = `p ${isTop ? 'dn' : 'up'}`;
                    if (pos.n) {
                        for (let j = 0; j < pos.n; j++) {
                            const ch = document.createElement('div');
                            ch.className = `ch ${pos.c}`;
                            ch.style[isTop ? 'top' : 'bottom'] = `-${160 - (j * 26)}px`;
                            p.appendChild(ch);
                        }
                    }
                    container.appendChild(p);
                });
            }
        }

        async function checkSeats() {
            const { data } = await _s.from('messages').select('*').eq('room_name', 'nardi_status').order('created_at', { ascending: false }).limit(2);
            if (data) {
                data.forEach(msg => {
                    const side = msg.text.includes("თეთრი:") ? 'w' : 'b';
                    updateSeatUI(side, msg.user_name);
                });
            }
        }

        function updateSeatUI(side, name) {
            const s = document.getElementById('seat-' + side);
            s.innerText = (side === 'w' ? "⚪ თეთრი: " : "⚫ შავი: ") + name;
            s.classList.add('occupied');
        }

        async function sit(side) {
            const s = document.getElementById('seat-' + side);
            if (s.classList.contains('occupied')) return;

            const { error } = await _s.from('messages').insert([{ 
                user_name: myNick, 
                text: (side === 'w' ? "თეთრი:" : "შავი:"), 
                room_name: 'nardi_status' 
            }]);

            if (!error) {
                updateSeatUI(side, myNick);
                await _s.from('messages').insert([{ user_name: '🤖', text: myNick + " დაჯდა ნარდზე!", room_name: '🔱 ნარდი' }]);
            }
        }

        function roll() {
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-box').innerHTML = `<div class="die">${d1}</div><div class="die">${d2}</div>`;
        }

        init();
    </script>
</body>
</html>
