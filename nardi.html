<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - NARDI PRO</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; margin: 0; padding: 5px; overflow: hidden; }
        
        /* პატარა ჩატი */
        .game-chat { width: 95vw; max-width: 600px; height: 80px; background: rgba(255,255,255,0.05); margin-bottom: 5px; border-radius: 10px; overflow-y: auto; padding: 5px; font-size: 12px; border: 1px solid #333; }
        .chat-input-row { display: flex; gap: 5px; width: 95vw; max-width: 600px; margin-bottom: 10px; }
        .chat-input-row input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; }

        /* დაფა */
        .board { width: 98vw; max-width: 600px; height: 360px; background: #3d230d; border: 8px solid #1a0f05; display: flex; position: relative; border-radius: 8px; touch-action: none; }
        .half { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .bar { width: 22px; background: #1a0f05; height: 100%; display: flex; align-items: center; justify-content: center; }
        .dice-container { position: absolute; display: flex; gap: 5px; z-index: 100; }
        .die { width: 30px; height: 30px; background: white; color: black; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; box-shadow: 2px 2px 5px black; }

        .points { display: flex; justify-content: space-around; width: 100%; height: 42%; }
        .p { width: 35px; height: 100%; position: relative; display: flex; align-items: center; z-index: 5; }
        .dn { flex-direction: column; justify-content: flex-start; } 
        .up { flex-direction: column-reverse; justify-content: flex-start; }
        .p::before { content: ""; position: absolute; width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent; z-index: 1; }
        .dn::before { border-top: 130px solid #5d3615; top: 0; }
        .up::before { border-bottom: 130px solid #8e5a2d; bottom: 0; }

        .ch { width: 28px; height: 28px; border-radius: 50%; z-index: 10; border: 1px solid rgba(0,0,0,0.4); cursor: grab; touch-action: none; flex-shrink: 0; margin: -1px 0; }
        .w { background: radial-gradient(circle, #fff, #ccc); }
        .b { background: radial-gradient(circle, #444, #000); }

        .controls { margin-top: 10px; display: flex; gap: 8px; }
        .btn { padding: 10px 20px; border: none; color: white; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-roll { background: #b00; }
        .btn-end { background: #0055aa; display: none; }
    </style>
</head>
<body>

    <audio id="diceSound"><source src="https://assets.mixkit.co/active_storage/sfx/2006/2006-preview.mp3" type="audio/mpeg"></audio>

    <div class="game-chat" id="chat-box">სისტემა: მოგესალმებით!</div>
    <div class="chat-input-row">
        <input type="text" id="chat-msg" placeholder="დაწერე რამე ან სმაილი...">
        <button class="btn" style="background:#444" onclick="sendMsg()">✉️</button>
    </div>

    <div class="board">
        <div class="half"><div class="points" id="top-left"></div><div class="points" id="bot-left"></div></div>
        <div class="bar"><div class="dice-container" id="dice-box"></div></div>
        <div class="half"><div class="points" id="top-right"></div><div class="points" id="bot-right"></div></div>
    </div>

    <div class="controls">
        <button id="roll-btn" class="btn btn-roll" onclick="roll()">გაგორება 🎲</button>
        <button id="end-btn" class="btn btn-end" onclick="endTurn()">სვლა დავასრულე ✅</button>
        <button class="btn" style="background:gold; color:black" onclick="location.reload()">🔄 რესეტი</button>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nickname') || "მოთამაშე";
        let mySide = "w", currentTurn = "w", draggedElement = null, diceResults = [];

        async function init() {
            createBoard();
            loadChat();
            _s.channel('nardi_realtime').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: 'room_name=eq.nardi_game' }, payload => {
                const div = document.createElement('div');
                div.innerHTML = `<b>${payload.new.user_name}:</b> ${payload.new.text}`;
                const box = document.getElementById('chat-box');
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            }).subscribe();
        }

        function createBoard() {
            const layout = {'top-right':[12,13,14,15,16,17],'top-left':[18,19,20,21,22,23],'bot-left':[5,4,3,2,1,0],'bot-right':[11,10,9,8,7,6]};
            const start = {0:{n:2,c:'w'}, 11:{n:5,c:'b'}, 16:{n:3,c:'b'}, 18:{n:5,c:'w'}, 23:{n:2,c:'b'}, 12:{n:5,c:'w'}, 7:{n:3,c:'w'}, 5:{n:5,c:'b'}};
            for (let s in layout) {
                const container = document.getElementById(s);
                layout[s].forEach(idx => {
                    const p = document.createElement('div');
                    p.className = `p ${s.includes('top')?'dn':'up'}`;
                    p.dataset.index = idx;
                    p.addEventListener('dragover', e => e.preventDefault());
                    p.addEventListener('drop', handleDrop);
                    if (start[idx]) for (let j=0; j<start[idx].n; j++) addChecker(p, start[idx].c);
                    container.appendChild(p);
                });
            }
        }

        function addChecker(parent, color) {
            const ch = document.createElement('div');
            ch.className = `ch ${color}`;
            ch.draggable = true;
            ch.onmousedown = ch.ontouchstart = () => { draggedElement = ch; };
            parent.appendChild(ch);
        }

        function roll() {
            document.getElementById('diceSound').play().catch(()=>{});
            const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
            diceResults = (d1 === d2) ? [d1, d1, d1, d1] : [d1, d2];
            renderDice();
            document.getElementById('end-btn').style.display = "block";
            document.getElementById('roll-btn').style.display = "none";
        }

        function renderDice() {
            document.getElementById('dice-box').innerHTML = diceResults.map(d => `<div class="die">${d}</div>`).join('');
        }

        function handleDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.p');
            if (!draggedElement || !target || diceResults.length === 0) return;

            const fromIdx = parseInt(draggedElement.parentElement.dataset.index);
            const toIdx = parseInt(target.dataset.index);
            const diff = Math.abs(fromIdx - toIdx);

            const diceIdx = diceResults.indexOf(diff);
            if (diceIdx !== -1) {
                target.appendChild(draggedElement);
                diceResults.splice(diceIdx, 1);
                renderDice();
            } else {
                alert("მხოლოდ კამათლის მიხედვით!");
            }
        }

        function endTurn() {
            diceResults = [];
            renderDice();
            document.getElementById('end-btn').style.display = "none";
            document.getElementById('roll-btn').style.display = "block";
        }

        async function sendMsg() {
            const input = document.getElementById('chat-msg');
            if (!input.value) return;
            await _s.from('messages').insert([{ user_name: myNick, text: input.value, room_name: 'nardi_game' }]);
            input.value = "";
        }

        async function loadChat() {
            const { data } = await _s.from('messages').select('*').eq('room_name', 'nardi_game').order('created_at', { ascending: false }).limit(10);
            if (data) data.reverse().forEach(m => {
                const div = document.createElement('div');
                div.innerHTML = `<b>${m.user_name}:</b> ${m.text}`;
                document.getElementById('chat-box').appendChild(div);
            });
        }

        document.addEventListener('touchend', e => {
            if (!draggedElement) return;
            const t = e.changedTouches[0];
            const target = document.elementFromPoint(t.clientX, t.clientY)?.closest('.p');
            if (target) handleDrop({ preventDefault: ()=>{}, target: target });
            draggedElement = null;
        });

        init();
    </script>
</body>
</html>
