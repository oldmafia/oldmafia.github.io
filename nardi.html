<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>OLD MAFIA - NARDI</title>
    <style>
        body { background: #1a0a00; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        .board {
            width: 600px; height: 400px; background: #5d3a1a; border: 10px solid #3d2610;
            display: flex; position: relative; margin-top: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .half { width: 50%; height: 100%; display: flex; justify-content: space-between; border: 1px solid #3d2610; }
        .point-container { width: 100%; height: 50%; display: flex; justify-content: space-around; }
        .bottom { align-items: flex-end; }
        .point { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; }
        .up { border-top: 150px solid #8b5a2b; }
        .down { border-bottom: 150px solid #8b5a2b; }
        .dice-zone { margin-top: 20px; display: flex; gap: 20px; align-items: center; }
        .dice { width: 50px; height: 50px; background: white; color: black; border-radius: 8px; 
                display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        .roll-btn { padding: 10px 20px; background: #ff0000; border: none; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🔱 ნარდი</h1>

    <div class="board">
        <div class="half">
            </div>
        <div style="width: 20px; background: #3d2610;"></div> <div class="half"></div>
    </div>

    <div class="dice-zone">
        <div id="dice1" class="dice">?</div>
        <div id="dice2" class="dice">?</div>
        <button class="roll-btn" onclick="rollDice()">გაგორება 🎲</button>
    </div>

    <p><a href="chat.html" style="color: red; text-decoration: none;">⬅ უკან ჩატში</a></p>

    <script>
        function rollDice() {
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            
            document.getElementById('dice1').innerText = d1;
            document.getElementById('dice2').innerText = d2;
            
            if(d1 === d2) {
                alert("დუ-ბარი! " + d1 + ":" + d2);
            }
        }
    </script>
</body>
</html>
