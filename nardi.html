<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLD MAFIA - NARDI FIXED</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .seats { display: flex; gap: 10px; margin-bottom: 10px; }
        .seat { padding: 10px 15px; border: 1px dashed #d4af37; border-radius: 10px; font-size: 12px; color: #888; cursor: pointer; background: rgba(0,0,0,0.4); }
        .seat.occupied { border-style: solid; color: gold; background: rgba(212,175,55,0.15); }
        .reset-btn { padding: 10px; background: #333; border: 1px solid #555; color: white; border-radius: 10px; cursor: pointer; font-size: 12px; }

        .board {
            width: 95vw; max-width: 600px; height: 400px;
            background: #4b2c11; border: 10px solid #2a1808;
            display: flex; position: relative; border-radius: 5px; touch-action: none;
        }
        .half { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .bar { width: 24px; background: #2a1808; height: 100%; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 15px black; }

        .dice-container { position: absolute; display: flex; gap: 8px; z-index: 100; }
        .die { width: 35px; height: 35px; background: white; color: black; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }

        .points { display: flex; justify-content: space-around; width: 100%; height: 45%; }
        /* ქვების დალაგება ძირში: flex-direction და justify-content */
        .p { width: 40px; height: 100%; position: relative; display: flex; align-items: center; z-index: 5; }
        .dn { flex-direction: column; justify-content: flex-start; } /* ზედა პუნქტები - ქვები იწყება ზემოდან */
        .up { flex-direction: column-reverse; justify-content: flex-start; } /* ქვედა პუნქტები - ქვები იწყება ქვემოდან */

        .p::before { content: ""; position: absolute; width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; z-index: 1; }
        .dn::before { border-top: 150px solid #7a4a21; top: 0; }
        .up::before { border-bottom: 150px solid #c49a6c; bottom: 0; }
        .p:nth-child(even).dn::before { border-top-color: #c49a6c; }
        .p:nth-child(even).up::before { border-bottom-color: #7a4a21; }

        .ch { width: 30px; height: 30px; border-radius: 50%; z-index: 10; border: 1px solid rgba(0,0,0,0.5); cursor: grab; touch-action: none; flex-shrink: 0; }
        .w { background: radial-gradient(circle, #fff, #bbb); box-shadow: 0 2px 4px #000; }
        .b { background: radial-gradient(circle, #444, #000); box-shadow: 0 2px 4px #000; }

        .controls { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 25px; border: none; color: white; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .btn-roll { background: #b00; }
        .btn-win { background: gold; color: black; }
    </style>
</head>
<body>

    <audio id="diceSound"><source src="https://assets.mixkit.co/active_storage/sfx/2006/2006-preview.mp3" type="audio/mpeg"></audio>

    <div class="seats">
        <div id="seat-w" class="seat" onclick="sit('w')">⚪ თეთრი: თავისუფალი</div>
        <div id="seat-b" class="seat" onclick="sit('b')">⚫ შავი: თავისუფალი</div>
        <button class="reset-btn" onclick="clearTable()">🧹 მაგიდის გასუფთავება</button>
    </div>

    <div class="board">
        <div class="half">
            <div class="points" id="top-left"></div>
            <div class="points" id="bot-left"></div>
        </div>
        <div class="bar"><div class="dice-container" id="dice-box"></div></div>
        <div class="half">
            <div class="points" id="top-right"></div>
            <div class="points" id="bot-right"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-roll" onclick="roll()">გაგორება 🎲</button>
        <button class="btn btn-win" onclick="declareWin()">მოვიგე! 🏆</button>
    </div>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nickname') || "მოთამაშე";
        let draggedElement = null;

        function createBoard() {
            const layout = {
                'top-left':  [ {n:5, c:'w'}, {}, {}, {}, {n:3, c:'b'}, {} ],
                'top-right': [ {}, {}, {}, {}, {}, {n:2, c:'b'} ],
                'bot-left':  [ {n:5, c:'b'}, {}, {}, {}, {n:3, c:'w'}, {} ],
                'bot-right': [ {}, {}, {}, {}, {}, {n:2, c:'w'} ]
            };

            for (let side in layout) {
                const container = document.getElementById(side);
                container.innerHTML = "";
                const isTop = side.includes('top');
                layout[side].forEach(pos => {
                    const p = document.createElement('div');
                    p.className = `p ${isTop ? 'dn' : 'up'}`;
                    p.addEventListener('dragover', e => e.preventDefault());
                    p.addEventListener('drop', handleDrop);
                    if (pos.n) { for (let j = 0; j < pos.n; j++) addChecker(p, pos.c); }
                    container.appendChild(p);
                });
            }
        }

        function addChecker(parent, color) {
            const ch = document.createElement('div');
            ch.className = `ch ${color}`;
            ch.draggable = true;
            ch.addEventListener('dragstart', () => draggedElement = ch);
            ch.addEventListener('touchstart', () => draggedElement = ch, {passive: true});
            parent.appendChild(ch);
        }

        function handleDrop(e) {
            e.preventDefault();
            const targetPoint = e.target.closest('.p');
            if (draggedElement && targetPoint) targetPoint.appendChild(draggedElement);
        }

        async function sit(side) {
            await _s.from('messages').insert([{ user_name: myNick, text: (side==='w'?"დაჯდა_თეთრი":"დაჯდა_შავი"), room_name: 'nardi_status' }]);
            location.reload(); 
        }

        async function clearTable() {
            if(!confirm("ნამდვილად გინდა მაგიდის გათავისუფლება?")) return;
            await _s.from('messages').delete().eq('room_name', 'nardi_status');
            location.reload();
        }

        async function checkSeats() {
            const { data } = await _s.from('messages').select('*').eq('room_name', 'nardi_status').order('created_at', { ascending: false });
            let wTaken = false, bTaken = false;
            data?.forEach(msg => {
                if (msg.text === "დაჯდა_თეთრი" && !wTaken) { updateUI('w', msg.user_name); wTaken = true; }
                if (msg.text === "დაჯდა_შავი" && !bTaken) { updateUI('b', msg.user_name); bTaken = true; }
            });
        }

        function updateUI(side, name) {
            const s = document.getElementById('seat-' + side);
            s.innerText = (side==='w'?"⚪ ":"⚫ ") + name;
            s.classList.add('occupied');
        }

        function roll() {
            document.getElementById('diceSound').play().catch(()=>{});
            const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
            document.getElementById('dice-box').innerHTML = `<div class="die">${d1}</div><div class="die">${d2}</div>`;
        }

        async function declareWin() {
            const { data } = await _s.from('profiles').select('wins').eq('nickname', myNick).single();
            await _s.from('profiles').update({ wins: (data?.wins || 0) + 1 }).eq('nickname', myNick);
            alert("მოგება ჩაიწერა!");
            clearTable();
        }

        // მობილურისთვის გადაადგილება
        document.addEventListener('touchend', e => {
            if (!draggedElement) return;
            const touch = e.changedTouches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const p = target ? target.closest('.p') : null;
            if (p) p.appendChild(draggedElement);
            draggedElement = null;
        });

        createBoard();
        checkSeats();
    </script>
</body>
</html>
