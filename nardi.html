<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD MAFIA - REAL NARDI</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* დაჯდომის ადგილები */
        .seats { display: flex; gap: 20px; margin-bottom: 15px; }
        .seat { padding: 8px 15px; border: 1px dashed #d4af37; border-radius: 8px; font-size: 13px; color: #888; cursor: pointer; transition: 0.3s; }
        .seat.occupied { border-style: solid; color: gold; background: rgba(212,175,55,0.1); }

        /* დაფა */
        .board {
            width: 95vw; max-width: 600px; height: 420px;
            background: #4b2c11; border: 12px solid #2a1808;
            display: flex; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .half { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .bar { width: 24px; background: #2a1808; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }

        /* კამათლები დაფის შუაში */
        .dice-container { position: absolute; display: flex; gap: 10px; z-index: 100; pointer-events: none; }
        .die { width: 35px; height: 35px; background: white; color: black; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); border: 1px solid #ccc; }

        /* სამკუთხედები */
        .points { display: flex; justify-content: space-around; width: 100%; height: 42%; }
        .p { width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; position: relative; }
        .dn { border-top: 160px solid #7a4a21; } 
        .up { border-bottom: 160px solid #c49a6c; }
        .p:nth-child(even).dn { border-top-color: #c49a6c; }
        .p:nth-child(even).up { border-bottom-color: #7a4a21; }

        /* ქვები */
        .ch { width: 28px; height: 28px; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); border: 1px solid rgba(0,0,0,0.4); }
        .w { background: radial-gradient(circle, #fff, #bbb); box-shadow: 0 2px 4px #000; }
        .b { background: radial-gradient(circle, #444, #000); box-shadow: 0 2px 4px #000; }

        .btn { margin-top: 20px; padding: 12px 40px; background: #b00; border: none; color: white; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .back { margin-top: 15px; color: #555; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

    <div class="seats">
        <div id="seat-w" class="seat" onclick="sit('w')">⚪ თეთრი: თავისუფალი</div>
        <div id="seat-b" class="seat" onclick="sit('b')">⚫ შავი: თავისუფალი</div>
    </div>

    <div class="board">
        <div class="half"> <div class="points" id="top-left"></div>
            <div class="points" id="bot-left"></div>
        </div>
        
        <div class="bar">
            <div class="dice-container" id="dice-box"></div>
        </div>
        
        <div class="half"> <div class="points" id="top-right"></div>
            <div class="points" id="bot-right"></div>
        </div>
    </div>

    <button class="btn" onclick="roll()">გაგორება 🎲</button>
    <a href="chat.html" class="back">დაბრუნება ჩატში</a>

    <script>
        const _s = supabase.createClient("https://ftfciebnywbondaiarnc.supabase.co", "sb_publishable_eQZDSu_Jy1gWmXJFF800Pw_TP2kBRLI");
        let myNick = localStorage.getItem('nickname') || "სტუმარი";

        function createBoard() {
            const layout = {
                'top-left':  [ {n:5, c:'w'}, {}, {}, {}, {n:3, c:'b'}, {} ],
                'top-right': [ {}, {}, {}, {}, {}, {n:2, c:'b'} ],
                'bot-left':  [ {n:5, c:'b'}, {}, {}, {}, {n:3, c:'w'}, {} ],
                'bot-right': [ {}, {}, {}, {}, {}, {n:2, c:'w'} ]
            };

            for (let side in layout) {
                const container = document.getElementById(side);
                const isTop = side.includes('top');
                layout[side].forEach((pos, i) => {
                    const p = document.createElement('div');
                    p.className = `p ${isTop ? 'dn' : 'up'}`;
                    if (pos.n) {
                        for (let j = 0; j < pos.n; j++) {
                            const ch = document.createElement('div');
                            ch.className = `ch ${pos.c}`;
                            ch.style[isTop ? 'top' : 'bottom'] = `-${160 - (j * 26)}px`;
                            p.appendChild(ch);
                        }
                    }
                    container.appendChild(p);
                });
            }
        }

        function roll() {
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const box = document.getElementById('dice-box');
            box.innerHTML = `<div class="die">${d1}</div><div class="die">${d2}</div>`;
        }

        function sit(side) {
            const s = document.getElementById('seat-' + side);
            s.innerText = (side === 'w' ? "⚪ " : "⚫ ") + myNick;
            s.classList.add('occupied');
            _s.from('messages').insert([{ user_name: '🤖', text: myNick + " დაჯდა ნარდზე!", room_name: '🔱 ნარდი' }]);
        }

        createBoard();
    </script>
</body>
</html>
