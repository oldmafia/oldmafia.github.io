<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎲 ნარდი · Backgammon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #2a3a1a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game {
            max-width: 850px;
            width: 100%;
            background: #5a3e2a;
            border-radius: 55px;
            padding: 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            border: 3px solid #d4a017;
        }
        h1 {
            text-align: center;
            color: #ffdf8c;
            margin-bottom: 12px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #f7e5c2;
            border-radius: 28px;
            cursor: pointer;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }
        .panel {
            margin-top: 18px;
            background: #2c2c1a;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .turn {
            background: #000000aa;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffdd99;
            font-weight: bold;
        }
        .dice-box {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .die {
            background: #f8f2e0;
            width: 55px;
            height: 55px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #4a2e1a;
            box-shadow: inset 0 0 0 2px #b97f3a, 0 4px 8px black;
        }
        button {
            background: #f5bc4e;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #ffdd99;
            text-decoration: none;
        }
        @media (max-width: 600px) {
            .die { width: 45px; height: 45px; font-size: 26px; }
            button { padding: 6px 14px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="game">
    <h1>🎲 ნარდი · Backgammon</h1>
    <canvas id="boardCanvas" width="800" height="550" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/550"></canvas>
    <div class="panel">
        <div class="turn" id="turnLabel">თეთრის ჯერი</div>
        <div class="dice-box">
            <div class="die" id="die1">⚀</div>
            <div class="die" id="die2">⚀</div>
            <button id="rollBtn">🎲 ყარე</button>
        </div>
        <button id="resetBtn">⟳ ახალი თამაში</button>
    </div>
    <a href="chat.html" class="back-link">← ჩატში დაბრუნება</a>
</div>

<script>
    (function(){
        const canvas = document.getElementById('boardCanvas');
        const ctx = canvas.getContext('2d');

        // 24 წერტილი (0 = თეთრის სახლი, 23 = შავის სახლი)
        let board = [
            2,0,0,0,0,-5,0,-3,0,0,0,0,
            5,-2,0,0,0,0,3,0,0,0,0,-4
        ];
        let whiteBar = 0;
        let blackBar = 0;
        let whiteOff = 0;
        let blackOff = 0;
        let turn = 'white';
        let dice = [0,0];
        let rolled = false;
        let possibleMoves = [];
        let selectedPoint = null;

        // ----- ინიციალიზაცია -----
        function initGame(){
            board = [
                2,0,0,0,0,-5,0,-3,0,0,0,0,
                5,-2,0,0,0,0,3,0,0,0,0,-4
            ];
            whiteBar = 0; blackBar = 0;
            whiteOff = 0; blackOff = 0;
            turn = 'white';
            dice = [0,0];
            rolled = false;
            possibleMoves = [];
            selectedPoint = null;
            drawBoard();
            updateUI();
        }

        // ----- კამათლის სიმბოლო -----
        function getDiceSymbol(v){
            const map = {1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'};
            return map[v];
        }

        // ----- ყრა -----
        function rollDice(){
            if(rolled){
                alert("უკვე დაყარე! გადაიტანე ქვები.");
                return;
            }
            let d1 = Math.floor(Math.random()*6)+1;
            let d2 = Math.floor(Math.random()*6)+1;
            dice = [d1, d2];
            document.getElementById('die1').innerHTML = getDiceSymbol(d1);
            document.getElementById('die2').innerHTML = getDiceSymbol(d2);
            rolled = true;
            generateMoves();
            if(possibleMoves.length === 0){
                alert(`${turn === 'white' ? 'თეთრს' : 'შავს'} სვლა არ აქვს! ჯერი გადადის.`);
                nextTurn();
            }
            drawBoard();
        }

        // ----- ყველა შესაძლო სვლის გენერაცია -----
        function generateMoves(){
            possibleMoves = [];
            let bar = (turn === 'white') ? whiteBar : blackBar;
            let fromPoints = [];
            if(bar > 0){
                fromPoints.push(-1); // -1 = ზოლი
            } else {
                for(let i=0;i<24;i++){
                    let val = board[i];
                    if(turn === 'white' && val > 0) fromPoints.push(i);
                    if(turn === 'black' && val < 0) fromPoints.push(i);
                }
            }
            for(let from of fromPoints){
                for(let d of dice){
                    if(d===0) continue;
                    let to;
                    if(from === -1){
                        to = (turn === 'white') ? d-1 : 24-d;
                    } else {
                        to = (turn === 'white') ? from + d : from - d;
                    }
                    if(isValidMove(from, to)){
                        possibleMoves.push({from, to, dieValue:d});
                    }
                }
            }
            // დუბლიკატების ამოღება
            possibleMoves = possibleMoves.filter((v,i,a)=>a.findIndex(t=>t.from===v.from && t.to===v.to)===i);
        }

        // ----- სვლის ვალიდაცია (მოკვლაც შედის) -----
        function isValidMove(from, to){
            if(to < 0 || to > 23) return false;
            let bar = (turn === 'white') ? whiteBar : blackBar;
            if(from === -1 && bar === 0) return false;
            let srcCount = (from === -1) ? bar : (turn === 'white' ? board[from] : -board[from]);
            if(srcCount <= 0) return false;
            let destCount = (turn === 'white') ? board[to] : -board[to];
            if(destCount < -1) return false; // მტრის ორზე მეტი ქვა
            return true;
        }

        // ----- სვლის შესრულება (მოკვლის ჩათვლით) -----
        function applyMove(move){
            let {from, to} = move;
            if(from === -1){
                if(turn === 'white'){
                    whiteBar--;
                    if(board[to] < 0){
                        blackBar++;
                        board[to] = 1;
                    } else {
                        board[to] = (board[to] || 0) + 1;
                    }
                } else {
                    blackBar--;
                    if(board[to] > 0){
                        whiteBar++;
                        board[to] = -1;
                    } else {
                        board[to] = (board[to] || 0) - 1;
                    }
                }
            } else {
                let val = board[from];
                if(turn === 'white'){
                    if(val <=0) return false;
                    board[from]--;
                    if(board[to] < 0){
                        blackBar++;
                        board[to] = 1;
                    } else {
                        board[to] = (board[to] || 0) + 1;
                    }
                } else {
                    if(val >=0) return false;
                    board[from]++;
                    if(board[to] > 0){
                        whiteBar++;
                        board[to] = -1;
                    } else {
                        board[to] = (board[to] || 0) - 1;
                    }
                }
            }
            return true;
        }

        // ----- ჯერის შეცვლა -----
        function nextTurn(){
            turn = (turn === 'white') ? 'black' : 'white';
            rolled = false;
            dice = [0,0];
            document.getElementById('die1').innerHTML = '⚀';
            document.getElementById('die2').innerHTML = '⚀';
            possibleMoves = [];
            selectedPoint = null;
            document.getElementById('turnLabel').innerHTML = (turn === 'white') ? 'თეთრის ჯერი' : 'შავის ჯერი';
            drawBoard();
        }

        // ----- სვლის ცდა -----
        function tryMove(from, to){
            if(!rolled){
                alert("ჯერ კამათელი უნდა ყარო!");
                return false;
            }
            let valid = possibleMoves.find(m => m.from === from && m.to === to);
            if(!valid){
                alert("არასწორი სვლა!");
                return false;
            }
            applyMove(valid);
            // ამოვიღოთ გამოყენებული კამათელი
            let idx = dice.indexOf(valid.dieValue);
            if(idx !== -1) dice[idx] = 0;
            generateMoves();
            drawBoard();
            if(possibleMoves.length === 0){
                nextTurn();
            }
            return true;
        }

        // ----- დაფის დახატვა -----
        function drawBoard(){
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0,0,w,h);
            // ფონი
            ctx.fillStyle = '#e8dbbd';
            ctx.fillRect(0,0,w,h);
            // ხაზები
            ctx.strokeStyle = '#aa8b5c';
            ctx.lineWidth = 2;
            for(let i=0;i<24;i++){
                let x = (i%12)* (w/12);
                let y = (i<12) ? 0 : h/2;
                ctx.strokeRect(x, y, w/12, h/2);
            }
            // ქვების დახატვა
            for(let i=0;i<24;i++){
                let cnt = board[i];
                if(cnt===0) continue;
                let isWhite = cnt>0;
                let absCnt = Math.abs(cnt);
                let x = (i%12)* (w/12) + 8;
                let yBase = (i<12) ? h/2-28 : h-48;
                let step = 10;
                for(let j=0;j<absCnt && j<5;j++){
                    ctx.fillStyle = isWhite ? '#f5f5f5' : '#4a3a2a';
                    ctx.beginPath();
                    ctx.arc(x+10, yBase - j*step, 12, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = '#222';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
            // ზოლი
            ctx.fillStyle = '#a56b2f';
            ctx.fillRect(w/2-8, 0, 16, h);
            // თუ არჩეული წერტილია
            if(selectedPoint !== null){
                ctx.fillStyle = '#ffcc44aa';
                let x = (selectedPoint%12)*(w/12);
                let y = (selectedPoint<12) ? 0 : h/2;
                ctx.fillRect(x, y, w/12, h/2);
            }
        }

        function updateUI(){
            document.getElementById('turnLabel').innerHTML = (turn === 'white') ? 'თეთრის ჯერი' : 'შავის ჯერი';
        }

        // ----- კლიკის დამუშავება (ქვის არჩევა/გადატანა) -----
        canvas.addEventListener('click', (e)=>{
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            let point = Math.floor(mouseX / (canvas.width/12));
            if(point<0 || point>23) return;
            let isTopHalf = mouseY < canvas.height/2;
            let idx = isTopHalf ? point : point+12;
            if(selectedPoint === null){
                // არჩევა
                let val = board[idx];
                if(turn === 'white' && val>0) selectedPoint = idx;
                else if(turn === 'black' && val<0) selectedPoint = idx;
                else if(turn === 'white' && whiteBar>0 && idx=== -1) selectedPoint = -1;
                else if(turn === 'black' && blackBar>0 && idx=== -1) selectedPoint = -1;
                else { alert("ეს შენი ქვა არ არის!"); return; }
                drawBoard();
            } else {
                // გადატანა
                tryMove(selectedPoint, idx);
                selectedPoint = null;
                drawBoard();
            }
        });

        document.getElementById('rollBtn').onclick = rollDice;
        document.getElementById('resetBtn').onclick = ()=>{ initGame(); selectedPoint=null; };
        initGame();
    })();
</script>
</body>
</html>
